body:
  text: 周易象曰澤上有地臨君子以教思無窮容保民無疆右中允臣朱良裘王弼注曰相臨之道莫若說順也朱子本義曰地臨於澤上臨下也教之無窮者兌也容之無疆者坤也臣謹按天澤曰履履者以下承上也地澤曰臨臨者以尊適卑也萬物莫不尊天而親地於此可見而王者所以崇效而卑法者皆取諸此矣繫辭曰坤也者地也萬物皆致養焉又曰說萬物者莫說乎澤既說而順臨民之道備矣而彖必以剛浸而長剛中而應釋臨之義者蓋說而順之道必有至健者以主乎其中然後得大亨以正而有合於天之道此即董仲舒所謂陽常以生育長養為事而隂常積於空虛不用者也夫麗澤之功朋友資以講習厚載之德品物納於含宏故曰說言乎兑致役乎坤是教之無窮容之無疆皆臨民者必不容己之事乃言教而必係之以思言容而必極之於保者於以見教非徒提命之諄諄容亦不僅度量之相越己也黨庠術序所以教民者綦詳而琴書干羽皆載深宫之德意以周流而後有以感發其性情而淪浹乎肌髓井疆廬舍以奠其居比閭族黨以聯其誼制節謹度以厚其生所欲與聚所惡勿施必使天下之大九州之逺皆有以安其出作入息之常而遂其仰事俯育之願所謂保之如赤子而視之如傷也孟子言聖人之教民曰勞之來之匡之直之輔之翼之使自得之又從而振德之此可以知聖人之心思無一息不與斯民之日用飲食相流通而其言保民也舉斯心以加諸彼而達於家邦訖於四海夫豈有此疆彼界之分與抑又聞之易之言君子者謂君臨上位子愛下民通天子諸侯兼公卿大夫有地者而言也然樹之后王君公承以大夫師長必統於首出庶物之一人故必有知人善任之能而後克殫作君作師之職此六五所以言知臨大君之宜也有知周萬物之能必有仁覆天下之量其積之也至厚而後運之也不勞此上六所以言敦臨吉無咎也中庸言唯天下至聖為能聰明睿智足以有臨此知臨之義也其言德之積於中而見於外者首之以寬裕溫柔此敦臨之義也然則教思無窮容保民無疆非知之盡仁之至而全乎自强不息之勇者孰能與於斯周易象曰澤上有地臨君子以教思無窮容保民無疆侍講臣馮秉仁胡氏炳文曰不徒曰教而曰教思其意思如兌澤之深不徒曰保民而曰容保其度量如坤土之大臣謹按帝王撫有寰宇海隅向風四方從欲固將舉萬民之衆登袵席敦禮讓臻熙皥之庥而成久道化成之治者也是以首出庶物取象於乾厚德載物取勢於坤容民畜衆則師之道昌輔相裁成則泰之爻著為養為教易之說也大備而澤上有地更取義於臨者其於君民相接之誼殆有愷切言之者與今夫蒼蒼在上天之臨也終古代明日月之臨也而莫髙匪天日月無私照承乎下者䝉其覆而忘其德其象則然矣惟夫地之上澤滴滴必歸無源不濬言乎茹納也有包育之能言乎積漸也有涵濡之力其氣通其情洽聖人觀象於此而即以教思無窮容保無疆歸之君子其取義實宏且摯焉蓋九重之上廉逺堂髙而人君痌瘝為懷則無逺弗屆是以莊臨之以威臨之而實以惠臨之也故夫言教而復言思者言乎條誥訓約之頒布諸渙汗者為猶淺而委曲開導之意實繫乎天子之隱憂言保而復言容者言乎蠲租賑貸之施出之賚豫者為曠典而維持調護之能實發於皇心之肫懇不然一夫不獲時豫之辜民未知禮未生其共將所謂無窮無疆者方諸地澤之義不大相徑庭乎二典之訓曰食哉惟時敬敷五教三代以還凛民惟邦本之㫖而肇修人紀視民如傷生其時者承風動歌樂只􅗥乎尚矣亦越漢唐而後力田有詔學校有式躬履至道以示四方務兹稼穡以臻仁遂豈不以民猶水也不拯其流將靡所極君實臨之風化之行必由近始夫乃以教以養浹髓淪肌重熙纍洽迄百年必世之遙猶戴恩膏於不替以云教之無窮其思實逺也以云保之無疆其容乃大也此而揆於地澤之交隂陽之氣剛柔之用誠有若合符節者君人者果何道而能幾此哉唐陸贄奏疏云君人之道子育為心雖身處九重而慮周四表近取諸身如疴癢之關乎四肢也逺取諸物如品彚之鑒於兩曜也故時有凶害而人無流亡恃天聽之必聞知上澤之浸至今試即其說而參究之已饑已溺即教思之思欲立欲達即容保之容夫教人以善謂之忠何以守位曰仁忠也仁也豈外假之數哉亦惟端本於君心之常臨而已矣若乃皇路升平士民樂業而保民如赤之衷方且給求養欲之殷殷救弊補偏之急急則上下之氣通地澤之情浹於以上召天和而紹唐虞三代之治也何有周易象曰澤上有地臨君子以教思無窮容保民無疆編修臣張若需蔡清曰勞之來之匡之直之輔之翼之使自得之又從而振德之可見君子教思之無窮民吾同胞必使皆樂其樂而利其利可見君子之容保民無疆也臣謹按治天下之道不外教與養兩端唐虞尚矣命契為司徒則曰敬敷五教命棄為后稷則曰播時百榖所以正德利用厚生者功敘惟歌俾之勿壞三代以來教民之道益詳保民之政益備而良法美意尤莫具於周禮一書間嘗考之地官司徒掌邦教典曰教典職曰教職象曰教象法曰教法官曰教官教官之屬似専為教設乃觀大司徒之職主土地封疆之政以土會辨物生以土宜辨名物以土均之法制地征而後施之以十有二教興之以鄉三物防僞而以五禮教之中防情而以六樂教之和其屬則鄉師至比長有考德行察道藝月吉讀法之文遂人至鄰長有授田野教稼穡三嵗興氓之制而且師氏保氏迪於上司諫司救訓於下廩人以數邦用司稼以均民食下至土化之法瀦澮之宜莫不掌之専官施其禁令然後知聖人之於民也必先有以盡地利而後可以淑人心既有以淑人心而後可以復民性成周教養之法分見於六官而司徒獨備其全雖其條目布置先後不一以見教不徒行養有兼濟而使民相生相愛之具實參錯而並施也方策所載纎悉畢備莫非聖人精神智慮之所寄而運量之廣固恢恢乎納萬物於在宥矣是故治術多端本於建極教之無窮者繫乎思也保民無疆者實能容也使出身加民之際無至誠愷惻之意與之相永則徒法不能以自行將有久而必敝之勢而一切茍且遷就之治僅能補救於一隅不克普美利於遐邇皆君子所不道也然則至治之世德教洽於人心經綸彌於海宇優游漸漬入之最深旁皇周浹覃於無外象涵濡於兌澤安持載於坤輿戴履之倫有幾忘帝力於何有者不將軼官禮之隆規而臻勳華之上理也乎周易象曰澤上有地臨君子以教思無窮容保民無疆監察御史臣金溶本義曰二者皆臨下之事教之無窮者兌也容之無疆者坤也臣謹按人主之君臨天下統御寰區非徒擁崇髙之位擅威福之柄也其精神智慮常關注於匹夫匹婦之隱而協其性情謀其家室其念之誠也有加無已其量之宏也無逺弗周故讀易至兌下坤上之卦而歎聖帝明王之所以為民計者至深且逺也蓋天下之至愚者民也天不忍其終於愚昧於是生先覺之聖人以作之師而教立焉天下之至渙者民也天不忍其少有顛連於是有繼天之元后以作之君而養興焉而易卦之臨具此義矣且澤取乎潤物有漬漸不已之意故教而深之以思地取乎載物有含蓄無盡之意故保而深之以容固不徒沾沾於教養之虛名而洵有與澤俱深與地俱永之實際也但從來上之所施於民民之厚期於上舉不外此教養二事而二事之中又有先後之分緩急之異不可不察也書曰資富能訓孟子曰聖人治天下使有菽粟如水火菽粟如水火而民焉有不仁者乎是謀生之不及則雖有黨庠術序能馴其耳目究不能洽其心思何也志有分也民生有蕃衍之勢固不能無所資而立天地有自然之利亦不能無所待而開一夫不耕或受之饑一女不織或受之寒而復有山川之限隔時世之變遷地勢之廣狹風俗之厚薄氣運之盛衰極紛紜不齊之致欲使天下之疲癃殘疾惸獨鰥寡無一不在包含遍覆之中而獲長養生全之慶此亦事之最難區畫經營者也而聖人於此若有不敢畏其難者汲汲皇皇肫肫懇懇有其法不徒恃其法而法外復有運用有其澤不徒恃其澤而澤外更有恩勤竭其心思神其經緯務使地無遺利人無遺力不計目前不規小利被潤澤而大豐美所謂體仁長人樂天者保天下者此也由是比户封而親遜自裕俯仰足而揖讓皆興物畜然後有禮將有相因而漸至者矣是故論教於養之先者王道之成論養於教之先者王道之始養之為勢難而急教之為數易而緩觀臨之象而致治之能事畢矣周易君子以教思無窮容保民無疆侍讀臣周玉章臣謹按天生民而立之君戴之為元后親之為父母必將合天下之身心而陶淑之萃億兆之室家而康乂之乃克稱臨民之任蓋臨者非第以貴馭賤以卑承尊之謂謂其有以教之也謂其有以保之也唐虞之世九功惟敘九敘惟歌敷教在寬安民則惠其所以嘉惠元元者深矣三代以來法制大備修六禮以節民性明七教以興民德齊八政以防淫一道德以同俗養耆老以致孝恤孤獨以逮不足自司徒司空而下以至樂正黨正比長族師皆司教民之官也載師閭師遂人均人皆分保民之職也以故風民醇茂獄訟衰息衣食饒足菑害不生熙熙然太平之盛治與然教不恃乎術之多而貴有此誨人不倦之心保固期乎澤之渥而尤重此怙冒無外之量讀臨卦之象辭而可見矣胡氏炳文曰不徒曰教而曰教思其意思如兌澤之深不徒曰保民而曰容保民其度量如坤土之大蓋崇四術立四教黨庠術序有其地詩書禮樂有其文興賢舉能示之勸觥撻郊遂示之懲教民之道盡矣而君子勤勤懇懇之心無時或已惟願家皆孝弟户盡醇良與吾民日漸月摩淪肌浹髓教思無窮程子所謂至誠無斁也任九職定九賦農桑畜牧殖其本山林川澤取其材比閭族黨奠其居兵甲車乘捍其患保民之制詳矣而君子民胞物與之量擴之彌宏真覺天下一家中國一人必使一夫無不獲之辜海隅無未遍之澤容保無疆程子所謂廣大無限也夫教人以善謂之忠若臨天下者之曲成萬物將昆蟲草木且被其光華而屬在含生負性者可知一命之士留心利物必有所濟若臨天下者之覆冒蒼生雖奕祀萬年猶享其樂利而當時之飲和食德者更將何如甚矣其無窮也甚矣其無疆也兌之象曰君子以朋友講習坤之象曰君子以厚德載物至兌與坤合而以上臨下之象呈焉君子觀其象法兌澤之義孚化於羣黎體坤厚之德錫福於兆庶堯舜禹湯文武之臨民率由此道也周易君子以教思無窮容保民無疆編修臣孫人龍朱子曰二者皆臨下之事教之無窮者兌也容之無疆者坤也蔡清曰勞之來之匡之直之輔之翼之使自得之又從而振德之此可見君子之教思無窮民吾同胞以至鰥寡孤獨皆吾兄弟之顛連而無告必使皆樂其樂而利其利此可見君子之容保民無疆也臣謹按先儒謂澤上有地其象為臨臨下之道不外教與養兩端而澤以淪浹至深為義故有教導人之意不徒曰教而曰教思者其意念必如兌澤之深而真誠罔斁焉地以漸被甚廣為義故有容受人之意不徒曰容民而曰容保民者其度量必如坤地之大而博厚無遺焉此君子之善體乎臨卦之義者也蓋嘗念之百姓者朝廷之赤子也故唐劉蕡謂宜令慈仁者親之育之如保傅焉如乳哺焉如師之訓導焉而後民之於上也敬之如神明愛之如父母宋歐陽修亦云唐虞三代之為法其慮民之意甚精治民之具甚備防民之術甚周誘民之道甚篤行之以勤而被於物者洽浸之以漸而入於人者深故民之生也不用力於南畝則從事於禮樂之際不在其家則在乎庠序耳聞目見無非仁義道德而趨之不知其倦是則臨天下者立教興養固惟至誠無息以貫徹於一日萬幾之中而若地方有民社之責者尤必仰承德意輔化宣猷凡制田里薄賦斂設學校立師儒匪第曰奉行故事而已也務在本實心為實政而開衣食之源興禮讓之化漸漬涵濡所以復民性者初終靡倦廣博深厚所以遂民生者遐邇咸周夫然後風俗美而教化行乃克奏太平盛治於億萬年矣周易君子以教思無窮容保民無疆監察御史臣李清芳朱子注曰地臨於澤上臨下也二者皆臨下之事教之無窮者兌也容之無疆者坤也臣謹按此章地澤之象而聖人繫之以辭則以人君之所以教養斯民者為言可以見人君代天理物必其有以使覆載之中無一物不得其所以遂其生以復其性而躋一世於蕩平正直之休然後可以參三才而立極也何也澤之深而無間浸灌滋潤其被於物也無不發榮焉地之廣而無外溥博深厚其及於物也無不咸亨焉君子體於澤而為教思則漸民以仁摩民以義節民以禮使皆有以全其性分之所固有職分之所當為而聖人之心乃安焉體於地而為容保則養之以保息安之以本俗聚之以荒政使其器用之利而財求之阜百室之盈而婦子之寧而聖人之心乃快焉然論其序則養先於教既富方榖衣食足而後知禮義論其極則教深於養民可使由不可使知自新必推以新民故敷錫庶民之義必以會極歸極為至焉而容保之實事則惟曰制其田里教之樹畜周官頒十有二職於萬民使各盡其力之所極無曠土無游民食節事時民咸安其居教思之實事則惟曰設大學以教國立庠序以化邑五禮教之中六樂教之和六德六行六藝三物以賔興之而已矣夫自謀衣食豈其一一仰給於上惟民生厚豈在上者之相為賜然而其職皆在於君者蓋以天生民而立之君聰明睿智足以有臨則光天之下至於海隅蒼生莫不托命此聖人所以引為己責而惓惓不已之意如澤之深渾渾無涯之化如地之大也裁成輔相參贊化育於以君臨萬邦豈不盛哉周易六五知臨大君之宜吉象曰大君之宜行中之謂也檢討臣吕熾程子曰五以柔中順體居尊位而下應於二剛中之臣是能倚任於二不勞而治以知臨下者也夫以一人之身臨乎天下之廣若區區自任豈能周於萬事故自任其知者適足為不知唯能取天下之善任天下之聰明則無所不周是不自任其知則其知大矣五順應於九二剛中之賢任之以臨下乃已以明知臨天下大君之所宜也其吉可知又曰君臣道合以氣類相求五有中德故能倚任剛中之賢得大君之宜成知臨之功蓋由行其中德也朱子曰以柔居中下應九二不自用而任人乃知之事而大君之宜吉之道也臣謹按卦之爻辭及小象俱未明言任人之義而注易者推求其義則五與二為正應為能虛中以聽故皆以不自用而任人言之正與中庸舜其大知也與一章意義相合蓋人君之臨天下所蒞者大一人之耳目不敵衆人之聞見唯廣詢博採翕受敷施則合天下之聰明皆一己之聰明其為知也大矣此即舜之好問好察邇言隱惡而揚善也傳又歸之於行中臣以為此有二義一者君能行中則宅心處事無偏倚之私故能任賢勿二以成其知一者人君聽受天下之言其中過與不及亦甚參差不齊唯斟酌其至當不易者見諸施行則稽於衆者斷於獨其權衡仍在君而不在臣夫然後理無不得而庶績咸熙此即舜之執其兩端用其中於民也程子於後一說似尚未及要而論之臨天下者莫貴於知故周書曰亶聰明作元后元后作民父母商書則曰視逺惟明聽德惟聰虞書則曰明四目達四聰此皆與知臨之說相發明者也而知莫貴於行中虞書言惟精惟一允執厥中商書言建中于民周書言率自中無作聰明亂舊章此皆與行中之說相發明者也蓋臨上卦為坤故取藏知之義五爻居中故取行中之義循是而勿替焉即謂上六之敦臨謂其敦厚於臨故吉而無咎豈非存此大知用中之德加以至誠不息之功故能躋天下於郅隆之治者哉周易六五知臨大君之宜吉象曰大君之宜行中之謂也監察御史臣周祖榮程子曰五有中德能倚任剛中之賢得大君之宜成知臨之功蓋由行其中德也臣謹按人臣之知居於一偏以明不明為量故負一長者皆可見功於國人君之知期於得中以宜不宜為量故不遍物者自足取用於人古之稱大知者莫如舜而惟不自用而取諸人遂成執兩用中之治臨卦之六五其猶是乎柔中居尊有六四以為之相能守正而親賢有九二以為之應能竭誠以事上於是合天下之知以成一人之知而即以一人之知運用乎天下之知豈非聰明睿智足以有臨者乎顧所謂宜者何也人君立一政而不能行於天下不可謂宜人君行一政而不能允協於中亦不可謂宜象以行中為大君之宜謂能行中則必虛己任人集衆善以成一是故曰宜也夫君道莫先於養民而勸農課桑待人而治莫重於教民而議禮正樂得人而興惟知臨之主明於簡賢方其政之未行也有咨詢之誠有論辨之典操之於衡鑒者見擇中之精焉及其政之將行也有股肱之寄有心膂之託措之於委任者見執中之一焉以此臨天下所謂教思無窮容保民無疆者不勞而自致此誠神靈首出左右咸宜者與要之中而曰行言其用也如論其體其必係於君心乎基命宥密能觀乎萬化之源清明在躬克建乎維皇之極大君為天下得人而天工以亮庶績以熙凡厥庶民無弗協於中者非在我之權度精切不差何以與此也故曰為政在人取人以身也周易六五知臨大君之宜吉給事中臣宫煥文朱子曰以柔居中下應九二不自用而任人乃知之事而大君之宜吉之道也程子曰五以柔中順體居尊位而下應於二剛中之臣是能倚任於二不勞而治以知臨下大君之所宜也其吉可知臣謹按臨之取義以爻之隂陽言則為剛臨柔以象之地澤言則為上臨下皆以己臨人之義也君道也卦之六五居大君之位主坤之順致兌之說是宜為君而無不吉矣顧必下應九二剛中之臣乃始稱知臨而為大君之所宜而吉者何哉蓋人主以一身居乎巍巍之上以一心運乎茫茫之中其於天下之事與人固皆有相臨之分惟是道濟天下必先知周萬物而知周萬物者如徒恃一己之知以周之未必果周之而不遺也中庸言至聖聰明睿智足以有臨者非謂役吾耳目運吾心思以求盡天下之無窮也亦惟不自用其聰而能用天下之耳以為聰則其聰無不聞不自用其明而能用天下之目以為明則其明無不見不自用其睿智而能用天下之心思以為睿智則其睿無不通而其智無不知書稱知人則哲能官人又曰股肱惟人艮臣惟聖詩言藹藹王多吉士維君子使又曰佛時仔肩示我顯德行凡皆不自用而任人之道也知之事也是以自古聖帝哲王莫不勞於求賢而逸於任人三代以前若堯之得舜舜之得禹臯陶成湯武丁之得伊傅文武之得周召望散固皆用賢勿二而致堂廉一德之休三代以後如漢之得蕭曹丙魏昭烈之得諸葛唐世之得房杜姚宋宋世之得文范富韓歐陽司馬諸賢亦皆知人善任而收宫府一體之效此其為大君之宜臨下之吉尤其彰明較著者也嘗考程子之說曰君貴明不貴察臣貴正不貴權今按臨之剛中如九二是臣道之正者也柔中如六五是君道之明者也五惟以君之明任臣之正故能上下交孚而德合於中象曰大君之宜行中之謂謂其能以知行中也夫惟中之所在而知及之因倚任之則君臣道合矣君臣道合以之臨百官而百官以治以之臨萬民而萬民以察由是教思無窮天下鼓舞其化而莫測其用容保無疆天下涵濡其德而莫名其功豈非亶聰之隆規元后之偉績與抑參諸他卦自臨而進則為泰泰之六五其占曰以祉元吉蓋亦取下應九二任賢而成交泰之功是知取人為大自用則小明良喜起千古為昭要惟在我之權度精切不差夫然後收公聽並觀之益無偏信専任之私此又存乎任人之先者矣周易六五知臨大君之宜吉監察御史臣張孝挰程傳曰五以柔中順體居尊位而下應於二剛中之臣是能倚任於二不勞而治以知臨下者也夫以一人之身臨乎天下之廣若區區自任豈能周於萬事故自任其知者適足為不知惟能取天下之善任天下之聰明則無所不周是不自任其知則其知大矣五順應於九二剛中之賢任之以臨下乃己以明知臨天下大君之所宜也其吉可知臣謹按仲虺告湯曰好問則裕自用則小夫子稱舜為大知以其不自用而取諸人也蓋天下之理資於人則不勞而取諸己則有限誠以一人之耳目心思斷不能周乎萬事萬物之廣故雖明如離婁必有所不能見聰如師曠必有所不能聞心思如堯舜必有所不能及茍自恃以為無所不見無所不聞無所不及則舉其一而廢其百察於邇而遺於逺萬事萬物之廣所失有不可勝言者矣大抵人君之道有二或端拱無為以希穆清之化而所任非人則政必叢脞而不舉或勵精自治以任天下之重而不復任人則勢必勞苦而無功然而慕無為者中材之主而不輕任人者每多出於英明賢哲之后蓋其聰明神武本乎天縱其於天下之賢才每多否而少可而又其措置之力恢恢有餘是以不難毅然以自任而不甚責成於其臣子然大君終日焦勞於上而其下至於熟視而不敢有所為甚者積習既久恬嬉成風乃至庸懦而不能有所為則人主又何利於此是故君者職要者也臣者職詳者也職要則莫要於任人昔文王罔攸兼於庶言庶獄庶慎而務克知三有宅心灼見三有俊心誠以天職修而上有所承體統立而下有所寄非任人不可也若秦始皇之衡石程書隋文帝之衛士傳餐處萬乘之尊躬庶司之務勞而日拙何足尚乎夫惟合天下之聰明以為聰明則視聽博而靡遺合天下之心思以為心思則計慮周而鮮忒大權獨攬於上羣材奔走於下求賢勞者其任人逸以仁育者必以知臨舜有五人武有十亂唐虞三代之隆未有不本乎此者也周易六五知臨大君之宜吉監察御史臣陳髙翔程子曰五以柔中順體居尊位而下應于九二剛中之臣是能倚任于二不勞而治以知臨下大君之所宜也其吉可知朱子曰以柔居中下應九二不自用而任人乃知之事而大君之宜吉之道也臣謹按居上臨下謂之臨而六五以中德居尊位所謂聰明睿知足以有臨者也故有取于知臨之象夫以天下之大萬民之衆必欲事事而理之物物而察之其勢有所不能故所謂知者不在于遍物而在于親賢親賢斯能遍物矣唐虞之世府修事和揆其所以致此者曰闢四門明四目達四聰夫明四目達四聰則天下之聰明睿知皆一己之聰明睿知斯其足以有臨也雖然自古人君孰不欲任人而任得其人者往往而少蓋人不易知知人原不易或行與言違或心與迹異初終殊轍常變改觀趨走承順有似於恭逡巡畏縮有似於謹依違兩可有似於和阿諛逢迎有似於忠諸如此類難以悉數此知人則哲堯舜其難也細觀此爻柔順虛中具有知人之德而其所應者乃剛中之九二表裏如一守正不渝以責難為恭以匪懈為謹以不同為和以無私為忠五知而善任之正如堯之知舜舜之知禹臯陶也其吉宜矣故人君欲任人必先知人而知人又非逆億而伺察之謂也清心寡欲則此中虛明洞達如鑒之照物妍媸畢現先儒所謂居敬者尤知人任使之本與周易大君之宜行中之謂也監察御史臣沈世楓程傳曰君臣道合蓋以氣類相求五有中德故能倚任剛中之賢得大君之宜成知臨之功蓋由行其中德也人君之於賢才非道同德合豈能用也臣謹按周公爻辭以知臨為大君之宜而孔子象傳則以為行中之謂者非知之外别有一中乃欲以中而成其知也夫以舜之大知猶問察隱揚以歸於用中是可知非中不足以言知也蓋人之知者或任其聰明而軼夫軌範或務為精密而轉至遲疑則因知而失中豈惟任人鮮當哉凡發政施令亦恐無以善其天亶之用矣夫中無定體隨時而在惟視乎君心之操舍凡衆著於殿廷之間者共見而共聞而慎持於宥密之內者獨知而獨覺必於深宫默處之地節嗜欲謹情好無膠於成見無惑乎旁撓鑑空衡平以審夫至善之所在然後任人而權衡悉當制事而偏倚悉泯其所行乃無乎不宜也即如臨民之務不外教思容保二大端乃教而必深之以思者不徒守條教之陳規也保而必恢之以容者非以博施濟之鴻名也其間因地制宜隨時變法斟酌盡善咸協於中而後知臨之用一時䝉其利萬世享其福矣夫知為貞固中貴允執中固貫徹於知之內而有以相濟然非誠無以守之堅而要諸久此文王著臨卦之義必以利貞為訓而立誠以致中本中以行知信乎為大君之宜而天下咸仰亶聰之后已周易觀盥而不薦有孚顒若彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣少詹事臣福十寶朱子曰觀者有以中正示人而為人所仰也盥將祭而潔手也薦奉酒食以祭也顒然尊敬之貌言致其潔清而不輕自用則其孚信在中而顒然可仰也四時不忒天之所以為觀也神道設教聖人之所以為觀也臣謹按人主一身天下之觀瞻係焉云為動靜不可以不慎也茍君極不立則君道不尊而天下失所仰矣豈大觀之謂乎故必有順巽之德內焉於理無所乖外焉於事無所拂自一身以達庶政無事制度文為之末一皆大中至正之規夫而後端拱九五之上一人垂裳而萬邦作式有不期然而然者矣然此豈徒崇尚淡漠無為之治也哉觀之卦辭取義於祭繫之曰盥而不薦有孚顒若是以存誠主敬為大觀之本矣人君果能事事如盥而未薦之時誠意渾全敬心純潔以精一凝固之神立臣庶兆民之上此時雖有設施不見經營措置之勞雖有變通不見紛更粉飾之迹將所存者既神所過者自化天下之人潛移默運順帝之則於不知此其感應之捷夫寧有端倪之可尋乎傳曰視之而弗見聽之而弗聞體物而不可遺言天之神道也詩曰不顯惟德百辟其刑之言聖人之設教也大觀物化即謂聖人以神道設教也亦宜昔虞舜恭巳正南面而天下自治文王不大聲以色而萬邦作孚胥此物此志也夫周易有孚顒若監察御史臣倪國璉朱子曰顒然尊敬之貌言致其潔清而不輕自用則其孚信在中而顒然可仰也臣謹按此承上文言為觀之道如祭者盥而未薦之時精誠専一凝而不散孚信之念存於中顒然之容見於外蓋總不外一主敬之學也夫觀德雖在於民而為觀則在於己若居大觀之位而欲立為觀之本非徒致謹乎號令文章已也必也惟精惟一守之以中而不敢有一毫怠荒之意無思無為持之以正而不敢有一毫輕率之事就如承祭者盥而未薦其心純是一團誠敬聚齊戒之精神於一日而致愛致慤積於馨香未達之先通萬心之仁孝於一心而僾見愾聞凝於祼獻未將之始此時精意潛孚誠心默契對越感通之微莫過於此所謂有孚也由是理積而氣流孚遂并著之於象第覺威儀容止之間無不示人以可尊可敬上足以格如在之神而充滿昭著無不歆享下足以懾駿奔之衆而精微惻愴罔不祇承其顒然可仰者正惟此未渙未散之誠有以凝於內而徵於外也夫存此意於廟中則不顯篤恭為昭格神明之本形此意於民物則臨朝淵穆即蟠固天下之原程子所謂上下一於恭敬則天地自位萬物自育氣無不和而四靈畢至矣大哉觀乎實德在中則有感必應此下觀而化所以莫不動其敬順之心以共仰其建中表正之盛治與周易大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣編修臣觀保程子曰五居尊位以陽剛中正之德為下所觀其德甚大故曰大觀在上下坤而上巽是能順而巽也五居中正以巽順中正之德為觀於天下也為觀之道嚴敬如始盥之時則下民至誠瞻仰而從化也天道至神故曰神道觀天之運行四時無有差忒則見其神妙聖人見天道之神體神道以設教故天下莫不服也臣謹按人君繼天立極知臨九五之尊首出庶物之上順以宅心如堯舜之溫恭克讓文王之徽柔懿恭尤本乎巽以制事蓋巽者德之制也以類天下之情以通萬物之理所以因時而制宜也顧順巽皆自其一身言之天德也自一身以達諸庶政百度興而徯志應紀綱飭而號令明本大中至正之道以為協中歸正之基所以為觀於人者也王道也至盥而不薦有孚顒若則以専一之精神發而為顒卭之容止即建其有極之意也不動而敬不言而信下觀而化者即歸其有極之意也若夫妙不可測之謂聖聖不可知之謂神則上天之載無聲無臭而日月運行一寒一暑四時代謝於其中亘古亘今無稍差忒其寂然不動感而遂通往來不窮變化不居天何言而四時行也此天之神道也聖人者居天位備天德心與天合道與天契凡敕幾感物無非體天之妙用故曰聖人以神道設教豈若後世謬為䜟緯禨祥之說託為荒逺無稽之談且假河圖洛書以實其說曰此聖人之神道設教也哉是以聖人端拱於穆清之上蕩蕩乎化而裁之推而行之神而明之默而成之者莫可形容斯天下之人涵泳其德而不知其功鼓舞其化而莫測其用忘帝力於何有日遷善而不知所謂誠於此動於彼存者神過者化也然則聖人之神道非神奇也即民彛物則日用尋常大中至正之道也是以大觀在上而天下服也周易有孚顒若下觀而化也監察御史臣馬丙宋徐氏幾曰下觀而化以四隂觀二陽言謂上有精潔誠敬之德顒然可仰則天下有所觀感而化如舜恭已正南面而天下自治文王不大聲以色而萬邦作孚自然之感固如此也臣謹按君民之際通乎性情感應之機捷於影響上有顯示之模斯下有潛移之效自古迄今未之有易也蓋君天下者首庶物而作覩垂衣裳而御宇志氣神明咸與百姓之心思相貫衣冠瞻視常與萬民之耳目相周風化之原實由於此是故誠敬積於一心而德輝暢於四體勿虞勿詐內之不參以僞妄之端如圭如璋外之自形其穆皇之象淵默之衷彰於王度顒卬之望著於明堂思慮固所不存而緣飾亦所不事矜持固所不作而鎮靜亦所不知由是自朝廷以至百官自百官以至萬民聚而覩焉既共凛乎天顔環而象之因以成為風俗不待申命懸書而瞻聖主之清光自潛消其積習之染無煩令行禁止而對明王之德宇自隱動其樂善之思其觀而化也非上之有孚顒若者足以感之曷克臻此乎故徐氏舉舜與文王以發明之者蓋帝舜以溫恭允塞之精心垂旒搢珽施於山龍藻火之華而時雍風動之休因之以作海隅蒼生罔不欽承帝德此其徵也文王以徽柔懿恭之至意端拱深居發為臨保肅雍之盛而喬木甘棠之化因之而成小懷大畏罔不樂順王風此亦其徵也是知深宫之作則非欲要結於斯人而默召之神勢難遏焉雖在愚民能不聞風而向道閭里之會歸非欲求媚於天子而觀感之深心難已焉編氓雖陋能不革面而回心故上之所示下斯應之其事有必至其幾有必然也帝王表正萬邦之道其理豈外是哉周易六四觀國之光利用賔于王監察御史臣倪國璉程子曰聖明在上則懷抱才德之人皆願進於朝廷輔戴之以匡濟天下四既觀見人君之德國家之治光華盛美所宜賔于王朝效其智力上輔於君以施澤天下故云利用賔于王也臣謹按此言觀道之極盛也五以中正之德大觀在上而最近者莫如六四一爻所以觀之最切蓋斯時在上之本身以出政者謨烈顯承炳為邦治文章禮樂蔚為國華其盛德之光輝不特見之一身而且著之於天下惟四得以仰瞻日月躬覩休明有如唐虞之時敘為典禮敷為文德播為干羽國光之發越甚隆而禹稷臯䕫諸佐皆得就日而瞻雲又如成周之時顯為懿德傳為令聞者為雅頌國光之宣昭甚逺而周召畢散諸臣皆得覲光而揚烈夫明良相遇之日自古為難而聲明文物之朝代不數覯占斯爻者所以奮然而興幸際盛明願依末光以景郅治也然此有才有德之士原由朝廷數十百年之培植而成盈廷師濟所以志美於書棫朴菁莪所以興歌於雅國家於朝覲之臣則賔而禮之於草茅之士則賔而興之是以旗章衮舄錫之以禮者敷湛露之深恩而修其方物以其介圭用以對越天威焉則燕笑譽處之餘煌煌乎觀愷樂之龍光也且承筐鼓瑟宴之以樂者舉鹿鳴之盛典而進於司徒升於司馬用以委贄彤庭焉則書思對命之際奕奕乎觀令德之休光也用賔于王者其利如是上下交而其志同䇿力獻而其政舉大觀之主在上豈獨六四一爻之幸乎詩曰鳳凰鳴矣于彼髙岡梧桐生矣于彼朝陽菶菶萋萋雍雍喈喈惟有菶萋之嘉䕃而因以致雍喈之和鳴則四之觀光而得與於賔禮也究由五之中正足以為觀於上而令下觀而化耳周易觀乎人文以化成天下編修臣竇光鼐臣謹按賁之彖辭曰文明以止人文也朱子本義曰以卦德言之止謂各得其分吕溫曰文者言錯綜庶績藻繪人情如成文焉以致其理然則易所謂文猶曰萬物各得其理云爾何以明其然也人之生也離居不相待則窮羣而無分則爭二者天下之大患也是故君臣父子之間兄弟夫婦之際文之所由起也君君臣臣父父子子兄兄弟弟夫夫婦婦文之所由成也若然則文在天下亦人自為正之具耳而曰觀乎人文以化成天下何也道率於性而修於教也荀卿曰聖也者盡倫者也王也者盡制者也古之聖王觀乎人之有君臣而明其朝覲燕饗以止於義也觀乎人之有父子而明其寢膳問省以止於親也觀乎人之有兄弟而明其奉几執醬以止於序也觀乎人之有夫婦而明其親迎合卺以止於别也以為是足以厭天下之心而觀吾化之成矣既而猶慮其未足以厭天下之心而觀吾化之成也則又為之雕琢刻鏤黼黻文章以飾其目為之疏房檖􅀈越席牀第以飾其體為之鐘鼓管磬羽籥干戚以飾其樂為之寢兕持虎蛟韅彌龍以飾其威為之籩豆樽俎毛炮胾羮以飾其愛敬之情為之賔主介紹筐篚玉帛以飾其交會之節使天下之人得其養而好其别安其身而深思其意至於步驟馳騁方皇周浹鼓舞之而不倦日用之而不知也故曰欲觀聖王之跡則於其粲然者矣蘇轍曰歷觀唐虞至於商周未嘗一日而不趨於文也由今考之明俊德親九族平章百姓協和萬邦陶唐氏之文也徽五典敘百揆賔四門命九官有虞氏之文也六府孔修庶土交正祇台德先不距朕行夏后氏之文也率民事神先罰後賞商之文也尊禮尚施賞罰用爵列周之文也孔子曰周監於二代郁郁乎文哉蓋亦以為王道之盛其文理當極於是焉耳至於後世文久而息節奏久而絶而議者乃以為用文之弊夫使古聖王而不用文也則萬物之不得其理久矣且以賁卦論之六五為賁之主以敦本而終吉上九居賁之極以返本而無咎此乃所謂文明以止之人文也後人不思飾質以為文而滅質以為文至或盛威儀以求至理騖繁縟而待太平及其用之不效而乃歸過於文不亦惑乎易曰物不可以茍合故受之以賁致飾然後亨則盡矣故受之以剝真善言文者哉周易觀乎人文以化成天下編修臣錢琦臣謹按一代之文章一代之氣運為之亦一代之學問主之也虞夏之書渾渾商書灝灝周書噩噩唯時際其盛亦德極其隆故文遂炳炳麟麟自詞采日熾道義始蝕華藻勝而理義之㫖微蕪陋滋而爾雅之辭鮮此匪獨文章之病抑亦世道人心之懼也易之賁曰觀乎人文以化成天下蓋言風氣之所成皆教化之所致然則所以障學海之狂瀾作世教之砥柱者不可不講矣臣總其略大約人文之弊易犯者六而所以化成之者其要亦有六一則艷詞逞辨窮極瑰麗托拾以快聰明典而不確尋討以矜淵博麗而不經是為夸一則抉隱宗元過為詭誕競今擯古旁引不經如李長吉之嘔心揚子雲之集字是為怪一則鑽研蠧穴墨守園蕪穢而不切於情拘牽而不達於事土羮塵飯糟粕唾餘是為腐一則纎佻乏骨塗澤無神但求屬對之工不嫌傅會彌竭琢鏤之巧終失大方是為鑿一則瘠義肥辭繁雜失統連篇纍幅神氣不聯未免支離或致重復是為冗一則心孤情懼貌瘁神傷辭不克以達心興殊落落才不足以稱體幅亦寥寥是為枯夫言以旌心文原載道經史之㫖薈萃百家孔孟之書包涵萬象不必别求竒也是故貴正本也夫本固則葉盛源逺則流長古之作者胸羅星斗笥富縹緗以故濡毫則珠璣並集著紙亦風雨爭飛非枵腹所能辦也是故貴儲學也夫井蛙不可語海拘於墟也夏蟲不可語氷篤於時也學者少所見則多所怪矣上下千年縱橫萬里而後著書匪自成一家之言立說非强作解事之論也是故貴廣識也夫水畜則盛火宿則壯風積則厚氣飬則充沛若江河之决屈曲皆流響如宫羽之調短長悉協非一朝一夕之故也是故貴養氣也乃若議論之詞不可施於紀事草野之語不可上於明堂非明辨以晳是猶慕規之圓而規圭之方既無當於體裁泥古之言而違時之制必有乖於事理是故貴辨體也至若食古宜化下筆有神奧義可以自抒心裁務期獨出不然僅工獺祭或見嗤於優孟之衣冠即解蟲鐫且有類於東施之顰笑是故貴神解也夫本正則俗說不淆學博則考證有據識廣則無固陋之失氣充則無淺薄之虞文有體裁則靡巧之弊革學能神解則模擬之習除由是離離蔚蔚矞矞皇皇人文日盛氣運日隆直與唐虞三代比美矣夫非在上者有以化成之奚以臻此此則聖人用賁之道與周易觀乎人文以化成天下監察御史臣王顯緒臣謹按賁之為卦離下艮上離本卦彖辭曰重明以麗乎正乃化成天下艮本卦彖辭曰動靜不失其時其道光明是離自離而艮自艮也至賁以離處於下火之性炎上而莫遏艮居於上山之體峙立而不遷約離於艮而光輝愈見凝聚飾艮於離而行藏悉寓中庸離得至善其明不流於浮艮得至明所止不囿於陋甚矣賁道之大也其文之在人不可取而觀乎夫天下一人文之區也舉凡倫常之大綱紀之繁以及禮樂文章之細懸之象魏之際而無所易達之山海之遙而無所違聲溢八荒光被四表歷古聖帝明王所以張弛損益者治美當時功垂後世人文之盛亦各成其化矣而孰不由賁之文明以止者致之哉是故觀賁之明以經綸天下而典禮敦庸皆煥然不容掩觀賁之止以節文天下而等威度數皆確然不可越典禮敦庸之所布天下漸被於熙熙皥皥之風等威度數之所齊天下甄陶於蕩蕩平平之治則化成於恩明誼美者賁之離明之德之所致化成於道一風同者賁之艮止之德之所致也在王者乘時出治且未有不法天者天文人文一而二二而一天文之溫肅寒暑日風雷雨其各有節次者與人文之各有條理無以異其各有氣候者與人文之各有分量無以異王者之化動與天文相合即極之日月合璧五星聯珠卿雲見甘露降又未始不可以人文化成為感召孔氏穎達曰文明離也以止艮也胡氏允曰粲然有禮以相接者文之明也截然有分以相守者文之止也何氏楷曰一文之一止之而文成此三說小有異同其於離德明艮德止合明與止以成人文之化者則皆發明精切程傳曰人文人理之倫序觀人文以教化天下天下成其禮俗乃聖人用賁之道也是賁之為賁既為聖人推化之則復為聖人興化之驗賁之所成詎不大乎哉周易上九碩果不食君子得輿監察御史臣沈懋華王弼曰處卦之終獨全不落故果至於碩而不見食也厚齊馮氏曰陽為大故稱碩果臣謹按碩大也不食者不可得而食之也道大而莫能容材大而難為用斯不食之義與東漢中申屠蟠絶迹芒碭之間因樹為屋自同傭人袁閎纍徵不應土室潛身十有八年兩人可謂不食者已匪特此也郭林宗操人倫之鑒初以有道徵不起逮其沒也自華隂函谷關以西河內湯隂以北二千里負笈荷擔彌路柴車葦裝塞塗蓋有萬數來赴殆所稱君子德輿者耶若夫張儉之為黨魁也始列八及之首既以鄉人朱並希中常侍侯覽意告儉與同鄉二十四人别相署號共為部黨則儉又列八俊之首及夫刋章捕牒亡命所至連染殆數百家莫不重其名行破家相容此亦得輿之象矣黨事解不應徵辟建安初年八十餘當塗之勢已成起為衛尉不得已乃闔門懸車不豫世事當是時也無論侯覽朱並諸人腐骨已朽即元禮孟博名在天壤而昔日之蕩為洪波鼓為烈焰者俱已銷歸何有儉於兹時已非復黨人面目回視向之刻石立墠與小夫刑人爭一日之命者不足當一吷巳蓋漢魏之交巋然一老天殆留此碩果以終東漢節義之局其斯以為張儉耳矣蠱之上九曰不事王侯髙尚其事亦取象於艮止之義然武王興周光武復漢上九一爻乃伯夷嚴光之所有事也又非張儉諸人之所敢望也夫周易反復其道七日來復利有攸往監察御史臣沈懋華節齊蔡氏曰陽自建午之月漸消漸剝至建子之月而為復在卦經七爻於時經七月故曰七日來復鄭氏剛中曰七者陽數日為陽故於陽長言日八者隂數月為隂臨剛長以隂為戒故言月臣謹按先儒解此卦皆云五月一隂生至十一月一陽生凡七月不言月欲見陽長須速故變文言日程朱說易皆然獨鄭注則曰陽氣始剝盡至來復時凡七日王輔嗣宗之曰剝盡至來復經七日也若從五月言之何得云始盡乎鄭注本於易緯稽覽圖言卦氣起中孚離坎震兌各主一方其餘六十卦一爻主一日每卦得六日七分從剝卦陽氣之盡至復卦陽來中隔坤之一卦六日七分輔嗣舉成數言故云凡經七日也康成以緯亂經其說謬悠而不可為訓輔嗣宗之非矣夫七日者猶言七變也云爾以卦數之則自姤而遁而否而觀而剝而坤而復為七卦以爻數之則自姤之一隂遁之二隂否之三隂觀之四隂剝之五隂坤之六隂至復之一陽為七爻以月數之則自五月建午六月建未七月建申八月建酉九月建戌十月建亥至十一月建子為七月皆經七次變更陽氣始復變月言日亦如豳詩所謂一之日二之日也云爾聖人於臨卦則曰至於八月陽消而數月者幸其消之遲也所以抑隂也於復卦則曰七日來復陽長而數日者喜其長之速也所以扶陽也然則七日來復當自姤數而不當自剝數也明矣康成之說何據乎抑又論之經多言日罕言月復言日而姤不言月則姤之為月可知詩云一之日日者月也不稱月者嫌於無陽也復則亟言日以主乎月猶坤之上六稱龍也重陽而輕隂不稱月而稱日其義如此周易七日來復天行也利有攸往剛長也復其見天地之心乎編修臣朱佩蓮臣謹按卦內震外坤一陽始生於五隂之下與姤卦相反復姤卦一隂生遞生而上為遁為否為觀為剝為坤窮乎上而反乎下歷七爻而一陽旋復故為七日來復夫姤卦五月也復卦十一月也相去七月諸儒遂有以七日為七月者抑思臨卦言八月復卦言七日義各有當豈得援豳風一之日二之日謂可變月言日耶孔頴達疏亦以七日言但引易緯六日七分配一卦之說以為剝卦陽氣盡於九月之末十月純坤用事隔坤卦六日七分而復卦陽來則又未免牽合臣愚以為歷春夏秋冬而成一嵗歷晦朔弦望而成一月晦朔消息也弦望虛盈也消息盈虛天行也自朔而上弦自上弦而望自既望而下弦自下弦而晦大約積七日而一變故三月者一嵗小變之節七日者一月小變之候人性本善逺而三月不違乎仁近而七日來復乎仁天人相應之節候也且易亦尚有言七日者矣婦喪其茀勿逐七日得固明言七日即蠱之先甲三日為辛後甲三日為丁自辛至丁凡七日巽之先庚三日為丁後庚三日為癸自丁至癸凡七日無初有終終則有始無在非七日來復之義利有攸往者剛德方長自下而上為臨為泰為大壯為夬為乾君子道長往無不利故利有攸往也復以初爻為卦主不逺復即七日來復無祗悔元吉即利有攸往不已互相發明哉咸恆大壯皆言天地之情復獨言天地之心天地之心以靜而息以動而生一動一靜互為其根先儒皆主靜唯伊川主動其實聖人有見於剝反為復動含靜中雖未生而已有生物之心所謂仁也動不離靜故能生生不已人身一小天地也在一嵗則子月為復在一日則子時為復子月冬至之時閉關安靜君子所以齊戒掩身以待隂陽之所定也子時平旦之氣好惡清明君子所以滋息培養常存仁義之良心也湯王昧爽丕顯成王基命宥密皆得此意我皇上講易見天心默喻乎天命流行之始造化發育之初生生不已自有與天心相印者非臣管窺所能見及也周易復其見天地之心乎編修臣吳兆雯朱子本義積隂之下一陽復生天地生物之心幾於滅息而至此乃復可見在人則為靜極而動惡極而善本心幾息而復見之端也吳曰慎曰天地以生物為心所謂仁也復之一陽初動仁也臣謹按天下有並立之名而無相悖之理隂陽其大者也陽生物而隂佐之陽之理鬯而隂之理益以全非形於兩者之不悖惟貞於一者之最神也不二之謂一不變之謂貞運而莫測之謂神若徒見其春夏長育秋冬剝落遂謂隂陽相耦各為盛衰一氣之中自為隔絶則陽之復又於何為其槖籥耶儒者推明盈虛消長之義有謂不翕聚則不發散不肅殺則不長養究之聚散殺養非二心也使有二心則天地萬物相悖相害心之不仁也滋甚抑何以昭然藹然共見於天地之間乎惟從至一者求之造化茫茫也樞紐存焉庶彚藝藝也根柢藏焉先天後天自為終始者祇此心耳元氣轉運略無停待生生不息充滿布濩陽之退即隂之生非陽外有隂也隂之盛正陽之蓄非隂見而陽絶也設陽外别有所謂隂必且錮閉衰落如槁木然此心寄於何所耶蓋天地之於物獨陽不生獨隂不成春而發育陽之施也天地之心之好也夏而長養變化陽之極也天地之心之憂也既蓄其好生之具又厪其匱乏之憂天地安得不剝又安得不復復者仁也剝亦仁也所以云見也但人所見者為陽之陽所不見者為陽之隂而天地之心原無斷續故陽自見隂亦自見也彼雷之能奮蟲之能蠕鳥之能鳴至冬至而雷蟄矣蟲墐矣鳥伏矣如謂無雷無蟲無鳥也則後之砰訇者䖶蚑者嚶鳴者伊何物耶得天地之氣者猶然况綿綿若存為天地根者乎且天地之心猶人心也人心寂然不動感而遂通寂然者隂象也奈何云通惟其舉天地萬物實有之理斂而為寂故湛然不動中觸之輒應未感非本無既感非始有動而能詘靜而善因均是心也至此則愈可見耳見於其所可見而天地之心在見於其所不可見而天地之心亦在也第復則見之不復何從而見哉且夫復亦難言矣隂之極也龍斯戰焉然未有不戰而能復者戰非勝人也自勝焉耳克己復禮自勝之道也天下歸仁心始見也於天地又何疑焉信乎貞於一者之最神非形於兩者之不悖惟復故一惟一故見舉凡摩蕩絪緼於生生之際者惟聖人為能通乎盈虛消長之大原也周易復其見天地之心乎編修臣儲麟趾臣謹按乾之彖曰乾元統天坤之彖曰坤元承天元之為義於德為仁於時為春元大也始也一元大始而四時樞紐以為消息庶彚根柢以為生成是天地固無心以成化而亦若有心焉可約略而見者此復之為卦所以有復見天地之心之說也易上下經六十四卦盡於乾坤姤復而四卦又以復為之主復卦又以初爻為主姤者坤之始也復者乾之始也聖人於陽氣根荄之初特重言之曰天地之心蓋以其主宰謂之帝以其不測謂之神以其性情謂之乾以其形氣謂之天天包乎地天以大生地以廣生此即其生生之意云爾夫剝盡為坤而十月謂之陽月陽無可盡之理方剝於上已胚胎於下積之一月而一陽之體始成故稱復焉坤變為震震非乾也而得乾之初爻一陽動於五隂之下以順上行嗣是為臨為泰天地交而上下通皆於是乎始聖人貴陽故於其始而曰此天地之心誠以陽者萬物之所從生而一者萬物之所從始也元統四德而常存春貫四時而常在證之邵子天根月窟閒來往三十六宫都是春之說不益信乎蓋所謂復者在子之半推之也邵子又曰冬至子之半天心無改移惟其無改移故灼然可見爾六陽盡而一隂生為天風姤為夏至六隂盡而一陽生為地雷復為冬至姤復循環無端而元酒方淡太音正希之喻其尤可推驗者也即如律管隔八相生以黃鍾生林鍾為律取妻以林鍾生太蔟為吕生子推之他律旋相為宫生生不已此月律黃鍾所以獨為萬事之根本也故曰動靜無端隂陽無始一日如是千嵗如是所謂天心無改移之說尤可信矣若夫復之與姤一也聖人於陽則內之故謂之復復反也剛德方長而幸其有日進之勢焉於隂則外之故謂之姤姤遇也本非所望而猝然值之之謂也此又可見天地之心任陽而不任隂乾元坤元總一生生不息之意充周於六十四卦之中而體乾之聖人遵扶陽抑隂之義內君子而外小人養其幾希之萌防其消長之漸其又烏容己乎哉周易復其見天地之心乎檢討臣萬松齡臣謹按六十四卦彖傳多言天地之情而復獨言天地之心王輔嗣云復者反本之謂蓋子為十二支之首黃鍾為萬事根本大化無窮皆權輿於此其說固為至善而其謂天地以本為心雷息地中乃天地之心見且謂動息則靜靜非對動者也孔疏因釋之曰天地之動靜為其本動為其末暫時而動止息則歸於靜是其說専重於靜而先儒多主之以靜為見天地之心然復之為卦內震外坤初九一爻為卦之主陽動於下而以順上行隂翳消陽和默轉天地生生之機正在於動且彖傳曰剛反曰剛長是復之為卦正以陽氣始生而得名也而乃以寂然至無為復不與卦體有未合乎夫天地無心以生物為心朱子本義云積隂之下一陽復生天地生物之心幾息而至此乃復可見此天命流行之初造化發育之始邵子所謂天心無改移正在於此而程子謂動之端乃天地之心非體道之深不足與乎此也蓋天以動為體地以靜為體地統於天故靜不能該動天包乎地故動常足以該靜而乾元坤元實統亨利貞三德故當其靜也生理中涵太和保合此時生物之心未嘗無而兆隱於不可見及其動也聲希味淡陽回子半生物之心亦非至是而後有而幾動於有可窺過此以往則資始者漸以流形資生者日以光大則觀察化源者直以為見其情之顯露而不曰見其心矣推而言之天地有復人心亦有復分而言之衆人有復賢人有復聖人亦有復衆人之心復於善賢人之心善不能無間而其復之也不逺焉惟聖人之心純亦不已無事於續若不可以復名然其一理渾然流行無滯至靜之中寓至動之象則亦如天之行健固無時非復也故靜則退藏於密寂然不動猶天地之隂與靜専靜翕者一矣動則圓神莫測感而遂通猶天地之陽與動直動闢者一矣而其由靜而之動則與貞元之交亥子之界相似而即可以見天地之心者見聖人之心抑又觀伏羲大圓圖乾上坤下實居子午之中復次於坤而在下蓋聖神功化之極未有不自下學立心始者而造化分於一中經綸起於心上易學之大所以為萬世聖人之心法也與周易剛健篤實輝光日新其德編修臣錢琦程子曰以卦之才德而言也乾體剛健艮體篤實人之才剛健篤實則所畜能大充實而有輝光畜之不已則其德日新也臣謹按天下無無本之學亦無蹴至之功自古聖賢所造或異要未有不自密其暗修而克漸底於粹精之域者書之頌堯也曰欽明文思安安而必曰克明峻德頌舜也曰重華協于帝而必曰濬哲文明溫恭允塞禹則文命敷于四海矣而臯陶曰慎厥身修思永湯則德日新矣而仲虺曰慎厥終惟其始亦可知學問之功積而愈有所以致其力者不可不精以専也大畜一卦內乾而外艮乾有天德之剛自有天行之健艮有成始成終之敦厚自有時止時行之光明彖曰大畜剛健篤實輝光日新其德其義可思矣今夫理欲之介非委靡所能决也知行之功非浮華所能盡也水畜則盛火宿則壯風積則厚故柔情巽志亦足自安而存理遏欲斷必持之以果確而後德可日進於無疆雄才大略亦足致用而去浮絶囂斷必出之以安敦而後德可日臻於光大襲取者外强而中乾浮慕者貌合而神失均于德無補也然則畜德之君子何如周易首乾以其卦德之剛健也其象曰天行健君子以自强不息則其所以畜之者亦體乾以存心而已矣夏有連山其卦首艮以其卦德之篤實輝光也其象曰敦艮之吉以厚終也則其所以畜之者亦體艮以制事而已矣體乾以存心則不屈於人欲不間於己私而我之所以自為者有主體艮以制事則不涉於浮游不淪於虛妄而我之所以履道者有方將英資之振厲既奮發於先而素履之敦慤復體驗於後如彼為山積久而髙矣如彼掘井歷久而深矣如彼琢玉磨礱久而瑕疵淨英華外發矣如彼樹木培植久而本根固枝葉日茂矣向之所有踰時而見為陳迹今之所得觸處而盡屬新機雖天道運行循環不息而進修無止機者亦積纍無止境所謂日新之謂盛德者此耳雖古堯舜禹湯之所以立極於千古者又豈有加於是也哉象之詞曰君子多識前言往行以畜其德蓋其所以用才者誠不可不審矣周易剛健篤實輝光日新其德監察御史臣周祖榮程子曰乾體剛健艮體篤實人之才剛健篤實則所畜能大充實而有輝光畜之不已則其德日新也鄭汝諧曰此藴畜之大者臣謹按盡性之學首在明德德賦於天為吾性之固有茍自修者薄則無以蘊之而德不明矣聖人觀乾以大始艮以厚終終始相推而大畜之義著焉蓋乾之德純乎天體而無所撓是其剛周乎天行而無所息是其健聖人法剛健以存心則道心伸而人心退聽此自彊之學所以植性之體也艮之德二隂內止而氣不囂是其篤實一陽外見而明不掩是其輝光聖人用篤實以修身涵輝光以應事則泰宇定而天光自發此安止之學所以達性之用也夫賦性之始其體未嘗不宏其用未嘗不裕然無學以繼之則人事之私於以勝理物情之僞於以淆真未免心體漸狹措事失宜畜既不大德何由新德既不新性何由復今自剛健以進於篤實自篤實以進於輝光則精進之深嵗時不息積纍之久新機自生如泉本清也有以濬之而其源益潔鑑本明也有以拭之而其光益瑩自其進而有得者言之則謂之新自其新而不已者言之則謂之日新蓋內外交養身心互用確乎其不拔暗然而日章盡性之功莫備於此豈非藴蓄之大者乎要之聖人之學初無二理夫子於乾卦文言嘗發進修之㫖而文王繫艮之彖於主靜立極之義尤為親切大畜之卦則兼乾艮而備焉蓋自下學立心之始以至達天知命之候古聖人所以致功者固有先後同揆者也如大學之云緝熙敬止中庸之云純亦不已篤恭不顯其亦與大畜彖傳之意有相為發明者與周易君子以多識前言往行以畜其德侍讀臣周玉章臣謹按易象小畜大畜俱以畜德言懿文德畜之小者也多識前言往行以畜其德畜之大者也文德者或指其一節之美或統舉其槩而規模小就有斐然成章之意若畜之大者體無不備用無不周固非専長薄殖之可語也然必多識前言往行者何也古之修德者曰存心養性曰遷善改過曰主敬存誠不可勝數而其理欲辨晰之介與工夫從入之門先聖先賢垂之明訓以昭示來學且身體力行各有明效大驗此前言往行所以炳若日星也詩言先民是程大猷是經書言學于古訓乃有獲朱子曰要妙精微各有攸當惟古之聖人為能盡之其所言所行無不可為天下後世法又曰以聖賢之學觀聖賢之書人以私意自去求理去聖賢之心尚逺然則欲畜其德而不取資於前言往行是却行而求及前人也而識之又貴其多者性安執復之不一經權常變之各殊觀其會而可得其通百其慮而仍一其致言之理無或遺而源流洞徹行之理無或遺而同異互參於以疏濬其靈明而擴充其詣力使吾德不致有偏而不舉與雜而不醇之處則其為畜也大矣曾子曰尊其所聞則髙明行其所知則光大所聞所知詎有外於前言往行哉尊之行之又非特博聞强識而已蓋薈萃古聖賢之言行審端擇術設誠而致行之以馴致於髙明光大之域而德之畜也何如乎若夫天在山中無其事且無其理特取卦象以極言畜之大耳至多識以畜德則固學問切要之功上自聖帝明王以及修身砥行之士皆當從事於此者也周易天地養萬物聖人養賢以及萬民編修臣喻煒臣謹按頤之義取乎養非苐養其一身巳也天地以無心而成化帝王以得人而奏功咸本此至公無私者旁敷下逮而民與物胥托命焉固有合三才而一致者矣夫自兩儀定位覆載攸司物之負隂抱陽者萬有不齊豈物之克自為養哉風雷動散六子效能寒暑往來五氣順布莫非為天地彰其化育之施所以在天成象在地成形剛柔安其性而靈蠢殊其施也本天親上本地親下洪纎隨其質而髙下適其宜也資始資生不言而美利溥天地萬物之功夫亦何所不至與雖然天地設位而聖人成能故天地之大人猶有憾而聖人之德加於四海要其夙夜圖維所為念兹不置者莫如養賢為先夫聖人在上三綱正九疇敘五禮修六樂備郊焉而格廟焉而享固已百姓太和萬物咸若矣而必亟亟於養賢者其意果何為耶誠以四海至廣也兆姓至衆也博施則力有所窮獨施則惠有未遍非得賢以共理雖復焦心勞思終不足語於光天之治且夫崇效卑法王者之所以奉若不違也溫肅分其候而仁育義正之兼施燥濕異其宜而辨物居方之各得天地之養萬物實賴有為之承流而宣化者賢之於聖何以異是况賢者匡居圖度其於康濟小民之計無不預籌惟待之以誠推之以澤量才度德而畀以治民之任則賢之大者自能調燮經理以亮天工賢之小者亦能分猷服采以熙庶績將見其於民也養其身尤及其心而授田制産之有法重農積粟之有規建學明倫型仁講讓斯出作入息莫不擊壤歌衢咸拜君王之賜也觀之書曰野無遺賢萬邦咸寧詩曰藹藹王多吉人維天子命媚于庶人周禮大司徒以保息六養萬民可知古先帝王愛民之政不外簡俊乂以官之此其所以久安而長治也與後世庸碌者流居官竊祿才慚負乘而覆餗貽譏朝廷以恤百姓為心而施惠者不無中飽之慮百姓以望恩為念而請命者或有內壅之憂所養非賢欲其養及萬民也必無是事矣是以聖王在上慎修厥德本至公至明之識以招賢士並畜兼收隨才任使人以漸而用而出類之才則不以漸官以次而升而切要之職則不以次如是則事之所謂利民之所謂休將無所不舉事之所謂病民之所謂戚將無所不除蒸我髦士非即所以惠我嘉師也哉要之乾坤者萬物之父母聖其合德賢其秀也故聖為繼述之宗子而賢為佐理之家相惟聖人體天施地生之心擴民胞物與之量自有以挽氣化之愆而合撰於清寧九州之內六合之外一道而同風悉基諸此養賢之典特急其先務耳有平天下之責者誠能深悉乎頤之義而得養道之正則裁成輔相立賢無方而澤被蒼生矣周易聖人養賢以及萬民編修臣儲麟趾臣謹按聖人首出庶物必以天地之心為心天地以養萬物為心故聖人非徒以天下自養而必以養天下為急焉其以天下自養則王食萬方而不以為過也其以養天下為急則無一夫不被其澤而非勞也是豈必户授之衣而人賚之粟哉裁成天地之道輔相天地之宜以左右民順而施之有其序焉遍而普之無或遺焉蓋必至於參天地贊化育而後為養道之極功也易卦大有大畜鼎皆有養賢之義師益井皆有養民之義而頤卦則兼言之曰聖人養賢以及萬民善乎程明道之言曰聖人作養賢才與之共天位使之食天祿俾施澤於天下養賢正所以養萬民也夫生民之初黔首蚩蚩同於鳥獸雖有相生相養之道而不能自為謀也有聖人者作然後仰觀俯察網罟耒耜舟楫牛焉宫室烹飪之利次第以興焉而又恐山陬海徼羣聚州處不能以一人之耳目遍也為之選造以升之等威以辨之祿糈以優之期以導宣德化撫循衆庶俾湛恩汪􅐮無一民一物之流離失業而後即安焉是故有憂勞不倦之堯舜而後有己溺己饑之禹稷而後有日孜日贊之臯䕫此固財之所由以阜慍之所由以解而萬民之所由以熙熙而皥皥也雖然反而觀之賢者能佐治以養民不賢者即能罔上以病民聖人於此公聽並觀見賢焉則登而庸之見不賢焉仍復屏而斥之流放誅殛之條與命官分秩之典每並行而不相悖所以頤之為卦與噬嗑相為表裏頤口中虛九四一陽間於其中必齧之而後合先王治獄之道存焉然則聖人之仁育必繼之以義正而後全猶之天地之春生必濟之以秋殺而後備焉爾後世惟蕭何言養民致賢以圖天下意亦與此相類而大小不同公私頓異彼就蜀漢一隅言之此則以普天率土而為言也由蕭何之言可以知霸國之勝算由頤卦之彖辭可以識王道之大全意義差類而體用各殊固未可以同年而語也周易象曰水洊至習坎君子以常德行習教事監察御史臣周祖榮朱子曰治己治人皆必重習然後熟而安之程子曰德行當如水之有常教事當如水之洊習臣謹按水動機也進必以漸流而不息坎勞卦也象取重習義在克勤觀於內外皆坎得治己治人之道由內遞及於外者進之漸而有序也修己兼及於人者功之習而不已也夫足乎己者謂之德措諸躬者謂之行本德以為行體驗者有據矣而慮其或間也君子以常心注之平時敬義夾持能於人不及見處力爭絶續之交雖本體自覺惺然而日新又新檢身猶若不及則緝熙之學得矣而德者人所同具修德亦人有同心也聖賢成物之量原在成巳之中吾不能教人即是德行中有虧歉處是故本身以立教始而勞來匡直繼以輔翼其事詳矣又從而振德則功益密焉凡其無所或遺者皆其無所不習也此內外無間而適協乎水洊至之義者也又嘗思之六十四卦中皆言治己治人之法何獨於坎象而對舉其義乎竊謂坎卦中實中實者誠也誠則無息而成己成物之道一以貫之觀彖辭有孚心亨一語首重立誠則知聖人取象蓋本於此或謂常德行習教事為處險之方似猶執於一偏而未會乎立象之本㫖矣御覽經史講義卷五
