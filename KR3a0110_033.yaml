  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_033-1a, image: WYG0722/WYG0722-0189a.png}
body:
  text: 史魏文侯與羣臣飲酒樂而天雨命駕將適野左右曰今日飲酒樂天又雨君將安之文侯曰吾與虞人期獵雖樂豈可無一會期哉乃身往自罷之編修臣周煌文帝每朝郎從官上書疏未嘗不止輦受其言言不可用置之言可用采之未嘗不稱善監察御史臣胡定上登虎圈問上林尉禽獸簿十餘問尉左右視盡不能對虎圈嗇夫從旁代尉對上所問禽獸簿甚悉欲以觀其能口對響應無窮者文帝曰吏不當如是耶尉亡賴詔釋之拜嗇夫為上林令釋之前曰陛下以絳侯周勃何如人也上曰長者又復問東陽侯張相如何如人也上復曰長者釋之曰夫絳侯東陽侯稱為長者兩人言事曽不能出口豈效此嗇夫喋喋利口捷給哉且秦以任刀筆之吏爭以亟疾苛察相髙其敝徒文具亡惻隱之實故不聞其過陵夷至於二世天下土崩今陛下以嗇夫口辨而超遷之臣恐天下隨風靡爭口辨亡其實且上之化下疾於景響舉錯不可不察也文帝曰善乃止不拜嗇夫修撰臣莊有恭漢文帝前三年上行出中渭橋有一人從橋下走乘輿馬驚捕屬廷尉張釋之奏以此人犯蹕當罰金上怒曰此人親驚吾馬馬賴和柔令他馬固不敗傷我乎而廷尉乃當之罰金釋之曰法者天子所與天下公共也今法如是更重之是法不信於民也且方其時上使使誅之則已今已下廷尉廷尉天下之平也一傾天下用法皆為之輕重民安所措其手足上曰廷尉當是也其後有盜髙廟坐前玉環得下廷尉釋之奏當棄市上大怒曰人無道盜先帝器吾欲致之族而君以法奏之非吾所以共承杜稷宗廟意也釋之免冠頓首謝曰法如是足也今盜宗廟器而族之假令愚民取長陵一抔土陛下且何以加其法乎帝乃白太后許之唐太宗貞觀元年上以選人多詐冒資蔭敕令自首不首者死未幾有詐冒事覺者上欲殺之戴胄奏據法應流上怒曰卿欲守法而使朕失信乎對曰敕者出於一時之喜怒法者國家所以布大信於天下也陛下忿選人之多詐故欲殺之既而知其不可復斷之以法此乃忍小忿而存大信也上曰卿能執法朕復何憂監察御史臣王興吾錯言於漢文帝曰聖王在上而民不凍飢非能耕而食之織而衣之也為開其資財之道也故堯禹有九年之水湯有七年之旱而國無捐瘠者以蓄積多而備先具也監察御史臣徐以升文帝嘗欲作露臺召匠計之直百金上曰百金中人十家之産也何以臺為檢討臣齊召南董仲舒曰天道之大者在隂陽陽為德隂為刑刑主殺而德主生是故陽常居大夏而以生育長養為事隂常居大冬而積於空虛不用之處以此見天之任德不任刑也天使陽出布施於上而主嵗功使隂入伏於下而時出佐陽陽不得隂之助亦不能獨成嵗終陽以成嵗為名此天意也王者承天意以從事故任德教而不任刑刑者不可任以治世猶隂之不可任以成嵗也為政而任刑不順於天故先王莫之肯為也監察御史臣宫煥文武帝問申公治亂之事申公對曰為治者不在多言顧力行何如耳檢討臣齊召南上曰古有社稷之臣至如汲黯近之矣編修臣王會汾元光元年令郡國舉孝亷少詹事臣西成宣帝拜刺史守相輒親引問觀其所由退而考察所行以質其言有名實不相應必知其所以然常稱曰庶民所以安其田里而無歎息愁恨之心者政平訟理也與我共此者其惟良二千石乎以為太守吏民之本數變易則下不安民知其將久不可欺罔乃服從其教化故二千石有治理效輒以璽書勉厲增秩賜金或爵至關內侯公卿缺則選諸所表以次用之是以漢世循吏於是為盛稱中興焉修撰臣金德瑛漢宣帝嘗稱曰庶民所以安其田里而無歎息愁恨之心者政平訟理也與我共此者其惟良二千石乎監察御史臣陶正靖春三月賜膠東相王成爵關內侯監察御史臣孫灝孔子曰道之以政齊之以刑民免而無恥道之以德齊之以禮有恥且格信哉是言也法令者治之具而非制治清濁之源也昔天下之網嘗密矣然姦偽萌起其極也上下相遁至於不振當是之時吏治若救火揚沸非武健嚴酷惡能勝其任而愈快乎言道德者溺其職矣漢興破觚而為圜斫雕而為朴網漏於吞舟之魚而吏治蒸蒸不至於姦黎民艾安由是觀之在彼不在此右贊善臣李文鋭卓荗為密令視民如子舉善而教吏民親愛不忍欺之數年教化大行道不拾遺遷京郡丞密人老少皆涕泣隨送及王莽居攝以病免歸上即位先訪求荗時年七十餘詔曰夫名冠天下當受天下重賞今以茂為太傅封褒德侯編修臣杭世駿律設大法禮順人情編修臣吳嗣富
