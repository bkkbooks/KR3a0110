body:
  text: 周易泰小往大來吉亨監察御史臣張孝挰程傳小謂陰大謂陽往往之於外也來來之於內也陽氣下降陰氣上交也陰陽和暢則萬物生遂天地之泰也以人事言之大則君上小則臣下君推誠以任下臣盡誠以事君上下之志通朝廷之泰也陽為君子陰為小人君子來處於內小人往處於外是君子得位小人在下天下之泰也泰之道吉而且亨也臣謹按道有升降時有汙隆古今來治亂廢興循環無窮一若寒暑書夜之推遷莫之能改非獨氣數使然蓋亦其理有一定也夫泰以陰居於外陽居於內君子得位小人在下為吉亨然陽一陰二陰多於陽自古以來君子常少而小人常多是以亂日常多而治日常少然則君子處世而值陰陽和會衆俊彚征之時蓋極不易得可不戒哉周書曰制治於未亂保邦於未危泰九三曰無平不陂無往不復艱貞無咎夫曰未亂則是治時未危則是安時然曰未亂則固有亂之可慮曰未危則是有危之可憂平陂往復造化之機有自然而至者此憂勤惕厲持盈保泰之心所以兢兢業業君臣交警而不敢刻斁也艱貞無咎當泰之時何艱之有而處泰之道則必艱危其思慮正固其施為而庶幾於無咎焉夫是以動一念則惟恐有幾微之不合於道而開侈肆之端也行一事則惟恐有一毫之不合於天心一端之不慊於民志而致悔吝之萌也推而至於一舉一動一嚬一笑無不凛冰淵於夙夜嚴對越於神明而不敢有絲毫之或忽也朝乾夕惕一日百年持之以敬要之以久唐虞成周之隆古今稱至治者其道要不外於此已雖然治亂安危之機本於天而治於人者也君子道長為泰小人道長則為否矣小人道消為泰君子道消則為否矣消長之際禍福之本也依古以來史册所載何可勝道夫人情莫不好治安而惡危亂亦莫不喜君子而嫉小人然而君子多困厄小人多幸進者則以君子之道難合小人之道難知是以三代以後號稱小康者率多姦貞並立治亂參半耳若夫明鏡當空妍􅑦必照日月在上魑魅潛形君子小人之情狀既已洞見而周知則舉錯之間大公至正君子日進小人亦化而為君子朝廷清明海內樂業宇宙之氣蒸為太和小往大來之吉亨有垂之無極者矣周易泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外陰內健而外順內君子而外小人君子道長小人道消也少詹事臣許王猷孔頴達曰所以得名為泰者由天地氣交而生養萬物物得大通故云泰也上下交而其志同以人事象天地之交也內陽外陰據其象內健外順明其性此就卦爻釋小往大來吉亨也內君子而外小人君子道長小人道消更就人事之中釋小往大來吉亨也程子曰小往大來陰往而陽來也則是天地陰陽之氣相交而萬物得遂其通泰也在人則上下之情交通而其志意同也陽來居內陰往居外陽進而陰退也乾健在內坤順在外為內健而外順君子之道也君子在內小人在外是君子道長小人道消所以為泰也臣謹按易言上下交而其志同者即尚書一德一心之謂也然志同可以論君子而不可以概小人夫小人固斷斷乎宜外之者也邵子曰治世非無小人難乎為小人亂世非無君子難乎為君子惟在人君慎於用舍之間默以操其消長之權而已而所以慎用舍而操其消長之權者其道在乎明以辨之誠以待之蓋小人者其言辨其行堅其見聞之博足以出人之所不能其情貌之深足以欺人之所不測其智術之巧足以移人之所好而不悟其才藝之美足以行人之所難而不憚欲從而辨其孰君子孰小人也亦綦難矣臣嘗觀李德裕曰正人如松柏特立不倚小人如藤蘿非附他物不能自起張浚曰不私其身慨然以天下百姓為心此君子也謀求之計甚密而天下百姓之利害我不顧焉此小人也其言之剛正不撓無所阿曲此君子也詞氣柔佞切切然伺候人主之意於眉目顔色之間此小人也人君欲知君子小人之分於此兩言恭之亦可得其大概矣至於小人既去則在內者皆君子矣而上之所以待之者是不可以不誠倚以腹心任以股肱茍有益於國家勿以專行而疑其擅茍有利於民生勿以樹恩而罪其私我苐無猜忌之心則納其嘉謨而不嫌於屈參以獨斷而不病於乖我苐秉忠信之情則尊以祿位而天下共羡其寵榮即示以裁節而天下愈見其無間上以一心遇其下則下亦以一心報其上矣是知人之明既有以辨其君子小人之分而用舍悉當待下之誠復有以聨其君臣一體之誼而志意交孚此之謂內君子而外小人此之謂君子道長小人道消夫至君子道長而後可以稱上下交矣然臣以為人君誠於待臣必先誠於愛民蓋人臣受主之眷必將視其主之所寤寐思服者以求稱其意茍徒以赤心待其臣而無惻怛為民之意則臣之求報稱者亦惟主之所欲而不暇及于民生之大計故必上以實心為民然後以實心待臣使羣臣知上於為民之外别無他欲而人臣於為民之外亦别無可以報主則其志同矣其志同而後上下之交乃孚也彼虞廷有喜起之歌則舜治著時雍之化泰交之盛不千古為昭乎周易彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外陰內健而外順內君子而外小人君子道長小人道消也右贊善臣錢本誠臣謹按泰交之運開之者天地主之者人君保泰之道無他惟在辨夫君子與小人而已君子之心至公惟願天下之治安而不計身家之榮利小人之心至私惟圖身家之利害而不顧天下之安危推小人之私心則是天下人各異心也而上下安得而交世運之所以否也推君子之公心則是天下舉同一心也而上下安得而不交世運之所以泰也然而天之運也有陽必有陰人之生也有君子必有小人人主安能盡得君子而用之又安能悉舉小人而屏之惟於內外之間置之得其當而已內不盡秉鈞執成凡人主所敬信一德一心者是也外不必投間置散凡人主所驅䇿因材器使者是也蓋君子固有全備之德而小人亦非無傑出之材總使君子得以馭小人而小人不得以乘君子如是則得矣或謂小人不盡去必至與君子爭而小人常處必勝之勢臣以為此惟邪正混淆而雜處於內故有此患耳若使君子而在內則知明處當為小人者皆有以安其身而服其心方將奔走承順之不暇而又何爭勝之有且彼見小人之道不可行於時也亦自斂其姦偽刻薄之術而勉從忠厚正直之風如裴矩在唐太宗時則亦能直言以悟主王欽若在宋真宗時則亦能蠲賦以惠民彼雖小人而亦行君子之道故曰君子道長小人道消夫既能舍其道以從君子則亦君子也人主安得而棄之哉雖然不可以不戒也陰交乎陽陰之質自在小人交乎君子小人之性自存堯舜之世君明臣良而猶畏乎巧言令色孔壬蓋彼特自知巧令之習必不容於欽明濬哲之主故抑而不敢肆使誤以為君子而授以百揆四嶽之任則彼亦有進退君子之權而小人之故智復萌矣此保泰之所以不易而聖人兢兢乎懼之也周易彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外陰內健而外順內君子而外小人君子道長小人道消也監察御史臣陸尹耀邱氏富國曰天地之形不可交而以氣交氣交而物通者天地之泰也上下之分不可交而以心交心交而志同者人事之泰也陰陽以氣言健順以德言君子小人以類言內外釋往來之義陰陽健順君子小人釋小大之義臣謹按陰陽對待而分小大者陰不敢抗陽故謂陰為小陽為大也陰宜在外而六往居四陽宜在內而九來居三往來適得其宜而初無拂逆焉於時為貞元會合世道清明是謂之泰也占得此卦者陽德方亨陰柔退聽其於天運人事無不吉且亨矣此卦辭之義也由天運言之則天以職覆地以職載而化生萬物凡藝生庶類莫不各安其常咸若其性是天地之氣交也天與地以氣交而各得天地之氣以為氣者氣無不通焉由人事言之則君以主治臣以效能而宣布教化凡禮樂政刑莫不協於大中歸於至正是上下之心交也上與下以心交而各體上下之心以為心者心無不同焉泰運開自天地泰和起自君臣於以博觀小往大來之景象生生之氣彌綸充塞於宇宙之內而肅殺之意潛消蓋陽居於內而陰自在外矣剛毅之德自強不息於日用之間而柔懦之習不行蓋健主於內而順自在外矣君子不必盡升諸朝而有嚮用之機是即內君子矣小人不能盡削其迹而有疏遠之勢是即外小人矣君子在內以制小人小人在外以奉君子由是而福國利民之道日以寖長蠧國病民之道日以寢消安往而不吉且亨哉夫天地之交乃氣化之本是為一定者也而人事宜盡上能推誠以待下下能盡誠以事上以人事之泰克符乎天運之泰而君子秉道而立小人革面以從庶乎泰交之治可成而氣化相通固操諸一己者歟周易彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也給事中臣衛廷璞臣謹按傳釋泰小往大來吉亨之義而推之天地上下之交亦以坤往外卦乾來內卦一往一來有交之義而物以之通志以之同則有吉亨之意也然繫辭曰天尊地卑乾坤定矣卑高以陳貴賤位矣序卦傳曰有天地然後有萬物有君臣然後有上下是則天地上下其位固有截然甚相懸者乃竊嘗考之易有不易變易二義乾鑿度云變易者其氣也不易者其位也則小往大來似不言不易之文而言變易之義故云交也蓋盈天地間一氣耳氣有陰陽即有升降而非交則孤陰不生獨陽不長兩間閉塞萬物不通故卦之坤上者地氣上騰以交於天即所謂地道卑而上行也乾下者天氣下降以交於地即所謂天道下濟而光明也二氣相交絪縕化醇流行不滯而凡得之而成形者莫不資始資生各正保合聲應氣求於天地之內此萬物之所以通而為天地之泰也濂溪周子曰一動一靜互為其根互根非即天地交之義乎又曰二氣交感化生萬物萬物生生變化無窮非即萬物通之義乎若夫君之尊天也故乾為天為君皆從乎上之名臣地也故坤曰地道曰臣道皆從乎下之名上下之位若是其嚴明矣而亦曰交者何繫辭傳曰君子上交不諂下交不瀆大學曰與國人交止於信則略其位之異而言其志之同有何不可以言交者夫泰之時開泰者志於裁成輔相保泰者惕於往復平陂其感孚於夙夜默喻於隱微者莫不上感下應固結而不可解即使君可臣否外若不同而卒之為國為民之志可以共白於天下見諒於君心是不以隨聲附和為同而以大公無私為同其同也非即其交也耶今夫二帝之時上下之分非不嚴也三王之世上下之位非不肅也而或交警堂廉或賡歌廷陛或致三聘之勤或肖傅巖之求或切後車之載故其時上無不恤之臣下無不欽之主同寅協恭一心一德和氣盎然諸福備至天地以位萬物以育將見天地之泰且由人事之泰基之矣周易則是天地交而萬物通也上下交而其志同也編修臣賴翰顒臣謹按兩間生成之機統於造化而萬古經綸之本起於人心人徒見清寧之候景物咸熙郅隆之朝幾康就理以為氣化人事之適際其盛而不知健順勻調明良會合其感通之故殊非偶也今夫天地高卑異位也陰陽異氣也而且職覆職載之殊其權也使其判然而不交則號物之數有萬將何以神其發育哉惟夫乾一之氣下行於坤兩之中而資生之功上符乎資始之用由是絪縕化醇自勾萌而甲拆潔齊而相見形形色色莫非此靜專動直靜翕動闢者為之鼓蕩其機是天地形不交而氣交於物之通而見其泰也至若上下天澤之辨本於彛倫冠履之嚴行為典禮分之相隔甚懸絶矣情之所交則疇咨若采幾忘勢位論秀書升不拘形迹要其所以重汲引而隆交贊者惟厪民生於在念懋庶績於咸熙故揚拜賡歌固彰同德同心之雅即豫違汝弼亦見無二無疑之忱是大業崇為富有盛德畜於日新總此上下之志同者為之也所以泰也蓋天地上下理本相通而氣則一貫者也試觀升平聿啓景運鴻開沖和之氣鍾為靈秀聖繼出而賢篤生天地方為上下而隆其作合行若翼而思若啓上下且賴天地而神其志氣况乎元首明而股肱良雍穆之致無在不昭其響應故郊焉而天神降景慶且貢其休徵而何止於百昌之暢遂社焉而地祇出河嶽且為之效靈寧苐見庶類之咸亨是天地上下亦相交而為泰也泰之義固無窮哉釋經者取以配合為正月之卦誠見夫三才之道美善悉備而中和位育之景象從可識矣周易則是天地交而萬物通也上下交而其志同也監察御史臣富德臣謹按資始統天謂之乾乾君道也順承天施謂之坤坤臣道也乾坤合德謂之泰泰者運會休隆之象也故極兩間位育之徵顯仁必由於藏用千古明良之會大業亦本於盛德蓋在天在人無不交相契合則由體達用以成宇內之極功者道出同原理無二致也惟是天地者萬物之父母而化生萬物者也高明之體立於上博厚之體立於下當其日至之時氣機伊始聲臭無聞而大生廣生之德發微而不可見及其交而成泰也而天施地生之益自充周而不可窮是以天以一陽之氣交乎坤地以一陰之氣交乎乾由是雲以之行也雨以之施也品物以之咸亨也即極之昆蟲草木皆得見盛世之休祥蓋此日之氣化宇宙清寧庶類暢遂其德大其功盛也然交在天地則無心而成化而代天工以出治者則在上下之同志而成能也人君繼天立極神化之權操於上而致治保邦贊襄之功本於下所謂都俞吁咈一德一心足彰喜起之休風者亦惟其交而已矣獨是上下交會之際又各有其道矣自古為君難為臣不易聖帝明王之撫御天下也以聰明睿智之德致經綸參贊之功猶體道而不居見善如不及當其夙夜宥密心自強而不息萬幾所以待理也詣純粹而至精萬物所以待命也剛健中正而嗜欲悉蠲高深易簡所以合符也由是上有聖智之君下必有賢明之臣非徒事揚言拜手之儀文也蓋人臣之事君公正者其心無私者其學抒精誠吐情愫忠愛發於至性靖獻本於實心體此意以蒞官則竭力盡能而誠慤可以上達體此意以任事則嘉謨入告而志意可以上孚是以主聖臣良而元首之康股肱之佐交相契合而無間者一天道之變化而各正保合也其理豈有二哉觀之堯舜禹湯文武之君獲稷契臯陶伊尹呂望之臣明明在朝穆穆布列聚精會神相得益彰其即上下交之明驗也歟周易則是天地交而萬物通也上下交而其志同也監察御史臣馬丙伊川程子傳曰天地陰陽之氣相交而萬物得遂其通泰也在人則上下之情交通而其志意同也臣謹按天尊地卑而乾坤之位以定上天下澤而君臣之分以昭尊卑上下之間截然而不容紊也曷可以言交哉然天地之形不可交而以氣交上下之分不可交而以情交泰寧之象啓於造化成於人事自古迄今莫之或易焉爾泰之吉亨試先徵之天地今夫天地間號物有萬其藝然各得而有暢遂之機者物之通也適以形其泰也而要其所以為通者則必本於天地之交天處乎上地處乎下清寧之位豈容無辨哉然而天道下濟地道上行若或相交焉由是天地絪縕萬物化醇自甲拆以至勾萌自潔齊以至相見無一物不見其通焉此天地開一世之運以徵泰象者如此至於郅隆之運非徒氣化之豫順也朝廷之上更有一德之隆焉間嘗溯之唐虞考之三代見夫君都臣俞之世主聖臣良之朝上也略朝寧之威嚴下而與庶司卿尹講友生之誼下也忘草茅之疏賤上而與元后父母篤賔朋之好書思對命君樂羣賢之彚征訪範親師臣欣一人之有道一堂之精神不隔而內外之情形會而成豫順是亦天地之交也九閽之情意既通而草野之好惡亦得以上達是亦萬物之通也上下交而志同有足信者然後知氣數當成平之日天地固為君臣兆其休而氣運際熙盛之時君臣亦為天地大其化隂陽和而萬物以順明良盛而喜起以歌民安物阜適以徵太平之景象一德一心適以昭和恆之治理天人相濟以成其泰者不信而可徵也哉周易天地交而萬物通也上下交而其志同也監察御史臣周祖榮臣謹按天地者萬物之父母上下者天澤之等威有天地然後有萬物有君臣然後有上下其秩然而不可踰者分之殊也其藹然而不容間者理之一也惟其分之殊斯防維於以攸别惟其理之一斯氣誼於以相資自古以來天人迭為經緯以成世運而清寧之合令共之休固悠然其可想也夫天地列而乾坤以定卑高陳而貴賤以位兩大之所以立三才之所以成要皆相助為理而相得益彰故夫天地猶是也上下猶是也而至治之世清和雍睦俯仰皆寬莫不樂化日之舒而慶遭逢之盛此其所以為泰也泰以交而見而交之理實托始於天地大造和同貞元所以會合也健順有常絪縕所以化醇也自是而屯蒙闢矣自是而族類滋矣本乎天者親上本乎地者親下其間剛柔強弱不同於質靈蠢偏全不同於性溫涼寒燠不同於氣方圓巨細不同於形而當夫雲行雨施品物流形之際則固有一通而無不通者試觀金木水火土穀之繁以及動植飛潛變化之賾孰一非氣機之鼓舞哉天地如此而上下可知矣上下之統屬在勢位上下之聨合在精神患其異也所貴惟同然而同於貌不同於心同於欲不同於道同於比昵不同於寅恭皆不可以言同也此其間有志焉志同則情同情同則舉措施為無不同政教之頒猶其末焉者也堂廉之上不異家人父子而政教之本已立禮樂之設猶其外焉者也主臣之際直如元首股肱而禮樂之原已通蓋上下之交猶之天地之交也誠哉其為休明之象熙皥之風矣抑嘗思之天地上下之交有天運焉有人事焉天地交而上下從之此其主持在造化上下交而天地從之此其權衡在君相從來世運之升降固隨氣數為轉移而人力之匡扶能以中和為位育是故有同心之美則必有太和之應有一德之協則必有純佑之休有明良喜起之君臣則必有光華復旦之天地人定勝天此其理也雖然乾元資始坤道順承濬哲知人庶明勵翼天地之交由天之下於地上下之交由君之下於臣故曰天道下濟而光明地道卑而上行又曰自上下下其道大光義可思矣然則泰運之成蓋所繫尤在君德哉周易上下交而其志同也監察御史臣葛峻起臣謹按中天之世明良喜起賡歌一堂竊嘆當日君臣何以略分言情若此也及深考夫致治之由其時之平成在兩間修和在庶政歌敘在兆民而其所以相須有成者實原於明堂交警之一心乃知君勞於上臣勉於下用臻泰運之隆固有與造化同功者矣是可即泰彖所云小往大來者得其意焉夫自乾坤既定而卑高以陳貴賤以位上下者所以繼天地而成泰者也然而堂高廉遠等級分明在上者咫尺具見天威在下者毫髮不容自肆固未易厥孚交如而稱同心同德矣若乃忘勢分之懸殊而不啻家人父子置儀文之末節而引為元首股肱則載咏鹿鳴歡然嘉賔之相接式歌燕笑藹乎譽處之堪親上交不諂下交不瀆豈非泰之所由配天地乎且夫虎嘯而風生龍興而雲合所投者素也不遍窺望而視已明不殫傾耳而聽已聰所感者微也今者上下之間氣志之地有孚嘉而無暌隔有聨合而無乖離則臣也而鄰之皇心時通於百爾尊也而親之下情畢達於九重矣斯時也明明在朝穆穆布列聚精會神相得益章猗歟休哉非君臣一德烏能合志同道如此哉由是朝廷清而萬幾咸理羣枉黜而衆正日升於以感召天和嘉祥畢至竊謂卷阿何必矢其音天保不足揚其盛也要之泰階既平則保泰者當愈至上勿以日贊有人而忘宵旰之兢業下勿以主知有素而弛夙夜之靖共故為都為俞同也曰吁曰咈亦同也惟其然而明良喜起之風直嫓美於中天矣泰運之隆交釀於上下之間而即洋溢於天地之際夫豈易致者哉周易內君子而外小人君子道長小人道消也監察御史臣陳仁臣謹按君子小人之分自古辨之詳矣然能灼見其為君子小人而用舍不淆者蓋戞戞乎其難哉何者君子指小人為邪小人亦指君子為邪且有迹似君子而心實小人者有言似君子而行實小人者人主辨之亦在知其術而已夫薰蕕不同器而芳禾莠不同壠而茂二者其心不相入其勢亦不可以兩存蓋君子如蒼松古柏挺然獨立植之甚難去之甚易小人如藤蘿蔓草必多倚附不種而生除之復蕃故易以陽為君子以陰為小人凡陽必剛剛則不撓凡陰必柔柔則難測磊磊落落如青天白日無纎芥可疑者君子也閃倐狡獪如鬼蜮狐蠱不可方物者小人也不私其身而慨然以天下百姓為心者君子也但知利己而不顧君國之安危者小人也志在於行道進以禮而退以義者君子也志在於謀利利在而相親利盡而相戕者小人也莊言正論逆耳拂意徇國而不徇君者君子也委婉遜順切切然伺候上意於眉目顔色之間者小人也隱惡揚善惡訐以為直者君子也妬人之善幸人之惡掩其長而暴其短者小人也然而君子為國而國恆疏之小人病國而國恆親之何也忠義之士識高而見明慮遠而憂大世方無虞若可以少安矣而為痛哭流涕以發天下大難之端乘輿無甚失德猶可以為安也而盡言極諫甚者有幽厲桓靈之比百官效職亦無大姦邪未去也而深懼指鹿之禍發於朝夕嘉祥美瑞人主所罕見而奇焉者也則視以為不足信至於一日月之食一雨暘之愆則從而尤之曰此疵政之招也射獵巡幸歌舞之娛似未病於治則禁而抑之其在巖廊之上天子為之踧然而有所畏士大夫不敢安肆怠惰於其間雖未必遽就孤危而其日見陵替也決矣若姦臣則不然小忠小信既足以固結人主之心逢君長君又有以順適人主之意方其未得志也或以諂進或以利合或比周近習以起譽言或阿諛權要以博歡心卑猥鄙賤無所不至及其得君也彌縫左右愚弄上下使人主歡愛悅懌陰授以國而不知而公卿大夫庶司百職莫不奔走歸命爭為之腹心於是內外盤結而在盲之疾藥之不能達附咽之癭近而不可割也今夫君子者未有不公而恕者也小人者未有不私而刻者也昔蜀漢之興也葛蔣諸賢輻輳於朝同心戮力以扶王室而李平魏延之徒雜處其間雖寸功片能無弗録也雖小過微瑕無弗容也蓋君子存心仁厚必不肯以不肖待之即或彼縱欲敗度君子亦不過擯斥之而已未嘗絶其自新之路也而章惇之在宋也自知其負天下之怨而諸賢之莫吾赦也於是假紹述之名思有以報復之然斥其一而衆君子尚存猶未足以泄已之忿欲盡其類而君子謹身寡過無隙可乘惟是國之有黨最世主所大忌故須此説方可傾之而又恐其黜而復用也於是編管窮裔置之死地而後安雖然天下豈盡皆君子哉則亦豈盡皆小人哉使朝廷之上股肱心膂之寄得二三君子以任之上格君心下型百僚則小人者將為吾用之不暇又何姦之萌乎其究也亦莫不勉為君子矣且夫小人之才亦非不足用也特其心惴惴焉患其得復患其失故一切惟上意是奉而不遑為國忠謀其始本為固寵援引醜類表裏交煽而不覺養成禍胎然則用舍之際人主其可不慎歟夫賢臣進者治之表也邪臣進者亂之機也如使賢姦並立於交戟之內而世可長治則古之聖王亦何為以天下之大而不能容二三宵人哉雖知人則哲堯舜其難聽言觀行孔子所戒有天下者誠能清心寡欲兼聽並觀則邪正雖曰難辨而亦豈得而逃哉茍持不斷之意處賢於欲親欲疏之間而處邪於欲退欲不退之際則邪者常得以計勝而賢臣不得闡其忠天下不可一日為理是故人主又貴有以斷之周易天地交泰后以財成天地之道輔相天地之宜以左右民編修臣甄􅀈朱子曰財成以制其過輔相以補其不及臣謹按造化之與人事相為感通而斯民者生成於天地教養於元后者也天地仁愛之心初無須臾之偶息而時當其泰則陽氣方滋陽德方亨上行下濟物生尤盛卦之所謂小往大來也顧開泰者天地致泰者君臣君臣之間一心一德相與有成而其權悉操於元后蓋元后父天母地而子萬民故乘時以盡道而本道以宜時其精神所聚直貫乎元會運世之全而紀綱法度又足相維於不敝是泰之在天地者氣運尚有推遷而泰之在元后者固百年如一日也竊就財成輔相之説而廣其義焉蓋化之自然者曰道因其道而裁制之如明四時定八方垂五教也道之當然者曰宜因其宜而贊助之如四仲調而三農必辨疆里分而土宜必協綱常立而訓誡必周也此財成輔相之大經大法百王莫易者也而推其本詳其末人事多端要不外元后之一心耳蓋從來聖帝明王學問淵深篤恭不顯而旦明呼吸動與天地相流通至其以心而行政也本乎覆載無私之量而運以精明剛斷之德吏治何以澄清民風何以淳朴慶賞刑威蠲除興作之事何以有利無弊有得無失莫不以道體為權衡隨時宜而補救化其過不及之偏而一歸於大中至正焉則四海九州莫非被德之區而實無藏姦之藪由是善氣流行休徵協應天地太和而斯民受福於無窮矣漢儒董仲舒曰為人君者正一心以正朝廷正朝廷以正百官正百官以正萬民逺近四方無敢不出於正而無有邪氣姦其間者是以陰陽和而風雨時羣生遂而萬民殖此可見財成輔相之實而泰之所為吉亨者誠非無故也且夫泰者漸積而趨於盛亦極盛而戒其盈故泰之初爻幸賢類之同升泰之二爻見中行之可尚而後則於平陂往復之理申言示警焉人君體交泰之象深保泰之思進君子退小人扶陽抑陰以健馭順則主德清明百為振舉自足以贊化育參天地為生民立命為萬世垂休而泰運長新矣周易天地交泰后以財成天地之道輔相天地之宜以左右民編修臣曹經臣謹按善言治者莫不求其端於天天之道統於一元而為氣之始天之運首於一春而為時之始王者上奉天時下勤民事政教號令之施必始於正月皆所以本天而正天下云爾審是而易泰卦之象可取而釋也蓋天地交而陰陽和履端於始而分至啓閉之候以遞而推焉寒暑往來之序以漸而積焉月令云立春之日天子命布德和令行慶施惠下及兆民是天道運於上而時序昭人事興於下而聖化彰相應而至者也何以明其為財成也后體天地交泰之道凡畸乎陰陽者限於時數之偏而以政導之畸乎剛柔者阻於風土之異而以禮平之朱子所謂制其過者此也蔡氏淵云氣化流行分春夏秋冬之節地形廣邈分東西南北之限而財成之義從可識矣至於輔相者繼財成而有事者也朱子云輔相以補其不及程子云使民用天時因地利輔助化育之功成其豐美之利也如時運有溫肅當春而耕當秋而斂以及於蓋藏卒嵗之必謹地勢有高下燥者種黍濕者種稻以暨於瓜樗葵棗之咸周此則聖人之輔相也又曰以左右民者其道不外於財成輔相之大要而實本於我后欽若敬授之深衷蓋天地以生物為心聖人即以天地之心為心家為富之人為夀之此治之布於大經大法者也兢業持之時幾敕之此德之裕於不覩不聞者也天道行而萬物順聖德修而萬民化其道不有同揆者乎由卦象而推之乾陽也君道也坤陰也臣道也象獨言后而略於臣者君為臣綱猶陽之可以統陰也聖人首出於上奉若天道膏澤頻敷猶警無逸下而公卿大夫以及百執事當勵夙夜在公之勤敬君之事即以代天之工共保乎豐亨豫大之治則載賡明良者即占協乎泰交也而治法隆矣周易天地交泰后以財成天地之道輔相天地之宜以左古民檢討臣韓彥曽蔡淵曰氣化流行儱侗相續聖人為之裁制以分春夏秋冬之節地形廣邈經緯交錯聖人為之裁制以分東西南北之限此財成天地之道也春生秋肅此時運之自然高黍下稻亦地勢之所宜聖人則輔相之使當春而耕當秋而斂高者種黍下者種稻此輔相天地之宜也臣謹按乾稱父坤稱母人君父天母地而子萬民故詩云樂只君子民之父母書曰元后作民父母凡以天地之化育不能無過不及之處賴聖人維持補救於其間為之範圍不過曲成不遺參天地而贊化育俾斯民相生相養於天地之中而實相生相養於聖人一心之中蓋世運之方隆天地先聖人而開其始治功之獨盛聖人後天地而成其能是以為天地之宗子克勝父母斯民之任而有餘也夫天地不外陰與陽而已一陽生而為復復者天地之心而非天地之交一陰生而為姤姤者天地之遇而非天地之交惟三陽下濟而天交乎地三陰上行而地交乎天斯為天地之交而泰於是乎啓矣泰者通也天地交而二氣通正月之卦也此天氣下降地氣上騰天地和同草木萌動月令所記所以屬之孟春也人君效天法地如立四氣以分天時劃四方以定地利此財成之説也因天之時而教之春耕夏耘因地之利而教之高黍下稻此輔相之説也然天地之氣化有餘於彼即不足於此帝王之經綸於彼損其有餘即於此益其不足故有財成即統乎輔相而輔相即寓於財成者如人才為天地所生而建官惟賢位事惟能此即用人中之財成輔相也貨財亦天地所産而取之有度用之有節此即理財中之財成輔相也立教以造士而春秋禮樂冬夏詩書此即立教中之財成輔相也明刑以弼教而宥過無大刑故無小此即明刑中之財成輔相也至於積貯以備缺乏而不使穀貴傷民穀賤傷農溝洫以正疆界而務使旱則可蓄水則可泄何莫非一事而兼乎財成輔相者哉故朱子云天人所為各自有分財成輔相須是人做而又云財成者所以輔相也雖然主泰之運者君也翼泰之運者臣也人君以天地之心為心人臣即當以君之心為心蓋所謂泰者乃地交於天而成其泰也此天地交而萬物通也亦下交於上而成其泰也此上下交而其志同也明良一德庶績咸熙唐虞三代之朝所以成泰交之治也夫周易象曰天地交泰后以財成天地之道輔相天地之宜以左右民監察御史臣陸尹耀王氏申子曰天地交而陰陽和萬物遂所以為泰人君象之裁成其道輔相其宜此天地之間所以無一物之不泰也臣謹按兩間之氣運開之自天地而普之自大君此三極並尊萬物所由以咸若也蓋隤確之神雖以妙合而成化然所統不過元氣元形而已藉非有統乎元功者調其有餘不足之數則出入亦不靈定其無過不及之衡則施生亦未顯何由使羣黎之稱機緘如奉律令而不違兆庶之被生成若就鈞陶而莫爽乎故知一施一濟各無閡隔以基此泰者兩大之心也或節或宣遞相經緯以宏此泰者一人之責也裁成輔相誠斷斷乎其不可諉矣特是天地之道皆天地之神所結天地之宜即天地之氣所呈此亦何嘗不居其至不適於時者茍泛焉執繼起之彌綸擬先機之發育意不精切則恐涉於膚浮局不宏深則慮傷於淺率求其能酌天地之量尤在善成天地之終所謂虛者實之微者彰之因其自然之精理著為當然之實事而已如氣機流行渾淪無迹后則為之紀以日月星辰統以作訛成易而後春夏秋冬之節具山川墳衍廣邈無端后則為之辨以疆理戎索制以井牧師田而後東西南朔之限明此所謂裁成其道也春生夏長秋斂冬藏為天之宜唯后因之爰以有作成之要開塞之程而須臾旦晚皆得與大造符其運高黍下稻燥瘠濕腴為地之宜唯后仍之爰以有變易之方向背之法而尺寸毫釐均克為下土訂其經此所謂輔相其宜也他如因時立政度地居民制節謹度而使不過乎則宣幽出滯而俾毋壅於機若大若小或緩或急有變有常時行時止事非一端而總歸於乘權履位者之能凡以以理運者理至而勢已無加以事伸者事在而責難旁貸發蒙亨屯以登一世於諴和唯一人當究厥圖耳凡此皆以為民也蓋民之智能雖足以通天地而每詘於權民之手足雖可以應天地而或暗於法唯裁成輔相立於無可增損之地斯蹙者可舒塞者可通安食飲於不識不知沐光華於大順大化而無一人之不若其天矣洵乎泰運之成非后不為功然茍非中和之立極先有以懋其全能終無由贊化育而參天地意者盡性至命尤凡為元后者所宜亟求歟周易天地交泰后以財成天地之道輔相天地之宜以左右民監察御史臣劉永泰朱子曰裁成是裁假輔相是佐助王申子曰天地交而陰陽和萬物遂所以為泰人君象之裁成其道輔相其宜此天地之間所以無一物之不泰也臣謹按泰治之隆天地與聖人實共參焉然天地之事俟諸聖人而遂謝其柄聖人之事善承天地而莫辭其任故運際休嘉之會人知天地豫聖人以甚逸也而不知聖人則代天地以甚勞惟聖人不敢存一自恃之心萌一圖安之念其於天地所不能為與不及為者無不經緯之咸周而區畫之悉當而奠三才以阜兆姓遂獨歸之亶聰作后之一人蓋元后也者固天地所篤生焉以為斯民之共主者也秉神明之資履君師之位具仰觀俯察之能盡人官物曲之制天地有自然之道民不知所以節之而見為過者后於是為之裁成焉天地有當然之宜民不知所以用之而見為不及者后於是為之輔相焉如春夏秋冬之分其序也南朔東西之别其方也耕耘收穫之隨其候也黍稷稻粱之因其性也舉凡所為厚民生利民用正民德者皆使之截然有條秩然就理而天地之所欲致於民民之所有求於天地者乃無幾微之餘憾矣當是時宇宙著其光昌億兆遊於熙皥仁風翔洽太和洋溢人莫不曰泰治之隆何若斯之盛也而抑知其裁成輔相以左右民者皆我后之功也哉即以易書言之龍馬負圖不過自一至十之數耳惟伏羲聖人畫陰陽之卦文周聖人繫彖爻之辭然後民之觀變而玩占者志由此通業由此定靡不推行以盡利而鼓舞以盡神斯亦贊化牖民之大端也周易天地交泰后以財成天地之道輔相天地之宜以左右民監察御史臣史積琦臣謹按一代之治運開於造化之相成而一世之治功本乎帝王之經緯蓋聖人首出身當運會之隆常有不敢自恃之心其於天地所不能為與不及為者初無可謝之責固知統三才以立極非主治者不為功也易於內乾外坤之卦而名之曰泰斯時也天道下濟地道上行宇宙著太和之象堂廉有一德之風羣賢類聚正道光昌多士彚征人才蔚起民生其間可不謂和樂矣乎顧有天地即有天地自然之化則為道有天地即有天地當然之節則為宜此其功不在天地而在參贊化育作民父母之元后也夫后非必有加於天地也人為未起而清寧奠位天地未嘗求助於至人然天地固不可以無后也氣化雖盛而經綸待興一人實能為功於造物故其財成天地之道也定四時之序經九野之分建五常之極執中以運而覆載不慮其偏其輔相天地之宜也敬授以趨時辨方以盡利鼓舞以成能調燮有權而生成不留其憾若此者過有所制而各得其道不及有所益而適協其宜以利民用則用無不周以厚民生則生無不遂以正民德則德無不復后之所以左右斯民不甚詳且遠乎要之天地何道民之所以為道即其道天地何宜民之所以為宜即其宜惟天地萬物父母相億兆之衆而作之君惟皇建其有極而崇效卑法廣施生之益以及之民此其所以開泰于一時而平成底績保泰於萬世而樂利蒙休也元后之功顧不偉哉周易后以財成天地之道輔相天地之宜以左右民編修臣陳顧㶌臣謹按古今郅隆之治其端開自兩間其利受於萬姓而其間參三才而立極者非聖人不為功蓋天地為民而啓運會不得不歸其權於聖人聖人為民而大勳猷又何敢諉其責於天地也是故泰交之時絪縕者其氣感通者其神下濟而上行者其道陽德方亨羣生畢達竊意天地於此既取物類而化生之何難取斯民而經理之不知萬物化醇之氣兩儀實因任乎自然節宣宰制之權二氣亦有藉於參贊自非亶聰明而作元后者出焉又惡能酌天地之中而立生民之命也乎蓋化育雖昭不能為萬方詳其經畫崇卑雖定不能為億兆遂其生成是道之有時而過宜之有時而不及者亦天地所無如何也惟后則有以財成而輔相之明天道於上使往來之不愆察地道於下使疆域之有别參差不齊之數悉受王者之化裁而無所或過焉奉天而欽若五行悉協於時奠地而平成四海畢盡其利開闢未有之奇皆待聖人之補救而無或不及焉若此者聖人豈徒騖乎調燮陰陽而思乎參天兩地也哉亦以使斯民者上之識風雨露雷之故下之辨剛柔燥濕之殊夏葛而冬裘渴飲而飢食孝友睦姻以厚人倫休養生息以登仁夀斯民所不能得之天地者有以遂其生天地所不能及之斯民者有以泯其憾以左右民而已矣然則造化之隆不可謂不由人事也人苐見聖王御宇陰陽和會民物恬熙美利普於不言大化成於有象以為民何幸而躬際太平之盛也庸詎知其承天而育物者固有如是之範圍不過曲成不遺者乎則洵乎功參兩大而澤被羣生端在乘時出治之后哉周易后以財成天地之道輔相天地之宜以左右民監察御史臣戴章甫臣謹按兆民之衆天地能生之不能使之各愜其分願而養欲給求遂默寄其權於代天理物之一人然聖人之於民亦未嘗違乎造物之自然而所以體元立制而使之適得其平者初不外乘天因地與斯民共安於順則之常而薄海內外已共享升平之福焉泰之象辭有曰后以裁成天地之道輔相天地之宜以左右民斯誠體天地之泰而協之政治使人人各遂其生養歟今夫化機之相續流行不息非有以節宣之而二氣何以均調廣輿之交錯形勢各殊非有以區畫之而四方何以克一則有待於裁成者如此而且東作西成氣候自有一定高黍下稌燥濕不無異宜非有以經理之而行生何以順布則有待於輔相者又如此王者為之作訛成易以定分至為之辨方正位以一版圖為之布令乘時以興嵗功為之度土揆宜以順物性由是五行布四時和六府修三事治所謂裁成以制其過輔相以補其不及而教率輔翼以左右民使人人共享其樂利則天地間寧猶有一物之不泰乎蓋陰陽和而萬物遂氣化之所以舒也法制備而民氣樂治功之所以懋也書陳洪範詩咏豳風禮載王制月令其調燮者不一端經緯者非一事敬天勤民撫辰凝績庶政惟和萬國咸寧則自堯舜禹湯文武以來所以成泰運之隆不誠有先後同揆者歟周易后以財成天地之道輔相天地之宜編修臣王覺蓮程子曰裁成謂體天地交泰之道而裁制成其施為之方也輔相天地之宜天地通泰則萬物茂遂人君體之而為法制使民用天時因地利輔助化育之功成其豐美之利也臣謹按自乾坤至履陽三十畫陰三十畫陰陽之數相等然後為三陰三陽之泰時至於泰則上下清明人物恬熙豈復有過與不及之患哉顧開一時之泰而無過不及者天地也保萬世之泰而常使之無過不及者聖人也則所以贊化育而參天地者端有賴於亶聰明之元后矣何也天地有自然之道有當然之宜所謂自然者天地雖秩然分之而未始非渾然運之也所謂當然者天地雖有其理而不必有其事也即如四時之循環無端四方之廣遠無際非有以裁成之則陰陽不能定其序剛柔不能定其位而天地之道或至於過萬事各有所宜萬物各有所適非有以輔相之則寒燠不能順其性燥濕不能順其情而天地之宜或至於不及所以古之哲后崇效卑法俯察仰觀定春夏秋冬之節而氣候不至參差而不齊辨東西南北之區而疆域不至混同而無别也因天之時而耕耘收穫順乎長養收藏之機乘地之利而黍稷稻粱協乎墳壤泥塗之性也推之而君尊臣卑父坐子立定秩敘之常經禮樂象陽刑罰象陰符舒慘之妙用夏葛冬裘飢食渴飲因人性之當然服牛乘馬網罟佃漁隨物性之宜然何一非元后之裁成輔相為功於天地者乎信乎開泰者天地保泰者聖人而凡有君天下之責者當盡裁成輔相之功使天下後世無一物之不泰也周易輔相天地之宜給事中臣倪國璉程子曰天地通泰則萬物茂遂人君體之而為法制使民用天時因地利輔助化育之功成其豐美之利也臣謹按此聖王贊天地之全功也蓋天地自然之化為道而道中之當然者曰宜天地有其宜而不能自適其宜則必有賴於王者之勷贊以補造化之所不及此輔相之功聖人所不能已也輔相莫大於用天時聖人明其陰陽寒暑之宜而東作西成南訛朔易莫不本以欽若之心而行其敬授之事由是生長收藏各順其序而允釐百工庶績咸熙矣輔相莫大於因地利聖人察其高下燥濕之宜而赤埴青黎塗泥白壤莫不辨其剛柔之性而作其稼穡之甘由是黍稷稻粱各蕃其植而庶土交正三壤咸則矣輔相又莫大於秩人倫聖人觀其恩義序别信之宜而君臣父子夫婦昆弟朋友既正五典而使之敦又用五禮而俾有常由是經綸條貫各若其則而百姓無不親五品無不遜矣是故輔則有匡勷之術相則有承弼之方天地無心而成化聖人有心而無為所以燮理寅亮不憚其勞經緯措置曲盡其道凡物或有憾於天地聖人皆引以為己責而必使之咸有以遂其生皆有以復其性而後已是故以父母天下為王道尤必以萬物得所為極功而有天地必賴有聖人也雖然元后亦豈於天地有所加哉所為輔之相之者亦因其時與勢之所趨理應如是之補救隨時處中通權達變是以泰運一開遂無一物之不泰而且能使萬世之長保其泰也然則王者之輔相天地信無愧於天之宗子而即與天地參矣故曰天地設位聖人成能凡贊化育之事何莫非左右斯民之事哉周易初九拔茅茹以其彚征吉監察御史臣李㥳朱子本義曰三陽在下相連而進拔茅連茹之象征行之吉也臣謹按國運之盛衰每視賢才以為進退以故若舟楫若鹽梅若股肱若心膂昔人言之詳矣然而生之有時聚之有機分之有其類致之有其端泰之初九其尤言之著乎其曰拔茅茹以其彚征吉臣即其言而思之其言賢而必附之於泰者何蓋賢之生也不偶而其出也亦不茍上焉者固志存乎道德次焉者亦意在於功名故度之已度之君而更度之天人之會時勢之機安全雖未奏乎而君民輯睦治平固已有其端災沴雖未除乎而上下惕厲經綸可預期其效是固泰之機也出而從之以致吾君以澤吾民以伸所學而酬夙志磻溪之老望西岐而來歸莘野之夫待三聘而後起是則賢之生因泰而致焉者此也其言泰而必首舉夫賢者何蓋天下之亂必有所由生而其治也亦必有所由始故有時方鼎盛君臣羣習為固然而國無老成覘者已卜其將衰本實撥也亦有僻處偏安內外日見其憂虞而朝多碩士識者逆知其將盛道可久也夏有遺老而一旅可以復舊業周有世臣而幼主可以致中興有胼胝之聖而昏墊何慮其為災有思文之后而粒食自徵其率育是則開泰之功因賢而成焉者此也其言賢之進用而取譬於拔茅連茹者何蓋天下物各有其類一小人用而衆小人從而附者神相契也一君子用而衆君子從而進者功又相資也故四嶽在位而夔龍羆虎濟濟登庸矣周召分陜而疏附先後蒸蒸丕進矣房杜秉鈞而鄭宋英衛無不稱之職守矣韓范立朝而歐蔡尹余無不盡之材技矣蓋以運際昌期則羣材之應運而生者衆而勢可有為則善類之汲引而升者更切也詩曰藹藹王多吉士維君子使媚于天子又曰思皇多士生此王國其亦泰之初九拔茅連茹之意也夫雖然世不能有泰而無否君子亦不能恆聚而無散其所以勤延攬廣登進以培邦本承景命相與保泰於無窮者易雖未言也而意義可思矣周易拔茅征吉志在外也檢討臣周燾楊萬里曰君子之志在天下不在一身故曰志在外也臣謹按泰之初九有拔茅茹之象其占為征吉孔子懼後世之筮得此爻者或僅以征吉為榮祿之階甚或以拔茅為朋比之助也故為之端其本於志蓋志之所向不過義利公私之間其始為毫釐之差其後有千里之隔人品之邪正功業之汚隆未有不由乎此今夫朝廷用人非直曰富之貴之已也曰吾為天下求賢賢人之用於世尤非靦焉茍富貴已也曰吾為天下行道志在天下則一身非所計而富貴不足以易其守志在一身則舍富貴無他圖而天下之利病皆可漠焉視之夫人臣而漠視天下雖有不世出之主居可以得為之會而天下事其誰與共濟者然則所謂志在天下者當若何朱子曰古之君子一日立乎其位則一日業乎其官上不敢慢其君以為不足與言仁義下不敢鄙其民以為不足以興教化屹然中立無一毫私情之纍而惟知其職之所當為羅從彥曰愛君如愛父愛國如愛家愛民如愛子是皆善言古大臣之志者也雖然不可以無本也孔子曰隱居以求其志陸九淵講義亦曰君子喻於義小人喻於利人之所喻由其所習所習由其所志志乎義則所習在義斯喻於義矣志乎利則所習在利斯喻於利矣誠能深思是身不可為小人之歸其於利欲之習恆為痛心疾首專志乎義而日勉焉由是而進於場屋其文必皆道其平日之學胸中之藴而不詭於聖人由是而仕必皆供其職勤其事心乎國心乎民而不為身計故學記曰凡學官先事士先志然則志之所向尤存乎策名釋褐之先誠非倉卒旦暮間可強自樹立者也周易九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也監察御史臣王興吾疏正義曰包荒用馮河者體健居中而用乎泰能包含荒穢之物故云包荒也用馮河者無舟渡水馮陵于河也不遐遺者遐遠也遺棄也用心宏大無所疏遠遺棄于物朋亡者得中無偏所在皆納無私于朋黨之事亡無也故曰朋亡也得尚于中行者以九二所為如此得配六五之中也所以包荒得配六五之中者以無私無偏存乎光大之道也臣謹按泰卦所言皆保泰之道而於初九則曰拔茅征吉於九三則曰艱貞無咎蓋以陽剛為保泰之本故於乾之三爻致其意焉而九二則又乾之中爻也故其言保泰之道獨詳其曰包荒者言含宏之量無所不包曰用馮河者馮河之事必始終用力始克濟川蓋言保泰之道當用馮河之力也曰不遐遺者即不忘遠也曰朋亡者即不泄邇也曰得尚于中行者即建極用中也曰包荒得尚于中行以光大者蓋惟光大故能得中而維不遐遺朋亡乃能光大則不遐遺朋亡者又此爻之要也而其義則有君道臣道焉蓋九二乾之中也故有君道九二臣之位也故有臣道以君道言之人主能以寬大之量切兢業之心不以薄海為遠而遺之不以殿陛為近而忽之則建中表正而為保泰之主以臣道言之人臣能以深謀逺慮為心而以始終一節自勵立志存乎為國為民舉念要於無私無黨則大公至正而為保泰之臣蓋禍患伏於隱微而每生於所忽人主能不遐遺朋亡則自外及內自大至小無一非精神之所貫注而何有隙孽之萌人臣能不遐遺朋亡則不為目前茍且之計而為國家久遠之謀不為偏私黨援所纍而為公爾忘私之事矣天下安有不久安長治者乎夫保泰者人主之心而佐君以保泰者人臣之事聖人以保泰之道著之於臣位之爻而象曰包荒得尚于中行愈以見上以此求下以此應上下同心君臣一德即彖所云上下交而其志同也蓋財成輔相者保泰之事而不遐遺朋亡者保泰之道惟其有不遐遺朋亡之心而後能行財成輔相之事故臣以為泰卦所言保泰之道惟此爻最為深切著明也周易九二包荒用馮河不遐遺朋亡得尚于中行監察御史臣陶正靖臣謹按包荒者仁之德用馮河者勇之德仁必兼智故不遐遺有勇且義故朋亡此卦專言保泰之事此爻以臣位言之而其説莫詳於程子伏惟皇上撫泰寧之運當勞於求賢之時臣請就程子之説條舉而核之程子曰九二以陽剛得中上應於五五以柔順得中下應於二君德本剛而有取於柔者非柔無以盡臣下之心也臣道宜柔而有取於剛者非剛無以任天下之重也類於剛矣而不必得中慮為申棖之欲也近於中矣而不本於剛又慮為胡廣之中庸也若是而一以柔道御之是猶以水濟水必無以成交泰之功伏惟皇上紀元之初嘗舉韓愈感激媕阿之句以風厲羣臣於今三年果已感激思奮乎抑蹈常襲故而未克變也臣聞王者以仁育萬物必以義正萬民民之貴於物也則知義之行當自貴者始義行於貴斯仁溥於物矣所謂百官正而萬民莫敢不一於正也不然則壅遏沮格之患可勝言哉程子曰人情安肆則政舒緩而法度廢弛庶事無節治之之道必有包含荒穢之量則其施為寬裕詳密弊革事理而人安之又曰泰寧之世人情習於久安安於守常惰於因循憚於更變非有馮河之勇不能有為於斯時也凡程子所指二者之弊自三代以至漢唐宋元明盛極而衰罔不由此臣觀今日在廷之意指蓋包含之意居多其見諸施為者則似乎寬裕而實縱弛似乎詳密而無關體要至樂因循而憚更變則尤為切中且如羣臣條奏下部議者其説在可否之間行之固屬無益不行亦復無害而一紙空文可以塞責則姑議行之以稱皇上求言之心以示不拒人言之意其他則以為難行而置之者有矣臣竊謂事當論是非不當論難易茍是矣雖難而當行若其非也雖易而必不可行昔之所謂難行者若暨􅝰之欲清流品於吳杜弼之欲懲勳貴於魏以至唐之末造用師於太原邠岐是蓋處分裂之朝與積弱之勢誠有所甚難方今天下一家海內之勢固如身之使臂臂之使指也而皇上至仁之德又已洽乎民心必無驚駭物聽之慮何嫌何疑而一切以難行報寢哉夫治病者必究其本浚井者必達其源將欲革弊正俗不從其本源治之而區區維挽於末流此朱子所謂架漏牽補過時日者也為人臣而懼失物情莫肯任怨此便文自營之計非程子所謂英烈之輔足以任天下之重者也程子釋朋亡之義謂如禁奢侈則害於近戚限田産則妨於貴家不能斷以大公而必行是牽於朋比也龔煥曰九二大臣所以進退人才者惟亡其朋類則能用天下之賢兩義相較則龔説為優極而論之豈惟大臣如治文書者以律令為可否而不牽於請屬則庶事無不釐矣司糾繩者以義理為權衡而不奪於知交則宵小無所容矣此則朋亡之極致雖屯可使泰也而豈有平陂往復之慮哉朱子曰包荒非混而無别之謂故必斷以行之明以周之公以處之然後用舍舉措無不合乎中道蓋孟子所云為君盡君道為臣盡臣道者似已不外乎此雖成康文景將有恧焉惟皇上之仁明實克比隆前聖臣敢以責難之義效狂瞽之説仰兾垂神察納天下幸甚周易九三無平不陂無往不復艱貞無咎勿恤其孚于食有福編修臣蔡新臣謹按天人治亂之機其微矣哉欲治而不亂者天心之仁愛也不能有治而無亂者氣數之乘除也懼其亂而保其治者人事之所以維氣數而體天心也自盈虛消息言之則天心有時不能勝氣數之權以制治保邦言之則人事亦有時而符天心之凖謂數不可逃六月雲漢之詩何以光復舊物謂時有可恃元狩天寶之治何以不克令終明此意者於泰之三爻見之矣夫泰極盛之時也三亦猶是陽長之候也聖人於否至四而後有喜祠於泰當三而即多戒懼慮患之意深矣蓋天下之亂也不於其亂而生於極治之時何也開創之始國勢方興人心未固君若臣早夜孜孜無非為天下謀治安為子孫措磐石其精神之所周貫天人實繫賴之履泰以後上恬下嬉漸忘其舊君以聲色逸豫為無害民生臣以持祿養交為安享太平進諫者謂之沽直遠慮者謂之狂愚其上下之精神謀畫莫不狃目前之安而圖一己之利夫圖一己之利者未有不貽天下之害者也狃目前之安者未有不來後日之悔者也則堂陛之玩愒其一也開國之初簡節疏目網漏吞舟之魚而吏治蒸蒸不恃法也承平以後巧偽漸滋則文網愈密以繁文縟節為足以黼黻太平以科條律例為足以釐剔姦蠧由是百里之命可寄而顆粒銖兩之出入不敢專焉鈞衡之司可秉而是非輕重之權宜不敢問焉使其君子無所恃以大設施之猷其小人有所援以售姦詐之術行之既久人人但以簿書期會為盡職而立法之初心設官之本意茫然莫辨矣則政令之煩瑣其一也國以民為命民以食為天當泰之時民物滋豐而民之遊惰耗之俗之侈靡耗之朝廷之徵斂愈密經費日增耗之古者以庶而致富後世則以庶而愈貧古者論貧富於民間後世則計贏絀於內府古者制國用量入以為出後世籌度支則因出而經入由是雖有恤民之令而民未見益徒有足國之計而用不加饒則物力之匱竭其一也人才者國家之元氣撥亂之世尚功致治之初尚文皆有經世之遠猷泰運既開承平日久朝廷不聞讜論士大夫不言名節拘牽文義以為學熟習圓通以為才卑順柔脆以為德靡曼繁縟以為文俗以此為尚家以此為教莫不漸染成風揣摩干進夫貴之所向賤之所趨也幼之所學壯之所行也在朝無骨鯁之臣工則草野之誦讀皆市心矣居鄉無廉隅之砥礪則仕路之功名皆茍且矣是人才之委靡其一也風俗者盛衰之本源當泰之初其室家婦子里黨閭巷多有敦龎安集之思厥後生齒繁則家庭之詬誶日起生計迫則里巷之任恤漸衰商賈之豪奢逾仕宦狙獪之險健欺善良朝廷敦寬大之政然法行於愚戇而疏於姦民是長其桀驁之氣也吏治博安靜之名而蠧胥之弊竇日啓雀角之案牘常懸是釀其刁悍之習也則風俗之澆漓又其一也此數者或由矯枉之過正或因時勢之遞遷皆人事與氣數相因而至者也聖人知其然故於泰之三爻即戒以無平不陂無往不復霜雖未氷月已幾望誠甚懼乎其孚也然可謂之氣數人事而不可謂之天心蓋天心之仁愛甚矣自古雖當衰亂之運其君臣能恪謹天戒側身修行則天猶未有不豫之以治者况其為未雨之綢繆乎誠使為人君者凛兢業之小心存無虞之警戒念六月雲漢之詩鑒元狩天寶之治廟堂之上恪恭震動百爾臣工惟懷永圖罔敢玩愒以迓天休然後崇簡易敦大體重責成戒叢脞則政令不煩矣省浮費戒屯膏修地利薄征稅則財用不匱矣審好尚公賞罰奬忠直黜浮靡則人才咸奮矣敦孝弟重農桑嚴豪猾清獄訟則風俗還淳矣保大定功和衆豐財有苞桑之固無復隍之憂豈不亦于食有福哉而必自君心之無玩愒始則欲盡人事以體天心而維氣數者誠不外艱貞之訓歟御覽經史講義卷三
