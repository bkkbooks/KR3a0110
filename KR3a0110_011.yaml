  text: 欽定四庫全書御覽經史講義卷五目録
  hash: sha256:1c558e2ad39cbc734911f63a29bd93b1d9982f40df14cb9a55dd04ced164154e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_011-1a, image: WYG0722/WYG0722-0142c.png}
body:
  text: 周易象曰澤上有地臨君子以教思无窮容保民無疆右中允臣朱良裘侍講臣馮秉仁編修臣張若需監察御史臣金溶君子以教思无窮容保民无疆侍讀臣周玉章編修臣孫人龍監察御史臣李清芳六五知臨大君之宜吉象曰大君之宜行中之謂也檢討臣吕熾監察御史臣周祖榮六五知臨大君之宜吉給事中臣宫煥文監察御史臣張孝挰監察御史臣陳髙翔大君之宜行中之謂也監察御史臣沈世楓觀盥而不薦有孚顒若彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣少詹事臣福十寶有孚顒若監察御史臣倪國璉大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣編修臣觀保有孚顒若下觀而化也監察御史臣馬丙六四觀國之光利用賓於王監察御史臣倪國璉觀乎人文以化成天下編修臣竇光鼐編修臣錢𤦺監察御史臣王顯緒上九碩果不食君子得輿監察御史臣沈懋華反復其道七日來復利有攸往監察御史臣沈懋華七日來復天行也利有攸往剛長也復其見天地之心乎編修臣朱佩蓮復其見天地之心乎編修臣吳兆雯編修臣儲麟趾檢討臣萬松齡剛健篤實輝光日新其徳編修臣錢𤦺監察御史臣周祖榮君子以多識前言往行以畜其徳侍讀臣周玉章天地養萬物聖人養賢以及萬民編修臣喻煒聖人養賢以及萬民編修臣儲麟趾象曰水洊至習坎君子以常徳行習教事監察御史臣周祖榮
