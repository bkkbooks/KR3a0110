body:
  text: 詩經於穆清廟肅雝顯相濟濟多士秉文之德對越在天駿奔走在廟不顯不承無斁於人斯給事中臣倪國璉朱子曰此周公旣成洛邑而朝諸侯因率之以祀文王之樂歌言於穆哉此清靜之廟其助祭之公侯皆敬且和而其執事之人又無不執行文王之德旣對越其在天之神而又駿奔走其在廟之主如此則是文王之德豈不顯乎豈不承乎信乎其無有厭斁於人也臣謹按頌者所謂美盛德之形容以其成功告於神明者也天子之德光被四表格於上下無不覆幬無不持載於是和樂興焉頌聲乃作蓋頌聲由其時之君德洽於民顯其祖父之功所以頌子孫也書大傳曰周公升歌清廟茍在廟中嘗見文王者愀然如復見文王焉此其升歌之辭也又書稱烝祭文王而此祗頌文王之徳者卑統乎尊也事神之道尚潔故文王之廟曰清廟言其肅然而清静也文王雝雝在宫肅肅在廟今助祭之諸侯皆能肅雝是皆有顯著之美能體文王之徳者濟濟多士即與祭執事之人宗祝有司之類中庸言序事所以辨賢是皆能執行文王之徳者文王往矣其神在天其主在廟而助祭之公侯及執事之人莫不藴抱美徳極誠盡敬既能承順其素如在生存又能奔走疾大敏以勸事而妥侑神靈豈不光明文徳而順承其志意與此可見文王之盛徳至善淪肌浹髓没世自有不能忘者即廟中可以槩天下矣故曰無斁于人斯是時成王為祭主一時在位之人助祭及與祭者皆能敬且和詩曰相維辟公天子穆穆則成王穆然奉祭之氣象又不言可見矣夫孝莫大乎寧親寧親莫大乎寧神寧神莫大乎合萬國之歡心以事其先王成王夙夜基命宥密緝熙單心靖安天下其入廟而致饗也凜紹庭之義深繼序之思光昭文武之令緖聯合百官萬姓之愛戴懷思以萃渙而格祖所謂盛德之至頌聲之作豈虛美哉書曰七世之廟可以觀德禮曰惟仁人爲能饗帝孝子爲能饗親此之謂也然則頌文王之德正以頌成王前聖之深仁厚澤浹於人心而後王之丕承謨烈者又駿惠以篤厚之此所以綿福祚於無疆也與詩經無封靡于爾邦惟王其崇之編修臣張映斗毛萇曰封大也靡累也崇立也鄭康成曰崇厚也無大累于汝國謂侯治國無罪惡也王其厚之增其爵土也朱子集傳曰封專利以自封殖也靡汰侈也崇尊尚也言汝能無封靡于汝邦則王當尊汝臣謹按詩序烈文成王卽政諸侯助祭也當其時姬宗旣奠百辟來廷成王因其助祭而訓誡之固當切示以侯度之當謹與天位之無私則不專利不汰侈固其要矣古者六德而爲諸侯胙之山川封之茅社代天子出治保乂萬方雖或焦陳薊祝仍先代之封䢴晉應韓篤本支之誼要惟稽古崇德象賢德足以稱之而後授之豈惟不大累民遂使茍居藩服也毛鄭之說不及朱子之說明矣夫列邦各君其國各子其民自天子視之猶一家也專利則曲防遏糴友邦如秦越矣分疆賜履食稅衣租天子藉以加惠斯民也汰侈則竭澤朘膏小民如魚肉矣惟封與靡蠧民之尤王制所不容天討所必及豈但不崇以位而已哉且夫無封靡者非僅懷清守潔謹身寡過已也羣侯能救災䘏鄰篤親念舊本此以導民卽睦婣任䘏之型立而民俗以淳能屏絶竒衺袪除僭濫推此以坊民卽耗斁物力之源塞而民生以遂民俗淳民生遂是卽侯績之克張矣其崇之也固宜天之仁愛斯民也眷命天子以治民又生羣才以佐天子使之同民欲䘏民財教民相生相養之道凡以爲民也詩書所載稷契周召諸臣皆其勤勞爲民者也於己何利焉天之生賢聖也不數身有其具卽有其責無所逃於天地之間分定故也賢臣簡在帝心承流宣化惟切遺艱投大之憂豈容榮身肥家之念卽龍光燕譽拜手揚休亦惟自幸遭逢懷才表見於天下不僅僅戴德感恩以爲己利故足述也若夫計爵秩之崇卑較賦祿之厚薄心勞日拙器小易盈國家安頼有是臣哉詩經天作高山太王荒之彼作矣文王康之右中允臣齊召南朱子曰此祭太王之詩言天作岐山而太王始治之太王旣治而文王又安之臣謹按自古國祚之綿長以世德淺深爲準大都積之愈厚則流澤愈光發之愈遲則垂慶愈遠三代享國最久首推有周周之先起自后稷振於公劉與商之先起自司徒振於相土無以異也而武王代商與成湯代夏則稍有殊何則湯及身奮興未聞有賢如太王聖如文王之開其先也周則太王肇基文王新命其功德已盛於代商以前而天之眷顧有周亦若寸積銖累故爲遲遲以展其勢而宏其規其自邰而豳也旣似斷而復續其自豳而岐也乃因弱以爲強至於走馬胥宇率歸市之衆而木㧞道通鳴鳯呈祥懋作述之傳而燕天昌後由是而程而豐而鎬而洛遂全撫九州六服以衍卜世三十卜年八百之靈長是則前代邰豳之緒非岐山何以承後時程豐鎬洛之休非岐山何以啓帝遷明德與之宅而省其山帝懷明德篤周祜而對天下豈偶然也哉興王大業始於翦商成於修和有夏蓋不待戎衣牧野已知天命在周此大雅綿及皇矣二詩所爲道其詳周頌天作高山一詩所爲揭其要也夫雅頌之作詎徒以咏歌先德云爾哉陳創業垂統者之締造艱難所以詔聖子神孫守成纘緖者繼繼承承於千萬年敬戒而不怠也周自宅鎬卜洛以還重熙累洽一道同風致治之隆於古罕覯若爲溯厥原本則擴陶復陶穴之俗而立室家殫康功田功之勤而受方國世德深厚原爲自古所無易象言王用享左傳言成大蒐無亦周家故事世䖍祀事講軍實於岐山以勵其念祖聿修之思乎流覽川原肅瞻宫廟臯門應門規制具在洽陽渭涘形勝長存想櫛風沐雨之苦辛考拓土開疆之次第見城邑則曰是我太王時爰始爰謀築室于兹我文王時伊淢伊匹聿追來孝者耶見井野則曰是我太王時廼宣廼畝自西徂東我文王時樹穀樹桑助而不稅者耶見民人繁盛則曰是我太王時成聚成都文王時讓路讓畔者耶見賢才衆多則曰是我太王時始立司徒司空文王時遂備疏附後先奔奏禦侮者耶見版圖恢廓車馬修整則曰是我太王時掃除荆棘所謂柞棫㧞而行道兌者耶我文王時赫怒整旅所謂四方以無侮無拂者耶思荒之康之之甚難自思保之之不易旣治而圖長治旣安而求久安宜何如廪廪也大雅曰繩其祖武於萬斯年受天之祐此卽子孫保之之義也夫詩經昊天有成命二后受之成王不敢康夙夜基命宥密於緝熙單厥心肆其靖之侍講臣張映辰朱子曰此詩多道成王之德疑祀成王之詩也言天祚周以天下旣有定命而文武受之矣成王繼之又能不敢康寧而其夙夜積德以承藉天命者又宏深而靜密是能繼續光明文武之業而盡其心故今能安靜天下而保其所受之命也臣謹按天德王道一以貫之而其要總在於敬歴觀自古帝王堯曰欽明舜曰温恭禹曰祇承湯曰聖敬文曰敬止武曰執競心法之淵源卽治法之統宗也成王以不敢康寧之心成宏深靜密之德以宏深靜密之德成繼續光明之業命之基基於其不敢康也心之單單於其不敢康也觀其念切紹庭不忘繼序時勤訪落重賴仔肩而且無逸以念民依立政以戒卿士盛德大業詩書所載尤詳而深探原本則不敢康之一言括之是知富有日新皆無時豫怠之念所積累而生也抑臣更有論者二后開基之主也而詩曰成命成王守成之主也而詩曰基命蓋守成之主丕承先志佑啓後人不惟已定之規模固自此要其成而無疆之鴻業實自此基其始周之王也肇自后稷歴千餘年而大命始集此二后成命之效也迨其後卜年卜世國祚靈長而推命之所由基則明文昭定武烈戡定厥功以遺後人休者非成王有以致之歟尚書召誥曰自貽哲命曰祈天永命卽基命之說也曰疾敬厥德曰王敬作所卽不敢康之說也後之繼體守文如成王者念日監之在兹篤前人之成烈萬幾待理宵旰不遑雖治已進於郅隆而心益深其惕厲於以克紹前徽而奉答天命有不自不敢康之一念基之者哉詩經昊天有成命二后受之成王不敢康夙夜基命宥密於緝熙單厥心肆其靖之洗馬臣佟保晉叔向曰昊天有成命頌盛德也其詩曰昊天有成命二后受之成王不敢康夙夜基命宥密於緝熙單厥心肆其靖之是道成王之德也成王能明文昭定武烈者也夫道成命而稱昊天翼其上也二后受之讓於德也成王不敢康敬百姓也夙夜恭也基始也命信也宥寛也密寧也緝明也熙廣也單厚也肆固靖和也其始也翼上德讓而敬百姓其中也恭儉信寛以歸於寧其終也廣厚其心以固和之始於德讓中於信寛終於固和故曰成臣謹按古今來有天下者當祖宗締造時往往艱難拮据以成帶礪之基迨後嗣席豐履盛蒙業而安而敬天勤民之志荒焉皆康之一念誤之也周之成王者千古守成之令主也彼其弱齡踐阼戡定三監上纘十五王之傳下垂八百年之緖者功何偉哉要其所以基之者則惟此詩不敢康之一語盡之蓋康則其氣盈盈則不宥矣康則其志浮浮則不密矣康則物得而間之間之則不緝矣康則私得而蔽之蔽之則不熙矣又安望王心之克單而四海之綏靖也哉成王之心不敢也成王之心二后之心也昊天之心也昊天命之之心也卽二后受之之心也閔予小子則不敢康者在一身遭家多難則不敢康者在一家暑雨祈寒則不敢康者在下土多方多士則不敢康者在萬邦赫赫明明昊天有命文王有大德而勲未集武王有大功而治未成成王毅然自夙夜基之但見其心之宏且深也何其宥也靜且嚴也何其密也於哉其心之緝也誠一纏綿亹亹焉無少間斷也於哉其心之熙也光明洞達昭昭焉毫無掩飾也蓋其所以篤二后之庥者此心所以凝上天之眷者亦此心休哉成王聖子神孫垂裕未艾卜年卜世反側潛消肆其靖之夫非此不敢康之心有以致之哉是心何心陟降左右主敬之心也所其無逸克勤之心也要其覲文光揚武烈者一一皆仁人孝子之心也則成王之不敢康者正所以爲子孫千億宜君宜王者垂其康於無旣也後世守成之主尚以成王爲前事之師哉詩經昊天有成命二后受之成王不敢康夙夜基命宥密於緝熙單厥心肆其靖之編修臣李龍官臣謹按此言祖宗受天成命而繼之者能懋厥德以安靖四方而保其所受之命也上天之載無聲無臭其心固以生民爲命者也彼其監觀四方求民之莫無日不爰究爰度以耆致之至於眷顧而得其篤祜對天者則其心亦由是而少慰何則雝雝在宫肅肅在廟不顯亦臨無斁亦保緝熙敬止之德作孚萬邦者固已於昭于天由是陟降左右雖命之不易而亦克凝於勿替人見其保佑受命若此其觀成而配京也而抑知其小心翼翼畏天威而時保者久已取四方而日靖之豈或有幾微戲渝馳驅之念哉雖然天造草昧經綸於雲雷之際祖宗之功也日就月將紹庭於判渙之間子孫之業也祖宗積功累仁艱難開創幾年而得之子孫優游逸豫視下民爲無足念天命靡常凝於爾躬者亦將遏於爾躬矣且夫天下大器也崇於上者必固其基於下是故基命不在於顯而在於密我求懿德肆于時夏丕顯之功也敷時繹思我徂維求定夙夜之心也然而養心之道亦難言矣孔子曰操則存舎則亡出入無時莫知其鄉言心之神明不測而操之宜密也故心一也而所以間而熒之者且不可勝計卑之或進以聲色犬馬之娛高之或聳以封禪甲兵之盛或歆之以土木或動之以貨利在外者百出以相誘在内者四應以交酬心之存焉者寡矣古之人所以祈天永命而增其式廓者豈有他焉亦曰緝熙單厥心而已矣心之運不息而有一念之或間則勿緝心之體無私而有一念之或雜則勿熙聖人知其然兢兢業業持守此心雖在紛華波蕩之中幽獨宴閒之地而所以精之一之克之復之如對神明如臨淵谷凡飲食酒漿衣服次舎器用財賄與夫宦官宫妾之政莫不制於一定之法故其事皆足與天下共見而其心之惕然於屋漏者惟鬼神之堪質斯民日受教養之澤錫福而不自知而聖人之所以欽崇天道者至此爲無憾也夫民猶水也水所以載舟亦所以覆舟是故民性易動動則思有以靖之自昔有國家者其所爲深謀遠慮豈不亦致飾於禮樂嚴肅其政刑而究之不克明作而大有功者則以其心非緝熙之心而藏於密者固與昊天之成命牴牾而不相受故也夫周之積仁累善至成王之時爲最盛而於郊祀天地凛然述祖德而嚴懲毖蓋履極盛之時而深之以戒懼明之至誠之盡也臣竊以爲成王者其萬世繼體守文之君之極則歟詩經成王不敢康夙夜基命宥密於緝熙單厥心肆其靖之編修臣王居正臣謹按聖人而爲天下君以承天眷則帝心之所鑒觀也以纘先烈則王業之所式憑也以厚邦本則民情之所瞻依也是故言君德者必曰敬天曰尊祖曰勤民而要其貫徹於三者之中歴初終而無或渝惟視乎人主之一心而已蓋君心正然後君德修而帝命之隆祖緖之昌天下之治且安端必由乎此顧開創之主締造維艱往往知天命之難忱民心之難得而競兢焉若乃王業旣成太平有象則豐亨豫大之形日狃於目而戒謹恐懼之意漸弛於心此守成之難同於創業而三代令主所以首推成王歟周頌昊天之詩解者不一朱子以爲多道成王之德今考其詞曰成王不敢康夙夜基命宥密於緝熙單厥心肆其靖之其卽書所謂祗勤於德夙夜不怠嗣守文武大訓無敢昏逾之意乎則其爲成王之詩無疑獨是言不敢康矣又曰夙夜基命宥密其義何居朱子曰宥宏深也密靜密也輔氏廣曰不宏則體不盡不深則見不徹不靜則不能到冲漠無眹處不密則不能到萬象森具處宏深陽之德也靜密隂之德也竊嘗由二說而推論之人君一天也體天之心以爲心卽法天之德以爲德是故在天德爲元亨利貞而在君德則爲仁義禮智仁不足則立體不宏義不足則致用不深能宏而寛裕温柔足以有容者在是矣能深而發強剛毅足以有執者在是矣此與天之元亨合撰所謂陽之德也且禮不足則神莫能靜智不足則識莫能密能靜而齊莊中正足以有敬者在是矣能密而文理密察足以有别者在是矣此與天之利貞合撰所謂隂之德也具是德也而基之以不敢怠康之心加之以夙夜無間之學則成王所以集昊天西眷之明命續二后貽謀之顯烈而克盡君道深培元氣以成有周八百年王業之隆者其在是乎獨是緝熙光明基命宥密成王之德也而所以成其德者周公則有無逸之訓召公則有卷阿之歌反覆其意不過始終望成王以不敢康而已故曰君心者君德之基而敬天尊祖勤民之本端必由之也不然者畧主德而言治術則是無闗雎麟趾之意即可以行周官周禮之政也不亦失其本哉昔司馬光言王安石有三不足之說蓋以天變爲不足懼人言爲不足恤祖法爲不足守是直與詩之所言顯爲悖戾故宋神宗具大有爲之志而不獲身致太平伊誰之咎歟然則人主欲效唐虞三代之治而人臣欲致君於堯舜其當以詩言爲龜鑑乎詩經夙夜基命宥密於緝熙單厥心檢討臣葉一棟朱子曰言成王能夙夜積德以承藉乎天命者又宏深而靜密是能繼續光明文武之業而盡其心朱善曰不敢康以心言宥密以德言以不敢康之心成宏深靜密之德以宏深靜密之德成繼續光明之業則所以基上天之命者在是所以繼先王之業者在是而皆不外乎此心故又以單厥心終焉臣謹按天下之治治於人君之一身實治於人君憂勤惕厲之一心君心不自逸而天下乃長享其逸君心不自安而天下乃長享其安所以聖王哲后必夕惕朝乾極深研幾殫精畢慮以承上天之休命以光前王之偉業因以竭其兢兢業業繼繼承承之心於無憾昊天之詩其頌成王之基命者可繹矣曰夙夜言無間斷也曰宥密言無虚假也曰於緝熙言繼序不忘綿大業於富有昭盛德於日新也凡以盡其不敢康之心奉答乎天命也故申之曰單厥心夫成王當日者以文子文孫立政立事文武之謨烈未遠周召之左右維勤固已樂備禮明化行俗美乃猶夙興夜寐植命丕基既宵旰之不遑復隱微之交毖擴其基之之體使并包無外精其基之之識使旁燭無遺躁不足以入德則守之以靜踈不足以凝道則藏之以密而且紹庭上下日就月將至治馨香覲光揚烈如是其有嚴有翼不敢自逸自安者豈非以所受之成命無疆惟休亦無疆惟恤也哉且夫成王所受之命即二后所受之命也成王所單之心即二后所單之心也小心翼翼昭事上帝文之所以單心新命也我其夙夜畏天之威武之所以單心集命也成欲基命敢不心文武之心歟然不特成王心文武之心即在廷諸臣莫不心成王之心以共心文武之心周公嘗告王曰君子所其無逸召公亦曰王敬作所不可不敬德史佚又嘗對王曰如臨深淵如履薄氷一時君若臣又相與嚴恭寅畏敬戒不怠以祈天而永乎命也此所以纘丕顯丕承之緒嗣敬止敬勝之徽學底於光明業臻於久大綿奕世和平之福享萬年有道之長治化之隆守成之盛獨懋千古者舉基諸此矣臣故曰天下之治治於人君憂勤惕厲之一心詩經夙夜基命宥密編修臣路斯道國語夙夜恭也毛傳云基始命信宥寛密寧也鄭箋云早夜始順天命不敢解倦行寛仁安靜之政以定天下朱子集傳基積累於下以承藉乎上者也宥宏深也密靜密也輔廣曰宏深陽之德也靜密隂之德也合是二德則能承藉乎天之命我者矣夙夜者無間斷也臣謹按天人之際其㫖微矣蓋天之仁愛人君也常冺聲色於不見不聞之中而人君之承藉天命也惟勅幾康於亦臨亦保之内是以易著乾惕書首欽若詩戒馳驅禮言主敬無非本昭事之小心以凛夙夜之明威而祇承天庥垂統奕䙫而已第天道遠人事邇善言天者必有徵於人謂於穆之命杳茫而難知修省之德切實而可據故不求之於高高在上而常求之於旦明之間是以一心原本太極靜而爲五常動而爲五事而休咎之徵恒必由之則天之與人又若呼吸可以相通而不啻諄諄告誡耳爲提而面爲命者故曰日監在兹也然則聖人之法天法以心也格天格以心也而其所以承藉天命者亦基之以心而早夜之間卽暗室屋漏之義敬存於中而萬理具足何其宏也湛然太虛何其深也敬要於久而一私不擾靜之至矣渾然無間密之至矣卽守約施博之道而先儒以事功當之謂寛仁所以止苛刻安靜所以息暴亂猶淺之乎言詩者也故朱子不從康成之說或者謂王者得天以實不以虛徒存敬畏之意未若驗之於政發乎邇見乎遠出乎身加乎民者之爲深切著明也然聖王之治體用一源有主敬存誠之功必有因心作則之事而民胞物與翕然納羣生于在宥則有如陽德之并包而知周道濟曲成不遺矣有經天緯地之業必有齋戒神明之德而黜聰蔽明凛然藏萬有於至密則有如隂德之靜涵而保合各正黃裳元吉矣是知帝德與王功初無二致人事與天道非有岐途傳注有云一人之心正則天地之心亦正則一人心天地之心以爲心也心正則氣亦順故又云一人之氣順則天地之氣亦順則一人體天地之體以爲體也推而極之隂陽和而風雨時約而言之天君泰而百體喻由此而茀祿康寧保佑申命孰非此夙夜之間有以基之而宏深靜密也哉詩經夙夜基命宥密編修臣歐陽正焕臣謹按聖人首出撫圖膺運以受丕基其業在紹祖其道在承天而其原則在懋德德具於心廓一心之全量以宅萬理則體備用宏休嘉上應而皇天之所眷佑卽祖宗之所式憑故萬世無疆之業總托於一息無間之誠也姬周之業文王開之武王成之文王之詩所謂其命維新武之詩所謂嗣武受之是也至於世德作求永言配命則成王實居之矣今夫百年必世之規模一夙夜之積也寰宇之廣幾務之繁民物之殷且富一宥密之所約而載也爲人上者雖欲自康其可得哉天祐下民作之君作之師挈神器而畀之惟皇建極之一人書曰奄有四海爲天下君蓋言天命之也顧其業廣矣大矣其理復散著於動靜語黙之際流行於禮樂刑政之中苟非要此心於宥密則所受未廣而所遺者已多夫受之不廣則偏倚之見生所遺者多則滲漏之端啓精於邇也而遠或遺之張於勤也而暇或弛之是故必兢兢於夙夜而後全體悉該也且夫天人相與之際微矣董仲舒有言爲治者必求其端於天夫天未始有言也於命審之命不可得而見也於心卜之人主之精神氣志獨超萬物之表故息息與天載相通其始也嚴恭寅畏人主之於天敬之而不敢懈其旣也篤摯纒綿天之於人主亦眷之而不忍釋如植木然根深則枝葉日茂如構堂然址固則楹梲相承此則基之之說也臣觀成王之事天揆之二后非有二致也本朝乾夕惕之衷成日就月將之學以覲耿光則令聞不已依然緝熙之矩以揚大烈則無競維烈依然敬勝之模如是斯可謂宥密矣惟宥也故宏深之量衆理淵涵而物不能究惟密也故寧謐之衷萬象森然而私不能淆盛德大業富有日新下可以答黎庶卽可以上對祖宗而無慚明可以順人情卽可以幽贊天道而不忒皇自敬德帝命不違若成王者誠善承天眷也歟詩經我將我享維羊維牛維天其右之儀式刑文王之典日靖四方伊嘏文王旣右饗之我其夙夜畏天之威于時保之編修臣朱佩蓮臣謹按周頌三十一篇多周公所定郊祀后稷以配天則歌思文宗祀文王於明堂以配上帝則歌我將成萬物者上帝成王業者文王有同功遂同祀故郊者古禮明堂者周制也奉昊天上帝之主居其中迎文王主配焉凡聽朔以特牲告至季秋乃大享之以報其成功其詩曰我將我享維羊維牛毛傳云將大也謂大享也大享之禮帝牛一文王騂牛一養獸之官擇其毛而卜之吉帝牛必在滌三月文王之牛惟具不及於羊此先以羊者羊人共羊牲以釁積柴也曰維天其右之鄭箋以右爲助謂牛羊得天氣之助朱傳以右爲尊謂天降在牛羊之右按儀禮少牢饋食之禮右之凡三見皆以席東面近南爲右以便食也則此句爲布陳神坐以俟天之降鑒耳天冲穆無朕文王紀綱爲憲欲克享天心莫如儀刑文王文王之典布在方䇿不善法之必謂文王以文治不以武功多士多方廸屢不靖亦有難歆其祀者儀式刑善用法也善用法文王勤施四方或以文令或以武競期於綏靖而後已伊我錫福之文王厥旣在右而坐饗之如將見之夫如是孰不謂宗廟饗之子孫保之者然於天則曰其右之蓋不敢必饗也於文王則曰旣右饗之蓋能必饗于文終不敢必饗於天也未必盡饗之又安必盡保之然則爲之奈何曰是誠在我我惟知皇天無親鬼神無常饗福不倖邀威則可畏夙興夜寐小心翼翼文王陟降在帝左右庶幾黙爲呵䕶以能保我子孫乎祈天永命之道不外於此祭義曰惟仁人爲能饗帝孝子爲能饗親饗者鄕也鄕之然後能饗焉是故配后稷於郊尊尊也配文王於明堂親親也尊尊親親皆本於一己畏心之存大哉畏乎萬變生於無所畏萬福集於有所畏君臣所當共勉君以天爲天則畏天之威以夙夜圖治而已臣以君爲天則畏君之威以夙夜盡職而已此周公心法史遷作魯世家記公北面就臣位匔匔如畏然可謂得周公制作之本矣詩經我其夙夜畏天之威于時保之編修臣秦蕙田朱子曰夙夜畏天之威然後天命可以長保矣臣謹按聖賢學問之道多端一言以蔽之曰畏天而已矣何則天之道誠也誠者不欺之謂也夫欺之名人所不樂受顧往往蹈之而不知者由其心之無所畏也故必使其心知有所畏而後能直其心而無敢欺則可畏而不可欺者莫有如天矣小人不知畏天故自欺欺人其究至於披猖潰敗而不可問君子惟知畏天故戒欺求慊謹幾愼獨而無一時一事之茍且第欲畏之必先知之朱子曰儒者以窮理爲先理者天理也天者自然而然不假勉強不差毫髪有幾微謬戾是違天也有幾微造作是背天也有幾微踈忽放縱是慢天䙝天而棄天也故儒者之於理必極深研幾至於一旦豁然而後已者亦唯曰知天而已知之故畏之也夫旣曰畏之則非徒明其理也其威之靈顯赫奕而若有憑者尤彰著而不可掩程子曰上天之載無聲無臭其體則謂之易其理則謂之道其用則謂之神故說神如在其上如在其左右而只曰誠之不可揜如此夫徹上徹下不過如此詩曰陟降厥士日鑒在兹又曰神之格思不可度思矧可射思孔子曰吾誰欺欺天乎夫以古之神聖賢人其性情之純粹學問之淵深必且什百於衆人而於處心積慮發謀行事之際卽於欺者或寡矣然觀其夙夜之間動色相戒兢兢焉業業焉恐懼悚息而不敢忽者豈非天之昭假降鑒誠有不得不畏者乎且夫威之可畏其感應實有通於呼吸者易曰積善之家必有餘慶書曰皇天無親惟德是輔蓋天非特蒼蒼在上之謂其自九天而上九地而下自吾之皮毛骨髓以及六合内外無非天也是以動一善念而天知之動一不善念而天知之善則應之以祥不善則應之以殃無他自感自應也自感自應所以爲誠也所以爲天也然則學者之畏天也宜如何曰毋自欺而已毋自欺則愼獨而已矣夫隱微之地一念初起其善也孰知之其不善也孰知之然人不知而己獨知且最眞最切至見至顯無過於此者是乃所謂天也於此而能愼則去僞存眞不欺其天也祇不欺其獨也不愼則私欲横肆天理微滅欺其獨也實欺其天也儒者之學所爲舜蹠之關人禽之辨喻義喻利之别爲己爲人之分宜莫切於此也是以古聖王嚴㳟寅畏天命自度自宫寢燕遊及班朝涖政總將之以敬畏之心而臨之在上質之在旁黙黙感孚於無間故隂陽和而風雨時五穀成而萬民順長保天命其以此歟而儒生所以立身行己以事上者尤莫切於不欺誠於屋漏衾影人所不見之地刻刻以畏天爲事樸誠自矢而緣飾不萌則庶幾有以自主而不入於小人之途於以求聖賢之道不遠矣詩經嗟嗟臣工敬爾在公王釐爾成來咨來茹編修臣沈昌宇朱子曰此戒農官之詩先言王有成法以賜女女當來咨度也輔廣曰命他官皆無詩而特命農官則有詩者周人以農事開國故成王周公特作詩以戒勅之以重其事也臣謹按農者衣食之本聖人深知生民之仁起於菽粟故農事嘗首天下之政戒農官而統飭臣工者國之重務在農臣下皆有兼責也周自后稷以來以農事開國樹藝之法講求備矣顧稼穡之艱難非一日之積其相天之時因地之利自浸種而始苗自苗而穟自穟而實自實而熟有其節次皆頼人力以相助之是生民之詩所謂有相之道而來咨來茹不可不敬以將之也臣嘗考周官大司徒以下不必以農名官而渉於農事者幾半焉制其溝洫經其涂畛經界正而旱澇有備矣而畜水止水均水之法復見於稻人不易一易再易既别之於上中下地矣而土化之法復見於草人十有二壤之物辨其土宜矣而穜稑之種周知其名與其所宜地以爲法縣於邑閭則司稼之掌也歳時之合耦既有以治稼穡矣而簡稼器修稼政則遂大夫之掌也年之有上下則廵野以觀之耕之有勤惰則興甿以勸之其任之也非一職其理之也非一人法之䂓於上者纎悉偹具而所設之官亦朝夕與民相親民間種植收穫之宜日得之於目見耳聞而懸其法式時其消息以教導之君臣上下之間以此爲先務之急由來舊矣詩人述其戒農官之詞而必重歎而深勅之欲其震動恪㳟以率時農夫其成法之賜於上者講求審度而後行而不可鹵莾焉以幸其成也當是時風俗敦龎務本者衆農未有不習於耕者也上之人復修明其法命官以左右之其因天乘地物土之宜而布其利慮無不詳且盡矣而力於農事者又爲之崇奬勸勵故斯民從事其間勤敏和悅之氣浹於上下而忘其服田力穡之勞主伯亞旅各勤其事迨其稼之成也崇墉比櫛百室盈而婦子寧是則聖人所爲導利而布之下者誠莫有大於斯矣詩經宣哲維人文武維后燕及皇天克昌厥後侍讀臣吕熾朱子曰此美文王之德宣哲則盡人之道文武則備君之德故能安人以及於天而克昌其後嗣也輔廣曰人爲萬物之靈惟通與知所以盡人之道文武之德所該者廣堯之德廣運亦曰乃武乃文而已人道立則天道成故能安人則燕及於天也天之祐君者莫大於予以賢子孫是以能燕及於天則能昌我後嗣也臣謹按從來言君德者必曰聰明睿知故詩頌文德首以宣哲爲言蓋人君身居九五必有以晰事理之微盡物情之變明無不燭幽無不通而後舉而措之天下無非所性之德故言智而仁義禮信皆在其中矣所以能盡人道也宣哲言其心文武言其政文非徒粉飾治平而已本乎心之燦然有章者而見於事之秩然有理蓋禮樂其大端而凡張弛措置之間有經有緯者皆文也武非徒奮揚威烈而已本其心之確乎不㧞者而見於事之毅然有爲蓋兵刑其大端而凡政敎號令之間能斷能持者皆武也此惟宣哲者能之文之能文人皆知之文之能武所謂一怒而安天下之民者詩人兼言之以見君德之備也三代以後若漢之文帝專務以德化民可謂仁厚之主然而匃奴宼邊則欲自將出征法紀所在未嘗過縱所以爲漢之令辟而得不競不絿不剛不柔之道者也夫天之視聽卽民之視聽文武德備而民安則隂陽和風雨時宇内清寧灾沴不作所謂天地位也燕及皇天治之可大者如此由是貽謀式穀謨烈顯承延及子孫丕基永固文武之道永永勿替矣克昌厥後治之可久者如此秉聰明睿智之資而裕經邦定亂之略至治之馨香格於天德澤之涵濡裕於後非大聖孰能當此者乎詩經敬之敬之天維顯思命不易哉無曰高高在上陟降厥士日監在兹侍講臣雙慶朱子曰成王受羣臣之戒而述其言曰敬之哉敬之哉天道甚明其命不易保也無謂其高而不吾察當知其聰明明畏常若陟降於吾之所爲而無日不臨監於此者不可以不敬也臣謹按成王述羣臣之言以作歌深得君道之要當其時國家重熙累洽而兢兢業業交修於廟堂之上者惟是求端於天以無負乎對越之義此所以克臻守成之盛而爲後世致治者法也夫敬者天德王道之本也人君撫馭萬方其位至高其任至重自公孤卿尹以下逮於百官衆職無不禀承意㫖奔走贊襄之不遑而臨之在上者則天也且夫人主之敬天豈必求之蒼穹之表而徒飾夫升降祼獻之文哉雨暘寒燠徵之一身風霆流形通之一念是舉動皆天也天叙天秩惟君操之天命天討惟君奉之是政事皆天也故敬天之道不外君身而得之一言之微一行之細無愧於心則無愧於天矣一賢否之黜陟一賞罰之榮辱不愧於人則亦不愧於天矣嘗觀周書召誥洛誥諸篇一時明良交儆反覆於天人之際者深切著明與此詩足相表裏宋儒眞德秀纂輯大學衍義於崇敬畏一條歴引古帝王敬天修己之事以證之蓋實有見於天人一理通逹無間故備述之以動黼座之省覽也抑成王之詩爲君言也孔子謂事君敬其事則臣道之要又豈外於一敬哉誠使君以敬天者率其臣臣以敬君者對於天斯君臣一德而國家收久安長治之效矣詩經敬之敬之天維顯思命不易哉無曰高高在上陟降厥士日監在兹編修臣劉慥朱子曰成王受羣臣之戒而述其言曰敬之哉敬之哉天道甚明其命不易保也無謂其高而不吾察當知其聰明明畏常若陟降於吾之所爲而無日不臨監於此者不可以不敬也臣謹按人君受天命爲天子則天與君息息相關之際其臨監倍嚴而昭視倍顯自非敬何以善承天心也哉蓋天以萬方臣庶寄於一人則天下之人皆待命於一人天愛天下之人必重愛一人愛之重則責之甚周察之甚密匪第曰天高聽卑己也自呼吸語黙以及周旋百度眞無時無地無事不與一人相維繫其感通昭鑒㨗於影響又隱以予奪之權得失之機深爲儆惕則一人之所以畏天法天其敬可容稍懈耶朱子釋敬曰主一無適又曰心有主則自治嚴人君惟常存此心寅恭儼恪久而彌純斯可與天脗合於無間然自古帝王非不刻勵於前而每多怠荒於後者無亦以心之不克有主而因以敬之不克有終乎昔唐太宗謂近臣曰人主惟有一心而攻之者甚衆或以勇力或以辯口或以謟諛或以奸詐或以嗜慾輻輳攻之各求自售以取寵祿人主少懈而受其一則危亡隨之此其所以難也觀太宗斯言知敬之在人主尤易失而亦易怠夫轉瞬之失百行莫補片念之怠終身莫贖雖積從前之兢業且盡隳於一旦而天命之去留卽隱繫於此者人主返觀内照可弗思所以堅厥志歟夫君道乾道也惟體乾之剛健以持敬則時無久暫地無遠邇事無鉅細俱常凛一陟降厥士日監在兹之心刻刻戒懼凡一動一靜憬然有覺久則内念不起外念不生而非幾之貢無自萌矣由是用人行政皆體天位天職之意與爲經綸而或舉或措必協其宜爲張爲弛必求其當勿拘一己之見勿狥一念之偏勿率意而茍且權宜勿隨時而因仍遷就則私欲盡凈天理流行此心廓然大公物來順應用人而朝皆善類行政而野無澆風斯天命其永保矣乎無曰高高在上者蓋人君視天爲遠則妄念必乘不知念之所由乘卽幾之所畢露匪特紛紜憧擾大拂乎天卽過任聰明予智自聖亦皆棄天䙝天之漸萌所以匹夫勝予欿然不足雖􅉏御左右燕閒斯湏無時不有欽承上帝者惕於其側易曰敬以直内惟内直則偏倚邪慝於以悉冺將清明在躬治化咸理五行不相沴四時若其序卽景物山川皆可以徵敬德之洋溢也且天心仁愛人君董仲舒嘗言之矣國家偶有灾患或亦氣數適然然人君不得諉之氣數也天旣明以象告則所以致此者必有其端因而倍加修省益深乾惕斯災消患釋轉危爲安由是以思則天道之顯不更昭然如揭耶夫成王接文武之心傳敬止敬勝家法可師且宥密基命其至德淵微有非臣下所能窺者若乃羣臣之戒亦屬恒言而並轉述其詞彌切謹凛蓋其無念不敬卽偶有所觸盡皆箴銘不敢以習見熟聞忽而不察此亦猶夫厪昭事拜丹書之心所以紹庭陟降緝熙光明君德成而聖治備周道於以永昌也詩經敬之敬之天維顯思命不易哉無曰高高在上陟降厥士日監在兹編修臣趙青藜朱子集傳曰顯明也思語辭也士事也臣謹按集傳以此詩爲成王述羣臣進戒之辭而成王法天之實卽具於此夫天命流行物與无妄誠之所以行健而不息也終日乾乾對越上帝敬之所以貞勝而有常也程子曰誠則無不敬敬則可以至於誠是敬者千聖之心傳百王之大法而基命凝承所以事天之實功也人皆曰高高左上者天耳㝠漠之表不知其爲顯也又烏識所謂命之不易哉顧以爲㝠漠之天則遠以爲陟降之天則邇以爲㝠漠之天則隱以爲監兹之天則著且是陟降而監兹者豈㝠漠中眞見上帝之臨汝亦此心自具之天不可掩耳不可掩者誠也詩曰昊天曰明及爾出王昊天曰旦及爾游衍出王也游衍也孰知之又孰知其及之乎故善言天者必有騐於人善言人者必有見於心易列隂陽柔剛而推本於元亨利貞凡人性之仁義禮智與人情之喜怒哀樂悉根乎是矣其言天也精而微疇衍水火木金而次及於貌言視聽凡建極之肅乂哲謀與贊化之雨暘燠寒舉統乎是矣其言天也廣而大廣大者非遠精微者非隱則皆天之陟降監兹也則皆人心之敬不可斯須去也矧在上之天與在心之天政不相遠如以爲㝠漠而忽之何以曰天視天聽又何以曰帝省帝謂且曰乃眷西顧耶故書曰天有顯道厥類維彰惟此心自具之天不可掩故動而有爲則天機之觸發也靜而寂處則天理之黙成也人無一事不依於心卽無一事不依於天天固無一事而不陟降焉人無一時不運乎心即無一時不運乎天天固無一時而不監兹焉無一事不陟降由是則雖有其事之可自便者而有所不爲也無一時不監兹由是則雖有其時之可自安者而有所弗肆也兢兢焉業業焉貫終始徹内外惰慢之氣不設於身體匪僻之私不形於動靜誠知天命之不假易而莊敬日强以盡事天之實功也是以成王之時嘉禾來歸四海乂安豈不可以優游而臻上理黼黻而享太平又况天之命周周之受天自后稷以迄文武共閱歴十數王於兹命之有常誠莫若周而其臣之進戒與其君之述以自警於天命真若有難諶者蓋天命與斯心相呼吸而斯心以敬肆爭去留敬有時或間而取必於在天之命成王所不敢也故曰成王不敢康夙夜基命宥密其爲周之令主宜哉詩經敬之敬之天維顯思命不易哉無曰高高在上陟降厥士日監在兹檢討臣陸宗楷朱子集傳成王受羣臣之戒而述其言曰敬之哉天道甚明無謂其高而不吾察當知其聰明明畏常若陟降於吾之所爲而無日不臨監於此者不可以不敬也臣謹按聖人之膺圖受籙而撫馭寰區也繼天立極者寵綏之任代天理物者君師之責其實天人相與之際流通罔間息息有其相關必念念深其無逸而後有以克享乎天心則敬者聖功之本王道之全出政臨民之大原而保㤗持盈之至計也是以古之帝王莫不兢業以亮天工堯曰欽若昊天舜曰勅天之命惟時惟幾湯則顧諟明命文武則小心翼翼以昭事執競無競以對越皆此意也至於成王承奕葉之積功累仁纘再傳之耿光大烈而君臣之交儆惕於天命之不易而重言以致敬者非無說也蓋守成之主席豐履厚其經營締造不必如開創之艱則晏安易起况成王之時天下之太平久矣聲教四訖兵革不興歲慶屢豐俗稱刑措已治已安而或自暇自逸亦賢哲所不免也且以冲齡踐阼雖疑丞保傳毓德青宫養成睿質而乾惕之偶弛不能要諸久道尤宜隨時加警者也所以君歌臣拜而作詩以告䖍者凛凛於天有顯道惕惕於天高聽卑念陟降之非遥思監觀之有赫而總以一敬爲兢兢且夫天者非㝠漠之謂也有在我之天有在天之天求在我之天者處深宫而若帝鑒之孔昭對大廷而如在帝之左右清心寡慾必求無違乎天理發號施令必思無拂乎天心求在天之天者嚴對越則必懾志而凝神大肆類則必竭情而備物瑞應所昭不敢自侈益懋德以副天心咎徵所値不敢自諉必責躬以回天意萬幾無不理一息不敢康而後可爲祈天永命而不愧雖然天道遠人道邇言天者必有驗於人書曰天視自我民視天聽自我民聽又曰天聰明自我民聰明天明畏自我民明威天心之仁愛全在斯人聖主之敬天端在勤民而已蓋有以下孚乎民隱卽有以上契乎天心其感應之不爽影響鼓桴莫喻其㨗此唐虞三代之治萬古常昭成王雖處明盛之時殫緝熙之學而不憚反覆申明以致意也語曰爲君難不誠然乎哉詩經日就月將學有緝熙于光明監察御史臣李文駒臣謹按聖人之性生知安行者也其天亶聰明原自首出庶類而揆之聖敬之思則有亹亹焉與時交進者蓋人以學爲學聖人以天爲學所謂健行不息與日月合其明也周頌曰日就月將學有緝熙于光明此成王之自叙其學也夫聖人之學也求多聞而建事師古訓而有獲窮理居敬夙夜不敢康曾子曰尊其所聞則高明矣行其所知則光大矣董仲舒曰彊勉學問則聞見博而知益明彊勉行道則德日起而大有功由是言之學也者聖功之本也朱子曰考之事爲之著察之念慮之微求之文字之中索之講論之際自一物之中莫不有以見其當然而不容己與其所以然而不可易者蓋聖人以剛健爲心懋昭厥德日有所就則念兹在兹釋兹在兹也月有所將則往而不息進而无疆也說命有云惟學遜志務時敏非就將之謂乎由是學與學相繼有緝之象焉學與學相融有熙之象焉時序代嬗而綿綿不已文王之德之純也時時用其袚濯卽時時進於昭融成湯之日新又新也推致之功旣至不息之用斯彰存爲悠遠發爲高明有不自就將中來者哉易曰剛健篤實輝光日新其德又曰其德剛健而文明應乎天而時行居九重之上而光照乎四海九州之遥立一時之法而明見乎百年必世之遠此聖人憲天之學偕日月同運並行而與天不息者歟詩經自今以始歲其有君子有穀詒孫子監察御史臣陸秩臣謹按詩傳曰有有年也穀善也或曰祿也詒遺也鄭康成曰君民相樂則隂陽和而有豐年其善道則可以遺子孫何楷曰國以民爲本民以食爲天使歲歲豐登家給人足是卽君子之享有天祿也曹粹中曰治道得自此年穀常登子孫相承力於爲善黃佐曰豐年而繼於後則常有以需國用而贍民生善道而傳於後則常有以固人心而承天命蓋古者天子以多福綏諸侯俾緝熙於純嘏而諸侯亦均其福於萬民夫福者備也順也無所不順之謂備詩之勤民者曰率時農夫曰稼穡匪懈順作訛成易之宜備雨暘燠寒之序凡以言人事也若夫百穀順成非人之所能爲也天也帝命率育於是貽我來牟而多黍多稌萬億及秭婦子以寧百室以盈是卽所謂福也是故人臣之稱願其君者未嘗侈陳瑞應惟以綏萬邦屢豐年爲自天降康爲農夫之慶則所以錫兹祉福者在此所以惠我無疆者在此而子孫於以保之矣春秋於有年大有年必書公羊謂其以喜書也豈不誠然乎漢食貨志曰餘三年食曰登再登曰平三登曰太平又云歲有上中下三熟上熟其收自四餘四百石中熟自三餘三百石下熟自倍餘百石韓詩外傳曰夫百姓内不乏食外不患寒則可敎御以禮義矣詩云以洽百禮百禮洽則百意遂百意遂則隂陽調隂陽調則寒暑均而三光清風雨時而羣生遂劉向之言又有云朝臣和於内萬國歡於外天應報於上以和致和則獲天助也今詩人君臣宴樂而相期於以介我黍稷以穀我士女垂裕後昆勿替引之可謂和矣故鄧元錫云有駜有小雅慈惠之心焉上下交則和而安抑臣得推廣其說春爲歲之始寅爲春之始揆詩人之頌君子者有百度維新之象焉且夫君子以穀詒孫子固矣而天下之臣民皆君子之孫子也萬世之臣民皆君子之孫子也天下爲家萬世永賴其君子罄無不宜受天百祿之深㫖哉詩經聖敬日躋侍讀學士臣齊召南臣謹按自古帝王之治皆本於道帝王之道皆本於心治法或隨時世以變通心法實亘萬古而不易詩書紀唐虞三代之治詳矣并其致治之心而詳之若揭其要歸則未有外於敬之一言者也商頌贊成湯曰聖敬日躋至哉言乎心一耳而人心道心判焉判於敬與怠也其自敬而日流於怠也甚易其自怠而日趨於敬也甚難善學者惟其不安於易而必爲其難使志常足以帥氣理常足以勝私如登高者鼓勇直前如行遠者積久不息則希賢希聖自遞進而不自知彼德至聖人極矣聖人以上寧可復加然其自強必與天之健行相準以其勉勉積爲安安何嘗有一日不用其振厲恪恭之精神乎哉卽如成湯天錫智勇固生而具聖德者也而其所以爲聖則實惟此聖不自聖之心是故不邇不殖清其敬之源也制事制心踐其敬之實也日新又新持其敬於久也克寛克仁大其敬之施也事天以敬則明命顧諟臨民以敬則人紀肇修立政以敬則執中建中競絿剛柔悉化用人以敬則克宅克俊賢德忠良畢登乃至身無可檢猶曰檢身如不及身本無過猶曰改過不吝邦家已輯寧矣慄慄危懼猶不勝其咨嗟兆民已允懷矣子惠困窮猶未釋其隱念表正萬方者當守典常故匪彛慆淫之戒必諄切於造邦也垂裕後昆者先防逸豫故三風十愆之刑備儆於有位也好問則裕自用則小故從諫勿咈卽前世懸鞀設鐸之心勿慮胡獲勿爲胡成故昧爽待旦卽古帝兢業萬幾日愼一日之心也湯之聖德日躋於高明固卽其敬德日躋於純篤者致之乎典謨以欽始以欽終舜之告禹曰敬修其可願詩稱文王曰緝熙敬止武王之受丹書曰敬勝怠者吉帝王以心法爲治法固千載一揆也詩經聖敬日躋檢討臣德保嚴粲曰敬爲聖人之敬言至誠也日躋言至誠無息也德日新又日新是聖敬日躋之實卽文王之純亦不已也臣謹按聖學統於主敬自古帝王建極綏猷其道不越乎此粤稽成湯以天錫勇智表正萬邦其勲業隆矣湯之子孫所以歌頌之者宜乎恢張功績形容盛美乃必以聖敬日躋爲昭假上帝之由何哉間嘗反覆其㫖而知詩人不獨善於美湯抑且深有見於聖學之淵源也在昔堯舜以生知安行之聖開精一執中之傳堯之德以欽明舜之德以温㳟皆不外一敬厥後禹之祇德文王之緝熙武王之執競亦惟此主敬之念以纘承前聖道統焉易乾卦曰天行健君子以自彊不息夫惟以乾惕之心自彊不息然後可以法天行健坤之六二曰敬以直内蓋人之一心至虗至靈具衆理而應萬事必主一無適以全其無妄之體而後虗靈不昧者可以復存是心者一身之主宰敬者又一心之根本也洪範曰敬用五事夫貌言視聽思必以敬爲綱維而妄念乃不得以相乘故有㳟從明聰睿之德焉禮三百三千其要統於毋不敬蓋敬則玉帛儀文非爲虗器記曰敬德之輿也有敬乃可載德以行不然徒爲虗車耳周子通書聖學章曰一者無欲也無欲則靜虗動直靜虗則明明則通動直則公公則溥夫無欲之心卽主敬之心也主敬而無一息之間斷則純乎天理而無欲無欲則明通公溥裕如矣程子謂涵養須用敬進學則在致知又曰未有致知而不在敬者朱子則曰知者學之始行者學之終敬者學之所以成始成終是知敬之一字乃致知力行之本存心以敬則致知自能黙會乎事理之當然力行自能剛健篤實以還其性之本然文王小心翼翼孔子告仲弓以出門如見大賔使民如承大祭蓋深知敬乃徹上徹下之聖功也中庸言戒懼愼獨敬也而中和位育胥由是焉可見自下學立心之始以至於參贊化育篤㳟而天下平總不外於一敬故湯之不邇聲色不殖貨利以義制事以禮制心皆一敬之所充積也惟聖敬至於日躋則德日新又新凡所以昭假上帝者以此卽所以懋昭大德建中於民者亦莫不以此焉然則敬之一字誠聖學之淵源而帝王建極綏猷之本也夫詩經不競不絿不剛不柔敷政優優百祿是遒侍講學士臣鄒升恒朱子曰競强絿緩也優優寛裕之意遒聚也輔廣曰湯之負荷天休非有他也本其聖敬只中道上行更無偏倚故其爲政不强不弱不剛不柔優游寛裕此固百福之所聚也臣謹按此言湯之爲政能用其中故能凝承天命也自古論政者不出寛嚴兩途臣以爲政惟以中爲主寛嚴二字皆可不設何則理所當寛則從其寛而不得名之爲寛也中也理所當嚴則從其嚴而亦不得名之爲嚴也中也惟承積玩之後不得不繩之以法或者目之爲嚴而實亦非嚴也中也承積威之餘不可不喣之以恩或者目之爲寛而實亦非寛也中也吕刑世輕世重周禮輕典重典之文謂隨時而矯其偏以適於中云爾不然而心一有所偏則輕重皆失中而寛嚴皆有弊而中又非調停於寛嚴之間而各用其半也有極其嚴而亦中有極其寛而亦中惟權其事理之所適而已詩云不競不絿不剛不柔言湯之建中於民寛嚴皆不足以名之也或曰君道以寛爲本故虞書之頌帝也曰御衆以寛過於寛猶過乎仁不失爲君子也曰是則然矣獨不曰寛之過且流於忍乎如太叔爲政不忍猛而寛其後鄭國多盗興徒兵以攻萑蒲之澤盡殺之則至慈變爲至忍矣子産謂火烈民畏卒稱惠人諸葛亮治蜀用法尚嚴而國大治王猛之治苻秦也亦然是皆於明罰勅法之中寓慈祥豈弟之意義正所以成乎仁而亦無非中也弛而不張文武弗爲寛而有制政是以和烏得藉口於含容而漸流於縱廢乎古稱商道駿肅而臣之頌其君者則曰克寛克仁可以思矣敷政優優百祿是遒者蓋競絿剛柔之胥冺則上無苛刻繳繞之煩亦無頽惰縱弛之患下令而民服有作而必成優游端拱出之裕如而百祿之綏永集於建中之主矣要之湯政之善又本於聖敬日躋敬則不邇不殖志氣清明而偏陂好惡之不作敬則制事制心交修罔懈而惟和惟一之化成此敬之一字尤爲中所由出日新又新所以爲敷政寧人之本也歟詩經不競不絿不剛不柔敷政優優百祿是遒侍講學士臣陳悳華先儒義疏輔廣曰言湯本其聖敬只中道上行更無偏倚故其爲政不強不弱不剛不柔優優寛裕此固百祿之所聚也臣謹按敷政者帝王得人心固天命之大端也而政務劑其偏以歸於至當王道平平王道蕩蕩聖人尚焉是故政有失之好勝而欲速者則爲競有失之因循而茍安者則爲絿有失之夬厲不平與選輭不斷者則爲剛與柔而湯皆無之若此者所謂中也孟子曰湯執中此其實也古之人有董安于者性緩佩弦以自急有西門豹者性急佩韋以自緩是二人者皆自知其病而思有以調之如此若湯則自然中節者也又子産之論爲政也曰火烈民望而畏之水懦弱民狎而翫之權於寛猛之間而以二者相兼爲難湯則二者適善其施焉孔子曰寛以濟猛猛以濟寛政是以和優優云者和之至也此中之用也蓋中則未有不和者也豫順以動故天地如之四時和焉星辰理焉萬物育焉此中和之應於天地者也豈弟君子民之攸墍君子樂得其道小人樂得其欲此中和之感於人心者也蓋百祿是遒之說也湯以聖敬之德上接堯舜之心傳而造有商之天下如此又嘗考之書仲虺之誥有曰王懋昭大德建中于民以義制事以禮制心夫不競不絿不剛不柔卽所謂建中于民也亦卽以義制事以禮制心之實用也但其義無二而詞有不同詩人之詞是本其已然而推美之也誥則猶爲勉詞焉湯聖人也夫豈不足於此必以待勉之而始然然使湯自恃爲吾已能是則非聖人矣且仲虺不以是爲湯所已然而仍復陳告是眞拳拳於君者也此其所以爲聖君賢相歟詩經不競不絿不剛不柔敷政優優監察御史臣周人驥慶源輔氏曰湯之負荷天休者非有他也本其聖敬只中道上行更無偏倚故其爲政不強不弱不剛不柔優游寛裕臣謹按天下事理不越一中中也者不偏不倚無過不及之謂如競也剛也失之過者也絿也柔也失之不及者也而總以心之偏倚致之惟心主於敬則偏倚之見不生而過不及之弊自冺輔氏申明中道推本聖敬誠有得於天德王道之奥㫖者臣請推而論之自古英敏之主每多好大喜功其政失之競與剛者居多寛大之朝易致優柔寡斷其政失之絿與柔者居多夫英敏以才勝寛大以量勝果歛其才而裕之以量擴其量而濟之以才於中道其庶幾乎然使見理有未明則以好大喜功爲戒必至以茍且生廢弛以優柔寡斷爲懲必至以急遽啓綜覈將免乎競與剛之弊而絿與柔已中之免乎絿與柔之弊而競與剛又中之雖孜孜求治而遇事周章方補偏救弊之不暇烏覩所謂優優者哉朱子云中無定體隨時而在凡事之來以成見與焉則偏惟順其自然之理以處之可行則行可止則止可急則急可緩則緩將見明作所以有功不可謂之競與剛惇大所以成裕不可謂之絿與柔而獨是事物之理是非介在毫髮從違判於幾希况人君日有萬幾非此心至虗至公何以坐照無遺權衡不爽是可知致治之道不徒視乎才與量而惟視乎人君之一心書曰啓廼心沃朕心董仲舒曰正一心以正朝廷正朝廷以正百官正百官以正萬民誠以君心固天下萬事之樞紐也夫從來銳意圖治之主夙夜憂勞何敢一息自逸第恐精勤之久或自謂已治已安而左右近習窺探意㫖競以聲色宴遊之娛雜然並進君心因之而稍懈庶事必因之而漸隳歴觀史冊炯戒昭然易云天行健君子以自強不息是惟在謹好尚遠嬖倖矢兢業於深宫防怠荒之潛伏庶乎志氣清明措施咸當此聖學之極則卽政治之源流也考書之稱湯有曰不邇聲色不殖貨利又曰以義制事以禮制心斯其說不有可與商頌叅觀者哉詩經不競不絿不剛不柔敷政優優監察御史臣宫焕文臣謹按立政之道貴於權緩急之用而施之悉協其宜酌寛猛之經而措之各當其可蓋競絿剛柔四者推於政體不可以或無而其用不可以偏勝何則事有次第就理而不可以操切病其嚴平易近民而不可以英明形其刻者若一於競且剛焉則太過亦有朝計夕行而不可遲疑以失事機之會專斷立决而不可隱忍以開姑息之原者若一於絿且柔焉則不及過者毗於陽不及者毗於隂毗於陽者妨於仁毗於隂者妨於義皆非優優敷布之道也易稱時止則止時行則行動静不失其時又云知柔知剛萬夫之望人主誠明乎時之義則競絿剛柔之用左宜右有而皆不外於一中執其中以敷之四者不惟不相妨而且以相濟不惟不相勝而且以相成是以詩言不競不絿非政無競絿也競絿各協於中而競絿之迹胥冺詩言不剛不柔非政無剛柔也剛柔悉合於中而剛柔之迹俱化由是以敷政則爲之有本末措之有經權紀綱法度之出於上者能弛能張而不患其或需而或躁慶賞刑威之及於下者能翕能闢而適成其有執而有容将萬事得其理百物順其則朝野上下安其常而王政之優優不可想見於從容敷布之日歟臣觀成湯之爲君也從諫弗咈先民時若其政可謂不苛然而昧爽丕顯又曷嘗有因循不振之氣致隳其明作之才此則不競而亦不絿之明騐也克寛克仁彰信兆民其政可謂不猛然而布昭聖武又曷嘗有牽制不斷之爲致虧其沉毅之度此則不剛而亦不柔之明徵也要之競絿剛柔之用非化其偏則無由平其政而不偏競絿不偏剛柔之政非主夫敬則無由得夫中湯惟有日躋之敬德以爲本故其見之政者無太過亦無不及而當世仰表正之功於不替後世猶頌昭假之烈於勿衰臣嘗因是思之王者所存之心即天心也其所行之道一天道也今夫天道與時消息而日月寒暑自相感於屈伸與時慘舒而雨露雷霆且並彰其温肅王者法天以爲政則緩急一視乎重輕而不疾不徐之中有自然之變化寛猛悉準於中正而不縱不弛之内有互濟之權衡果其爲事宜姑待歟如需之飲食宴樂可也而不然則施祿及下義有取諸夬矣果其爲道宜馴致歟若坤之厚德載物可也而不然則健行不息義有取諸乾矣蓋百年必世之䂓模固不容不出以整暇而一日二日之綜其幾務則又必於怠荒豫儆羣臣百姓之綏乂固不容不撫以温仁而一予一奪之斷自宸衷則又必使威命常伸然則本敬以用中由中以出政惟有純王之心斯有純王之業也夫詩經天命降監下民有嚴不僭不濫不敢怠遑命于下國封建厥福侍讀學士臣汪由敦朱子集傳封大也輔氏廣曰天雖高而實下其監視甚可畏也民雖卑而天實以爲視聽不可忽也惟高宗上畏天下敬民而見於刑賞者未嘗有僭濫之失存於中心者不敢有怠荒之意故天命之以天下而大建其福臣謹按殷武一詩頌高宗之功而此章言其基命之本也聖王行事必求其端於天者誠以天命不易日監在兹君心之敬肆無一息不與天地相流通而往來相應仁人事天如事親不顯亦臨無射亦保職是故也天無心以民爲心民心之所嚮即天意之所歸故曰天聰明自我民聰明天明畏自我民明威人君顧畏於民碞斯能以小民受天永命天人一理通逹無間求端於天者亦於民乎求之而已應天以實不以文動民以行不以言廸畏天顯民衹必致謹於刑賞而深戒夫怠荒何也刑賞者人君之大柄而治亂之所由分也順乎天則與治同道矣咈乎民則與亂同事矣官不及私昵爵罔及惡德斯謂之不僭用其義刑義殺勿用非謀非彛斯謂之不濫然使有一念之弗謹則怠氣乘之而僭濫之端不能自制故臯陶陳謨曰天命有德五服五章哉天討有罪五刑五用哉而即繼之曰政事懋哉懋哉此所謂無教逸欲有邦兢兢業業誠恐稍戾乎命討之公而偶違夫無怠無荒之戒也誠能不僭不濫不敢怠遑則朝無倖位國無寃民庸庸祇祇威威各得其道於是百度惟貞萬事就理朝廷清明民氣和樂天心昭應有不錫之以福者乎詩曰昭事上帝聿懷多福人君普其福於四海而即以四海之福爲福福之所以大也書稱高宗嘉靖殷邦至享國五十有九年頌亦曰壽考且寧以保我後生其福不亦大乎永言配命自求多福其必於刑賞政事加之意哉詩經天命降監下民有嚴不僭不濫不敢怠遑命于下國封建厥福編修臣夏廷芝朱子曰天命降監不在乎他皆在民之視聽則下民亦有嚴也惟賞不僭刑不濫而不敢怠遑則天命之以天下而大建其福邱濬曰人君之刑賞非一己之刑賞乃上天之刑賞也非上天之刑賞乃民心之刑賞也賞一人必衆心之所同喜刑一人必衆心之所同怒民心所同即天意所在也臣謹按人君撫馭萬方臣民待命而鼓舞激勵所以建極於天下者大權有二曰賞曰罰而已賞罰之權惟君主之而君未嘗私擅也必本其道於天所謂天命天討者是也天之命討亦非可臆度也必協其理於民所謂公好公惡者是也民心協則天意從而君之刑賞乃悉當夫權衡以永弭夫僭與濫之失焉唐虞之世五服五章五刑五用君咨臣儆凛凛而不敢忽成周以八則治都鄙以八柄馭羣臣而於爵賞之事縷析條分詳其規制唐太宗曰有功則賞有罪則罰誰敢不竭心盡誠以修職業誠以賞罰者國家之綱紀朝廷之勸懲臣工之法守百姓之從違胥於是繫焉綱紀立則勸懲行勸懲行則法守定法守定則從違準其君子知賞之不可倖邀也益勉爲君子而小人則知一䧟不義放流誅殛不容稍寛将惕息恐懼化其邪慝之衷趨於中正之路豈非鼓舞一世之人心激勵天下之志氣端藉是哉抑又思之賞罰之權固在持之不易而宜賞宜罰之理尤在審之必眞惟聖人之心鑑空衡平本無偏倚其未與物接也存之以誠主之以敬無時不凛上帝之監觀及其既與物接也又能隨感輙應剖决是非權衡得失賞所當賞罰所當罰則恩澤所加如天之雨露沾被乎庶彚而無所私也懲創所及如天之雷霆震動乎萬物而不少貸也用舍悉當乎理好惡胥同乎民將天下之臣民莫不遵道遵路共安於範圍曲成之内而大君之所以建其有極以錫福於庶民者亦永永而無斁矣御覽經史講義卷十九
