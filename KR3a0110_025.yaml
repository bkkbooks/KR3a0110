front:
  text: 欽定四庫全書御覽經史講義卷十九目録
  hash: sha256:948c7f5af66c47a9306cb97826e508f1eb5940d6d7713357fec1caba1e083414
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_025-1a, image: WYG0722/WYG0722-0175a.png}
body:
  text: 詩經於穆清廟肅雝顯相濟濟多士秉文之徳對越在天駿奔走在廟不顯不承無斁於人斯給事中臣倪國璉無封靡于爾邦惟王其崇之編修臣張映斗天作高山太王荒之彼作矣文王康之右中允臣齊召南昊天有成命二后受之成王不敢康夙夜基命宥密於緝熙單厥心肆其靖之侍講臣張映辰洗馬臣佟保編修臣李龍官成王不敢康夙夜基命宥密於緝熙單厥心肆其靖之編修臣王居正夙夜基命宥密於緝熙單厥心檢討臣葉一棟夙夜基命宥密編修臣路斯道編修臣歐陽正煥我将我享維羊維牛維天其右之儀式刑文王之典日靖四方伊嘏文王既右饗之我其夙夜畏天之威于時保之編修臣朱佩蓮我其夙夜畏天之威于時保之編修臣秦蕙田嗟嗟臣工敬爾在公王釐爾成來咨來茹編修臣沈昌宇宣哲維人文武維后燕及皇天克昌厥後侍讀臣吕熾敬之敬之天維顯思命不易哉無曰髙髙在上陟降厥士日監在兹侍讀臣雙慶編修臣劉慥編修臣趙青藜檢討臣陸宗楷日就月將學有緝熙于光明監察御史臣李文駒自令以始歲其有君子有榖詒孫子監察御史臣陸秩聖敬日躋侍讀學士臣齊召南檢討臣徳保不競不絿不剛不柔敷政優優百禄是遒侍講學士臣鄒升恒侍講學士臣陳悳華不競不絿不剛不柔敷政優優監察御史臣周人驥監察御史臣宮煥文天命降監下民有嚴不僭不濫不敢怠遑命于下國封建厥福侍讀學士臣汪由敦編修臣夏廷芝
