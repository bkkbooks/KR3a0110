  text: 欽定四庫全書御覽經史講義卷六目録
  hash: sha256:f15b95d8134e21216381284e1dae98bed7a41c335eb6fa8c5da526ecb03b705e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_012-1a, image: WYG0722/WYG0722-0144c.png}
body:
  text: 周易咸亨利貞咸感也柔上而剛下二氣感應以相與止而說天地感而萬物化生聖人感人心而天下和平編修臣萬承蒼天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣編修臣僧格勒聖人感人心而天下和平編修臣鄧時敏編修臣林蒲封編修臣路斯道象曰山上有澤咸君子以虛受人編修臣孫灝檢討臣萬松齡監察御史臣萬年茂君子以虛受人修撰臣錢維城編修臣周玉章監察御史臣張孝挰恆亨無咎利貞久於其道也天地之道恆久而不已也侍讀學士臣世臣天地之道恆久而不已也監察御史臣陸秩日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恆而天地萬物之情可見矣檢討臣萬松齡聖人久於其道而天下化成侍讀臣林蒲封編修臣吳嗣富監察御史臣侯嗣達監察御史臣楊勳雷風恆君子以立不易方監察御史臣周祖榮明出地上晉君子以自昭明德給事中臣陸尹耀上火下澤暌君子以同而異庶子臣林蒲封損而有孚元吉無咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虛與時偕行監察御史臣陸尹耀益利有攸往利涉大川彖曰益損上益下民說無疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行監察御史臣陳大玠益損上益下民說無疆自上下下其道大光益動而巽日進無疆天施地生其益無方凡益之道與時偕行侍讀臣李清植益損上益下民說無疆監察御史臣沈廷芳益動而巽日進無疆天施地生其益無方凡益之道與時偕行諭德臣覺羅蘇岱編修臣馮秉仁給事中臣朱鳯英益動而巽日進無疆編修臣秦勇均監察御史臣吳文煥天施地生其益無方監察御史臣楊勳
