front:
  text: 欽定四庫全書御覽經史講義卷九目録
  hash: sha256:e6a894dcba5c8e98a7313a42af9ed6ddc23c66fe504e7a94ea241f983317ac97
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_015-1a, image: WYG0722/WYG0722-0151c.png}
body:
  text: 書經欽明文思安安監察御史臣熊學鵬克明俊德以親九族九族既睦平章百姓百姓昭明協和萬邦黎民於變時雍監察御史臣彭肇洙帝曰咨汝羲暨和朞三百有六旬有六日以閏月定四時成嵗允釐百工庶績咸熙監察御史臣陳大玠以閏月定四時成嵗監察御史臣歐堪善輯五瑞既月乃日覲四嶽羣牧班瑞于羣后修撰臣金甡敷奏以言明試以功車服以庸編修臣何其睿編修臣王居正敷奏以言明試以功編修臣李友棠欽哉欽哉惟刑之恤哉監察御史臣廖必琦詢于四嶽闢四門明四目達四聰監察御史臣鄒一桂咨十有二牧曰食哉惟時編修臣于振編修臣林令旭編修臣徐景熹帝曰契百姓不親五品不遜汝作司徒敬敷五教在寬右中允臣官保敬敷五教在寬編修臣孫人龍編修臣張九鎰夙夜惟寅直哉惟清給事中臣邵錦濤監察御史臣齊軾帝曰夔命汝典樂教胄子直而溫寬而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和檢討臣德保詩言志歌永言聲依永律和聲監察御史臣丁廷讓命汝作納言夙夜出納朕命惟允給事中臣楊二酉夙夜出納朕命惟允給事中臣鹿邁祖帝曰咨汝二十有二人欽哉惟時亮天功編修臣蔣麟昌監察御史臣李㥳欽哉惟時亮天功監察御史臣胡寶瑔監察御史臣張日譽監察御史臣永世三載考績三考黜陟幽明庶績咸熙右中允臣朱良裘修撰臣金德瑛
  hash: sha256:b42b01603d93978c90d3c43d2f310813e052f98fbd58dd560d01ce65341dd7b8
