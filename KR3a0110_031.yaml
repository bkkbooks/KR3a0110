  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_031-1a, image: WYG0722/WYG0722-0185c.png}
body:
  text: 周禮乃立天官冡宰使帥其屬而掌邦治以佐王均邦國監察御史臣趙青藜以九職任萬民一曰三農生九榖檢討臣周長發以九式均節財用監察御史臣周祖榮以官府之六叙正羣吏一曰以叙正其位二曰以叙進其治三曰以叙作其事四曰以叙制其食五曰以叙受其會六曰以叙聽其情編修臣王會汾以聽官府之六計弊羣吏之治一曰廉善二曰廉能三曰廉敬四曰廉正五曰廉灋六曰廉辨編修臣儲晉觀檢討臣興泰箴檢討臣徳保監察御史臣胡寳瑔監察御史臣劉方藹因此五物者民之常而施十有二敎焉一曰以祀禮敎敬則民不茍二曰以陽禮敎讓則民不爭三曰以隂禮教親則民不怨四曰以樂禮教和則民不乖五曰以儀辨等則民不越六曰以俗教安則民不偷七曰以刑敎中則民不虣八曰以誓敎恤則民不怠九曰以度敎節則民知足十曰以世事敎能則民不失職十有一曰以賢制爵則民慎徳十有二曰以庸制禄則民興功編修臣莊存與周禮大司徒之職以荒政十有二聚萬民一曰散利二曰薄征三曰緩刑四曰弛力五曰舍禁六曰去幾七曰眚禮八曰殺哀九曰蕃樂十曰多昏十有一曰索鬼神十有二曰除盗賊侍讀臣惠士竒以荒政十有二聚萬民編修臣于振正月之吉始和布教于邦國都鄙乃縣敎象之灋于象魏使萬民觀教象挾日而斂之乃施教灋于邦國都鄙使之各以敎其所治民令五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賓鄉大夫之職各掌其鄉之政敎禁令正月之吉受教灋于司徒退而頒之于其鄉吏使各以教其所治以考其徳行察其道藝三年則大比考其徳行道藝而興賢者能者鄉大夫帥其吏與其衆寡以禮禮賓之檢討臣張鵬翀正月之吉始和布教于邦國都鄙乃縣敎象之灋于象魏使萬民觀敎象挾日而斂之乃施教灋于邦國都鄙使之各以教其所治民編修臣劉綸令五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賓監察御史臣沈廷芳
  hash: sha256:1af849bdfa580821fc3711f24efb347582053b152360b0bfd1da2f9082e2a239
