  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_031-1a, image: WYG0722/WYG0722-0185c.png}
body:
  text: 周禮乃立天官冡宰使帥其屬而掌邦治以佐王均邦國監察御史臣趙青藜以九職任萬民一曰三農生九榖檢討臣周長發以九式均節財用監察御史臣周祖榮以官府之六敘正羣吏一曰以敘正其位二曰以敘進其治三曰以敘作其事四曰以敘制其食五曰以敘受其會六曰以敘聽其情編修臣王會汾以聽官府之六計弊羣吏之治一曰廉善二曰廉能三曰廉敬四曰廉正五曰廉法六曰廉辨編修臣儲晉觀檢討臣興泰針檢討臣德保監察御史臣胡寶瑔監察御史臣劉方藹因此五物者民之常而施十有二教焉一曰以祀禮教敬則民不茍二曰以陽禮教讓則民不爭三曰以隂禮教親則民不怨四曰以樂禮教和則民不乖五曰以儀辨等則民不越六曰以俗教安則民不偷七曰以刑教中則民不暴八曰以誓教恤則民不怠九曰以度教節則民知足十曰以世事教能則民不失職十有一曰以賢制爵則民慎德十有二曰以庸制祿則民興功編修臣莊存與周禮大司徒之職以荒政十有二聚萬民一曰散利二曰薄征三曰緩刑四曰弛力五曰舍禁六曰去幾七曰眚禮八曰殺哀九曰蕃樂十曰多昏十有一曰索鬼神十有二曰除盜賊侍讀臣惠士竒以荒政十有二聚萬民編修臣于振正月之吉始和布教于邦國都鄙乃縣教象之法于象魏使萬民觀教象挾日而斂之乃施教法于邦國都鄙使之各以教其所治民令五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賓鄉大夫之職各掌其鄉之政教禁令正月之吉受教法于司徒退而頒之于其鄉吏使各以教其所治以考其德行察其道藝三年則大比考其德行道藝而興賢者能者鄉大夫帥其吏與其衆寡以禮禮賓之檢討臣張鵬翀正月之吉始和布教于邦國都鄙乃縣教象之法于象魏使萬民觀教象挾日而斂之乃施教法于邦國都鄙使之各以教其所治民編修臣劉綸令五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賓監察御史臣沈廷芳
