body:
  text: 詩經倬彼雲漢為章于天周王夀考遐不作人檢討臣出科聨臣謹按此詠歌文王之德而指聖德之及人也夫人之知愚賢否萬有不齊安能一一唘迪其聰明變移其心志耶然而聖人不以一身之德為德而必使天下之人材得所成就則三德六德合之皆足以見聖德此作人之所以歌文德也今夫天上有雲漢積氣在箕斗二星之間而天文以昭聖人享祚綿久積德於緝熙敬止之內而人文以萃其致一也顧考文王當日三分天下才有其二風聲則仁暴雜施習俗則淑慝異路竊疑其教化之多扞格然而文王以亹亹之德薰蒸浸灌故一時疏附先後奔走禦侮無不各得其人雖肅肅兔罝皆干城好仇况乎以聖人之德履九五之位其作人之盛不與在天雲漢彰彰明哉嘗因是求之天下未嘗無才也惟人主有以作之槃圓則水圓盂方則水方作之以觀感也洗金必以鹹刻玉必以酥作之以造就也馬之蹄齧者必善走其不善者必馴作之在駕馭也貞觀之朝勵精圖治當時君明臣良而裴矩之佞於隋者亦忠於唐祥符之世崇信邪說當時一倡百和即王旦之謇諤於前者旋且依阿於後宋臣楊時有言戰國之士務竒謀而不循正道西漢之士喜功名而不務竒節東漢之士貴節義而不通時變東晉之士樂恬曠而不孚實用豈獨其時使然哉亦上所以作之者異耳夫作之之道非一朝一夕之故必需以歲月漸以教化然後耳濡目染咸鼓舞於不自知其在天也金水之精積而雲漢為章聖人之久道化成以甄陶一世之人才亦若是而已思齊之詠文王也曰成人有德小子有造此文王作人之實也清廟之詩又曰秉文之德夫多士自修其德而反曰文德不可見聖德之及人者深而作人之雅化足以立極千古也哉詩經追琢其章金玉其相勉勉我王綱紀四方檢討臣張鵬翀朱子曰追雕也金曰雕玉曰琢相質也勉勉猶言不已也凡網罟張之為綱理之為紀追之琢之則所以美其文者至矣金之玉之則所以美其質者至矣勉勉我王則所以綱紀乎四方者至矣言文王之德有以振作綱紀天下之人而人自歸之又語録云四方皆在他線索內故牽著便動也臣謹按朱子云文王性與天合乃生知之大聖又言文王之聖與堯舜一般固所謂不思不勉從容中道者已乃詩之咏文王者曰亹亹曰翼翼而此詩又言勉勉若不容有一息之或間者何與臣嘗誦而繹之以為追琢金玉者聖德之純也綱紀四方者王道之備也而勉勉不已者一敬之貫徹乎始終表裏而為天德王道之總㑹者也蓋人心之危而道心之微雖上哲不能無人心故書有惟狂克念作聖惟聖罔念作狂之言且人主一心而引之者百端無論聲色嗜好即意念之萌稍有所向則投間抵隙不自知其浸淫而入矣故以文王之聖而勉勉不已未嘗有瞬息之或間是以緝煕敬止而為萬世法也詩所謂無畔援無歆羡不顯亦臨無斁亦保不聞亦式不諫亦入者盡之矣臣嘗推論文王之聖所以極乎追琢金玉之美而為綱紀四方之本者不獨德極其盛遇亦曠古獨隆王季作於前武周述於後而復有思齊之聖母嗣音之聖后為之養成贊助於其內故自雍宫肅廟以逹於邦國之逺皆其盛德之積厚而流雖不敢盤游不遑暇食而未嘗無靈臺靈沼之樂琴瑟鐘鼓之娛內而樛木螽斯宫闈化洽外而薪槱棫朴多士景從鳯鳥和鳴騶虞叶應其德遇之盛感被之深若此而皆自勉勉之一心操之宜乎四方之懷德畏威無不就其綱紀也至其綱紀四方之實政雖不可悉考如書所稱眀德慎罰惠鮮懷保孟子所稱發政施仁必先煢獨制田樹畜善養老者足以該之而視民如傷望道未見尤其心法之純統乎天德王道之全者也臣竊謂為治之不可無綱紀也微獨三古即漢唐以來亦未有舍此而可以治天下者朱子謂漢大綱正唐萬目張宋大綱正萬目亦不盡張蓋綱紀雖具而為治之本不能如聖人之純亦不已則必有偏而不舉之處而天下之弊即乘之尚寬者必流為姑息尚嚴者必入於苛急蓋寬者為政之大體而姑息非寬適足以壞寬法制禁令不得不嚴而施之過當操之過急徒足以滋擾而無益其弊皆由於綱紀之不肅民無定志以至寬猛雜施慢殘交困而文武之道所為一張一弛者不如是也我皇上德盛遇隆洵可嫓美成周而薄海內外聲教四訖視岐豐之化行一隅固宜不足為比然臣竊仰見我皇上聖不自聖之心安益求安之治則所謂追琢金玉勉勉不已之功固必期至於堯舜而後止而所謂綱紀四方者尤願日加之意焉當今憲章完具而奉行不免懈弛德澤日加而寬厚或誤為姑息游惰衆而生養益難獄訟繁而盜賊滋熾誠使紀綱法度截然而不可犯則幸免者息心偷惰者滌慮寬大之意自流於恪恭震動之中重農桑以殖衣食除奸宄以安善良大端不越數事每嵗責成大吏核實考課不過一二條必求實效母取具文數年之內紀綱備舉黜陟嚴眀漸摩既久自然淪浹純王之治不難比隆若但隨時補苴逐事匡救縱有良法美意雜然並行奉行文書徒掛墻壁朝更暮改徒滋怠玩必致互相蒙蔽政以賄成恐非所以綱紀四方之道也然則先儒所謂有天德乃可行王道如文王之勉勉不已則四方雖逺日在運量之中正朱子所謂牽著便動者寧有偏而不舉寬猛雜施之弊乎臣更有進焉者天德王道要在慎獨天理人欲同行異情崇髙富貴之難處有甚於貧賤憂戚者此堯舜所以戰戰栗栗日慎一日惕然於人心道心之危微而以一敬為之樞要也詩經追琢其章金玉其相勉勉我王綱紀四方檢討臣傅隆阿元許謙曰此言文王之德之純也文之見乎外者固若金玉之追琢質之存乎中者則實金玉也表裏如一豈致飾於外而已故勉勉其德之我王能綱紀乎四方也臣謹按帝王之所以為治即帝王之所以為學而帝王之所以為學亦曰敬而已矣蓋敬則無間故自內及外表裏如一也敬則無息故自始至終後先罔斁也人見總攬萬方紀綱大政以為此帝王之治也而不知實本於學人見夙夜黽勉不敢荒寧以為此帝王之學也而不知總歸於敬此棫朴之詩所以於文王得人之盛推本其敬德之純而以追琢金玉興我王之勉勉也夫以文王之德而言則徽柔懿恭惠鮮懷保方且不聞亦式不諫亦入矣此固天姿粹美不假修為者若論其得人之盛則有疏附有先後有奔奏有禦侮濟濟多士文王以寧斯即端拱無為亦坐致海隅寧謐矣又何須勉勉哉而不知聖人之質雖處於生安而聖人之心自昭其嚴翼故其敬之在於一身者不顯亦臨無射亦保何勉勉也而無然畔援無然歆羡則為一身之綱紀矣敬之在於一家者雍雍在宫肅肅在廟何勉勉也而刑於寡妻至于兄弟則為一家之綱紀矣敬之在於國與天下者不敢自暇自逸以成康功田功何勉勉也而不識不知順帝之則則為國與天下之綱紀矣然則敬也者為學之本即出治之本也自堯舜禹湯以迄文王所謂憂勤惕厲以為傳心之要者此耳許謙因文王得人之盛推本於敬德之純誠見夫張之為綱理之為紀者胥於是出矣信乎帝王所以為治即帝王所以為學歟詩經追琢其章金玉其相編修臣邵齊燾毛萇傳相質也孔疏引王肅云以興文王聖德其文如雕琢矣其質如金玉矣鄭元箋相視也猶觀視也追琢玉使成文章喻文王為政先以心研精合於禮義然後施之萬民視而觀之其好而樂之如覩金玉然言其政可樂也臣謹按此詩毛鄭異解孔頴逹謂箋之所以易傳者以上言作人下言綱紀皆是政教之事則此亦述政教矣聖人體自生知性與道合不當於此輒譽文王美質故易之由傳言之則是觀追琢之文而知其有金玉之質茍非實有是質即不能成其文蓋重乎其有金玉之質也由箋言之則是有追琢之功然後成金玉之觀茍其功有未極則其觀亦不光蓋重乎其有追琢之功也夫謂聖人本有其美質而後能修飾以成文章此其理固然然此特就其自然之文質而譽之耳若夫鄭氏之說則以聖人之於政教其専精殫慮必如良工之治寶器使觀之者莫不欣喜樂覩而知其可貴此則舉聖人研辨義理之精思與萬民舞蹈德化之氣象皆可紬繹而得其意焉較而論之箋義為尤長矣夫聖人修身治民之道未有不由研精義理而得之者蓋義理之為數最為深微而謹嚴聖人之用心獨能密緻而詳盡其研之也至周至悉故其施之也至精至當此即中庸擇善之功虞書執中之事也夫然後粲然成文萬物樂覩此即所謂思我王度式如玉式如金者也今夫金玉之為物其精純也無纎芥之雜其粹美也無毫髮之疵而非有良工者為之磨礱攻錯雕文刻鏤亦安能成其寶器而示人以可貴哉以此知詩人比物連類蓋不獨歎美之詞實有推本之論焉且不特此詩也夫淇澳之詩始之以如切如磋如琢如磨言學問自修精而益精也其諸追琢其章之謂歟終之以如金如錫如圭如璧言盛德至善其光有耀也其諸金玉其相之謂歟詩經勉勉我王綱紀四方監察御史臣胡寶瑔臣謹按治天下之道必本乎君德之純惟懋修在上純而無間則緝煕光眀內外皆主於敬而所以維繫乎人心者雖以四方之大其趨向之誠莫不共在帡幪之中而連而相屬矣棫朴之詩曰勉勉我王綱紀四方集傳云勉勉猶言不已也黃佐曰勉勉即是敬兼內外而言內外皆主乎敬則所以修己者在斯所以治人者在斯天德王道一以貫之矣故其首章曰濟濟辟王言敬德之見乎外也此章曰勉勉我王言敬德之存於中也蓋文王翼翼小心亹亹不已是以雍雍在宫肅肅在廟無時不敬即無時不勉易曰天行健君子以自强不息文王之謂也夫以生知之聖其聰眀天亶萬倍衆人而又加之以學問則其嚴恭寅畏之心鼓舞一世而有餘此雲漢作人聖人所以久於其道而天下化成也其日昃不遑之治統括六合而無遺此追琢金玉聖人所以感人心而天下和平也誠如是則功愈純而業愈廣者本一敬以該乎天下即合天下而聨以一敬其綱紀四方皆由於勉勉也蓋治道之隆張之為綱總而舉之使之皆有所統而無所遺理之為紀詳而整之使之各有連屬而無所紊當是時聖德髙深清和咸理上方慎修思永下則天下歸仁此推行之廣也致治之盛也而我王則勉之又勉不以此而稍自暇逸也王柏曰維持天下之功如此其大只收在勉勉於此可知人君所以端治化之源而操撫御之柄者惟在乎主敬作所也然則勉勉我王其日新之謂盛德乎綱紀四方其富有之謂大業乎單心宥密深於宵旰之勤時幾交敕常凛怠荒之戒而東西南北無思不服海隅日出罔不率俾其不言而信不令而從者人心之一道同風主德之純亦不已也堯曰欽明光被四表舜曰溫恭四方風動禹曰祗台聲教四訖湯曰聖敬肇域四海武曰執競周道四逹唐虞三代聖帝眀王所以綱紀天下者皆謂之勉勉可也君德之純其致治之本歟詩經勉勉我王綱紀四方監察御史臣柴潮生臣謹按君心為萬事之根本凡紀綱之大小無不受成於此常以毋不敬為主則氣質清明義理昭著視天下之事脉絡條理灼焉分明舉而措之無不曲當故詩曰勉勉我王綱紀四方勉勉者不已之意即不已其敬也綱紀四方者以是心而推之大綱小紀必知明處當而六服羣辟罔不承式也夫以文王之至聖其所以經理四方實不大聲色而自臻上理而詩顧歸之勉勉若實用其力者蓋聖心之睿知聰眀雖首出乎庶物而其惕天命畏民嵒之至意實無刻而稍釋於懷惟善知聖者能知其德之安安亦惟善知聖者能知其心之勉勉詩曰小心翼翼又曰不顯亦臨無射亦保書曰文王卑服即康功田功孟子曰文王視民如傷望道而未之見惟其戰兢惕厲出於自然而無始終久暫之别非若大賢以下之人過而後能改絶而後能續是文王之勉勉即為生知安行之至非真不加思議而自動與天符也今夫盂水可奉而志難持六馬可調而氣難御雖以上聖不得不戒慎於其間在堯舜為精一執中在禹為祗台德先克艱厥后在湯與武王則為以義制事以禮制心以敬勝怠以義勝欲皆與勉勉之言相表裏蓋敬者列聖相傳之心法而勉勉即主敬之純心棫朴之詠歌文王以金玉追琢之躬唘雅化作人之盛而歸功於此可謂得聖學之本矣後世學文王之學者莊敬日强以植其基至誠無息以要其極則為天地立心為生民立命為前聖繼絶學為萬世開太平其必由此始矣詩經鳶飛戾天魚躍于淵豈弟君子遐不作人監察御史臣張漢臣謹按是詩小序云受祖也周之先祖世修后稷公劉之業太王王季申以百福干祿故有是作朱子則謂君子即文王連前後數章意推之亦以咏歌文王之德鳶飛魚躍鄭康成謂鳶者鴟類鳥貪惡者飛至于天喻惡人逺去不為民害魚躍于淵喻民喜得所抱朴子則謂鳶在下無力及至乎上聳身直超飛不用力亦如魚躍怡然自得不知其所以然朱子集注主其說謂鳶魚順化於天淵各得其所文王化成於天下莫測其妙是以鳶魚興君子飛躍興作人道固有取爾也鄭康成訓遐為逺訓作人曰逺不作人者其政變化紂之惡俗近如新作人之義朱子則訓遐為何訓作為振作謂豈弟君子何不作人乎言其必作人之意也今夫人與物之並生於天地也有各得之性焉鳶吾知其能飛也而不自飛也有飛者有飛飛者魚吾知其能躍也而不自躍也有躍者有躍躍者夫非有所作而致其情也若夫人則上不在天下不在淵藐焉中處者也而有聖人焉使之而後變則刑于寡妻至于兄弟以御于家邦由關雎麟趾之意及於有德有造之流固皆遷善而不知而化行俗美人才衆多即兔置之野人亦有干城腹心之譽則待文王而興亦不失為豪傑之士也不恍然一鳶魚飛躍之象在其目中乎乃子思引之以言道則又曰言其上下察也為此詩者其知道乎竊由程子喫緊為人活潑潑地之言一致思焉本天親上本地親下又有言不盡意者引而不發躍如也按子思引詩言文王之德之純即天之所以不已然則飛于天者不獨鳶可以悟覆物之道躍于淵者不獨魚可以悟載物之道且豈弟君子作人尤出於夀考久道而化成又可以悟成物之道如此者豈必見而章動而變而為而成乎哉於是想文王之德之純正浩浩其天淵淵其淵也中庸言至誠所以専舉一文王乎抑聞詩人之於君有頌有規旱麓之詩戾于天而躍于淵王國之克生王心之所以寧也參以小雅鶴鳴之章聞于天而于淵者詩人之誨宣王欲求賢於未仕也亦欲儀刑文王以作人哉詩經思齊大任文王之母思媚周姜京室之婦大姒嗣徽音則百斯男編修臣吳紱孔氏頴逹曰作思齊詩者言文王所以得聖由其聖母所生文王固天性為聖亦由母有聖德故歌詠其母言文王之聖有所以而然也朱子曰此詩亦歌文王之德而推本言之曰此莊敬之大任乃文王之母實能媚於周姜而稱其為周室之婦至於大姒又能繼其美德之音而子孫衆多上有聖母所以成之者逺內有賢妃所以助之者深也臣謹按聖人之生代天宣化為人神之主而躋一世於仁夀平康之域故天之生之也恆不偶然此思齊之詩所以歌詠文王之德而必推本於大任之為聖母也周家自后稷以來積功纍仁世有令緒至於文王其德彌至其命維新文王大明棫朴旱麓諸篇言之詳矣曰亹亹曰穆穆曰小心翼翼反覆讃美鋪張揚厲要不外乎緝熙敬止之一言然則敬也者豈非文王之所以為文者哉詩人則曰是德也蓋自其母而已然矣故首歌之曰思齊齊者言乎其莊敬也孔子之繫易也曰敬以直內義以方外敬為義之體義為敬之用大任有思齊之德則言敬而義在其中矣曰文王之母者眀乎非是母不能生是子也大姜為大王之妃助大王以興岐周之業皇矣之詩所云天立厥配者也大任實能媚而愛之而稱為京室之婦以莊敬而事其姑孝莫隆焉詩之歌大任也曰乃及王季維德之行劉向以為端一誠莊是其德也蓋即思齊之意而推之也以莊敬而相其夫順莫大焉及其娠文王也目不視非禮之色耳不聼非禮之聲口不出非禮之言生文王而眀聖有由然矣劉向以為胎教是也要其致謹於視聼話言之間者秉持有素習慣自然非强於一時也特至是而尤加飭毖焉耳教之以一而識百固文王之睿知夙成哉大任之教抑可見矣莊敬以豫教其子慈莫篤焉是則大任之德無善不備而總以莊敬為之本也文王之不顯亦臨無射亦保敬之至也不聞亦式不諫亦入敬而行之以義也此其生而知之安而行之者而豈非聖母思齊之德有以育之於載育之始而教之於降生之後者乎至當之德既隆百順之福斯備大姒嗣其徽音則端一誠莊又克繼焉至德薰蒸太和翔洽天錫純嘏多夀遐齡而麟趾螽斯至於百男之衆厥後子孫千億宜君宜王綿奕世於無疆胥四海而仁夀信乎聖母聖子聖君聖后莊敬之德積之深而發之逺也夫詩經雍雍在宫肅肅在廟不顯亦臨無射亦保編修臣王居正嚴粲曰此章言純亦不已也文王之誠一也在宫則和在廟則敬隨所寓而形見也不顯之處人所不見而亦若有所臨洋洋乎如在其上也無射之時踐履已熟而亦自保守悠久無間也臣謹按思齊一詩文王德盛化神內聖外王之全體也首章推本聖德之助而次即及其德化之隆當是時神人胥協家邦同孚齊治之道於此焉著協和之風於此焉溥可不謂德之盛而化之神歟顧聖人者神人之主而君德者又其所以協神人和上下握建極綏猷之本於一心者也蓋德非可假顯之在倫常日用之地德不容間微之在暗室屋漏之中而思齊之三章若為文王曲傳之曰在宫在廟槩其地也曰雍雍肅肅著其美也曰亦臨亦保正不顯之實功而無射之極致也隨其地而得時中之妙純乎天而無幾微之間德如是至矣盡矣蔑以加矣文王之所以德協幽眀而化及家邦者其在斯乎抑嘗聞之聖人之德一而已一者誠也敬者又求誠之本而入聖之基也故大學中庸挈歷聖授受之心法而歸於誠敬釋明新之至善則以文王之緝熙敬止為宗論至誠之不息則以文王之純亦不已為極可知緝熙敬止正文王純亦不已之全體也而詩人乃以雍雍肅肅對舉朱子又以和敬分屬二者是豈誠之外又有一敬而敬之外又有一和乎蓋一念不放自念念皆實敬則無不誠也道心常存自天君常泰敬則無不和也敬與誠殊途而同歸和與敬異用而同體觀中庸首章詳言戒懼慎獨而終之以致和至朱子又暢發其㫖曰自謹獨而精之以至於應物之處無少差謬而無適不然則極其和而萬物育可見和由敬而出非離敬以為和也且朱子既以和敬分屬雍肅而又曰觀文王雍雍在宫肅肅在廟不顯亦臨無射亦保便可見敬只是如此則和與敬之異用而同體不益信哉然則人主建位育中和之極而思以嫓美乎二帝三王非敬其奚由哉是故恩威刑賞之用其中而辨名定志别嫌眀微則禮逹分定而雍雍者不獨在宫矣聲色貨利之絶其萌而敬天尊祖節用愛人則表正影直而肅肅者不僅在廟矣且也體欽眀之德而謹小慎微凛無逸之訓以持盈保泰密其功於不覩不聞嚴其防於莫見莫顯則臨保深而顯微一致無斁永久矣審若是是即堯之兢兢舜之業業禹之孜孜湯之日躋文王不已之意也易之乾乾書之精一詩之於穆記之不息之㫖也而天德王道一以貫之矣關雎麟趾之化其不可坐而觀成哉詩經雍雍在宫肅肅在廟不顯亦臨無射亦保監察御史臣朱鳯英朱子曰言文王在閨門之內則極其和在宗廟之中則極其敬雖居幽隱亦常若有臨之者雖無厭射亦常有所守焉其純亦不已蓋如是臣謹按此章言文王之德之純一天道之自然不待勉而能者也維天於穆不已時行物生在在皆天而不見其運量之迹維聖純於天道亦不已作止語默在在皆性而渾忘於嚴翼之神配易簡於知能而聲色俱泯體生成於廣大而上下同符聖心之合德於天者一誠之相為無間而已矣今試即詩之詠文王者繹之天倫人紀本一體之條貫故恩眀誼美而至情生焉擬曰雍雍和之至也蓋自寢門侍膳以至雎麟起化之原無一非纒綿篤摯之思矣上下神人本一理之昭假故愾聞僾見而眀信孚焉擬曰肅肅敬之至也蓋自惠于宗公以至昭事上帝之典無一非嚴威儼慤之忱矣夫是敬與和也陽舒隂肅而禮樂備仁昭義立而天地官由是而端冕垂裳凝旒綴黈百為未起之初是不顯也而上顧天命下視民嵒長若有所臨焉而緝熙敬止之心益以密矣由是而日昃弗遑康田恐後志氣如神之始本無射也而不動而敬不言而信長思有所保焉而求寧觀成之志益以切矣詩之贊文王者如此是知道莫貴於法天學莫先於知性性者萬物一原天人一體貫古今而無殊極須㬰而罔間者也知性則知天而髙下散殊同流合化而合敬同愛之道得矣元德統天乾行不息而大中至正之模立矣而文王以法天之心存之為亹亹之令德而實以盡性之學密之為翼翼之小心故曰誠也詩之贊文王者屢本諸天以為言蓋因其理之同而詞遂不能獨異也而推本於性則見天於文亦見文於天詩云上天之載無聲無臭儀型文王萬邦作孚此文王以盡性之學繼天而立極也夫詩經不諫亦入編修臣王居正臣謹按傅說之告髙宗曰木從繩則正后從諫則聖伊尹之美成湯亦曰從諫弗咈可知自古賢聖之君蓋未有不以納諫為孜孜者即以文王論緝熙敬止者其德望道未見者其心兢兢業業未嘗一念少自暇逸豈曰吾之動靜語默俱已優入聖域而無事臣工之贊襄哉乃詩人之美文王則曰不諫亦入果何謂耶先儒謂文王之德己底於至善不思不勉從容中道故雖無諫諍之者亦未嘗不入於善傳所謂性與天合是也竊以為文王之德誠如是其純也詩之所以美其先王者誠如是其不誣也而文王之心究不如是夫文王之心固惟恐己之不入且惟恐人之不諫耳不然舜禹亦大聖人也邇言則察昌言則拜喜起之朝時聞吁咈文固合德於舜禹者而有弗先後同揆也哉故曰此詩人之美其先德而非文王之心也然而文王之心亦從可識矣今夫人主之一言一行動關天下之安危民生之休戚使必待諫而後入則夫諫所不及遂可任其戲渝耶且即從諫如流人君受聼言之美名而事之所不及諫與夫諫矣而不克匡救匡救矣而天下已受其損者又豈少哉是故惟恐人之不諫而莫聞其失此文王虛受之心也人所易知惕於不諫之地而獨致其慎此正文王不已之純也人所難窺樂人之諫則可諫者自稀恐己之不入故不諫而亦入此文王之德之所以光大而隨地咸宜歟且夫師古者取法乎上進德者立基於實存文王望道未見之心致文王不諫亦入之誠廓然大公物來順應而上下之情通矣此諫而入者之所以聖也靜存動察戒懼慎獨而位育之基立矣此不諫而入者之聖之所以純也通乎詩人之意而深體乎文王之所以為文者則知詩書之㫖各有所屬而其有禆於聖學則固殊途而同歸也歟詩經肆成人有德小子有造古之人無斁譽髦斯士編修臣陸嘉頴臣謹按人材之盛與君心相感通者也當周文王之時多士聿興教化翔洽大雅諸篇類皆詠歌聖德而一則曰遐不作人再則曰遐不作人何其言之重辭之復也思齊之末章更進而切言之以推其潜移默化之原先儒所謂修身齊家治國平天下之道備焉者信不誣矣蓋嘗取其詞繹之曰成人曰小子盡乎人之類曰有德曰有造盡乎作之方以棫朴之夀考參觀之優裕中有嚴密之義以旱麓之豈弟參觀之樂易中有不息之强曰無斁者敬之謂也敬德之本也不曰斯士譽髦而曰譽髦斯士眀乎敬之所積者厚則德之所被者廣詩何善言古之人若是夫是詩也成王時之詩也緝熙敬止之德惟周公親見之故能極言之雖其時官禮未備而上庠下庠之制有虞氏以來未之改也商末之世士氣卑弱右學左學之分徒視為具文文王起而振興之凡二十而冠入大學八嵗入小學其中節目之周詳或德成而上或藝成而下莫不樂就其範圍所謂怙西土而光四方者孰大於此周公作雅詩以昭德作周禮以立政其體則異其㫖則同大司徒之設亦猶行文王之志也要之賢才視乎國運教思唘於皇衷觀我乃以觀民成已即以成物吕祖謙曰聖人流澤萬世者莫大於作人當成王時詩所言成人小子皆周之楨矣豈徒四友十亂為後世所指名而已哉此又詩人覽斯士之衆多追古人之盛德而流連慨想於無窮也詩經虡業維樅賁鼓維鏞於論鼓鐘於樂辟雍給事中臣衛廷璞臣謹按歷代學制莫備於周而其建學所自則於此詩見之古者教必兼養程子曰有弦歌以養其耳有干羽以養其血氣有禮義以養其心如此則非僻之心無自而入是故自有虡之世司徒與典樂之官並設周禮春官既有大小司徒矣而於大司樂則又曰掌成均之法以治建國之學政樂之重也彰彰如是此詩虡業維樅二語吕祖謙雖曰文王之民樂文王有鐘鼓之樂而實即辟雍所以為教也於論鼓鐘朱子訓論為倫即書無相奪倫之義樂有倫理斯聼者有以平其心焉故其教不肅而成也辟雍者賈逵以為周人本成均之舊式又云三代天子學總曰辟雍按董仲舒曰五帝名太學曰成均周以辟雍為太學則謂為本成均舊式是矣而以辟雍為三代天子學之總名則未有可據蓋見於經者夏后氏太學為東序殷為右學皆不名為辟雍張子曰辟雍古無此名其制蓋始於文王周有天下遂以名天子之學斯言足訂賈氏之誤矣他若項安世枝江學記所稱天子之學謂之辟雍班朝布令則以為眀堂同律候氣則以為靈臺混三者而一之此又沿蔡雍舊說不可為典要也至辟雍取名之義先儒箋注不一而尤可異者胡寅則直謂辟雍非學後人已詳辨之兹不具論而求其訓釋之最精者惟朱子援振鷺之詩曰振鷺于飛于彼西雍謂雍澤也水旋邱如璧而其學即所謂澤宫也又據蘇軾引莊周言文王有辟雍之樂遂以辟雍亦為樂名而曰古人以樂教胄子樂以學而得名尤與此詩意合夫樂之為教優遊涵養鼓舞動蕩有以深入乎人心故此詩美辟雍以於樂也觀此而周初所以成材者豈小補云乎詩經世德作求永言配命成王之孚監察御史臣周禮臣謹按王者之御天下莫不以敬天法祖為大端而總本於至誠無息之一心人君能存此心而不放斯有以盡敬天法祖之實而至德所孚天下顒顒焉託命於上無思不服而久安長治之規成焉固非緣飾之術歡虞之功所可同也若詩之稱武王足法已周自太王王季文王以來世有聖哲積功纍仁施及百姓其眀聖顯懿之德深仁厚澤之施久已上洽乎天心而下孚乎民望武王以執競之德承之繼志述事集大命於厥躬使三后之世德永觀厥成此丕承之烈所以傳美於百世也今由詩言繹之其曰世德作求非法祖之謂乎一代之興其創業垂統在於祖宗其紹聞衣德在於孫子在祖宗艱難締造積德以佑啓後人亦望世世守之以益篤乃祜而後嗣罔克纘承荒墜先澤祖宗以殷憂而開之子孫以逸豫而失之若夏商之季可太息也武王以恪共之心敦繼緒之事夙夜孜孜不敢荒寧且所求者惟世德而不徒在法制禁令之迹宜其成配京之大烈與夫世德與天命無二理也世德皆實心所形著而天命一實理之流行故法祖即所以敬天求世德與配命無二事也特恐暫合而遽離暫得而遽失以一出一入之心而為或作或輟之事斯無以成王者之大信耳若永言配命則終始惟一也巨細罔間也體上帝監觀求莫之心而經久弗渝凡所以存心而行政者無不協乎天理之正而合乎人心之公則王者之德著於下而天下之心應乎上孰不天地尊之而父母親之也哉其成王之孚有以也蓋於穆不已者上天之命而至誠無息者聖人之心心易放而難存者也兢業一息之稍弛即以隳全體之純粹而無以孚天下之心故書曰慎厥身修思永良以乾惕貴其有恆而精勤期於無斁爾武王惟以作求者配命而至德純於無間故以成孚者配京而丕基奠於萬年然則敬天法祖設誠於內而致行之洵萬邦作孚之本也歟詩經昭兹來許繩其祖武於萬斯年受天之祜修撰臣于敏中朱子集傳言武王之道昭明如此來世能繼其迹則久荷天祿而不替矣臣謹按一代興王之業必有世德之相承基之於前聖德之凝命成之於後用能享國長久臻致太平要未有不以法祖敬天為勤勤者周之王業肇於后稷艱難締造忠厚開基家法相傳孝思弗替形於雅頌者可考也正雅諸篇大抵受釐陳戒之辭往往推原天命上述祖德纒綿懇摰稱頌再三猗歟休哉此其所以為盛德之隆乎迄今取其詩而讀之文王棫朴旱麓靈臺皆詠歌文王之德皇矣大眀則美文王而推本王季之篤慶文王有聲則美文王而兼及武王之詒謀於綿則述太王肇基王迹之原於篤公劉則陳公劉建國君民之始於生民則更詳履武發祥受天眀命有邰家室之初而下武一篇則専言武王纘緒垂統上繼積德纍仁之業下開卜年卜世之長周家一代之規模實於是乎備焉其首章曰世有哲王三后在天言先緒之所從來已久而三后之精神上與天合也二章曰世德作求永言配命言武王所求者皆先世之德故能長配天命有天下而傳無窮也三章曰永言孝思孝思維則言武王心純乎孝而民信之亦莫不興起於孝所謂德教加于百姓刑于四海也四章曰永言孝思昭哉嗣服言武王永念孝思而不忘昭昭然能嗣其先世之事也至五章曰昭兹來許則又言武王之大信大孝極於光眀足以福及後世故即承之以繩其祖武繩之為言繼也欲來許之繼續而不已也武王本善繼善述之孝又有常永無間之誠上合天理下孚人心故後世之法之者亦當以武王之心為心以武王之政為政施之於外無一事之不合焉無一物之不周焉存之於中無一時之或懈焉無一念之或忘焉兢兢業業日慎一日夫是之謂能繼也夫是之謂能繩其祖武也乃極之以於萬斯年受天之祜斯言也豈惟是善頌善禱已哉蓋自帝省其山作邦作對以來天之篤周者厚矣至武王大勳既集天眷式憑白魚赤烏之祥再見叠至眀乎武王之德一天之德故法武王即所以法天而天祐武王因并佑法武王者萬年受祜理固不爽有以知德在是福亦在是也惟其受天之祜因以四方來賀不遐有佐終焉為此詩者又何其徴於天驗於人而反覆詠歎之也臣由是而知有周君臣之殷勤勸勉者初不必逺稽唐虞上引夏商苐敷揚本朝之世德舉而歸之於天如既醉言孝子不匱申之以君子萬年景命有僕假樂言干祿百福終之以不愆不忘率由舊章亦足與此詩相發眀矣至於功成治定美盛德之形容告於神眀頌聲乃作頌也者顯祖業因以美當時也其編次亦與雅詩相類是故自清廟以至我將類多尊崇文武而天作則兼溯太王思文則逺追后稷又附以時邁諸詩於是乎敬天法祖勤民一以貫之而治道大備若夫祭以受福而必曰曽孫篤之曰子孫保之曰儀式型文王之典曰繼序思不忘其於繩武之意益深切著眀矣宜其丕基永奠受福無疆繼繼繩繩聲施爛然而流譽天下萬世也哉詩經假樂君子顯顯令德宜民宜人受祿于天保右命之自天申之干祿百福子孫千億穆穆皇皇宜君宜王不愆不忘率由舊章威儀抑抑德音秩秩無怨無惡率由羣匹受福無疆四方之綱之綱之紀燕及朋友百辟卿士媚于天子不解于位民之攸塈編修臣王峻詩序假樂嘉成王也朱子曰疑此即公尸之所以答鳬鷖者也劉瑾曰首章之言乃一詩之大㫖二章之不愆不忘三章之威儀德音所以為顯顯令德也三章四方之綱四章之綱之紀而民之攸塈所以宜民也三章之無怨無惡率由羣匹四章燕及朋友媚于天子所以宜人也至于二章之干祿百福子孫千億三章之受福無疆又皆所謂受祿于天而自天申之也臣謹按成周之世太和翔洽正君臣交泰之時此詩所言皆保泰之道令德為致治之本必秉聰眀首出之資具仁義禮智之德然後足以統臣民而為元后以是德而治民則能教養兼施以是德而用人則能舉措各當民人咸宜則萬姓以安百官以治和氣充積於上下斯福祿之受於天者亦無窮天人相因理固如此子孫蕃衍而多賢可以永保天命所謂福祿莫大焉法祖為人君繼治之首務不愆則無聰眀亂舊章之失不忘則常有繼志述事之心書曰監于先王成憲其永無愆孟子亦曰遵先王之法而過者未之有也德之在身為威儀發於外為言語抑抑則謹密無失動容周旋罔不中禮秩秩則審定有常教誡號令各當其時猶抑之詩所云敬慎威儀維民之則訏謨定命逺猶辰告二者乃令德之著見下文綱紀之根本也密於修己又必公於用人一有私怨惡存於心則虛眀之鑑先有所纍安能燭賢姦而不淆無怨無惡此心廓然而大公由是因羣臣之才品各循其類而衡量之大成大小成小所謂建官惟賢位事惟能者此也君德既盛賢才衆多皇極建於上政教行於下自然受福無疆而有以為四方之綱天下雖大總在統攝之中矣大曰綱小曰紀於政治之大體既已總之而無遺即節目之小者亦必理之而不紊綱紀既立則大權歸一臣下得以各盡其職而無紛更叢脞之虞所謂安者非宴安之謂蓋和衷協恭心志皆定也在外之百辟在內之卿士皆賴君而得其安自必各懷忠藎咸知愛戴於上上言無怨無惡君推誠以待下此言媚于天子臣盡誠以事君君臣之間心孚志同如此豈非天地交泰之時乎然泰之時人情習於久安易生偷惰自古帝王於極盛之時每以怠荒為戒惟持之以敬操之以勤則綱常張而不弛君無逸而民乃逸所謂不解者又安不忘危保治之要道歟臣又按此篇之詩與虞書臯陶謨相類臯陶曰允迪厥德猶此詩言顯顯令德也臯陶曰在知人在安民而下文敷陳九德皆詳述知人之事蓋非知人不足以安民此詩首言宜民宜人而率由羣匹燕及朋友亦詳言宜人蓋宜人正所以宜民乃智以成仁之事至於臯謨之戒逸欲崇兢業懋政事敬有土則皆不解于位之義也又大雅棫朴之篇曰勉勉我王綱紀四方此詩曰四方之綱繼之曰之綱之紀唐韓愈言天下之安危視乎紀綱之理亂宋朱子謂辨賢否以定上下之分核功罪以公賞罰之施秉之宰執察以臺諫人主以大公至正之心恭己於上而照臨之斯紀綱自正可見人君為治之道在立紀綱立紀綱在任賢才賢才布於庶位綱紀張於四方天下國家永享升平之福其即此詩之㫖也哉詩經不愆不忘率由舊章監察御史臣陳其凝謝枋得曰不愆則無作聰眀亂舊章之過不忘則常有繼志述事之心彭執中曰舊章蓋成王周公制禮作樂秩然成章傳之萬世可以遵守臣謹按典章者治天下之法也一代之興必有一代之法先王立法通天下而計之當輕當重宜緩宜急知之無不眀處之無不當故其法之行也合乎天理當乎民心天下奉之而無失奕世遵之而不謬此舊章之所以為貴而書之垂戒亂舊章者至切也乃世易而不能無偏而後之欲補其偏者每用其心思以增其所不必增時移而不能無弊而後之欲救其弊者每出其智慮以易其所不可易自以補偏救弊之政超於前人制作之上及屢變而屢有所不便而猶以為變之未善也夫豈變之未善哉先王之舊章不可變耳詩之頌宜君宜王而歸之曰率由舊章推其率由之本則曰不愆不忘夫不愆者深知先王之法非後人心思之所能及而敬以承之不敢忽舊章為不可遵而改弦易轍以失先王制作之精意不忘者深信先王之法非後人智慮之所能周而恪以守之不敢疑舊章為有所遺而舉一廢百以失先王貽謀之令典如是則知所循而不致過用其心思而無當於理有所據而不致怠忽其智慮而有遺於事書之言無作聰眀亂舊章者必本於率自中其是之謂歟孔子之告魯公謂文武之政布在方策人存則政舉人亡則政息是知先王之舊章未嘗不可率由而後人之愆忘有以失之也語曰有治人無治法非謂先王之法不可以為治也無人以舉之則良法美意總無益於民生得人以行之則故典遺章皆有禆於國計然則先王之制作雖可以為萬世之遵守而非善繼善述之後人亦不克率由典常而有以彰其耿光大烈也董仲舒曰道者萬世無弊弊者道之失也先王之創為典章斟酌損益有改制之名無變道之實及其弊也道之失耳率而由之則禮眀樂備綱舉目張而天下無難理矣不然先王通天下而計之後人就一節而改之徒失乎制作之意而自蹈於愆忘之咎豈所謂示民有常者耶詩經威儀抑抑德音秩秩無怨無惡率由羣匹受福無疆四方之綱之綱之紀燕及朋友百辟卿士媚于天子不解于位民之攸塈右中允臣朱良裘序假樂嘉成王也集傳言有威儀聲譽之美又能無私怨惡以任衆賢是以能受無疆之福為四方之綱又言人君能綱紀四方而臣下賴之以安則百辟卿士媚而愛之維欲不解于位以為民所安息也臣謹按唐韓愈有言曰善醫者不視人之肥瘠而察其脉之病否善計天下者不視天下之安危而察其綱紀之理亂四支雖無故不足恃也脈而已矣四海雖無事不足矜也綱紀而已矣綱紀之義大矣哉夫天下至大兆民至衆其勢紛其情渙而善為治者乃能總攝而整齊之使之各循其理而相維于不敝此非一手一足所能為功而表端影正綱舉目張則自凡百辟卿士至於庶人皆視乎大君一人之身有以鼓舞而振興之旱麓之詩曰周王夀考遐不作人又曰勉勉我王綱紀四方先儒謂綱紀即作人之意人才作於國中則綱紀張於四外文王以夀考之年勉勉不已而賢才於以奮興政事於以修舉是可知人君所以鼓舞天下之人才即所以經理天下之庶績而養羣生以和平之福者胥在乎是矣成王繼文王武王之序夙夜敬止日就月將懋學於緝熙單心於宥密所以養其在躬之清眀者無少間隙故其發見於外者有抑抑之威儀秩秩之德音而一時之佛時仔肩示我德行者皆一心一德之儔有嘉德而無違心故曰無怨無惡率由羣匹此綱紀所以振而克受無疆之福也蓋人之元氣不存雖盛且壯不足為一身之福國之綱紀不立雖强且富不足為人君之福詩人以受福祝其君而繼之曰四方之綱又繼之曰之綱之紀其意至深且逺人君以一身托乎億兆臣民之上若日月之照臨南朔東西皆其神眀所貫注綱之舉於上者元首眀而股肱良紀之振於下者百工釐而庶績熙此王道之成所以四逹不悖而外有以極規模之大內有以盡節目之詳者也夫樹之后王君公承以大夫師長凡以為民也必百辟卿士無一人不能於其官而後羣黎百姓無一夫不獲其所惟綱紀既立則賢者在位能者在職受大受小不淆其分職詳職要各盡其才於以亮天工熙帝載君臣上下之間誠意交孚而忠愛悱惻之情油然以生凡厥庶民皆得安其出作入息之常遂其食德飲和之願是合天下臣民之福為一人之福其福寧有涯歟先儒又謂君燕其臣臣媚其君此上下交而為泰之時也泰之時所憂者怠荒而已故終之以不解于位然則詩人之意即虞廷載賡之意而維願綱紀之張而不弛也乎抑臣聞之宋朱子之告其君曰何謂綱紀辨賢否以定上下之分核功罪以公賞罰之施也然綱紀之所以振必宰執秉持而不敢失臺諫補察而無所私而人主又以其大公至正之心恭己於上而照臨之是以賢者必上不肖者必下有功者必賞有罪者必刑而萬事之統無所闕也綱紀既正則天下之人各自矜奮更相勸勉以去惡而從善蓋不待黜陟賞罰一一加於其身而禮義之俗廉恥之風已丕變矣又曰綱紀不能以自立必人主之心術公平正大無偏黨反側之私然後綱紀有所繫而立君心不能以自正必親賢臣逺小人講眀義理之歸閉塞私邪之路然後乃可得而正也又曰一二習見之臣上則蠱惑其君之心志使其不信先王之大道而悅於功利之卑說不樂莊士之讜言而安於私􅉏之鄙態下則招集士大夫之嗜利無恥者彚入其門所喜則隂為引援所惡則密行訾毁不惟壞天下之綱紀乃并其君所以立綱紀者而壞之焉朱子之言其剴切詳至如此然則詩人之以綱紀頌其君也其意誠深且逺哉詩經之綱之紀燕及朋友百辟卿士媚于天子不解于位民之攸塈給事中臣汪榯臣謹按國家之治主之者君輔君以出治者則惟臣其道總不外於安民而已人君誠以安民為心則必奮大有為之志氣率作興事慎憲省成薄海內外無不在一人總理維繫之中勸農課桑以厚其生通工惠商以利其用庠序學校眀倫立教以復其性凡設為經制布之章程者委曲周詳纎悉靡遺而朝廷之上一日二日萬幾握要不煩而大綱畢張錯綜盡善而衆目備舉上令而下行上作而下應朱子曰四方皆在線索內牽著便動如是綱紀四方則所以貽民之安者君皆有以任之矣於是輔理之臣共清乃心各勤乃職兢兢業業時凛曠鰥無非推廣九重之德意承宣一人之愷澤登斯民於仁夀告厥成功坐臻上理故曰之綱之紀燕及朋友夫上下一心眀良交慶君既有以燕其臣臣亦有以媚於君將見外而百辟內而卿士莫不鼓舞興起獻其媚兹焉媚之云者非阿意以順從也亦非歌功而誦德也君心以養民為急則竭其誠求之力以仰合乎惠鮮懷保之思君心以教民為重則殫其敬敷之方以曲體乎匡直輔翼之意要使四海之外八荒之內無一物不得其所無一夫不被其澤以此言媚愛之至也敬之至也忠順之至也顧泰交之世亦有疇咨同德之朝尤勤惕厲天下之大寶曰位而守位曰人居萬姓之上而任代天理物之責豈可一念假滿一事玩愒哉惟以安民為心即以勤民為務終日乾乾不自暇逸抑抑者益慎其威儀秩秩者益謹其德音無怨惡者益勉於率由單心夙夜知天位之維艱淬厲精神期帝位之不疚則綱可常張紀可常理而天下之民亦永賴之以休息矣豈徒燕及朋友而已哉此媚于天子者必以不懈于位民之攸塈致其惓惓也觀詩所以燕其臣下與臣所以媚其君上者舉不外於安民則肅綱紀而率臣僚非即所以延萬年有道之長也乎詩經之綱之紀燕及朋友百辟卿士媚于天子不解于位民之攸塈監察御史臣周人驥吕祖謙曰君燕其臣臣媚其君此上下交而為泰之時也泰之時所憂者怠荒而已此詩所以終於不解于位民之攸塈也方嘉之又規之者蓋臯陶賡歌之意也臣謹按天生民而立之君固以生民之命特付於一人而一人不能獨理於是立官以為之臣使分任治民之事書曰眀王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民蓋言君臣之道皆以為民必使民各得其所而後克盡乎其為君無負乎其為臣也使為君者宵旰憂勤時時以民生為念而為之臣者不能仰承德意顧祗茍且塞責塗飾耳目視民間之疾苦漠然不關於其心則朝廷雖有善政之施而奉行不實利不果興害不果去澤不下究情不上通誠以所用之非其人也惟是君為主而臣為輔設君於用人行政之際或偏有成見或信任不專即有忠直公正體國愛民之臣建一議而人訾其非舉一事而多掣其肘將以顧忌之念阻任事之心而欲實政之及於民抑又難矣然則上下交而後德業成眀良會而後庶事康君臣之相遇豈偶然哉詩所云燕及朋友非徒慶臣之賴君以安謂君有綱紀而臣乃得安其身以安斯民也所云不解于位民之攸塈非以安民之事專諉之君謂必君不解其綱紀而臣乃得修其安民之職也三復詩㫖於稱願中寓規戒足見古君臣交警之意至不解于位一言尤千古為君之炯鑑也古來願治之主當其始莫不勵精久之治具已張見以為不妨稍逸則左右近習即以聲色玩好窺其隙而中之遂有不期解而自解者夫天下之疾苦皆一人之志慮所周天下之才力亦一人之精神所鼓一事解所失不止一事一時解其害不止一時古帝王制治保邦兢兢業業惟預防夫解之端力遏乎解之漸故朝廷之上鼓舞振興共相翊贊此所以得民心而保天下歟御覽經史講義卷十七
