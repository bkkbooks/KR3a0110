body:
  text: 周易天尊地卑乾坤定矣卑髙以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣檢討臣陳兆崙孔頴達正義略曰此明天地之體論天地之性因廣包萬物之情也朱子本義略曰此言聖人作易因隂陽之實體為卦爻之法象莊周所謂易以道隂陽是也臣謹按孔疏以此傳為泛論天地萬物於理亦屬可通要不若朱子以每假上句屬隂陽下句屬卦爻之為分明切當也蓋六經莫竒於易聖人慮學者之詫為險怪疑為幽渺以為古聖因心獨造之書而無關於日用行習之要故於繫傳發端先推明所以作易之意使知自開闢以來即有是隂陽之實體古聖人特就天地間之所自有而闡發之耳有如一俯一仰即見天尊地卑此天地自然之易也而易中乾坤之卦即此定矣由是每卦分乾坤之畫列上下之爻上為貴下為賤貴賤所由位一準乎卑髙也由是每爻以奇耦之數狀隂陽之性陽至剛隂至柔剛柔所由斷一凖乎動靜也以位言之曰尊卑以德言之曰動靜惟天動而地靜而受生於天地者亦各為動靜曰類聚曰羣分如本天親上本地親下之屬有異同則有趨避而易於是生吉凶之占也惟天動而地靜而附麗於天地者亦互有動靜曰成象曰成形如日月經天江河行地之屬有推移則有新故而易於是著變化之策也合而言之自一畫以至六十四卦皆本於天地間之所自有而非聖人之强設則讀其書者皆可引而歸之身心驗之日用隨地可以見易隨時可以學易而觀象玩占之君子可以興矣是故尊君親上祇父恭兄所以明貴賤也不侮矜寡不畏彊禦所以法剛柔也擇善而從去惡若凂所以審吉凶也履盛思謙居安慮危所以持變化也此學易之大略也周易乾知大始坤作成物乾以易知坤以簡能監察御史臣嚴源燾臣謹按乾元為萬物資始坤元為萬物資生而知兩間化育之功為萬物之所仰賴者至無窮也夫萬物皆仰賴於乾坤而非有握其至要以為之根柢者何以能運大化於不勞則繫辭上傳所言乾知大始坤作成物乾以易知坤以簡能可得明其說焉夫乾道成男男為父道物莫不本於父即莫不本於乾坤道成女女為母道物莫不長於母即莫不長於坤故於乾之成男而得所以大始焉基萬有以開先而羣生托命於坤之成女而得所以成物焉合無疆以布化而品物咸亨顧大始則曰知而成物則曰作者何也蓋上天之載無聲無臭尚未彰夫迹象自不見其經營故但言知者乾主始物物之始無形而乾之知亦無為也至坤以成物而氣於是感質於是凝已當生機欲達之時遂著地道代終之用故特言作者以見含萬物而化光厥功至顯也惟乾知始惟坤作成一髙明而主施一博厚而主受分之為覆幬持載合之則下濟上行其理固有不易者夫萬彚百昌物之類如此其繁也長養收藏物之候如此其變也物始而乾實知之其綱維於為物之先者似有所甚難物成而坤實作之其蕃生於為物之後者似不無或擾乃乾道以其清虛者運於上而於穆不已終古此乾亦終古此始物之乾卒不聞有所難而息其知也且以易知也坤道以其安貞者承乎下而得主有常終古此坤亦終古此成物之坤卒不聞有所擾而紛其能也且以簡能也惟其易簡故分隂分陽自有定位一動一靜自為互根物始而非經創造物成而何用矯揉一物各有始各有成而絶無煩於分給物物共此始共此成而更無俟於兼營蓋誠有握其至要以為之根柢者而後能運大化於不勞也至推易簡之故則朱子有云乾行健所以易坤之簡只是順從蓋天下惟至剛者於事皆無所難乾健則其體至剛以至剛之體主宰乎物自能溥其利於不言而安有艱難之迹天下惟至柔者於事一無所滋坤順則其體至柔以至柔之體順應乎天要惟安其道於無成而何有煩雜之端此天地之所以無心而成化也夫周易乾以易知坤以簡能編修臣萬承蒼臣謹按乾天道也君道也萬物皆統乎天萬事皆統乎君其所以主宰而攝持之者宜其難矣而繫辭傳顧以一言括之曰易何哉天下事物之蕃變不可勝窮而莫不有自然之理因其自然者而施之則無往不易矣今夫天日月星辰著其象春夏秋冬驗其時一隂一陽瞬息遞變而亘古常新莫非自然之用人君體天之心法天之運存乎中者廓然而大公見乎外者物來而順應凡所為禮樂政刑亦惟順其自然之理舉而措之豈不甚易堯之安安舜之無為皆得乎易之理者也然使有心以求易則其易不出於自然必且流為因循廢弛而不足以成務繫辭傳不又云乎夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻乾惟健故其資始也不勞坤惟順乎乾之健故其資生也不已為人君者必本朝乾夕惕之心充間邪存誠之力精神裕乎內而後可以周萬化之全志氣定於先而後可以赴百為之會若舉大器然柔靡者苦其難强有力者則能勝之矣是故非健不可以言易非易亦不足以見其健之至也易簡之說不見於彖辭爻辭然觀其命名曰易則文王周公必有是意夫子特從而闡明之耳古者庖犧氏始作八卦而書契以興後世聖人所以通天下之志定天下之業斷天下之疑者胥必由此夏正建寅為人統人道主乎艮故其書首艮而名曰連山取艮為山之義也商正建丑為地統地道主乎坤故其書首坤而名曰歸藏取坤以藏之之義也周正建子為天統天道主乎乾故其書首乾而名曰周易取乾以易知之義也夫子言隂陽之義配日月蓋以上日下月著易之文易簡之善配至德蓋以乾易坤簡著易之義鄭康成作易論以為其義有三易簡一也變易一也不易一也孔頴達云今之所用同鄭康成等音為難易之音義為易簡之義若周簡子讀易若亦則孔氏斥之以為用其文而背其義以此見唐時無有讀為入聲者今北方之音猶與易簡之易相近而南方則概從入聲且専以變易為訓夫變易交易之義固六十四卦中所自有然易為五經之首經者常也天下之理有常然後有變如易専以變易為說是不得為經常之道矣此亦理之可疑者也夫子自言假年學易七十子之徒宜無不盡心焉夫子嘗以不逺復稱顔子而史獨言商瞿得其傳逮宋以後子夏易傳復出而商瞿之學無聞焉意者十翼即商瞿之所傳者耶宋儒邵雍稱老子得易之體孟子得易之用夫體用不可相離得其體而未能施於用者有之矣未有得其用而不備其體者也伊川程子謂孟子深於易此誠確論孟子之學得之子思子思之學得之曾子曾子言君子思不出其位蓋申明艮卦象傳之㫖以此為學必以此為教臣竊謂善言易者莫如子思中庸一書皆以闡易所謂中者即二五之中所謂庸者即乾卦文言庸言庸行之義首章言天命性道推之以至於天地位萬物育無非乾卦之微㫖戒懼慎獨之君子即終日乾乾夕惕若之君子也而其顯而易見者尤在素其位一章素位即易之素履繫辭傳言列貴賤者存乎位出入內外上下天人皆六爻分見之位也而總而論之曰君子居易以俟命小人行險以僥幸居易行險對舉為文非取易以知險之義而何由是思之居易之易即乾以易知之易而易經之命名其必為難易之音亦可於是而有證矣周易乾以易知坤以簡能編修臣潘安禮朱子曰乾健而動即其所知便能始物而無所難故為以易而知大始坤順而靜凡其所能皆從乎陽而不自作故為以簡而能成物臣謹按天地之大無窮盡無方體而聖人舉而歸之易簡者蓋探造化生成之妙而示人以學易之要也今夫天地之生生而不已也建日月風雨以和之經隂陽寒暑以成之欣合煦嫗覆育萬物草木茂勾萌達羽翼奮角觡生舉凡昭蘇嫗伏者莫不中含浮沉升降動靜相感之性而乾端坤倪因之軒豁呈露於其間此鼓物無憂之大用也顧盡天下之物而皆始於乾盡天下之物而皆成於坤髙下洪纖不可名狀使其逐物以肖之而旁魄紛湧一一須於區畫吾恐造物窮於所造而化工并難於言工矣蓋天地之常以其心普萬物而無心而其専一直遂翕聚發散也一至易至簡者運旋之而遂以極乎行乎不得不行止乎不得不止之勢確然者乾也健以馭氣動以達機布之濩之胚胎衆有而無所見其運量經營之迹乾以易知者如此隤然者坤也順以承天靜以育物扶之植之元功不宰而自裕其孚尹旁達之機坤以簡能者如此蓋乾君道也父道也坤臣道也母道也一主於施故本易以宰制役使而不言所利一主於受故本簡以參和馴致而無成有終所為元神默運而布施於上入伏於下者直統乎乘震乘離乘兑乘坎之司生物不窮而産以陽德産以隂德者悉括乎執規執矩執權執衡之用也是造化生成之妙機倪要於易簡而已矣其在人心亦皆有之董仲舒曰王者欲有所為宜求其端於天魏相云天子之義必純取法天地豈非以人主之心固與天地流通而往來相應者哉故以性分而言廓然大公者易也物來順應者簡也以治術而言道不逺人者易也行所無事者簡也始於易知易從漸至可大可久而乾坤之易簡且與吾心呼吸相關而毫釐不隔矣然則聖人探乎造化生成之妙而示人以學易之要也有如是夫周易易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業監察御史臣吳文煥臣謹按易之為書廣矣大矣所言皆造化之功機緘之妙所謂顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業何其至矣哉然易之道不外於乾坤乾坤之德不外於易簡而兼體之則存乎人今夫後世之所以智取而術馭者其心以為如是可以同天下之俗而用天下之人矣而孰知其規為隘小不可終日也惟能法乾之易以居心純乎天理而無艱深險阻之蔽則其心明坦盡人皆得見其中藏而易知法坤之簡以處事順乎此理而無私智煩擾之纍則其事要約盡人皆可循其成法而易從易知則吾心此理人心亦此理其心之無勿同處皆吾親也易從則吾以是成能人亦以是成能其能之無勿同處皆吾功也有親則信從者衆而吾心益自信而不惑豈不可久有功則鼓舞者多而吾事自兼善而無外豈不可大久者聖人之德至誠無息純亦不巳未至於久而可久亦為賢人之德矣大者聖人之業徵則悠逺博厚髙明未至於大而可大亦為賢人之業矣若夫聖人者易簡而涵作易之本具有造化生心之妙者也故又曰乾天下之至健也德行恆易以知險坤天下之至順也德行恆簡以知阻兼圓神方知之精密洗心退藏之用無事則其心寂然人莫能窺有事則神智之用隨感而應日新之謂盛德富有之謂大業其不可以與天地參乎周易易簡而天下之理得矣天下之理得而成位乎其中矣諭德臣覺羅蘇岱孔頴達曰此則贊明聖人能行天地易簡之化則天下萬事之理並得其宜矣成位言聖人極易簡之善則能通天下之理故能成立卦象於天地之中言並天地也臣謹按易簡在天地為造化在人為性情孔子繫辭所以示人法乾坤也自易知易從至於可久可大乃賢人之德業然不推至聖人無以立人極焉聖人本窮理盡性之功以體乾坤之易簡立心純乎一易而渾於無心淵衷之存莫非代天之意處事純乎一簡而成於無事感通之迹莫非代天之工是天下之理雖散於萬殊以易可以該括而無遺聖人得乾之易而天下之理即不能外聖人一心之中天下之事雖各具一理以簡可以貫通而無失聖人得坤之簡而天下之理即不能外聖人一身之內天下之理得矣天下之理得則其德不徒可久而無不久天地之化育皆賴之以範圍其業不徒可大而無不大萬物之性命皆藉之以曲成至於此則德為聖人之盛德業為聖人之大業建諸天地冠諸羣倫覆載之間所以握化元而為綱常之主者也天以易成位乎上地以簡成位乎下聖人以易上配於天以簡下配於地成位乎天地之中者矣此易簡者乃造化之原人心之德而聖人體易之極功也周易易簡而天下之理得矣編修臣潘安禮孔頴達曰聖人能行天地易簡之化則天下萬事之理並得其宜矣臣謹按天地無心而成化聖人有心而無為易簡所以盡乎萬事之理而三才並建也蓋天下之理皆根乎一一者變化所由生故極世宙之殊名異狀分類應之尚多不給而試操本暨末沿波討源極之參伍錯綜而始事未嘗不合何者理司其契也審此而知易簡固操乎天下之不得遁矣且天下之治豈一端而已自班朝蒞官以及體國經野與夫禮樂政刑接時而遝至者一日二日萬幾顧欲以一心歷天下之無窮宜乎扞格不入矣而聖人之兼綜條貫也事大不苑細行不失深而能通茂而有間且斟酌衆萬而有餘者豈其意之也哉蓋無為守正實管乎宰制萬物役使羣動之本舉而措之與時宜之即泛應而不出吾宗信乎易簡者天下之權輿也聖人體乾之易以為知法坤之簡以成能何思何慮無一毫私意之艱深因物付物無一毫私欲之膠擾則凡政事之發邇見逺者莫非人心所同然分誼所應得而天下乂豈有遁於易簡之外者乎蓋以事幾之迭出於無方也派别支分要必有其源流之合吾已動應其本理折其衷則由是之焉任天下之蕃變錯呈而無往不備故言乎逺則不禦言乎邇則不遺言乎天地之間則皆備者莫非易簡之所該而存也擴之而橫乎四海置之而塞乎天地施諸後世而無朝夕者莫非易簡之所放而凖也所云天下之理根乎一者非耶抑嘗證諸帝王之已事矣堯舜之精一成湯之建中文武之宅心敬勝是皆兼體易簡者也而其時授時察象封山濬川與夫應天順人顯庸創制之事神明默運而條理秩然天下不見其張皇補苴之迹者此物此志也若夫漢文之希蹤黃老自詡無為其實不過神化之糟粕晉室之崇尚清虛髙言簡净適成其為異學之支離均未有當於易簡之云也等而下之以至刑名法家者言枝節愈多而披張益甚欲以經營天下而扶樹道教也豈有幸哉總之天地之間有理而後有象有象而後有數象數之陳遞推焉而未有紀極理則未始有二也是故易本於造化造化歸於易簡天地之盛德大業聖人之崇德廣業一以貫之矣故夫子於繫辭之傳首發明之周易與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛監察御史臣柴潮生本義曰此聖人盡性之事也天地之道知仁而已知周萬物者天也道濟天下者地也知且仁則知而不過矣旁行者行權之知也不流者守正之仁也既樂天理而又知天命故能無憂而其知益深隨處皆安而無一息之不仁故能不忘其濟物之心而仁益篤蓋仁者愛之理愛者仁之用故其相為表裏如此臣謹按天地之性人為貴人受天地之中以生即各具天地之性惟聖人為能踐形復性而與天地自然之本體渾合而無間天地之運隂陽是也隂陽之道知仁是也天之知不可見而含宏光大品物咸亨無非知也所為周乎萬物也地之仁不可見而坤厚載物德合無疆無非仁也所謂道濟天下也聖人義合乎仁所知者皆濟天下之道而不過仁合乎義所行者皆合中正之則而不流仁義合德則所知益深樂天知命而無憂矣所行益篤安土敦仁而能愛矣樂天之志憂世之誠並行不悖內外同流故曰與天地相似也韓伯曰德合天地故曰相似但相似云者並非空空說一相似巳也相似以作配言不違以贊化言蓋天地之大以知仁為道者也聖人體道之全而具知仁之德實有與天地合同而化之理焉至於樂玩天理而順受其所命之正則無適而非知所以無憂也而知之迹已泯安於所遇而不忘其生物之心則無適而非仁所以能愛也而仁之心愈著此益見與天地相似而不違之實境所謂盡其性以及人物之性而參天贊化一以貫之者也且聖人亦非崇效卑法兢兢焉有意求似乎天地也但盡乎知之性而知之發見即是天清明之體則知似乎天但盡乎仁之性而仁之流露即是地渾厚之體則仁似乎地盡吾本然之性而仁之至知之盡則天地之性自然位乎吾性中矣俞琰曰與天地相似者易似天地天地似易彼此相似其說最為推勘入細也周易繼之者善也成之者性也檢討臣達麟圖臣謹按周易繫傳言性而本之於善善屬繼性屬成繼之云者命於天而受於人也成之云者具於人而得於天也蓋自生物之始以及受中以生天人相與之際合而言之而知性固無不善者爾伏思理必究其原而後名斯生學必歸於是而後惑斯解習其名稱而膠於疑惑此言性者之所為棼棼也或言性僞或言性惡或言性善惡混或言性之品有三皆即人言性而未嘗合於天也天道流行發育萬物一物與一無妄無妄者天性也而性何僞乎人之生也孩提則知愛其親少長則知敬其兄知愛知敬皆良知也亦良能也而性何惡乎人生而靜原無所謂惡也即云善亦尚可言而未可見耳形既生神既發感於外動於中或順其固有或緣於後起而善惡乃分焉是謂人之善惡分可也而謂性之善惡混則不可人分善惡氣質使然也三品之說其有見於人之清濁厚薄而云然乎然氣有清濁而理無清濁質有厚薄而理無厚薄是謂氣有三品可也謂質有三品可也而謂性有三品則不可蓋性也者其賦豫在天而體備在人言天而不言人固未究乎其實言人而不言天亦未探乎其本孔子發其一貫之藴著其分見之端而因事以制名此固萬世言性之宗也善何言乎繼萬物各具一理而萬理同出一原一原即所謂善也天若有所與於人人若有所取於天取與之間純粹以精之理自覺其流而不息莫見其合同而化擬諸父子之繼體繼志而無以異是者故曰繼也性何言乎成善居天人之交渾然一理而已而人得之以為性詩曰維天之命於穆不已特自其未載於形者言之若形之既載則皆備之物各足之理乃與生俱生若人有以自成而天不居其功焉故曰成也夫性猶水也善猶泉也泉者水之本源水者泉之分流固不可以水為泉亦不得謂水非泉也性之大原出於善何以異此善為性之本即萬物之所以資始性為善之實即萬物之所以各正分之有先後合之無異同人無有不善水無有不下孟子所為取譬也昔孔子繫易有見於性之本善乃天與人相繼而成故善言繼性言成於以發明乎道體即以昭示夫性量厥後子思孟子相為極本窮源而論說愈著彼言性者之棼棼而不息其亦未嘗取周易繫傳而讀之也周易繼之者善也成之者性也檢討臣周長發朱子本義道具於隂而行乎陽繼言其發也善謂化育之功陽之事也成言其具也性謂物之所受言物生則有性而各具是道也隂之事也臣謹按盈天地間莫非氣也然氣形而下理形而上無理則氣無所統攝而無氣則理亦不能運行是理與氣二者固不相離也故無極之始確然隤然不可得而名言之至分隂分陽而理實宰氣而出氣亦載理以行此即所謂道也顧道也者統名也自乾坤定位以來日月之推遷河嶽之流峙人物之蕃變與夫目遇之而成色耳得之而成聲靡不禀受造化之精以處乎髙厚之內道固無乎不察也而自其道之本然者言之則誠有微之又微者焉蓋其靜極而動也發育流行無少間斷如絲綸然有繼之者是氣方運而猶未及乎物純然不雜即粹然至善也逮至妙合而凝也形生神發咸具秉彛如裁制然有成之者是氣既具而無不賦乎物受氣成形即受理成性也然則天地之道亦可見矣且夫天下之物僞則間間則雜雜則不能因物付物而使之各得其所止自然之勢也向使天地非有此一隂一陽之道運乎其間則發於始者未必續於其終賦乎彼者未必能周乎此而天地亦幾於息矣不知天地一隂陽也隂陽一天地之道也為動靜為闔闢其循環不息者皆太極之真所發抒也而孰得而雜之為絪縕為化醇其物與無妄者皆不已之命所散給也而孰得而外之是則所謂善與性也善原乎易簡而元亨利貞有以鼓萬物之出入而流衍於無窮造化之所以大生而廣生者此也性本乎健順而仁義禮智有以植萬理之根柢而周流於無間降衷之所以有物而有則者此也且其所謂繼之者豈銖銖而積之乎所謂成之者豈物物而為之乎是道也推之於前不見其迹引之於後莫測其端既無一物之不肖亦無一物之或肖斯則天地之所以為大而道之所以不測也濂溪周子云大哉乾元萬物資始誠之源也乾道變化各正性命誠之立也其繼善成性之謂乎夫從其發者而論則曰善從其具者而論則曰性而究之善屬乎陽性屬乎隂隂陽氣也所以然者理也理以氣行氣由理運二而一者也故曰一隂一陽之謂道也獨是人物皆受生於天地而不能盡盡其性以克全夫天道本然之善是必有首出庶物之聖人斯能盡己性以盡人物之性於以葆其元善而立人之極也夫周易富有之謂大業日新之謂盛德諭德臣覺羅蘇岱孔頴達曰此覆說大業盛德以廣大悉備萬事富有所以謂之大業聖人以能變通體化合變其德日日增新是德之盛極故謂之盛德也臣謹按夫業發用於外者也措諸外必本諸內藏用則內矣蓋造化無無體之用時而藏用舉衆有之生意皆涵蓄於內洪纖髙下無物不有所有甚富是雖未見諸用也但其含之者廣而其施之也不匱因內知外而謂之大業夫德存主於內者也有諸內必形諸外顯仁則外矣蓋造化無無用之體時而顯仁舉萬象之生機皆發泄於外包涵生意接續無間日日增新是雖非立乎體也但其出之者不竭而其運之也不窮因外知內而謂之盛德顯仁之盛德陽也未始不根於隂藏用之大業隂也未始不根於陽一隂一陽迭運不已而道在是矣此言天地之盛德大業雖本於無心之化而實有互根之妙然天地能生萬物而不能成萬物萬物本天地以生而不能自遂其生且覆載生成或有偶偏雨𤾉寒暑或不得其正則天地亦無可如何必待聖人參贊之以成其育物之實也所以聖人行天地之道總天地之功教思無窮容保無疆而民胞物與之懷何時少寬於中心是以裁成輔相功及萬世者聖人之業大業也神明天縱終始日新者聖人之德盛德也天地聖人一而已矣周易易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門編修臣秦鐄孔頴達曰言易道至極聖人用之以增崇其德廣大其業朱子曰天地設位而變化行猶知禮存性而道義出也成性本成之性也存存謂存而又存不已之意也臣謹按易之理顯於乾坤聖人體易於身即兼備天地之蘊然所謂合德於天地者豈空言哉天地之化乾始而坤成聖人之事進德而修業是故德業者聖人效天法地之實也而知禮者又聖人崇德廣業之實也何謂知窮理之謂何謂禮循理之謂夫盈宇宙間萬殊變化之妙耳目不能窮算數不能盡惟天之髙明足以冒之亦惟心之虛靈足以統之盈宇宙間曲折纖微之類賢達不能厭愚陋不能遺惟地之廣厚足以包之亦惟身之矩矱足以踐之天之氣上浮而清知則得天之清地之質下凝而厚禮則象地之厚清則獨超於萬物之表厚則不遺於衆物之中常人氣拘物蔽知識則卑隘而自安踐履則好髙而無實所由與天地不相似也聖人窮理以致其知於凡至微至顯之理必極之表裏洞達而不翳則其德日纍而日髙循理以踐其實於凡一事一物之間必極之委曲自盡而無憾則其業愈卑而愈廣知窮萬理之原則乾之始萬物也禮循萬物之則則坤之成萬物也中庸言修德凝道之要亦云溫故知新敦厚崇禮殆可與崇德廣業之㫖相發明者哉要之析而言之則為德業統而論之則一性而已性者無聲無臭渾然具足則成性之謂也自其發於用而坦然可由曰道成於事而秩然咸宜曰義故道義者根於性而不窮而知禮者乃所以涵養其渾然之性以培道義之原也知極其崇則萬象羅於方寸而吾性之靈明不淆矣禮極其卑則萬事約於規矩而吾性之廣大彌固矣此所以為存之又存也存之又存則日新富有何所往而非道何所往而非義乎故曰道義之門夫性之存存而不已即易之生生而不窮天地以貞元為往復發育斂藏者天地德業之盛天地之易也聖人以知禮為積纍髙明博厚者聖人德業之盛聖人之易也然則法天地以體易舍知禮二者其何以哉夫子繫辭之意深矣周易夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地編修臣積善臣謹按聖人之道與天地參非形迹之相似也實有與髙卑合撰者焉聖人以一心超乎萬象之表無一物之不函以一身周乎萬類之繁無一事之不盡則其髙明之體廣大之模有非人之所能擬議者而要不外於知行之並進內外之交修極其功遂合兩大於無間也夫得於心者謂德著於事者謂業其理備於易書而能崇之廣之者惟聖人是易乃聖人之所以崇德而廣業者也德何以崇知開其先蓋理有未明則識有所限惟理之蘊奧窮究而靡遺斯心之神明昭朗而無翳研之愈深自進而不已也而業之所以廣者其功惟在於由禮蓋禮有節文必曲折之悉到雖躬行實踐若平平無竒然履道坦坦而功能已無外矣惟其卑也是以廣也知既明則德益進行既盡則業益修久之而崇者極其崇廣者極其廣矣夫至崇至廣者莫天地若也而聖人如之豈非效法之實也乎夫理必取乎相資道不可以偏廢未洞其原則無以為推行之本未踐其實亦無以盡倫物之繁行未篤而徒事研求或流於髙逺而無所止識未精而矜言率履亦局於淺近而昧其趨惟心之所見愈研而愈精斯身之所循愈推而愈廣亦惟躬之所履周旋而無虧斯性之所涵昭融而無蔽內外夾持體用交致譬如登髙焉有欲躋之途必有所經之路知即其髙視之凖也禮即其舉足之地也孔子云學而不思則罔思而不學則殆知崇者思之事也禮卑者學之事也聖人率性而行固無假於思勉而其事則必兼盡此其所以為全體易道者與周易成性存存道義之門監察御史臣書昌臣謹按洪鈞賦豫之初萬善咸備而渾成者性然則性為衆美之歸一盡而無不盡其無分體用者乎雖然性亦何嘗無體用也體用者何體則曰性用則曰道曰義性為道義之本源道義乃性之作用茍徒談道義而不盡夫存性之功則有用而無體其失終歸於無本徒知存性而無道義充實之驗則求體而遺用其弊漸流於空虛是皆岐途曲徑非蕩平正直體全用備之學也聖人深有鑒於此是以效天法地於夙夜基命之中順之而不鑿養之而不害且拳拳不置念兹在兹全其固有之天而不使有毫髮之間斷如詩曰緝熙敬止書曰顧諟明命其存存不已之功為何如哉於是其本既立其道自生千變從此來萬化由此起源源本本道與義於是乎其用之不竭矣極之道充天壤不過完性中之功能義周庶類不過畢性中之事業性也道也義也雖有體用之分其實非兩事也天地不外一誠聖人亦無非一性而已由此觀之道義得於心則日新月盛而德有不日崇者哉道義發諸事則日積月纍而業有不日廣者哉然非知極其明而行極其力則存存之功又有未易言也此知崇禮卑之訓所以揭示篇端以明崇德廣業之實而為成性存存之所自致乎夫以一人而與天地合其德與天地同其用者在於此焉周易子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎贊善臣桐保真德秀曰孔子因中孚鳴鶴之爻而發明應感之理謂人君雖處宫庭而其言不可以不謹又推而廣之言行皆不可以不謹蓋鶴鳴子和由氣之相感上倡下應亦理之自然故言之善否出於一室之間而人之從違見於千里之外一言之出則為號令而百姓被之一行之著則為儀表而四方見之身之有言行猶户有樞有機啓閉張弛由此而出言行之發榮辱隨之其取喻也明矣猶懼人之易忽也則又曰言行君子之所以動天地也蓋天地之大不可測識然一言一行之善感格之效捷於影響其可不謹乎臣謹按從來人君所以宣示中外表正四方者大端不出乎言行蓋言行者一身之樞機逺邇之從違天地之感應皆視其善與不善也是以禮記左史書天子之動右史書天子之言要惟約飭人君言焉本之以實心行焉將之以至性深明夫言行之發關乎榮辱感格之效捷於影響俾言行交善而後已然欲言行之交善非存誠主敬斷斷乎不可蓋存誠則內絶虛僞之私外無緣飾之弊主敬則心存純一之念身著恪恭之容凡典謨訓誥皆關乎國計民生之要可為天下後世則經綸參贊胥係乎萬年百世之規可為天下後世法上下為之格被逺邇從而順應者皆此存誠主敬之功有以流通鼓動於其間信乎言行不可不謹也彼鳴鶴在隂其子和之上感下應其理豈有爽乎亦在乎人君交盡其善焉已矣周易君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也監察御史臣邱玖華程子曰在人所節惟言與行節於言則行可知言所當先也吳澄曰此爻辭所象慎動之節而夫子以發言之辭釋之臣謹按聖賢慎言之訓散見於詩書其義不専係乎君臣政治之大也繫辭獨於君臣發之何哉蓋天下利害倚伏之端機每中於所忽而患常乘於不及防言之不慎上無以收腹心臂指之用下無以效喉舌耳目之司小則僨事而敗謀大則隕身而誤國甚不可不察也夫開誠布公者人君待下之道同寅協恭者人臣事上之誼也然人君操賞罰不測之權籌軍國萬幾之務所恃忠謀智計之士深思密議於廟堂之上治略轉旋於不覺事變消弭於未形天下隂䝉其福而君臣咸享其安且國是鮮紛更之擾而人才亦無摧折之虞不然用一人而傾軋者思抵其隙圖一政而環伺者欲售其奸意㫖易窺則讒詞瞽惑而委任轉以生疑忠言輕泄則蜚語中傷而主聰日以多蔽君之不密其失不獨無以保全夫臣子而已若夫為人臣者或以孤立而受主知以新進而敷讜議其地至危也至如左右輔弼朝夕論思與聞宗社國家之大計其責為更重故必守溫樹不言之風明諫草退焚之義坤之六四曰括囊無咎君陳曰爾有嘉謀嘉猷則入告爾后於內爾乃順之於外此豈導人臣以懦默茍容逢迎將順之習哉蓋造膝而陳詭辭而出善則稱君過則稱己者乃忠藎之大節而得失之所以分也所可異者身居公輔之任素為倚重之臣乃至朝廷用一人則宣之於外曰我實為之黜一人則宣之於外曰我實主之借國家之威福樹私門之黨與勢必恩歸之已怨返之君一朝敗露禍且不測由是思之言語不密則君臣交失而即有害於幾事之成故曰亂之階也嘗觀史傳中若漢成帝之於王章唐髙宗之於上官儀文宗之於宋申錫所謂君不密則失其臣者而如陳蕃之除宦官乞宣章奏寇凖之去丁謂被酒漏言尤足為不密失身之炯戒雖然圖議不密而禍貽臣下非所語於英君哲后也至於漏言獲罪則雖忠於謀國奮身犯難恆所不免豈非蹈乎小諒而未克盡乎事君小心之敬者與此孔子繫辭為前聖所未發而不同於泛然慎言之訓也其防微杜漸之㫖誠足為天下萬世之明鑑也矣周易易無思也無為也寂然不動感而遂通天下之故編修臣秦蕙田朱子曰四者易之體所以立而用所以行者也易指蓍卦無思無為言其無心也寂然者感之體感通者寂之用人心之妙其動靜亦如此蓍之德圓而神卦之德方以知六爻之義易以貢聖人以此洗心退藏於密朱子曰圓神謂變化無方方知謂事有定理易以貢謂變易以告人聖人體具三者之德而無一塵之纍無事則其心寂然人莫能窺有事則神知之用隨感而應也臣謹按天地之道運行不息通復無端而於穆之微著於揲蓍求卦者可以推見性命之原而得聖賢學術之宗㫖傳曰生生之謂易又曰易與天地凖故能彌綸天地之道夫乾大生坤廣生舉天地間日月之往來四時之遞嬗萬物之並育無一息之或停無一事之不體生生之道可謂博矣然皆造化之功用而非其主宰故曰易有太極是生兩儀又曰天地無心而成化詩曰上天之載無聲無臭夫無聲無臭即所謂無思無為寂然不動者也是無心也太極也感而遂通之體也蓋體立於無用行於有體不立則用不行故周子以無極說太極而為生隂陽五行之本蓍之德圓圓者老少竒偶變通不拘周流無滯圓之象也卦之德方方者隂陽剛柔彰往察來一定不易知之事也神即六爻之所以變易而知則所貢以告人之定理也夫寂然不動者體之所以立感而遂通者用之所以行圓神方知者用之所以妙而要不外無思無為者為之樞紐故聖人觀於易而知人身之樞紐在心心之虛明在洗洗之功在退藏於密焉何則氣之精爽聚於心靜則為中本無不瑩也動則為和本無不靈也而何以云洗洗也者滌除其汚染之謂心何以汚染則妄動為之纍也蓋心體本靜不靜則失其養失其養則憧憧往來朋從爾思七情外馳萬感互進雖當燕閒無事耳目無所寄託則恍惚動搖而無以自寧於是真靜之體微不克精察夫天理人欲之辨一切見之於言施之於事偏倚駁雜之弊有不自知其所以然者即或覺而矯之亦見其滅於東而生於西莫之能勝也是故以動而馳則當以靜而復聖人清明在躬志氣如神當其無事則精神收斂端莊凝定一靈湛然寂而不動以葆其無思無為之體及夫由靜而動凡念慮之萌審幾致察又極其精而無毫釐杪忽之差洗之愈清藏之愈密由是事物之來油然順應即圓神之妙也因物付物即方知之妙也而精義致用何莫非如六爻之變易以貢者乎蓋不翕聚則不能發散非靜虛則不能動直此洗心退藏所以為學易之宗要而盡性至命之全功也周易易有太極是生兩儀監察御史臣張漢晉王弼曰夫有必始於無故太極生兩儀也太極者無稱之稱不可得而名取有之所極况之太極者也朱子本義曰一每生二自然之理也易者隂陽之變太極者理也臣謹按太極只是一實理貫而通之一言蔽之矣理本無名字之曰太極太之為言甚也此理至中至正至精至粹至神至妙無可復加無可得而形容故强名之曰太極然則無窮盡無方體者太極也萬物盡天地老超然獨存再造天地萬物者亦太極也伏羲文王未嘗言太極孔子創言之邵子所謂畫前之易其即此乎由畫前之易推之兩儀四象八卦胥出其中矣大傳曰一隂一陽之謂道一隂一陽即易也所以一隂而一陽者道體之所為也語道體之極至則謂之太極語太極之流行則謂之道雖有二名實無兩體太極不雜於隂陽而亦不離於隂陽太極生隂生陽是為積理生氣隂陽既生太極即隂陽而在是理即生於氣中萬物一太極也物物一太極也月印萬川處處皆員及傾水銀於地顆顆皆員之喻最為得之老子曰有物混成先天地而生即指太極而言乎若夫漢志所謂太極函三為一則是以天地人三者為形氣已具而渾淪未判之物莊子所謂道在太極之先亦是指兩儀未判為渾淪之物道又别是一空懸之物已分道與太極而為二不知道即太極也邵子謂道為太極以流行言之心為太極以統會言之則二而一之矣雖然太極之理中庸備之大本與敦化太極之全體達道與川流太極之流行推之至誠之不二不測止至善之止仁止敬止孝慈信皆是通書云誠者聖人之本誠即太極善惡即隂陽之義故曰聖人太極之全體也至周子謂無極而太極則是謂無形而有理猶曰無形而至形無方而有方曰無極者非有駕空鑿虛之見也曰無極而太極亦豈有叠床架屋之說哉蓋夫子之言有者贊易則主易易無方體是以曰有周子之言無者作太極圖則主太極太極有朕兆是以曰無詩曰上天之載無聲無臭孔子曰天何言哉無極之妙周公孔子已引而不發矣易其至矣乎周易河出圖洛出書聖人則之編修臣沈榮仁朱子曰聖人制作所由初非一端然其法象必有最親切處鴻荒之世有象未嘗有數至此而後隂陽竒偶可得而言朱震曰河圖洛書象數也則者彼有物而此則之也臣謹按圖書之義自漢迄唐說易者罕詳其說經籍所載括地志稽命曜等篇皆加以河圖洛書之名而方圓之象九十之數先儒皆未之及也至宋陳摶始言先天古易河圖洛書之學數傳而至邵堯夫謂圓者河圖之數方者洛書之文羲文因之而造易禹箕敘之而作範而其學始大顯朱子答袁樞書謂河圖與易之天一至地十者合而載天地五十有五之數則固易之所自出也洛書與洪範之初一至次九者合而具九疇之數則固洪範之所自出也又因讀大戴禮明堂篇而得一證謂漢人以九為洛書是十圖九書其說固不可易也惟宋劉牧作易數鈎隱圖則云河圖四十五數洛書五十五數是邵所謂圖乃劉所謂書也邵所謂書乃劉所謂圖也又引大傳以為二者皆出於伏羲之世先儒謂其並無明驗固不足信要而論之太虛之中至理流行物生而有象有象而數因之起有數而理以愈彰宋蔡元定云天下之萬象不出於一方一圓天下之萬數不出於一奇一偶天下之萬理不出於一動一靜臣愚以為聖人之心無所不通無所不遍其則之者但因其方圓奇偶之象數以成文而動靜之理藉此益著耳故夫子言河圖洛書而不分其孰為九孰為十言聖人則之而不明其孰屬羲孰屬禹也尚書論語雖言河圖亦未細陳其數也至朱子啓䝉之剖晰其辭發揮其蘊者正以前人之紛紜轇葛迄無定論故承邵子之學不憚煩言折衷於至當使學者得因數以明理朱子之立教又有不得不然者矣况乎八卦之水火木金實不外洪範之五行洛書之四方四隅實不外河圖之八卦聖人所以神明其德而開物成務以彌綸天地化育之功者先後同揆古今一致豈有所區别於其間乎漢劉歆云河圖洛書相為經緯八卦九章相為表裏朱子啓䝉引之蓋以其深得貫通之妙也易為萬世文字之祖而圖書更在其先果得其義而為學之功庶幾有所從入乎周易河出圖洛出書給事中臣盧秉純臣謹按伏羲本河圖以畫卦大禹因洛書以演疇其說出之漢孔安國劉氏歆所從來蓋甚逺也宋歐陽修及明歸有光皆非之以為九疇不繫於洛書臣亦嘗疑繫辭所云河出圖洛出書聖人則之是洛書亦為易用非以演疇也豈圖書並出於伏羲之世與抑夏有連山易乃則洛書以成之與又豈文王拘幽時圖書並列而參考以為周易與孔子繫易固非若緯書之類可以置而不論也然而今之經學皆折衷於朱子朱子啓䝉取孔劉之說則亦以河圖屬易洛書屬洪範而已修與有光文章之士不必信而臣所疑聖人則之之言或以圖書一例而孔子連類及之也夫宋劉牧之兩易其名以圖為書書為圖何也洪範之一水二火三木四金五土與河圖之天一生水地二生火天三生木地四生金天五生土相符易之太極八卦與洛書之九宫不異故沿誤耳圖書之精微要非泥一端所能盡而關子明所云河圖之文七前六後八左九右洛書之文九前一後三左七右四前左二前右八後左六後右為不可易矣河圖之可以畫卦洛書之可以演疇何也卦不過隂陽奇偶河圖一生一成隂陽奇偶之義中五太極也隂陽兩儀也外分四方四象也錯其生成之數八卦備矣故河圖可以畫卦也洛書有九數洪範亦九數數始於一配以五行天下莫先於五行也數終乎五配以皇極君道莫外於皇極也餘者環布各有其序故洛書可以演疇也河圖洛書之分體用何也河圖生成同位以言其本然故為體洛書九數錯綜以言其運動故為用也分而言之河圖非無用洛書非無體也河圖洛書之有同異何也河圖之生數與洛書五行之序同也而洛書不言成數異也河圖之下一左三中五與洛書同也七九則兩異其位異也河圖有十洛書無十異也而洛書之對宫皆十寓十於其中也同也河圖之中十夾五洛書之中只有五異也而洛書之橫竪斜正皆以十包五也同也洛書右下之六即河圖下六之錯而右洛書左下之八即河圖左八之錯而下也洛書左上之四右上之二即河圖上二右四之易位而交錯也七九既易位故二四亦易位也異而同也洛書之一九二八三七四六相對而成十河圖則下之一與右之九右之四與下之六上之二與左之八左之三與上之七相交而成十異而同也河圖之竒偶同居五位自相互也洛書之竒正偶偏九宫共相間也異而同也河圖四位方布而為四十之數洛書八宫還布而為四十之數異而同也河圖之分五行依五方之正位洛書之分五行亦依五方之正位而東北西南同中土東南同東木西北同西金九宫不外乎五行亦異而同也其同者理為之其不同者數為之皆天地之自然不可强也若其盡異則天地有二理若其盡同則龜龍無庸兩出矣臣更有臆說焉河圖之一三五與洛書同而七九易位者河圖主互洛書主對也河圖下右之一與九四與六互為十者金水相生也上左之二與八三與七互為十者木火相生也火金不互者相克也水木不互者以嵗功言之春與夏連秋與冬連冬春則易嵗也洛書一與九對一在下冬日之伏藏數至少也九在上夏日之發泄數至多也三與七對三居左春氣之尚稚由一而漸多也七居右秋氣之方斂由九而漸少也二四居上之左右以上之九數為多配以偶數之少也八六居下之左右以下之一數為少配以偶數之多也合之二四配九四八配三八六配一六二配七皆成十五何其均而密也河圖具五行而卦不及五行洛書備八宫而九疇不及八卦蓋伏羲心有全易觸河圖而為卦不必先禹而預為範也大禹心有洪範觸洛書而為疇不必繼羲而再為易也龜龍者天地之神物卦疇者聖心之妙用神物蘊乎靈異妙用合乎自然得其意而旁通超乎象數八卦之於易五行之於範言之固顯而五行之於八卦八卦之於九疇不言亦非隱也後人能於河圖洛書略其迹之異而會其理之同則龜龍同兆卦疇合觀無煩呶呶致辨矣周易化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行監察御史臣柴潮生臣謹按易非聖人不能作卦爻具而蓍䇿興亦非聖人不能用也蓋聖人之於易妙合而凝故用易之際復能渾然無間化裁之在易者易中先有化裁之理而因其自然之化從而裁之以定老少動靜之象則存乎聖人化裁之變推行之在易者易中先有可以推行之理而因變之所示推而行之於動作之間以得夫事為之凖則存乎聖人推行之通夫變通者因化裁推行而有者也化裁推行者因變通而施者也不假觀玩之文而融貫夫化裁推行之理不襲口耳之迹而神會夫變通之機則存乎神而明之之人必也德裕於心洽化裁之理行利於身善推行之用斂其機於淵默而自然渾成於中運其神於一心而自然孚契於外則非有得於易簡之理而德行素裕者不能也蓋德行者道之歸也道之在天地者易中已呈其象而道之在聖人者一身直揭其全上文言化裁推行是泛論天地之理故曰謂之變謂之通則聖人作易之本體此言化裁推行是易中所自具故曰存乎變存乎通則聖人卜易之妙用上文言變通而歸之事業者推易道於民也故設卦以盡言立象以盡意此言變通而歸之德行者存易道於己也故得意而忘言得言而忘象夫易之變通在爻象變通之神在人人之所以能神則在德行得於心而見之行事以人心之神契合乎易之神充周流行若合一體則所謂神而明之也默而成之正言其所以能神而明之也不言而信又以申言默成之妙也總之方揲之時有以盡其變既揲之後有以得其通聖人之德行固與易道相為妙合者也故曰易非聖人不能作亦非聖人不能用也周易天下之動貞夫一者也編修臣吳兆雯朱子本義天下之動其變無窮然順理則吉逆理則凶則其所正而常者亦一理而已矣臣謹按造化之與人事皆有當然之理以綱維乎其中而不可易夫人事之興初若雜然而難齊也而不知從違順逆之見於人皆其所必然者因其所必然之勢而示之以當然之理理在而變通不窮盛德大業亹亹可幾矣蓋天下之理一而已矣由乾元亨利貞之意而究之天地之大德曰生所謂元也即仁也始者必亨亨者嘉會合禮大寶聚人皆是也利即義也而要之不出乎貞非貞無以起元故曰一也以非有二本故也即天覆地載而知貞正得一以為觀也即日照月臨而知貞正得一以為明也不即可以知天下之動之貞夫一乎顧天下吉凶悔吝皆生乎動至不一矣動也者自易理言之則剛柔之相推變通之趣時皆動象也自人言之則顯而立言行事微而積慮處心皆動機也然而爻象之動於易與吉凶之動於人皆必然之勢也其勢雖棼然莫測而人之順理則裕從欲則危有同揆也惠迪則吉從逆則凶無二致也一如天示人以易地示人以簡而貞觀之理自若也一如日明於晝月明於夜而貞明之理自若也聖人以理之正而常者為勝寂然不動遊心於何思何慮之天動罔不臧置身於不競不絿之地能盡乎會通之變而不纍於吉凶悔吝之間其動也非妄也動生於靜而常出之以無為其一也非可執也一散於萬而常行其所無事惟聖人貞夫一而萬一各正則吉無不利靜固靜也動亦靜也舍貞之外更無他術非一而何哉是知聖人者權足以樞萬化政足以柄四時言脫於口而和可以翔海甸意起於心而精可以通神明行成於身而效可以格象緯其始也禮樂刑政操之乎我其既也彌綸調燮藉之乎我其終也宇宙造化生之乎我以一剛一柔者為之本至易至簡者為之用貞者貞乎此者也一者時雖變而貞則不變也情雖動而貞則常靜也雖天地日月皆不能外焉元吉在上知幾其神又何疑夫天下之動非可以一御乎然則虞舜之所謂精一孔子之所謂一貫者皆貞一之說也老子曰王侯得一以為天下貞蓋惟貞夫一則可以為平治天下之本萬變雖殊一以貫之中和位育皆歸度內矣天下不重賴有聖人哉周易天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義中允臣任啓運張子曰將陳理財養物於下故先敘天地生物朱震曰天地之大德曰生仁也聖人成位乎兩間者仁而巳不仁不足以參天地義所以為仁非二本也故曰立人之道曰仁與義項安世曰聖人之仁即天地之生大寶曰位即崇髙莫大乎富貴也下以庖犧神農黃帝堯舜實之理財所謂水火金木土榖惟修所以利之也正辭謂殊貴賤使有度明取豫使有義辨名實使有信利之所在不可不導之使知義也禁民為非謂憲禁令致刑罰以齊其不可導者也蓋養之教之而後齊之聖人之政盡於此三者矣其德意之所發主於仁民義者仁之見於條理者也臣謹按天地之德仁而已矣聖人之心亦仁而已矣易曰立人之道曰仁與義非二物也仁即義之統體義即仁之散殊仁則周遍渾淪義則隨物各當故親親仁民愛物皆仁而於親用其親民用其仁物用其愛即義也即仁民之中老無不安少無不懷者仁而於老用其安少用其懷即義也故義者仁之大用也由仁民而上之則愛親者不敢惡於人敬親者不敢慢於人仁民原親親之心所自流焉耳由仁民而下之則數罟不入斧斤以時墻桑之樹雞豚狗彘之畜凡於物用其愛者亦仁民之政所必及焉耳其自流而必及者一仁之貫注故一仁而天下之治統之矣董子曰仁者正其誼不謀其利孟子言何必曰利亦有仁義而已矣而文王繫易首言元亨利貞孔子文言言利者義之和又言利物足以和義非特言利且合利於義何哉蓋天生百物皆以養民故乾始能以美利利天下始者仁也美利利天下者義也天地之大利即天地之大義而即天地之大仁也非利物而何以和義非和義而何以為仁哉故理財者聖人之所為利物聖人之所為義以成仁也夫後世之天下猶古聖之天下天地之生物未嘗息也然而古常有餘後常不足此無異故惟理財之不講也理財之不講則以正辭與禁民為非之不講也大學曰生財有大道生之者衆食之者寡為之者疾用之者舒夫生衆為疾道之所為開其源也食寡用舒道之所為節其流也以臣統觀天下之大勢大約西北之財之不理在不能開其源東南之財之不理在不能節其流夫雍州之域禹貢所謂厥田上上也冀州之域禹貢所謂厥賦上上也虞夏殷周之疆理在焉古稱沃野千里支粟十年則以經理備而蓄積多耳降及後世問所謂溝洫畎澮尚有存焉者乎蓄泄無資灌溉無術其民但知畜牧之利不知稼穡之利逐末者日多務農者日少其名為農者亦不習於耕耘種殖之蘊奧大抵皆疏略而不精此臣所謂源之有未開也東南之民於耕稼之術工矣山澤之利皆盡爭之幾於搜山而採竭澤而漁矣其所入每不足供所出其弊一曰好奢一曰尚鬼如江寧之俗非百金不能葬吳下之俗非百金不能娶家無儋石而出必美其服鮮其履若服粗布之衣即忸怩而不敢出且有一小宴會而費中人之産者矣一有疾病則巫師簧鼓之謂某神為祟醮酬祈禳小則數十金大則百金有因一疾病而飽暖之家蕩於一朝者矣當其無事則又有預酬預保之說如春戲青苗戲無一村無之費輒數十金也一人勤勤終嵗所入不過十金而衣飾相耀耗之酒食相矜耗之虛文僭制耗之祈禳禱祀妖誕之說又耗之如此而財力不屈者未之有也此臣所謂流之有不節者也要其補救之術則易所謂正辭禁民為非者盡之正辭者示之以所當行重本業勸農桑定昏喪之制嚴貴賤之等使知勤之可慕而民樂於勤儉之為美而民安於儉禁民為非者示以逐末之不如務農奢華之不如朴實嚴禁簧鼓之妖邪及歌舞之遊食而倡之皆自貴者始則因天地自然之利而為之輔相為之裁成此利物之所以和義以其大義行其至仁使物物各得之宜渾淪周遍則聖人之仁一天地之德也周易通其變使民不倦神而化之使民宜之編修臣邵齊燾吳氏澄曰風氣漸開不可如朴略之世此窮而當變也變之則通而不窮矣其能使民喜樂不倦者以其通之之道神妙不測變而不見其迹便於民而民皆宜利之故爾蔡氏清曰神而化即其變通之妙於無為也臣謹按易繫辭傳言聖人制器尚象之事而於黃帝堯舜氏則曰通其變使民不倦神而化之使民宜之蓋天地之道有盈虛消息相乘之機帝王之治有弛張損益不窮之妙此物理之自然而王道之大用也夫帝王之於天下也有不可變有不可不變其不可變者彛倫之大本心性之大原如日月之位隂陽山川之奠髙下亘古莫能易者也其不可不變者剛柔寬猛之迭用文章制度之日新如春變而夏夏變而秋秋變而冬冬變而春循環錯行而不可執一者也所以然者何也民之受治於聖人猶物之受命於天萬物盈天地之間其生也成也消也長也非物所能自為也有主張之者矣有推行之者矣向使生者一任其生而莫為之成消者一任其消而莫為之長此造物者之所不能也聖人之於民猶是己民之所未厭聖人不强去民之所未安聖人不强行處當變之時而神其變之之道不變則窮而變則通矣獨於黃帝堯舜言之者神農以前風氣朴略民用亦未滋也黃帝堯舜時民欲漸開人文漸啓天地萬物之氣運五行百産之精華旁薄欎積以待聖人之調劑將欲仍安其朴略而有所不能故中天之運至此而開洪荒之俗至此而改變而通之之道自黃帝堯舜始也夫當未可變之時而多所紛更則民必勞苦厭倦而不能循當將欲變之時而狃於故常則民又將因循怠倦而不可振惟變乎其所不得不變有以鼓舞其心思而警動其耳目則天下之人油油然趨之而不能已矣是豈聖人之喜新而惡舊强用其智慮作為以驅天下而從我哉因其自然之變而以自然之理處之所謂宜也變而合其宜然後謂之通通者無所窒礙之名也無所勉强之意也王者無為而成化百姓日用而不知如川之決焉流而不窮如風之動焉行而無迹因民之所利而利之而天下各得其所矣蓋聖人因其變以適其宜而民則但見其宜而莫見其變也此聖人之妙於變也神之至化之至也以不變者建天下之極而以神於變者制天下之宜斯聖人無為之治也夫周易上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬檢討臣韓彥曾吳氏澄曰十三卦之制作自畫卦而始至書契而終蓋萬世文字之祖肇於畫卦而備於書契也臣謹按上古民淳事簡事係於己惟結繩以記之事關於人惟結繩以驗之不必過為防慮而天下已治後世民僞事煩非結繩所能理矣聖人易之以書契言不能記者文書以識之事不能信者約契以驗之由是百官之功罪可稽而事以治萬民之情僞可核而情以察若是乎上古略而後世詳也上古質而後世文也夫聖人豈厭乎略而好乎詳厭乎質而好乎文哉誠以生民既衆不得不多為設官以察之設官既多又不得不思所以治其官者茍官之功過不記民之誠僞不知何以統百官而率萬民乎於是易而為書契夫亦有所大不得已於其間也世傳蒼頡造字使義理必歸文字文字必歸六書而遂因之以為書契所謂天雨粟之說近於誕而不足為據而要之千古之治法基此矣唐虞之際風動時雍三代以來禮明樂備未必非書契有以助之蓋道者所以立本也法者所以適變也聖人自有通其變使民不倦神而化之使民宜之者存乎其間豈沾沾焉執書契以為衡而遂成至治哉至於春秋鄭鑄刑書晉鑄刑鼎莫不自以為救世而宜民其任書契者至矣而専務令行禁止之圖反開弄法舞文之習說者謂聖人制有書契原以治百官而察萬民而其弊乃至於如此何如一任其結繩之為愈乎是即剖斗折衡而民不爭之說而不知聖人為治之苦衷者也聖人之為治也於其意而巳意至而法即隨焉法行而意即寓焉自結繩之時而視乎書契則後世也更自其後者觀之則易書契之聖人猶上古也一事之善垂之金石而不朽一事之惡示之奕祀而不磨此其治且察者固不惟其法而惟其意而已矣若夫夬者决也剛决柔也取諸夬者明乎書契之了然明白可以决去小人之隱也百官豈無功過書契則兼功過而示之而聖人之意則欲存其功而决去其過萬民豈無誠僞書契則兼誠僞而著之而聖人之意則欲存其誠而决去其僞此其用意何深也要之書契之作顯可見聖人用法之精明而微可窺聖人用意之忠厚至於酌古斟今補偏救弊使百官得其宜萬民得其所以繼唐虞三代之盛則在乎神明變化者之移默運焉爾周易精義入神以致用也監察御史臣倪國璉俞琰曰精研義理無毫釐之差而深造於神妙所以致之於用也臣謹按經言感應自然之理觀物類而已知思慮之無庸矣而况聖學之出於自然者乎夫聖人之學始於下學迄於上達詣雖不同而機則一貫心之裁制為義而義之精妙為神義者宜而已物之有宜有不宜事之有可有不可研之在乎一心而用之實通萬變使未有以精之則於事物之理但見其膚淺而不得其精深欲於應事接物之間曲中其則不可得也聖人惟精研其義幾微必察不使纎悉有遺巨細畢該務令毫釐必辨由是積而造之至於入神之域則妙不容言天下莫得而窺其祕變化不測鬼神莫得而與其幾此窮理於內原無心於致用也然權度之在我者既精斯神而明之取諸資深之後而所觸皆通隨感即應得其無方之用而迎物而解凡事之大小常變不過執一義以處之而各得其當而用於是乎致矣由是言之屈此心於斯理之內而所詣者微然後能伸此志於應感之交而所發者逺此知行所以相須內外所以交養而互發者與書曰惟精惟一允執厥中此之謂也周易窮神知化德之盛也監察御史臣儲燧臣謹按與天地合其德者聖人也既已德合天地則凡為不二為不息為動靜之互根而往來之遞嬗者莫不觸於目而會於心蓋天人一理人盡而天自見神而明之無事於研求也感而遂通亦無待於推測也精義利用下學之事也過此則為上達之境矣今夫隂陽之迭運於兩間也自其合一不測言之謂之神自其推行有漸言之謂之化神無方者也無在而無乎不在非有疆域之可求無為而無乎不為豈有方隅之可限握造化之樞紐者此也司氣機之闔闢者亦此也夫孰從而窮之化無迹者也動而無動方其動而靜之機已萌靜而無靜方其靜而動之機已伏其流而不息者此也其止而不過者亦此也又烏從而知之惟聖人者主靜立極渾然一天載之精微故能默契夫川流敦化之妙而合上下以同流體立用行無在非天機之呈露故能會通乎易知簡能之源而統髙卑而合撰彼夫行之弗著習焉弗察可使由而不可使知者量有所阻也仁者見仁智者見智得其偏而遂遺其全者識有所滯也窮神知化非德合天地者而能若是乎而謂非德之盛乎一故神兩故化藏諸宥密與塞乎天地非二物也能盡性自能達天仰觀俯察實有相似而不違者而何至於扞格而不通神天德化天道驗諸身心與徵諸造化同一源也能盡天地之撰自能通神明之德成象成形真有得意而忘言者又何至於紛岐而不合蓋窮非研究之窮明無弗照之謂窮也知亦非推測之知睿無弗通之謂知也此亦惟養盛者自致焉而已矣夫不知者往而屈也自致者來而伸也聖學之自然有如此而人事之往來又何所用其憧憧也哉周易咸速也恆久也編修臣王際華蔡淵曰有感則應故速常故能久臣謹按天下之至神者心也故有感而即通天下之至常者道也故歷久而不變夫民之蚩蚩本天下之至愚而動之若甚易治之又若甚難自昔聖王不以動之易也而輒喜不以治之難也而終倦是以立之斯立道之斯行綏之斯來動之斯和世以為聖人過化存神之妙若是其不可測也而聖人直行所無事焉漸民以仁摩民以義浹於肌膚淪於骨髓世以為聖人百年必世之效若是其不易幾也而聖人自純一不巳焉蓋誠者聖人之本也存諸心體諸身施之於事物彰之於政令上以誠感下自以誠應至誠而不動者未之有也傳所謂上老老而民興孝上長長而民興悌上恤孤而民不倍孚及豚魚捷於影響聖人之感於人心亦若是而已矣然而至誠無息悠久無疆凡制禮法修教化正綱常敘九疇與一切用人理財諸政必不狃於小成必不昧於近利必不以王道為難成而生畏阻之心必不以太平為既致而萌逸豫之想朝乾夕惕兢兢業業終始惟一時乃日新聖人之久於其道者惟其誠也夫速之與久義似相暌而咸之與恆理本一貫彖傳於二卦皆言天地萬物之情感而即通者情也久而不渝者亦情也即情之無不通而慎所以感之者即情之不可渝而慎所以持之者其道豈有他哉亦曰誠而已矣本誠以動物雖匹夫匹婦之愚咸默喻乎廟堂之志於以致四方之風動不難也積誠以布化雖昆蟲草木之微咸煦育於太和之治於以垂萬世之丕烈皆此也宋儒周敦頤有云治天下有本身之謂也本必端端本誠心而已矣朱子亦曰天下之事千變萬化其端無窮而無一不本於人主之心然則咸以感之恆以守之欲圖可大可久之業者其必勉勉於誠心以端其本與御覽經史講義卷八
