  text: 欽定四庫全書御覽經史講義卷二目録
  hash: sha256:aa6d02a0fb66240865b881ec5e6426a9453fa4570bfbbd94e8651ada75a90241
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_008-1a, image: WYG0722/WYG0722-0137a.png}
body:
  text: 周易乾元用九乃見天則檢討臣何德新乾始能以美利利天下不言所利大矣哉編修臣趙青藜監察御史臣黃元鐸大哉乾乎剛健中正純粹精也監察御史臣周祖榮時乘六龍以御天也雲行雨施天下平也編修臣李清芳雲行雨施天下平也編修臣何其睿監察御史臣趙青藜君子學以聚之問以辨之寬以居之仁以行之監察御史臣毛旭旦直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也少詹事臣張鵬翀編修臣吳履泰君子敬以直內義以方外敬義立而德不孤給事中臣倪國璉君子敬以直內義以方外編修臣張若需給事中臣周祖榮監察御史臣李清芳監察御史臣周禮象曰地中有水師君子以容民畜衆監察御史臣李敏第九五顯比王用三驅失前禽邑人不誡吉侍講學士臣鶴年上天下澤履君子以辨上下定民志右庶子臣林蒲封右中允臣錢維城洗馬臣國柱侍讀臣齊召南編修臣竇光鼐編修臣莊有信監察御史臣趙青藜君子以辨上下定民志編修臣周玉章編修臣王際華
  hash: sha256:1073826294a440706152c2f405f50c22947ff1ead0fa52676438c6cfedb1b162
