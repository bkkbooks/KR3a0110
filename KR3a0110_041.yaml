body:
  text: 周易同人于野亨利涉大川利君子貞監察御史臣周祖榮孔頴達曰同人謂和同于人野喻其曠逺言和同于人必須寬廣無所不同用心無私乃得亨通故云同人于野亨與人同心足以涉難故曰利涉大川與人和同易入邪僻故利君子貞也胡炳文曰同人于野其同也大利君子貞其同也正臣謹按天下之人可以身相接可以心相通而必不可以私相結蓋情之所合非理則不正也羲皇設天火之卦命曰同人意良深哉夫天之所以為大者以物皆仰其覆也火之所以為明者以物皆被其光也若是者同故也聖人之於人亦若是而已矣嘗見其道偹中和心涵胞與天下一家也中國一人也出户庭而知天地之大觀萬象而知心理之同其曠渺之胸廓然無我猶之廣漠之野浩乎無垠同人如是其度量逺矣故有亨道曰利涉大川即亨可濟險之義也彼夫千尋之溪壯夫弗能遊者舟楫具則履之如平地焉艱巨之任豪士弗能勝者人力齊則試之無盤錯焉同人之益如此不誠有益而無弊乎然嘗觀往古叔季之世仕於朝者或內臣而倚屏藩之力或外臣而結近習之援或大臣而邀吏民之譽門户分其害遂流於家國處於下者或異學而聚徒與之盛或名流而髙標榜之風或英雄而締豪俠之侣朋黨立其習遂中於人心此小人之所為茍同而非君子之大同也若君子之同則必出於正聖人繫辭終曰利君子貞言乎亨固致利而貞乃為利也夫貞者以義制事以禮制心學問文章淡然於形氣之外是非邪正灼然於聞見之間所樹者道義之交而比匪不能犯所作者公忠之氣而俠烈非其倫此君子之貞而同人所以為利乎所謂和而不流羣而不黨即此義也至於聖人序同人於否之後又有深意焉蓋否以亂羣為戒故繫之曰不利君子貞懼君子之茍同而失其貞也同人以出門為義故繫之曰利君子貞懼同之悖貞而冒為君子也細繹其旨乾離合而成體中有陽明之象所以同必歸之君子地水變而定位猶有柔險之嫌所以君子必本諸貞是成卦之初其精藴已具反覆玩味之下益見易學之淵微無盡也周易同人于野編修臣徐以烜程子曰同人者以天下大同之道則聖賢大公之心也常人之同者以其私意所合乃昵比之情耳故必于野謂不以昵近情之所私而於郊野曠逺之地既不繫所私乃至公大同之道無逺不同也臣謹按天下事持之以正則情無不通守之以中則道無不洽天下之人不同而志則同天下之志不同而理則同惟君子為能通天下之志通以大中至正之理也同人一卦惟二爻一隂而上下五陽皆同與之故曰同人玩其爻辭則曰同人于門矣又曰同人于宗矣夫同人而曰于門近之至也就其一隅局於所見其狹隘固不足論已至于宗則較諸門為稍逺矣然苐昵其情之相親而形骸不隔緣其習之相近而畛域不分其所謂同者亦猶隘而不廣也豈若同人于野之曠逺無私可與天下共見者哉蓋同人之道無他所分在公私之間而已如其公也則特立固非鳴髙即從衆亦非便已光明磊落之懷天下得而共見之如其私也則和光混俗固盡出於詭隨負氣矜情亦或過於激烈茍存意見則門户自此而開稍近聲名則標榜從兹而起揆諸聖賢大公之道又安在乎是故其同也有以同為同者有以不同為同者其或事無岐趨理惟一是順而行之不立異以為髙不矯情以干譽此則以同為同者也若夫臨大事決大疑定大業當議論紛紜之際而揆度其事宜無所依回亦無所瞻顧總期合乎天理之公人心之正是以人所謂可而有否焉則折其否以成其可人所謂否而有可焉則持其可以去其否正晏子所謂如五味之相濟而非以水濟水之不能食也如五聲之相和而非琴瑟之専一而不能聼也此則以不同為同者也以此律己即所謂和而不同矣以此處世即所謂羣而不黨矣以此立朝即所謂同寅協恭和衷矣茍不明乎此義而惟交結是尚則如漢之三君顧及唐之牛李宋之洛蜀明之東林其人未始不均為正類而黨援之習至於固結而不可解所辨甚微所關乃甚巨也暌之象有曰君子以同而異其殆與同人于野之義互相發明者歟周易文明以健中正而應君子正也唯君子為能通天下之志編修臣夏廷芝臣謹按同人一卦以離遇乾火上同於天離者文明之象也乾者剛健之體也有文明之德以裕於內則明辨以晳而光昭普遍由內以達外自近以訖逺也本剛健之德以持其體則純粹以精而運量周通無一念之或二無一時之或息也蓋文明則能燭理故能明大同之義剛健則能持已故能盡大同之道此所以致同人于野之亨而非若同人于宗之吝也又卦惟六二一爻位處中正而上應九五中則無偏正則無私君子以無偏者持已而物來順應可以化將迎逆億之心君子以無私者接物而鑑空衡平可以消伐異黨同之見故夫天下雖大山陬海澨雖逺羣黎百姓之心雖甚紛紜不一參錯不齊而聖人首出即能視天下如一家統中國如一人者此豈智取術馭刑驅勢迫云爾哉蓋智術能弭于耳目之所及而不能周於耳目之所不及刑威能禁于事之所已然而不能消于事之所未然唯能通天下之志則民之出作入息無不欲遂其生也聖人即給求養欲豫之以俱生民之視履周旋無不欲復其性也聖人即樂淑禮陶豫之以各盡蓋既視億兆之心為一心自能聯億兆之體為一體而要非文明以健中正而應者亦安能致此於民耶抑又思之君子通天下之志非盡混同而無别也天下之理惟審其異者乃可以致其同故大象曰天與火同人君子以類族辨物蓋于不同之中得大同之道而後所同者為正合非阿比也由斯以推學者必特立獨行而後有聲應氣求之美人臣必嫉邪秉道而後有同寅協恭之休聖人治天下凡其所以遏惡揚善順天休命者必其明刑弼教有釐然不可紊之章程而後一道同風有日遷善而不自知之風化也此所以能通天下之志者天下亦無不以志相應而感孚之機捷于影響蕩平之治遍及寰區也周易唯君子為能通天下之志編修臣沈文鎬臣謹按此言君子大同之道一出於正而無私也天下之大燥濕剛柔不一其地智愚賢否不一其人而要無不同此志即志不盡同而要無不同此理理之所在即志之所歸唯同人之君子為能通之蓋以卦德而言文明則能析理而審大同之義剛健則能克己而盡大同之道以卦體而言中正則我以道同人而非私昵有應則人以道同我而非私比凡此皆為君子之正道得其正即得其所以同而天下之凡有志者無不相孚也彖傳以乾行釋致亨利涉但取剛健無私之義而釋利貞則先以文明見所知者無不至繼以中正見所與者無不當其兼取明健中正之義要以全盡夫剛健無私之義而已故知君子所以能得其正者實原於一誠以大公無我之懷達過化存神之用自色笑言動暨禮樂刑政無不出乎人心所自然而合乎人心所當然所以天下應之不疾而速不行而至因其勢而利導之固從風向化相其宜而裁制之亦潛運默移真有形骸雖隔而性情自通者且君子之志究言之原於一誠分言之流為四德此仁義禮智藴於一心溥博淵泉時出不窮實與人心同具之良吻然相合是故通之以仁而天下之志胥協通之以義而天下之志胥正通之以禮而天下之志胥遵其節制通之以智而天下之志胥喻其神明風流令行捷於桴鼓在君子原未嘗有異術以致此也非然者憧憧往來朋從爾思亦祗依類而應其能盡天下而通之哉乃知君子與天地合其德與日月合其明與四時合其序與鬼神合其吉凶况含生負氣之屬知覺盡同舉斯心以加諸彼自相遇以天而非私情之合程傳謂聖人視億兆之心猶一心者通於理而已誠不易之論也聖人作易於隨則曰大亨貞無咎而天下隨之於咸則曰聖人感人心而天下和平於同人則又曰唯君子為能通天下之志而歸之於一正明乎人同此心有我則隔無我則通舉念至公而四海悉應古帝王所以致協和風動之盛者胥是道也周易同人君子以類族辨物侍講臣劉綸朱子曰類族辨物所以審異而致同也虞翻曰方以類聚物以羣分君子和而不同故於同人以類族辨物也臣謹按天下含生負氣之屬莫不以類相從故大易垂象示人於釋乾卦九五之文則曰同聲相應同氣相求於繫辭上傳則又曰二人同心其利斷金同心之言其臭如蘭凡以徴氣誼之感孚交動而交應也然非深求乎聖人緣象設教之精意而或以聖人所言明統同之義多發辨異之義少則身世之交所云類聚羣分者又何以定其分而聮其情歟於此見審異以致其同而導天下以大中至正之歸者其義莫備於同人之卦夫同人之卦其德剛健而文明復兼以卦位得中之美其於同也正所謂通天下之志者矣乃文王之系卦也先之曰于野亨以其象必廣逺而無私故亨也繼之曰利涉大川言其道可共濟也周公之系爻也同人于門曰無咎以初爻在下為出門之初於卦位無繫應於卦德無專屬也同人于郊曰無悔以六爻所居者亦逺在外卦則既不及於五在內卦則更不及於二也若六二一爻與陽爻相應本為一卦之樞紐而聖人於此觀其象玩其占即同人于宗而系之以吝者何也本義云六二雖中且正然既有繫應不能大同也楊文煥亦云于宗不若于門于門不若于郊于郊不若于野六爻有不能盡卦義者如同人是也君子知其然也故於物情之離合事理之參差必深研之以極其辨而後各得其所者可以見相親相遜之仁各止其所者即以見無黨無偏之義則同人之道得也且夫類族之方有二一曰道義一曰意氣本乎道義之公者雖或迹與人異而亦不失其為同蓋其理實大共之理也本乎意氣之私者雖或迹與人同而亦適成其為異蓋其見實有我之見也昔晏子論和同之别而必以五味相濟五聲相成者為和是誠於同之中而深得夫辨之説者矣由兹以推體同人之卦象者惟協乎道義之所孚無循乎意氣之所感而又一斷乎類族之指以立其本而防其流則同其學術而學術不以矜標榜之名同其事功而事功皆以著咸和之效程子所稱文明以燭理自能識大同之義剛健以克己自能盡大同之道者此之謂也周易其德剛健而文明應乎天而時行是以元亨監察御史臣湯聘臣謹按聖王繼天立極奉若天時其所以亮工而熙績者未有不日新其德以樹久安長治之宏規者也是故自強不息藴於內者既純粹以精不見而章發於外者復明辨以晳則體天德以居天位而光天之下至於海隅蒼生罔不從欲此巍煥之業所以超千古而莫與比隆也如大有之卦以乾居內則剛健矣以離居外則文明矣六五既得尊位而又能應天時行則其德至矣占以元亨非王道之本於聖功者哉特是為君之難也一人立百官萬民之上機務之紛紜蕃變於是乎待理焉羣生之休養生息於是乎托命焉薄海內外議富議教有加無已惟恐一夫不獲其所焉是以聖天子勵精圖治竭宵旰之憂勞以期天下之化成而時凛兢兢業業之思者誠以治當大有之隆其所以持盈而保泰者固無時不以迪德為念者也且夫德莫憲天之為大而憲天又在乎乘時體元以長人則範圍不過而物莫能撓重明以麗正則旁燭無疆而物莫能遁先天而天弗違後天而奉天時聖之德一天德之時而已惟天以時布化育而寒暑隂陽不愆其序惟聖人以時立綱紀而禮樂刑政各措其宜將見與天同其德即與天同其治而風動者四方永賴者萬世元亨之吉占所以獨歸之大有與記有之當其可之謂時王者欽崇天道與時偕行所謂剛健者用舍操之獨斷並非過用其刑威也所謂文明者知覺先乎斯民並不稍鄰於苛察也廣運在皇衷而舉而措之各得夫變通盡利鼓舞盡神之妙時之為義大矣哉周易其德剛健而文明應乎天而時行是以元亨監察御史臣周琰義疏曰釋元亨之義剛健謂乾也文明謂離也應乎天而時行者六五應乾九二亦與五為體故云應乎天也德應乎天則行不失時與時無違雖萬物皆得亨通故云是以元亨臣謹按大有一卦處盛大之勢必有保有之德德也者建極鍚福之本也人君綜攬萬幾非剛則無以致決非明則無以察幾非剛與明兼則偏長一得無以熙庶績而亮天工大有既合離乾而成卦則剛健文明其德備矣顧六十四卦之中如需之剛健不陷賁之文明以止同人之文明以健均不聞直以元亨屬之而兹乃屬之大有者詎不以應天時行為大有所獨歟夫天者理而已矣記云當其可之謂時事當合理斯動不失時無二道也文言曰乾元用九乃見天則如擊斷以為剛其與天之剛而能柔異矣書曰天聰明自我民聰明如苛察以為明其與天之無私照又異矣惟六五能應乎天則剛不可撓明不可眩有時以不用剛為剛而神武之才寓於渾厚有時以不用明為明而坐照之哲運於幾先由是禮樂刑政之設施悉鼓舞變通之妙用天以四時不忒成嵗功聖以時措咸宜貞百度絶非後世武健嚴酷與綜核名實者所能比此大有彖辭所由異於諸卦而獨以元亨屬之也人主有執競之功緝熙之學德醇矣茂矣慮無不坐臻隆理然未有不法天不順時而能善剛健文明之用者大有之元亨職是故歟周易其德剛健而文明應乎天而時行是以元亨監察御史臣劉永泰程子曰大有元亨非大有之義便有元亨以其卦才故得元亨蓋言卦德剛健文明卦體居尊應天所以元善而亨通也臣謹按易卦彖辭自乾而外其繫以亨者固多有之即繫以元亨利貞者亦間有之若夫直言元亨而更無他辭者惟大有與鼎卦為然然鼎卦之専言乎養道者其事較小而大有之統舉乎治道者其義尤大是可知大有所謂元亨者不惟於事當得大通抑且於理要歸盡善非謂席豐履盛其勢有以昭一統之模正謂體全用備其德有以建萬世之業也夫大有之主非所稱受天命蒞天位而出天治者乎嘗試仰觀於天貞觀而有常者其剛健也光被而有耀者其文明也屈伸往來遞嬗而成化者其時行也使撫大有者有一不足以合天將剛健不能決幾文明不能察微肆應不能咸宜德絀矣何元亨之可幸致耶乃今觀於大有內卦為乾是天下有大權一人無難於總攬四方所以奉為紀綱也外卦為離是天下有大機睿慮無難於炳燭下土所以仰其照臨也乾為天而五應之是時有萬變而奉若不違者遏揚順乎休命孚威發乎衆志薄海所以望風而服兆姓所以從欲而治也禮樂刑政施之四達而不悖立道綏動惟其所令而如神寰宇有永清之風國家有苞桑之固所謂自天祐之吉無不利者其在斯乎占曰元亨殆以是耳非甚盛德曷克致此蓋德而資之以勢德固以有所藉而茂著其功然勢必承之以德勢更以有所主而厚集其力世之撫大有者可以知所重矣周易應乎天而時行監察御史臣倪國璉程子曰卦之德內剛健而外文明六五之君應於乾之九二是應乎乾也順應乾行順乎天時也故曰應乎天而時行臣謹按此言王者治有之道固在剛明而所以妙剛明之用則在法天而各當其可也蓋火天合而為大有天之行也運而不已惟其時而已矣日之行於天也不爽其度亦惟其時而已矣王者知之而見夫治有之道無過於法天法天之用莫要於因時是以為經為緯必符帝則之中一張一弛適合運行之序出其剛健之德足以勵精有為然恐或過於剛則失於刻惟法天之健而以時出之所以振綱紀而齊法制者其用剛無有不當出其文明之德足以旁燭無疆然恐或過於明則失於察惟法天之明而以時出之所以稽吏治而燭民隱者其用明亦無有弗當由是以其明且健用之以遏惡則五刑五用無非因天所欲遏者遏之以其明且健用之以揚善則五服五章無非因天所欲揚者揚之彰疸之用與造化同流闔闢之權與溫肅並濟先天而天弗違後天而奉天時雖若出於聖心之獨至而莫非繼天之志述天之事順乎理之當然而與時宜之也夫動靜云為既無過不及之差則政教號令自咸臻於盡善盡美之地聖人之治道即天道矣大善而亨四達不悖時之為用大矣哉周易象曰火在天上大有君子以遏惡揚善順天休命監察御史臣邱玖華臣聞治世之大法曰恩與威馭世之大權惟舉與錯故比匪反貽君子之傷而包荒非福除姦斯闢庸賢之路而登進始公觀於大有之象曰君子以遏惡揚善順天休命其為天下萬世訓至深切也夫人主孰不欲用賢而去邪崇善而絀惡然觀古來史册所載往往善人少而惡人多其故何哉蓋惡之在陽剛者易知惡之在隂柔者難知惡之在新進者易知惡之在久任者難知惡之在外廷者易知惡之在左右者難知陽剛者顯露於外慮短而術踈隂柔者包藏不測深自掩覆既以柔而善入且以隂而莫制故知之難新進者即驟獵大位終少黨與聲援之助而久於其位者更事熟而智術深動援先朝典故以文其罔上行私之姦故吏門生散布天下親友弟姪盤踞朝端勢牢固而不可破人側目而不敢言故知之難外廷者或露於同官之摘發或敗於直臣之紏劾而日在左右者窺伺意旨巧為逢迎偵探喜怒預為趨避玩人主於股掌之上藏鋒刃於談笑之餘故知之難夫俟其毒既肆穢既彰而始謀所以去之惡去而所傷者大矣易曰履霜堅冰至防其漸也誠使人君於其惡念方萌惡機始露毅然遏滅使不得逞輕則奪之事權重則加以譴責則遏之者正所以保全之終始之也傳曰為國家者見惡如農夫之務去草焉芟夷藴崇之絶其根本勿使能殖遏之之説也自古忠佞不同朝賢姦不兩立善人之與惡人真若水火之不相入薰蕕之不同器然善人終不勝惡人者蓋善人自恃其意念之無他不阿權要不事夤緣惟本一念血誠以結主知事有關於國計雖縻以爵祿不為動怵以禍害不為怯維彼無良即以其不附己且不便於己也裁抑之排擠之必使善類摧折而後快於心惟在為人主者表其心迹白其真誠使善類欣榮不扶而植在位者有堅於為善之心書曰彰善易曰揚善詞異而理一也夫天命有善無惡隂以彰疸之權寄之人君故章服曰天命刑用曰天討朝無幸位野無留良隂陽和而風雨時庶事康而萬民乂書曰皇天無親惟德是輔又曰天有顯道厥類惟彰非此謂與周易九二大車以載有攸往無咎編修臣林枝春程子曰九以陽剛居二為六五之君所倚任剛健則才勝居柔則謙順得中則無過其才如此所以能勝大有之任如大車之材強壯能勝載重物也可以任重行逺故有攸往而無咎六五厥孚交如威如吉程子曰六五當大有之時居君位虛中為孚信之象人君以孚信接於下則下亦盡其誠信以事於上上下孚信相交也大有之時人心安易故必威如則吉既以柔和孚信接於下衆志説從又必有威嚴使之有畏善處有者也吉可知矣臣謹按大有者衆情歸向民物繁庶之時也物衆地大致治為難非有過人才德不足當大任而有為非其柔順居尊亦不能虛己以應物故必君臣一心上下相應然後道洽政治澤潤生民而永保其盛大之所有然臣之材質各有不同有僅勝一官一邑之寄者有堪以兼綜衆長者有總攝樞要從容坐理而有餘者若知小謀大力小任重將顛覆是憂安有攸往今以九居二剛健謙順而得中位與五相應是能任重致逺者也夫載物者器成器者才居才者德德與才俱既非巽懦而不前又非剛愎而自用出其經緯之猷養以和平之度鎮靜不驚直方不撓左右承弼則能盡啓沃以為忠藩翰旬宣則能抒綏靖以為略是謂不渝爾載於以尊主庇民必恢恢有餘裕矣若夫人君代天理物道在推誠而又必有威以整肅之斯為張弛得宜蓋六五執柔居中是不挾詐不任術一惟孚信相結者也上以信結則下亦胥泯其疑二而交輸以悃忱逺邇內外欣合無間丕應徯志無鉤繩而不可㩦無關鍵而不可開以此處大有之世譬猶人身膚革充盈而血脈貫注靡不周通又何難遏之有然情親易狎勢順易陵謙卑漸積於衰替廢弛每始於優容茍非崇尚威嚴何以生其敬畏故儀則昭而後人知作肅紀綱飭而後令出惟行若親而不尊勢將陵夷而不可復返哲后知其然故出身加民必使其下敬之若神明愛之若父母則逺者不擕邇者不瀆而熙熙穰穰各得其所矣合而觀之二為臣位五為君位二剛中在下而得應於君五處尊虛己以下應其臣臣得應於君而大車以載若伊吕之徒展其所學澤被當時功垂後世􅗥乎尚已下逮孔明韓琦諸人或盡瘁馳驅卒成三分之業或不動聲色而措天下於泰山之安是皆遺大投艱而無譏於覆餗古所謂社稷之臣者也君能應其臣而有交孚威如之美如成周盛時衆賢在位上下志同而又時巡侯甸董正治官克詰戎兵慎固封守皆不忘震厲率作之意豈有崇極而圯如唐之中葉文恬武嬉習熟見聞以為當然者乎書曰懋乃后德交修不怠正謂此也人主誠能觀象玩辭簡才德之臣以共治大有之世尊崇倚任明作有功奉順美命則天人交助而寶祚綿衍於無窮矣周易六五厥孚交如威如吉檢討臣仲永檀朱子曰大有之世柔順而中以處尊位虛己以應九二之賢而上下歸之是其孚信之交也然君道貴剛太柔則廢當以威濟之則吉臣謹按孚者以心相感之謂政之大本也威者以法相持之謂政之大權也大本立則天下之情無不通大權尊則天下之志無不定斯二者相需為用相濟為功要在因其勢以為調劑焉蓋天地之道貞元遞轉有春溫不能無秋肅聖人之治天下亦然其嚴而濟之以寬象天地之春溫其寬而濟之以嚴象天地之秋肅夫天地聖人同一好生溫與寬是矣肅與嚴若猶有憾者要以天下之勢窮則變變則通通則久惟肅也故能不窮於溫惟嚴也故能不窮於寬豈非寒暑均普其生成而刑賞總歸於忠厚者哉今夫大有之世大中而上下應之疑慮不生猜嫌不作君敷心腹腎腸臣作股肱耳目所謂咸有一德者耶然則胡為乎用威曰恩勝易狎匪威弗節寵過易逼匪威弗制法久易玩匪威弗振然則用威奈何曰其德剛健而文明文明則燭幽照微情無或遁剛健則剔姦釐弊法在必行以是為威威固不在孚外矣寓神武於推心置腹之內行嚴肅於開誠布公之中常使惇大出以明作而寬仁不失於優柔所謂因其勢而調劑者蓋如此此則情無不通志無不定而天下大治矣周易六五厥孚交如威如吉監察御史臣陳髙翔程子曰六五當大有之時居君位虛中為孚信之象人君執柔守中而以孚信接於下則下亦盡其信誠以事於上上下孚信相交也以柔居尊當大有之時人心安易若専尚柔順則陵慢生矣故必威如則吉威如有威嚴之謂也既以柔和孚信接於下衆志悅從又有威嚴使之有畏善處有者也吉可知矣朱子曰大有之世柔順而中以處尊位虛己以應九二之賢而上下歸之是其孚信之交也然君道貴剛太柔則廢當以威濟之則吉故其象占如此臣謹按易中凡以六居五多有取於柔順虛中之象惟柔順故能舍己惟虛中故能從善况大有之時正郅隆之運其上有柔中之君其下有剛中之臣明良相契如元首之於股肱腹心之於手足形迹胥忘嫌疑自釋故曰厥孚交如言一德一心誠之至也然周公繫爻又必曰威如而朱子釋之以為君道貴剛太柔則廢當以威濟之乃吉豈以為人上者必引繩切墨峻急以馭下刻核以求衆哉蓋君道法天天心至仁而天德至剛日暄雨潤既豫物以寬然之樂而雷動風行復不疾而速不行而至先儒有言陽氣到處金石皆透又云斗一指東而天下皆春斗一指西而天下皆秋蓋天心不已故其機不可遏其機不可遏故其勢不可犯此天下之人所以莫不親天亦莫不尊天者誠畏天之威也人君茍知此意則整綱飭紀信賞必罰整綱飭紀故權不旁落令不中阻興一利革一弊而人皆實受吾君之賜信賞必罰故不為察察之明亦不為煦煦之恩喜知勸怒知威而人終莫敢以身試法大臣當敬然使大臣不法而優容焉不可也小臣當體然使小臣不亷而寬假焉不可也夫如是則溫然如春肅然如秋宫府內外百度清明而庶政咸舉吉孰大焉不然以六五應九二臣剛君柔不制之以威恐優柔之意多斷制之意少當豐亨豫大之時駸駸乎有積玩廢弛之弊矣聖人有憂之故其繫傳曰威如之吉易而無備也蓋知幾其神待其既然而後悔之不如於其未然而早戒之此之謂易之道與周易上九自天祐之吉無不利象曰大有上吉自天祐也編修臣李龍官臣謹按此言人君具陽剛之德當極盛之時而能謙以受益所以克當天心而膺無疆之福祉也夫人君智勇錫之於天聰明原之於性應五百之昌期承祖宗之統緒所謂天授非人力也斯時也道充九野德載八埏象緯同其照臨山川齊其流峙其為天祐豈顧問哉而聖人於此若不敢為僥幸之詞而必推其所以致此之由蓋上九以剛健文明之德既足以囊括宇內矣而知人善任嘗若有求助於鹽梅舟楫之材此一如天道之張弛異宜晦明迭運而風雷日月各竭其才以共勷化育之功者也天與人迹不相及而理則相通也如此善言天者必有驗於人盡乎人者乃能格乎天上天之載無聲無臭發微而不可見充周而不可窮也其祐與不祐一似任其數之適然亦曷嘗見其諄諄然命一人而祐之也哉故以為可恃自羲皇以至今日易姓而王者指不勝屈舜禹湯文不能為子孫留既去之運烏在其可恃也以為不可恃五德迭運各以其道轉移天下行若啓思若翼四海來格萬福攸同昊天有成命羣䇿羣力不能起而爭一日之令聞烏在其不可恃也夫子繹周公之意以為當大有之世宅中圖大九圍是式富不期奢而自奢貴不期驕而自驕髙則易危滿則易溢至於上而猶吉則天之所祐固不繫於數之適然而上九之自為政也在周公憂盛危明雖基命宥密而猶存泮渙之思故歸其功於天明明赫赫固陟降之精神而實於穆之式慿也在夫子持盈定傾雖敷天裒對而猶厪遏躬之慮故凛其幾於人肅肅雍雍固上帝之臨女而實緝熙之對越也夫天人相與之際微矣一念之敬肆帝王之去留繫焉祖宗艱難拮據撫有四海憂勤惕厲即匹夫匹婦具能勝豫誠知天命之不假易也逮夫子孫蒙業而安聲靈震赫上下恬熙於是侈成功於泰岱誇麟鳳於郊藪粉飾太平自矜天祐而時會漸移忽成板蕩漢唐以來前後一轍何則主德不修而仁賢攸伏也若夫聖神之君剛明兼濟學足以經緯天地英俊咸用智足以斧藻羣倫翼翼之心上與彼蒼相晤對勉勉之志下與多士為儀型夫豈曰弗畏入畏為此集木臨谷之慮哉誠以天命以德不可不全此德天命以賢不可不用此賢故位曰天位祿曰天祿職曰天職民曰天民寤寐之中惟帝載共流通焉耳然則言天者不必逺求冥漠之表也出王遊衍皆監觀之事也馮翼孝德皆簡在之人也昔者髙宗恭默而帝賚良弼文王陟降而王國克生聿懷多福百祿是遒天豈顓為殷周之主篤其栽培夫亦惟是履信思順尚賢以得天人之祐助焉耳不然而怠勝敬欲勝義功廢於垂成業流於雜霸朝有庭燎沔水之規野無莘野渭濱之載惟命不于常亦安保其吉無不利也哉周易上九自天祐之吉元不利編修臣儲晉觀郭雍曰繫辭曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也六五之君實盡此而言於上九者蓋言大有之吉以此終也臣謹按大有上九得繫辭而其義大明蓋主六五言之也六五厥孚交如履信也居尊用柔思順也上九在上尚賢也是以自天祐之吉無不利蓋人君以文明之德處崇髙之位而際豐盛之時盈則易溢滿則招損聖帝明王恆兢兢乎慎之惟是履和而至謙尊而光有孚惠心而本反身威如之吉以虛受人而致上下交泰之亨則中道得矣夫欽明文思允恭克讓者堯也濬哲文明溫恭允塞者舜也不自滿假而所寶惟賢光天之下至于海隅蒼生萬邦黎獻共惟帝臣則人心翕應而天意從之矣天人祐助中外禔福不亦康乎記曰體信以達順又曰天不愛其道地不愛其寶人不愛其情詩曰假樂君子顯顯令德宜民宜人受祿于天保佑命之自天申之夫天道逺而人道邇善言天者必有驗於人其要先基於宥密緝熙之學而其為務不外乎嚮明出治用人行政之方即所謂履信思順尚賢之實也且周成王之時大有之象也而詩人之頌美者無他説焉祈天永命之理易詩亦有同符矣抑尚賢之義有二大畜之上九有陽剛之德而為六五所尚其道大行故爻辭曰何天之衢大有之六五明體而虛中能尚上九之賢故象傳曰大有上吉立義雖稍異要皆以六五之尚為主蓋五君位也尊莫加焉王弼謂易卦中四爻有位而初上無位初上者體之始終事之先後也凡卦以上爻終五爻之義者甚多如師之大君有命離之王用出征皆然大有上九亦猶是爾言五之德宜膺是福於終可徴也彖傳曰柔得尊位大中而上下應之曰大有其旨盡矣周易謙艮下坤上監察御史臣李敏第臣謹按序卦傳曰有大者不可以盈故受之以謙有大而能謙必豫是謙者百善之始基統括乎聖功王道之大全自天地之化育鬼神之屈伸以及人事之從違得失無不準諸此者孔頴達正義曰屈躬下物先人後己則所在皆通多者得謙而更裒聚故云裒多即謙尊而光也寡者得謙而更進益故云益寡即卑而不可踰也稱物之多寡均平而施之使多寡各得其宜故曰稱物平施謙之為道兼備衆美此卦之所以六爻皆吉也義理遙深管蠡之見無能窺其涯涘謹按爻象引而伸之比類屬辭推衍成篇庶以效古者瞽史誦獻之義凡六章章十二句初六謙謙君子用涉大川吉象曰謙謙君子卑以自牧也檢身惟約稱物則平約以內飭平以外衡厥惟謙謙衆德是成虛舟不忤欹器無傾居易履坦時靡有爭大川用涉君子攸行六二鳴謙貞吉象曰鳴謙貞吉中心得也淑問孔揚芬流頰齒匪曰謏聞徴厥素履季路令名聞過而喜昌言載拜繄崇伯子惟誠則形守正無詭以虛受人邈焉髙軌九三勞謙君子有終吉象曰勞謙君子萬民服也履位當陽羣黎是畀惟敘惟歌成勞匪易庶幾夙夜慎終如始曰豫一人罔敢即戲持泰戒盈永言劼毖無施無伐萬邦攸暨六四無不利撝謙象曰無不利撝謙不違則也緝熙敬止克修厥身蹈和履度矩矱是陳云胡不臧訓典式遵動為世法惟德之純流其暉吉無競維人祥風載扇鳥獸孔馴六五不富以其鄰利用侵伐無不利象曰利用侵伐征不服也居謙履順建極區夏暨彼埏紘歸我陶冶載道無貧備德無寡鄰哉臣哉光天之下包匭菁茅孰不庭者干羽在御無勞戎馬上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也日嚴祗敬穆穆皇皇以永終譽至德之光自南自北我理我疆琛贄載見用謹無將神武不殺莊敬斯強止戈懷逺莫不來王周易謙亨君子有終編修臣玉錦臣謹按易卦無六爻皆吉者以乾之純健坤之純順且有亢龍之悔龍戰之傷推之他卦可知矣惟謙下三爻皆吉而無凶上三爻皆利而無害則謙之為道無往不宜者也彖傳天道虧盈而益謙地道變盈而流謙人道惡盈而好謙鬼神害盈而福謙合天地人神無不尚謙如是豈非盈滿之不可為而虛沖之誠足貴哉書曰滿招損謙受益謙之所以亨也又云汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功夫不矜不伐者謙也莫與爭能莫與爭功則亨矣然必有能而不矜有功而不伐所謂勞而不伐有功而不德厚之至也書與易不可以互相發明乎蓋謙之成卦在九三一爻故曰勞謙君子有終吉爻辭與卦辭相合然三爻之君子有終指三而言也卦辭之君子有終則不第指三而言也自初至六皆有君子之道總以謙之一字無論在上在下皆當以此自持功名如是學問亦如是故曰謙尊而光卑而不可踰通上下而言之也朱子謂君子有終為先屈而後伸程子謂君子達理故樂天而不競內充故退讓而不矜安履乎謙終身不易在小人則有欲必競有德必伐雖使勉慕於謙亦不能安行而固守不能有終也臣謂程子之言尤為警切使厚貌深情偽為謙恭以矯飾一時者不得假托於其間程子又謂勞謙君子有終古之人有當之者周公是也臣愚以為豈獨周公哉自古聖帝明王如堯舜禹湯文武功德垂於天下萬世而典謨誓誥皆有兢業弗遑虛衷若谷之意蓋德盛禮恭以善全功名者人臣之謙也聖不自聖上畏天命下顧民碞而朝乾夕惕集思廣益以垂萬世無疆之休者人主之謙也不然豐亨豫大之時易啓志氣盈滿之漸奚以見君子之有終耶孔子曰有大而能謙必豫則夫治益求治安益求安以持盈而保泰者其有得夫謙之道與周易謙亨天道下濟而光明地道卑而上行給事中臣鄒一桂程傳云濟當作際此明謙而能亨之義天之道以其氣下際故能化育萬物其道光明下際下交也地之道以其處卑所以其氣上行交於天皆以卑降而亨也臣謹按謙卦之體坤上艮下九三一爻以乾健而居下卦是為天之下際坤德柔勢卑而升上卦是為地之上行即天地交而萬物通之義也故亨卦之名義以其卑下故曰謙天不自髙而下際故日月星辰燦然昭著而光明地惟順承而居卑故風雲雷雨相率而上行下際天亨於地也上行地亨於天也天地亨則隂陽和而萬物生謙亨之義亦大矣或曰九三以陽居下謙也而坤卦以柔居上似非謙義而正不然地之道惟卑故能上行亦惟上行故能盡其卑之道設使地而不安於卑則震動崩裂而厚德不載何以能行既不能行則風雲雷雨之發於地者必凝滯膠澀而資生不廣是但有下際之施而無上行之承非地道也是以明良之世君體乾於上而行政施惠以及兆民下際也臣卑法於下而謀猷入告疾苦以聞上行也衰亂之世君德暗而屯膏不下臣職曠而民隱不聞下諂上驕驕者非謙而諂者亦非謙也若夫圖治之主宵旰靡寧而人臣泄泄沓沓竊祿茍安是君下際而臣不上行也臣不上行則卑道已失凡其所為將順無過者皆惰慢之氣耳以為是謙其可乎是道也不獨廷陛之間也百姓有疾而不能告諸司牧司牧有纍而不能申諸督撫督撫有聞而不能達諸九重皆不能上行者也我皇上至仁育物痛切民瘼一方災沴百萬賑施然而民氣未舒天時亢旱陽盛而隂愆此曷故哉夫亦為臣子者所當清夜思之而不能自安者也臣偶讀謙卦而有感於君臣上下之道不覺其言之過直唯聖主垂察之周易天道下濟而光明地道卑而上行監察御史臣包祚永朱子曰言謙之必亨臣謹按此以卦體釋卦之辭也夫謙之為卦惟九三一爻屬陽而為卦之主居下卦之上是天道下濟之義也坤為地地處卑下今居上卦是卑而上行之義也夫以天道之髙明而有下濟之功地道之卑下而有上行之美皆謙所致也若以人事言之則天道下濟者即人君以剛健中正之德居九五之尊下而求助於臣鄰之義也地道上行者即人臣以無成代終之職合在廷之贊勷上而輔弼乎一人之義也是天地之道固可推之於君臣而君臣之道固亦可言下濟上行矣然卦言天道不但言下濟而又必兼言光明者何也説者曰光明者為卦之有艮言之也觀於艮之象曰其道光明是也此其説似矣而未足以盡天道之義也蓋所謂天道者必以下濟然後見其光明耳從來聖君哲后聰明睿智首出庶物凡天下臣民已莫不瞻之如雲仰之如日是儼然一天道之鑒觀在上矣然其翼為明聽必取資於羣工亮采惠疇亦恆需乎多士故能成其時雍風動之郅治而收下濟之實功此君道之所以昭明於萬世也逮後世英君誼辟代不乏人亦莫不以明悟之姿兼果毅之略神明內朗精彩外著抑亦儼然天道之明無不照矣及其建功立業謨謀廟堂要皆博訪羣下以盡同異之情霽色和顔以收觀聽之益其下濟也乃適足以形其君道之光明而已矣至若其時在廷諸臣有本忠藎之誠發為嘉謀嘉猷者固上契乎天心而其有靜言庸違者亦難逃乎洞鑒此尤見其光明之出於尋常萬萬也豈非君道天道體用合一者與是則謙之為卦在天地則為泰交之庥徴在君臣則為明良之盛事傳所謂有天地然後有君臣者其斯之謂乎周易天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰監察御史臣金溶臣謹按一人建極上以承天地之鑒觀下以為臣民之仰賴發而為言立天下之儀型見而為行為子孫之法守况處豐亨豫大之時當重熙纍洽之際而驕泰之機每不覺隱隱欲動者則知謙也者聖功之要而為君之極難也彼從古帝王孰有不以謙為貴者哉堯之克讓舜之溫恭唐虞之謙也禹之不矜不伐湯之檢身不及文武之緝熙執競三代之謙也夫以貴為天子富有四海而自朝至昃兢兢業業如履虎尾如蹈春冰總不敢有少自滿假之意豈過為致謹哉誠以滿招損謙受益滿則無處而不凶謙則無往而不吉天道之虧益地道之變流鬼神之害福人道之好惡舉不外乎此自卑而尊自晦而光聖人序卦於大有之後而繼以謙而謙卦之六爻皆吉者其意蓋有在也抑又有説焉先儒之訓謙者曰有而不居之義夫知其有而不居與並不敢自信其有者其義大有間矣義理之精微能疑似之必辨乎功業之廣大能措置之咸宜乎始終之異致能慎終之如始乎細行不矜終纍大德履霜不戒馴致堅冰故雖道隆化洽物阜民康尤必其心常虛其神常斂栗栗危懼時有匹夫匹婦勝豫之思而復何所居乎又何敢自信其有乎易於謙之彖辭反覆推詳義誠深哉周易九三勞謙君子有終吉監察御史臣周祖榮王弼曰處下體之極履得其位衆陰所宗尊莫先焉上承下接勞謙匪懈是以吉也胡炳文曰乾之三以君子稱坤之三以有終言謙之三兼乾坤之占辭蓋所謂勞者即乾之終日乾乾而謙則又坤之含章也臣謹按勞謙一語本義程傳皆主繫辭之義以為有功勞而能謙而王氏弼胡氏炳文之説則兼有勤勞之意其於爻義爻象亦有所發明焉蓋凡卦爻六位惟三當上下之交內外之際非平易安和之所最為難處故多凶此卦九三為成卦之主以一陽承上接下動而難靜危而難安乃履得其正為衆所歸而性體剛健又能始終持謙至久不懈是謙本於勤者也其象則一陽居中上下皆陰有坎象焉坎勞卦也爻云勞謙殆取諸此此王氏之説所由來也陽為君子惟有德者當之地道有終惟恭順者能之此爻一陽得位能安衆陰以本體言則君子也一變則為純坤以變體言謙濟以順則事必有終其吉可知胡氏謂此爻兼乾九三坤六三之義所包者廣而所見者大於彖傳天道下濟地道上行之義特為發明可補本義程傳之所未及其説有足採者又先儒多以此爻從臣道立論是蓋就爻位居下之上起見耳竊思君子之稱君臣上下無所不該細繹繫辭內德言盛禮言恭致恭以存其位數語亦統君道臣道而渾言之似未嘗専有所指也至象傳云萬民服則德之所運者廣而不僅言臣道亦明矣是釋此爻者當從九三為成卦之主立論而勿泥於下卦之位置可也周易天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服檢討臣邱玖華程子曰天地之運以其順動所以日月之度不過差四時之行不愆忒聖人以順動故經正而民興於善刑罰清簡而萬民服也臣謹按天地無心而成化聖人有心而無為蓋天地以一誠為通復靜極而動動極復靜機緘皆本乎自然故曰天地之常心普萬物而無心聖人以一誠為應感靜而無靜動而無動措施悉符乎天則故曰聖人之常情順萬事而無情張載正蒙云天地之功發乎動畢達乎順又云天地之氣雖聚散攻取百途其為理也順而不妄又云天地四時行百物生無非至教聖人之動無非至德又云至當之謂德百順之謂福蓋天之為道也確然示人易地之為道也隤然示人簡日月得天而久照四時變化而久成其不過不忒者所謂效順於天地也聖人法天以政養萬民修六禮以節性齊八政以防淫一道德以同俗凡所以匡直輔翼而若其有恆之性也是以法立而民不犯教誠而愛深令簡而刑約也淮南子曰聖人因民之所惡以禁姦罰一人而天下畏之故至刑不濫蓋惟順人心以敷化因天討而用刑惟明克允以寬致簡欽恤者泣辜之仁釋疑者好生之德不獨天下無寃民而民自以不寃皆相與滌德蕩穢蹈德詠仁無事五聲求情三刺聼訟而畫衣象服化臻刑措艾韠草纓俗進淳良將見刻木不對畫地不入斯巍巍之德作範百王穆穆之風永垂千祀後之論刑者不知出此其陷於申韓之刻薄者無論矣他如鄙儒姑息之見異端報應之説俗吏便文自營之計又一以輕刑為事不知刑重而民無所措刑輕而民無所忌其失則均皆不知順動之故也惟聖人動與天合故無我得正己之盡存誠妙應物之感其明罰敕法皆與天地之春溫秋肅迭運而有常故曰天地心普萬物而無心聖人情順萬事而無情周易天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服監察御史臣胡定臣謹按雷地合而成豫其德為順以動此順動之德舉天地之所以設位聖人之所以成能其道莫不備具焉蓋立天之道曰隂與陽立地之道曰柔與剛其進退屈伸盈虛消長莫不至順而有常是故天地之間懸象著明莫大乎日月變通莫大乎四時而日往則月來月往則日來暑往則寒來寒往則暑來其間日之景有長短月之體有虧盈時之行有分至啓閉自其變者而觀之固瞬息而改觀自其不變者而觀之實亘萬古而不易也天地之順動如此聖人父天母地仰則觀象於天俯則觀法於地凡敷政寧人何一非順乎理之當然與勢之自然哉如月令所載立春而布德和令立夏而慶賜遂行立秋而選士厲兵立冬而賞事恤孤是順乎天之時也王制云修其教不易其俗齊其政不易其宜是順乎地之理也漢鼂錯云人情莫不欲夀三王生之而不傷人情莫不欲富三王厚之而不困人情莫不欲安三王扶之而不危人情莫不欲逸三王節其力而不盡此順乎人之情也推而至於一張一弛一豫一奪莫不順乎義理之正好惡之公而動罔不臧也此日之民自相與遵王之道遵王之路同遊於大順之中寧猶有所不服而俟嚴刑厚罰以讋服兆民哉蓋達順者在朝廷效順者自遍於草野此亦如天地以順動而日月自不過四時自不忒也然則聖人所為與天地合其德日月合其明四時合其序夫亦曰順而已矣御覽經史講義卷四
