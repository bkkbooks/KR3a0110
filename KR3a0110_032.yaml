front:
  text: 欽定四庫全書御覽經史講義卷二十六目録
  hash: sha256:fd969af5c10263be906f2fe20071f752067a7e9a0ca76ee071956cf101876ee3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_032-1a, image: WYG0722/WYG0722-0187c.png}
body:
  text: 周禮大司徒以鄉三物敎萬民而賓興之一曰六徳知仁聖義忠和二曰六行孝友睦婣任恤三曰六藝禮樂射御書數檢討臣廖鴻章監察御史臣趙青藜以鄉三物敎萬民而賓興之監察御史臣劉方藹遂人掌邦之野凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以達于畿稻人掌稼下地以瀦畜水以防止水以溝蕩水以遂均水以列舍水以澮㵼水以渉揚其芟作田編修臣官獻瑶凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以達于畿編修臣趙青藜倉人掌粟入之藏辨九榖之物以待邦用若榖不足則止餘灋用有餘則藏之以待凶而頒之監察御史臣葛徳潤太師掌六詩曰風曰賦曰比曰興曰雅曰頌編修臣楊述曽籥章掌土鼓豳籥中春晝擊土鼓龡豳詩以逆暑中秋夜迎寒亦如之凡國祈年于田祖龡豳雅擊土鼓以樂田畯國祭蜡則龡豳頌擊土鼓以息老物監察御史臣趙青藜編修臣王際華論語子曰足食足兵民信之矣侍講學士臣任啟運孟子五畝之宅樹之以桑少詹事臣裘曰修孟子曰易其田疇薄其稅斂民可使富也編修臣荘存與孝經孝弟之至通於神明光於四海編修臣任端書
  hash: sha256:3ff06f8511059f053cd16259bb0b7b8811d5f57d4719a907cb31e44d9e253a98
