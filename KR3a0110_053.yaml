  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_053-1a, image: WYG0723/WYG0723-0337a.png}
body:
  text: 詩經民之質矣日用飲食羣黎百姓徧爲爾德編修臣徐文煜朱子曰質實也言其質實無偽日用飲食而已為爾徳者則而象之猶助爾而為徳也臣謹按易曰雲上於天需君子以飲食宴樂又記曰明七敎以興民徳又曰一道徳以同俗蓋天生蒸民有物有則官骸具而養欲無窮賦畀全而禮義咸裕徳者生民之至性也飲食日用者生民之大欲也王者體天出治一身荷君師之任既為民謀其身家復為民全其性命敎養二者固並重而不容偏廢者也然而養以備敎之具敎以繼養之成其事雖有兩端其理無非一貫總以順其飲食日用而已夫成周繼夏商忠質之遺羣聖代作統緒相承於上有文武之君下有周召之臣一徳一心堂亷濟美壽考作人之雅化數世相維於不替而漸摩既久觀感自生自王朝以達邦國由卿大夫以逮士庶人無不親遜成風而聲敎四訖此關雎麟趾諸什渢渢可誦也斯即堯之所謂時雍於變舜之所謂四方風動禹之文命敷於四海湯之帝命式於九圍者固先後同揆古今一轍也猗歟休哉何其盛也而詩苐曰日用飲食而已是豈王者之世僅使斯民飲食不乏日用有資可以備水旱裕蓋藏而舉凡所謂五禮六樂七敎五刑以及選賢與能講信修睦諸大政遂可置為緩圖已乎非也飲食有經日用有則徳不囿於飲食日用之中不越諸飲食日用之外記曰汙尊而抔飲蕢桴而土鼓猶若可以致其敬於鬼神書曰嗣爾股肱純其藝黍稷奔走事厥考厥長肇牽車牛遠服賈用孝養厥父母蓋天經地義之精不外朝夕起居之内飲食日用器也而道存焉此韓愈所謂其民士農工商其位君臣父子師友賔主昆弟夫婦其服麻絲其居宫室其食粟米果蔬魚肉其為道易明而其為敎易行二帝三王行之萬世而無弊者也茍舍是而别求性命之原髙談精微之蘊則徳其所徳非吾所謂徳清淨寂滅之説惑其耳目錮其心思漸入於異端岐趨而不返而身心性命之㫖轉至行之而不著習之而不察無惑乎人人日遊於徳之中猶自人人日軼乎徳之外也抑知民之秉彞好是懿徳仁敬孝慈之良本在率履持行之内衣食既裕禮義自生百室盈而婦子寧剝棗烹葵子弟篤愛敬之節吹豳飲蜡閭閈敦婣睦之風推之𤣥黃為公子之裳朋酒獻君王之壽可知大道之行也不獨親其親不獨子其子老有所終壯有所用幼有所長熙熙然户盡可封之俗人無失徳之愆一道同風之盛早即於日用飲食之間裕之矣蓋日用飲食所以遂生即所以復性以之為養則因天之時察地之利用人之力開其源節其流固不能於飲食日用之外别有所謀以之為敎則正君臣篤父子定上下序長幼别嫌明微制節謹度亦未嘗於飲食日用之外更有所施蓋徳惟善政政在養民六府三事理本一貫也而要之民以君為心君以民為體上有迪徳之君而後下有敏徳之民書曰皇建其有極又曰斂時五福用敷錫厥庶民夫福即歸之於民而徳則端之於君者蓋福民即所以福君而徳者福之本君者徳之準為人君者誠宜修徳以斂福也歟詩經民之質矣日用飲食羣黎百姓徧爲爾徳編修臣羅源漢朱子曰質實也言其質實無偽日用飲食而已為爾徳者則而象之猶助爾而為徳也臣謹按徳字乃此詩全篇之根柢夫詩人頌神之貽福而必祝君之徳者此古人歸美之中必寓責難之㫖故夫假樂則頌顯顯卷阿則美圭璋率皆此意倘全篇但言福祉是亦容悅之詞耳豈古君臣相與之義耶且夫民之秉彜好是懿徳徳固君與民所共有者也古者家有塾黨有庠術有序國有學而又經以漸摩之澤感人切而入人深故其時民皆率徳而翕然從欲以治即至漢唐以來去古寖遠然而上有恭儉仁惠省躬迪徳之主而民亦有親遜雍睦和平豈樂之風其轉移化導之機恒若響應此可見民有自具之徳而詩人頌君所為必以民之率徳為騐也其曰質者何也或疑周道尚文兹兢兢焉以質為願所以防其流而救其失其實不然孔子曰民可使由之不可使知之孟子曰王者之民皥皥如也而堯衢擊壤之歌亦云出作入息鑿井耕田忘帝力於何有其氣象之渾樸大率類此今試與觀乎豳風豳雅豳頌諸詩所載民風綦詳然而三農九榖而外無他業也雞犬桑麻而外無長物也烹葵剝棗而外無珍味也社方祈御而外無繁文也若夫婦依士媚聯其情通力合作齊其衆履畝嘗㫖作其力稱觥獻壽達其忱夫亦何在非日用飲食之事而為其所最質者歟至於民氣既淳民俗益厚親親長長咸本徳讓以相將遵道遵路皆體徳意以俱化有不徧為爾徳也乎蓋三代盛時君無一事不關乎民民無一事不視乎君乃至徳化既成風同道一斯民風所在即主徳所徵故不曰民之徳而曰為爾徳者正與詩所謂莫匪爾極之㫖同而洪範所云凡厥庶民于汝極錫汝保極亦即此意耳顧臣謂徧徳者民也而慎徳者仍在君徧為爾徳者民也而懋敬厥徳者先在君夫君徳豈易言哉臯陶謨曰思日贊贊襄哉説命曰朝夕納誨以輔台徳誠以日新又新之學撡自皇衷而以引以翼之功事存啓沃公孤卿尹輔理於上庶司百職贊勷於下同寅協恭大小一徳明良喜起之風見於朝廷正徳厚生之澤溥於百姓純嘏之錫莫大於是瞻聖治者所由熙遊於太和之宇宙歟詩經民之質矣日用飲食修撰臣金甡臣謹按天保一詩所以頌君福者不一而足而其平易切實廣大深遠則莫如民之質矣日用飲食之云也夫民以質稱疑若椎魯憃愚未足有光治象豈遂臻郅隆之盛而為集福之本哉不知風俗之淳漓化理之升降繫焉即氣運之休咎繫焉蓋機智日開而民之詐偽滋勝惟不安於日用飲食之常而敎令遂有所弗率刑法遂有所難齊此固非吉祥善事也嘗讀康衢之謠曰不識不知順帝之則擊壤之歌曰鑿井而飲耕田而食民自適其耕鑿之安而並泯夫知識之見故堯得成其協和之治而長享其冨壽之祥詩人之意其猶是歟夫民之由質實而趨文巧由文巧而長囂凌亦勢有固然積習殆難更化惟聖人人情以為田有所以利導之柔服之使之去其偽而返其眞率其常而安其樸士恒為士農恒為農食舊徳而服先疇者皆惟本業之務無異物之遷故其時俗尚敦龎閭閻和樂獄訟衰息兵革不興上下皆有嘉徳而無違心此誠至治之馨香可以感於神明者矣禮曰福者備也備者百順之名也無所不順者之謂備而所謂大順者則莫如風俗之同試思氣象則熙熙皥皥道路則蕩蕩平平百姓日用而不知聖人無為而成化即國家受天之祜申錫無疆莫大於此奚俟麟鳯在郊龜龍畜沼而後為盛世之嘉祥也哉夫民之斵雕為樸實君徳有以感化之非必聽命於冥漠不可知之神也特其靡然嚮風不疾而速從欲以治渾乎自然若有非人力所能為者則以為非神之力不及此而原其所以得此於神者惟誠孝感格而後黙相者有肸蠁之靈徯應者還淳古之俗則所謂神之福者仍本乎君之徳而已矣詩經民之質矣日用飲食編修臣徐瑋臣謹按書有曰惟民生厚因物有遷則知降衷生民本無不善而其後不能不日漓也然由厚而趨於薄者習俗之弊則革薄而返於厚者敎化之權是必閑其心思耳目之邪以養其敦龎淳厚之氣使復還於未雕未斵之天則民志定而民風古本固乃以邦寧矣今使民而皆以智巧相矜以機械相尚此非民之福也王者錫福庶民必使一歸於質質者非喬野椎魯之謂也士農工商是謂四民而皆有其所為質者士質於學忠孝亷節不言躬行而無虛聲動衆之習焉詩書六藝修身淑性而無髙談横議之失焉言揚行舉席珍待聘而無游揚奔競之弊焉此士之質也農質於野嗣爾股肱純藝黍稷而惰游失業有戒焉出入相友守望相助而囂陵詬誶不聞焉獻豜私豵躋堂上壽而先私後公弗敢焉此農之質也工質於肆越鎛燕函各安其業而見異思遷弗為焉飭材辨器必利於用而苦窳不良不入焉規矩準繩悉程於度而竒技蕩心有禁焉此工之質也商質於市布帛菽粟民用是資而金玉珠貝弗貴焉質劑量度稟成司市而詐偽爭訟不興焉懋遷有無止逐什一而壟斷居竒弗為焉此商之質也夫天下之大四民焉盡之矣四民之善一質焉盡之矣今使入其國而學無游士野無莠民工無技淫商無豪冨豈非國之福哉亦豈非民之福哉要不外日用飲食而得之夫事有質而不可厭者日用飲食是也而人於職業所當為亦當如日用飲食之不可去故夫絃歌誦習士之日用飲食也耕耘作息農之日用飲食也範金合土工之日用飲食也通財化居商之日用飲食也夫惟各安其日用飲食之常而無妄願故不爭於所無無游思故不惑於所誘於斯時也異端邪説不興慆淫匪彜不作循循乎其不識不知順帝之則也蕩蕩乎其無有作好遵王之道無有作惡遵王之路也質莫質於此矣不然而如程子所云士庶日志於尊榮農工商賈日志於冨侈民志不定而質漓矣所以古之聖王必謹庠序之敎咨保介之官監工司市皆有法度胥天下而返之於質焉此坊民之道也唐虞三代所謂民之質者如此若乃莊周所稱赫胥氏之時民居不知所為行不知所往含哺而嬉鼓腹而遊質則質矣然此太古淳悶之世容或有之而不可語於唐虞三代之隆也詩經我車既攻我馬既同四牡龎龎駕言徂東田車既好四牡孔阜東有甫草駕言行狩之子于苗選徒囂囂建旐設旄搏獸于敖駕彼四牡四牡奕奕赤芾金舄會同有繹決拾既佽弓矢既調射夫既同助我舉柴四牡既駕兩驂不猗不失其馳舍矢如破蕭蕭馬鳴悠悠斾旌徒御不驚大庖不盈之子于征有聞無聲允矣君子展也大成監察御史臣沈世楓小序車攻宣王復古也吕祖謙曰車攻所以為復古者何也蓋蒐狩之禮可以見王賦之復焉可以見軍實之盛焉可以見師律之嚴焉可以見上下之情焉欲明文武之功業此亦足以觀矣臣謹按田獵之事自古為戒而車攻之詩先賢以為復古者誠以宣王之狩非以逞車騎之都畋遊之樂也昔者虞廷輯瑞班朝四時皆有巡狩所以敷奏明試者其禮甚密而意甚周至於蒐苗獮狩詳於夏官簡軍實撰車徒遂獻禽以供宗廟賔客之用所謂因田獵以講武事也厥後此禮幾廢至宣王之時遂有東都之會此詩人詳述其事而美其能復古也觀其車攻馬同建旐設旄言有司先為戒具以待乘輿也逮乎稅駕東都未事田獵先事會同曰赤芾金舄㑹同有繹可見天子意在柔遠是以遐邇傾心威儀容與也會同畢而後武事興則曰既調既同不猗不失見紀律整嚴不矜詭遇也曰悠悠斾旌徒御不驚見軍容暇豫不事奔馳也至獲禽以獻則曰大庖不盈可知意不在於從禽亦不嗜殺之至意也宜詩人拜手而畢其辭曰允矣君子展也大成然則田獵固聖賢之主所不廢特忘其典則而但以馳騁般樂是務者即長楊上林之類是也誠能於率由舊章之中存無敢怠荒之意惟藉是以布招㩦之徳使列服輸誠明司馬之法俾戎行作氣則不獨鑾輿所過頌聲四作即垂之奕禩亦傳為盛事矣詩經鴻鴈美宣王也萬民離散不安其居而能勞來還定安集之至于矜寡無不得其所焉編修臣王會汾臣謹按天下安危之本視乎生民而生民憂樂之原係乎主徳未有誠心保赤而物不得其安者也亦未有鋪張文具而民得䝉其福者也文武以實心逮下其時萬物由庚兆民允殖天下之氣如一人之身息乎踵達乎顱流暢乎四肢而動盪乎關節故無水旱昆蟲之災凶饑札瘥之患其要無他以誠心感生至和而已宣王即政之初遇災思懼治績勃興惜其執徳不堅美業中廢今其詩見於小雅者什有四篇六月采芑則南征北伐之詞也車攻吉日則蒐田復古之事也此四篇皆有美而無刺至鴻鴈一詩憫萬民之失所而能勞來安集之故序説亦以為美宣王然哀鳴中澤萬口嗷嗷雖無懟怨之辭而民窮蓋亦可見且其言曰維此哲人謂我劬勞維彼愚人謂我宣驕意當時朝廷士大夫及四方司牧之臣必有不能恤下視水旱凶饑為運數之適然者故其後卒至於依樗采葍從其婚姻而不見收䘏也竊料宣王之時民困矣財殫矣人主狃於治績之小成典章之粗舉不復能以忠誠懇惻實致於民所以天和不應民卒流亡生理既窄則風俗日偷古先王睦婣任䘏之意蕩然無復存者一變而為繁霜曷足怪歟易曰聖人感人心而天下和平為民父母當常抱納隍之慮切引罪之思故能使氣應情通上下交泰今鴻鴈之詩所謂窮者欲達其情勞者欲歌其事而猶抱有言不信之憂則否隔成而民氣悲矣序所云矜寡無不得其所者儻亦後儒附益之説而非其實歟又按鴻鴈以下諸篇庭燎則因美致規也沔水則憂心念亂也鶴鳴則師傅敎誡之詞恐其不誠而因以不明也至於軍士悲其轉恤賢人勉爾遁思而民困遂以不拯矣終之以斯干無羊者亦因以為諷也若曰閭井之流亡如此而猶得安於莞簟乎窮黎則溝壑將填而何暇廣蕃庶類乎此孔子序詩之㫖也總之文武之徳澤所以蟠結乎人心者在於周知疾苦而曲致其情觀四牡采薇諸作忠厚藹然眞盛天子也宣王内修外攘一時文章歌詠燦焉可觀而淳化未流民生日蹙豈非誠意有未孚歟衛文之騋牝推本於塞淵魯侯之垌野根極於思無邪帝王將務安輯其民冨而敎之其尤不可以不誠也詩經鶴鳴于九臯聲聞于野魚潛在淵或在于渚樂彼之園爰有樹檀其下維蘀他山之石可以為錯鶴鳴于九臯聲聞于天魚在于渚或潛在淵樂彼之園爰有樹檀其下維榖他山之石可以攻玉檢討臣張鵬翀朱子集傳此詩之作不可知其所由然必陳善納誨之辭也葢鶴鳴于九臯而聲聞于野言誠之不可揜也魚潛在淵而或在于渚言理之無定在也園有樹檀而其下維蘀言愛當知其惡也他山之石而可以為錯言憎當知其善也由是四者引而伸之觸類而長之天下之理其庶幾乎臣謹按鶴鳴之詩小序以為誨宣王鄭箋謂敎王求賢人之未仕者朱子始定為陳善納誨之辭臣嘗諷咏而紬繹之覺義蘊無窮人主能時時玩味入心則居敬窮理通徳類情内聖外王之道無所不該而要在慎獨以存誠則所謂誠之不可揜者尤其本也夫聖人之道動靜一原密室顯地初無二致然班朝蒞官之時莊敬易持而深宫燕閒之間怠肆易起故患常生於忽微而志亦戒乎漸習古聖王雖從容燕閒必有誦訓箴諫而左右前後罔非正人所以防未萌之欲者甚嚴蓋知細微幽獨之偶肆甚於共見共聞之難揜也後王燕逸恒視為宫闈事閟外人莫知宦官宫妾巧為承迎聲色貨利日相浸漬一為所引勢若順流明知其非道而牽於所愛狃於所便固已溺而難挽矣雖有正言讜論且多方為拒飾之計佳鷂斃於袖中美人即離輦側者有幾人哉漢唐已事炯鑑具存當時所恃為秘密而罕知者大則正史書之小則野史載之起於一念之忽微而不能揜天下萬世之指摘誠不可以不懼也誠能謹小慎微雖處幽獨得肆之地凛然若天帝之鍳臨則清明在躬氣志如神奸聲亂色不留聰明淫樂慝禮不接心術惰慢邪僻之氣不設於身體而中和位育之效皆自覩聞莫及之地操之正如于野于天鳴聲遠聞被四表而格上下誠之不可揜如此夫若夫理之無定在則窮理之功尤為切要蓋存誠在乎主敬而窮理在乎集義臣嘗反覆程朱之書提綱舉要不外乎敬義夾持所謂直上達天徳者此也敬所以涵養此心心無放佚乃能窮理理無不在故無定在在淵在渚即隨時處中之謂耳中無定見則游移兩可中有成見則執滯罕通此程朱即物窮理之功為不可缺也誠能慎簡名儒博延俊彦俾日親便坐研究道義講磨治體則睿知益明王猷允塞輔養君徳孰亟於此且知言尤窮理之要博咨羣議固可集思廣益然非中有權衡大公無我安能執兩用中故有同一言而此言之為公彼言之為私者有同一言而為國言之則公為身言之則私者是以知者或不敢言言者或未必知是非疑似淆惑實多此知言所以難也臣竊謂進言者但當計其理之是非不當計其身之利害聽言者但當問其理之當否不必問其意之公私無補於國計民生雖公何益有補於國計民生雖私何損一洗拘攣牽制之習而後是非疑似之介不以兩在而或淆在淵在渚虛衷察理活潑潑地體物不遺詩人之㫖所以引君於道者至矣至於愛憎之所施則又賢否之去留羣情之向背所係而不可不深察者檀之與榖玉之與石知者皆能辨之至愛憎之心繫於一偏則愛而不知其惡憎而不知其善者多矣加以左右近習之炫惑則檀榖倒置玉石不分者又多矣故詩人以為園中之檀可愛而勿并愛及蘀則擇能而使舍其短而取其長引類以升舉其直而錯其枉不牽於私愛而寵祿無所過矣至如他山之石既粗礦矣又疏遠焉宜無足留意者然而用以攻玉則可効磨礪之功成溫栗之質豈修徳者所宜廢乎蓋言莫予違但覺順從之可樂而潛滋其驕逸之心孰若近正士聞正言有所嚴憚切磋以助成徳業之為美即其人果有可憎亦當察其素行不以一𤯝掩徳乃能收攻錯之益耳愛能知其惡憎能知其善則嚬笑不妄加賞罰不濫及不動聲色而成順則之治矣此詩人陳善納誨之志也朱子所謂觸類引伸者臣請誦古語而推言之語曰戰戰栗栗日慎一日人不躓於山而躓於垤言人情能謹於難而不免忽於易也語曰行百里者半九十里言勤於始者每怠於終也語曰安樂必敬無行可悔言燕安易溺覆轍當誡也語曰毋謂胡傷其禍將長毋謂胡害其禍將大言不矜細行終累大徳也語曰以鏡自照見形容以人自照見吉凶言人君當以正人為鑑勿近邪僻也語曰屋漏在上知之在下言察民休戚驗政臧否也語曰馬不可極民不可劇言民力易竭言利之漸不可長也語曰違山十里蟪蛄之聲猶尚在耳言為政喜靜而惡譁毋使俗吏滋擾也略舉數端以抒一得其詩人引伸靡竟之意乎臣備員侍從職司文墨雖不專任言責然竊謂面折廷諍直陳可否者諫臣之事也從容諷諭陳善責難者詞臣之事也故雖不敢朝夕獻納而每於說經之次致其拳拳之愚忱焉詩經鶴鳴于九臯聲聞于野魚潛在淵或在于渚監察御史臣髙景蕃朱子集傳言誠之不可揜也理之無定在也臣謹按君子之學不外誠身明善而已誠身則一眞無妄而有以立萬事萬物之原明善則炳燭幾先而有以盡無方無體之用自夫人以緣飾之心處之將伸節昭昭而惰行𠖇𠖇而不知微顯有必至之符也抑以膠固之見乗之將守其方隅而遺其變化而不知隨在皆一理之貫也鶴鳴之詩所以善為喻也夫是詩為納誨而作將必上稽諸天命下察諸人心中參之庶事於以騐從違之不爽晰至理之微茫庶幾返觀内照而不忽於誠中形外之幾度務揆時而不拘於畛域偏私之見此納誨之常也而詩不正言其所以然也罕譬而喻使夫深思而自得之故不言誠之不可揜也而曰鶴鳴于九臯聲聞于野不言理之無定在也而曰魚潛在淵或在于渚蓋鶴微物也託足九臯若至幽遐矣而引吭長鳴則聲聞于野焉是其嘹喨之音雖欲揜之而必不可揜也已如此抑魚亦一物耳淵泉自得若有方所矣而水岐之渚又未嘗不在焉是其游泳之致欲執一定以求之而不得也又如此由是推之暗室屋漏之地不啻九臯之邃密也發邇見遠之徵不啻四野之聲聞也事雖㪚於廣遠道不下帶而存不啻在淵之魚而又或在渚之魚也故夫天地非大吾身非小千古非遙一念非近幾之所著莫能掩也事有精粗理無精粗事有大小理無大小於彼於此無可執也使其自欺於幽獨之中而謂可矯飾於大廷之際以一已有盡之見而欲求盡乎千變萬化之無窮也此必不可得之數矣是以君子務戒懼慎獨以誠其身格物窮理以明乎善推之而刀劒有銘盤盂有儆不敢以纎悉自弛其誠也昌言必拜邇言必察不敢以滿假自隘其明也誠至故參乎天地動乎鬼神而無不之也明至故妙乎百為達乎萬事而無不當也知行並進明誠兩立修己治人一以貫之矣此詩人納誨之意也歟詩經莫高匪山莫浚匪泉君子無易由言耳屬于垣監察御史臣陳仁朱子曰山極髙矣而或陟其巓泉極深矣而或入其底故君子不可易於其言恐耳屬于垣者有所觀望左右而生讒譖也臣謹按詩之言當矣切矣蓋以人君施為舉動皆當謹之於幾微之先不可輕露其意使他人得以窺測之茍或一露其幾不惟聽吾言者有所觀望而生讒譖亦且伺吾意之所向而有所假竊然此姑不具論請即讒譖之一端而究言之夫木之高也風必撼焉石之峻也水必激焉賢人者庸人之所深不樂也是故積賢生美積美生譽積譽生忌積忌生讒夫讒人者必小人也讒於人者必君子也君子之讒於人亦可悲哉忠臣不得卒寵於君孝子不得終愛於父貞女不得暴志於夫良士不得全交於友古今來罹此患者蓋不少也楚之屈平可謂忠矣汨羅之沉至今悲之呉之子胥其功顯矣鴟夷之浮慘何極焉非獨此也西伯大聖人也而羑里之囚不免申生致胙父子至親也而待烹之殃奚為而至詩曰萋兮斐兮成是貝錦述讒之奸也讒人罔極交亂四國著讒之害也投畀豺虎豺虎不食惡讒之嚴也久矣讒之為患不可不辨也夫泰山之溜可以穿石洪爐之火可以爍金深壑之霧可以障天層山之雲可以蔽日賢人之行不堅於金石而巧言之毒甚於水火吾心之明不皎於天日而壅蔽之患多於雲霧則讒之難辨曷可勝言乎是故知吾有所善也則伺其隙以疑之知吾有所惡也則多其過以重之如是者不可以不察也未識吾之心也則微詞以嘗之未必吾之從也則他事以探之如是者不可以不察也或勢所不達則因其嬖以致之語所不在則迂其説以及之如是者不可以不察也短其事而陽為不知其人述其語而故為不解其意如是者不可以不察也虞其核也則託於所聞恐其怒也則觸其所忌如是者不可以不察也反辭以多譽之而實以暴其短假事以深惡之而因以發其私如是者不可以不察也託為誤泄而卒諱之俟急叩之而後言因所概論而泛及之若緩語之而不切如是者不可以不察也何也無故而然其中必有故也大抵讒人之為讒必先窺伺上意上意所向讒人亦向之上意所背讒人亦背之方讒之始君容之而不拒則亂生及讒之進又信之而不辨則亂成必也聞讒而察知讒而去好惡明白決斷不疑則亂為之止矣故人君杜絶讒邪之道一曰明二曰斷明則視聽不惑斷則除屏必力且夫大奸似忠大佞似信聽言者非心如明鏡物無遁情媚之而不喜激之而不怒者未有不墮其術中也昔成王嗣位之初周公以叔父至親居冡宰之任而管蔡流言成王幾至猜阻頼天動威而後悔夫以成王慈祥樂易之主一聞讒言尚不能無疑於周公况其他乎故曰愷悌君子無信讒言使為人主者心正意誠私邪不能蔽公聽並觀信任無所倚則魑魅讋於震霆雨雪消於見睍雖有善為讒者且不敢為矣即進而為之亦莫之聽矣此又人主守約之方也臣因朱註讒譖二字而申言讒之為害與讒之難辨如此詩經靖共爾位正直是與監察御史臣張湄臣謹按天之道動直地之道直方人受天地之正氣以生而剛徳具焉故直為人之生理不直則無以為人觀赤子之啼笑其端無間於中和匹夫之是非其論不謬於賢聖則直本根乎天性之自然而因以合乎人心之同然孔子曰斯民也三代之所以直道而行也又曰舉直錯諸枉則民服舉枉錯諸直則民不服夫蚩蚩之民無所私曲且如此矧臣工之在位者忍以不直事其君哉是故靖共之道不一端而引君於當道務以直為之主書所謂安汝止其弼直者此也顧直必兼言正者正則無不直直者未必正三代而下人臣招其君之過以沽名此挾私妄上至無禮之所為君子嘗深惡之而目之曰訕曰訐曰絞則不正甚矣烏得為直乎正直者無一念之稍渉於偽無一事之或顧其私易稱敬以直内書稱直哉惟清蓋直焉而能敬且清斯可謂正直之至者矣且夫正直必剛剛者陽之象也不正直必柔柔者隂之象也陽剛之象不易覯而於廷諍之時偶見之隂柔之象不可逢而於面諛之際數見之然而不易覯者每為人主之所不樂覯不可逢者偏為人主之所最欲逢此正直之臣不世出而非神聖之朝則其途甚危其類亦甚雜也何則上有納諫之君斯下有敢諫之臣從來君驕則臣諂主聖則臣直人苐見引裾折檻者偘偘自將謇諤不屈以為古人臣何風采可畏愛若是而不知實由聖君之寛容大度為能相與以有成故曰正直是與也竊嘗綜覽前史而歎臣之正直者無踰漢之汲黯唐之魏徵然武帝知黯之賢而不能用太宗知徵之賢而幾欲殺之是則好諛惡直雖哲后亦復不免乎要之非獨其君之過也正士在朝羣邪所忌蓋未有既犯衆人之所忌而猶得䝉一人之獨知者故詩人以靖共責同僚一則曰正直是與再則曰好是正直明乎邪佞之臣其勢聚聚者必有比匪之傷正直之臣其志孤孤者貴有相助之理善事君者於此而維持之輔翼之此兆民之公心萬世之常道而兩間之正氣也詩經信彼南山維禹甸之畇畇原隰曾孫田之我疆我理南東其畝給事中臣衛廷璞臣謹按周家以農事肇基制地之法宜莫善於周乃此詩首章不歸美於本朝而遙遡神禹蓋因觀南東之畝而靜念所從也書稱文王卑服即康功田功今考諸司馬法制度殆極精詳然實則踵夏后之遺事何以見之周禮遂人之法大概同於匠人先儒於遂人治地謂是成周之制於匠人為溝洫謂是前代之制其所謂前代者雖未確指為禹而以虞書濬畎澮川之言觀之則有明文夫利之在生民者前聖為之而有端則其事可繼後聖循之而有緒則其功易成惟後聖有可見之功則前聖愈有難忘之徳矣其所稱南山者傳云即終南山也嘗考禹功所在尤莫詳於西北今西北一帶平原多而川澤少似乎禹甸難施不知西方屬金固水所由生也北為亥子之方又水之本位也觀於西北夏秋之交泉隨地湧此正溝遂所宜用而蓄洩有兼資也自水道通而地利盡髙者不旱下者不澇而畇畇原隰曾孫得以田之矣所謂我疆我里南東其畝者地勢西北髙而東南下自髙趨下畝之所向溝遂從之或南或東大致然也夫有溝遂之類則有徑畛之屬由徑而畛以達於川上之路其為不田之土多矣聖人非不知惜也資為道路實藉以隄防故田不汙萊而耕餘三九且自郊而野田廬在内溝洫在外地勢髙下參錯有以限戎馬之足在易地中有水伏至險於大順取象於師而昔人所云以水佐耕者豐以水佐守者固亦此意也又周禮有曰凡行停水磬折以參伍鄭注謂坎為弓輪水行欲紆曲也南東其畝則或遂縱而溝横或洫縱而遂横有以殺乎水之勢而又有以生乎水之情此又聖人制度之妙也春秋傳國僑伍田疇前後漢書召信臣杜詩輩開陂澤其功何敢望於聖人而其民猶歌且頌之則此詩因美曾孫而上追神禹豈能已哉詩經我疆我理南東其畝編修臣湯大紳朱子曰疆者為之大界也理者定其溝塗也畝壟也其遂東入於溝則其畝南矣其遂南入於溝則其畝東矣臣謹按信南山詩意而知農田與水利相乘未可缺一而不備矣蓋帝王之治以貴粟重農為本而畎畝之制以分田樹榖為先田何以分必溝洫澮川之正其界而農夫無越畔之虞榖何以樹必燥濕髙下之别其宜而土膏收長畝之利故欲力田必先計畝欲計畝必先明其疆理伊古以來聖君賢相留心民瘼未有不於田功亟講者也夫後代之天下猶古之天下後代之地利猶古之地利户口日益繁人力宜日益廣矣然一遇歉歳民或不聊生者得非地有餘利民有餘力生榖之土未盡墾山澤之産未盡出歟嘗考禹貢所載冀州土惟白壤田惟中中揚州土惟塗泥田惟下下此其土宜地脉相去懸殊不待智者而後知也乃江淮之間歳收秔稻足供東南之食而北方所植不過髙粱小米又收穫無幾不得不待給於呉楚之區無他疆理之法久湮而目前耕作皆有類於縵田也然則疆理之法其可不為之加意哉俗儒之論輙謂井田為必可復其説誠迂濶而難行然井田之制雖不可復而代田之法猶足相參漢書食貨志有云武帝以趙過為搜粟都尉過能為代田一畝三甽歳代處故曰代田古法也又云一歳之收常過縵田畮一斛以上善者倍之是則代田所穫之粟數倍於縵田所穫之粟矣由一畝而推之一頃由一頃而推之一鄉由一鄉而推之一縣一府以至通省其田日益闢其粟日益冨也平原之土其有類於分畦築壟之方蓋如此若夫濵水之地尤資隄障之功周禮不曰稻人掌稼下地以瀦蓄水以防止水以溝蕩水以遂均水以列舍水以澮㵼水乎誠使水利既興而復詳求於疆理之術俾經界有定播種以時將時和年豐家給人足出作入息含哺鼓腹之象何難再見於今日哉詩經我疆我理南東其畝給事中臣汪榯臣謹按則壤首詳於禹貢地制大備於周官自古力農者必先治田而治田者必明水利疆理既定畝制復詳使土効其官水歸其壑潤下之性克順作甘之氣乃升其所以為農田計者至周且密矣詩所云我疆我理者因地勢以定井則分合不可以不辨所云南東其畝者因水勢以治田則利害不可以不明疆以别乎其大也提封百井規模貴整肅矣本匠人之制起而疆之徑外有畛畛外有塗塗外有道復有路雖一成之地不啻畫域而分疆矣理以析乎其細也甫田九萬節目易紛紜矣修遂人之法起而理之川中有澮澮中有洫洫中有溝復有遂雖千里之内無不有條而有理矣疆理定矣土不可以無水五行有相資之用水更不可以無土二者有互濟之權於是更詳其畝之制有如遂之水自西而東注於溝也不峻其畝於南則水不入溝而入田惟南其畝而遂之水不溢於田者田亦可時資其水於溝也舉一南而凡縱横之盡變者準此矣有如遂之水自北而南注於溝也不障其畝於東則水在田而不在溝惟東其畝而遂之水歸於溝者溝亦可時引其水於田也舉一東而凡經緯之盡善者視此矣要之疆理者順地勢之所宜南東其畝者順水勢之所宜而溝洫不淆經界益正在昔大禹之濬九川距四海必濬畎澮距川小水治而大水並治是不惟河渠水利本相通而治水明農實一體也三代而下不必盡井其田而耕之誠能通溝洫之制因其髙下隨地制宜使蓄洩有方旱潦有備則原隰墾闢黍稷翼與地無或遺之利歳皆大有之書疆理南東洵力田之要務歟詩經我疆我理南東其畝監察御史臣馬燝朱子集傳疆者為之大界也理者定其溝塗也其遂東入於溝則其畆南矣其遂南入於溝則其畆東矣臣謹按帝王疆理天下物土之宜而布其利所以詳為區畫者蓋以經界溝塗乃治地之良規實萬世所永頼故其時不特耕者灌溉有資咸勤稼穡即公卿大夫亦莫不以農事為先務此信南山之詩所以追維禹甸而詳言疆理也疆以治外為錯壤之經千夫有澮澮上有道萬夫有川川上有路此大勢之宜正者也理以治内為平疇之緯一夫有遂遂上有徑十夫有溝溝上有畛此節目之宜詳者也由是而遂之自西而東入於溝者則南其畝遂之自北而南入於溝者則東其畝旱則受其輸及澇而洩之亦無泛溢之憂矣考之周官營溝行水之制則職之匠人止水蓄水之令則職之稻人浚導之功瀦積之事雖有旱澇猶可以人力補天時之所不及法至善也後世斷不能遵循古制興復井田而其講求於平日以庶幾水旱無虞者自可通古人之意而治之蓋大川巨浸方略則寄之重臣疏濬亦自有專職至於田間水道縷析條分為灌輸所恃者實牧令之責是以漢之循吏無不以此報最而唐宋以來經濟之臣紀績尤多誠使司民社者時留意於溝洫甽澮相其源流觀其通塞督之以疏鑿之方敎之以啓閉之節自不至一遇雨水愆期即聽其荒蕪而莫之救也且夫田非不廣袤而水泉自有餘也所患者聽其自然積歳不為整治塞者任其塞通者不復通得雨則相慶逢旱斯束手耳夫民勞則思思則善心生若農時使之力穡而暇時又敎之勤治溝渠則習其勞而可以廣生養之途者并可以杜游惰之漸也觀於詩而疆理有經斯屢豐有慶故即繼之曰益之以霡霂既優既渥又繼之曰疆場翼翼黍稷彧彧此所以受天之祜而報以介福也朱子曰賑濟無竒策不如講水利是在良有司矣詩經倬彼甫田歳取十千我取其陳食我農人自古有年今適南畝或耘或耔黍稷薿薿攸介攸止烝我髦士監察御史臣馬燝臣謹按此為公卿有田禄者力於農事以奉方社田祖之詩而周家以稼穡開基重農貴粟上行下效有以見井田之法焉有以見節用之道焉有以見用力之勤風俗之成焉其詩曰倬彼甫田歳取十千十千云者一成之田也地方十里為田九萬畝而以其萬畝為公田是十分而取其一自天子至公卿無異制焉則井田之法也用力既勤收穫必廣歳取十千則其所穫者廣矣雖然用之不可不合其宜亦不可不有其序設使當千倉萬箱之際而遽啓侈靡之心以致費用無度變豐盈為匱乏固屬不可即或心存節儉惟恐蹈驕盈矜誇之習而出入是吝升斗是惜視主伯亞旅之儔無一體相關之誼而農夫之不足者不知補不給者不知助則恐太倉之粟陳陳相因且有紅腐而不可食者不且重物而輕人化有用為無用較之奢侈者得失相距亦豈甚遠哉其詩曰我取其陳食我農人自古有年則新者既積而陳者不致於無用且食農人則用之合宜矣取其陳則用之有序矣夫非豐年不能歳取其陳然豐年之慶亦惟此食時用禮者為能致之耳所謂節用之道也傳曰一夫不耕或受之飢又曰人情一日不再食則飢此言食之關於民生甚重而穡事之不可不勤也其詩曰今適南畆或耘或耔黍稷薿薿不可見其當屢豐之後而罔敢暇逸如是哉一畝三畝廣尺深尺播種於其中稍耨壠草因壝其土以附苗根壠盡畎平則苖根深而能風與旱焉所謂用力之勤者此也古者士農商賈各執一業農之子恒為農其野處而不暱者秀民之能為士者也商賈不與焉其詩曰攸介攸止烝我髦士髦士即農民之秀出者耳夫公卿大夫力田奉祀亦止稼穡之常然而土物心臧既冨方榖機之相引固有自然而致者焉蓋其平日承化於上淪浹既深耕耘饁餉之餘父與父言慈子與子言孝箕箒詬誶之習日消則詩書禮樂之華漸啓所以曾孫來止得以進髦俊而考徳問業焉非風俗之成歟然則或耘或耔歳取十千者農夫之力也我取其陳食我農人者曾孫之慶也上慶有年下烝髦士者曾孫與農夫皆食力田之報也而要之務本崇儉愛民養士周先王所以涵煦覆育之者至深且遠矣詩經我取其陳食我農人自古有年編修臣馮祁朱子集傳言於此大田歳取萬畝之入以為祿食及其積之久而有餘則又存其新而散其舊以食農人補不足助不給也蓋以自古有年是以陳陳相因所積如此然其用之之節又合宜而有序如此所以粟雖甚多而無紅腐不可食之患也臣謹按此詩乃公卿有田禄者力於農事以奉祀之詩公卿田祿皆取之於農而此言取陳以食農者見公卿體天子惠養斯民之意施賑恤之仁即以勸耕耘之力所以家給人足而時和年豐也夫什一而賦穀之入私家者甚多奉公上者有限豈必待賑卹而始足顧惟百畝之田一歳之入供八口之用饔飱頼焉被服頼焉農㙲農具頼焉一切吉凶經費俱在其中雖遇豐年至來歳耕耘之時而所蓄已竭者比比也所蓄已竭無以為農本方且日謀口食之不給其為農也必不力而要非惰農之罪也所頼者在上有補助之法在周禮地官旅師云凡用粟春頒而秋斂之王制曰三年耕必有一年之食九年耕必有三年之食國家之蓄積皆以為民也民以奉上上以惠下上下相通和氣交浹天地感應而雨暘時若三農之所以咸慶八蜡之所以常通詩之所謂自古有年者未必不由於此且夫有年不可以常恃也水旱災荒雖盛世亦有之以自古有年之時尚不免於補助則偶逢歉歳其賑貸更當何如公家有限之粟豈能供此無窮之用是可見公卿大夫雖有田祿莫不崇節儉戒封靡存稼穡艱難之思無日不以敦本力農為重而又薦其馨香䖍祀方社以迓神庥其兢兢為民何如哉國家求民瘼而樹之公卿大夫公卿大夫承主徳而布惠於民以廣君惠至忠也以副民求至仁也以格神祗至順也合君臣上下神人以懋厥農功而圖其穡事自古有年不亦宜乎詩經曾孫來止以其婦子饁彼南畝田畯至喜攘其左右嘗其㫖否禾易長畝終善且有曾孫不怒農夫克敏給事中臣羅鳯彩眞德秀曰當時農之所耕者自有之田也而上之人又從而崇奬勸勵之故斯人亦以為生之樂而勤敏和悅之氣浹於上下後世之農所耕者他人之田為有司者豈復有崇奬勸勵之意故數米而炊併日而食者乃其常也田事既起丁夫之糧餉與牛之芻槀無所從給豫指收斂之入以為稱貸之資糲飯藜羮猶不克飽敢望有鹽酪之味乎曉霜未釋忍飢扶犁凍皴不可忍則燎草火以自溫此始耕之苦也燠氣將炎晨興以出傴僂如啄至夕乃休泥塗被體熱爍濕蒸百畝告青而形容變化不可復識矣此立苗之苦也暑日流金田水若沸耘耔是力稂莠是除爬沙而指為之戾傴僂而腰為之折此耘苗之苦也迨垂穎而堅栗懼人畜之傷殘縳草田中以為守舍數尺容膝僅足蔽雨寒夜無眠風霜砭骨此守禾之苦也刈穫而歸婦子咸喜舂揄簸揉競敏其事若可樂矣而一飽之懽曾無旬月穀入主家之廩利歸質貸之人則室又垂罄矣自此之外惟采薪於茅販鬻易粟以茍活而已豈不重可憐也哉臣謹按國以民為本民以食為天自古聖王未有不周知稼穡之艱難與小人之依以為敬天勤民之本者也三代盛時有任土之法而天下無不耕之地有任民之法而天下無不耕之人蓋朝廷所嘉惠者惟農官府所分作者亦農故頌之臣工君以是戒其臣也風之七月臣以是進其君也君民上下相勉以農有不啻父兄子弟者今讀甫田之詩曰曾孫來止以其婦子饁彼南畝以君上之尊出入田畝而不為屈也田畯至喜攘其左右嘗其㫖否以田畯之官相忘豆觴而不為恥也禾易長畝終善且有其力勤者其效必著也曾孫不怒農夫克敏其情親者其功益力也夫曾孫之來為勸農來也田畯之至為勞農至也勸勞之道得而民有不習耒耜而服勤田畝者哉所以駿發爾私終三十里上之愛下有先私後公之心雨我公田遂及我私下之忠上有先公後私之意春耕秋斂補助時聞暑雨祁寒怨咨不作所為民氣和樂而天心効順也歟詩經大田多稼既種既戒既備乃事以我覃耜俶載南畝播厥百穀既庭且碩曾孫是若檢討臣呉泰朱公遷曰曾孫之所欲者豐年而已故用力致此黍稷以順之輔廣曰既備乃事凡事豫則立也播厥百穀見其種之多也農夫以百穀庭碩為順曾孫之欲則上之意孚於下而下之意順乎上矣臣謹按國以民為本民以食為天故善政莫大於養民養民莫先於重農洪範三八政一曰食周禮太宰以九職任萬民一曰三農生九穀誠以穀之為物生之者天成之者地作之者人而因天乗地嗣爾股肱以克有秋者則非人能自為也大田之詩所由咏曾孫歟曾孫者何重農之令主也蓋曾孫之心欲其地無遺利也欲其人無遺力也欲其時和年豐而家給人足也且夫曾孫之愛我農人甚矣其為食我農人慮者周矣孟春則祈穀於上帝季春則為麥祈實矣孟夏則命野虞勞農勸民無或失時矣季秋則舉五穀之要矣季冬則令民出五種修耒耜具田器矣計一歳之中無時不以農為念舉四海九州之遙億人兆人霑體塗足之苦築塲納稼之勤崇墉比櫛之樂婦子盈寧之休皆宛然心目之間是以其時之農夫作為詩歌以誌其感激之情忠愛之意而不遽頌曾孫也為之咏繡壤之相錯曰大田為之慶公私之咸足曰多稼為之紀其種之無不良器之無不具曰既種既戒所以圖於未事之先者如此其豫也而又必為之形容其東作之方興曰以我覃耜俶載南畝播厥百穀而又必為之摹冩其西成之在望曰既庭且碩以為是帝命之率育也是曾孫之錫福以穀我士女也夫乃頌美之曰曾孫是若亦似惟此乃可以慰曾孫之心可以快曾孫之欲豈非其感之者深愛之者切并忘其胼胝之勤苦而但有君上之宵旰時往來於寤寐也哉粤稽自古帝王未有不以農事為先務者堯典首羲和之命虞書載咨棄之辭夏勤畎澮之濬商授七十之産周則康功田功用咸和萬民非惟其君然也即其臣且作無逸以陳小人之依作豳風以示稼穡之艱至於周官之設為農事經畫者居其半焉非惟二帝三王然也漢之文景唐之太宗宋之仁宗勸農貴粟之詔時下蠲租賜復之典頻頒亦能以天下為一家中國為一人謂之有道之曾孫誰曰不宜然則治天下者擴已飢之懷行保民之政將見主伯亞旅服本業於南畝之上稻粱黍稷報介福於多稼之秋百穀用成歳取十千天下之肥也是謂大順久安而長治者其以此也夫詩經大田多稼既種既戒既備乃事監察御史臣馬燝朱子曰種擇其種也戒飭其具也臣謹按盛王之世必以重農貴粟為首務而事不可以不勤尤不可以不豫夫上之人率作興事既勤且豫矣則在下者亦必沐膏澤咏勤苦於歡欣頌祝之中而寓震動恪恭之意今觀大田之詩先儒以為農夫頌美其上而作而自叙今歳之冬戒來歳之事必先擇其種焉飭其具焉蓋田大則種必備稼多而事以煩也竊嘗考之詩歌所載多有道田家作苦稼穡艱難之什而先時而圖者一則見於豳風亟其乗屋之一言一則如此詩既種既戒之兩言曰亟其乘屋者恐以他事妨之曰既種既戒既備乃事者則於先事豫之也今就此詩繹之月令季冬令告民出五種即既種之謂也命農計耦耕事修耒耜具田器即既戒之謂也曰既備即周官所謂修稼政也曰乃事即周官所謂趣稼事也上以歳取十千之咏祝農人以或耘或耔下乃以大田多稼之歌報曾孫以既庭且碩所由農事既畢歳晩務閒猶兢兢不自暇逸如此而其民俗之勤民風之厚往往於言外見之朱子以楚茨以下四詩為豳雅謂其與七月載芟良耜等篇相類洵非無説也抑論者謂周以農事開國故言稼穡之事獨詳於前代此其説似矣而不盡爾也夫耒耨之利以敎天下自神農氏已然上之人誠留心於重農貴粟即小民亦安有舍本業以嬉而不為先事之圖者詳周官之典而修月令之政上以勤導下下以勤報上豈獨周民善於頌禱也哉詩經有渰萋萋興雨祁祁雨我公田遂及我私彼有不穫穉此有不斂穧彼有遺秉此有滯穗伊寡婦之利編修臣王錦輔氏廣曰雨我公田尊君之義也伊寡婦之利及衆之仁也陳氏櫟曰欲雨公田不至知有已而不知有君利及寡婦不至知有已而不知有人忠厚若此其豳風之氣象乎臣謹按國以民為本民以食為天誕降嘉種隂陽和而風雨時者天之道也重農貴粟正井疆而咨保介者君之事也務本力田謀蓋藏而通有無者民之情也周自后稷以穡事開基聖聖相承豳風七月之章稱極盛焉周禮龡豳雅以樂田畯先儒以楚茨甫田大田當之朱子謂大田為農夫之詞以頌美其上若以答甫田歸美農夫之意而就此章言之田事修飭稂莠既除蟲蝗不害所望者雨澤耳而必先公後私者蓋三代盛時君之愛民無所不用其極民之愛君亦無所不用其極雖瞻雲望雨之下惟願公田霑足而後波及私田迨雨澤既敷豐年遂兆而穉有不穫穧有不斂遺秉滯穗留有餘不盡之利以養鰥寡始之以尊君親上之心終之以恤貧賑乏之意謝枋得謂上好仁而下好義於此詩見之至所云公田者考漢書食貨志建歩立畝六尺為歩歩百為畝畝百為夫夫三為屋屋三為井井方一里是為九夫八家共之各受私田百畝公田十畝餘二十畝為廬舍孟子曰鄉田同井出入相友守望相助疾病相扶持則百姓親睦此衣食足而風俗醇也後世井田既廢冨者連阡陌貧者無立錐儲備之計疎偷薄之風恣然而古今異宜井田之制斷難復行漢唐以後限田均田法似近古乃卒不見其利而民受其病此井田不可復之明騐也總之法制不必師古而君之愛民民之愛君則萬世如一者也人主軫念民依思艱圖易凡所以為閭閻計者至周且備而斯民沐浴膏澤感戴王仁尊之如天親之如父母纒綿固結而不可解易曰有孚惠心言君之實心利民也又曰有孚惠我徳言民以實心戴君之徳也君民一體感召天和雨暘時若大有頻書菽粟如水火而民焉有不仁者此急公奉上之義與睦隣敦族之誼一時並摰者也寧特課晴問雨上念公家遺秉滯穗旁及寡婦哉御覽經史講義卷十六
