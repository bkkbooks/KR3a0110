  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_062-1a, image: WYG0723/WYG0723-0598a.png}
body:
  text: 周禮乃立天官冢宰使帥其屬而掌邦治以佐王均邦國監察御史臣趙青藜臣謹按尚書周官首三公而周禮六官闕三公論者謂三公道尊故不下列於六曹而非其人居其位則三公之官存三公之義亡尤不如其闕也此其説似焉而實不然夫道之教訓曰師傅其德義曰傅保其身體曰保詳究厥義天官冡宰中已具之矣帝王之學與師儒不同一動作而國事之治忽隨之一舉念而民生之休戚繫之故其道之教訓者非以博典故多文為富也傅之德義者非以高清淨恭默獨善也保其身體者又非悅耳目娛心志姑息以為愛也今考太宰之職掌建邦之六典偏言則一職專言則包六職爾雅曰冡大也是以為之冡宰以治官府曰八法以治都鄙曰八則而體國經野之規畫定以任萬民曰九職以斂財賄曰九賦以均財用曰九式而開源節流之大道明以致邦國之用曰九貢以繫邦國之民曰九兩而甸衛要荒之經制詳八柄馭羣臣也王有廢置太宰詔之八統馭萬民也王視治朝太宰贊之以至祭祀燕饗朝覲會同皆一一佐吾王而成嘉禮內外相維神人胥悅國事民生無非所以盡輔導之實也若夫治忽之幾辨於內志之清明休戚之故切於至誠之惻怛則保身體又其本焉宋之彭龜年曰後世宰相兼三公之貴而不任三公之責道之教訓傅之德義僅委之經筵至於保身體之事雖世之賢者未嘗留意程子曰大率一日之中親賢士大夫之時多親宦官宫妾之時少則自然氣質變化德器成就此二臣者皆知本之論今觀天官所帥既有內宰以隂禮教九嬪以婦職教九御而掌婦學之法者重之以九嬪書內令者詳之以女史則雖宫寢燕室森然若堂陛之尊嚴宦官宫妾儼乎若士君子之陶淑晏安之私不形情欲之感有制飭其情以正其性謹其獨以純其修其保之於內者至嚴且慎也若夫侍衛以護身而宫正宫伯屬焉飲食以養身而膳夫酒正屬焉行息以安身而掌舍掌次屬焉衣裳以章身而司裘司服縫人染人屬焉其保之於外者又至詳且備也然則位冡宰兼三公其責誠巨任之者必其專且久承之者必其公且忠是以宏敷帝德之廣運用咸和萬民而君臣一心宫府一體以長治而久安也哉使闕三公之官而并失其義甚非所以弼成君德也成周盛時周公以太師兼冡宰召公以太保兼宗伯陳無逸戒異物其於師傅保之義亦大略可覩矣具其義於冡宰抑周公之志也夫周禮以九職任萬民一曰三農生九穀檢討臣周長發鄭司農曰三農者山澤平地之農也鄭玄曰原隰平地農民可於三處營種臣謹按虞帝咨牧曰食哉惟時洪範八政首食與貨豳風自于耜舉趾以及築場納稼其言農事為尤詳蓋民間作苦稼穡艱難所關於至治者不綦重哉先王體國經野其制備在周官太宰以九職任萬民一曰三農生九榖在鄭司農則以山澤平地為三農在鄭玄則曰原隰平地農民可於三處營種是皆以地為别矣而或謂上農中農下農為等則農以人别其説蓋未盡善也粵稽禹貢則三壤以定賦雍州黃壤厥田上上冀州白壤厥田中中揚州塗泥故列下下而他州胥準此矣孔頴達謂九州之內視地肥瘠區為上中下三等以成貢賦之法其實一州之內大約亦有此三等也夫區田之法始於伊尹田長十有八丈分十有五町中間十四道其法有三等以上農中農下農為别此三農以人别之説之所由起也不知區田之法本乎代田代田之法創乎后稷甽長終畝一畝三甽一夫三百甽而播種於甽中嵗代處故曰代田漢成帝時議郎泛勝之曰昔成湯時伊尹善區田教民播種嵗收粟每畝百石勝之試為之得四十石皆此法也然以之定疆界别豐歉則可而以之分三農則猶未足以為準也嘗考周禮一易再易之制雖雍冀間亦然而一夫授田百畝惟以不易者為定爾雅之三田自一嵗以至三嵗曰災曰新田曰畬所種愈熟得榖愈多而井田之法有遂有徑有溝有畛有洫有塗有澮有川有道有路以達於畿經界一正而民得按畝以耕此三代之所以樂康也周禮大司徒以土會之法辨五地之物以土宜之法辨十有二土之名物分野十二邦上繫十二次相民宅而知其利害他若九土見於左氏九地見於太元班固藝文志農凡九家書一百四篇管子呂氏春秋淮南子賈思協齊民要術唐中和節有進農書之例宋景德時有農田敕之頒凡載在經史諸子百家者班班可考而知也鄭司農以山澤平地為三農其説是矣然山多犖確地多低窪黍稌未必皆宜惟鄭玄原隰平地可於三處營種之説實本乎大司徒山林川澤丘陵墳衍原隰物各有所宜生而櫽括其詞以列諸注疏卓然為千古不易之論焉要惟取代田區田之法相其高下備其旱潦審量而善用之上追周官周禮之遺意使民務本力穡百榖順成由是以經術為治術導之以禮樂澤之以詩書而厚生正德教飬兼施唐虞三代之治不是過矣周禮以九式均節財用監察御史臣周祖榮鄭氏康成曰式謂用財之節度臣謹按國家之用財不可不慎也財出於賦賦出於土自邦中四郊甸削縣都以及關市山澤之民皆終嵗竭蹶胼手胝足奔走轉運出粟米泉布作器皿通貨賄以供上所需一絲一粒皆民脂膏也故聖王不敢輕用其財立之式法以為節限隆殺有差出入有度掌之以冡宰而共之於有司是以人主不得踰式法而過取百官亦不得違式法而過與凡祭祀幣玉之奉賔客饔餼之等膳羞裘服之制凶年施舍賑貸之條下至酒人授酒材掌皮頒皮革委人共薪蒸材木職幣斂幣餘職嵗贊逆會大府頒貨賄皆稱其所給足以待事嵗有常經用有常數大約按每嵗所賦之多寡以為定總計所入如干所出如干四分為率量用其三而存其一積至三十年則有十年之贏邦國有故不待加賦而王府所藏沛然自裕民或偶值水旱又得以蠲賦減租而無病於國故天不能災嵗不能凶國計不絀民力不匱此古昔盛世所為經久保盈造原立本端在此至纎至悉也夫以成周之隆家各授田民有恆業又俗尚敦朴人知節儉嵗計所入各有餘饒不待仰給公上而上之人猶日汲汲焉懼民生之或蹙民於時樂事勸功鼓舞率作力出賦稅而先王猶不敢泰然享之節之又節惟恐侈用以病民也夫其恤之也甚周取之也甚薄而用之也猶甚嗇如此况後之民視周之民其苦樂又加逺矣田制壞而貧富不均生齒繁衍地力就衰加以僧道之飬兵役之餉及一切俳優飲博徵逐間遊不事生産仰屋而食日耗米榖習俗既澆爭事奢麗服舍玩好之飾賔祭昏葬宴遊之費計貧民一嵗所獲不及一朝之資而豪右墨吏又從而朘削之迫之以水旱困之以轉輸重之以疾病死喪窮居蹙處不自聊賴而民於是始無以為生矣古今殊勢於此而欲治以周官之法以求足民非惟罔效適以滋擾計惟得其意而善為之要在均節財用而已考之史傳如漢之文帝宫室苑囿無所增益有不便輒弛以利民減諸服御狗馬時賜田租令丁男三嵗而二事其時人給家足海內殷富至武帝輕用其財外事征伐內興工作大府日匱乃置均輸告緍錢卒至虛耗奢儉得失昭然可覩然則足民之要别無有所為治財之術也欲治財必致籠天下之利利歸於上則下益竭善計者惟撙其財之所出而不悉其入則用之者無滲漏取之者無過差省約之餘留為施舍財不聚於上泉府所流轉相灌輸民得各自為生而又簡其節目去其苛禁一人躬行儉朴率先天下則而象之誰敢饜縱耳目以蕩厥家閭閻之産錙積黍纍日計不足嵗計有餘此財以用而得生以節而能流信乎易曰節以制度不傷財不害民孟子所謂賢君必恭儉禮下取於民有制保民之長䇿利國之良規莫有善乎此也周禮以官府之六敘正羣吏一曰以敘正其位二曰以敘進其治三曰以敘作其事四曰以敘制其食五曰以敘受其會六曰以敘聽其情編修臣王會汾臣謹按哲王御宇所以措一世於雍和者必先使萬事萬物各得其序而朝廷為起化之原則澄敘官方尤不可以凌節雜施者也周禮小宰副冡宰以贊王治辨之以六職合之以六聨合則羣僚共為一體不至乖隔而不親辨則諸司各守典常不至侵官而越爼法如是亦云備矣乃於職首必先正之以六敘者何也記曰百官得其序傳曰衆賢和於朝物必有序也而後能和此禮樂所由興而萬化所從出也天地之氣運行有漸是故風雨節而寒暑時人主設官分職布教立事亦民之風雨寒暑也安可不以其序乎觀小宰之六敘舉凡程功賦食上計受成皆有秩然之次第而非任意以為後先此法守所以有常而民聽所以不惑也因是知古之銓衡考課一循其敘必無有踰階躐次者矣或謂爵祿者天下之砥石人主所以厲世摩鈍也循資限年豈古制耶曰非然也太宰以八柄詔王則馭富馭貴王自操之原非官司所得與其有茂材異等顯績殊勳以布衣而位三公不踰時而登保傅何不可者若材能不過中人勞績又非顯著則但以入官之久近制爵秩之崇卑斯二者固並行而不悖矣冡宰贊元經國故舉其通變者以詔王小宰謹守章程故循其畫一者以明制斯小大之辨也夫陳殷置輔惟賢是求鼓舞人材難拘一轍有不次之榮以達俊異有積勞而授以勵中材天下異材少而中材多則聖王之馭吏也越次者少而循序者多非惟作吏治之精勤亦以杜人心之浮競吏皆出於精勤則不至居官如郵傳而職業舉矣人盡消其浮競則不以請謁玷官針而風俗淳矣漢制郡縣守相高第者擢二千石二千石治行最者入為九卿其褒遷似乎太速然漢之州部刺史猶後世節鉞大臣則己位居常伯矣自是而九卿而副相行能雖高尚需歷試豈無能者而可僥幸於捷得哉銓敘人材必稽名實茍無殊績莫若循資故德均以才才均以勞漢唐以來亦猶行古之道也周禮一書其中若六曹署吏九命設官三年大比之類後代皆師其意而朝廷官府之治尤禮樂教化之原其所為敘正羣吏者誠萬世銓衡考課之要術歟周禮以聽官府之六計弊羣吏之治一曰亷善二曰亷能三曰亷敬四曰亷正五曰亷法六曰亷辨編修臣儲晉觀鄭玄曰聽平治也平治官府之計有六事弊斷也既斷以六事又以亷為本臣謹按帝王官人之道克知灼見因材器使嘗慎簡於登進之途敷納明庶委任責成必綜核於職業之地唐虞之九德所以斷之於其人也成周之六計所以斷之於其官也夫六官之屬名位之大小攸殊庶務之繁簡不一其中英髦傑魁之倫積日纍勞建功奏績始著羽儀之用而終堪梁棟之任者豈伊乏人要舉此六者足以該之蓋善則循良有以宜民矣能則猷為有以敷政矣克敬則不懈於位矣守正則不違於道矣執法者不徇乎情矣明辨者不惑乎事矣先善於能者善自德言之能自才言之德為才本故善居能先也敬正主德亦善之端法辨主才亦能之類也王安石曰亷者察也謂察於此六者則羣吏之臧否自見而六者之外不復有所為亷之名與鄭説稍異管子曰亷不蔽惡則行自全夫亷雖訓察亦即褆躬厲行檢制精明之意而以之為臣工勸則夫內而衾影之無慚外而簠簋之必飭胥此物此志也竊以鄭元之解文義較為完備且六事之必本於亷者其理亦甚切而易明矣人必志氣潔清身家之營寡而後其德昭焉操履淳白取舍之分嚴而後其才當焉不亷則曰善曰敬曰正者無非邀譽之術而曰能曰法曰辨者又適足為濟貪之資也且亷者人臣之當固無足異而六事乃居官之績也故徒亷而已則不足以概六事而六者之中或得其全或得其半或得其一人材之優絀不能齊也然均不可以廢亷考之周官成王所以戒卿士者與此實相表裏其曰阜成兆民曰功崇惟志業廣惟勤曰敬爾有官曰以公滅私曰議事以制其爾典常作之師曰蓄疑敗謀比皆六計所櫽括其曰恭儉惟德無載爾偽作德心逸日休則又以亷為本之義也自唐虞始立考績之典周禮大宰之職以八法治官府八曰官計以弊邦治三嵗則大計羣吏之治而誅賞之然則小宰之六計其即成周考課之法歟三代而下漢法以六條察二千石郡國守相高第入為九卿唐考功法流內之官敘以四善二十七最四善一曰德義有聞二曰清慎明著三曰公平可稱四曰恪勤匪懈宋時考吏能否為三等以公勤亷幹惠及民者為上大都倣成周之遺制而為一代黜陟之課者也雖然小宰所聽治者六官之屬耳若六官之長則有大宰之六典在焉蓋三公九卿居論道經邦之職非可以六計求之而膺高位而享厚祿則亷固宜不待於言矣記曰大臣法小臣亷此之謂也抑嘗思之立朝而無忝者其素行之修也蒞職而克舉者其藏器之良也故斷之於其官必先斷之於其人大司徒鄉大夫之職三年大比考其德行道藝而興賢者能者使民興賢出使長之使民興能入使治之此其法良意美與小宰之六計相為維制而有合乎唐虞九德咸事之規者歟官人之要亦略具於是矣周禮以聽官府之六計弊羣吏之治一曰亷善二曰亷能三曰亷敬四曰亷正五曰亷法六曰亷辨檢討臣興泰鄭康成曰聽平治也平治官府之計有六事弊斷也既斷以六事又以亷為本臣謹按人君代天理物統蒞臣工綱舉目張絲聨繩貫俾得各勵名節為國家效股肱耳目之用考課之法固其最要者也周禮天官以六計弊治之條掌諸小宰以平治官府之功善則悃愊無華能則因時取濟敬則各居官次正則操履端方法則守典弗墜辨則臨事不疑此六者吏治之所從出也而要必以亷為本何謂亷有天理而無人欲者也人性感物而動不能無利欲之私故聖人嚴植其防使之相束於禮教名義之中而各安其分自知砥礪亷隅制節謹度上不負國中不辱身下不病民品行從是而端氣節從是而立漢世取士曰興亷調吏曰亷察夫亦猶六計上亷之意云爾然亷未有不從節儉出者元德秀為魯山令嵗滿笥餘一縑僅駕柴車趙抃守蜀惟以琴鶴自隨蓋能儉以養亷故取與一無所茍後世居官者一切服飾器用饋遺往來耗費多端俸薪不敷所用於是巧取漁利而民不勝其擾矣那移侵欺而國帑亦多致虛懸矣周公蓋早鑒戒乎此故分六計而各冠以亷俾為臣者以此為標準則簠簋不飭之行自清課治者以此為勸懲則苞苴竿牘之弊不作豈非萬世不易之良法歟抑臣聞禮記曰大臣法小臣亷是亷之一言尤大臣之所以表率百僚者也後漢祭遵屢掌兵戎家無私財光武歎為憂國奉公張奐為屬國都尉羌有獻金馬者奐以酒酹地曰使馬如羊不以入廄使金如粟不以入懷悉以還之威化大行然則屬員之亷節惟在為大僚者激厲而振興之而於考課之時務必激濁揚清精詳甄别果有封鮓却金皭然不汚者顯加褒擢以為亷吏倡其敗檢踰間貪冒無恥者嚴加黜罰以警其餘如此則察典不視為具文而臣品克端人心風俗亦蒸蒸丕變矣周禮以聽官府之六計弊羣吏之治一曰亷善二曰亷能三曰亷敬四曰亷正五曰亷法六曰亷辨檢討臣德保臣謹按注疏云善善其事有辭譽也謂有善事四方令聞辭譽也能政令行也謂雖無辭譽而政令得行也敬不懈於位也謂敬其職位恪居官次也正行無傾邪也以其行正直言公正無私也法守法不失也謂依法而行無有錯失也辨辨然不疑惑也謂其人辨然於事分明無有疑惑之事也亷者潔不濫濁也既斷以六事又以亷為本臣不揣愚陋謹就六計亷為本而廣其義為六針云理煩治劇周流不滯令聞廣譽聲稱四至內重外輕如軒如輊以亷為本明道正誼不計其功不謀其利右亷善針卓哉能吏之綱之紀上令下行如臂使指暮夜懷金風頺波靡以亷為本飭其簠簋臣門如市臣心如水右亷能針不懈於位以事一人佩垂佩委王之藎臣昭昭表節冥冥墮行以亷為本匪貌祗承夙夜惟寅直哉惟清右亷敬針重規疊矩行表言坊敬內以直義外以方苞苴弗却蠅玷圭璋以亷為本無欲則剛煌煌令典濁激清揚右亷正針森然憲章金科玉律尺寸不失修其邊幅式飲貪泉或出或入以亷為本無慙衾獨凛冽霜威不寒而肅右亷法針鑑兮本空衡兮本平惟虛生白惟公生明蔽交於前奪吾之精以亷為本玉壺氷晶清斯濁斯濯足濯纓右亷辨針周禮以聽官府之六計弊羣吏之治一曰亷善二曰亷能三曰亷敬四曰亷正五曰亷法六曰亷辨監察御史臣胡寶瑔注聽平治也平治官府之計有六事弊斷也既斷六事又以亷為本疏皆以亷為本者此經六事皆先言亷後言善能之等故知將亷為本亷者潔不濫濁也臣謹按朝廷設官分職隨其才能而器使之務令各盡所長以共襄盛治然衆材之畢集必考核之尤精惟衡以定品而平治官府之法昭焉曰善曰能曰敬曰正曰法曰辨六者不同同歸於亷夫所謂亷者非矯世以鳴高飾情以干譽也古之良臣清畏人知無愧衾影本乎不敢自欺之誠以堅其夙夜匪懈之志則職任無曠而庶績咸熙胥由此也蓋獨知之地不為物欲所移則介然之操自不為權利所奪有其德而德本於光明有其才而才亦歸於中正以之服官敬其事而後其食以之治民高其行而從其教故弊吏以亷為本洪範之垂訓也有猷有為必兼有守子貢為信陽宰孔子曰勸之慎之又告之曰治官莫若平臨財莫若亷亷平之守不可改也觀聖人之言則信乎有守為入官之要而察吏之道即莫先於此小宰之職聽之以六計欲其循良足以宜民貴乎善善必本於亷乃昭內志之精純欲其才力足以處事貴乎能能必本於亷乃見中情之粹白敬者謂其不懈於位也惟亷而主一無適長守此嚴翼之心正者謂其行無傾邪也惟亷而至公無私不改其端方之素持守不阿者取其法因亷而法所以遵循而無失也臨事不惑者取其辨由亷而辨所以昭晰而無疑也然則何一非以亷為本哉夫不貪為寶以貧而賀子文無一日之積王曽志不在溫飽惟其品詣己端不為外物所染夫是以公明正直皭然不滓確乎不拔有德以用其才而才乃不入於偏私不流於巧偽所謂欲影正者端其本也厥本既端則存心砥礪如竹箭之有筠如松柏之有心宜乎清標可以風有位羔羊素絲詩人所以詠委蛇也潔行可以振頺風鳯凰瑞麥史臣所以書治行也以亷為本而律己則先洗滌其心論人則先衡量其品由是國家有得人之慶在位無踰檢之臣善也能也敬也正也法也辨也不皆各效其長以成郅隆之治哉於此知周官六計弊吏之為先得其本也周禮以聽官府之六計弊羣吏之治一曰亷善二曰亷能三曰亷敬四曰亷正五曰亷法六曰亷辨監察御史臣劉方藹鄭玄曰聽平治也平治官府之計有六事弊斷也既斷以六事又以亷為本善善其事有辭譽也能政令行也敬不懈於位也正行無傾邪也法守法不失也辨辨然不疑惑也臣謹按九德之中一則在亷十愆之警一則惟貨是知官府之計寡亷必黜羣吏之治以亷為先蓋人一不亷則自封瘠民安能善不亷則恣欲慆心安能敬不亷則賂章官邪安能正不亷則敗度敗官安能法雖不亷之人多有能者辨者但幹事之才為欲所詘其能不足任也見事之智為利所昏其辨不足用也一不亷而吏治遂無一可取此亷所以為官府之大本而聽官府之計之大要也但國家分職於官府與百姓重賴有羣吏者茍能潔己不剝民亷矣猶未足以既乎其職也故有六計以弊吏治一則亷善而德惟善政二則亷能而位事惟能三則亷敬而欽乃攸司四則亷正而正色率下五則亷法而各守爾典六則亷辨而庶明勵翼必六者有一乃稱循吏六計中善為本能為用善之分著為敬正能之敷施為法辨而六者均以亷為本能亷則善敬正因以可兼惟亷則能法辨方為可取顧官吏之亷其根本倡自朝廷周之時九賦以義取九式以節用聖主之慎乃儉德惟懷永圗周以前皆然也帝堯富而不驕貴而不舒舜禹有天下而不與臯陶猶戒以無教逸欲有邦成湯不邇聲色不殖貨利盤庚不肩好貨武王亷於財亷於色召公猶戒以不役耳目百度惟貞成王言恭儉惟德無載爾偽皆以一人之清心寡欲為天下官吏倡率斯為臣者各能砥礪亷隅基德於亷而增美焉庶可以六計弊之而成大法小亷之盛也周禮因此五物者民之常而施十有二教焉一曰以祀禮教敬則民不茍編修臣莊存與臣謹按虞書舜命契曰敬敷五教在寬司徒教典宜莫重焉乃别言十有二教何也臣愚以為五教者天之經地之義民之行而非空言所能喻必施此十二教而後可以敬敷之於民焉嘗考先王制祀禮莫大於郊社莫隆於禘嘗尊事上帝以訓民事君順事祖考以訓民事親孔子著宗祀之典於孝經我將之詩是也其詩曰儀式刑文王之典日靖四方又曰畏天之威于時保之聖人昭事之忱於是為至是以其民不賞而勸不怒而威恪恭匪懈竭其忠孝以復其性以修其職而治化成焉聖人之教不肅而成者祀禮教敬之謂也二曰以陽禮教讓則民不爭臣謹按賔射饗燕飲食之禮所以親兄弟宗族而和朋友賔客也俗貴爵則民爭於位俗貴富則民爭於財俗貴德則民爭於名茍有所貴則必爭爭必於其同類是以失序而相詐也聖人以禮示之觴酒豆肉之間朝廷几席之位莫不導民致其尊讓夫射以觀德君子不徒讓也然升降進退揖遜雍容善猶不爭而况財與位乎是以其君子善則稱人過則稱己其庶人耕者讓畔行者讓路禮之化也三曰以隂禮教親則民不怨臣謹按婚姻之禮所以經夫婦之别而厚人倫之本也周之盛時文王躬上聖之德有內助之美周公制禮詠歌其義以風化天下后妃則有關雎之德葛覃之本卷耳之志國君夫人則有鵲巢之行采蘩之職大夫列士之妻修采蘋之法度此六詩者鄉飲酒之禮則歌之是以其民篤於行亷於色男女正婚姻時怨曠之感息和平之化行此教親而民不怨之效也四曰以禮樂教和則民不乖臣謹按民有血氣心知之性而七情出焉情有所向則僻僻有所甚則乖名義不及顧刑法不及畏平則悔而思思則悟而和聖人作樂以教民所以防其僻而導之平也夫雅頌之音六代之舞固足以動四氣之和而著萬物之理至於閭巷四野之所習又為之土鼓葦籥以吹豳詩笙磬琴瑟以合鄉樂鼓舞之師以作其氣采詩之官以達其志是以其民欲心平躁心釋遷善逺罪日化而不自知移風易俗莫善於樂此之謂也五曰以儀辨等則民不越臣謹按公卿大夫列士庶人上下有章貴賤有等所以承王命而崇國體也聖人在上謀議及於衆庶咨詢不廢芻蕘其卑易近民如此而民服事其上莫敢踰越者貴有常尊而賤有等威也夫貴乘其勢以陵於賤則法令廢下慢其位以抗於上則朝廷褻聖人制宫室車旗之等嚴服物采章之辨以九儀之命輕重布之茍無其爵雖有其財不得服其服而行其禮民知尊爵而朝廷益尊冒上無等之習所由禁也六曰以俗教安則民不偷臣謹按四方之民各有其俗狃近而忘逺舍本而趨末此俗所以日偷也為終日計者其民散為終嵗計者其民擾為終身計者其民願為數世計者其民仁盛衰之數恆由此起聖人以本俗教民疆理有宜室廬有固衣服有恆器械有式樹畜有經親戚有誼公劉之遷豳太王之遷岐雖迫遽擾攘而纎悉具偹定數百年之經制於一日二日之間是以其民重厚而難動搖惇篤而善守業也七曰以刑教中則民不暴臣謹按民之不能無邪惡猶榖之不能無稂莠也治之則馴縱之則暴聖人不忍聽其暴於是刑以威之約其情防其欲凡勇敢強有力之人能用之於禮義不得施之於鬬辨書曰伯夷降典折民惟刑又曰士制百姓于刑之中以教祇德夫伯夷典禮臯陶作士而播刑之迪以伯夷為法者士師之用刑惟以禮為斷也是以守禮者雖弱無所懼犯禮者雖強無所恃鄉無暴俗國無幸民大化之隆天下無一人之獄焉所謂刑期無刑民協于中者是也八曰以誓教恤則民不怠臣謹按安樂之民難治憂患之民易化善教者在使民知恤而已盤庚之時商之臣民自以為先王之舊人席其寵祿恃其寬政傲上之令而逸豫是從玩於近娛忽其逺患故其告羣臣曰豫告汝于難告庶民曰今豫告汝不易言民生之不易而戒懼之不可以怠也故又申之曰無戲怠懋建大命聖人之於民未安也為之求其安既安也為之思其危若父母之訓子孫寧或過慮而無有不及誥誓之言惟是為切是以其民憂深思逺長慮却顧早夜不怠以從上教書曰百姓王人罔不秉德明恤此商之所以盛而周公之所以告召公也九曰以度教節則民知足臣謹按天地之所生筋力之所治田疇之所獲山澤之所出其饒乏有大數而度量不生於其間則物力有限民欲無厭富民厚積而不知其極貧民偷取而不虞其盡此天下所以常苦不足也聖人教之以度受祿者不豫民爭業家不藏重器國不貴異物商賈不擅山澤之富農夫不逐什一之利鳥獸草木取之有時用之有節故無甚貧甚富之民流俗不相耀則心和平而性恬安隂陽調四時正萬物盛多而可以贍民之欲民無貪心物有餘利而或不知足者蓋未有也十曰以世事教能則民不失職臣謹按四民之職民職之大者也遷其業則弗能為良世其教則不勞而善故士處學校農處田野商處市井工處官府父兄子弟相授受以成其業家無棄材則國無遊民傳之既久所謂士食舊德之名氏農服先疇之畎畝商循族世之所鬻工用高曽之規矩藝日以精俗日以厚親賢樂利雖百世猶不忘先王之教也十有一曰以賢制爵則民慎德十有二曰以庸制祿則民興功臣謹按爵祿者人君之大柄而教民之樞機也人情莫不欲富貴而惡貧賤無以制之則茍得者不知愧而德行日廢功效日隳以德制爵以功制祿尊卑厚薄各有定分近無所濫逺無所遺是以其民之慎德也為善於國不如為善於邑為善於邑不如為善於家其民之興功也安居必先公而後私有事則就勞而惡逸書曰敢不敬應言勸賞不遍加乎天下而天下從焉此教之成也周禮周禮大司徒之職以荒政十有二聚萬民一曰散利二曰薄征三曰緩刑四曰弛力五曰舍禁六曰去幾七曰眚禮八曰殺哀九曰蕃樂十曰多昏十有一曰索鬼神十有二曰除盜賊侍讀臣惠士竒鄭康成曰散利貸種食也薄征輕租稅也弛力息繇役也舍禁無禁利也去幾去其稅也眚禮凶荒殺禮也殺哀省凶禮也蕃樂閉藏樂器而不作也多昏不備禮而昏娶者多也索鬼神求廢祀而修之詩所謂靡神不舉也除盜賊急其刑以除之飢饉則盜賊多不可不除賈公彥曰舍禁謂山澤所遮禁者舍去之使民得取蔬食去幾者幾謂呵禁也關市去稅而猶幾之臣謹按荒政十有二外考之史册又有三利有三弊三利者一曰開渠二曰運糴三曰鼓鑄三弊者一曰抑價二曰貯粟三曰掘井謹一一條陳之於左宋史汪綱知蘭溪縣會嵗旱躬勸富民浚築塘堰大興水利餓者得食其力全活甚衆於是部使者列為一道荒政之冠此嵗畢開渠之法也今水利方興似宜推行之於天下前漢召信臣為南陽太守好為民興利務在富之乃於穰縣南六十里造鉗盧陂纍石為堤起水門提閼凡數十處以廣溉灌嵗嵗增加多至三萬頃民得其利郡以殷富及後漢杜詩為太守復修其業故時歌之曰前有召父後有杜母今南陽郡屬河南省魏賈逵堰汝水為新陂通運二百餘里人謂之賈侯渠鄧艾修淮陽百尺二渠通淮潁大治諸陂於潁之南穿渠三百餘里溉田二萬頃今河南郡縣多古所開水田之地收穫多於陸地數倍後世皆淤塞不通莫能疏濬一逢嵗旱束手無䇿坐以待天豈非河南水利不興之故哉即以江東水利言之常州有望亭堰閘置於隋之至德徹於宋之嘉祐至元祐七年復置未幾又毁宋臣章沖以為説此堰牌有三則潦嵗則泄其水而無淫溢之患旱嵗則蓄其水以溉田兼運河有節啓閉以時足通舟楫永免作埧車水科役百姓之煩擾故修建望亭上下二閘固護水源而三利備焉孝宗隆興六年監進奏院李結獻議謂低田恃堤為固乞於常秀蘇湖諸州水田塘浦要處乘此農隙作堰增令高濶則堤成而水不為患方此飢饉俾食其力因其所利而利之秋冬旱涸涇濱斷流修築尤為省力而户部以其議切當因曉有田之家各出錢米與租田之人更相修築官無所費民不告勞從之由此而推之天下凡郡縣有古時水道昔通今塞者長吏悉心籌畫疏而通之濬而深之因修立水門堤閼固護堤防并令飢民得食其力此荒政之一大利也南宋時浙東大飢朱熹為提舉奏請盡出內庫之錢為收糴本又江右大飢安撫辛棄疾始至榜通衢曰閉糴者配強糴者斬次令盡出公家官錢銀器召官吏儒生商賈市民各舉有幹實者量借錢物不取子錢使領運糴期終月至城下發糶於是連檣而至其直自減民以不飢此運糴之法荒政之一大利也或曰官榖在倉無煩運糴不知官榖賑飢民僅及近城三十里內耳窮鄉僻壤勢豈能來老幼疾患之人必有餒者未若令民運糴其粟益多以民賑民必能周遍而窮民無不蒙其澤矣周官司市國凶荒札喪則市無征而作布注云無征謂市不稅金銅無凶年因物貴大鑄泉以饒民然則鼓鑄亦備荒之一䇿也去嵗江蘇嵗旱歉收錢價騰貴前此每錢千值銀一兩二錢五六分猶不至日益增昂者賴有寶蘇局開爐鼓鑄搭放兵餉得以流通於民間也今開江省從前收買民間黃銅器皿盡歸蘇局鼓鑄用訖無存因此停鑄未得源源接濟錢日減價日增伏思銅禁已開國無庸再行收買舊銅器皿而洋銅有餘原許商舶售銷粵銅開礦亦得流通各省似應仰請敕下江省督撫酌動帑項採買銅斤接濟寶蘇局鼓鑄仍照近例搭放兵餉則錢益充裕市價自平矣物少則貴多則賤自然之理也嵗飢榖貴誰能抑之故抑價則民間必有強糴者由是盜賊滋豐白晝劫掠不可禁止宋時撫州大飢黃震為知州坐驛舍署文書不入州舍嚴禁強糴不抑米價其後米價漸省而後入州視事誠以米價不可抑而強糴之漸不可不防故浙東飢朱熹為提舉始拜命即移書他郡募米商蠲其征及入境而客舟之米已輻輳則米價不抑而自省矣故曰抑價足以召亂增價足以招商然則抑價者荒政之一大弊也宋孝宗時江右大祲郡檄萬安丞劉清之視旱徒步阡陌親與民接凡所蠲除具得其實清之曰有粟之家閉不肯糶實窺伺攘奪者衆也在我有政則大家得錢細民得粟兩以為便此粟在民則為法以出之規畫防間民賴以濟又辛棄疾安撫江西運糴鄰郡而信守謝源明乞米救助幕屬欲勿豫棄疾曰均為赤子皆王民也即以米舟十之三豫信此粟在官則分張以助之此疆爾界一視同仁故曰毋藴年毋壅利謂藴積年榖而專其利然則貯粟者荒政之一大弊也掘井溉田一見隋書李德林傳一見金史食貨志德林為懷州刺史在州逄亢旱課民掘井溉田空致勞擾竟無補益為考司所貶此固昔人已行之而無效者也安可復踵其失乎金泰和八年詔諸路按察司規畫水田部官謂水田之利甚大沿河通作渠如平陽掘井種田俱可灌溉比年邳沂近河布種豆麥無水則鑿井灌之計六百餘頃比之陸田所收數倍以此較之他境無不可行者然則鑿井種田乃沿河豆麥之田非稻田也又皆在平陽邳沂近河之田而欲推行之於他境則李德林已嘗行之徒勞擾而無補益矣然則掘井溉田豈備荒之善䇿哉周禮以荒政十有二聚萬民編修臣于振東萊吕氏曰堯水湯旱民無菜色其制度不可考周以三十年之通制國用至春秋而秦飢乞糴於晉魯飢告糴於齊九年之制已壞其後如李悝之平糶豐年收之凶則出賑亦三代以後之良䇿也漢詔載粟入關得毋用傳宋富弼在青州措置流民種種有法趙抃在會稽不減榖價商賈輻輳皆屬可行漢耿夀昌為常平倉至宋遂為定制韓琦又請罷鬻沒宫田募人承佃為廣惠倉嘉祐間又置廣濟倉宋之德澤洽民三倉蓋有力焉臣謹按賑荒之法聖人育物之盛心也蓋周禮詳焉然條目雖具而非其人不能行故聖人任人而不任法蓋聖人不能使嵗之必稔而能於豐嵗預為歉嵗之儲不能使民之不飢而能使飢嵗不失豐年之樂亦曰慎選親民之吏而已天子以生民之命寄之於大吏大吏以生民之業屬之於有司有司取百姓之身家謀之於夙夜隨時補救因地制宜未雨綢繆先勞後逸其事至委曲其道至纎悉不可以殫述也詩曰曽孫來止以其婦子饁彼南畝田畯至喜此言天子之重農也又曰嗟嗟保介維暮之春亦又何求如何新畬此言諸侯之勸農也農事勸則收穫豐收穫豐則儲蓄厚儲蓄厚則水旱不足憂矣古之有司與民常親親則耕鑿出入豆區釡鍾之細皆得以量其緩急而節其盈虛今之有司與民甚疏疏則剛柔燥濕有無登耗無由悉其情形而為之通變且以一邑言之百里之中有業者幾何無業者幾何令所當知也有業之家其在高鄉者幾何其在低鄉者幾何令所當知也潦則低鄉受其害而高者或有豐收旱則高源被其災而低疇間有成熟此可以理推者也被荒之家其為稍給者幾何其為赤貧者幾何稍給者猶可待赤貧者不可緩也茍不留心於平日則逐户稽查必滋紛擾茍不詳察於臨時則文移駁詰動涉兼旬及至得請而𣪚給不得其術委用不得其人反致鳩形鵠靣升斗莫沾而兼併豪強倉箱濫及胥吏恣為影射姦商借此居竒既而上司風聞白簡從事而流離瑣尾展轉溝壑者不知凡幾矣詳考古今言荒政者大抵開倉賑濟平糶截漕煮糜禁釀是數端者雖使李悝耿夀昌輩生於今亦無以易也但必如富弼之綜密周詳趙抃之實心任事行之方有實效蓋朝廷之指授惟舉大綱而有司之經營每多掣肘非置身於功名得失之外不能適愜乎閭閻疾痛之微故曰有治人無治法得其人則仿古人之法可也師古人之意亦可也不得其人則慕古人之名而無濟者泥古人之法而將不止於無濟也故曰慎選親民之吏而已且夫州縣之有常平等倉出陳納新以備不虞法至善也乃銓注者聞所任之地倉榖數多每每心驚色駭夫豈不知此陳陳相因者凡以為民哉或慮倉厫坍塌而修建無資或恐浥爛相尋而出納無術必至因緣虧空身挂彈章功名之念既重則恤民之念不得不輕瞻顧若此而望其實心撫字不可得也又朱子社倉其法盡善然説者謂其可行於鄉而不可行於邑可以委之耆社而不可屬之有司止可任其力之所能為不可強以情之所不樂故有司之務名者奉行故事不過虛張其數莫濟緩急之需甚有不肖官吏比户徵求名曰樂輸實同抑勒則又與社倉之本意相去甚逺矣非法之不良行法者非其人也夫身為長吏而四境之內高下不知貧富莫辨良頑罔别休戚不通無是理也設或有之是曠官也不然則地方大吏不能躬親化導之也夫國家亦豈能旦夕間得數十百富弼趙抃而用之哉亦在為大吏者體九重宵旰之憂宣朝廷慈惠之澤平日風厲屬員不以趨走承順為恭不以便捷敏給為能屬吏中有實心愛民者不以其悃愊無華而鄙之不以其迂拙戅直而棄之立考課之法以農政為殿最寬之以嵗月加之以激勸考成既滿則上其績於朝或如漢之賜爵賜璽書以旌異之必得可繼其功者然後衝替如此則各屬向風羣相則效有不吏治蒸蒸者乎故尹鐸用而晉陽無繭絲卓茂封而東漢多循吏上行下效捷於影響端不誣也由是言之欲講賑荒之法當先籌備荒之䇿欲致養民之效當先簡親民之官官得其人則水旱無虞豐凶有備周官十二可無泥其文矣此德惟善政政在飬民所以必歸之知人則哲之后也哉周禮正月之吉始和布教于邦國都鄙乃縣教象之法于象魏使萬民觀教象挾日而斂之乃施教法于邦國都鄙使之各以教其所治民令五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賔檢討臣張鵬翀鄭康成曰受者宅舍有故相受寄託也鄉大夫之職各掌其鄉之政教禁令正月之吉受教法于司徒退而頒之於其鄉吏使各以教其所治以考其德行察其道藝三年則大比考其德行道藝而興賢者能者鄉大夫帥其吏與其衆寡以禮禮賔之賈公彥曰用鄉飲酒之禮以禮賢者能者賔客舉之臣謹按周禮為成周致太平之書綱舉目張無所不備而保息安養化民成俗之事於地官之職尤詳臣夙昔講求以為無變今之法不失古之實者莫如今制所行保甲鄉約等法有比閭族黨月吉象魏之遺意得其意而善用之則無更張之擾而有復古之漸焉蓋王者之於民將欲教之必先養之將欲養之必先有以整齊而聨屬之而教養之政即行乎其間五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賔此屬之有道也徙於國中及郊則從而授之徙於他則以旌節行之無授無節則唯圜土納之此制之有法也有小司徒以統其衆有鄉大夫以均其力有載師以掌土事有司稼以制民食有三物以教八刑之紏師氏保氏司諌司救之設以長其善而匡其失而又有泉府以收壅滯委積以待凶荒間粟屋粟以供散惠施利其至詳至悉也如此蓋治四海九州舉如其一鄉故曰觀於鄉而知王道之易易也今制保甲十家為甲十甲為保甲有長保有正其整齊聨屬之法合乎比閭族黨之意而簡徑易行其十家相坐之制或虞牽涉太多轉相推諉則稍加變通參用五家為比有罪相及之文五比為保十保以上為里保有長里有正制皆如舊里統于鄉鄉統于縣令丞以下分巡四鄉時時體察務悉民隱令四民各占所業毋相混淆傭佃轉移及藝技雜流附於籍有役則按籍均之給以食竒淫無益民用者與遊惰同罰壯丁二人保長以下輪值一人共相守望村置鼓津置柵門關市肆倍嚴稽察使姦匪無所措其足如此則一鄉之良頑勤惰緩急有無皆可遍察而周知矣鰥寡孤獨廢疾有族黨收恤者時加體察官給口糧者時親驗閲責成里保無使失所或有凍餒流為丐乞者即時設法收飬有他處流丐須量為安插使有生業或量給資糧移歸本籍不許再入我境此中或有盜賊混伏甚有采割人者可為隱痛又有丐頭及雜流匪類相助為惡宜嚴禁而絶其根則良民得安息窮民無失所此保甲之大要也邑有耆儒碩彥或仕而歸其鄉者請為鄉老其次為約正月吉率其鄉人而讀法講約倡明友助親睦之義而功罪相及之法行乎其中蓋天理民彛之大有不可一日不講者不得因民生未厚而視為緩圗也况今天下生齒日繁靡費日廣生養難遂風俗益以偷薄鄉約之講尤不可視為泛常必明五禮之序使明曉易遵申八刑之糾使警惕無犯至里孰之師亦必考核人品使董率子弟共遵循謹庶澆漓漸革親遜可幾鄉有孝友睦姻任恤之行則約正書之三年無變則鄉老舉之所舉三人以上以鄉飲禮賔之且上達而俟察舉焉如所舉不當或素不教戒而麗於刑者鄉老以下議罰有差三麗於罰則更易之鄉飲弗賔如是則勸規並行功罪相及而羣知興行矣務使四境之內無盜賊無爭訟無凍餒丐乞人勤耕織户誦詩書四民樂業百姓親睦而後為能行保甲鄉約之實效臣所謂無變今之法不失古之實者此也我皇上廣雎麟之德心行官禮之法度察吏安民簡賢久任使上官無掣其肘小民各輸其情簿書期會日簡農桑教化日興上下孜孜交勉復倣漢時增秩賜金之意以風勵將中材知勉而賢能益奮成周太平刑措之盛必可得而致也臣以説經之次敬抒管見冀有禆化理之萬一伏惟聖主裁擇而進教之周禮正月之吉始和布教于邦國都鄙乃縣教象之法于象魏使萬民觀教象挾日而斂之乃施教法于邦國都鄙使之各以教其所治民編修臣劉綸賈逵曰正月之吉謂建子之月一日也正月之時調和教典訖即布於邦國諸侯及畿內二鄙公卿大夫等建寅之月使萬民來就雉門象魏之處觀教象文書從甲至甲為挾日而後斂藏于明堂也使之各以教其所治民者若據邦國則使諸侯若據都鄙則使公卿大夫也臣謹按成周端本正始之義莫先乎立教故成法所在既已垂諸方䇿信及臣民而嵗首必舉而縣之蓋天運周於上人事應於下此地官教法所由翼天官之治法以行也顧考禮文所紀布化承流之職至備且詳於邦國有諸侯於都鄙有公卿大夫次第以相及則是司徒出之賢百執事率其所屬而稟承之即萬民亦得各就其長上而講明切究之矣乃雉門魏闕之間更為之麗其教於象且麗其象於挾日而始斂者亦以聖人之愛民周坊民至而目著心存之道寓焉爾易曰風行地上觀先王以省方觀民設教書曰每嵗孟春遒人以木鐸徇於路月令曰孟春之月命相布德和令命大師守典奉法王者於順時播化覺世牖民諸大政常使天下飲食寤寐莫不見其昭天地而燦日星然後其教不肅而成其政不嚴而治是以周之導民也溯其綱維所自振則權必統乎尊揆其服習所從親則治必詳於近如司徒始和教法其職要其屬繁其去民亦逺故其於法也曰布曰縣曰斂曰施而不曰讀下此為小司徒則曰頒法鄉師準之又下此為鄉大夫則曰受法鄉吏從之而猶未讀者以其所統之州且有五也至於州長乃一嵗而再讀法焉謂正月及嵗時祭祀是已至於黨正乃一嵗而七讀法焉謂四時孟月及春秋祭禜與正嵗是已至於族師乃一嵗而十四讀法焉謂十二月之吉及春秋祭酺是已降而至於閭胥並無常地無定時豈非與民愈親則數愈密入愈漸而化愈深者歟夫民者邦之本親民者教化之本聖人觀於鄉而識王道之易此物此志也故方其敷教也勞來之詔固由上以逮民而及其教成也風俗之書又自民而登上再稽鄉舉里選之典閭胥選於二十五家則敬敏任恤之小善可書矣族師選於百家則孝友睦姻有學之纍善可書矣黨正選於五百家則德行道藝之大善又可書矣由是州長考之鄉大夫賔之且以升於司徒而象益驗其明法益知其備教益觀其成矣夫是故成周端本正始之義莫先乎立教也周禮令五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賔監察御史臣沈廷芳鄭康成曰此所以勸民者也使之者皆謂立其長而教令使之閭二十五家族百家黨五百家州二千五百家鄉萬二千五百家臣謹按周禮所言即後世之保甲法也大司徒之比閭族黨州鄉行于六鄉者也遂人之鄰里酇鄙縣遂行于六遂者也而五家為比十家為聨則於族師之職言之五家相受相和親有罪竒邪則相及又於比長之職言之一官之中於保甲之法惓惓數致意焉誠以治民之道散處而雜治之則勢暌而法難周整齊而聨絡之則情親而教易立人各有所統則互相稽察可以代官長之煩家各有所聨則彼此賙恤可以敦睦姻之俗孟子云出入相友守望相助疾病相扶持自古治四海九州之衆而不異於一井一疆者誠莫善於保甲之法矣若夫奉行之道貴乎務其實而不以其名師其意而不泥其迹蓋户懸一牌里設一籍法似密矣然而里居之遷徙不常生齒之登下無定今嵗之所編或有異於來嵗春夏之所籍或不符於秋冬是不可以按圖而索刻舟而求也周禮不云乎以國比之法以時稽其夫家衆寡徙於國中及郊則從而授之若徙於他則為之旌節而行之大槩比閭之長以時稽其生齒之多寡民居之遷徙層纍而上之隨時更正互相考核以符實數小司徒復有三年大比之法以要其成是故云不煩而政亦易舉至於澤居者編排之以舟楫山居者編排之以棚寮山陬海澨無往不宜後世所以推廣而行之者總不越乎比閭族黨州鄉之法故無事則相保相受有事則相賙相恤善則相勸過則相規旌揚善行採之於鄉評郊遂有移懲之以不齒設有追胥力作固可按册而稽或凶祲賑恤不難計口而授洵乎治四海九州之衆而不異於一井一疆者莫善於保甲而為萬世不易之良法也御覽經史講義卷二十五
