body:
  text: 凡例一諸臣進講內有敷陳中理奉旨嘉勉者亦有所論未當蒙恩開示者洋洋聖謨同符典誥實足以昭示來兹謹據諸臣所述彚成一帙登諸卷首仍載原進講義以著緣起一凡説經之篇根據先儒理解純正者固已分别録入即或不涉訓詁而詞條雅贍可資觀覽亦所不遺一頌贊針銘及四言詩歌原本經訓諸臣所進間涉斯體録存雅飭之篇不復别為卷帙苐於目録本題下標出以便檢閲一科臣原奏內請令進講經義史事及前代奏議謹按奏議自漢朝董諸疏以及唐宋名臣上書劄子等篇率在史册之內是編即依諸史先後敘次成卷奏議一條不復區别云一宋儒通書西銘諸書及大全語類等編皆所以闡揚聖學發揮經旨講義內有標舉粹語附以已見論列入告者彚為一卷用殿全篇之末一是編奉旨纂輯其中蹇淺之作無所發明者不復闌入至已經入選而時有纍句又如家修廷獻四字本無出處憂盛危明之語祗屬臣僚沿襲時文率多誤用既經聖訓指示悉為刪改以訂訛謬一是編所録計文七百餘篇釐為三十一卷每卷之中經序篇章史分年代性理亦就諸儒傳習先後略為差次或一卷或數卷不等其論孟孝經文各一二篇不能成卷即附周禮卷末一凡一題而有文數篇或十數篇者易詩書三經為多詞意復沓輒加裁汰所存之篇仍依諸臣進講時官職第其前後
