body:
  text: 禮記大樂與天地同和大禮與天地同節檢討臣吳泰孔頴達曰天地氣和而生萬物大樂之體順陰陽律呂生養萬物是天地同和也天地之形有髙下大小之限大禮别尊卑貴賤與天地相似是天地同節也黃裳曰大樂致和大禮致中天地之於萬物生以和成以節而先王之大樂大禮贊天地之化育故與之同其和同其節臣謹按帝王之治天下也功成作樂治定制禮樂以和民聲使之合愛而流通其精神禮以節民心使之合敬而經緯其秩序禮樂乃制治之原也顧制禮樂者帝王而其本則由於天地天地之氣與物交而為和和則有聲流而不息合同而化而大樂興焉天地之氣與物辨而為節節則有形天高地下萬物散殊而大禮行焉是和節之本乎天地者原根極於心性之微而和節之著於禮樂者乃符合乎易簡之藴是以律呂相協而四時順萬物生同天地之和也等威有辨而百昌若兆民安同天地之節也與天地同和所以淡而不傷和而不淫四海之內欣喜歡愛之心油然以生而皆知親其親矣與天地同節所以天澤分而君臣定卑高陳而貴賤位四海之內莊敬恭順之心肅然以生而皆知尊其尊矣蓋天地之和節不可見而於時物之行生寒暑之往來其有情有文而無偏無黨者皆自然之禮樂也聖人作樂以宣暢其和心順成其節序顯之驗於民物而精之格乎神明惟其同出於一原所以潛通乎兩大也孔子曰民之父母必達於禮樂之原以致五至而行三無記曰知禮樂之情能述張子亦謂不聞性與天道而能制禮作樂者末矣然則制禮作樂者必有聖人之德居天子之位惟聖人道高德厚基命宥密養愛敬之本篤愛敬之施致一心之和始能同天地之和致一心之中始能同天地之節此即易所謂裁成天地之道輔相天地之宜者也此即中庸所謂贊天地之化育者也此即記所謂大人舉禮樂天地將為昭者也豈非本性命之真建中和之極而兼總條貫乃能使宇宙之間恩明誼美而上下與天地同流也哉總之禮樂之説管乎人情人情者聖王之田也修禮以耕之播樂以安之所以同民心而出治道者端在於此是以堯舜禹湯文武之治邁百王而首出起千古而獨隆無非本斯二者夫是以南靣而立而天下太平也夫禮記君子反情以和其志比類以成其行姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪僻之氣不設於身體使耳目鼻口心知百體皆由順正以行其義監察御史臣霍備陳澔曰反情復其性情之正也情不失其正則志無不和比類分次善惡之類也不入於惡類則行無不成曰不留不接不設如論語四勿之謂皆反情也類之事如此則百體從令而義之與比矣臣謹按理涵於性而性具於心情者性之所發性無不善而情或雜以形氣之私志者心之所之心有不存而志或乖其中正之則斯著之於行不能有善而無惡矣然而此心本體之明自在則其為善之類與惡之類要自炯然君子唯省察操持不使惡之類得以滋長而所行一出於善之類則反情比類之謂也故姦色亂聲不留聰明者所以養其外也淫樂慝禮不接心術者所以養其內也外無聲色之誘則內以正矣內無淫慝之惑則外以正矣惰慢之氣自內出者也邪僻之氣自外入者也二者不得設於身體則外而耳目口鼻百體內而心知皆由順正以行其義而自養之功成矣人君居上臨下一切膳食之美章服之華宫室之壯與夫左右侍御之奉臺池苑囿禽魚花木之觀凡所以戴尊親而致愛敬於萬方者故皆分所當然然而孟子曰耳目鼻口之於聲色臭味四肢之於安佚性也有命焉君子不謂性也誠以此皆人心惟危之類稍不裁制而物欲日滋則必務精麗競綺靡進竒技逞淫巧以至燕樂逰畋漸相引誘而不之覺自非以不留不接不設者用力克治將外瀆聰明而內淆心術故虞廷授受丁寧於危微精一之間而惟幾惟康制事制心聖聖同揆莫不兢兢以致謹也唐之太宗三代以下之賢主也亦嘗曰人主惟一心而攻之者甚衆或以勇力或以辨口或以諂諛或以姦詐或以嗜欲輻輳攻之各求自售以取寵祿此其所以難也然太宗嘗欲幸南山嚴裝已畢而竟不行魏徵請其故笑曰初實有此心畏卿嗔故中輟耳此太宗能自制其欲而貞觀之治所以稱獨隆乎夫情之漓性嗜欲最為易溺而客感之蕩志聲色淫慝最為易流人君修己以安百姓亦惟敬義夾持內外交勉俾道心常昭人心退聽而已矣禮記姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪僻之氣不設於身體使耳目鼻口心知百體皆由順正以行其義監察御史臣傅為詝真德秀曰君子之所以自養者無他內外交致其功而已故姦聲亂色不留聰明者所以養其外也淫樂慝禮不接心術者所以養其內也外無聲色之誘則內亦正矣內無淫慝之惑則外亦正矣惰慢之氣自內出者也邪僻之氣自外入者也二者不得設於身體如是則外而耳目鼻口四肢百體內而心知皆由順正以行其義自養之功畢矣顔子四勿之功可以庶幾也臣謹按為人君者不難於治天下而難於治一身夫人主一身耳而天下固有無窮之聲無窮之色窺其隙而投之使溺於其中而不自知且曰此固樂也禮也而不知其為姦矣亂矣且淫矣慝矣於是乎聰日以淆明日以蔽而心日以昏心既日以昏則一身耳目鼻口即欲強為端莊勉為強固而有所不可得何也失其順故也失其正故也而達之天下者又何以時措咸宜而皆得其義乎聖王知其然也是以將制禮作樂以進天下於中和必先於一身乎慎之夫以聖人之履中蹈和也豈有姦亂之聲色得至於耳目哉然而聖人不敢恃也茍一有聲之近於姦者色之近於亂者則必斥而去之矣豈復有淫慝之禮樂得溺其心術哉然而聖人不敢忽也茍一有樂之近於淫者禮之近於慝者則必屛而逺之矣至於惰慢邪僻之氣此皆聲色之所由乘而禮樂之所由壞也是故聖人猶必謹之使周旋動作之間有莊敬之容而無安肆之態若此則外有以修其身而耳目鼻口之小體無不恭內有以正其心而心知之大體無不敬若是者皆天地之經而民物之則也所謂義也義之為用也順以順治已而天下之民無不順義之為體也正以正持躬而天下之事無不正豈非禮樂之原而與天地同其和節者乎雖然體有大小心者身之主也聖王先清其心以立萬化之原則耳目口體自不言而從令蓋心正而身自正矣身正則天下莫不正矣禮記夫古者天地順而四時當民有德而五榖昌疾疢不作而無妖祥此之謂大當然後聖人作為父子君臣以為紀綱紀綱既正天下大定天下大定然後正六律和五聲絃歌詩頌此之謂德音德音之謂樂右庶子臣金相陳澔曰四時當謂不失其序也妖祥祥亦妖也大當大化之均調也作為父子君臣以為紀綱言聖人立父子君臣之禮為三綱六紀之目也三綱謂君為臣綱父為子綱夫為妻綱也六紀謂諸父有善諸舅有義族人有敘昆弟有親師長有尊朋友有舊也先序之以禮乃可和之以樂然後有正六律以下之事臣謹按古今者時也盛衰者運也禮以節民性樂以和民聲則存乎聖人之德當古昔盛時草昧初開文明乍啓民生其間耕鑿之外别無嗜欲疲癃殘疾無其人昆蟲草木無其異此蓋乘天地五行最清之氣生人生物獨際其盛聖人者出恐其無别也則制為三綱六紀以教之使民明父子之親識君臣之義嚴男女之别而大經大法由此以立所謂禮以節民性也而猶恐其或即於離也則取諸六律以正之使長短輕重之無差準諸五聲以和之使清濁髙下之均宜文以琴瑟則為弦長言咏嘆則為歌觸物感情見諸比興則為詩宗廟享祀形容盛德則為頌凡此者皆所以化其心知血氣之偏消其亢戾粗厲之習使風移俗易天下和平所謂樂以和民聲也夫禮者理也樂者和也物得其理而後和不得其理則其分不安其分不安則其情不遂其情不遂則其氣不平此聖人作樂所以必俟之紀綱既正天下大定之後也故樽爼筵席者禮也而非所以為禮羽旄干戚者樂也而非所以為樂聖人德盛於中文見乎外欲民之納於軌物也則仁敬孝慈道積厥躬而禮非虛設欲民之血氣和平也則喜怒哀樂發皆中節而樂非偽為故曰德音之謂樂夫隆古之時隂陽不忒氛祲無聞風雨時序百榖順成謂非氣運之獨盛乎然臣愚以為時無古今運無升降亦存乎人主之修德而已矣昨年十一月二十四日寧夏地動兵房盡皆坍塌則損傷民人何可忍言我皇上深宮修省降有明旨特遣大臣前往周視發帑撫恤俾無失所堯舜愛民之深憂民之切何以加兹臣聞天道有關人事災沴必無妄行堯水湯旱聖人不諱言災亦不諉諸數惟省身克己深謀逺慮為未雨綢繆之計堯則命官咨嶽憂勤見乎辭湯則六事自責剪瓜為犧周宣王遇災而懼側身修行故詩人美之然則聖王非因災而始懼正因災而懼益切亦可見矣夫父母之愛子也無不為之計長久稍有未安則殷勤告誡不遺餘力蓋其愛之也深故其憂之也逺憂之也逺故其戒之也切想天父母萬物仁愛下民之心亦若是焉矣况人君固天地之宗子哉故夫日月星辰麗乎天山川草木麗乎地凡反常為怪者皆垂象示警之意正玉成聖賢之心故曰惟天聰明惟聖時憲伏願我皇上念政事之既勤則曰得無或即於懈乎念逰畋之既逺則曰得無或戀於中乎念讜言之既開則曰得無有壅蔽者乎念阿諛之悉屏則曰得無有隱伏者乎念民力之維艱則曰得無有無衣無食者乎念禮讓之宜興則曰得無有相欺相詐者乎念謹小慎微之為難則曰得無積小成大由微致著乎念邊防武備之為重則曰得無偶致疏虞漸近廢弛乎凡此者我皇上聖修純粹睿慮周詳業已無微不入非臣下淺見陋識所能窺然古人云非知之艱行之為艱非行之艱終之為艱則思艱圖終當有慎之又慎者焉書曰惟德動天無逺弗屆滿招損謙受益時乃天道由此觀之修德禳災孰大於是伏願我皇上法大舜之格天師成湯之日新至誠感召捷於影響天氣和於上地氣和於下人氣和於中五行順四時當風雨節寒暑時百榖豐登庶民平康豈非天下萬世臣民之福哉禮記張而不弛文武不能也弛而不張文武弗為也一張一弛文武之道也贊善臣羅源漢臣謹按帝王挾操縱萬物之權以御天下必相天下之緩急而善其施何則萬物之氣久而易盈亦久而易耗盈則日驕耗則日促故治天下者操之太嚴則難乎為下養之太寬則難乎為上寬與嚴相濟而張弛適中此文武之道可以治萬世而無弊今夫御者之於馬也必調其氣息均其步驟緩則磬之急則控之然後履險如平六轡有如琴之妙設使御馬者騁追風躡電之足不惜其力時加鞭䇿久之馬力既竭必至踣頓而不能進否則奔逸四出破輪壞轅而不可制而反其用者狃於周道罔所隄防一旦銜橛變生顛墜於不自知壓覆於不及覺此又勢所必至者治天下之道何以異是夫人情莫不樂安逸而惡拘束古聖人慮其安逸而流於肆也故為政令以制之刑罰以威之俾凛凛然束於規矩之中而不敢縱又慮其拘束而無以自適也故飲食通其情男女順其欲俾人人有生人之樂而無自苦之心張以維弛弛以濟張有缺一而不可者嘗試綜古今得失而論之文武之治莫可尚矣逮其末天子守府綱紀廢墜遂頺弱而不可復振秦用商鞅智驅術役驟致富強始皇承之嚴刑峻法民不堪命論者謂周失之弱秦失之強誠不誣也漢髙除秦苛政約法三章文景繼之恭儉仁惠猶有三代遺風至於孝武強才逺略好大喜功卒致輪臺之悔毋乃過張之失歟而元成而下則又威福下移優柔寡斷此則過弛之明鑒也若夫唐之貞觀宋之開寶雍熙類皆因時補救寬猛酌中能措一世於太平而其後每不能無失或諉任酷吏而法外行殘或事決北司而人主袖手或東封西祀而罔識憂勤或青苖均輸而紛紛操切伊古以來張而不弛弛而不張其弊何可勝道夫陰陽者天地之化也張弛者帝王之權也一陰一陽而歲功成一張一弛而治道著彼黃老之學高言清靜申韓之學徒事刑名是文武所不能亦文武所弗為也况夫張之太過進鋭退速如強弩之末力不能穿縞其勢反歸於弛而弛之太過天下侈然自放驟起而更張之勢必如救火揚沸非武健嚴酷不能勝此又害之相因而至者也詩曰不競不絿不剛不柔敷政優優百祿是遒得斯意也可以神張弛之用可以復文武之休豈但可與之觀蠟也哉禮記唯聖人為能饗帝孝子為能饗親檢討臣韓彥曽臣謹按萬物本乎天人本乎祖似人與物各有其本而祖宗為父母之父母天地為祖宗之父母實則一本而非有二本也報本之大典莫大於郊社禘嘗郊以明天道父事天也社以神地道母事地也明物本乎天之義而合天施地生為一氣即合明天察地為一理此心即天地之心也五年而一禘義率祖也四時而一嘗仁率親也明人本乎祖之義而合祖功宗德為一脈即合尊祖敬宗為一誠此心即祖宗之心也事天如事親求其格也事親如事天致其尊也明人物一本之義而合饗帝饗親為一念即合聖人孝子為一身此心即天地祖宗合同而化之心也是以成周制禮郊祀后稷以配天后稷逺矣配稷於郊非徒以尊后稷也以冬至氣之始祖者人之始故冬至祭天而以祖配之也宗祀文王於明堂以配上帝文王近矣配文王於明堂非徒以親文王也以物成質於秋人成形於父故季秋享帝而以父配之也此成周之禮所以獨隆千古也唯聖人孝子以天地祖宗之心為心知吾身而上有父母焉兄弟者父母之所生也則友於兄弟即由孝於父母推之也知父母而上有祖宗焉族姓者祖宗之所生也則睦於族姓即由孝於祖宗推之也知祖宗而上有天地焉民物者天地之所生也則仁民愛物即由孝於天地推之也上之所逹愈髙則下之所擴愈廣下之所擴愈廣則上之所冒愈周曽子所云置之而塞乎天地溥之而橫乎四海施諸後世而無朝夕者非此之謂與若夫言行交修以守其宗廟此卿大夫之孝也忠順不失以守其祭祀此士之孝也謹身節用以養其父母此庶人之孝也凡為臣民者無不體天子孝治天下之心為心所由海內治安民氣和樂百穀用成庶草蕃廡以臻於大順之隆也夫禮記至孝近乎王至弟近乎霸監察御史臣沈懋華臣謹按孝弟一理也為孝子者必能為悌弟王霸岐途也言王道者不必言霸功何則天下之庸行莫如孝弟天下之至德亦莫如孝弟是道也發諸朝廷行乎道路至於州巷放乎搜狩修乎軍旅其事為家庭愛敬之常其功在經緯民物之大禹湯文武之世所為聲教四訖綏靖萬邦者由此其選也舉一孝弟而王道盡此矣豈特近之云爾哉若夫齊桓晉文秦繆宋襄楚莊之徒則不然挾天子以令諸侯強凌弱衆暴寡名曰假仁仗義實則三王之罪人而已是以仲尼之門五尺童子羞稱管晏賤之也祭義乃曰至孝近乎王至弟近乎霸是欲分孝弟而二之且欲合王霸而一之也此豈孔氏之遺書也哉蓋戰國之時微言大義澌滅無聞故縱橫家言往往艷稱五霸漢儒襲其流風形諸議論遂舉王與霸而並言之耳非孔氏之遺書也表記曰道有至有義有考至道以王義道以霸考道以為無失經解曰義與信和與仁霸王之器也與祭義所言如出一口蓋幾幾乎以王霸為一矣吳氏曲為之解曰伯者諸候之長王者天子之稱霸王猶言侯王非五霸之霸也如是則表記曷不言義道以侯而乃言義道以霸乎經解曷不言侯王之器而乃言霸王之器乎凡為此説者絶不知王道之尊也絶不知霸功之賤也并不知孝弟合一之理進乎王而大逺乎霸也不止不塞則學術大壞而王道終不可復矣是不可以不辨禮記子曰立愛自親始教民睦也立敬自長始教民順也教以慈睦而民貴有親教以敬長而民貴用命孝以事親順以聼命措諸天下無所不行編修臣佟保鄭康成曰親長父兄也睦和厚也尊長出教令者孔頴達曰此一節明愛敬之道人君欲立愛於天下從親為始言先愛親也己先愛親人亦愛親是教民睦也起敬於天下從長為始言先敬長也已能敬長民亦敬長是教民順也睦則恩慈故云慈睦民既慈睦各貴所有之親教以敬長民心和順不有悖逆故貴用在上之教令以此二者措置於天下無所不行臣謹按此言愛敬二端為齊治均平之本也夫蒸民之愛敬由於秉彛然往往忘之者非天之降才爾殊也無以感發其善端鼓動其至性而已抑知親親仁也敬長義也仁義宣乎德教通乎四海而其推之也必有所自始仁始於愛親而愛其親以及人之親故曰自親始義始於敬長而敬其長以及人之長故曰自長始夫不乖之謂睦不悖之謂順堯典曰以親九族九族既睦則教民睦者愛親之道也孝經曰以敬事長則順則教民順者敬長之道也愛始乎親而教其睦於天下凡有親者莫不敦一本之恩而剝棗烹葵皆徴赤子之至暮故曰教以慈睦而民貴有親敬始乎長而教其順於天下凡有命焉莫不奉長上之令而修矛執戟不忘同仇之壯懷故曰教以敬長而民貴用命夫親親長長君子所自立而孝以事親順以聽命愛敬肇於家庭而德教加於百姓不待家喻户曉而光天之下合愛同敬故曰錯之天下無所不行書曰立愛惟親立敬惟長始於家邦終於四海孟子曰仁之實事親是也義之實從兄是也又曰人人親其親長其長而天下平可知愛敬之理上下同心治平之機古今合轍倡之而即應感之而隨通其效有如此者雖然立之之道亦難言矣蓋奠其基之謂立植其根之謂立栽培而善養之之謂立深固而不可動搖之之謂立立而後盡其不學不慮之良立而後廣其明天察地之用立而後見仁人孝子保合太和之極功愛敬可易言立哉禮記言而履之禮也行而樂之樂也給事中臣宫煥文臣謹按禮樂不可斯須去身者也是以君子致禮以治身而莊敬嚴威所以作天下之肅致樂以治心而易直子諒所以導天下之和然人心之仁根於內而達於外其秩然而有序者即為禮藹然而至和者即為樂是禮樂之本在於心也而禮樂之實著於身蓋不越言與行之兩端言行得其道則禮之行不僅在升降酌獻酬酢之數而樂之達亦不僅在綴兆羽籥鐘鼓之文孔子贊易於履曰君子以辨上下定民志於豫曰先王以作樂崇德是禮以踐履為本樂以和樂為義其大旨也繫辭傳又言聖人之所以廣業者而曰禮卑法地朱子本義釋之云循理則禮卑如地而業廣蓋人之步履未有憑虛而可以致逺者故行逺必自邇登高必自卑中庸所言慥慥篤實與修辭立誠所以居業者同義聖人之言一以貫之而已周子易通論樂三篇而冠其首云聖王制禮法修教化三綱正九疇敘百姓太和萬物咸若乃作樂以宣八風之氣以平天下之情蓋樂和民聲者也而乃自百姓太和始至太和之所以成又惟在乎聖王之正三綱而敘九疇則行出乎身而天下樂之樂之實具是矣由是觀之言即為禮而行即為樂君子之所為明於禮樂亦明乎言行之道耳豈待講禮之數習樂之文而後謂之禮樂耶抑又推之行所以踐言也言而履之即為行行得其序而天下樂之則樂之和固由於禮之序以致之孔子曰履德之基也又云履以和行乾卦文言亦謂利物足以和義蓋言而履之惇庸秩敘各得其宜則百行具備措之於身而身安施之於政而政治被之於民而民和子思所謂見而民莫不敬言而民莫不信行而民莫不悅者必自聖人之出言為經舉足為法禮與樂交至以馴致夫太和之休而聖人所以達樂之情者必本於明禮之節也若夫秉禮定樂王者所以治世之大經而易俗移風必由於是則升降之數綴兆之文又未嘗不明且備焉此所謂禮樂之全也禮記奉三無私以勞天下編修臣竇光鼐臣謹按天地者生之始也人者治之始也天地生人而人治天地故人者天地之參也然而天地無時不生而人有時不治者何也蔽於一曲而暗於大理也荀卿曰萬物為道一偏一物為萬物一偏愚者為一物一偏夫一偏之不足治萬物也審矣故欲觀乎三王之德者無私盡之也易曰法象莫大乎天地懸象著明莫大乎日月夫天之為覆也地之為載也日月之為照也夫人而知之也然指一物而名之曰若為所覆所載所照不得也是之謂無私無私故物莫得而私之是以生而不謝殺而不讐也王者乘其道而兼用之故其德與之為凖易曰首出庶物萬國咸寧無私覆也又曰君子以厚德載物無私載也又曰大人以繼明照於四方無私照也大造無心而成化聖人有心而無為是同運而並行也顧不曰準而曰奉何也奉之為言猶曰夫有所受之云爾易曰後天而奉天時此之謂也然則奉之之事若何記曰天有四時春秋冬夏風雨霜露無非教也地載神氣神氣風霆風霆流形庶物露生無非教也天地垂象聖人則之仁義禮樂刑政皆其具也王道蕩蕩無偏無黨天下會歸如影如響易曰顯比王用三驅失前禽邑人不誡吉無私之孚也雖然三王之所以奉之者又有本焉不求其本而逐其末未有不離而日甚者也嘗約其弊而論之曰深曰察曰惠曰猛何也上者下之儀也上易知則下親之矣上難測則下畏之矣親則從畏則遁故曰主道利明不利幽利宣不利周不然則且貫日而治詳一日而曲列之語曰墻之外目不見也里之前耳不聞也而况天下之大乎故曰主好要則百事詳好詳則百事荒不然則且舉天下而拊循之唲嘔之譬之猶泉涸而魚相詬以濕相濡以沫也何可長也不然則且傮然要時而進事遂功而忘民譬諸琴瑟弦急而不更調誰能聽之故曰罔違道以干百姓之譽又曰罔咈百姓以從己之欲聖王知其然也故嘗返而求其本何謂本曰敬而已矣敬則靜靜則虛虛則公公則以無私勞天下而我無事矣記言湯德之無私而引詩曰聖敬日躋昭假遲遲上帝是祇帝命式于九圍夫敬德之聚也三王之所同也兹所以奉無私而參天地與禮記天有四時春秋冬夏風雨霜露無非教也地載神氣神氣風霆風霆流形庶物露生無非教也監察御史葛德潤臣謹按天地之間物各有理窮理乃所以為學也夫天地變化昭然示人於覆載之間人莫不見之然未能窮其理習焉不察視為陳迹其孰從而感發之夫惟熟玩衆理驗之以聞見會歸既久一旦渙然左右逢原然後知造化之迹無非至理而發見洋溢皆其取之不盡者也蓋天有四時運行於上地載神氣動作於下春秋執生殺之機冬夏極陰陽之用風雨之散潤霜露之凝結其施於庶物者無非天道至公之教也風之動蕩霆之震耀流形於下化育庶物使皆呈露發生者無非地道至公之教也夫神氣天氣也風霆天地所共有也其偏繫之地者以天降神氣而地載之風著於土雷出於地故也至若雨露之所潤莫不物資以生而獨言風霆者以風霆無方而莫測尤為氣之神也是蓋天地之貞觀隨在必察而流行變化是皆不得已而然也張子正蒙有曰氣聚則離明得施而有形盈天地之間者法象而已文理之察非離不相覩也又曰浮而上者陽之清降而下者陰之濁其感遇聚散為風雨為雪霜萬品之流形山川之融結糟粕煨燼無非教也朱子謂天道至教聖人至德與孔子豫欲無言天與聖人一而已矣然則聖人之修道立教可知己在易上天下澤觀履而制禮雷出地奮體豫而作樂巽風行而申命行事雷雨作而赦過宥罪皆效法天地之義也鄭太叔論禮而引子産之言略曰夫禮天之經也地之義也民之行也則天之明因地之性生其六氣用其五行為君臣上下以則地義為夫婦外內以經二物為父子兄弟姑姊甥舅昏媾姻亞以象天明為政事庸力行務以從四時為刑罰威獄使民畏忌以類其震曜殺戮為溫慈惠和以效天之生殖長育民有好惡喜怒哀樂生於六氣是故審則宜類以制六志哀樂不失乃能協於天地之性漢儒董仲舒亦曰明王正喜以當春正怒以當秋正樂以當夏正哀以當冬上下法此以取天之道由此觀之聖人體天地之心以為心即體天地之教以為教天地無心而成化聖人有心而無為均一大公無私而已故曰聖人與天地合其德禮記清明在躬氣志如神侍讀臣塗逢震陳澔曰清明在躬氣志如神即至誠前知之謂也臣謹按聖人在上奉三無私以勞天下故其德與天地參此三王之所同也成周之世耿光大烈盛於文武而其清明之全體如神之妙用則有以豫於深宮齋祓之地而周於一日萬幾之中故盛德獲福機非適逢而事非強致孔子所為深溯本原以明奉若之實也夫人主以一身立於億兆臣民之上宗廟之所式憑社稷之所依賴公孤卿尹百司庶職用人必當其才禮樂兵刑工虞水火立政必合其宜近而侯甸逺而要荒有易匿之情形散如星棊異如箕畢有難齊之好惡此孰非環向交至以待理於一人者而九重之上凝旒黈纊以塞聰明警蹕傳呼以慎舉動雖憂勤惕厲夙夜不遑而有意以迎之則鄰於逆億無心以置之又懼其廢弛此從心之所以難先覺之所為貴也非有如神之氣志何以物來順應時措咸宜哉雖然天無所不覆非有心於覆也地無所不載非有心於載也日月無所不照非有心於照也其無心者其無私者也是故皇極之施神其變化而王心之一約於清明人主之德侔天地明並日月者亦本之以無私而已矣聖人無欲無欲則靜靜則清聖人無偏無偏則正正則明清則淡泊無為萬物不得乘之以喜怒而淆之者息明則條理畢照萬物不得引之以好惡而蔽之者消是故不邇聲色不殖貨利以義制事以禮制心其靜也一物不有而萬化之宰已立於不見不言之先其動也因物付物而研幾之哲適如其何思何慮之天蓋無私則理全理全則以身遇物皆以理遇理故往可數來可知邇不泄逺不忘萬物之命百世之福胥於是乎基之夫天道無心而成化而萬物之氣無不和萬物之志無不遂聖人有心而無為而順天地之氣以布理繼天地之志以達化要其清明之體一故其如神之用亦一也由是觀之有無私之德必有去私之學古先哲王明德懷矣不輟緝熙聰明亶矣不忘執競則質任自然之説固非聖王之所敢出也易曰窮神知化德之盛也通書曰誠精故明言無私之德也商書曰修厥身允德協于下惟明后言去私之學也盛德獲福豈偶然哉禮記子云上酌民言則下天上施監察御史臣劉方藹陳澔曰上酌民言謂人君將施政教必斟酌參挹乎輿論之可否如此則政教所加民尊戴之如天所降下者矣臣謹按君者民之天也言者民之心也民心各有其天君惟務洽其心君之所以天乎民者必從其言入民之所以天乎君者以所施而見夫以天下之民之言之紛然岐出何由悉達於上而從而酌之古聖君明目達聰好問好察有納言之官有采風之史有庶人傳語之典誠以匹夫匹婦不獲自盡民主罔與成厥功是以博采民言無逺弗屆無微不彰舉民所慮之於心宣之於口者酌之理以求其當酌之情以求其平酌之時以求其宜酌之勢以求其順善則行之敗則備之行而弊者變通之行而漏者補苴之由其言以考其俗與心浮者黜之奢者節之薄者革之頺者振之朴者文之淑者旌之而且修其教不易其俗齊其政不易其宜朝廷之上四海之遙言以施而上施以言而下合億兆人之隱微幽獨曲陳於天子耳目之中而一一如其心之所慮口之所言為之權衡斟酌以納之於生成教育而無一夫之不獲則是君之體民一天之體物春夏秋冬之不愆其侯雨㿩寒燠之必順其時曲成不遺而覆幬無私也亦不過如是焉耳是以禮以型民則曰天秩爵以勸民則曰天命刑以威民則曰天討事以治民則曰天功天以生生為其心君以好生為其德政事以生其身家教化以生其性命亦如民之所欲天必從之故民以君之施為天之施天下無非戴天之民即無非戴君如天之民也而上之所以得此於民者惟在酌民言民言之不可忽也如此夫御覽經史講義卷二十三
