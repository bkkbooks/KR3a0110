body:
  text: 性理一動一靜互為其根編修臣白瀛臣謹按太極圖左半為陽動右半為隂静左固陽也而隂已伏於其中右固隂也而陽已藏於其内然則左半之陽非生於左而生於右右半之隂非生於右而生於左隂陽兩在而不測動静交錯而不窮此天地之性情也臣謹推廣其說而詳言之河圖之六與八老隂少隂之數也而一三之陽各統之生者倡而成者隨則竒為耦之根也七與九少陽老陽之數也而二四之隂各統之内為主而外為客則偶又為竒之根也東南皆生長之鄉而正北之一㸃獨為衆陽之宗西北皆斂藏之地而正南之二㸃獨為衆隂之首則互根之理於河圖見之矣伏羲六十四卦自復至乾一百一十二陽而八十隂雜居之陽盛之地已為隂長之基自姤至坤一百一十二隂而八十陽雜居之隂長之方已為陽亨之本坤以藏之而雷之動乃起於重隂之下此復所以見天地之心也乾以居之而風之散乃發於盛陽之餘此姤所以為天地相遇也則互根之理又於卦象見之矣四時之代嬗也而一寒一暑冬至一陽動而薺麥生夏至一隂生而蘼草死何莫非互根之理乎二曜之升沉也而一晝一夜陽不始於將旦而始於子半隂不肇於三商而肇於午中何莫非互根之理乎海水之潮汐也而一張一弛非弛則無以為張其往者所以為來之本也非張亦無以為弛其息者所以為消之機也人身之藏息也而一吸一噓非吸則不能復嘘其入者乃所以鼔其出也非嘘亦不能復吸其進者乃所以引其退也何莫非互根之理乎推而世運之平陂一泰一否人事之推移一亂一理鬼神之幽明一屈一伸萬物之死生一終一始無非此動靜互根者與為消息與為盈虛而已而又何疑於太極既分之始哉此其理大易言之詳矣一隂一陽之謂道隂陽不測之謂神此以造化言之也一闔一闢謂之變往來不窮謂之通此以乾坤言之也尺蠖之屈以求信龍蛇之蟄以存身此以物理言之也精義入神所以致用利用安身所以崇德此以學問言之也周子作易通又發明圖說之㫖曰水陰根陽火陽根隂蓋以後天之水火明先天之陰陽其理一而已矣要之動靜雖互為其根而靜者又常為動之根日月星辰終古不停而太虛之天凝然不動喜怒哀樂無時少息而未發之體寂然不動不動者羣動之本也此又主静立極之㫖也夫性理聖人定之以中正仁義而主靜立人極焉編修臣丁一燾朱子曰無欲故靜臣謹按太極一圖原隂陽五行生人生物之始而以人為貴舉生人形神性命之全而以聖人立之極蓋聖人之中正仁義一陰陽五行也而一歸於主靜猶之陰陽五行渾然太極也夫人生而靜性命之原聖人主靜冲穆之中全體太極從來帝王所以立人之極者其心法未有不基乎此者也易之咸四曰憧憧往來朋從爾思葢心主乎感感之者萬端應之者一心至於憧憧雖萬感未投而心體亦不能靜朱子釋大學正心章欲動情勝與無欲故靜之說互相發明也致虛守寂往往托於主靜然非聖人之主靜也夫聖人日有萬幾朝乾夕愓豈能屏除一切而自居於端拱清淨之理二程子親受學於周子乃周子言主靜程子言主敬非無故也慎獨以達天德誠意以行王道惟敬乃有所持循也蓋心之體虛所以具衆理心之用靈所以應萬事聖人洗心退藏於密通書謂靜虚則明明則通心之體所由立也八牕洞達如見我心通書謂動直則公公則溥心之用所由行也仲弓問仁章或問出門使民之時如此可也未出門使民之時如之何曰此儼若思時也則動靜交養之義也可見心之全體大用無往而不主敬能主敬則無時而不靜矣故曰動而無動靜而無靜非不動不靜也定性之㫖動亦定靜亦定也臣讀范浚心箴云君子存誠克念克敬天君泰然百體從令因萃先聖先賢之㫖恭集為養心箴於聖賢心學未能窺見萬一伏祈睿鑒採擇焉心為天君聖人立極全體渾然維民之則閑邪存誠以達天德兢兢業業健行不息衆籟俱寂其靜也専洞洞屬屬自全其天不聞亦式如止水焉黙而成之月映萬川一日萬幾感而遂通勿虞勿貳允廸厥功因物付物如天化工過而不留廓然太空敬義夾持動靜交養如玉壺氷昭融髙朗睟然盎然德心克廣會極歸極王道蕩蕩性理誠者聖人之本侍講學士臣周長發臣謹按聖人之德無以加於誠元亨利貞天道之常元亨誠之通利貞誠之復也仁禮義智人性之綱仁禮誠之顯義智誠之藏也中庸曰惟天下至誠為能盡其性性命於天原無一理之不誠故誠極其至遂無毫髪之不盡大哉誠乎由盡己性以盡人物之性極於參贊化育裕如也俗學言聖道者徒見聖人之聰明旁燭無疆聖人之功業彌綸無外歎其深微元遠則以為何思何慮出神入天震其光耀顯融則以為不禦不遺上蟠下際其粗者但求之語言迹象偶得其一則遂以為窺見其全其精者亦止索於杳渺虚無能伸其說而究無所濟於用豈知聖人之本固有至易至簡貫徹日用倫常綱綜禮樂刑政大包無外而細入無垠近自須臾而遠及萬世者實不外乎一誠哉夫誠之說始發明於孔子而大暢於子思前此典謨含其意而未宣執中安止是也卦爻垂其象而未著无妄中孚是也商書見其文而未備鬼神無常享享於克誠是也周頌抉其義而未明維天之命於穆不已文王之德之純是也孔子贊易闡乾坤之藴奥晰性命之精微所謂知始作成崇德廣業者既無不以誠為指歸而其告魯君也舉達道達德九經而約之於一天道人道著其殊途擇善固執指其實學自有載籍以來前聖所以開物成務建極綏猷治統與道統本出一源治法與心法原無異致上下千古直一言以蔽之是故曾子述大學明德新民而必要於止至善至善者誠也齊家治國平天下而必先以格致誠正修格致即求誠者擇善之功誠正修即求誠者誠身之事也至子思作中庸言誠尤備先儒謂放之彌六合卷之退藏於密者豈有他哉亦曰誠而已然則言聖道而不明於誠之說者烏足以言聖道歟濓溪周子作易通曰誠者聖人之本可謂要言不煩矣抑又聞之易通所言與太極圖相表裏誠即聖人之太極也動靜皆誠即聖人之陰陽也誠貫五常即聖人之五行也誠周百行即聖人之化生萬物也無一事一念之不誠即聖人之物物一太極也萬事萬物總此誠即聖人之萬物共一太極也聖人之德與天地凖聖人之誠與太極凖大哉誠乎性理誠五常之本百行之源也監察御史臣歐堪善臣謹按太極分動靜而五行布焉四時行而百物生焉是五行百物皆以太極為根柢者也抑知兩儀既分以來不能外乎真實無妄之理者負氣成形之後不能外乎真實無妄之心則夫五性之符乎五行百為之同於萬物者亦惟全乎人心之太極以立其綱維焉而已周子論誠而曰誠五常之本百行之源蓋推論聖之所以為聖也今夫聖人之在天下有能外乎五常百行者哉維皇降衷以來仁以全此心之惻隠義以全此心之羞惡禮以全此心之辭讓智以全此心之是非而心又貫徹乎四德之中是即人身中之五行也乃由五常推之自忠孝亷節之大以及紛紜繁變之細凡近而利用安身廣而暨之經綸參贊皆從此起焉是五常者百行之本源也孰知五常百行固以一誠為本源者哉蓋誠之在天地也惟以理之不貳者立乎陰陽剛柔之主宰而誠之在人心也亦惟以理之不貳者握乎性命道德之樞機故本誠以行仁而胞與民物者非煦煦也本誠以行義而裁制事物者非孑孑也本誠以行禮而安上全下者不入於繁縟也本誠以行智與信而區别萬類與物酬接者不入於穿鑿之小虞詐之私也而且以一誠之理流貫於人倫秩叙之中言行物恒之際與夫飲食日用之庸近經緯綱紀之顯然初非有虛假浮偽之心得參於其中也譬之於木誠為根株而五常則枝幹之發榮焉譬之於水誠為崑崙而百行則積石以下之分流焉洵乎一誠之理有不能舍是而别求本源者爾且夫五常百行合聖凡而一之者也凡人不立乎誠則無物雖日在五常百行之中而實處乎其外聖人全盡乎誠則不息雖同處五常百行之内而能體乎其全安有舍誠而别求所以為聖者哉乃異學者流如告子荀卿之徒既以性為外物行為粗跡逐逐焉日流於昏昧而老莊之學又以性為空虛行歸無有而泛泛焉不求其指歸由於本源之地皆失也果能知心之統乎五常身之完乎百行而所以為五常百行者反求諸人心之誠以合乎在天之誠是川流也一本之散為萬殊也一物一太極也合之五常百行之誠同歸一誠是敦化也萬殊之原於一本也物物同一太極也則無極而太極之理不常在吾人方寸之間也耶性理誠無為幾善惡編修臣王㑹汾臣謹按天命流行物與无妄此聖與凡之所同顧聖人體用一原顯微無間而凡民不能者大本不立則無以善其動也周子作易通與太極圖説相表裏兹所言誠無為者其人心之太極乎夫人生之初實理渾然而已自與接為搆則理氣錯而善惡分焉其心之動而之善者如木之自本而榦自榦而末上下相達此誠之正宗也其或旁榮側秀若寄生贅疣者乃誠之庶孽也近則公私邪正逺則興廢存亡廻斡轉移毫釐千里此厥不謹則陰進而陽退欲横而理消雖有智者亦無以善其後矣故君子慎動必於其動而未形之際出全力以勝之此作聖作狂之介上達下達之分昔之垂教者曰危微曰克復曰戒懼慎獨曰履霜堅氷誠恐幾微不謹甚且潛滋暗長而不自知也然則存誠之要莫切於謹幾矣而幾之謹與不謹又視乎誠之存與不存何以言之蓋誠者天命之性性本有善而無惡也如必待惡幾已動而後絶其萌則天人分兩截體用非一原水將潰而築隄防火將燎而謀救熄幸而克之而誠之存焉者微矣且人心必有虚公無我之體而後可與知幾可與分善惡故大易言知幾其神通書亦言誠神幾曰聖人神也聖也總之一誠而已矣不誠則誕幻倐忽心體先已放而不存雖有善安能扶而進之雖有惡安能遏而絶之所以圖說言主靜立人極靜則無思無為之本體仁義中正之所從出也李延平教人澄懷黙坐於靜中體認大本未發時氣象分明即處事應物自然中節此龜山門下相傳指訣朱子晚年極尊信之可見太虛冲漠之内一切髙深隠顯精粗條貫靡不畢該學者誠能涵養本原使吾心體間虛明淨澈自能察見幾微剖析煩亂而無所差失此為理會大本此為透上一關豈徒沿流逐末補苴罅漏之功也哉總之涵養省察二者皆切實功夫而向裏尋求必先體會誠字夫惟靜虚是以動直源清則流潔表直則影端明乎此者可與審幾可與分善惡而天命之性亦復去人不遠矣性理師道立則善人多編修臣沈文鎬臣謹按人君治天下必欲使天下同歸於善善則人心厚風俗淳召休和致嘉祥所以躋化理於郅隆而天下久安長治者恃有此也夫天之生人本無不善而氣禀則有不齊未能易惡至中則不善者常多而善者常少然則何由而進於善曰有師道焉以嘉言懿行示之凖則而誘掖於前奨勸於後則好善之心必油然而生從善之勢必沛然莫禦此周子所謂先覺覺後覺闇者求於明則師道立而善人多朝廷以此而正天下以此而治也顧或謂師所以傳道授業解惑者也自古司徒樂正各有専官而教民之責係焉似非他人所能分任者不知師道甚廣凡有治民之責者即皆有師道之任而親民之吏尤急何則國家庠序學校之設所以造士之術甚詳然秀頑錯出其不能人人而加以提命者勢也况詩書禮樂祗為教民之具而以言教者訟恒不如以身教者之從也東萊呂氏有言農夫牧䜿相與畫地而議長吏之能否若辨黑白若數一二誠以地近勢親耳聞目擊易相窺伺故凡親民者之一舉一動最足以移民之心志而引民之步趨誠使親民者實行孝弟而民自知孝弟之美實行忠信而民自知忠信之美實行亷讓而民自知亷讓之美躬行率先陰格民志所謂清其源也由是播為政令審風俗之宜詳勸課之術知民必有樂從之者非然而標凖不立觀感無由徒以虚言相誘成法相繩民不從也甚且有巧詐之吏以穿窬之心行穿窬之術巧趨善避飾智驚愚愚民傚之狡詐日滋亷耻日失倘大吏不察誤以為能吏而被以循良之名予以薦剡之榮如是而欲以化民成俗之事望之不可得也自古稱循吏者莫如漢考其所為類皆能以實心行實政如倪寛之勸農緩刑黄霸之力行教化杜詩之政治清平劉矩之禮讓化俗皆以吏道而兼師道故風移俗易駸駸乎比於三代之隆世之論者或以為此不免為庸吏所托則又不然夫遇事闒冗怠緩廢弛者此庸吏也矯飾外貌陰行貪恣者此巧吏也躬行化民政平訟理者此循史也考倪寛黃霸諸人其發奸摘伏俱有神明之稱而逈非常人所能窺測此豈庸吏所得藉口哉故庸吏不足為民師巧吏不可為民師必循吏而後能為民師而循吏之實身教先於言教始革面進於革心是在為大吏者辨真别偽實察夫循吏而褒異之薦引之則吏治當必丕變而民俗因以日淳有道之世法制修明區宇乂安而所以培養元氣為萬年不㧞之基者事莫重乎此也性理古者聖王制禮法修教化三綱正九疇叙百姓太和萬物咸若乃作樂以宣八風之氣以平天下之情編修臣周玉章臣謹按王者功成而作樂於以奮至德之光動四氣之和著萬物之理與政治相為表裏其歴代制作不同而所以導和宣化者一也先儒論樂詳矣若周子通書所言直探制樂之本綜樂記之全而顯掲夫審樂知政之㫖也夫國家統一海内政事具舉考古訂樂釐然成一代之制所以表開國之風昭功業之盛也而論者又謂禮樂百年而後興固非謂考訂之未極其詳典章之不綜其備必需以嵗月方臻美善也蓋開創之始天下甫定百廢待興其與賢士大夫經營而締造者恒積之數十年之久亦既治定功成矣而聖王在上猶殷然於天下之務不敢遽為已治已安也相與涵濡而漸摩之如是者又有年然後海隅出日罔不率俾天下稱大治焉當是時天子端拱以收久道化成之效仁讓風行獄訟衰息四方之民從欲以治極之庶草繁廡鳥獸魚鼈咸若豈非大順大化之世而保合太和之象歟百年後興此其時也夫風之蒸也無以宣之則不暢情之動也無以平之則易流是以古聖王於治化翔洽之時作天地同和之樂所謂九功惟叙九叙惟歌又曰太史陳詩以觀民風蓋雖閭閻謠俗之語釐而正之皆足以感人心而徴和氣之協而况郊廟明堂降天神出地祇享人鬼煌煌乎鉅典也哉咸英韶濩大夏大武諸樂夐乎尚矣漢興去古未遠考訂猶易而時則日不暇給賈誼上書請定制度興禮樂文帝謙讓未遑至孝武時李延年協律司馬相如輩製樂章可云盛矣然神仙禱祀之意多而移風易俗之事少唐造十二和以法天地庶幾有開國之規模而七德之舞與九功並陳又未免侈志武功豈雅頌之遺乎宋太祖改周樂十二順為十二安蓋取治世之音安以樂之意其後王朴李照胡瑗范鎮更相考論而朱子不能無議焉有明一代之制作大抵集漢唐宋元之舊而稍易其名其樂雅俗雜出雖前有冷謙宋濓諸臣後有張鶚李文察等深明鍾律未能復還古音所作樂章惟務明達易曉不及漢晉間詩歌鏗鏘可誦奚論清廟諸什也總之聲容器數之末歴代其詳審之矣而於所謂三綱正九疇叙百姓太和萬物咸若者果皆有得焉否耶臣以周子之論樂為能探作樂之本綜樂記之全而顯掲夫審樂知政之㫖也性理文所以載道也輪轅飾而人弗庸徒飾也况虚車乎文辭藝也道德實也篤其實而藝者書之美則愛愛則傳焉賢者得以學而至之是為教故曰言之無文行之不遠編修臣萬年茂臣謹按道行而百世有善治學傳而千載有真儒學者所以學為道也非以為文也然孔子之繫易曰其㫖遠其辭文非文則教不立非教則道不彰道莫備於六經而六經為萬世文章之祖故曰溫柔敦厚詩教也疏通知遠書教也廣博易良樂教也潔靜精微易教也恭儉莊敬禮教也屬辭比事春秋教也子貢以下性天之㫖有不得聞然身通六藝七十餘人而聖人之道遂如日月經天江河行地者文有以載之也自是厥後荀况董仲舒劉向王通韓愈靡不根柢經術號稱爾雅雖於道互有純疵大要並尋六藝之遺略相上下而羽翼之者惟宋儒迭興昌明道術盡得先聖之傳然後斯文大著而其言粹然一出于正豈非所謂㫖遠而辭文者耶夫文者代吾之言而亦以代聖賢之言者也聖賢之言不可强而能其道則可求而至是故察之日用事物之端謹之隠微動静之地觀陰陽之合散考古今之治忽浩然有得於身心性命之原而渙然自釋於語言象數之外然後神動而天隨心得而手應宣之於口無有扞格不吐之患而天下之讀其文者皆得因其教而研其道所以能傳後而行遠也有明以來始以制藝取士制藝文之一隅也而於道為尤近必其精神黙會於千載之上如與聖賢晤對一堂者而後能以微言達其名理覘文者非獨覘其學問而已其人之性情心術與其他日之行業政事皆可預定而微識之乃行之既久而亦不能無弊者約其大端蓋有二焉孔子曰辭達而已矣人心必有明也必有悟也因其明悟達思疏神可以闡道乃或中無實得而以疊語為支撑夙乏理解而借駢詞為敷衍始猶乞古文之餘唾究且溉時藝之殘膏如是者命之曰腐聖人之言其髙如天其卑如地今或舍庸言而不道務晦澁以為工有意欺人自問不解惟以隠顯出入濬塞啟鑰等語秘為密藏而疎陋之耻甚於餖飣言者心之聲也大道清明之日豈容有此如是者命之曰誕夫掇實者進則傾心寫意之為迂矣虛罔者上則會文切理之為拙矣至於依響附聲就影摹形首尾不相顧表裏不相從指歸既昧黑白難分抑又二者之所同焉程子曰聖賢之言不得已也如彼耒耜陶冶之器一不制則生人之道有不足矣然其包舉天下之理亦甚約也惟約故達惟達故乆譬之習緯占風按律造樂而其操琯籥於聲氣之先者非風與樂之所能為故為文不可不知道也知道不可不窮經也夫世所以重文學者原欲通經學古以備國家之需若其不根理要而為浮薄悠謬之言亦安貴有是文乎然則本之詩以博其趣本之易以盡其變本之書以體其實本之春秋以求其斷本之樂以觀其通本之禮以嚴其辨性情心術淳固敦龎而以其行業政事之醖釀於中者發而為言而皆可以適於用則所謂經術以經世也文雖藝乎不進於道也哉性理天地之塞吾其體天地之帥吾其性編修臣李龍官臣謹按此言天人合一之致而父天母地者當修其養氣盡性之功也體者官骸之會孰運行是性者神明之府孰主宰是夫鳶魚之飛躍尚察化機水火之燥濕咸闗妙理而况人為天地之靈而知自貴於物其形生神發而謂與天地不相似焉必不然矣原夫太極之初冲漠無形無論飛揚升降之氣坱然太虛之中即幽明妙應純粹以精之理亦絪縕而未顯神化而不可測也迨兩儀奠而四象立陰陽健順各出其藏以成物之性情形體其消息盈虚晦明寒暑固遞嬗而不窮亦一定而不易此三才之道天地與人其理原非異也今試曠觀宇宙之中上者嶽峙下者淵澄動之為風雷潤之為雨露明有日月幽有鬼神並育並行者塞於兩間也非天地之體乎又且靜騐覆載之間乾知大始坤作成物卑髙陳而貴賤位動靜常而剛柔斷方以類聚物以羣分福善禍淫者恢而不失也非天地之性乎是故天地有體而人即以天地之體為體也天地有性而人即以天地之性為性也氣處於散散者必有以聚之耳目視聽皆靈明之寓也手足持行皆機緘之運也即極而髪膚之微呼吸之細亦隠然見大冶之鎔鑄而又非一一而雕刻之也則塞者吾以為體理處於虛虛者必有以實之惻隠辭讓一元亨之發見也羞惡是非一利貞之流露也即凡喜怒之形哀樂之故亦肫然見造物之範圍而又非孜孜而矯揉之也則帥者吾以為性然則吾有體當知所以養此體者而耳目之官不得與天君相奪也集義而無害恭作肅從作乂明作哲聰作謀睿作聖五事與五行相配而斂福所謂踐形之聖人者乎吾有性當知所以盡此性者而嗜慾之粗不得與天命相參也執中而勿倚君則仁臣則敬子則孝父則慈交則信五倫與五常歸根而復命所謂持志之君子者乎夫天地之道至易至簡雖有上下道器之分而要之繼善成性總此陰陽為之翕闢一故神兩故化合外内之道也而或者黜聰墮明欲遺體而見性嗇精煉氣遂執體以為心不亦悖乎詩云天生蒸民有物有則民之秉彛好是懿德朱子曰天以陰陽五行化生萬物氣以成形而理賦焉是體與性聖人與庸愚無以異也而清明在躬志氣如神者惟聖者能之則以凡人為一人之人而聖人為千萬世之人而不苐為一世之人也邵子曰聖人者謂其能以一心觀萬心一身觀萬身一物觀萬物一世觀萬世者焉能以心代天意口代天言手代天工身代天事者焉能以上識天時下盡地理中盡物情通照人事者焉能以彌綸天地出入造化進退古今表裏人物者焉蓋中和既致位育自神故以天地萬物為一體不獨善其身也必克己復禮天下歸仁而後為體之充以太和為保合不獨盡其性也必盡人物之性至於贊天地之化育而後為性之正致廣大而盡精微極髙明而道中庸此配天地之業也宋元而後儒者侈言性命而經濟之學缺然不講是明明德而不親民成已而不成物自小其體自狹其性與天地不相似豈所語於大人之事乎性理朱子曰士居平世處下位視天下之事意若無足為者及居大位遭事會便覺無下手處信乎義理之難窮而學問之不可已也編修臣楊開鼎臣謹按朱子嘗云君子量而後入不入而後量此即學優則仕之意而漆雕氏之未信聖心有深契焉亦此㫖也夫臣子之義孰不欲趨事赴功哉乃汲汲以就功名而胸中義理未明學問未到居恒議論似乎侃侃鑿鑿可以見之設施而一旦身膺重寄坐而言者不能起而行泥乎古者用之今而未必當其可則信乎義理之難窮而學問之不可已也朱子嘗謂今世文人才士開口便說國家利害把筆便述時政得失終濟得甚事夫固有慨乎其言之宋儒黄榦亦云少而為學志趣卑鄙意思凡庸無可用之實壯而從宦營私背公憚煩習惰漫不知其所職至於决性命之情以饕富貴則左拿右攫東馳西騖無不用其力噫斯其人直以天下國家為嘗試矣朱子平居惓惓無一念不在於國聞時政之闕失則戚然有不豫之色語及國勢之當振則感慨以至於泣下其事君也不貶道以求售其愛民也不狥欲以茍安蓋其居敬窮理確有見於天命之本原而務其遠且大者所以决大疑定大業變化無窮泛應曲當又何至事會相乗而茫無措手哉大抵居官臨事外有齟齬必内有窒礙内外相應毫髪不差此其深求乎義理盡力乎學問必非一朝一夕之故呂祖謙云折肱之餘飽於諳歴惟培養本原使忠愛之心益厚則斟酌調劑羊腸蟻封間蓋自有餘地也㫖哉斯言其即朱子義理難窮而學問不已之謂乎嘗考晉室之勢獨任一謝安張栻謂其非特方略之妙其所存忠義純固負荷國事故能運用英豪克成勲業誠與才合故也唐宰相房善謀而杜善斷其善謀也必其入理精深而非依違兩可其善斷也必其見義勇决而非子智自雄宋臣如文彦博韓琦范仲淹皆社稷之臣文處大事以嚴韓處大事以膽范處大事曲盡人情皆本一片忠誠為國之心著為事業何莫非義理精熟從學問中來者哉朱子曰古之君子居大臣之任者其於天下之事知有所未明力有所不足如救火追亡不容少緩上不敢慢其君下不敢鄙其民中不敢薄其士大夫屹然中立無一毫私情之累而惟知其職之所當為夫是以志足行道道足濟時而於大臣之職可以無愧雖然其亦難言之矣臣愚以為其平時之侈然自滿者其臨事而漫無劈畫者也其平時之欿然不足者其臨事而確有裁斷者也夫惟欿然不足而後義理日深學問日粹希榮競進之心潛消於不覺而天良之忠愛油然而自生庶足以仰佐郅隆之治而自効於股肱耳目疏附後先耳至于義理難窮學問不已又寧有止境哉性理問臨民曰使民各得輸其情問御吏曰正己以格物編修臣馮秉仁臣謹按民者情之所由生也吏者理之所從出也民不得其情則風雨隠於茅簷矣吏不得其理則文弊叢於几案矣夫人臣出身加民其謂能體愛元元表率羣吏顧乃觀民之化無聞正身之教不先其何以稱厥職而無愧耶康誥之篇曰恫瘝乃身民情大可見小人難保其在周官自六卿率屬以及閭胥族師靡不明其職業綜其計課推斯義類殆有得夫臨御之大防而為體國經野之端立之凖者程子深契夫是而於臨民則曰使各得輸其情於御吏則曰正己以格物是豈旦暮之效而文貌之可襲者哉蓋民隠之難於上達自古為然矣水旱之頻仍也災沴之流行也盗賊之充斥也課賦之不給也其散處流離之狀呼號望澤之形民情孔亟人臣承天子好生之德而休養撫循還定安集此固草野所廹相赴者若乃風土異宜好尚異質貧富賢愚異等曲直偏全異數紛紜委曲雖鄉鄰族黨有不能悉其微賢司牧因心順導直抉其腑肺之所欲陳一如相對於家人骨肉之前甚至哭泣將之歌咏隨之者無他誠能動物故也是故均輸則曰輸言貨物之流通也神輸則曰輸云衆志之依歸也而於民情亦以輸稱者可不謂視民如傷而休戚相通者歟若夫吏而曰御其權伸於統率而其要在於觀型葢簿書之細俗吏出其中良吏亦出其中苐以其職在下曹而卑之過甚既無以鼔其才猷操之太嚴又轉以生其趨避非但禁防不及有以生奸即禁防所及亦足以滋弊也惟一歸之正己則表端影直自有不待教而為善不待懲而自恥為惡者史冊所稱如魯恭之不敢欺卓茂之不忍欺亦可見格物之一端推之若王旦念切夫東南民力而承㫖者識真為宰相之言劉宏推誠於徵發手書而奉檄者凛十部從事之喻其以身先之而物自化之雖在疎逺尚聞風格被况躬親給事日相親感有不蒸然率德者無是理矣善夫大學之教君子有諸己而后求諸人無諸己而后非諸人其於程子正己格物之意不互相表裏乎要之民待澤於下吏受成於上而感通維繫民與吏歸本於一原功最於吏斯福歸於民為人臣者誠能體此以率吏以臨民將見政乂而化洽俗厚而風淳於以贊治朝廷嫓美唐虞庶幾矣性理朝廷設官求賢故在上者不當以請托而薦人士人當有禮義亷恥故在下者不當自衒鬻而求薦編修臣馮秉仁臣謹按帝王御極法天勤民而外治莫大於用人是以股肱惟人良臣惟聖設官求賢其所係者綦重也依古以來建學校造士之法良矣明科舉取士之端備矣嚴甄別選士之方善矣師師濟濟襄贊盈廷國家收得人之益受養士之報者數代相沿未之或易焉然而巖穴有旌邱園有賁十辟九舉而後攬轡登朝慨然有志澄清者此又網羅之所未及資格之所難循汲引之權非大臣其孰任之崔沔賢良䇿云人茍擅英博之姿受明試之寄享厚禄居髙官而不能撫踠足於吳坂指潛璧於荆山致使有公輔之才而無許郭之鑒者斯則卿士之罪也此殆慨乎其言之歟夫天生一世之才自足需一世之用進退之權自上操之者維名與器用舍之機自下主之者先德於才禮義亷耻謂之四維四維者根本之地也士未有根本未立而能致君於堯舜者倘求賢之詔方書而奔競之風已啟白屋之薦未通而請托之縁漸熾則所謂舉賢為國如狄門之桃李誰其信之朱子有見於用人之大而深重夫亷恥之養因以塞源㧞本之詞昌夫正心誠意之學其以請托之私責之在上者言大臣之職貴知人也能舉人也其以衒鬻之恥責之在下者言士人之守崇實學也善藏器也侃侃正論洵足以風千古矣竊嘗究其緒而論之布衣韋帶之士僻處偏隅業在名山而甘心肥遯此其意固將自謂為葑菲所不及采也其間有學究天人而數竒一第才優經濟而制藝不工或抱其匡略或持其著述以俟知己者之一遇其將遊貴顯之門乎而奔競之中必無佳士矣其將待蒲輪之及乎而蟠木之器根柢誰容矣况乎振淹滯㧞單寒内稱不辟親外舉不避怨此必公忠體國得以人事君之義然後能之茍非然者退食自公深居斂息若恐臣門之如市遑言載刺之盈車凡夫屬在草茅一望其丰采接其言論且不可得將何自而為衒鬻之資又何從而為請托之地也耶是以亷恥之養闗乎國體薦賢之責歸之大臣大臣者上佐天子出政令以育萬民下司人物之柄以方多士誠能於調元贊化之餘廣其延訪使下士無壅蔽之虞精其鑒衡俾風塵無冒濫之弊更進而考其根源詳其素行不得以風流文采之可觀而遂許以遠大之器行見藥籠之參苓漸積而日富竒才異能亦日淬而益厲大者為棟梁小者為榱桷其所以應天子求賢之命而成作人之化者詎不偉歟夫周稱多士著美風謠漢號得人垂芳竹帛薦賢推士者代不乏人而或援引成風卒成黨與其流弊莫極者實在上無持正之學特達之識因以請託之門啟干謁之漸耳誠取朱子之訓身體而力行之則上行下效士氣日伸士風日振都俞之盛且比美於唐虞其猶勞九重之上側席旁求而廷臣無以應命者幾希矣性理權衡設而不可欺以輕重者惟其平也繩墨設而不可欺以曲直者惟其正也監察御史臣李敏第臣謹按人主身臨天下國家之上庶績之治忽繫焉兆姓之安危繫焉君子小人之進退消長繫焉自非執簡居要以待天下之無窮則日不暇給即有首物之才髙世之略亦不免逐物求勝之煩而聰明之用因之以不廣夫物質不能相齊差之毫釐揣測者莫能致其詳介在錙黍審顧者莫能辨其真其故何哉不示以一定之衡故人得有所挾以相競不懸以不違之則故人且有所飾以相炫則惟平者物之所不能爭正者物之所不能踰也人主以一心理萬幾之繁周庶類之賾欲見微知著而肆應各當也其道寧有異於是唯是誠精故明理貴先覺而物來順應原出無心蓋人君操賞罰黜陟之柄以御天下智者挾其謀勇者挾其力呈材獻技于一人之前者踵至疊出或以衒其術而售其詐使未能因應於無心則將迎之念起於事先擬議之私縈於事後豈所語於坐照之神先幾之哲哉夫鑑非有意於鏡物妍媸美惡乍投而立見其形既去而不留其跡因物付物而無擾也燭非有心於照物幽隠晦㝠分之一物而克被其光即統之衆物而畢徹其隠以人治人而不勞也然則聖人建極御宇將欲揆是非之歸嚴邪正之辨惟以持平表正者示天下以一定之衡不違之則而事物未來養此心如明鏡止水以預澄其泛應之源則清明在躬氣志如神於以類族辨物而無難矣虞書所稱帝堯之欽明帝舜之濬哲胥是道也夫性理楊氏時曰人臣事君豈可佐以刑名之說使人主失其仁心人主無仁心則不足以得人故人臣能使其君視民如傷而王道行矣編修臣周正思臣謹按制治無他術仁而已矣撫民無他念愛而已矣人主不愛民失仁心即失民心也人臣不能使其君愛民賊其民并賊其君也孟子曰三代之得天下也以仁其失天下也以不仁又曰以不忍人之心行不忍人之政治天下可運之掌上豈虛語哉自申韓之學起羣相率而入刑名之說漢郅都嚴延年唐吉溫羅希奭軰類多以周内文致為巧煆煉羅織為能慘刻凶殘草菅民命故蒼鷹屠伯吉網羅鉗犯其鋒者無生路觸其怒者有餘辜道路以目黔黎重足其禍不至於大肆殺戮不止如是而欲得人烏乎可夫得人端頼仁心仁心存則仁言之宣其利溥仁政之被其澤周仁教之敷四訖仁風之播無窮仁之時義大矣哉故人主一念之愷惻慈祥即國家養豫大豐亨之福一念之和平樂易即海宇享昇平寧謐之庥上可以感蒼穹下可以孚庶類一切刑名之說自無由而入為臣者以康濟撫綏之術進以撙節愛養之道聞閭閻之疾苦日達於宸聰稼穡之艱難時陳於黼座使主志精純仁恩浩蕩好生之德洽民心太和之氣溢宇内矣不此之務而崇尚刑名文網密矣恩膏未逮也刑書鑄矣撫字無聞也驅斯民於桁楊狴犴之中未必非刀筆吏弄文墨誤之也寛厚之主幾何不流為刻薄耶昔程明道作縣凡坐處皆書視民如傷曰某常愧此四字後世封疆大吏以及郡縣有司能體此意則凡重農桑廣積儲薄征徭興水利恤貧救災諸大政次第舉行他如審讞之精明辦理之敏錬不以報最其有蠧政之害民者除之酷吏之虐民者去之民隠之壅於上聞者達之主澤之屯於下逮者請之臣職盡民情協君德純而王道可行又何必雜以刑名之說哉夫刑亦王政所不廢苐有良法美意行乎其聞耳臯陶之刑期無刑君陳之辟以止辟成湯四面解網周禮五聲求情漢代恤刑之詔唐家録囚之典盛吉之丹筆泣罪劉寛之蒲鞭示辱立法與施仁並行而不悖非専治刑名家所可同日語者矣性理陸九淵曰人主不親細事故臯陶賡歌致叢脞之戒周公作立政稱文王罔攸兼於庶言庶獄庶慎唐德宗親擇吏宰畿邑柳渾曰陛下當擇臣軰以輔聖德臣當擇京兆尹以承大化尹當求令長以親細事代尹擇令非陛下所宜此言誠得臯陶周公之㫖今天下米鹽靡密之務往往皆上累宸聽雖得臯陶周公亦何暇與之論道經邦哉荀卿曰主好要則百事詳主好詳則百事荒監察御史臣程盛修臣謹按程子曰論治便須識體后王君公大夫師長君臣相正官職相序莫不有體焉得體則股肱良庶事康不得體則股肱惰萬事墮臯陶謨曰一日二日萬幾而繼之曰無曠庶官文王自朝至於日中昃不遑暇食而庶獄庶慎則罔敢知于兹夫萬幾至繁也日昃不遑食至勤也而皆不外於總綱紀任賢才則衡石量書衛士傳餐勞而無益從可知矣且丙吉以漢相不問鬬爭陳平以錢穀自有主者大臣之體不親細事况天下之主乎人主髙拱穆清之上而化行裨海之外當使其心如明鏡如止水則廓然大公物來順應是非邪正不能混淆而於萬事根本每事切要處復與賢士大夫反覆而辨論之務聰明之實不求聰明之名所謂識其大者遠者而小者近者直一以貫之也若狃於事為之末瑣屑之端無論耳目有所弗及而方寸之内憧擾不寧銖銖而稱之至石必謬寸寸而廣之至丈必差剔弊防私展轉滋甚雖有上智日亦不足矣然又有說焉居大臣之任者於天下之事知之不惑任之有餘見義勇為無所避忌即知有未明力有不逮咨訪以擴其知汲引以助其力庶司百職人各盡心大吏不以伺察為能小吏不以掩蔽為巧開誠布公蕩平正直朝廷之上神明黙運操縱在心執簡御煩與民休息倘不然者闒冗貽譏迂疎致誚張弛無節寛猛失中而大君以宗廟社稷之重四海蒸民之生祖宗創垂之艱子孫長久之計勢不能不兼綜博攬殫智竭情臣逸而君勞臣愚而主聖臣實為之伊誰之咎哉故曰論治以得體為要而得體以任賢才為本近思録性猶太極也心猶陰陽也太極只在陰陽之中非能離陰陽也然太極自是太極陰陽自是陰陽惟性與心亦然一而二二而一編修臣白瀛臣謹按天以陰陽陶鑄萬物而即以太極之理畀於人真與精妙合而凝心具而性亦賦焉心者性之郛郭性者心之主宰猶月之有魄谷之有神也故離性不可以言心離心不可以言性舍存心别無養性之功舍養性别無存心之學二者固相需不容偏執者也書曰惟皇上帝降衷於下民若有恒性是性固不外於心也又曰人心惟危道心惟微惟精惟一允執厥中是存心即所以養性也大學言正心而極於誠意致知格物吾性之體已具非遺性而偏言心也中庸言率性而致於中和位育吾心之用亦該非遺心而專言性也至於孟子盡心知性一章發明心性合一之㫖尤為切要又何必泥對待之名而過存區別之見乎然則欲從事於心性之學者亦惟存其心以養其性而已性不可見而其端皆呈於心故養性之功無可用力而其工夫皆在於存心蓋養之為義如鷄抱子其妙在勿忘勿助之間其用在不疾不徐之際而又非可以懸想而强合也人生而靜感物而動動者心之機而性之竅也動而馳則心亡亡則為失養動而操則心存存則為得養夫存心而必曰操抑豈把捉矜持之謂哉心本神明周流六虚放於千里非存也局於方所亦非存也譬之操舟維楫在手故能窮河海而進退泳游無不如意不然則舟膠矣誠能屏嗜慾之心以守秉彛之心使一物不容而萬理森具將日應事而不擾於心日接物而不滯於物氣質之性由是而約天地之性即由是而復矣然則心性之不可得而分猶太極陰陽之不可得而離也豈不信哉彼虚寂之徒率倡為明心見性之說既不知心性為何物而耳食者流又不察習之相遠猥云心術性術之判若枘鑿也其亦深思朱子之言而自得之否耶性理宇宙内事乃己分内事監察御史臣錢琦臣謹按國家之事誤於躁妄尤誤於因循重大之肩隳於輕浮尤隳於茍且昔陸九淵有言曰宇宙内事乃己分内事此作聖之實功也臣謂即致治之要道也何則天下事莫不成於勤而荒於怠古今雖遠不外一理天下雖大不外一情故切而言之已為宇宙之已而功不容緩推而廣之宇宙為己之宇宙而責不容辭顧歴觀史册開創之君未有不勵精圖治者迨承平日久逸豫漸開或圖旦夕之晏安或顧目前之毁譽或以無事博靜鎮之名或恃昇平為久長之計避難趨易勤始怠終遂令識者議其擔荷之無能臣下效其茍安之積習是已實負宇宙也其何以亮天工而熙庶績歟昔大禹治水天下有溺者思由己溺后稷教稼天下有饑者思由己饑彼如是其急者非喜功也人主以一身建極於上宇宙之事環而相待一日不宵旰則萬幾之叢脞因之一人不奮興則衆情之委靡積之夫祖宗之基業多得之艱難忍荒之以逸樂乎利弊之興革當乘乎時勢忍圖之以便安乎夫惟凖乎理協乎情持以志鼔以氣自强不息明作有功惟日孜孜無敢逸豫不置已於宇宙之外亦不置宇宙於己之外斯痌瘝一體天下事無不迎刃而解臣故謂九淵之言作聖之實功即致治之要道也臣敬集經語倣古座右銘一則其詞曰乾為天坤為地惟皇作極嚮明而治開物成務率作興事一日二日萬幾思其艱以圖其易古我先王乃聖乃神行險而順業廣維勤勵乃鋒刃其克有勲勉勉我王無怠無荒無教逸欲有邦無傲從康慎厥初惟厥終其克紹先王之烈以台正於四方御覽經史講義卷三十
