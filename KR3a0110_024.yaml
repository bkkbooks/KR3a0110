front:
  text: 欽定四庫全書御覽經史講義卷十八目録
  hash: sha256:030d6ffe6cd77ba45105c8e5b4525582ee5f854f37a3f195bf292198e32219d9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_024-1a, image: WYG0722/WYG0722-0173c.png}
body:
  text: 詩經不解于位民之攸塈編修臣林枝春監察御史臣彭肇洙度其隰原徹田為糧度其夕陽豳居允荒監察御史臣衛廷璞泂酌彼行潦挹彼注兹可以餴饎豈弟君子民之父母泂酌彼行潦挹彼注兹可以濯罍豈弟君子民之攸歸泂酌彼行潦挹彼注兹可以濯溉豈弟君子民之攸塈編修臣竇光鼐泂酌彼行潦挹彼注兹可以餴饎豈弟君子民之父母少詹事臣張鵬翀有卷者阿飄風自南豈弟君子來游來歌以矢其音侍讀臣周玉章編修臣王居正編修臣楊述曽有馮有翼有孝有德以引以翼豈弟君子四方為則編修臣董邦達編修臣張為儀檢討臣齊召南檢討臣胡澤潢檢討臣周孔從豈弟君子四方為則監察御史臣劉方藹鳳凰于飛􅔘􅔘其羽亦集爰止藹藹王多吉士維君子使媚于天子鳳凰于飛􅔘􅔘其羽亦傅于天藹藹王多吉人維君子命媚于庶人編修臣張湄鳳凰鳴矣于彼髙岡梧桐生矣于彼朝陽菶菶萋萋雍雍喈喈編修臣諸錦詢于芻蕘監察御史臣叢洞訏謨定命逺猶辰告監察御史臣髙景蕃相在爾室尚不愧于屋漏監察御史臣馮鈐
  hash: sha256:abc63eafd254dbad3385d86fe4ef50aaaf98ddba19c181dc32703fa89cf76cd2
