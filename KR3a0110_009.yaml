  text: 欽定四庫全書御覽經史講義卷三目録
  hash: sha256:31008643aeb8a556bfd07b0441d32a732a2b7d5b112b84706bdbe9619355761a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_009-1a, image: WYG0722/WYG0722-0138c.png}
body:
  text: 周易泰小往大來吉亨監察御史臣張孝挰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外陰內健而外順內君子而外小人君子道長小人道消也少詹事臣許王猷右贊善臣錢本誠監察御史臣陸尹耀泰小往大來吉亨則是天地交而萬物通也上下交而其志同也給事中臣衛廷璞則是天地交而萬物通也上下交而其志同也編修臣賴翰顒監察御史臣富德監察御史臣馬丙監察御史臣周祖榮上下交而其志同也監察御史臣葛峻起內君子而外小人君子道長小人道消也監察御史臣陳仁天地交泰后以財成天地之道輔相天地之宜以左右民編修臣甄編修臣曹經檢討臣韓彥曽監察御史臣陸尹耀監察御史臣劉永泰監察御史臣史積琦后以財成天地之道輔相天地之宜以左右民編修臣陳顧㶌監察御史臣戴章甫后以財成天地之道輔相天地之宜編修臣王覺蓮輔相天地之宜給事中臣倪國璉初九拔茅茹以其彚征吉監察御史臣李㥳拔茅征吉志在外也檢討臣周燾九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也監察御史臣王興吾九二包荒用馮河不遐遺朋亡得尚于中行監察御史臣陶正靖九三無平不陂無往不復艱貞無咎勿恤其孚于食有福編修臣蔡新
