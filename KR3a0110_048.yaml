body:
  text: 書經臣哉鄰哉鄰哉臣哉侍讀臣蔡揚宗臣謹按天降下民作之君以統之而六合之廣億兆之繁君不能以端拱九重之身兼綜而遙制之也於是乎衆建庶官以分理之故南面而聽天下之所托重而恃力者惟此公孤以及百執事耳相須甚殷責成甚大蓋自有君臣以來明良㑹合類如斯矣稽古帝舜聞禹弼直之謨有感於臣鄰之義慨然形諸咏嘆者抑何言有盡而意無窮也今夫國家設官分職所為內外不一其人大小各殊其等者寧苐以紆青拖紫矜名位之榮已哉固將謂時亮天功咸熙庶績用佐乃辟永康兆民蓋百爾非徒具位一人實嘉賴之者也故曰臣哉鄰哉也人臣筮仕登朝所為上不負吾君下不負吾學者豈徒垂紳委珮周旋堂陛之儀文已乎亦惟是進思盡忠退思補過䖍共爾位以事一人蓋夾輔不遺餘力斯夙夜無曠厥官也故曰鄰哉臣哉也臣竊由是而伏思之夫相臨之謂臣而尊卑之分定矣相親之謂鄰而上下之氣交矣尊卑定則百僚庶尹凛然於義之無所逃上下交則宫中府中肫然於情之不可解體統顯為維持精神默相契合將大順大化始於堂亷達於四海矣夫天澤曰履蓋言分也地天曰泰蓋言交也而帝舜一二言中固已包舉靡遺豈獨危微十六字之心傳足為帝王之大法哉當是時水土平九功叙禹臯稷契陳謨交贊師濟盈庭矣乃猶情殷交泰倚重臣鄰言之不足往復流連千百世之下猶將如聞其聲企中天而生愾慕而爾日在廷之親承德音者其感激思奮之忱又當何如耶蓋聖人在上兢兢業業敕天命代天工都俞吁咈歡然無間故一矢口間而推心置腹之誠積極而彰反覆難罄真有出於不自知動於不容己者此君臣相與之際所以光昭典冊也與書經臣哉鄰哉鄰哉臣哉檢討臣陳世烈蔡沈曰鄰左右輔弼也臣以人言鄰以職言臣謹按上文禹言弼直其所歸重在君舜此言臣哉鄰哉鄰哉臣哉正有感於弼直之語而其所倚重在臣故有其臣者斯有其職必能無慚於職然後無愧於臣則弼直之義所係匪輕而為臣者宜早夜修省以上慰人君寵任之思也蓋自古帝王圗治其總而成之者一人之身其分而任之者羣工之力所以君臣之道相須甚殷此元首股肱千載仰明良之盛也但君之任臣者原有重望於臣臣之事君者何以仰答於君如謂布列庶位濟濟師師即為臣也國家奚賴此臣哉夫我后聖明固已動無過舉然因事進言則有裨實多故輔弼者臣鄰之義贊襄者左右之職誠信未孚非所以為臣也拜獻無資非所以為鄰也則所謂臣哉鄰哉鄰哉臣哉可得而釋其義矣天威咫尺常懷悚惕之思茍非聨以一體之誼則臣心無由上達臣哉鄰哉正親而近之使有以相聨也易曰天地交而萬物通上下交而其志同非即君臣相依不容稍有間隔者乎若夫朝夕納誨所以匡君之不逮倘居輔弼之位而惟是左右進退於其間豈所稱夙夜匪懈以事一人者乎果居其位者盡其忠而思日贊贊思日孜孜不僅循分供職之為實有正己正物之概庶合於鄰哉臣哉之㫖矣然則尊卑原有定分上下各有至情分不可以過嚴一於分則離情不可以過流一於情則䙝臣而復鄰嚴不至於苛也鄰而又臣和不至於流也凡此皆弼直之義固其重而不可忽者耶總之卿尹庶僚臣有職分之不一然竭誠效忠皆有自盡為臣之道勿瞻顧而存遷就之念勿黨同而生附和之私勿避忌而有隱匿之情勿模稜而持兩端之見勿迂疏而逞偏曲之論勿揣度而蹈迎合之習此則身家非所繫戀爵祿非所顧惜於以承弼一人又何愧於翼為明聽之佐耶可見臣道原不易副而能實盡弼直之義者乃所以為臣也凡為人臣者是烏可以不自勉歟書經豫欲左右有民汝翼豫欲宣力四方汝為編修臣何其睿臣謹按此帝舜保治之心而專股肱之責也天下之望治無已時聖人之致治無滿念道有進退進之極而見益即損之所由基機有張弛張之甚而見强即弱之所由伏從來極隆之朝上與下各有不可必致之懼故幾康審而百族之情形愈迫休嘉集而一念之靈承甚微四方之民沐浴歌咏方侈繪夫日星麟鳯之色九閽之地都俞吁咈仍共策以亨屯出險之功夫非聖人之過計也前有開以觀勳之放道在協其欽後有承以底華之重道在融其亢以故憂危不生於境而恆生於心境有盡而心無窮也拮据不見於形而常存於神形有岐而神無間也以綏兆人以康四海將多於前功而垂諸後世一本惕厲為發皇而已矣斯時也上行意下行事宅揆者敦誠於職要承流者殫力於職詳臂指之使一脉相將展布之間文武惟用自亮采之司以及浚明之寄由郊畿之近以達侯甸而遙內外相承規矩不忒其於禮樂兵刑生聚教養之地酌盈劑虛以上襄一人巡省之所不至而深宫夙夜運量從容遂得進斯民於襁褓而攝四方於跬步所謂通天下於一身者此也夫民至散也四方至逺也生理待復生計待遂非一手一足之烈也明無不灼而容有目不能見之情聰無不聞而容有口不能籲之狀又况微之必至於著而小之必至於大也匹夫梗化憂及一方一事未和厲階百度此君之所為業業即臣之所以孜孜也詩曰平平左右亦是率從又曰四國于蕃四方于宣翼為之力也而股肱有專責矣由是觀之臣鄰之極常勞補救於匡勷道德備則翼為有地也歌叙之餘不忘篤棐於盡瘁志業合而兢業有加也從來極隆之朝固上下交相濟以成其治也而恭已南面豈徒髙清靜之名者哉書經豫違汝弼汝無面從退有後言欽四鄰編修臣雷鋐呂祖謙曰舜非有歉而畏人之後言非容受未盡而致人之後言虞廷諸臣又非肯欺其君而為面是背非之行也聖人敬畏無已惟恐過之不聞言之不盡故其求之之切如此臣謹按自古聖人之心未嘗自以為聖世雖已治而時切願治之思事雖無過而時切聞過之念如舜之於禹豈不信其直言無隱而猶以面從退言為戒蓋其心之冲虛懇摰實資股肱耳目以共亮天工恆恐萬一有過而不自知臣下知之而不以告則性情嗜好之有偏用人行政之有失幾微不謹動關國計民生之休戚為臣者無以欽四鄰即為君者無以撫萬邦也夫為君欲其臣無面從退言必使其無毫髮忌諱之心如陸贄所謂諫者多表我之能好諌者直示我之能容諌者之狂誣明我之能恕諌者之漏泄彰我之能從則人亦何憚而不以直言自見甘心為諛佞容悅之歸也三代以下漢文帝凡遇日食水旱疾疫之災未嘗不下詔求言郎從官上書疏未嘗不止輦以受言不可用置之言可用采之未嘗不稱善唐太宗神采英毅羣臣進見多失舉措太宗知之見人奏事必假以辭色兾聞規諌每諭臣下事有得失無惜盡言此漢所以致刑措之休唐所以致貞觀之治也然文帝天資近道惜乎天德王道之精微缺焉不講未免安於黃老之清淨太宗內行既不如文帝觀其退朝怒詈魏徴為田舍翁幾難忍受則其樂聞讜論不免矯强外飾未必出自中心之誠然而史冊已傳為盛事後世且述為美談况乎以大有為之主體大舜好問好察執兩用中之心以為心智周萬物而常苦其不逮明見萬里而猶慮其多蔽求臯䕫稷契之臣布列在位時加召見降心訪問有善必行有過必改使在廷臣工咸知當寧求賢若渴之衷從諌如流之意觀感興起竭誠獻替一德一心上下交而成泰又何至有面從退言之患而謨明弼諧奚難嫓美上古熙皥之世歟書經帝庸作歌曰敕天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉臯陶拜手稽首揚言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首業脞哉股肱惰哉萬事墮哉帝拜曰俞往欽哉檢討臣伊興阿臣謹按朝乾夕惕帝王時深無己之思保泰持盈國家當有未然之慮晏安不可以自恃君每責成於臣臣亦責成於君逸樂非所以圖功已安更求其安已治更求其治粵稽往聖先後同揆其殷殷咨警之辭載在簡編者不謀而合此所以熙庶績而亮天工邁千古而獨盛也有虞之世上有聖君下有良佐都俞吁咈師濟盈廷至命䕫典樂之後功成治定禮備樂和可以揮琴而理矣况其時鳯凰來儀百獸率舞太和翔洽休嘉疊應君若臣何所用其咨警為乃喜起賡歌炳炳琅琅垂耀萬世帝舜之意以為天道難諶可戒而不可恃也頃刻畏懼之不存則怠荒之所自起幾微敬謹之不至則玩忽之所由生臯陶之意以為君為元首宜先而不宜煩也法度之己定者慎守之斯無紛更之患事功之已成者數省之斯無欺蔽之虞當極盛之時而憂勤惕厲至形諸詩歌上下交勉此有虞之治所以為不可及也歟三代而降首推貞觀令德善政相望於冊其所以致此者蓋有道焉太宗嘗謂侍臣曰朕日慎一日惟懼不終故欲數聞卿輩諌爭也魏徴對曰內外治安臣不以為喜惟喜陛下居安思危耳其君臣告戒之言宛然虞廷咨警之意故史稱其致治之美庶幾成康由漢以來未之有也夫帝之歌歸重於臣所以策股肱之效臯陶之歌歸重於君所以盡責難之方后克艱厥后臣克艱厥臣二者固不可偏廢也究之人君一日二日萬幾諸臣不過分翼為明聽之任若宥密之際無一時而不致其糾䖍無一事而不深其謹凛默默自喻有非臣工所可共曉者且君以知人為明臣以任職為良要必君能得人而後臣始得以行其所學則臣之艱又無非君之艱也為君者既克處其難為臣者皆敬體此意於以修人事而敕天命自有以致明良喜起之休矣書經帝庸作歌曰敕天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉臯陶拜手稽首揚言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉監察御史臣歐堪善臣謹按自古郅隆之世必君明臣良上下交泰而後克底乎制治保邦之上理也顧君臣一體或宴饗以聨其情或詩歌以紀其盛稽之往古史不絶書求其因閭里之豐登鳴堂亷之豫順笙簧酒醴悉形其體國經野君咨臣警之深心者每罕覯焉緬想虞廷上有濬哲文明之主下有翼為明聽之臣其時禮明樂備府修事和集二十二人以時亮天工固非徒以賡歌拜揚侈一堂之景運而敬天勤民之隱念未嘗不協諸磬管播之咏歌以志其交相勸勉之忱迄今讀帝舜之歌曰敕天之命惟時惟幾蓋敕時幾則股肱以喜元首以起而百工以熙也維時臯陶覩時雍之盛美導賡拜之休風揚言曰念哉率作興事夫興事易于紛更則守憲以遵其度興事或至怠逸則屢省以集其成一則曰欽哉再則曰欽哉者見君臣憂勤惕厲總此敬之一念相為始終臯陶於是續帝歌以成其義所以開千古泰交之隆而肇萬世明良之盛也厥後商之咸有一德對揚休命周之歌蓼蕭賡天保游魚樂其在藻鳴鹿美其食蘋推諸慶豐年而蒸髦士美哉其有賡拜之遺風乎至於柏梁聯韻甘露陳筵引簮笏於瀛洲歌秋風於汾水芙蓉仙蕚賞御苑之飛花碧水澄潭聽鈞天之雅奏大抵鋪張揚厲之意多而非念切生民深有關於旰食宵衣之至計也惟夫泰階啓運聖主垂裳無逸久陳于松軒豳風更繪于紫殿念豐年稌黍載以詩篇偕百爾冠裳錫之酺宴君歌臣答無非明良喜起之休鼓瑟吹笙不忘都俞吁咈之意凛天命而切民依敕時幾而康庶事固將邁漢唐軼商周嫓美于虞廷之盛也豈不懿哉書經帝庸作歌曰敕天之命惟時惟幾編修臣朱桓蔡沈曰敕戒敕也幾事之微也惟時者無時而不戒敕也惟幾者無事而不戒敕也蓋天命無常理亂安危相為倚伏今雖治定功成禮備樂和然頃刻謹畏之不存則怠荒之所自起毫髮幾微之不察則禍患之所自生不可不戒也臣謹按聖人之學莫大於敬而敬莫大於事天所謂戒敕者敬心常存耳帝王受天位享天祿代天職無時而不與天命相流通即無事不與天心相感應敬天者非徒襲欽若之文也更不待有怒渝之象始為謹凛也夙夜宥密中無在非翼翼之小心故雖運際中天道洽政治而孜孜保治之意猶劼毖而不敢忘大舜所以將欲作歌而揭其要曰敕天之命也當舜之時天地平成矣府事修和矣太和翔洽至於鳯凰來儀百獸率舞可不謂盛治歟乃益之戒舜也則曰警戒無虞禹則曰無若丹朱傲臯陶則曰無教逸欲有邦夫以大舜之聖豈猶有傲與逸欲之患哉然頃刻不慎而怠荒以開幾微不謹而禍患以伏蓋天下治日常少幸而治矣則永保為難故一堂之上都俞吁咈動色相規君臣同一兢兢耳是必存心養性不愧屋漏以端夫敕命之原由是謹幾慎動時存不敢荒寧之意以之修己則所其無逸莊敬日强也以之事神則溫恭朝夕執事有恪也以之臨民則凛乎朽馭顧畏民碞也以之治事則雖逸勿逸雖休勿休也至於出入起居罔有不欽發號施令罔有不臧則真無時無事之不敬而保泰持盈之道在是矣易曰安而不忘危又曰懼以終始其要無咎故商書曰皇天無親克敬惟親周書曰嚴恭寅畏天命自度蓋誠見敬為基命之本而自古聖帝明王所以致治保邦與天無極者總不外此戒敕之一心昔唐太宗謂侍臣曰朕有二喜一懼比年豐稔斗粟三錢一喜也北方久服邊鄙無虞二喜也治安則驕侈易生驕侈則危亡立至此一懼也太宗亦惟有見於敕命時幾之㫖故貞觀政績紀美史書而為三代以後之賢主且夫為人君者莫不欲以堯舜自期為人臣者亦莫不樂生堯舜之世以觀德化之成幸當天心之眷顧方殷宇宙之升平有象庶幾中天之治可以復覩惟常以大舜戒敕之心為心則永保天命而萬世無疆之休兆於此矣書經敕天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉監察御史臣徐以升蔡沈曰敕戒敕也惟時者無時而不戒敕也惟幾者無事而不戒敕也蓋天命無常理亂安危相為倚伏今雖治定功成禮備樂和然頃刻敬畏之不存則怠荒之所自起毫髮幾微之不察則禍患之所自生不可不戒也此舜欲作歌而先述其所以歌之意股肱臣也元首君也人臣樂於趨事赴功則人君之治為之興起而百官之功皆廣也臣謹按虞帝此歌見勤民為敬天之實而責人臣以輔治之勤也是時平成奏績府事修和師濟盈廷嘉祥畢至正中天景運極泰之時也然極泰之時亟宜思保泰之道所以然者皇天無親惟德是輔一念之敬肆天命去留分焉使謂太平已致可以坐享其盛君或生逸豫之心臣或起廢弛之習雖治具燦然畢張而精神血脉之間已有貫輸不到之處敬則為道心肆則為人心即天命去留之介惟聖人至誠無息與天行同其健直無一刻間斷在在與天命呼吸相通曰明曰旦出王游衍何處非天則安敢有一時一事之不敬乎虞帝此二語實萬古人主保泰之要道厥後禹之不自滿假湯之顧諟天命文之不敢康武之敬勝怠皆此惟時惟幾之㫖也然人君敬天以實不以文故勤民乃敬天之實人君一身不能獨為理必分其任於羣臣君曰元首臣曰股肱可見君之與臣一體相關人臣狃於目前而忽於逺慮樂於粉飾而憚於憂勤則於朝廷政事必有因循廢弛之漸大臣玩愒小臣亦相與觀望效尤而偷安惰窳之習相率成風矣所以虞舜作歌而首責股肱以喜喜非好事邀功之謂乃其一㸃忠君愛國之心發為奮庸明作之氣歡欣鼓舞趨事赴功而恐後股肱如此自然朝廷清明紀綱整飭而下之官師庶尹亦能恪恭震動以效其績吏治則民安然後天命可以永保而勿墜矣此舜以保泰之責屬望其臣而諄諄於居翼為明聽之任者也舜非舍己而委責於臣言此者所以深著君道之立係於臣職之修君臣一體皆有祈天永命之理當交勉勿怠也時時以天命自凛自無怠荒之得乘舜言敕天之命不外敬之一字君臣上下胥主於敬敬者凝命之本人君固當惟敬作所而尤宜警戒臣工共體此意以永佐太平之業哉書經敕天之命惟時惟幾左中允臣于敏中蔡沈集傳曰敕戒敕也幾事之微也惟時者無時而不戒敕也惟幾者無事而不戒敕也蓋天命無常理亂安危相為倚伏今雖治定功成禮備樂和然頃刻謹畏之不存則怠荒之所自起毫髮幾微之不察則禍患之所自生不可不戒也此舜將欲作歌而先述其所以歌之意也臣謹按有虞之世君明臣良百工熙庶事康猗歟偉歟治化之隆何施而臻此然而舜當其時撫已成之治彌深保治之思以一心默契夫於穆之原而即以一心潛運乎天下之上觀其載歌喜起時推本於天命時幾者何惓惓也今夫惟天聰明惟聖時憲天命之係於君心惟聖人知之亦惟聖人敕之敕也者飭也警飭而不敢廢慢也其義又為誠為正為固誠則純其心而無間正則平其心而無欹固則堅守其心而無出入故敕之云者有靜存動察之心有逺觀近取之心有謹小慎微之心有涉氷馭朽之心若治物然備而無虞若治器然整而勿壞夫是之謂敕也蓋天命至微惟敕之而有以參乎其微天命至巨惟敕之而有以肩乎其巨敕之時義大矣哉而即申之以惟時惟幾時者難得而易失者也幾者動之微吉凶之先見者也明其難得而易失則必有先時之防有及時之慮有後時之思明其吉凶之先見則必始事而審其萌臨事而致其懼終事而杜其流且時不在久也須臾不謹而往者莫續來者難乘幾不在大也纎悉不嚴而一節偶疏萬端皆纍乾之九三曰君子終日乾乾夕惕若厲無咎其惟時之謂乎繫辭曰君子知微知彰知柔知剛其惟幾之謂乎善夫陳氏經之言曰保治在敕天敕天之要在時幾蓋天不可知時即天命之盈虛知時則知天矣天不可見幾即天命之消長見幾則見天矣惟能知天而時時以凛之大人之所以弗違奉若也惟能見天而事事以敬之王者之所以財成輔相也人求天於天聖人求天於己此天命之所以常集歟臣因思夫典謨所載大抵皆臣朂君之辭而此獨君朂其臣作書者以是篇繫虞書之終有以知當日地平天成六府修三事治明刑弼教禮隆樂備皆大舜敕天之心基之既久而措之裕如者也故將作歌志盛而言之深切著明若此乃臯陶一聞帝歌揚言拜手一則曰欽哉再則曰欽哉又即取帝之朂臣者進以朂帝可見有虞君臣元首股肱交相勸勉總一敕天時幾之義與為終始也夫書經敕天之命惟時惟幾監察御史臣張湄蔡沈曰天命無常理亂安危相為倚伏今雖治定功成禮備樂和然頃刻謹畏之不存則怠荒之所自起毫髮幾微之不察則禍患之所自生不可不戒也臣謹按從來善言天者必有驗於人虞書之言天者屢矣而皆不離乎人事曰天工人其代之是即以人工為天之工也曰滿招損謙受益時乃天道是即以人道為天之道也曰天叙有典天秩有禮是即以人之典禮為天之叙秩也古聖之言天深切著明類如此不亦大異乎後世之求諸幽渺恍忽測諸䜟緯術數者歟而兹所謂天之命者亦非天諄諄然命之也天聰明自我民聰明天明畏自我民明威民之所在莫非命之所在然則敕天命要不外顧民碞而已矣天不遺艱大於燕安之朝而每責憂危於盛明之世故庸主恆逸聖主恆勞然天之警聖君或苐在黎民阻饑下民昏墊之始而聖君之敕天更嚴於庶績咸熙四方風動之餘故治愈求治安愈求安人以為天日監在兹也而聖人并不言日而言時時之云者一息難寬夙夜旦明刻刻皆臨質之候與時偕行者固宜惟日不足也人以為天體事咸在也而聖人并不言事而言幾幾之云者睹聞未接屋漏隱微念念皆感應之端知幾其神者不徒臨事而懼也不然日出肅冕暮則弛之火在修容暗則滅之謂之敕天可乎郊壇飭典爾室斁之牲璧告䖍衾影負之謂之敕天可乎自來人君不畏於天者有幾哉茍修其文而不修其意則雖祈榖於元辰瞻星於五夜皆非時也遇災而减膳撤懸聞警而責躬罪己皆非幾也蓋時者無定者也見為有定而敕之則其敕已浮幾者未發者也待其既發而敕之則其敕已緩是故善承天者處無虞常若有恐居幽獨不異大廷一動必書一言必記慎於出王游衍銘諸户牖盤盂存其心養其性全無忝所生之本視無形聽無聲竭孝子事父之誠雨暘燠寒之徴感召自我向背順逆之效取象惟人凡夫衣袽馭朽履虎涉氷之怵然為戒者其端至繁其功最密而總不越以敬作所以止為安昔禹之贊舜有曰惟幾惟康非即時幾之義乎又曰惟動丕應徯志天其申命用休則敬天之必以勤民為要也詎不信乎書經臯陶拜手稽首揚言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉編修臣秦勇均蔡沈曰臯陶言人君當總率羣臣以起事功又必謹其所守之法度蓋樂於興事者易至於紛更故深戒之也興事而數考其成則有課功核實之效而無誕慢欺蔽之失兩言欽哉者興事考成二者皆所當深敬而不可忽者也臣謹案臯陶所言欲虞帝以一身為百官之倡而自始至終無一息之不謹也蓋人君代天理物於是乎有事一人不能獨理其事乃分任之內外臣工則人事莫非天事也今夫春之發生即天事之興也冬之歸藏即天事之成也其中陰陽迭運五行順布秩然有條而不紊即天事之憲也虞帝言敕天而臯陶即指敕天之實以動帝念曰興事曰慎憲曰省成無事而非敕天即無時而非敕天也夫事不興則無以奉天之時而才不斂於法又恐矜躁之患生事不成則無以亮天之功而實不稱其名又恐虛誣之弊起惟以厲精圗治之意貫徹於率由舊章之中因即以月要嵗㑹之思維持於建立新猷之內則道有相濟而功實相因也而所以握其樞機立之凖的者惟在率作之大君蓋有遞為率作者則九牧之事倡於六卿百官之職統於冡宰是也有獨為率作者則四海之業肇於一人大廷之治本於深宫是也此非可恃意氣為鼓舞非可恃法令為糾繩惟恃此心之兢兢業業以開天下之先持天下之後而已臯陶拜稽以致其敬揚言以達其誠一則曰欽哉再則曰欽哉古大臣責難於君者如此而臣竊於此得用人之道焉蓋人臣不能興事而因循以便其私者其人必委靡也不能慎憲而紛更以行其智者其人必煩擾也不能省成而粉飾以掩其短者其人必浮僞也人君果能率作於上而凡內外臣工之克殫其誠克奮其才者自勸勉於不衰其不能急公不能勝任者即澄清其流品此即考績黜陟之方進退人才之準也夫必率作得其道而後可用天下之人理天下之事則庶績之張弛百職之勤惰皆視君心之所向也可不敬哉書經元首明哉股肱良哉庶事康哉右中允臣于振蔡沈曰臯陶言君明則臣良而衆事皆安所以勸之也臣謹按自古帝王未有不君臣相戒而能相與有成者也唐虞之世中天之盛而上之戒其下者則曰豫違汝弼汝無面從退有後言下之告其上者則曰警戒無虞罔失法度罔遊於逸罔淫於樂又曰毋教逸欲有邦無曠庶官此數言者後世明哲之主皆知勉焉而禹臯諸臣顧動色相戒於無事之日者誠以元首股肱相為一體安危之理判於幾微不可不審也且即以賡歌一節言之當是時地平矣天成矣禮明矣樂備矣可以揮絃而理無為而治矣然而帝歌曰股肱喜哉元首起哉百工熙哉其先股肱於元首者蓋以臣鄰之誼望臯也臯之賡歌也曰元首明哉股肱良哉庶事康哉而即繼之叢脞惰墮之戒誠所謂忠不忘規愛君之至也自古交泰之風莫盛於唐虞之時而咨警之風亦莫盛於中天之世臣嘗就其辭而繹之蓋所謂明也者非苛察之謂也清明在躬志氣如神如鏡之在懸萬物不能遁如日月之照臨容光無不被惟精惟一以用中於民故四海雖逺若坐照焉惟時惟幾以敬天之命故萬幾雖廣若數計焉黈纊塞耳而不失其聰冕旒蔽目而不失其明用此道也良也者亦非寡過取容之謂也一德一心勿欺勿二職所當為則必為此小臣耳有功不居而朝夕左右思所以輔成君德焉事有當言而盡言此具官耳不動聲色而維持調護思所以致主太平焉公爾忘私國爾忘家非不愛其身家也所憂者一念之自利即害於公一事之沽名即害於國上不負君下不負學非自矜其學術也所懼者愛其身而旅進旅退負君也即所以負學挾其術而邀靈固寵負學也即所以負君軒冕懸於前而紛華勿慕雷霆震於上而精白勿移用此道也康也者亦非近功小喜之謂也朝廷清明四海無事而萬幾在御凛乎若朽索之馭六馬焉金革寢息耕鑿不驚而萬物一體惄然恐一夫之失所焉正朝廷以正百官持盈保泰慎始敬終而事之弗協於道者寡矣正百官以正萬民表正則影直大法則小亷而民之不被其澤者寡矣垂裳恭己而非即於宴安一堂賡拜而不忘夫咨警用是道也若夫三代以下泰交之盛則莫如漢唐矣竊計兩朝之中明良之㑹又莫盛於文帝太宗矣自昔論人臣納忠於君者在漢則首稱賈誼劉向在唐則首稱魏徴陸贄然臣以為為劉向陸贄易為賈誼魏徴難何則劉向當國勢下移之日慷慨救正不避艱險陸贄當國事搶攘之際危言正論愷切敷陳此固事勢所當然忠憤之所激發者也凡有至性者皆能為之若賈誼之所事者文帝魏徴之所事者太宗也文帝之時可謂已安已治矣太宗之為君可稱無怠無荒矣而此兩臣者陳善閉邪防微杜漸一則痛哭流涕燭事於幾先汲汲焉纍牘連篇常若禍機之不可測一則反覆批鱗懼衰於末路皇皇焉提撕警覺惟恐盛事之弗克終而兩君者如木之從繩如海之善受忠言逆耳而不以為忤芻蕘過計而不以為迂用能身致太平刑措而不用美哉元首明股肱良而萬事康者此之謂也雖然文帝躬致太平而於禮樂之事謙讓未遑身衣浣濯惜露臺千金之費可謂恭儉之令主矣而愛黃老之術儒風不振論者惜焉太宗孜孜納諫出後宫女子至三千人尤人所難者魏徴既沒而侈心遂萌窮兵黷武為盛德纍則甚矣明良遇合之難而叢脞惰墮之易也是故郅隆之主緝熙宥密夙夜劼毖而不敢康輔弼之臣啓心沃心朝夕納忠而勿敢怠此物此志也夫書經祗台德先不距朕行監察御史臣李㥳蔡沈集注曰禹平水土定貢賦建諸侯治已定功已成矣當此之時惟敬德以先天下則天下自不能違越我之所行也臣謹按禹之治水也八年三過克奏平成厥功偉矣然人苐知禹之功而不知其本於德人亦共知禹之德而不知其本於敬惟本此敬慎之心以運量於巨艱之際故芟大患興大利不動聲色而措天下於泰山之安此念何事可忘也此心何時或釋也試觀禹之自言者曰祗台德先不距朕行斯言也其在水土既平之後乎臣以為鯀之績用弗成者亦惟此不祗之故耳持其豫智自雄之習以與事相抗衡則其氣浮浮則慮患不深而聰明易入於岐途逞其堅强悻直之才以與衆相拂戾則其志驕驕則羣益未集而偏才多撓於獨任惟禹其知之是以不患其事之艱而惟慮其氣之浮不憂其功之難就而惟懼其志之多驕凛欽若之衷以挽天運之艱則氣化且自我而轉移深朽索之懼以救人事之失則羣情咸由我而奠定人曰疏瀹互施排决異用力何勞也而禹惟本之以欽承則胼手胝足憂勤以惕厲而彌深人曰三壤有賦九式有經功何神也而禹惟矢之以飭密則東漸西被聲教偕純修而並懋是知禹之功禹之德為之也禹之德禹之祗致之也而史臣則詳書於敷土隨刋之後者何也蓋禹之心固無時之或懈而敬之德實無一之可離始之拯溺亨屯者此德而後之持盈保泰者亦此德始之蓋愆幹蠱者此德而後之整躬率物者亦此德禹之祗德夫固合初終貫顯微統上下該幽明而一以貫之者乎然則由是以推彼天下之潰堤决防豫人以區畫者寧僅水之足患而敬德之夷險抒艱先天下而作之則者又寧僅禹之治水為然哉史臣於水土既平之後而詳書禹祗德之言也其示人意深逺矣書經惟王不邇聲色不殖貨利德懋懋官功懋懋賞用人惟己改過不吝克寬克仁彰信兆民侍講臣任啓運蔡沈曰不近聲色不聚貨利非本原之地純乎天德而無一毫人欲之私者不能本原澄徹然後用人處己莫不得其當臨民之際能寬而不失之縱仁而不失之柔君德昭著而孚信於天下矣陳櫟曰湯所以克寬仁實自不邇殖之無私欲始德懋以下根本皆自不邇不殖中來陳雅言曰使湯之心有一毫聲色貨利則用人處巳之間必有不盡其道者臨民之際豈能無愧哉以此見人君一心為政事之根本孟子謂惟大人為能格君心之非此之謂也臣謹按稱湯之德至克寬克仁彰信兆民可謂至矣而必先之以不邇聲色不殖貨利者蓋人君之心百官之所待照也萬幾之所待理也譬之明鏡一塵之不集而後其照全偶有一物之翳則明有不照之處而用人處己皆不能無悮矣故所謂聲色非必若鄭衛之音燕趙之女恆舞于宫酣歌于室也所謂貨利非必若鹿臺之財巨橋之粟人以賄進政以貨成也凡一切可喜之事可樂之物其與吾耳目為緣者皆聲色貨利之類而吾心清明之翳也孟子曰物交物則引之而已矣吾身耳目之物皆與聲色貨利為緣而聲色貨利之物又日與吾耳目為誘嚴以防之猶懼其引况可曰是區區者何足以為吾清明之纍而邇之而殖之乎微塵集而鏡已失其明微欲滓而心已失其虛心不虛即不靈而天命已汨其原率性已違其則如是而求用人處己之各得必不能也邵子曰情之溺人也甚於水水能載舟亦能覆舟故物者身之舟車也物傷則身從之矣身者心之區宇也身傷則心從之矣心者性之郛廓也心傷則性從之矣性者道之形體也性傷則道從之矣夫食味别聲被色固人所以生乃以聲色貨利之易溺而不謹之於微戒之於漸且曰是區區者何足以為纍馴至於傷吾身傷吾心傷吾性并用人處己之道無所不傷是以載舟者覆舟也可不為大懼哉古之聖君知其然也謹之於至微戒之於漸習左右前後罔非正人寢食起居罔非納誨在輿有旅賁之規位寧有官師之典瞽史有教誨之道􅉏御有誦訓之針與其以聲色樂吾身何如以規誨養吾心與其以貨利奉吾身何如以理義飫吾心如此則何人非師何人非保是惟無過過必不二湯之所以用人惟己改過不吝由此道也抑湯之所以不邇聲色不殖貨利者又有本焉伊尹曰顧諟天之明命孔子曰君子之事親也如事天事天如事親身也者親之枝也性也者天之命也一失其身不可謂事親一失其性不可謂事天試當悅聲怡色玩貨美利之際惕然自問曰天之所以命我者何如將必有如春氷之履而絶去之惟恐不速者而敢邇之而敢殖之耶故用人臨政以不邇不殖為根而不邇不殖尤以顧諟天命為本書經惟王不邇聲色不殖貨利德懋懋官功懋懋賞用人惟己改過不吝克寬克仁彰信兆民侍講臣張映辰蔡沈曰邇近殖聚也不近聲色不聚貨利若未足以盡湯之德然此本原之地非純乎天德而無一毫人欲之私者不能也本源澄徹然後用人處己而莫不各得其當臣謹按自古帝王御世之道曰知人曰安民必以修身為本修身之道曰日新必以清心寡欲為本未有不屏聲色却貨利而能盛德大業光昭天地垂範古今者也即以漢唐令主言之武帝雄才大略自非文景所及致治顧逺不如者此寡欲與多欲之相懸萬萬也唐太宗貞觀之治此隆文景矣以視三代又逺不如者此有欲與無欲之相懸亦萬萬也夫君猶表也天下之治猶影也不清心寡欲以澄其源即用人行政事事倣佛古人尚不免為雜霸况源不清流必不能不濁乎仲虺之稱湯也曰德懋懋官功懋懋賞用人惟己此知人之哲即伊訓所謂先民時若與人不求備太甲所謂旁求俊彥立政所謂克用三宅三俊孟子所謂立賢無方也曰克寬克仁彰信兆民此安民之惠即伊訓所謂代虐以寬兆民允懷太甲所謂子惠困窮民服厥命罔有不悅商頌所謂不競不絿不剛不柔敷政優優也曰改過不吝此日新之德即伊訓所謂檢身若不及太甲所謂昧爽丕顯懋敬厥德商頌所謂聖敬日躋也明明在朝穆穆布列鞀鐸之招不嫌於屈己解網之祝總期於好生德至矣哉雖堯舜大禹何以加兹而必先稱其不邇不殖則可知致治之有由而端本澄源之必有其道矣抑臣更有進者聲色貨利之感人一也而聲色尤甚王者以天下為家以四海為富稍有意於致治其於貨利自可視之淡如聲色則不然其端甚微其來甚便其事若無妨於政治而不知人主一留意於此則諧臣媚子得乘間以肆其蠱惑之術於是思所以鉤致之崇奉之竒技淫巧之說進而聚斂附益之途開是聲色者貨利之媒而邇聲色者尤殖貨利之漸也惟成湯為天錫智勇之主智則明足以察幾而於嗜欲之易迷者灼見而不惑勇則健足以致决而於嗜欲之難割者屏絶而不疑蓋不邇以清不殖之源不邇不殖以立用人行政之本人道危微之所由判而王霸純雜之所由分也其斯為義制事禮制心懋昭建中而表正萬邦之實也歟書經克寬克仁編修臣熊暉吉臣謹按寬仁之說散見經書者不一而足而易曰寬以居之仁以行之君德也成湯懋昭大德寬仁畢備故能式商受命表正萬方如此臣嘗以為三王之治若循環夏之尚忠殷之尚質周之尚文要其極不能以無敝故窮則變變則通至於立國之規模御世之要道合先後聖而皆同垂千萬世而不易則固未有能外寬仁者也何者天生民而立君人君奉若天道者也天之道包含覆幬周遍罔外動而為陽靜而為隂散而為四時而說者以陽常居大夏而以生育長養為事隂居大冬而積於空虛不用之處然則語度量之廣大心性之慈愛總莫如天人君得不象之哉去聖既逺邪說繁興而治申商之學者方取必一切之威以行其督責恣睢之術秦一迹之又加甚焉其為效何如也臣聞善醫者不視形貌之肥瘠視其六脈之安否覘國者不計國勢之强弱視其元氣之盛衰寬仁者培養元氣之大本也古先王知有國者之元氣可培養而不可斫削也以為急趨者無善步促柱者鮮和聲密文網者多殘厲斤斧者必折故仁以立其體寬以致其用以仁之至而益見其寬以寬之至而益見其仁故其於用人也不以寸朽棄長材不以一眚掩大德瞽者為樂刖者為守宫者為閽因器而使無棄人也其於民也詬嫗若慈母保抱若嬰兒恤煢獨賑貧窮輕稅薄斂寧約己節用無損下益上也其於用刑議獄也與殺不辜寧失不經八議之典三宥三赦之制哀矜惻怛欽恤有加也其於羣臣百工也忠信以孚之重祿以厚之養其亷耻而進人以禮退人以禮也其於聽言受諌也川澤納汙山嶽藏垢霽雷霆之威察芻蕘之言而誹謗勿誅採擇無遺也當是時九重端居運量實為根本悠久之計必不屑為功利淺近之謀而在廷宿德元老交贊廟謨亦莫不以博大開上心忠厚達上㫖夫然故旻旻穆穆蒸為太和薰然如風藹然如春故其化之成人多君子家敦淳朴險刻咸消囂凌不作上有以昭格天命下有以蟠結人心唐虞三代尚矣其後漢唐宋之享國綿長孰不由此或慮寬之過每失於縱弛仁之過每失於姑息夫照之以明斷之以勇持之以剛制之以義禮樂刑政皆寬仁中所自有之條理也晏嬰曰以水濟水誰能食之琴瑟之専一誰能聽之堯舜之朝何嘗不放流誅殛何嘗不奮庸熙載黜陟幽明然終古頌堯舜終古頌寬仁也寬仁豈真有失哉參苓之補益也人知焉不善用之亦足以致疾天下終不以參苓之無所益而竟不用也然且將以烏喙代之乎夫烏喙顧可嘗食乎哉昔魏徴勸太宗以帝王之道封德彛以為不然太宗力行徴言後卒奏治臣謂寬仁真乃帝王之道也世之如德彛所見者不乏矣夫惟明主固必能辨之也書經王懋昭大德建中于民以義制事以禮制心垂裕後昆編修臣沈文鎬蔡沈曰王其勉明大德立中道於天下中者天下之所同有也然非君建之則民不能以自中而禮義者所以建中者也義者心之裁制禮者理之節文以義制事則事得其宜以禮制心則心得其正內外合德而中道立矣如此非特有以建中於民而垂諸後世者亦綽乎有餘裕矣臣謹按成湯顧諟天命聖敬日躋其盛德已無虧矣而仲虺猶以懋昭為言誠欲其勉之又勉明之益明作民之極而建其中也夫中之說始自虞廷而執中以建極于民之實則在乎以義制事以禮制心之兩言蓋中之理即事而存自立政用人以及寢興服食各有當然之理若處事有一毫未到恰好處便不是中惟制之以義而事有萬變總裁度以當然之理則因物付物事無弗中矣中之理即心而具凡喜怒哀樂與夫視聽言動皆有自然之節若此心有一刻未就防間處便失其中惟制之以禮而心有萬感總範圍乎自然之節則不偏不倚心無不中矣夫義禮德也以之制事制心即懋昭以建中也藴之於已彰之於民垂之為法則於以定億萬年無疆之業而為子孫所共守者不外乎是非僅一時之治表正萬方已也抑臣更有思者人心為萬事根本未有心不就於範圍而能處事皆得其當者况人君日理萬幾皆受裁於一心惟主敬以立心之極寡欲以清心之源俾一心之內有主而虛無欲而靜然後化裁推行以妙萬物之感則必制心以禮而後能制事以義也與書經建中于民以義制事以禮制心監察御史臣薛澄蔡沈曰中者天下之所同有也然非君建之則民不能以自中而禮義者所以建中者也義者心之裁制禮者理之節文以義制事則事得其宜以禮制心則心得其正內外合德而中道立矣臣謹按中之一言千聖相傳之統百王出治之原人主懋昭之實而凡為天下國家之所莫能外也溯夫天生蒸民有物有則則即中也惟帝降衷厥有恆性性即中也氣有清濁質有厚薄而中則同得此仲虺所謂大德虞書所謂峻德太甲所謂明命無二物也其建中于民奈何蓋民受天地之中以生而氣拘物蔽非失之不及即流于太過而協中者鮮實賴主治者大作師作君之任隆裁成輔相之功克綏厥猷納民軌物表端于上斯影直于下此建中所由名而懋昭之實際也且夫中也者非虛懸而無所麗也固即義禮以為端建中者非缺略以為功也必合制事制心以執其極心之裁制為義曲成萬事而不遺非秉之為主宰則妄動而招尤退縮而畏事而天下之達道不行矣理之節文為禮範圍一心而不過非持之以檢攝則淪於虛寂流于縱逸而天下之大本不立矣必也事有萬端而一以義為斷不敢恃才不敢矜智量其可否揆其重輕權度不差而剛柔寬猛之悉協其則心有萬慮而一以禮為坊無敢作好無敢作惡守其官而思無越安汝止而神常凝主靜立極而喜怒哀樂之不踰其間察之惟精而務絶疑似守之惟一而務絶二三夫如是義以方外則蕩平正直而中之用行禮以直內則鑑空衡平而中之體立自正其身而正民之身者樹之的自正其心而正民之心者作之型洪範所云皇建其有極㑹其有極歸其有極者非建中于民之明驗乎然王道本乎天德立體乃可致用董仲舒曰正心以正朝廷正朝廷以正百官正百官以正萬民然則建中者實協中所由致而制心者尤制事之先務也歟書經建中于民監察御史臣葛峻起臣謹按自昔聖王之治天下其神明廣運以躋斯民於蕩平正直之域者中而已矣顧中為斯民所同具而非民之能自為中也惟主德清明有以示之凖而立之則以範圍於莫外斯遵道遵路無黨無偏而㑹歸其有極此商書仲虺之誥所以以建中于民諄諄為成湯進也蓋中以不偏不倚為體無過不及為用唐虞以來帝王授受之心法莫不以允執為兢兢而禮樂刑政之原胥出於此大哉中乎其治天下之本乎今夫人君之一好一惡天下之風俗繫焉一言一動天下之則效關焉故於已為執中而於民則為建中惟能執而後能建孟子叙存之之統而曰湯執中是即建中之謂也然欲建中于民未有不夲於懋昭大德者湯德本大而又欲其懋昭之然後能建中以範斯民所謂皇建其有極也蓋昭則無時而不明惟精之道得矣懋則無時而不勉惟一之道得矣此湯所以紹五百年聞知之統而仲虺得以與於見知之列也歟且夫剛柔燥濕斯民之風土不齊賢否智愚斯民之姿禀亦異故論其性則莫不各賦一中而論其行則未能自協於中惟湯懋昭大德作極於上自立身行己以至敷政寧人之用悉合乎天理之當然人心之極則以故首出庶物樹之風聲萬民雖衆無不受範於一中之內矣若夫中無定體隨時而在有今日之中施之異日而或爽其宜一事之中施之他事而或愆其節因時以善其用小心以察其幾使民之罔中者皆受裁於我之中以之行政而君道成以之敷教而師道立上以承虞廷十六字之傳下以開商家六百年之治不偏不倚無過不及而中之全體大用無不備矣其在商頌長發之詩曰不競不絿不剛不柔敷政優優百祿是遒其建中于民之謂乎書經以義制事以禮制心編修臣杜若拙臣謹按帝王之所以建極於天下者無用不行無體不立用有萬變而必不失其當然之則體本無為而必實有其守正之規蓋體用之同條而共貫者約之不外於一中而行而宜之適如乎事之分則義之權衡於一定默而存之適得其心之理則禮之範圍而不過自古性安之聖由仁義行周旋中禮者則以一中為授受而心與事已無所不該可以渾乎義禮之名而不必有其勉强宰制之勞茍非然者則事與心必受之以制而後不至於過差而所以制事與心者必凖之以義禮而功乃確乎其有可據德乃日新而不自知此商相仲虺告湯以懋德建中而必實之以義制事禮制心也夫人君日有萬幾其為事也煩矣然而一事有一事之宜萬事有萬事之宜或膠於一成之迹或設以意見之私或游移於兩可之說而不能斷毫釐有差謬悮己多在人君非不欲其事之善而所以制之者無其具則惟其義之未精也夫義即事而存是非可否截然不紊而惟隨時以觀理因物以察則確見乎義之所在而施之必協其分行之務要其歸則事為有制而用人行政之間萬舉萬當矣至於心又為應事之本而義所從出之原也平時不能慎檢其心臨事何以精研乎義顧心之為體當靜存之時既易淪於虛寂而念慮之萌事物之感往往一發而不克中其節縱聲色不邇貨利不殖之主不至嗜好攻取之相尋而喜怒哀樂之間稍涉於偏倚視聽言動之端未凖乎天則恐心猶善變而不得所制夫禮者理也理有節文斯謂之禮心以載理禮即以範心夙夜宥密之中察之也精守之也一務使心安於正而非禮之私不得而干之而所以制心者不得其道乎而要之心端則能以處事事得則愈以愜心心得其制而中之體立事得其制而中之用行內外交養體用一致此德之所以純粹無疵日新又新而建中于民者即可垂裕於後也仲虺之言其誠深悉乎斯道之源流而為萬世帝王之大法也哉書經以義制事以禮制心編修臣李龍官臣謹按此言成湯窮理盡性之學內外交相養而所以建中於民之本也夫人主一身上而天地祖宗之所式憑下而臣鄰兆庶之所倚毗其成天下之務者存乎事而宰萬幾之理者存乎心叢脞而事無所檢則業不廣馳騖而心無所坊則德不崇古聖王懋修於聖敬而致謹於日新昭上帝而式九圍其道百世猶當共凛也在昔唐虞授受一中焉止耳逮舜之命禹則人心道心之辨惟精惟一之功隱然有升降之懼焉若夫湯遷社既以創征誅之局典寶且將疑百姓之心茍共球受而競絿未化震竦猶存未可云建中於民也且夫中豈託言淡漠矯語無為希神化之驟臻忽懋修之實功哉其所以表正萬邦者則固有其本矣德散於事而用之所由行者則有義德凝於心而體之所由立者則有禮以義制事則事得其宜矣以禮制心則心得其正矣無從匪彛無即慆淫凡我造邦各守爾典而况為天下之所繫屬者乎帝王之事與儒生異觀夫洪範八政周禮六官凡祀賔食貨兵刑禮樂莫不勞聖天子之經營以為之調劑而謹小慎微則日用酬酢亦不敢忽也茍幾微之未合宜則草野雖愚皆得以私議天朝之法守惟制之以義而後萬物各得其至善之地不偏不倚咸受裁於中以默運其曲成之化蓋事殽於外而義聚於內平日既深喻其精微而和順於道德雖事之變動不居而推行必歸於盡利由是賞必以功而彤弓皆中心之貺也罰必以罪而噬嗑皆雷電之章也舉者直而公孤卿尹皆一德之股肱也錯者枉而郊遂撻觥皆鼓舞之教誨也本諸身而徴諸民所謂無偏無陂遵王之義者此也至於人君之心所以宰制羣動者如星之有北辰也雖晦冥隂默之中南北易迷而極星正則可考而辨是非紛雜之中邪正易淆而王心正則可審而分然人主一心而環而伺之者衆封禪禱祀之足以中其隱也土木甲兵之足以快其志也聲色貨利之足以誘其𠂻也即一己之視聽言動亦交相引而有不能自主之時茍舉念未合乎天則雖萬里之逺亦將進而窺九重之隱微惟制之以禮而後念慮胥範於準繩之內有嚴有翼咸率由乎中以神明其矩矱之經蓋心兼乎情而禮原於性平日既克去其嗜欲而顒卬乎圭璋任心之撡舍不測而成性必極其間存由是志以道寧而威儀之抑抑也言以道接而德音之秩秩也文物以紀之而垂裳端冕昭其恭也聲明以發之而采齊肆夏著其和也組修其身而成文於天下所謂齊明盛服非禮勿動者此也凡此皆中也中也者天下之大本也位天地而育萬物胥由於此不然天既錫王勇智正域四方即稍弛其防檢萬不至於紀綱隳而菁華竭也而內外交相養如此孔子曰君子敬以直內義以方外敬義立而德不孤此治天下者所以永保天命之道也歟書經好問則裕自用則小監察御史臣李清芳傳曰好問則德尊而業廣自賢自用者反是臣謹按人主所以清出治之源而為萬事之本者心而已矣心不能無所蔽故必資乎啓沃之助而後不惑於似是之非何也心之為心洞達虛明如鑑之空如衡之平具衆理而應萬事天下雖大而心之體無所不包倫類雖多而心之用無所不貫廓然與天地同體浩然與天地同量惟其蔽於物欲之私雜乎氣質之偏然後燭理有所不精處事有所不當而見其狹小也必有以發其聰明開其志氣聲色嗜好不足以蕩其心奸邪讒佞不足以惑其志而後知周乎萬物而道足以濟天下也若不廣咨諏之路開衆正之門博採勤求則聰明志氣何由日進嗜欲何者當戒奸邪何以辨别四海之大兆人之衆又何以周知不遺而措之得其當處之得其宜哉是以哲后興王求言如不及納善如轉圜舜之明目達聰禹之聞善則拜及乎殷周之盛王莫不皆然即三代而下若漢之文帝唐之太宗亦未有外乎此道而能興太平致盛治者也故聖主知之兼收並蓄細大不遺以衆知為知以衆心為心葑菲不以下體而不採芻蕘不以賤品而不詢故英華靡遺幽隱必達有言逆耳必求諸道有言遜志必求諸非道其容而受之也如江河之不擇細流泰山之不辭土壤諒直者嘉之敢犯者義之愚淺者恕之則其智彌大其德彌光可以盡天下之理見天下之心而六合之大九州之逺一如堂陛之間規為措注若指諸掌也仲虺斯言可謂得為治之要矣書經好問則裕監察御史臣張孝挰臣謹按自古帝王之治天下也類皆不恃一己之耳目而必合天下之耳目以為耳目不恃一己之心思而必合天下之心思以為心思誠以天下之大萬物之衆非獨義理無窮即事物之變態其千岐萬轍亦無窮誠有非一人之耳目心思所能遍及者是以懋昭大德如湯建中於民如湯亦既足以垂裕後昆而仲虺猶必以好問則裕諄諄規勉焉今夫天下之首出庶物者大君也下此則才智之不逮不啻倍蓰宜若無足以仰禆聖學上佐治化者然而天地之理愚夫婦可與知能而聖人有所不能盡語曰智者千慮必有一失愚者千慮必有一得詩曰先民有言詢于芻蕘明乎下問之有益而不可以卑邇淺近而忽之也惟是人君至尊人之欲獻言者非無懇惻忠愛之誠而卒不勝其畏避顧忌之念是以呐者不敢言而言者亦有所不敢盡茍非動之以至誠加之以善導即恐蹇澀退縮胸中所欲吐者十且不得其二三是雖問猶之不問耳矣好問者無時無事不欲取證於人不以其人之愚賤而有所不屑也不謂所見之既明所守之既定而以為不必也惟隨時導引隨事咨詢俾各如其所見各盡其所言於是以天下之耳目萃而為一人之聰明以天下之心思合而為一人之睿智精而理道蕃而事物近而左右逺而四海九州無不有以燭照數計洞察隱微而措施之間左宜右有所謂蓄之有本應之不窮其於治天下不亦綽綽然有餘裕哉雖然問者所以集衆益也而論既衆則理不能以盡同至於是非之際輕重之間毫釐千里之辨要必澄然一斷於大聖人之虛𠂻而無所惑然後能收衆益而不為輿論所紛也故朱子論舜之問察用中而曰茍非在我之權度精切不差何以與此此則本原之地尤所以為好問之本者要而言之亦曰大居敬貴窮理而已矣書經湯誥曰惟皇上帝降衷于下民若有恆性克綏厥猷惟后侍講臣于振林之竒曰惟民之衷本於上天之所命然天能降衷於民而不能使民保其固有故畀君以立教之任而使民不失其所降衷也臣謹按此言民之性本於天惟聖主能綏猷以復其性教之事也仲虺之誥曰惟天生民有欲無主乃亂惟天生聰明時乂薛季宣曰人生而靜天之性也感物而動性之欲也聖人禀天之聰明代天理物使民日遷善臣謹按此言民之欲出于天惟聖主能時又以給其欲養之道也泰誓曰惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母孫繼有曰天地之性惟人為貴一民失所即非天地父母之心惟亶聰明者作民之元后作民之父母使之皆得其所臣謹按惟天地能父母萬物惟元后能父母萬民蓋人為萬物之靈而元后則人之靈也此言養以成其教也洪範王訪于箕子曰惟天隂隲下民相協厥居我不知其彛倫攸叙陳雅言曰武王以人君代天理物必使民居之順其常得其正以無負上天陰隲相協之心故道在叙其秉彛人倫也臣謹按惟天相協民居惟聖攸叙人倫彛倫叙則人皆安常處順乃所以承天隂隲之心此言教以成其養也臣竊惟以上四條皆聖王承天立極之心法牖世覺民之治統其道則君師兼備其事則教養並隆故天生聖人必畀以聰明獨絶神靈首出之資者非使獨為聖哲而已惟能悉聰明之用以範圍天地曲成萬物然後聖人之性盡而天地萬物之性亦盡至於天人賦畀之際自天而言則為降衷為隂隲自人而言則為恆性為秉彛要之天下之民其性得以永綏欲得以有主靈得以不昧倫得以罔斁者無不仰賴於聰明天亶之聖人蓋天地無心而成化百姓日用而不知古昔聖賢推原天道責成人事異世同揆如出一口意固如此且夫生民者天也乂民者君也天以施生之德布惠於民而以乂安之任責難於君則天事易君事難矣况堯湯水旱本屬天行頑嚚間生亦由天性然使災患未弭人心未格在君皆不得以天數而諉謝之故曰為君難然則其難其慎所其無逸為天地立心為生民立命固歷聖之所同萬世之所準也歟書經惟皇上帝降衷于下民若有恆性克綏厥猷惟后侍讀臣周玉章臣謹按中庸天命之謂性蓋原本降衷恆性之說也性者理也有所以主是理而命之人者尊之為帝易曰帝出乎震是化生萬物者帝也而隂隲下民者亦帝也自天而付之人則為降衷所謂繼之者善也自人而受之天則為恆性所謂成之者性也真德秀曰深味降衷一言真若天之與人交相付受明命赫然不離心目之間可不敬哉朱子謂書言降衷詩言秉彛道理則一而名字位分有不同者夫恆性之與秉彛初無異解惟是有物有則指形質附麗而言如五事則有恭從明聰睿五倫則有親義序别信一物各具一則若中為天下之大本萬理之所從出在天為太極之真宰降之于民則渾然一中并仁義禮智信之名亦未嘗區而分之劉子所謂民受天地之中以生者由是而之焉或見吾性中之仁或見吾性中之義或見吾性中之禮智信順其自然而率性之道出焉即所謂猷也特是禀氣受質之先既不無清濁純雜之殊形生神發之後又難免知誘物化之纍於是聖人定之仁義中正以立人極而克綏厥猷惟后矣蓋天生民而立之君使司牧之勿使失性則所以化道而安全之者其事蓋詳其責綦重洪範曰皇建其有極斂時五福用敷錫厥庶民是協居與降衷同出于天而建極與綏猷功歸於后固可以互相發明者且夫中者古聖人所以傳心而傳道也執中之㫖肇自唐虞然危微精一雖包乎性命之理而未嘗明言之惟湯懋昭大德建中于民直推原上天生民生物之心重念作君作師之任而以降衷者見所性之同復以綏猷者立為治之本此所以上接唐虞執中之傳而下開萬世言性之始歟書經惟皇上帝降衷于下民若有恆性監察御史臣柴潮生臣謹按湯誥此言揭造化之機緘而為理學之權輿也蓋天之降命而具仁義禮智信之理無所偏倚所謂衷也人之禀命而得仁義禮智信之理與心俱生所謂性也有氣質之性有理義之性理義者純乎天氣質者參以人者也然天下非理義之性無以宰氣非氣質之性無以受理宰之者理固必無偏全受之者質亦僅分清濁此所謂恆性也孔子之言性曰相近兼理與氣而言包括殆無遺藴矣蓋天命之初混然一理然二五之凝成終有不同者存焉自此指不明於天下而性之說莫知所宗杞栁湍水孟子辭而闢之性善之論深切著明直破諸子異同之論然或疑程子之言與孟子不合程子曰善固謂性惡亦不可謂非性毋乃有二指乎不知孟子之言舉本然之性程子之言舉所禀之性本然之性天命之正理不以聖智而有餘不以愚不肖而不足所禀之性剛柔之異質遲速之異候有生而鍾其純粹之最者亦有偏駁者其最純者固存其本然之常性不待復而誠者也若其偏駁者其為不善必先就其所偏而發此固可得而反也故程子謂夫子之言性相近者指所禀之性孟子之言性善者指本然之性均與降衷恆性之㫖相為吻合焉張子曰氣質之性君子有弗性者焉楊時曰氣質之性君子不謂之性蓋欲因其所禀而返之本然則人皆可為堯舜此孔孟所以闡降衷之閫奧而程氏所以有合於孔孟也程子曰論性不論氣不備論氣不論性不明朱子謂性即理也在心謂之性在事謂之理又謂在天地言則善在先性在後在人言則性在先善在後合觀諸說大義微言孟子本諸孔子至程張朱子而互相發明荀揚董賈韓之說紛紜淆亂罔知折中寧有當於惟皇降衷之㫖也哉書經立愛惟親立敬惟長始于家邦終于四海侍讀臣赫瞻祭義曰立愛自親始教民睦也立敬自長始教民順也陳雅言曰孝悌之道達諸天下而謂之立者盡吾愛親之道於此天下之愛其親者莫不視以為法盡吾敬長之道於此天下之敬其長者莫不視以為準愛敬之道既立於此則必形於彼始而一家繼而一國終而四海之人莫不觀感興起孝悌之心油然而生則各親其親各長其長而天下平矣孔頴達曰王者之馭天下撫兆人惟愛敬二事而已臣謹按君人之德固統家國天下而共象者也蓋家國天下其勢雖殊而愛親敬長其心則一惟順德立於九重而儀型表於萬國其理不誣其機不爽有如伊訓之所述是已其曰立愛惟親立敬惟長始于家邦終于四海蓋誠諄諄於嗣德謹始之道也厥德維何則愛敬是嗣德維何則立愛立敬是顧孝子悌弟之良雖具於人心而不能不漓於世教寖微之日抑事親從兄之誠無間於聖主亦未嘗不具有發邇見逺之機苐愛敬之理民與君同而愛敬之用君與民異如曰執孺慕以為愛徐行以為敬猶未盡乎王者愛敬之義必極之不愆不忘善繼善述信任老成推崇耆德此皆立愛立敬之至善而為人主之所不可不亟講者也夫能立愛敬之道於一人即成愛敬之化於一世始刑於家邦終洽於四海不自薄其親天下亦誰趨於薄不自慢其長天下亦誰習於慢仁讓於以漸興兵刑於以不用所謂德教加於百姓刑於四海者此也所謂家齊國治而天下平者亦此也而要非立愛立敬不至此嗣德謹始之道庶乎其克盡矣書經無輕民事惟難無安厥位惟危監察御史臣熊學鵬臣謹按人主以一身履天位而撫兆民兢兢業業固無一息所當自逸者也蓋天位不可恃所恃者兆民爾兆民不易治所治者民事爾仰觀蒼昊以大寶畀之聖人豈僅欲其撡生殺擅豫奪作威福以震耀此羣黎百姓哉亦以林林總總其類至繁其情至渙有聖人出以元后之尊而統率之能養其欲能給其求能使天下百姓飲和食德而共樂此升平而後好生之心為克慰也故人主誕膺天命天未有不欲其國祚綿長而享福悠久惟視其所以及民者何如因以定其在位時安危何如爾伊尹當日見太甲既已悔過自新處仁遷義又恐其久而生變於是以民事惕之復以安危警之蓋誠有見於天命靡常民碞可畏而守成固若是其不易也然所以重民事者維何亦曰誠而已矣遐稽往代非甚無道之主其即位以後大抵奮發有為者多然欲厚民生而閭閻每不免於擾纍欲正民德而風俗每不免於澆漓者其故何哉上澤闕於下逮下情壅於上聞實事不必知知事不必實君民相與之間誠意不足以感召也夫五方之風土不齊羣生之疾苦不一人主尊居九重所有祁寒暑雨之咨既不能赴深宫而直訴而人主又不可以私心臆度於是設官分職以經理之無如經理偶非其人則興一利而利不必均沾除一弊而弊未曽盡剔甚至積玩生姦遂為隱飾民情不以實告實告亦不盡情在君上宵衣旰食非不勤求民瘼也而臣下實意不將但事敷衍則上下相隔德意不通欲生人之不至於流離困苦慆淫匪彛勢必不能是故聖人於此將使君民聨為一體必先使君臣合為一心知國家之敗由於官邪於是慎以選之務在清其登庸之路知官之失德由寵賂章於是禮以進之務在維其亷耻之風自公孤卿尹下逮百司庶職一以誠意交孚共勷郅治其有玩視民依阻遏民隱者罰無赦則君不疑於其臣臣不惑於其君上下交而志同於以悉心經畫誠求保赤之方各盡克艱之道庶幾下情無不上達而上德無不下宣矣至所以安厥位者維何亦曰敬而已矣人主之敬亦不外於勤民然而民事之廢弛多萌於人主自安之一念當夫海宇豐登四方寧謐天下大勢亦似已治已安而盛衰消長相為倚伏人主席此尊崇之位覺其安則危覺其危則安覺其安則肆志日長而叢脞之至馴致於不可支持覺其危則寅畏常存而昭格之誠即足以迓夫休美况禍患所萌治於微則用力少而功多治於顯則用力多而功少人主於其未然而常見棄忽無怪乎及其已然而猝難復振也昔唐太宗曰朕每出一言行一事必上畏皇天下懼羣臣魏徵曰願陛下守此常謙常懼之道日慎一日則宗社永固無傾覆矣夫唐代英主太宗稱最貞觀治道史冊推美當日宗社豈遂至於傾覆而魏徴即以此說進者要知人主臨御兆民凛乎若朽索之馭六馬制治必於未亂而保邦必於未危也為人主者知宴安怠惰肇荒淫之基則當朝乾夕惕不使厭倦之得乘知竒技淫巧啓奢泰之漸則當崇雅黜浮不使華靡之日盛知利口足以亂德則便佞之人不當使得侍於側知加賦所以害民則聚斂之說不當使日陳於前恐懼修省無往而非一敬庶幾天命可保而天位可守矣總之守位如同乎守身欲守身者務使元氣之常充欲守位者務使民氣之無損民之氣與君之氣呼吸相應凡民間氣偶或乖皆賴人主默為調劑遇事而培養之此民事所以惟難而厥位所以惟危也人主於此因其難而懷保靡寧常思所以圖其易知其危而戰兢自矢常思所以求其安則本固而邦寧邦寧而一人有慶天下萬世有不永臻此仁夀之域也哉書經有言逆于汝心必求諸道有言遜于汝志必求諸非道編修臣葉酉臣謹按此二語乃千古為人君者聽言之法也人情莫不好諛而惡直有順吾志者雖其言未必是鮮不聞之而欣然矣有逆吾意者雖其言未必非鮮不聞之而艴然矣使不以道揆之而是非莫辨則忠言不聞而讒諂之說日陳於前其弊有不可勝言者此伊尹之所為惓惓與昔唐太宗嘗止樹下愛之宇文士及從而譽之不已太宗正色曰魏徴嘗勸我逺佞人我不知佞人為誰意疑是汝今果不謬夫士及所譽者樹耳於事固無所害也而太宗即嚴斥之者誠以人臣而存一迎合之私即可以無所不至君或務為優容即相率而以因循為事君或務為整飭即相率而以苛刻為能君或用一人即明知其人之不可用也且稱其善良以附之君或舍一人即明知其人之不可舍也且索其瑕垢以排之惟求諸非道則佞臣無所容其奸讒諂之說不聞而忠言必日陳於前矣太宗惟不為佞臣所惑故於犯顔極諌者雖時有所拂至欲殺此田舍翁以為快而一聞君明臣直之言輒翻然易慮降心相從此貞觀之治所以幾及乎唐虞三代之盛也豈偶然哉臣嘗讀宋臣蘇軾文集竊歎其有合於古大臣之用心也當仁宗時惟以茍且宴安為戒及上書神宗則於紀綱風俗三致意焉蓋仁宗寬厚之主患在不能有為神宗毅然有為矣患在求治太急各視其病之所在而針砭之未嘗順意求合其無面從之失可知惜乎時君不之用耳且夫人君之尊猶帝天其威雷霆也人雖至愚豈有敢侮帝天而犯雷霆者哉其敢於逆上㫖而為痛哭流涕之談者其人必有愛君之心者也是故明君於言之逆於心者雖芻蕘無可採而亦諒其中之無他於言之遜於志者雖利害無所關而必防其流之所底其是非悉準之於道而不以言莫豫違為樂焉如是而君德不日新而國家之務猶有不即於理者未之前聞書經臣罔以寵利居成功監察御史臣李清芳注成功非寵利之所可居者臣謹按注意謂人臣當成功之後便當退處山林以逺乎寵利之榮細玩語氣恐非經文本㫖意此句亦是泛論為臣之道當如此而功成名遂之時尤宜深察乎此而加之意也蓋寵利二字最易惑人一入其中則公忠體國之意少而私便其身圗之心熾凡為臣者皆當深戒乎是而成功之臣其所居之位與其所處之時尤易陷溺於其中何也夫成功之臣必其居位崇髙荷服休之寄而列九卿之職則優游以固其寵利其勢甚易且形逼勢親處疑懼之地納約之誠有未易以徑情直行者茍篤棐之忱不勝其爵祿身家之謀則莫若委蛇遷就於其間可以無意外之虞也逢迎脂韋於其際可以無不測之患也是寵利之心之最易萌動者莫如成功時也若此者豈獨大臣哉雖小臣亦在所深戒如為國家宣力而著有微勞亦必精白乃心無寵辱之驚然後能不虧素履而無有初鮮終之悔蓋以君臣之義無所逃於天地之間豈以潔身為髙哉若如注言必逺别退休則如漢之諸葛亮鞠躬盡瘁以終其身宋韓琦每遇大事不顧身命雖退居田野聞王安石變一善政易一良法輒涕泣終日不食勤勤懇懇不敢稍安其處心積慮皆以國為體者也不特無寵利之見在其意中是豈有須㬰忘國恤耶此又何以稱焉伊尹此言所以明人臣之道當國爾忘家公爾忘私利不茍就害不茍去始終惟一確乎不拔不可因成功而稍萌寵利之念則邦其永孚于休也必如注解則下句接上未見親切書經終始惟一時乃日新侍讀學士臣吕熾朱子曰這個道理須是常接續不已方是日新才有間斷便不可真德秀曰易以日新為盛德先儒謂人之學不日進則日退故德不可不日新不日新者不一害之也始敬終怠以一出一入之心為或作或輟之事德何自而新乎臣謹按伊尹初告君以慎終于始謂必善其始而後能善其終也今又誡以終始惟一時乃日新謂必謹其終而後能全其始也蓋人君當始政之時畏敬之心內存逸豫之情未起類能戰兢自持勤於庶政及其久也海宇寧謐宗社乂安贊頌之詞日聞於耳怠逸之念潛動於中故往往有始儉而終奢始勤而終懈者若漢之武帝初能表章六經尊用儒術終於喜功好大土木甲兵神仙祈禱之事雜然並興海內虛耗豈非侈心一萌故不克終乎唐太宗為三代以後令主貞觀之初厲精圗治寰宇升平幾致刑措逮其後雖未至大戾然觀魏徴十漸之疏亦可見其漸不及初矣凡此者臣愚以為一則由於識量之未廣故不能已治而益求其治己安而益求其安一則由於德性之不堅故能持之於一日而不能守之以百年詩曰靡不有初鮮克有終易曰安而不忘危治而不忘亂故身安而國家可保也是以純修之主慎守一心以中天之盛而慮及四海之困窮以大舜之德而猶凛凛於時幾敕命大禹平地成天而不自滿假成湯式于九圍而聖敬日躋文王遹駿有聲而不敢般于遊畋皆惟一日新之功也故善為政者繼祖宗之緒聨而屬之不啻一身不善為政者或一身而前後判若兩人又何以能一乎曰是不可無學問之功焉蓋敬肆之幾伏於至微人不及見於其幾而慎之常使敬勝怠義勝欲所謂夙夜基命宥密於緝熙單厥心也及其既發而持之則用力已難矣故人主圗治必常存敬畏罔敢怠荒遏人欲於將萌而不使其潛滋暗長兢兢業業百年恆如一日則清明在躬志氣如神不二不雜日新不已又何至有初鮮終前功盡棄也哉此日新之功尤在慎獨慎獨者天德王道一以貫之者也書經終始惟一時乃日新修撰臣于敏中蔡沈集傳新德之要在於有常而已終始有常而無間斷是乃所以日新也朱子曰終始惟一時乃日新這個道理須是常接續不已方是日新才有間斷便不可真德秀曰易以日新為盛德先儒謂人之學不日進則日退故德不可不日新若始敬終肆以一出一入之心為或作或輟之事德何日而新乎臣謹按人君之為學未有不以法天為極詣者也易曰天行健君子以自彊不息蓋行健不已天之所以日新也自彊不息人君之所以日新也法天行之健以為修德之本故天之運一翕一闢無始無終人君之德日新又新慎終如始蔡子所謂有常朱子所謂接續其理一也顧臣以為接續有常之本則西山真氏所云敬字盡之敬者聖學之所以成始成終自格致誠正以至修齊治平一以貫之矣蓋主敬則心不外馳兢兢業業一日二日萬幾所以代天工而熙庶績也主敬則心無間斷日就月將學有緝熙於光明所以清明在躬而志氣如神也冕旒蔽目不自用其明而九州之逺無遁形焉敬之所以能視逺惟明也黈纊塞耳不自用其聰而萬里之外無遁情焉敬之所以能聽德惟聰也明矣而不敢自恃其明聰矣而不敢自恃其聰虛衷延訪公聽並觀無一念之懈弛一事之怠忽然後合天下之聰明以為一人之聰明皆一心之敬為之推暨而不窮日新之功必至是而始備三代以下誦主德之純者莫如漢文而賈誼危言抗論於中外乂安之日厪積薪厝火之憂古今論者不以為怪彼誠見夫大業之難終而久安長治必基於朝夕乾惕之中也唐之太宗勵精圗治克致升平嘗謂侍臣曰人言天子至尊無所畏憚朕則不然上畏皇天之鑒臨下憚羣臣之瞻仰猶恐不合天意未孚人望魏徴對曰此誠致治之要願陛下謹終如始則善矣魏徴此言與書之所稱終始惟一時乃日新者可以發明矣又馬周上言陛下欲為長久之計不必逺求上古但如貞觀之初則天下幸甚此亦慎始敬終之一證也蓋德本於心心要於一日新則日進於髙明光大之域而被四表格上下莫不本於是焉至於日新之㫖始見於盤銘再見於仲虺之誥一則取以自警一則進以勗君而終始惟一一語後之言聖學者不能外此而别有敷陳洵乎為人主法天行健日進無疆功用之最切近者歟書經任官惟賢才左右惟其人臣為上為德為下為民其難其慎惟和惟一監察御史臣郭石渠蔡氏沈曰左右者輔弼大臣非賢才之稱可盡故曰惟其人夫人臣之職為上為德左右厥辟也為下為民所以宅師也不曰君而曰德者兼君道而言也臣職所係其重如此是必其難其慎難者難於任用慎者慎於聽察所以防小人也惟和惟一和者可否相濟一者終始如一所以任君子也臣謹按為治之道莫大於用人而用人之當莫要於明斷詳玩經文四惟字二其字此中大有明斷二字意在何者明則君子小人炯然判若蒼素斷則進君子逺小人决然一定不移否則臧否莫分忠佞罔辨明不足也見賢而不能舉見不善而不能退斷不足也惟夫清明在躬而剛斷果决故能知人善任而德協明良孰為賢也使之在位孰為才也使之在職孰為其人也使之在左右以左右視庶官則左右為上誠使為上皆其人而所以為德者自能格心弼過俾聖德日新所謂使是君為堯舜之君也以庶官視左右則庶官為下誠使為下皆賢才而所以為民者自能敷教勸農俾遂生復性所謂使是民為堯舜之民也凡此孰非君德之明斷有以區别之詳而任使之當哉故當其未用也則其難其慎其難者大權若吝名器不假是本吾心之明斷有以擇之務真而惟恐誤用也其慎者詢事考言毁譽必察是本吾心之明斷有以處之務當而各盡所長也明足以燭賢奸斷足以定賞罰而人不得以幸進矣及其既用也則惟和惟一惟和者俞咈交咨可否相濟若八音之克詣五味之調適焉惟其迪知是以忱恂明斷而後和也惟一者上下泰交終始無間若元首之聨股肱百體之奉天君焉惟非謀面是以同心明斷而後一也明則猜忌無自而生斷則讒謗無隙而入而君子咸得以自顯矣然而明者斷之體斷者明之用明而不斷涇渭猶自了然斷而不明是非一任倒置是則用人之際明尤其最要矣以故稱堯之德者首曰欽明此百工所以允釐也稱舜之德者首曰濬哲此幽明所以黜陟也稱禹之德者首曰明明我祖此九德所以咸事俊乂所以在官也稱湯之德者首曰天錫勇智此三宅三俊之所以即宅即俊而德懋功懋之所以懋官懋賞也至於稱文武之德者首曰宣哲維人曰世有哲王又曰克知三有宅心灼見三有俊心此庶獄庶慎之所以罔攸兼而罔敢知而義德容德之所以不敢替而惟謀從也是皆言明而斷在其中矣夫以二帝三王之世所稱得人之最盛者而要皆本於知人之明且斷有如此則用人之必要於明斷也此非其明驗大證哉蓋明則如寶鏡之照物而妍媸立見斷則如鋼刀之削鐵而沾滯不形由是羣小屏迹衆正盈廷君德奚患其不新治道奚患其不隆乎書經任官惟賢才左右惟其人臣為上為德為下為民其難其慎惟和惟一監察御史臣陸尹耀張氏九成曰尹欲堯舜其君則為上為德可知欲堯舜其民則為下為民可知臣謹按君臣一德夫行道而有得於心謂之德則君臣之一德正君臣之一心也一者誠也真實無妄純一不雜之謂也君臣各有真實無妄純一不雜之心以成其德則君修其新德之功臣效其新德之助君臣相與之際一天心之相命而已矣此伊尹所以勗嗣王以用人之道並告以臣職之重而察之務欲其精任之務欲其專以明一德者當如是云夫人君莫不欲日新其德而有初鮮終者大約由於衡鑒之不精而君子與小人並用君子之勢恆不敵夫小人始則並蓄而兼庸繼則相傾而偏勝小人遂得操其逢迎阿諛之術以蠱惑夫君心於是君德不間斷於已者必間斷於人以求其日新也難矣是故庶官左右均當重其選也夫庶官者後先奔奏之材也知從特達採自旁求試經盤錯之地拔起儕偶之中果賢且才也舉而用之可也左右者公孤卿尹之選也正己足以率物忠讜足以格非訏謨足以定國是碩畫足以建太平置諸凝丞保輔之班藉以彌縫其闕托以股肱心膂之寄賴以匡救其災果其人也委懷聽之可也若是君德固無間於臣矣而臣德亦無間於君焉蓋臣職雖分大小臣心總無他念言乎為上則隨時納誨因事效忠輔其德而不阿其意之所好言乎為下或調燮於內或承宣於外利其民而不狥乎己之所安心之所主惟於二念洵乎為一德之臣矣然此臣也正於君德之純雜卜去就焉是以未用之先量能而授論定而官進賢如不得已焉不以一節信其生平不以小眚掩其大德毁譽務察其真焉其難其慎如此既用以後委心聽順形迹不存有相濟無相疑也專意責成讒間不入觀厥始信厥終也惟和惟一又如此是君以一德倡臣以一德應於是君子嚮用小人退聽資其為上為德為下為民之心以堯舜吾君堯舜吾民而明良喜起如登堯舜之廷焉而後祖宗之基業可承生民之屬望可慰上天之付託可膺則君臣之一德非君臣之一心哉書經臣為上為德為下為民編修臣蔣元益臣謹按帝舜之謂禹曰臣哉鄰哉鄰哉臣哉又曰豫欲左右有民汝翼是則臣也者君之所藉以為輔民之所待以為治者也自昔帝臣王佐丕績嘉猷光昭宇宙綜其大端要不外致君澤民二者而已請即伊尹所稱為上為德為下為民者進而繹其說焉夫事君之義無所逃於天地夙夜匪懈以事一人凡以為君也乃不曰為上為君而曰為上為德者何歟蓋惟皇建極惟辟奉天天所賦者謂之德存之為仁義禮智措之為禮樂政刑極其用則被於四海九州原其端則肇於起居出入古之大臣左右厥辟明其道以明君之道以聖人之訓為必當從而不敢為流俗因循之論以先王之治為必可法而不敢為曲學阿世之私其敷奏朝廷之上獻替惟殷即從容閒燕之時啓沃倍切臣之為上如此君之德有不日新者哉君德日新而君之道盡則臣之道亦盡矣至於天生民而立之君使司牧之是民所仰治者惟君君所贊治者惟臣君代天理物臣代君宣猷義相需也而古大臣之心則惟引為己責而不敢委為君之責不惟憂民之憂而并慮貽吾君之憂其勤勤惻惻之意惟恐民瘼之不上聞民隱之未易燭蓋至胥天下而登之衽席而猶懼不足以對揚休命焉孟子曰禹思天下有溺者由己溺之也稷思天下有飢者由己飢之也伊尹嘗自言一夫不獲時豫之辜蓋必如是而後可云為民也非然者膺股肱心膂之寄而無康乂懷保之忱國家安賴有是臣而臣亦何以靖共爾位哉夫由臣而上之為君由臣而下之為民臣者上下之交責之所萃也使為臣者以伊尹之心為心致吾君於勳華躋斯世于仁夀一德交孚上下胥賴豈不休哉書經臣為上為德為下為民監察御史臣沈廷芳蔡沈曰人臣之職為上為德左右厥辟也為下為民所以宅師也臣職所係其重如此真德秀曰為云者意有所主之名言人臣之心為上則為君成德為下則為君牧民意之所主惟此二者二者之外不雜他念然後為一德之臣臣謹按四為字有念兹在兹主一無適之意人臣之心舍致君澤民之外而别有所為則身家利祿之念切而忠藎篤棐之志衰必先精白乃心而後可以無忝厥職當量而後入之時欲自命為純臣宜自審所為始特是稍有建白無不曰吾以為君偶有展布無不曰吾以為民而迂疏之學術何以上裨於宸聰淺隘之措施何以下愜乎民隱不足云為德詎可云為上乎不足云為民詎可云為下乎書有之豫弗克俾厥后惟堯舜其心愧恥若撻于市此伊尹之為上為德也一夫不獲時豫之辜此伊尹之為下為民也然則才識逺不逮古人者將何以自效哉亦曰實盡其心而已夫茍不狥私不計利不邀名不市惠其心既别無所為矣則格心之啓沃為霖雨為鹽梅固曰為上為德即芻蕘之獻替工瞽之針規亦無非為上為德也膺養恬之任惟敕懋和惟畢棄咎固曰為下為民即一方之保障一時之振育亦莫非為下為民也且夫為上為下亦豈有二道哉夙夜緝熙之學非淺近所能窺深宫懋勉之功非臣工所能贊惟是效官分職存心利物于民必有所濟不徒托諸空言務有以見之實效故凡實心為上未有不為民者實心為民未有不為上者進豳風之頌陳無逸之謨繪監門之圗上千秋之鑑君德日新萬方樂業為民之至即所以為上為上之切乃所以為民分而言之若有二端合而言之其理則一貫者也惟有不二不雜之心斯建有猷有為之績精神聚則識見因之而開志慮堅則才力因之而奮人臣致君澤民之道無他誠而已矣用人而曰其難其慎者無他誠與不誠必察之而已矣誠也者上祗有君下祗有民所謂念兹在兹主一無適者此也御覽經史講義卷十一
