  text: 欽定四庫全書御覽經史講義卷十六目録
  hash: sha256:affdb62c5747f2c60233b9a2457ff1d7e2e3100d03541224db0fb80766ed7080
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_022-1a, image: WYG0722/WYG0722-0170a.png}
body:
  text: 詩經民之質矣日用飲食羣黎百姓遍為爾德編修臣徐文煜編修臣羅源漢民之質矣日用飲食修撰臣金甡編修臣徐瑋我車既攻我馬既同四牡龐龐駕言徂東田車既好四牡孔阜東有甫草駕言行狩之子于苖選徒囂囂建旐設旄摶獸于敖駕彼四牡四牡奕奕赤芾金舄會同有繹决拾既佽弓矢既調射夫既同助我舉柴四黃既駕兩驂不猗不失其馳舍矢如破蕭蕭馬鳴悠悠斾旌徒御不驚大庖不盈之子于征有聞無聲允矣君子展也大成監察御史臣沈世楓鴻鴈美宣王也萬民離散不安其居而能勞來還定安集之至于矜寡無不得其所焉編修臣王會汾鶴鳴于九臯聲聞于野魚潛在淵或在于渚樂彼之園爰有樹檀其下維蘀他山之石可以為錯鶴鳴于九臯聲聞于天魚在于渚或潛在淵樂彼之園爰有樹檀其下維榖他山之石可以攻玉檢討臣張鵬翀鶴鳴于九臯聲聞于野魚潛在淵或在于渚監察御史臣髙景蕃莫髙匪山莫浚匪泉君子無易由言耳屬于垣監察御史臣陳仁靖共爾位正直是與監察御史臣張湄信彼南山維禹甸之畇畇原隰曽孫田之我疆我理南東其畝給事中臣衛廷璞我疆我理南東其畝編修臣湯大紳給事中臣汪榯監察御史臣馬燝倬彼甫田歲取十千我取其陳食我農人自古有年今適南畝或耘或耔黍稷薿薿攸介攸止蒸我髦士監察御史臣馬燝我取其陳食我農人自古有年編修臣馮祁曽孫來止以其婦子饁彼南畝田畯至喜攘其左右嘗其㫖否禾易長畝終善且有曽孫不怒農夫克敏給事中臣羅鳳彩大田多稼既種既戒既備乃事以我覃耜俶載南畝播厥百榖既庭且碩曽孫是若檢討臣吳泰大田多稼既種既戒既備乃事監察御史臣馬燝有淹萋萋興雨祁祁雨我公田遂及我私彼有不穫稚此有不斂穧彼有遺秉此有滯穗伊寡婦之利編修臣王錦
  hash: sha256:c245d71e2c9242d98224caa7253e1296084dec6bfa97c4acdd5bbdde9a5a975a
