front:
  text: 欽定四庫全書御覽經史講義
  hash: sha256:4a530d416e63586e261ba345e15cc4b68bb509f87d5e59c416a4cbea0df760e2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_001-1a, image: WYG0722/WYG0722-0125a.png}
body:
  text: 奏議總理事務和碩莊親王臣允祿等謹奏為遵旨議奏事給事中畢誼奏請令史臣取經史諸書及古來奏議日派二人各寫數幅進呈等因一摺奉旨朕在潛邸六經諸史皆常誦習自承大統敕毖萬幾少有餘間未嘗不稽經讀禮今祥練既逾畢誼所奏令諸臣日繕經史奏議理得施行在朕廣挹羣言可以因事監觀隨時觸發而覽諸臣所進亦可考驗其學識或召見講論則性資心術並因此可覘但畢誼止及史臣而朕意科道職司獻替應令一體録呈其規條應如何酌定並分日按班呈奏事宜著總理事務王大臣定議具奏欽此臣等竊惟一人者普天率土之心也一人之心百司萬姓之命也舉心之所向耳目手足下至毛髮涕唾莫不聽令從欲以羣相託命此自然之道也其有不然特未之思耳是故道統心心職思思本學學由習三代而還賢聖之君代作要未有不學而能不思而得從心中道而盛德大業昭垂來兹者時習之功蓋不獨儒生然矣欽惟我皇上聖資天錫好古敏求懋學敦行一歸實踐自聖經賢傳以及儒先之緒論子史百氏之嘉言莫不探其根源挹其精藴是以發為文章施諸政教者幾與三代同規而虛衷採納覽科臣畢誼所奏輒嘉與之特命翰詹科道日繕經史奏議進呈此即虞舜好察邇言之實周文望道未見之心也臣等欽承之下曷勝感慶惟是六經深廣道貫精粗諸史放紛事兼巨細至於往代名臣奏議多可監觀然亦有論一事之情形陳當年之弊政而無當於時務者凡所採録必具得要領實有啓沃然後日力不費而裨益良多若不先定指歸使知所遵循恐學殖疏淺性資選愞者漫陳膚語茍以塞責則有辜盛典終屬虛文謹酌定規則分别詳列伏候聖裁一詩書易禮記周禮擇有關於天德王道者春秋三傳擇聖人定是非之難辨以植綱常者先標經文下注先儒義疏一諸史內擇用人行政實有關於治亂安危者節略史文下注先儒史斷一奏議必擇伉直剴切寓目警心濟於實用者或其辭意繁委亦得芟剃支蔓獨提其要一經史奏議既經繕録必各有所見應附列所見用臣謹按云云一段於後一逐日進呈不拘條數約以千言為度經史奏議隨意敷陳不必各項俱備亦不必拘經文次序及時代先後所録皆古人成言可無忌諱一翰林詹事為一班科道為一班輪班進摺每日只用一人周而復始翰詹自講讀學士少詹事迄編檢而止其科道之不由科目者各自忖所學滿洲科道清漢文俱準繕録於每日辦事引見後到奏事處進呈候旨凡值不進本日期則停其進奏一諸臣進奏或蒙召見原以驗其學識廣其心志俾得成材備用宜各就所見繕寫封進不得彼此商酌乾隆二年三月二十七日奉旨依議每日繕進書摺朕披閲後交南書房收存其或召見講論朕所降旨令本人於次日繕寫呈覽亦交南書房收存將來行之日久不特集思廣益亦可薈萃成書以資觀覽欽此乾隆十四年正月二十六日監察御史金相奏稱翰詹科道分班進書人數多寡不齊請均勻輪派等語奏旨金相此摺著大學士會同都察院議奏至進呈經史一事朕初意欲博綜古義廣挹羣言以成執兩用中之治且可因言觀人究悉諸臣學識之髙下心術之真偽其有闌入時政於事理未當者間加訓飭自舉行以來諸臣按日奏御朕一一披閲十餘年於兹矣所稱洞達天人發明道奧者亦殊不槩見兹據御史金相奏稱分班進書人數多寡不齊請均勻輪派則是以進書為煩苦朕前亦聞有此論而不信今金相既顯為此言是諸臣未必不各有此見且已行之十餘載漸成故套進呈經史之處著停止所有積年留存諸摺交南書房翰林擇其有裨經義政治者薈萃成編用廣中祕之藏朕將親覽焉欽此
