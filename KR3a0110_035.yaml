front:
  text: 欽定四庫全書御覽經史講義卷二十九目録
  hash: sha256:07390361f0534f9f5fb693ab25a927bb107c6cdb806ddb0d7f6caacd1e5f6cec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_035-1a, image: WYG0722/WYG0722-0196a.png}
body:
  text: 史宋太祖坐寢殿令洞開重門皆端直軒豁無有壅蔽謂左右曰此如我心稍有邪曲人皆見之監察御史臣馮秉仁宋太祖開寶三年徴䖏士王昭素為國子博士昭素酸棗人有學行宋主召見便殿年已七十餘問以治世飬身之術對曰治世莫若愛民飬身莫若寡慾宋主愛其言書於屏几監察御史臣舒赫徳宋太平興國二年賜吕䝉正等及第侍講學士臣于振宋太宗太平興國二年春二月賜禮部進士吕蒙正等及第監察御史臣孫灝宋太宗觀燈於乾元樓語近臣曰五代之際生靈凋喪當時謂無復太平之日朕躬覽庶政萬事粗理每念上天之貺致此繁盛乃知理亂在人吕䝉正避席曰乘輿所在士庶走集故繁盛如此臣嘗見都城外不數里饑寒而死者甚衆願陛下親近以及逺蒼生之幸也監察御史臣陳仁宋太平興國八年上謂吕䝉正曰古所謂君臣道合者情無間耳凡士未達見當世之務戾於理者則怏怏於心及列於位得以獻可替否當盡其所藴言雖未必盡中亦當僉議而更之俾協於道朕固不以崇髙自恃使人不敢言也檢討臣胡定宋太宗雍熙元年春正月求遺書時三館所貯遺帙尚多乃詔募中外有以書来上及三百卷當議甄録酬奬餘第卷帙之數等級優賜不願送官者借其本寫之由是四方之書間出矣右庶子臣彭啟豐夏四月江南饑遣使賑之編修臣王覺蓮帝謂秘書監李至曰人君當淡然無欲勿使嗜好形見於外則姦佞無自入朕無他好但喜讀書多見古今成敗善者從之不善者改之如斯而已矣賛善臣宋楠檢討臣周孔從給事中臣馬宏𤦺帝嘗以李沆無密奏謂之曰人皆有密啟卿獨無何也對曰臣待罪宰相公事則公言之何用密啟人臣有密啟者非讒即佞臣常惡之豈可效尤監察御史臣張惟寅王曽嘗以大臣執政不當收恩避怨曰恩欲歸已怨使誰當聞者歎服侍讀學士臣張若靄富弼知青州河北京東大水民流就食青州弼勸所部民出粟益以官廩得公私廬舍十餘萬區散處其人以便薪水又山林川澤之利可資以生者聽民擅取凡活五十餘萬人檢討臣蒋允焄以胡瑗為國子監直講瑗既居太學其徒至不能容取旁官舍處之禮部所得士瑗弟子十常居四五随材髙下喜自修飭衣服容止徃徃相類人遇之不問可知為瑗弟子也編修臣徐以烜宋仁宗嘉祐元年十二月以包拯知開封府拯立朝嚴毅貴戚宦官為之歛手聞者憚之以其笑比黄河清童穉婦女亦知其名呼曰包待制編修臣楊述曽仁宗嘉祐二年以翰林學士歐陽修知貢舉編修臣沈徳潜宋孝宗言難得辦事之臣右文殿修撰張栻對曰陛下當求曉事之臣不當求辦事之臣若但求辦事之臣則他日敗陛下事者未必非此人也監察御史臣熊學鵬冬十二月下朱熹社倉法於諸路監察御史臣劉方藹宋真徳秀奏議云惟學可以明此心惟敬可以存此心惟親君子可以維此心箴監察御史臣錢𤦺明宣宗宣徳七年揭豳風圖於殿壁少詹事臣裘曰修
