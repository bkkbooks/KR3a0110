front:
  text: 欽定四庫全書御覽經史講義卷二十二目録
  hash: sha256:863a2fc03f7b869ae75bcb7c25d7718a8779c453dee330ecc4c4b6989d035181
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_028-1a, image: WYG0722/WYG0722-0181a.png}
body:
  text: 禮記盛德在木編修臣陸嘉頴是月也天子乃以元日祈榖于上帝乃擇元辰天子親載耒耜措之于參保介之御間帥三公九卿諸侯大夫躬耕帝藉監察御史臣馬燝聘名士禮賢者編修臣任端書命野虞毋伐桑柘鳴鳩拂其羽戴勝降于桑監察御史臣胡寶瑔命野虞出行田原為天子勞農勸民毋或失時命司徒循行縣鄙命農勉作毋休于都給事中臣鍾衡命農勉作毋休于都監察御史臣胡寶瑔仲夏之月律中蕤賓君子齊戒處必掩身毋躁止聲色毋或進薄滋味毋致和節耆欲定心氣百官靜事毋刑以定晏隂之所成侍講學士臣任啓運君子齊戒處必掩身毋躁止聲色毋或進薄滋味毋致和節耆欲定心氣百官靜事毋刑以定晏隂之所成檢討臣程恂天子乃與公卿大夫共飭國典論時令以待來嵗之宜編修臣羅暹春聖人參於天地並於鬼神以治政也處其所存禮之序也玩其所樂民之治也故天生時而地生財人其父生而師教之四者君以正用之故君者立於無過之地也監察御史臣周祖榮動則左史書之言則右史書之侍講臣彭啓豐銘編修臣程景伊知類通達強立而不反謂之大成夫然後足以化民易俗近者説服而逺者懷之編修臣邱柱大學始教皮辨祭菜示敬道也宵雅肄三官其始也入學鼓篋孫其業也檢討臣李金臺大學之法禁於未發之謂豫當其可之謂時不陵節而施之謂孫相觀而善之謂摩此四者教之所由興也編修臣宋邦綏
  hash: sha256:710d0da9d5170e91d4ce7becfe2c6991107a876d5e356003cb1725e93aa05888
