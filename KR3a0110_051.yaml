  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_051-1a, image: WYG0723/WYG0723-0259a.png}
body:
  text: 書經君子所其無逸修撰臣錢維城臣謹按此周公將陳戒成王而言君道之必本於乾惕也王者以天下爲家以億兆爲身將使天下之大無一物不得其所故天下之安乃其安而一身之勞非云勞也臯陶曰兢兢業業一日二日萬幾孔子曰爲君難誠知其難而兢業以臨之自有一息不敢康者雖欲自暇自逸得乎臣觀從來國家當草創之際天時未盡協和人心未盡安戢土地未盡豐穰戸口未盡繁滋其時人主側席而疇咨人臣竭蹶而幹濟雖危疑偶見而不能揺磐石之勢及其既也治安已成民物熙穰國用饒足百祥告休業盛功崇拱手無事天下大治矣而禍患或且中之何也豈守成之難果難於創業哉其先不期勞而勞其後不期逸而逸也故無逸之戒不陳於武王克殷之始而陳於成王親政之初蓋誠有見於治亂之相生而兢兢於持盈保泰之道也伊尹之所以告太甲者亦然自是而下厯觀往代莫不治於兢惕危於怠荒治亂之關理出一軌非可誣也漢文帝力崇勤儉賈山且有墮事怠政之諫賈誼復爲太息流涕之言唐太宗勵精圖治魏徴猶有十思十漸之疏此皆深識遠慮圖於未然安益求安之道也夫位不期驕祿不期侈雖貴賤懸絶揆之人情未甚相遠嘗見力田之民終歲勤動不敢少休及其倉箱旣盈婦子寧止尚思烹鮮擊肥斗酒自勞若夫唐風之戒太康豳詩之亟播穀者蓋亦寡矣何况天子富有四海天下承平休徵協應而欲握六轡如朽索履康莊若春氷不亦難乎故曰大業者易驕願有以難之善始者難終願有以易之也書經君子所其無逸檢討臣夢麟臣謹按帝王之統堯舜爲隆道法之源唐虞最上迹其邁往古示後世者一曰欽明一曰溫恭辭雖不同而惟敬足以盡之蓋人主以一身係天下之重則必以一心任天下之勞精氣運而日强元氣凝而愈固易曰終日乾乾詩曰緝熙敬止胥是道也在昔成王嗣服承大定永清之後内則周傅召保夾輔王室外則同姓異姓屏藩王家爲之上者不亦可以清淨淡泊端拱無爲以稍自暇逸乎乃家相陳謨獨首揭其理於無逸意良深矣今夫無逸之戒正非在共見難持之地也創造之始日不暇給廟堂之際體統攸嚴此其易見者也惟是清寧閒晏之會則坐享太平深宫高拱毋亦人情所或有乎君子知之力返乎人情所易流而察之以密力持乎人情所難制而守之以恒其無怠無荒不以爲勉强之地而以爲宅心之適也曰明曰旦不以爲偶然之境而以爲汝止之安也逸尚胡自生哉臣伏而思之是蓋有本焉天行常健健則無可逸之幾人心惟危危則無可逸之事東萊呂祖謙曰凡人乍勤乍惰亦有無逸之時然可暫而不可居居之云者蓋言所也故一物未接此心恒兢兢而不敢弛萬幾迭呈此心亦惕惕而不敢縱夫豈好勞哉蓋惟君子而後有心逸日休之學亦惟君子而必無一息或間之功也唐宋璟進無逸圖季世猶或稱之况臣生逢盛代沐浴咏歌雖不能仰名天日而芻蕘之言應亦聖世所不棄也謹採先儒之義成無逸箴一首以獻其辭曰遐觀往牒式啟遥編惟王建國惟聖法天聲律身度慮後見前厥極匪建德胡崇焉建極維何功歸聖主握乾之綱爲民之父衣可釋也宵誰促汝食以時也旰乎奚取毋曰甚微大所由歸毋曰遲遲細者鉅基豈必縱欲欲兮已馳豈必極樂樂已不支厥本弗謹末將安施一十六字寧無謂爲廟則肅肅宫則雝雝豈伊非聖而毖厥功穆穆我皇治殊道同晨雞之鳴階籌之聲豈伊好勞而攝厥精穆穆我皇健協天行曰魚於水曰獸於林闢爾曠宅饜理愜心厥止有常維上其臨臨之伊何無偏無頗承以惕厲報以淳和小臣稽首矢音孔多書經嚴恭寅畏天命自度編修臣竇光鼐臣謹按周公稱無逸之君首及中宗而稱中宗之德必以嚴恭寅畏爲先嚴則莊重禮所稱莊敬日强是也恭則謙抑詩所稱温温恭人維德之基是也寅則欽肅書所稱夙夜惟寅是也畏則戒懼易所稱恐懼修省是也合之則一敬而已矣而繼之曰天命自度何也天者道之原也命者天之令也知天則知人知命則知性矣書曰勅天之命惟時惟幾蓋謂此也天命無形何以曰度自度云者返求諸身焉爾董仲舒曰天人一也又曰人之受命化天之四時人生有喜怒哀樂春夏秋冬之類也喜春之答也怒秋之答也樂夏之答也哀冬之答也天之副在乎人人之性情有由天者矣爲人主者道在乎省身之天由是言之人誠明乎在身之與天同者而省之又省使喜怒哀樂之中節如寒暑往來之當時則日用之間無非天命之行矣蔡氏沈曰天命卽天理也天於物無不體故出王游衍皆敬理於事無不在故三千三百皆仁孔子曰非禮勿視非禮勿聽非禮勿言非禮勿動此自度之實也抑考詩書所載古人所以自度者有三焉不識不知順帝之則生安者之自度也檢身若不及學利者之自度也若虞機張往省括于度則釋困勉者之自度也而皆以敬爲主傳曰敬德之聚也謝氏良佐曰敬是常惺惺法惺惺者心之生道而天人流通之關也史稱桑穀共生於朝大戊懼而修德非天命自度之一驗與天之視聽在民治民祗懼不敢荒寧則亦敬而已矣唐貞觀十一年令百官上封事魏徵疏曰見可欲則思知足將興繕則思知止處髙危則思謙降臨滿盈則思抑損遇逸樂則思撙節在宴安則思後患防壅蔽則思延納疾讒邪則思正己行爵賞則思因喜而僭施刑罰則思因怒而濫人主兼是十思其有違理者寡矣理之所在皆天也人不違天斯天不違人矣故曰夙夜基命宥密書經文王卑服卽康功田功徽柔懿恭懷保小民惠鮮鰥寡自朝至于日中昃不遑暇食用咸和萬民監察御史臣葛德潤臣謹按無逸一篇宋儒吕祖謙解之詳矣臣嘗推衍其說夫所謂文王卑服卽康功田功者卽大禹之卑宫室而盡力乎溝洫也物不能以兩大厚於自奉卽薄於恤民文於衣服自奉之物所性不存而專意於安養斯民是能直接大禹之傳而前後聖人之心無弗同也蓋文王有柔恭之德而極其徽懿之盛和易近民故視民如子不啻保赤之誠而民之窮而無告者用能惠綏之莫不鮮鮮然有生意也然文王之心豈敢自以爲足哉自朝至于日中自日中至于日昃一食之頃有不遑暇於以咸和其民使無一夫之不得其所焉蓋汲汲乎求寧觀成之心也立政言文王罔攸兼于庶言庶獄庶愼則所謂不遑暇食者其勤勞自必有在豈若後世量書傳餐代有司之任者哉讀無逸則見文王之勞讀立政則見文王之逸豈相爲矛盾哉於至勞之中有至逸於至逸之中有至勞也抑不獨三代之君爲然也漢文帝躬行節儉身衣弋綈所幸愼夫人衣不曵地帷帳無文繡以示敦樸爲天下先是以海内安寧家給人足光武每旦視朝日昃乃罷數引公卿郎將講論經理夜分乃寐皇太子勸帝頤養精神帝曰我自樂此不爲疲也唐太宗聽朝之暇與學士討論古今成敗或日昃夜艾未嘗少怠故能致貞觀之治夫此數君者得聖人之意而用之而物阜民康其效彰彰如是况純亦不已如文德哉周公於成王逸豫之心未萌而其諄諄告誡已如此其言商周而詳及於文王蓋舉耳目之所逮而望王之法祖也至矣詩之頌成王曰成王不敢康而卽繼之曰於緝熙單厥心肆其靖之蓋有得於周公之敎云書經文王卑服卽康功田功侍講學士臣蔣溥蔡沈曰康功安民之功田功養民之功言文王於衣服之奉所性不存而專意於安養斯民也卑服蓋舉一端而言宫室飲食自奉之薄皆可類推臣謹按周以穡事開基后稷敎稼肇祀有邰公劉徹田克篤前烈罔不惟民之勤迨二公分陜六州歸化而怙冒升聞焉是以肇造區夏斷自文王周公進陳無逸首舉文王之康功田功誠以天降下民必賴有胥匡以生者亶聰首出天即以萬民之命寄之元后上承天命下顧民岩一夫不獲即屬己辜不爲之選賢與能禁奸戢暴則民無以安不爲之制産授田省耕省歛則民無以養顧以兆民之衆寒者欲衣饑者欲食鰥寡孤獨者欲得其所勞來匡直歲月無可竟之功養欲給求要荒無可遺之類一事之區處即係生民之休戚一時之規畫即兆數世之安危此爲君之難而文王之所以惟康功田功爲兢兢也其必卑服即功者亦非有心崇節儉之文也予之民者厚則奉己不得不薄爲民計者周則自爲不得不儉惟意有專營故力無旁貸人徒見作豐出治之日化洽汝墳風流江漢鳳鳴於岡麟遊於圃以爲天眷有周而不知四方之和會萬室之盈寧悉本於文王殫精竭慮夙夜焦勞舉耳目口體之奉總不分其心力以致之者也而臣於此想見文王之勤民有􅍀然不自足之心焉蓋人主處崇髙之位無由徧歴閭閻之纖悉而小民盛夏力作窮冬暴露裋褐不完藜藿不充之况不得向堂陛而訴其情是以自古明哲之君必周知稼穡艱難務以民事爲重所欲與聚所惡勿施不敢以一身之逸妨小民之依名以天下奉一人實以一人養天下終日乾乾不敢暇逸創業守成道無二致文王所以光十四王之統緒開八百歲之丕基者其緝熙無己之心有可想見者矣昔周公命太史陳豳風繪王業之艱難也進無逸先言太王王季之抑畏者明艱難之業所自綿長也雅頌咏歌文王之德曰勤止又曰小心翼翼何莫非抑畏之心也歟然則無逸之篇允宜與豳風並奏矣書經文王卑服即康功田功編修臣楊開鼎臣謹按立君所以牧民牧民之道稼穡爲先而必率之以節儉故安國孔氏曰文王節儉卑其衣服以就其安人之功以就田功頴達孔氏曰安人之内田功最急故特云田功蓋周自有邰肇國釐爾成法而茀草樹藝之功以興代傳而至公劉所以俾几筵者執豖酌匏也又代傳而至亶父所以爲居室者陶復陶穴也夫公劉亶父皆有土之君而躬行節儉如此豈過爲樸陋哉蓋疆理宣畝凡所以肇基王迹者已覘其槪矣文王承維新之命用康兆民先使六州之人春于耜夏其芸秋其穫冬而養老娯賔修禮報賽旣庶旣繁之象不獨在岐陽豐水之間而書先言卑服則文王親民端本之意已具見於服御之微蓋日御纖羅綺縠則必樂爲宴遊而宫室臺榭無不稱是甚之輿馬鷹狗快其志聲色貨利蕩其心而服其小焉者矣賈誼謂生之有時用之無度則物力必屈可不戒哉且人君驕奢之習不必盡蹈三風十愆之轍也逸欲偶萌不及檢察卽爲盛德累是在杜漸而防微也至於勤民之道當思久安長治而不得狃於目前雖水旱之災盛世時有而惟敬可以挽天心惟勤可以立民命克艱厥后克艱厥臣卽野無菜色而視民如傷正無容補苴旦夕潤色太平謂可少弛其責也管子曰倉廪實而知禮節衣食足而知榮辱史稱漢文帝生養旣渥六七十老翁遊戲如嬰兒其所由來者遠矣臣生長東南沮洳之區習見祖父於溝塍之間宣洩以備旱澇而自耻淮揚之俗習染奢侈致損蓋藏一遇凶荒遂厪九重宵旰之憂議賑議蠲動盈千百萬雖天庾内帑在所不惜而要未可常恃也生其地者惟上感天澤下恤物力以仰副聖主重農貴粟與却衣減膳之盛心而已臣退直之暇披閲舊史見有大書特書與皇上撙節愛養之心相符者敬謹錄之或一君而叠舉數事或一君而特舉一事衍爲四言謬作十箴蓋寧爲樸質不敢以繁縟之詞溷凟聖聰也萬幾之餘間賜流覽臣不勝悚惕戰懼之至勸農詔漢文帝詔曰農天下之大本也民所恃以生也而民或不務本而逐末故生不遂朕今親帥羣臣農以勸之質爾人民稼穡是資玉不衣寒珠不食饑假哉令主宵旰疇咨奇技淫巧民不之飽逐末居奇民事以擾杏花菖葉秉耒其蚤乃亦有秋旣堅且好於時漢始瘡痍乍起克殫田功徧錫爾祉紹此淵懷後之君子罷露臺漢文帝嘗欲作露臺召匠計之直百金上曰百金中人十家之產也吾奉先帝宫室常恐羞之何以臺爲伊惟太古茨茅階土代越而澆宇峻墻雕有璇其室有鉅其橋宏我漢京露臺以營計直百金而胡弗成帝心惟約爰諏爰度中人十家得此孔樂臺榭陂池毋於我作衣弋綈漢文帝身衣弋綈帷帳無文繡以示敦樸爲天下先汝明作會藻火宗彛維厥燕居匪此之宜曷澣曷否色惟其緇弋綈率下六宫爲化衣不曳地侈靡盡謝樹亦纏繒國益之貧鑒兹罔佚俗厚風淳焚雉裘晉世祖時太醫司馬程據獻雉頭裘帝以奇技異服典禮所禁焚之於殿前孟冬之月天子始裘取狐于貉曷爲雉頭雉頭之獻日事淫巧帝曰斥之無使滋擾羊車竹葉令德鮮終惟此焚裘典禮攸崇九章法服罔或不衷藏農具宋髙祖命藏微時農具以示子孫文帝至故宫見有慚色近侍或進曰大舜躬耕歴山伯禹親事水土陛下不覩遺物安知先帝之至德稼穡之艱難乎維宋之祖天授厥武起自農家耰耡爲伍詔留故物不忘勤苦孫子其賢珍之内府孫子其愚對之意忤葛燈麻拂詆侮前王嗟哉宋綱其曷以長不觀先世貽謀克臧庤乃錢鎛職思其康碎介導齊髙帝清儉不御精細之物敕中書舍人桓景眞曰主衣中似有玉介導留此置主衣正是興長疾源可卽時打碎侈淫成過機不在大象箸先之玉杯從之先民有作顧而嗟咨爰有介導精瑩朗耀爛然盈目駴雞鑒貌命彼主衣碎而屑飛棄雕斥鏤用以防微由此十年金土同價理若近誣事亦可藉以儉率民民無不化吞飛蝗唐太宗入大苑中見有蝗數枚祝之曰民以穀爲命而汝食之耶遂吞之是歲蝗不爲災禮有貓虎俗有豚蹄何來螟螣繁衍青畦厥有賢王掬而吞之宣之雲漢湯之桑林籲天天應雨玉雨金唐祚三百此綿其脈如疾之憂民胡不瘳像耕織周世宗留心農事嘗刻木爲耕夫蠶婦置之殿庭時値五季耕桑赤地有周世宗殷然動意瞻乃殿東誰之爲容懿筐一婦荷笠一翁時時蠶月念念豳風似此君心何用不寧魚龍角觝曼延一庭菽粟不辨彼則何人止燒羊宋仁宗嘗曰朕昨不寐思食燒羊恐遂爲例故忍一夕之饑嘗有獻蛤蜊二十八枚枚値錢千上曰下一箸費二十八千吾不堪也惟王玉食醯醢胥飭禮著其隆欲戒其極索以非時非時必供雜以異味惟令是從假云果腹豈曰非酷忍此須臾作邦之福觀刈麥宋仁宗御寶岐殿觀刈麥謂輔臣曰朕作此殿不欲植花卉而歲以種麥庶知稼穡之艱難也在昔離宫駭綠紛紅寶岐在宋塍港交通髙低偃仰麥浪搖風亦有内臣腰䥥以往露積委棲天懷用爽何彼後王不此之䇿艮嶽經營東南花石曷不法祖來咨來茹不耕何獲不菑何畬奄觀銍艾君子樂胥書經又曰天不可信我道惟寧王德延天不庸釋于文王受命監察御史臣李㥳蔡沈集註曰上文言天命不易天難諶此又申言天固不可信然在我之道惟以延長武王之德使天不容捨文王所受之命也臣謹按天人之相去匪遙而感通甚微責在於人功本於道而其原亦惟以法祖之誠致敬天之實君以是任之臣以是輔之上下交儆凝命之道其在是矣昔周公之告君奭者曰天不可信若以天心誠難必矣又曰我道惟寧王德延天不庸釋于文王受命若又以無不可必者何也蓋天命靡常歸于有德德者君極之所由修廢亦天命之所由去留也彼周之命受于文王而實受于怙冒之一心延于武王而實延于徂定之一念文武以是盡君道即以是凝天命亦即以是裕後昆周公以是修臣職即以是佐君德亦即以是朂同僚臣以爲稽其凝承之由考其垂裕之實溯其君臣率循之原繹其左右交惕之志是可以得天人相與之微焉天無私覆恒眷顧于求莫之主命實難諶惟簡畀于式敎之后彼後之東封西祀祈天永命者非計也可以得祖宗貽謀之道焉盛衰難期而爲之自己者則可必賢否難強而善之畫一者自可師彼後之拓土開疆侈言善後者非計也篤棐之忠莫如元聖而夙夜之凛凛者一則曰世德作求再則曰敷時繹思是知臣工之引君當道有其本焉彼後之變亂舊章與託名紹述者俱非也同朝之誼義同共濟故勸勉之殷殷者進則曰共佐聖明退則曰有負先王是知百爾之同寅協恭有其道焉彼後之勢位相軋與各植私人者俱非也然則聖世之君臣一言一動無不曲當其爲萬世之烱鑒者抑又深遠矣書經天不可信我道惟寧王德延天不庸釋于文王受命監察御史臣薛澂臣謹按人主撫有天下所以久安長治而奠社稷於磐石措國祚於苞桑者不惟有高世之才過人之識而實恃宜民宜人之至德有以當天心而凝天命蓋厥心惟危者厥位惟安而無疆惟恤者自無疆惟休也書曰天不可信所謂天難諶斯不易惟王也曰我道惟寧王德延天不庸釋于文王受命所謂首出庶物萬國咸寧也仰觀天道俯察人事熟思夫鑒觀求莫感格昭受之原而知天人相與之際甚可畏也蓋治亂有循環之數泰否有倚伏之機而制治保泰總非德不爲功惟聰明睿智之君顧念㝠㝠者天也昭昭者亦天㝠㝠故難測昭昭故易格於焉以敬勝怠以義勝欲亦臨亦保之精神有以紹先聖日就月將之學問足以啟後昆由是本德以爲養而養爲善養本德以爲教而教爲善教將見至德翔洽治化洋溢陰陽和風雨時憲憲令德旣足以克配彼天自足以受天百祿而且執競惟人者亦自强不息則德日進而命亦日新德有常而命亦不已燕及皇天克昌厥後子子孫孫勿替引之蓋君之畏天若嚴父而不敢䙝則天之愛君若赤子而不忍釋然則惟德動天惟天眷德聿修厥德長發其祥事有必至理有固然不可易者唐臣魏徵有言思國之安者必積其德義誠與書言相發明而萬世君人者之所當念兹在兹者與書經愼厥麗乃勸厥民刑用勸侍讀臣鄂容安蔡沈曰湯深謹其所依以勸勉其民故民皆儀刑而用勸勉也人君之於天下仁而已矣仁者君之所依也君仁則莫不仁矣臣謹按日月麗乎天百穀草木麗乎土民生麗乎衣食君道麗乎仁人君之仁天下其厚民生非能家賜而人益之也其正民德亦非能家至而日見之也惟以仁爲中心之所底麗一民饑曰予饑之一民寒曰予寒之一夫不獲曰時予之辜自出謀發慮之微嚬笑起居之節逮於慶賞刑威之用井牧學校軍國朝祭之務無不一本於此心之慈祥愷悌肫誠固結以爲之根柢若饑渴飲食之不可去而涵濡變化於仁人之宇者亦如草木之飲和於雨露日加長焉而不自知民之於上固惟所陶鎔耳君仁莫不仁誠至動物其理有固然者昔史臣之頌堯曰其仁如天文王之為人君曰止於仁虞書所載以親九族九族旣睦平章百姓百姓昭明至於協和萬邦黎民於變時雍是其驗也周公無逸所陳自朝至于日中昃不遑暇食用咸和萬民而刑寡妻至兄弟以御于家邦又其驗也以視成湯之克寛克仁民服厥命罔有不悅所謂勸民而民用勸先聖後聖不誠有若合符節者歟抑紬繹書旨更有味乎愼之一言焉以堯之仁也曰欽明以湯之仁也曰聖敬以文之仁也曰緝熙是則帝王之治同歸於仁蔑不從愼中來也漢臣董仲舒言正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方又言盡小者大愼微者著積善之在身猶長日之加益蓋以君心爲萬化之權輿而主敬實聖學之樞紐與書言有足發明者信乎愼之一言尤好仁之主所宜深思而力體之者哉書經克用三宅三俊編修臣林枝春蔡沈曰三宅謂居常伯常任凖人之任者三俊謂有常伯常任凖人之才者三俊說者謂他日次補三宅者詳宅以位言俊以德言意其儲養待用或如說者所云也臣謹按任官舉賢為治大要三事之職居其位者固不可以不賢有其德者尤不可以不備三宅之外復有三俊聖主之於賢臣其畜之廣而求之豫有如此臣因是而思之考功績以勵行能者當幾之哲也廣勤求以備任使者先事之圖也古來郅隆之治羣才爭奮庶績咸熙未有不於儲養待用之士先加之意而能猝收其效者也天之生才不一良楛偏全成於質之所近長短大小惟其器之所呈儲之之道務在愛育而成全之使歸於有用而己誠使廟堂之上勤思樹人至計豫令百爾臣工單心延訪以備詔舉則搜羅所及自足以供明廷之用况以人事君忠臣之義亦孰敢不盡心於求賢者哉夫臨事而思擇人每難稱職當官始責實效未易見功試以已然者言之古之所謂與民最親莫如牧令故必别擇廉正愼簡循良而三年計吏求其政聲丕著綽綽乎如卓魯其人者蓋不數覯也以百里良吏尚如是其難則等而上之其為專城領率者視此倍之矣其為監司廵防者視此又倍之矣其為旬宣廉訪者視此又倍之矣又况總一方略綏靖疆圉如古者方岳牧伯之任猝而求之豈易得其人哉故臣謂非儲養待用不可也夫地方職務苟關至要或令選擇調換或先以署事權攝必稱量詳審而後任用此誠為官擇人之意然視事未幾又以曠鰥去職若是者何也其人之器量或有所局而生平志力不可得而盡詳也是故嘗試之術祇得其大槩責成之法僅舉其一端以云克知灼見誠有未敢信其然者然此特論其不勝任者耳即其人材信美矣而得其性之所近者往往兼通之難此猶粤鎛之不可為函輪人之不能為輈故有長於謀慮而詞辨或拙優於幹畧而文采术彰以從容諷諫則有餘振刷紀綱則不足廉靜寡慾則可風隨機應變每多滯似此之類不一而足道在乎兼收而並蓄之而已昔宋臣司馬光乞以十科取士始於行義節操下及聽訟治賦皆欲分别科條以備選用良欲人主兼收多士之益則儲之者不可不廣也且夫今日之一德一心宣猷贊化為輔弼為藩翰皆前此所簡拔倚賴之臣用能為德為民内寧外謐以鞏無疆之祚則異日之後先濟美者其原又將悉基於今日也苟不及今豫為儲蓄其才之已成者固或虞其遺佚放棄而有待以成才者亦且委靡不振不能終收其用矣此又儲之不可不豫也從來政之與人相湏而理今當法度修明綱舉目張之後亦貴能行是政之人而巳茍非其人則視為一切文具其甚者或反因以刻急煩瑣此豈宣上德逹下情之指哉臣竊謂其求詳於政也不如求詳於人昔漢武恐積行之士壅於上聞下詔議不舉孝廉者罪董仲舒對策欲令諸侯吏二千石盡心求賢所貢不肖者有罰今則貪黷縱恣者有罪矣而未聞不舉賢之罪也怠慢疎忽者有罰矣而未聞不求才之罰也是何其立政之詳而取人之畧也殆非所以成就人才之意也臣之愚見莫若使臺省大僚及地方大吏皆以求才儲用為先務其已列班聯者國家已有薦揚之典若銓敘未及器局已成則科目中未必無可儲之才也稽古有獲經綸素裕則庠序中未必無可儲之才也至若奇材勇士或在草澤之中高識卓行遠居巖谷之内此其生平抱負茍非生同方與官兹土者亦何從而知之采諸衆評徴其實蹟觀察以得其情辨論以究其蘊非卓然可用則勿濫其選分晰科等列狀上聞朝廷酌其優崇之法與其成就之方循名考實先㧞其尤餘則俟其練習明逹而後進焉則其才之長短髙下各有所宜而舉者之能否亦因以見將大小臣工益曉然於以人事君之義莫不留心物色於以隨材器使必無不舉之政矣况儲養宏多羣才輻湊異日之宣力效忠者復可寄以知人得士之責茅㧞茹連轉相汲引於以輔翊元化協贊隆平豈不足嫓商周盛烈哉書曰百僚師師百工惟時詩曰濟濟多士文王以寧此之謂也伏惟聖明留意焉書經自古商人亦越我周文王立政立事牧夫凖人則克宅之克由繹之兹乃俾乂編修臣呉履泰陳氏雅言曰三宅之官百官之長克宅之以心相照克由繹以心相與謂之俾者言下之治由上之使也呂氏祖謙曰克宅之則人與位稱克由繹之則表與裏符其審如是然後俾之為治臣謹按為政在於得人堯舜首事命官詩四始皆求賢之為務故周公於立政拳拳以用人為言然惟聖人德性用事渾全不偏如傳記人材傑然可觀以道理觀之只是偏材洪範念之受之錫之福隨材造就也臯陶曰載采采翕受敷施盡用天下之才也此書上文遞舉古之知恤所謂宅乃事宅乃牧宅乃凖乃用三有宅克即宅克立兹常事司牧人亦既言之備矣此復云云者擇之不審固不足以得賢才之用用之不至亦何以盡賢才之用故曰則克宅之又曰克由繹之兹乃俾乂由繹者由其外而繹其中由其才而繹其德由其發舒於一日而繹其遲久於異時世固有樸於外而惠其中者不矜其才而裕餘於德者所居無赫赫名去後常令人思者皆非卒能盡也惟由繹之則彼得自展而無所掣肘驚疑而吾所以用之得宜於以收其功效亦甚多矣由是觀之人君用人固有廸知忱恂於資格之外者始以知人之明終以待人之誠故無徼倖之功名則干進之途塞無濫叨之祿位則經歴之才練朝廷無用非其人之憾賢才無用違其才之阨俊乂在官庶績其凝此周業之所由隆而治世者必尊而信之者也書經繼自今立政其勿以憸人其惟吉士用勱相我國家監察御史臣柴潮生呂祖謙曰人之相去何啻千百等用之者大小亦各有方今統謂之吉士蓋長短不齊必皆慈祥良善之人不容一慘刻傾險者投足其間此文武用人之大法所以立周家忠厚之治體也蔡沈曰小人而謂之憸者形容其沾沾便㨗之狀也王綱振曰憸人非容悅小人孔傳云憸利小人正言其才智機鋒能聳發人主以為可與共功必可顯世而究竟罔顯也王應麟曰臯陶曰彰厥有常吉哉周公曰庶常吉士召公曰吉士吉人帝王用人之法一言以蔽之曰吉舜所舉曰元曰愷吉之實也所去曰凶吉之反也議論相傳氣脈相續在春秋謂之善人在西漢謂之長者惟吉則仁所謂元者善之長為天地立心者也臣謹按周公所言誠治天下之要㫖而先儒别白吉士憸人之實亦詳哉其言之矣然人君無智愚莫不求忠賢以自固而正者易疎邪者易親此千古以來無可如何之事也蘇軾云道可講習而知德可勉强而能惟知人之明為不可學故漢元帝必不以石顯為小人唐明皇必不以李林甫為小人德宗必不以盧把裴延齡為小人方其一心相信雖髙宗之得傅說文王之遇呂望亦無以過之也今若立其主名曰若憸人若吉士則人皆可以為僞孰自處於不肖若謾無定見則邪正並用毁譽混淆及其久也君子疎於保位小人巧於固寵不必待人主之左右而消長之機决矣大抵人雖不易知若人君能正其身以率之虚其心以觀之審其類以求之亦庶幾有可知之理蓋同一言也謇謇諤諤明辨是非者必君子言翕言翕訿訿模稜兩可者必小人同一行也守正持重木訥無華者必君子㨗給趨走隨時俯仰者必小人同一處心積慮也以義為主以生民為憂而畜其君之欲者必君子以利為主以身家為念而導其君之欲者必小人稱此以求之即有近名僞行之士强託其間尚可以拔十而得五天下事猶重有賴焉伊尹曰有言逆於汝心必求諸道有言遜於汝志必求諸非道王十朋曰正直之人見君性之偏則以為憂又從而捄正之小人知君性之偏則以為喜又從而逢迎之朱子曰用人不求其可喜而求其可畏不求其能適吾志而求其能輔吾徳不憂其自任之不重而憂吾任用之未至不為燕私近習之計而為宗社生靈萬世之計人主以至公之心操則哲之術叅觀數說以求之亦可以曉然於吉士憸人之分而成勱相無疆之治者矣書經其惟吉士用勱相我國家編修臣雙慶孔安國曰立政之臣惟其吉士用勉治我國家蔡沈曰其惟用有常吉士使勉力以輔相我國家也臣謹按立政一篇周公敷陳用人之道詳哉備矣而究歸於吉士勱相國家誠制治保邦之要術也夫國家當承平之時紀綱法度燦然大備所恃以敷化理民而綿清泰之休者惟延攬人才為最急人才者難得而易失難聚而易散者也從來明作有為之士足備驅䇿者自不乏人然効一官任一職或輕率而喜事或躁進而多疎或紛更而滋擾漢詔所云聽其言論則悅耳揆之陰陽則傷化者欲其同心協力以培國家之元氣勢必有所不能夫不曰才士能士而曰吉士殆必有渾厚深重平易和藹之德不營營於榮利不汲汲於功名不忌人之美不妨人之賢以君心為己心視國事如家事者斯足以當之故又曰其惟克用常人即虞書所稱彰厥有常而吉者也國家誠盡得吉士而用焉不必勲業炳著而後收其效也即此衆正盈廷公正之道伸縉紳之途肅已煥然覩氣象之光昌縱或有一二不類者厠於其間亦自覺其立心行事不可容於盛明之朝而洗心易慮以爭自濯磨矣况師濟成風則奮庸熙載所謂撫於五辰庶績其凝者自可合羣策羣力以副天工人代之責而兵農禮樂無不修舉股肱耳目無不率從遐邇無不乂安民物無不熙皥國家治平之福孰大於此此吉士之勱相為立政者所宜深致意也夫書經方行天下至于海表罔有不服以覲文王之耿光以揚武王之大烈編修臣裘曰修陳雅言曰治平無事之時乃禍患所自起茍安於逸樂憚於自强豈所以繼志述事而承祖宗之託乎公推廣勿誤庶獄之旨而并及此固非後世導君以窮兵好大者比也臣謹按周公告王以克詰戎兵陟禹之迹而因及德威之盛至於無遠弗屆歸之於覲光揚烈若曰如是方可以對文武而無慚耳臣聞帝王以治天下為孝而一事一節不足以當之一代之興類皆積累數百年披荆棘沐風雨身閱險阻備極艱難而後嗣或不能深知此意一切悠悠焉聽之優柔委靡醞於有象未形之際治具弛而不張王心怠而不振日甚一日而祖德宗功有隱然欲隳者矣此固謀國者之深憂也蓋嘗論之一人之精神愈用則愈出而愈强衰季之主生於深宫之中不離阿保之手偷安肆志不知汗馬為何狀而百司庶執事惡勞而好逸止於塗飾文具而已上恬下嬉將驕卒惰一旦有事呼之而不應則束手已耳不然當成周之時列爵惟五分土惟三人有定分矣垂拱而天下治民有寧居矣旅獒西來白雉南貢祥符聿臻矣永清大定而周公猶兢兢以克詰戎兵為告何哉於此見老成慮事之忠望王之切且有似乎預知數百年後必有積弱之患而早為之防也夫文王之耿光武王之大烈至大且遠矣耿光也而稍弗顯焉不可謂之覲大烈也而稍弗舉焉不可謂之揚其曰以者以之也以此克詰之戎兵也夫豈窮兵黷武之謂哉要必使主德常尊國威常重諸侯有不敢上僭之勢四夷有不敢内窺之心而後周官周禮可以行八百年之祚可以永夫周公大聖豈無所見而忽於放牛歸馬之後為此喜功好大之談哉此一覲一揚也則謂成王即文武焉可也則謂見成王者即如見文王武王焉可也而在文王為有孫在武王為有子矣人主之孝又孰大於此乎三代以還漢之七國唐之藩鎭宋之南北分而明季乃幾於無兵大率皆玩視於無事之日而欲奮勵於有事之時其勢常不能相及也夫足不出戸庭目不窺方域養尊處優而欲坐安遺業難矣故必念及我祖我宗得之之不易而後知守之之難亦惟念及我祖我宗得之之不易而後守之亦遂無難也此帝王之孝也書經若昔大猷制治于未亂保邦于未危檢討臣齊召南孔穎逹曰標此二句於前以示立官之意臣謹按操舟楫以濟川不可以無風而操敝漏之舟楫乘輪轅以致遠不可以坦道而乘朽折之輪轅自古帝王守成致治無他異能奇術也惟此治不忘亂安不忘危之深心自足登斯世於久安長治故常於極盛之日朝野無事坐享昇平而君臣相戒動色仰畏天命俯騐人心前念祖宗創業艱難後思子孫黎民承親賢樂利於奕䙫惟恐德有未洽化有未孚民隱有未聞俊乂有未舉深謀遠慮又常以為禍患每起於細微而變或乘於所忽必先清心寡欲以端治源屛聲色省遊觀遠邪人親正士左右匡弼守道之臣日侍於側忠言讜論日聞於耳往古史書興亡得失可法可戒之事日接於目而怵於心察吏安民維風整俗積儲備荒以及恤刑講武一切當行之務日籌諸心而見為實事至盈也持以謙抑至泰也保以憂勤易曰其亡其亡繫於苞桑詩曰迨天之未隂雨徹彼桑土綢繆牖户此之謂也夫天下最難得而易失者時也待其既亂且危而後為之所其勢每苦於欲為而不能當其未亂未危又常苦於能為而不欲何哉君人者固未有不惡危亂欲治安也蔽於既治且安而不思其後也見既治遂謂可以長治見既安遂謂可以久安便辟阿諛之臣始用逸樂之說從容投隙以進君人者中其計而不察於是心日以驕政日以怠法度日以弛僉壬日以多忠良卷舌威福暗移忌諱滋繁虚文相應上下䝉蔽方晏然謂固於磐石泰山而積薪厝火之勢已成矣天下猶身也治天下猶養身也不慎起居於康强無疾之日而曰恃有藥石庸為計之得乎周至成王天下治安極矣而訪落愼始小毖謹微大雅述先王豳風陳民事皆凛凛乎有冰淵之懼有宵旰不遑暇逸之思尚書所載周召二公於治亂安危敷陳剴切危言篤論往往過於丁寧彼詎不知成王為賢主而天下之治安已久乎哉惟不恃其治安所以能久安長治也成王知其然也故萬邦既已撫兆民既已綏六服羣辟既已承德而董正治官首述古人立官之意曰制治于未亂保邦于未危大哉言乎其與舜言勅命禹言克艱益言無怠無荒臯陶言天工人代蓋百世而同揆也成王又自言祇勤於德其兢兢業業日愼一日於制治保邦之道得矣此頌所以美其基命宥密緝熙單心為能光大文武之謨烈而開八百年之統緒也歟書經曰唐虞稽古建官惟百内有百揆四岳外有州牧侯伯庶政惟和萬國咸寧夏商官倍亦克用乂明王立政不惟其官惟其人侍講臣介福王氏樵曰官者治亂安危之所出人則制之保之者也惟其人是一篇之要推賢讓能庶官乃和不和政庬舉能其官惟爾之能稱匪其人惟爾不任陳氏經曰人能推讓樂善故也不能推讓忌嫉故也九官相讓衆賢和於朝范宣子讓其下皆讓安有不和者我忌嫉人人必忌嫉我交相忌嫉何有於和臣謹按事無論繁簡在得其人以治之舜命九官至商列為八政至周合為六典大綱皆出於一所増特其屬也明王立政誠得其人則簡固乂繁亦乂後世官制愈繁而天之生材常不足赴乎其任故總理之者為尤重惟因材器使俾大賢受大職小賢受小職斯智名功勇各擅其長而事無不舉矣然擇人固聖主之事而推賢尤大臣之心有虞之朝禹遜稷契臯陶垂遜殳斨伯與益遜朱虎熊羆伯夷遜䕫龍蓋君以其人為賢能而用之而其人不自賢不自能而推之賢讓之能且賢不必其出於已而惟賢是推能不必其出於已而惟能是讓此至公無私之心大臣之義也凡為庶官者觀感其推讓之心而師師濟濟同寅協恭共成郅隆之盛豈不美歟故曰大臣以人事君又曰衆賢和於朝萬物和於野推賢讓能庶官所以無曠庶績所以咸熙也抑又有難者淺中弱植之徒往往延頸企踵謟親戚以邀譽因賔客以借交易滋黨援狥私之弊是在為大臣者秉公持正拒絶獻譽結納之階惟知進賢為國不以市恩而人主委任大臣又必因薦舉而明試考核其果否稱職即以徵舉之得失保任之公私以為賞罰則庶司無不竭力盡能立功於國而大臣亦無敢比黨營私矣三代而上風淳治懋豈復有狥私害公之大臣而成王必深戒之曰舉能其官惟爾之能稱匪其人惟爾不任蓋誠有見於知人則哲古帝猶難而公私義利之間關人材之用舍即關政事之舉廢此周官一書所以為制治保邦之要務也歟書經冢宰掌邦治統百官均四海司徒掌邦教敷五典擾兆民宗伯掌邦禮治神人和上下司馬掌邦政統六師平邦國司寇掌邦禁詰姦慝刑暴亂司空掌邦土居四民時地利侍講臣介福陳氏雅言曰此六官之長綱在網中也冢宰與六卿雖分掌一職而其官則尊於衆卿故以冢言六卿之事雖各列一職而冢宰得以兼之故以宰言此董正其官也統百官者即亮采之謂均四海者即惠疇之謂百官異職而能統之則有倫有要有綱有紀咸得其序矣四海異宜而能均之則或遠㦯近或多或寡咸得其正矣此訓廸其職也陳氏大猷曰為治莫先於教化故冢宰之後司徒次之敎化莫先於禮樂故宗伯次之敎之和之而猶有不率者則大者加以甲兵小者加以刑罰不得已也故司馬司寇次之暴亂去而後民得安居故以司空之居民終焉臣謹案為治之道在於得人而所為得人者非僅庶司百執事之得其人而已必有操其要者焉周官六卿分職所以為制治保邦計者不出於此使六卿得其人則率屬倡牧于以阜成兆民也何有一曰冢宰振裘者必挈其領冢宰之職舉而天下之規模定焉矣規模既定而敎化以興節文以著五惇五庸莫非天之秩叙也故司徒宗伯次之敎立禮行而猶有干紀亂常者焉則天討之所必及也故四曰司馬大罪陳於原野降此則有司之法在故五曰司寇民遷善遠罪而後可以永奠其居故以司空終焉其在周禮則謂之六典六典分掌於六卿而以冢宰統之皆本天之事以為事故冢宰為天官言象天所立之官也而周官冢宰之職曰統百官均四海則亦非五卿之所得而同者矣蓋嘗論之六卿之設分配天地四時絲牽繩聯至微至密即舜典所命九官百揆則冢宰也稷契則司徒也伯夷則宗伯也臯陶則司馬司寇兼之若埀若益則司空也雖或分或合因時制宜而其職事要未有出於六卿之外者然則六卿誠得其人尚何唐虞三代之不可及哉周官之戒六卿也惟以功崇業廣為務而終之以推賢讓能其所以望之者重矣使居六卿之職苐奉行故事苟合取容則其為朝廷羞也甚矣安在其能率屬倡牧也蓋六卿者庶司百執事之標凖也為六卿者果能去一已之私絶黨援之弊彼為其屬者自必是則而是傚焉所謂大臣法則小臣廉其效自有不期而至者又况今日之庶司百職事即異日之六卿其出而為方伯連帥者即入而為卿士師尹六卿誠賢則轉相效法惟惴惴焉以不能對揚天子之休命為懼其所裨益於國計民生者豈其微哉書經六卿分職各率其屬以倡九牧阜成兆民右贊善臣宋楠蔡沈曰六卿分職各率其屬官以倡九州之牧自内達之於外政治明教化洽兆民之衆莫不阜厚而化成也臣謹按民為邦本本固邦寧聖人知阜成之責不可以獨任也於是乎設為六官以典邦治邦敎邦禮邦政邦禁邦土内以正朝廷之紀綱外以立羣牧之表率天下之政胥統於此此六卿分職之由也各率其屬者六官之屬共三百六十以倡九牧者為九州州牧之倡此即唐虞州牧統於侯伯之遺意阜成兆民即所謂庶政惟和萬國咸寧也嘗考成周之時周召分陜異公保釐東土君陳出尹東郊召虎旬宣江漢是内諸卿出膺司牧之權也鄭桓公武公相繼為周司徒祭伯以畿内諸侯為王卿士是外諸侯入行六卿之事也蓋其於民生休戚閭閻疾苦皆熟聞習見而確知其所以然是以出則為良牧入則為名卿雖職有區分而政無同異要皆不懈於位而為民所歸是六卿九牧皆以佐天子康兆民非可畸輕而畸重也然天下事必有倡而後有因朝廷者四方之倡也而六卿又九牧之倡也自朝廷達之於邦國又達之於四海其地愈遠則政之所及者愈遙然能使天下之大如身之使臂臂之使指莫不制從而成運掌之治者紀綱立於朝而庶績熙於外也是故形端則影正源潔則流清六卿有崇功廣業之心則九牧凛愒日玩時之戒矣六卿有怠忽荒政之漸則九牧高坐嘯畫諾之風矣朝廷意指所存或崇寛大或尚勵精不必明見諸誥誡定以章程而一二事之張弛遂黙成天下之風氣轉移之故㨗於影響管仲所謂下令如流水之源也至於阜成者鞠人謀人之事也釋名土山曰阜阜者厚也敦龎淳固之積蒸而為協氣醞而為太和然後隂陽以正風雨以時品彚以亨民生以遂宋儒張載有云不如野馬絪縕不足謂之太和太和者厚之至也老子曰治大國如烹小鮮擾之則亂唐太宗曰治天下如建殿屋營搆既成勿數改易茍易一榱正一瓦踐履揺動勞擾實多是知民間日用飲食之事當聽之百姓之與知與能長人者特因而利導之不生事不懈事寛平正直以協民之中無作好惡以遵王之路則居敬而行簡執要以御繁阜民成俗之道莫踰於此非簡棄一切姑託於清淨無為之說以便其私也聖人在上知安民之本在於得人而得人之本視乎主極是故袛勤於德夙夜不怠兢兢業業一日二日萬幾者既有以倡庶明之勵翼由是凡百有位亦克用乂不侵官不曠官欽乃攸司愼乃出令是分職之實也簡厥修進厥良推賢讓能舉能其官是率屬之要也成王既董正之乂訓廸之内而六卿外而九牧孰有瘝官曠職以棄厥典常者哉此所以六服羣辟罔不承德以成萬方無斁之休也書經欽乃攸司愼乃出令令出惟行弗惟反以公滅私民其允懷侍讀學士臣汪由敦宋蔡沈曰敬汝所主之職謹汝所出之令令出欲其行不欲其壅逆而不行也以天下之公理滅一已之私情則令行而民莫不敬信懷服矣臣謹按欽乃攸司者謹其所守之職愼乃出令者審其興作之幾也國家憲章明備綱舉目張雖前人之成法可循而修明之始不至於廢弛振作之始不至於怠惰當損當益者必變而通之與時宜之始適乎輕重之中所司之職不可不舉則出令不可不愼易曰重巽以申命又曰渙汗其大號出令之謂也子產曰政如農功日夜思之思其始而成其終不思其始終必不成出令者事之始也而政之醇疵民之休戚國之興衰繫焉一令之善為四海之福一令之不善貽無窮之患故聖王莫不愼之於其始始謀不臧至害於政事而後從而易之即使能救其弊而民已不勝其擾矣况其思之不深慮之不遠因弊立法而弊隨法生創制防奸而奸由制起廟堂之上焦心勞思以籌救時之急務朝進一說曰如是則弊可清暮進一說曰如是則奸可絶而閭閻市井之間奸弊如故也或且因而甚焉於是令日益繁而有眊而不行者矣有忽行而忽反者矣有名為奉行而虚文從事者矣揆所由來惟其出之不愼也聖王之出令也先民是程大猷是經不泥古而咈百姓之欲不苟且而圖目前之安堅如金石信如四時非有商鞅韓非之峻刑法以驅之而民自敬信服行是何也見其必可行而後著為令於其致反之由熟計審處而預為之防則不待嘗試而天下舉信其行之無弊管仲曰下令如流水之原此物此志也且夫天下之大計非可以一已之私意與焉也剛愎者不即乎天理之安偏執者務伸其堅僻之說優柔者憚興事以因循畏葸為守經好大者樂紛更以鋭意有為為盡職趨避為藏身之固迎合為干進之階始於售其私而訖至僨事而召怨惟廓然大公當行者行之必力不當行者絶之必嚴訏謨定命遠猶辰告庻頑讒說無所容於其間夫如是則有弗令令出而天下安之後世守之較若畫一民有定志馴致於從欲以治不難矣董仲舒曰謀事必就聖發政必擇語人君圖久安長治之道必自愼乃出令始書經學古入官議事以制政乃不迷其爾典常作之師無以利口亂厥官蓄疑敗謀怠忽荒政不學牆面莅事惟煩編修臣儲晉觀蔡沈曰學古學前代之法也典常當代之法也臣謹按成王董正治官而獨揭學之一言以為修職謹令之本反覆告誡其義備矣蓋國家法度典章其有定守者也機宜事變其無定形者也是故監前代之成憲而量度處中遵本朝之舊章而聰明不作發言息盈廷之咎居位無曠官之譏此皆政事臧否之所關朝廷治忽之所係而為人臣者之常訓也然苟不學則安能兼有是數善而無弊哉今夫人臣不學之害有别昧先聖之術闇當世之務臨事周章奉職廢弛此則智不足以效一官能不足以效一邑固人君之所必斥者至於拘泥古制堅僻自庸乖謬事情紛更約束則有如王安石之侈言經術經世務而以祖宗之法為不足用矣辨文小慧析言破律粗渉經傳縁飾文采以佐其逢迎固寵之私而適足為喋喋利口之戒則有如張湯之決獄傅古義許敬宗之多聞善占對矣然則不學之害小而學術不正之害大三代以後之史冊尤炳然可覩也雖然官人之道本以德器為先才猷為後而闒冗無能者或外類於樸誠庸暗寡識者或貌依於謹厚唯諾成習浮沉取容知小而謀大力小而任重平世罕建白可紀之績有事非緩急倚仗之人不學之害夫豈淺歟又其甚者則若朱子所指本出下流不知禮義而稍通文墨服儒衣冠叨竊科第而全無行檢之徒雖其人服官莅政幸無謬誤而立身根本之學已失其餘不足觀也嘗攷三代人才畢升於太學司馬辨論官材任官然後爵位定然後祿其時之登仕版者固無不學之人而其所學皆修己治人之要道也自朝廷以科目取人士子以舉業為學所學非所用所用非所學其來久矣夫欲實學效於當官必其諳練之有素者也且人之智能各有所長而其為學亦必專精於所習漢世詔舉吏民能治河者先後得王延世王景二人卒顯功效又如郭躬陳寵父子家世明習法律相繼為理官皆專務所學之明驗宋臣司馬光嘗議以十科取士分别任使蓋欲人才之競相濯磨講求於平日也抑成王所告誡者内自公孤六卿而外及四方之岳牧皆百僚之長各率其屬者也是知牆面之警為大臣者尤宜加意焉書經功崇惟志業廣惟勤惟克果斷乃罔後艱少詹事臣徐以烜蔡沈曰崇其功者存乎志廣其業者存乎勤雖有二者當幾而不能果斷則志與勤虚用而終蹈後艱矣臣謹按國家設官分職所以代天工也為臣者膺朝廷之爵祿則思樹立以自見然器識不遠者非成功之士也苟安玩愒者非立業之基也優游寡斷者非決機之識也是以周王之戒卿士曰功崇惟志業廣惟勤者誠以生平之建立總屬於一念非常之勛績每隳於便安天下有志不立而狃於卑者矣志立而狃於卑者無有也天下有勤不懋而墮於隘者矣勤懋而墮於隘者無有也故剏𥪡之局不待其崇隆而後知之也惟曰視其注存者而已矣積累之途不必其盛大而始决之也惟曰視其加務者而已矣雖然功業之為勢至烜且赫而其為效亦至繁且重乃或志之終身曾不如志之一日勤之卒歲曾不如勤之片晷者豈難易有殊量哉果斷不果斷之别也事機之至也不測事會之逝也亦無定惟猛焉剖决而不疑洞識於是非可否而倉猝無以撼其神惟奮焉獨立而無懼立制於動静吉凶而非常無以震其魄如是則功可崇業可廣而又何後艱之有哉夫可以致功而不之致者謂之懦可以建業而不之建者謂之怠功不崇業不廣當幾而遲回不决者謂之愚懦可起怠可策而愚不可破故果斷尤貴克焉周王之戒卿士曰志曰勤而又必曰果斷者良有以也書經推賢讓能庶官乃和不和政厖舉能其官惟爾之能稱匪其人惟爾不任監察御史臣程盛修臣謹按國家所重者人才人才進退係乎政治得失此其權操於君而實倚於二三大臣大臣以人事君者也使才識能甄㧞善良奬許士類而又如鑑之空如衡之平一切門户恩怨夤緣聲氣之弊皆不足以動之則其難其愼之心無非忘私忘家之義而天下人才亦知吾道之可以有為也莫不乘時利見踴躍奮興俊乂在官百僚師師所謂推賢讓能庶官乃和也不然者以名為招以利為媒官及私昵爵及惡德德薄而位尊矣知小而謀大矣力小而任重矣其不勝任者居華膴列顯要而勝任者反投閒置散寂寞下僚視氣節為不足尚經術為不足用呈身識面為不足恥以致人才日壞紀綱日隳餐之素也餗之覆也遑恤國家也然臣終不敢謂倚之二三臣而君之責遂可寛者蓋君不能周知庶寮而二三臣之賢否忠佞則其所燭照而數計也惟擾成憲則察之紊是非則察之樹私人比朋黨則察之察之極其精而處之極其當舉能其官有上賞焉稱匪其人有顯罰焉如是則君子道長小人道消學古入官議事以制同寅協恭和衷哉保無有政庬之患重煩黼扆者已書經舉能其官惟爾之能稱非其人惟爾不任監察御史臣朱續晫蔡沈曰所舉之人能修其官是亦爾之所能舉非其人是亦爾不勝任古者大臣以人事君其責如此董鼎曰因所稱舉之賢否益足以見我之賢否為人臣者以是觀之必無蔽賢妬能之事賢者有所勸而不肖者亦可以自警矣臣謹按致治之要在於得人人之衆聖主不能徧知必資薦舉若薦舉不得其實則巧僞並進官職耗費故必設連坐之法以治之此不易之道也又人之才性各有所能或優於守而短於才或長於此而絀於彼不可求備故不妨廣其途以取之但使所舉皆實則隨才器使各得其用昔司馬光嘗言愛憎毁譽情僞萬端與其采訪虚言不若使之結罪保舉因奏請設十科以舉士令每歲各於十科中舉三二人擬結狀云臣竊見某人有何行能臣今保舉堪充某科倘後不如所舉及犯正入已贓臣甘同坐不辭狀到付中書省記簿仍别置合舉官臣寮簿歲終不舉按劾施行如舉後不如所舉量輕重行罰必行勿赦所貴人人愼重官皆得人光之言似過嚴而難行然細思之實亦有不得已者蓋保舉之責甚重知人既難而深懷薦賢為國之誠肯時時留心於此其事亦復不易故朝廷每下明詔或則觀望而不舉否則又將狥私而濫舉矣二者之弊均未易除雖云事本非易然揆之以人事君之義為臣者固亦無所逃其責光之言蓋深合於周官董正之法其意猶可師也書經至治馨香感於神明黍稷非馨明德惟馨編修臣丁一燾蔡沈集註曰物之精華固無二體然形質止而氣臭升止者有方升者無間則馨香者精華之上達者也至治之極馨香發聞感格神明不疾而速凡昭薦黍稷之苾芬是豈黍稷之馨哉所以苾芬者實明德之馨也至治舉其成明德循其本非有二馨香也是訓也至精至微非日新不已深致篤敬之功孰能與於斯董鼎曰益曰惟德動天至諴感神周公曰明德惟馨感於神明幽遠難通莫天與神若猶可以德感動況於民乎周公與益之言其意一也臣謹按周公之訓固為精微成王舉以告君陳深有得於為治之本矣夫至治何以云馨香善治之極協氣休聞之所發越猶馨香之旁達可愛生民之詩曰其香始升上帝居歆載芟之詩曰有飶其香邦家之光則固非小補之氣象所能仿髴也且夫聖人作則必以天地為本以陰陽為端以四時爲柄以日星為紀月以為量鬼神以為徒故行於郊而百神受職焉行於社而百貨可極焉行於宗廟而孝慈服焉行於五祀而正法則焉其精神之所條貫志氣之所黙孚無一不本於其德然則至治之隆其必歸於至德也明矣而蘇軾謂物之精華發越於外者為聲色臭味足以移人亦足以感鬼神是猶以黍稷言也如黍稷可以為馨香則隨之粢盛豐備虞之享祀豐潔亦可以感於神明矣至治之馨香豈若是乎且夫惟德動天至諴感神孝弟之至通於神明天人感召之理豈在享祀之儀文臨時之齋袚哉必其洗心於密洞達無間光於四表格於上下亦如鬱鬯羶薌之間使陰陽之氣達於淵泉達於牆屋所逹初無界限治然後為至德然後為明故論馨香之效至於感神明極所以馨香之本又根諸明德有是德則有是治有是治則有是馨香有是馨香則有是感應夫至於天神可格尚何慮乎民物哉然如愼獨而後可以達天德誠意而後可以行王道德之克明固自有本是以惟日孜孜無敢逸豫時以篤敬嚴之所謂以聖人之德成郅隆之治其在斯歟書經允升于大猷惟予一人膺受多福監察御史臣胡寶瑔臣謹按帝王孜孜圖治所以本之一身率羣工而交勉者固無日不期德化之成使斯民風同道一而䝉至治之休也昔成王命君陳尹東郊念民生之厚因物有遷欲其偕之大道而曰允升于大猷洵為治之要哉大猷者宇宙之常經共由之正路程顥所謂得天理之正極人倫之至者堯舜之道也民或為習俗所染則失其本然之天而趨而日下惟聖人在位端其範於上而示之凖民自欣然樂從以共復其初蓋克綏厥猷惟后而歛福以錫庶民乃遵王之道遵王之路斯為允升也朱子曰善為治者總攝而整齊之使各循其理先有紀綱以持於上而後有風俗以成於下也是以懋修者在宮庭從治者即在草野而其間為上為德為下為民者則在承流宣化之得人惟人臣能敬其事不爽厥德則政皆實政其施及於民者裕之以衣食之源率之以孝悌之行使俯仰有資遵循有則忠君親上之性油然自生禮義廉恥之心維而不替斯太和之景象駸駸乎上理矣司馬光云上行下效謂之風薰蒸漸漬謂之化始而洗心滌慮繼而風清俗美如階之升進而日上此大猷之所以允升也且夫民非無良也二帝三王之治非不可以必復也司牧者以誠格之自以誠應之故曰爾惟風下民惟草即至治之馨香知諸福之畢集有明徵也蓋至大猷允升則樂斯世之平康躋天下於仁壽兆人長享和平之福而君曰予一人膺受多福者能錫福於民乃為受福之實惟人君以天下之福為福而其福始多也然則致治之原本於君身而為治之要在於得人果得其人而福成於下者俱歸於上以是知福莫大於允升也其後命畢公保釐東郊有曰惟周公克愼厥始惟君陳克和厥中而復以克成者於畢公有厚望焉此成周之化所以皆得其人而稱郅隆之治也詩曰受福無疆四方之綱此之謂歟書經辭尚體要編修臣儲麟趾臣謹按仲尼曰辭達而已矣傳曰言以足志文以足言逹與足非繁多富麗之謂而質實明辨之謂也質實者按之有物言其體也明辨者宣之不繁言其要也書契以來唐虞三代之紀述典謨訓誥之昭垂緣文立榦淳茂矞皇雖曰世不尚辭而文質備矣若周書畢命一語而修辭之法盡焉蓋凡辭之為用甚大且遠所以宣德化備記載述情志而昭訓戒也其在上則詔策章奏檄移祝誄碑志其在下亦有宗經緯史箴銘讚頌論序用之則潤色鴻業黼黻皇猷不用亦藏諸名山秘諸石室然或華而不實則失之蕪也大而無歸則失之誕也弱而不振則近於靡也俚而不典則近於俗也縋幽鑿險者詭異而傷於正旁見側出者枝葉而離其榦凡此六者惜皆未明乎體要之所在也今夫援天證地河漢其言而終不得夫胚胎之所自何如數言而渾舉大凡連篇累牘譸張其說而訖不知其意指之所歸何如一言而深中窽會舉其大凡則質榦已具而顚末瞭然是則所謂體也中其窽會則肯綮已得而節次無難是則所謂要也所謂體如衣之稱身長短合度不欲其過也所謂要如衣之振領把握無遺不使之棼也循是二者引而伸之觸類而長之布帛菽粟用之而不盡而裁製者允蹈於大和黼黻丹黄望之而立曉而指示者不離乎掌上則體要一言洵乎其詔千古以修辭之準也若謂康王因商俗餘風利口惟賢故命畢公以敦本務樸之意倡導厥俗如張釋之諫漢文帝拜嗇夫事則止於一時一事以立言而非仲尼删書垂示萬世之良法矣易曰吉人之辭寡躁人之辭多即辭以觀人之心也詩曰辭之輯矣民之洽矣辭之懌矣民之莫矣即辭而推其及人之功也辭顧可不愼乎哉書經思其艱以圖其易民乃寧監察御史臣錢度臣謹按此言養民之宜急也古者大司徒之職敷五典擾兆民然土會土宜所司半養民之事故其屬自鄉大夫以下皆敎也自載師以下皆養也而敎必先之以養夏書德惟善政政在養民水火金木土穀惟修正德利用厚生惟和必九功惟叙九叙惟歌而後可以戒休董威未有鮮飽興歌而能化行俗美致上理者也穆王有見於此故於君牙之命既告之以敷五典和民則而即繼之曰夏暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨明怨咨未冺雖爾身克正化民未易言也臣觀古先聖王莫不以足民為急務周家以農事開基於小民衣食之源日用之細尤為加意周禮一書其法至纖至悉不啻取民之身家而代之謀其所以思之者無不至其所以圖之者無不周故家給人足敎化易行風俗醇美周家之治稱極盛焉自周禮之法廢而養民之道衰其弊有四溝洫畎澮并而為田而旱澇無備不足以濟天時一也且并地利而亦失二也載師任土之職不修而民之游惰者衆三也草人土化之法不講而物力不盡四也具此四弊而豪强復得兼并乎其間撡其奇贏重困貧乏而貧者日益貧則所謂艱者誠艱而所謂易者不可得矣穆王之世豈至有此而猶兢兢以為艱者誠以為上者一日不思維則必有忽視民瘼之患而民之怨咨隨之甚可懼也夫寧者安也定也安定其家而身始可用安定其身而心亦可用此周禮司徒之職所以兼敎養為一官而孔子之既富加敎孟子之恒產恒心俱是說也書經今予命汝作大正正于羣僕侍御之臣懋乃后德交修不逮侍讀臣黄孫懋張栻曰公卿進見有時僕御褻近無間有時者見其尊嚴無間者知其情性方其進見君臣之分甚嚴未易犯其顔及其褻近君臣之情無間故可糾其過救過於未形之時易為力救過於已發之後難為功懋德交修正僕臣侍御之職也臣謹按周禮太僕為下大夫之職非若三公三孤論道經邦也又非若六卿之率屬倡牧阜民成化也其秩既不甚尊顯而其事亦止陪僕􅉏御之事無關於天下政治之大冏命一篇何望之者深而責之者切耶蓋人君之動静起居惟近習之人見聞為最切使左右前後皆德選朝夕與居皆正人因事進規非心無自而萌然後天下之事可從而理周公作立政虎賁綴衣趣馬攜僕莫非吉士即此意也故穆王於命官之際述文武之成德稱在位之忠良始則望之曰懋乃后德交修不逮繼復責之曰弗祇厥辟惟予汝辜至其所謂僕臣正厥后克正僕臣諛厥后自聖尤為切要之言從來小人之敗君德靡所不至而自聖一言足以蔽之夫有自聖之心則法家拂士日遠而快意肆情之舉亦莫或齟齬於其間此勢之相因遞見者也穆王克見及此亦可謂思深慮遠防閑之早者矣厥後造父為御周遊天下將必有車轍馬跡導其侈者果出於僕御耶抑其心本有是欲久而不克自持耶天下事有其迹已著疏遠之人不及知而近習早窺之者亦有近習之人不知而已獨覺之者所謂未萌之欲也穆王之言曰怵惕惟厲中夜以興思免厥愆想當日反躬内省心曲之地嗜好之端隱隱必有所向而强自抑制使不得行且又惟恐其或行也故命前後左右之人匡其不及繩愆糾謬以格其非心倘此時得如舜之四隣者日弼其違而無面從則非心日格而王且入於聖矣得如周成王之四聖維之則非心日格即不至聖而幾於聖矣惜乎當日未聞其人也是以本源未清潛滋暗長向之慄慄危懼自覺其非者後不免躬自蹈之人心操舍之無常亦甚可畏哉書經愼簡乃僚無以巧言令色便辟側媚其惟吉士監察御史臣霍備蔡沈曰巧好令善也好其言善其色外飾而無質實者也便者順人之所欲辟者避人之所惡側者姦邪媚者諛說小人也吉士君子也言當謹擇僚佐無任小人而惟用君子也臣謹按此周穆王欲伯冏愼選羣僕侍御之臣以輔翼主德也蓋侍御近臣也巧言令色便辟側媚者佞人也為邦之道務遠佞人而顧可引而近之乎此其所以不可不愼也在昔成周命官分職綴衣趣馬皆籲俊之流宫伯内宰盡興賢之侣漢初此意猶存故以儒者為侍中以賢士備郎署而周昌汲黯軰得以出入宫禁陪侍宴私其陳誼格非拾遺補過者所關正非細也中漢則有宫中府中迨至於唐則有南司北司職掌既分流品逈異茍非閹豎嬖幸不得日侍宫庭矣夫輔弼之重責在大臣君德之盛衰豈盡由於近侍之邪正然廷臣不能逐近臣而近臣反足以間廷臣者惟近臣相親而相狎廷臣則日遠而日踈凡耳目之可得而悅者即其聰明之可得而蔽者也人主之於近侍可不嚴立其防哉更進而推之近臣之外其為巧令便辟之顯著者莫過於伶人蓋伶人之技正在於是非是即無以盡其職也人臣或溺情於此鮮有不日即於佚樂而惟聲色是尚者故後唐莊宗之寵伶人與任宦官有同譏焉然考其為晉王時嘗欲賜伶人錢而張承業堅持不肯與其詞義凛然昭垂史冊後世稱其志行有縉紳士夫所不及者蓋又千古而一見者矣書經哲人惟刑無疆之辭屬于五極咸中有慶受王嘉師鑒于兹祥刑少詹事臣沈德潛王樵曰刑施于人非可願之事宜不足以致譽而有無疆之譽由于五刑而無一不盡其心則無一而不得其中所以有慶而致無疆之辭也以刑之中全民之中則刑非凶器而乃祥刑矣爾受王之嘉師其尚鑒于此焉臣謹按舜命臯陶為士而相與往復者曰欽曰中周公命蘇忿生為司㓂而相與儆誡者曰敬曰中此用刑之要必本於心法之要也至穆王之命呂侯疑於世變風移矣而於用刑之時悉原本於用德之意故篇中誥誡猶見古帝王以刑全民之盛心今取其辭繹之其云哲人明理之人也明理之人用刑則不傷於聰察而有無疆之令譽由五刑之屬於已者咸得其道理之中所以天下後世並慶其同於天地之大德也五刑而變文曰五極猶極則也言五刑所施皆中正之標凖而不能少為増損也嘉師猶言良民民雖已罹於惡而原其受中以生初無虧於天理之善故云嘉師也祥刑良法也用刑而全乎天地好生之心吉祥善事莫大於此故云祥刑也為諸侯者受天子命而撫有嘉師舍兹祥刑其何鑒焉篇終而再三鄭重以付托之此總結全文云爾謹考呂刑一篇言中者屢始言明于刑之中繼言罔非在中又言咸庶中正又言非天不中惟人在命又言德于民之中至此則云咸中有慶先王用刑之意無非折之以中也而刑之能中實本於德始言德威德明繼言祗德又言惟克天德以成三德先王制刑之意無非引之於德也而中與德之所由總歸此心之敬始言敬忌繼言惟敬五刑又言何敬非刑朕敬于刑用心以敬為主則刑無不中刑也而德矣所謂哀矜惻怛猶有三代忠厚之遺者與君天下者秉如天好生之德而又曲體穆王之言將上作下應一心一德即有猛鷙不馴之徒亦皆化其頑殘歸於仁厚太和之氣常流宇宙間矣御覽經史講義卷十四
