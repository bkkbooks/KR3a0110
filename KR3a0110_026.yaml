  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_026-1a, image: WYG0722/WYG0722-0177a.png}
body:
  text: 春秋春王正月隱公元年監察御史臣劉方藹冬十有二月祭伯來隱公元年侍講臣劉藻春齊侯衛侯胥命于蒲桓公三年編修臣金相夏五桓公十有四年監察御史臣張漢春王正月不雨夏四月不雨六月雨僖公三年監察御史臣宮煥文六月雨僖公三年監察御史臣趙青藜凡分至啓閉必書雲物為備故也左氏傳僖公五年編修臣周煌衛侯使孫良夫石稷寧相向禽將侵齊與齊師遇新築人仲叔于奚救孫桓子桓子是以免既衛人賞之以邑辭請曲縣繁纓以朝許之仲尼聞之曰惜也不如多與之邑唯器與名不可以假人君之所司也名以出信信以守器器以藏禮禮以行義義以生利利以平民政之大節也若以假人與人政也政亡則國家從之弗可止也已左氏傳成公二年監察御史臣西成君子謂祁奚於是能舉善矣稱其讐不為諂立其子不為比舉其偏不為黨商書曰無偏無黨王道蕩蕩祁奚之謂矣解狐得舉祁午得位伯華得官建一官而三物成能舉善也夫惟善故能舉其類詩曰惟其有之是以似之祁奚有焉左氏傳襄公三年編修臣楊開鼎冬公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭十有二月己亥同盟于戲襄公九年監察御史臣沈懋華子太叔問政于子産子産曰政如農功日夜思之思其始而成其終朝夕而行之行無越思如農之有畔其過鮮矣左氏傳襄公二十有五年編修臣萬年茂鄭子産謂子太叔曰唯有德者能以寬服民其次莫如猛仲尼曰善哉政寬則民慢慢則糾之以猛猛則民殘殘則施之以寬寬以濟猛猛以濟寬政是以和左氏傳昭公二十年編修臣周玉章政寬則民慢慢則糾之以猛猛則民殘殘則施之以寬寬以濟猛猛以濟寬政是以和左氏傳昭公二十年編修臣白瀛檢討臣周孔從
