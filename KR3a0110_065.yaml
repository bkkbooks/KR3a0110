body:
  text: 史唐髙祖武德九年置宏文館少詹事臣沈徳潛尹起莘曰太宗初政如日方升纖翳不作其清明氣象至今可想綱目書置宏文館初無美詞而分注備載其君臣論治之實後之欲考太宗之治者當於是焉觀之則得其要領矣臣謹按髙祖武徳四年秦王開館以延文學之士杜如晦以下十八人為文學館學士時人既謂之登瀛洲矣至是復置宏文館選天下文學之士更日宿直聼朝之隙講論前言往行商確政事此初政之善也嘗思太宗弱齡起兵輔髙祖定天下純乎武功疑於文教有所未暇及觀有天下以後於禮樂刑政之屬甚詳且備由左右翼贊之士所以薫陶其耳目厭飫其心思者皆用人聼言仁厚節儉之方也綱目書置宏文館分注詳悉如魏徴之箴以虛已孔頴達之誨以受言杜正倫之記言無隠裴矩之不為面從一一備載而太宗之以誠待人不尚權詐正本止盜不用重法至比刻民於割肉充腹例縱欲於剖身藏珠君臣誡勉諄諄懇懇宜行之二十年風俗更易民安富教馴至回心而嚮道也則文治之功顧可少耶且其時諸學士中仕於隋者居多加裴矩隋之佞人也乃佞於隋而忠於唐臣之品量固視君徳為轉移者耶抑君求士士益求君則夫羣才踴躍而元首端拱者固在明良之合徳者耶迨中宗景龍二年置修文館學士選李嶠等善為文者為之而不講求政治宜天下爭以華辭相尚而儒學忠讜之日逺也則以太宗所尚者因文求道而中宗所尚者秪在乎文也此治術之所以相懸也與後元宗開元三年置侍讀官太常卿馬懐素散騎常侍禇無量更日侍讀而經術疑義得以質問十年置麗正書院延禮文儒發揮典籍十三年更集仙殿為集賢殿輕神仙之慿虛重賢者之助理綱目並書以美之於時開元之治有貞觀遺風豈非太宗貽謀之善為之後者得以觀感而興起也哉夫太宗君臣之相朂者足以興道致治而不惟文辭之彪炳如此可云有髙世主之烈矣然當日之交修者惟求度越秦漢以下而未聞力求堯舜所以治天下之道猶非責難陳善之極則也誠使為君者本有堯舜之聰明堯舜之盛徳矣而為之臣者於講求文學之餘復能事事引君當道借古以鑒今因得以防失欽哉四鄰朝夕納誨如鳥之有翼如木之植土如魚之得水漸焉漬焉久而化焉治道之純不自知其入於堯舜之域也此豈太宗君臣所可等量而齊軌也夫史唐太宗貞觀元年以戴胄為大理少卿上以選人多詐冐資䕃敕令自首不首者死未㡬有詐冒事覺者上欲殺之胄奏據法應流上怒曰卿欲守法而使朕失信乎對曰敕者出於一時之喜怒法者國家所以布大信於天下也陛下忿選人之多詐故欲殺之既而知其不可復㫁之以法此乃忍小忿而存大信也上曰卿能執法朕復何憂胄前後犯顔執法言如涌泉上皆從之天下無寃獄将軍長孫順徳受人餽絹事覺上於殿庭賜絹數十匹大理少卿胡演以為不可上曰彼有人性得絹之辱甚於受刑如不知愧一禽獸耳殺之何益監察御史臣孫灝臣謹按戴胄之事法中之平也長孫順徳之事法外之變也昔者漢文帝蓋嘗行此矣釋之犯蹕之議卒從廷尉此與戴胄之執法同張武受賂事覺愧以金錢此與長孫之得絹同唐太宗其有慕於漢文之遺風歟然而兹二事者其一得之而微有失其一則失之實甚而不可以示天下何則選人詐冒據法應流胄於是乎能守法矣太宗不以敕令既行奪人臣之守太宗於是乎能平法矣其用戴胄之言無異漢文聽釋之之請此從諫如流之盛徳所以為得也其微有失者在不審於降敕之初耳若夫胄之犯顔執法天下無寃亦庶㡬釋之之為廷尉矣獨其言曰敕者出於一時之喜怒法者國家所以布大信於天下夫法𠂻於成憲而敕秉於時王敕之不可輕猶法之不可易也書曰令出惟行弗惟反今以大號之渙巽命之申吐徳音下明詔而曰是出於一時之喜怒然者豈端本之論乎釋之之告文帝曰方其時上使使誅之則已宋儒楊時以為是開人主妄殺之端胄説之未安亦略相似故曰得之而亦微有失也至於長孫順徳以黷貨之愆蒙賜絹之恵事不倫矣乃謂得絹之辱甚於受刑如不知愧殺之何益夫不辱之以罰而辱之以賞不愧之以迹而愧之以心或亦帝王振勵末俗之微權偶一行之而已然而偶一行之者即其事之不可以行者也人心所繫莫大於是非國憲所昭莫切於懲勸韓昭侯以敝袴之細留待有功雖風似嗇陋而君子猶有取焉今也受絹而蒙賜将何以處夫却絹者以受絹之一人而賜之數十匹又何以處夫受絹之軰之踵相接者賜均則禁不行賜偏則令不一且此賜也誠予之乎偽予之乎則必曰偽予之矣烏有人主之尊而示人以偽者哉其用恩為不測不測非所以為教也其命意為過深過深非所以為法也漢文用柔道以治天下張武金錢吳王几杖蓋同出於寛厚長者之意太宗追慕前古亦遂踵而行之故今日為賜絹他日為縱囚是皆所以沛殊澤播休聲而不知以彰一時之權則可以垂萬世之式則不可也故曰其失實甚也要而論之治貴得中而已罰必當罪法但如是而必從而甚之者非也故其從戴胄者為持法之公也賞必有功法不應如是而故從而矯之者又非也故其賜長孫順徳者非用法之正也雖然由前之説是謂過義由後之説是謂過仁仁可過也義不可過也與為過義毋寧過仁太宗亦仁主也哉史上謂太子少師蕭瑀曰朕少好弓矢得良弓數十自謂無以加近以示弓工乃曰皆非良材朕問其故曰木心不直則脉理皆邪弓雖勁而發矢不直朕始悟向者辨之未精也朕以弓矢定天下識之猶未能盡况天下之務其能徧知乎乃命京官五品以上更宿中書内省數延見問以民間疾苦及政治得失編修臣錢本誠臣謹按致治之要莫大乎窮天下之理達天下之情夫人主聰明天縱學問髙深萬非臣民所能及然而庶物之理以專而精生民之情以熟而悉故以至聖而詢於至愚合衆人之見聞以成一人之濬哲者明之至公之極也唐太宗以英武定天下乃因弓工一言知物理無窮而智不足恃於是清問羣臣博求讜議借以温言得從容自便使事無遺理民無隠情此貞觀之治所以比隆三代歟然此非獨君道宜爾也即為臣者亦然蓋臣能從善然後能善君漢諸葛亮曰凡有忠慮於國者但勤攻我之闕則事可成唐太宗謂羣臣曰朕欲公等諫公等亦宜受人諫不可以已之所欲惡人違之夫朝廷重臣總領天下封疆大吏統轄數千里其間民風土俗因時異宜茍非開誠布公集思廣益豈能事事允恊而乃體統尊嚴耳目壅蔽屬員進見唯諾惟謹茍出一令雖有不便務相承奉稍或直言忤意非明斥即暗棄之如是而欲求政理得宜民情悦暢無是理矣此風既長雖以守令親民之官而不能親民講約聼訟而外不復與士民相見惟藉吏胥以為耳目奸民地棍得以簧鼔其説而良士結舌而不敢伸愚民含寃而無所告矣臣以為小臣宜虛公以採士民之輿論大臣亦宜虚公以受屬吏之直言凡事必詳悉講明得其利害之實而後入告於天子天子折衷於至當而施行之所謂用中於民此聽言之法也至於進言者受朝廷之延訪尤當竭忠盡慮據實秉公宋司馬光云居言職者當誌其大舍其細先其急後其緩専利國家而不為身謀又云任事者當置身利害之外言事者當置身利害之中蓋古名臣之用心如此若乃任意見之偏拾瑣屑之務誇其利而隠其害舉其得而諱其失言之則愷切而可聼行之則紛擾而無益甚或明知其不可行而姑言之以塞其責既見其不可行而堅持之以遂其過何其忍於欺罔而不忠之甚也夫人臣讀聖賢之書當盛明之世言朝得於上則四海之内夕被其澤其亦何所瞻顧而不以忠言至計直陳君父之前哉總之上以誠求下以實應君臣同徳通天下為一身三代以上致治之要實在於此非特貞觀而已也史上謂太子少師蕭瑀曰朕少好弓矢得良弓數十自謂無以加近以示弓工乃曰皆非良材朕問其故曰木心不直則脉理皆邪弓雖勁而發矢不直朕始悟向者辨之未精也朕以弓矢定天下識之猶未能盡况天下之務其能徧知乎乃命京官五品以上更宿中書内省數延見問以民間疾苦及政治得失檢討臣傅隆阿臣謹按聖王之治天下也民無難言之隠物無或遁之情且能使天下之人樂事勸功孜孜而不倦故觀其朝則謨明弼亮盡耳目股肱之益也觀其野則飬欲給求盡飲和食徳之休也虞書曰明四目逹四聰周書曰爾有嘉謨嘉猷則入告爾后於内爾乃順之於外誠能得其要領矣唐太宗聰明神武起自戎行宜於天下之事罔勿周知乃於即位之初延見羣臣訪民疾苦諮治得失臣以為是道也一舉而三善備焉何也人主端拱深宮尊榮安富其於小民作苦胼手胝足之狀雖無時不厪於懐究不得躬履田間目覩其事故發號出令或宜於古而不宜於今或宜於此而不宜於彼風土所闗俗尚所習雖甚聖明豈能盡悉惟於清晏之時屢勤諮訪參伍以盡其變執兩以用其中則下情上逹而庶政無不舉矣其善一也且夫庶司百職所事不同而人品亦因之以異其恪守職業者固亦有人其怠惰偷安有玷厥職者亦正自不乏雖有大吏稽察之法三年考核之規然其人或浮華奔競足以投大吏之所好而欺世盜名或直魯樸誠不足以投大吏之所好而難以表見使得不時延見各盡所長以至公之盛心察羣僚之情偽則其人之賢否亦因之立辨矣其善二也至於人之精神志氣引之則日生置之則日縮士當伏處草茅每慮無以自効及至有官有守有言責反怠棄自甘不克振奮者亦由因循習染積累而成也聖人御世羣策羣力兼收並蓄智者得以効其謀勇者得以竭其力彼百司庶府一經召對儻有漫不經心之事既無以仰答聖明又無以保其禄位自宜夙夜黽勉敬修厥職矣賞一人而天下勸罰一人而天下懼大易所謂鼓之舞之以盡神者此其善三也或者慮不時召對未免有迂濶鮮當煩凟聽聞抑或有挾私懐詐所奏不實之弊不知事之可否行之緩急在君人者斟酌審量於其間非必有聞而遂行也若其言之公私情之真妄又豈能逃王者洞鑒之外哉太宗之意亦猶是詢岳闢門懸鞀設鐸之心耳此三代而後貞觀猶為近古也史唐太宗曰人欲自見其形必資明鏡君欲自知其過必待忠臣監察御史臣張湄臣謹按自古帝王未有生而無過者堯舜性之之聖固所稱美善兼盡而無過者矣乃不自以為無過而深責之臣隣曰予違汝弼汝毋面從夫違者過之謂也既無過何有違茍無違又安用弼乎若是則聖人之無過聖人初不自知其無過而且以日知其有過為幸也堯舜且然湯武以下之不恡改過者其皇皇然求知更無論矣蓋人苦不自知返視之明恒不如借鑒之明内省之識恒不及外觀之識彼夫形之有妍媸也醜好也是生人之所顯而易見者也顧其所以顯而易見者由時時有暴吾之妍媸别吾之醜好炯然昭布森列於其前若十目十手之指視雖欲揜藏而不可得者則明鏡之力為多也設一旦離乎鏡抑鏡或昏而不明竊恐妍媸猶是好醜猶是而夙昔之所灼見於中而莫之淆者漸且惝怳焉而無慿矣其不至以媸為妍而以醜為好者㡬何哉雖然不見其形其失止在形而猶未足為心累也生於其心而害於其政者惟過之所積為甚微而惟人君之過之所闗為甚鉅君有過君不知之而臣知之亦非衆臣所能共知之而惟忠臣能知之何則忠臣者君之明鏡也平日一絲不雜誠精故明一物不擾静虛則明既先以戒欺求慊者於吾心澄其本體自克以繩愆糾謬者於君身致其實用是故君之過方萌惟若臣為能防其微君之過將長惟若臣為能杜其漸獻可替否如物來而畢應拾遺補闕亦屢照而不疲明則察乎秋毫鑒則洞乎肝膈有臣若此為之君者其庶㡬可以立於無過之地矣不然者小人大詐若忠每事容悦姑勿論其顛倒是非變易黑白以陷君於過也凡舉朝不敢言人主不樂聞者悉付模稜畧無匡救此無異抱塵鏡以求形之正其乂何形之能見哉故太宗之論篤矣他日因魏徴之沒而復申其説曰以銅為鑑可正衣冠以古為鑑可知興替以人為鑑可知得失彼其所謂人者要非泛屬諸他人也必魏徴乃不愧為忠臣必忠臣乃不愧為明鏡此可以叅觀而得其㫖矣史唐太宗貞觀二年詔舉堪縣令者上曰為朕飬民者惟在都督刺史朕嘗疏其名於屛風坐卧觀之得其在官善惡之跡皆注於名下以備黜陟縣令尤為親民不可不擇乃命五品以上各舉堪為縣令者以名聞編修臣秦勇均臣謹按郡守縣令代天子撫黎元宣徳意䘏疾苦平訟獄勸農桑興教化使民賴其利以安其身家性命者也唐太宗以武功定天下喜功好大寧無動衆勞民之舉而其後休飬生息民皆殷阜至於斗米三錢外户不閉貞觀之治㡬於成康其本在乎任賢納諫數大端而其要在乎謹擇守令恵飬百姓蓋其與民休戚之意時徃來於懐而不去故吏亦勉為循吏此屏風録名誠為三代以下愛民之盛事也且夫屏風録名固不惟其事而惟其心也人主誠汲汲於愛民惟恐牧民者有負所托則雖深居九重無時而不繫念民生之疾苦將守令賢否時刻銘之心版固不在區區屏風之書名所謂參前倚衡也不然者詔令皆為具文選舉僅循成例縱慕古賢君之所為坐卧屏風之旁徃復姓名之數觸於目而不警於心於民何益焉故非實有愛民之心者必不能擇吏而非確有擇吏之識者亦不能愛民也吏得其人則郡國晏安嘉恵流被閭里勿煩苦而鄉亭無夜呼若不得其人将不循職守貪賄殘刻政治乖戾和氣不興萬民喁喁安所仰恃夫大田之詩其言治田也曰去其螟螣及其蟊賊非特田有蟊賊也政亦有之害民之吏是也欲田之登必先去其害稼者欲民之安必先除其害民者吏之害民其才短者其害猶淺其才長者其害滋深蓋才短之人止於懦鈍法令不嚴而民或生玩然使其人操守素嚴誠樸自矢則與民相習之深猶望其有感孚之效與事相練之久猶望其有才識之增若夫才長而心術不端者以殘刻為强幹以紛擾為才能茍可逢迎上官雖疲民之力而不顧茍可希冀遷擢雖賊民之生而不辭此擇吏者不在於擇能吏而在於擇良吏不在於簿書期㑹之著其績而在農桑教化之盡其心也漢時良吏最多或起於方正之科或試以公卿之薦是以吏道純而民氣和也唐太宗令五品以上各舉堪為縣令者亦有漢之遺風誠於常格之外廣為採訪以求得人其現在身膺民社有實稱循良之選非徒世俗之所謂才能者許在朝卿貳在外郡守以上各舉所知以待核實而加之優奨則天下之大萬民之衆得良吏數十人引飬引恬於其間疇不觀感奮興以期仰副子恵元元之至意而治效所臻有不軼漢唐而上者哉史貞觀四年秋七月乙丑上問房𤣥齡蕭瑀曰隋文帝何如主也對曰文帝勤於為治雖性非仁厚亦勵精之主也上曰公得其一未知其二文帝不明而喜察不明則照有不通喜察則多疑於物事皆自决不任羣臣朕則不然擇天下賢才寘之百官使思天下之事闗白宰相審熟便安然後奏聞有功則賞有罪則刑誰敢不竭心力以修職業何憂天下之不治乎編修臣張為儀臣謹按唐太宗之論可謂識治體矣夫以四海之廣萬㡬之衆而皆待治於人主之一身此雖以至聖之聰明才力亦不能周知而徧及也故必審擇輔弼大臣以共襄其事而大臣又慎簡乃僚以各効其能然後綱舉目張而庶官無曠茍於用人之始擇之不審則其信之也不専信之不専則其任之也不重以公卿之尊而稽察檢制㡬同胥吏則彼為之臣者上懼君心之疑下慮䜛口之衆畏葸顧望拘牽寡斷固勢所必然耳由是事無大小政無鉅細莫不取决受成於君而人君以一身欲盡理天下之事頭緒繁冗棼若治絲前後之際易致遺忘詔令所頒遂多舛錯大臣不敢進言諫官莫敢執奏坐使奸胥猾吏反得上下其手而倚法行私朝四暮三不可致詰此萬事所由叢脞也荀卿云主好要則百事詳主好詳則百事荒此之謂也然而推原其故實由於不明蓋人君義理不先定則於事之本末大小既未能權衡得中而於任事之臣其智愚賢否亦未能洞悉情狀勢不得不舍詢事考言之典而間用逆億以自炫其聰明加以䜛謟之徒又從而乗之毛舉細微曲摘幽隠其始因疑而喜察其繼因察而愈疑禁令紛紜上下睽隔重傷國體寖失人心皆不明之所致也故書曰知人則哲能官人易曰知臨大君之宜吉誠以君道之貴明也是以古之聖王於深宮無事之時上稽天若下畏民碞奸聲亂色不留於聰明淫樂慝禮不接於心術務使其志氣惺然常有以自主譬之鏡焉有所蒙則不明去其蒙而物來胥照矣譬之水焉有所淆則不明澄其原而遇象呈形矣然猶恐事㡬至衆其可否是非之介或未能盡明也又必曰與賢士大夫從容講論徃復辨析不獨理義有所折𠂻即人情物態風土異宜廣諮博採無不周悉故於其心之未發也廓然而虚公其既發也油然而順應以天下之才任天下之事建以六典馭以八柄賞罰明而刑政肅綱紀正而風俗醇唐虞之翕受敷施成湯之經徳秉哲文武之克知灼見胥是道也嘗考唐太宗初政以房元齡杜如晦為相軍國大事無不諮之復置宏文館精選天下文學之士令更日宿直聽朝之隙講論前言徃行商㩁政事又數引魏徴入卧内訪以得失其上書言事者皆粘之屋壁出入省覽於時孫伏伽李乾祐等以直諫擢官張元素李大亮等以直諫受賞其用人惟己之美史不絶書故得賢者在位能者在職人民和樂天下昇平三代以下推為賢主惟其能得為政之大體也故宋儒程子曰論學便要明理論治便湏識體史唐太宗貞觀四年冬大有年侍講學士臣沈徳潛范祖禹曰魏徴仁義之説欲順天下之理而治之封徳彛刑罰之言欲拂天下之性而治之太宗從魏徴而不從徳彛行之四年遂致太平仁義之效如此其速也臣謹按大有年何以書志盛也志盛者何美天人之相應也天人之相應何以徴徴於唐太宗之却側言從正論實能以恤民者格天而天旋以仁民者報君也先是魏徴勸太宗以徳化民而封徳彛進以秦漢法律雜霸之術謂書生虛論不足以治澆訛之俗也徴力破其説而謂五帝三王不易民民而治行帝道而帝行王道而王其言辨其論正矣帝從徴言而次第行之重農桑蠲租賦赦𤯝災出宮女禁獻祥瑞除鞭背刑凡足以救災利民者皆切於乃身而行之惟恐不力迨行之四年而天下大稔㪷米三錢東南嶺海間至於外户不閉行旅不賫糧也此得於設誠致行之後者也且夫天之仁愛人君猶父之仁愛其子必先以艱難勞勩試之者也貞觀元年山東以旱告矣二年闗内以旱饑告畿内以蝗告矣三年復以大水告矣使太宗求治之心未専尠不謂天道之難以感通仁義之果出於迂逺者乃當日勤而撫之而不少悔其從善救時之初心所以災轉為祥禍變為福天鑒其誠民受其賜不期效而效即隨之也與蓋嘗思之天之於人其相去甚近其相通甚㨗即匹夫為善天必有以報之而况天子於天論徳則為肖子論位則為宗子為宗子則能代天之職為肖子則能體天之心從古以來無建皇極而不致斂福之錫念庶徴而不臻平康之治者是以隂陽調而風雨時羣生和而萬民殖史書大有人君可操劵必之而非得之偶然者也貞觀之治近於三代豈非仁義之明效大騐也哉抑又思太平之治固在於徳化而論治之日先决於聼言當封徳彛折辨魏徴其辭未嘗不娓娓可聼若法律雜霸之術真切當於魏徴之議論也者惟人君定其志精其識一切憸邪巧利之説不足以中之斯一徳一心明明穆穆以人感天而天即應焉果如慈父之愛其子而求無不給者矣則致治之要尤在乎嚴君子小人之分也哉有天下者法太宗而更上求純王之治将大有年之書有屢書不一書者矣史唐太宗貞觀四年冬大有年編修臣林蒲封臣謹按史稱貞觀四年米斗不過三四錢終嵗斷刑纔二十九人東至於海南及五嶺皆夜戸不閉行旅不齎糧取給於道路大有之盛如此然考之唐初承隋末之亂武徳以來兵革未息貞觀元年闗中饑二年天下蝗三年大水民生彫敝極矣至於四年即以大有特書治化之美流光史册論者以為魏徴勸行仁義之效如此其速也夫仁義固足以致治而行之必在乎得人天下之大非一手一足之烈明矣臣嘗深求其故竊於綱目所書貞觀二年擇親民之官而知其政治之效所由速也周官六卿分職各率其屬以倡九牧阜成兆民漢宣帝曰庶民所以安其田里而無嘆息愁恨之聲者政平訟理也與我共此者其惟良二千石乎董仲舒曰郡守縣令民之師帥所使承流而宣化也師帥不賢則主徳不宣恩澤不流由此觀之守令之所係者大矣太宗初政詔舉堪為縣令者其言曰與朕飬民者惟都督刺史至於縣令尤為親民不可不擇命五品以上各舉以聞是時太宗虚已勵精於上房杜王魏諸臣竭誠交贊於下詢事考言登明選公中外承風勤求至理是以上無不逹之隠下無不逮之恩隂陽和而風雨時衣食足而民俗厚僅及四年遂致太平向使守令非得其人即有良法美意不過視為具文甚或藉以營私擾衆者矣太宗雖賢烏能家喻户曉身親致之於民哉且夫水旱由於天時聖王所不能免惟有撫恤之方得人而任之乃可轉危而為安易貧而為富歴觀前古莫不皆然史稱漢初敦尚亷隅法網疎濶為吏者長子孫至於文景海内殷富宣帝明於察吏加意奬勸循良接踵為漢中興光武與民休息首褒良吏東漢之盛教化風行唐元宗初年引見畿縣官戒以恵飬黎民屢遣大臣廵訪之開元之治與貞觀並此其明騐也故自古極亂之世得賢守令足以保障一方者有矣未有守令不賢而民能安其生者守令者一方之命也天下者守令之積也守令皆賢則天下咸理矣盛世不借才而治天下何患無人顧用之何如耳古人有言一介之士茍存心利物無不有濟於時况奉天子命為民父母以其急利禄之心而急國家以其謀身家之力而謀百姓雖中材之質皆可勉為循良所謂日計不足而月計有餘者也且天下之事有行於古而不可行於今有宜於此而未必宜於彼者懸而度之雖智必差畫而限之雖才亦絀惟守令之職與民最親處置設施易中肯要舉凡課農桑厚風俗抑豪强撫孤弱賑救災荒安集流散何一非其職分之所當為惟在朝廷明敕大吏専責其成公其賞罰寛其掣肘而徐以觀其效吏治未有不淳民生未有不遂者叶氣嘉生薫為大和大有之書不求自至本固邦寧何施不可将使仁義之澤洽於四方時雍風動之休可復覩也寧僅貞觀之米斗三錢而已哉史唐太宗貞觀六年秋閏七月宴羣臣於丹霄殿上曰人主惟有一心而攻之者甚衆或以勇力或以辯口或以謟諛或以奸詐或以嗜慾輻輳攻之各求自售以取寵禄人主少懈而受其一則危殆隨之此其所以難也少詹事臣呂熾范祖禹曰人主不可以有偏好偏好者奸邪之所趨而讒賊之所入也書曰惟精惟一允執厥中夫如是則衆莫得而攻之矣臣謹按天下之治忽係人主之一心心本虛靈而備萬善然不能不奪於嗜好攻取之私况人主之治心有倍難於常人者常人縱有外誘而處勢既卑不能悉遂其欲又從而攻之者亦寡以無利可邀也人主勢位既崇何求不遂而又操富貴爵禄之權得其歡心即可坐致顯榮是以巧以干進之人日夜揣摩探其君性情之所近心志之所樂曲為迎合冀其一當以邀厚利由是而攻之者衆矣太宗所言勇力辯口謟諛奸詐嗜慾五事皆君心之所易惑者也然五者不必全受但受其一已足為害而五者之中嗜慾尤為易溺蓋紛華靡麗之屬竒技淫巧之端所謂娛心志悦耳目者何限君心一有所暱其初以為何傷而其流必至於難返彼小人者窺伺而得其隙則将百計以求媚即謟諛所由來也容悦既工奸謀易起巧言以惑衆罔訃國是之安危詐偽以營私惟顧身家之利害文過飾非黨邪害正此又辯口奸詐之所由以生故嗜慾者受攻之隙而實為召攻之媒是以古聖垂訓以寡慾為要以慎獨為功使吾心清明有如止水守道凝固有若長城則邪僻無自而入而外侮安敢相近哉太宗英雄之君於道未必深詣特其聰明果決深燭治亂之機故聼言納諫衛正防邪致治之盛為三代以下所僅見當此之時若更能講明聖學克己復禮主敬存誠正心以正朝廷正朝廷以正百官正百官以正萬民則治效所臻有不與唐虞三代比隆哉史唐太宗問魏徴曰羣臣上書可採及召對多失次何也對曰臣觀有司奏事常數日思之及至上前三分不能道一况諫者拂意觸忌非陛下借之辭色豈敢盡其情哉上由是接羣臣顔色益温編修臣蔡新臣謹按有唐賢君莫有過太宗者太宗之徳以納諫為首稱史册所載如孫伏伽戴胄之執法以爭無殊於張釋之皇甫徳參之激切上陳不異於汲黯帝皆優容嘉納可謂盛徳矣而魏徴猶勸帝假詞色以受盡言者太宗以神武定天下即位之初置館殿側聚四庫書二十餘萬卷選天下文學之士令更日直宿講論前言徃行商㩁政事其天資英邁博識古今當時廷臣才識未有能㡬及之者也意其臨朝之際或不免神聖文武之資稍形於詞色故孔頴逹以為位居尊極炫耀聰明則下情不逹諸臣召對之多失次三分不能道一其以此歟然此猶就陳事者言之未及乎拂意觸忌而諫者也拂意觸忌而諫者人臣之所極難也顯言之則近於賣直諷言之則鄰於刺譏援引言之則疑於迂疎激切言之又疑於毁謗總之皆逆耳也夫君之於臣上下至懸殊也臣之爵禄君所賜也榮辱君所定也不寧惟是即身家性命亦君所生全也既已托命於君誰不願為將順之舉以自結於戀主之情而獨甘為逆耳之言以嘗試於不測之威必其實有忠愛愷惻之忱不容自己者也不然則其賦性戅直者也不然亦其顧名思義者也不若是巧者必揣摩以迎合拙者亦緘黙以取容矣李絳之對憲宗曰人臣死生繫人主喜怒誰敢發口諫者就有諫者亦皆晝度夜思朝删暮減比得上達什無二三與徴所言意正相類是以明聖之君邇言有所必察陳言亦所不厭言及主躬不嫌於過當言及時政無妨以過激即有一二無稽弗詢之説亦但弗聽勿庸已耳夫豈無狂愚不知大體以自觸罪悔者賴聖哲以免也太宗惟能聼受故羣臣上書亦多可採而貞觀之時號稱盛治况由此而上之為夏禹之懸鞀置鐸大舜之善與人同又有大焉者乎然則諫草之稀不必盛世直臣之衆愈彰聖主讀臯益之謨可以觀矣史唐貞觀十年權萬紀上言宣饒二州銀大發采之嵗可得數百萬緡帝曰朕所之者非財也但恨無嘉言可以利民耳昔堯舜抵璧於山藏珠於谷漢之桓靈乃聚錢為私藏卿欲以桓靈事我耶黜之監察御史臣柴潮生臣謹按治天下以義不以利而人主之所最易惑而輕信者莫如言利之説夫易之言利於義之和是乃以在人天然之利足以和義之利固未嘗舍乎義而專言利也若言利之臣則以因民之利為在上之利有顯背乎義而曲為之説者不知利者民之所同欲不務公之於民而欲私之財聚於上者民離於下自非英明果斷之君未有能黜言利之臣而杜禍患之萌者也若唐太宗之黜權萬紀有足法者夫權萬紀所言宣饒二州銀大發采之可得百萬緡乃天地間山澤之利初非强取之百姓者也而太宗斥之為言利逺思堯舜之抵璧投珠至以桓靈之聚錢私藏為戒者豈非謂興利必至於害民固不可以不防微而杜漸也哉蓋天地生財有數利不在官乃在於民民得其利財源通而有益於官官専其利則利源塞而必損於民萬紀欲濟其私而言足以傷人害物其視君子之欲行其道而心存於天下國家者迥異矣是不以堯舜事其君而以桓靈事其君也其罪可勝誅哉書曰朕不肩好貨鞠人謀人之保居叙欽太宗之言近之矣臣嘗綜唐一代之治亂興亡而知大宗之垂裕後昆者總在於利民而不專其利子孫變易其法不特有害於民而實無益於國武徳貞觀開國之始授人以口分世業田而取之以租庸調之法蓄兵以府衛兵雖多而無所損設官有常員官不濫而易以禄量其入而出之以為用度由永徽以至開元初年經常簡易無庸言利而國充財足自明皇見海内完治偃然有開疆闢土之心宇文融議取隠户剰田以中主欲而利源開天寳以後韋堅楊慎矜王鉷楊國忠剥下奉上嵗進羨緡百餘萬為天子私藏由是大厯建中貞元數朝瓊林大盈庫建掌以中人而宰相不得問其盈虛元載裴延齡輩害民蠧政釀成厲階以元和之英武精明不能不惑於皇甫鏄程异之邪説雖裴度之信任力爭而不見聽若鹽鐵轉運屯田和糴鑄錢括苗𣙜利借商進奉獻助無所不為立法愈煩而愈弊民日困而用日匱以至於亡孟子所謂上下交征利而國危者唐室其明騐也太宗之黜權萬紀深切著明信為萬世之龜鑑也已且夫小人之敢以言利之説進者何也彼謂國家承平乂安經費滋多所憂者惟用度之不足以漢武之雄才大略而不能不惑於桑孔神宗之大有作為而不能不信於安石惟太宗知藏富於民之大義故顯黜萬紀而無所恤易曰涣王居无咎管子曰與天下同利者天下持之是故興王所宜重為懲創以變天下之貪邪者必自言利之臣始史貞觀十二年九月甲寅上問侍臣創業與守成孰難房𤣥齡曰草昧之初與羣雄並起角力而後成之創業難矣魏徴曰自古帝王莫不得之於艱難失之於安逸守成難矣上曰𤣥齡與吾共取天下出百死得一生故知創業之難魏徴與吾共安天下常恐驕奢生於富貴禍亂生於所忽故知守成之難然創業之難既已徃矣守成之難方當與諸公慎之編修臣張為儀臣謹按唐太宗一生固以創業而兼守成者也故於房魏二臣之説均有所取焉若夫世之論者每謂撥亂返正必得大有為之君而繼體守文者直可䝉業而安一若難易迥殊者此則未審思乎時勢者也以臣載觀史册推其成敗之由竊見守成之難固有倍難於開創者請得而歴陳之夏書曰民惟邦本本固邦寧言國家之安危繫乎民也其在開創之時天下初定户口尚稀田產未盡闢也山澤之利未盡取也為上者但能勞來勸相之則天地之所施生原足給斯人之用况當瘡痍初復民風尚樸民志未侈故積之數年漸臻富庶逮承平既久而生齒日繁矣夫以百金之產一人用之則寛然有餘及逓分之數人則恒苦不給此自然之勢也加以雕文刻鏤之傷農事錦繡纂組之害女紅者競相倣效以為矜誇踵事增華變本加厲又安望其能餘一餘三以自封殖哉故當平居無事之時其謀生之計已無所不至設一遇水旱而弱者流離强者刼掠矣此承平後之民生所以難也説命曰股肱惟人良臣惟聖言君徳之隆替視乎臣也其在開創之時將相大臣皆以歴試之才而受腹心之寄其與人主櫛風沐雨朝夕相親誼則君臣恩猶骨月其信之也篤其任之也專其禮之也重故其時之臣莫不自思奮於功名以報其上遇上有闕失則借箸而陳排闥以諫而無所嫌忌於其間比及後世人主端拱於上百僚奔走於庭召對則限以時黜陟一慿其意由是尊者愈尊卑者日卑其大臣惟以承順意㫖為賢其小臣惟以拘守簿書為恪其任司牧者惟以急徴賦税為公忠其居諫議者惟以毛舉細微為風力至於國計民生之大則皆諉為君上之任而瞻顧依違茍且塞責者此非承平時之人才逺遜於開國也蓋以堂亷暌隔而上下之情不交禮節過煩而臣主之誼已薄故其憂國奉公之誠不足以敵其身家之念也逮至發言盈廷莫職其咎於是為人主者不得不隠授其權於左右近習以相為伺察而孰知所倚以為伺察者乃益以壅蔽其聰明故謟諛之風益盛而人主之勢愈孤此承平後之人才所以為難也禮記曰君子議道自己而置法以民言法之貴乎便民也其在開創之時如漢之三章唐之十二條立法甚簡而守之甚堅簡故易從而堅則莫犯其餘因時變通之制皆聼長吏之自為而徐以觀其效洎乎後世科條日增文網滋密陳規新例棼若亂絲有司日束縛於法之中而不敢稍出一意偶值細事亦必由下而上自外及内文書往復互相辨詰拘牽𤨏碎寖失事機其意不過謂狥人涉私而用法則公耳孰知案牘紛紜為長上者勢難盡省必且反授其權於吏由是吏之所怒則吹毛索瘢而例從其重吏之所喜則旁引曲証而例就其輕析律貳端朝三暮四坐使朝廷之刑賞特以佐吏胥之威福本期以人用法反至以法狥人上下相遁迄於不振此承平後之紀綱所以為難也繫辭傳曰何以守位曰人何以聚人曰財言財之貴乎恒足也其在開創之時憂勤之意深而嗜慾之端淺故雖賦税均平而朝廷之經費自裕自時厥後狃於富厚之勢遂忘物力之艱宮庭之内凡服食器用聲色好玩之屬所費漸廣而又加以官爵之設日冗宗戚之禄日蕃兵卒之犒賞日增木土之營造日衆其用於上者無節而取於下者有制以有制之財而供無節之用勢将慮其不繼必且舉天地間山林川澤之内茍可以取利者胥籠而致之於是聚斂之臣進而掊克之説行利盡於上則民匱於下故國不必遇水旱盜賊而咨嗟愁嘆常若不安其生時不必有敵國外患而補苴支綴常苦不足於用此承平後之財用所以為難也凡此數端固由人事之舛誤亦繫氣數之推遷自三代以來由盛而衰之故畧盡於此矣夫無平不陂無往不復者天地之運也而制治未亂保邦未危者帝王之政也惟賢聖之君能思天命之靡常而念守成之不易清心寡欲以端其原旁求俊乂以輔其徳敦本崇儉所以厚民生也開誠布公所以作人才也慎憲省成所以振紀綱也量入為出所以節財用也如此則治者益治安者益安持盈保泰之道庶可比烈於成康矣然必先審知其難而後能慎終如始故易戒艱貞書稱知恤胥是道也夫以唐太宗之勵精圖治虛懐納諫洵推三代以下之賢主然其後魏徴上疏猶歴指其漸不克終者十事又謂徃以未治為憂故徳義日新今以既治為安故不逮然則守成之難不亦可以想見哉史上謂諫議大夫禇遂良曰卿猶知起居注所書可得觀乎對曰史官書人君言動備記善惡庶㡬人君不敢為非未聞自取而觀之也上曰朕有不善卿亦記之耶對曰臣職當載筆不敢不記黄門侍郎劉洎曰借使遂良不記天下亦皆記之上曰誠然編修臣周煌臣謹按古者左右史官之設與諫官相表裏為用者也諫官任耳目之司爭之於其口史官居左右之地筆之於其書爭之口者情激而辭嚴筆之書者㫖幽而事著蓋爭之在一時而書之在百世史官所掌匪細故也從來當明盛時君咨臣儆都俞吁咈上下相與孜孜各修其職遂臻治理及乎末造君驕於上臣謟於下有將順而無匡救載筆諸臣袖手就列而已故其主徳鮮有善者唐太宗三代以下之令主也英姿大略赫赫當時而於其臣禇遂良一則曰所書可得觀乎再則曰有不善亦記之耶臣每三復不言豈太宗有曲䕶已短之意歟毋亦瞿然深念懼天下後世之是非欲返觀而内鏡之也何以知其然也太宗嘗謂每臨朝欲發一言未嘗不三思恐為民害及聞杜正倫奏賜帛示奨然則太宗非䕶過者迄今覽遂良及劉洎之言何其有犯而無諱也君明則臣直其以是歟今夫史臣所紀非徒鋪張揚厲而已也景星卿雲之屬必書之所以明有瑞也非其所自致能不愧乎旱乾水溢之屬必書之所以明有災也茍其所自致得不懼乎慶賞鼎鐘之及必書之所以明有恩也而若或濫之難免於物議矣刑罰刀鋸之及必書之所以明有威也而若或濫之難禁其羣訾矣下至一嚬一笑一起一居出之者不及覺載之者務其詳蓋若是其嚴且慎也然則何為不自取而觀之也觀之其亦有觸目而警心者乎曰否人主雖聖不能無過而既已言之既已行之茍從萬㡬餘暇屏去外縁理㑹片時便可尋得過處若所謂觸目而警心者蓋如讀緇衣而生愛咏巷伯而生憎非所語於左史之編右史之紀也藉令自觀其書安知不從而怒其後耶雖怒其後而天下亦皆記之於君何利獨惜其臣依違遷就不敢自盡其職耳夫不盡其職者謂之曠官此遂良守道不如守官之言更深切而著明者也蓋臣嘗論天下之治忽闗乎主術之純疵而主術之純疵又自其心之敬肆判之立之監佐之史莊敬之所以日强也親佞人逺君子安肆之所以日偷也為清其敬與肆之所從來則天地祖宗之慿臨子孫臣庶之法守未嘗不於一言一動兆其㡬也以故史官一書人君不當以目遇而當以心遇也夫史見可欲則思知足以自戒将有作則思知止以安人念髙危則思謙冲而自牧懼滿溢則思江海下百川樂盤遊則思三驅以為度憂懈怠則思慎始以敬終慮壅蔽則思虛心以納下想讒邪則思正身以黜惡恩所加則思無因喜以謬賞罰所及則思無因怒以濫刑編修臣彭樹葵臣謹按天下之大繫於人主之一心而其要在思洪範云思曰睿易有之君子思不出其位誠以思者心之官君心正而後百度貞焉静而存之在戒懼動而察之在慎獨當其洗心藏密無息不與天下之故相周是以典謨所載古大臣之告其君者曰兢兢業業一日二日萬㡬又曰安汝止惟㡬惟康勅㡬之學慎思之謂也求之後世若魏徴之十思疏其庶㡬乎徴之言曰知足曰知止主靜立極息事寧人也曰自牧曰百川謙能受益廣能容物也曰三驅曰敬終樂不可極安不忘危也曰虛心曰正身執兩用中表端自上也曰無謬賞曰無濫刑是非存三代之公刑賞皆忠厚之至也大哉言乎徳業畢該閑存共貫説者謂貞觀之治㡬於刑措徴之力居多焉蓋人主惟一心而攻之者百危微之界治忽因之少不自檢則一之數不敵夫百之數而心之存焉者寡矣誠能念天命之靡常凛民碞之可畏方朝乾夕惕之不暇而敢以逸豫為哉此十思一疏洵座右可銘千秋為鑑也雖然匪知之難行之斯難匪行之難終身而行之斯難賢如太宗治如貞觀而十思之後流為十漸然則慎厥始尚克圖厥終哉臣惟古者天子之聼政也士獻詩史獻書師箴􅕓賦近臣盡規庶人傳語臣不揣固陋敬揆斯義期於發明十思之㫖依韻成章為十箴以獻其一曰情動則流主一則正收視於無立體以靜母逸一身而竭百姓方寸之中萬物托命惟時惟㡬克念作聖其二曰周成靈臺民樂上簡漢輟露臺上恤民産經野則殫體國以限宅是丕基履若雲棧肯構肯堂式在方版其三曰居髙而倡下必應之匪惟我應物售其私為暄為潤為怨為咨悔生於亢云何不危哲后視逺其惟聽卑其四曰在器而歌在盈必反容之溉之何溢何損海濶江長源深流逺端倪既呈怵惕恐晚水哉水哉監於有本其五曰雅有吉日風有騶虞然而禽荒奔車凛乎聲律身度無戲無渝亮乃庶事戒於三驅子雲相如麗則非誣其六曰靡不有初鮮克有終慎終如始道積厥躬健故無息敬以守中一其志氣與天地通翼翼勉勉純王之功其七曰衡之在握鑑之在懸明乃昭質中乃逹權穆穆以處或失則偏察察為斷或失則専是故睿聖虛中洞然其八曰取是為非變白為黑必有小忠以濟罔極至誠如神端由敬徳易事難説承家開國無偏無黨剛克柔克其九曰天道下濟煦枯而回無私者徳亦必因材情溺則喜濫恩以開酬庸勸徳貽厥方來無有作好廼言念哉其十曰明罰勅法在帝之欽時至秋肅而天何心怒一不測文乃刻深平情當理以為君臨刑措在古恥格斯今史唐元宗開元二年秋七月焚珠玉錦繡於殿前帝以風俗奢靡乘輿服御金銀器玩宜令有司銷燬以供軍國之用其珠玉錦繡焚於殿前后妃以下皆無得服罷兩京織錦坊後帝使御史楊範臣入海南求珠翠竒寳範臣奏曰陛下前年焚珠玉錦繡示不復用今所求者何以異於所焚者乎帝遽引咎慰論而罷之給事中臣馬宏𤦺司馬光曰明皇之始欲為治能自刻勵節儉如此晚節猶以奢敗甚哉奢靡之易以溺人也詩曰靡不有初鮮克有終可不慎哉臣謹按明皇初志清明勵精圗治即焚珠玊錦繡一節宜若身先節儉使天下移風而易俗者乃焚之未㡬旋復求之論者謂其有初鮮終而不知其初原未嘗實也使其實有崇儉去奢之意則當如漢文之身衣弋綈足履革舄不言躬行始終一轍又何必舉珠玉錦繡焚諸殿前亟亟然表暴於衆人屬目之地惟其亟於表暴而本心之誠不在是無怪其前日焚之今日求之一人之身而前後矛盾如此也顧從諫之美亦尚有足多者昔太宗初平洛陽宮室宏侈者皆毁之未㡬復發卒修宮以備廵幸張元素以為何前日惡之今日效之其説與楊範臣之直諫同太宗既因言而罷役明皇亦聞奏而罷遣其虛以受人而不飾非以遂過也亦同此開元之治所以㡬於貞觀歟然矯强者僅飾於一時面從者亦迫於法語明皇天性本不如漢文之無欲而節以制度又不及太宗是以始為治則戒奢靡從節儉行政聼言皆能矯其情之所便厥後狃於晏安昏於嬖寵淫侈敗度咈諫拒言遂至前後迥不相顧而以身治之者竟以身亂之然則恭儉果可以聲音笑貌為哉史唐開元二十九年春正月立賑饑法制曰承前饑饉皆待奏報然後開倉道路悠逺何救懸絶自今委州縣及採訪使給訖奏聞修撰臣于敏中書法書美之也臣謹按唐虞以來救荒之策備見於書曰政在飬民則所以為民計者無弗周曰食哉惟時則所以足民食者不容後也周官大司徒以荒政十有二聚萬民當時國用所通必有九年之蓄廩藏之設遍於天下嵗或不登賑粟施恵一旅師遺人之屬司之而有餘惟其給之者便耳春秋而後耕三餘一之制不行秦饑乞糴於晉魯饑乞糴於齊至魏李悝始為平糴後世因之遂稱良法漢一海内分設郡縣撫綏安輯守令得以自行其意兩京循吏史不絶書由事權責於守令也耿夀昌之常平長孫平之義倉朱子之社倉皆古今備荒善政然得其人則為韓琦之廣恵倉失其人則為王安石之青苗錢蓋唐宋以後設官寖多閭閻疾苦既不能遽逹於九閽為守令者又多掣肘旁撓不得以自行其意一遇荒歉畏葸逡廵馴至於有司莫告安得人人盡發粟之汲黯繪圗之鄭俠哉夫救荒猶救焚也當其初發即為撲則匹夫匹婦一手足之勞桔橰抱甕一轉移之便乃舍之不為而必呼號奔走望救於通都大邑數十里之人則雖羣力畢集而燎原之勢成於俄頃必至蔓延而不可遏者此不待智者而知之也是以開元立賑饑法綱目大書而特予之蓋從來報荒之弊由於州縣之畏縮大吏之駁詰踏勘之遲延吏胥之科斂惟許其不待奏報即便開倉譬如慈母之乳嬰兒探懐而予更何有號泣徒聞待哺莫及者哉若云此法一行恐不肖有司將有詭飾災荒因縁為奸者竊意有司即不肖豈獨無人心而敢蔑棄亷隅顯干法令上不顧大吏之見聞下不畏道路之口實以冒不測之誅也乎殆有以知其必不然矣伏讀御製日知薈説極稱其法於當賑之刻不容緩奏報之遲緩無濟剖晰精明尤為洞悉民隠今年七月中奉上諭訓誡督撫諄諄以不致玩視民瘼稽延時日為念飭令地方官一遇水災驟至迅文申報督撫委員踏勘設法賑濟務使早沾實恵大哉皇仁懐保誠求恩同髙厚蓋即開元之法以神明變化之而所以體恤斯民之田禾廬舍資生無策者尤為至周且切也惟是水旱之災事同一體州縣之申報展轉既多踏勘之委員稽遲尤甚小民之饑饉流離原處不能終日之勢必待申報之後再為委員委員之後始許成災成災之後方議賑恤展轉稽遲而窮谷深山嗷嗷待哺之民已多不及少沾升斗而早填溝壑者矣然則即開元賑饑之法而特頒諭㫖著為科條許自今州縣一遇歉嵗督撫司道各上官處同日通詳一面相其緩急即行給賑庶親民之官得以自行其意或亦周禮遺人掌邦之委積以待施恵旅師用三粟以恵民之制以仰副聖天子飬民之善政也乎臣謹即其義而敷陳之唯聖明留意焉史唐徳宗建中元年始作兩税法編修臣張映斗臣謹按唐初賦税之法曰租庸調有田則有租有身則有庸有户則有調開元之末版籍寖壊賦斂迫趣取辦無凖下户率皆逃徙土著百無四五楊炎作兩税之法按現在之田土歸諸丁户計必需之經費徴以夏秋此兩税之大槩固救時之良法也然陸贄以為財之所生必因人力兩税以資産為宗不以丁身為本以致挾貲轉徙者脱徭役守業不遷者困斂求夫丁身為本量力授田自古則壤以成賦未嘗頭㑹而箕斂也如慮挾貲而轉徙即按户計丁安得盡考其貲如手實之法而等其賦税乎呂祖謙謂兩税立而三代之制皆不復見縱使屢復田租惟能恵有田之民不能恵無田之民抑思佃田之農雖非蠲復之年亦不肯聽豪民之取盈至於不商不耕是為游惰王政方罰夫里之布又何以稱焉且夫三代而後井田難復漢祖始輕田税至三十而税一其時算賦錢自一百二十至二十文帝更多減免故田税隨田多寡而人税無分貧富魏晉以後户賦始重然晉制丁男丁女皆有占田則出此户賦者亦皆有田之人非鑿空而税之也唐初之租庸調亦出於世業口分為田百畆之中中葉之後田畆之在民者不能禁其賣易而官亦無田可授向之所謂庸調者多徴自無田之人又經兵燹民多流移其可慿者獨田畆耳楊炎所以視大歴十四年墾田之數附丁户於土田幷為兩税者也夫國家經費條欵多端亷吏與龎民樂其歸并黠吏與莠民利其分析蓋歸并則明白易徴輸分析則紛紜難稽察也兩税之行據土田以問業主至明晰也即物産以定貢賦至便利也徴以夏秋時不失也課惟二則民易知也外此而户口之盈虛人丁之耗息時有變遷即循版籍之虛文難掩荒闢之實跡近世鱗册之圗條鞭之制實本於此然而兩税之不免於詬病何也唐之初合先代貢賦徭役之目而為租庸調至是混租庸調之名而為兩税前則兼該後復重出蓋往往而有之此亦楊炎所不料也炎非唐之良臣然兩税之法豈得因其出於炎而過詆之哉御覽經史講義卷二十八
