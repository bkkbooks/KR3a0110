  text: 欽定四庫全書御覽經史講義卷十二
  hash: sha256:18001eaf76b8145ee4e6ad87e0a4372931b0610afd0fe6110ab90b503052aa7d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_049-1a, image: WYG0723/WYG0723-0163a.png}
body:
  text: 書經徳無常師主善為師善無常主協于克一檢討臣陳兆崙蔡沈曰徳者善之總稱善者徳之實行一者其本原統㑹者也徳兼衆善不主於善則無以得一本萬殊之理善原於一不協於一則無以得萬殊一本之妙謂之克一者能一之謂也博而求之於不一之善約而㑹之於至一之理此聖學始終條理之序與夫子所謂一貫者幾矣臣謹按此篇自咸有一徳克享天心以下凡言一之文六七見而此節乃推本於君心其詞復而不厭其義引而彌深於以見人臣之忠愛其君如是其至也蓋君心與氣化相維自古聖帝明王有百年必世之心即不屑為旦夕茍且之計善者因事而形故曰主主以言乎舍此而從彼也一者先事而寓故曰協協以言乎用彼以證此也協于一猶孟子所謂逢其原也惟有所謂一者為主於内而後能用天下之善以協之協之之方至變而一不變審乎此而純王之心見矣何謂一蔡氏以萬殊一本之一當之似矣顧此特空舉之辭而學者飫聞之語也臣愚以為一者仁義中正而已矣仁義中正又統於仁而已矣何以知為仁義中正而又統於仁也王者求端於天一元之運仁為善長故知一之不外是耳然而是一也非知之艱行之維艱亦非行之艱守之維艱何也人有少之所習至渉世而轉自疑者家之所修至宦逹而不自堅者此無他故也觀事變而閲情偽忽若向之所明非今之所便耳而况人君臨御萬方縈懷萬世一日二日所理者非一事宫府内外所用者非一人事繁則不皆素定之事人衆則不皆可信之人雖有慕古之心推誠之徳而時務之見起則漸開功利之門防奸之意多將參用機權之説凡此類者皆足遷思廻慮奪其所安故曰難也今夫堯舜之道固所稱惟一者也明徳親睦帝堯之仁也而天下化之克諧蒸乂帝舜之仁也而天下亦化之夫堯舜之為君亦猶是治天下之事與治天下之人而已矣洪水猛獸之不為害於世堯舜所不能必於天也巧言令色之不混迹於朝堯舜所不能必於人也然而雍動之朝已成勲華之業如昨何者大體正心術純而終始一也且夫一者至約而可操亦至危而易奪凡為君者之所難非獨堯舜之所易也且堯舜之所難即禹臯稷益有不盡知者也故曰堯兢兢舜業業以堯舜之資行仁義之道宜其從所欲而不踰矣而且兢兢業業如此者豈不以搖撼之易而允執之難乎惟伊尹上窺堯舜惟一之㫖而必欲其君之為堯舜故曰協于克一克者難之之辭謂實有其能而不可誣也誠能如是則萬姓咸曰大哉王言又曰一哉王心所以明人心之不可欺而誠之不可掩也而因克綏先王之禄永底烝民之生所以明其非迂濶而不可行行之而必可久也此誠致治之良謨保治之至計也抑臣聞仲舒之策曰尊其所聞則髙明矣行其所知則光大矣髙明光大不在於他在乎加之意而已設誠於内而致行之則三王何異哉陸贄亦云人之所助在乎信信之所立由乎誠循誠於中然後俾衆無惑存信於己可以教人不欺夫所聞所知善也而曰誠曰信一也二子之言其庶乎純粹簡要而可與書言相發明與書經徳無常師主善為師善無常主協于克一監察御史臣馬燝臣謹按堯之命舜者曰允執其中而已至舜之命禹則益以三言曰人心惟危道心惟㣲惟精惟一誠以心之虛靈知覺則一而雜乎形氣之私者為人心原乎性命之正者為道心二者則有公私之不同而其勢不容以並立故必精以察之而使人心退聼一以守之而使道心常存然後危者安微者著而修徳行道無過不及之差矣此千古傳心之要而道統治統胥出乎此也然而學之為道也非博則無以措之於事物非約則無以守之於一心先之以極博返之於至約其程功有次第而安勉無殊途伊尹之告其君也既朂之以主善而又勉之以克一明乎天下之善無窮必當誠諸身而備諸我天下之理則一又當握其要而㑹其通其即精一之微㫖而孔門之所謂一以貫之者乎今夫徳者善之總稱善者徳之實行而一者則其本原統㑹者也本於一而散為萬事事物物各有一善焉一本之所以為萬殊散為萬而仍歸於一事事物物同此一善焉此萬殊之所以為一本今使抱進徳之願以求師法乎古人而心無所主不幾乎欲適千里而不識其途將倀倀乎安所之哉顧師亦何常之有善即師耳見一善則遷之而弗已得一善則守之而弗失由一事之善而推之於事事由一時之善而推之於時時將見衆善畢臻而徳成於己矣而由是由繁以歸之於簡由分而歸之於合易曰天下殊途而同歸一致而百慮向之廣捜博採惟恐一善之或遺者今則統有宗而㑹有元衆善總歸於一理焉所謂放之則彌六合卷之則退藏於宻也所謂細之不遺名物象數之繁精之則祗此身心性命之理也至於協于克一而善何不備徳何不成乎總之一實萬分則所以渉其流者不得不博惟博而後約乃不至於簡陋自安是萬為一則所以返其源者不得不約惟約而後博乃不至於汗漫無歸伊尹之學其所以繼虞廷而深契乎孔子者如此書經徳無常師主善為師善無常主協于克一監察御史臣沈景瀾臣謹按天地間彌綸磅礴者一善氣之流行也切而求之存乎人綜而貫之存乎心不渉之於至博則無以得一本萬殊之理不返之於至約則無以逹萬殊一本之妙此取人為善之大凡歟蔡沈集註曰徳者善之總稱善者徳之實行一者其本原統㑹夫一言之合乎道一事之合乎道皆善也惟恃至虚至靈之心隨所在而取資焉是善無涯而取善之心與為無涯廣捜博採可無得此遺彼之失審乎此而神明之内常懸一善以為之鵠譬若日月孰不照臨萬物森然感而得之裕如耳夫雞司晨犬警夜雖堯舜之聖猶不能廢茍棄小善而勿録則學術治功未有能臻其極者虞廷之明四目逹四聰好問好察雖芻蕘未之或遺其千古主善之極則乎夫師之無常蓋由善之無定在也而善之所在必有定理故主善又貴乎協一聖人之學必以一為歸宿之地方寸之中純然而不雜融㑹而貫通譬之撡權衡以制輕重持規矩以裁方圓凡有形者皆勿能違以之治一身則律度明而禔躬淑以之治天下則風俗羙而教化成其殽列者資諸人其粹精者準諸已至賾而無所遺至散而有所統天下之理萬有不齊聖人之學由博返約始終條理之序有如是者誠可與帝廷精一執中數言相表裏也夫書經俾萬姓咸曰大哉王言又曰一哉王心克綏先王之禄永底烝民之生檢討臣鶴年蔡沈集傳曰人君惟其心之一故其發諸言也大萬姓見其言之大故能知其心之一感應之理自然而然天禄安民生厚一徳之效騐也臣謹按商書此篇前後皆陳一徳而此一節蓋言徳至日新之後所行悉主於善則衆心感通仰政教之昭宣騐君心之純一而天庥滋至民俗豐寜皆一徳之徵也夫所謂一者何也誠也誠則無妄誠則不息當夙夜宥密之時左右近御莫能仰覩其淵微師保疑丞莫能上窺其藴蓄歛此心於兢業之中即推此心於敷布之際易傳有云言出乎身加乎民禮記云王言如絲其出如綸王言如綸其出如綍舉凡渙汗所頒皆有至誠不貳之心載之以出而禮樂刑政已無不包舉於其中天下之大萬姓之繁上感下應呼吸相通莫不奉王言之大而仰見王心之一即所謂彰信兆民信以此懋昭大徳昭以此也且王者又何嘗明掲此心與萬民共見哉其政令實有禆於國是而匪以干譽其恩綸實有濟於生民而匪屬具文其為奬勸也實有以廸善良而著為恒經其為懲誡也實有以維風俗而可垂永久如日月之運行咸被其光如四時之順序胥霑其化而王者純一之心自灼然共見而頌聲作由是玉食萬方梯航逺集先王所守之天禄安以受矣由是九有敉寧豐年屢慶先王所授之烝民康以樂矣孰非一徳之所致哉然王心之持此一徳者愈勉勉也省察克治無間於功修休戚恫瘝常切於睿念發號施令則酌定畫一之條而無所紛更用賢任能則崇信端一之彦而樹之標準凡屬百爾臣工共承君徳之盛以贊襄郅治之隆上孚天眷下協民心於以膺福禄於萬年躋斯民於熙皥皆必至之效也夫書經汝分猷念以相從各設中于乃心侍讀臣黄孫懋蔡沈曰分猷者分君之所圖而共圖之分念者分君之所念而共念之相從相與也中者極至之理謂各以極至之理存於心也臣謹按中者一心之權衡萬事之標準自古聖帝明王曰執中曰建中運之神明逹諸政事舍此更無他道不獨君道然也為臣之道亦然何則臣之猷即君之猷臣之念即君之念臣特分君之猷念以為猷念也分君之念以為念無一毫自私自利之心則此心為不欺其君可以質幽獨分君之猷以為猷無一毫自私自利之事則此事為不負乎君可以對大廷自公孤至於百司同心同徳虛意硏求必期於至當不易而後已所謂各設中于乃心也天下國家未有不就於理者然䆒其不中之故其弊有四一曰無學二曰無識三曰固執四曰觀望夫無學無識平日講明涵養之未至固執觀望則積習之為害居多其固執者意見為主所謂剛惡也其觀望者祗便身圗不恤國事所謂柔惡也事之當為不當為各有一定之衡不易之準意見用事者恣睢之態顯然易見若夫狡詐自私巧於趨避者當其始持禄養交竊位希寵而已寵位既固偏黨遂生偏黨既生威福乃作故始而圓熟巽軟者即其終之堅愎恣肆者也外而閃爍狡獪者必其内而傾側險忌者也如宋元祐間役法一事司馬光主差役章惇主雇役蔡京以一人前後觀望反覆賢如司馬光暴如章惇皆足以欺之小人誠叵測也獨不思己有何猷己之猷即君之猷已有何念己之念即君之念而甘為此哉而忍為此哉臣讀書至盤庚三篇見其時巨室世族百官庶尹狃於便安昩於逺圗致使其君諄諄懇懇丁寧籲告如此竊思觀望之於固執其弊相等而觀望之害尤隱伏難知不可不辨之於早防之於微也盤庚一時誡勉之言足為千古為臣者訓書經鞠人謀人之保居叙欽監察御史臣胡寶瑔臣謹按天生烝民樹后王君公承以大夫師長固欲共體仁愛之心而籌其生養計其安全使億兆人民無不各得其所也惟天地萬物父母而以鞠謀之權授之元后元后作民父母而以鞠謀之事分任於羣有司則叙欽之人可不慎其選歟鞠者如父母之拊育其子善為養也因民之所利而利之斯能鞠人者矣謀者如父母之顧復其子善為計也取民之身家而代為圗之斯能謀人者矣鞠之謀之思其艱也圗其易也故曰思其艱以圗其易民乃寧然則民之寧也其保居之謂乎能保居者真能鞠謀者也必如此之人始叙而用之欽而禮之則書之所以任賢保民者胥得其道矣夫善鞠謀者貴於審時酌古今之宜視風土之便明緩急之數推利弊之源求其實有益於民者而力行之則因時調劑得人以經理而民生自無不遂太公望曰春道生萬物榮夏道長萬物成秋道歛萬物盈冬道藏萬物静聖人配之以為天地經紀故天下治易曰后以財成天地之道輔相天地之宜以左右民蓋生長歛藏者天之時而補偏救弊者人之事欲言保居在於鞠謀欲言鞠謀在於叙欽賈誼曰君以知賢為明吏以愛民為忠誠使守令皆能鞠謀則保其民而奠厥居即萬年太平之基也三代盛王所以叙而用之欽而禮之者為民用之為民禮之也漢時重吏治循良最盛黄霸卓茂爵至通侯即書之所謂叙也璽書勉勵增秩賜金即書之所謂欽也而其道在於久任宣帝云吏數變易則下不安業民知其將久不可欺罔乃服從其教化是吏之宜於久任洵前人不易之論也然則鞠謀保居皆由叙欽之得人茍以此為課吏之常法利民之良規斯盈寧樂利之休不且駸駸上理哉書經無總于貨寶生生自庸侍講臣介福蔡沈註曰總聚也庸民功也此則直戒其所不可為勉其所當為也式敷民徳永肩一心蔡沈註曰式敬也敬布為民之徳永任一心欲其久而不替也臣謹按天生民而立之君使司牧之而君又難以獨治也爰立公卿大夫百執事以分猷宣化凡以為民而已使臣而不能惠鮮懷保躋斯民於安全之地則亦何取乎有是臣哉然臣之所以不能為民者大都皆身家之一念中之既惟利之是殉則其視小民之痌瘝如秦越人之肥瘠雖欲其鞠謀保居而以恭生生為念也豈可得乎此盤庚三篇所以諄諄然勉之以生生自庸而必以總貨寶為戒者良有以也蓋天下之財止有此數不過相流轉於天地之中惟散之於民則一人之財足以供一人之用推而至於四海之廣皆家給人足仰有以事而俯有以育此萬物之所以得其所也若在上之人務為蓄積則財聚而不散於是閭閻之下始有饑不得食寒不得衣而民之不遂其生者衆矣故為政之心莫先於撫字而勵臣之道莫切於止貪誠使為臣者不以貨寶為心則其於民也必不至掊民之財以適己之欲雖不見有經天緯地之才而民自有欣欣向榮之意者惟上不甚有餘故民亦不甚不足蓋均無貧此理勢之必然也且所謂無總于貨寶者非特掊克之宜戒而已即瞻徇之弊餽遺之私乃人情所不能免者而返之公爾忘私之義則於此尤不可不慎陸䞇有云利於小必害於大易於始必悔於終賄道一開展轉滋甚此固掲人臣貪墨之害至深切而著明也昔公儀休相魯見織帛而出其妻食於舍而茹葵愠而㧞之曰吾已食禄又奪園夫紅女利乎蓋居君子之位即不宜為庶人之行况不止與民争利而以掊克為事乎臣嘗論之可散而不可聚者財也故大學平天下一章於悖入悖出之際不啻三致意焉盤庚商之賢君也以身發財之事可决其必無而猶慮其臣之或不然也故於遷殷之始即以是戒之其即周官六計以㢘為本之意乎至所謂永肩一心者則又恐其勉強於一時或不能不改撡於異日故以始終如一期之庶幾民徳敷而民生遂然則盤庚之所以誥誡其臣者誠萬世臣道之極也夫書經若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨啟乃心沃朕心侍講學士臣熊暉吉臣謹按元首之尊運以手足明堂之構承以棟樑天子置公卿輔弼大臣夫固將有所用之也而大臣之效用於君與夫君之所以用大臣蓋交相待矣夫師保之隆非一職之選也調燮之能非簿書之治也自夫主徳之醇疵社稷之至計天下生民之利害皆於一身畢萃假而曰非我責也將修常習故如仲長統所稱漢世三公僅以清慤勤慎自名而緩急曷頼焉若夫人主之用大臣殷殷託寄更非徒備位之云也茍以為能則用之而己以為不能則舍之而已用舍固無成心也然而國家安可一日無大臣也一姓之中必有宗老一介之士必有密友託之也重則遇之也不輕若乃號之為鈞衡實縻之以虗位當此之時大臣浮沉遜避離事自全而腹心耳目遂不得不别有所屬於是左右之人投間抵隙藉以隂售其私馴至離朱眯目貿易黒白而人主之心益茫茫乎無所恃矣中庸謂敬大臣則不眩良有以也髙宗之相傅説也擇之未用之先信之既用之後惓惓然以作礪作舟楫作霖雨期之天下後世卒不謂髙宗之果於用説而傅説欽承祇若亦洵不負王之所用也乃其言啟乃心沃朕心何也則又以究納誨輔徳之實也易曰上下交而志同君與臣之相得也惟心與心之相契也夫忠誠不積則獻替徒虛獻替㒺聞則忠誠曷効古大臣之愛君憂國也自乎天性焉真如火之必熱水之必寒也故其端亮貞純無所矯飾光明洞逹無所回隐知之無不言言之無不盡務使優游漸漬舉君心怡然渙然而動於不自知感於不容己夫是之謂沃心沃心者格心也孟子曰人不足適政不足間惟大人能格君心亦謂先其根本後其節目其潛移黙化之機神速焉耳非必繩愆糾繆之果可盡廢也而茍隨時俯仰順㫖雷同以妄託大人不足適間之意則夫張禹孔光幾疑深靜得體而唐虞之朝禹臯陳謨動色相戒不反覺多事耶是故將順不乏匡救吁咈多於都俞大臣以道事君固當以傅説為法而如髙宗者求言若渇亦真懸鞀設鐸之盛軌也哉大抵君人命相才而忠直者上也而舟楫霖雨之才每間世而一遇獨啟沃之道隨人所得自致焉臣愚以為將求舟楫霖雨之才亦必於啟沃見之蓋未有阿䛕取容尚可與建立功業亦未有法家拂士不足以尊主庇民此又帝王鑒别賢否斟酌用舍之權衡所歴歴不爽者也書經若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨啓乃心沃朕心監察御史臣陳髙翔王氏安石曰作礪使成器舟楫使濟難霖雨使澤民蔡氏沈曰髙宗託物以喻望説納誨之切雖若一意然一節深一節也臣謹按若金用汝作礪喻修身也金之為質純粹以精故周易以象乾道之剛衛風以比武公之徳然必淬而磨之斯渣滓消而光輝著矣人性皆善亦純粹以精者也物蔽氣拘而後漸失其本故欲修身者必加以克治之功然所以克而治之者不能無藉於匡救贊襄之益如仲山甫之補衮汲黯之拾遺魏徵之諌諍皆所以弼成主徳而建皇極作礪之謂也若濟巨川用汝作舟楫喻任事也大廷敷政治忽所關取譬巨川明其為遺大投艱也舟楫之任載猶臣僚之任事故巨川至廣必舟楫堅牢斯濟之而不難政務至繁必臣僚舉職斯理之而無曠茍非輔弼疑丞之選輸誠竭智各殫其翼為明聼之才如同舟者之共濟則有弛而不張之處而庶績不能以咸熙矣詩所謂靖共爾位羅從彦所謂愛君如愛父愛國如愛家吕祖謙所謂處官事如家事皆所以仔肩國是而濟時務作舟楫之謂也若嵗大旱用汝作霖雨喻澤民也民之戴君也如戴天其望君也如望嵗然天澤之布必雲雷為之効靈而後萬物有咸享之象易曰雷雨作而百果草木皆甲拆是也君澤之布必臣僚為之承流而後萬民有均沾之慶詩曰芃芃黍苖隂雨膏之四國有王郇伯勞之是也若有司懐出納之吝羣吏有中飽之虞則無異於屯之屯膏小畜之宻雲不雨矣安得使含生之類無不飲和食徳以遊於聖人之宇哉易稱自上下下其道大光書稱安民則惠黎民懷之皆所以誕敷闓澤而固邦本作霖雨之謂也髙宗設此三喻以命傅説其於天徳王道燦然備矣更即其意而推廣之則知凡為人臣之道必以責難為心以陳善閉邪為事庶有合於作礪之説若承順意㫖以為恭稱頌徳羙以為敬斯與作礪之意異矣必當官以瘝曠為憂食禄以尸素為媿庶有合於舟楫之説若志在偷安而常存局外之視以與衆浮沉巧於規避而常持兩可之議以與時俯仰斯與作舟楫之意異矣必仰體君心而一物失所以為憂奉揚徳意而一夫不獲以為恥庶有合於霖雨之説若不明於本末之内外而挾畛域之見以稽沛澤之汪洋不辨乎義利之後先而假節嗇之名以阻鴻波之浩蕩斯與作霖雨之意異矣書經惟暨乃僚㒺不同心以匡乃辟監察御史臣彭肇洙臣謹按人臣立朝正君徳莫先於一臣心臣心不一君徳不可得而正故兼聽並觀虛一心以納羣下者人君之度也端已率屬集衆心以事一君者大臣之責也何者朝廷之上自卿尹以逮於百職事位益卑去君益逺非若大臣左右天子一言一動可隨時規正己也而政治或有未當君心或有未純小臣縱有感激奮發之私恒苦於勢隔而莫由上逹惟恃大臣開誠布公俾人人得以自靖而後衮職之闕乃可得而補伊訓曰臣下不匡其刑墨春秋傳曰同官為僚匡君者臣子之職而同心則大臣暨乃僚以共成弼諧之休者也然而古來為大臣者或天資深刻惟恐後來驟進往徃借君無過舉之説預杜羣寮靖獻之口而専權固寵者則又樹黨營私或陽博接引之名而隂以行其朋比之術同心固難同心而匡乃辟尤難雖然人臣之所事者君耳君父之念重猜忌之見必消忠愛之情深異同之迹自化禹臯聖人也君明臣良其相與儆戒之詞猶曰同寅協恭和衷哉又曰不自滿假惟汝賢蓋兢兢乎惟恐嘉言之攸伏也周召夾輔王室下至虎賁侍御之士亦得旦夕承弼厥辟故其詩曰濟濟辟王左右趨之又曰無怨無惡率由羣匹是以朝臣協於下君徳昭於上也且夫小臣之不得與大臣同者禄耳秩耳至其愛君許國靖共匪懈之心非有間也公孤無進逼之嫌則嘉謨日至於當宁執政宏開濟之誼則讜論不缺於黻庭言茍切於君身即論議失當亦必委曲以原其隐事若關乎國計縱意氣過激尤當推奬以盡其才况大臣不忘啟沃小臣復得因事効忠彌縫其闕而救正其失一堂之上濟濟相師庶尹允諧何患君不若堯舜治不若唐虞哉要非大臣奉公體國端一己以為僚屬倡不至此由是言之君雖明聖尚必藉規諌之勤臣非協恭無以盡弼直之義不然髙宗聖君也傅説賢相也猶以同心匡辟為命則可知大臣公忠之難而人君之納誨誠不可以或緩矣若夫借黨援為聲氣引宵小為腹心禍首及於正人而害且貽於家國此人臣朋黨之弊為人君者不可不知也書經説復于王曰惟木從繩則正后從諫則聖后克聖臣不命其承疇敢不祗若王之休命監察御史臣徐以升漢書文帝本紀詔曰古之治天下朝有進善之旌誹謗之木所以通治道而來諌者也今法有誹謗訞言之罪是使衆臣不敢盡情而上無由聞過失也將何以來逺方之賢良其除之蔡沈曰木從繩喻后從諌明諌之决不可不受也然髙宗當求受言於己不必責進言於臣君果從諌臣雖不命猶且承之况命之如此誰敢不敬順其羙命乎臣謹按傅説之言見人君不可不受諌也天下雖有本直之木然斷無不假繩墨而正者古來雖有睿智之君然斷無不受諌戒而聖者聖之名人君所甚慕茍非口無過言身無過行亦未易副其名也而究其實則以從諌當之蓋天下惟聖人大公無我舍己從人觀其真能從諌則知其有聖人之徳矣故下文不復云從諫而曰后克聖者以見從諌之即為聖也至于三代以後惟漢文帝實能求諫止輦受疏開言路者至矣乃復下詔除誹謗訞言之罪欲使臣下盡情主上聞過求諫之切如此則情豈有不盡而過豈有不聞哉下無匿情上無過舉治道寧有不日盛哉盖求諫之道必先去其所畏有所顧忌則雖賢者或不敢以盡言無所誅責則雖中材亦皆可以激發故除誹謗訞言之罪乃求諫第一要着此文帝所以為三代後守文令主也然臣愚以為凡人臣之進言不必論其言之當否宜先辨其心之公私夫無所為而為者謂之天理有所為而為者謂之人欲古今之進言其出於天良之本然者固有其人而或汲汲於功名或戚戚於富貴希冀一言之合以邀人主不次之用者亦復不少然或遇不克納諫之主而能言人之所不敢言或具先幾之見而能言人之所不及言或審治亂之要而適當乎時與勢之不可不言雖其舉念之初未必無所為然所言者非係君身即關國是人主亦未嘗不収進言之益乃若明知大度之主不加譴責或逞其一偏之見矯飾以為言或竊取已往之陳事紛更以為言或影響其事張皇其説傅㑹以為言沽直名而希榮遇其心術已不可問更何論其言之當否哉唐太宗神采英毅羣臣進見舉止失措太宗知之每奏事輙假以顔色冀聞其過此亦求諫之盛心也然觀其怒魏徵之直而有㑹須殺此田舍翁之語則知其猶有不能自克之意潛伏於隱微幽獨而非誠能樂受者矣竊以為人臣愛君無過於諫而古來因諫獲罪者不少此豈盡為君者惡聞逆耳之談以規為瑱哉毋亦有愛君之心而所以為諌之法有未善也天下後世徒加主以咈諫之名而不知臣已分其過矣若夫明知其説之過也而姑容之明知其中之詐也而姑恕之明知其事之難行也而姑酌之不使杜進言之口惟欲作敢言之氣如天地之無不容如江海之無不納是即古帝王好問好察聞善則拜之盛心非僅商髙漢文之可同年而語也抑臣更有進者臣之事君猶子之事父父母有過人子幾諫起敬起孝居常則視於無形聽於無聲惟臣之事君亦然折檻牽裾不過諫法之一端聖人之教在不欺不數所貴以忠愛孚以誠敬格謀猷之入告使細旃廣厦黙喻潛移從善如轉圜而視聼形聲之胥冺甚且因一言而定大疑决大患天下百世賴之雖秉國鈞者不是過也斯為無忝言職者矣故宋臣歐陽修曰諌官雖卑與宰相等其言良有以哉書經后從諫則聖檢討臣李金臺臣謹按傅説之告君曰惟木從繩則正后從諌則聖夫以髙宗恭黙思道之主審象旁求之殷舟楫鹽梅之喻其求諌之心亦已至矣而説以是為言者盖有見於作聖之難也抑有見於非作聖之難而從諌之難也粤考自昔人主有始而從諌如流繼而十漸不終者唐之太宗是也有明知其善優柔不斷者漢之元帝是也有剛愎自用雖有善而不納者唐之徳宗是也有惡其言之戅直而漸疎斥不用者漢武之於汲黯明皇之於九齡是也有堅信一人不采衆説以至成法紛更者宋之神宗是也有臣下立言之體不善人主遂厭其激聒一切章奏留中不報者明之神宗是也從諫之難得固如此哉善夫舜之責禹曰予違汝弼汝無面從退有後言求言之心何其切也益之告舜曰儆戒無虞㒺失法度舜决無是事而益言及此何其思深而慮逺也以大舜為法以漢唐諸君為戒則作聖不難矣且夫殷商之時王畿不過千里風俗猶存渾厚似其時之治平猶易而傅説已殷殷勸戒如此後世疆宇日拓中外一家則腹裏邊外之情形海疆㳂河之事勢數倍於昔時又且一命之士授自銓部一尺之土守以王官則内外文武臣僚又數倍於昔時四方水旱疾疫之災仰給於天府官俸役食兵餉之費仰給於司農則㑹計出入之煩又數倍於昔時加以一嵗之斷獄動盈千百一事之輾轉輙經數年則裁决辦理之難又數倍於昔時人主雖宵衣旰食日不暇給竊恐四目之明猶有遺照四聰之逹猶有遺聞則廣開言路集思益以禆髙深當有較髙宗之旁求啟沃而更加勤者矣抑猶有進焉者蔡襄之言曰任諫非難用諌為難知無不言言無不盡者臣之分也諫無不聼聼無不行者君之明也羣臣中有緘黙保位間或摭拾浮辭瑣屑卑陋凟聖聽以塞責者此其人原無心於國家雖罷斥之不為過若有關治體而意見稍殊議論不一者人主惟有兼容並納執兩用中擇其言之尤善者而見之於實事務使有裨於國計有益於民生可傳於天下後世則用諌之利溥及無疆矣至於作聖之根原則又在深宫宻勿人臣章奏不及之地庶有合於古人不聞亦式不諌亦入之道也書經惟天聰明惟聖時憲惟臣欽若惟民從乂右庶子臣陳浩孔安國曰聖王法天以立教於下無不聞見除其所惡納之於善其所施為未嘗不法天也吕祖謙曰髙宗已造明哲之地若火然泉逹故傅説欲擴充髙宗之明哲必憲天之聰明而後已也蔡沈曰天之聰明無所不聞無所不見無他公而已矣人君法天之聰明一出於公則臣敬順而民亦從治矣臣謹按人君繼天出治所以率乎臣而安乎民者必以奉若天道為先天聰明而聖憲之則天人合而王道備也聖憲天而臣民訓行之則上下交而治功成也孔安國以立教之除惡納善為法天吕祖謙以為擴充髙宗之明哲必至於法天之聰明而後已俱於經義有所發明蔡沈於無不聞見推出公字以為上天聰明之實其説益精義蘊幾無餘矣臣愚以為惟主之以敬而本乎誠然後能聰明一出於至公而憲乎天也今夫天髙髙在上未嘗視也而無不見未嘗聴也而無不聞斯為天之聰明也而非天之所以為天中庸曰維天之命於穆不已蓋曰天之所以為天也又曰上天之載無聲無臭至矣天惟以於穆不已者運於無聲無臭之表故無所視而無不見無所聴而無不聞人君法天行之健以自強不息雖不覩不聞而戒慎恐懼之心無或弛雖出王游衍而曰明曰旦之念無少渝則誠敬積而視聽之際自無偏私矣憲天之聰明端在是哉不然而墮聰黜明者異學之杳冥恍惚既非正道所尚而伺察以為明偏聽以為聰者成見一入於心而公理頓失又豈能憲天以盡聰明之用乎臣故曰憲天之聰明在視聽之出於至公而視聽之所以能公者惟在一之於誠敬也至於為臣與民者共戴一君即共戴一天雖其分相懸而誠敬之理初未嘗或異使不仰體吾君憲天之心而各以誠敬自効則廟堂無協恭篤棐之實心而臣職忝草野昩遵道遵路之大義而民俗偷所謂欽若而從乂者果安在乎唐虞三代之治所以庶績咸熙百昌時若和氣協而嘉祥畢至者惟此誠敬之心貫徹流通上感而下應之以蒸為治象也故堂廉一徳而後泰交成海宇同風而後至治洽夫是之謂欽若夫是之謂從乂夫是之謂憲天之效而非一切近功小補之可託哉書經惟天聰明惟聖時憲惟臣欽若惟民從乂給事中臣陳履平蔡沈曰天之聰明無所不聞無所不見無他公而已矣人君法天之聰明一出於公則臣敬順而民亦從治矣臣謹按虞書曰天聰明自我民聰明周書曰亶聰明作元后元后作民父母是聰明者出治之原而憲天則又聰明之本也歴觀古才智之主綜核庶政耳目有時而蔽見聞有時而窮非聰明之不可用也而用之不出於至公則偏倚生而耳目窒矣惟天之聰明冲漠無朕而籲呼者㒺不聞照臨者無不察栽培傾覆各因其自然而無不得其當無他公而已矣人君繼天出治處億兆之上握化理之樞臣也天敕之民也天佑之聰明也天亶之烏可不體天心以建極奉天道以宣猷而一出於至公無我之治哉殷髙宗以睿知之質繼賢聖之烈而傅説首告以憲天之學大哉言乎萬世人君聰明之用不易此矣抑臣更有進者惟公生明是公為聰明所自出非用其聰明以求合於公也耳目之渉歴有限天下之事理無窮以有限之耳目應無窮之事理欲其泛應而曲當也難矣故天以無私成化而一誠感乎萬類王者以大公馭世而萬理融於一心然其所以致此者必先之以主敬繼之以窮理慎獨以審其幾克己以去其私而後心與道合道與天合此遜志時敏之學所以繼憲天而敷陳也歟書經惟天聰明惟聖時憲惟臣欽若惟民從乂監察御史臣朱續經陳櫟曰憲天聰明則君與天一臣民之心均此天理自有不容違者林之竒曰天之聰明即民之聰明君能公其心以憲天而率其臣以欽若則自合乎民之心矣民之從乂盖得天下之所同然非勉強而從之也姚舜牧曰聖人與天為一要與天為一必時時遵奉為成憲而後可又曰聖人不徇己之耳目以天下之耳目為耳目則至聰至明與天合徳矣臣謹按惟天生民有欲欲者聰明之蔽也民蔽於欲不克自乂矣惟天生聰明時乂故曰惟天下至聖聰明睿知足以有臨也雖然君與民不相及也行君之令而致之民厥有臣焉故書稱汝明汝聽也要其所謂汝明汝聽者亦祗分一人之聰明以逹之天下而止則是聰明者聖所獨也聖者臣所法也民可使由不可使知者也而聖人顧不自有其聰明何也天所賦者命也人所受者性也性命之理自天而之人萬物之一源非有我之所得私也臯陶謨曰天聰明自我民聰明泰誓曰天視自我民視天聼自我民聼民者可明而不可愚也人君之視聼得天下所同然則天且弗違矣而况承流於下者乎出一己之私智則人各有心矣安問監觀在上者乎是故塞聰蔽明而具曰予聖常人所以被聰明之累也兼聼並觀而與天合徳聖人所以極聰明之用也然謂聖人舍一心而外求之則又不可聖人天聰明之盡者耳以己之聰明不失知天之聰明有在以其所見察乎衆人所不及見而實為天下所共見以其所聞通乎衆人所不及聞而實為天下所共聞百官之治治以此萬民之察察以此此所謂天與人一以貫之者也顧傅説言奉天而必曰時憲者何也天命流行帝則必察無物不有無時不然純亦不已之聖人耳目之用與天為一自強不息之君子視聼所屬以天為準故郊壇對越者事天之禮也屋漏修省者敬天之誠也而視逺惟明聽徳惟聰者憲天之實也念念而察之事事而體之日日而新之天監常凛帝謂時通豈復有逸豫介於其間哉天子無逸豫而臣有敢為逸豫者乎君臣皆無逸豫而民有不並化於無逸豫者乎天以民為心君以天為心臣以君為心民以君與臣之順天者為心事有必至理有固然也此奉天治民之要道也與書經惟天聰明惟聖時憲惟臣欽若惟民從乂監察御史臣黄登賢臣謹按自古聖王恭己垂裳而廟堂之上四海之遙靡不景徳向風從欲以治非有竒智異術也其所存者天之心所行者天之事而已天者何理也理大公而無私記有之奉三無私以勞天下蓋言王者能奉天之無私也故曰髙明配天又曰浩浩其天而憲天之説特見於傅説之告髙宗其奉三無私之義歟今夫天非有政教號令之施也維天之命於穆不已上天之載無聲無臭然人有善天必佑之人有惡天必棄之天之聰明何其無不聞無不照如是哉其無不聞無不照者惟無私也聖人以其無私聼者法天之聰則亦無不聞矣以其無私視者法天之明則亦無不照矣以無所不聞之聰聼天下以無所不照之明視天下而天下之臣民猶有不恪共以奉職鼓舞而向化者乎君與天一徳則臣與民一心其效有旋至立應者抑臣又按宋臣吕祖謙之説謂髙宗已造明哲之地傅説欲擴而充之必憲天之聰明而後已盖有明哲之資者已裕作聖之基而進以法天之學則莊敬日强純一不已俾庶明勵翼悉凛王章萬姓諴和胥歸王路而後憲天之道無餘藴焉此即傅説所以盡納誨之職而吕祖謙發之其所以資君徳者誠匪細也夫書經惟天聰明惟聖時憲編修臣孫人龍孔安國曰聖王法天以立教於下無不聞見除其所惡納之於善其所施為未嘗不法天也臣謹按傅説既言聖王奉若天道而此申以憲天之聰明者蓋以天髙髙在上雖若無所聼而實無所不聞雖若無所視而實無所不見惟聖王法天之聰明以治其臣民乃所以為奉若天道也詩稱上天之載無聲無臭而其實一元資始品物流形凡主宰乎羣䝉之上者初不待於呼籲而聲情畢達昭然帝謂之可通燭照乎羣生之上者初無事於表著而幽隱畢彰灼然帝鑒之有赫此無他維天之命於穆不已故易簡而理得正大而情見誠通復於一原神絪縕於萬化皆由陰隲之至公而宇宙咸渾涵於聰明中也若夫聖王法天行健而自強不息孔安國以立教於下除其所惡納之於善闡發時憲之義良以天生民而立之君興化致治莫不欲其同歸於善故惟宸衷端虛靈之宰斯聲入能通而一心所融貫者常超乎萬彚之先是所以憲天之聰也睿慮澄昭灼之本斯物來能照而一心所洞徹者常周乎萬里之外是所以憲天之明也由是奉若天道而乾符克協泰運彌昌庶績咸熙品彚時若臣必欽若民亦從乂咸仰繼天立極之聖人而成萬世太平之郅治矣書經惟天聰明惟聖時憲監察御史臣鹿邁祖蔡沈曰天之聰明無所不聞無所不見無他公而已矣人君法天之聰明一出於公則臣敬順而民亦從治矣臣謹按萬物之所共戴者惟天兆民之所共尊者惟聖天即理聖即天也體天之德行天之道然後三極以立而上下同流惟天鑒觀有赫至聰至明其所以無不見聞者無私故也無私則無所蔽而物無遁情故曰天無私覆地無私載日月無私照聖人繼天出治凡惇庸命討皆出於天而寄於君者天臨之君主之臣行之與庶民共之㡬微疑似之間稍渉於偏即開天下以畸重畸輕之漸而與天心有間焉易曰寂然不動感而遂通天下之故詩曰不顯亦臨無射亦保惟此心惺惺終日乾乾俾存諸中者淡然無欲以養其清明之體澄然有主以善其權度之宜使聰明之用内不蔽於己外不蔽於人邇不遺而逺不禦斯與天合徳而王道於以四達而不悖蓋太虛無為而萬物各止其所者天之所以為天也明睿所照而羣生共獻其誠者聖之所以為聖也是故飽煖安佚猶畢雨箕風之各有其好禮樂兵刑猶春夏秋冬之各一其時而明通公溥稱物平施以照臨萬方者直如太和元氣之流行於四時百物中也且夫憲天者當以天之心為心然而天之心寄於民天之聰明初未嘗以目視而耳聼也天聰明自我民聰明天以萬方之民命付之君民心即天心也民之心至私合天下之私而公出焉民之心至愚合天下之愚而明生焉闢四門明四目達四聰天下之聰明莫大乎是昔洪範次敬用之疇曰視曰明聼曰聰又曰思曰睿睿作聖蓋思者聰明之本作聖之原而必統之以敬一敬而天人之理一以貫之矣書經惟聖時憲編修臣王檢臣謹按書之言聖治也典曰天叙禮曰天秩章服曰天命刑用曰天討凡其政教之所被無一不推本於天焉非但以建極綏猷致其欽崇之詞也亶聰明作元后聖天子本天錫之姿以臨天下而又必以其睿智之徳兢兢焉奉若而不違則凡其耳目之所及無非帝命之鑒觀而以人道治之實以天道治之矣今夫天道之成化無心也其視聼之所寄非有形聲之可求也然而日鑒在兹無形也而有形者莫能遁處髙聼卑無聲也而有聲者皆可通則天道之照臨是即君道之極則也故説命曰惟天聰明而繼之曰惟聖時憲夫聖人者本天道以治天下者也書曰敕天之命惟時惟㡬言其敬天之誠無一時一事之少間也敬之至斯憲之精矣詩曰夙夜基命宥宻言其夙夜積徳以承天命者至深至宻是宸衷之淵微念念皆與天心相契也憲之者内惕其欽承外隆其昭事顯以致上律之功隱以盡崇效之實凛凛乎旦明乾惕之懷一私不雜而萬象咸周所謂清明在躬志氣如神也天下雖大萬物雖衆以一心運焉而可以一日而數周矣書曰光被四表格于上下惟時憲之聖人能之是以一代之禮樂典章人仰聖人之制作而實皆天文之炳煥也一代之慶賞刑威人仰聖人之舉錯而實皆天道之昭垂也天以髙則明聖以公則溥極斯世情偽之故萬有不齊而聼以天聰視以天明則凡處於覆幬之中者固無不仰被其升聞之化而寧有情暌勢隔阻於照臨者乎易曰大人者與天地合其徳夫惟憲之斯能合之也孔子曰奉三無私以勞天下奉天者憲天者也陳氏櫟曰憲天聰明則君與天一而漢儒董仲舒亦謂聖人法天而立道然則聖人之至徳固即天道之至教也夫書經慮善以動動惟厥時編修臣秦勇均蔡沈曰善當乎理也時時措之宜也慮固欲其當乎理然動非其時猶無益也聖人酬酢斯世亦其時而已臣謹按傅説告商王以憲天聰明此則憲天之見於處事者也天則之當然無過不及者為善天道之自然流行不滯者為時立其極於至静之中而鼓其機於羣動之際此其故可仰觀於天而得之今夫天健行不息其動也直四時行焉百物生焉隂陽寒暑各得其平屈伸往來莫窺其迹舉天下之物而各正性命保合太和則惟其粹然至善而適當其時也然天無思也無為也無所為慮也天道無心而成化聖人有心而無為故憲天之主不能不藉於慮慮乃可以擇善慮乃可以審時而制動之本一以貫之矣蓋人君之動四海之休戚關焉千載之得失繫焉使不熟思其是非詳審其利弊則制事無本動何以臧惟以善為的而運四海於一心計千載於一日即一言一行之微亦必圗度而後出之端居穆清神明黙運堯本文思為光被舜由執兩以用中即至疇咨清問亦惟欲求其百慮而一致以得至善之㑹歸而使天下之動貞於一而已夫動而克善則動得其正似可動而世為天下道矣而尤必合之於時者何也同一善也或宜於古而不宜於今或適於彼而不適於此先時而行則有輕躁之弊後時而𤼵則有遲滯之愆故必準之以時則秩然而得其序藹然而適其宜神而明之化而裁之範圍天地而不過而所謂善者乃至精至粹不偏不倚而成其為大中之道矣周子通書慎動篇曰動而正曰道用而和曰徳動而正即善之謂也用而和即時之謂也何以慎動亦慎之以慮而已周子之言不與傅説之意相發明也哉雖然慮徵於動而慮之本原不在於動也大學言靜而後能安安而後能慮必先主靜以立人極舉萬事萬物之理皆探本於幾微握樞於宥宻至靜之中萬理悠然其來㑹至臨事之際不過再為審量稱物平施而自得其理若靜而未動無以裕其本原而徒慮之於動則其慮也非粗浮而不相入即紛擾而無所歸又何能得其善而協其時也哉易曰寂然不動感而遂通天下之故誠於靜斯神於動而天下之理胥渾化於何思何慮之天斯則聖學之極功人君憲天而出治至此乃為天人合一之道矣書經慮善以動動惟厥時編修臣陸嘉穎蔡沈曰善當乎理也時時措之宜也慮固欲其當乎理然動非其時猶無益也臣謹按聖人之道與天合徳天者理而已自理之著於事者言之則曰善人君宰制萬㡬由修身以至平天下莫不各有事理當然之極大學所謂至善也故静與天遊動與天適其靜也彚衆善於一心如明鏡止水粹然中涵迨由寂之感天人消長於是乎判政治得失於是乎分一或不慎鮮不有毫釐千里之謬者洪範云思曰睿睿作聖蓋思能通微慮能得止惟深故通天下之志惟㡬乃成天下之務動之所係逺且大慮之為用重以周要皆行乎其所不得不行而非一己之所得與易損益二卦皆曰與時偕行艮卦曰動静不失其時其道光明時之義大矣哉竊嘗觀上古帝王創制顯庸財成輔相以左右民盡羙盡善動㒺不臧或數聖人之事先後作述易地皆然或一聖人之事次第敷施有條不紊或寛厚以養和平之福或嚴肅以振玩愒之風無意必固我之私化剛柔競絿之迹政無不舉令無不行惟其能相時而動也若夫急功好名而不切於時務優柔寡斷而不中乎機宜先時者躁後時者濡過不及之弊其失均矣堯舜之學曰執中曰用中中無定體隨時而在傅説所言實祖於此要其所謂時者不外於法天而已天不言而歳功成日月相推寒暑迭運一動機也法天者秉剛健文明之徳必應天時行乃為大亨是以因時制宜不執成見不循徃轍人或見仁見知各得其一隅而聖人則如太和元氣流行於春夏秋冬而各協其候所以百慮一致動而無動也是必窮理格物以探其原集思廣益以精其辨清心寡欲以養其明雷厲風行以致其决而後先天弗違後天奉若聖人之徳一天之徳也故曰天地無心而成化聖人有心而無為書經慮善以動動惟厥時監察御史臣孫宗溥臣謹按人君經綸百為宰制萬有必先致謹於隱微幽獨之間而衡量乎措正施行之地使天下之物無以擾吾心而吾心之㡬審矣吾心之幾有以應天下而天下之理得矣統寂感存發之交而悉化其紛紜膠固之迹所由因心作則而各當其可也今夫吉凶悔吝生乎動動者事幾所由見端而不可忽焉者也顧動之之先則為慮動之或當或否由於慮之有善有惡故欲慎持乎動者尤當審察乎慮夫善之涵於不慮之先者性命之精寂然而不動也善之形於方慮之頃者事物之理感而遂通也然必有省察之方以審乎善之㡬有克治之力以堅乎善之志因一念之甚微而善有擴充之量因一時之偶觸而善有日新之功夫如是可以推行盡利而動㒺不臧矣乎然所貴乎時措咸宜者何也蓋善無定體隨時而在方其慮也意念乍萌與物未接故只見為善而時之妙理未呈及其動也經緯互形與心為準惟能協乎時而善之化裁始見茍徒執乎所慮之善而不克變通於其間則施之或失其當而逕行直遂反有實意而莫達者矣用之或非其宜而拘文牽義即有成憲而難遵者矣古今來好治之君其立心行政非不事事求合乎理然或時異勢殊功效懸絶化未下䆒變故滋生此以見徒善之不足以為政而時之為義大矣哉且夫善之外非别有所謂時也從來驩虞小補之治毎假時宜之説以文其目前茍且之施卒之化不本乎因心治難臻於上理此舍善以言時而失厥本矣夫時亦從善見耳特以善如裘葛之良時如寒暑之候時非裘葛雖善何施故必有因勢利導之方而後見神明黙成之妙此帝王經權悉協體立用行以制心之學裕治世之模而非後世違道以干民譽因循以便身圖者所得藉為口實也夫傅説之進告於王曰惟天聰明惟聖時憲天道惟時是以萬物雜然各得其職而不亂其光為日月其運為隂陽其威為雷霆其澤為雨露皆生於時者也使人君舉措設施昩於機宜干時而動即不得謂聰明矣故時者正王者憲天之學所以率作臣下丕冐羣生者胥此道也烏可以忽乎哉書經惟事事乃其有備有備無患編修臣孫宗溥臣謹按自古聖君主治於上賢臣輔治於下各有其當為之事而無敢稍自暇逸故兢兢業業一日二日萬㡬事其君之事百工惟時而思日孜孜思日贊贊事其臣之事君臣交相為理於以亮天工凝庶績而思患預防之意亦未嘗不寓於此焉益之戒舜曰儆戒無虞而傅説之告髙宗亦曰惟事事乃其有備有備無患夫患伏於未形而備則豫於平日有備歸於事事則所謂有備者非防變於事外而别有經營也亦祗事其所事凡政令之所必修職業之所當盡善始慮終慎乃憲省乃成而已而備即於是儲而患即於是弭先儒張氏曰修車馬備器械事乎兵事則兵有其備故外務不能為之憂簡稼器修稼政事乎農事則農有其備故水旱不能為之害此其大較也夫兵可百年不用而不可一日不備大司馬之法中春教振旅中夏教茇舍中秋教治兵中冬教大閲整飭其車旗戎馬器械熟習其坐作進退疾徐所以修軍實而壯武威非曰萬姓敉寧四夷賔服可忘戰備也若夫食乃民之天物土宜頒穀種以教稼穡勤樹藝自司徒而下迄於田畯皆各事其事既無曠土亦無惰民三年耕則有一年之蓄九年耕則有三年之蓄而又有十二荒政以聚萬民遺人委積以待施恵卒遇旱澇之災而民不凍饑邑無流亡蓄積多而備先具也此就兵農二事言之而有備無患之意可以類推矣臣又按林氏之竒曰此又戒之以預備於不慮治不忘亂安不忘危之事夫居安思危在治思亂是固朝乾夕惕之至意持盈保泰之良謨百王莫易者也昔周公之輔成王也作詩曰迨天之未隂雨徹彼桑土綢繆牖户夫以成王之賢周公之聖君臣一徳以成郅隆之治豈猶慮見侮於下民而必綢繆於未雨耶誠欲吾君知王業之艱難而制治於未亂保邦於未危必有備乃可無患與傅説之告髙宗同一意耳是故思艱圖治者宵衣旰食惟時惟㡬而同寅協恭相與釐工熙載廟堂之經畫周及萬里而遙一日之章程慮及奕禩以後沴忒不作姦宄不生於以鞏固其苞桑而享萬世無疆之休也哉書經惟事事乃其有備有備無患監察御史臣程盛修臣謹按凡人治己然聖人治未然未然者有備之謂也故重熙累洽不足恃而曰桑土綢繆豐亨豫大不足言而曰厝薪抱火古之人豈好為是私憂過計之言以動色相戒哉誠以天下者非一手一足之烈治天下者非一時一世之事繼體之主䝉業而安外侮不生内憂不作循塗守轍不失為哲王改絃更張亦號為英辟舉而措之馴致太平不知治忽之幾即伏於此天下之大有耳目所及之處有耳目所不及之處有心思所到之處有心思所不到之處惟聖人見微知著先事預防故能化有事為無事不釀無事為有事國家承平歴年所矣四郊無壘𤇺燧不驚少者不見金革老者不聞鉦鼔文恬武嬉習為故常然鄉里暴横亂之萌也奸民煽動亂之兆也城狐社鼠之蟠踞亂之藪也不早為弭之聚數千萬之游手而廹以饑寒何異驅數千萬之虎狼而縱之山林哉猶有説焉無平而不陂者天之道無静而不動者人之心人心之動乗乎其機事機之來發於其猝待其猝發而始圗之則國家受其害而百姓罹其殃當其未發而先制之則廟堂無旰食之憂而閭閻無震驚之患雖曰旱潦之後撫綏不可缺也而法制亦不可疎嗷嗷之衆噢咻不可緩也而整齊亦不可少必使人人有感恩之心而人人無倖恩之心事事有不然之慮而事事無或然之慮是安得不賴封疆乎哉封疆之臣其付託也重其體察也真其呼應也捷彌縫其闕而匡救其災事半功倍也夫以得為之勢遇可為之時不為地方計長久民生計逺大鋤耰棘矜之軰視為不必憂椎牛發冡之奸視為不必畏一旦有釁鋌而走險明之徃鑒尚忍言哉善乎蘇軾之言曰内無權臣外無强諸侯而可憂者姦民也去姦之道小惡不容於鄉大惡不容於國不避誅除搏擊之名而勿邀姑息寛厚之譽有備無患豈一朝一夕之故哉有備者何練軍實以固疆圉勸農桑以興地利嚴保甲以清邪慝老生之常談乎實救時之急務也書經惟厥攸居政事惟醇右中允臣涂逄震蔡沈曰居止而安之義安於義理之所止也義理出於勉強則猶二也義理安於自然則一矣一故政事醇而不雜也臣謹按傅説告髙宗以憲天聰明此則約其要於君心乃憲天出治之本而天徳王道一以貫之者也夫人君以一心為萬化之本大而為政小而為事四海之休戚萬年之利弊胥係乎此而雜霸之施與純王之道逈乎不同者醇與不醇之分也即心慕乎純王之道欲仿而行之而或求治之心過於鋭初無寛和優裕之意以行乎其間則張弛毎因以失宜或圗治之文失於繁初無誠懇篤實之思以維乎其内則措施自不能各當此政事之不醇皆由於心之不醇而心之不醇實由於居之不安也原夫人心之體至虛至靈義理本其所固有自物欲日侵義理漸失而心役役而不寧擾擾而不静求所以涵養此心者仍非義理不為功蓋義勝者從循理則安此一定之理也誠知存理而由義矣而察之未精行之未熟則心與義理猶不免有迎距離合之迹欲求如堯之安安禹之所謂安汝止豈可得乎惟厥攸居者心依於理理融於心居之以凝一而散者自聚也居之以簡約而紛者自靖也渾然中藏粹然内藴其養之也至裕其用之也不窮由是舉而措之一心即萬化之樞一理即萬事之準時中之極有以立於化裁之先斯用中之道自有以協於精一之則舉所謂龎雜之治紛更之端何自而生而寧有纎毫之不醇者哉而憲天之道乃可得而言矣天無心而成化聖有心而無為天無心而太極之理涵乎六虚推而行之而萬物於以各正也聖有心而皇極之建渾然一元行而宜之而萬國於以咸寧也夫聖人斂其聰明於寧謐一如天之於穆之難窺運其聰明於酬酢一如天之變化而莫測攸居則其静也専惟醇則其動也直而憲天之全體大用悉該於是矣漢儒董仲舒有言曰正君心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方此探乎政事之所從出也又曰設誠於内而致行之則居之未安而所以求至於安者可以知其功矣宋儒朱子有言曰人君為治之本在乎正心術以立紀綱紀綱不能以自立必人主之心術公平正大無偏黨反側之私然後紀綱有所繫而立其要在講明義理之歸閉塞私邪之路是皆可與惟厥攸居之㫖相叅而互証者歟書經惟厥攸居政事惟醇編修臣汪士鍠蔡沈曰居止而安之義安於義理之所止也義理出於勉强則猶二也義理安於自然則一矣一故政事醇而不雜也臣謹按傅說以憲天出治告君即備舉其事而推本於一心曰惟厥攸居居者以心之所宅而言蔡沈釋為止而安者即虞書所謂安汝止也漢儒董仲舒有言正心以正朝廷正朝廷以正百官正百官以正萬民一心所係其重如此茍非養之有素從容中道者不可以語居之安也惟聖主殫心宥宻緝熙光明夙夜寅畏時幾敕命其涵養也禮陶而樂淑其純粹也仁熟而義精故徳性堅定方寸澄湛如明鏡止水纎翳不染無少混淆廓然虗公物來順應由是大綱舉施之於政而協萬目張見之於事而當在上者南面恭己而成化在下者日用飲食而徧徳朝無叢脞之煩野無竒衺之擾以純王之心布純王之政彰為至治醇而不雜是故備舉其憲天之事則發號施令㒺有不臧詰戎除暴㒺有不濟命徳而賞不僭討罪而刑不濫用人則賢能在列度務則時措咸宜善蓋一世而處之以謙功髙千古而守之以讓保泰持盈斯防維之具備逺佞寡過亦嚬笑之必嚴凡人已内外之間變化云為經緯裁制行乎自然無所勉強盖心安於正則心之所發者無不正如是而政事修明猶有岐於紛雜者未之前聞此一心所以為萬化之原而期其政事之醇者必以攸居為憲天出治之本也書經惟厥攸居政事惟醇監察御史臣孫灝蔡沈曰居止而安之義安於義理之所止也義理出於勉强則猶二也義理安於自然則一矣一故政事醇而不雜也臣謹按傅説告髙宗以憲天聰明之事如上文云云可謂詳矣此節復深探原本而曰惟厥攸居政事惟醇者蓋天下之理散於萬事而筦於一心以事役心則逐事以分給而施之不勝其勞以心宰事則因心以赴㡬而操之不竭其用古之聖王其能聰無不聞明無不見者不於其聰明所被之途侈泛應之能而必於其聰明所從出之處裕存神之妙則人主之一心是也夫心何以云居也居之為義止而安者也理得其所止則至善之極不遷道得其所安則應務之神自暇夫然故廓然而大公物來而順應大之為政則勿二勿三而偏倚有所不恃焉小之為事雖至纎至悉而紛擾有所不生焉惟其心一故也一故醇醇故不雜是之謂以天徳行王道也堯舜之惟危惟微所以謹此心而垂裳之治準此矣禹之不矜不伐所以持此心而文命之敷本此矣湯之不邇不殖所以清此心而九圍之式萬邦之懷基此矣髙宗繼堯舜禹湯之後傅説輔以憲天聰明而復推本厥居以為政事之根柢斯純王之心法也董仲舒有言正心以正朝廷正朝廷以正百官正百官以正萬民其知本之論也夫書經惟厥攸居政事惟醇監察御史臣沈廷芳蔡沈曰居止而安之義安於義理之所止也義理出於勉强則猶二也義理安於自然則一矣一故政事醇而不雜也林之竒曰自此以上所以為髙宗謀者無所不至故又總結之蓋言如上之所云當謹者其本則在人主先正其心術而已居者有所主於中也中有所主則政事不駁雜此其本也臣謹按人君首出庶物以理萬㡬其政治之得失俱繫於一心之純疵故心一正而朝廷百官萬民胥歸於正矣茍其所居安於義理而循自然則敷政寧人之道安有不醇者哉此傅説之所以拳拳告髙宗也臣嘗紬繹其義考鄭注謂其所居行皆如所言則王之政事醇精其説將居行混而為一又皆如所言説既與上文不相聨貫又於居行無所發明集傳易之是也據易之艮象曰艮其止又云時止則止時行則行動靜不失其時其道光明虞書益稷謨禹曰安汝止惟幾惟康大學曰在止於至善知止而后有定定而后能靜靜而后能安安而后能慮慮而后能得其所謂止與安者居之謂也止且安矣而必合之動靜推之幾康極之能慮能得則居之地政事因之此内聖外王一以貫之之道也先儒以政為大綱事為細目易繫辭曰萬物化醇醇者精也前漢書云黎民醇厚醇者厚也説命醇同純蓋不雜之意然三義必相叅而其義乃備焉醇必視其所居而居之所自來不外説命下篇學古有獲及遜志時敏道積厥躬諸説而得之此人主心術之大防即精一執中之傳無有踰於此者故能聰明時憲作則萬邦恭黙之思協於成徳有不待啟沃而休命自揚者然善無常主而安安能遷則安止之中又必精益求精以復其萬物皆備之天而後義理之宰無一理之不純物誘之防無一私之或雜天徳全而王道備兆民殖而庶績康太平之治將永永無極矣書經非知之艱行之維艱侍讀臣林令旭張栻曰髙宗蓋知之者説故告以雖己知之此非艱也貴於身親實履之耳此為己知者言也臣謹按傅説因髙宗維服之言而更進之曰非知之艱行之維艱蔡沈傳以為得於耳者非難行於身者為難是蓋有見於天下之事萬物之理必貴乎躬行實踐而不徒在乎口耳之敷陳而聼受也朱子曰知與行工夫須著並到二者不可偏廢如大學言道學即言自修中庸言學問思辨即言篤行然知行兩途其先後之序輕重之倫則固有斷然不可誣者致知者力行之本非知之何以行之也是論先後則知先而行後而力行又致知之實知之欲以行之也是論輕重則行重而知輕而其間難易之故亦可以明白而無疑焉人主臨馭萬方並觀兼聼凡耳目之所接簡册之所陳工瞽芻蕘之所獻皆足以廣聰益明發邇見逺而其理之是非可否與夫利害得失之數如黑白之不相䝉如水火之不相入則未嘗不改容動色以致敬重之意如齊宣王於孟子一則曰大哉言矣再則曰善哉言乎是非不知孟子之言為可行也然無躬行之心故其所病不在於不知此知之所以易也如其行之其任重其道逺兢兢業業不敢荒寧矻矻孳孳毋少暇逸知天之難諶則當承以敬畏知命之不易則當凛夫時㡬知創業之艱難則當躬行節儉以率下知事㡬之叢脞則當力圗明作以赴功知旁求俊乂之當殷則必盡其昩爽丕顯之實知聲色貨利之為害則必清其不邇不殖之源先儒所謂有是心即有是政者是也此行之所以難也然行之難自不行者而言則見為難茍能一日用力而行之毋旁撓毋疑貳毋中於功利之邪説毋惑於近習之浮言思其艱以圗其易亦復何難之有董仲舒云尊其所聞則髙明矣行其所知則光大矣髙明光大不在乎他在乎加之意而已夫設誠於中然後能致行於外天下之逹道五逹徳三而所以行之者惟一一者何誠是也一有不誠則是三者皆為虚器故曰誠者聖功之本而知行合一之原也臣嘗讀易於咸得以虛受人之義此致知之事歟於乾得自强不息之義此力行之事歟抑臣猶有説焉聖皇統御寰區勤求治理禀天亶之聰明圗郅隆之至治其所知所行寧猶有未盡者惟是四海之大萬民之衆為一人之所能知有非一人之所能行者故承流宣化必有一心一徳之人而後奉行盡善治化始昭此非殫忠竭力無以著勲猷也非公正純白無以服羣情也非精敏勤勞無以興庶務也非小心敬慎無以善始終也而或者上下相䝉茍且成習委蛇將順之意多彌縫掩䕶之術巧上有徳意而視為具文上布明綸而等諸故事此則知之而難必其行之者責尤有所歸而弊尤不可以不察是又當因傅説維艱之説而盡克艱之義者歟書經説拜稽首曰非知之艱行之惟艱監察御史臣劉方藹蔡沈集傳言髙宗方味説之所言而説以為得於耳者非難行於身者為難臣謹按惟精惟一發於虞書知之行之詳於説命其功一也程子曰學之道必先明諸心知所徃然後力行以求至所謂自明而誠也誠之之道在乎信道篤信道篤則行之果行之果則守之固仁義忠信不離乎心朱子曰知與行常相須如目無足不行足無目不見論先後知為先論輕重行為重是皆言知以啟行行以實知而與説之言相發也蓋徳業之所賴乎知者原為必欲行而求知也顧知猶可以人為啟行不可以人為助知猶可以虛而積行不可以虛而成一念之所明操之數年而不足終身行之不盡者一日知之而有餘則非艱惟艱之故説固深為己知未行之髙宗勉而亦見其進修得力之有在矣惟天聰明惟聖時憲者王道之淵源惟厥攸居政事惟醇者王道之體要行中之條理多端總以憲天而攸居者為歸也若知而不行則亦何所不艱哉明知起羞起戎之失在笥省躬之義而一或不凛則惟口甲胄衣裳干戈之中即滋愆尤而四戒之行難明知天下之治亂在庶官而或徇所愛而官私昵誤為用而爵惡徳則行於用人而任賢勿貳也難明知動當善時當審而或疎於慮過於動不能不失乎中正則行之在研慮慎動者難明知喪善喪功之為失而或不能化其有與矜之念則謙遜之行難明知有備無患之為得而或事事不盡出於周詳則備預之行難明知納侮作非之敗徳而或溺於私而啟寵䕶所失而恥過則窒欲遷善之行難要其所以難者總由立志不堅立志堅而於明諸心者力求其至行之必果守之必固則凡憲天以作臣民之則攸居以措政事於醇者庶能如目之定體足之歩目而所謂非艱維艱者無不如其志之所定而成王道之易易徳業隆於世精一紹其傳以繼堯舜之心法治法豈不盛哉書經説曰王人求多聞時惟建事學于古訓乃有獲事不師古以克永世匪説攸聞惟學遜志務時敏厥修乃來允懷于兹道積于厥躬惟斆學半念終始典于學厥徳修罔覺給事中臣程鍾彦臣謹按自羲農黄帝堯舜禹湯數聖人作以道統相傳即以治統相寄其間言心言性言徳言中者則有之矣至於學之一字則自髙宗咨於傅説説承王命反覆闡發而學之義始明開萬世論學之源為人君務學之準厥功亦大矣哉其曰人求多聞時惟建事學于古訓乃有獲者此傅說詔王以為學之要而先言學而資于人不如反諸己之為有得也多聞者廣詢博訪資講論以備叅考也事即成己成物之事也人求多聞固欲其見之於行事然口耳之功不如神明之悟古訓者古先聖王典謨誓誥之訓凡修己治人之道無不具載必求之於此然後有得若夫不師古昔自用師心而能長治久安者必無之理也於是遂言為學之要惟務遜志時敏蓋學之患莫甚於驕與怠驕則志盈志盈則不能受益怠則氣餒氣餒則不能自強惟卑遜其志而勤敏其行然後身之所修如源頭活水汨汨乎其來矣允懷者言又必深知篤信念念在兹然後所修之道如長日加益漸積而漸崇矣雖然學之理有體必有用學之功有本即有末終始之謂也所以斆與學各居其半必也始之以修己設誠而致行之終之以教人鼔舞而作興之自始迄終一念常在於學庶幾由修而來由來而積積而至於莫知其然而然斯學古無餘功而有獲之效全矣易曰謙受益又曰天行健君子以自强不息遜志時敏之謂也漢董仲舒有曰尊其所聞則髙明矣行其所知則光大矣允懷于兹道積厥躬之謂矣若夫大學已徳之明必推及民徳之新而後止至善之理始備中庸成己之仁必通之成物之智而後合外内之道始全則又見斆學之不可偏廢而終始典學之義不益明哉書經學于古訓乃有獲檢討臣王太岳臣謹按人君繼天立極聰明睿知之姿多得之聖性而大業所以富有盛徳所以日新者常成於聖學學之功所宜懋也蓋斯理之在天下千聖同揆後聖之心原可直契前聖之心惟心不可得見而言為心之聲故古人以心之所得者著於言後人即以言之所得者證其心斯蘊之為徳行發之為事業罔不與古聖相符契焉此傅説所云學于古訓乃有獲者其㫖可深長思也雖然古訓之燦陳非一端也得其大略矣或未究其精微知其一説矣或未悉其繁變按之於心不能融㑹貫通則遇事理之㑹何以左宜而右有乎是故學之云者非徒逞渉獵之能也必有悦心研慮之致焉非徒恃規橅之跡也必有窮神通變之用焉易曰多識前言徃行以畜其徳詩曰古訓是式蓋畜積盛則經權錯出有以待萬物之感式法勤則踐履篤實有以受萬物之備如是則學為實學獲為實獲不如是則過而不留或執而不化雖曰開卷有益要皆儒生尋章摘句之功耳豈有當於帝王之學建事之要哉臣竊以為稽古力學之主其要尤有二焉曰惟精惟一曰無怠無荒精一斯擇之詳而守之約其學不流於玩物而喪志無怠荒斯徳日崇而業日廣其學不淪於有初而鮮終董仲舒曰曾子云尊其所聞則髙明矣行其所知則光大矣髙明光大不在乎他在加之意而已人君誠加意於此使載籍所紀不為空言心力所求皆成實踐則堯之欽明舜之濬哲禹之克艱湯之日新文武之敬止敬勝皆將一以貫之而本聖學為聖治何不可繼唐虞而躋三代也哉書經惟學遜志務時敏厥修乃來允懷于兹道積于厥躬給事中臣邵錦濤林之竒曰功崇惟志業廣惟勤學之欲有得者惟在於此二者遜志則功日以崇時敏則業日以廣此誠為學之大方陳經曰信道不篤則所修雖來亦不堅凝惟允懷於此篤信不忘則來者積聚不散來如日知其所無積如月無忘其所能也臣謹按自古人君修己治人之道無不由學而得而其所以為學之方要在虗以受人勤以勵己積累以詣其極而己遜者其志虛己能而猶謂未能也敏者其功勤求及而常若不及也夫學問無窮非心與理相涵理與心相洽必無以深悉乎此中曲折之故而曲盡其義蘊之所存故必抑其志使入乎理之中沉潛體味不存一毫之滿假則能深與理㑹静與理叅所謂㢲者入也入而後説遜志之義也顧志不可以不虗而功尤不可以不勤使學有作輟奮發於一朝不能無間於異日則事無由集理無由凝故為學之功無姑待無中止無勤始而懈終所謂自强不息體乾之道日進無疆象益之道時敏之義也合是二者而為學之功備則為學之效見雖道本吾所固有非自外至而遜敏既深則其所修怡然有得不啻如泉始逹源源乎其來矣故曰厥修乃來也夫修之未來當遜敏以裕來之原修之既來尤加遜敏以期來之積念兹在兹釋兹在兹篤信而不忘服循而不己心愈虗而所集愈多功彌勤而所藴彌實前此修之來心融而理得也至此道之積業廣而功崇也蓋至道積于厥躬而為學之效全矣然則學之事無窮而握其要實惟此遜敏二者虚以受人勤以勵己惟虛益勤惟勤益虗由層累而日新由充實而廣大修之來來之積其境遞遷其獲靡盡豈可以一二計哉洵乎盛徳隆於一身大業光於斯世未有不從學古中來者也書經惟學遜志務時敏厥修乃來允懷于兹道積于厥躬給事中臣張鉞蔡沈集傳曰遜其志如有所不能敏於學如有所不及虛以受人勤以勵己則其所修如泉始逹源源乎其來矣篤信而深念乎此則道積於身不可一二計矣惟斆學半念終始典于學厥徳修罔覺蔡沈集傳曰言教人居學之半蓋道積厥躬者體之立斆學於人者用之行兼體用合内外而後聖學可全也始之自學學也終之教人亦學也一念終始常在於學無少間斷則德之所修有不知其然而然者矣臣謹按古帝王師保居前勸講在後未有不䆒心於學者故黄帝有大酉小酉之藏周禮重小史内史之掌誠以修身之本致治之原不外是耳然而帝王之學不與經生同經生但事尋章摘句而帝王之學則必有體有用成始成終統人已而無私兼生安而不恃功深於積累效近於自然而後學之事以備學之量以全蓋學必衷諸道道必體諸身而從入有由必先之以遜志而謙能受益力行不倦又必繼之以時敏而業廣惟勤夫天子至貴也而芻蕘一得未必無當於髙深天下至大也而日理萬㡬不廢觀書於乙夜悠然來㑹而信之堅守之力非剛健篤實之所以日新其徳乎於是而日積月累道乃全備而靡遺矣而是道也引而近之不外飭己整躬推而逺之可以牖民覺世古之王者建國君民教學為先誠以成己仁而成物知皆道之所寓也即皆學之所在也詩曰靡不有初鮮克有終易曰天行健君子以自强不息故必工夫綿宻日進無疆而後藏焉修焉息焉游焉道不期積而自積徳不期修而自修天徳王道一以貫之而充積極其盛發見當其可此蓋學問之極功大而化之之謂聖歟書經惟學遜志務時敏厥修乃來編修臣王楷臣謹按傅説以聖學進髙宗而立修道之極也蓋天徳者王道之本心法者治法之原故書道政事而説命下篇於學則諄切而詳明之至遜志時敏厥修乃來二語尤覺辭簡而該言近而逺是知帝王之治皆帝王之學為之也今夫學之理博引無方矣其要在虗其中以為受勤其力以為功嘉修之無盡也竭心思耳目之用恒覺愈引而愈出故學於己者必資於人焉易曰君子以虗受人虗則公公則明既物我之見悉化亦是非之介不淆合天下之知以為知而聰明廣合天下之能以成能而道徳全學之始事端不外此然所謂遜志者不僅卑以自牧己也理道之遙深潛心以入始悉其義類之所歸故必斂抑其志氣而因端竟委原始要終以研窮玩味於不己宋儒朱子曰遜順其志入事理中與為體㑹此説觧遜志更為細密可以叅觀獨是集益於人而進修者惟己退藏其志而奮勉者惟時故孔門論學首重時習而虞書亦曰欽哉惟時時之義大矣哉惟先時以圗其要而致力於初及時以殫其功而克勤於後日有就月有將終日乾乾而自强不息蓋不以偶緩者廢厥時因不以偶懈者廢厥學也由是深造自得厥修之來如泉始逹疏之則益通而滙之則不竭尋源以徃取諸左右而咸宜矣至於修來而受於人勵於己者皆歸實用而無一端之或遺盛徳大業至矣哉總之學為要務學以修之來為歸宿修之來以遜志時敏為實功虛與勤交勉自有日進而無疆者嘗觀學記一篇言學之書也其中所引述每於説命之辭三致意焉洵乎帝王之治本於學帝王之學有其要也書經監于先王成憲其永無愆給事中臣鍾衡吕祖謙曰無愆徳之至難也舜徳盛矣臯陶惟曰罔愆而已王樵曰為治孰非學中事謂成憲不關於君徳固不可但監于成憲與上文學古自是相對而言如夫子逺宗堯舜之道而法則近守文武臣謹按帝王奉若天命道莫大於法天而纘承祖徳道又莫大於法祖說之告王曰惟天聰明惟聖時憲法天之學也至其敷政治人世世守之奉為成憲者則惟法祖為兢兢焉商自成湯受命懋昭大徳建中于民所以自學教人者載在仲虺伊訓諸篇可考而知也嗣後聖賢之君繼作至髙宗恭黙思道託之帝賚旁求肖形命朝夕納誨以輔台徳其言曰俾率先王廸我髙后以康兆民繼述之意顯然見於言辭之間而説之告王於二篇則曰允協于先王成徳於三篇則曰監于先王成憲夫徳全於身為成徳法垂於後為成憲本成徳以敷成憲如三風十愆皆聖謨洋洋垂貽後昆者也徳既允協而復監兹成憲尚何愆之與有夫論學必曰師古學古訓以期有獲修徳之要也論治必曰由舊監成憲以期無愆建事之本也髙宗與傅説君臣相得説以湯望王王以伊尹期說觀伊尹之訓太甲明言烈祖之成徳一則曰欽厥止率乃祖攸行再則曰視乃烈祖無時豫怠三則曰今王嗣有令緒尚監兹哉其反復誥誡無非期於法祖以免過愆今説之告王前後若出一口宜髙宗克紹成湯而成中興之令主説亦繼羙阿衡而為中興之賢臣也歟書經惟説式克欽承旁招俊乂列于庶位給事中臣楊二酉彭朂曰大臣以己事君不若以天下之賢事君一相得其人則天下之賢兼收並蓄庶位皆得其人臣謹按古大臣身秉國鈞以堯舜君民為己任必其才可以馭天下之務必其識可以决天下之㡬又必其量可以容天下之善而後多士奮興以襄庶績登上理而無難傅説言髙宗之徳茍至於無愆則説用能敬承其意旁招俊乂列于庶位蓋進賢雖大臣之責然君徳未至則欲進賢有不可得者責在君也雖然業自遜志典學以監先王成憲君徳其既盛矣乎君徳修而相職可舉矣乃或者訑訑之象見於顔面附己者則從而致之抗己者則從而斥之不以國是為念而但慿一己之好惡為去取外雖託進賢之名勢至賢人逺去君子道消國家何賴有是臣哉且夫全才之難也有才者不必有徳而有徳者恒不見才况名賢不世出必欲人皆伊旦士盡臯夔勢必有所不能惟在知人善任量能器使則君子固収得人之效小人亦罄一得之長此貞觀能用魏徵等諸臣而興王衛靈能用王孫賈諸臣而保國用不違其才也是知非庶位不得其人之為患而輔相能得其人之為難故堯以不得舜為己憂舜以不得禹臯陶為己憂果能休休有容好善如自己出則天下之賢皆争為之用争為之用即争為天下用也而君復能信之篤任之専俾得大其設施而不疑為權柄下移則君臣一徳庶績咸熈其可嫓羙於唐虞三代之盛矣御覽經史講義卷十二
