  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_058-1a, image: WYG0723/WYG0723-0499a.png}
body:
  text: 禮記毋不敬儼若思安定辭安民哉監察御史臣劉方藹朱子曰言君子修身其要在此三者而其要足以安民乃禮之本故以冠篇真德秀曰曲禮一篇為禮記之首而毋不敬一言為曲禮之首蓋敬者禮之綱領也曰毋不敬者謂身心內外不可使有一毫之不敬也其容貌必端嚴而若思其言辭必安定而不遽以此臨民其有不安者乎此章凡四言而修身治國之道略備其必聖賢之遺言與臣謹按敬者一心之主萬理之根修身之要為政之本聖賢之所以為學帝王之所以為治未有外乎此者毋不敬則內焉五性以敬而全外焉九容以敬而正成諸百行以敬而無所不純措諸萬事以敬而無所不當實能為天地立心為生民立命而其徴諸一身與萬物相接者莫要於容貌辭氣儼乎若思斯敬形於貌而出入起居罔有不欽發號施令罔有不臧由是以主敬之心思入天下之民之身家性命曲謀其安全以居敬之貌言感天下之民之血氣心知同歸於寧謐而在君子以敬作所之心則雖儼若思猶恐或愆於儀而德容不足以為民表則雖安定辭猶恐或愆於言而德音不足以為民訓則雖斯民舉安猶恐一夫不獲而深豫辜之懼故其求安於已安之中彌凛馭朽彌畏民碞兢兢業業於無窮而為斯民錫福錫保者總以一敬為終始再以其見於帝王之政聖賢之言者驗之堯欽明而致時雍舜溫恭而臻風動禹祇台而成允治湯以聖敬式九圍文以敬止歌孔邇武以敬勝頌永清孔子謂修己以敬而安人安百姓子思謂篤恭而天下平程子謂上下一於恭敬而天地自位萬物自育此皆以敬致安後先相同之㫖也至若顔子之不惰曾子之日省子思戒慎恐懼孟子之持其志求放心程子主一之謂敬無適之謂一又言整齊嚴肅則心自一朱子敬針謂當事而存靡他其適惟精惟一萬變是監動靜弗違表裏交正諸儒用力於敬各言所得實於毋不敬之一言互相發焉篇首凡四言而舉內聖外王之學天德王道之全無不畢具宜朱子以為古經之言乎禮記曲禮曰毋不敬儼若思安定辭安民哉監察御史臣柴潮生臣謹按敬者德之聚也一心之主宰萬事之權輿聖學之所以成始而成終也蓋敬則志氣肅志氣肅則清明生清明生則百志熙矣發為德容而儼若思發為德音而安定辭於以安人安百姓不難矣故詩以思無邪一言而蔽三百之全禮以毋不敬一言而冒四十九篇之㫖良有以也間嘗稽考經史聖王哲后所以自持於身心之地而古大臣之孜孜贊贊所以陳善於君者千載而下如將見之堯之聖神文武而史臣頌其德者首言欽舜之重華協帝而史臣叙其德者備言恭禹祇德而文命以敷湯日躋而九圍以式文敬止武敬勝成王敬毖創業守成卜世久逺此以見生安異質性反殊途而德性之淵涵學問之懋勉存心敕躬用人行政未有不本於此者建元中董仲舒對䇿曰尊其所聞則髙明行其所知則光大髙明光大不在於他在王心加之意而已願陛下設誠於內而致行之唐太宗曰朕上畏皇天之鍳臨下憚羣臣之瞻仰兢兢業業猶恐不合天意未副人望魏徴曰此誠致治之要願陛下謹終如始則善矣宋孝宗時朱熹入對言一念之頃必察夫天理人欲果天理邪則敬以充之而不使少有壅閼果人欲邪則敬以克之而不使少有凝滯推而至於言語動作之間用人處事之際無不以是裁之則聖心洞徹而天下之事惟所欲為無不如志矣由此觀之自古聖君賢臣一堂咨警莫不本此以敕幾康以惇治化者誠有見於敬與肆不容並立出此入彼即人心道心之爭於片念而判於幾微也是以人無衆寡事無小大存之心者必謹毖而勿敢忽本諸身者必寅畏而無敢疏凡出入起居寢興食息自至纎至悉以及班朝蒞官理財用人體國經野之大始之終之無不載之以兢惕而處之以祇懼則一心有主萬善同歸邁三代纘唐虞胥於是乎基之矣又何漢唐宋之足云哉禮記論辨然後使之任事然後爵之位定然後祿之爵人於朝與士共之給事中臣程盛修臣謹按人主所與共天下者賢才也賢才為天下之公物而非己之所得私亦必愜天下之公心而非己之所得與古帝王名器之重登進之審其難其慎之衷實有如不得已焉者虞廷敷奏以言明試以功車服以庸九官十二牧濟濟師師亮工熙績夫以聖人為之君又得聖人為之佐何難髙下在心取舍任意猶曰知人則哲惟帝其難反覆咨詢期於允當况其下此者乎故論辨而使不輕使也任事而爵不輕爵也位定而祿不輕祿也所為寬之以程期俟之以嵗月試之以盤根錯節豈故為是委曲繁重也哉不如此則人才不出而九重之上奔走天下之豪傑而服其心招徠天下之俊良而鼓其氣未有不於始進之時為兢兢者夫詔爵授糈而一人悅不如登明選公而千萬人悅升於雲霄之上而身受者逾分不如拔之儔伍之中而逖聽者饜心爵人於朝與士共之此物此志也或曰破格之舉可間行乎破格者所以待英才也宇宙之大英才有幾與其破格而長僥幸之風不若循例而養恬靜之氣古來唐太宗之用馬周破格之最善者而不善用之則三科武舉驟升司諫其流弊可勝言哉是故一嵗九遷四時仕宦非史冊之美談也使貪使詐采葑采菲亦權宜之偶見也朝進一人焉而天下知其進之故暮退一人焉而天下知其退之故進而復退焉天下不以退為枉退而復進焉天下不以進為嫌慎之至公之至矣人主爵賞豫奪一本於天天命有德五服五章非一人意見所得與左右未可諸大夫未可以獨斷致其精謀及卿士謀及庶人以兼聽收其益如是而賢才不日蒸日盛以馴致明良喜起之休者未之有也禮記命太師陳詩以觀民風命市納賈以觀民之所好惡編修臣丁一燾漢鄭康成曰陳詩謂采其詩而視之市典市者賈謂物貴賤厚薄也質則用物貴淫則侈物貴臣謹按聖王治天下在厚民之風俗而風俗之厚薄徴於民之好惡夫一人端居法宫洗心於密制節謹度既有以清其源而發號施令六服承流陶淑性情使風清俗美逺近之民無有敢作好惡者民氣必由是而醇矣然而天下之情僞知之不可以不周防之不可以不豫王制巡守之典所以諄諄如此也當夫制治之始期以同民風者教之大綱則君臣父子兄弟夫婦朋友賔客禮之大經則冠婚喪祭鄉飲酒士相見政之大體則飲食衣服事為異别度量數制繫之以九兩任之以九職施之以十二教保息以養之本俗以安之荒政以聚之勸則鄉三物以賔之懲則鄉八刑以糾之固足以養其和平俾謳歌樂利沐膏澤詠勤苦而雍雍以成俗若乃處百工於官府藏商賈於市㕓而僞飾之禁在於民商工賈者各十有二其詳雖不可殫聞然如圭璧金璋命車命服犧牲戎器不粥於市用器不中度布帛精粗不中幅數廣狹不中量不粥於市姦色亂正錦文珠玉成器不粥於市五榖果木禽獸魚鱉粥於市者各有其制至於命夫過市罰一蓋命婦過市罰一帷以防其趨利之漸故民之期於市者不過日用之恆需無竒技淫巧以蕩其心則好惡之邪何自而啓哉然而民風者趨時而漸變者也好惡者悅異而思遷者也聖王巡守之期必欲有以觀之而陳詩則命太師納賈則命司市何也古之侯國皆有樂官而太師為之長其以六德為本六律為音而教六詩者厥為専職故其國之歌詩自國君以及卿士大夫田夫野女之作均在焉爰命陳之或美或刺或志所欣或言所苦玩其發端即此可以見彼揆其含意因顯可以識微而託物感時又皆本於風土觀詩而民風暸如指掌則得失可因是而正也司市之職主平市賈禁物靡結信以質劑取豫以書契其賈或上下之因時或低昻之有定皆稽考所必周而有簿籍之足據故物之質者侈者好惡所尚則用之多寡因之多寡所趨則賈之低昻上下因之命之納賈而民情可見志淫者好必僻而懲禁之法於是而施即奢靡之性因是而節由斯二者以觀而知聖王坊俗於未染遏淫於至豫其慮民良深逺也夫采蕳驅獸其始必有所由倡而積久寖以成國俗錦繡被牆其奢必有所自開而衆情踵以相矜尚使當陳詩納賈之日甫開而即禁豈其至此哉抑臣觀三代而後漢治猶為近古漢史所載張堪守漁陽其童謡曰桑無附枝麥秀兩岐張君為政樂不可支岑熙守東郡其民歌曰我有枳棘岑君伐之我有蟊賊岑君遏之狗吠不驚足下生氂是亦民風之形於詩者也龔遂以儉約率渤海帶刀者使賣刀買牛帶劍者使賣劍買犢由是侈俗漸移而郡中有蓄積是其轉移交易亦好惡之可徴於市賈者也然則欲觀民者雖無太師之陳詩市司之納賈如以風俗人心為先務稗官野史必絶其書淫詞艷曲必革其俗省察其登市之物竒淫有禁僭妄有刑侈靡有罰頒之典禮一其耳目定其心志其於厚風俗端好惡以成道一風同之治豈無補歟禮記冢宰制國用必於嵗之杪五榖皆入然後制國用用地小大視年之豐耗以三十年之通制國用量入以為出給事中臣馬宏琦臣謹按財賦邦國大本生人之喉命天下治亂安危係焉周官太宰以九賦斂財賄以九式均節財用其屬有職內有職嵗有職幣總之以司會掌之以司書凡以惜民財經國計下以制有司俾不得擅取上以約王后世子俾不得過用也而其要不外乎量入為出之一言蓋國家事緒日繁嵗出之數恆有增而無減而年榖豐耗不一嵗入之數恆有減而無增使非通乎盈虛消息而為久逺計將一嵗之入僅足供一嵗之出豐年無事雖若可以粗安而歉嵗則必至於束手矣又其下者用之不給取之益多取之益多則財殫民病而國亦隨之矣所以冢宰制用而必準之以三十年之通蓋其所規者逺而不求近利常使三年餘一九年餘三積之三十年而有十年之餘雖有凶旱水溢而儲備有餘可以補賑貸之所不足此堯湯所以九年水七年旱而野無捐瘠國無乏用也後世廢井田定額賦罄天下嵗杪之所入大半以之養兵而其他經費又遞增遞益而未有已於是常賦之外别營私財以待用如漢有大農而復有少府水衡唐有轉運度支而復有瓊林大盈宋有户部三司而復有封樁內藏此皆制國用之權不一操之於冢宰加以年榖不登兵戈擾攘司計之臣四顧無措於是告緡算舟車借商稅間架以及經總制錢一切罔民取利之具無所不為而悖而入者亦悖而出矣夫國家當創造之初君若臣閲物力之艱難莫不約取縮用以期無乏承平既久府庫充溢豐亨豫大之說起遂舉纍代纍嵗之所積不數年而耗之然則三十年之通制國用可為千古積貯備荒之法而侈心一生出入無準即三十年之經營有一旦掃地耳是以量入為出者經國不易之方而戒侈靡謹節度俾冢宰得以舉其職而無或旁有以撓之則仍視乎主德之恭儉云禮記冢宰以三十年之通制國用量入以為出三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色然後天子食日舉以樂侍講學士臣任啓運鄭康成曰通三十年之率當有九年之蓄出謂所當給為多不過禮少有所殺也孔頴逹曰鄭注給謂給百官賔客及民人為謂造國家器物李覯曰先王治田蕩之以溝均之以遂足以禦凶旱舍之以列寫之以澮足以禦水溢而猶恃九年之蓄待天災之盡也馬端臨曰預備不虞古之善政凶旱水溢天變也三年耕必有一年之食至三十年之通人力也人力備則可以應天災陳祥道曰王者樂以天下憂以天下雖水旱而民無菜色天子日舉以樂豈不宜哉臣謹按民為邦本而食為民天古有云終嵗不製衣則寒一日不再食則饑饑寒交迫於身而尚能無為非者蓋寡孟子曰無恆産而有恆心者惟士為能故王者誠欲惠安元元必先天下之憂而憂後天下之樂而樂則非有以經治其所重不可夫自古人君亦何嘗不以民食為重而汲汲於足民苐不深察乎民足之所自來而徒為一時之補救若漢武移江南下巴蜀之粟以救江陵唐西都不稔乃幸東都雖於目前不無少濟然蠲賑不繼旋見潰敗則孰若三十年之通先有以預使民足之為計得哉嘗考金穰木饑天行自有定數然古者雖有不為災誠以政之為豫備者至詳且悉也周禮以九職任萬民三農生九榖其首重也他若百工飭八材商賈通貨賄嬪婦治絲枲臣妾斂疏材閒民轉移執事蓋如是則生財之道乃備而又可無坐耗之虞若夫祭祀賔客羞服以及匪頒好用則又定以九式雖曰惟王不會而要統於太宰有不如式太宰得以均節之毋或有濫費也而猶恐九職之民或不勤於職故國語曰社而賦事蒸而獻功男女效績愆則有辟而猶恐其或侈於用故上下異服老少異糧五十始衣帛七十始食肉詩曰采荼薪樗食我農夫言老者則食以甘㫖也又曰為此春酒以介眉壽書曰厥父母慶洗腆用酒故羣飲有誅當其時內外男女各修其職各安其分珠玉錦繡不粥于市衣服飲食不粥于市民生不見靡麗之可悅而左道亂政者殺無妖淫邪誕之說鼓惑其間以故太和洋溢戾疾不作自無水旱間有水旱而荒政十有二條不過散利薄征弛力舍禁去幾眚禮殺哀蕃樂多昏索鬼神除盜賊而已初何嘗有岌然不終日之慮而孜孜焉議蠲議賑為哉故餘三餘九誠根本之至計而足民之善道也夫後代之天下猶古之天下後代之地利猶古之地利然一遇歉嵗民或不聊生者何歟朝錯云地有遺利民有餘力生榖之土未盡墾山澤之利未盡出其在漢時有然抑或不僅漢時有然歟冀之北土唐虞夏殷之都也邠岐豐鎬周之所興關中乃所稱天府之國而古之雍冀多富農今之山陜多富賈其名為農者耕耘收穫之法大抵鹵莽滅裂曾不若江南之惰農其婦女都無事事故耕桑沃壤半棄為石田矣臣愚嘗以為西北之民宜先使盡地利古溝洫經緯之法誠不易復但勸民自為溝塘其所開地即除田賦改塘賦大約塘方一畝可濟禾十畝得利多而相效者衆則溝渠備而水旱無虞水旱無虞則田事日興而逐末者將漸返而歸農又其餘荒棄之地聼民闢墾樹藝不收其賦則民更無不踴躍而趨赴者然後簡其善農者若古力田之科優其給使教耕耨有成效則畀之官若古田畯之職記曰山林藪澤民有能取蔬食者野虞教道之是可倣而行也至若江以南地利未嘗不盡農事未嘗不精然一宴之費動逾錢十千鄉里婦女必曵羅綺以為容或一婚而費百金者有之或一葬而費百余者有之十室之里嵗必梨園演劇名為酬神罄一夫力作之入而不償也舁一土木神像周走阡陌閭巷旌旗綵服綿亘數十舍謂之香會罄十夫力作之入而不償也遇有疾病則師巫起而蠱之牲牢酒醴之費更或積數嵗之穫而不償也又安能尚有餘蓄哉故凡冠昏喪祭服食器用經制宜定而邪說淫祀尤所宜禁止者也大學言生衆食寡為疾用舒蓋生財之道不外於開其源而節其流孟子言易田疇薄稅斂又言食以時用以禮意亦與大學無異臣故反覆推求餘三餘九之所自來而知古今無異民則古今亦斷無異治且即制國用之一端而王政之大全固已櫽括於其中非徒以誇詡盛世豐亨悅豫之象已也不然一出入之節一贏餘之數凡彼悉心會計者綽乎能之而胡為以冢宰與持籌之事且以為天子憂樂之所係哉憂以天下乃能樂以天下而聖人之憂民有不沾沾於目前者蓋如此禮記三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色然後天子食日舉以樂編修臣蔡新臣謹按國以民為本民以食為天自古帝王未有不以民食為先者然使必解衣推食家給而人賜之雖堯舜猶病是故順天之道因地之利導民之力三代以來未之有改也考之周禮如散利薄征振窮恤民諸政非不盡善然其取於不匱之府藏於不涸之源者則莫如餘一餘三之可恃也或謂三代以前民無甚貧亦無甚富終嵗勤動僅足供一家之食亦焉得人人而有餘一餘三之積乎臣謹稽之古制按之當今之則約略計之而知其不誣也周制六尺為步步百為畝一夫受田百畝程子以為當宋之四十餘畝若以周尺計之為今之二十餘畝嵗可得榖五六十石此其入數也周禮民食月自二釜以至四釜今以八口之家計之日食米不過四升計嵗食米為今之十有四石四斗榖數倍之為二十八石有竒此其食數也以所食之數準所入之數僅居其半而其時民俗儉朴布帛取之樹桑蔬菜取之園圃雞豚取之孕畜冠昏喪祭賓朋燕饗各有限制嵗費不過十石計可餘榖三之一積至三年適敷一年之食此臣所謂以今凖古約略計之而知其必有者也或又謂三代之世地廣人稀後世田不加闢而戶口日增勢必不能臣又竊以為不然夫天地之所産自足以供天下之食以人數之漸多而疑天地之不給未可為定論也况自堯舜以至成周千有餘年聖君代作休養生息雖夏商之季亦不聞有殺戮攻戰之事文武成康繼之分田制産食時用禮男女以正婚姻以時不宜民數之尚少戰國以後秦項三國六朝五季經數兵革不宜民數之較多也臣謹按王制方百里者為方十里者百為田九十億畝山陵林麓川澤溝瀆城郭宮室塗巷三分去一其餘六十億畝是大國地方百里為田萬井去三之一為六千三百井實五萬四百户次國半之為二萬五千餘户小國又半之為一萬二千餘户成周盛時千七百餘國戶不下三四千萬雖有上地中地下地之殊一易不易再易之分未必地各為井井各八家然概從減數大率亦不下三千萬此其可考者也兩漢極盛民數不過千六百七萬餘戶唐天寶十三載亦僅九百六萬九千餘戶即使隱匿逃亡詭寄脫漏概從增數亦不及二千萬由此觀之西周之世民數固不減於漢唐而自漢武拓地開疆以來土田又實浮於古也亦何人滿之足患哉誠使仁聖之君念稼穡之艱難思民生之不易力圖邦本深計治安遊惰何以復業貧富何以相通田野闢矣而榖何以不加裕年嵗登矣而户何以少蓋藏溝渠畎澮之不修沃壤亦等於石田也吉凶賔嘉之無等多藏可至於立匱也官吏知催科而忘撫字則胥役皆耕耘之擾也小民輕菽粟而重金錢則膏腴亦别種是圖也其當寬以示教者則如月吉布令正嵗讀法而不為迂其當嚴以示罰者則如宅不毛者有里布民無職事者出夫征而不為刻因地制宜隨方立政而又清心節用正本澄源使旱潦無災百榖順成以一人而養天下斯以天下而奉一人玉食萬方日舉以樂豈不休哉禮記無曠土無游民食節事時民咸安其居樂事勸功尊君親上然後興學左諭德臣嵇璜徐師曾曰度地居民則既無虛曠之土每夫受田故亦無游惰之民為之難故食之有節為之疾故事以其時臣謹按孟子諭制民之産必使俯仰無憂豐凶咸足然後驅而之善故民之從之也輕戴記此條實相發明蓋王者建國君民固以教學為先然民生未遂則教化不可得而施是以虞書三事先正德而利用厚生次之者從其重也洪範八政先食貨而賓師次之者循其序也地邑民居必參相得特先定其規模耳至土之所以無曠民之所以無游則有勞農勸相之實政焉是故孟春則命田舍東郊自是而後命司空修利隄防命野虞出行田原命司徒循行縣鄙其所以勸之者如此其勤也惰游之服垂緌五寸周禮以圜土聚教罷民其所以懲之者如此其至也豈度地受田遂以畢吾事而無游曠之患乎食之有節也二釜三釜上為之定其制事之及時也毋作大事毋起土功上為之一其力凡民之所以得安其居秋毫皆上之賜也惻怛之愛忠利之教蓋已油然洽於民心樂事勸功尊君親上有非可以作而致之者夫然後因其機而利導之本恆性而綏厥猷學之興也易矣不然則孟子所謂奚暇治禮義者學校雖設師儒雖置亦為文具而已安能致易俗移風之效哉臣又惟古今異宜南北異勢財成輔相之方有不可概施而例視者如每夫受田古之良法也井牧廢而此法已不可行勸懲之法如月令及周禮所載宜若可倣而行也然使冠蓋之使四出而圜土之逮繫日衆又不免為閭閻之擾畎澮距川古人所為農事之先資也今東南之水利不無湮淤若西北之地安能使復禹舊跡乎食時用禮古人所為恆足之至計也今西北之俗雖富而尤尚纎嗇東南之俗雖貧而仍事華靡示儉示禮豈可無適中之制以行之乎然則欲求民之安居樂業也誠莫先於足食足食誠莫先於勸農而勸農之道莫如責成郡縣欲責成郡縣必先寬其力而重其權使無困於簿書期會之繁至佐二以下皆得各舉其職以佐長吏之不逮夫然後勸懲之法可得而施而家給人足比戶可封有以馴致而無難矣禮記無游民編修臣林枝春朱子大學生財節注引呂氏語曰國無游民則生之者衆矣臣謹按天子不言有無諸侯不言多寡人君富有四海豈無賄之患然聚人理財易著其訓則知理財云者理其在民之財而已欲理民財必使生財國有游民耗財之大者也周禮冢宰以九職任萬民其九曰閒民無常職轉移執事夫以轉移為事則職在轉移非謂先王之世風俗淳厚猶有閒居無事之民也若近世游民則不然華衣美食乃逸乃諺是國家一大蠧也即衣食不必華美而日用所需計不得不饑而食寒而衣也夫以農夫紅女竭終嵗之力尚不足於供而安坐耗費之者且將數倍日侵月削其不交盡而俱困者希矣故曰國有游民耗財之大者當峻其禁防者也抑又有說焉承平既久生齒益繁所以資生者利亦稍詘計農工商賈自食其力之外勢不能人益之田宅戶給以資本彼愚䦣無能坐受窮困雖跡等偷安而情非得已則夫籌及纎悉導其窽要俾得所自養而不至於游又有存乎禁制之先者矣今國家幅隕既廣休養日隆直省內外分置司牧撫綏可謂有要然榖食財賄之數大抵合一省而較其出入至於郡邑之中風氣逈殊情形各别因其勢而利導之使彼此不相謀而相合則未聞隨地分析而灼見其利病之源者夫大吏統轄或千里數千里地逺而勢難周若藩臬為錢榖刑名之總匯又不能躬歷田野則夫相土地之肥磽審民力之勤惰酌風俗之奢儉權物産之贏絀固守牧之責也誠使各諭守牧咨訪民依而委邑令専其任凡邑幾鄉幾里田幾等榖幾種宜桑與否藪澤林麓凡幾處漁畋畜牧之利有幾麻枲果實之利有幾其比閭習尚何事女紅織作何等其懋遷於外者什之幾他邑來取給者什之幾悉躬親而目覩之勿猥勿遺書之於冊守牧簡稽虛實酌緩急輕重之序别為宜行宜罷論列於簡端每一郡州為一冊逹於司農司農上之朝廷凡冊籍必精詳而簡要原委瞭然便於省覽如此則貧富之等贏絀之差可按籍以求而徐議其經畫之方矣自古迄今民情土俗之不齊數十里而異數百里而大異非區分而界别之何以洞其精微而握其要領惟要領既得則經畫易施王制修其教不易其俗齊其政不易其宜簡便易行之道惟使民得所養而他無滋擾焉夫守牧之吏知所上冊籍皆朝廷所欲講求而施行也皆將盡心以求民瘼而無敢茍且以從事知上所考課不外乎冊中論列之數事也必且率縣令以實力勸勞而不敢飾詐以求名數年之內就其政績而殿最之而察吏之法亦備焉古之聖王垂拱巖廊慮周蔀屋如周禮職方所掌辨其人民財用九榖六畜之數要周知其利害使同貫利胥是道也竊嘗思之守令者親民之吏守令與民不親則民隱不逹人主不與守令親則無以宣上意而施實德於民如果定為章程凡守令所涖之土有利弊得以聞有設施得以告斯情意相通膏澤下究而游惰失業者寡矣大吏操表率之權司牧奏循良之績上有實政則下有淳風此旋至立應之效也若慆淫匪彛舍其本業而坐耗民財者刑必及之勸懲並行驅率有道然後財用日足禮教可興矣禮記司徒修六禮以節民性明七教以興民德齊八政以防淫一道德以同俗給事中臣鄒一桂陳澔曰此鄉學教民之法而大司徒則總其政令者也六禮七教八政皆道德之用道德則其體也體既一則風俗無不同矣篇末詳六禮冠昏喪祭鄉相見七教父子兄弟夫婦君臣長幼朋友賓客八政飲食衣服事為異别度量數制也臣謹按六禮即五禮也冠昏為嘉禮喪為凶禮祭為吉禮鄉者鄉飲鄉射鄉舉諸事相見如士相見皆賓禮不言軍者有發則徴於鄉司徒教之以車甲則軍禮固在鄉之中矣七教即五教長幼者兄弟之推賓客者朋友之類也八政即禮教中之等級隆殺虞帝時同律度量衡修五禮如五器者大略相似事為者百工之技藝有正有邪異别者五方之械器有同有異度量有長短大小數制有多寡廣狹齊之不使有僭擬詭異之端也蓋帝王御世必期於道一風同而風俗之同由於道德之一道德之一由於教民之法之詳而且切也五方風氣雖曰異宜習俗漸靡雖曰異染茍教之得其人而有其法未有不從欲而治者周禮大司徒掌邦教而九州六服則責之鄉大夫鄉大夫之下則有州長黨正族師閭胥比長各掌其教治政令三年而大比之拔其尤者而選造焉道德一風俗同賢才出故觀於鄉而知王道之易易也今之州縣猶古之鄉大夫也而能教民者誰歟民間之自為教也童䝉就孰即讀四子書而灑掃應對之事不習稍長學舉子業而孝友睦姻之事不講庠序之內月吉讀法孟月糾戒之令缺無聞焉今之所謂教官者大率寒微憒髦尚不能月課其弟子而學政一官亦僅以嵗科文字相校即偶有訓誨亦不能及於百姓又安望其能化民也漢詔曰與我共此民者其良二千石乎夫親民之官衣食於是乎賴禮義於是乎興其不能教者必其不能養者也但教之法不可不詳泛然而教之曰爾為善民不知其何以善也曰爾無奢民不知其何以儉也大約民生日用相同者不過數大端冠昏喪祭鄉相見是也其倫類相處不外父子兄弟夫婦君臣長幼朋友賓客而日用之最切者莫如飲食衣服而事為異别度量數制各有貴賤之不同故六禮不修則民性流而不節七教不明則民德乖而不興八政不齊則僭忒而入於淫亂而凡所以修之明之齊之者皆以一其道德而同其風俗也散之為禮教政合之為道德精言之曰道德廣言之則為風俗道德體也禮教政用也風俗效也其歸一而已矣後世生齒日繁財用日乏而風俗日競奢靡即如冠昏喪祭富者以財相誇貧者無財坐廢有能合乎禮者少矣且民之貧者衣食不足無所事為百工技藝好尚竒淫度量廣狹數制僭差牧民者過而不問見之若無覩也其視民風之厚薄若越人視秦人之肥瘠漠然無所動於其心以至囂凌詬誶骨月相戕干分犯上之事往往而作是誰之責哉王制一篇雖漢儒所作而歷舉三代之制可謂後世法與周禮六官尚書周官相發明即其教民一節若仿而行之至治可期且以為三年考績之據不亦信而可徴也歟禮記命鄉論秀士升之司徒曰選士司徒論選士之秀者而升之學曰俊士升於司徒者不征於鄉升於學者不征於司徒曰造士樂正崇四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書大樂正論造士之秀者以告於王而升諸司馬曰進士司馬辨論官材論進士之賢者以告於王而定其論論定然後官之任官然後爵之位定然後祿之檢討臣張鵬翀臣謹按王制所舉即周禮司徒三物賓興司馬論秀書升之法其自鄉里舉選以迄於論官授爵無不該備此成周得士之盛所為曠古獨隆也蓋治天下以得人為先得人以養士為本士習者民風之倡也教化者廉恥之原也士必有恥而後可用則人才所從出必視乎教化之既深而亷耻之素厲矣今天下學校林立教士之官選士之法視古綦備而士習有不古若者文具繁而臻效寡聲華盛而行實疏也科舉之學昔人嘗議其陋欲去之而復鄉舉里選然臣竊意鄉舉里選之人未必果優於科目也古之人材皆興於學校其品節次第之詳漸摩化導之法如王制所舉自選造以至授官皆有定論而無可僥幸故浮華矯飾之士不敢托足乎其間德行文學之美皆灼然見諸平素而不待乎一日之考核一人之察舉也漢唐以來不務其本而求其末或取諸選舉或取諸制科雖德行才傑之士未嘗不出乎其中而謂可灼然有得而無失者舉未可信也無他教養不素豫而論士於一日之優絀取士於一人之察舉故也然謂考核察舉之未可信而欲求之鄉舉里選則草野悠悠之論遂足勝於明廷之薦剡掄才之巨典乎浮華矯飾隨聲附和且不勝其弊矣故曰鄉舉里選未必優於科目古今之勢異也然則養士於學校而取士於科舉固一定不可易之制而士習有不古若者特教養之未盡其實耳王制升於司徒者不征於鄉升於學者不征於司徒蓋免其繇役而養之學論秀而升無多人也今學校之士多者數百豈能盡養然補之廪膳固已養於鄉學矣貢入成均則已養於國學矣餘當察其甚貧者稍振業之如學田學㕓之類有者量增無者酌給亦不致大損經費也稍有産業者别為襟戶免其雜泛差役毋令有司折辱養其亷耻之原又擇其秀者養之書院餼之義孰毋使或濫則養之有素而教可施矣教士之官古所最重今或視同吏隱無所短長或老邁龍鍾莫能倡率揆其所自良亦有由古人四十强仕五十服官今廪生候貢約三十年又十餘年始得教職雖有强力已就衰矣任職十餘年始得俸滿亦未即得升榮進之望既賖桑榆之景又迫能不視䕃偷息者幾人用違其時殊可憫也似宜量減出貢受職之年俾無及耄令學臣時加體察年老不任職者榮以章服才德出衆者即為薦揚則人知自奮而教職修矣昔人有言學校非愛老憐貧之地教官是正己率物之身諸生是世道民生之賴誠能一洗積習大宏教育之規明經學正彛倫與書院義學之長交相引掖而學臣提挈其綱薰陶既久學業漸醇試以文藝必不為浮游無實之詞察以行能必不為空疏無用之學可以膺選舉可以光制科奚患無實學真才供國家公卿嶽牧之用乎且制科之中未嘗不備選舉之法也苐積久而漸失其實耳今自應童子試以上例取廪生保結兩鄰甘結五童互結近復設五生互結其結也曰身家並無違礙並無刑喪過犯無違礙無過犯而後得與於試則行檢不修鄉里指摘之人其不得與於試也明矣如果鄉黨有公議學校有公評違犯教條罪及保結孰敢不濯磨砥礪自進於功名之路乎至於試士條例先以經書欲其根柢實學次以表判䇿問欲其通逹古今核實學以辨真才原可萬世無弊科舉之弊非法弊也文具而或失其實也保結雖具徒縻紙墨而已題問雖多所重不過二三餘皆得備擬抄襲如春秋一經備題滿百已無遺漏此為經義何易如之誠能一洗拘攣之習而務求其實寬以養士嚴以程材庶幾實學奮興真才輩出矣至殿試對䇿乃人臣進身之始前代多以直言為尚近來泥於成格限於字數共習為對偶軟熟之調臣竊陋之宜復漢唐對䇿體製勿拘長短對偶字數多寡及字畫工拙俾直抒素藴進呈睿覽親定甲乙以宏忠讜之風是即虞廷敷奏以言周官論辨官材之實也我朝重熙纍洽正當人文極盛之會拔茅連茹朝野同慶臣竊謂風會當極盛之際不可不防其流則科舉學校之規必務加振刷以杜僥幸之門登明選公庶可萬世無弊養賢之效即致治之實也臣謹以說經之次究極言之伏冀聖明俯賜裁擇禮記樂正崇四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書編修臣馮秉仁臣謹按大學之教也時教必有正業是以古之教者家有孰黨有庠術有序國有學太學之制由來尚矣粵稽有虞氏太學為上庠小學為下庠夏后氏太學為東序小學為西序殷則有左學右學之分周則有東膠虞庠之别各代之命名不一而其承師問道之㫖總以崇孝弟之風鼓文明之化牖民成俗以為國家儲有用之器夫禮樂詩書古先哲王本精一執中之義準隂陽二氣之符為之提綱晰類以立不刋之典其在於人則無貴無賤咸有一日不可偏廢者故夫詩以言志書以逹政禮樂以節性而陶情學者自離經辨志而後由小成以迄大成不能舍是而别就夫範圍亦莫能越教而遽希夫躐等則樂正之所係不綦重哉夫是以就入德而言名曰四術就垂訓而言著為四教而於造士之用謂之曰順者其即春夏秋冬之序所為承天之道以育物者乎顧秋主斂而禮以立體春主散而樂以導和夏宜條暢而詩以燦其菁冬主嚴凝而書以核其實四術四教之配乎四時固有然者而文王世子不曰春誦夏絃乎於此見四者之並行不悖原無棄此習彼之說而立教者恐凌躐而無序且倚重而偏輕也故表而志之以為力學者示之的云臣嘗考其制而論之周禮大司樂職掌夫成均大司成論說在東序保氏有六藝之教師氏有三德三行之司造士之法敻乎上矣降及後世良法代新而各重其典教之寄漢興未遑庠序之事武帝立趙綰王臧首明儒學逮及太乙之校石渠建武之拜桓榮時論盛之至唐貞觀初舉太學設宏文館崇文館一時就學者及外裔之子弟迄龍朔開元之間休風未墜然典教者如瀛洲學士之選及馬褚諸人相繼而作其資格可不謂嚴乎至有宋若安定之經義治事汝南之昌明洛學新安之正心誠意百世而下奉為典則典教者之得人其所係為何如夫郅隆之世彬彬文物海宇向風萬邦黎獻胥挾䇿觀光以遂其學古入官之志孰非詩書禮樂之化所感奮而興起者而正恐學校之制相延日久漸至奔競之風勝忠信之俗違徒為雕篆之文無復進修之志則皆典教者之失也夫善歌而後可以使人繼聲善教而後足以使人繼志惟以司馬三升之法即以定樂正課最之程則勤惰判而優劣分是非公而勸懲著將善人多而師道益立矣行見詩書禮樂之風漸被暨訖其所以紹唐虞三代之隆而駕乎漢唐宋之上者其在斯乎禮記樂正崇四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書監察御史臣鍾衡鄭康成曰樂正樂官之長掌國子之教崇髙也髙尚其術以作教也春夏陽也詩樂者聲聲亦陽也秋冬隂也書禮者事事亦隂也互言之者皆以其術相成孔頴逹曰術者道路之名詩書禮樂是先王之道路謂之術鄭以經言春秋教以禮樂則秋教禮春教樂冬夏教以詩書則冬教書夏教詩互言之者春教樂兼有禮秋教禮兼有樂夏教詩兼有書冬教書兼有詩故云皆以其術相成但遂其隂陽以為偏主耳陳澔曰文王世子言春誦夏弦與此不同者古人之教雖曰四時各有所習其實亦未必截然棄彼而習此恐亦互言耳非春秋不可教詩書冬夏不可教禮樂也臣謹按先王之世所以造就多士者有其人有其術有其時人者何樂正是也周禮大司樂掌成均之法以教國子自王子公卿大夫元士之適子國之俊選皆與焉書傳適子十五入小學二十入大學餘子十三入小學十八入大學鄉人當與餘子同其說備矣術者何詩書禮樂是也詩理性情書道政事禮謹節文樂備聲歌四者缺一不可是人人共由之路所謂藏焉修焉息焉遊焉者也時者何春秋冬夏是也凡習業各視其時之所宜春夏陽也陽氣發舒春教樂樂為和平之音夏教詩詩有溫厚之㫖均主於發舒也秋冬隂也隂氣斂藏秋教禮禮為嚴凝之體冬教書書有駿肅之意均主於斂藏也文王世子篇云春夏學干戈秋冬學羽籥鄭注干戈用動作之時學之羽籥用安靜之時學之其義正與此同又春誦夏弦注云誦謂歌樂弦謂以聲播詩陽用事則學之以聲隂用事則學之以事四時分習其說一也先王立制必如此區分類别者業専則精功紛則雜也再按內則篇十三學樂誦詩二十學禮可見初學入德之始方按年之長幼以定學之次序豈有樂正教國子而不隨時立教者哉或謂詩書執禮聖人雅言之教斷無四時各習一經之理不知聖門弟子學業成就聖人猶必時時提撕者欲其學不厭耳總之四術兼習者大成之日四術分習者小學之年有其人有其術而又有其時斯造就有方而賢才出焉辨論官材之法備焉然則樂正之所以教士者其責不綦重哉禮記悉其聰明致其忠愛以盡之監察御史臣孫灝陳澔曰明視聰聽而察之於辭色之間忠愛惻怛而體之於言意之表庶可以盡得其情也臣謹按王制言聽五刑之訟而曰悉其聰明即辭聽色聽之類是也致其忠愛即哀矜勿喜之意也自古明慎明刑之原無若此兩言之曲而盡者誠以凡獄之成必有其情情之匿而難窺者可察之以知情之屈而自獻者必感之以仁非聰明無以燭詐諼之變而擊斷之能不與焉非忠愛無以存惻隱之公而姑息之恩不與焉聰明者其明也忠愛則誠而已矣明則物無遁情而誠則可以動物如是而獄之情盡治獄之道亦盡矣抑是二者尤以忠愛為本乎明不出於誠則明非其明矣若夫誠則未有不明者也此以見忠信之長慈惠之師其决獄必神又以見譸張為幻終不能逞於仁人君子之前而俗吏不察顧操之以一切之法者謬也且夫獄必定於初情而法莫詳於始讞彼其先不明不誠既已增辭飾非以成其罪後雖有明察寬恕之才其孰從而辨之漢景帝詔云獄疑者讞有司有司所不能决移廷尉讞夫讞於廷尉者特獄辭而已其析律不當用法不平固有察之於辭而得其疑者然必不能察之於無疑之辭而得其情茍察之於無疑之辭而不得其疑斯獄定矣然亦安知不有如路溫舒之言捶楚之下何求不得也成錬者衆文致之罪明也奏當之成雖臯陶聼之有餘辜也此最足痛也天下嵗斷獄千百廷平之官不過數輩而有司之賢不肖者紛然不齊也故夫悉其聰明致其忠愛云云者小大之吏宜何如盡心焉虞舜之命刑官曰欽哉欽哉惟刑之恤哉周書立政曰太史司冦蘇公式敬爾由獄以長我王國兹式有慎以列用中罰曰欽恤曰敬慎而至誠惻怛之隱自流貫乎其中是又忠愛之本而聰明之用所從出也夫禮記有圭璧金璋不粥於市命服命車不粥於市宗廟之器不粥於市犧牲不粥於市戎器不粥於市用器不中度不粥於市兵車不中度不粥於市布帛精粗不中數幅廣狹不中量不粥於市姦色亂正色不粥於市錦文珠玉成器不粥於市衣服飲食不粥於市五榖不時果實未熟不粥於市木不中伐不粥於市禽獸魚鱉不中殺不粥於市給事中臣吳元安臣謹按周禮司市掌市之治教政令以通節財賄凡市僞飾之禁在民者十有二在商者十有二在賈者十有二在工者十有二始竊疑為繁瑣委曲無當於治迄今思之而知其杜塞奢僭也微培養世風也厚維持教化也深使民日撙節愛養而不自知蓋習俗之敦醇成於人心之朴素人心之朴素由於淫巧之不滋淫巧之不滋在乎務本而崇儉而其所以蕩節儉之源開淫巧之漸鑿朴素之心壞敦醇之化者其端一啓於市且夫市之日趨於僞也亦其勢不得不然何則五都之市百貨紛陳有一弗備者弗售也有一弗精者弗售也備矣精矣有一弗異弗新者弗售也所以奸商蠧賈窮極其耳目心思爭萬物之先以為必售之技彼徒知利之所在故趨之遑恤其他哉聖王預燭夫流弊之所極故設為厲禁以坊之欲民之尚朴也故有金璧圭璋錦文珠玉之禁欲民之安分也故有戎器兵車之禁欲民之勿騖於邪也故有姦色亂正色之禁至於命服命車宗廟之器原非士庶之家所宜有其禁之也因當若夫布帛五榖果實林木禽獸魚鱉之屬此固民間日用之需耳其精粗長短大小廣狹之故似可聼民之自便而必斤斤於中度中數中量中伐中殺者何哉聖王曰天地之生財有數諸生之攻取日煩使不嚴為之禁以防之吾恐滋斯人之嗜好以重敝天産也臣觀聖王之世有一人必責以一人之事治一事始食一事之報故閭師之職曰凡民不畜者祭無牲不耕者祭無盛不蠶者不帛不績者不衰皆以耻不勉也而閒民之以屬游飲食於市孰非司暴之所禁者若以游手無業之民操資入市即可以免於饑寒民亦何苦而不趨於逸樂哉此衣服飲食不粥之微意而即為謹民財之一端歟雖然此特其末焉爾董仲舒曰上之化下下之從上猶泥之在鈞惟甄者之所為猶金之在鎔惟冶者之所鑄誠使人君躬行節儉以風厲天下焚雉頭之裘却千里之駿惜中民十家之産不貴異物而貴用物不寶金玉而寶菽粟下逮三事大夫時凛素絲之節世家貴族恪遵由禮之風豈必待命市納價而始知民之好惡無偏哉如是而竒麗之源不絶淫巧之風不熄奢僭之習不革朴素之俗不成者則臣未之敢信夫古者前朝而後市誠重其事也豈獨王制為然耶御覽經史講義卷二十一
