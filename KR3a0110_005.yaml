body:
  text: 毛詩講義之類其論史者如曹彥約經幄管見之類皆經筵所陳也其更畨奏御者謂之故事李曾伯可齊集稿孫夢觀雪窗集中皆有之其體徴引古書于前附列論斷于後主于發揮義理評議是非與講義之循文衍說者為例小殊而即古義以抒所見則其意一也我皇上深造聖域而俯察邇言海嶽髙深不遺塵露乾隆二年特詔翰林詹事六科十三道諸臣輪奏講義或標舉經文下列先儒義疏而闡明其理藴或節取史事下列先儒評品而辨析其得失略加宋人故事之例其敷陳中理者溫綸嘉勉或持論未當者即召對開示命復繕以進則宋世未聞是事豈非前代帝王徒循舊制我皇上先登道岸足以折衷羣言歟積纍既多因敕大學士蔣溥等編為此帙併以訓諭改定者恭録簡端蓋都俞吁咈罔非聖教之裁成而諸臣管蠡之見仰䝉採擇得以流傳於萬世尤非常之榮幸矣乾隆四十三年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
