body:
  text: 協辦大學士戶部尚書兼署吏部尚書暫管翰林院掌院事務臣蔣溥等謹奏臣等奉㫖纂輯御覽經史講義告竣謹繕寫進呈伏候睿鑒臣等竊惟皇初之世學與政本無可分周秦以還治與教始岐為二所以卿士敷陳恆詳官禮之體要儒生訓詁惟究性命之精微雖有匡董最醇洛閩極粹不負所學獨得其宗苐各成一家之言罕克覩會歸之極欽惟我皇上躬上聖之姿心下學之訓維天不已體乾健以自强如日方中煥離明而繼照兢兢業業紹執中精一之心傳蕩蕩巍巍綜成功文章之道統豈兹芻蕘之謭陋可禆山海之崇深祗以道重本圖士期實學令各抒其一得寄好察於邇言爰命翰詹科道分録經史進呈披閲年多篇章日富載加選輯以備覽觀臣等於詮次之下敬繹敷言一十五條三千餘字究天人之奧昭若發蒙考治忽之由較如畫一圖書竒耦悟徹羲爻雅頌典謨神追孔思正誼明道嘉漢儒之言仁愼始圖終論唐宗之納諫乃至誠明億逆之辨深契本源遂使濓溪傳道之心上融洙泗凡此微言大義祇舉一隅有能觸類引伸可該萬彚譬諸風雷鼓舞民遷善而不知雲漢昭回物有生而共覩其或簡牘汗漫辭㫖繁蕪雖葑菲時有可收抑榛楛殊多未剪而片長不棄奧義宏宣屢賜對於青蒲或寵題於丹扆斯即漢唐勵精之世無此交孚亦惟舜禹樂善之誠若合符節遭逢極盛感激難名者矣臣等志切賡揚才慚獻納憶昔年之論列未有嘉謨幸今日之研摩重紆帝眷詳加校勘審定去留解經務取夫謹嚴論史尤登其簡要名臣之有奏議附史以傳性理暢於先儒與經為翼録一十二年所積為三十一卷之書仰佐觀文敢云資治登綸音於卷首天不可階羅衆製以盈函星惟羣拱何意尋章摘句得承􅉓訓以同編庶幾遵路近光永頌髙深於莫贊臣等無任激切屏營之至謹具摺恭進以聞刑部尚書協辦陜甘總督臣劉統勳工部尚書兼管刑部尚書事務臣汪由敦吏部右侍郎臣嵇璜禮部左侍郎暫管掌院事務臣介福原任刑部左侍郎臣錢陳羣禮部右侍郎臣嵩夀兵部左侍郎臣觀保原任兵部左侍郎臣彭啓豐內閣學士臣金德瑛侍讀學士臣莊存與編修臣錢汝誠
