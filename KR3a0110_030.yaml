  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_030-1a, image: WYG0722/WYG0722-0184a.png}
body:
  text: 禮記君子莊敬日強安肆日偷編修臣龔學海君子莊敬日強監察御史臣孫宗溥子言之事君先資其言拜自獻其身以成其信給事中臣劉方藹事君大言入則望大利小言入則望小利監察御史臣鄒一桂子曰邇臣守和宰正百官大臣慮四方監察御史臣張湄子言之曰為上易事也為下易知也則刑不煩矣編修臣蔡新子曰下之事上也不從其所令從其所行上好是物下必有甚焉者矣故上之所好惡不可不慎也是民之表也監察御史臣熊學鵬子曰上好仁則下之為仁爭先人故長民者章志貞教尊仁以子愛百姓民致行已以說其上矣編修臣張為儀子曰為上可望而知也為下可述而志也則君不疑於其臣而臣不惑於其君矣修撰臣莊有恭子曰有國家者章善疸惡以示民厚則民情不二詩云靖共爾位好是正直給事中臣馬宏琦君民者章好以示民俗慎惡以御民之淫則民不惑矣監察御史臣張湄民以君為心君以民為體心莊則體舒心肅則容敬心好之身必安之君好之民必欲之侍講學士臣蔣溥子曰民以君為心君以民為體監察御史臣劉方藹近文章砥厲亷隅編修臣張九鎰財聚則民散財散則民聚侍講學士臣熊暉吉
  hash: sha256:a236b914feb7455ddb7f572c2e47832ac4bbbca583b80569fe5f54a656ec094e
