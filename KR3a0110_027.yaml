front:
  text: 欽定四庫全書御覽經史講義卷二十一目録
  hash: sha256:3f60c1eddde6328ac0dfca8b38f813c2972edba2459b04196c1e8a11798c3ea8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_027-1a, image: WYG0722/WYG0722-0179a.png}
body:
  text: 禮記毋不敬儼若思安定辭安民哉監察御史臣劉方藹監察御史臣柴潮生論辨然後使之任事然後爵之位定然後祿之爵人於朝與士共之給事中臣程盛修命太師陳詩以觀民風命市納賈以觀民之所好惡編修臣丁一燾冡宰制國用必於歲之杪五榖皆入然後制國用用地小大視年之豐耗以三十年之通制國用量入以為出給事中臣馬宏琦冡宰以三十年之通制國用量入以為出三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色然後天子食日舉以樂侍講學士臣任啓運三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色然後天子食日舉以樂編修臣蔡新無曠土無游民食節事時民咸安其居樂事勸功尊君親上然後興學左諭德臣嵇璜無游民編修臣林枝春司徒修六禮以節民性明七教以興民德齊八政以防淫一道德以同俗給事中臣鄒一桂命鄉論秀士升之司徒曰選士司徒論選士之秀者而升之學曰俊士升於司徒者不征於鄉升於學者不征於司徒曰造士樂正崇四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書大樂正論造士之秀者以告於王而升諸司馬曰進士司馬辨論官材論進士之賢者以告於王而定其論論定然後官之任官然後爵之位定然後祿之檢討臣張鵬翀樂正崇四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書編修臣馮秉仁監察御史臣鍾衡悉其聰明致其忠愛以盡之監察御史臣孫灝有圭璧金璋不粥於市命服命車不粥於市宗廟之器不粥於市犧牲不粥於市戎器不粥於市用器不中度不粥於市兵車不中度不粥於市布帛精粗不中數幅廣狹不中量不粥於市姦色亂正色不粥於市錦文珠玉成器不粥於市衣服飲食不粥於市五榖不時果實未熟不粥於市木不中伐不粥於市禽獸魚鱉不中殺不粥於市給事中臣吳元安
  hash: sha256:618c968dd88c41ba6d33c68fc29c99bbc50b99d8f739f43ebce3f95e761a4a15
