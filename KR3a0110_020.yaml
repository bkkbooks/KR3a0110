front:
  text: 欽定四庫全書御覽經史講義卷十四目録
  hash: sha256:d6c4ca996912c62948efbb16b4072cc7b3bd90023cc4ec88aa174f36c2881eac
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_020-1a, image: WYG0722/WYG0722-0164a.png}
body:
  text: 書經君子所其無逸修撰臣錢維城針檢討臣夢麟嚴恭寅畏天命自度編修臣竇光鼐文王卑服即康功田功徽柔懿恭懷保小民惠鮮鰥寡自朝至於日中昃不遑暇食用咸和萬民監察御史臣葛德潤文王卑服即康功田功侍講學士臣蔣溥編修臣楊開鼎又曰天不可信我道惟寧王德延天不庸釋于文王受命監察御史臣李㥳監察御史臣薛澄慎厥麗乃勸厥民刑用勸侍讀臣鄂容安克用三宅三俊編修臣林枝春自古商人亦越我周文王立政立事牧夫凖人則克宅之克由繹之兹乃俾乂編修臣吳履泰繼自今立政其勿以憸人其惟吉士用勱相我國家監察御史臣柴潮生其惟吉士用勱相我國家編修臣雙慶方行天下至于海表罔有不服以覲文王之耿光以揚武王之大烈編修臣裘曰修若昔大猷制治于未亂保邦于未危檢討臣齊召南曰唐虞稽古建官惟百內有百揆四嶽外有州牧侯伯庶政惟和萬國咸寧夏商官倍亦克用乂明王立政不惟其官惟其人推賢讓能庶官乃和不和政厖舉能其官惟爾之能稱匪其人惟爾不任侍講臣介福冡宰掌邦治統百官均四海司徒掌邦教敷五典擾兆民宗伯掌邦禮治神人和上下司馬掌邦政統六師平邦國司冦掌邦禁詰姦慝刑暴亂司空掌邦土居四民時地利侍講臣介福六卿分職各率其屬以倡九牧阜成兆民右贊善臣宋楠欽乃攸司慎乃出令令出惟行弗惟反以公滅私民其允懷侍讀學士臣汪由敦學古入官議事以制政乃不迷其爾典常作之師無以利口亂厥官蓄疑敗謀怠忽荒政不學牆面蒞事惟煩編修臣儲晉觀功崇惟志業廣惟勤惟克果斷乃罔後艱少詹事臣徐以烜推賢讓能庶官乃和不和政厖舉能其官惟爾之能稱匪其人惟爾不任監察御史臣程盛修舉能其官惟爾之能稱匪其人惟爾不任監察御史臣朱續晫至治馨香感于神明黍稷非馨明德惟馨編修臣丁一燾允升于大猷惟豫一人膺受多福監察御史臣胡寶瑔辭尚體要編修臣儲麟趾思其艱以圖其易民乃寧監察御史臣錢度今豫命汝作大正正于羣僕侍御之臣懋乃后德交修不逮侍讀臣黃孫懋慎簡乃僚無以巧言令色便辟側媚其惟吉士監察御史臣霍備哲人惟刑無疆之辭屬于五極咸中有慶受王嘉師鑒于兹祥刑少詹事臣沈德潛御覽經史講義目録
