front:
  text: 欽定四庫全書御覽經史講義卷二十三目録
  hash: sha256:ad723bf9b1ecfcbb5eac78bd903613c9c6610c885d477f7b6e00d009fb4356e7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_029-1a, image: WYG0722/WYG0722-0182c.png}
body:
  text: 禮記大樂與天地同和大禮與天地同節檢討臣吴泰君子反情以和其志比類以成其行姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪僻之氣不設於身體使耳目鼻口心知百體皆由順正以行其義監察御史臣霍備姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪僻之氣不設於身體使耳目鼻口心知百體皆由順正以行其義監察御史臣傅為詝夫古者天地順而四時當民有徳而五榖昌疾疢不作而無妖祥此之謂大當然後聖人作為父子君臣以為紀綱紀綱既正天下大定天下大定然後正六律和五聲弦歌詩頌此之謂徳音徳音之謂樂右庶子臣金相張而不弛文武不能也弛而不張文武弗為也一張一弛文武之道也賛善臣羅源漢唯聖人為能饗帝孝子為能饗親檢討臣韓彦曽至孝近乎王至弟近乎覇監察御史臣沈懋華子曰立愛自親始教民睦也立敬自長始教民順也敎以慈睦而民貴有親敎以敬長而民貴用命孝以事親順以聽命錯諸天下無所不行編修臣佟保言而履之禮也行而樂之樂也給事中臣宮煥文奉三無私以勞天下編修臣竇光鼐天有四時春秋冬夏風雨霜露無非教也地載神氣神氣風霆風霆流形庶物露生無非教也監察御史臣葛徳潤清明在躬氣志如神侍讀臣涂逢震子云上酌民言則下天上施監察御史臣劉方藹
  hash: sha256:3951def4e97fc18539bbb9b1197560b428a631c479f338b64c20dce67be7eacd
