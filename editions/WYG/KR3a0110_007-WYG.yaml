front:
  text: 欽定四庫全書御覽經史講義卷一目録
  hash: sha256:bb0833ae17963da0a424eed32808ad5b2af62ec92c35faf27dbad77a5fd2e09e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_007-1a, image: WYG0722/WYG0722-0135a.png}
body:
  text: 周易乾元亨利貞檢討臣陳兆崙九三君子終日乾乾夕惕若厲无咎檢討臣朱璂大哉乾元萬物資始乃統天檢討臣陳兆崙雲行雨施品物流行編修臣羅暹春各正性命保合太和檢討臣蔣祖培保合太和檢討臣韓彦曾天行健君子以自彊不息編修臣孫人龍編修臣陸嘉穎編修臣林令旭編修臣姚廷祜編修臣積善檢討臣張日譽監察御史臣黄元鐸監察御史臣包祚永監察御史臣黄登賢見龍在田徳施普也終日乾乾反復道也編修臣李清芳文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事君子行此四徳者故曰乾元亨利貞監察御史臣劉永泰君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事君子行此四徳者故曰乾元亨利貞諭徳臣覺羅蘓岱君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事贊編修臣沈景瀾君子體仁足以長人編修臣李錦檢討臣朱璂監察御史臣馬丙君子行此四徳者故曰乾元亨利貞編修臣王錦檢討臣趙允涵監察御史臣趙青藜庸言之信庸行之謹監察御史臣周祖榮閑邪存其誠監察御史臣周祖榮忠信所以進徳也修辭立其誠所以居業也給事中臣胡寶瑔修辭立其誠所以居業也編修臣朱佩蓮修辭立其誠編修臣宋邦綏
  hash: sha256:c9b56175d0cc6f1ac0b2bc412288ee8bd72b867fe81af3b0637d533137df08c7
