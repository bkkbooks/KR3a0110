body:
  text: 禮記君子荘敬日强安肆日偷編修臣龔學海方慤曰荘敬日强者進於勤也安肆日偷者薄於怠也周諝曰荘敬日强可以言君子安肆日偷亦言君子者謂雖為君子果荘敬則日入於强或安肆則日入於偷臣謹按君子為學必期於進徳而非主之以敬則泛泛為功亦無實地可據故此二語切指敬肆得失之機以明其要也日强日偷俱主心志而言心之果確奮發處便為强心之牽制䧟溺處便為偷二者相為倚伏如水火然此盛則彼衰也蓋荘者所以持身也敬者所以養心也身心異用似有各致之功然敬為徳之聚可以合内外徹上下故天下未有敬而不形為荘者威儀丕著聿昭其定命之符寅畏時深早裕乎作肅之本如是則制外以養中因志以帥氣尊所聞而髙明行所知而光大由希賢希聖以逹於天無悠忽之情而有遜敏之效也此而欲其不日强也得乎至於惰慢之氣設於身體而毫不知檢是之謂安天下亦未有安而不出於肆者鑑本朗也翳之則昏玉本潔也玷之則汚以有用之心置諸無用之地則茫昧之衷錮而不開嗜欲攻取之端必且環伺其有瑕可指之隙而迭起以為擾銜轡疎而氣之决驟溢於奔駟隄防失而情之横放甚於潰川勢固然矣世之人徒以為安肆便已而不知其既嘗此味則相煽相引寖深寖溺志氣之浮靡神思之流蕩有潛滋暗長而不覺者或者欲去其偷而不悟乎所以荘敬而日强之道乃妄從事於擎跽曲拳正坐拱黙之類遂謂可以息朋從之擾而安一心之宅也譬之履彼周行而故岐其徑以窘歩誤不已甚哉臣嘗伏而思之天人有互勝之形善惡無中立之界雖為君子果荘敬則强或安肆則偷誠有如周諝所云者然臣以為不獨君子之進徳然也人主之澡身浴徳必先有其綱維之具而後能握乎宰制之原朱子曰堯是初頭出治第一箇聖人尚書堯典說堯之徳欽是第一箇字欽即敬也而所謂允恭者非莊而何元德如舜豈復有當戒之事而當日一廷之上有慮其或即於安者益之戒怠荒皐之戒逸欲是也有慮其或入於肆者禹之戒傲虐是也可見人心惟危自昔所畏雖上聖不敢忘操存之功大臣不敢廢箴儆之益豈非以有强而無偷乃君徳之克明耶臣愚謂欲崇荘敬在守之以恒而欲杜安肆當防之於漸人主斧藻深宫而有上顧天命下畏民碞之思則必整肅其容體齊戒其神明以主於一而不渝其閑又况耳之於樂目之於禮左右起居盤盂几杖悉倣古人所以警心之具而動息皆有所養焉将見清明在躬而盛徳大業之恢皇馳驟乎帝王而莫之能禦所謂進於勤而恒乆不已也至若安肆之漸固貴乎始有以防之涓涓之滴流為江河合抱之木生於萌蘖况乎人主一心而誘之者甚衆惟預察其端而嚴為屏之匪第姦聲淫色珍貨美利之雜陳而毋攖其慮也宫庭屋漏之中皆體程子防欲未萌之言而滌其原彌其隙一念之微方且乾乾夕惕之不遑又何至薄於怠而燕嬉娛樂之是務哉夫强與偷判於俄頃而必係之以日者臣聞惟日周天惟聖憲天聖敬日躋而有進進無已之意緝熙光明而有亹亹無窮之功此湯文之所以聖而益聖也使非法天行之健而漸染人欲浸淫之乆天理冺亡不日進則日退焉而已可不慎歟臣智識迂疎敢就莊敬安肆之旨推衍其說以見夫人主徳業之消長治理之汚隆其本胥於是乎在伏惟聖明究心焉禮記君子莊敬日强監察御史臣孫宗溥臣謹按易象傳曰天行健君子以自强不息蓋人君繼天以出治必當體天以立極天之為道也寒暑晝夜未嘗有一息之或停故其體常健人君之法天也動静云為不可有一端之少懈故其用宜强强者非猝致之效蓋有積漸之功亦非自然而能之有存乎强勉者焉要使存諸心而措諸躬者皆能合乎天徳之剛以肖乎天行之健是非荘敬不為功今夫吾身進徳之始要不可無嚴憚之意以攝之故外貌斯須不荘不敬則慢易之心入之矣其何以能强立而不返乎况夫身之所接尤有易即於偷者姦聲亂色所以眩其耳目者有之紛華靡麗所以惑其心志者有之宴安耽樂所以惰其四肢者有之日用周旋之地稍有未檢則精明强固之意少而頺墯委靡之氣生欲其徳之日起而大有功也不綦難哉然而君子之所謂荘敬者又非僅致飾於外以從事乎觀瞻之末也夫人君一身百官象之萬民仰之左右近習從而窺伺之原自有不容不致謹者特以為見聞之所屬而始矯而持焉則其所操者亦已疎矣惟君子不徒慎乎班朝莅官之時而獨嚴於爾室屋漏之地是故戲豫之念無介乎容儀宴私之情不形乎動静其心之凛凛乎不敢自暇逸者殆無一息之間斷也由是精神以振刷而益生願力以操持而愈固要使吾心中無刻而非天命之流行則道心為主人心從而退聼所謂中立而不倚者此也斯真强也蓋根心生色而自然睟面盎背者成德之騐也制外養中而後能順正行義者進徳之漸也惟莊敬也歴乆而不衰則其强也亦日新而不已方其始也舉措動作若以為拘苦而難安乆之習與性成漸近自然轉以忘乎服習之勞而形其從容之樂此所以厥德修罔覺歟且即其義思之荘敬則操履不違守乎禮矣日强則戰勝有權近乎仁矣君子之道日進无疆本直内方外之功以克盡己私純乎天理即以協剛健中正之徳而無難是故日强之學即法天之學也禮記子言之事君先資其言拜自獻其身以成其信給事中臣劉方藹程子曰君子之事君也盡其誠以感發其志而已古人事君克行其道者以己誠上逹而其君信之之篤耳朱子曰今之仕宦不能盡心盡職者是無那先其事而後其食底心臣謹按舜典稱敷奏以言明試以功禹曰敷納以言明庶以功又曰乃言底可績說命曰說乃言惟服禮曰以徳進以事舉以言揚漢取士以䇿唐以詩賦宋元以䇿論明則兼而用之是唐虞三代以来凡以父母之身出而事君無有不以其言為先資者顧先之以其言而實其言則以其身舉其言與其身而一之則以其信信也者出之性命成之學問天地鬼神以矢其心日星河嶽以昌其氣篤棐篤弼以盡其才敬事敬官以既其用者也蓋君之所取於臣者以言為端而難必其信於言以身為質而難必其信於身是君能用其言而不可得而用其出言之心君能用其身而不可得而用其致身之心若始之不予其心於先資繼之不予其心於拜獻而其言安得不虛而其身安得不偽即僥倖而不至以虛且偽者敗而其隱微不信之心君且以天地容之而卒不能逃天下後世之誅要之成信者非為君之見信而然也先資不信自欺其言拜獻不信自欺其身欺其言與身即負莫大之罪於臣子而又何能誠動而取信於君君而不知其自欺而優禮之適以優禮者增益其罪君而深知其自欺而曲全之更以曲全者戮辱其心斯尚可以靦顔事君乎且信成於事君之後要必立於事君之前信立而言不肯虛始能立言信立而身不肯偽始能立身然後以其言為事君之先資則信成於言以其身為事君之拜獻則信成於身以其信為事君之所以成始而成終方可稱其言為誠然先資稱其身為誠然拜自獻也古大臣如臯夔稷契與伊尹之咸有一德傅說之啓心沃心周公之作周孚先諸葛亮之鞠躬盡瘁以及唐陸贄宋范仲淹司馬光李綱之屬皆能以先資拜獻成其信於自者也否則小亷曲謹不知靖獻之大猷不逹為政之大體不明忠君之大義雖成其信於事君亦不過小信而已矣寧有當於聖人所謂事君之信也哉禮記事君大言入則望大利小言入則望小利監察御史臣鄒一桂鄭康成以利為君之祿賞大利小利即下文所云大祿小祿吕大臨則以為利非利己之利利及天下澤及萬世大利也進一介之善治一官之事小利也諫行言聽利斯從之矣如謂言之入而遂望其祿賞則主於為利而已小人之道非所以事君也臣謹按此節利字乃義之利也義大則其利自大義小則其利自小望合君民朝野而言以為人臣望祿則非進言之道矣吕說極明蓋政無大小其因革創建皆有一定之是非即有量時度地隨機變通者一衷於天理人情之至當方為無憾為臣者自宜虛衷度務精白一心為靖獻之地不宜預設成心曲為趨避以為希榮藉寵之計也近見内外臣工遇有陳奏事件必窺探意指揣度局勢惟恐不合時宜有忤聖意即當請者緩置勿請當行者議格不行此皆利害之私蔑其是非之公身家重而君國輕也天下是非所在局外者易知當局者亦未嘗不喻特轉念起而趨避隨之即不至以非為是以是為非而規模彷彿迎合希冀之心即不可以對君父况揣摩得當者言或可行而心實不可問揣摩不當者竟以必不可行之事為有合時局妄為陳奏此則趨避之中又有明昧之不同要皆非以誠事君者也夫公私義利之分差之毫釐謬以千里儒者讀書辨志時即當講之於素彼揣摩之人借急公之義以求遂其貪利之私自謂識時之豪傑而不知己歸於狥諛之小人則皆望利之一念基之也易曰不耕穫不菑畬則利有攸往言其無所為於前無所望於後也孟子曰必有事焉而勿正是行義而為責效之心且不可况求利乎臣請皇上嚴飭内外臣工凡有敷陳必洗心滌慮屏除舊習各矢精白之心共効公忠之誼則是非出而從違可定忠藎竭而謀猷可嘉且於睿覽之下見其事出己見毫無依傍者歟雖言之未當亦其識有不足而此心無他棄其言而取其心可也見其所言之事有所規為摹倣是即巧於觀望有意逢迎者雖言之可採亦取其言而誅其心可也臣伏見聖主萬幾之下事事誠求而諸臣章奏之中多以意揣是以罔知顧忌直抒愚悃惟聖明熟察之禮記子曰邇臣守和宰正百官大臣慮四方監察御史臣張湄嚴陵方逢辰曰守和者過於和則流而為同不及於和則乖而為異故在於能守守則適中而無過與不及之患矣臣謹按正心以正朝廷正朝廷以正百官正百官以正四方者君之事也而輔理承化共襄至治則羣臣與有責焉易稱上下交而其志同書稱慎厥身修思永而即繼之以庶明勵翼可知有克艱之臣斯有克艱之后惟聚精會神兩相得而益章也何則君天道也臣地道也欲與天地同和必君臣咸有一德而同本於寅協本於恭不競不絿不剛不柔若八音之克諧若五味之相濟此守和之說也百官承式固在乎君之率作興事然日宣日嚴亦厚望諸浚明有家亮采有邦者故曰百僚師師百工惟時由大法而致小亷則百官之正非宰正之而誰屬哉至於四方去朝廷逺矣人君不下堂階而周知閭閻之疾苦雖在遐荒亦如几席之近此非有為之逹下情者則君門萬里幾何其不壅於聞也昔舜之告禹曰俾予從欲以治四方風動時乃之休洵乎慮四方者之惟大臣是賴矣竊嘗綜而論之邇臣入叅密勿非疎逖之倫和在獻可替否豈迎合之謂思古建官曰三公公則無私矣曰三孤孤則無朋矣故出一言也但求其理之是而不存偏黨之􅇆行一事也務酌乎時之宜而絶去畛域之見禹臯伊傅渺不可追若漢之丙魏唐之房杜宋之韓范諸公同心輔政而議論有時各出不得謂之非守和者水火不相入而相資琴瑟不一音而同調晏子和同之喻固己辨之熟矣進退百官非臣下所得操其柄顧激濁揚清引善良抑僥倖要於當國者示之表焉曠觀前史宰臣以合意者為賢即以異己者為不肖以姑息為安則忠言沮以避謗為智則直道廢一君子用則衆君子集一小人用而衆小人從所謂臬正則影正臬不正則影斜百官之係乎宰不誠重哉四方之水旱盗賊其發於有形者易察其隱於無形者難知大臣徒潤色太平可使有形常若無形大臣願綢繆未雨可使無形常若有形蓋安不忘危備則無患制治保邦之要惟大臣之能先慮者得之是則為邇臣為宰為大臣其所居之地位職業或不同其與人君共有天下國家之事則一也若而臣者必其誠意之學先積諸隱微匪躬之節時矢諸靖獻而又名不必自己出功不必自己成夫然後謨明弼諧可以為百官之總可以為四方之綱而太和之氣亦遂盈溢於宇宙之間矣故劉更生有言曰衆臣和於朝萬物和於野若是乎百官四方之各得其理其皆自守和始哉禮記子言之曰爲上易事也爲下易知也則刑不煩矣編修臣蔡新臣謹按樂記曰大樂必易大禮必簡樂至則無怨禮至則不爭是易簡者禮樂之端而禮樂者刑罰之本也易繫傳曰乾以易知坤以簡能天地惟易簡故五行之吏四時之官各司其職而寒暑晝夜長養收藏視此矣聖人惟易簡故命官分職選賢授能各舉其事而有親有功可乆可大視此矣此政簡刑清治道之所以隆也後世人不足而問之法法不足而濟以刑上疑下之難知而故為不測以神其術多為防閑以定其志下疑上之難事而爭為揣摹以迎其機巧為隱避以逃其罪其始也起於上下之相遁其究也必至上下之相䝉易事易知兩無當矣夫法制禁令聖王之所不廢故曰徒善不足以為政然要皆以人用法非以法用人也以法用人毋論法未必盡行即使令行禁止而商鞅終不可以治秦毋論法未必有合即使引經據古而王安石終不足以治宋無他弊常生於所防之外而情每抑於用法之中也昔汲黯奉使以便宜持節發河南粟賑貧民寇準欲擢指揮使吏以例籍進準曰用牙官尚須檢例安用我輩下不以此自疑上不以此為罪誠有得於易事易知之意者也若必胥天下而納之於科條律例之中則爕理鈞衡之職掌幾何不等於吏胥而學士大夫之繩束亦将自同於輿𨽻政體有虧而廉隅日頓正蘇洵所謂以天下之大而無可信之人國不足以為國者也是以人主於此章好慎惡信賞必罰使爵不瀆而民作愿刑不試而民咸服蓋汲汲於辨人材而不汲汲於講法令是緇衣命篇之意也夫禮記子曰下之事上也不從其所令從其所行上好是物下必有甚焉者矣故上之所好惡不可不愼也是民之表也監察御史臣熊學鵬臣謹按君民感應之機上下從違之故而知人言為君之難固若是其深可畏也從来人君代天子民未有不欲禁姦止邪而或姦邪之風日熾未有不欲興仁講讓而或仁讓之俗不聞者此豈無令以防民哉要之法令者治之具而非制治清濁之源也夫民之與君分誼雖有崇卑而此身此心所賦於天之正理則一上老老而民興孝上長長而民興弟堯舜之道不外孝弟以其理根於至性所以上行下效㨗於影響間有資禀氣質之不齊於是冇教以一之教之所不及又有刑以輔之教與刑皆令也而端教與刑之本者則必先於上之好惡謹其幾而正其始然後令行禁止民自必信而必從若夫不善之應其騐既神其弊更甚上心稍自縱逸則下羣習於宴安上心稍務侈靡則下競尚夫淫巧上之好惡發端甚渺而一念之所昭下即有以知其意指而私相則傚所以易曰君子知微知彰知柔知剛萬夫之望詩曰敬愼威儀惟民之則即唐太宗亦曰安天下必須先正其身未有身正而影曲上理而下亂者可見君為民表平天下之君子當有正心誠意之學以先愼其好惡矣顧愼之一字在上為更難爾好惡無定則天下莫知適從好惡易窺又姦人得以傅㑹况位當乎九五身處乎至尊紛華靡麗雜陳於前生殺予奪悉操於手左右前後之人畏其威權而望其寵任希旨順意者多犯顔敢諫者少茍無一定之學識以處之則雖不好聲色而無往不可為聲色所侵雖不好貨利而無往不可為貨利所引昔唐開元之治鮮克有終而千古傳為鑒戒可不愼哉為人君者誠知此心之好惡所繫於生民者甚重兢兢焉省察必嚴而克治必謹遜志時敏懋勤夙夜之修舍己從人廣集忠讜之益宦官宫妾之巧偽必杜其微閭閻婦子之艱難常思其狀主敬以立體内有以清好惡之源隨時而處中外有以善好惡之用將見表正於上徯應於下君建極而民歸極使人日徙善逺罪而不自知熙熙然化行俗美天下共臻一道同風之盛矣禮記子曰上好仁則下之爲仁爭先人故長民者章志貞敎尊仁以子愛百姓民致行己以說其上矣編修臣張爲儀元陳澔曰章志者明吾好惡之所在也貞教者身率以正也所志所教莫非尊仁之事以此為愛民之道是以民皆感其子愛之心致力于行己之善而悅其上如子從父母之命也臣謹按人君繼天出治宜無不以體仁長人為任者而天下歸仁之效不能多覯何也蓋以仁為志而志有未光以仁為教而教有未孚則好仁而不篤與不好等故禮經言長民者必章志貞教以尊仁斯為能好仁者也蓋天下之趨向常視乎一人之意旨茍為人上者其好惡稍徇一己之私而於仁民之心有未盡則天下之人皆將窺其隱而投其隙是以古之聖王勅天之命惟時惟幾罔違道以干百姓之譽罔咈百姓以從己之欲要使朝廷之心實可曉然共白於天下斯大小臣工其承流而布化者自趨赴而恐後所謂表正則影端源清則流潔此自然之理也若夫條教號令則人君馭世之大權寄焉所謂貞教者固不僅身率以正而已其在易曰重巽以申命蓋言教人之道必丁寜反復當詳審于未命之先尤當力持于既命之後審之詳則其教也正持之力則其教也固能正而固斯足盡貞教之義也茍其始或失于詳愼輕為布告逮既行之後設有牽制格礙而不可卒行則是詔令所及特為具文有其言而無其事有其事而無其效將仁心仁政何由翔洽於宇内哉故商書仲虺之誥曰克寛克仁彰信兆民言章志也大雅抑之篇曰訏謨定命逺猶辰告言貞教也即漢儒董仲舒之言曰為人君者正心以正朝廷正朝廷以正百官正百官以正萬民賈誼之言曰先王執此之政堅如金石行此之令信如四時據此之公無私如天地皆可與章志貞教之義相發明蓋必如是以尊仁而後可謂之好仁必如是以好仁而後民乃行己以悅其上所謂以不忍人之心行不忍人之政而治天下可運諸掌者此之謂也禮記子曰爲上可望而知也爲下可述而志也則君不疑於其臣而臣不惑於其君矣修撰臣莊有恭陳澔曰君之待臣表裏如一故曰可望而知臣之事君一由忠誠其職業皆可稱述而記志此所以上下之間不疑不惑也臣謹按君臣會合雖有上下之殊而於天下國家則均有難弛之責故必其心皆可以共見而後能追其盛於泰交臣觀上古之世君無不吐之腹心臣無不披之肝膽九重之上正心誠意以端其本敬天勤民以規其大舉凡刑賞黜陟喜怒威福皆合於天理之公人情之正故為之臣者亦莫不精白自矢靖共為懐三公則論道經邦三孤則貳公宏化六卿則分職率屬以倡九牧而阜成兆民夫如是故事無不立而功無不成也降及季世猜疑忌刻不合不公其君既以不明而好察不信而好疑者生逆億詐偽之心其臣亦以相遁於文法相髙以機巧者為茍且僥倖之計臣罪固無可逭矣抑君實有以階之故君之與臣有各盡之道焉亦有交勉之誼焉何謂各盡之道君人者堂亷髙逺尊嚴若神每易啓人之疑畏茍非誠意洞逹宫府俱為一體内外罔或異心則稍有瞻望顧惜者亦孰肯以輕嘗而輙試昔唐太宗有言朕以至誠治天下見前世帝王好以權譎小數御其臣下者常竊恥之宋太祖坐寢殿令洞開重門皆端直軒豁謂左右曰此如我心若有邪曲人皆見之是二君者皆開創英明其行事雖未能盡醇而無疵然味其言則於可望而知之義得矣至於人臣食君之禄當思致己之身天下原無分外之事亦原無可自信之功雖定大䇿决大疑奠饑溺之衆維社稷之安議者以為勲振天壤烈光前哲而純臣用心猶恐託付不效職守多虧有負聖明而傷髙厚即或天心未諒臣志未明而鞠躬盡瘁罔敢寜居者誠以臣之事君猶子之事父也人子不以父母之不我愛而懈其孝思則人臣亦豈以君心之不我屬而隳其官守昔太宗欲魏徵存形迹之見而徵不奉詔仁宗賞富弼救河朔之災而弼不拜爵人臣能常存是心庶知所以自勵而有可述而志者矣臣故曰貴有各盡之道也何謂交勉之誼易曰孚于嘉吉書曰咸有一徳言君臣之相得蓋如此其至也舜曰股肱喜哉元首起哉臯陶曰元首明哉股肱良哉君臣之交相責難又如此其切也夫惟君以無黨無偏者示其臣以天懐之坦臣以為徳為民者報其君以忠藎之誠上下不相䝉而艱難共濟身心可大白而㩦貳潛消即有時可否未協而獻可以去否替否以成可要皆有固結不可解之情以維繫其間斯無負於交勉之誼矣不然既不知所以各盡又不知所以交勉則隔上下之交而成暌離之勢虧天澤之義而啓壅蔽之端欲以致天下國家之治而追盛於泰交也難矣禮記子曰有國家者章善癉惡以示民厚則民情不貳詩云靖共爾位好是正直給事中臣馬宏𤦺臣謹按治天下之大柄賞罰二者而已賞不當善雖賞不勸罰不當罪雖罰不懲書云天命有德五服五章哉天討有罪五刑五用哉此言人君之賞罰必本乎天也而天之視聽寄於民夫民有善無惡者其性也好善惡惡者其情也今將使天下之大萬民之衆善無不章惡無不癉誠有所甚難而但使見一善從而奬勵之又從而股肱耳目之見一惡從而敎誡之又從而放流誅殛之章在善而人知善之當為癉在惡而人知惡之當逺準立於上敎宏於下移風易俗不亦可乎或者謂善善長而惡惡短章善盛徳事也癉惡毋乃尚刑威而傷於厚乎非也蓋天以陽生必以陰成王者以仁育必以義正張子曰察惡未盡雖善必麤又曰徒好仁而不惡不仁則習不察行不著故夫章善而人皆勸善是示天下以為善之路者也厚也癉惡而人皆創惡是示天下以逺惡之途者也亦厚也故曰刑賞皆忠厚之至也雖然人君莫不操章癉之權而徃徃苦善惡之不分禹曰知人則哲惟帝其難之程子曰聖人之心譬如明鏡好物来時便見是好惡物来時便見是惡鏡何嘗有好惡也由斯言之非果能窮理以精其識好問以去其壅固無以别其孰為善孰為惡而之其所親愛而辟之其所賤惡而辟心有偏着好惡已乖是以大明黜陟使天下日遷善逺罪而不自知者人君鼓舞一世之大權也而其實必以正心修身為本禮記君民者章好以示民俗愼惡以御民之淫則民不惑矣監察御史臣張湄臣謹按民之於上也不從其令而從其所好上好是物下必有甚者故維風敦俗濟世安民之主在上必謹其所好惡以立之表使天下曉然知吾意之所存則固有當務之急焉易曰天地節而四時成節以制度不傷財不害民禮曰國奢則示之以儉君民者誠欲化民俗而防民淫舍節儉何以哉夫天之所生地之所長人力之所産其生之者有限而日用之耗之者無窮一飲食衣服之微而布帛之與錦綺蔬糲之與肥甘其相去不啻數什伯千萬也苟無限制又何所不至哉彼富貴之家資蓄饒裕既恣為夸靡輾轉效法而貧賤之子亦不自揣量勉相比儷罄家塗飾祈免詬恥由是資財外耗藏蓄内空富者貧貧者竊矯䖍爭奪之風日競而貪殘悖逆之禍益繁皆由風俗之侈靡有以使之然也昔賈誼有言黼繡偏諸古者以奉一帝一后而節適今庶人屋壁得為帝服倡優下賤得為后飾然而天下不屈者未之有也自漢代以来世之衣錦曵綺冠貂裘腋者横塞道路王侯士大夫與工賈優𨽻淆然莫辨其冐上無等又豈特長沙云爾哉若是者何也蓋開創之君艱苦備嘗民情洞悉故能鑒衰世之流弊而力以挽回使頽風一返於淳古若繼世而後承平日乆忘其祖宗創造之艱窮奢極麗狹陋前規一時左右大小臣工遂爭為豪華炫耀以應之加以婦寺之忠别無所効惟知順導其君之欲凡所為悅耳目娛心志者莫不畢力逺致以求寵於一人則好尚既乖趣舎益下貨賂公行貪墨滋熾維彼小民復何所取法而知謹身節用以自免於罪戾乎史稱漢文躬行節儉身衣皂綈後宫不曳羅綺所幸愼夫人衣不曳地嘗欲築露臺以費中人十家之産而止故在位二十餘年盡蠲民租而太府之錢貫朽而不可較太倉之粟陳陳相因紅腐而不可食唐太宗謂君依於國國依於民剝民以奉君猶割肉以充腹朕以此思之故不敢縱欲也又嘗曰治安則驕侈易生驕侈則危亡立至故貞觀之治得以嫓美成康而中外乂安比年豐稔率由於此且非獨君為然也楊綰清簡儉素及命為相制甫下郭子儀輙為減聲樂五分之四京兆尹黎幹騶從甚盛省之止存十騎中丞崔寛第舍宏侈亟毁之所謂示民不佻是則是傚者詎不信乎人主茍體漢帝唐宗之行事以觀感於上而在廷之臣又有楊綰之清操以風勵於下然後為之辨上下定尊卑别貴賤使服飾有常宴饗有節居處有度以至冠昬喪祭莫不有制凡一切淫聲艶色珍禽異獸彫鏤纂組金玉錦繡之具悉為嚴除而厲禁之庶幾民志不偷而晚近浮靡之風可以一變臣聞漢章帝時馬廖上疏曰昔元帝罷服官成帝御浣衣哀帝去樂府然而侈費不息至於衰亂者百姓從行不從言也夫改政移風必有其本前下制度未幾後稍不行雖由吏不奉法良由慢起京師又第五倫言於章帝曰諸王主貴戚驕奢踰制京師尚然何以示逺由此觀之以身教者從以言教者訟人主一身實為風化之本原而京師者又風化始出之地也君誠能正身脩德崇尚節儉為天下先自一人之起居服食以及左右妃嬪之屬宗室貴戚之儔皆恪守髙曾之矩矱百官而下復何敢有縱欲敗度怙侈滅義以自戾於先王之教者乎如是則小民之力作不耗於無益將天下之財用自積於有餘衣食漸足禮義可興躋薄俗於醇良化囂風於朴茂其斯為興致隆平之先務而萬世不敝之永圖也歟禮記民以君爲心君以民爲體心莊則體舒心肅則容敬心好之身必安之君好之民必欲之侍講學士臣蔣溥馬睎孟曰心者體之主而體則從心者也故心莊則體舒心肅則容敬心好之身必安之也君者民之心而民則從君者也故君好之民必欲之也臣謹按天君泰然而百體從令者此心所以為一身之主也惟皇建極而萬邦表正者大君所以為兆民之主也人之一身五官役於物百體効其能亦紛然而莫定矣要惟虛靈之地隱然為之主宰則四肢百骸確然有所秉受而出於不容己動於不自知無他氣相感天相喻也人君位於天位以臨宇内由朝廷以及百官由百官以及萬民其貴賤之等層累階級而不可以數計然而發號施令通欲類情自上逹下由近及逺如身之使臂臂之使指呼吸感通㨗於影響意之所向則不令而行不禁而止有不知其所以然者無他性相洽情相屬也故君猶心也民猶體也夫心為體之主體為心之輔心非體則無以收役屬之用體非心則無以握統馭之權主得輔而尊輔得主而順尊順不失而大體小體乃各安其分心既莊則不必有意於體之舒也而體自無不舒矣心既肅則不必有意於容之敬也而容自無不敬矣故曰心好之身必安之自然之理也惟君之於民也亦然民必藉衣食以生民之衣食即君之所解推也倘或不免於饑寒是何異疾痛之切膚而中心早為之怵惕民必藉禮義以立民之禮義即君之所表建也倘或不免於邪僻是何異顚蹶之偶形而此心已為之震撼夫饑寒邪僻至於廹其身心則未有不惻然而為之所者矣是以聖王之於民也養之以農桑畜牧恤之以賑賚周給一如體之饑欲得食寒欲得衣而不可斯須緩也修六禮以節民性明七敎以興民德一如體之周欲中規折欲中矩而不可絲毫差也夫然故心得其職而下之從上也不啻目之視耳之聽手足之持行而動罔不臧是以孝弟行於宫闈民咸知祗父而㳟兄矣禮讓隆於治術民咸知興亷而尚恥矣節儉行於貴近民咸知食時而用禮矣政刑肅於官府民咸知循法而守紀矣上之所好民必欲焉如百川之歸壑如日中之趨市風行草偃不足喻其機表立影從未可喻其㨗豈非心之與體精氣融洽血脉貫通眞有神動天隨者哉故君以民而驗其德化猶心以體而驗其出入民以君而作其從違猶體以心而作其動靜身心無間君民亦無間推而至於百官曰股肱曰奔奏其各述乃職以事上而臨下者亦何以異是哉昔唐太宗有君猶舟民猶水之喻竊以為警切深至若觀連屬之象察感應之機心體之說尤不可不加之意焉禮記子曰民以君為心君以民為體監察御史臣劉方藹陳澔集說民以君為心者言好惡從於君也君以民為體者言休戚同於民也臣謹按一理貫徹而無精粗一氣呼吸而無表裏一形周浹而無間隔者人但知心之與體然也聖人則謂君之與民其親切本如是以民視君即宰體之心以君視民即載心之體故朝廷者萬民之靈府兆庶者大君之全軀體之主宰在心民非后所以罔事心之運動在體后非民所以罔使天子藏富於天下而食租衣稅民養君也是即合充體之血氣以養心天子不言有無而行慶施惠君養民也是即運心統之血氣以養體民苦饑寒而君憂恤之體之阽危而心怵也民罹刑罰而君哀矜之體之傷殘而心痛也民畏寇盗而君武衛之體之患難而心為之預防也體安舒而心乃自得樂民之樂也體勞苦而心即不寧憂民之憂也千里萬里而下無不逹之情體之有觸即覺乃心之管攝乎體者無間可容一日二日而上凛兢業之懐心之無刻不謹乃體之繫屬乎心者無微可忽也窮筋骨餓體膚而正所以動其心故天下饑溺仁君必歸之己視不見聽不聞而皆由於心不在故百姓有過聖君必反諸身非禮之視聽言動心勿之而體自從中節之喜怒哀樂心得之而體自順是惟以仁義為性命以中和為元氣以敬畏為精神以法度為筋脉以敎養為榮衛而統以元首弼以股肱濟以耳目心廣體胖而睟面盎背四體不言而喻君明臣良而移風易俗萬民不令而從天下之肥也身之肥也其道一而已矣禮運謂聖人以中國為一人程子謂仁者以萬物為一體即心君體民之謂也全乎道心斯百體皆安徇乎人心斯百體皆危必堯舜之君民乃可為道德之心體與禮記近文章砥厲廉隅編修臣張九鎰臣謹按三代以上之儒不甚相逺也彼其克自振㧞而不敢茍且其行者鄙其文之不雅馴而駸駸然與古為徒患其詣之不端方而介介然勿損其節蓋素所樹立然矣否則為浮為偽而放焉自恣將不免君子之棄而小人之歸烏可謂之眞儒也今夫所謂眞儒者知文章以載道也而為聖賢闡精微廉隅以檢身也而為古今立名節其實心為己不大逺乎末俗之行哉末俗之行循名則是責實則非識者知其學守之兼敗矣其兢為文章亦嘗博極羣書肆其議論其弊也非失之野即失之浮詡詡然務為炳炳烺烺飾采色誇聲音而以為能而於道何其逺也夫良玉雖珍必加雕琢美錦為質不廢纂組而况文章乎昌黎云養其根而竢其實加其膏而希其光夫非謂藉以彰身也謂其沉潛仁義涵泳詩書則根深而膏沃其為文也皆醇而後肆焉以此為傳道之書經世之言古之所稱不朽者不在兹耶雖然儒者既苦立言之無本尤患持身之無術則廉隅其大要矣夫脂韋以自便鑿枘以求通是自踰其防也踰其防者始則屈節從人繼且放軼禮法而不可止故欲愼其撡持非自峻以絶人也以為廉恥之道不存則志行必乖是非之界不明則名義易壞夫堂之有廉室之有隅以其等級出入之有限也君子嚴氣正性寧養嶽嶽懐方之望毋為錄錄因人之行所以直内方外而無敢自懈其功者其亦如石之砥如金之礪焉斯已矣不然磽磽者易缺皎皎者易汚以正直之難合而瓦方以自毁尚得為有道之士乎哉或者曰淹雅則鮮質峻厲則傷和似非儒者所尚也而不知非先王之法言不敢道非先王之德行不敢行彼其自返之學守而無愧者蓋嚴且密矣迨其後聲華不敢襲而必本於淳粹之原圭角所弗存而一歸於渾融之境不乆且優㳺漸漬乎聖域而無忝於三代以上之儒也耶禮記財聚則民散財散則民聚侍講學士臣熊暉吉臣謹按財者生於天地而流布於人間人主挾崇髙赫奕之勢非不知縱其欲者之可無不得也以為專所利而斂怨為德者之必無可幸也竭澤而漁將必無魚焚林而獵將必無獸故損下益上謂之損損上益下謂之益損益者聚散之謂也古之王者九賦九式定為邦經貴義尊仁施厚斂薄其肫肫然聯億兆而一身也若元首肢體之相為繫屬也其殷殷然念匹夫匹婦之不獲其所也若慈母之煦嫗其赤子而惟恐傷之也且夫垂休纘緒世際清寧眞無前之偉業上治之規模也而聖人靜推消息每不勝日中之懼焉何者衣食之源生民之本自昇平久而人數日衆也耕桑無業而資生無䇿矣而陰陽愆伏天時不齊山林川澤之生殖取精多地力亦不能不竭也如以魚鹽薪蒸漆枲絺紵金鐵竹木一切征𣙜由後溯前代增無減顧瞻海宇總總林林富者日貧貧者益廹譬諸少壯之人非不魁然大也而元氣實中索焉即加意保之猶慮有他也是以聖者惕於朝夕而庸者狃於豐豫歴觀秦漢以来中世之主亦非盡無才也而利心一動若有物憑方且鑿空起事攘奪多端括山海之藏競錐刀之末而怨憤所鬰遂使全盛之朝一朝瓦解此可為太息已夫利者害之府也匹夫放利猶共疾焉况人主乎血脉之結濇也潰必為癰痤焉河流之壅塞也一决而泛溢不救矣善哉乎司馬光之言也曰天地所生財賦百物不在民則在官國實則民虛所謂夏潦而秋必旱也故經制之外何有羨餘公府已藏奚事私蓄生息者終虞朘削進奉者大抵侵牟夫與其取之以積而不用也毋寧與之而化為有用也且既不忍聽其取以飽貪吏之槖也曷若沛然竟多其與以惠顚連無告之窮也故曰上以厚下安宅故曰本固邦寧此物此志也夫有天下者莫不欲身尊名顯中外環拱以綿祚無疆也然而得失相反者何也一者患於侈一者患於嗇侈則封靡以瘠天下而主仍瘠嗇則屯膏而天下瘠而主究何能獨肥也史稱漢文帝躬儉素示敦樸為天下先而賜租減稅詔㫖頻下夫儉素非侈也賜租頻頻非嗇也世有明德之君寡欲清心恩施廣大固將遂萬物之生順萬物之情導利上下而益道光焉要以甘言易入竊懼小人之伺隙者工為蠱媚而君志不覺遂移故桑孔進而漢業衰延齡相而唐室危非斷然不惑烏可恃哉聖人知其然故於聚斂之臣賤之等雞豚牛羊而惡之反過盗賊斯乃塞源之論所以砭膏肓警鴆毒也御覽經史講義卷二十四
