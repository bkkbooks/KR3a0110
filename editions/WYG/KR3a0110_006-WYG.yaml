front:
  text: 欽定四庫全書御覽經史講義卷首目録
  hash: sha256:d33a0b198950a021b59145c2a0c9fecf7cda1cc5e3fefd50c50add836028b9e7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_006-1a, image: WYG0722/WYG0722-0133a.png}
body:
  text: 諸臣進講欽奉上諭周易大哉乾元萬物資始乃統天檢討臣孫景烈后以財成天地之道輔相天地之宜以左右民監察御史臣侯嗣達君子以遏惡揚善順天休命監察御史臣張湄日月得天而能久照四時變化而能久成聖人久於其道而天下化成編修臣吳華孫水在火上既濟君子以思患而豫防之諭徳臣嵇璜書經任賢勿貳去邪勿疑監察御史臣吳士功予違汝弼汝無面從退有後言編修臣張麟錫帝庸作歌曰勅天之命惟時惟㡬乃歌曰股肱喜哉元首起哉百工熙哉臯陶拜手稽首颺言曰念哉率作興事愼乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事墮哉帝拜曰俞往欽哉侍講學士臣楊椿惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食侍講學士臣張若靄君子所其無逸給事中臣吳元安爾有嘉謀嘉猷則入告爾后于内爾乃順之于外曰斯謀斯猷惟我后之徳監察御史臣齊軾詩經百辟卿士媚于天子不解于位民之攸望監察御史臣叢洞史正其誼不謀其利明其道不計其功檢討臣阮學浩唐太宗以選人多詐冒資蔭勅令自首未㡬有詐冒事覺者帝欲殺之戴胄奏據法應流帝怒曰卿欲守法而使朕失信乎對曰勅者出於一時之喜怒法者國家所以布大信於天下也陛下忿選人之多詐故欲殺之既而知其不可復斷之以法此乃忍小忿而存大信也帝曰卿能執法朕復何憂給事中臣馬宏琦性理明不至則疑生明無疑也謂能疑為明何啻千里修撰臣金徳瑛
  hash: sha256:eb07e7473f7378e41dc998df63b6110f3d5ea75bf37caeb488798536dccd3868
