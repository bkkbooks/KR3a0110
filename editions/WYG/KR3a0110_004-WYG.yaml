  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_004-1a, image: WYG0722/WYG0722-0131c.png}
body:
  text: 諸臣進講欽奉上諭一卷十五條周易八卷二百二十五篇書經六卷一百九十五篇詩經五卷一百九篇春秋一卷十四篇禮記四卷五十八篇周禮二卷二十四篇經四篇附論孟孝史三卷五十五篇性理一卷十七篇共三十一卷七百十六篇臣等謹案御覽經史講義三十一卷乾隆十四年奉勅編考講義之作莫盛于南宋其解經者如袁爕
  hash: sha256:947384c138c7de1bb0a761944fee6de77726ec88a8797df6a509d4a0a8ff0cfc
