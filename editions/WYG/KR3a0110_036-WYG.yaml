  text: 欽定四庫全書御覽經史講義卷三十目録
  hash: sha256:a924109ed0f5a5dc8d45d7f3bc9ae6ed4f9e38782015702ba875e2c8578d6dc0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_036-1a, image: WYG0722/WYG0722-0198c.png}
body:
  text: 性理一動一静互為其根編修臣白瀛聖人定之以中正仁義而主静立人極焉箴編修臣丁一燾誠者聖人之本侍讀學士臣周長發誠五常之本百行之源也監察御史臣歐堪善誠無為幾善惡編修臣王㑹汾師道立則善人多編修臣沈文鎬古者聖王制禮法修教化三綱正九疇叙百姓太和萬物咸若乃作樂以宣八風之氣以平天下之情編修臣周玉章文所以載道也輪轅飾而人弗庸徒飾也况虚車乎文辭藝也道徳實也篤其實而藝者書之美則愛愛則傳焉賢者得以學而至之是為教故曰言之無文行之不逺編修臣萬年茂天地之塞吾其體天地之帥吾其性編修臣李龍官朱子曰士居平世處下位視天下之事意若無足為者及居大位遭事㑹便覺無下手處信乎義理之難窮而學問之不可已也編修臣楊開鼎問臨民曰使民各得輸其情問御吏曰正已以格物編修臣馮秉仁朝廷設官求賢故在上者不當以請托而薦人士人當有禮義廉耻故在下者不當自􅃷鬻而求薦編修臣馮秉仁權衡設而不可欺以輕重者惟其平也繩墨設而不可欺以曲直者惟其正也監察御史臣李敏第楊氏時曰人臣事君豈可佐以刑名之説使人主失其仁心人主無仁心則不足以得人故人臣能使其君視民如傷而王道行矣編修臣周正思陸九淵曰人主不親細事故臯陶賡歌致叢脞之戒周公作立政稱文王罔攸兼於庶言庶獄庶慎唐徳宗親擇吏宰畿邑栁惲曰陛下當擇臣輩以輔聖徳臣當擇京兆尹以承大化尹當求令長以親細事代尹擇令非陛下所宜此言誠得臯陶周公之旨今天下米鹽靡密之務徃徃皆上累宸聼雖得臯陶周公亦何暇與之論道經邦哉荀卿曰主好要則百事詳主好詳則百事荒監察御史臣程盛修性猶太極也心猶隂陽也太極只在隂陽之中非能離隂陽也然太極自是太極隂陽自是隂陽惟性與心亦然一而二二而一編修臣白瀛宇宙内事乃已分内事銘監察御史臣錢𤦺御覽經史講義目録
