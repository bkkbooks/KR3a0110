  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_066-1a, image: WYG0723/WYG0723-0716a.png}
body:
  text: 史宋太祖坐寢殿令洞開重門皆端直軒豁無有壅蔽謂左右曰此如我心稍有邪曲人皆見之監祭御史臣馮秉仁臣謹按聖人南面而聼天下嚮明而治萬物皆相見夫豈惟是垂衣端拱之容哉重明以繼照即無私以立心心也者即聖人所日與天下相爲昭者也惟心無形因物流形惟心無象即境成象如作室然茍子曰繩墨誠陳矣則不可欺以曲直衡誠懸矣則不可欺以重輕規矩誠設矣則不可欺以方圓竊以為聖人之於心有如是也人之見聖人之心亦復如是也洞啓重門之邃曠然􅀢窔之明因心察矩削墨引䋲茍爽其衡天下有不羣然共見之也哉宋之太祖承五代之季奄有帝業當開國之始經營締造廓然無外其諸制作論定史官而所最光明而正大者莫切於洞開重門此如我心數語㫖哉誠有味乎其言之也盖雄才大略之君深沉果毅予人以莫可窺而天下亦莫能測其際此其氣象雖足震懾一時而誠意不孚論治者即謂君心之有未純也夫闢門達聪之風去古未逺人主深䖏九重不能出其心與天下相見而謂民情之大可見乎宋祖此言乃能推誠布公豁達而無所隐匿其玉藻之朗歟其金鏡之握歟其明堂出政之思歟其階前萬里之鑒歟推此意也大觀在上下觀而化無偏無黨無詐無虞從可期也論者謂爲蕩蕩平平之道不外於是良有以哉昔唐太宗曰治天下者如建此屋營搆既成勿數改移茍易一榱正一瓦踐履動揺必有所損若慕竒變法度不恒其德勞擾實多元宗曰新作南樓本欲採風謡察民俗時有宴遊不徒然也宋臣司馬光曰古之王者不欺四海伯者不欺四隣善為國者不欺其民詩曰淑人君子心如結兮凡此皆可與斯言相發要而論之自古人君大要正心為本能正其心使虚靈之宅淵然内涵無有纎障朗然外照無有㸃翳擴而達之四海之大通扵在宥廟中之象周於四境雖黈纊塞耳不以掩其聰冕旒蔽目不以掩其明天下之人仰如日之中天無不皆見則所謂欽明光被者直可羮墻堯舜也已史宋太祖開寶三年徴處士王昭素為國子博士昭素酸棗人有學行宋主召見便殿年已七十餘問以治世養身之術對曰治世莫若爱民養身莫若寡慾宋主愛其言書於屏几監察御史臣舒赫徳臣謹按寡慾之一言非獨藉以養身實則治天下之本不出乎此盖慾者人所必有而未能必得惟君臨天下者在崇髙之地擅威福之權茍有所好將奉以天下之力而無不可致故於飲食宮室聲色貨利一切之事非必惑溺其中但意之所向偶偏而環伺而爭應之者已有風靡景從不自知其然者矣迨至日受容悦錮蔽已深縦有忠誠骨鯁之臣直言切諫而欲挽回於一旦其勢甚逆而為力甚難故臣以爲寡慾之説自人主言之非特飬身而實為治天下之本者此也其在於昔舜曰人心惟危易言窒慾孔子言克己孟子言寡慾無非深明慾之足以為累若王昭素所謂飬身在乎寡慾者雖似常談而義實有合於此宜乎宋主書之屏几思以觸目而警於心也抑臣聞之宋周子有云寡焉以至於無則誠立明通然則有天下者誠能體乾剛健寡之又寡以至於無則中心無為以守至正天徳王道粹然無疵而飬身愈有不足言者矣臣一無學識因前言而併及之願以為獻納之一助焉史宋太平興國二年賜吕蒙正等及第侍讀學士臣于振分注太宗思振淹滯謂侍臣曰朕欲博求俊彦於科塲中非敢望㧞十得五止得一二亦可為致治之具矣及親試舉人閱其十舉至十五舉者百三十人并進士吕蒙正以下一百九人諸科二百七人並賜及第又詔禮部閱其十五舉以上進士及諸科一百八十四人並賜出身又九經七人不中格帝憐其老特賜同三傳出身凡五百餘人皆賜緑袍鞾笏賜宴於開寶寺自為詩章賜之又云初太祖幸洛張齊賢以布衣獻策條陳十事内四説稱㫖齊賢堅執以為皆善太祖還語帝曰我幸西都惟得一張齊賢耳他日可使為相也至是齊賢亦在選中有司失於掄擇寘之下第帝不悦故一榜盡賜及第涇陽顧憲成曰人君之用人不可以一格限也以一格限天下士而士始有遺於所用之外矣何也士生世間有優於德行者有優於才藝者有優於文章者善求士者徳以德用才以才用文以文用無衡尺之限正謂天下之士有其攵者未必有其實而竒才碩徳之士往往潜乎愿慤無文之中弗可弗察也由是觀之攵章果足以盡士耶科目果足以得士耶以攵章為足以盡士是周孔不如徐庾矣参之魯回之愚不及㳺夏之說辭矣以科第爲足以得士則張禹豈不明經而甘為淟涊之行劉蕡豈不忠直而卒貽下第之恥何說也太宗用賢而卒以科目限豈不深可惜哉臣謹按涇陽顧氏謂太宗以科目限人其說未盡當也自古帝王致治莫不以用人為先務太宗汲汲求才故五百餘人盡賜及第可謂極盛矣而涇陽顧氏乃惜之何耶馬端臨有言曰古之用人德行為首才能次之虞朝咨采亦有九德周家賔興一曰六德两漢以来刺史守相專辟召之權魏晉而後九品中正司人物之柄自以科目取人而操觚之士得以階榮進之路矣然此法歴数百年而不可復更一㦯更之則蕩無法度而澆濫者愈不可澄汰善哉馬氏之言得經國之體也臣竊謂科目者取人之一途耳誠有潛徳幽光茂才異等固不妨安車徴辟以昭立賢無方之意若中人以下則非科目無由進用一定之理也葢鄉舉里選既莫能行於後世而九品中正行之既乆必有上品無寒門下品無世族之弊不若科目所收雖未必㧞十得五而猶可十得二三也乃以科目限人爲太宗惜顧氏之言不亦過乎且其以周孔例徐庾辨則辨矣而未當也何則周孔之聖固不可幾顔曽之賢亦不数見得徐庾之才而用之而因文見道循名責實培飬之砥礪之亦在盛世之陶甄耳天下有顔曽而不必徐庾者矣未見徐庾之必不可顔曽也國家取士收之以徐庾何嘗不期之以顔曽茍能勉自樹立則皆聖人之徒也至張禹明經而阿權勢是禹之負科目非科目之負禹也劉蕡雖下第而同列爭白其屈是蕡之下第較榮於豋科矣何恥之有哉觀於裴休李郃之言曰劉蕡下第我輩登科能無顔厚請回所授以旌蕡直可見一時去取雖有失當而忠直之氣隂服乎人心是科目之有禆於風教也大矣所可議者太宗親試舉人既閱其十舉十五舉者及諸科俱賜及第矣又詔禮部閱其十五舉以上者並賜出身夫掄才大典自當較其優劣以為去取今乃不問其能否不分其工拙惟以公車数上久困塲屋一切賜以榮階且九經七人既不中格矣又憐其老而賜以出身鞾笏盈廷緑袍滿席是不近於濫哉雖曰優恤士子聖主之用心然慎惜名器似不當爾也至張齊賢才華卓絶而有司失於掄選此自有司之過因是而濫與者五百餘人是謂以其所愛及其所不愛用恩之過則有之而謂其以科目限人誤矣况其時五百餘人雖不復可考即如張齊賢吕蒙正二人功名事業輝映後先謂非科目所取之士得乎厥後韓范富歐等相繼而起皆太宗博求俊彦之遺謀也又可以科目限人訾之乎迨真宗景徳中令禮部糊名考校又制謄録院以杜營私而科舉之法始大備是非寛於始而嚴於終也大凡法立弊生全在随時補救寛嚴亙濟務得其平以共成登明選公之治此致理之苦心進賢之大法也是故聖帝明王求才之意不得不廣取士之法不得不嚴僥倖之途絶而淳朴之士始顯奸偽之源塞而後自好之士始彰易曰進以正可以正邦也始進之不慎後雖小有樹立亦猶無基之墻無根之木其為摧敗也必矣士生堯舜之世固宜謹飭自愛以成家脩廷獻之風而凡有進賢之責者益當矢慎矢公共㐮闢門籲俊之盛如此則不必㧞十得五而十得二三亦可為致治之具誠如太宗之所諭矣涇陽之論不亦固哉翰林院侍讀學士臣于振謹奏乾隆十年正月二十四日奉㫖前日于振所進經史内有家脩廷獻四字此四字出於何書着寫来欽此臣謹按宋史王禹偁傳古者鄉舉里選爲官擇人士君子行脩於家然後薦之朝廷禮表記事君先資其言拜自獻其身以成其信又此四字制藝中恒用之臣學殖荒落記誦無多故一時引用連屬成詞伏乞皇上天恩俯賜訓誨臣不勝戰慄惶悚之至謹奏史宋太宗太平興國二年春二月賜禮部進士吕蒙正等及第監察御史臣孫灝臣謹按策試進士宋之舊典太平興國二年賜吕蒙正等及第曷以書美得人也若夫分注載張齊賢之事說者以為太祖既知其賢曷不柄任而顧需之以待後人迨齊賢舉進士非太宗一榜之賜幾失之有司臣愚竊以為不然夫齊賢一布衣耳上書言事汲汲乎有功名自喜之心此與王通之獻太平十二策者同科其才固當世之所需而其道非君子之所貴也且王述有言人非聖賢安能毎事盡善齊賢既四說稱㫖斯亦不可謂不遇矣而復堅執其餘以為皆善毋乃氣近於矜而學猶未粹乎太祖有見於此而属之太宗若曰吾将老其才以大其用耳豈既已知之而復置之哉太宗嗣位之初求賢孔亟以有司失於掄擇而收之下第之中甚盛典也顧以齊賢之故而創為一榜盡賜之舉則事之盛羙而反失其美者也夫掄才必先覈實使齊賢而非賢固不當賜之第矣使齊賢而誠賢雖特賜一第其誰曰不宜今也以一人之見遺舉衆人而盡賜之而齊賢因以得雜其中則是以衆人為齊賢導階榮之路而齊賢者直為衆人闢濫進之門而已矣且既賜及一榜則使齊賢而為衆人亦在得舉之列而齊賢之賢何以别焉窺太宗之心以為如是則公不如是則私不知天下之才為天下用之坦然大公之事而反牽於避私之深是避私即其私也不已惜哉綱目書吕蒙正及第葢深美之齊賢之棄而復收尤重美之特一榜盡賜所以處美者未盡也而要之太祖儲才之意太宗擢士之明是則後先濟美者矣史宋太宗觀燈於乾元樓語近臣曰五代之際生靈凋喪當時謂無復太平之日朕躬覧庶政萬事粗理每念上天之貺致此繁盛乃知理亂在人吕蒙正避席曰乘輿所在士庻走集故繁盛如此臣嘗見都城外不数里飢寒而死者甚衆願陛下親近以及逺蒼生之幸也監察御史臣陳仁臣謹按自古君臣相飭不特班朝涖政爲然雖遊豫之時亦莫不以民艱為念而動色交儆由太宗言之則以治日少亂日多其亂也由人其治也亦由人葢有保世靖民之意由蒙正言之則以繁盛者其聚也流亡者其散也樂其聚而不知其散國之大患也何則人主深居九重閭閻疾苦無由上達而在廷之臣或以言為諱則闕門之外人主皆不得而知矣豈上天生民與朝廷設官之意哉然惟蒙正有忠君愛國之心故能因其所見而愓之以所未見設以丁謂王欽若處此則必曰陛下聖神文武有不世之天姿仁孝恭儉有君人之大徳宜其家給人足百嘉暢遂凡在天地之内含氣之属皆裕如也至於秉性柔懦者雖不為阿諛之言然清問不及或持禄而不肯言㦯避辜而不敢言誰能直陳無隐哉然而蒙正亦非以此邀譽也盖欲太宗恍然警悟而孜孜勤民惟言是求則四海之廣兆民之衆得失利病瞭如指掌由是涵煦生飬蕃息齊民而天下國家永無危亡之患矣夫王畿首善以及通邑大都冠葢之所徃来商賈之所輻輳即有餓殍官吏刻期掩蔵且於衆人属目之地多方粉飾以彰太平豈容鳩形鵠靣僵臥街衢令人泚顙哉故但見其庶而不見其亡也惟曠野之地村簡人稀生者尚且不保死者誰為𦵏埋纍纍道傍所必然也君人者若徒恃一方之聚集而詡爲已治已安吾恐郊闗近所飢寒而死者且不見不聞矣况窮鄉僻壌哉太宗知治亂之在人其不肯恝然置之度外也明矣雖驟聞蒙正之言若有不豫色然能屈己以受而不以罪名加之亦可謂希世之賢君也使以其言為不祥㦯陽聼而隂忌則蒙正之禍其可測耶然則非太宗不能成蒙正之賢非䝉正不能補太宗之闕天地合而四時行君臣合而萬化理相需相濟之道自古及今莫有外焉者乎史宋太平興國八年上謂吕蒙正曰古所謂君臣道合者情無間耳凡士未達見當世之務戾於理者則怏怏於心及列於位得以獻可替否當盡其所蘊言雖未必盡中亦當僉議而更之俾協於道朕固不以崇髙自恃使人不敢言也檢討臣胡定臣謹按自古稱君臣者皆云君仁臣忠而臣之忠未有不頼夫君之仁者嘗考宋之吕蒙正以正道自持遇事敢言毎遇時政有未允者必固稱不可帝嘉其無隐竊以為蒙正之無隐亦太宗之不以崇髙自恃有以致之耳昔魏徴對唐太宗云陛下𨗳臣使言所以敢然若不受臣敢數批逆鱗哉此固譲善於君之義要亦非虚語也天下惟剛方正直者當可言之時自能侃然正論之不屈若夫謹愿之士當草茅頌讀亦願効忠於上一旦身登仕籍每多所顧忌或以緘黙自安或以承順自容如公孫𢎞之曲學阿世胡廣之中庸蘓味道之摸稜其卑瑣不足道矣至如晉之何曽亦稱一代宗臣而當晉武驕怠徒私語其子孫而不能直諌如宋之王旦真宗亦憚其持正而天書之詐徒以賞賜隐忍從王欽若之言為之賛成此其故何也賈山有言人主之威非特雷霆也勢重非特萬鈞也開道而求諫和顔色而受之用其言而顕其身士猶恐懼而不敢盡夫有所恐懼而不敢盡上負天子下負所學固不足齒於人臣之列然而恒情大抵然也劉垍云以至愚而對至聖以極卑而對極尊徒思自強不可得也况動神機縱天辯欲令凡庶何階應答此臣下所以多所畏而不敢盡其底藴也夫世道之汚隆生民之利病其有待於随時補救者豈淺鮮哉所貴忠讜日陳有以彌縫其闕而匡救其灾也則所以廣開言路者必有道矣陸贄之言曰人君臨下當以誠信為本諌者雖辭情鄙拙亦當優容又曰好勝人恥聞過騁辯給眩聡明厲威嚴恣彊愎此六者君上之弊也誠去此六弊而復予以優容是君之仁也君仁則臣忠矣說命曰后克聖臣不命其承天下如吕蒙正之遇事敢言者豈少哉以是知善旌之懸諌鼓之設舜禹之所以巍巍也總街之聼靈臺之復湯武之所以赫赫也止輦受疏霽威從諌漢文帝唐太宗之所以治美庥明也若宋太宗之不以崇髙自恃使人不敢言也亦帝王之盛莭也已史宋太宗雍熙元年春正月求遺書時三館所貯遺帙尚多乃詔募中外有以書来上及三百卷當議甄録酬奨餘第卷帙之数等級優賜不願送官者借其本寫之由是四方之書間出矣右庶子臣彭啓豐臣謹按帝王御宇將以探天地之奥類萬物之情参酌古今整齊風化未有不潛心典籍博採遐稽而能啟文眀之治者也盖自西漢崇尚儒術表章六經置寫字之官建藏書之䇿更遣陳農求遺書於天下劉向父子校集群書彚為七略是則當灰燼之餘其君若臣相與右文稽古蔚然稱盛魏晉以降百家競起著述益繁唐始分為四類曰經史子集其著録者五萬三千九百一十五卷而唐之學者自爲之書又二萬八千四百六十九卷蔵書之盛可謂至矣然竊怪漢儒以一經授受多號專門而數傳而後其湮沒缺傳者何可勝道即按唐書藝文志亦謂有其名而無其書者十盖五六也宋承五代廢學之後太祖於開國之後即求遺書至太宗時崇文院貯書已八萬卷復求遺書而論者交美之於太祖則曰千数百年僅克一見於太宗則謂其垂情古典而好學之心篤誠以物莫不聚於所好人主既學於古訓惟日孳孳斯見聞日以廣志氣日以清而凡閉戸著書之儒者亦得自顯其著述於一時宜乎詔令一頒増光史策而迨其後濓洛關閩諸儒接孔孟之真傳為斯文之宗主未必非建隆雍熈以来右文典學之所致也夫周秦以前其書以六經為主至漢唐以後其書以五子為宗盖五子之書闡明六經之藴奥如日月之經天江河之緯地而凡潛心理學與宋儒性理諸書相發明者其於世道人心禆益非淺伏念我國家教思廣被文治光昭内府所蔵經史子集已無不具即朱子全書性理精義亦已頒行海内然自宋儒以来元則有若呉澄許衡等明則有若薛瑄髙攀龍顧憲成胡居仁等我朝則有若湯斌陸隴其等類皆潛心理學其文集亦皆可採夫儒林之著述即天地之菁華蔵之名山或亦終歸散失登之祕閣未必無補髙深請勅諭禮部凡宋元明諸儒其集有表章六經闡明性理未經蒐輯者令直省督撫學臣留心採訪刋刻傳播以時進呈備乙夜之覧觀統四方之趨向庶文教覃敷度越漢唐宋以来而集千古之大成矣史夏四月江南饑遣使賑之編脩臣王覺蓮周禮曰古者三年耕必有一年之蓄九年耕必有三年之蓄故民無菜色國以富饒綱目不書其地而槩曰江南則是江南諸郡皆饑者也民之憔悴益甚矣然帝能遣使賑之亦可謂遇災而懼勤恤民隐之心著焉較之恝然不顧者豈可同日而語哉臣謹按天災流行國家代有而所以賑救而撫恤之則存乎人自昔聖王宵旰勤民合經權常變而計其通一時之民安居樂業雖偶遇飢饉而晏然安堵既無㓂盗之擾復無離散之憂盖偹之者豫而恤之者周也考之周官大司徒以荒政十有二聚萬民遺人掌縣都之委積以待凶荒廩人掌九榖之数以治年之豐凶夫平日既有委積之蓄臨時復有拯救之制故其時有荒政而無荒民三代以後生齒日繁民鮮餘貲大都随時補救之方為多而行之者則有善有不善漢武帝時仰巴蜀之粟於江陵且移民於江南唐自髙祖迄明皇闗中之粟不足則駕幸東都隋文帝見民食豆屑雜糠雖爲之流涕而止令百姓就食山東夫欲賑既苦於乏粟積粟又苦於􅈿惜民生其間何恃以無饑哉宋之為治凡賑貧恤患視前代為尤切諸州嵗歉必發常平恵民諸倉粟平糶貸賑太宗恤民之政史不勝書厥後仁宗英宗一遇灾變則避殿變服撤樂損膳恐懼惻怛形於詔令皆太宗之貽謀也臣更進而考之賑者荒政之大端若規萬全而圖之要在因時制宜合古人之良法以善其用焉周禮荒政四曰弛力然宋熈寕間詔修農田水利工役募夫数及其直使飢民有所得食而不至思散是則古制不必拘也漢汲黯以便宜持節發河内倉粟以賑貧民請歸節伏矯制罪武帝賢而釋之是成例不必遵也宋仁宗時詔凢稅務俱從蠲免鬻牛者免筭蒲魚果蓏免稅闗津無責渡錢是則賦稅可暫寛也宋沈義倫請以軍儲貸民有司恐以来嵗不稔貽咎而義倫堅請太祖卒從之是則後患不必慮也他若富弼之知青州滕甫之知鄆州趙抃之知越州或散布村落以撫輯流亡或部署森嚴而老弱得所或増價糶榖而商賈輻輳皆於救荒之策為善云顧其尤要者則在於救之貴早又𨗳之俾各相救且使民之有餘力以自救夫救荒如救水火今有人溺於水爇於火而救之者尚可緩湏臾乎朱子嘗稱蘇軾之言曰熙寕荒政之弊費多而無益以救之遲故也其言深切可為後来之鍳所謂救之貴早者此也國家每遇歉嵗蠲額賦發倉廩減金錢鉅萬費粟米億萬而富人大賈或居竒操贏多蔵厚蓄以覬什倍之利曽不思朝廷所寛正供被澤者富人為多耳彼貧無立錐者初不得過而問焉奈何幸天灾負國恩虐困窮以為利乎於此而宣上德意曉以睦婣任恤之誼人孰無良未有不翻然悔悟而同憂共患以相賙給者所謂𨗳之俾各相救者此也民之被災者不下数萬戸計口而給之積日累月以有盡之粟而供坐食之民其勢必不繼萬一不繼而流亡者踵其後矣可不為深思而預籌乎曽鞏救災議曰爲今之策賜之以錢五十萬貫貸之以粟百萬石令被灾州郡每戸得錢以完其居得粟以給其食則農得脩其畎畝商得治其貨賄工得利其器用一切得復其業而不失其常生之計所謂使民之有餘力以自救者此也抑宋臣司馬光有言為此之要在於得人上有爱民之君所患封疆大吏及州縣有司毎以嵗事荒歉百姓失所為諱或互相欺隐或表裏為奸或安居簡出委其權於吏胥而百弊叢生總之官階重則民命輕忌諱深則撫字緩如此而不致上干天和以醸為灾祲也得乎且夫豐稔之嵗農夫終嵗勤動僅足仰事俯育以自給耳一遇飢饉雖極意撫恤而所救者僅十之七八耳否則十之五六耳若復有所隐匿民瘼與民命有不忍言者矣夫視民如傷遇災而懼者聖主之仁也振貧起瘠痌瘝乃身者有司之任也世際昇平職司民牧曷不顧名思義以効循良之績哉史帝謂秘書監李至曰人君當淡然無欲勿使嗜好形見於外則奸佞無自入朕無他好但喜讀書多見古今成敗善者從之不善者改之如斯而已矣贊善臣宋楠臣謹按帝王之所以運世者心也而所以治心者學也政不本乎心則紀綱法度皆為粗迹而無以立應事之基心不由乎學則出入起居將與物遷而無以廓清明之體故學也者為治之先務也然帝王之學與儒生不同帝王之學識其大者而已考興亡䆒治亂别賢否明是非法其所當法戒其所不可不戒斯鍳於成憲以之應務而有餘臣竊觀宋太宗時旁求俊乂衆正盈朝宏翕受之風作敢言之氣駸駸乎與漢唐之令主比隆巳乃其與近臣所言一則曰淡然無欲繼則曰但好讀書是其心思所注既恐為嗜欲所牽而稽古之功又能以前車為鑒豈徒規規於尋章摘句之末務誇多鬭靡而以爲能哉夫人主一心所以攻之者甚衆偶有所向則群下靡然從之昔者趙文王喜劔而夹門之士至燕昭王市駿而千里之馬来漢武帝好神仙而燕齊迂怪之說行唐憲宗好聚斂而皇甫鏄程异之徒進其因利乘便以中人主之欲人主方以爲忠愛而日親之而生心害政其弊有不可勝言者矣明臣方孝孺有言聖王之為學必先治心如操六轡以馭悍馬奉盤水而行乎堂階之上惟恐其放逸而不可制一覆而不易收者誠有見於從欲之易從理之難也聖人知其然故一攝其心於學親正人聞正論勤正事讀正書視聼言動㒺不一於正而無有邪僻干其間由是以精一之心行純王之政則寛而不弛嚴而不刻明而不察仁而不柔智而不私一日之計而籌及数世以後堂階之上而慮周薄海而遥所謂本學以治心本心以出治者此也後世學術治功始分為二於是巵而為辨論溢而爲辭章其言浩博無涯而扵大本大原之所在㦯略而不講取其末而遺其本得其粗而遺其精其究也士皆習為浮華而不適於用晉人之清言六朝之綺麗其失均也是以有國家者必謹持其流弊而力防之而以古為鑑以心為衡盖必有聖敬日躋之心而後可以成日新不已之學也必有日監在兹之心而後可以成緝熙光明之學也眀徳新民不且一以貫之也哉宋之太宗治雖未及于古而其言則有與聖學相為發明者臣故敬録之以仰賛髙深於萬一焉史帝謂秘書監李至曰人君當淡然無欲勿使嗜好形見於外則奸佞無自入朕無他好但喜讀書多見古今成敗善者從之不善者改之如斯而已矣檢討臣周孔從臣謹按傅說之對髙宗也曰學於古訓乃有獲又曰非知之艱行之維艱可見多讀古人書考其成敗之故而實力行之斯善日臻不善日逺大業所以富有盛德所以日新也古来帝王銳情經術留意典墳者史不勝書而其說之深切著明莫若宋太宗謂李至之言其曰人君當淡然無欲勿使嗜好形見於外則奸佞無自入誠為探本之論也葢古訓之昭垂孰不知其當遵然毎毎浮慕其名而不克䆒其實心悅其言而不能體諸躬者何哉嗜好之私亂之也夫嗜好之投不一而人主之身為尤甚唐太宗有云􅂉以勇力或以辯口或以諂諛或以奸詐或以嗜欲輻輳攻之各求自售以取寵祿人主少懈則必受其一誠以此数者宵小之情形畢呈於是茍意有所向即固結其中而不可觧惟寕淡清静預飬其虚靈之體而一切嗜好之私舉無所營斯奸佞無間而可入胡宏所謂寡欲之君然後可與言王道也夫如是嗜好之源既清理義之心日著慎脩思永之功自必有沉潜反覆而不容己者矣且夫帝王之學豈效經生尋章摘句已哉古今得失之林所以自鏡也考古今之事若何而成若何而敗若何而善若何而不善其善者可行則從之不善者不可行則改之自夙夜基命以至用人行政之間無不奉古訓為權衡則開卷有益皆歸實踐而躬脩日懋治化日隆矣然其本在於知要其功在於有常知要則惟精惟一不啓玩物䘮志之漸而奸佞無所伺其隙有常則無怠無荒自有樂此不疲之趣而奸佞無以攻其懈書曰終始惟一時乃日新詩曰日就月將學有緝熈于光明此之謂也人君誠加意于此古訓是式而敦行不怠使無欲之心愈澄其本性讀書之力不托于空言則聖敬日躋大猷允升帝學之懋帝治之隆豈不同條而共貫也哉史帝謂祕書監李至曰人君當淡然無欲勿使嗜好形見於外則奸佞無自入朕無他好但喜讀書多見古今成敗善者從之不善者改之如斯而已矣給事中臣馬宏𤦺臣謹按太宗之言可謂得治本矣盖人君統御萬邦止此一心而揣摩以投其所好者不知凡幾心一有嗜好鮮不形見於外者嗜好一形見於外鮮不為奸佞之所入者史傳所載或聲色狗馬或土木甲兵或竒技淫巧或盤㳺宴樂或法律刑名􅂉神仙佛老之類所好不一投其所好者亦不一靡然從風固有顯受其弊者甚至一言也或好諛或好勝一事也或好寛或好猛心有偏着邪人乘之長君逄君其害将大故先儒謂所欲不必沉溺只有所向便是欲此非可以強制而遂使之無也吕與叔嘗言患思慮多不能驅除程子曰此正如破屋中禦㓂東靣一人来未逐得西面又一人至矣易曰憧憧徃来朋從爾思茍欲免此惟是心有主如何為主敬而已矣敬則一一則無二無雜造次必於是顛沛必於是久而弗失則居之安動容周旋中禮而邪僻之心無自入矣自古聖帝明王初無防奸去佞之方止有誠意正心之學良以源清則流潔表正則影端也奚但嗜好不形於外而已朱子曰主敬以立其本窮理以進其知二者不可偏廢讀書者窮理之事也程子每讀史至一半便掩卷思量料其成敗有不合䖏又更精思其言曰書以維持此心一時放下則一時徳性有懈是以善者從不善者改開卷之益初非一端至於讀書多而善無不從不善無不改将窮理者在是治心者即在是是又有所好而馴致無欲之一助也豈其他嗜好之可比哉史稱太宗好讀書自己至申然後釋卷宜若果有善無不善者顧大義不明違母后遺言而攘太祖之天下為己有緣其心先有大欲存焉而後趙普之言得以助成其失此正嗜好形見於外奸佞入之之明驗也雖多讀書奚益焉然而淡然無欲之一言實握脩齊治平之要實踐之則為心法治法不然苐髙談以飾觀聼而已言之匪艱行之維艱嗚呼可不懋哉史帝嘗以李沆無宻奏謂之曰人皆有宻啓卿獨無何也對曰臣待罪宰相公事則公言之何用宻啟人臣有宻啓者非䜛即佞臣常惡之豈可效尤監察御史臣張惟寅臣謹按人臣事君凡所舉動上之可以對君父下之即可以質僚友推之即可以示天下後世原無容祕宻其間至進言之頃而有不能一槩顯示於人者非盡私情也其事所闗甚鉅而機又甚速亟宜入告而見之行事一或不謹非惟無功而患且随之易所以有㡬事不宻之戒然此猶為幾務言之也昔成王命君陳以為爾有嘉謨嘉猷則入告爾后於内爾乃順之於外曰斯謨斯猷惟我后之徳盖古人過則歸己善則歸君宻啓而君行之亦善則歸君之意耳而李沆以為人臣有宻啓者非讒即佞臣以為人臣而不賢則宻啓者非讒即佞人臣而賢則宻啓者非謨即猷為讒佞則宻啟誠不可用為謨猷則宻啟何不可用不然真宗朝如田錫之封疏五十三奏王旦之薦舉不使人知何以忠結人主而聲施後世哉是故人臣進言於君必酌其事之當宻與否而不必專執一定之論不當宻而不宻所謂公事則公言之是也當宻而宻如易所云幾事書所云入告而順之於外皆是也若如李沆所言必事事而顯白之彼人臣之好名沽直者不轉得藉以行其私也耶史稱李沆居位慎宻不求聲譽遵法度識大體故李沆必非好名沽直者而當時王欽若丁謂輩實巧為讒佞惟李沆早知而深防之然則宻啓之對其有所為而言之歟史王曽嘗以大臣執政不當收恩避怨曰恩欲歸己怨使誰當聞者歎服侍讀學士臣張若靄臣謹按天子統育群生大臣賛㐮化理惟欲使四海之内無一夫不得其所至於賞善懲奸進賢退不肖大臣皆有輔弼之責本無所謂恩亦無所謂怨也自人臣有沽名邀譽之心於是乎有恩有恩即有怨於是乎有收恩避怨而純臣之道乖矣書曰爾有嘉謨嘉猷則入告爾后于内爾乃順之于外曰斯謨斯猷惟我后之徳記曰善則稱君過則稱己則民作忠古大臣之用心盖如此豈有收恩避怨以行其欺㒺者乎夫出令者君也行君之令而致之民者臣也人臣有所建白而君受之有所進達而君用之皆君之恩臣何力焉使以朝廷威福之大權為臣子所得操縱則忘忠愛之心悖寅㳟之誼黨援門戸之漸自此而開招權納賄之私自此而啓皆由收恩一念階之厲矣且夫恩與怨不容両立者也得者以為恩則望恩而不得者以為怨安得人人而施恩則見恩者少而見怨者多當其收恩之時不知怨者已叢集其後矣乃不得不回䕶而掩覆之則怨将誰當哉然則收恩必至招怨而既欲市恩又必避怨㤙既歸於己則怨必歸於上恩歸己猶可言也怨歸上不可言也純臣之心計及於怨則誰當誠慮之詳而慎之至也是以造膝而謀詭辭而出非用詐也朝而奏書夕而焚草非為名也薦賢而衆人不知舉士而私室不謝沽名邀譽事之所必無而義之所不敢出也雖然人君以大臣為股肱心膂者也王者不遺衆庻况於大臣乎而大臣之職亦當饑由己飢溺由己溺一夫不獲其所若已推而納之溝中無所避嫌退諉於其間况舉措得其宜則主臣俱受其福不得其宜則公私皆受其怨君與臣固一體也恩與怨亦君臣所不得而分也顧㫁無收恩避怨以市於外斯以為純臣之心而已矣即人君亦曷嘗以恩自居哉天命有徳天討有罪皆本天以出治而無所私至於視民如傷則兢兢乎常若有怨而無避此其所以后克艱厥后臣克艱厥臣而交相儆戒者歟史富弼知青州河北亰東大水流民就食青州弼勸所部民出粟益以官廩得公私廬舍十餘萬區散處其人以便薪水又山林川澤之利可資以生者聼民擅取凡活五十餘萬人檢討臣蒋允焄臣謹按水旱災祲盛世之所不能無也所恃以補救之者在朝廷而四海之内縦横数萬里人主不能一一親至而目擊之也所恃以分憂者則在於有司顧有司平居無恩澤及民雖令之而不從而於所屬之地勢民情物産素未了然於胸中則臨事周章亦無所用其力不過請蠲而已請賑而已輾轉時日甫得上聞人情一日而不再食則飢迨恩詔下而轉徙流亡己不可勝言矣史稱富弼知青州全活河北京東流民五十餘萬書在史冊傳為美談然曰勸所部民出粟則必有勸諭之法而後欣然聼命也曰益以官廩則在官之有無多寡必熟悉也所謂公私廬舍必非查勘于臨時所謂散處其人以便薪水必非聼其蜂擁蟻屯而漫無部署區畫也設使河北京東諸郡邑而盡如富弼則民不至於遷流使所至皆如青州則鄰封難民何憂其失所然而富弼之後不聞繼美者平居無恩澤及民令之而不勸也又於地勢民情物産素不經心卒然有變急無所藉手也其甚者以灾在鄰省如秦越相視漠然不闗痛癢禁其入驅之出不復為之謀也夫國家設官本以為民凡属鄰封皆君赤子奈何玩忽於平時而束手於臨事耶且飢饉之餘每多疾疫流民既衆奸宄易生此又必然之理自然之勢也惟有廩粟以拯其饑有廬舍以散其衆又有山林川澤之利以資其生則此被患之民皆懽然遂其樂生之心而無復有挺而走險之慮矣溯其由来推其終極富弼保全寕獨五十萬人而已哉史以胡瑗為國子監直講瑗既居太學其徒至不能容取旁官舍處之禮部所得士瑗弟子十常居四五随材髙下喜自脩飭衣服容止徃徃相類人遇之不問可知為瑗弟子也編脩臣徐以烜臣謹按古者立教虞則上庠下庠夏則東序西序商則右學左學周則東膠虞庠又有辟雍成均瞽宗之名師氏教以三德三行保氏教以六藝六儀大司樂掌成均之法合國之子弟有道德者使教焉逮漢及唐教法漸不如古至宋而學校稱盛焉宋臣胡瑗之設教于湖州也嘗以經義治事課士矣而其居太學也史則以禮部得士弟子常居四五衣服容止相類稱之臣以為此第舉其一端言之耳若瑗之弟子不過如是則亦僅為科名之士文貌相尚焉已耳豈盡所以教士之道哉嘗觀士習之壊也莫大乎舍本而逐末去義而就利其終日營營惟利是務䧟于敗身裂名而不顧者固無論已即有樸拙自處者遵循規矩不敢為非亦自附于儒者之列而其處心積慮總不外于富貴利達科名仕宦之俗情縦使其才可用其志亦已卑矣求所為道徳之士者又安在乎且夫今日之爲士者即異日之居官者也今日之伏首授書者即異日之立朝服政者也平日心逐于利欲其居官之潔清自好難矣平日夤緣躁進欲其居官之公正自持難矣平日好標榜廣聲氣互相依附欲其立朝而正色不阿獨立不懼也抑又難矣然則教士之道豈有他哉先道徳而後文藝崇實行而戒虚聲司其責者躬行以倡之盡心以導之勸懲以進之寛嵗月以俟之而受教者正其誼不謀其利明其道不計其功日研䆒夫正心誠意之學而不徒沾沾于功名富貴衣服容止之間則凡為士者無不觀感興起共趨于希賢希聖之一途學校之隆雖欲嫓美于三代亦何難哉宋臣程頤有曰學者湏是務實不要近名有意近名則為偽也又曰為名為利清濁雖不同利心則一此誠正本澄源之論也夫史宋仁宗嘉祐元年十二月以包拯知開封府拯立朝嚴毅貴戚宦官為之歛手聞者憚之以其笑比黄河清童穉婦女亦知其名呼曰包待制編修臣楊述曽臣謹按鄭子産有言唯有德者能以寛服民其次莫如猛孔子聞而善之曰政寛則民慢慢則紏之以猛猛則民殘殘則施之以寛寛以濟猛猛以濟寛政是以和宋仁宗㳟儉仁恕史稱其四十二年間吏治若媮惰而任事蔑殘刻之人刑法似縱弛而决獄多平允之士其時君臣上下惻怛之心忠厚之政所以培壅國基者大都寛仁為務而拯獨以峭直之姿剛果之性其操履特耿介其治績尚嚴厲宜衆望有所弗属乃當日知開封府事若杜衍范仲淹歐陽修類皆名臣政事亦多可稱述而民間槩置勿道所家誦戸祝至乆而弗替者獨惟一拯其故何哉臣嘗綜拯之生平與仁宗所以為治者而知非拯之嚴不能體仁宗之寛非仁宗之寛亦不能全拯之嚴也歐陽修論拯曰少有孝行聞於鄉里晚有直節著在朝廷而史亦稱其惡吏苛刻務為敦厚與人未嘗不恕然則拯之居官豈武徤嚴酷者可比惟是與人不為茍合而人自不敢干以私故其知開封也未嘗以鉤伏摘隐擊㫁為威亦未嘗以緣飾沽激喜事為能而特以請謁不行豪猾屏跡者飭紀綱而䋲廢壊是拯體仁宗之寛大正以其能嚴耳曽鞏頌仁宗曰在位日久明于群臣之賢不肖忠邪委任責成兼聼並觀任事者亦皆警懼否輙罷免是仁宗在位何嘗有頺隳廢弛之事顧其時胥吏或至喧譁輦官或多悖慢甚㦯軍卒詬詈三司而仁宗則不專任刑誅亦不申嚴法禁唯得一絶私書杜闗節之拯坐而鎮之而輦轂之下自肅然而不敢犯方拯在臺時自至中書詬責宰相劾罷張方平宋祁遂代三司使之任歐陽修至論以蹊田奪牛不得無過整冠納履當避可疑而拯曾不自以為嫌藉非仁宗寛厚曲諒而保全之拯亦豈得自安是仁宗之寛所以全拯者又多矣盖仁宗外渾厚而内英明拯外剛嚴而内平恕本有相合者故仁宗任拯而不疑拯亦克展其才而無不盡一時之民莫不憚拯之嚴而樂帝之寛乆且因帝之寛而忘拯之嚴此兒童婦女所以稱頌之弗置也抑臣聞之董安于問政於蹇老蹇老曰忠于主信於民敢於不善人夫敢即猛之謂也敢而先之忠信則政又有在寛猛之外者宋之開封比漢京兆漢亰兆尹首稱趙廣漢張敞其敢皆似蹇老之所云拯精能似廣漢經術似不及敞然廣漢亷明强力終以刼持致敗敞潤飾儒雅􅌰以䡖媠被譏拯則始終一節蔚然為宋名臣此無他廣漢與敞但為其所敢而拯則本之於忠信也元祐初蔡亰知開封司馬光方更役法他路多不如期京獨五日而辦此其才豈遂出廣漢敞下乃在元祐則幾於君子在紹聖則流為小人何前後逈殊哉忠信之不先而邪正之趨異也史仁宗嘉祐二年以翰林學士歐陽修知貢舉編修臣沈德潛馬端臨曰時進士相習為竒僻險怪鈎章棘句寖失渾厚歐陽修知貢舉痛裁抑之仍嚴禁挟書者既試榜出時所推舉皆不在選澆薄之士群聚詆斥之然自是文風遂變臣謹按古来文章所以明道也而明道必以理勝周秦漢亰以後至六朝唐代而遞降矣昌黎韓愈㧞出貞元元和間挽時趨而力追乎古此變而能上者也後梁以下政治不綱文亦頺敝宋初相沿餘習所稱太學體一名楊劉體者以窒塞昬昧之辭文其淺陋而前之正者復變而日壊此張方平歎為驅扇浮薄雖下詔揭示而士習不改者也當此之時茍非道足於中而不惛不撓鮮有能挽回積習者矣歐陽修崛起於瀾倒波頺之餘慨焉力救其失知貢舉時黜劉幾天地軋萬物茁之語而蘇軾曾鞏之徒得雋焉始雖群聚讙譟終則靡然從風何其有定識有定力也自時厥後學者共知尊歐陽氏文以上窺韓愈以溯源周秦漢京文章於是復歸于正此無他道足於中也夫道足于中者以理勝者也嘉祐以来取士之制代有變通而理勝為主本原則一明代取士以四子書為制義由洪永以至于今厥分二體有學者之文有才人之文學者之文㑹通訓詁宗仰程朱則有如王唐瞿薛以下諸人才人之文掉鞅百家抽思靈府則有如歸胡金陳以下諸人要之二者亦非判然分途也規矩之至變化自生真學者未有不發撝乎才者也神明之極自原根柢真才人未有不沈浸乎學者也惟失其真而為偽則貌為學者衣冠土偶而先正之法蕩焉貌為才人覂駕跅弛而史漢八家之神失焉則文之傳世行逺亦求其眞以祛其偽云爾無如文人之好異者一倡百和强求新竒辭不必典意不必達競為可觧不可觧之語以相夸尚凖之楊劉後先合轍彼之意原以懲夫庸陋之弊也不知理不勝而強言適為庸陋之至而已然則何以挽之亦惟曰道足於中也夫道足者理勝也理勝者窮經之謂也惟在上者矯其空疎崇尚經學倣朱子分年讀書之法使之次第治經而司文柄之人得如歐陽修之中操朗鑑凡遇劉楊軋茁陋習痛加裁抑而不使徼倖於其間彼見詭怪者之無與於網羅也于是翻然悔悟以並進于華實兼茂之途将正學興真士出而文治益進於光昌矣史宋孝宗言難得辦事之臣右文殿修撰張栻對曰陛下當求曉事之臣不當求辦事之臣若但求辦事之臣則他日敗陛下事者未必非此人也監察御史臣熊學鵬臣謹按張栻立言之心非不甚善而其所謂不當求辦事之臣数語則未能無過也天下有欲辦事而不曉事者固足以啓紛擾之患天下有雖曉事而不辦事者尤足以貽廢弛之憂盖人臣敬事後食見事欲其明而任事更欲其勇明而不勇則是任事時先無敬事之心又安望其事之有濟且以奏厥成效哉况敬事二字有正有偽不可不於辦事求之也在老成慎重通達治體之人其於一事之是非曲直前後左右無不籌畫萬全而後舉而行之官民胥受其福朝廷因頼其功以為曉事是誠無愧於曉事之名矣若夫自負才智睥睨一世者當其未得進用亦嘗舉在廷之事業而權其䡖重酌其是非每謂異日必當奮然有為一旦身任其責未幾而觀望之念生未幾而因循之念起茍且遷就漫無措置彼非不知事中之可否而或有所憚而不敢發或有所碍而不肯行於是托曉事之說以自便其身家而巧為支飾是人也用之爲小臣在一邑則一邑之事因之而懈弛在一郡則一郡之事因之而闒茸効奔走則不能必其勇徃而直前司案牘則不能必其綜核而悉當至用之爲大臣而其流弊更不可勝言矣夫大臣者膺朝廷股肱心膂之寄所當毅然以天下事為己責與人君一德一心以成㤗交之盛者也如不得實心辦事之人而但以敷衍塞責者外示安静以為曉事國家亦烏頼有是人爲哉且以是人而當重任其相與附和者必取疲懦軟熟平日再不敢直言正色之軰而後引為同類謬為薦揚久而相習成風率皆頑鈍無恥而士氣因以掃地矣所以易曰王臣蹇蹇匪躬之故詩曰夙夜匪懈以事一人夫為王臣而至以匪躬自勵事一人而必以夙夜自警是豈徒曉事而不辦事者所得與哉要之事不外乎理不審乎理之所當然而妄逞意見以事紛更者乃生事之臣究非辦事之臣也所謂辦事者以其能辦是事而不愧則非不曉事之臣明矣臣愚以為張栻恐宋孝宗誤以生事之臣為辦事之臣只當對曰陛下固欲求辦事之臣更於辦事之臣中而求曉事之臣則心足以曉事而身足以辦事心與身皆為國用於以共勷致治庶乎其得人矣史冬十二月下朱熹社倉法於諸路監察御史臣劉方藹朱子言乾道四年民艱食請於府得常平米六百石賑貸夏受粟於倉冬則加息計米以償自後随年歛散歉蠲其息之半大歉則盡蠲之凡十四年以元数六百石還府見儲米三千一百石以為社倉不復收息每石止收耗米三升雖遇歉年民不缺食其法以十家為甲甲推一人為首五十家則推一人通曉者為社首其逃軍及無行之士與有稅糧衣食不缺者並不得入甲其應入甲者又問其願與不願願者開具一家大小口若干大口一石小口五斗五嵗以下不預置籍以貸之其以濕惡不實還者有罰臣謹按朱子社倉之法其意本之周禮遺人所掌鄉里之委積以恤民之囏阨兼参用隋臣長孫平所奏義倉之法而斟酌盡善者也長孫平義倉法每秋家出粟麥由一石以下貧富為差儲之當社委社司檢校以備凶年朱子社倉則以常平米賑貸俾民加息以償是以令民出榖之處其法不詳後世行朱子社倉者大率恭用長孫平義倉法每秋令民計家出榖而出之多寡以貧富為差此則長孫之法之可取者至於編甲編社汰逃軍屏無行别温足務歸應貸之人無濫給也其應貸者則視口之大小而増減收息則視年之歉劇而酌蠲責償則懲人之奸偽而致罰此皆社倉之法之盡善而為長孫平義倉之法所不及也盖社倉與常平倉相為表裏而社倉尤為民便特患行之不力名存而實亡爾常平之出入在官社倉之出入在民在官則平糶賑貸文移徃返輙需時日至在民之賑貸並無阻隔其取携可以立致常平之積貯在城社倉之積貯在鄉在城則平糶賑貸城内與近城之民易就霑溉而逺鄉勢難遍及至在鄉之積貯斯随地得以近取而可以均霑此社倉所以尤便於民而有以濟常平所不及也社倉足以濟常平則養民之政安得不以社倉為務而課吏之法安可不以社倉為重誠使為州縣官者其于社倉之設勸輸必盡其心滋息必力其事管轄必慎其人歛散必核其實務俾民受其益恵等常平凡大吏之保舉以及大計保薦必將州縣官經理社倉實蹟詳列冊籍方准保薦其未能實力行社倉者他政雖勤亦不准其保薦斯為州縣官者自顧考成莫不殫心于社倉而備荒之儲不患其有名無實斯常平倉得以益藉其輔助而朱子社倉之法不為徒法州縣社倉之行不為具文其有益於吏治民生為不淺也史宋眞德秀奏議云惟學可以明此心惟敬可以存此心惟親君子可以維持此心監察御史臣錢𤦺臣謹按心爲天君天君㤗而百體從令亦猶人君立極於上而天下四方咸奉為法守也唐虞十六字傳心之法盡矣顧必有實致其功者真徳秀對理宗有言曰惟學可以明此心惟敬可以存此心惟親君子可以維持此心是亦求端用力之要歟顧此非以儒生之事責之帝王也盖人心止此方寸耳用之則靈淆之則蔽古昔聖王慎修思永未有不孜孜於學者又况用人行政興利除弊其間成敗利鈍治亂得失史冊彰彰瞭如指掌見聞廣而神智生考究精而權衡當唐太宗所謂以古為鑑可知興替者是也至於功患其不實心又患其不虚人君以一身處上下之交天鑒甚邇民視非遥無論惰志矜情足以損徳即喜功好大亦足淫心書云檢身若不及魏徴云見可欲則思知足将興繕則思知止處髙危則思謙降履滿盈則思抑損遇逸樂則思撙節在宴安則思後患防壅蔽則思延納疾讒邪則思正己行爵賞則思因喜而僣施刑罰則思因怒而濫此皆敬之實功至于端冕凝旒以及燕閒私䙝必刻刻謹慎小心又無論已雖然又慮其久而生怠也惟君子平日之學問淵博既可以廣見多聞立朝之風骨崚嶒又足以防㣲杜漸髙宗之於傅說也曰啓乃心沃朕心漢武之於汲黯也不冠則不見人君盡得如若人者立之左右随時随事當必有匡正而無失者又奚患心之出入歟夫大學之道首重明徳明德之要莫先正心人君誠能黙體乎精一危㣲之㫖而以徳秀所云為致力之處庶幾内聖外王之學全矣哉臣謹集經語擬古箴三則其詞曰聖謨洋洋布在方策學以聚之俾爾多益唯明明后自強不息如農服田不遑暇食知㣲知彰有典有則永肩一心以畜其徳道心唯㣲退蔵於密天惟顯思相在爾室一哉王心所其無逸如臨深淵兢兢業業成性存存小心翼翼無作聪明懋乃攸績見龍在田鳴鶴在隂君子道長格其非心人亦有言維嶽降神乃匡乃弼為下為民安不忘危䋲墨誠陳動㒺不吉凡厥正人史明宣宗宣徳七年揭豳風圗於殿壁少詹事臣裘曰修臣謹按綱目所書皆標其政事之大者以示法戒而末細不與焉書此者何重民事也其重民事何重民因以重其事也鑑又載宣宗嘗夏日午朝退咏聶夷中鋤禾日當午句謂侍臣曰吾每誦此未嘗不念農人以是知宣宗之明徳逺也其在太祖有大功於天下未遑休息建文闇弱成祖以彊武濟事人畏其威弗懐其徳仁宗在位之日淺未見諸施行當是時明之興五六十年矣官有常品民有定方大綱具舉百度畢張䝉業而安其亦可矣然所謂淪肌浹髓優㳺而漸漬之者無其具也則根本易揺盖治天下有無形之形生於至誠發為大徳以黙相繫属於天人之會而纒綿締結於千百世之逺宣宗以此念農人之一念推之遣撫輯之使下寛卹之詔斥贓吏擢循良建官倉改民運史不勝紀嘗召楊士竒諭曰卹民詔下已乆今更有可卹者乎猗與鑑所稱吏稱其職民安其業烝烝極盛者皆此念農人之一念相與綢繆之而已矣自時厥後以英宗之愚武宗之荒神宗之玩皆足以失其國而綿延至於二百餘年之乆盖宣宗之徳澤在人深入至隐愈逺而愈不可忘而上天眷顧之衷亦遂與民心為終始所謂祈天永命者非杳渺而不可憑也且夫朝廷之政不可不嚴肅整齊也法制禁令不可弃而不舉也有時匿其惻怛慈爱之心於不可見之地民見有嚴父而不見慈母而不知其用心有甚不得已於此者而惻怛慈愛之心乃益以肫摯而不可觧而其既也愚夫愚婦亦咸諒之昔者周武王問於吕望曰治國之道若何吕望對曰治國之道爱民而已漢之文帝唐之太宗宋之仁宗其大端皆能有見於此則皆足以享世保民稱為哲后此豈有異道哉然則治天下者俾爱民之心與爱民之政相為周浹彌淪而無所扞格㫁續於其間而又不以一民之頑弛吾保赤之思不以一事之阻懈吾如傷之意即有所不愛以成其愛而總不以累吾念之之本懐則德暨海宇福延後嗣太和之氣翔洽上下萬年有道之長直坐以致之可耳御覽經史講義卷二十九
