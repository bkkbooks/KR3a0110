front:
  text: 欽定四庫全書御覽經史講義卷十三目録
  hash: sha256:07d06568b4c9aad4764028890b38137e10237f97632aaf039ab1b91f805a209d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_019-1a, image: WYG0722/WYG0722-0161c.png}
body:
  text: 書經惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母給事中臣劉方藹天乃錫禹洪範九疇彛倫攸叙監察御史臣包祚永初一曰五行次二曰敬用五事次三曰農用八政次四曰協用五紀次五曰建用皇極次六曰乂用三徳次七曰明用稽疑次八曰念用庶徵次九曰嚮用五福威用六極編修臣蔡新一五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡編修臣儲麟趾敬用五事侍講學士臣吳履泰二五事一曰貌二曰言三曰視四曰聽五曰思貌曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作乂明作哲聰作謀睿作聖檢討臣趙徳昌思曰睿睿作聖檢討臣萬松齡五皇極皇建其有極歛時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極給事中臣程鍾彦編修臣竇光鼐歛時五福用敷錫厥庶民監察御史臣劉方藹皇極之敷言是彛是訓于帝其訓監察御史臣廖必𤦺六三徳一曰正直二曰剛克三曰柔克平康正直彊弗友剛克燮友柔克沈潛剛克髙明柔克監察御史臣萬年茂是之謂大同身其康强子孫其逢吉編修臣何其睿八庶徵曰雨曰𤾉曰燠曰寒曰風曰時五者來備各以其叙庶草蕃廡編修臣程景伊曰休徵曰肅時雨若曰乂時暘若曰哲時燠若曰謀時寒若曰聖時風若曰咎徵曰狂恒雨若曰僭恒𤾉若曰豫恒燠若曰急恒寒若曰蒙恒風若給事中臣鄒一桂王省惟嵗卿士惟月師尹惟日嵗月日時無易百榖用成乂用明俊民用章家用平康編修臣顧汝修曰王省惟嵗卿士惟月師尹惟日編修臣儲晉觀編修臣葉酉庶民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨編修臣劉綸監察御史臣陳大玠不作無益害有益功乃成不貴異物賤用物民乃足監察御史臣書昌夙夜罔或不勤不矜細行終累大徳侍講臣鄂容安若保赤子惟民其康乂侍讀學士臣裘曰修惟曰欲至于萬年惟王子子孫孫永保民監察御史臣陶正靖無疆惟休亦無疆惟恤監察御史臣書昌王不敢後用顧畏于民碞給事中臣鍾衡王敬作所編修臣白瀛明作有功惇大成裕編修臣沈徳潛編修臣程景伊
