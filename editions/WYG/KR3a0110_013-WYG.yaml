front:
  text: 欽定四庫全書御覽經史講義卷七目録
  hash: sha256:6a775b1c48f41582b55513a48c457c3a64473477a6b334d15aaa71c30a91980b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_013-1a, image: WYG0722/WYG0722-0147a.png}
body:
  text: 周易初九利用為大作元吉无咎編修臣徐瑋九五有孚恵心勿問元吉有孚惠我徳檢討臣郭肇鐄有孚惠心勿問元吉監察御史臣張湄彖曰夬決也剛決柔也健而説決而和監察御史臣李賢經彖曰萃聚也順以説剛中而應故聚也檢討臣唐進賢象曰地中生木升君子以順徳積小以高大給事中臣陸尹耀彖曰巽乎水而上水井井養而不窮也檢討臣韓彦曾木上有水井君子以勞民勸相侍讀臣林蒲封上六井收勿幕有孚元吉侍讀臣彭樹葵監察御史臣倪國璉巽而耳目聰明中允臣周長發艮其背不獲其身行其庭不見其人无咎監察御史臣張孝挰彖曰艮止也時止則止時行則行動靜不失其時其道光明監察御史臣陸尹耀君子以思不出其位編修臣朱佩蓮六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也檢討臣雙頂上九鴻漸于陸其羽可用為儀吉監察御史臣沈懋華豐亨王假之勿憂宜日中侍讀學士臣程景伊編修臣林蒲封重巽以申命給事中臣倪國璉象曰隨風巽君子以申命行事編修臣張若需編修臣徐景熹六四渙其羣元吉中允臣彭啟豐天地節而四時成節以制度不傷財不害民監察御史臣陸尹耀節以制度不傷財不害民檢討臣熊郢宣君子以制數度議徳行庶子臣周資陳彖曰中孚柔在内而剛得中説而巽孚乃化邦也檢討臣萬松齡君子以思患而豫防之監察御史臣陳仁六四繻有衣袽終日戒監察御史臣甄之璜
  hash: sha256:89262ce7554000037cc33d600e799012bb7a33adaca78a8797a3451e6029b180
