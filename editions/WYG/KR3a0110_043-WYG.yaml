body:
  text: 周易咸亨利貞編修臣萬承蒼程子曰君臣上下以至萬物皆有相感之道物之相感則有亨通之理君臣能相感則君臣之道通上下能相感則上下之志通以至父子夫婦親戚朋友皆情意相感則和順而亨通事物皆然故咸有亨之理也利貞相感之道利在於正也臣謹按上經言天道故首乾下經言人道故首咸人道有五而君臣為首天生蒸民必授其權於有徳之君以統治之而後其情可一所以謂之咸也序卦曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦者人道之始君臣上下者人道之大是故乾統天咸統人以咸配乾明君道一天道也咸之為言同也莊周亦云周徧咸異名而同實凡物兩相附者皆可言同聖人在上合天下之人而徧覆之是之謂大同乾彖傳言首出庶物萬國咸寧正於此卦見之咸之九五即乾之九五剛健中正以臨臣民而施澤及下四則大臣之位以陽居隂剛而不過膺腹心之任與五同體商書咸有一徳即其義也三處下卦之上分股肱之寄剛正無私亦能仰承乎五之徳者也二為在下之賢中正自守順而應乎五初為在内之民與四相應上為在外之民與三相應而皆順乎五此咸之備乎人道而足以配乎乾者也然而君徳必主乎剛中其公卿百執事必濟之以剛明其士庶人必應之以惇厚柔順古帝王統壹六合未有能易此者也文王彖辭言咸亨利貞葢已備舉乎咸之徳其曰取女吉者特因兌下艮上而發陽先於隂之一義耳亨利貞即乾四徳之三咸不言元咸即元也在天為元在人為仁仁者以萬物為一體非是不得為仁非是亦不得為咸矣周公作爻辭則見夫平天下之本在於修身又内卦為艮一陽居上二隂居下有身之象故六爻皆以身言之五之咸其脢竊謂與艮其背同即篤恭而天下平之意若以感應之理言則此爻乃無思無為而四之貞吉則所謂寂然不動感而遂通天下之故者也咸感也柔上而剛下二氣感應以相與止而説天地感而萬物化生聖人感人心而天下和平胡瑗曰天氣降於下地氣升於上二氣升降而交通則萬物以生以遂而各正性命聖人推誠信之道使其仁義教化藏人之肌膚淪人之骨髓然後感悦於心而歸之也臣謹按卦本名咸彖辭爻辭皆言咸而不言感至夫子作彖傳則以為有感之理焉夫獨不能感咸斯感矣天下之理不越感應兩端有感必有應所應復為感事變萬殊而理惟一致是不必預計夫應也第慎其所以感之者而已矣柔上而剛下者小往居上大來居三也二氣者隂陽也乾為陽坤為隂陽貴也隂賤也賤不敢干貴必陽先感而隂始從之是故天氣下降地氣上升則為交泰然自泰卦觀之乾下坤上氣雖合而位則分乃天地之既交也而方交之象則著之於咸三陽在上漸而下濟天以實施地以虚受絪縕化醇訢合無間此誠交泰之實而名卦曰咸所以立君極也蓋咸則公公則溥君臣上下之間以此交感至於恒久不已而泰運彌隆焉其在泰之傳曰天地交而萬物通上下交而其志同上下交即咸之象其志同即咸之義也泰之九二曰包荒不遐遺亦無非咸之義也夫子釋咸為感而於序卦釋泰為通繫辭又曰感而遂通天下之故知通之由於感亦愈知泰之由於咸矣乾文言曰聖人作而萬物覩咸主君道故特稱聖人以明之聖人治天下未嘗有意以感人也當其静也此心之體廓然大公天地萬物咸歸性内及夫物來順應而心之用行焉於是乎有感即通時出而為仁足以有容時出而為義足以有執時出而為禮為智足以有敬有别聖人無心以天下人之心為心而各得其理之所同然誠動於此幾應於彼不特用恩之地為感即用威之地亦莫非感也而天下有不化者乎夫一人之心千萬人之心也以和平之心感之則必以和平之心應之然而或有不應者則以人性本同而其情多變往往歆於所可説而不明於所當止此止而説之所以為咸也聖人知其然既道之以徳而復齊之以禮俾人皆循乎天秩篤於人倫自公卿百執事以及士庶人各盡其義之所當為而毋覬乎分之所不逮由是行誼日修習尚日厚熙熙然一道同風與驩虞之象迥不侔矣大學言平天下在於絜矩而朱子釋之以為因其所同推以度物使彼我之間各得分願上下四旁均齊方正豈非咸之道得也哉周易天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣編修臣僧格勒程子曰天地二氣交感而化生萬物聖人至誠以感億兆之心而天下和平天下之心所以和平由聖人感之也觀天地交感萬物之理與聖人感人心致和平之道則天地萬物之情可見矣感通之理知道者黙而觀之可也張子曰能通天下之志為能感人心聖人同乎人而無我故和平天下莫盛於感人心鄭汝諧曰天地萬物雖異位其氣則一聖人億兆雖異勢其誠則一觀其所感而其情可見者感生於情也情出於正而後知感通之理張清子曰寂然不動者性也感而遂通者情也於其所感者觀之而天地萬物之情乃可得而見矣臣謹按天地萬物同一氣以隂陽之氣感萬物而萬物同受是氣者自氣化而形生焉聖人天下同一心聖人以和平之心感人心而天下同有是心者自無乖戾而和平焉然則萬物之化生天地之和平也人心之和平聖人之化生也觀於天地萬物之情可見位育通於一感而已故聖人治天下不恃乎刑政之務而恃乎感化之機凡人主之一嚬一笑皆足以動臣民而况以和平之心感之乎然其所以感之者亦惟一誠而已誠則無不通治不本於誠則空文豈足以動人而聖人之心所以和平者又非一日之故也致中而喜怒哀樂無所偏致和而喜怒哀樂無所乖則大本達道之行而天地位萬物育此真感之至者矣周易聖人感人心而天下和平編修臣鄧時敏程子曰聖人至誠以感億兆之心而天下和平天下之心所以和平由聖人感之也臣謹按治化感應之説先儒論之最詳竊以為咸卦所稱聖人感人心而天下和平實為古聖王致治之根本夫感應之理原不在事功上見然帝王本心出治又當合體用以觀而感通之效愈見其大其在深宫寂處之時一物未接而天命民碞不敢稍放服食起居宦官宫妾一以正心誠意之學與為質對則天下之性命身心百姓之喜怒哀樂俱於至静之中一齊攝起隂陽之患血氣之隔皆在潛移黙奪之中直如元氣之運合宇宙為呼吸所謂予懐明徳不大聲以色此感人心之存於無形者也其在班朝莅官之時行一政用一人人心秉彞之良如出一轍在朝則有大小臣工在外則有愚夫愚婦莫不惴惴焉以為如是則得如是則失不如是則可如是則否乃未幾而君令之下不特人人皆如其意之所出而且聖人之委曲周摯者更能取斯人天良所不到之處而使之愉快於是潜消缺陷之心但存蕩平之象所謂天下有道則庶人不議此感人心之徵於功用者也蓋天下多故之由皆起於臣民之心與君上之心彼此不相浹洽為君上者非不欲出其心與天下相見而無如性情之剛柔好惡之偏倚不能克治以使之純粹則一言一動自以為至當不易而天下已有以窺其淺深三代以下非無刑賞嚴明之主而和平之化逺遜於古者不能感人以心也三代以上未必一夫之皆獲而和平之化超軼於後者能感人以心也竊以為禮樂刑政皆聖人精神以後之事農桑教養皆聖人性情衍設之文人主果能於精神性情上做到至誠惻怛地位則雖法令所著偶有疎虞而天下萬世俱能諒其無過至和平二字尤宜推詳有時過喜而不和有時盛怒而反和性之得其平也有時賞人而人不感有時刑人而人反感法之得其平也天地之感物也以氣聖人之感物也以心緹室之灰遇陽而動豐山之鐘霜降則鳴此以氣相感者也刑期無刑四方風動明慎敬獄海内刑措此以心相感者也總而言之将欲治天下之心使之感我此必不得之事也邪正善惡造化無補救之權而况於人乎将欲治一己之心以感天下此必得之事也匹夫慕義鄉曲有歌泣之節而况於君乎漢儒曰敬天以實不以文勤民以徳不以名又曰為治不在多言顧力行何如耳此感應之本也諸葛亮治蜀凡所廢黜僚吏俱無怨心陸贄為徳宗草制凡驕将悍卒莫不流涕此感應之效也夫以一事之當一言之善足感人心而况於聖人之應天順人乎人主以聖人為法則和平之化即見於今日矣周易聖人感人心而天下和平編修臣林蒲卦程子曰聖人至誠以感億兆之心而天下和平天下之心所以和平由聖人感之也臣謹按咸卦柔上而剛下即泰之内陽外隂上下交而志同之象也艮止而兑説即大傳所謂寂然不動感而遂通之義也其感通之理甚神惟聖人之感人心足以當之感通之效甚大必天下和平乃足以盡之此彖傳所以推言天地萬物之感而復極其量於聖人然則聖人之所以感人心者果何如哉以天下之人之衆也比閭族黨羣聚而相與其心至不齊也利足以相競力足以相勝其聰明智巧足以相欺固日處於必争之勢矣雖賞以勸之法以齊之權以制之術以馭之猶囂然而難靖而欲其悉底於和平之域此非可强致於天下也明矣夫聖人之治天下也有人治有天治以人治者法制禁令以輔天下之所不及者也以天治者因天地之自然順民心之固有而通乎天下之志者也一人之心千萬人之心也千萬人之心聖人之心也人心原無不同聖人因其同然者以感之寛平正直以協民之中無作好惡以遵王之路朝廷之意指常與草野相闗不必見諸告誠限以章程而所欲與聚所惡勿施早已黙孚天下之隐感應之機㨗於影響蓋惟相動以天者無容强也至於天下和平則上下之心交相淪洽至治之氣蒸為太和隂陽正而風雨時怨誹消而詠歌作四海之廣被潤澤而大豐美萬類之衆欣作覩而樂生成書曰黎民於變時雍又曰無黨無偏王道平平此之謂也是知王道必本乎人情人情者聖王之田也膠於迹而不能感以心者不芸苗者也徇人欲而感以有心者助苗長者也聖人則不然當其未感也渾涵之量廓然而大公及其方感也無我之衷物來而順應至於既感而虚明之體依然鑑空而衡平所謂心普萬物而無心情順萬事而無情初非簡棄一切姑託於清静無為之說又非私恩小恵僅流於驩虞小補之歸也所以程子於聖人之感而申其説曰至誠葢誠則明明則通也誠則公公則溥也明通公溥之用運乎千世萬世而無窮推諸南海北海而皆凖天下之感感以心也聖人之感感以誠也至誠而不動者未之有也故曰誠者聖人之本周易聖人感人心而天下和平編修臣路斯道來知徳曰感者感而應也無應不為感矣又曰無心以感之者寂也有心以感之者私也惟感之至公無所容心於其間則無所不感矣又曰和者無乖戾平者無反側聖人以徳感天下而無不通也臣謹按人為萬物之靈而聖人者天地之心心之全體曰性賦於有生之初心之大用曰情動於有生之後體用原於至一而物我無間者也世之言性者紛紛矣子思子以天命言性孟子主性善之説又曰乃若其情可以為善而以惻隐羞惡恭敬是非當之謂之四端蓋主其不雜乎形氣者而為言是為義理之性然其感而遂通者則知覺運動之心為之發而為喜怒哀樂之情於是氣質之性寓乎其中而人心道心判然矣此其感發之際與接為搆間不容髮而危微以分故能中節者聖人等而下之為上智為大賢為善人為賢者其過不及者為智愚賢不肖而悖乎此者為無忌憚為下愚皆凡民也蓋人心主氣常足以充體道心主理常不足以帥氣是以小人常多而君子常少惟聖人辨之明守之定而執中以立人極常以静御動以理率氣而人心退聴焉即志壹之動氣也惟中故能和惟和故能平約之在一心達之在天下聖人先得乎人心之所同然推而放之無不凖也徳備於一身知周乎萬物其感之也以徳而莫能名其感之之迹故去其心而咸以名咸也者無心之感也又咸皆也聖人首出而萬物咸寧咸之時義大矣哉然聖人髙居九五而念切閭閻袚濯深宫而丕冒海隅未嘗矜言淡漠崇尚無為謂之無心或未必爾葢其金錫圭璧之質而出身以加民憂勤惕厲之衷而整躬以率物非有心以要結乎天下而應之者無不翕然從風又不得以有心名故取象於澤山而為咸也觀於詩之二南可見矣上有闗雎麟趾之徳下有鵲巢騶虞之化皆自然而致至究其所以感通之故微乎微乎是知人同此心心同此理上以此感下即以此應舉凡天下萬有不齊之倫胥納之於蕩平正直之中而會極歸極者又何有偏陂反側之可言乎故合億兆而為一太和和之至也厯萬世而期以太平平之至也而其感之也則由於聖人之以徳化民而人情胥悦故感而遂通天下之故溥萬物而無心也周易象曰山上有澤咸君子以虚受人編修臣孫灝朱子曰山上有澤以虚而通也程子曰澤性潤下土性受潤澤在山上而其漸潤通徹是二物之氣相感通也君子觀山澤通氣之象而虚其中以受於人夫人中虚則能受實則不能入矣虚中者無我也中無私主則無感不通以量而容之擇合而受之非聖人有感必通之道也臣謹按咸之義主於感澤居下而其氣上升於山澤之感山也山居髙而其氣下通於澤山之受澤之感也山外實而中虚氣之所感至神而無迹惟虚故能受惟受故能感也君子居萬物之上而得相感之機體咸之感則亦以虚受人之感也葢山上有澤者澤非上於山而山之能受澤也以虚受人者人非有加於君子而君子之能受人也夫其所謂虚受者何也寂然不動者所以澄其原感而遂通者所以妙其用廓然大公者所以立其宰物來順應者所以善其施皆虚也虚則無私無私故足以盡萬物之理虚則無我無我故足以通天下之情葢人之心虚則量無不包而實則物無自入河海之大百川趨之其所受者有地也器之貯物空其中則能容有物焉以實之則内先自窒也其何加焉夫天下之理不勝窮也事不勝紀也守理之是而兩是相參則同是者必有其至是矣度事之可而衆可並較則僅可者或猶有所未可矣咸之君子不以己為斷而以人為衡虚之至也虚故無不受也雖然虚無不受則未知受之者之盡出於可乎否乎而要無慮此惟虚則未有不明而燭物者精矣惟虚則未有不静而揆幾者審矣其所受皆其所當受者也其無不受則亦必有權衡於受之之餘者矣虞舜之好問察虚也及其執兩端而用中則虚之運量神焉而豈徒受之己乎抑又思之山澤通氣澤感而山受之似澤之為功於山也然澤之氣上通而山之氣復下濟則其蒸而為雲沛而為雨者澤復被之而非澤所能自為矣山之於澤以受始而不以受止故二氣之應相循於無窮此感通之極致也以虚受人則聖人之感人心而天下和平者何以異是哉周易象曰山上有澤咸君子以虚受人檢討臣萬松齡臣謹按孚貴中實咸貴中虚惟其實也所性之體萬理畢周惟其虚也寸心之内一私不起萬理畢周而實者非膠於形迹一私不起而虚者非涉於杳𠖇是以君子之學必以咸為貴也咸之為卦艮為山而止於澤之下兌為澤而在乎山之上澤之氣足以下潤山之氣足以上騰山澤之間二氣相感則為中虚之象君子觀其象而知其然也虚中以受其未至者未嘗有所将迎其已過者未嘗有所留滯而寂然不動之體乃可以感而遂通夫虚者道之源也目惟虚是以無所不睹耳惟虚是以無所不聞心惟虚是以無所不受無所不受則天下之善可以擇之極其精而用之極其當使稍有一毫之私先拒於内則本然之虚者為之窒而匪靈匪瑩矣我不能不與物接聴其自往感亦因應也物不能不與我接順其自來受亦感通也虚故止隨感隨受故悦此其象所以為咸也故虚非守寂之謂思何可廢而思至朋從則己擾乎虚之體志何可無而志在隨人則己虧乎虚之量惟淵然莫測之中而嘗有澄然各足之象如水之止而萬類無不畢照也如鑑之懸而衆形不能自匿也居静以運動而静而無静動而無動故必待感而後應而應亦如其無感常虚者所以能無所不受而不見其盈乎蓋虚則無可囿無可囿則無所受以為量而非有量以為限也虚則無可間無可間則即所受以見體而非離體以為用也入焉而即化探之而不窮由是著之為業則富有而無一毫之虧缺業何大也由是蘊之為徳則日新而無一息之斷續徳何盛也藏而愈有則顯而愈新顯藏迭用而内外一源咸之時義大矣哉是則所以感者心也無心者不能感故咸而彖釋之曰感咸必加心而後為感然有心於感者亦不能感故山上有澤而為咸感必去心而後為咸無心而淪於空寂則虚即為心之累而虚巳入於岐途有心而滯於當幾則心更為虚之累而虚乃失其本始故有心不可言虚也無心亦不可言虚也心主於理而不逐於物即日感日應而仍虚也心繫於物而不主於理即未感未應而已非虚也惟萬理之畢周則虚者未嘗不實而一私不起則實者又無時不虚君子之學廓然而大公物來而順應所謂以虚受人也然則虚中者無我也無我則虚有主則實實者虚之根虚者實之因虚而實實而虚者感之門也天地之心普萬物而無心聖人之情應萬事而無情惟虚而已周易象曰山上有澤咸君子以虚受人監察御史臣萬年茂臣謹按周易卦序上經首乾言天地定位也下經首咸言山澤通氣也物必理而後和情以萃而不亂故乾象天徳咸象人心焉然而心非一人之心理非一隅之理也心役於物則心無所主而不足以妙感物之原物隘於心則心為有我而不足以善應物之用孔子曰天下何思何慮天下同歸而殊塗一致而百慮夫不察其所以同歸一致者而妄為應焉吾之心宜其岐而不能合也且夫巍然而崇者山也淵然而卑者澤也山崇而澤上之澤感山也而山不損其髙澤卑而山有之山應澤也而澤不病其溢夫山澤無情者也君子與人則猶是有情者也合天下人以為心而合天下心以為理其不可以有我與也亦明矣竊以卦位推之四為咸主辭曰貞吉又曰朋從蓋九四陽徳而居心位陽則未有不正者也而心則未有無朋者也故三陽居中三與上應四與初應五與二應其應者皆其隂也陽惟隂之是應而未有以通於所應之外則陽之感亦惟應之是感而未有以神於衆感之中夫陽既與隂應而不能神於衆感矣而為所應者又皆陽之所統其分不能以相及而徳不足以相抗於是隐微之地翹然自負其剛明而私忽之中狎焉日狃於近習固其勢也聖人知其然故著其義於虚而明其感於受曰虚則無憧憧之擾矣曰受則不從於其思矣曰人則不蔽於其朋矣夫初曰咸拇外馳而紛也二曰咸腓妄動而害也三曰咸股隨人而詭也不然而枯寂之躭五之脢也絶物以為無也不然而口説之騰土之輔也逐物以為有也君子之心以無心為心君子之受無受而無不受無受故不滯於實無不受故亦不淪於虚實以養虚有為皆應跡也虚以含實明覺皆自然也故彖曰利貞心宰徳也象曰虚受徳宅心也感之道以天不以人受感之道以徳不以偽孟子曰所過者化所存者神虚而神焉受而化焉盛徳大業至矣哉周易君子以虚受人修撰臣錢維城程子曰君子觀山澤通氣之象而虚其中以受於人虚中者無我也臣謹按自士君子學問之功以及人君宰天下之道莫不大乎能受而貴乎能虚虚則如空谷如止水有響斯應無滯響也遇物成影無留影也為卦山上有澤以虚而通澤性潤下土性受潤故有以虚而受之象然不取象於山下有澤之損而獨取於咸者臣愚以為山髙澤下似不相通乃屈而止於下以資其潤如聖人徳業已成而能不廢集思廣益之助人君尊隆已極而能不廢懸鞀懸鐸之招尤為感通之極非至虚者不能亦猶地中有山之為謙也舜禹大聖人也舜明四目達四聰雖邇言必察禹聞善言則拜而益之贊禹猶以滿招損謙受益為諄諄夫聖人之知宜無不至矣人之自獻於聖人者宜無有過於聖人之知者矣然聖人且多方以求之降心以禮之如此詩云先民有言詢於蒭蕘書云皇帝清問下民聖人之視天下無可以為愚而忽之者故雖匹夫匹婦不敢不竭其千慮之一得以為髙深之助泰山不讓土壤洪海不擇細流惟聖不自聖聖之所以益聖也國語曰天子聴政使公卿至於列士獻詩瞽獻典史獻書師箴􅕓賦矇誦百工諫庶人傳語近臣盡規親戚補察瞽史教誨耆艾修之而後王斟酌焉夫以一人之身前後左右争獻其知以受而成焉是一人之聰明即天下人之聰明也四海雖大何必下堂階而灼見哉不然雷霆之震萬鈞之壓無不震懾摧折望風疑畏安所效其獻納哉此虚與不虚之效也臣觀三代以下能受言者莫如唐太宗然初則恐人不諫導之使言中則悦而從之繼且勉强從之而猶有難色矣豈非治安己成功業已盛其量漸滿哉此程子所謂以量而容之擇合而受之者非聖人有感必通之道也葢凡境有量而虚則無量虚即隨物之所到以為量者也無量故無滿受天下之益而不見其盈聖人之心渾然一天地之太虚故曰大而化也由是言之虚則受不虚則不能受受則為咸不受則失其所以為咸中孚以虚而信及豚魚故有鶴鳴子和之應夬四以剛自决故聞言不信而有聰不明之咎書曰好問則裕自用則小魏徵曰兼聴則明偏信則暗豈虚語哉周易君子以虚受人編修臣周玉章程子曰君子觀山澤通氣之象而虚其中以受於人夫人中虚則能受實則不能入矣虚中者無我也中無私主則無感不通以量而容之擇合而受之非聖人有感必通之道也吳慎曰虚者咸之貞也天地之常以其心普萬物而無心聖人之常以其情順萬事而無情者虚而已君子之學廓然大公物來順應所謂以虚受人也臣謹按聖賢學問必虚中以受人之益然後日進無疆故泰山不讓土壤以成其髙河海不擇細流以就其深君子觀山澤通氣之象而知能感由於能受能受在於能虚虚受者廓然大公物來順應若一有偏私擾其静正之體先儒陳琛所謂先入者為主而感應之機窒雖有所受未必其所當受而所當受者反以為不合而不之受矣書云有言逆于汝心必求諸道有言遜于汝志必求諸非道豈必有合於心而始受之即所受者果當於理而其他遺棄者必多又程子所謂擇合而受之非聖人有感必通之道也且夫君子一身聖徳王功交有責焉者也徳無不懋而陳善納誨益有以增宥宻之修功無不備而嘉謀嘉猷更有以廣協恭之治惟虚中善受則芻蕘工瞽皆得至於其前而嘉言罔伏矣特是人之來感者情偽不齊是非互見并有合天理順人情之事而或古今異宜經權異勢者於此拒之不可而輙受之則轉以滋累然君子惟虚故明此心如鑑之空如衡之平有感即應而其中是非可否灼然不淆則集思廣益既有以來天下之善而無稽勿聴弗詢勿庸自不得輕為嘗試由是以受之於人者施之於人而徳洋恩溥天下並受其福大舜之好問好察執兩用中即此意也抑臣謂虚者誠而已矣誠則無欲無欲則静虚動直因以得夫明通公溥不自有其心乃能合萬物之心不自有其情乃能達萬事之情天地心普萬物聖人情順萬事無一不在天地覆載之内即無一不在聖人胞與之中以虚受之實以誠感之耳易之中孚言誠咸卦言虚中孚曰說而巽孚乃化邦也咸曰聖人感人心而天下和平程子釋之謂聖人至誠以感億兆之心而天下和平然則虛受之心與中孚之化皆一誠之所積而通也夫周易君子以虚受人監察御史臣張孝挰程傳君子觀山澤通氣之象常虚其中以受於人夫人中虚則能受實則不能入矣虚中者無我也中無私主則無感不通以量而容之擇合而受之非聖人有感必通之道也臣謹按天下之理惟虚故能受惟受故能感惟感故能通上蟠下際四達而不悖焉若不能虚則必不能受不能受則必不能感而物我之情窒矣然所謂虚者非心無所主之謂而無私之謂也方寸之間一有私意以蔽之則先入之見巳實其中雖有所受未必其所當受而所當受者或反以為不合而不之受矣是故仁義中正者所以主宰乎吾心皆實理也而空靈不昧仍屬至虚意必固我者所以障塞乎吾心皆虚氣也而沒溺蔽錮則為至實守仁義中正之道則中虚虚故物莫不受而凡理義之悦心懿徳之同好皆覺其怡然順應觸乎外而動乎中存意必固我之私則中實實故物莫能入而凡嗜慾之紛擾朋從之往來反覺其與心相習徇乎外物而忘乎在己是則能受之道在於能虚能虚之道在於無私為君子者亦廓然而大公物來而順應斯巳矣凡人莫不有性性莫不發而為情情之最易見者莫如喜怒兩端君子之喜因其人之可喜而喜之無私徳焉君子之怒因其人之可怒而怒之無私憾焉如鑑之空妍媸畢照妍者自得其為妍媸者自得其為媸而鑑不與焉如衡之平輕重悉稱輕者自得其為輕重者自得其為重而衡不與焉設使鑑而有意為妍媸衡而有意為輕重則必失其妍媸輕重之本然而鑑與衡俱歸於無用矣是以君子静則存動則察瞬有存息有養一念之偏私必絶一端之奇衺必拒清明在躬常覺此中湛然無絲毫之䝉蔽於是乎無所不虚即無所不受如覆載之包容如江河之茹納故曰天地之常以其心普萬物而無心聖人之常以其情順萬物而無情天地以虚而感物聖人以虚而感人心極而言之三才之道盡於是矣而豈拘拘焉以量而容之擇合而受之者哉周易恒亨无咎利貞久於其道也天地之道恒久而不已也侍讀學士臣世臣程子曰恒之道可致亨而无過咎但所恒宜得其正失正則非可恒之道也故曰久於其道其道可恒之正道也不恒其徳與恒於不正皆不能亨而无咎也天地之所以不已葢有恒久之道人能恒於可恒之道則合天地之理也臣謹按聖賢之學以久而成帝王之功以久而備故湯之日新文之緝熙學進於無疆也堯之協和時雍周之太和宇宙業由於積累也自古明徳新民未有不要於久而能有成者此恒之所以致亨而无咎也然人一生之中亦有情好之偏私慾之蔽終身由乎其途而莫改者矣而不得為恒者以失其正故也失其正則不得謂之道既不得其道又安得謂之恒哉且夫天位乎上地位乎下其間溫肅之用生養消長之機莫不各有當然之理自然之則惟天地無心而順布其當然之理潛率其自然之則故前有千古後有萬年鼓舞運量常如一日聖人知其然以至明者决擇乎是非而以至健者力持乎終始自身心意知之地以及於禮樂刑政之施不敢以輕心出之懼其浮而易輟也不敢以慢心間之懼其倦而中阻也不敢以驕心乗之懼其盈而終弛也自一日以至百年由一事以及萬事酌乎義理彰厥有常恒有可恒之道而無始勤終怠之虞則學日進於髙明治日躋於隆盛心通造化而撰合乾坤胥由是也夫周易天地之道恒久而不已也監察御史臣陸秩臣謹按正大者天地之情貞觀者天地之道而天地之道之見於恒者即可由久於其道推之據本義云天地之道所以常久亦以正而已矣程傳云其道可恒之道也又云天地之所以不已葢有恒久之道人能恒於可恒之道則合天地之理也又朱子云所謂不易者須有變通乃能不窮又徐氏幾云有不易之恒有不巳之恒利貞者不易之恒也利有攸往者不巳之恒也林氏希元云惟其不易所以不已其説如此夫天地之化運於自然彖傳言正而推極於天地者蓋自觀化者就五行二氣中見其道之所以不易而因推本於正言之如寒暑之有往來也流峙之有髙深也往不一於往而又濟之以來髙不一於髙而又間之以深而往來髙深之象則仍可於至不一之中而得其至一之道至不一者朱子所謂變通不窮也至一者卦之所謂恒亦彖之所謂貞也則論恒之由於正者又何不可於天地之道見之哉卦象風雷在天者也山澤在地者也而水火則天地並有之者也恒象雷風本義以為理之常蓋第就恒之所以名者言之究之山澤水火亦孰有外於理之常者至於山澤通氣雷風相薄水火不相射則恒也而又正矣程傳言天地而又及於人之合天地者蓋正者人與天地所以同原恒者人與天地所以並夀立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義則仁與義者所以效天法地克體隂陽剛柔之全而成參贊位育之功者也仁以長人義以利物長人以仁則飲和食徳之衆生生而不窮利物以義則因時制宜之模永永而無極天地之道即聖人久道化成之道矣傳由天地而推極於聖人宜哉周易日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恒而天地萬物之情可見矣檢討臣萬松齡臣謹按道無二致聖人之治功與天地之化功同其恒久而不已也於穆不已不已者恒也天之道也至誠無息無息者恒也聖人之道也顧恒之體主於常而恒之用每適於變日往月來日月相推未始常也而不失其照之常寒往暑來寒暑相推未始常也而不失其嵗之常日月得天循其自然之理也四時變化亦循其自然之理也人苐見日月之照四時之成終古如斯而不知其所以能久照能久成者固有恒久不已之道存焉耳聖人繼天立極與日月合其明四時合其序化民成俗之心無懈於宵衣旰食之頃然必運之有本而不遽期其效推之有序而不急計其功朝乾夕惕日新又新不敢有一息之間以雜夫天命之原由觀刑而慎五典賔四門由關雎而桃夭化麟趾應自家而國而天下漸之以仁摩之以義而天下之人心於是乎化家敦禮樂户説詩書而天下之風俗於是乎成五帝三王之世所以風動時雍而比户可封刑措不用也自是而降如漢之文帝十年而外吏修其職民樂其業禁罔疎濶幾於刑措唐之太宗初御宇内連嵗荒旱勤而撫之三年之後天下大稔獄訟稀息仁義之效較然可覩而况以性功為治功久道化成之效自非三代以下所可幾乎然八卦之中惟雷風之為象宜乎可暫不可以常而獨以恒名者何與蘇軾有云雷風非天地之常用而天地之化所以能常者以有此也若膠固不移則恒而失其正非所以為恒矣豈足以語夫天道哉聖人之治體夫雷風為恒之象酬酢萬變妙用無方而其不易之體固無時而或易久照久成天地無心而成化也天下化成聖人有心而無為也聖人之恒一心如一日天地之恒萬古如一日道之在聖人與在天地寧有異哉然則天地萬物總不外乎恒乆之道顧性不可見而可見者惟情子朱子云性只是箇物事情却多般或起或伏然頭面却只一般蓋性者道之體情者道之用體隐而難窺用顯而可見見其情而性亦於是可盡惟其用之變乃所以為體之常也夫天髙地下萬物散殊氣有參差而其徳性功用亘萬古而不易善觀天地萬物之情者舍恒奚以哉是則天人無二理治功化功無二道惟聖敬之日躋以進於無息由身心意知之微以達於家國天下之廣人心日益正風俗日益淳臻於風動時雍之盛不難矣又何驩虞小補之足云周易聖人久於其道而天下化成侍讀臣林蒲封程子曰聖人以常久之道行之有常而天下化之以成美俗也臣謹按天地生人生物而裁成輔相之功必賴於聖人葢聖人者體天立極而道濟天下者也其顯仁藏用既足以通乎易簡之原而純亦不已又有以合乎於穆之運是以當動而動當静而静而動静不失其常當弛而弛當張而張而弛張克貞乎一不慕於小利不急於近功不惑於紛更不揺於浮説舉一事而必求衆情之協立一法而必圖萬世之宜神而明之優游而漸漬之胥天下含生負性之倫皆歸於範圍曲成之内莫不有以作其維新之化而成其蕩平之風此道之所為可大而可久也程子所謂行之有常者非聖人其孰能之然考之易傳言化成天下者凡三見其在離卦則曰重明以麗乎正乃化成天下其在賁卦則曰觀乎人文以化成天下而此獨言久於其道者何也蓋離之明而得其正則能照臨乎四方而萬物作覩賁之文明而止則能辨上下定民志而衆庶同風皆有可以化成天下之道然非貞之以久則其化亦未易至於成要之其久也非執一而不變之謂也亦非因循而不振之謂也聖人一誠而已矣誠則無偏無偏則無弊而百年必世莫能易其規誠則無妄無妄則無息而四海九州可以通其志猶之日月之運行四時之逓嬗夜往晝來者即聖人之静専而動直也春溫秋肅者即聖人之仁育而義正也雷動風行者即聖人之令行而禁止也雲行雨施者即聖人之徳洋而恩溥也元亨者聖人誠之通利貞者聖人誠之復也聖人之道即天地之道也聖人之久於其道即天地之恒久不已也聖人亦一天地而已矣周易聖人久於其道而天下化成編修臣吳嗣富臣謹按孔子釋恒卦之義而推之日月照臨四時代嬗固已極天地之大矣而恒之為義必騐之人事而後詳因舉而歸之聖人葢聖人御極欲使大化翔洽則必寛為之候使得從容以竟其業初未嘗急遽以期旦夕之成昔者堯禪舜舜禪禹聖聖相承撫中天之景運萬邦協和從欲以治其所為優而柔之饜而飫之者悉皆浹於肌膚淪於骨髓此唐虞之治所以獨隆於千古也迨及成周文武成康之君耿光大烈繼繼承承仁漸義摩重熙累洽是以周書畢命之篇有曰既歴三紀世變風移四方無虞一人以寧由是言之則化之要於久也審矣何則人主之治天下不外乎興利與革弊然當其興革之始雖有所甚愛於天下而天下或轉以為不便故曰非常之原黎民懼焉及其相沿既久耳濡目染習為固然夫固有潛移黙奪而不知者矣且夫紀綱法度之立亦未有猝而布之者也其施之也有次第其入之也有淺深茍刻期以程效則必不能委曲以盡其理故曰欲速則不達夫布治者既不可以驟而定而受治者亦不可驟而效則化之要於久也不益較然哉然臣以為政之有恒尤在心之不息後世人主非無奮發有為毅然以三代為必可復然其始也勵精圖治綱舉目張乃不克居之以無倦則敏皇之念久而或渝振奮之氣又鋭而易退如是以為治雖使皇皇法堯舜一一師文王亦何益之有哉此無他圖始則易而要終則難也夫惟聖人以至誠無息之心行悠久無疆之政始之清心寡慾者久之猶然不邇聲色不殖貨利也此天徳之恒也始之明作有功者久之猶然自朝至昃不遑暇食也此王道之恒也本天徳以行王道而總要於恒此所謂久於其道者也由是而漸摩之至舉凡五禮以節之六樂以和之八政以防之八刑以糾之者使天下安之如出入之常守之如髙曾之矩服而習之如饑食渴飲之不可暫去言乎道徳而道徳一也言乎風俗而風俗同也語曰禮樂百年而後興即此之謂也周易聖人久於其道而天下化成監察御史臣侯嗣達朱子本義曰極言恒久之道程子傳曰聖人以常久之道行之有常而天下化之以成美俗也臣謹按此言聖人得恒之道而致恒之效也聖人繼天立極以一心合撰於清寧而使心之清者常清無一時之混淆寧者常寧無一事之擾累由是以欲通天下之欲以情類萬物之情優游漸漬無事不當其序無物不順其則以至政行俗美成其化於天下而無難而其道必持之以久久則變而不失其常動而不失其静存之中者存存而不息推之外者亹亹而不窮禮樂刑政協於度飲食教誨發其良固未有久而不得其效者譬之日月往來錯行其照臨萬古如新也譬如四時春秋代嬗氣候萬古常正也聖人凖此以化導天下故其機亦不在旦夕之間葢人君承天理物所以教養斯民者本非茍且補苴之術則自無嵗月㨗奏之功凡其所運量雖未嘗不化裁推行與民變通而治原必要於克一迄今上遡中天之治放勲之後繼以重華乃始得臻於協和從欲三代之治盛於成康其先則文王始之武王繼之涵濡百年而後有以洋溢乎天下自古帝王未有能舍久道以成化者臯陶曰彰厥有常伊尹曰始終惟一莫非恒久之謂也後世論治或専言法不知致治在道而法以輔之法因時為轉移而道則亘古而不易惟以法為用而本道以為質凡所為勸課農桑興立學校不操切以期速效搜剔賢才整飭吏治不煩擾以致紛更一日二日即可必世百年四海九州不異宫闕左右信乎得恒之道乃有以致恒之效也抑恒久之道不獨人君為然凡朝廷任官分職亦必要之以久而後可考其成功故唐虞三載考績三考乃行黜陟漢之盛也為吏或長子孫葢化民成俗之事貴行之以専而需之以久所謂日計不足嵗計有餘若法方立而輙課其成事有端而不竟其緒守令數易則視官如傳舍大僚屢更則下不知所從始焉擇之貴精既焉任之宜久此亦久道化成之義也臣敢推廣其説以效芻蕘之獻焉周易聖人久於其道而天下化成監察御史臣楊勲臣謹按王道本於天徳聖人憲天出治以不息之心著為可大之業其精神運量於無窮斯徳澤涵濡於莫外自非近功小效所得而並也今夫天地之道恒久而不已則聖人之化成天下其道當何如哉夫論治而至於化成亦未易言矣民生必期其遂何以使之老有所終幼有所長民性必期其復何以使之道徳以一風俗以同乃觀聖人在上仁周六宇至治之彌綸臻一世於豐亨豫大運際重熙徳教之洋溢洽斯民於心術性情舉飲和食徳之衆皥皥然順帝則於不知直不解聖人果何道以致此也而抑知聖人豈責效於旦夕間哉葢大化不可淺求而至治無庸驟幾故農桑樹畜因民之利必幾為經營區畫而民生始厚禮樂詩書興民之行必幾為勞來匡直而民徳始正優游漸漬有以浹其肌膚而淪其骨髓而後從欲以治四方風動遊聖人之宇者莫不快化日之舒長也在昔成周之時文王積功累仁於前武王纘緒丕承於後至於成王禮明樂備然後教化大行萬邦咸休非久於其道而能然乎是知天地惟一元之運周而不息故資始資生性命各正而化成萬物聖人惟一心之誠純亦不已故引養引恬於變時雍而化成天下觀於久道化成則信乎政貴有恒而王道必本於天徳也周易雷風恒君子以立不易方監察御史臣周祖榮程子曰君子觀雷風相與成恒之象自立於大中常久之道不變易其方所臣謹按易之為書有交易之義有變易之義而要以不易者為之宗故其言人事也雖抱通變之才遊萬變之地而必有不易者以定其極所謂止於其所也觀於雷風相與雖變而不失其常可知日用事物之間應接紛繁莫不各有當然之則如為君而仁為臣而敬為父而慈為子而孝所處之時不必盡同所操之理斷然不易譬之工之有矩木之從繩隨其所向歸於一定故曰方也然而不能自立則亦有難言者或中無定識遇一事而利害之見足以奪是非之明則游移而失所向或外無定力為一事而成敗之勢足以淆邪正之趨則輾轉而莫能安此非方之有所拘抑亦心之無所主也惟君子擇至是之方以為之據執至正之方以為之歸操之於己有道義而無私曲此植體之所以不易也措之於世有中平而無偏陂此致用之所以不易也葢其智勇深沉退藏於一物未交之始而言行相顧全徳於百折不回之時固有神明於交易變易之義而守夫不易之經者豈硜硜拘執之學所可同日語哉昔明道程子與横渠張子論定性之學有曰動亦定静亦定無将迎無内外此發明立不易方之㫖為下學者指其功也伊川程子又曰恒非一定之謂一定則不能恒矣惟隨時變易乃常道也此由不易之理而會通於交易變易之用為上達者宣其藴也二説相須而卦象立言之義無不悉備可互叅而見恒道之妙矣周易明出地上晉君子以自昭明徳給事中臣陸尹耀俞氏琰曰知所以自明則本然之明如日之出地而其昭著初無增損也大學所謂明明徳所謂自明與此同㫖臣謹按此卦離火居上坤地居下離照文明坤道厚載隂以承陽麗天久照柔進上行昭融顯爍如日之升曜采經天至明之象也故曰明焉然明無不照照無不徧者明之用也由微而著由晦而彰者明之漸也而出自地上則棄闇出幽向明繼照炳耀萬方光被四表有愈進愈明之勢故其卦為晉而象為明出地上也君子觀晉象而知徳之在我受之自人賦之自天天行至健法以自强人心至明進以自昭况明徳者虚靈不昧虚則能具衆理靈則能應萬事本無不明者也其有不明物欲蔽之耳本然之明固未嘗息也故徳為君子固有之徳而明者亦君子之徳自有之明也自有此徳而自明之功不藉於後起自有此明徳而自昭之迹非假於强合内藴於方寸則仁義中正至足也外見於事為則五常百行非邪也徹吾蔽澄吾天内省於潛密惺於獨人所不見而昭之也我自昭之而已人所及見而昭之也亦我自昭之而巳格致誠正昭明徳於己也修齊治平昭明徳於天下也堯之欽明文思克明峻徳舜之濬哲文明重華協帝湯之懋昭文之緝熙皆自昭其明徳也與巳之徳愈進愈明徳之明日呈日露如明之出地其徳有不於昭顯懿於萬古者哉周易上火下澤暌君子以同而異庶子臣林蒲封程子曰上火下澤二物之性違異所以為暌異之象君子觀暌異之象於大同之中而知所當異也臣謹按火澤二物其為異易明然聖人取象於同而異者何也朱子釋之曰二卦合體而性不同第就卦體剛柔相應而言之耳程子謂大同之中知所當異又曰聖賢之處世在人理之常莫不大同於世俗所同者則有時而獨異亦惟泛論其理而於火澤之所以同而異者究未嘗明言之項氏安世曰同象兌之説異象離之明夫以兑説為同則可而以離明為異則其説近乎鑿矣嘗考周子通書曰水隂根陽火陽根隂是火澤二物其本同也在卦離為中女兌為少女是火澤二物其類同也而一則炎上一則潤下故其象為同而異也本卦彖傳所謂二女同居其志不同行者此也若夫火炎上而居上澤潤下而居下各得其位剛柔相應此其所以同為君子之同而異為君子之異與臣因推而論之人情莫不好同而惡異然而天下之事未有有同而無異者漢任延對光武帝曰忠臣不和和臣不忠上下雷同非國之福帝深服其言其意似以同為非而獨有取於異者不知君子小人之分不在乎同異之迹而在乎公私義利之間而已葢小人之心存乎私私則惟利是圖利之所共趨則同而利之所必争則異矣君子不然其所同者禮義㢘耻之防致君澤民之志至於立身行巳應事接物之間則惟義所適其心一出於至公往往獨行其是而不顧故其同也無阿比黨援之習其異也無分門争勝之嫌所謂和而不流羣而不黨古之君子莫不由之如禹稷顔子道同而出處異伯夷栁下恵聖同而清和異孔子之於齊魯同一去也而遲速異孟子之於兼金同一餽也而辭受異至若禹臯益契同在一堂而都俞吁咈益顯其明良一徳之謨韓琦范仲淹同在政府議多不合而不害其公忠體國之實此皆所謂君子之同而異者也由是觀之帝王之治天下也肅紀綱謹法度勤政愛民用賢納諫其大要同也至於百官分職四民殊業文武並用徳威相反亦必有因時制宜而不能膠於一者夫惟象離之明照臨於上如兑之澤普被於下而使百司執事共勵其忠誠之節各盡其職分之宜以克臻於一道同風之盛斯為聖人用暌之極則與周易損而有孚元吉无咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虚與時偕行監察御史臣陸尹耀張氏清子曰當其可之謂時當損而損時也不當損而損則非時臣謹按損益二義不能偏廢損必濟之以益益必濟之以損損與益均為治世之權輿籌時之善術也顧益之為用自上施下湛恩汪濊澤被萬方自可致民説於无疆而其道乃為大光若損下以益上損内以益外是取於民以奉其君雖急公奉上小民固分誼當然於義誠無可辭然意主於損則損所不當損而損違其時必致剥民以自富此慕義强仁者不為而况聖人為天子者哉乃復丁寧其義於此卦之彖辭者非欲其厲民以自養也亦曰諴孚於衆志觀化於無心隨時消息善用其損善成其益耳葢損本拂情之舉或廹於時之不得已而計出於此當使此心大白於天下如嵗豐則從而豐嵗儉即從而儉損民原以為民天下後世實共見其不得已之心是為損而有孚矣於是衆志徯應國事以濟是為元吉矣本非厲民何咎之有雖一時濟變之權實萬世救時之法不可貞乎不特可施於一方抑且可達於天下不利有攸往乎既以不得已而損之必以不得已而用之雖享帝享親而以誠相格則蘋蘩蕰藻亦可薦馨潢汙行潦亦可昭敬此二簋可用享也享猶從儉則凡損過以就中損文以就質者舉視此矣是一損而國用以充民財可阜不獨取於民之謂損而裕其民亦謂之損也損之為用如是然或膠執其見専於用損非因時之制也享宜備物而二簋可用者特詘於時之不得不然耳由是以觀卦畫過剛則亢過柔則屈損剛之有餘以益柔之不足剛自不致終亢柔亦不致終屈時然則然也由是以騐物理氣盛而盈氣竭而虚損盈之太過以益虚之不及盈不得不損與時而偕損益不得不益與時而偕益時然則然也損與益一出於理勢之自然初非人力所能與斯可謂善用其損者矣乃知解衣推食小恵未徧益非其益也厚斂取盈民生日蹙損非所損也審乎損益之當然順時而行人事與造化相維君心與民情相凖何損之非益善用其損正善成其益者哉周易益利有攸往利涉大川彖曰益損上益下民説无疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行監察御史臣陳大玠臣謹按卦以益名而彖傳以卦體釋卦名義則有取于損上益下者何也葢為卦震居下巽居上損上卦乾體初畫之陽益下卦坤體初畫之隂自上卦而下於下卦之下故為益夫上君也下民也君之於民饑由巳也溺由巳也解衣衣之推食食之平日制産授田而外如山林川澤之利損以予民一旦偶被災䘲則蠲租免賦發倉廩開府庫饑即賑以米寒即給以衣務使無凍無餒其道有以昭格天下而無外此民說之所以无疆而益道因之大光也由是觀之益下下下是小民之益也民説道光是大君之益也記曰王中心無為也以守至正今益之九五君以中正而有孚恵心六二則臣以中正而永貞廸吉其無往不利而大有慶也宜矣抑又聞之君猶舟也民猶水也君能益民斯所由利涉與雖水患頻仍而出斯民於沉溺以登諸袵席又何慮乎大川之險哉惟是上有有孚恵心之君必下有利用大作與有孚中行之臣能奉宣徳意與為屯膏寧為渙汗則有孚恵我徳上信以恵下下亦信以恵於上如九五之象曰恵我徳大得志也正謂此爾卦之二爻有曰王用享于帝吉民心之所愛戴即天命之所眷顧也民受益於君君受益於天禹曰惟動丕應徯志以昭受上帝天其申命用休理有固然也若乃百職庶司持籌握算祇畫國計之盈縮不圖民生之安全較及錙銖吝於出納是愛國而不知愛民也書曰民惟邦本本固邦寧有子曰百姓足君孰與不足聖賢之垂訓均有得于損上益下民説无疆之㫖也夫周易益損上益下民説无疆自上下下其道大光侍讀臣李清植程子曰卦之為益以其損上益下也損於上而益下則民説之自上而降已以下下其道之大光顯也臣謹按理財之道莫善於損益二卦聖人以損上益下為益而損下益上為損者非徒虚論其理也揆以人事之實確是如此今且以農民論之夫田百畝則入亦百畝此常額也然種良者稼美糞多者田饒故均之百畝也上農耕之則所入必贏而貧農耕之則所入必耗損上益下之世農民優裕故耕者多贏合天下之農而皆贏所贏不可以數計矣豈非益乎若損下益上則農民乏資而耕者多耗合天下之農而皆耗所耗亦不可以數計矣豈非損乎推之工商無不皆然王者以天下為家凡民間之藏皆外府也是損上益下正所以藏富於民而裕不匱之源孟子曰聖人治天下使有菽粟如水火陸贄曰散小儲以成大儲皆此意也又曰自上下下其道大光者大廷推恩雖極汪濊然或見格於輿議或中飽於私囊或宣布之不時或奉行之無狀則澤不下究而隔閡曚蔽之患生必使實恵均霑黎民徧徳始為自上下下而益道於是為大光也益動而巽日進无疆天施地生其益无方凡益之道與時偕行顧象徳曰既奮發又沈潛學所以日新天下施地上生化所以不已此皆時之自然者故曰凡益之道與時偕行臣謹按益動而巽二句本圖義以發聖學也後天圖首震次巽震者奮也在人心則立志之鋭者是也又惕也在人心則持敬之密者是也巽者入也在人心則省察之精者是也又制也在人心則克治之勇者是也文王之徳之純實於此圖見之先儒之言學曰立志以端其本居敬以持其志又必省察以審其幾克治以踐其實其於圖義若合符契此卦震巽合體故夫子發其藴天施地生二句本天道以該王事也天以無心為施故文言傳曰以美利利天下不言所利也王者之損己初無市徳於民之心是亦不言所利之謂也地以並育為生故庾信曰物受其生於天不謝也王民之受益實有帝力何有之象是亦於天不謝之類也此卦五爻之辭曰有孚恵心勿問元吉吕祖謙釋之以為人君但誠心恵民不須問民之感然後元吉茍問民之感是計功利非誠心恵民者是也此其規模氣象豈驩虞小補者所能比擬故曰其益无方也又曰凡益之道與時偕行者天行之健萬古常運曾無一息之停所謂於穆不巳天之所以為天也聖人希天王者憲天故聖人之學無間斷無休歇不以小成自安堯舜之惟時惟幾禹之惜隂湯之日新文王之望道未見皆其義也若諸子之日月一至冉求之中道而畫則其不行之時多矣王者之政治益求治安愈求安不以小康自足堯舜之兢兢業業禹之孜孜湯之慄慄文王之視民如傷皆其義也若齊桓公葵邱之後而有驕色唐太宗貞觀之末而有弛志則其不行之時多矣大抵損益之機間不容髮無中立之理一日不益則損者至矣故中庸一書其於全體大用燦然純備而一言以蔽之曰至誠無息而已至誠無息則與於穆不巳者並運而同流聖人所以希天王者所以憲天豈復有加於此哉周易益損上益下民説无疆監察御史臣沈廷芳程子曰卦之為益以其損上益下也損於上而益下則民説之无疆為无窮極也臣謹按王者祈天永命之道在於愛養生民而愛養生民之實在於使天下衣食之豐足惟因民之所利而利之而不専其利上不専其利而有以子下則下䝉其福而被其澤人情和樂奉之為元后愛之如父母召康公之所謂王位在徳元用供王能祈天永命者道不越此是其説通於周易之彖傳有云益損上益下民説无疆臣請得而敷陳之益之卦體震下巽上巽震二卦皆由下變而成陽變而為隂者損也隂變而為陽者益也損上益下所以為益臣詳繹其義是葢為人君行慶施恵於民而言之耳夫上之取下有常經下之奉上有定分禹貢六府孔修庶土交正底慎財賦咸則三壤成賦中邦周禮太宰以九賦斂財賄毛詩倬彼甫田嵗取十千凡此皆經久之法以備軍國禄食之需不容過取而正不可不取者也過取乎民則難乎為民而有損乎下不取乎民則難乎為國而有損乎上是故君天下者代天以理民視天下之墾田定天下之賦税嵗有正供家有常數額外無苛征豪吏無溢取民之受益已自無窮何敢冀格外浩蕩之恩乎是則益下之道固不必盡由於損上也乃易傳之損上益下民説无疆者臣謂為人君行慶施恵於民而言之者何居蓋君民一體宜以一人勞天下不宜以天下奉一人務鳩斂而厚帑藏之積者匹夫之富也務散恵而收兆庶之心者天子之富也三代盛時思艱圖易省耕斂以行補助其徳恵雖史書不詳其事葢亦毎嘗行之漢文帝在位休養恬熙民情樂附故謳歌訟徳不衰豳之詩曰萬夀無疆雅之詩曰羣黎百姓徧為爾徳漢書贊曰海内殷富興於禮讓斷獄數百幾致刑措豈非損上益下之明效大騐哉葢損上之時一以損己為念原不問民心之感然因民之所利而利之盡物之願則至誠有益於天下天下之人亦無不至誠愛戴以君之至誠之徳澤為恩恵矣此九五一爻所以又有有孚恵心勿問元吉有孚恵我徳之辭也雖然國家之用皆出於民能節則薄取而有餘過侈則盡取而不足慎乃儉徳惟懐永圖時令有司計國儲之多寡因嵗事之登耗屢甦農民之困則損上益下正所以結人心凝天命而培千萬年不㧞之基矣周易益動而巽日進无疆天施地生其益无方凡益之道與時偕行諭徳臣覺羅蘇岱孔頴達曰益動而巽日進无疆者自此已下廣明益義若動而驕盈則被損无已若動而卑巽則進益无疆故曰益動而巽日進无疆天施地生其益无方者此就天地廣明益之大義也天施氣於地地受氣而化生亦是損上益下義也其施化之益无有方所故曰天施地生其益無方雖施益無方不可恒用當應時行之故曰凡益之道與時偕行也臣謹按彖傳極言益道之大於卦徳而見聖學之益焉葢功不可缺序不可紊震動巽入是既奮發而有為又沉潛而深入精神日奮其得日深優游日久其養日純故徳崇業廣日日增益而不可限量矣於卦體又見造化之益焉乾之一陽自上而下天之施也而物於是乎資始坤之一隂自下而上地之生也而物於是乎成形一施一生合同而運萬物通焉是天之施也而不言其施之之恩地之生也而不言其生之之徳萬物之育也而不自知其施生之故是生生化化之益无以加矣寧有方之可測乎凡此皆益即皆道也皆道即皆時也故人事之窮而通失而得造化之虚而盈消而長咸與時而偕行時當益者无不益也是以聖人體自然之理神道設教必因時以厚民生制器尚象必隨時以利民用則天下莫不受其益造化運自然之理洪纎髙下皆因時而不偏飛潛動植皆隨時而不失則萬物莫不受其益聖人天地同一至公至仁之心天即聖人也聖人即天也此益道之所以為大也周易益動而巽日進无疆天施地生其益无方凡益之道與時偕行編修臣馮秉仁程子曰卦才下動上巽動而巽也為益之道其動巽順於理則其益日進廣大无有疆限也動而不順於理豈能成大益也以天地之功言益道之大聖人體之以益天下也天道資始地道生物天施地生化育萬物各正性命其益可謂无方矣方所也有方所則有限量无方謂廣大无窮極也天地之益萬物豈有窮際乎天地之益无窮者理而已矣聖人利益天下之道應時順理與天地合與時偕行也顧象徳曰既奮發又沉潛學所以日新故日進无疆天下施地上行化所以不已故其益无方此皆時之自然者故曰凡益之道與時偕行臣謹按聖人崇效天卑法地内而修徳於一身外而施利於天下無非體造化自然之理而已此其道莫著於益卦卦才下動上巽動則鼓奮發有為之氣巽則密沉潛觀理之思修徳者震動恪恭敦行不怠而又從容涵養深造自得則日新又新有層累而日上者湯之聖敬日躋成王之日就月将學有緝熙于光明皆此意也臣又謂震得乾之初爻有自强不息之義巽得坤之初爻有柔順利貞之義則動巽皆所以法天地故其益日進无疆无疆者天地之詞也坤之彖曰徳合无疆中庸曰悠久無疆聖人法天地以為功則亦與天地同一无疆益在一身者如是益在天下者亦然天地生萬物聖人養萬民其道一也天道髙而下濟地道卑而上行乾則資始坤則成物一施一生而品物流形各正性命其益萬物也誠無限量矣然而春生夏長秋斂冬藏天地之益萬物惟其時而已假令氷堅木落之時而有甲拆勾萌之象豈得謂隂陽和而萬物生乎聖人法天地之益亦正法天地之時書曰惟學遜志務時敏厥修乃來乾之九三曰君子進徳修業欲及時也益在學問者必有取乎時之義而况恩敷四海利濟蒼生有不與時偕行者哉嘗考月令所載凡行慶施恵等事皆乗時布令無凌節無濫施此時之大槩也而其道有當及時者有當順時者值水旱而蠲賑因流離而安集稍一後時民不聊生如天地之降時雨澤枯槁而成豐穰此及時之益也若夫政以時修事以時舉循作訛成易之序垂耕桑畜牧之經休養生息食徳飲和未嘗有格外之恩膏而斯民受福無窮此如戴天而忘其髙履地而忘其厚是順時之益也總之盡性以盡人物之性贊化育位三才皆有與天地合徳者觀於益道而知之矣周易益動而巽日進无疆天施地主其益无方凡益之道與時偕行給事中臣朱鳳英宋儒朱子曰動巽二卦之徳乾下施坤上生亦上文卦體之義又以此極言贊益之大臣謹按此節乃言聖人體益之道以益天下凖諸人事天道而無不然者而因以著時中之用也葢物我同體天人一原朝野上下間原無彼此之隔而應感施受之情幾立於此誠騐於彼往來迭用而不窮者莫不有當然之節主乎其中夫亦曰時而已矣夫時者天地之樞機黙運而常隐於不言聖心之因應无方而恒徵於有象試以益之在徳業言之動以勵進修之志而健行者自强巽以深研悦之功而緝熙者不已動以開巽巽以善動而日新之機愈引而不自知更以益之在造化言之天道下濟乾元開資始之功地道上行坤元廣資生之用施因生而不窮生以施而不匱而品彚之盛普遍而不可極大哉時乎準諸天人而無或異者乎然就其一時各至者以觀一動一巽互為其根一施一生旋相為質而時固萬變而難拘就其一時合至者以觀即動即巽遜敏交致即施即生易簡同符而時又一定而不易則天下孰非時哉凡益之道可類推矣盈虚消長之故聖人辨之為最精故極深研幾而迭運者在神明不在迹象化裁通變之宜聖人協之為至一故因心作矩而推遷者在宥宻即在流行與時偕行而聖人體益之道全矣臣嘗思之聖人視天下如一家中國如一人而動巽相資敬勝與緝熙並懋施生互用愷澤與愛戴胥忘由是酌盈濟虚裒多益寡胥天下而無不被其益者正其益之廣大均平與天地合其徳者也然則時也者聖心一中之準所以統天人上下而無間者哉周易益動而巽日進无疆編修臣秦勇均本義曰動巽二卦之徳程傳曰以二體言卦才下動而上巽動而巽也為益之道其動巽順於理則其益日進廣大无有疆限也臣謹按聖賢之學所以能日新不已而造乎廣大髙明之域者初非因任自然而可坐收成效也亦非勉强從事而以助長為功也其振作有為常足以迅赴其幾而其從容不廹又有以宻循其理夫是以畢生無止境而功之所詣為獨隆觀於大易下動上巽之卦名之曰益益也者以莫不增之謂也進之道也然非動則無以鼓進之機非巽則無以得進之序譬之行逺焉裹足而不前固自畫其進矣幸而奮其步武以為計程可至然不循其序欲一蹴而至之如蹶者趨者不過崇朝而廢耳甚且㨗徑以窘步騖廣以自荒其不至扞格多阻者幾希故學之日進无疆斷非動而巽不可葢精神以奮發為先而理義非沉潛不入奮發則怠氣無自乗常以邁往而致其决所謂强有力者能勝果而確焉無難也沉潛則輕心不敢肆常以詳審而得所安所謂優而柔之使自得之饜而飫之使自趨之也剛克柔克日復一日説命所云厥修乃來徳修罔覺者其效皆由於此今觀於雷風相薄之象迅擊起於下而草木甲拆者雷之功也其宣幽達滯披拂蕩滌於天地間使物情莫不暢遂者則風之力也雷動而風巽清寧之宇景象賴以常新即卦象以驗卦徳而日進无疆之義更曉然矣是以學易之君子無因循之失亦無凌躐之虞有淬礪之功復有安詳之度積累不疎於一息孰測其端倪功修罔替以終身孰窮其究竟無他動而巽故也而動巽以日進其大要不外於遷善改過而已葢動於善之當遷而非巽以為循途之赴究不能精義以入神動於過之當改而非巽以為敦復之基亦何能洗心而藏宻惟其奮迅激昂之用即寓於優游涵泳之中斯遷善而自融其迹改過而不覺其難希賢希聖希天将有不知其然而然者其為益也豈不大哉抑臣更進推之人君秉剛中之徳以法天行之健所云自强不息者固主乎動而言詩言單厥心書言疾敬徳春秋之義樹徳莫如滋禮記之文莊敬則日强此固皆以動為益者也然朝夕之乾惕維殷而徳性之充養有素如堯之安安舜之溫恭湯之寛仁文之徽懿則又皆以巽為益者也葢動則運四海於一心巽則洽衆心於一巳日新而化理俱新無疆而皇圖永固則天徳王道一以貫之矣益之時義大矣哉周易益動而巽日進无疆監察御史臣吳文煥臣謹按聖人之學必日進而始可言益也然非有以相資則不為功茍不得其道以加勵焉欲身心之際交修而奏效也庸可得乎惟觀於益之卦徳而可以知聖學矣益有求其益以為益者邁往之力宜奮於崇朝而不當拘乎其故益有忘乎益以為益者積累之功當要之畢世而不可驟期乎其成今觀内卦固動者也古今艱大之業非有振迅之才以勵之雖有神聖之質安坐而不前幾無殊於愚鈍學之所以貴於能動也神動則敏志氣發而精神生形動則勤勉强深而才分出吾既以聖賢自期何容優游而坐廢所為求其益以為益者動之謂也以觀外卦則巽者也古今精微之㫖非有沉潛之志以入之雖有雄毅之姿一往而莫返亦終失之淺嘗學之所以貴乎能巽也心巽則能宻意氣斂而静中之所得乃至理巽則不浮功力紓而遲久之所悟乃真吾既以粹精是務自不惜遜心以相求所謂忘乎益以為益者巽之謂也日進無疆從可知矣吾學之進退原無中立之幾巽而先之以動今日之進遲諸異日而不敢惟能動為能進也假令緩而赴之則将無以圖始學之隳於怠弛者固不少也而進其於何望也哉吾學之進境非有中止之數動而繼之以巽一日之益深諸日日以為功惟能巽愈能進也假令廹而圖之則将難於持久學之荒於欲速者尤不少也而進其何由致也哉是故有震動恪恭之意則可以立致太平有和平寛厚之心則可以化成久道聖學也即聖治也一以貫之而已矣周易天施地生其益无方監察御史臣楊勲臣謹按易下經之有益猶上經之有泰乾坤相交其小往大來者可以徵萬物之通巽震相協其陽變隂合者可以觀萬物之益故二卦皆有及物之功而萬物生生變化無窮之妙則尤著於益葢益之為卦上巽下震巽震者皆索乎乾坤之初者也乾以初畫之陽下交於坤天道之下濟也坤以初畫之隂上交於乾地道之上行也而一施一生有其體且上卦為風風從天降是即天之施也下卦為雷雷自地出是即地之生也而一施一生有其象今夫兩儀定位者天地之體所以立二氣交感者天地之用所以行自太極握動静之樞而隂陽有互藏之宅静専而動直焉静翕而動闢焉其施也氣方行而朕兆莫窺萬物於是而資始矣其生也氣已凝而胚胎有質萬物於是而資生矣由是雷霆風雨六子各贊施生之功水火木金四時各任施生之職乾道成男坤道成女而生生者不息見乃謂象形乃謂器而芸芸者不窮其為益也何如乎是故天職施而後生者有資地職生而後施者皆實此天地之相成為益也而富有日新乃充周而無外且天施無形而流形以後仍各正其性命地生有象而成象以後仍保合其太和此天地之善留其益也而顯仁藏用遂循環而不已以言其益寧有方也哉若夫繼天地之志述天地之事體乾父坤母之心以財成其道輔相其宜施生之無待於人者為天地因其功施生之有待於人者為天地平其憾盡萬物而煦嫗覆育之則无方之益在天地者又屬之聖人矣此一人首出所以參三才而立極與兩大而合徳也與御覽經史講義卷六
