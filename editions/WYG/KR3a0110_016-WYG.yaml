front:
  text: 欽定四庫全書御覽經史講義卷十目録
  hash: sha256:86e3871dfa4fde61cd5fdd1e44181bb7a97ca149a04cc60f63ade2d88dbc7644
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_016-1a, image: WYG0722/WYG0722-0153c.png}
body:
  text: 書經后克艱厥后臣克艱厥臣政乃乂黎民敏徳修撰臣于敏中監察御史臣劉方藹后克艱厥后臣克艱厥臣銘編修臣劉慥編修臣錢𤦺帝曰俞允若兹嘉言㒺攸伏野無遺賢萬邦咸寧詩編修臣諸錦嘉言㒺攸伏編修臣竇光鼐儆戒無虞侍讀學士臣金相任賢勿貳去邪勿疑編修臣秦蕙田徳惟善政政在養民水火木金土榖惟修正徳利用厚生惟和編修臣王居正水火金木土榖惟修正徳利用厚生惟和編修臣路斯道無稽之言勿聽弗詢之謀勿庸侍講臣鄂容安禹拜昌言監察御史臣吳煒臯陶曰都慎厥身修思永惇叙九族庶民勵翼邇可逺在兹禹拜昌言曰俞少詹事臣張鵬翀在知人在安民侍讀臣李清植監察御史臣王興吾知人則哲能官人安民則惠黎民懷之編修臣曹秀先安民則惠黎民懷之檢討臣郭肇鐄寛而栗柔而立愿而恭亂而敬擾而毅直而温簡而廉剛而塞彊而義彰厥有常吉哉監察御史臣趙青藜兢兢業業一日二日萬㡬編修臣杭世駿天工人其代之檢討臣齊召南予決九川距四海濬畎澮距川右中允臣任啟運禹曰都帝慎乃在位帝曰俞禹曰安汝止惟㡬惟康其弼直惟動丕應徯志以昭受上帝天其申命用休帝曰吁臣哉鄰哉鄰哉臣哉禹曰俞給事中臣馬宏𤦺禹曰都帝慎乃在位帝曰俞禹曰安汝止惟㡬惟康其弼直惟動丕應徯志以昭受上帝天其申命用休檢討臣陳兆崙禹曰都帝慎乃在位帝曰俞禹曰安汝止惟㡬惟康監察御史臣張孝挰禹曰都帝慎乃在位箴侍講學士臣龔渤禹曰安汝止惟㡬惟康其弼直惟動丕應徯志以昭受上帝天其申命用休監察御史臣陳高翔監察御史臣周人驥安汝止惟幾惟康其弼直編修臣劉慥監察御史臣廖必𤦺安汝止惟㡬惟康編修臣張九鎰檢討臣陳世烈給事中臣程鍾彦惟㡬惟康其弼直惟動丕應徯志以昭受上帝天其申命用休檢討臣吳泰惟㡬惟康監察御史臣李㥳
  hash: sha256:06710479e9d378434f64b5cfa8cc853b900017383785dc4a360a848e6f3412c4
