front:
  text: 欽定四庫全書御覽經史講義卷十七目録
  hash: sha256:257a4e3de08d2cb30b27cf610f66002a8e06884b33a369ece2f0562b0fb0abeb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_023-1a, image: WYG0722/WYG0722-0172a.png}
body:
  text: 詩經倬彼雲漢為章于天周王夀考遐不作人檢討臣出科聯追琢其章金玉其相勉勉我王綱紀四方檢討臣張鵬翀檢討臣傅隆阿追琢其章金玉其相編修臣邵齊燾勉勉我王綱紀四方監察御史臣胡寶瑔監察御史臣柴潮生鳶飛戾天魚躍于淵豈弟君子遐不作人監察御史臣張漢思齊大任文王之母思􅆺周姜京室之婦大姒嗣徽音則百斯男編修臣吴紱雝雝在宮肅肅在廟不顯亦臨無射亦保編修臣王居正監察御史臣朱鳳英不諫亦入編修臣王居正肆成人有徳小子有造古之人無斁譽髦斯士編修臣陸嘉頴虡業維樅賁鼓維鏞於論鼓鐘於樂辟廱給事中臣衛廷璞世徳作求永言配命成王之孚監察御史臣周禮昭兹來許繩其祖武於萬斯年受天之祜修撰臣于敏中假樂君子顯顯令徳宜民宜人受禄于天保右命之自天申之干禄百福子孫千億穆穆皇皇宜君宜王不愆不忘率由舊章威儀抑抑徳音秩秩無怨無惡率由羣匹受福無疆四方之綱之綱之紀燕及朋友百辟卿士媚于天子不解于位民之攸塈編修臣王峻不愆不忘率由舊章監察御史臣陳其凝威儀抑抑徳音秩秩無怨無惡率由羣匹受福無疆四方之綱之綱之紀燕及朋友百辟卿士媚于天子不解于位民之攸塈右中允臣朱良裘之綱之紀燕及朋友百辟卿士媚于天子不解于位民之攸塈給事中臣汪榯監察御史臣周人驥
  hash: sha256:3d4154e75e512566bb0ae12b515c244629597219fbdb2de82e1e844f2d86eddf
