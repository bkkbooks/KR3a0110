body:
  text: 書經欽明文思安安監察御史臣熊學鵬蔡沈曰欽恭敬也明通明也敬體而明用也文文章也思意思也文著見而思深逺也安安無所勉强也言其徳性之美皆出於自然而非勉强所謂性之者也臣謹按千古之治法必本乎千古之心法以為基千古之心法必本乎一念之兢業以為主欽者即兢業之謂也堯之徳性純粹自然無一不臻於至善而史臣欲狀其心體必首之以欽而後由明而文而思而至於安安可見聖賢之實學其造詣足以臻神化之境而持於宥密者皆此曰明曰旦之精誠帝王之治功其聰明足以當憲天之重而凛諸神明者皆此亦臨亦保之意念蓋人之心敬則定定則靈靈則足以燭萬㡬之變雖當紛紜擾攘之會而是非曲直立辨於當前而不惑其所以能明者由其欽之所積而成者也迨心體明矣而欽之功仍不懈而後有經有緯章美内含足以經綸天下之大經而燦然成文者皆由其欽之所久而著者也夫欽之功旣貫於文之内而文之中仍載其欽之心於是凡有所思自足以通微而作睿蓋宥密之理萬物皆備無往不通而敬以直内所以思慮之所及周乎上下貫乎始終可以範圍天地而不過曲成萬物而不遺其思之深者欽之能深思之遠者欽之能遠也蔡沈謂敬體而明用臣愚以為敬之體旣立則明與文思皆其用也惟是四者之德俱人之所當有俱人之所當安而欽之功有未至則四者之德有未純堯則天理之流行與此心之不息者渾合而無間無往非欽而若不見其欽之勞無往非明而若不見其明之迹無往非文而若不見其文之煩無往非思而若不見其思之苦堯之安安而無所勉强者即孔子所謂從心所欲不踰矩也抑臣更有進焉安安之義非僅指心體而言也凡人之身敬則安怠則危記稱君子荘敬日强蓋言戒慎恐懼初猶勉强矜持久之而天君泰然百體從令無往而不形其安適非若紛華靡麗之境聲色貨利之途止圖取快於一時而其實身與心皆不勝其紛擾也故為人君者誠能以欽為主乾乾夕惕無往非顧天命畏民碞之心不使宮室服飾之得以役其精神不使宦官宮妾之得以移其志慮操存熟而疵累捐履中蹈和内以之建極外以之綏猷将見天地位萬物育天下萬世共仰有道之長矣又安見致治之隆不足嫓美於唐虞之際也哉書經克明俊德以親九族九族旣睦平章百姓百姓昭明協和萬邦黎民於變時雍監察御史臣彭肇洙臣謹按帝王之業以天下為量帝王之學以一心為基心之所具者理可喻諸天下而漸積漸推漸推漸滿至於無所不被無所不極而要非於夲然之量有所加堯典克明俊德數言夲末源流至該至備其言君道也夐乎尚矣何也人君與天下相接者身而堯典不言身而言德明乎人心之不言而同然者理從其初而人情之不行而自至者功歸於獨也蓋德之原於生初者無所不具近而家邦遠而天下皆性分之不容辭而功之積於幽獨者無微不彰親親而仁民仁民而愛物皆功力之所必至有其不容辭者而德乃可以言俊有其必可至者而明之功乃可以言克也荀况有言儀正而景正盤圓而水圓盂方而水方此其感應之機㨗於影響而其實在功夫則此書篇首欽明之兩言盡之蔡西山曰敬體而明用言心主一而無適則精神團聚絶乎物之所以緣心常惺而不寐則志氣警嚴覺乎私之所由伏推斯㫖也謹好惡愼言動精取舍公是非可以使賢者服敎愚者畏威邇者式型遠者向化故其言九族也近而寡妻兄弟僕𨽻􅉏御之徒統是其言百姓也上而臣僚統是其言萬邦也極之凡有血氣者統是要之其言明德也所謂格物致知誠意正心修身無不統是也洵乎德無不明乃俊明亦無定以克明為定也且夫修德有功而養德尤在防其弊逸則隳德周公曰君子所其無逸矜則隳德易曰君子以虛受人肆則隳德禮曰君子莊敬日强安肆日偷不學則隳德説命曰惟學遜志務時敏厥修乃來允懐于兹道積于厥躬循此數端而體之以不貳持之以不息則上與唐堯並稱無難焉又何三代以後之足云乎哉書經帝曰咨汝羲曁和朞三百有六旬有六日以閏月定四時成歲允釐百工庶績咸熙監察御史臣陳大玠臣謹按歲無定日閏有定法朞者一歲之足日也歲者一歲之省日也閏者補三歲之省日凑為三歲之足日也又按毎歲所餘六日為氣盈所少六日為朔虛氣盈而不置閏則朔晦弦望差朔虛而不置閏則春夏秋冬差閏所以消其盈而息其虛也然一歲只有三百五十四日而經云朞三百有六旬有六日何也此一歲大率之數也蓋今年立春到明年立春二十四氣全數有三百六十五日零二十五刻以二十五刻當一日舉全數而言故曰三百有六旬有六日也二氣為一月合二十四氣該三百六十五日零二十五刻此氣盈之溢數也十二月有六小月此朔虛之虧數也二者參合而置閏此不易之定法也若夫天與日月之行氣朔之盈虛而不置閏則時且不定歲且不成何以示信於民使之及時而趨事乎閏之有關於天時人事如此左傳曰閏以正時時以作事事以厚生生民之道於是乎在故春秋於文公閏月不告月則書之明非禮也胡傳曰占天時則以星授民事則以節候寒暑之至則以氣百官修其政於朝庶民服其事於野則主乎是焉耳矣周禮閏月王居門中蓋告朔之禮天子居宗廟閏月居門中文公以閏月為附月之餘而不行告朔之禮故春秋書之可見居門之典廢如奉天授事何書稱堯欽若昊天敬授人時凡為君者以欽若為心以敬授為事如堯典所云作訛成易以之信治百官則旣定之時順時令以趨事旣成之歲順歲功以告成自然衆功畢舉而咸熙矣嘗讀豳風七月之篇自一之日二之日以至九月肅霜十月滌塲其間流火授衣于耜舉趾計一歲四時十二月無非為小民衣食計而預䇿其萬全也又以見其長幼夫婦老少上下皆有皇皇服事一息不敢自安之意焉至於月雖有閏而時則不易惟依四時之令序舉月令之事宜如行慶施惠聘士禮賢勞農勸民賞事恤孤及與公鄕大夫共飭國典時令以待來歲之宜不論閏在何月皆有毎月之政可舉而行之也玉藻載聽朔於南門之外閏月則闔左扉立於其中蓋月閏於春夏則闔青陽明堂之左扉月閏於秋冬則闔總章元堂之左扉而必於南門者繼明照于四方凡以勤民也是以上無日不勤䘏其下下無日不勤服其事将豳風可載詠矣若夫臣隣以時交儆喜起以時賡颺其於欽若敬授之㫖庶㡬先後有同揆也歟書經以閏月定四時成歲監察御史臣歐堪善臣謹按自古帝王未有不敬授人時以釐百工而熙庶績也蓋大撓初定而葭管飛灰以十二律定十二月之候寒暑往來不愆其序作訛成易各循其期此歲功所由成萬化因是而彰也粤稽帝堯命羲和以置閏之法有曰以閏月定四時成歲夫每歲三百六十日者一歲之常數也顧天行至健一日遶地一週視日為過一度日之行亦遶地一週而比天退一度積三百六十五日有竒天與日復相會於初起之度則天運一週而為一朞朞之數較之一歲之常數多五日有竒是為氣盈若夫月與日會每月之際不足三十日止二十九日半以一歲三百六十日常數較之又少五日有零是為朔虚合氣盈朔虚計之每歲多十日餘至三歲多三十餘日使不置閏以歸其餘則歲之日不盡乎朞之日朞之餘日又積為歲之餘月何以定四時而成歲功乎故必以餘日置為閏月三歲一閏五歲再閏十有九歲七閏使盈虚消息氣朔分齊然後春夏秋冬四時之節候不差而歲功以成此古今置閏之法而釐定四時之大要也若乃聖天子當陽乗乾體坤出震繼離春則布徳和令夏則勞農勸民秋則選士厲兵冬則飲蜡報賽順月令之經布四時之政陽不愆而陰不伏暑無怨而寒無咨聖人則因時制宜所謂仁為春溫義為秋肅者此也雨暘或至愆期旱澇不無致警聖人則因時補救所謂裁成其有餘輔相其不足者此也由是繪無逸於松軒圖豳風於紫殿朝乾夕惕時凛欽若昊天之心旰食宵衣不忘撫辰凝績之意天道順於上則四序以正八風以平分至啟閉銖黍不爽適符乎一閏再閏之期人事周於下則體元在君心調元敷萬化剛柔喜怒張弛咸宜不爽乎二氣五行之度如此則太和翔洽民康物阜時雍風動之休舉積諸此矣豈惟是馮相之所司保章之所掌而已哉書經輯五瑞既月乃日覲四岳羣牧班瑞于羣后修撰臣金甡集傳曰周禮天子報冒以朝諸侯鄭註云名玉以冒以徳覆冒天下也諸侯始受命天子錫以圭圭頭斜鋭其冒下斜刻小大長短廣狹如之諸侯來朝天子以刻處冒其圭頭有不同者則辨其偽也輯五瑞徵五等之諸侯也既見之後審知非偽則又頒還其瑞也臣謹按集傳引周禮註自是後世制度於唐虞時事不合請先列執冒諸說參錯之處因推唐虞不應有此制度之理然後斷以本書前後可自相印證之文周禮大宗伯作六瑞王執鎮圭典瑞王晉大圭執鎮圭小行人成六瑞王用瑱圭並無執冒之文唯考工記玉人乃云天子執冒四寸以朝諸侯蓋即周書上宗奉同瑁之瑁周制有之其始自唐虞未可知也玉人疏曰瑁方四寸邪刻之浚儀王氏曰以一瑁冒天下之圭則公侯伯之圭濶狹等也此瑁唯冒圭不冒璧夫圭之長短具見於大行人與玉人若其廣狹之度則禮記雜記曰圭公九寸侯伯七寸子男五寸博三寸厚半寸剡上左右各寸半蓋長短異而廣狹同故王氏謂以一瑁冒之至子男亦云執圭似亦可同用一瑁顧他書並云子男執璧不云執圭當以執璧為是璧與圭異制圭長而璧圜欲為之冒勢不得以斜刻者合之然斜刻之外無他說今書傳圖瑁下作偃月形似可冒璧反不可以冒圭與斜刻之說不合王氏知鄭註所云不可以冒璧故謂此瑁惟冒圭不冒璧至於冒璧之制略無考證是圭有冒而璧無冒也豈執圭者必湏按騐執璧者無待稽覈耶集傳於上宗奉同瑁乃直云邪刻之以冒諸侯之圭璧此說尤欠分曉蓋瑁之出於周制者至漢已不得其詳解經者乃等而上之以證唐虞之事其說固未可據也且夫堯舜之世亦安有設此制度者哉當時風氣其善惡著見者非大神聖即大凶頑其餘類皆敦龎純樸未嘗有機巧詐偽若後世私刻符篆之為者如謂受命於天子而忽焉毁失其守器聊􅎓作用之固無此理如謂争奪竊據事不上聞其人不負固而入朝乃以偽作之圭璧取敗此尤事之所必無也即後世巧詐百出亦祗假符篆以暫售其奸寧有久假不歸儼然蒞官治事甚至敢於朝謁以圖徼倖者乎聖人立法以防患於諸事固宜有節信以相稽考至諸侯朝見亦必騐圭璧以辨真偽則不特事有所不必而於理更有所不可夫諸侯之恭順與否職事之修舉與否應蚤在天子洞鑒中若待其來朝而始辨其真偽非所以示諸侯明也諸侯來朝正宜推誠禮接乃疑所不當有之事始朝則必騐之屢朝則必屢騐之非所以示諸侯信也彼不藉此以作奸我先逆詐以相待實用之固不足以禁制名存之亦徒顯其猜防非所以為天下後世法也此於周制亦未為盡善而謂堯舜之世必出於此乎然則書之本意如何曰此五瑞即下文五玉輯五瑞者即下文以五玉為贄也班瑞于羣后者禮受幣不受玉故聘義曰已聘而還圭璋蓋來朝則斂之朝畢則還之此固禮節出入之常其輯也非為呈騐而進之其班也非為騐畢而給之也下文言朝方岳而用圭璧此言朝京師而用圭璧文異而禮無異即下文柴望秩于山川亦與上節類於上帝望于山川同也紬繹本文其義自顯集傳乃引執冒之制疏辨偽之義殊非聖人心事尤與唐虞時事不類是不可以不辨然則周固有冒其義如何曰刻其下端而虚其中是即冒之義也但應如鄭註覆冒天下之説不必謂專以冒圭圭鋭上以仰承瑁詘下以俯納主臣之義已具於此又何必取其脗合以為用哉書經敷奏以言明試以功車服以庸編修臣何其睿蔡沈曰敷陳奏進也周禮曰民功曰庸程子本義曰使人各陳其為治之説言之善者則從而明考其功有功則賜車服以旌異之其言不善則亦有以告飭之也臣謹按古者帝王治天下將舉天下而使之皆安政無不興而民無不乂則必任賢者而與之共之於是制百司之官定大小之職而又為之異其車服以榮之視其功能以畀之馭吏之權備䇿厲之方至矣蓋天下至大天子不能自為也内而左右卿士之是資外而方州羣后之是藉左右卿士所以佐王者宣職而布業方州羣后所以代人主理物而奏平於是欲得其人而用之盡當其才而無有所失此誠未易言者而要其所操之術有三曰有所以取之有所以任之有所以鼓舞激勸之使有所大服而共奮而已矣所謂取之之道者何也凡人之賢不肖其初未能辨也雖聰明神聖之主亦安能無所據而知之惟觀其言而後能否有可審矣更為察其言之果善與否而後短長益以定矣吾即其言以取其賢且能者而去其不能者則賢能者將無所遺而不能者殆無自而進此取之之法之必嚴也且夫既已取之則誠將為可信而遂以用之雖然信之太鋭而委之遽專事不期於責成而效無所實覈則雖言取之而人皆将飾言以相欺更以官予之而安保其治官之無騐古者聖人知其弊之必至乎此而患之不可不防故於其所以取之者常寛而所以用之者尤至慎示其職事以命之又為之丁寧以告戒之又為之限年以課之立法度以考之雖予之官而誠未欲遽處之也試之以所守以觀其亷試之於所利以觀其正試之於所難以觀其通試之於所不樂以觀其久試之民以觀其仁試之績以觀其備然後知其誠能矣誠賢矣則舉之不嫌過驟而任之可以終身帝王所操以待天下使天下之賢者鼓舞而不倦其不肖者甘自引伏而不敢萌徼倖冐進之思者無他惟取舍當功咎昭與賞罰正而已夫聖王之世萬無簡賢棄能之事而但使爵命之重章服之榮賢不肖混淆而無以自别則天下方將不以為貴而後無所勸惟取其賢且能者授之官而尤必考而核之使有其實者乃得居其位而章其物與器然則何功之勿興何治之勿致此唐虞之法之所以至善而不可易也書經敷奏以言明試以功車服以庸編修臣王居正程子曰敷奏以言者使各陳其為治之說言之善者則從而明考其功有功則賜車服以旌異之其言不善則亦有以告飭之也臣謹按帝王之治天下也莫要於安民莫急於察吏夫察之則必思有以考之考之而得其名與實之真矣然後黜陟之典行而勸懲之法立使夫百爾臣工咸曉然知聖天子所加意而作興者凡以為民也則将循乎其名以既乎其實舉相勉於慈祥愷悌之循良而吏治民風乃日臻於淳古昔者舜有天下廵守之後繼以述職躬桓蒲榖輯五瑞而來朝東西朔南周四年而報政當是時羣牧考羣后四岳考羣牧而天子坐明堂以聼之慶賞黜罰出自一人而四方羣后舉帖然奉守其政令而莫之敢有異議猗歟盛哉典綦隆已雖然舜豈徒為是以聳動人心粉飾太平而已哉民生之苦樂不齊風俗之淳澆各殊四方情形茍一日不周於睿慮則上下之情遂隔而不通夫承天子命以撫我兆姓而悉其疾苦同其好惡者岳牧羣后也茍非使之盡其言而陳之何以考厥職而達下隐乎舜是以有敷奏之典聼其已行之政事審夫民功之修廢而其言之善者則又察其功之及於民也孰小孰大孰虚孰實孰行之於目前而驟效孰要之以久遠而後成不貴空言無補而必求言底可績考之者不厭其詳而得人乃真覈之者務窮其實而法立知勸蓋至是而車服之旌不敢濫也亦不敢緩也無或吝也亦無或僭也始之以好問好察之虚心終之以黜幽陟明之實政考課有法而吏治澄清其斯以為有虞之治乎竊以為古今不易民而治帝王不易法而理今之督撫州縣亦猶是古之岳牧羣侯也其三年大計八法卓異之條亦猶是古之三載考績敷奏明試之典也乃上古政簡而俗樸其察之也尚易後世事繁而情變其察之也較難於此而振綱提要則督撫表率之道不得不講矣且夫為督撫者亦非敢徇請託通苞苴也而務安静者或過於姑息任意見者更或誤於迎合巧佞之吏不能實心敎養而善應對工周旋甚似才能有餘司道多喜為稱讚督撫耳熟先入之言一見巧佞者之應對周旋遂以為真能員矣如是而舉錯之間能無誤乎然則察吏之要其何道而可詩云豈弟君子民之父母可知愛民為循吏之本而督撫之所以定其賢否差其高下者要當以是為權衡焉是故其言之至吾前者有詳有禀而察其注意所在果能曲體民瘼否耶其事之入吾耳者有興有革而觀其措置所本果能深得民心否耶從民起見則褒之薦之不以悃愊無文而薄其人不從民起見則飭之劾之不以小善可喜而奨其才且也城府不設於胸如水之清如鑑之空而揣摩迎合之漸無自而萌愛憎不假以私如衡之平如矢之直而登薦彈劾之舉悉協於公審如是也庶幾賞罰合宜而吏治以清守令得人而民事以理唐虞之治不可復見於今日哉書經敷奏以言明試以功編修臣李友棠臣謹按聖王之治天下也必有以攝天下之分職使天下之言與事無不昭灼於上而後布理而無難此其事非行奏試之典不可蓋五服羣后散處寰區其間耳目不常接聲靈不常親即有邁等之勲殊尤之治而下不得達上不及聞将何以勵人材而成政理乎此敷奏以言明試以功虞廷必於五載廵守之日為兢兢也上古之世結繩而治政簡風淳無藉於書契之煩文告之命未嘗考言何所事於述職未嘗詢事何所事於功載至於有虞以天則當其中以際則逢其盛以百官萬民則極於明察侯甸采衞之遠近有不齊田地貢賦之上中下有不一山川之封濬九州之沿革布在羣后者其言亦至賾耳於此而置之則其言未免過輕於此而驟進之似其言過重而不得以既其實即其所長而試之更端之際因其已效而試之再事之餘工虞水火易之地而見其殊才嵗月日時需以年而知其異等至是而所言之功可見矣考言與詢事兼施明目與達聰並用豈以天子之聖神文武而必事委曲煩重之數哉凡以㪚不如統虚不如實聞不如見人材非此不勵政理非此不成其難其慎惟和惟一舜之課績正以是耳不然四岳九官十二牧當時之臯夔稷契成允成功固已如彼矣豈顧有疑焉而必加之意乎誠重之也書經欽哉欽哉惟刑之恤哉監察御史臣廖必𤦺朱子曰欽哉欽哉惟刑之恤夫豈一於輕而已哉大率是説刑者民之司命不可不謹如斷者不可續乃矜恤之恤耳陳雅言曰不欽則或失之於怠慢不恤則或失之於慘刻二者刑之所由不得其平也故必主之以欽而加之以恤此傳所謂欽恤之心未始不行乎其間者也臣謹按王樵引孔疏云敬之敬之惟此刑罰之事最宜憂念憂念此刑恐有濫失欲使得中也據此則聖人立法制刑之心大略可想矣聖人原人情之輕重然後用其常刑使君子不陷於非辜小人不至於茍免人将遷善遠罪日趨於君子之域此則刑期無刑之謂也至若刑之不可已乃不得已而用之雖已得其情而猶必矜其不敎無知而抵冒至此也故於象刑流宥之外又有鞭扑贖罪之條於眚災肆赦之餘不廢怙終賊刑之典其從重從輕者法中之法井然條理之各殊其由重即輕由輕即重者法外之意昭然權衡之不爽雖其輕重取舎陽舒隂慘之不同然欽恤之意未始不行乎其間此可以見聖人好生之心矣從來用刑之患非獨在不明也而在於過用其明又非徒在不斷也而在於過執其斷何則矜察察之智者自以為情奸莫逃輙翹然其自喜此即所施皆當而毫無憐惜之意已傷天地之和持硜硜之見者自以為是非早定遂確乎不移此即片言可折而絶無哀矜之情已非長厚之道慎刑者於此情偽非不畢知而知其既然又傷其所以然一念慈祥之隐已寓於明啟刑書之間輕重非不適當而既得其中又恐其或有不中百年刑措之風即基於得情勿喜之念蓋敬畏中存原無在而不惕况聼斷乃國典攸係何敢少即於忽疎如傷厪念亦無日而或遑矧刑獄尤民命所闗奚忍稍鄰於苛細楊時有云古者司寇以獄之成告於王王命三公參聼之三公以獄之成告於王王三宥然後致刑夫宥之者天子之徳而刑之者有司之公天子以好生為徳有司以執法為公則刑不濫矣總之不離乎欽恤者近是長國家者得其意而行之則罔干予正頼弼敎之功不犯有司臻無刑之化又安在其治之不古若哉書經詢于四岳闢四門明四目達四聰監察御史臣鄒一桂蔡沈曰舜既告廟即位乃謀治於四岳之官開四方之門以來天下之賢俊廣四方之視聼以决天下之壅閉陳師凱曰闢四門有以天下為一家之氣象焉明四目達四聰有以天下為一身之精神焉臣謹按人君代天理化當法天之聰明天以民之視聼為視聼為君者亦當以天下之目為目以天下之耳為耳方能洞悉民情昭察吏治若恃一己之聰明則所及有限即倚一二人為耳目恐偏狥猶多故必廣開言路大闢賢闗使吏治民情周知曲折痌瘝一體呼吸相通然後可以興利除弊而措天下於磐石所謂惟天聰明惟聖時憲惟臣欽若惟民從乂也考舜之登庸也起於田間其歴試也慎典宅揆賓門納麓攝位以後肇州封山廵方覲岳大綱小紀靡不畢舉豈尚有蔽其聰明者而即位之初猶兢兢以明目達聰為務豈不以一登九五則君門萬里居髙聼卑既不若三十載之耕夫可以周知民隐又不若二十八年之相業可以躬理贊襄穆處深宫端居黼座所接者無過岳牧數人安保昏墊方平民無阻饑之嘆乎四凶雖殄朝無面從之人乎則明者或轉而不明聰者或轉而不聰勢使然也詢岳者非專任岳也欲四岳廣其視聼以及於庶司百職而庶司百職各竭其聰明以上助天子特不能人人而詔之故以達明之事商之岳耳而視聼既周則賢奸立辨闢門之要亦不外此此舜之所以兢兢於即位之初為第一先務也後代守成之君長於青宫者多當其初政亦能革弊除奸虚懷博訪久之則見聞日遠錮蔽日深頌諛者多箴規者少塗飾容隐以為無事前之所斥者後或引而進之矣昔之所求者今或聞而厭之矣驕縱之念一開則禍亂之機潛伏歴代皆然史書可考也我皇上惠懐萬姓明作百寮一徳永終萬幾無逸固未嘗蹈此而内外臣鄰有能如虞廷岳牧効明目達聰之用者乎臣實望之臣實勉之書經咨十有二牧曰食哉惟時編修臣于振蔡沈曰牧養民之官十二牧十二州之牧也王政以食為首農事以時為先舜言足食之道唯在於不違農時也臣謹按自古帝王之治天下未有不以養民為首務者也當虞之時生民之患劇矣司空未命誰平水土埀益未命誰作虞工伯夔未命誰典禮樂而闢門詢岳之初一切不遑獨先進十二牧而咨之曰食哉惟時以此知民事之重而自古帝王未有不以此為首務者也且夫二帝不易民而治三王不强民而化其事備於尚書而其詳見於詩禮嘗考禮月令所陳與詩豳風所載於農事為最周而於民時尤倍悉月令之篇曰孟春之月王命布農事相邱陵原隰土地所宜五穀所殖以敎導民即豳風所謂三之日于耜者也仲春之月耕者少舍毋作大事以妨農之事即豳風所謂四之日舉趾者也季春之月毋伐桑柘鳴鳩拂其羽戴勝降于桑即詩所云春日載陽有鳴倉庚女執懿筐爰求柔桑之候也至於孟夏則毋起土工毋發大衆勞農勸民毋或失時仲夏則用盛樂祈穀實農乃登黍季夏則不興土功不起大衆以妨神農之事孟秋而登穀仲秋而收斂季秋而入室與豳風所陳四月秀葽五月鳴蜩六月食鬱及薁七月烹葵及菽八月斷壺九月叔苴雖物土異宜其於不奪農時一也至於孟冬之月蓋藏富矣仲冬之月積聚盈矣季冬之月可以終嵗之勞博一日之逸矣又必曰專而農民毋有所使此與豳風亟其乘屋其始播百穀何以異哉為民牧者誠能以實心行實政仰司星辰以審其時俯察水泉以盡其利躬為勸導以重其事祈年報社以旌其功設農司以監之置田畯以董之黍稷茂則喜而加賞田不墾則怒而加罰野積踰冬奪者毋罪塲功過限竊者免刑則室無懸耜國無惰民而多黍多稌降福孔偕矣由是言之治民之事固非一端而愛民之仁惟時為大八蜡之祭迎貓為其食田䑕也迎虎為其食田豕也盛朝之舉動無事不闗乎民類如此也甫田之詩曰曽孫來止以其婦子饁彼南畝田畯至喜所以有如茨如梁千倉萬箱之慶也臣工之頌曰嗟嗟保介唯暮之春庤乃錢鎛奄觀銍艾所以有明昭上帝迄用康年之賜也後之牧民者如漢兒寛為左内史勸農桑開河渠廣水利收租税時裁濶狹與民相假貸黄霸以賢良髙第為潁川務畊桑節用殖財種樹蓄養米鹽靡密初若𤨏碎而覇精力能推行之召信臣為南陽太守勤力有方略好為民興利務在富之此數臣者皆講求於牧民之道而以民食為兢兢者也臣故因繹經之次而類及之書經咨十有二牧曰食哉惟時編修臣林令旭金履祥曰每州以一諸侯之長專任牧民之事視年之上下而為之備視地之豐歉而為之通周知民之貧弱孤寡而為之恤不使民食之後時也臣謹按民惟邦本而食為民天此洪範八政以食居先而虞廷咨牧亦必首言食也夫食之所出視乎地力而食之所成因乎天時其耕作之功在民而其勸相之方則在上故長民者非特徵發興作勿奪其時而已必且有以時董率之道焉嘗考周官大司徒所掌自遂師以及里宰莫不簡稼器修稼政辨其種類趣其耕耨行其秩叙稽其功事移用以救其災合耦以助其乏勤於農者則於三嵗之後興之惰於農者則有屋粟之罰以警之法至詳也故其時之民莫不震動恪恭於農毋敢失時耕九餘三家給人足良由上之人所以董率之者得其道也然而天下之大其雨暘寒燠之候萬有不齊而况廣谷大川異制民生其間者異俗則又當有土會之法辨五地之物生以合其宜而布其利此寧可以臆定者哉必視乎為民司牧者久於其地習於其俗明於其利達於其患然後能相時之緩急而用之酌盈劑虚因勢利導此其任端在州牧矣蓋州牧者府縣之表率也誠使直省大吏實能以易田疇足倉廪為本務而誠心求之弗執偏見誠心行之弗務虚名則由省而達於府由府而達於縣自無不承望風㫖悉心籌畫如黄霸潁川之治龔遂渤海之化何難復見即或天災流行歲有凶祲而積儲既豫撫字自優如富弼之於青州趙抃之於越州其成蹟具在倣其意而以時變通之亦復何慮乎夫安民之本在乎重農而足食之方存乎州牧以故播時百穀帝嘗以命后稷而食哉惟時一語必首咨十二牧誠見欲致民食之足非州牧無由也三代以下漢治最為近古文景之間力田勸農之詔屢以責二千石其即虞廷咨牧之意也夫書經咨十有二牧曰食哉惟時編修臣徐景熹蔡沈曰王政以食為首農事以時為先言足食之道惟在於不違農時也陳大猷曰舜初攝位則覲岳牧初即位復詢岳咨牧蓋内外之要職莫先焉臣謹按帝王愛民如子無一時或去諸懐故有他務未遑畢舉而挈其大綱總其要領首以牧民為本圖蓋愛養百姓子惠元元之至意早縈結於宵旰之間故即盈庭在列將共䇿以職業之修而引端發始注想勤勤直若痌瘝切於乃身而不禁其矢口即及焉今夫食生人之大命繫焉今夫時農事之本務在焉治國家者必先以此底蒸民之生然後展布其所欲為而紀綱法度粲然昭著凡政術之頒刑敎之設工器之資神人之格禮樂之興俱得次第以觀其成當日者師師濟濟拜手颺言曰禹曰契曰稷曰臯陶曰埀曰益曰伯夷曰夔龍俱恪恭殿陛俟乎綸綍之頒而帝命所宣乃以民食農時為亟亟於以見操天下之源流相治功之緩急而政在養民勞心治人者為尤切也且所謂養民之道至無窮矣三時不失其務三農各肆其力又必視年之上下而為之備視地之豐耗而為之通知民之貧困孤寡者而為之恤凡所謂民食計者至周至詳故憂勤惕厲不獨於農時見之并非僅不違農時盡之也水旱未形先時之綢繆必至災眚偶見後時之區畫更勤本一人精神心力與舉世之豐嗇盈虚相為調劑則廟堂之上焦思極慮不敢視為泛圖又豈敢置為後務哉顧説者曰當日文明黼黻緯地經天以及水火工虞各有攸司如下章所命九官孰非致治之大者而民牧之咨或史臣編載之文因其序耳不知命伯禹命伯夷咨四岳而命者也命埀命益順分職之次遞咨而命者也命夔命龍因人之讓不咨而命者也命稷契臯陶苐因其舊職亦不咨而申命者也獨於十有二牧慎重以咨且即繼於詢四岳之後而誥誡不遑豈非實有見於民為邦本食為民天非可以旦夕緩哉抑所謂時者天之時也則凡九官所掌無非順時以襄天治而百揆為代天之職敎為佐天之令刑為宣天之威禮樂為同天地之節和要莫切於六府之修乃所謂因天以治民則咨牧為先誠大聖人奠安民生萬年有道之計與書經帝曰契百姓不親五品不遜汝作司徒敬敷五敎在寛右中允臣官保馬明衡曰敬敷者端其本以先之不敢茍也在寛者和其心以待之不可亟也臣謹按秉彝之良雖人所同具而習染之汚亦時所不免聖帝明王知正人心厚風俗之本專頼乎敎是以敷敎之官必慎選而敎民之道必詳明官不得其人則輕忽者易起慢視之心敎不得其法則急迫者必有難成之勢敬寛之命實千古敎民之良法也敬者端己正人之謂也修實行而敷實理則觀感深而轉移自速夫子修己以敬之言亦本於此寛者循序漸進之謂也日有就而月有將則漸摩久而頑鈍悉化夫子循循善誘之妙亦得乎此况五敎出於天命之本然人心之不容己因天命之本然敬謹施行之以致其察識因人心之不容己優游闡明之以盡其推行民焉有不親不遜者乎舜承堯之後萬邦協和矣司徒得人矣而舜之心猶恐有不親不遜者命官敷敎復示以敬寛之訓聖人之憂民如此時雍風動不亦宜乎書經敬敷五敎在寛編修臣孫人龍朱子曰五敎父子有親君臣有義夫婦有别長幼有序朋友有信以五者當然之理而為敎令也敬敬其事也聖賢之於事雖無所不敬而此又事之大者故特以敬言之寛裕以待之也蓋五者之理出於人心之本然非有强而後能者自其拘於氣質之偏溺於物欲之蔽始有昧於其理而不相親愛不相遜順者於是申命司徒敬以敷敎而又寛裕以待之使之優柔浸漬以漸而入則其天性之真自然呈露不能自已矣臣謹按先儒謂此實萬世敎民所自始而其所以為敎者不過人倫而已蓋人莫不有是倫而不能皆有以盡其道是以聖人命官掌敎必宣而布之宣則詳為闡明布則力為頒行敷字内兼此二義俾天下之人皆能親愛遜順而藹然有恩以相浹秩然有義以相維是乃設敎之至意也然其所以立敎之本則必在於敬與寛敬以持夫己則整齊嚴肅既不患其失於縱弛寛以施諸人則涵泳從容更不患其失於廹切史臣稱帝舜慎徽五典慎固有敬之意焉徽亦有寛之意焉敬與寛理則互濟事則並行是即孟子所引放勲言勞之來之匡之直之輔之翼之使自得之又從而振徳之之㫖而為千萬世掌敎者所不能易也周官亦言司徒掌邦敎敷五典擾兆民所謂擾者在因其本然之理以著為當然之則使天下是法是傚而調攝其不平之氣融化其不順之情勿求效於淺近之功毋徒恃乎督責之力咸馴致於親遜成風而後已此成周所云擾猶之有虞所云寛固無二道也惟如是故凡人之有是倫者悉因其心所不容昧而有以致其察識亦順其性所不容己而有以盡其推行將見有親有義有别有序有信莫不服習於道徳齊禮之中而百姓親五品遜共歸於太和翔洽之盛治矣書經敬敷五敎在寛編修臣張九鎰臣謹按天之愛民人也甚矣懼其相生相長而無以自别於羣物也於是賦之以本然之理而聨之以不容己之情聖人承天以治民非能離其本然與不容己者而别為敎也人倫日用切而示之使之從容浸漬皆知有人道之樂而凌競澆漓之習漸消夫是故敎化行而風俗美焉今夫惟民生厚因物有遷厚者之可遷而為薄亦知薄者之可遷而為厚也此其轉移之機在上而不在民矣民日事於君臣父子長幼夫婦朋友之倫而莫曉然於親義序别信之故豈盡無良則拘於氣質之偏而溺於物欲之蔽者然也氣偏而彛常多任情之失欲蔽而外累實錮性之端始猶血氣心知之未漓繼且力勝則相角知勝則相戕善敗迷貿詐偽交萌甘為蕩檢踰閑之舉而習為頑鈍無恥之行是固大君所日夕深憂也故舜命契之敷五敎曰敬曰在寛其即放勲之勞來匡直輔翼自得又從而振徳之之意歟臣聞民猶水也水性趨下不以敎化隄防之不能止也帝王知防之必周而敎之必真且切夫敬之一言固無時無事而不當存而立敎則尤其所切要者記曰司徒修六禮以節民性明七敎以興民徳齊八政以防淫雖就五者推廣之而敷陳往復其大㫖已統於此抑何其重也且夫敎民者又豈法制禁令惟是苛責之無已哉苛責則民日習焉而覺其煩苦仁義禮樂視為束身之機械非避事以求安即背馳而不顧是所謂却行以求前也賈誼曰道之以徳敎者徳敎洽而民氣樂寛正所以善其徳敎之用也漸之摩之優而柔之使民之從敎也欣欣焉如渴之欲飲餒之欲食也其違敎也凛凛焉如負鍼芒而蹈茨棘也薰陶格被民日遷善遠罪而不自知而本然之理與不容己之情皆時時呈露於不可遏吁抑何其醇且備也臣嘗觀國之本在民民之善惡在風俗敎化者風俗之原也敎行則民生日遷於厚民生厚而大君方釋其憂一轉移間而熙然藹然共樂太和是誠在良有司本敬之心行寛之術朝夕宣化而非徒視為具文也則幾矣書經夙夜惟寅直哉惟清給事中臣邵錦燾蔡沈曰夙早寅敬畏也直者心無私曲之謂人能敬以直内不使少有私曲則其心潔清而無物欲之汚可以交於神明矣王樵曰人心之直者其正也而敬則直不敬則邪人心之體清者其常也而直則清不直則雜匪直而清事神則難矣故夙夜之間無曰不顯莫予云覯當不顯亦臨常如對越之敬臣謹按此虞帝命伯夷典禮而以敬為事神之本也蓋敬者聖學之所以成始而成終人能收歛此心使不放失則其心自無私曲既無私曲則其心湛然虚明自無物欲而徳合神明可主祀典以通㝠漠矣然臣謂主敬之功果能宻而又宻不獨可以典三禮而千古人臣事君之則有不外乎此者今夫直者人之所以為生乾之道以動直為徳坤之道以直方大為徳人得天地之理以為生其心本無不直者唯心不存乎敬則始而縱佚漸而邪曲有浮游回惑而不獻其誠者矣而清者人心本明之體如止水之不受泥滓如明鏡之不䝉纖翳如太虚之不著一㸃其心本無不清者唯心不存乎敬以漸違乎直則欲亂於中利交於外有言清行濁而自營其私者矣唯合夙夜而常存寅畏之心時無動静事無大小遇無常變而一以戒慎恐懼將之屋漏之地如接神明夢寐之中亦形齋肅禮所謂無不敬者此也夫無不敬則無不直坤之文言曰敬以直内唐孔氏疏云内謂心也用此敬以直乎内心也朱子曰直者直上直下胸中無纖毫委曲也既以心存寅畏而猶即於邪曲者未之前聞且夫敬而能直有不期其清而自清者也存諸中者無制防之偶疎自接諸外者無物欲之可引寧静專一之中志氣清明不以利欲累其心豈非居敬直内之至也哉而要必期於夙夜者何也葢夙夜者所以與神明相交者也禮記有曰致齋於内散齋於外齋三日乃見其所為齋者又曰敬盡然後可以事神明故夙夜之間陟降通焉對越嚴焉所以交神之道實本乎此然臣謂不獨可以典三禮即千古事君之則莫有外於此者詩曰夙夜匪懈以事一人敬君之謂也人臣敬以事君則靖共爾位好是正直自無偏曲之心抑且志潔行芳清操自勵更無私欲之累矣惟直且清而悉統之於敬洵乎夙興夜寐當無忘寅恭之念也哉書經夙夜惟寅直哉惟清監察御史臣齊軾蔡沈曰夙早寅敬畏也直者心無私曲之謂人能敬以直内不使少有私曲則其心潔清而無物欲之汚可以交於神明矣臣謹按夙夜惟寅直哉惟清二句不但交神明之道盡於此即心學之要亦盡於此矣夫清者心體也澄澈無際清若太虚清則無私與天地合徳清則無蔽與日月合明清則有節制與四時合序清則有分辨與鬼神合吉㐫則清之為義大矣人心所以不清者由於不直心多私曲故也人心所以不直者由於不寅心多怠緩故也所以帝舜告秩宗先之以寅也寅也者敬也孟子曰平旦之氣平旦者寅也人能夙夜之間常若平旦則無時不寅無時不敬也君子敬以直内直則清明在躬志氣如神而心體其純全矣如是始可以交於神明也夫帝舜無時而不交於神明故心學之要因命秩宗以發之矣書經帝曰䕫命汝典樂敎胄子直而温寛而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和檢討臣徳保臣謹按樂者和也性之未發者中也發為情而中節者和也古帝王寓政敎於聲樂之中以之感天地則陽而不散隂而不宻以之感人心則剛氣不怒柔氣不懾葢建中和之極以為樂之原也備情文之盛以為樂之敎也養徳行育人材事神祗格上下樂之功效大矣哉夫胄子者有天下國家之責者也其情欲不能無紛華靡麗之擾氣質不能無髙明沉潛之别故反情以和其志廣樂以成其敎直者敎之温而不偏於直寛者敎之栗而不偏於寛是以樂為輔翼之敎也剛者敎之使不可虐簡者敎之使不可傲是以樂為戒禁之敎也於是胄子之徳悉底於中和矣第樂音之起必生於心人心之動必形於言具於性而為徳發於志而為詩由詩而為歌長短節奏所以永其言也由歌而為聲髙下疾徐所謂聲依永也協於聲者必調於律三分損益隔八相生所謂律和聲也在天則有八風在樂則有八音八音克諧無相奪倫者所謂小大相成終始相生倡和清濁迭相為經也由是而薦之郊廟斯神無不和由是而奏之朝廷斯人無不和則樂行而倫清以著夫天人交感之庥非即大司樂所謂大合樂以致神祗以和邦國以諧萬民以安賓客以説遠人之騐乎然生民之道樂為大焉自古帝王修身而後作樂樂者奮至徳之光動四氣之和著萬物之理為聖人内外交修之要齊治均平之本以盡天下之故以端萬化之原是聖人之樂固非一日之積也豈獨敎胄子而用之哉昔帝舜揮絃歌風而命䕫典樂凡作樂之性情致樂之功用不數語該括靡遺後之言樂者莫出其範圍矣書經詩言志歌永言聲依永律和聲監察御史臣丁廷讓蔡沈集傳云心之所之謂之志心有所之必形於言故曰詩言志既形於言必有長短之節故曰歌永言既有長短必有髙下清濁之殊故曰聲依永聲者宫商角徵羽所謂聲依永也既有長短清濁則必以十二律和之乃能成文而不亂所謂律和聲也臣謹按樂者天地之和也凡音者由人心生者也即其生於人心者通於人聲而樂之道全敎之事即寓葢自天地有氣數生人有性情性發為情而中和之理著氣準乎數而節宣之㫖微固可次第以騐者而要必自志始人有所志必形於言故曰詩言志風謡所及婉而多思也謳吟所傳微而善入也人聲於是乎托始矣然而猶未為樂也迨流連咏歎而歌從生焉歌非以永言乎君子聼之而知宜風宜雅斯為志之引伸者耶然而猶未為樂也抑揚往復而聲從出焉聲非以依永乎君子聼之而知中商中齊斯為歌之比類相成者耶自是而人聲之用無不畢宣矣然猶未必其聲之和也則以律和之即器審音而盡其變則翕純皦繹而聲不相亂比音從律而盡其神則優柔平中而聲不相奸葢聲者宫商角徵羽原有長短清濁之殊大抵長而濁者為宫以漸而清且短則為商為角為徵為羽如黄鍾為宫太蔟為商姑洗為角林鍾為徵南吕為羽摠以上生下生三分損益隔八相生勢如破竹矣天地大數始於一而終於十黄鍾以九為法若通用其全則變化不行用九之法正聖心之妙算也唯以天地自然之數合於人聲自然之節庶幾聲無不和而作樂之道其本諸此乎孔子曰興於詩成於樂葢所以蕩滌邪穢消融渣滓動盪血脉流通精神養其中和之徳也樂記云小大相成終始相生禮運云五聲六律十二管旋相為宫即所謂律和聲也是律也者正天地自然之數人心自然之聲也歌咏從律而不乖則心志和平此直者寛者所以聞之而温且栗也聲氣本隂陽之律則志氣清明此剛者簡者所以聞之而無虐無傲也葢以志為始故能協剛柔之用而全其材以律為歸故能移氣質之偏而養其徳敎胄子者端有頼於樂如此書經命汝作納言夙夜出納朕命惟允給事中臣楊二酉蔡沈曰納言官名命令政敎必使審之既允而後出則讒説不得行而矯偽無所託矣敷奏覆逆必使審之既允而後入則邪僻無自進而功緒有所稽矣陳師凱曰自孔安國註出納朕命以為聼下言納於上受上言宣於下蔡傳又分命令政敎敷奏覆逆以配出納然終於朕命二字欠通竊意欲其審君命之當否當者出之否者納之惟至於允當而止如後世批􅎁審覆之官庶於出納朕命文義明順也臣謹按人君膺圖御宇萬幾日陳於前誠有所未至明有所未周差之毫釐謬以千里所頼有人焉陳善閉邪俾嘉言美政日達於朝野上下之間而讒説殄行皆不得起而乘之則納言之職綦要矣夫納言之難也司審覆之任而有封駁之責朱子謂如漢侍中宋給事中其入告出宣亦得繩愆糾謬職與諫官等司馬光論諫官曰以天下之政四海之衆得失利病萃於一官使言之居是官者當志其大舍其細先其急後其緩專利國家而不為身謀納言者亦然歐陽修又謂諫官雖卑與宰相等蓋曰與天子相可否者宰相也與天子争是非者諫官也宰相定天下之機諫官言天下之務所謂納言者審天下之理决天下之議可者陳之否者斥之是者宣之非者諍之功豈在宰相下哉非公明正直其孰能與於斯舜之命龍也於敎養兼隆禮樂明備之後以為羣賢雖盛治功雖成茍讒間得行則賢者不安而前功遂廢故命作納言以防讒間衛羣賢以成其終夫大知如舜而防微杜漸以為治忽之機在此一命則舜之所以信龍必能出納惟允與龍之所以為龍必能不負帝命俱從可知已後世非無納言之官而公明正直未必如龍徒有出納之責而鮮封駁之事遂致邪説横陳國事多舛豈納言之本意哉昔唐太宗能信用魏徵而成貞觀之治徳宗不終用陸贄而後復幾至於亂讒説之能中人主其可畏矣乎觀此可鑒舜所以命龍之意重在遠讒而陳師凱拘於朕命二字之義謂欲其審君命之當否以為出納殊於上文塈讒説殄行語義不甚聨洽固不若孔蔡二註之詳且盡也書經夙夜出納朕命惟允給事中臣鹿邁祖蔡沈曰命令政敎必使審之既允而後出則讒説不得行而矯偽無所託矣既允而後入則邪僻無自進而功緒有所稽矣周之内史漢之尚書魏晉以來所謂中書門下者皆此職也臣謹按天無言王者代天而有言是大君之命即天命也天以萬物為心故乾元資始無私普造物之大君以覆載為量故聖謨廣運有覺徵王心之一人君於此將欲使萬方訓之四國順之則司天喉舌者其事顧不重哉夫大君有命顯之慶賞刑威之大政深之予奪進退之微權用以覺世牖民宣示來兹夫固有幾經睿慮猶不勝其鄭重之思者而出納之際顧以慢易将之可乎自庶頑讒説或借上㫖而出以揺國是或假公論而入以惑主聰而智巧便佞之徒得以售其術即不然猶是上之命令而抑揚輕重之間稍失其本㫖即毫釐千里之差深闗乎治體出納之不謹而讒説之害治者多矣是故義利公私之分介辨之宜早而夙夜出納之間防之必嚴其出也既允而後出其出於宸􅇆與將無有小人夤縁其間與其果出於宸􅇆也然後出布四方而徳意以宣其入也既允而後入其出於輿情與將無有小人依託其間與其果出於輿情也然後入納明廷而羣情以協夫是故矯偽無所施邪佞無自進宸聰罔蔽國是用昭由是君之明命一天之命而讒説之害治無慮矣獨思中天之世喜起同心九官十二牧師師濟濟固巳野無遺賢萬國咸寧豈復有頑讒之足慮乃必以出納惟允慇慇誥誡至與明五刑敷五敎典禮典樂諸人并重此以見聖帝謹始慮終防維若是其至與孔子鄭聲佞人之戒隔代有同揆也書經帝曰咨汝二十有二人欽哉惟時亮天功編修臣蒋麟昌臣謹按帝王代天理物一日萬幾無非天事而其立乎萬幾之先周乎萬幾之後者一以敬為主虞書首之以欽若昊天終之以勑天之命首之以欽明終之以欽哉帝王統系相承不外乎是用能以敬天之心行法天之政而治道亘千古而獨隆雖然人主能以一心運天下之幾不能以一身周天下之務百僚庶職所以分一人之任也君奉天而臣奉君奉天則宜以天之心為心奉君即宜以人君奉天之心為心唐虞草昧初開人心醇樸君臣動色相儆必反覆言天葢天人感應之理確有可憑而非付之或然或不然之數故二十二人所分之功統繫於天臣聞治絲者聚千萬縷而理而分之不可淆應事者積千萬事而雜而投之不可紊亮工之義即臯陶謨所謂庶明勵翼也夫天事日運而不息人事日起而有功時之為義亦大矣雖上治無迹而堂亷中有震動恪恭之象則海内之氣清和咸理舜故重為惕之當時綱紀初張平成未奏二十二人左右厥辟卒致太平欽哉一命用意良深矣臣嘗繹而思之人臣不知謹獨之學在位乃多粉飾之文相習成風遂多叢脞其何以振天下之志氣而化天下之朋黨哉大抵聰明材力日用則日見有餘日弛則日見不足要亦視其志氣何如耳志氣清明動罔不吉其或委靡瞻狥遇一事而遷延以諉曰俟異日又閲時而曰俟後人即或鋭志以往鮮克有終雖有初圖亦為文具矣然則莊敬者日强之本也顧藎臣之盡職以靖共爾位夙夜匪懈為敬則其敬公具臣之循分以奉行故事倖求免過為敬則其敬私誠令天下曉然於公私之介就天理流行處時時悚惕此心漸至徳性堅定則自私自利之説自不足入其懐來無欲而虚有主而静馴致於泛應曲當功崇而業廣則敬誠率作興事之本而志氣所由振也朋黨之興動關國是朝廷官非一職位非一人然必以數十百人之心分之合之皆所以為國然後君得以受其事之成古來門户一開競不相下大率由於恩怨分明人各自為之故果其幽獨皎然不欺若帝天之式憑若鬼神之昭鑒方蹇蹇匪躬之不暇而又何黨焉且人臣事君亦事以心而已其心以敬事為心則慎重名器無所引援而非遠嫌也即愛惜人材不忘吐握而非干譽也茍利於國茍利於民雖衆論紛紜不妨借箸而陳也理有未安情有未順雖盈廷唯諾不妨補牘而進也然則唐虞之同寅協恭以共濟都俞吁咈以相成亦良可懐矣臣更進原其時舜之徳曰温恭舜之政曰慎徽是其敬畏之心昭然如揭而益之言曰罔遊於逸罔滛於樂臯陶之言曰天聰明自我民聰明天明畏自我民明威古君臣告戒之意固顯以一人之敬為之倡矣虞廷十六字心傳特重危微設以為未危而安之則聲色臭味易投其隙以為甚微而忽之則喜怒哀樂將决其防舜惟持精一之㫖開臣鄰之先用能昭受上帝申命用休而其臣亦思日贊襄以熙帝載則時亮天功非即天人相與之明騐哉書經帝曰咨汝二十有二人欽哉惟時亮天功監察御史臣李㥳陳大猷曰皆當敬以趨時以輔相顯明天之功二十二人職雖不同其為天下之事則一故提其綱而總戒之臣謹按此帝既已命四岳九官十二牧而復申飭之辭也究其立言之㫖可以見朝廷設官分職之本焉可以見百爾夙夜靖共之實焉葢天降下民不能自治而以其事畀之君君亦不能獨理而以其事分之庶司百執事是臣事無非君事而君事無非天事自後世視此為人為之私故天位天職且以為奔走斯人之具而應命而來者上僅志於功名次則惟圖利禄掄材之典不明建官之義罔著致治之不古若厥有由己謹稽帝舜之命諸臣者曰時亮天工若不自有其爵賞之功而並不敢獨擅其分釐之事者誠以倫天叙禮天秩服天命刑天討即若予工若予上下草木鳥獸亦無非本天之所以範圍而不過曲成而不遺者工虞水火舉上帝所欲理之端惟人有以代之禮樂兵農舉上帝所欲用之人惟帝有以使之帝之善於任人乎固帝之善於承天也至諸臣之所以時亮者更不一矣或治外或治内各異其途或總治或分治各殊其責而帝惟曰欽者何也欽則妄念消而自私自便之圖舉不足以汨其公忠之本體欽則神智生而為疑為撼之端舉不足以擾其寧静之天懐故任無論大小統之以欽若之心則自無不稱之職守才無分優劣攝之以欽翼之念則自無不通之智慮彼鯀之績用弗成惟曰方命圮族是即不欽之由也而帝堯之光被四表帝舜之元徳升聞一則曰欽明允恭一則曰温恭允塞謂非能欽之騐乎是知古帝王之致治無一事不本於天無一人不原於敬君而知此義則本簡在為去取罔敢以爵秩暱私人臣而守此義則本匪懈為獻納又寧敢以因循曠厥職與書經欽哉惟時亮天功監察御史臣胡寶瑔臣謹按帝王膺天命履天位必法天行健以體天心而盡天職則凡人君之事皆天事也兢業者率於上而靖共者承於下天以事授之君而君統治之君以事任之臣而臣分理之事君之事即事天之事天事者天功也此虞廷二十有二人統告之以惟時亮天功而必以欽哉共勉之者君以敬作所臣即以敬盡職也周官曰唐虞稽古建官惟百内有百揆四岳外有州牧侯伯百揆以統庶官四岳以統十二牧也有總治者有分治者各敬其職以時亮天功葢二十二人之功皆君之功而君之功皆天功也欽以立時亮之本時亮以大欽之用有明作之才而又将之以小心有振興之氣而復主之以嚴翼自不容不惕然於君命之對揚凛然於上天之降鑒而敬事以敬君敬君如敬天則亮采惠疇各宣其力鞠躬盡瘁不知其勞斯君有得人之慶臣無曠職之愆矣夫百揆四岳所以治内州牧侯伯所以治外君以一人統大權於臣工之上宵衣旰食日理萬幾本無逸之心以勑天之命而時幾交儆不敢少懈凡為之臣者匪躬有經素餐有戒其為上為徳為下為民以熙庶績而康庶事可不敬歟敬則誠誠則無欺無欺而心皆實心矣敬則公公則無私無私而政皆實政矣禮樂兵刑工虞水火虞廷之所以綱舉目張内修外治燦然皆有成績者上無負於君而即無負於天也君以欽而明臣以欽而亮君敬天而勤民臣敬事而後食而且儆戒無虞慎修思永君臣一徳上下一心庶政所以惟和萬國所以咸寧也書經欽哉惟時亮天工監察御史臣張日譽臣謹按虞舜此言見官職之宜盡也人臣承君簡命布列庶位非徒博榮名膺厚祿已也以君事為事即當以君心為心夫兢兢業業一日二日萬幾君已無微之不慎則臣所以靖共爾位無曠厥官亦不可有一念之或弛焉從來言臣職者國爾忘家公爾忘私以為君事不容緩也然非徒君之事實天之功焉典曰天叙見隂隲之有自也禮曰天秩見品節之有本也徳曰天命罪曰天討見刑賞之無私也上帝原非輕付則責任不容旁貸臣可不自勵乎然盡職之道在因時而因時之要在主敬機務孔多惟斷斯集惟敏有功時之所乘即為事之所赴若姑待異日無論不能行也即行矣而當前之所棄已多且至異日安知事不迭起而尚暇為此乎因循茍且往往愈積而愈繁惟䇿之以時急於前者不緩於後勵於朝者不留於夕五辰既撫庶績自見其日凝焉獨是黽勉之精神必由小心而出無謙抑之念毎遇事多疎少沉静之思亦隨處易忽故聖王之告臣工不以他端相授而必以欽相朂者以為敬則能宻而心不失於粗浮敬則能勤而情不流於玩愒敬則能定而事不擾於紛更敬則能明而機不昧於權變古人之奮庸熙載其法不越此也雖然欽之為道所該者博堯典之辭以欽始益稷之謨以欽終敬修可願惟欽可以迎天休慎爾祥刑惟欽可以恤民命凡修己治人之要無不胥括其中為治者可湏臾之或離乎哉書經欽哉惟時亮天功監察御史臣永世臣謹按古帝王極隆之軌至治之休其所以裕持盈保泰之基臻長治久安之盛者要皆持一心之敬以為勤政之本而已矣蓋朝廷之治天治也寮寀之職天職也敬以圖治嚴欽若而篤温恭乾惕之念不懈於朝夕其孜孜而罔替者常砥礪於緝熙宥密之内敬以奉職懋勵翼而効公忠恪慎之懐無間於終始其凛凜而無斁者尤黽勉於純一不已之中是故未治而求其治未安而求其安者告戒之殷勤恒惕勵於盛明之世而已治而益求其治已安而益求其安者悠久之化理自茂著夫豫大之圖惟其主敬以立勤政之本斯大業光昭鴻猷赫弈其道胥由於此也夫一人憲天出治而分其任於羣工凡人臣之所以輔弼而贊襄奮庸而熙載者何莫非天之事歟顧憂勤所以保泰晏安易忘恪恭當府事修和之後人歌樂利俗尚敦龎而承流宣化者或以承平之可恃致兢業之偶弛其何以協寅恭而光謨烈有禆致治保邦之要道也哉蓋久安長治之業在乎法之盡善而更在慎其守法之志在乎政之悉舉而尤在凛其敷政之心天作之君而君不能以獨理廣君徳以迓天休惟在翼為明聼之司彰其化焉可曰瞬息之頃弗加兢惕歟欽之而輔佐爕理務協於中啟沃匡襄務衷諸道本實意以盡弼亮之誼已治而益求其治俾成功之廣被者燦然其彌著而欽承匪懈何時不凜有嚴有翼之心天生蒸民而民不能以自理恤民瘼以協天心惟在股肱心膂之寄宣其猷焉可曰造次之微弗深戒懼歟欽之而敎稼明倫務盡其職典禮掌樂務竭其忱敷實政以效寅亮之休已安而愈求其安俾豐功之美備者昭然其益顯而欽若弗違何時不厪無怠無荒之念是知敬為制事之本而人事莫非天事一事之嚴恪可以貫諸萬事則無隳人事者自無曠乎天工敬為持心之要而人心可証天心一日之戒慎必以矢諸百年則久孚人心者自久凝夫天命此主敬之功所以為致治保邦之要道歟書經三載考績三考黜陟幽明庶績咸熙右中允臣朱良裘臣謹按唐虞之世建官惟百而考課之制綦嚴其在堯典有曰平章百姓孔氏傳云百姓百官也又曰允釐百工於以知當時之世其官一如工人之世其業皆期於專治而欲精之者也虞帝命官以奮庸熙載既咨二十有二人而朂以時亮天工矣而所以進退百執事者復定為三載考績之制績之為言積也其義莫著於治絲必銖積寸累有一息無間之功而後文理成就有昭然可見之迹故考其成者必遲之以月要嵗會而課其功者實廹之以早作夜思也蓋人君予人一官必有一官所司之事而臣子食祿一日必有一日分所應為惟長吏倡率之有方而後庶司鼓舞於弗倦亦惟任小而無曠官之誚而後受大而有察吏之能此天下之通義也惟是其間有餘不足之數未可以日月之計為憑故必候三載而後考其績之有成與否又以才有短長時有利鈍事有繁簡任有重輕未可同年而語故必歴三考而後加以黜陟焉其不言能否而言幽明者正以績之昭著彰彰在人耳目間而幽者一無表見判然如白黑之分此黜陟所以合乎天下之至公而羣力畢奮衆功皆廣也周禮冢宰之職嵗終則令百官府各正其治受其會聴其制事而詔王廢置三載則大計羣吏之治而誅賞之代有先後故制有遲速要其所以考課之法莫之或易爾漢魏之君屢講求考課之法而莫得其要漢京房奏考功課吏法未見施行而為小人所譖魏杜恕遂謂用不盡其人雖文具無益歴六代而考績之法不著閱七聖而課試之要未立其法可粗依其詳難備舉於是考課竟不行蓋考課之不便於世久矣自考課不行而後之用人者遂苦於無所據或以年勞或以流品或以採訪或以保任任法任人皆不能有得無失可考而知也唐陸贄有言㧞擢以簡賢能廢置以絀不肖循資按格以處中材其論為平允然果不一考其歴官之績則所謂賢不肖與中材又庸有定乎杜恕之言曰天下至大萬幾至衆非一明所能徧照是則然矣顧使人君以一身而考庶司百執事之績勢固有所不能若使内外百寮之長各考其所屬之績固力所能為而責所不容謝者誠擴其愛憎之私袪其毁譽之蔽而實考其職分之所有事日有試焉月有省焉或勤或惰或優或絀必昭然不可掩者夫然後殿最有定評舉劾有定論登庸者無躐等之嫌沉滯者無積薪之嘆而茍且僥倖者無所容其覬覦之私人才日奮化理日隆於以佐亮功熙載之治其或有當與書經三載考績三考黜陟幽明庶績咸熙修撰臣金徳瑛蔡沈曰考核實也三考九載也九載則人之賢否事之得失可見於是陟其明而黜其幽賞罰明信人人力於事功此所以庶績咸熙也臣謹按考課者人君之大柄也功過明而後賞罰當賞罰當而後人心勸鼓舞之機端在於此為其太寛則人情易即於茍安太廹則或束於時日而不克自展其猷為惟以三載九載為期則賢能者得從容以奏其績而中庸以下之材涖官任事既久亦可以漸自濯磨振㧞惰化而為勤闇化而為明無棄人亦無闕事矣况古所為陟者五章五服品秩之優崇非如後世之遷徙靡定稷契終身止守一官其責之也專其任之也久是以六府三事允治萬世永頼也且人君勞於求賢而逸於得人唐虞稽古建官惟百外薄四海咸建五長雖為數未繁豈二十二人止哉而舜命官四岳九官十二牧之外無聞焉蓋委任責成惟此二十二人論道經邦承流宣化固已振其綱而挈其領其餘庶官百職事之賢否自各𨽻於其長而分其督勵進退之權可推而知也然則三考以前遂無黜陟乎臣竊以為史臣所紀立法之大體耳其或偶有憸壬隨時糾察固不可廢也且夫用人之道與其嚴之於其後無寧審之於其先古者司馬辨論官材論辨然後使之未有違材而用不學操刀而使之割也舜之諸臣有專命者有咨於四岳及儔衆者凡水土兵農禮樂經緯彰著於平日在彼先自信而君上及同列之人咸信之故可確然一旦授以重任而不辭非有所勉强遷就不得已而舉其人以備官也人之材質各有所長易其地而弗能為良雖大聖大賢猶不輕使况其下焉者哉夫如是故不待考績之時而已逆料其人之必有成偶有失焉其所黜者蓋至寡矣後世防閑道密拘於資格任法而不任人多為遷避以示公探籌而畀之需次而得之無非任而後學者能與不能當前不之知也及知之而考之黜之固已晚矣此所以審之於始存乎考績黜陟之先尤正本澄源之道也御覽經史講義卷九
