body:
  text: 詩經不解于位民之攸塈編修臣林枝春臣謹按人君之位謂之天位言承天子民非以位為樂也易繫辭云聖人之大寳曰位何以守位曰仁言如天好生必常厥徳以保厥位也國曷依依於民后非衆罔與守邦衆奚托托於上思艱圖易民乃寜然則兢兢業業一息無敢康者明王奉若天道撫臨兆民於是乎在而約而言之聖學之所以慎終慮始不外此克勤無怠謹小慎㣲之一心是則人主持心必以憂勤惕厲為要矣夫假樂之詩公尸所以答鳬鷖也當是時君燕其臣臣媚其君一徳泰交可稱極盛乃臣熟復其辭始舉其令徳以明受禄之由繼及其子孫以著申命之美終之以不懈則又歸本王心而致其祈天永命之意其心即卷阿矢音之心也其義即虞廷颺言之義也然則久安長治總在克艱而無逸豐亨豫大勿忘儆戒而綢繆詩人之㫖可謂深切著明矣臣聞人主圖治震動恪恭奮厲於始者恒易强毅果斷維持於後者為難何則即位之初志氣方鋭百度維新動必有功施易見徳是以樂於有為期其咸理至數載以後綱紀既已釐定臣民既已服從徳化之所施惟在優游而漸漬之故其圖㡬愈㣲而得效漸寡自非度量過人足以大有為之主則識見稍狹必沾沾自喜而隘其經綸而志願稍卑亦將悠忽茍安而漫為退托於是闒茸無能者借安静之名憸邪媚悦者進愛身之説人主忽而不察久將信以為然則懈心一萌百為日弛建功立業者雖知其有為終苦其多事直言極諌者雖無疵其建白之意終不便其拂己之私於是乎水旱盗賊有不必盡聞觀逸遊田有不能盡廢而其志荒矣欲民之受其福詎可得乎夫事以漸而成而㡬自㣲而著勤之易而為懈也必其敬之弛而為肆敬之漸弛則强者漸偷明者漸闇董子曰積善在身如長日加益而人不及知也積惡在身如火銷膏而人不及見也然則寖昌寖㣲語其極至於堯桀之分而其間曽不容以髮亦奈之何不慎也臣聞窒穴蟻之隙則滔天之勢無自而成遏攸灼之燄則燎原之憂無自而起謹言行之樞則千里之外即時而應人主九閽邃宻儼若帝天而起居嚬笑時或傳於小民之口無㣲不彰良可儆惕此夙夜罔或不勤細行不矜終累大徳大保奭所為歎息而言也亦在乎謹小慎㣲凛之又凛而已夫一日萬㡬天位至艱惟明哲之后能無逸而乃逸故一饋十起禹所以興夏也昧爽丕顯湯所以造商也不遑暇食文王所以肇周也古之人君日出視朝退適路寢聴政旦則考政夕而糾虔天刑是則深宫燕處無非克艱天位之時若謂四方之耳目既周在廷之職業無曠不妨於清閒之燕暫一留連物玩陶寫性情不知此心有所係著即非虚靈本體即使天性髙明見而不惑而可欲之事日陳於目前則抑畏之心難保其無替魏徴有言雖未全妨政事不復専心治道樂之將極漸不克終可為深戒且徒躭外物不求義理喪志之累典籍猶然况竭百工財力僅以供耳目口體之所奉者哉旅獒之訓曰不作無益害有益功乃成不貴異物賤用物民乃足人主茍心存儉樸則宫室臺榭之飾皆屬虚縻志甘淡泊斯服食器用之外别無重寳有秉道畏義之誠則淫樂慝禮不足以攖其視聴凛宴安鴆毒之戒則徽言大訓無往不切於羮墻班朝治軍涖官行法無惰容則清明在躬氣志如神可知也前巫後史宗祝瞽侑在左右則中心無為以守至正可知也逮夫膏澤旁流太和洋溢農桑樂利之休歌詠太平永永勿替而民心洽天位鞏矣書曰允廸兹生民保厥居其即攸塈之謂歟由是百辟卿士益效其媚兹綱紀四方胥冺其怨惡上以答保佑申命之隆下以綿子孫千億之祚皆自不懈之一念基之矣抑泂酌之詩亦曰豈弟君子民之攸塈使民有父之尊有母之親則可謂能休息斯民矣㡬有悦安强敎之世而弗立隆於主徳者乎夫豈弟之君子即假樂之君子其無安厥位錫福庶民一也詩經不解于位民之攸塈監察御史臣彭肈洙臣謹按養尊處優之説此中世之臣所以諛悦其君而古之人無是也古之人知天下不可宴然而治而又不可恃天下之既治而暫釋其憂勤故持盈保泰之慮雖笙簧酒醴間猶相與詠歌而不忘是以物阜民安其治遂臻於上理昔者姬周當成康之世主聖而明臣賢而良綱紀畢張刑措不用君若臣宜可以優游而無為矣及讀假樂之詩一時百辟卿士何愛君之深憂民之切諄諄以不自暇豫之詞為君勗也其曰不解于位民之攸塈非其証與嘗試論之國家不難於治而難於長保其治人君不難於勤而難於刻守其勤當其海宇未清敉寜未奏之日雖中主猶知戒懼及其四方無事中外乂安即聖主不免有侈心何者天下既無憂警之虞而又見國富民殷何求不遂漸覺九重之上宵衣旰食苦於拘束而不情而蕩心佚志之場轉以為太平之盛事其後遂至於荒縱而不復計閭閻之所安故懲宴安嚴隳惰聖若成康臣下猶兢兢乎難之則可知天位維艱而民生之勞塈誠視乎君而不可一息或懈也且夫民之勞塈亦何常之有上之所見為塈下之所見為勞也上之所見為勞下之所見為塈也人君無聲色貨利之好則輸將塈人君無臺榭苑囿之娯則繇役塈人君無虞田弋獵之樂則供張塈人君無好大喜功之念則兵革塈是故勤率作力耕桑胼手胝足而不言其况瘁者民之不自塈也憂勤惕厲儆于有位夙夜不敢康則是君之所以使民塈也民之塈由於君而君之所以使民塈者由於不觧故曰堯舜有為人主之勤無為人主之欲故天下各得濟其欲有為人主之位無為人主之心故天下各得肆其心假樂之臣工其知愛君矣是以成康保此道而太和翔洽禄自天申其後宣王有中興之徳而不慎厥終故雅詩一變而不復正也詩經度其隰原徹田為糧度其夕陽豳居允荒監察御史臣衞廷璞臣謹按此周家一代田制所自始而八百年王業所由開也周禮地官小司徒之職與遂人稲人所經理皆端本於此而四語之中經制之詳明推行之次第亦可細按焉度其隰原者猶審其髙下也治野之法遂溝洫澮皆以通水於川要皆自髙而趨下盖居其民於皇澗過澗之間水利可資因而限之以溝涂表之以封植使其民通力合作計畆均分而制度以定然非酌其髙下之宜則無以定行水之道故必度隰原而後可以徹田也夫古者資農以立國資水以溉田黄帝經地設井禹盡力乎溝洫濬畎澮距川其来舊矣公劉當播遷之始即留心於此此其規模固已宏逺矣且古人有可耕之田必有可牧之地周禮所謂井牧也盖六畜有所養而後無傷於稼穡原隰之間牧事可興而田事愈治然後自近而逺度山西之田而益廣之由是豳人之居於此益大矣嘗聞昔人有言曰以水佐耕者豐以水佐守者固古者内為田廬外為溝洫使戎馬有限即以伏險於順此地中有水所以取象於師而齊之田畆不東所以塞乎晉謀也公劉精心於治田故其民盡泉源之利而又得防衛之資豳居之允荒也不亦宜哉厥後文王本之以即功周公遵之以定制卜世卜年即謂兆於此焉其亦可也詩經泂酌彼行潦挹彼注兹可以餴饎豈弟君子民之父母泂酌彼行潦挹彼注兹可以濯罍豈弟君子民之攸歸泂酌彼行潦挹彼注兹可以濯溉豈弟君子民之攸塈編修臣竇光鼐臣謹按泂酌詩序云召康公戒成王也言皇天親有徳饗有道也善言天者必有徴於人書曰天視自我民視天聴自我民聴民生之休戚其氣機常與天命流通而往来相應惟有道徳者為能成民而致力於神此泂酌之大義也輔廣曰毎章上三句有逺近相湏彼此相益貴賤相資之意故以為興也蘇轍曰雖行潦之陋而無所棄猶父母之無棄子也父母之於子也愛之深故其為之慮事也精以深愛而行精慮故其為之避害也速而就利也果夫君子之於民亦若是則已矣記曰凱以强敎之弟以悦安之民皆有父之尊有母之親傳曰民之所好好之民之所惡惡之此可謂民之父母矣其繼之曰民之攸歸何也天下無欲離其父母之子也則天下無能離君子之民也靈臺曰庶民子来此之謂也既来之則安之故以民之攸塈終焉何以安之則仍安之以父母之心爾父母之於子未有不至於無憾而即安者也子之於父母亦未有相處而不相安者也君子以父母自處而備盡其鞠育之誠民各以子自處而相忘於怙恃之徳天保云民之質矣日用飲食安之至也羣黎百姓徧為爾徳有道有徳之孚也神之弔矣詒爾多福皇天親之饗之也此詩三章之義進而益深而豈弟君子終無異詞何也君子者道徳之極也皇建其有極而後斂錫有本㑹歸無外風雨同好燠𤾉時若徹上徹下治明治幽胥準諸此矣兆民允懐而帝命不違明信聿昭而溪毛可薦書曰至治馨香感于神明黍稷非馨明徳惟馨此可與詩序相証明者也顧此詩之辭備極揄揚而序以為戒何也曽鞏有言曰歌其善者所以導其嚮慕興起之意因以防其怠廢難久之情盖履極盛之勢而動之以戒懼者明之至知之盡也夫履極盛之勢而保之以戒懼徳惟日新道以時升將使萬世得以戴巍巍履栗栗臭芳烈含甘實鏡純粹之至精流恵愷於無極斯天下之上則已由斯以談則成周之盛至今存也詩經泂酌彼行潦挹彼注兹可以餴饎豈弟君子民之父母少詹事臣張鵬翀孔氏頴逹曰公劉泂酌卷阿俱召公所作厚民之事人君之急務故先作公劉非有道徳則不能愛民故又作泂酌欲王之修徳行道也君雖有徳不能獨治又作卷阿使王求賢用士也輔氏廣曰毎章上三句有逺近相湏彼此相益貴賤相資之意故以興下兩句朱氏公遷曰此以小物之功用興大徳之功用明人君不可無豈弟之徳也臣謹按人君奉天子民有父母斯民之責父母之愛其子無所不至人主之愛民必如父母之愛其子始無愧為民之父母然愛之不得其道不免為小恵小信而無以盡乎强敎悦安之實此泂酌之詩所為惓惓於豈弟君子也夫以流潦之㣲酌之於彼以挹其涓流注之於此以致其澄潔尚足以資餴饎酒食之用祭祀燕享無所不宜况以大君之徳操挹注之權所為裒多益寡稱物平施使逺邇均沾上下各足豈特如行潦之挹注而已乎顧挹注之權操之自上而一有不得其宜不特小恵小信如行潦之細不能沾溉即欲竭其倉禀府庫以為施濟而民終不能遍被其澤者盖非有道徳以為酌劑不能明乎逺近相湏彼此相益貴賤相資之理往往顛倒失宜急遽無序欲以利民而適以為厲者有之矣惟有豈弟君子之徳者豈以强敎而非示威弟以悦安而非示恵至誠愷惻之意流溢於家人父子之間然後能施濟咸宜敎養畢備故惟豈弟君子始無愧為民之父母也然人君之為民父母其愛則同而勢則逺於萬里不能親涖民間而為之挹注不得不授權於代為挹注之人自監司以至於州縣長吏皆是也而州縣最親民間所恃為父母者尤在州縣而自州縣以逹之天子其勢甚懸一有壅於上聞則疾苦無由知而膏澤不下究甚者或掣其肘雖有挹注之便袖手而不得施則所以宣上徳而逹下情使挹注之適其宜者不尤在監司之得其人乎今之監司惟督撫最重雖藩臬為地方専官率奉其意指耳處最重之勢而於民甚疎一有不得其人則好惡任情為害非細臣嘗論稍申藩臬之權使得與督撫互相檢察以救偏重之弊而於州縣之治務持大體勿責苛細俾得從容就理斟酌適宜豈非逺近相湏彼此相益貴賤相資之道乎臣是以流連於召公泂酌之言而彌覺其義藴之無盡也夫以潢汙之水而欲資酒食之用挹彼注兹其中有無限道理沉静者能之而淺躁者不能也亷平者能之而貪恣者不能也忠信者能之而詐偽者不能也明辨者能之而闇昧者不能也持以觀人亦足知吏治之大槩矣今之州縣豈少稽古愛民之良吏但令監司皆得其人善為表率而無掣其肘循良之治必多可稱請令吏民表其實蹟得上史館采其尤著者褒顯之以風勵天下使互相觀感以成至治斯則挹注之宜操之自大君而有餘者矣臣竊有慮者食貨贏絀係生民大命方今海宇承平休養日久而閭閻不見盈溢之象倉庫時厪不足之虞平時僅足支持緩急恐無可恃是當酌盈劑虚以籌挹注之術而後可以成州縣之善治也臣嘗讀唐書食貨志太宗聴魏徴仁義之言貞觀四年斗米四錢外户不閉開元初政任姚崇宋璟海内富貴斗米之價錢十三青齊間斗纔三錢自後天子驕於佚樂用不知節嵗出之數常過所入於是錢榖之臣始事朘刻贏餘競進以奉燕私卒至民物耗弊天下蕭然夫明皇以一人之身勤儉而致富强奢侈而成耗弊至耗弊之後乃事朘刻以供侈費譬如挹潢潦之水灌以漏巵涓涓㡬何涸竭可俟耳寜得為挹注之善術耶古者民有恒産故無甚富甚貧今則貧富懸絶不可强齊均田限田法雖可稱迫而行之徒足滋擾為民父母固不能挹彼之富以注此之貧然而勞農勸相倡興勤儉使貧者得免饑寒敎以睦婣奬其任䘏使富者不至驕侈此則良吏所能為是亦挹注之道也當今雖未見豐盈之象未至有耗匱之虞惟是清心寡欲量入為出省無益之費罷不急之役自朝廷百職事以至監司郡縣皆仰體為民父母之意震動恪恭率作興事日計不足月計有餘庶㡬國用日充閭閻漸裕政平刑措風俗還淳其斯為挹注於不竭之原乎豈弟君子民之父母斯足當强敎悦安之實而無愧矣詩經有卷者阿飄風自南豈弟君子来游来歌以矢其音侍讀臣周玉章臣謹按自古君臣合徳之朝乃有拜手颺言之盛工虞水火極都俞吁咈於命官之時元首股肱合喜起明良於􅆳歌之下此後世歌詩之所由作而君臣倡和之有明徴也若夫遊觀之事聖王不廢岱宗衡華按方岳以周廵靈沼靈臺與辟廱而並建推之省耕以勤補助田獵以選車徒無非上闗國典下切民依豈苐曰游目騁懐極視聴之娯而已哉迨夫登渉所至作為詩歌或誌山川之靈秀或咏風物之恬熙或念嵗時之豐歉而憂喜互形或辨俗尚之貞淫而勸懲並著或憶豐功偉烈而深思締造之艱難或憫暑雨祁寒而周知閭閻之疾苦一唱三歎莫非乾惕深衷依永和聲真覺神人協聴一時扈從之臣授簡摛辭導揚盛美篤棐之心形於頌禱諷咏之下間以箴規如召康公卷阿之詩其大凡矣有卷者阿誌地也飄風自南紀時也豈弟君子来游来歌以矢其音敘事也臣嘗受其詩而讀焉既以伴奐優游極遊歌之樂即以彌性受命迓純嘏之常先公百神交儆于宥宻圭璋聞望綱紀乎四方鳯翽梧生多吉人亦多吉士馮翼孝徳媚天子亦媚庶人豈弟君子不憚詞複言重矢詩不多無事鋪張揚厲因善歌繼聲之中寓随事納誨之意故成王非盤遊而康公非虚譽也不㡬與虞廷之􅆳歌比烈歟抑臣謂不特遊觀也即燕饗亦時有之傳曰享以訓恭儉燕以示慈恵鹿鳴皇華蓼蕭湛露諸什君所以燕其臣而天保頌其九如既醉備夫五福又臣所以答其君善乎朱子之言曰君臣之分嚴朝廷之禮敬然一於嚴敬則情或不通故先王制為燕饗之禮以通上下之情盖平日分職課功無尺寸之地可寛而暫時酒醴笙簧俾堂亷之分不隔優其禮益以厲爾官常聨其情愈以生夫忠藎由是詩以言志歌以永言必且上如臯陶之載􅆳次亦如康公之遂歌於以鼓吹休明賛襄鴻烈耀當時而傳後世誠盛事也他若子虚上林雖意歸諷諌而究以藻繪為工詞章之末無闗要典唐太宗謂漢書載之為過也宜哉詩經有卷者阿飄風自南豈弟君子来游来歌以矢其音編修臣王居正朱子曰此詩舊說亦召康公作疑公從成王游歌於卷阿之上因王之歌而作此以為戒臣謹按古帝王繼天立極而開一代有道之長培萬年無疆之基者要惟是此心之兢業與百爾臣工共相砥礪於無逸而後君徳以端王猷克茂焉顧憂勤惕厲千聖同揆而守成之時恒嚴於創業盖開國之初規模未定紀綱方新承大統者方凛凛於天命之不易集人心之不易聚賢才之不易得而逺大之謀成於刻勵此盛治之所以開其先也若夫太平無事之時以三光則得其明以四時則得其序以庶類則得其所祖宗之積累至此而發其光氣運之培養至此而煥其采是誠可樂者乎然天地盈虚與時消息而治道之盛衰判於主志此古之聖王持盈保泰朝乾夕惕恒慮之於極盛之時而有虞所以有臯陶之賡歌有周所以有卷阿之矢音也竊嘗取所矢之詩而繹之其大㫖要不外乎求賢以輔治而已思天眷之不易承也則首言夀考福禄之盛以著受命之有本思君徳之不易成也則次言顒卭聞望之美以見親賢之有益思君臣一心明良一徳也則又言其相湏甚殷而相得益彰者以堅其側席旁求之誠其㫖切其詞婉言之者其有厚望歟獨是成王之時果何時也耶考之竹書紀年成王三十三年游卷阿斯時三監已去頑民已靖洛邑已成一統太平故駐蹕卷阿君臣賦詩以鳴國家之盛所謂太和在成周宇宙間此其時乎然當時佐命諸臣已多凋謝而周公亦致政歸國是君心之敬肆人才之進退天下之安危治忽其機在此一時故召公作此以相規也誠以君心者萬化之原賢才者國家之本君心不可一日不敬不以太平游衍之時而可忽也賢才不可一日不進不以多士師濟之時而可緩也召公之随事効忠因時納誨也如此其亦憂盛危明防㣲杜漸之意乎故曰慮之於極盛之時也抑又聞之范處義曰召公進戒曰求賢足矣必曰吉士吉人何也周公作立政以告成王亦曰其勿以憸人其惟吉士盖憸利之人常近於薄吉善之人常近於厚使人主於用人之際必求吉善之士而信任之雖其天資静重不求赫赫之名誠足以夀風俗之脉為國家之福也由斯言觀之周召之所以効忠於君者從可知矣而其所謂賢者亦從可識矣且天之立君以為民也君之求賢亦以為民也故馮翼孝徳之士用以輔君徳則為良臣用以任民社則為良牧易曰養賢以及萬民書曰臣為上為徳為下為民其與召公媚于天子媚于庶人之意互相發明乎夫成周之佐周召為最而七月之篇推王業之根本所以端其始卷阿之歌勵君徳之無逸所以謹其終二臣之納誨雖異而其致君於堯舜則一也此成王所以享宇宙太和之盛而為有周八百年之令主歟後之君天下者不忘乎民因以不忘乎人才之進退則賢才輔而善人多一徳成而天下治太和宇宙之盛庶㡬再見於今日哉詩經有卷者阿飄風自南豈弟君子来游来歌以矢其音編修臣楊述曾詩序曰卷阿召康公戒成王求賢用吉士也臣謹按鄭氏詩譜大雅生民下及卷阿成王之時詩也先生民以尊祖次行葦以仁厚美則有既醉鳬鷖嘉樂戒則有公劉泂酌卷阿而求賢以自輔尤為致治之本故卷阿一詩三致意焉臣竊誦其辭而繹之卷阿屈曲有虚中之義喻求賢之心也飄風長養有育物之功明求賢之用也伴奐爾游際閒暇之時茀禄爾康享和平之福而歸之於彌爾性推之於媚庶人盖人君之用賢也莫先於陶成徳性莫大於愛養萬民古之聖王狥齊敦敏得於天者厚矣然必齋戒其心神明其徳姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪僻之氣不設於身體猶恐出入之暇或有過差耳目所及或未周廣於是敬禮老成弼亮之臣與之從容講論慎選温良端正之彦使之布列左右既有以漸摩其徳義涵養其性情復有以防其聞見之非節其嗜慾之過故能習與性長化與心成否則居崇髙之位處豐豫之時百官奔走而惟恐或後萬方崇奉而所欲必得則驕淫之漸逸欲之萌皆得乗其間而中之其為徳性之累夫豈少哉至於民惟邦本凡為上者未有不知愛養者也然所謂愛養者豈切切然今日降一詔明日行一事煦育之以為恩施濟之以為澤哉得其人而理之則海宇乂安人民樂業不得其人而理之則或果於自用而措注非宜或頽墮委靡而奉行不力本欲以興利而適滋其害本欲以除弊而益増其困紛紜叢脞既非治道所宜宣布施行徒飾聴觀之美於民何頼焉説命曰惟后非賢不乂言君雖明聖不能獨治也立政曰繼自今立政其勿以憸人其惟吉士言惟吉善之人有以恵民也從来憸利之人以苛為察以刻為明矯飾外貌似是而非吉善之人天資静重悃愊無華日計不足月計有餘誠使得吉善之人而任之則雖無赫赫之名殊異之績而慈祥愷惻之恩忠厚長者之道自足以培福禄之基綿仁夀之脉其利頼豈止一時已哉君徳日充民氣和樂土宇昄章極九州之廣圭璋聞望為四方之綱昭受上帝申命用休由是禮明樂備則鳯凰之雝喈鳴國家之盛此文章之事也覲光揚烈則車馬之庶閑任馳驅之用此克詰之備也求賢之用如此其廣用賢之效如此其大召公所以矢詩告誡歟抑臣又聞之小雅南山有臺樂得賢也其辭曰樂只君子邦家之基又曰樂只君子徳音是茂夫君子即馮翼孝徳之人所謂吉人吉士也得之以引翼乎一己則百神主焉彌爾性之謂也以引翼乎萬民則四方則焉媚庶人之謂也徳音不已保艾爾後則與顒顒卬卬純嘏爾常之説有互相發明者宋臣曾鞏有云二雅之作勸帝者之功美昭法戒於將来聖人所以列之於經垂為世敎也王者循類取稱本隐之顯自足興道致治垂諸無窮豈徒比其聲音播之絃管而已哉詩經有馮有翼有孝有徳以引以翼豈弟君子四方為則編修臣董邦逹孔頴達曰言有善行可以為憑依者有藝能可以為輔翼者有至孝可以為感化者有大徳可以為軌訓者王當以此長尊之以此恒敬之得此四等是樂易之君子可以四方為法則矣臣謹按國家之用人臣子之事君以徳為本以才為末徳可以統才才不可以槩徳故周官司士功詔禄能詔事久奠食必首之以徳詔爵焉其在書曰翕受敷施九徳咸事則才在其中矣而大司徒以鄉三物敎萬民而賔興之亦曰六徳六行六藝先以徳行不先以藝也夫行道而有得於心之謂徳古来純臣致主未有不本諸躬行心得而惟以才華表見者今觀詩言馮則倚仗之謂非徳何以為倚翼則輔助之謂非徳何以為輔孝則徳之本也百行之原也是馮翼孝徳分之異名合之實一徳耳孔頴達以有翼専屬之藝能則偏而不該矣當斯時夀考作人之治化猶新鎬京辟雝之鐘鼓方盛而成王復基命宥宻緝熙單心以日就月將繼序思皇於是人才軰出無不争自濯磨廸徳修行以儲朝廷股肱心膂之用故後章所云圭璋聞望之美彌性之驗也藹吉雝喈之盛馮翼孝徳之材也明明在朝穆穆布列聚精㑹神相得益章從遊矢詩盖紀實也維時朝無不飭之紀綱野無不同之風俗上下無間驩忻交通為法於天下可傳於萬世盖成周之極盛庶㡬乎賡歌喜起之風矣古大臣之頌揚其君其知本哉後世人臣宜何如其砥礪廉隅束身圭璧俾徳優於才才本於徳實體夫格物致知誠意正心之學足以為上為徳為下為民克副官材論辨之典始膺引翼之選而不媿也而學校之中所為陶冶而成之者尤當以徳行道藝樹之標凖務使草野之内具有經綸康濟之猷而不屑以辭華相尚則所謂有馮有翼有孝有徳者安在不如古哉亦可知上之所取乎人材者在此而不在彼而下之自勵其行以為効用之地者本末輕重之間辨之不可不早也詩經有馮有翼有孝有徳以引以翼豈弟君子四方為則編修臣張為儀朱子曰言得賢以自輔如此則其徳日修而四方以為則矣吕祖謙曰人主常與慈祥篤實之人處其所以興起善端涵養徳性鎮其躁而消其邪日改月化有不在言語之間者矣臣謹按卷阿之篇序以為召康公誡成王之作其前數章先詳言受福之盛而此第五章則推原致福之本在乎君身而君身之修在得人以自輔也盖人君以一身居崇髙之位持威福之柄所欲必得所為必成則其志易滿其情易肆茍前後左右之人不能陳善閉邪以引君於當道則凡耽樂玩好之事其始特偶然行之耳繼且習為固然日新月異有加無已縱耳目之欲違起居之宜其所闗於君徳者非細故矣古之聖王惟深鑒乎此故既立三公以經邦論道又設師氏保氏以勸􅍇諌惡下逮侍御僕從罔非正人以旦夕承弼厥辟則匪僻之端不得乗隙以入縱或萬㡬之餘偶為遊觀以適意而心有所主斯伴奐優游自喜樂不失其節所以君徳日隆而四方咸奉為則也三代以下如唐太宗宋仁宗皆史冊所稱賢主嘗考唐貞觀初年即置宏文館精選文學之士令更日宿直聴朝之暇引入内殿講論前言往行商𣙜政事宋景祐元年置崇政殿説書日輪二人以備質問夫唐宋二宗徳性雖由天授而學問之功其取資於諸臣者固不為無補也且夫人主之學與常人異何也常人之學期於通章句工文辭退則講道論徳能訓廸子弟進則承流宣化能播政邦國如是已耳若人主則以一身任天下之重其事至賾其㡬至㣲其所以蔽之者又至巧而且衆茍徒恃一己之聰明而不能參伍以通其變執兩以用其中將意以為仁而或流於姑息意以為義而或流於苛刻盖有失之毫釐謬以千里者故曰自用則小好問則裕此非若常人尋章摘句之學可以専門名家者也故必虚懐忘勢兼聴並觀審取馮翼孝徳之臣崇其禮秩假以顔色時復召對便殿與之從容講論則庶能獻可替否拾遺補闕有以周知天下之情形而不為所蔽在君身則收諸臣引翼之功在四方則沐大君豈弟之澤豈不盛哉在宋明道程子嘗告其君曰願禮命老成賢儒不必勞以職事俾日親便座講論道義以輔聖徳又擇天下英俊使得陪侍法從朝夕延見開陳善道講磨治體以廣聞聴而伊川程子亦謂人主一日之間接賢士大夫之時多親宦官宫妾之時少則可以涵養氣質而薰陶徳性故請謹選賢徳之士以侍勸講講讀既罷常留以備訪問從容燕語不獨漸磨徳義至於人情物態稼穡艱難日積既久自然通達固皆卷阿此章之意也詩經有馮有翼有孝有徳以引以翼豈弟君子四方為則檢討臣齊召南朱子曰言得賢以自輔如此則其徳日備而四方以為則矣此章以下乃言所以致上章福禄之由也臣謹按自古言治未有過於虞周者也虞廷賡歌載在尚書周室矢音列於大雅千百世下誦詩讀書者猶可以想見當日君臣之遇雖語有繁簡體有質文辭有婉直而丁寜往復以規為頌當太平極盛之日皆兢兢乎有持盈保泰致治無已之思詩書所稱若合符節書言敕命詩言彌性敬天之學同也書言百工熙庶事康詩言四方為則為綱勤民之政同也其所異者舜歌喜起責難股肱臯陶賡明良責難元首詩惟有召公矢音之詞耳然即召公矢音以論所謂顒顒卬卬如圭如璋者非即元首之起與明乎所謂有馮有翼有孝有徳非即股肱之喜與良乎必有馮翼孝徳之助然後君徳備而福禄全非即舜所謂股肱喜而元首起乎馮翼孝徳即吉士吉人之選亦即臯陶陳九徳所云彰厥有常者也能引能翼為上為徳而媚于天子為下為民而媚于庶人此賢者之所能自必者也有馮翼孝徳而不以為引為翼多吉士吉人而不使之命之此非賢者之所能自必者也惟君子能用馮翼孝徳而後收引翼之功能使吉士命吉人而後獲媚天子媚庶人之益斯又豈非臯陶所謂元首明而股肱良者乎故曰詩書所稱若合符節也抑臣又有説焉周自文王天章雲漢夀考作人武王燕翼詒謀保有厥士至於成王周召作輔太公為師畢公君陳康叔史佚之倫穆穆布列樂正所敎司徒所興司馬所論徳行道藝之士罔勿在位賢才衆盛千載一時詩言馮翼孝徳時固實有其人詩言以引以翼時亦實有其事豈尚有吉人吉士伏處巖穴沉滯下僚未及升庸者耶就使偶有一二其徳其才亦必不能與周召諸公並而召公猶復孜孜以旁求俊乂為成王勸古大臣虚懐若谷亟於得賢為國家久安長治之計至深且逺固如此乎哉周公陳立政拳拳於三宅三俊之克宅克俊且曰繼自今立政其勿以憸人其惟吉士此其所以致周之治比美唐虞也歟詩經有馮有翼有孝有徳以引以翼豈弟君子四方為則檢討臣胡澤潢臣謹按天佑下民作之君白虎通曰君者羣下歸心也不擾匹夫匹婦謂之皇又爾雅釋言曰皇匡正也詩曰四國是皇是也史記正義曰徳象天地曰帝仁義所往曰王皆君稱也而又稱君子者白虎通曰道徳之稱也言能全備道徳以作之極而四方胥㑹歸焉所謂則也則之立不立視乎徳之修不修而修徳之要則在取人以自輔孔子告哀公以為政在人數語可謂約而盡矣自堯舜以来經史所載頌揚主徳未有不言得人者凡其明目達聰廸知忱恂克知灼見兢兢焉致難且慎者非但以羣䇿羣力備股肱耳目之司實頼以啟心沃心示蕩平正直之極也召公匡輔成王繼文武之盛當時侍御僕從罔非正人猶以馮翼孝徳為規何也從来創業難守成尤不易成王守成者也得人則徳立而四方是效失人則徳隳而其盛難久故切切焉以為朝廷選建庶官而但得頥指氣使之軰將日即於怠惰恣肆非所以示表的於四方也必日與嚴氣正性者居同慈祥篤實者處於以感發善端涵養徳性鎮其妄而消其邪日改月化而風動之休不難坐致矣其曰馮者出入可依也翼者左右有輔也孝則至性最篤徳則宅心最醇引如行之有導翼如飛之有羽惟馮翼可為引翼之資惟孝徳可當馮翼之任惟引翼乃可成君子所謂表端影正儀型不忒者也其曰豈弟何也禮記曰凱以强敎之弟以説安之君子於嚴氣正性者而得豈於慈祥篤實者而得弟於以説安强敎於四方皆引翼得人之效也御者駕齧膝乗旦之良周流八極萬里一息冶者鑄干莫之劍水斷蛟龍陸剸犀革何則有其資者易為功也馮翼孝徳之於君子亦猶是矣獨是宣力必藉乎才若孝固徳中所包舉者耳詩不以才徳並稱而重言孝者盖才徳從古無分言者臯陶九徳皆才也八元八凱之才皆徳也言徳而才在其中况孝為百行之首求忠臣必於孝子故舉其重言之耳其先言純嘏福厚而後言得人為則者何與上智者言則直頌之或直規之禹臯益稷諸謨皆是也若上智而下姑先舉其效斯易入而樂從孔子之於哀公亦此意也此詩通體皆頌惟此節正告之後復以車馬之盛諷之以見人君本有得賢之資但患不求耳成王賢主也而召公規之若此可謂善成其君者夫子所以列之於雅歟詩經有馮有翼有孝有徳以引以翼豈弟君子四方為則檢討臣周孔從朱子曰馮謂可為依者翼謂可為輔者孝謂能事親者徳謂得於己者引導其前也翼相其左右也言得賢以自輔如此則其徳日修而四方以為則矣臣謹按卷阿之詩其前所敷陳者既極夀考福禄之盛而此章歸本之論不外用賢以修徳盖徳為致福之原而賢為修徳之助人君所宜加意也今夫人之賢行至不一矣以其適於用者而言謂之馮翼以其本於心者而言謂之孝徳吕祖謙曰賢者之行非一端必曰有孝有徳者人主常與慈祥篤實之人處自有以興起善端涵養徳性是即以孝徳為可馮翼之人也然分而論之忠諒可託心膂馮也才猷可任股肱翼也善事其親斯有移忠之心有得於心斯具正物之學孝與徳也宋劉摯有云人才難得能否不一性忠實而才識有餘上也才識不逮而忠實有餘次也是馮翼孝徳各有可見之行即各有奏效之實特患不舉而用之或淪棄於草野或沉浮於下位雖有翼為明聴之能亦莫由自表著耳以此知有之云者非任其有於下乃歸其有於上也有之則必以為引焉更必以為翼焉引者資其開導所謂示我周行引君當道也翼者資其賛助所謂股肱惟人左右厥辟也夫人主繼天立極法天行健廣厦之間細㫋之上所為朝乾乾而夕惕若者固自有懋昭厥徳之功非外假於臣鄰然要惟不自恃其聰明而廣求乎賢哲使輔弼無非正人啟沃盡屬良佐斯君徳修而皇極建明哲所以作則也其總歸之豈弟君子者何也盖仁者天地生物之心也人君有豈弟之徳又得賢人為之輔佐以培養其仁厚之基推廣其仁愛之澤斯足副天地生物之心所以表儀型而作四方之則者在是所以承天眷而膺諸福之祥者亦在是矣可見人君莫要於修徳修徳莫要於用賢詩之頌文王者既述疏附先後奔奏禦侮以徴濟濟多士之盛而召康公復舉馮翼孝徳勸勉成王則求賢自輔洵君天下者之要務哉詩經豈弟君子四方為則監察御史臣劉方藹朱子曰言得賢以自輔如此則其徳日修而四方以為則矣乃所以致福禄之由也臣謹按先儒謂治天下有則是聖王之所以範圍天下天下之所以受治於聖王者歸於則焉已矣自性命之㣲以及倫常之大制度品節之詳莫不各有不易之矩焉皆所謂則也盖有物有則者君子與四方所同得於天者也順帝之則君子所以法天有典有則君子所以法祖明哲作則君子所以修身式和民則君子所以宜民以斯知則之難言而為則之不易君子不知何如進徳修業而始得此於民也且夫水不能自為方圓而方圓一視乎盂草不能自為起伏而起伏一視乎風君子於四方分相維也勢相統也情相屬也性相感也其所以凖繩規矩乎四方者一視乎君子而况四方之廣四方之人之衆風氣異宜質文異尚將使之一道同風羣歸天則而欲君子以一人之心思耳目為之普徧周詳勢固有所不能而力亦有所不給是所頼衆君子之羣䇿羣力宣上之徳達下之情共成一君子之豈弟使四方之人莫不各有一豈弟君子在其心目中作之君作之師漸磨以仁義陶淑以禮樂修其敎不易其俗齊其政不易其宜使之遵道遵路而國不異政家不殊俗也由是知先公之酋皆為則中之積徳累仁也百神爾主皆為則中之上下皆有嘉徳以薦馨香也純嘏爾常皆為則中之天不愛道地不愛寳人不愛情也凡四方之是則是傚者莫不以豈弟之心為心以君子之品為品則在性命而徧為爾徳也則在倫常而五典克從也則在制度品節而是訓是行四達不悖也豈不盛哉則夫豈弟君子之所以必求衆君子列於庶位以廣馮翼孝徳於四方者端為維民之則重焉爾詩經鳯凰于飛翽翽其羽亦集爰止藹藹王多吉士維君子使媚于天子鳯凰于飛翽翽其羽亦傅于天藹藹王多吉人維君子命媚于庶人編修臣張湄朱子曰媚順愛也謝枋得曰媚于天子愛君也媚于庶人為王愛其民也輔廣曰此因時鳯凰之至而以興賢者之来集也維君子使命謂委命於君一聴其使令也媚于天子見賢者無勉强不得已之意媚于庶人見賢者有維持浹洽之徳臣謹按人臣之事君也為上為徳為下為民其獻可替否而不容委蛇者道主乎敬其協恭和衷而無所矯拂者心主乎愛敬非愛則矜或至於争而愛非敬則羣必流於黨故媚之為言愛也人皆知之而朱子必訓曰順愛凡以情之無當於理者不得為順順愛云者盖本敬之道以行其愛之心者也以是言媚則媚于天子而上交不謟矣媚于庶人而下交不凟矣媚天子者愛君如愛父不獨將順為愛即有時匡救亦愛也媚庶人者愛民如愛子不獨戒休為愛即有時董威亦愛也非然則婦寺之愛姑息之愛其為不敬莫大乎是豈馮翼孝徳之人所敢出此哉且夫君者民之心民者君之體而使吾君與吾民上下歡欣交通於無間者多士引翼之力也是故欲媚於天子未有不媚庶人而能媚庶人即所以媚天子其在書曰惟尹躬克左右厥辟宅師此以媚天子者媚庶人也其在詩曰柔逺能邇以定我王此以媚庶人者媚天子也然而媚天子者維君子使媚庶人者亦維君子命所謂奉揚仁風宣布徳意人臣之道不過如地之順承乎天而已地順承乎天乾坤所以成泰交臣共令乎君明良所以稱一徳在昔虞廷賡喜起鳯凰来儀周室盈太和鳴鳯在郊志壹則動氣觀物類之感召而知卷阿之咏與簫韶之奏後先嫓美若出一轍者信乎其在君臣之際也詩經鳯凰鳴矣于彼髙岡梧桐生矣于彼朝陽菶菶萋萋雝雝喈喈編修臣諸錦毛萇傳云梧桐柔木也山東曰朝陽梧桐不生山岡太平而後生朝陽臣竭其力則地極其化天下和洽則鳯凰樂徳鄭元箋云鳯凰鳴於山脊之上者居髙視下觀可集止喻賢者待禮乃行翔而後集梧桐生者猶聖君出也生於朝陽者被温仁之氣亦君徳也鳯凰之性非梧桐不棲非竹實不食菶菶萋萋喻君徳盛也雝雝喈喈喻民臣和協也臣謹按雝雝喈喈紀一時之鳯鳴如此以為和也析言鳯凰為二統之則鳯凰一也王充必舉禮記瑞應篇以相難雄者曰鳯雌曰凰雄鳴曰即即雌鳴曰足足此聲異也聲審則形不同使審同詩與禮異世傳鳯凰之鳴故將疑焉然荀子又云鳯凰秋秋其翼若干其聲若簫有鳯有凰樂帝之心矣是秋秋并鳯凰而言之也鄭箋善矣王充所見殊細又此詩為召公所作與尚書君奭篇相表裏周公曰耉造徳不降我則鳴鳥不聞矧曰其有能格又曰天休滋至惟時二人弗戡其汝克敬徳明我俊民在讓後人於丕時是即下章車馬招賢之意盖自虞廷来儀之後閱千有餘年乃得有此天休實係非常之瑞得賢人以釀成太和之景運此老臣經國太平長久之深衷非徒為忻幸承奉之詞也毛鄭兩家之外朱子未暢其㫖故發明之詩經詢于芻蕘監察御史臣叢洞臣謹按聖人經綸天地所以明察於倫物而貫徹乎天人者惟其神靈之哲燭照於無外亦惟其虚謙之懐諮訪於不遺也盖恒人以一己之知識為知識聖人以天下之聰明為聰明極天下知能之理合而歸諸聖人廣大之天而諮諏諮謀至不遺於匹夫匹婦之㣲則聖人之所取者愈廣而所通者愈㣲此先民所以有詢于芻蕘之言也稽古帝王明目達聰嘉言罔攸伏一時良弼碩輔以及百僚庶士濟濟賛襄各効忠欵裨益多矣即有時清問下民博採輿論或亦當世之隐人君子出其卓見敬抒一得以備集思廣益之一助至於芻蕘至㣲至陋不過牧豎樵夫者流耳其人非有特識也其所稱道亦可意想而知也而且懇懇焉詢於其人何也今夫㤗山不辭土壤故能成其髙河海不擇細流故能成其深聖人不遺邇言故能成其大昔者禹拜昌言設鐘鼓鞀鐸以来四方之士衞武公髦而好學日求助於國人是以自古聖帝明王之廷雖瞽師工賈皆得脩其職事而納其忠欵誠以天生蒸民均有恒性不識不知亦順帝則芻蕘雖賤亦秉彛之人耳其心未必遂無知覺也其日用飲食之質所得行而著習而察者未必其盡夢夢也夫天命之真無物不體淺近之迹至道所存芻蕘者誠未堪以致其廣大而盡其精㣲而一物之所利一事之所宜得於父老之傳聞而成於技業之熟習意境親切之致有時聞人達士所不到者或為山叟野老之所悉以為芻蕘而忽之竊恐勤懇訪道之心已有及有不及矣是以先民之詢非必滯於芻蕘也而自不遺乎芻蕘盖天下理道之所寄以盛滿之懐視之則無深之非淺以虚謙之懐取之又無淺之非深自芻蕘而集之由芻蕘而通之無貴賤無小大其聞見皆足以相益其心思皆足以相資大其心以體天下之道即虚其衷以求天下之言大舜執兩用中而孜孜於邇言之察者此物此志也詩經訏謨定命逺猶辰告監察御史臣髙景蕃朱善曰謨之訏猶之逺自綱領上說所以立一代之規模者也命之定告之辰所以為一時之政事者也臣謹按自昔聖帝明王之致治也必以可大可久者立一代之紀綱而後能聫四海為一家貞萬年於一日而要其發號施令之際則又非茍焉而已盖二三非所以集事怠忽非所以圖功惟人主徳行備於厥躬則精神直貫於事後念慮常燭於㡬先其措之政令間者既一成而不易亦當可之謂時而游移叢脞之習舉不足以中之斯以成可大可久之業而無難也何則徳見為謨上自朝廷而下行草野類非一身一家之計也億兆之生靈繫焉徳見為猷肇自創始而迄於垂成更非一朝一夕之計也百世之丕基裕焉此豈猶夫近功淺效者可以茍且遷就於其間耶必也體父乾母坤之義而為經世宰物之圖本朝乾夕惕之衷而為必世百年之慮利所在與天下共興之即為萬世開太平害所在與天下共革之即為萬世杜隐禍訏謨也逺猶也詎不足以立一代之紀綱哉顧三代以下非無英君察后規模宏逺亦自有孜孜求治之想而徳行未純其始無審度之能其後有紛更之擾抑或倦勤中止無肫懇誠至之思以告誡於宫府内外間豈古聖王勵精圖治無逸艱難之意也哉夫所謀既大則號令自不得輕發一令而朝行夕改不能訏謨者也所謀既逺則丁寜不得不切令不時而坐失機宜不能逺猶者也其在書曰俾萬姓咸曰大哉王言又曰一哉王心斯定命之謂也易曰随風巽君子以申命行事又非辰告之意也與衞武公以此自儆所由内自庭除之近外及蠻方之逺細而寢興灑掃大而車馬戎兵必至此而慮無不周備無不飭也庶㡬哉聖人不泄邇不忘逺之盛心矣詩經相在爾室尚不愧于屋漏監察御史臣馮鈐臣謹按天下有可潛之形而必無可諱之心人心有自弛之境而斷無自昧之良大廷廣衆天下屬耳目也幽獨隐㣲寸衷所黙喻也地則有分理無二致使岐而視之而心之縁以為敬肆邪正者又何可窮極哉衆著之頃畏指摘獨處之餘無糾虔將易一境以㣲窺逾一時而遞變向之儼然動罔不臧者静而證焉直有前後若出兩人者矣是苐知檢㸃於昭昭之節而未嘗警惕於冥冥之脩共覩共聞之地文飾有餘不覩不聞之㑹操持不足若此者縱能逃乎物議能無愧於屋漏耶性理觀物内篇謂人之善惡形於言發於行人始得而知之但萌諸心發於慮鬼神已得而知之矣又云人之神即天地之神人之自欺所以欺天地可不慎乎爾室之中正工夫喫𦂳之際故一舉念必凛其念之所從来無論不善之念不可以告人不可以盟心為有愧也即本屬善念或一時有為而為有激而然斯世即無從斥其隐而返觀内省遽詡詡然自信其為善可乎由是思愧愧正多矣夫人非聖人亦安能渾然天理念慮之間有善無不善哉要其隐隐自持以矢諸旦明者不可不常存此愧心也故詩不曰無愧而曰尚不愧者誠以知所愧或庶㡬可以無愧茍不知所愧勢且憧擾於中形役於外可愧之端日益積知愧之天日益漓久而汨其本真彼其獨居爾室固未嘗不俯仰泰然然而臨之在上質之在旁試三復於詩詞其又何以自安十目十手指視維嚴虎尾春冰箴䂓倍切古之人勲業隆天壤而衾影實凛四知大節在千秋而冰淵祗存方寸固有確見乎心之不可出入而理之斷難寛假也書曰無載爾偽作徳心逸日休作偽心勞日拙易曰君子終日乾乾夕惕若禮曰執虚如執盈入虚如有人自昔聖賢收斂身心鞭辟入裏特多方著為𦂳切之語垂誡後人言各有倫而有脊理固同條而共貫焉耳御覽經史講義卷十八
