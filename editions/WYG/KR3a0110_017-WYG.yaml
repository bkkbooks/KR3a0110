front:
  text: 欽定四庫全書御覽經史講義卷十一目録
  hash: sha256:99d1763b874dd1949a1536be506e41823207bfbdfe616e2085203179d2d0655e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_017-1a, image: WYG0722/WYG0722-0156a.png}
body:
  text: 書經臣哉鄰哉鄰哉臣哉侍讀臣蔡揚宗檢討臣陳世烈予欲左右有民汝翼予欲宣力四方汝為編修臣何其睿予違汝弼汝無面從退有後言欽四鄰編修臣雷鋐帝庸作歌曰勅天之命惟時惟㡬乃歌曰股肱喜哉元首起哉百工熙哉臯陶拜手稽首颺言曰念哉率作興事愼乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事墮哉帝拜曰俞往欽哉檢討臣伊興阿監察御史臣歐堪善帝庸作歌曰勅天之命惟時惟㡬編修臣朱桓勅天之命惟時惟㡬乃歌曰股肱喜哉元首起哉百工熙哉監察御史臣徐以升勅天之命惟時惟㡬左中允臣于敏中監察御史臣張湄臯陶拜手稽首颺言曰念哉率作興事愼乃憲欽哉屢省乃成欽哉編修臣秦勇均元首明哉股肱良哉庶事康哉右中允臣于振祗台徳先不距朕行監察御史臣李㥳惟王不邇聲色不殖貨利徳懋懋官功懋懋賞用人惟已改過不吝克寛克仁彰信兆民侍講臣任啟運侍講臣張映辰克寛克仁編修臣熊暉吉王懋昭大徳建中于民以義制事以禮制心垂裕後昆編修臣沈文鎬建中于民以義制事以禮制心監察御史臣薛澂建中于民監察御史臣葛峻起以義制事以禮制心編修臣杜若拙編修臣李龍官好問則裕自用則小監察御史臣李清芳好問則裕監察御史臣張孝挰湯誥曰惟皇上帝降衷于下民若有恒性克綏厥猷惟后仲虺之誥曰惟天生民有欲無主乃亂惟天生聰明時乂秦誓曰惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母洪範王訪于箕子曰惟天陰隲下民相協厥居我不知其彛倫攸叙侍講臣于振惟皇上帝降衷于下民若有恒性克綏厥猷惟后侍讀臣周玉章惟皇上帝降衷于下民若有恒性監察御史臣柴潮生立愛惟親立敬惟長始于家邦終于四海侍讀臣赫瞻無輕民事惟難無安厥位惟危監察御史臣熊學鵬有言逆于汝心必求諸道有言遜于汝志必求諸非道編修臣葉酉臣罔以寵利居成功監察御史臣李清芳終始惟一時乃日新侍讀學士臣吕熾修撰臣于敏中任官惟賢才左右惟其人臣為上為徳為下為民其難其愼惟和惟一監察御史臣郭石渠監察御史臣陸尹耀臣為上為徳為下為民編修臣蔣元益監察御史臣沈廷芳
