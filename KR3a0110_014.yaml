front:
  text: 欽定四庫全書御覽經史講義卷八目録
  hash: sha256:b6aabf5aedd37f19c3cb7aa4eba5be6940936161275658ae409b251aecf0f25b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_014-1a, image: WYG0722/WYG0722-0149a.png}
body:
  text: 周易天尊地卑乾坤定矣卑高以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣檢討臣陳兆崙乾知大始坤作成物乾以易知坤以簡能監察御史臣嚴源燾乾以易知坤以簡能編修臣萬承蒼編修臣潘安禮易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業監察御史臣吳文煥易簡而天下之理得矣天下之理得而成位乎其中矣諭德臣覺羅蘇岱易簡而天下之理得矣編修臣潘安禮與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛監察御史臣柴潮生繼之者善也成之者性也檢討臣達麟圖檢討臣周長發富有之謂大業日新之謂盛德諭德臣覺羅蘇岱易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門編修臣秦鐄夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地編修臣積善成性存存道義之門監察御史臣書昌子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不愼乎贊善臣桐保君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也監察御史臣邱玖華易無思也無為也寂然不動感而遂通天下之故蓍之德圓而神卦之德方以知六爻之義易以貢聖人以此洗心退藏於密編修臣秦蕙田易有太極是生兩儀監察御史臣張漢河出圖洛出書聖人則之編修臣沈榮仁河出圖洛出書給事中臣盧秉純化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行監察御史臣柴潮生天下之動貞夫一者也編修臣吳兆雯天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義中允臣任啓運通其變使民不倦神而化之使民宜之編修臣邵齊燾上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬檢討臣韓彥曽精義入神以致用也監察御史臣倪國璉窮神知化德之盛也監察御史臣儲遂咸速也恆久也編修臣王際華
