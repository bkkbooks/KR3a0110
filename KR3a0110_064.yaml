body:
  text: 史魏文侯與羣臣飲酒樂而天雨命駕將適野左右曰今日飲酒樂天又雨君將安之文侯曰吾與虞人期獵雖樂豈可無一㑹期哉乃往身自罷之編修臣周煌臣謹按君國子民莫大於信信者帝王之所以動天地而通鬼神也易中孚之彖曰柔在內而剛得中蓋為卦兑下巽上二陰在內四陽在外而二五之陽皆得其中又下說以應上上巽以順下皆中孚之義也夫人言信而不折衷諸義烏覩所謂剛柔互濟中正無弊者乎魏文侯期獵一事論者以與齊桓不背曹沫之盟晉文不貪伐原之利同稱似已當戰國時霸者之餘習競以功利權術相尚如兹之重然諾矜意氣能布其心腹於民誰得而少之者獨恨其未聞君子之大道耳然則以其與虞人獵而遽短之歟曰非此之謂春搜夏苗秋獮冬狩古志之矣於文侯何譏其謂既期獵矣何復與羣臣飲也計一日之中沉湎者半畋遊者亦半師保厠其間輿臺亦厠其間可知其飲也非蓼蕭湛露之風即其獵也無農隙講武之意且古者天子出必警蹕諸侯不侔天子而辟除行人固有定制况王言如絲其出如綸王言如綸其出如綍期獵雖細事也亦關號令何至左右不知必待命駕之頃而始問其所之哉夫樂行無度而令出何門臣未見其能師古也蓋嘗歌衛風矣靈雨既零命彼倌人星言夙駕說于桑田美文公也獵之期既不大於農事而天之雨何不憐及倌人是罷之宜亟縱不親往不為食言必如文侯所為將虞人既有守候雨立之苦而從行者復不免於沾濡欲全信而反以賊恩有是理乎惜其時之左右但曰飲酒樂也天又雨也見其近不見其逺規其小不規其大遂使文侯㑹期之言似直於左右而人不能屈也唐紀髙宗出畋遇雨問諫議大夫谷那律曰油衣若為則不漏對曰以瓦為之必不漏上悅為之罷獵以故永徽之政有貞觀之遺風設使魏之臣有善對如谷那律者文侯何以待之遽罷則踐言之義乖必往則聽諫之意悖孰得孰失何去何從君子必有道以處此矣臣故謂文侯之信似也而未善也夫信亦何常唯義所在審於義之可否而利害不得以動其心慎始乃所以圖終也不出乎此而但信之云則一尾生猶能之奈何千乘之主而以不克踐約為慮哉文侯者令辟也尊師取友則有卜子夏段干木其人置相求才則有魏成樂羊吳起其人從諫納忠則有任座翟璜田子方其人史於其事不絶書獨期獵一節何取焉夫不合於君子之大道者未足以埀訓也是不可以不辨史文帝每朝郎從官上書疏未嘗不止輦受其言言不可用置之言可用采之未嘗不稱善監察御史臣胡定臣謹按此即袁盎說申屠嘉之言史記漢書俱載袁盎傳司馬光作通鑑始采斯語入紀於以歎通鑑之書雖遷固有不及其精當者矣為君之德何以加於虛懷採納乎哉大舜之聖也曰稽於衆舍己從人文王之聖也曰亦惟純佑秉德迪知天威乃惟時昭文王是惟能取善於人乃所以為聖也昔漢文帝盛德深仁為成康以後所僅見然其致斯美善亦曰虛懷採納而已即位之初即下賢良方正之詔求極言敢諫之士既又除去誹謗之條以廣聰明之路雖懸鞀設鐸置鼓建旌無以過之是以羣賢咸升嘉謨畢獻用贊德化於醇和登風俗於刑措也今由史傳考之以賈誼言崇重農桑禮待臣下以張釋之言不擢嗇夫不改廷尉奏當以鼂錯言募民徙塞下賜民田租以緹縈言詔罷肉刑以賈山言燕遊有節以袁盎言慎夫人却坐趙談退避下車其彰彰較著已有不可枚舉者然則當日聽納之虛懷或朝奏而夕報可或面對而無章疏為史臣所未記者又豈少乎哉即如止輦聽言非袁盎過為此溢美之詞張釋之馮唐二傳可證矣釋之補謁者既朝畢因前言便宜事言秦所以失漢所以興文帝稱善唐為郎中署長帝輦過問唐曰父老何自為郎家安在及唐言廉頗李牧事遂赦魏尚復以為雲中守是帝之視郎從官也不啻家人父子之歡其求言也不啻饑渴之切而其用言又不啻轉圜之易也語曰泰山不辭土壤以成其髙河海不辭細流以成其大充是志也與大舜文王比隆可也史上登虎圈問上林尉禽獸簿十餘問尉左右視盡不能對虎圈嗇夫從旁代尉對上所問禽獸簿甚悉欲以觀其能口對響應無窮者文帝曰吏不當如此耶尉亡賴詔釋之拜嗇夫為上林令釋之前曰陛下以絳侯周勃何如人也上曰長者又復問東陽侯張相如何如人也上復曰長者釋之曰夫絳侯東陽侯稱為長者兩人言事曽不能出口豈效此嗇夫喋喋利口捷給哉且秦以任刀筆之吏爭以亟疾苛察相髙其敝徒具文亡惻隱之實故不聞其過陵夷至於二世天下土崩今陛下以嗇夫口辨而超遷之臣恐天下隨風靡爭口辨亡其實且上之化下疾於景響舉錯不可不察也文帝曰善乃止不拜嗇夫修撰臣莊有恭臣謹按朱子之言曰一日立乎其位則一日業乎其官雖位有尊卑官分小大而不可曠官尸位之理則固未嘗以或殊彼虎圈嗇夫亦有禽獸簿之責者口對響應非越俎而代庖則文帝官之未為過舉未為僭賞也而釋之獨以為不可且引周勃張相如以問上信如釋之言則凡居位者將闒茸昏耄緘口結舌如所謂尸厥官罔聞知者而後可耶且上林尉亦安得與周勃張相如比哉周張大臣也弼教化燮陰陽任大責重則問以決獄幾何不能對問以錢穀幾何不能對謂其厚重少文可以挽頺風而厲末俗猶可言也彼上林尉者苑囿之外無餘事矣而禽獸簿又非甚煩賾僻隱不可遽悉之事也乃至十餘問而不能對曽是嗇夫之不若耶顯示黜陟而超遷之尉亦應沒齒無怨也而釋之獨為極論至令天子欲拜一令而不得噫釋之過矣且不遇文帝釋之亦危矣然臣竊迹其事而窺釋之之用心覺所以處嗇夫者雖疑於過當而立論則固有足取也蓋聖人舉事亦不能必流弊之必無要在預審其重輕以定吾取舍則其後庶不至决裂而不可以救故效周張而有失其弊為廢弛為庸懦善治病者為之疏積滯束筋骸則元氣復而弱可使强效嗇夫而太過將務為巧言爭為苛察謂口舌可以得官肆戈矛而工行詐則其患乃流為風俗深中乎人心而莫可勝言譬之真精淪喪元氣全漓者外彊中乾雖扁鵲無能施其技也古之帝王豈不知持重迂緩者之無以動人刻核便給者之可以集事哉而周詳審慎寧捨彼而取此者蓋亦早見其幾而深識其流弊矣孔子告哀公取人之法曰無取捷捷無取鉗鉗無取啍啍而繼之曰士必慤而後求知能者焉夫固猶此志也且夫爵者上所擅以厲世磨鈍之具也視之輕則得之者易人將妄生僥幸之心矣視之重則得之者難人各自安職守之常矣風行而草偃形動則影隨得不在大失不在小是所望於明者之見微知著也故使嗇夫當日帝問及而具對宜也問而優以金帛亦可也乃彼方欲炫其能而帝適以濟其欲則墮術而長僞宜釋之之固執矣臣嘗即此而充類論之賢否之於國家跡疑似而心懸殊同一事也出於忠愛者陳治績冀以紓主憂持大體思以維國是而覬覦之徒好苛察以示精明恃便佞以為諳練藉邀君寵總為身謀此皆嗇夫之流亡惻隱之實為釋之之所不取者也君子觀於循吏傳王成治甚有聲而僞增户口以䝉顯賞致俗吏多為虛名而釋之之思深慮逺也益信史漢文帝前三年上行出中渭橋有一人從橋下走乘輿馬驚捕屬廷尉張釋之奏以此人犯蹕當罰金上怒曰此人親驚吾馬馬賴和柔令他馬固不敗傷我乎而廷尉乃當之罰金釋之曰法者天子所與天下公共也今法如是更重之是法不信於民也且方其時上使使誅之則已今己下廷尉廷尉天下之平也一傾天下用法皆為之輕重民安所措其手足上曰廷尉當是也其後有盜髙廟坐前玉環得下廷尉治釋之奏當棄市上大怒曰人無道盜先帝器吾欲致之族而君以法奏之非吾所以共承社稷宗廟意也釋之免冠頓首謝曰法如是足也今盜宗廟器而族之假令愚民取長陵一抔土陛下且何以加其法乎帝乃白太后許之唐太宗貞觀元年上以選人多詐冒資蔭敕令自首不首者死未幾有詐冒事覺者上欲殺之戴胄奏據法應流上怒曰卿欲守法而使朕失信乎對曰敕者出於一時之喜怒法者國家所以布大信於天下也陛下忿選人之多詐故欲殺之既而知其不可復斷之以法此乃忍小忿而存大信也上曰卿能執法朕復何憂監察御史臣王興吾臣謹按三代以後史稱化行俗美幾於刑措不用者漢之文帝唐之太宗也而通鑑於文帝之前三年則記其以張釋之為廷尉而詳其執法之平於貞觀之元年則記其以戴胄為大理而載其議選人冒蔭一事以為當時之用法公當如此所以能致其盛也夫文帝於元年時朝而問丞相以一嵗斷獄幾何史稱其明習國家事而太宗則又撥亂反正之主也其於刑賞之道久已瞭然於胸中矣此而欲更定讞詞豈真任一時之喜怒以為輕重哉誠以乘輿至重馬驚有不測之虞宗廟至嚴盜器為不敬之大選人資蔭詐冒已非違詔遂過幾於冥頑而不畏死矣其情皆有甚可惡而法不足以蔽其辜故欲重之以示懲創耳是亦治天下者之用權而未可遽以為非也使當時釋之不知諫戴胄不知詳加之以族而置之於死天下似亦未必即以為寃後世史臣亦未便即以此為刑政之失而為二帝之纍而二臣爭之如此其力一則曰法者天子與天下公共者也法如是足也一則曰法者國家所以布大信於天下者也斷之以法此乃忍小忿而存大信也觀其意若稍有改易而不可者何哉豈不以國家之法輕重自有定衡斷决各有應得由笞而杖而徒流以至絞斬其中所以輕所以重皆有確乎不可易之理故同一事而輕重攸分同一人而前後各斷皆有一定之情形而不可少為變動也耶夫就一事而論之似乎可以輕而法疑過重者有之似乎可以重而法反輕者亦有之逮乎㑹其前後左右而論定之而後知其輕重各當茍即一事之情形隨而輕重其間則此事似乎平允及統而觀之則不失之於輕即失之於重輕則侵輕者之條使情輕乎此者與之同科而情輕者寃矣重則冒重者之罪使情重乎此者與之同科而情重者縱矣况乎重法以懲奸而奸未必即止曷若平情以執法而法立而不可犯是以治天下者貴於執法而不貴於變法也夫獄者天下之大命法者治天下之大道古來明哲之君勵精圗治者孰不以此為首務而深思而力究之然惟明哲之君而執法更難何則人主之斷獄也獄成而上之人主受而聽之亦就其事以察其當否耳未嘗統其類而觀之也其中奏讞不當者無論矣其有事出兩可而人主出一時之意見發明㫖以示臣下臣下見主上之明聖如此其所指示又如此則惟有奉命以行惶懼恐後而已求其執法而廷諍如二臣者蓋亦寡矣於是意見少偏而法因之輕重故臣以為執法難而執法於明聖之朝尤難惟文帝太宗能不自見其是而以法公之天下寧屈己以從法而不屈法以從己是以刑政和平民興禮樂幾於刑措也猗歟盛哉史錯言於漢文帝曰聖王在上而民不凍饑者非能耕而食之織而衣之也為開其資財之道也故堯禹有九年之水湯有七年之旱而國無捐瘠者以畜積多而備先具也監察御史臣徐以升真德秀曰安飬斯民之政在開其資財之道開資財有道在墾田土通山澤使地無遺利禁遊民興農桑使民無遺力如此則畜積多矣雖有天災數年之水旱而所以為之備者具之有素安能為吾民患哉臣謹按從來備荒之要首言積貯積貯之法始於李悝之平糶耿壽昌之常平長孫平之義倉朱子之社倉而轉移補救諸法因之滋起後之司民牧者止以積貯為備荒之要務所謂開財之道反若視為緩圗殊不知王制耕三餘一耕九餘三以三十年之通制國用備荒者莫先於此要亦就每年之所入為之制節謹度量入為出委積之政掌於遺人日積月纍以至有備非以先時之所賤濟後時之所貴亦非以此地之所盈濟彼地之所絀惟開財之道得耳其所謂開財之道仍不外乎懇田土通山澤禁遊民興農業諸大端大端既得則財源日開雖有水旱於天下大勢固已無患矣若夫時值荒歉則救荒之䇿又不可以不講自周禮十二荒政歷代相沿其法不一要在因時制宜得其輕重緩急蓋師古人者在神明其意不在拘泥其法臣嘗考之往古按之當今救荒之大端約略言之其要有十二焉一曰分被災之輕重天時晴雨不齊地勢髙下有别一郡之內分數固殊一邑之中輕重間異所貴查勘得其均平庶加恩不至倒置一曰别貧富之差等災民固有不貧次貧極貧之分然即極貧之中亦不可槩論强壯之人雖遇歉嵗尚可傭工度日如鰥寡孤獨無告窮民雖遇有年亦賴賑恤所貴詳為區别恩以漸加則老稚不患或遺而經費亦不致過濫一曰酌時勢之緩急古人云救荒當如救焚拯溺此指最急者而言然有似緩實急者地方荒歉偶見目前似可支吾將來必有不給及早維圖則人心鎮定籌畫舒徐胥吏無緣為奸窮民得沾實惠一曰酌賑糶之兼施被災郡縣分數既有重輕次極復有差等或此必須賑而彼止須糶者或先行平糶而後再施賑者二者並行不悖庶區别明而撫綏當一曰賑糶宜計逺近城鄉散處道里不均賑糶設厰須從民便惟在有司不憚煩勞不惜浮費多設厰所委曲就民庶饑餓疲敝之人無守候逺涉之苦所以保護其軀命者為益尤多一曰雜糧必宜參用五穀咸可資生蔬菜尚堪充腹米穀不足恃有雜糧是在身任地方者不拘成例不憚紛繁因地制宜通融接濟不但延一方之命實且濟正項之艱一曰銀米必當兼賑發粟固所以救饑散財亦所以便用或一家數口銀米不妨搭配或一賑纍月錢銀間可兼支茍延殘喘之餘更可蘇他項匱乏一曰籽種急宜早貸春耕秋斂固有常期時雨時暘亦須應候當荒歉之際不獨本年收成無望即來嵗耕種乏資所貴早貸籽粒庶得乘時播種一曰量舉聚貧之工古者每遇荒年則大起工作於興役之中寓賑民之惠誠一舉兩得之道其最宜講者莫如水利朱子曰救荒無他䇿惟在頻興水利所謂水利者非必三江五湖之謂凡陂塘港汊時賴疏通即大禹盡力溝洫之遺意也一曰慎講施粥之法窮民中無棲止不能舉火者甚多其外來流民炊㸑無具者待哺尤急涓勺之施遂救須臾之命伊川程子常言救饑當擇寬廣之處宿戒使辰入至已則闔門不納午而後與之食申而出之日得一食則不死矣又言凡濟饑當分兩處擇羸弱者作稀粥早晚兩給勿使致飽俟氣稍完然後一給第一先營寬廣去處切不得令相藉賑粥之法無踰於此或曰四月以後時屆炎蒸粥易酸饐不拘粞米麥豆磨粉為蒸餅等類照散粥法分給最便一曰廣施救病之藥被災之民易生疾病宋吕公著為相為饘粥湯藥以救疾趙抃知越州為病坊以處病民給以醫藥然地廣人衆勢難盡病者而醫藥之莫如按古成方精製丸藥一二十種隨症領受庶幾便而有益一曰慎擇賢能之吏救災恤民固在督撫司道之得人尤在賢能守令以分任守令之難才能者易涉浮誇誠實者恐近迂濶初任者患不更事須擇才能誠實而又幹練素著者俾任厥事方收實效或不能多得但有數員以總其成亦遂可以倡率各屬使奉以為式此十二條者皆現在常行之事凡備官者咸知之然平時講論不過共曉之陳言臨事施行實為不易之良法司民牧者因時以制之次第以布之雖不盡合乎周禮之遺制而實力奉行則救一時之災荒要亦不外是矣史文帝嘗欲作露臺召匠計之直百金上曰百金中人十家之産也何以臺為檢討臣齊召南顔師古曰今新豐縣南驪山之頂有露臺鄉極為髙顯猶有文帝所欲作露臺之處臣謹按三代以下賢君首推文帝露臺一事宜未足以盡文帝之大然司馬遷班固皆一代良史遷則入於紀中固則綴為贊語後世言主德恭儉者必舉以為盛節臣竊疑之夫文帝所欲作者不過一露臺露臺所直不過百金耳固非如瑶臺璿室章華虒祁之為宏偉壯麗也漢興除秦之弊與民休息計自髙帝使蕭何營建未央長樂惠帝時城築長安其外工作罕見至於文帝宫室苑囿無所增益蓋漢之節用愛民為日久矣况帝以德化民致海內殷富興於禮義庶幾刑措之風使及此時詔有司規勝地以農隙餘閒繕治離宫別館用大府貫朽之錢食太倉紅腐之粟率其醇厚之民為太平遊觀之具雖文王之作靈臺歌子來而成不日不是過也區區百金遂足為天下重輕而區區露臺一作遂足為帝德之纍乎哉及臣讀武帝紀及諸志傳而後知文帝為不可及也武帝以雄才大略招徠賢俊興造制度外拓邊境內侈遊觀使吾邱壽王舉阿城以南盩厔以東宜春以西除以為上林苑後又以楊可告緡上林財物充滿乃穿昆池飾館舍營千門萬户之宫立神明通天之臺土木雕鏤窮工極巧時非無直言之臣如東方朔者也徒以地償百姓非奪民産錢給水衡非用民財故毅然為之不復計及勞費然後世言治者則不免以此為譏又或持論過甚乃至比於秦皇書曰不矜細行終纍大德此之謂也文帝所欲作者露臺露臺所直百金耳藉令果作大臣如絳灌曲逆故安名臣如賈誼張釋之賈山輩亦必謂事無可議而帝不待再計默然中止露臺且不作况有什百倍於露臺者乎百金且不忍况有千萬倍於百金者乎為百姓計則雖蠲除天下之租半租全曽不為少吝為遊觀計則雖以百金之露臺意欲作而不果儉之至仁之至也抑臣讀師古注而有感焉秦以後宫室苑囿之盛莫如武帝司馬相如班固張衡所賦三輔黃圖西京雜記所書其為宏偉壯麗之觀至今猶可想見然欲詢其遺址縱復巨如建章髙如井幹廣大如海上三神山皆已莫知其地而所謂文帝欲作露臺之處當時並無營建後世猶羡慕之曰此即新豐驪山之露臺鄉也斯豈非恭儉之盛德有以垂於千古而不朽也哉史董仲舒曰天道之大者在陰陽陽為德陰為刑刑主殺而德主生是故陽常居大夏而以生育長飬為事陰常居大冬而積於空虛不用之處以此見天之任德不任刑也天使陽出布施於上而主嵗功使陰入伏於下而時出佐陽陽不得陰之助亦不能獨成嵗終陽以成嵗為名此天意也王者承天意以從事故任德教而不任刑刑者不可任以治世猶陰之不可任以成嵗也為政而任刑不順於天故先王莫之肯為也監察御史臣宫煥文臣謹按書曰明於五刑以弼五教禮曰禮以道其志樂以和其聲政以一其行刑以防其姦禮樂政刑其極一也所以同民心而出治道也由此觀之先王之治天下有司徒以敷教即有司寇以明刑為之禮以次其先後樂以宣其湮鬱政以率其怠倦即為之刑以除其强梗道固相輔而行不可以偏舉偏廢者仲舒稱漢醇儒尤邃於春秋春秋之法善者賞之惡者罰之其賞善也人謂一字之褒榮於華衮其罰惡也人謂一字之貶嚴於斧鉞亦未嘗專主化導而科條約束可一切廢去也顧仲舒對䇿問諄諄於任德不任刑一言推本於天道陰陽謂陽為德主生故常居大夏以生育長飬為事陰為刑主殺故常居大冬而積於空虛不用之地夫乾之四德元亨以為通利貞以為復如環無端周而復始其功同歸於生物故不特資始流行為生而各正保合亦為生乾元所由獨稱大也仲舒儒者其不究及此義而極言刑不可任其說似有所畸重者今夫人主致治之具一也能善用之則法令滋嚴而民亦受其福不善用之則紀綱徒廢而民轉益其辜人臣之進說於君亦一也其為無所為而言則統論治理語必徹始以徹終其為有所因而發則救弊補偏法先去泰而去甚是不可一格拘也臣竊考漢自髙祖約法三章文帝承以寬大國家元氣深賴培飬及景帝之世恩詔屢下論者猶謂其刻薄任數蓋酷吏稍用事矣武帝繼體孝景為人英明果斷今觀其後張湯趙禹主父偃之屬相繼柄用度其即位之初性情流露必有偏於英武純任擊斷之憂將駿厲嚴肅之意多愷悌慈祥之意少下之人承望風㫖弊不至武健嚴酷如史遷所稱吏治若救火揚沸不止矣仲舒因時納誨慮其弊之將至於此而先事以遏之其稱天以好生之德導君以欽恤之恩於古人刑期無刑之本意未始不隱隱有合也獨其言陰空虛不用及陰不可任以成嵗義似未備然為武帝言欲其專務任德以生育長飬為心必先去其泰甚與統論治理不同不可一格拘也藉使泥仲舒言極其流弊慕刑措之虛名不顧長姦之後患俾無辜罹毒虐者抱沉寃而莫伸而舞文利賕賄者無國法之可畏不毗於陰矣獨不毗於陽乎夫風雨露雷無之而非教農夫之務去草芟剃藴崇絶其本根勿使能殖亦正為嘉禾地也豈仲舒一代儒者而不究及此歟然則治天下者禮樂刑政闕一不可特於其中分本末先後焉使知刑所以輔吾教之窮而非專任乎是一往以刻核操切為也如是則陽舒陰慘春溫秋肅相輔而並有功天德王道一以貫之矣史武帝問申公治亂之事申公對曰為治者不在多言顧力行何如耳檢討臣齊召南臣謹按武帝承文景之後海內殷富黎庶樂業惟稽古典文之事尚多闕焉嗣位之初即慨然有意於唐虞三代之盛崇重儒術罷黜百家將立明堂以宏制作修禮樂以興太平首用安車蒲輪束帛加璧徵聘申公而問以治道申公大儒宜必有崇論閎議上采往古下覽今世之宜出於尋常計䇿之外敷陳於前以當上心今其言不過曰為治者不在多言顧力行何如耳言似至簡至質於治道全無所發明然臣以為自古論治之切舉未有加於斯言而斯言於武帝尤切之切者也堯舜禹湯文武之治尚書備矣其致治非後世之所能及其言治並非後世之所不能解功德莫盛於典謨約其㫖曰執中迪德慎修知人安民其實也又約其㫖曰欽而已天人理數莫精於洪範約其㫖曰建極修五事以應五行其實也又約其㫖曰敬而已以兢兢業業積為巍巍蕩蕩之隆以亹亹翼翼馴致赫赫明明之頌豈所操有異術哉能力行而已後世英君誼辟勤求理道何嘗不慕效古人而致治逺不古若無他議論多而成功少虛文勝而實事疏或明知而不能行或雖行而不力也說命曰非知之艱行之惟艱以武丁之賢聖猶以是相針勉故曰自古論治之切舉未有加於斯言者也武帝雄材大略超越前古其識見之髙志向之廣雖賢如孝文猶未足以潔量也黃老之學則豈若六經乎百家之言則豈若孔子乎法度因秦之餘則豈若三代乎然以孝文之治較於武帝則躬修節儉思安百姓不過勸趣農桑減省租賦而天下家給人足貫朽於京師粟腐於太倉矣不聞朝設平準均輸之官也若緍錢軺車之算也躬修元默務在寬厚不過選任廷尉罪疑惟輕而化行天下人恥告訐至於囹圄空虛斷獄四百有刑措之風矣不聞有文深周內之吏顯進於公卿也不聞有繡衣直指之使擊斷於郡國也不聞有見知故縱之條禁網加密而猶慮奸宄勿勝也然則力行與不力行之相去顧不甚逺乎哉夫表章六經尊師孔子而效法三代非徒述其語言襲其儀文之謂也固必身體力行而實見於政事而其本在正心其要在寡欲而已汲黯有言內多欲而外施仁義奈何欲效唐虞三代之治乎此拔本塞源之論也董仲舒有言為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方此端本澄源之論也自古人君固有有其志而無其識有其識而無其才有其才而無其時雖欲致治其勢先有所不足若武帝則可謂兼有之矣使其毅然力行內省聲色遊觀之娛旁無佞幸方技之惑外戢窮兵黷武興作禱祠之擾守恭儉而退計臣逺阿諛而任忠直敦教化而寬刑威用其好大喜功之心以專於致治雖以之比隆堯舜禹湯文武不難也豈特優於孝文而已乎故曰斯言於武帝尤切之切者也史上曰古有社禝之臣至如汲黯近之矣編修臣王㑹汾臣謹按國家所以興衰者視乎其君亦視乎其臣人君莫不舉賢以自輔拔才以自衛然尋常驅䇿之才易得而忠直鯁亮之士不恆有也忠直鯁亮者立於朝以精誠為獻替不以文貌為對揚居安則匪躬宣力而蹇諤之效彰遇事則扶危定傾而苞桑之業固宋臣蘇轍有言公卿類多骨鯁則精神足以折衝邊境藉以謐寧而民生賴以康樂故國家不可無社禝臣也願治之主常慨慕乎其人則謂後世人材逺不古若夫天之生材豈有古今之異亦視人主所以長飬之者何如耳十室之邑必有忠信宇內之廣何遂無賢但榮通醜窮者生物之大情趨利避患者中人之恆態惟豪傑有志之士為能不計利害不貪茍得磊落自樹以求無愧乎其心下此則俯仰依違類不免焉故知天下之風俗倡於士大夫而士大夫氣習之汙隆又係乎人主之好尚主好直則忠謇畢升矣主近名則唯諾盈廷矣唯諾之習既成茍且之風漸煽言及乘輿則動色相戒事關民瘼姑隱忍為髙此於臣品固無可言而國家亦何利之有明主誠深思乎此則所以飬士大夫忠直之氣者不可不至矣三代以下漢治最為近古君臣之間匡弼不諱如袁盎之却慎夫人席申屠嘉之摧抑鄧通張釋之之守法不阿朱雲之請劍攀檻此數子者非好攖逆鱗以求名也以身體國不敢狥一時之姑息而欲引君當道也若律以後世尊君卑臣之說數子當在可誅之列而書之良史臣主俱榮然則賢士大夫所以上尊其君父者斷不可以宦官宫妾自為而人主必先有虛懷納諫之心然後能振起諸臣之節槩亦已明矣武帝時汲黯尤號戇直積薪之喻多欲之言有同列不能堪者而帝優容之且尊禮之大將軍可踞厠見至於黯則不冠不見也其後淮南為梗左吳之徒日夜謀議不畏漢廷諸臣而獨畏黯蓋帝之英姿偉識亦預知其材之可以倚任矣黯雖以嚴見憚不得久居禁近然帝始終保護至歎以為社禝臣如此則士大夫誰不以蹇諤自任廉恥既立四維克張風俗成乎下而主勢尊乎上所謂精神足以折衝者不信然哉人材不預飬於平時未易猝求於一旦明主為社禝無窮之計所當擴非常之偉度破一切之拘攣廣開諫諍之門杜塞回邪之路礪世磨鈍鼓舞作興使誠信孚於物而後臣節可敦大化可成也史元光元年令郡國舉孝廉少詹事臣西成臣謹按周禮鄉大夫三年大比考其德行道藝而興賢者能者以禮賔之其未仕者六行以孝為先其既仕者六計以廉為本漢舉孝廉之制其昉諸此乎孝悌之舉始於惠帝孝悌廉吏之賜帛見於文帝之十二年馮唐以孝著為郎可證也至武帝元光元年十一月初令郡國舉孝廉各一人實自董仲舒對䇿發之及元朔元年詔議不舉孝廉之罪若孟喜師丹京房王吉蓋寬饒王駿杜鄴鮑宣並以孝廉為郎龔勝為郡吏三舉孝廉路溫舒劉輔以舉孝廉為丞令得人稱極盛焉及和帝時孝廉計口而舉則從丁鴻之請也陽嘉時孝廉限年而試則由左雄之奏也當是時請託滋彰耆宿見棄孝廉之舉已有謬濫矣魏黃初時始除計口限年之令自晉迄隋孝廉皆以策試唐初遂廢原夫西漢之舉專考德行東漢之舉兼試章句張衡以為捐本求末業已病之自六朝以降一以文辭為去取己不能與兩漢比隆矣又安望賔興之盛典乎臣惟法古先在準今循名必須核實立法步趨古人無如人心不古以孝取人勇者割股怯者廬墓矣以廉取人敝車羸馬惡衣菲食凡可以傾流俗之觀聽者無所不至矣雖曰三代以下之士惟恐不好名好名之人猶愈於蕩檢踰間不知顧惜名節者然騖名之徒競進朴實暗修之士恥與同升朝廷所得率皆務華絶根之人國事卒有緩急若輩豈足倚恃况其勉為孝子廉吏原非出於中心之誠然不過藉是以媒利逹則得志之後必仍露其本來面目羊質虎皮見草則悅僞不可以亂真也筌以求魚得魚忘筌蹄以求兔得兔忘蹄暫不可以持久也而不通於古今之變者猶鰓鰓然以復古之鄉舉里選為美談是慕虛名不求實效也臣愚以為孝廉之舉不必著之為令而但風示以意每遇地方大吏朝覲奏對時詢問其所管境內有孝子廉吏與否如不知者諄切訓諭之令其留心採訪如所治內果有為子孝為吏廉無所為而為之人雖朴質無文願謹無才俱准特疏薦揚加以髙爵厚祿以為四方之勸而有司之舉保得實者亦優豫議叙以昭進賢之賞庶乎懿德之好有所觀感而興起而亦不至於作僞相欺是則善學古人而不泥於古人之糟粕也夫史宣帝拜刺史守相輒親引問觀其所由退而考察所行以質其言有名實不相應必知其所以然常稱曰庶民所以安其田里而無歎息愁恨之心者政平訟理也與我共此者其唯良二千石乎以為太守吏民之本數變易則下不安民知其將久不可欺罔乃服從其教化故二千石有治理效輒以璽書勉厲增秩賜金或爵至關內侯公卿缺則選諸所表以次用之是以漢世循吏於是為盛稱中興焉修撰臣金德瑛臣謹按綜核名實必使言行相符則浮詞飾說不敢妄陳於前西漢循吏之盛由宣帝御之得其道故也當時所任之重而責之嚴者二千石而己任之重故人得以行其志責之嚴故吏不敢容其奸馴至海內富庶蔚然中興不亦宜乎後之太守即二千石也其名同其實稍異古者人法兼用而任人為多一郡之長得以專制其境內由朝廷以下於二千石由二千石以下於百姓更無人焉從中而撓其柄者是以其事直截而易行今則有督撫有司有道層纍而下以及於守令文牘之往返意見之參差固若是其多端也是以雖有亷能類多黽勉於簿書錢穀之間謹慎自飭以求寡過倘遇地方公事如水利隄防之營建旱乾淫潦之興發欲入告而不能欲專斷而不可不免遷延時月以待上吏之指揮其掣肘而不得伸其志者間亦有之矣此豈徒人才難得由文法羈制於防弊之術有餘於興利之道不足也蓋漢之品秩則二千石也其權猶之督撫也今之政事則二千石以下為之者也其權則督撫操之者也是以貪縱者固惟督撫參劾之而循良者必賴督撫成就之彼任封疆者非必其任意行私也或清約自守而不能身擔勞怨或嚴厲操切而不能隨事張弛則下情將阻隔而不盡通必也熟悉全省之利弊深知僚屬之才猷又寬以繩尺然後循良得以自展而治績有成此吏治之機固有不可盡同者歟史漢宣帝嘗稱曰庶民所以安其田里而無歎息愁恨之心者政平訟理也與我共此者其惟良二千石乎監察御史臣陶正靖臣謹按漢循吏之治實足以厚民生而興教化為後世所莫及其故何也蓋自罷侯置守而天子所與共治天下者太守而已其下乃有令令以民情白之守守以聞之天子是天子與民相隔無幾也其後增置節鎮為控制計非為牧飬計至於大官猥多則守令之承事逾難而民情之壅隔愈甚雖有為民請命之吏上司且層纍而遏抑之凶荒待賑往往稽緩訟獄駁結動淹嵗時此吏治之所以不如者一也漢世太守權任最重其兵得自將其僚佐得自辟吏民罪非殊死皆得自決遣茍得其人則千里之內令行禁止盜息民安誠權重之所致也夫權重固易以為非亦易以為功權輕則不能為非亦不易為功其賢者苦心幹濟功不及半其中材則謹自守而文深猾賊之徒倚法為非如故也是謂輕於責功而重於防非此吏治之所以不如者二也漢世遷除之法雖不能詳考諸史傳或縣令徵拜議郎議郎出為太守太守入為公卿階級無多故久任之而不為淹位遇己重故安於職而不萌茍且今士循常調以至太守逺者已數十年鋭精之氣已銷戒得之患己及固無足與共治矣而其超資躐序者又多得巧利捷給之才徒長營競之風無補敦龎之化此吏治之所以不如者三也書曰民惟邦本本固邦寧宣帝又以太守為吏民之本觀于哀平之後而吏民謳吟思漢用啓中興則吏治之明效也夫治外之權固不能不重而假之于節鎮職名尊而統轄廣不免有隔膜之視甚至有尾大之憂此魏晉至唐所以為失也若歸之親民之吏則無慮此此漢制之所以為得也自三代以後享國長久者惟漢唐宋明其為治亦互有得失若以治外之制言臣竊以漢為最近古矣史春三月賜膠東相王成爵關內侯監察御史臣孫灝詔曰膠東相王成勞來不怠流民自占八萬餘口治有異等之效其賜成爵關內侯秩中二千石後詔問郡國上計長史守丞以政令得失或對言前膠東相成僞自增加以䝉顯賞是後俗吏多為虛名云臣謹按王成以勞來流民賜爵而史復云僞增漢書所載綱目仍之由前之言則為循吏之異等由後之言則為俗吏之虛名是二說者將安所折衷耶夫孝宣中興令主垂情治理有名實不相應者必知其所以然何至以巧僞之風加殊異之擢或謂帝褒王成是執一實以御百虛夫上以實求而下以虛應者人心風俗之大憂且未有明料其虛而猶以實之美歸之者也以宣帝之勵精豈肯出此抑考班固書循吏自文翁以下才六人而餘皆不得與焉其嚴若是今成既以僞增見譏則何不遂削之而猶載之也即載之又何不以次他傳而必與循吏諸人大書而特書也又按文翁諸傳叙事特詳而成治效無所見見之詔書而已詔書止勞來流民一事而事涉於僞則烏有循吏而可以僞言者乎然固總序謂所居民冨所去民思庶幾德讓君子之遺風者成與黃霸朱邑等無異辭焉則又何也嘗試思之知人則哲自古為難明足以逺照矣而照或遺於用明之中法足以防欺矣而欺轉生於立法之外以為任人勿疑而不知偏信亦能滋弊以為公聽則廣而不知附和亦有同情夫漢宣之於王成所以勸循良風有位也而反為俗吏導其先聲豈始願所及哉臣故備論之以明觀人之不可不詳者然則班掾何以循吏書也考成傳云治甚有聲宣帝最先褒之意當時任事之勇成獨稱首百姓歌思於下璽書褒美於前䝉紀録之舊文固載筆者之所不敢刪也且成位止膠東相不克大竟其施而招徠流散惠莫厚焉心莫勤焉其曰八萬餘口者縱謂其加少以為多要必非飾無以為有况僞增之嫌其事隱勞來之績其美彰春秋之法善善欲長成之治效即不至八萬餘口而其去八萬餘口之功度亦甚偉矣史安得而削之乎抑尤有說焉名者物之所忌功者謗之所歸宣帝以英敏御羣臣而成獨收異等之效或者流俗猜妬之人因其事之已往聲之太隆羞其治之不彼若而巧詆而陰傷之又事之未可知者也讀本傳或對言前膠東相成云云或之者疑之也疑以傳疑則亦史家之法也臣又並論之以明聽言之不可不察者史孔子曰道之以政齊之以刑民免而無恥道之以德齊之以禮有恥且格信哉是言也法令者治之具而非制治清濁之源也昔天下之網嘗密矣然姦僞萌起其極也上下相遁至於不振當是之時吏治若救火揚沸非武健嚴酷惡能勝其任而愈快乎言道德者溺其職矣漢興破觚而為圜斫雕而為朴網漏於吞舟之魚而吏治蒸蒸不至於姦黎民艾安由是觀之在彼不在此右贊善臣李文鋭臣謹按司馬遷傳酷吏郅都寧成周陽由趙禹張湯義縱王溫舒尹齊楊僕減宣杜周共十一人其武健嚴酷如出一轍上損國家之元氣下朘百姓之脂膏以之牧民欲吏治之良不可得也臣伏思其習為酷吏之由及懷詐飾智以濟其酷者傳中錯綜合叙可為吏治之戒者有四臣謹臚列陳之一曰酷吏以吏起家傳中所載趙禹為佐史張湯為長安吏尹齊以刀筆遷官楊朴以千夫為吏減宣以佐史給事河東守府杜周為廷尉史至義縱攻剽為盜王溫舒椎埋為姦皆盜賊也惟郅都寧成周陽由文景時已任為郎蓋漢承秦制崇尚法律以吏為師為郎者半從吏始夫吏胥者深文巧詆其居心也舞文黷貨其長技也茍為大僚操下如束濕薪必喜苛虐之吏凡忠信之長慈惠之師皆目為迂濶不任事茍為守令其治如狼牧羊安可治民漢初刀筆郎吏往往積勞為九卿多不學無術深刻峻急董仲舒久知其弊故其對䇿謂郎吏未必賢使列侯郡守各擇其吏民之賢者嵗貢各二人是後不專任刑名之吏由博士文學掌故補郎中左右內史郡太守等官公卿大夫始斌斌多文學之士守令亦多循良一改酷吏之習故仲舒曰毋以日月為功實試賢良為上仲舒之意蓋不欲專用刀筆積勞之郎吏而別開貢士之途以求賢能非欲於郎吏同官之中後來居上也自後論銓法者不循資格好言保舉每藉口仲舒之言恐失仲舒之意矣一曰酷吏互相援引傳中所載漢武帝即位吏治尚循謹周陽由最為暴酷驕恣自後吏治類多由等郅都與寧成結歡張湯為寧成掾成言於大府調茂陵尉湯與趙禹交歡而兄事禹若王溫舒尹齊杜周皆張湯之吏湯所薦者也王溫舒以廷史事張湯遷為御史尹齊事張湯數稱為廉武遷為關內都尉杜周先為義縱爪牙舉為廷尉史事張湯數言以為御史其治與減宣相放楊朴則治放尹齊一酷吏用而百酷吏進援引植黨之習也然小人同而不和始合終離故寧成義縱張湯趙禹減宣互相傾軋各抵於罪臣按趙禹先為丞相周亞夫史府中皆稱為亷平周亞夫弗任曰禹文深不可以居大府周亞夫可謂有相臣知人之識矣一曰酷吏假公以濟私傳中所載酷吏必摧抑尊貴强項示公而縱刁民以飬奸如郅都行法不避貴戚寧成為中尉豪傑皆人人惴恐周陽由所居郡必夷其豪張湯以深文痛詆諸侯義縱以鷹擊毛摯為治王溫舒好殺伐行威尹齊之木彊楊朴之嚴酷趙禹之賊深酷急減宣之重法繩官杜周之內深次骨皆是也而其摘發購告之權無不任用豪惡吏以為爪牙猾民佐治投銗言奸其吏多以權冨臣愚以為善牧民者愛其身勿驕其志寬其力勿縱其欲良民當恤莠民宜治故行政以均平為主聽訟以曲直為斷惟官惟貨惟來固為五過之三賤妨貴小加大亦是六逆之二使天下之民囂然無復上下尊卑之節相率而出於刁頑告密風俗頺敝皆酷吏為害也又况其煆鍊周內者盡出於私張湯多詐舞智定罪擅為輕重杜周專以意指為獄不循三尺法至於周陽由所愛者撓法活之所憎者曲法誅滅之王溫舒至酷也而善讇有勢家雖有姦如山弗犯無勢者貴戚必侵辱國家之律令適為酷吏上下其手耳至傳末云杜周初為廷史一馬且不全及身久任事家資纍數巨萬酷以濟貪司馬遷有慨乎其言之矣是以姦吏侵漁百姓騷動益輕犯法盜賊滋多雖繡衣持節督捕散而復聚吏治之害莫甚於此一曰酷吏濫刑而不仁夫刑以弼教不得已而用之欽哉欽哉惟刑之恤唐虞用刑之心與其殺不辜寧失不經唐虞用刑之律蓋以捶楚之下何求不得故哀矜折獄也臣觀傳中所載或一郡族三百餘家或一日誅四百餘人或窮治黨與連坐千餘家或株連相告逮繫千萬人多興大獄以博能名何其痛楚而不德也郅都甚以倍親為奉職則無仁心矣夫求忠臣於孝子之門未有不孝而能忠者也究之天道好還郅都寧成周陽由張湯義縱王溫舒減宣俱不保其身司馬遷詳書於傳足為酷吏者鑒惟杜周幸免少子延年班固稱其行寬厚論史者每疑為有後然臣考唐書杜氏世系表杜周三子延夀延考即司馬遷所謂兩子夾河為守其治暴酷與王溫舒等者後田仁刺三河皆下吏案誅褚少孫補載於史記天之報施自不爽也臣謹按司馬遷之後班固傳酷吏郅都等之外益以田廣明田延年嚴延年尹賞四人諸史如後漢北魏齊隋北史新舊唐書金史俱立酷吏傳武健嚴酷又加甚焉均為吏治之害也史卓茂為密令視民如子舉善而教吏民親愛不忍欺之數年教化大行道不拾遺遷京郡丞密人老少皆涕泣隨送及王莽居攝以病免歸上即位先訪求茂時年七十餘詔曰夫名冠天下當受天下重賞今以茂為太傅封褒德侯編修臣杭世駿司馬溫公曰光武即位之初羣雄競逐摧鋒陷敵之人權略詭辨之士方見重於世而獨能取忠厚之臣旌循良之吏拔自草野之中置諸羣公之首宜其光復舊物享祚久長蓋由知所先務而得其本原故也臣謹按郡守縣令民之師帥所使承流而宣化也治天下莫大於安民安民莫先於吏治吏治兩漢稱善而吏有不同精明强幹發奸摘伏民畏之如神明者謂之能吏寬和慈恕興行勸善民愛之如父母者謂之循吏能吏之治理獄訟督財賦盜賊鮮少四郊無警趙廣漢張敞之徒是也循吏之治課農桑建學校風俗移易比屋有禮讓和恆之化韓延夀卓茂之徒是也然而守令民之師帥宣主德而流恩澤惟力行教化乃可臻於善治蓋師者教民使之知禮義之謂也帥者率民使之趨事功之謂也其道維何欲蕃民之生則保息而户口增也欲制民之産則興利而田宅立也欲重民之事則勸相而耕斂時也欲恤民之患則發粟而振貸周也欲修五禮以節民性則有冠婚喪祭鄉飲相見之儀欲明七教以興民德則有父子兄弟夫婦君臣長幼朋友賔客之叙欲齊八政以防民淫則有飲食衣服事為異别度量數制之等凡此皆古先哲王固邦本同民俗之先務而守令於民最為親近奉上德意措施便易無難遍及殆如父母之乳哺赤子有動於中性之本然而風行草偃於不自知者臣觀卓茂令密吏民不忍欺道不拾遺則平日之教民知禮義率民趨事功者真有得於師帥之道史概以視民如子舉善而教兩言而其教化大行之實事已彰彰矣光武中興首加旌擢豈非知所先務而得其本原者乎厥後魯恭之令中牟秦彭之守山陽仇覽之長遂亭吳祐之相膠東崇好儒雅政尚仁簡大都聞卓茂之風而興起者然則以苛為察以刻為明以輕為德以重為威類皆俗吏之所為矣且夫茂當王莽居攝以病免歸是蓋龔勝薛方郭欽蔣詡之流秉禮度義抱忠守節臣也光武是封不獨崇吏治固兼勵臣道哉史律設大法禮順人情編修臣吳嗣富臣謹按史稱卓茂為密令視民如子寬仁慈愛舉善而教口無惡言其為政一意與民休息而其大指則專在於順人情蓋以王道本乎人情人情者聖王之田也所謂修禮以耕之者非煩苦斯人之具不過因人之情緣物之理而為之節文而猶有不率者於是乎有法以齊之法者所以維禮之窮也古之聖人不任法以拂人之情亦不狥情以廢吾之法使情與法兩盡而天下遂相忘於法以各適其情三代以來民心之所以固結於千百年之久而無一旦土崩瓦解之憂者以有此具也三代而下言治者必曰漢文帝唐太宗臣竊考文帝之世禁網濶疏務崇寬大恥言人過化行天下告訐之風易民情篤厚囹圄空虛太宗却封德彝之說進用魏徴力行仁義天下大稔嵗終斷死刑才二十九人外户不閉行李不齎糧是皆教化之漸仁讓之流而非一切整齊於法也然則法可廢歟曰不可夫民猶水也法猶隄岸也修其隄岸使水不至於泛濫橫逸斯已耳搏而躍之激而行之是豈水之性哉以法制民何以異是是故欲求治莫大於厚風俗欲厚風俗莫大於崇禮教欲崇禮教莫大於順人情比閭族黨先王所以使民相保受以各衛其生者也人之生也入有父子兄弟之親出有君臣朋友之誼長幼耆老之施於是有酬酢往來之節吉凶期會飬生送死春秋燕射升降揖遜之儀而猶慮百姓之不親也於是有無以相通患難以相恤嵗時伏臘以相問遺此人道之大經古今之通義自一鄉一邑推而至於天下莫不皆然然後知斯民之聨屬鼓舞皆發於其不容已而動於所不自知故曰吾觀於鄉而知王道之易易也後世法令日繁禁制日密禁密則情㩦情㩦則勢渙勢渙則人人但知自為而不顧其他於是乎比閭族黨泛然一無所值而天性之誼衰洽比之恩薄親遜之風逺澆漓之習成耰鉏德色箕帚誶語非一朝一夕之故積漸之勢然也夫課名而不責實吏必緣飾以取名造僞挾詐趨利無恥法所及防而法行法所不及防而法廢矣若夫三代之所以得民者得其心也得其心者順人情之謂也臣愚以為得心之道有二一在於大學之言潔矩一在於孟子之言推恩民之所好好之民之所惡惡之潔矩之道也老吾老以及人之老幼吾幼以及人之幼此推恩之道也彼卓茂之言雖見不及此然其意則有與古聖賢相發明者光武即位之初即召茂以為太傅厥後天下少事文書簡寡僅存十一張堪劉昆諸循吏後先接踵其亦洞悉民情而知治本者歟
