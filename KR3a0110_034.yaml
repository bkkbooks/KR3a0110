  text: 欽定四庫全書御覽經史講義卷二十八目録
  hash: sha256:f4a1cd3a4af46bf145ebfcbe2bdbc1286f0e50e452a5afdd6d23163bf27aaa4f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_034-1a, image: WYG0722/WYG0722-0192c.png}
body:
  text: 史唐高祖武德九年置宏文館少詹事臣沈德潛唐太宗貞觀元年以戴胄為大理少卿上以選人多詐冒資蔭敕令自首不首者死未幾有詐冒事覺者上欲殺之胄奏據法應流上怒曰卿欲守法而使朕失信乎對曰敕者出於一時之喜怒法者國家所以布大信於天下也陛下忿選人之多詐故欲殺之既而知其不可復斷之以法此乃忍小忿而存大信也上曰卿能執法朕復何憂胄前後犯顔執法言如涌泉上皆從之天下無寃獄將軍長孫順德受人餽絹事覺上於殿庭賜絹數十匹大理少卿胡演以為不可上曰彼有人性得絹之辱甚於受刑如不知愧一禽獸耳殺之何益監察御史臣孫灝上謂太子少師蕭瑀曰朕少好弓矢得良弓數十自謂無以加近以示弓工乃曰皆非良材朕問其故曰木心不直則脈理皆邪弓雖徑而發矢不直朕始悟向者辨之未精也朕以弓矢定天下識之猶未能盡况天下之務其能遍知乎乃命京官五品以上更宿中書內省數延見問以民間疾苦及政治得失編修臣錢本誠檢討臣傅隆阿唐太宗曰人欲自見其形必資明鏡君欲自知其過必待忠臣監察御史臣張湄唐太宗貞觀二年詔舉堪縣令者上曰為朕養民者惟在都督刺史朕嘗疏其名於屏風坐卧觀之得其在官善惡之迹皆注於名下以備黜陟縣令尤為親民不可不擇乃命五品以上各舉堪為縣令者以名聞編修臣秦勇均貞觀四年秋七月乙丑上問房玄齡蕭瑀曰隋文帝何如主也對曰文帝勤於為治雖性非仁厚亦勵精之主也上曰公得其一未知其二文帝不明而喜察不明則照有不通喜察則多疑於物事皆自決不任羣臣朕則不然擇天下賢才置之百官使思天下之事關白宰相審熟便安然後奏聞有功則賞有罪則刑誰敢不竭力以修職業何憂天下之不治乎編修臣張為儀唐太宗貞觀四年冬大有年侍講學士臣沈德潛編修臣林蒲封唐太宗貞觀六年秋閏七月宴羣臣於丹霄殿上曰人主惟有一心而攻之者甚衆或以勇力或以辨口或以諂諛或以姦詐或以嗜欲輻輳攻之各求自售以取寵祿人主少懈而受其一則危殆隨之此其所以難也少詹事臣吕熾唐太宗問魏徴曰羣臣上書可採及召對多失次何也對曰臣觀有司奏事常數日思之及至上前三分不能道一况諫者拂意觸忌非陛下借之辭色豈敢盡其情哉上由是接羣臣顔色益溫編修臣蔡新唐貞觀十年權萬紀上言宣饒二州銀大發采之嵗可得數百萬緡帝曰朕所乏者非財也但恨無嘉言可以利民耳昔堯舜抵璧於山藏珠於谷漢之桓靈乃聚錢為私藏卿欲以桓靈事我耶黜之監察御史臣柴潮生貞觀十二年九月甲寅上問侍臣創業與守成孰難房玄齡曰草昧之初與羣雄並起角力而後成之創業難矣魏徴曰自古帝王莫不得之於艱難失之於安逸守成難矣上曰玄齡與吾共取天下出百死得一生故知創業之難魏徵與吾共安天下常恐驕奢生於富貴禍亂生於所忽故知守成之難然創業之難已往矣守成之難方當與諸公慎之編修臣張為儀上謂諫議大夫禇遂良曰卿猶知起居注所書可得觀乎對曰史官書人君言動備記善惡庶幾人君不敢為非未聞自取而觀之也上曰朕有不善卿亦記之耶對曰臣職當載茟不敢不記黃門侍郎劉洎曰借使遂良不記天下亦皆記之上曰誠然編修臣周煌見可欲則思知足以自戒將有作則思知止以自安人念髙危則思謙沖而自牧懼滿溢則思江海下百川樂盤遊則思三驅以為度憂懈怠則思慎始以敬終慮壅蔽則思虛心以納下想讒邪則思正身以黜惡恩所加則思無因喜以謬賞罰所及則思無因怒以濫刑編修臣彭樹葵唐玄宗開元二年秋七月焚珠玉錦繡於殿前帝以風俗奢靡乘輿服御金銀器玩宜令有司銷毁以供軍國之用其珠玉錦繡焚於殿前后妃以下皆無得服罷兩京織錦坊後帝使御史楊範臣入海南求珠翠竒寶範臣對曰陛下前年焚珠玉錦繡示不復用今所求者何以異於所焚者乎帝遽引咎慰諭而罷之給事中臣馬宏竒唐開元二十九年春正月立賑飢法制曰承前飢饉皆待奏報然後開倉道路悠逺何救懸絶自今委州縣及採訪使給訖奏聞修撰臣于敏中唐德宗建中元年始作兩稅法編修臣張映斗
