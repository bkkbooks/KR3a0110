body:
  text: 書經惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母給事中臣劉方藹朱子曰天地之大無不生育固為萬物之父母矣人於其間又獨得其氣之正而能保其性之全故為萬物之靈若元后者則於人類之中又獨得其正氣之盛而能保其性命之尤者是以能極天下之聰明而出乎人類之上以覆冒而子畜之是則所謂作民父母者也吕祖謙曰此乃六經之統攝百王之標準臣謹按帝王有天地父母之責聖賢有天地父母之心以聖賢之心任帝王之責父天母地而為宗子天地之帥吾其性天地之塞吾其體民吾胞物吾與然後能盡元后父母之道而以天下為一家中國為一人上下與天地同流顧父母萬物者有天地則所以子畜乎人物者宜無所不至而復有待於作元后者之作民父母何也蓋以天地無心而成化覆載固極之於無私而覆載生成之偏以及寒暑災祥不盡得其正而猶不免於生成之憾者其範圍曲成裁成輔相之道一惟元后是賴是元后之作民父母所以立天地之心體天地之撰又為生靈繼起之天地也所以然者惟天地以太極為根柢二五為樞紐氣煦形嫗化生萬物萬物莫不戴髙履厚而父母乎天地萬物各有知覺運動而人在萬物中則能具天地之德隂陽之交鬼神之㑹五行之秀氣而足以為天地之心是以形既生神發智惟人為萬物之靈所謂天聰明自我民聰明也人靈乎物而於生靈之中尤篤生神靈首出之一人天獨畀之以父母天下之任以為生靈之君師惟天聰明惟聖時憲實能以天地父母之心為心以天地父母之道為道而務盡乎子民之責天時地利之所生為之修其府事以給之天時地利之所窮為之備其荒政以救之春夏秋冬風雨霜露則本天之教以教之神氣風霆風霆流形則本地之教以教之所好好之以求赤子之所安所惡惡之以去赤子之危憂民憂以為赤子之啼飢號寒也樂民樂以為赤子之飲和食德也恫瘝乃身以為毛裏之疾痛一夫不獲以為骨肉之向隅未呼未籲而切誠求所以愛護者每思患而預防已安已治而視如傷所以保恤者篤恩勤於罔極如此而後可曰作元后蓋體乾元坤元以仁民乃所以家天下也如此而後可曰作民父母蓋繼乾父坤母以子民所謂以恩掩義也夫天地有一息之不誠則無以為天地而父母乎萬物萬物不可一息無天地安可一息無父母惟不可一息無父母故作民父母之心不可以一息間作民父母之政不可以一息荒元后之所以作無時可息於其民民父母之所以作無時可息於其子而本天地以作之之心其至大矣哉其至難矣哉書經天乃錫禹洪範九疇彝倫攸叙監察御史臣包祚永蔡沈曰洪範九疇原出於天禹順水之性地平天成故天出書於洛禹别之以為洪範九疇此彝倫之所以叙也彝倫之叙即九疇之所叙者也臣謹按天之所錫者洛書也洪範九疇則禹之所作而叙也然則箕子曷言乎天錫禹洪範九疇也曰洛書之數戴九履一左三右七二四為肩六八為足中五為腹其數有九禹觀象而得理由粗以識精因形下之器而悟形上之道也故叙為九疇凡天地之性萬物之紀生民隂隲之恆五行五事之理維皇之所以建極天人之所以感應大經大法純粹以精無不觸處洞然條分而縷晰之遂亦若禹之聖天有以佑啓之疇之叙天有以默示之故曰錫也漢志曰禹治洪水錫洛書法而陳之是為洪範此之謂也其曰錫者如書所言湯之天錫智勇詩之言帝謂文王孔子之天縱將聖之類是也蓋聖人之心與天同體其寂然不動也萬理渾涵於中其感而遂通也全體畢露於外彼伏羲之畫卦得於河圖之出也而其實造化生生之理隂陽動靜之端剛柔老少之用已先具於伏羲之一心而適有河圖之象呈於其前故畫為八卦後聖爻象繼起摩蕩發揮而理乃無遺藴讀易者但見其理之廣大精微以為聖人作易皆得之於河圖之象𢾗而要豈其然哉九疇之叙夫亦猶是說者又謂河圖洛書乃聖人神道設教耳非實有龍馬神龜之事也而正不然今觀以五生數統五成數而同處其方者圖也以四竒數統四偶數而各居其所者書也此其數之天生地成載在簡册者固彰明較著不可誣也古聖人制作開天皆取師於萬物下至佃漁臼杵莫不皆然河圖洛書又何疑乎鯀惟不深識此理故於治水而陻之於五行而汨陳之帝之不畀九疇非不畀也即當鯀之時有神龜負書之祥鯀亦不能知而叙為九疇也此開天明道之聖父不能得之於子天豈有私意於其間乎易曰天生神物聖人則之又曰河出圖洛出書聖人則之此之謂也此聖人所以先天弗違後天奉若與天地合其德而立彝倫之極也夫書經初一曰五行次二曰敬用五事次三曰農用八政次四曰協用五紀次五曰建用皇極次六曰又用三德次七曰明用稽疑次八曰念用庶徴次九曰嚮用五福威用六極編修臣蔡新蔡沈曰此九疇之綱也在天為五行在人為五事以五事參五行天人合矣八政者人之所以因乎天五紀者天之所以示乎人皇極者君之所以建極也三德者治之所以應變也稽疑者以人而聽於天也庶徴者推天而驗之人也福極者人感而天應也臣謹按九疇之文原本洛書之數所謂戴九履一左三右七二四為肩六八為足者也五居其中謂之皇極其本末有序其先後有倫先儒論之詳矣而對待之義鮮有及者臣嘗繹之其法以君心為本上下四旁備列天人以監觀省察互成其用君天下之大法精而且備矣何則五行者天道之始也福極者人事之終也天以健順五常化生萬物嚮之者福背之者威王者嚮明而治賞以春夏刑以秋冬其協乎極者則爵賞所加也而福壽康寧必及之其罹於咎者則刑罰所施也而憂貧疾弱必及之是聖人之與天共治也故一與九對而五行福極位焉五事者修身之要人事之本也庶徴者感應之幾天道之著也人君一念之敬必形於身則凡正身以正朝廷正朝廷以正百官萬民者相因而至和氣之所以致祥也一念之肆亦必形於外則凡作於其心害於其政發於其政害於其事者亦相因而致乖氣之所以至異也乃範約言之但曰肅乂哲謀聖則為時為若者應焉曰狂僣豫急䝉則極備極無者應焉所以深著其應感之幾徵召之速甚微而可畏也自古明聖之君必於此而念之是聖人之以天自治也故二與八對而五事庶徵位焉八政者治世之大端布於人也稽疑者神道所設教謀之天也蓋王道之原明則有禮樂而幽則有鬼神惟明有禮樂故聖人不敢矜無為之治而食貨賔師命官分職之事從斯而起所謂建諸天地而不悖者也惟幽有鬼神故聖人不敢恃睿思之智而蓍龜卜筮三兆五占之法從斯而立所謂質諸鬼神而無疑者也是聖人之本天以前民也故三與七對而八政稽疑位焉五紀者欽若之意後天奉天也三德者君師之任以人治人也萬物幽鬱沉滯之氣生於隂陽之愆伏而默化於歲㑹之中和人心偏陂頗側之端起於剛柔之互勝而無不可偕於正直之大道故五紀布而歲功成則風雨露雷無非教也而歲月日時星辰象𢾗莫不順序矣三德敷而萬民化則斧鉞弓旌無非教也而沉潜髙明彊弗燮友胥受裁成矣是聖人之與天同功也故四與六對而三德五紀位焉總之皆建極也故皇極一章言皇建其有極即申之以錫極保極協極作極會極歸極而不言建極之義者八用總歸一建也以五事修身以八政理物以三德立中和之紀以威福持賞罰之公天子行之則為道義庶民遵之則為道路由是經之以五行故材不匱也叶之以五紀故序不愆也參之以稽疑故民聽不惑也驗之以庶徴故事行有考也易大傳曰河出圖洛出書聖人則之其以此歟然則河圖虛太極於八卦之外而洛書獨列皇極於九疇之中者又何也蓋太極天道也惟不雜乎隂陽故能為萬化之樞紐皇極王道也惟不離乎事物故能為四海之會歸此亦猶中庸九經之政原本於君身而修身之數並列於九經以見天人繫屬之故有相繼而不相離者範之深意也抑又考之皇極一章不汲汲於庶民之淫朋比德而獨於凡厥正人三致意焉俊民何與於庶徵而言庶徵則以用章為平康之本秉彝無關於五福而語五福亦以好德居考終之先此又皇降之衷隂隲之意所最先者故其丁寧垂訓如此大學平天下之道在於用人錫福之君所宜深念焉書經一五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡編修臣儲麟趾臣謹按箕疇一書與河圖實相表裏其初一曰五行曰水曰火曰木曰金曰土即河圖八卦之全位也一曰水在卦為坎二曰火在卦為離三曰木在卦為震巽四曰金在卦為乾兌五曰土在卦為艮坤天地者五行之本始五行者天地之功用以本始言之水火木金包絡其外而土宅中央以功用言之木火金水各居正位而土奠四隅五行一天地猶之八卦一隂陽善乎濓溪周子之言曰五行一隂陽也隂陽一太極也五行質具於地氣行於天水以太隂司冬上肖輕清之體而下流於地故居天一之竒而地六成之火以太陽司夏下乘顯著之形而上升於天故居地二之偶而天七成之天氣旁逹為條暢之木木以少陽司春故參天三之數而地八成之地質內凝為堅重之金金以少隂司秋故居地四之數而天九成之至於隂陽之冲氣燥濕之凝結位乎中央包乎四氣符乎天五之數而謂之土則其體為至大焉凡此陽變隂合皆自然之生序其曰微著為漸蓋即人身五事之用取譬得之而亦確有其理也水流濕故性潤下於濫觴可以驗之火就燥故性炎上於傳薪可以觀之惟木從繩曲而又直則性類炎上而散為枝葉惟金在鎔從而又革則性似潤下而止於模范獨土寄旺於四時故無成位髙原下隰燥濕異宜故無成性至於播之五榖則芄芄彧彧萬民之所資養其功蓋莫大焉故曰土爰稼穡稼穡不可以性言獨云德者殆直指其功效言之耳若夫五行喜忌之說多起於後世術數之家而其理有難曉者即如土克水矣然水依防而宅水克火矣然火得膏而輝火克金矣然金迎冶而鍊金克木矣然木就斤而材木克土矣然土待耕犁而産禾稼相克乃轉以相成殆有造化不言之妙用而非術數之所能盡也宋儒司馬光著潛虛以五行為樞紐謂水有原委原為天一而委為地六火有熒焱熒為地二而焱為天七木有本末本為天三而末為地八金有草刃草為地四而刃為天九土有基冢基為天五而冢為地十於以推衍五行之體用亦足與蔡氏孔氏注疏相為發明至於求其大醇則斷以堯夫氏濓溪氏河圖八卦之說為明白無疵足以發聖經之藴垂示萬世而無窮也書經敬用五事侍講學士臣吳履泰程子曰聰明睿智皆自敬出真氏德秀曰敬則五事皆得不敬則五事皆失臣謹按帝王之治莫要於敬虞書首言曰欽詩美文王緝熙敬止孔子告子路修己以敬所謂一言傳心之要典也敬字徹上徹下該括內外而自一身至萬事當然之則貌言視聽思五者盡之自外而言之貌外於言自內而言之聽內於視自貌言視聽思言之則思為主於內周子通書謂思為聖功之本而思不可見操存之漸必自其可見者為之故持敬之功先在貌言次在視聽終之以思五事各有攸主而總以敬用者敬又五事之主敬不存於中則形於貌者必輕且慢無由而能恭發於言者必易以肆無由而能從視聽蔽於物無由而明且聰思慮汨於多端無由而通於微惟敬而恭從明聰睿胥得焉居敬行簡埀衣裳而天下治也從來雄才大略但於事為上理㑹而一念不敬百為皆墮古之人君師氏司朝僕臣正位太史奉諱工師誦詩御瞽幾聲巫史前後卜筮左右蓋無一時一事之可縱弛也其一日之間蟲飛而㑹盈朝退而路寢聽政日出而考政夕而糾䖍天刑至於后妃御見有度應門擊柝鼓人上堂女史授環彤管記過自朝至昃無非兢兢業業之小心由是正躬儼恪口無易言收視返聽渺慮澄心欽明溫恭之具於中光被重華之逹於外惟敬之道得也洪範於二疇即曰敬用五事此皇極之所由建而三德五福咸繫於此與書經二五事一曰貌二曰言三曰視四曰聽五曰思貌曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作乂眀作哲聰作謀睿作聖檢討臣趙德昌朱子曰五事以思為主蓋不可見而行乎四者之間也然操存之漸必自其可見而為之真德秀曰貌言視聽思各有所主而總以敬之一言何哉蓋敬者五事之主也敬則五事皆得不敬則五事皆失陳櫟曰五事皆當以敬用之於外而可見者先致持守之功則百體各職其職於內而不可見者復致操存之力則百體於天君而從其令一敬之功內外夾持庶幾其無滲漏乎臣謹按五事配乎五行不可缺一故聖賢之學表裏內外互致其功而綱領所在則不出於間邪持敬二者雖先儒為說各有所主亦由五行之分司而互濟固未嘗有異同於其間也曩讀洪範五事心竊疑之以為聖人之教顔子則以視聽先乎言動及論君子之思亦先之以視思明聽思聰而此獨先列貌言與四勿九思殊不相合者何也逮觀朱子思不可見而行乎四者之間操存之漸必自其可見而為之之論則洪範貌言視聽俱列思前之義可曉然矣至於先貌言不先視聽之故猶未之有及而真氏德秀陳氏櫟又皆以敬為宗真氏則曰敬者五事之主敬則五事皆得不敬則五事皆失陳氏曰五事皆當以敬用之敬之功內外夾持庶幾其無滲漏乎之二說者五事並重似與朱子稍異然以敬握貌言視聽思之宰與朱子平素所云敬者聖學成始成終其說又未嘗不同也獨於其先貌言不先視聽之故亦未有明論焉間嘗思之間邪之功則視聽為要持敬之學則貌言為先持敬即以間邪間邪即以持敬洪範之叙次五事與聖人之言四勿九思先後雖有各殊而要歸實無異致所以談五行者語其生之序則曰水火木金土而語其行之序則又曰木火土金水也由是而會通其義純粹其功以之為己固順而祥以之為人自公而溥即以之為天下國家夫亦何所施而不當也哉書經思曰睿睿作聖檢討臣萬松齡臣謹按人君之身主靜立極之身萬化所從出也而其要則繫乎思思也者寓乎貌言視聽之中而實超乎貌言視聽之外充其量踐形色而非難極其功合動靜為一致觀虞書之贊堯曰文思安安此德性之美固由於自然者矣若皋陶之告禹曰愼厥身修思永以禹之聖豈猶有未至而臯陶必舉以相警則不能無藉於思可知他如髙宗之思道成王之思艱未有不朝夕思之而能制治保邦者也蓋天有五行人有五事五行之內土無所不寄猶五事之內思無所不通貌言有恭從之德而不思則未必能恭從視聽有明聰之德而不思則未必能明聰何者誠有所未至而物為之蔽也惟思之德曰睿睿則必通於微通於微則可以無所不通王肅云思慮苦其不深故必深思使通於微有是睿之德而能盡其思之功則作聖之基於是乎在而其功要不外於主敬夫貌言視聽環備於身以待吾之用而不持之以敬則為我用者皆得撓我而朋從憧擾失其何思何慮之本來此身之所以難誠也惟齊莊中正以直其內而戒謹不釋於須臾整齊嚴肅以制其外而惰慢不設於肢體其無思也天機常動而靈明之本體未嘗有所或窒及其思也本原常靜而虛瑩之妙用未嘗有所或膠周子曰無思本也思通用也無思而無不通為聖人至聖人而睿之德始全思之量始盡故五事而曰敬範之所以埀教者尤深切著明也天子父天母地而萬物待育於一身思皇極之何以建而無一毫過不及之差思五事之何以合於五行而雨暘燠寒胥不愆其度思八政之何以符於五紀而天人上下胥不易其常思三德之何以乂而剛柔盡歸於正直思稽疑之何以衍忒思庶徵之何以為休為咎思福極之何以在君在民則雖謂疇範之全文盡括於思之一言可也而思顧可忽哉然則未形之理非睿無以推究乎其極將形之象非睿無以研審乎其幾惟聖人清明在躬志氣如神寂然不動皆實理之充周感而遂通皆實理之發見故朱子云無思誠也思通神也所謂誠神幾聖人也然而靜則無思而睿之體已森然具足動而為思而睿之用乃燦然不淆禮曰毋不敬儼若思此該乎動靜以為言也詩曰思無邪此専乎動而仍不離乎靜合動靜為一致故周子謂思者聖功之本也子産曰政如農功日夜思之此與史所記大禹之苦心焦思其意適合而魏徵之告太宗以十思究其義胥不外乎貌言視聽儻亦有得於洪範之㫖者乎書經五皇極皇建其有極斂時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極給事中臣程鍾彥臣謹按箕子為周武王陳禹所有洪範之書條其事為九類别其說為九章謂之九疇考其次序則皇極居中蓋九疇具天地人三才之理而人者天地之心也人成位乎中而天地之理得矣故五為皇極曰皇建其有極者極者至極之義標凖之名也建極云者謂五事皆止於至善也大㫖以為王者敬用五事止於至善而作君作師居天下之至極為天下之標準也斂者有之於己也錫者布之於民也蓋王者順五行以承天用五事以修身而敷八政以宜民至於皇極建則五事得而五行協八政修上契天心而福斂於一身下善民俗而福錫於天下矣在上既有以錫之在下必有以應之應之者觀感而興焉率教而化焉惟時庶民皆於汝乎取法則觀感之深也皆與汝保守此法則率教之至也由是觀之皇極者九疇之樞紐也而五事者所以致皇極之建者也五行則其所禀受八政則其所敷施也五紀則五行之布於四時者也三德則八政之成乎民風者也於是參之稽疑以察其機驗之庶徵以觀其應考之福極以究其歸王者相天隂隲之意而協民居未有不本建極以錫福者也昔宋蘇洵作洪範論駁正漢儒破碎支離之說以為禹之疇分之幾五十矣諸儒為之傳强合附㑹其條又將百焉宜人之畏其難而不行也今欲其行莫若歸之易百歸之五十五十歸之九九歸之三三者五行也五事也皇極也而又以皇極裁節五事五事得而五行從是三究歸之一也是亦歸本皇極之說也書經皇建其有極斂時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極編修臣竇光鼐臣謹按洛書九數而五居中洪範九疇而皇極居五皇極者九疇之統會也自孔氏作傳訓皇極為大中諸儒多祖其說朱子獨取蘇氏書傳至而無餘之語又自為說曰皇者君之稱也極者至極之義標準之名常在物之中央而四方望之以取正者也又曰極有凑會之義所謂三十輻共一轂也由是言之人君以一身居天下之中而上天下地並待裁成輔相之功四方萬民皆有輻輳拱環之勢譬若北辰之在天脊棟之在屋也故夫皇者天地人之心也皇為天地人立心非天下之至德不足與於斯故九數以五居中而九疇以皇極為本其曰皇建其有極何也陳氏曰有極當借無極對觀自至理之妙而無形者言之曰無極自至理之實有言之曰有極為人君者誠能敬用五事則貌必恭恭作肅言必從從作乂視必明明作哲聽必聰聰作謀思必睿睿作聖如此則五行得其性而八政五紀由此舉三德由此推稽疑庶徵福極皆由此驗矣此理之實而可按者也故曰建其有極也顧不曰敬用五事而曰斂時五福何也極者實有而必求其徵以事之克敬而氣之成象者言之故曰五福五者散處而莫能並至以事之皆敬而類之總應者言之故曰斂時五福蓋第九疇之本基於此矣其繼之曰用敷錫厥庶民何也人君不以一身為福而以天下為福天下有一民不登於仁壽者聖人之大戚也說命曰一夫不獲則曰時豫之辜此之謂也其繼之曰惟時厥庶民于汝極錫汝保極何也傳曰言從化也蔡氏集傳曰民皆於君之極與之保守不敢失墜也蓋民雖自若其性天而不能自為其風氣則疑王實錫之云爾經於下文復申言之曰㑹其有極歸其有極正謂此也而朱子則又謂民復以此福錫其君使之長為至善之標準則又何也蓋君不自有其福而公之民民亦不自有其福而復歸之君上下相與之際理有固然經不云乎凡厥庶民極之敷言是訓是行以近天子之光曰天子作民父母以為天下王正謂此也兼此二說而錫保之義始備矣要而言之保者保其所錫也錫者錫其所建也前四疇皇極所以立也後四疇皇極所以行也立其體以逹其用則九疇仍歸於一而已矣故曰皇極者九疇之統會也書經斂時五福用敷錫厥庶民監察御史臣劉方藹朱子言人君能建其極則為五福之所聚而又有以使民觀感而化焉則是又能布此福而與其民也臣謹按五福者人君與庶民共之者也欲膺多福而永享其全君民之心皆若此顧民欲得福而及民在君能福君之民必以君之自聚其福為始基能福民之君實以民之咸受其福為全量其斂福也非為己也正所以為錫之之地也其錫福也非無本也乃所以為斂之之用也蓋氣數一本乎理理順則氣無從逆而數不能乖建極斯理順而從理生之氣自無所不順理順而從理定之數亦無所不順故五福具在極中實隨人事之感召以效所得之多寡淺深是以即建極為斂福如秋收之必歸乎春耕有土之必得夫成賦五福之萃而聚也并不必言天錫而直以為斂云爾夫統庶民於極中自能統庶民於福中庶民以君所建之極為極亦即以君所斂之福為福是以悠久成物能使民不夭札而多歷年所之慶溢乎四海也重農薄斂能使富藏天下而厚生利用之樂浹於寰區也用康保民能使引養引恬之休遍及蒼生也從厥攸好能使遍為爾德而通天下之志也令終有俶能使順受其正而得全歸之道也敷錫若此而協極之庶民有不與君並受五福者哉唐虞三代之時民欲壽而君生之民欲富而君足之民欲寧而君保之民遷善而君導之民保終而君全之降福穰穰降福簡簡一人有慶兆民賴之猗歟盛哉書經皇極之敷言是彝是訓于帝其訓監察御史臣廖必琦陳雅言曰聖人在上既建極而以身教於天下復敷言而以言教於天下蓋身教者示以躬行踐履之實言教者使其歌誦吟詠而得二者不可偏廢也天下惟理為至常惟理為至大皇極之敷言純乎一理故謂之常理故謂之大訓是理也本之於天惟皇上帝降衷之理也言而不異於降衷之理是豈可以君之訓視之哉乃天之訓也天者其不言之聖人聖人者其能言之天一而二二而一者也臣謹按蘇軾曰天錫禹九疇不能如是諄諄也粗有象數而已禹與箕子推而廣之至皇極尤詳曰帝以象數告而我敷廣其言為彝訓與帝言無異故曰于帝其訓人君以至極之理而敷之為言王義王道王路既示人以㑹極之趨蕩蕩平平正直又示人以歸極之凖即是言而玩之皆理也理豈髙逺而難行哉易知簡能切臣民之日用是天下之常理也本是理而演之皆訓也訓豈淺露而易窮哉言近指逺為臣民之範圍是天下之大訓也然理曰常理訓曰大訓則雖曰君之言而實天之言矣天者理之所從出也今皇極之敷言既純乎理則亦純乎天矣是訓也非帝之訓而何敷言同天之妙如此天於冥冥之中不能自顯於言而寄其權於皇裁成輔相日起有功以補造化之不逮行見羣黎遍德共由大道於提撕警覺之餘皇於元元之衆不容或已於言而契其理於天民彝物則祗率吾性以樹億兆之儀型直與天載無私同宣至教於時行物生之表在上天神道以設教其理妙於無言在人君代天以有言其言純乎至理所以鼓舞萬民者即隂隲之化工所以教治百官者即相協之深意故皇之極敷之為言抑揚反覆皆足以創其邪思而發其善性而皇之言即天之訓廣大光明無非折衷於至理洞逹於大原本天命人心之正切彝倫日用之常推之四海而皆凖俟諸後聖而不惑是彝也非隱怪之端是訓也乃正大之軌彝訓之所在即帝訓之所在而皇不與天為一哉書經六三德一曰正直二曰剛克三曰柔克平康正直彊弗友剛克燮友柔克沈潛剛克髙明柔克監察御史臣萬年茂臣謹按洪範之數一為九始五為九樞以二繼一五行為五事之原以六繼五三德為建極之實夫三德列於右下與五行為鄰而五紀列於左上與三德為對三德既乂則五紀以協三德之承皇極猶中氣之和歲㑹也五陽先天氣交於大寒之前五隂後天氣交於大寒之後氣不能無過不及也故為中氣以和之五運六氣互相克制而隂陽無有差忒焉隂陽之氣行於歲時而中和協其運剛柔之情殽於政事而正直善其施剛柔偏勝謂之不正剛柔互撓謂之不直皇極有言曰無反無側王道正直正直皇極之事而以為德之又用何也王心無為以守至正自一至九環而應者皆為建極之用而所以善其建用者惟德為尤要故皇極言其治象而三德詳其實功也夫正直剛柔均為乂用則體一而用三矣剛克柔克合之正直則用五為克四矣是故平康之乂取諸稼穡弗友之乂取諸從革燮友之乂取諸曲直沈潛之乂取諸炎上髙明之乂取諸潤下乂之為道正直一而剛柔二克一而所以克者二一而三之是參天也二而倍之是兩地也物之質麗於地而氣行於天四克者聖人之下學而上逹也生人之動卜不習吉而凶咎悔吝常有數端復禮之學克惟一已而視聽言動亦有四目竊以五事徵之沈潜主貌貌無剛克則惰慢乘之和而易流非德隅之飭也髙明主言言無柔克則鄙倍近之囂而易競非辭輯之㫖也燮友主視視無柔克則驕亢以滋潛伏雖昭而不顯之臨鮮矣彊弗友主聽聽無剛克則讒慝以生鳴鶴有聞而不諫之八微矣先王正己以正物直己而直人因是廣之以為八政八政之用黃寄四克食與司徒居於東方以治木德喜氣萃之貨與司寇居於西方以治金德怒氣萃之祀與司空居於北方以治水德哀氣萃之賔與司馬居於南方以治火德樂氣萃之喜怒哀樂悉本未發之中而禮樂刑政形為四氣之和故曰天子建中和之極言天子能以正直之理濟剛柔之用也抑臣竊觀文王卦序本於洛書後天乾居西北而洛書之三德實宅乾位蓋易之太極猶疇之皇極也太極虛中以乾為八卦之君皇極居中三德為九疇之要聖人謂乾為天為君乾者天之德也而元亨利貞備焉正直君之德也而剛柔四克合焉行四德者是名曰乾乂四克者是曰正直故燮友宜於體仁弗友宜於和義髙明宜於合禮沈潛宜於貞固四者皆克之用也克故正正故直直故乂正直以乂五紀咸協是以政事有經而庶徵稽疑嚮威之用無所處而不當乂四克者人也正直者天也盡人合天而皇極以得所以為建用也易曰大哉乾乎剛健中正純粹精也其即三德之義也夫書經是之謂大同身其康彊子孫其逢吉編修臣何其睿臣謹按此合天人一志氣參理數以為治也王者義不辟逺仁不辭難其發之也果而守之也確既不格於因循之論亦不聞有暌渙之時究之長駕逺馭昭治幾於未然算成功於將兆以一身繫四海之心而一日詒數世之福固知斷疑推隱早悔吝之不生治幽理明在天人之協應也今夫天之於人主也有所厚望其身與其子孫即於冥漠之中默寄其輔相於鬼神鬼神體天之命亦遂先人以效其承宣而兆其吉所謂興神物以前民用也若夫心德一而若啓若翼視聽通而是則是效則又其顯焉者矣自古開物成務建功立業當其始事之經綸即其會歸之皇極無他應乎天而順乎人也夫天之所棐人不得抗焉人之所歸天亦不能違焉董仲舒云諸福之物可致之祥莫不畢至誠有驗於此矣而由是淑慎以保其躬至易也優游以彌其性至順也而且創之埀之以篤其祜而且燕之詒之以延其緒頌曰天子萬年又曰本支百世此或聖明之主所不敢覬之休徵而其實謀之逺者報亦長扶輿清淑之貢世祚岡陵之衍皆其莫之致而致之者耳且夫天下事亦有不可知者矣運會迭乘而埀象於天者難測也情僞雜起而積習於民者難變也然數雖流於偶偏而理原信其無過君子處上下之交而極和㑹之致夫非别有事天之功與得人之術也不過五行五事敬用與燮理攸關八政五紀人事與天時并協三德乂而平康奏庶徵備而時若孚五福以斂六極以消所謂建其有極體立而用行是以動罔不臧人和而天應即理即數即微即顯所以定天下之吉凶而成天下之亹亹者於是求之而已矣書經八庶徵曰雨曰暘曰燠曰寒曰風曰時五者來備各以其叙庶草蕃廡編修臣程景伊蔡沈曰徵驗也所徵者不一故謂之庶徵雨暘燠寒風各以時至故曰時也備者無缺少也叙者應節候也五者備而不失其叙庶草且蕃廡矣則其他可知也臣謹按箕子陳洪範九疇次八曰念用庶徵所以明天人相與之際呼吸感通誠動幾應樞機甚速而事效可憑也天地歲功之用不外於雨暘燠寒風五者迭秉化權相推相蕩而萬物生成變化於其中功至巨也然而寒暑不時則疾風雨不節則饑故必統計一歲之中五者更進互乘無一端之或缺又必分計一嵗之中五者應期合節無一候之或愆然後有其休而無其咎備也叙也合而言之時也夫五者備而不失其叙豈無其效哉竊嘗觀於至治之世年榖順成災沴不作民氣和樂品物咸亨宇宙含生之衆融洽休暢而無有邪氣奸其間者此四序均調五行順軌自然之明驗也今觀箕子言庶徵之應而繼之以庶草蕃廡豈徒以為庶草云爾哉亦以推夫被潤澤而大豐美其象至於此極而已矣雖然食其福者在天下而密其感者在一人蓋人主一身穆處深宫而其氣每與天地相為感召初不待見之於文告政令而旋至立應其效甚神凡其小心昭事而致謹於貌言視聽思者分言之則曰肅曰乂曰哲曰謀曰聖而統言之則曰敬是故敬者明德馨香之本而天人相與之大原也惟其一於敬而無所於間是以時而遇五者之變則敬天之怒無敢戲豫敬天之渝無敢馳驅而倍致其嚴恭寅畏之意時而遇五者之常則昊天曰明及爾出王昊天曰旦及爾游衍而不馳其戰兢惕厲之神蓋其敬德之精純而默召太和於無形無聲之地者如此然則聖人在上而十雨五風休徵協應夫豈幸而致之也哉書經曰休徵曰肅時雨若曰乂時暘若曰哲時燠若曰謀時寒若曰聖時風若曰咎徵曰狂恆雨若曰僭恆暘若曰豫恆燠若曰急恆寒若曰䝉恆風若給事中臣鄒一桂蔡沈曰在天為五行在人為五事五事修則休徵各以類應之五事失則咎徵各以類應之自然之理也又曰天人之際未易言也必曰某事得則某休徵應某事失則某咎徵應則亦膠固不通而不足與語造化之妙矣臣謹按蔡沈之說似乎兩岐既云各以類應又云某事得則某休徵應則膠固不通不知此正理合而能分之說也天行廣大非屑屑於一事上印證而天道精微未嘗不於物物內流通故洪範庶徵漢儒以為䜟緯之本而一一求其符合驗之於古則不經推之將來則不應此知其分而不知其合也宋臣王安石以若字當如字講只作譬喻之詞而謂於感應處全不相關不消說得則所謂徵者何徵而省者何省乎朱子曰人君行事與天地相感通行有善惡則氣各以類應但非謂行此一事即有此一應統言之一德修則凡德必修一氣和則凡氣必和分言之則德各有方氣各有象肅者雨之類乂者𤾉之類求其所以然之故固各有當也今試以其分者言之肅是恭敬敬自生和故時雨應之乂是整理物理則明故時暘應之哲是昭融融者氣暖故時燠應之謀是藏密密者凝斂故時寒應之聖是通明通則爽逹故時風應之狂者流而不節故恆雨僭者瀆而不倫故恆暘豫者舒而不斂故恆燠急者斂而不舒故恆寒䝉者蔽而不開故恆風朱子亦謂古人意思精密只於五事上體察是有此理今人心粗膽大自見不到看不出耳至以其合者言之一事得則五事從休徵無不應矣一事失則五事違咎徵無不應矣譬如能敬者决無昏蔽而作狂者必至僭差鯀陻洪水水性失而五行為之汨陳即此理也總之天地隂陽之氣一失其和即當以五事循環自省不可謂某事無缺於某徵無關而不自引咎亦不可謂某徵告災但修某事而不及其他也抑臣謂天地間理與數而已聖人在上玉燭調泰階平百姓太和萬物咸若此理之常也周末無寒歲則廢弛之驗秦亡無燠年為慘急之徵衰亂之世災害因之若夫堯有九年之水湯有七年之旱此數之變也理者聖賢之所守數非聖賢之所操然或然之數終不能勝必然之理也堯湯雖不無水旱而卒能消水旱之災數不越理而理可回數聖人所以能挽天地之造化而成萬物也則洪範省徵之說其有關乎治道者豈細故哉書經王省惟歲卿士惟月師尹惟日歲月日時無易百榖用成乂用明俊民用章家用平康編修臣顧汝修孔頴逹疏王之省職兼總羣吏如歲卿士如月師尹如日其如歲月日者皆無改易百榖用此而成歲豐稔也治用是而明世安泰也俊民用此而章在官位也國家用此而平安風俗和也此大陳君臣之象成皇極之事其道得則其美應如此非徒風雨寒燠而已蔡沈集傳王者之徵以歲卿士以月師尹以日三者雨暘寒燠風不失其時則其效如此休徵所感也臣謹按上天之載無聲無臭誠感而應捷於影響往往匹夫匹婦精専之至遂能見神人之同原通幽明為一道其偏端之貫徹者如此推而上之師尹可知矣卿士更可知矣至於王者父天母地其氣與上下相流通抑又可知矣是故王者奉若天道端立於單心基命之微而敷施得官人行政之當用以表率廷臣各敬爾位其君齊莊中正垂裳而敕幾其臣震動恪恭亮工而熙載積為大順以召百祥非必如後世所稱甘露醴泉神雀芝草之瑞也止此雨暘寒燠風五者均之調之無過不及而由是歲書大有人樂升平治道之光昌民情之茂美無不具見於此試取疏與集傳之言觀之其㫖互異以歲月日分配王者以下而謂五事之徵尚微更陳皇極之得之應以至於年豐世泰官理俗和此離雨暘寒燠風而二之孔頴逹之說也以歲月日為王及卿士師尹各就尊卑析言其徵三者之徵不爽而所感遂至如此之盛此由雨暘寒燠風而推之蔡沈之說也今由下文庶民惟星以觀則如歲如月如日孔疏為長而蔡沈近於曲說然孔氏以五事之徵為未足而必指百榖四者為大陳皇極之應則又不若集傳沿休徵以推衍之為是也今夫雨暘寒燠風天之所以布其令人之所以順其化而君相之所調燮以盡其心者也五者協應中節無差自成隆平之休醇古之治此復何所不足而且休徵本於五事原非偶然人君敬修其身至於肅乂哲謀聖無所不備豈其止足以致雨暘寒燠風之不失而年豐世泰官理俗和猶有更進一解之理又况乎貌言視聽思己該身心之大全既由是以致此休徵而又於休徵以外大陳君臣之象成皇極之事則所云建其有極果於五事之餘别有他道也哉總之聖帝明王所愼者身所敬者天身之內外交修天之隂陽效順驗諸風雨之無愆釀為朝野之胥洽而惟加意於貌言視聽思以率乃百辟卿大夫於以徵其應於天成其化於世此固不誣之理大美之業也歟書經曰王省惟歲卿士惟月師尹惟日編修臣儲晉觀蔡沈曰歲月日以尊卑為徵也王者之失得其徵以歲卿士之失得其徵以月師尹之失得其徵以日臣謹按洪範庶徵其言天人之故詳矣王者代天理物而卿士師尹左右承弼尊者所理大而要卑者所理小而詳故歲之統月月之統日猶君之統乎卿士卿士之統乎師尹也省歲省月省日者省乎時之休咎以考乎事之得失云爾非謂一事之得失即有一時之休咎以應之也夫泥氣化於人事者漢儒五行災異之論多以附會失之至王安石天變不足畏之言直謂氣化無關於人事則尤悍然罔上而顯背乎禹箕之明訓者矣蓋天行之休咎不可必人事之得失則可防致謹乎人事之幾以察乎天行之數震動恪恭無敢怠荒則德修而和氣應之此其常也即休咎之或爽其應焉適可以為恐懼修省之資而固無損於清和咸理之治也且以堯湯之聖水旱不免此豈盡由人事哉然帝曰洚水警豫湯以六事自責蓋䝉福而不有其功遇灾而若引為過聖帝明王之所以所天而永命者其道固如是也今夫榖實之登耗政治之臧否人才之通塞民生之苦樂此人事之大者肅乂哲謀之用施諸此四者而已王及卿士師尹之所共理先諸此四者而已朱子曰君秉君道臣行臣職君君臣臣猶嵗月日時之不易此省之之義也如是而休徵協應亦第著其效於四者之間而非若後世之侈陳符瑞涉於禨祥䜟緯之說然則君臣間所克自盡者不誠有其要務歟易曰自天祐之吉無不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也故實意感孚則天心昭格實政漸被則景福攸同人君無晏安逸豫之懷而精勤圖治愼始以要終人臣無狥利近名之念而刻勵奉公居位以稱職上下交省人事常修穆穆明明克謹天戒惟崇乎實而思副乎其名也周禮大宰歲終受百官之㑹而詔王廢置小宰月終受羣吏之要宰夫旬終正日成此與省歲省月省日之文相為表裏雖不言天人之應而義亦在其中矣書經王省惟歲卿士惟月師尹惟日編修臣葉酉臣謹按此一節申明念用庶徵之義而言王與卿士師尹當各盡其修省之實也蓋天人之際止此一理相流通故在人者此理在天者即此理而氣乃附理以行者也誠使敬用五事而於肅乂哲謀聖之理皆罔或忒焉則吾之氣順而天地之氣無不順此雨𤾉燠寒風之所以時若也王者代天理民必無一物之不得其所而其責始盡茍庶徵或備或無固有不容不任其咎者三代以前無論已即如漢文帝唐太宗皆嘗詔二三執政及百官悉思其過失而極言之所為王省惟歲之說也顧萬幾不可以一人治卿士師尹皆佐天子以理萬物者也其可訑訑處堂行呼唱於內廷外衢而已乎故庶徵之休咎有見於一月者則卿士省之有見於一日者則師尹省之蓋尊者職要卑者職詳其分固各有所當也周禮小宰月終受羣吏之要宰夫旬終正日成可與此義相證乃宋儒蔡沈注此節云王之失得其徵以歲卿士之失得其徵以月師尹之失得其徵以日蓋五者之休咎有係一歲之利害有係一月一日之利害各以其大小言之果如其說則歲月日特以休咎之大小而言王省其大者豈休咎之小者遂可不省卿尹省其小者豈休咎之大者反可不省乎臣謂卿士師尹之省月省日無非為王之省嵗計耳蓋天災流行堯湯不免惟先時而豫為之計則天不能災而國自無捐瘠之患昔劉晏為轉運使諸道置知院官每旬月具州縣雨雪豐歉之狀白使司知院官始見不稔之端即申某時須如干蠲免某時須如干救助及期晏不俟州縣申請即奏行之晏特唐之一轉運使耳而所以能使民各安其居業而户口蕃息者以其應民之急未嘗失時也故一日之休咎必使師尹省之逐日以上於卿士一月之休咎必使卿士省之逐月以上於王如是而四方年榖豐歉之狀無復壅於上聞可知矣休咎不壅於上聞而王乃總其成而加之省憂天下之民猶有不得其所者未之前聞然其序必自王始者何也蓋好諛惡直者人之情也王茍不樂聞災則卿士師尹雖有災而不告其省日省月凡有休咎必以告而不壅於上聞者由王之能省歲也王能省歲而卿士師尹有恝於視民而不惟日月之是省者王誅有所必加矣故歲統月日猶王統卿尹提綱挈領其要端在王者哉書經庶民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨編修臣劉綸蔡沈曰民之麗乎土猶星之麗乎天也星雖有好風好雨之異而日月之行則有冬有夏之常以月之常行而從星之異好以卿士師尹之常職而從民之異欲則其從民者非以徇民矣臣謹按洪範之次庶徵也既以省歲省月省日分繫之王與卿士師尹矣其於民則但繫以星而不復言省者明養欲給求之柄原非百姓所自操星非日月無以從其好民非卿尹無以從其欲也其於從星則但繫以日月而不復言歲者明承流布化之權本屬庶僚所共效日月有常行以紀歲功卿尹有常職以宣主德也蓋卿尹奉為上為德之心行為下為民之事其典司也有定而翊贊也無方虞書所稱浚明亮采以撫五辰是即卿尹之有冬有夏矣月令所稱行慶恤孤以逹四氣是即卿尹之以雨以風矣乃孔頴逹正義之言曰月行雖有常道而時或離道以從星夫以從星之故而至於離道則似以雨以風之好非即本於有冬有夏之行豈為卿尹者亦能於陳紀立綱數大端以外别求所謂便宜一切之務歟今按朱子云二十八宿環繞日月行道之側月行必經歷之故星非實有好但氣類相感月非實有從但躔度相次又按集傳云日有中道月有九行月行東北入於箕則多風月行西南入於畢則多雨由斯以推鄭康成嘗言南宫好暘月南行亦當以暘從北宫好燠月北行亦當以燠從中宫四季好寒月中行亦當以寒從惟其善循乎一定之行自能兼協乎無定之好大聖人朝乾夕惕於上賢百執事歲㑹月要於下而饑者以食寒者以衣鰥寡惸獨廢疾者以養誠用此道也然則卿尹之從民也必何如而可夫欲自副其從民之職惟共協其從民之心欲共協其從民之心惟各化其從己之見其在周官之文曰六卿分職各率其屬以倡九牧阜成兆民是為內臣者若網之有綱為外臣者如臂之使指內外相維而從之之機順矣其在周禮之文曰六官之治其屬六十大事則從其長小事則専逹是為大臣者無掣肘之政為小臣者無越爼之謀大小相統而從之之力均矣故夫日月之行有冬有夏者言卿尹典司有定惟自盡其所當為即所謂罔違道以干百姓之譽也月之從星則以風雨者言卿尹翊贊無方宜共謀其所各足即所謂罔咈百姓以從己之欲也至於上從民民愈捷於從上卿月普得天之照民星符拱極之歸則又大禹謨之所謂從欲以治而說命之所謂惟民從乂也書經庶民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨監察御史臣陳大玠臣謹按王者分至尊猶歲之無不統也卿士師尹分職率屬以阜成兆民猶日月之統於歲也至若庶民麗於上譬如星之麗於天箕星麗巽方居東北為木為風是以有風之好畢星麗兑方居西南為金為澤是以有雨之好日行黃道極南至於牽牛為冬至極北至於東井為夏至月行九道行入於箕則風行入於畢則雨此月從星則風雨之說也蓋月為水之精離於畢故多雨又水生木故次於箕遂多風理固然也更以七政按之即日之從星其於風雨也亦然如夏日行畢前後多雨冬日行箕前後多風夏暑雨冬祈寒其明徵也漢志言日象人君之行不可指而知以正行言之冬則南夏則北日之所行月之所隨也故民之安否省之於星星之風雨本之於日月乃雨暘寒燠風既徵於貌言視聽思又以所職大小省之於歲月日於以見皇極之君視履考祥如此之周旋而不敢忽也夫民之戴君也如戴天然其望君也如望歲然然天道之運行必日月昭其度而君澤之沾被必臣僚承其流若有司懷出納之吝羣吏多中飽之虞甚者稽汪洋之德惠而挾畛域之私心阻浩蕩之恩波以沽節省之虛譽將澤不能下逮而逺施欲使雨暘時若凡遊聖人之宇者莫不食德而飲和也難矣誠使卿士師尹共矢公忠各思靖獻知無不言言無不盡以殫其啓沃之誠而且推廣皇仁宣揚德意不為屯膏而為渙汗不為密雲不雨而為雲行雨施則休徵應於天五日一風十日一雨凡厥庶民有不遂其箕風畢雨之好哉書經不作無益害有益功乃成不貴異物賤用物民乃足監察御史臣書昌臣謹按自古明王撫御寰宇未有不欲化行俗美物阜時豐躋斯世於仁壽之域者也而殫力經營鮮能畢如其願欲豈其材之盡不逮歟顧以海內乂安烽警無聞政幾之暇遂爾閒情莫遏無益之作日增而不自覺其失珍異之物日陳而不自知其泰宅心侈大容或有焉初何嘗荒治理玩民瘼而漫不加之意也然而聰明智慮一之可以應萬事而有餘分之欲精一事而不足不急之務牽引既衆設施之際疏紊必多况一人之志念既紛則百爾之精神因以不篤草率奉行迄無實效此乃上下感應之神有非法制禁令所能及者雖不見有顯然妨害之跡而治定之功不能底於大成者實此無益之作害之也若夫風化之行不繫於下而獨繫於上一時無心之好尚散而為四方難挽之風俗雖典章具在小民至愚且競從意而不從令誇竒鬪勝互相尤效必將視布帛菽粟為泛常大啓奢靡之漸居竒射利者因得以施其兼併之伎倆而閭閻之生計日益困矣治忽之幾捷如轉環如是而失不如是則得所可恃者不在金湯而在乾惕之一念旅獒之篇所以有不作無益害有益功乃成不貴異物賤用物民乃足之訓也武王聖人貢􅋙細事召公猶諄諄告誡如此後之君若臣其隨事納言交相惕勵為更當何如耶然無益之事非一珍異之物多端要皆足以妨治功而戕生計茍非充類至義之盡則去此增彼害正相等惟在君人者不自寬假極體察之周詳施乾剛之獨斷而已書經夙夜罔或不勤不矜細行終纍大德侍讀臣鄂容安蔡沈曰或猶言萬一也此即謹德工夫或之一字最有意味一暫止息則非謹德矣矜矜持之矜臣謹按自古帝王未有不勤而能愼德以圖終者也以欽若之主在位七十載其時已百有餘歲而曰耄期倦勤則七十載之前所謂欽若昊天敬授人時者其勤可知也臯陶之陳謨於舜曰兢兢業業一日二日萬幾無曠庶官天工人其代之至於喜起賡歌必先之以敕天之命惟時惟幾其勤又可知也禹乘四載手胼足胝設鞀懸鐸嘉言罔伏飯一饋而七起不重尺璧而愛寸隂斯亦勤之至矣周公作無逸悉舉商周享國長久者皆自憂勤中來而文王自朝至於日中昃不遑暇食尤夙夜罔或不勤之明徵也漢唐以還號稱賢主者皆躬習勤勞以親政事近代如明太祖亦能勤於政治嘗諭侍臣曰朕即位有年常勤勵自勉臨朝待旦晡時還宫夜卧不能安席輒披衣起或仰觀天象見一星失次即為憂惕或量度民事有當速行者即次第筆記待曉發遣其夙夜不敢康又何如也人之言曰為君難其難也斯其所以勤歟故夙則尚未及晨平旦清明一日精神所由振也不勤則即於廢弛夜則不止於旰嚮晦入息一日視聼所由靜也不勤則即於怠荒罔或云者萬有一危之心也無大無細皆本之以上畏天命下顧民碞之念嚬笑不以假人􅉏御罔非正士則細行謹而大德無虞蓋盡小者大愼微者著積善在身猶長日加益而人不知也細行或虧其不為大德之纍者鮮矣夫旅􅋙一受豈足以纍武王盛德而召康公慮其不勤憂其終纍如此此以見人臣之愛其君若斯其至也唐魏徵上疏太宗始之十思繼以十漸殆亦得此意者歟書經若保赤子惟民其康乂侍讀學士臣裘曰修臣謹按自古言保民者多矣赤子一喻實發於此此圖治之本源而平天下之要道也顧臣竊嘗論之收人心於草創之時似易愜民志於承平之後較難何也鋒鏑擾攘之間方惴惴不能保其朝夕聞一二寬恤之典已稽首慶更生矣至於安樂日久志願日益奢則其望澤於上也日益厚如驕子索所欲於父母以必得而後快然為之父母者亦斷不以此改其愛子之常則是撫摩鞠育終無已時臣以為此非可家給而户為賜也其道在於司牧之吏吏之病民者有數端而肆為不善者弗與焉抱空文於簿書循故事於形迹其意在於自便其身而已民之休戚固漠然聽之也較公費之贏絀計私家之有無其意在於茍肥其室而已民之休戚又漠然聽之也視上官之嗜好揣大吏之情形其意在於逢迎幸進而已民之休戚又漠然聽之也是其平日本無一毫誠意之周流足以感孚而生其愛戴矣猝遇水旱之事請賑之外别無一策也又或請不以時賑不以實則饑者呼寒者號而爭奪之患起然又不能善為區畫也則相激而莫解至於相激而莫解則戮之既慮夫傷仁縱之又恐其壞法在上者雖甚愛吾民而礙難措置矣今夫受人之直為之哺其孩提而漫不加護惜焉人未有不艴且怒者食君之祿而漠視其民何以異此夫朝廷設官分職榮其章服廩其室家使之坐堂隍而臨蒞之者何為也哉不仰識此意而但漠然聽之是不獨負吾民亦且負吾君夫其負吾民乃所以負吾君也彼方欲彌縫其夙昔掩蓋其過愆則謂民愚不可以德感夫民愚果不可以德感乎召父杜母何以得此於民也今世稱守令者亦曰父母官矣父母之謂何顧名思義則安得身為其父母而不自子其子也視民如子子則未有不愛其父母者大學言潔矩而引樂只君子一詩謂民之所好好之民之所惡惡之此則保赤子之實也書經惟曰欲至于萬年惟王子子孫孫永保民監察御史臣陶正靖臣謹按詩之言天子萬年天子萬壽者不一而足蓋雖出於頌祝之詞而皆本於忠愛之意是以聖人録而存之若夫推本於先王之明德而下及於民依固未有如此之懇切著明者也夫周自后稷始基靖民積纍深厚本有享國長久之理至成王時郟鄏之鼎已定卜世卜年不為不久矣而周召諸臣所惓惓致望者如此豈誠有私天下之心哉一姓相承僭竊不作兵革不興使民皆安樂壽考無天札疵癘之患斯宗子家相之責克盡而無愧耳然則其所謂欲者非徒抱此虛願為必將有綢繆式固之事焉是故先王之成憲不可不遵書所謂無作聰明亂舊章者是也唐府兵之制壞於張說明開中之制壞於徐漙二人號為名臣而輕變舊法貽害無窮其他狥私廢法之徒不足論矣末俗之弊政不可不革易所謂通其變使民不倦者是也東晉陳頵之議格於王導而不能從韓范天章閣之對仁宗用之而弗克竟江左是以偏安而宋室卒於不振其他因循茍且之弊抑亦不勝數矣至於百年之計樹人則人才其先務秦誓所謂保我子孫黎民者也臣嘗妄論三代以前人才半成於教化三代以後人才全繫乎氣運氣運隆則人才與俱隆焉及其耗也文恬武熙詭隨容悅以竊祿而已甚至背公植黨角立爭勝雖有願治之主而國事靡所與屬蓋觀於唐宋明之季可謂長太息者矣惟聖人於方隆之㑹修教正俗使士皆敦本實厲名檢通經學古則朝野之間常有所倚重以弭其隙而折其萌其為益匪細也三者皆欲至萬年之大要也三者皆得則雖有小疵不足以纍大體固可以䝉業而安故說者謂三代之君能守其祖宗之法雖至今存可也蓋非虛言也書經無疆惟休亦無疆惟恤監察御史臣書昌臣謹按國家代天理物凡有嘉祥之事謂之休有可憂勞之事謂之恤休與恤二者其勢相為倚伏其機迭為勝負圖之於後則百計彌縫而不足愼之於先則一心運量而有餘自古聖帝明王所為持盈保泰以迓景命以備不虞者此也周自文王遷豐舊邦新命武王遷鎬垂拱治成逮至成王則又營洛以朝諸侯宅中以撫萬國誠萬世無疆之休也方此之時海宇寧謐風教翔洽何嘗有可憂恤之情形見於端倪伏於微暗而召公思深慮逺惓惓忠愛既曰無疆惟休又曰亦無疆惟恤慶幸之念方深焦勞之思旋起此豈故為過甚之辭以聳動成王之聽聞哉蓋天下事無平不陂無往不復陽春之後必有霜雪晴霽之久必有隂雨狃目前之見者但知休而不知恤則恤即伏於休之內貽百世之謀者見為休而益見其可恤故休常保於恤之中休無疆而恤亦無疆此夙夜宥密戰兢惕厲所以凝彼蒼之眷顧者既無不至而綢繆牖户固本深根所以奠清寧於奕祀者亦無不至也敢自以為休乎敢曰無可恤乎然而休恤之數互相乘除其事雖在外而感召之本實由於大君之一身求之於外頭緒紛繁而莫解者反之於身則默為補救而緘機立轉捷如影響易如反手召公身膺佐理之任而必以鰓鰓過慮之語託之周公以上逹於王者得毋深有見於此乎夫成王禀聖賢之資纘文武之烈兼以輔相得人而猶君臣交警安不忘危若此此其所以申命用休克永無疆之大業也後之君若臣可以光前啓後之事為易而稍存玩忽以致憂恤相尋而不已歟書經王不敢後用顧畏于民碞給事中臣鍾衡真德秀曰召公此篇言畏天必及民是畏民當如畏天也周公作酒誥曰迪畏天顯小民多士曰罔顧于天顯民祗周召之啓告其君者如出一口臣謹按此言敬德為諴民之本而諴民必先以畏民也考當時成王始政命召公新營洛邑為朝覲諸侯之所而其建都實在鎬京鎬京據天下之上游扼山川之勝勢地形之險無有踰此者乃召公告王不以地險為可恃而以民碞為可畏所謂碞者蓋取巉巗不齊之意古人有言曰撫我則后虐我則讎傳曰君者舟也庶人者水也水則載舟水則覆舟民碞之象於兹可見知此則愚夫愚婦一能勝豫故畏深於馭朽祁寒暑雨惟曰怨咨故畏深於履尾涉氷如是而敬德其敢後乎夫人君有敢後之心則必有敢於自暇自逸之心有敢於自暇自逸之心則必有敢於罔顧天顯民祇之心故後者肆之萌而敢者驕之漸惟不敢後而念念敬畏則上帝之監觀可畏小民之視聽更可畏而以畏天之心畏民自必以上顧天命之心下顧民情所謂怨豈在明不見是圖者是也詩曰漸漸之石維其髙矣民碞似之又曰惴惴小心如臨于谷畏民之心似之其在酒誥之篇曰人無于水監當于民監顧畏之心似之非民碞無以見畏之至非顧畏無以見敬之至非不敢後無以見疾敬之至故召公之告王一則曰王其疾敬德再則曰肆惟王其疾敬德洵為諴民之本而即為祈天永命之本哉書經王敬作所編修臣白瀛臣謹按敬者聖學之所以成始而成終而自古帝王所為正朝廷以正百官正百官以正萬民者實本於此此召誥所以三致意也蓋人主所以制天下之事者本乎心而心之所主又有天理人欲之異二者一分而公私邪正之途判矣何則天理者此心之本然循之則其心公而且正人欲者此心之疾疢狥之則其心私而且邪公而正者逸而日休私而邪者勞而日拙其效至於治亂安危有大相懸絶者而其端特在於敬肆之間而已舜禹相傳所謂人心惟危道心惟微惟精惟一允執厥中者正謂此也且夫理欲不並域而居而天人每互爭其勝本心之善其體至微外物之攻其類甚衆嘗試驗之一日之間所謂娛耳悅目蕩志佚情者雜然並進其間心體湛然善端呈露之時蓋絶無而僅有也茍非居敬之功有以虛明其本體而不迷於公私邪正之所分則亦何以得天理之正勝人欲之私而應事物無窮之變乎程子之論敬有曰主一無適又曰整齊嚴肅斯實內外交養動靜互持之法也孔子之告顔淵曰克己復禮為仁一日克己復禮天下歸仁焉又申之曰非禮勿視非禮勿聽非禮勿言非禮勿動此真千聖相傳心法之要其所以察夫天理人欲之分而極乎靜存動察之要者可謂深切而著明矣後世不察而或以浮華相尚或以清淨為理二者交譏治術大壞良由不講夫敬以作所之功故至此爾抑知涉獵記誦雜博相髙非所以探淵源而出治道虛無寂滅應緣無礙非所以貫本末而立大中是以聖帝明王之御宇也必以敬為心法之要當其靜也一念之萌必謹而察之果天理耶則敬以擴之而不使少有壅閼果人欲耶則敬以絶之而不使少有凝滯推而至於言語動作之間用人處事之際無不以是主之務期此心洞然內外融徹而絶不使有一毫之私欲得以介乎其間夫是以寂然不動之時一物不容而萬理燦然感而遂通之際動必中禮而無所乖忤所謂體用一原顯微無間而正心修身治國平天下無不一以貫之者此道得也夫書經明作有功惇大成裕編修臣沈德潛金氏履祥曰勵精者乏寬大之體而寬大者少振勵之功二者兼之於振勵奮發之中有優游寬大之意此一代治體之所以為全美也臣謹按周家王業文武開之成王紹之而成周八百年忠厚之業實不外周公告成王明作惇大二語此成周之治法即萬世之治法也蓋嘗論之明作者建事之精神必於天下事勢是非得失之故如明鏡之虛受日月之照臨而因早作夜思以圖之其於立政用人之間宜因者因宜革者革宜進者進宜退者退不惑於人言而中心自疑不因乎畏難而中道自沮精神所到事業成焉所謂有功也惇大者建事之度量戒刻薄而主於和厚戒狹小而歸於廣博凡所以順常理而持國事者不違道不咈衆不急功不近名如穹昊之丕冒如江河之浸灌而覆幬雍容以遍育而徐俟之夫而後浹洽滋潤以幾治化之大純所謂成裕也若此者有分屬之義焉有包含之理焉有先後之序焉有互濟之用焉有要歸之㫖焉何言之治天下之道不外仁義兩端明作屬義即中庸所謂發强剛毅足以有執也惇大屬仁即中庸所謂寬裕溫柔足以有容也此分屬之義也既分屬乎仁義而人心有仁猶天行有春春生之氣貫乎四時仁愛之心貫乎四德故奮發有為之時無非和煦噢咻之意此包含之理也且人君行政無雜然並進者也必整飭乎朝常條貫乎綱紀使宇內釐然奉一人之意㫖而後與民休息俾相習於日用飲食黌序禮樂之中此先後之序也抑惇大主寬一於用寬恐玩狎而漸流於廢弛故振之明作以勵其氣明作主嚴一於用嚴恐操切而漸流於殘忍故養之惇大以若其天即孔子所論不競不絿不剛不柔之說此互濟之用也又思𠂻則主寬而政不廢嚴使人自愛不犯法而卒全乎物我同體之本願觀於國僑治鄭後至於老人兒啼諸葛亮治蜀後至於被罪者無怨彼為政於一國且然而况乎成周之仁覆天下者耶此要歸之㫖也然此二者兼之實難漢之元成固不免優柔不斷之失不得謂之惇大漢文恭儉寬厚可云惇大矣而不能奮起事功故政刑禮樂之間猶有未備周之天元隋之文帝固不免殘暴猜忌之失不得謂之明作漢宣綜核名實可云明作矣而不能以德化物故民風國脉之間多所未醇孰如周家之忠厚開國仁育義正者足享八百年久長之祚耶洵乎周公二語成周之治法實萬世之治法也我皇上上顧天命下畏民碞法堯舜之兢兢業業而經理之一心而遍乎四海萬邦之遙一日而計乎百年必世之後亦既勵精圖治於前矣從此益深以主敬之功存誠之學無間於中無倦於後敦崇寬大清和咸理使天下淪肌浹髓從容丕變而并忘乎其所以然此太和之盛跂足可期也抑聞大禹謨云后克艱厥后臣克艱厥臣今公卿百職之在位者果皆克艱與否有君如此其忍負諸惟精白乃心各盡其職毋隱默茍容面從後言以日贊夫明作惇大之治則明良熙皡之風不難再見於今日也夫書經明作有功惇大成裕編修臣程景伊蔡沈曰明白奮揚而赴功惇厚博大以裕俗金履祥曰厲精者乏寬大之體而寬大者少振厲之功二者兼之於振勵奮發之中有優柔寬大之意此一代治體所以為全美臣謹按為治之道必寬嚴迭用仁智兼施而後協於大中至正之則要未有明白詳盡如此兩言者蓋治功成於勤而敗於怠朝廷一息之晏安即足以開天下惰偷之習惟明則是非邪正灼然不紊而措施之失於暗昧者寡矣惟作則慶賞刑威確然必信而事機之失於叢脞者又寡矣以此赴功功未有不集者也治體成於寬而壞於迫宫府幾微之操切每足以貽數世刻核之憂惟惇則忠厚有餘名法不事而奉行之失於慘急者寡矣惟大則氣象寬博容保無疆而政體之失於苛細者又寡矣以此裕俗俗未有不裕者也雖然非獨貴乎専盡也必兼而盡之茍好言寬大而不濟之以明作名為寬大實廢弛耳因循茍且上下相䝉其患有不可勝言者茍斤斤焉以明作為事而不持大體則必察及隱暗以為智勾稽瑣屑以為能責功於旦夕以為神督過於細微以為密而民安所措其手足哉善乎聖門之言曰居敬而行簡以臨其民此不易之道也竊嘗以此考之於古偏者恆多全者恆少蓋惟聖人能化其性情氣質之偏而臻於學問中和之極外此高明而不能柔克沉潛而不能剛克嘗狃於所近而不自知宋儒吕祖謙有言漢文帝近於惇大成裕而無所謂明作有功漢宣帝近於明作有功而無所謂惇大成裕以臣論之不獨二帝古之賢主大抵類然然後歎成周之治法為不可及也抑臣觀成周之時成王以英睿之姿承文武之餘烈百度釐然海內大治不患不精明特患不渾厚耳然渾厚不從精明中出又懈弛而不得為裕周公明作之云正所以去宇宙間儇薄狹小之氣而成其裕也故復申之曰彼裕我民無逺用戾公之孜孜垂裕以固周家久安長治之基用心有如此者由此言之凝天命而綿國脉貴有包涵之德量而不在過用其聰明厚風俗而得人心自有久逺之規模而不在徒爭於小利聖王本此意以治天下則太和翔洽福祿無窮皆裕之一字貽之也周公之言豈獨驗於成周也哉御覽經史講義卷十三
