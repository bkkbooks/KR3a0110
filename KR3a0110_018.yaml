front:
  text: 欽定四庫全書御覽經史講義卷十二目録
  hash: sha256:6e1e7349e6461640d450c18880a3f52634a2ad218a1edd6e19be3391e4215112
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_018-1a, image: WYG0722/WYG0722-0159a.png}
body:
  text: 書經徳無常師主善為師善無常主協于克一檢討臣陳兆崙監察御史臣馬燝監察御史臣沈景瀾俾萬姓咸曰大哉王言又曰一哉王心克綏先王之禄永底烝民之生檢討臣鶴年汝分猷念以相從各設中于乃心侍讀臣黄孫懋鞠人謀人之保居叙欽監察御史臣胡寶瑔無總于貨寶生生自庸式敷民徳永肩一心侍講臣介福若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨啟乃心沃朕心侍講學士臣熊暉吉監察御史臣陳髙翔惟暨乃僚罔不同心以匡乃辟監察御史臣彭肇洙説復于王曰惟木從繩則正后從諫則聖后克聖臣不命其承疇敢不祗若王之休命監察御史臣徐以升后從諫則聖檢討臣李金臺惟天聰明惟聖時憲惟臣欽若惟民從乂右庶子臣陳浩給事中臣陳履平監察御史臣朱續經監察御史臣黄登貴惟天聰明惟聖時憲編修臣孫人龍監察御史臣鹿邁祖惟聖時憲編修臣王檢慮善以動動惟厥時編修臣秦勇均編修臣陸嘉穎監察御史臣孫宗溥惟事事乃其有備有備無患編修臣孫宗溥監察御史臣程盛修惟厥攸居政事惟醇右中允臣涂逢震編修臣汪士鍠監察御史臣孫灝監察御史臣沈廷芳非知之艱行之惟艱侍讀臣林令旭監察御史臣劉芳藹説曰王人求多聞時惟建事學于古訓乃有獲事不師古以克永世匪説攸聞惟學遜志務時敏厥修乃來允懷于兹道積于厥躬惟斆學半念終始典于學厥徳修罔覺給事中臣程鍾彦學于古訓乃有獲檢討臣王太岳惟學遜志務時敏厥修乃來允懷于兹道積于厥躬給事中臣邵錦濤惟學遜志務時敏厥修乃來允懷于兹道積于厥躬惟斆學半念終始典于學厥徳修罔覺給事中臣張鉞惟學遜志務時敏厥修乃來編修臣王楷監于先王成憲其永無愆給事中臣鍾衡惟説式克欽承旁招俊乂列于庶位給事中臣楊二酉
  hash: sha256:506a748d3a8e8c093fdc5be44e89e682e6382abc8920c08069b20ab63fa69334
