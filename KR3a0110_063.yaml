body:
  text: 周禮大司徒以鄉三物教萬民而賔興之一曰六德知仁聖義忠和二曰六行孝友睦姻任恤三曰六藝禮樂射御書數檢討臣廖鴻章臣謹按育才造士之法莫備於周而此則教之行於鄉者司徒主六鄉故以鄉三物教鄉內之萬民至於三物教成而舉賢者能者以禮禮賔之則俟之三年大比而鄉大夫之職也德先於行者得之於心而後能措之於行也藝次於德行者本末輕重之分先後之序也記曰古之王者建國君民教學為先又曰凡語於郊者必取賢斂才焉或以德進或以事舉或以言揚曲藝皆誓之以待又語蓋造就人才人主之所首重而取人之道未有不於根夲之地求之而僅取其枝葉者六德六行六藝之教雖行之於鄉學然觀於師氏保氏之文則所以教國子者亦未嘗舍是而别有他術也師氏以三德教國子曰至德以為道夲敏德以為行夲孝德以知逆惡教三行曰孝行以親父母友行以尊賢良順行以事師長夫至德即知仁聖義忠和之德也德修而後行道之基以立敏德鄭注引書惟學遜志務時敏釋之朱子所謂蓄德廣業之事也勤於六藝之學學明而後可以見諸躬行至于人之行莫大于孝言孝德則諸行胥統之矣而三行之教顧與六行不同者居鄉則重睦姻任恤國子則以親師取友為先義固各有當也行篤自可以息悖逆之萌三德三行其不異于鄉三物之為教也明矣若保氏所謂養國子以道而教之六藝者蓋道之與藝精粗同原五禮六樂五射五御六書九數皆至理所存故經文每德行道藝並稱教以藝正教以道也又如大司樂以樂德教國子曰中和祇庸孝友夫知仁聖義必以中和為至中和即至德也孝友即孝德也學者之心貴乎敬而有常則祇庸即敏德也此與師氏保氏之教無以異亦與大司徒三物之教無以異也成周之教之行于鄉國者豈不同條而共貫哉夫賢才國之夲也國學之士又由鄉學而升者也教化之行非自近無以及逺而欲養其材于大成必先端其趨于始事鄉舉里選之法在後世或所難行而教之之具或亡其實微特德行無取即藝亦無足觀記曰君子如欲化民成俗其必由學亦惟務其所以教之之實而已矣周禮以鄉三物教萬民而賔興之一曰六德知仁聖義忠和二曰六行孝友睦姻任恤三曰六藝禮樂射御書數監察御史臣趙青藜鄭氏康成曰知明於事仁愛人以及物聖通而先識義能斷時宜忠言以中心和不剛不柔善於父母為孝善於兄弟為友睦親於九族姻親於外親任信於友道恤振憂貧者賈氏公彥曰按保氏掌養國子以道教之六藝一曰五禮二曰六樂三曰五射四曰五御五曰六書六曰九數彼注云五禮吉凶賔軍嘉六樂雲門大咸大韶大夏大濩大武五射白矢參連剡注襄尺井儀五御鳴和鑾逐水曲過軍表舞交衢逐禽左六書象形㑹意轉注指事假借諧聲九數方田粟米差分少廣商功均輸方程嬴不足旁要彼注又云今有重差夕桀句股臣謹按治化之成在人才人才之盛在教育不有以教育之於前而思得人以理是楩楠杞梓不植於山騄駬驊騮不畜於廄雖使伯樂匠石過而顧之亦孰從求之又孰從空之故教不可以不亟也孔子曰唐虞之際於斯為盛言周才之逺紹中天而夏與商不及也論者謂文武為君周召為相禮明樂偹休和之氣藴於人心發乎謡俗播為聲詩而周南兔罝之什至以赳赳武夫上備公侯干城之選未已也夫且歌好仇詠腹心郁郁乎文哉抑知希其光者沃其膏繁其枝者培其根蓋其教之也必以實勝焉周禮大司徒以鄉三物教萬民而賔興之賔謂以飲酒之禮賔之是下所觀而化也興猶舉也是上所拜而受登於天府者也乃其操以為教術者初不出乎三物之外凡以實勝焉爾三物之目一曰六德所以厚其源二曰六行所以端其體三曰六藝所以鍊其能而要德之終曰和所以驗其養居行之先曰孝所以葆其天冠藝之首曰禮樂所以歸於道司徒頒之鄉大夫受之師非是無以教弟子非是無以學規模素定率由罔倦而道德於是乎一風俗於是乎同雖其書之閭胥者敬敏任恤而已書之族師者孝弟睦姻有學而己德不必全行不必備而其崇實以黜華則觀於閭胥族師之書而益信西漢去周未逺惠帝有孝弟力田之科而文帝舉孝廉武帝䇿賢良其法猶為近古至東漢順帝課諸生以章句試文吏以箋奏而士駸以華矣沿及兩晋踵而日甚洎乎唐宋未能盡革雖有願治之主思以復古而上求以實下應以名擷秀摛華爭事進取曰吾以博人間富若貴與一切功名才望也誰復退自省察其所為德行道藝者果何如哉故其時自好之士憂其實之漓也多從而歎惜之韓愈曰禮部所取類於俳優之詞令人忸怩不寧楊時曰文字自售古人必不如此而朱子并謂科目之設徒銷天下英雄之氣宋神宗擢司馬光為學士光辭曰臣不能四六神宗曰卿既學進士取髙第賦亦四六也以誥敕授光光不得已受之此數人者其平居立身行己皆有夲末涖官任事亦復卓有可紀而其見於言詞論說者乃如此則世之所以重士與士之所以自重固有在矣夫三代以下教不命於天子而徒以任之其父兄所恃以轉移士習者亦第以取舍决從違耳未有上作而下不應者也玉之在璞也惟其所琢泥之在鈞也惟其所鑄是以君子務實勝而雖謂卷阿鳴鳯棫朴薪槱一代人才之盛皆原夲於三物之賔興焉可也若夫司徒地官而教民之事屬焉固即虞廷命契之意抑以見逸居飽暖未足諴我萬民而期㑹簿書未足藉手以謝安擾邦國之責也是又周禮微㫖也夫周禮以鄉三物教萬民而賔興之監察御史臣劉方藹朱子曰古者學校選舉之法始於鄉黨而達於國都教之以德行道藝而興其賢者能者蓋其所以居之者無異處所以官之者無異術所以取之者無異路是以士有定志而無外慕三代之教藝為最下然皆有實用而不可闕其為法制之密又足以為治心養氣之助而進於道德之歸此古之為法所以能成人材而厚風俗濟世務而興太平也臣謹按古者學校之教其夲則五性其末則六藝其具則易象詩書其人則大司徒鄉大夫州長黨正族師閭胥比長是故一學校也人材出其中風俗出其中政理出其中選舉出其中道統治統以此而尊國夲國勢以此而立則學校之繫乎天下國家為至大而要以一誠為根夲蓋三物者原出於萬民之性分所固有職分所當為六德一實德也六行一實行也六藝一實用也由鄉而州而黨而族而閭而比其屬民讀法也或以正月或以四時孟月或以每月朔日其書以待考也或書其孝弟睦姻有學者或書其任恤者即一鄉以及六鄉六遂遍乎天下而放之而皆準所教之地有逺近人有衆寡官有尊卑事有繁簡法有詳略而教無不備之物誠不肯以茍且待人也取無或遺之長又不欲以純備苛人也聖天子重念此三物者天下人材非此不成天下風俗非此不厚天下世務非此不濟天下太平非此不興至誠懇摯以身教於上而大司徒鄉大夫以下典教之官日贊贊日孜孜莫不各輸其誠心以教所屬之民如父教子如兄教弟勤勤懇懇惟恐德行道藝之無所於成而在受教之民莫不相與感孚乎誠而各動於性情所不容己亹亹焉修其德敦其行習其藝或德成而上或藝成而下或行成而先或事成而後以待取於嵗終而待舉於三年三年內既别勤惰得失以馭分教之官三年外乃别賢能髙下以奬受教之民是聖天子能操斯民義理之命以勝上天氣數之命而使天下民生之氣禀悉變化於教思學問上以誠為教下以誠為學合朝野上下而以一誠相灌輸是以六德皆實德六行皆實行六藝皆實用而所為綱紀乎萬民鼓舞以賔興考校以三年而循環不已以興太平於無窮者實根柢於聖天子敬教勸學至誠無息之一心也然則三物之教賔興之典皆為治具而治夲則在一誠孟子謂徒法不能以自行程子謂必有關雎麟趾之意然後可行周官之法度荀卿謂有治人無治法是皆孔子所謂其人存則其政舉之意也夫周禮遂人掌邦之野凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以達于畿編修臣官獻瑶鄭氏康成曰遂溝洫澮皆所以通水于川也遂廣深各二尺溝倍之洫倍溝澮廣二尋深二仭徑畛涂道路皆所以通車徒于國都也徑容牛馬畛容大車涂容乘車一軌道容二軌路容三軌稻人掌稼下地以瀦畜水以防止水以溝蕩水以遂均水以列舍水以澮寫水以涉揚其芟作田鄭氏康成曰瀦者畜流水之波也防瀦旁隄也遂田首受水小溝也列田之畦㽟也澮田尾去水大溝也作猶治也開遂舍水于列中因涉之揚去前年所芟之草而治田種稻臣謹按周官溝澮之法先王所為用人之力以盡地之利任土之宜而補救乎天時之偏者也而既有遂人職復有稻人職者遂人所掌旱田之法也稻人所掌水田之法也顧成周之時遂人之法最詳其為利最溥彼稻人之職苐以佐遂人所不逮而已自周以後稻人之法浸偹其為利亦浸廣而遂人之政竟輟而不講此三代之民常有餘而三代以後之民常不足其大端多由于此為治者不可不盡心乎此也何以明其然也周官職方所掌之州有九其地之宜稻者惟荆揚二州耳其餘諸州皆宜黍稷菽麥者為多自遂人之政修而此宜黍稷菽麥之土旱常不至于乾水常不至于溢地廣而所入豐則耕三餘一耕九餘三勢所必至彼稻人之所掌者惟區區下隰之地而已故曰苐以佐遂人所不逮而法最詳利最溥者莫遂人若也秦漢以還阡陌興井田廢而五溝五涂之法亦從而廢矣乃稻人職所謂蓄水之瀦止水之防蕩水之溝舍水之列寫水之澮行于東南者則未嘗廢也豈惟不廢而已方且漸詳漸偹漸闢漸廣而嵗之所入亦漸多曩之財賦盛于西北者今且轉而之東南矣東南之水田既饒于是言水利者又將以東南之法行之于西北如班固溝洫志所載有鄭國渠龍首渠白公渠其溉田或至五千頃或至萬餘頃皆古稻人之遺法也然同是法也有行之而利者有行之而利害半者有行之未獲其利而但受其害者行之而利必其為可稼之下地而其土性又宜于粳稻也行之而利害半必其地勢雖下而泉源之遷徙靡常或土性疏而不宜乎粳稻也行之未獲其利而但受其害必其土不宜乎粳稻且去水源逺其為防不因水勢為溝又不因乎地勢也夫南北異方髙下異勢燥濕異性故旱田之不可為水猶水田之不可為旱也今必欲以荆揚之物産遍植之雍冀是苐知言水利而不知因地之利以為利也且果行遂人溝洫之法則西北旱田其利亦何减於東南何則西北諸州其地之廣輪既數倍於東南且榖之種類繁多有宜五種者有宜四種者有宜三種者周原膴膴土脈厚而水源深其肥沃比東南之塗泥又奚啻倍焉所患者惟水與旱耳溝洫修而水旱有偹則西北諸州嵗之所入非徒不减于東南且什伯而無算矣或疑井田既廢欲復遂人之法勢有所不行是又不然夫善復古者亦師其意而已矣觀周禮遂人之法原與稻人之法不同蓋稻田不可一日無水故以瀦畜之以防止之以遂均之矣又必以列舍之而後以澮寫之焉旱田則潦之為患者十之六七旱之為患者十之二三故遂人五溝之大小不同其實皆溝也揆先王為溝洫之夲意苐欲使水多之年水行溝中而不泛水少之年又可畜溝中之水以滋田耳今苐相其地之下者以為行水之區又相其地之最下者以為畜水之所疏其節而濶其目不用盡復古溝洫之制而已獲溝洫之利矣然此非可以旦夕期也又非一二人可以集事也其道在以治地之法責成有地治之官蓋今之邑令州牧即古鄉遂之吏也三年大比課其事之成否果有明效者大吏以聞或加秩或賜金而毋易其任其未效者亦且課督之以觀其後果無狀乃斥去之其工程尤大者官為民治之其小者則勸民自治如此則吏思效忠何患不可與圖事民爭騖利何患不可以慮始哉夫今之為吏者多置西北溝洫之政于不講其講溝洫者又苐知有稻人之法而不知有遂人之法臣故因周官而推論之如此云周禮凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以達于畿編修臣趙青藜鄭康成注曰遂溝洫澮皆所以通水于川也遂廣深各二尺溝倍之洫倍溝澮廣二尋深二仭徑畛涂道路皆所以通車徒于國都也徑容牛馬畛容大車涂容乘車一軌道容二軌路容三軌都之野涂與環涂同可也臣謹按遂溝洫澮川聖人之所以備天時盡地利以奠民居而為功于萬世者也畫野經土肇自黃帝至成周最為詳密周之興在西北西北地多廣平非若東南髙下相錯故東南水利半由天造而西北盡關人力溝洫之制不容以己也其後壞于魯隳于秦亦非一日之積矣漢唐宋儒者每言復井田其論誠為難通然以井田之難而并置溝洫可乎夫溝洫之制不定屬井田也鄭康成注匠人曰此畿內之采地制井田異于鄉遂及公邑朱子曰溝洫以十為數井田以九為數鄭氏注分作兩項却是是則鄉遂之田不必畫井而遂溝洫澮川既著于匠人又著于遂人者非以其制之盡善而無以復易歟匠人言溝洫有廣深之尋尺而此但辨夫家之衆寡别徑路之大小意固謂路下即溝溝下即田惟導之流行而不必拘其深廣且即其閒暇而相與修除則以一夫治徑遂力無不足積之合萬夫以治路川又豈有不足者而蘇洵謂非數百年之久不能此皆狃已成之局而憚于作始之辭也憚于作始而溝洫不治則天時無由偹地利無由盡民居無由奠矣臣竊計天時之行以十嵗為率其間水旱不過一二年誠使旱有所蓄水有所泄則嵗得八九熟也乃以其耕餘救其水旱而亦不為無偹是可嵗嵗熟也若夫地利之不盡豈惟荒蕪之謂哉臣習見東南之田一畝所入其上者可得粟三四石最下亦不減一石西北田所入其上僅足當東南之下地利可謂盡歟夫荒蕪而不治驅民力以墾之可耳治之而利未盡將終無盡時矣甚可惜也是以溝洫之制宜行於西北而其效之最著者于以定民之居以安所止而作息有常業俯仰多餘樂出入相親睦且以水佐耕者豐得以省挽運之勞以水助守者固有以限戎馬之足昔人論之矣而臣以為河水之漫溢亦可因以無虞夫西北河患秋汛為大所以然者西北之雨多在夏秋其滂沱無所歸必泛濫而并納於河河不能容而隄將失固非特其天氣使然也溝洫治而髙平之地皆成沃壤沃壤之區皆能容水即皆代河為消納而汛可遞减大禹自言其治水之功而曰濬畎澮距川者此爾然秦魯之君卒壞聖人之制者何也蓋其時徒知富國欲加賦于民而惡無由因以其所開之阡陌授之曰吾豫爾田爾輸吾賦民即有水旱而國固已獨富也聖人不忍忘其民故寧棄其地以為溝洫而正供不妨其儉飽暖必欲其遂究之嵗不為灾而戶日以增民無失所而情日以結既富方榖禮讓可興和氣致祥所得孰多臣故曰此萬世之業也周禮倉人掌粟入之藏辨九榖之物以待邦用若榖不足則止餘法用有餘則藏之以待凶而頒之監察御史臣葛德潤臣謹按君以養民為夲人君之所以儲財積粟凡以為民而已故既有廪人以掌九榖之數又有倉人以辨九榖之物掌者司入辨者司出無非酌盈劑虛留有餘以為民也夫九榖皆藏而曰掌粟入之藏者一嵗所收惟粟為多而又可久故舉粟以槩其餘也榖之品各殊邦之用亦異辨其物以待用則精粗各有所宜而邦無不給之用矣其曰榖不足則止餘法用者蓋法式所用有雖不足不可以己者有待有餘然後用者所謂止餘法用則是待有餘而後用者此時皆可减省也其曰有餘則藏之以待凶而頒之者豐年則斂之非斂之以為己利也收民之有餘以備他日之不足凶年則散之非散之以為己惠也濟民之不足而發前日之有餘積而能散無非充裕民之仁政也臣於是知積貯者信天下之大命茍儲蓄多而偹先預則何為而不成雖三代之制逺而難復而師其意以行之莫如常平之可久苐古人所儲凡以九榖而後世則或限以三四品是以斂之于民者専而聚之于官者恆不廣夫江南止于一稻而江以北則有粟有麥有豆西北之地雜糧尤夥惟當豐收之年不拘何色米榖相其賤者廣謀收糴而酌增其價以益農所收諸榖各貯一倉驗市所少而發之使人適足價平即止此外或借耔種或給官糧先其易腐者隨地隨時通融分散而留其米榖之耐久者以為儲蓄之偹此則收自優戶穰嵗之有餘散于貧人凶年之不足不使富家大賈挾輕資藴重積乘時所急十倍其利以侵奪于吾民斯則協于大易裒多益寡稱物平施之義符于遺人鄉里委積恤民囏厄之法繼取陳食農之美而得月令振乏之宜豈非有偹無患裕民足食之常經哉若夫課農桑禁游惰興陂池之利修疆里之功使民餘一餘三而自無不足之慮則又有在于積榖偹用之先者矣周禮大師教六詩曰風曰賦曰比曰興曰雅曰頌編修臣楊述曾鄭康成曰風言聖賢治道之遺化賦之言鋪鋪陳政教比取比類以言之興取善事以喻勸之雅正也言正者以為後世法頌之言誦也容也誦德廣以美之朱子曰風雅頌者聲樂部分之名也賦比興所以製作風雅頌之體也衆作雖多而聲音之節製作之體不外乎此故大師之教國子以是六者三經而三緯之臣謹按虞書詩言志歌永言詩序詩者志之所之在心為志發言為詩臣竊彚其義而繹之人生而靜天之性也感於物而動性之欲也情動於中而哀樂之心感言形於外而歌咏之聲發詩之所由作也詩既作矣聲音之節不同製作之體亦不一於是風雅頌以經之聲之所以成文也賦比興以緯之文之所以成章也且夫詩之為道其理本乎天地其用管乎人情雷之動風之偃皆詩之象而體未著蕢之桴土之鼓皆詩之用而文未彰自唐虞始肇其端至成周乃極其盛觀風問俗上有採詩之官論德陳功下有頌聲之作美刺諷喻有其文琴瑟塤箎有其器詩之用於是備矣乃六詩之教則掌於成均其故何哉蓋詩之感人最深其為教柔而易入故成均之法先之中和祇庸孝友以端其夲繼之興道諷誦言語以習其辭由是肄之以風雅頌導之以賦比興使之抑揚咏嘆以盡其情優游漸漬以求其趣久之而感發懲創之心油然而自生鼓舞動蕩之機從容而自得其功非旦夕之所奏其效非法禁之可幾此虞廷教胄所以領於典樂之官周代成均所以掌於司樂之職其揆一也後世詩之教不明詩之學亦寖失經師學生溺於章句訓詁以言詩而興觀群怨之㫖晦文人才士托於風雲月露以名詩而溫柔敦厚之道衰其或渺聞淺識之徒則以詩有别才非由學問抑或泥古拘墟之士又以詩可不為無關理道是二說者將使空踈者敢於逞辭弇陋者假之藏拙豈知漢魏以來揚風扢雅之作斷非不學之所能程朱大儒玩物適情之咏何嘗非至道之所寓哉善乎孔頴達之言曰詩理之先同乎開闢詩迹所用隨運而移今之詩不必皆古之詩古之教無不可通於今之教關雎鹿鳴文王清廟此崑岷之導源樂府歌行古詩近體此江河之𣲖别欲溯其源先循其委唐宋之體裁皆可為篇章之法式乃帖括之家丹鉛卒業不解風騷操觚之士南北殊音莫諧競病夫詩夲性情亦兼聲律聲律既乖性情亦不可見臣竊以為學詩者當先嚴其聲律則五七言為之宗欲自理其性情則三百篇為之夲故曰今之詩不必皆古之詩也古者十三誦詩豫於小學之時樂正夏教以詩習於大成之日虞周以詩教士而董之樂官唐宋以詩取士而行之大比倣虞周之意以通於唐宋之制則學校之試不妨參用詩篇經藝之餘亦可兼觀音韻故曰古之教無不可通於今之教也抑臣聞之詩者所以導揚盛美興起教化虞之君臣際明良而作歌周之成王致太平而興頌方今和氣翔洽文德誕敷誠使子襟之列樂志絃歌占畢之儒别裁風雅將見潤色鴻業鼓吹休明彬彬乎嫓美虞周豈不盛哉周禮籥章掌土鼓豳籥中春晝擊土鼓吹豳詩以逆暑中秋夜迎寒亦如之凡國祈年於田祖吹豳雅擊土鼓以樂田畯國祭蠟則吹豳頌擊土鼓以息老物監察御史臣趙青藜臣謹按鄭康成解豳詩即豳風七月篇朱子已然其說解豳雅豳頌亦即七月一篇而三分其說以當之朱子以為無是理也因疑楚茨信南山甫田大田四篇為豳雅思文臣工成王豐年載芟良耜六篇為豳頌其說見於大田良耜篇末集傳而意與鄭氏異夫七月一詩仰觀星辰俯察時物用逆寒暑義固昭已若豳雅豳頌古無明文而夫子刪訂又未嘗明揭其㫖鄭氏雖去古未逺欲以經文之所謂風者即指之為雅為頌義誠難安今觀楚茨信南山諸篇其中如以御田祖以祈甘雨饁彼南畝田畯至喜洵與祈年之文相應思文臣工諸篇其中如蒸畀祖妣以洽百禮有飶其香有椒其馨亦與息老之文相符而其餘則不必盡合故朱子亦疑之謂未知其是否也兼採衆說著之集傳者一謂夲有是詩而闕之一謂但以七月全篇隨事而變其音節以為風雅頌究乃自伸其說曰雅頌之中凡為農事而作者皆可冠以豳號此誠深有得於周公制禮之夲而凡周之所以立國以期於上下交勉君民相親繼繼繩繩重熙纍洽者胥於此而窺其全矣夫周自有邰以農事開國至公劉而遷於豳後之人遡王業所自始以為卜世卜年之基必推夲於此而歌詠者固以后稷建邦啓土而公劉克篤前烈也故朝夕所陳不出農桑衣食而總以寫其俗之忠愛春祈秋賽不外祭祀燕樂而總以道其君之憂勤祖宗之足法也臣下之力夲也在公之必敬也以臣事君而纍世之法守必藉此以入告以君飭臣而來茹之職業悉自是而釐成上以誠逮下下以忠利上於斯備矣周公之制禮也於逆暑迎寒祈年祭蠟必吹此以歌其盛其殆擊鼓吹豳君民咸在而尊祖敬宗尊君親上之風不可不隨時而加督也且夫周人以豳地發祥而亦以豳風裕後蓋自后稷公劉以蠶績耕稼之事教民而民之飲和食德者遂不覺風俗之何以厚而禮教之何以明周公欲以是式化於天下也故於一嵗之中三致意焉厥後諷誦既久漸摩獨異成康之朝海內刑措閲世三十歷年八百而國祚之綿逺較之定鼎所卜之數而實過之此以知衣食者禮讓之原而民氣之和樂神保之所為靈長也上帝胡以降福豐年焉耳時夏胡以陳常率育焉耳是以聖王務先成民好稼穡力夲業簡其游惰導之儉勤土物臧而人心淳人心淳而習尚朴合耦相助也移用相恤也機械之巧不作詬詈之事無聞隂陽和矣百昌蕃遂矣曽孫若而夀考萬年矣由是詠歌勤苦曲道情思風人之致固即七月之義焉而狀其豐儉正其禮俗何必非雅志其盈寧告厥成功何必非頌故惟朱子之義為契其源窺其全而紛紛之說俱可以不論云周禮籥章掌土鼓豳籥中春晝擊土鼓吹豳詩以逆暑中秋夜迎寒亦如之凡國祈年於田祖吹豳雅擊土鼓以樂田畯國祭蠟則吹豳頌擊土鼓以息老物編修臣王際華臣謹按國以民為夲民以食為天農田者天下之大計也自古言農事之詳者莫如周考司徒之屬於任土任民之法亦既備矣而春官復有籥章一職蓋周自公劉居豳修行后稷之教其民好稼穡務夲業實為王政之基周公輔成王追維祖宗積纍之勤詠歌樹藝田功之烈上陳於黼座下播於民間因以祀神而吹之此籥章一官所為設也夫農霑體塗足其事至勞朝錯言農人之苦春不得避風塵夏不得避暑熱秋不得避隂雨冬不得避寒凍故在上者固宜董勸之尤宜鼓舞而休息之周公用是譜田間之事於聲歌其詞稱昔日之美示之知所法其樂用先代之器令不忘其初迎暑於晝以求諸陽迎寒於夜以求諸隂祈年以開農事之始祭蠟以報嵗功之成所吹之詩鄭氏謂各歌其類若豳詩固七月之章矣至豳雅豳頌鄭注亦以為七月朱子曰一詩不宜分為風雅頌先儒或以生民諸篇當雅思文噫嘻豐年載芟當頌其皆名豳者以周王業起豳故總繫之豳也蓋一嵗四舉既以節宣天地之氣昭揚先世之德即以踴躍氓庶之情風示忠愛之義俾國中之民聞人主之勤勞稼穡先民不倦如此其摯也豐年之家給人足風醇俗厚如此其可樂也斯競勉於東作西成而惟土物之是愛矣則籥章一官正王者勞民勸相之精神周浹於襏襫耒耜之中而激昻振厲之倍至所以諴萬民而動天鍳屢致降康之慶也要之王者敬天即在勤民成周之盛調和時令鼓舞人情祈年報蠟息老勞農凡以盡人事而代天工自然民和而神降之福况物土詔種之得宜川渠灌溉之有法與夫懲游惰輕徭賦更非一朝一夕之故民生其時極終嵗之勤而忘其勞苦尊君親上婦子恬熙四宇從風人人各得其所觀所詠雨我公田遂及我私二語忠順之意油然見諸言表此豈無所致而然哉然則盛王之世上辛有祈榖之典吉亥有耕藉之禮與夫書無逸於御屏繪豳風於內殿何莫非此意也歟論語子曰足食足兵民信之矣侍講學士臣任啓運饒魯曰古者寓兵于農無事則並𨽻于司徒有事則𨽻于司馬大率古以五夫養一卒足食即以足兵也民信之信其有養有教使我勇且知方可以敵王所愾也雖曰三者實只是一事未有食足而兵不足食足兵足而民不信者也臣謹按六經無屯田之說然此即屯田所自始也蓋古之時無所謂兵兵即民之農者也春耕夏耘秋收皆以農事為重而春搜夏苖秋獮皆于農隙以講武事焉是為食謀者亦未嘗不為兵謀食茍足而兵自無不足也考之周禮仲冬教大閲其法特詳于三時以兵事為重而羅氏獻禽草笠而至其尊野服與息民之草服同是為兵謀者即為食謀兵足而食亦無不足也降至戰國之世有武卒有召募而兵與農始分農出田賦以養兵兵代之征戍以息民夫使兵而果足以衛民且代之征戍則農力耕而食之亦相報之義而無如承平日久兵非兵實惰民也視餉給以為當然甘其食䄖其衣且修飾儀容如婦人好女甚至典其甲胄弓刀以供朝夕之醉飽即朝廷恩恤之令屢下而百金之賞不足供其十日之歡是兵之食無日而足也食不足而兵何以足哉猝有征伐之事使令及之則骨戰齒鬪己身且不能自衛况能衛民是農民力耕而輸之司農以養兵者皆虛縻也且兵自少而壯自壯而老身既生子子復生孫老疾既足以縻餉生齒又必為之加餉日復一日加于胡底則莫若為之計經久計經久則莫若設屯田古聖人之養民也道在制民之産使仰足以事俯足以畜後世不能人授百畝之産而于兵則猶可為計也蓋兵極多不能加于古者一國之民而合天下未闢之田亦不下于古者一國之地則欲為兵足食誠莫若屯田漢文帝時從􅏯錯言募民徙塞下使屯戍之事蓋省輸將之費益寡此以民屯而即化民為兵也屯之一道也宣帝時趙充國擊先零羌罷騎兵而留步士萬人以屯使部曲相保烽燧相通羌人不得擾田者而蓄積日多此以兵屯化兵為農兵護農而農飽兵也屯之又一道也二者居屯法之大端矣蓋兵之氣欲其實不欲其驕明戚繼光募兵惟農民許入行伍市井遊手盡驅去之故以戰則勝此即古人三時務農一時講武之遺意也不然養驕兵如養驕子筋柔骨脆稍或勞頓疾疢大作况望其蒙犯霜露跋履山川哉如是而欲其為我戰勝攻取不可得也兵之心欲其一不欲其分家無內顧之憂則其前也有力氣已勝也不然未行而先顧其家氣早餒矣嬴三日糧而出其遞而輸者懸懸也氣更餒矣故兵之食足於官不如其足於家也足於京不如其足於地也二者非屯田莫由也且屯田則兵與地相安唐韓重華之營代北也東起振武西越雲州中極受降城凡六百餘里列柵二十此非為國守直為其家守非為國戰直為其所食之田戰也視遣戍之與地不習者相去逺矣且屯田則兵亦與農民為依諸葛亮屯渭濵兵居民間而百姓按堵鄧艾屯淮南北農官民田阡陌相屬者四百餘里此在異國且然况於㝢內視客兵之與民不習者又逺矣或曰屯田固善然行之開國則易行之繼世則難用之兵爭之時則易用之承平之久則難蓋耒耜雖勞視鋒鏑之危則安矣當此而使之屯是去其所甚危而豫以所甚安誠有不待再計决者若承平則不然矣昔宋太宗欲行屯于河北東路以陳恕為營田使恕密奏戍卒皆游惰仰食縣官一旦使冬被甲兵春執表耜恐變不測因而卒止此非承平日久必不可行之明驗歟然而陳恕之後何承矩亦為屯田使矣屯雄霸諸州當其時沮之者亦甚衆武臣既耻于營葺而初年因早霜不成議者益囂譁四起承矩不動不變卒以有成衆乃大服則又何也蓋愚民可與樂成難與慮始不知久逺之安惟偷旦夕之逸禹疏九河徒則大駭未幾而大使徒衆民樂赴功矣子曰民可使由之不可使知之故為叢而爵自趨之為淵而魚自歸之欲行屯之大計當先示以耕之小利密計天下可耕之地凡幾可使耕之兵凡幾但先募民之善農而無田者量給其飲食之費令其相度何處近水于稻為宜何處陸海黍稷為宜任其擇地之上者自行開墾不收其稅人見其收穫之利必有繼者不數年而此耕者已成富人則艷而效之者日益多且舉其率先而化導多者授以散職令焜耀于田所曰此以農而得官也由是而兵之願耕者給以牛種且教道之奬厲之願耕者日益多然後舉所計度者官為之疆界畀為永業若西自西山南至保定河間北抵檀順東至遷民鎮元脫脫成法具在略可放行其後耕者即以先耕者為之師如此則兵可化為農又仿三時務農一時講武之法使先耕者亦與兵同其射獵則農亦可化為兵而兵與民之情膠固守望相友出入相助民之情亦與地膠固戰則同勝守則同强溥天皆王土即率土皆王民舉天下若泰山而四維之也斯足食足兵之至即民信之至也孟子五畝之宅樹之以桑少詹事臣裘曰修臣謹按孟子經世之學偹于七篇而樹桑一語凡三舉之以為王道在此以是知樹蓄非細務也而今日蠶桑之利止于吳越數郡即三楚之人蓋有不知其務者至于北地更概乎未之聞焉毋乃執拘墟者之見以為是蓋非吾土之所宜乎夫孟子之告于齊告于梁者其地非必東南也其說非空虛而不可徴諸事實也且稽之禹貢之書于兖州則曰桑土既蠶是知兖州之宜桑也于荆州則列元纁之貢是知荆州之宜桑也于青州則曰岱畎絲枲既有絲枲而青州之宜桑又可見矣若夫吳越則固禹貢揚州之域也揚州之文亦僅厥篚織貝一言而已則當其時揚州之桑固未必多于兖與荆青兖荆青三州之桑亦未必少于揚州也乃今天下衣被之所賴皆仰給于吳越數郡此數郡絲帛之所出貿遷于遐邇其民待衣食于是者幾與田疇等而他處舉無之夫土田猶是也民人猶是也而地利物宜有盡有不盡則在乎人之講求之而已矣臣嘗論桑之性宜下隰亦宜髙原宜曠野亦宜狹隘詩不云乎彼汾一方言采其桑是下濕可桑也阪有桑是髙原可桑也降觀于桑是曠野可桑也女執懿筐遵彼微行爰求柔桑是狹隘可桑也觀于詩而見魏之宜桑焉衛之宜桑焉秦之宜桑焉豳之宜桑焉魏禹貢冀州之域也衛禹貢兖州之域也秦與豳禹貢雍州之域也九州之地無不宜桑也豳風七月言蠶織尤著然則無地之不宜桑也審矣而又何所疑于南北哉臣又考坑冶之利皆起于後代證諸史冊漢唐之世民間有無相將多以粟帛而四方之貢獻閭閻之上供朝廷之頒賜率是物也是知昔人于此致力多而施用廣夫農桑者衣食之大原前賢言夲政必農桑互舉今天下有不耕之人然無不耕之土農事偹矣而蠶桑獨曠焉缺焉雖祀事維隆禮儀畢舉而大河以北行數千里之地不聞繅絲作繭之聲非夲計之得也今官隄種栁在在皆是或仿此行之于阡陌廬舍之間悉令樹以桑而以吳越善蠶者為之教課毋冀其速效而徐考其成功用力不勞于民無擾由漸推之以及于逺或亦事之可行者乎至于師古而不泥于古使良法美意行之而無所扞格此又變而通之存乎其人者矣孟子孟子曰易其田疇薄其稅斂民可使富也編修臣莊存與朱子曰易治也疇耕治之田也臣謹按孟子此言誠富民之良法然不考之於古驗之於今則未知其言之必有效也所謂易其田疇者非闢草萊任土地之謂也有墾闢之名無墾闢之實則既治之田與弗治等是以聖人貴人力之勤而不貴土田之廣一夫百畝所受均也較其所獲上農與下農相差者四人則知係乎人而不係乎地矣欲盡人力以治地莫如代田之法此漢趙過所修后稷之遺教也一畝三畎而播種於畎中苖生葉以上稍耨壟草因壝其土以附苖根則根深而耐風與旱詩曰或耘或耔黍稷薿薿謂是法也趙過以是法教田於三輔每田五頃用二牛三人民或少牛則以人挽犁相與換功共作一嵗之收多縵田畝一斛以上善者倍之田五頃則增穀千斛矣此法簡易可行令出而民不擾法無便於此者也古者任地之法田以植榖宅以樹桑詩曰稅于桑田是也臣竊徴之經史傳記桑蠶之利北土為饒禹貢九州皆有貢篚而兖州特曰桑土既蠶七月之詩言豳之桑蠶至詳且悉職方并州之利布帛史記亦曰燕代田畜而事蠶逮及唐宋尚未之改北土宜桑明甚特未有以教之耳昔貢禹欲罷鑄錢之官而以布帛為用夫布帛不可尺寸分裂交易非錢不行禹之論誠為矯枉過正然使布帛與錢幣並用如唐宋之時計絹為直令精粗廣狹皆有常式則行之無弊而桑蠶之利有不待勸而民爭趨之矣總之戶口日益而田不加多桑蠶之利興則八口之家無坐食之民城郭村落之間無荒棄不治之土而謂民不可使富蓋未有也臣嘗考歷代賦民之制稅斂之薄未有如我朝者也古者什一而助謂之中正然尚有布縷力後之征軍旅田獵之賦今正供之外無餘征而尚未及於什一法更優於三代之盛時况自我皇上臨御以來賑貸蠲恤動盈千萬復特沛大惠普免天下正供錢糧停徴耗羡俾終嵗不聞追呼之擾誠亘古未有之盛事也顧或者私家之租重於公賦則稅斂之薄足以厚富民不足以厚貧民夫財不在上則在下富民既裕貧民亦得資其生豈必奪彼以與此哉其所以裒多益寡整齊流通而鼓舞不倦者固自有道焉臣嘗論今之業戶納正賦而收田租雖非食祿之人與古之有田祿者相類詩曰我疆我理南東其畝又曰我取其陳食我農人蓋其恤民之厚治田之勤至於如此今也不窺畎畝坐而待收田事之利病農夫之休戚若罔聞知操其贏餘重困貧弱政令不能齊科條不能禁唯在順其情而導之耳宜開力田之科設勸農之爵以齊之令民有能興修水利墾闢荒地著有成效及捐助榖石以備積儲假貸貧民不收贏利者酌其輕重酬之以爵定等威品列之制嚴冒濫矯僞之禁俾爵重而人知所勸夫官之與爵名實不同而人重之者法令使之然也官有定員爵無常額重爵以勸農則可以損有餘補不足而無曠官廢職之弊且以務農而受爵不可謂之僥幸也富民不私其財貧民不私其力畜積日豐風俗日厚或亦富民之一術也孝經孝弟之至通於神明光於四海編修臣任端書臣謹按天下有循其一端終身由之其效極於至廣而不可禦孰有加於孝弟乎哉其事為孩提之所知能其量必聖人而後能盡守之則為至德行之則為要道推而施之則為大順厚而積之則為太和諸福之物可致之祥莫不畢至自古帝王備號隆美而化成天下者未有不由此也孟子曰堯舜之道孝弟而已矣夫堯舜之聖至矣書稱帝德曰光被四表元德升聞其功業之崇盛蕩蕩巍巍莫可名頌而孟子與曹交言獨切指為孝弟此豈迂言乎蓋立人之道曰仁與義仁義足以備隂陽剛柔之理而總括乎中和位育之全然仁之實事親而已義之實從兄而已故伊訓曰立愛惟親立敬惟長記曰禮樂備而天地官禮主於敬樂主於和至愛則大樂之所以與天地同和也至敬則大禮之所以與天地同節也是故一言孝弟而格幽明洽逺邇胥統諸此矣且夫王者之孝與庶人異彼庶人者服勤就養奉意承志供子職而已王者承天地之重大奉宗廟之尊嚴非合萬國之歡心不可以荐馨非極四海而備養不可言孝思是故受社稷之付託則思保而固之念祖宗之艱難則思敬而承之思身為九族百官臣民兆庶所瞻視則當躬先而導帥之是以親耕祈榖所以供粢盛也郊社禘嘗所以明報夲也雞鳴問寢三朝侍膳所以昭不匱之節也宗祀明堂配以嚴父所以顯功德之隆也敬所尊而愛所親所以推祖考之意藹藹蒸蒸延及無窮也至於諴和萬民仁育萬物莫不夲此纒綿悱惻以將之以求極乎其量蓋不如是固無以言乎其至而稱聖人之盛德也臣嘗讀禮於文王世子見夙夜之純心焉於詩下武見武王之所以配命焉於昊天有成命與有馮有翼有孝有德見成王之引賢以自輔與其所以修身焉夫三代之隆至周而極顧推其致此之由亦無不夲之於孝弟故其詩曰永言孝思孝思維則言武王能繼美先王之德以受天之祐也又曰昭兹來許繩其祖武言成王能光大文謨武烈以基天成命也故其時禮樂興刑罰措天下之大人民之衆欣欣和樂相與篤於恭敬慈愛而天地神明亦因錫以鴻嘉之慶詩曰君子萬年介爾景福此太和之符孝弟之至自然之應也夫孝庸德也一人修之於身而其效通乎神明之幽光乎四海之大上觀唐虞之所以盛與文武成王之永祚於久長則所謂至德要道大順太和者豈不信然矣哉御覽經史講義卷二十六
