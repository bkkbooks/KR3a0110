body:
  text: 書經后克艱厥后臣克艱厥臣政乃乂黎民敏徳修撰臣于敏中林之竒曰世之人徒以舜之為君恭己正南面而己不知舜之君臣其都俞賡歌於一堂之上自一話一言未嘗不以克艱為戒惟君臣不忘於克艱兹所以享無為之治也王樵曰政乂民化正見其不可不克艱也蓋政自君臣出而民則觀上而興者也得於觀感風動神速故曰敏徳臣謹按太平之世海宇乂安民生熙皥論治者莫不歎美夫風化之隆抑知其君若臣平日之兢兢業業居安思危圖所以敷政寧人者蓋無不自艱難惕厲中來也典謨所載有虞之時地平天成六府修三事治庶績咸熙可謂盛矣乃大禹之陳謨必曰后克艱厥后臣克艱厥臣者何哉蓋大舜克艱之心惟禹知之為最深而大舜克艱之政惟禹見之為最切故君臣交儆念及于政乂民敏必推本於克艱亦曰鑒於已然防於未然憂其所當憂并憂其所不必憂戒其所當戒并戒其所不及戒而已不然豈以舜之大知而猶待禹之諄諄乎臣因是而思天下無不可化之民亦無不可行之政特一念之寛假久或流於廢弛一事之因循勢必難於整頓故曰艱也然而為臣子者各分一猷各任一職朝夕黽勉幸而無廢厥事其為職業也易副其為艱鉅也易勝若夫九州之大萬幾之賾紛然萃於一人戴黄屋而不有其尊履宸居而不有其貴求衣待旦早作夜思運天下於一心而無一時一事之不勞其智慮極言其艱并非股肱心膂所能代左右近侍所能窺即至於已治已安猶必持盈保泰之是凛用以鞏苞桑而固磐石則后之克艱豈易竟哉進而論之天生民而立之君君代天而任之臣君體天道臣亮天工無不當以敬天為心者也夫天命不易奉若無違君之敬天以克艱厥位不待言矣至如為臣之道亦豈惟夙夜匪懈以事一人哉善夫羅從彦之言曰立朝之士當愛君如愛父愛國如愛家愛民如愛子蓋平居既存忠愛之心臨事自無瞻顧之念至性所發可以對天地而質神明即至於鞠躬盡瘁猶恐此心有所未盡以負臣道而曠天工是之謂克艱是之謂敬天大禹陳謨朂君兼以自朂如此更讀益稷至勅天之命惟時惟幾數言愈可知有虞君臣雖賡歌颺拜時其交相勸勉者無非克艱之意終始不倦此無為之治所以稱極盛歟書經曰后克艱厥后臣克艱厥臣政乃乂黎民敏徳監察御史臣劉方藹蔡沈曰曰以下即禹衹承於帝之言也艱難也孔子曰為君難為臣不易即此意也乃者難辭也敏速也禹言為君而不敢易其為君之道臣而不敢易其為臣之職夙夜祇懼各務盡其所當為者則其政事乃能修治而無邪慝下民自然觀感速化於善而有不容己者矣臣謹按天下之大庶政極繁兆民極衆一切待理于主治之后輔治之臣求其政無不乂民無不徳厥惟艱哉然艱在事克艱在心艱不盡在事克艱仍在心克者能也克者勝也勵精于始以能為克堅守于終以勝為克道心所發克則必能人心所發克則必勝曰艱厥后艱厥臣是厥后厥臣各有分内無窮之艱難永肩于身惕厲于心刻不少寛毫不相貸務在殫心竭力必能勝之而有餘始不負投艱之責后克艱者無輕民事惟難無安厥位惟危慎終于始之心也臣克艱者為上為徳為下為民其難其慎之心也后以克艱明臣以克艱良政以克艱善民以克艱化則克艱要哉即唐虞之君臣以觀天必欽若時必敬授命官必欽亮功必欽恤刑必欽興事必欽省成必欽未嘗怠于心而儆戒無怠未嘗荒于事而儆戒無荒各竭其股肱耳目之才而思日贊贊各盡其翼為明聴之職而思日孜孜元首明矣猶慮叢脞股肱良矣猶慮其惰庶事康矣猶慮其墮后則朝夕乾惕臣則夙夜匪懈以此勤政而政理則府修事治功敘而庶績其凝以此勤民而民化則勞來匡直輔翼振徳而於變風動自能不疾而速矣夫乂不易得諸政也敏徳不易得諸民也必克艱厥后克艱厥臣其政其民乃庶幾其乂且敏徳也則克艱要哉然在聖后賢臣不敢謂政已乂也民敏徳也而或萌一易心也無時不以克艱之心各自凛也無時不以克艱之事交相儆也抑又思唐虞時政簡民淳后與臣尚且克艱於無盡况中天以後政則日繁民則日漓欲其又且敏徳尤艱於古則君臣之克艱尤甚於古思紹唐虞之治而君臣之所當思艱者其有盡乎哉書經后克艱厥后臣克艱厥臣編修臣劉慥蔡沈曰禹言為君而不敢易其為君之道臣而不敢易其為臣之職夙夜祇懼各務盡其所當為者林之竒曰世之人徒以舜之為君恭己正南面而己不知舜之君臣其都俞賡歌於一堂之上自一話一言未嘗不以克艱為戒惟君臣不忘於克艱兹所以享無為之治也吕祖謙曰禹言君臣之道蔽以克艱一言可謂至矣葢以為難則存敬畏之心以為易則啓驕逸之志此治亂安危所自分臣謹按自古君臣之徳業無窮而事功亦無盡其所以立體達用原始要終以貫徹乎徳業事功之内者總不外克艱之一心蓋萬方至大庶類甚紛天以其權付之后后以其任分之臣其間安危所係得失所關后與臣負荷仔肩真無旁貸無寛假祇可以自喻而不可以告諸人者以為艱洵莫艱於此矣然艱匪徒知之已也人非庸材孰不氷兢自矢而私或間之欲或分之常則忽之終則易之求其克艱者往往而鮮是必后與臣以徳業為事功持此克艱之志久而弗懈其始也精以察其幾一以致其决而於天人之介確然不移則凡怠荒逸佚固早已絶其萌矣由是經理萬端宰制羣動上顧天命下畏民碞欲興利也惟恐利未興而害即隨之欲除弊也惟恐弊未除而害且益甚夙夜戰兢常以不副厥后不副厥臣之心時凛於寤寐則克艱之中更覺其艱也是故創業之艱似倍於守成臣獨謂守成之艱實倍於創業何者創業之初斯民久在水火一旦革故鼎新時至事起后若臣殫精竭力開太平之基而四方已定人無不樂其更生者惟是守成之後天下溺於晏安閭閻習於奢靡萌孽恐其竊發也而防閑艱倉廩恐其虚耗也而儲蓄艱水旱恐其時遇也而賑恤艱囂凌恐其漸長也而懲治艱虞詐恐其日盛也而化導艱章程恐其漸弛也而振作艱㢘耻恐其日冺也而維持艱所以制治未亂保邦未危過嚴則猛而過寛則慢真有什伯千萬倍之艱者惟后勿敢易其為后臣勿敢易其為臣正心誠意交儆一堂未事而預謀當幾而詳審不競不絿無偏無黨神遊千萬里之遥慮周千百世之逺説命曰惟事事乃其有備有備無患為君臣者欲事事有備無患則克艱之心詎敢須臾少釋耶昔孔子引人言為君難為臣不易夫難與不易原分重輕然亦就主治輔治别其責之大小耳試觀臯䕫伊旦無不以國事為己事其克艱之心未嘗減於君禹故統之曰克艱也但世不乏明主而每患少良臣三代以前君臣一徳喜起賡歌夐乎尚矣即漢之文帝唐之太宗其時若申屠嘉魏徵輩亦能相與有成者蓋一人既以天下之心為心諸臣即當以一人之心為心則以實心行實政同心交輔上下克艱徳業成而事功著斯政乃乂黎民敏徳何慮治不古若耶臣聞志不惕則神不凛古之人盤盂有銘刀劍有銘户牖有銘所以觸目而警心也臣不揣固陋敬為萬世御座銘其辭曰天生蒸民作之君師動静語黙日監在兹遥遥寰宇一人是主惟命靡常有徳斯祜於皇念哉惺惺靈臺敬勝義勝厥修乃來夙夜戰兢深宫乾惕一夫失所已饑已溺惟明乃斷惟虚乃公剛克柔克允執厥中安不忘危治不忘亂文徳武功有備無患一日二日端在謹幾漸不可長顯由於微理財有經知人則哲明慎用刑黎民徧徳清心寡欲去佞任賢乾綱獨攬國本乃堅從諫如流賞罰不忒持滿戒盈温恭允塞堂㢘咨儆上下交修禮陶樂淑永綏大猷欽哉元首承先啓後祖考式憑克艱厥后又為萬世臣陛銘其辭曰堯舜君民引為己任布化宣猷期於克稱夙夜匪懈端在勿欺天威咫尺豈但四知工曰天工位曰天位受禄膺封何以無愧是惟盡職詎論尊卑各循已分知無不為敬則生明勤則生敏赴事圖幾怠荒悉冺公爾忘私國爾忘家殫忠竭智砥礪有加匪徇而情匪植而黨同寅協恭善類斯廣芸芸兆姓原吾同胞推心置腹轉達恩膏立綱陳紀有條有理善則歸君過則歸己防微杜漸勿曠庶官功崇業廣永圖治安守經達權慎終如始道有當然敦行不已為上為徳為下為民欽哉聖訓克艱厥臣書經后克艱厥后臣克艱厥臣編修臣錢琦吕祖謙曰克艱者厥后厥臣各止其所之意君克艱君之事臣克艱臣之事思不出其位也臣謹按古今治亂安危之機常相倚伏未有不自上下交儆乃克致於上下交泰者一日不宵旰則萬幾之叢脞因之一事不奮勤則百事之因循積之其幾甚微而所關為最大無他勤苦之至造物亦鑒其衷怠玩之萌匪僻即乗其隙事有必至理有固然也今有尋常士庶之家其所治不過數人耳其所經理一日不過數事耳顧其父肯堂其子肯構必有相濟之美而後可以振厥家聲而况所治與所經理更有萬萬倍於此者且夫守成之后尤與創業異何則王者受命而興将欲垂統於無窮必不暇作晏安之想且其時天下甫定即凡一切事宜但得規模大備已足觀矣若數𫝊而後風會日新文明大啟其間因革損益與時變通欲承先王之徳而褒大其功則其所為大備者當必進於美善焉而又承平日久玩志易生庶務日繁倦心易起昔匡衡有言曰聰明疏通者戒於太察寡聞少見者戒於壅蔽勇猛剛强者戒於太暴仁愛温良者戒於無斷湛静安舒者戒於後時廣心浩大者戒於遺忘必審己之所當戒而齊之以義然後中和之化應然則持盈保泰之思較之撥亂反正之意洵當有深馬者若夫無曠庶官天工人其代之則后之艱即皆臣之艱也其大臣則職在調和燮理其小臣亦當効力宣猷其在外者則職在布化承流其在内者亦有官守言責然而為上或致於損下師古或易於泥今喜功者好言振作而未免紛更避事者托言鎮静而多致廢弛縱聖明寛大亦或舍短而録長而此中未慊寤寐能自安乎然則如何説者謂后與臣總莫若以實心行實政臣愚獨謂政患其不實心患其不虚試觀三代以後不乏勵精圖治之君臣顧往往欲興一利而弊即隨之甫除一弊而弊又中之揆其故大約信心太過恃其意之無他而愈以增其偏執膠固之害虚則公公則明明則誠誠則自無不實故下文即曰稽於衆舍己從人蓋言心不可不虚也抑臣更有説焉天下事衆勞不能獨安衆勤不能獨逸世未有舉朝盡臯䕫稷契之臣而不能致君於堯舜者也慕笙簧之樂而委蛇自得雖賡歌之盛無補朝綱挾夙夜之誠而盡瘁鞠躬即吁咈之中無慚一徳商書亦曰為上為徳為下為民蓋臣責之所係若是之重且大則知人則哲人君用人之際是尤所當謹慎者歟書經帝曰俞允若兹嘉言罔攸伏野無遺賢萬邦咸寧編修臣諸錦孔安國傳云攸所也善言無所伏言必用如此則賢才在位天下安寧蔡沈集傳云舜然禹之言以為信能如此則必有以廣延衆論悉致羣賢而天下之民咸被其澤無不得其所矣臣謹按經義而知治天下莫大於用人用人惟其賢而賢之可見者先徵於言此舜禹孜孜相詢者急親賢也用以四言推廣其義藴而比次敷陳之以備天家用賢之治理焉國家之政首在得人穆穆唐虞四岳五臣翼為明聴賔于四門都俞吁咈喜起臣鄰殳斨伯與帝曰工倕百揆庶尹朱虎熊羆兩階率舞九成來儀孰典禮樂䕫龍伯夷禹拜昌言九歌勿壊地平天成萬世永賴亦越成湯得師者王用人惟己立賢無方汝鳩汝房誼伯仲伯司空明居巫咸伊陟甘盤傅說武丁中興聖惟從諫正則從繩豈無巨川惟賢楫之豈無酒醴惟賢糵之亦有鹽梅而不和羮功用曷施鼎鼐焉成繄惟古訓學則多聞允協成徳永綏兆民文武造邦誰贊厥功干城罝兎渭水非熊卷阿矢音鳳鳴雝喈成周太和邦實榮懐吉甫作誦宣平聿昭烝民韓奕江漢崧髙洎乎春秋强弱詘伸晉文克伯三士上人管鮑髙國桓公以安衛多君子史蘧在焉展禽受命齊侯還師子産有辭諸侯賴之不貪為寶賢哉司城秦得奚余西陲式增倚相射父楚實有材宗國之楨新甫徂徠七雄並峙戰國之問駿馬市骨金臺集賢神師出拜甲士争先報燕樂毅復齊田單干木藩魏却秦魯連存魯端木霸越計然包胥救楚子房為韓相如澠池趙璧既完樂羊篋滿倚任中山彼區區者偏霸是屛得賢之効尚莫與京漢髙新豐蕭曹魏丙南陽王業鄧馮冦耿堂堂武鄉抱膝隆中仁義之師儒者之宗唐之賢臣姚宋房杜開元之際九齡風度建中克復渾瑊馬燧外惟李晟内實陸贄憲宗恢宇相臣裴度㑹昌復振亦有徳裕中間馬周千載奇遇風雲㑹合明良作覩慶歴以還文富范韓君實作相磐石之安連茹彚征張秦范劉珥筆編年著録千秋眉山軾轍廬陵敞攽長樂兩陳南豐二曾追韓躡歐包劉越嬴禮樂文章玉質金聲濂洛以來文教大成聖主在上逺過漢唐師臣者帝賔臣者王賢退而吁賢進而俞賢集而都賢乏而需于以董正扈民無淫于以典禮有林有壬于以經費民用不匱于以勞民民之攸塈獻納雨露奉常寅清平司廷尉仙集蓬瀛司冦詰宄播以祥刑兵革無虞水土既平凡此光榮惟賢是成其在髙辛八愷挺生齊聖廣淵明允篤誠其在髙陽八元孔多忠肅共懿宣慈恵和麟之儀儀鳳之師師芃芃黍苗湛湛露斯薄海來賀四方無侮九州攸同萬邦無斁毋曰無式有馮有翼毋曰無職有孝有徳非賢不乂非后不食雉膏待斟井渫用汲承天之祐一人有慶心無為也以守至正萬邦咸寧羣黎百姓猗與萬載保泰之盛臣不勝竦懼戰慄之至書經嘉言罔攸伏編修臣竇光鼐臣謹按禹之祇承于帝曰后克艱厥后臣克艱厥臣而舜之答禹首以嘉言罔攸伏為言此可以知帝王致治之本矣夫舜以濬哲温恭之徳廣敷奏明試之治豈真有或伏之嘉言乎而猶諄諄於此者何也蓋天下之理雖聖人亦有所不能盡而日用飲食之事雖愚夫可以與知今有十事於此我知其九而不知其一則一事廢矣自一而積之至於十百千萬其廢者已不可勝計也而况所知之未至於九也人知其一而我用其一則一事舉矣自一而積之至於十百千萬其舉者已不可勝計也而况所知之未必止於一也聖人知其然故常導之使言言善而人亦善則揚其言并舉其人言善而人未必善雖棄其人不廢其言明目達聰之朝寧有以言為諱者哉且夫古之所謂言者非如後世諫臺有専官也唐虞建官惟百夏商官倍周官三百六十無不得以言至於天子之前者然猶恐不及也則又有進善之旌誹謗之木敢諫之鼓史書過失工誦箴諫士傳民語御瞽幾聲之上下夫是以志同道通而嘉言不壅於上聞也中庸曰舜好問而好察邇言洪範曰汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮詩曰詢于芻蕘此帝王之治所以精粹純白無少瑕翳而其流風餘烈猶可以為後世法也唐太宗貞觀元年制諫官隨宰相入閣議事論者以為貞觀致治之本又嘗謂蕭瑀曰朕以弓矢定四方識之猶未能盡况天下之務乎乃命京官五品以上更宿中書内省數延見問民疾苦政事得失夫五品以上其人未未必皆賢即云賢矣其所見詎必有加於太宗哉而太宗孜孜求之若不及然故其時房杜王魏之徒繩愆糾謬輔贊政事虞褚姚歐之屬更日入直商確古今至於治成道洽史書大有二十餘年幾致刑措君子不以多諸臣輔治之力而以美太宗聴言之功夫非其明效大騐耶陸贄曰君人者以衆智為智以衆心為心恒恐一夫不盡其心一事不得其理魏徵曰君雖聖哲猶當虚己以受人故智者獻其謀勇者竭其力由是言之兼聴則明偏聴則暗盡下則興矜己則敗史冊所傳其已事可觀也然則舜闡克艱之㫖而諄諄以嘉言罔攸伏為言真萬世之金鑑也夫書經儆戒無虞侍讀學士臣金相林之奇曰舜之盛徳于淫佚怠荒諸事雖不至此然而儆戒之意實未嘗敢忘此益之所以拳拳為舜告也臣謹按自古帝王運際艱難經營締造不遑寧處有慮必獲有為必成惟常懐憂危之念故能燭照于未形彌縫於未著往往可憂之事自此而消若夫太平有象朝野清寧常自以為無足深憂往往可憂之機已隐伏乎其中而莫之覺由此觀之有虞而知儆也易無虞而知儆也難無虞而知儆者道徳之君也有虞而知儆者英明之主也無教逸欲有邦堯舜之無虞知儆也魏徵若在不使朕有是行唐太宗之有虞知儆也若夫有虞而並不知儆者斯又其次焉者也夫有虞知儆非材識明敏者不能悔悟深切然俟事至而方為之備患至而始為之防則倉皇急廹已有杌隉難安之勢曷若國家閒暇及是時明其政刑之為愈乎臨渴掘井勞而無成未兩綢繆民誰敢侮惟彼聖哲知覺獨先深謀逺慮無處弗周盛明而念及艱危一日而計及百世何其愛民之深憂民之切至于如此其極也漢唐以下賢君類皆茍可以安而止夫茍可以安而止則未可安而必不止可知也是以得失參半純疵相兼治不古若其以此哉明徳如舜怠荒佚樂寧或有此而禹陳克艱之謨益申儆戒之㫖其言罔失法度罔遊于逸罔淫于樂者修之身者也任賢勿貳去邪勿疑疑謀勿成百志惟熙者修之朝者也罔違道以干百姓之譽罔咈百姓以從已之欲者施之天下者也而貫徹乎始終檢束乎内外者則一以必儆必戒之心植其體而握其機焉在泰之上六曰城復于隍言不知所儆則泰即轉而為否也否之上九曰先否後喜言知所儆則否可轉而為泰也盛衰因乎時補救存乎人主治出乎君翼贊恃乎臣使君曰無虞而臣亦曰無虞君曰可虞而臣反曰無虞其不至君日驕而臣日諂者幾希矣然則無虞加儆豈獨君道為然凡屬股肱孰不宜共體此心以分任其責哉書經任賢勿貳去邪勿疑編修臣秦葸田蔡沈曰任賢以小人間之謂之貳去邪不能果斷謂之疑臣謹按平天下之道首重用人人品不同賢與邪二者而已用舍有定任與去二者而已其始貴有鑑别之識灼然而不淆其繼加以剛健之力毅然而不奪蓋賢邪之判在心術而心術之辨在公私心術而果出於公歟其氣象必有光明磊落之槩其行事必有公平正直之體難進易退爵禄非所戀也矯枉從正時議所弗徇也潔已獨立而不藉聲援竭忠盡愚而不避艱險在大僚則以責難陳善為恭而不以趨走承順為敬在下位則以恪勤匪懈為職而不以營求干謁為心隐微幽獨之中但知有愛君奉國故曰公也如心術而或出於私其情狀必有掩飾閉藏之態其行己専以便僻側媚為能始而患得終而患失脂韋諧俗而惟取模稜因循緘黙而但求保位其幸而循資歴俸以至大僚則容悦固寵而全無建白倘或淹滯下位則逢迎希冀而不憚卑汚處心積慮第知有身家爵禄故曰私也公與私之辨彰彰如是而任之去之往往有未當者則貳與疑之過也夫賢者之事君也議事則據理而不涉揣摩奉職則秉法而不容假借如事屬可行縱破成例而不顧如不可行雖違成命而不辭處唯唯諾諾之中獨有謇謇諤諤之概而奸邪之人惡其不便已也遂委曲隐約以中傷之不曰沽名則曰賣直不曰歸過則曰攬權日浸月潤漸就疎逺而不覺甚且有不原其大節而微疵小過指摘交加吏議亦隨其後者此從來善人君子每不能久安於朝廷之上而展其素志皆貳之故也彼邪人之保位者反以是為戒茍同隨俗務為彌縫非之無非刺之無刺當利害得失之交全不以民生國計為念其所輾轉躊躇者不曰拂上意則曰碍人情調停之外無他長承順之外無他術日復一日年復一年貪營係戀而不去雖人主穆清之中時多鑒察然以其小心寡過也則寛大以容之矣以其備位年久也則姑且以留之矣而不知職事已為之漸廢人心已為之漸靡風俗已為之漸偷紀綱已為之漸弛而其人享有禄位宴然自以為得計此則疑之説也然則如之何而後可亦惟曰誠而已矣剛而已矣誠則不貳剛則不疑果能確知其賢而任之開誠布公推心置腹與之斷大事而不疑其擅與之圖宻計而不患其私與之進退人才而不嫌其黨與之賞罰事權而不慮其専有所言而裁之以理無弗聴也有所行而規之以成無弗從也有所忤而曲諒其心無弗恕也有所薦而明試以功無弗容也光明洞達表裏如一則真意交孚融洽膠固雖欲少自退諉而情有所不安稍為欺隐而心有所不忍矣夫然後利有舉而必興害有除而必去朝廷之上寧復有委靡觀望之習待人主之焦心勞思别求挽回轉移之法哉至於隂邪之輩一有覺察則立加罷斥雖無大過亦勒令退居不使倖位以妨賢路如此則賢安有不任邪安有不去天下安有不治者是以誠為體以剛為用之效也夫以大舜之徳有虞之治其存心豈復有不誠其立政豈復有不剛而益顧以是諄諄進戒者實有見於誠之難盡而剛之未易足也誠者真實無妄而無一念之私剛者不可屈撓而無一毫之惑誠為剛之體必此心純粹中正全乎義理之公其燭物也如鑑之空而妍媸必當其處物也如衡之平而錙銖不差内不偏於喜怒好惡之情外屏絶乎籠絡駕馭之術乃能有所任而必果有所去而必决剛之用於是乎行此所以堯舜禹授受止此執中之㫖而兢兢業業總不外人心道心之間蓋以為勿貳勿疑之根柢也今觀二典所載自分命羲和至二十二人惟以任賢為事則庶幾不貳而堯在位日久當疇咨若采則驩兠共工轉相推薦堯知其静言庸違而終未去四岳薦鯀堯知其方命圮族而終未去則堯之朝四㓙猶在側也亦可以見勿疑之難矣是以大學釋平天下首重用人而論用人則申言見賢不能舉舉而不能先之命見不善而不能退退而不能逺之過即勿貳勿疑之説也而歸本於慎徳然則欲任賢去邪以平天下舍誠意正心将何從哉書經徳惟善政政在養民水火金木土榖惟修正徳利用厚生惟和編修臣王居正王炎曰政之大要莫切於養民六府養民之具也正徳所以養其心利用厚生所以養其身溝澮之導瀦之蓄井之汲水之修也鑽燧有變焚萊有禁火之修也産於地取之有時鎔範而成之金之修也植於山林斬之有時掄材而取之木之修也辨肥瘠相髙下以植百物土之修也播種有宜耨穫有節榖之修也水以制火火以煉金金以治木木以墾土土以生榖此六府之序六府修然後可以正民徳先富而後教也織袵而衣耒耜而耕釡甑而㸑資六府以利用也老有奉幼有長鰥寡廢疾皆有養資六府以厚生也六府出於天地而修之在人三事行於天下而和之在人臣謹按古帝王之治天下也有綱有目綱一而已無古今之異所謂聖徳修而萬民化也目則有萬補偏救敝興利除害隨時而變因地而殊者也然嘗綜其大㫖惟一曰養民其養民也有三曰正徳利用厚生而其所以利用厚生者則又有六曰水火金木土榖宋儒吕祖謙有言雖歴萬世之逺不能外天地以有生外六府三事以為治是禹之功與天地相終始也審斯言也則後世之六府三事不能有外於禹之六府三事而其所以修之和之者亦不過期於便民而止不必異也亦不必同也不必相襲也亦不必相泥也是故耕而食鑿而飲織袵而衣釜甑而㸑以至鑽燧有變焚萊有禁五兵田器之有其制舟車宫室之有其宜古聖王或相制以洩其過或相助以補其不足而成法既立守而勿失其歴古今而初無變易者固無論矣他如治河漕運錢幣田賦積貯諸大政漢唐而下損益互殊因革不一載籍具在可考而知即如禹之時六府所最急者莫如水八載隨刋已奏平成而猶盡力於溝洫正以殺九河之支流防助河之霖潦而底平成於永奠也故其時無堤無堰而享安瀾之福者幾及八百年殷周而降代有决徙然前代河决不過慮壊民田廬而已近代則兼慮防漕夫古者獨去其害因收其利天下尚苦於争利而不勝其害若去害與興利一事並謀則欲去其害而難乎為利欲留其利而難乎為害昔之治河者曰堤防省而水患衰今之治河者曰築堤以束水則水迅而自瀉河亦不濬而自深夫亦惟是講求乎利導宣洩之法兼察其衝擊之所從而預為之備稍有可虞不時修治其庶幾於國計民生交有賴乎此古今水政之異同也若夫金之屬有五其權重輕通貧富而可以通行者惟銅而已顧三代以前以榖粟為本以泉布為權故鼔鑄之法未詳考管子曰禹鑄歴山之金以救民之困湯鑄莊山之金以贖民之無􅕷賣子者此但因民之所利為貿遷有無之藉而已自太公立九府圜法而國之經用資焉矣厥後有輕重之制有直當之法法制遞更得失叅半宋元以來錢之流衍最盛而錢之滋弊愈多大約有錢不行之患有錢不繼之患有偽錢錯行之患而要其弊竇有二曰私鑄曰私銷乃其所以救弊之道亦有數策一如劉秩言重銅禁則銅不他用而鼓鑄之用給銅不布則盗鑄者無因而公錢不破此與賈誼之論相合一如孔顗論鑄錢不可以愛銅惜工蓋不愛銅則鼔鑄無利若不得利則私鑄不敢起私鑄不起則斂散歸在公上鼓鑄權不下分此皆鼓鑄之良法可以參酌而行之者歟此又古今金政之一端也至於禹之時水土甫平田政孔亟於是咸則三壤成賦中邦而地利盡出焉迨法歴三代而井田之制乃大備後世言田賦者必推之蓋其時土曠而人少又田皆在官之田而無在民之田故其法行之久而無弊自井田既廢田乃不在官而在民矣於是隨田之在民者税之而不復問其多寡則自秦始隨民之有田者税之而不復視其下中則自唐之兩税始復古之士往往思變其法則反至於煩擾無稽而國與民俱受其病則以古今異宜故也然則田賦之善政惟在薄賦以恤民初不關田之井與不井也不然代田限田均田永業諸法昔人行之往往不便此非其明騐乎此又古今田政之權輿也乃若國以民為本民以榖為天故六府言土而必兼榖者正以見民之所重在此也考之王制記虞夏殷周四代之法乃云國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國然則古所稱九年六年之蓄者蓋率土臣庶通為之計耳固非獨豐公庾不及編氓記所謂雖有㓙荒水溢民無菜色良以此也王制既衰雜以權術魏用平糴之法漢置常平之倉利兼公私頗亦為便厥後曰和糴曰義倉曰社倉或則謹其斂散於上或則専其出納於民奉而行之具有成效乃始而備儲後則専為軍國之需矣始而設於鄉社後則社變為縣縣變為郡矣窺諸立法本意已不相合而况胥吏之上下其手小民之隐受其累法久弊生可不慎乎要之積貯者天下之大命茍其法之既弊也則當窮其致弊之由時弊則但理其時法弊則全革其法貴賤之數斂散之宜要在乎因時因地因勢而變通之不可執一而論也由此數者以觀之則六府三事之修於禹者不必盡有合於今也而其修於後世者亦不必盡有悖於古也化而裁之存乎其人神而明之存乎其心若執古人一定之法而曰必如是然後可以修六府和三事其於大禹修和之㫖詎有當哉書經水火土木金榖惟修正徳利用厚生惟和編修臣路斯道蔡沈集傳曰水火金木土榖惟修者水克火火克金金克木木克土而生五榖或相制以洩其過或相助以補其不足而六者無不修矣正徳者父慈子孝兄友弟恭夫義婦聴所以正民之徳也利用者工作什器商通貨財之類所以利民之用也厚生者衣帛食肉不饑不寒之類所以厚民之生也六者既修民生始遂不可以逸居而無教故為之惇典敷教以正其徳通功易事以利其用制節謹度以厚其生使皆當其理而無所乖則無不和矣臣謹按天之生斯民也必有以養之而生始遂必有以教之而性乃復而教養之責總以屬之聖人洪範五行云一曰水二曰火三曰木四曰金五曰土此五行者民之所由以生亦即民之所藉以養也蓋天有四時以配元亨利貞之徳而五行之氣順布嵗功成焉地有四方以定東西南北之位而五行之次分屬民居奠焉其數則本於河洛在河圖則一六居北水之潤下也二七居南火之炎上也三八居東木之曲直也四九居西金之從革也五十居中土爰稼穡也在洛書則水木不易其方金火互換其位而耦數奠於四隅即土之分旺於四季也以其流行之序而言則水生木而木生火火復生土土生金而金生水水復生木天命之所以黙運而不已也以其對待之體而言則南北為經水火之隂陽互根東西為緯金木之斂散各異土無定位冲氣居中而寄於坤艮二維地道之所以相與於有成也相生本於河圖相克本於洛書書言六府以相克為次蓋法洛書入用言之地道也孔頴達曰此言五行與洪範不同彼以相生為次此以相克為次蔡𫝊宗之朱子曰水如隄防灌溉金如五兵田器火如出火納火禁焚萊木如斧斤以時之類古人設官掌此六府如此則逓克而生五榖之説不必泥也古者神聖首出仰觀俯察以開物成務其命官分職多取義於五行是以勾芒為木正祝融為火正蓐收為金正元𠖇為水正后土為土正雖歴代因革不同而龍火雲鳥亦假五行之方色以别職守則五行之各名為府有自來矣後世五行之専官不見而六官取象天地四時其遺意也虞廷雖有六府之號而其官則二十二人之中已無不備若禹平水土司空職也水土之府兼修之矣后稷教稼司農職也榖府之修有専責焉益之掌火則以虞衡明火禁而火之府修夷作秩宗則以春官達木徳而木之府修至於臯陶明刑弼教實為秋官金行之府不賴之以修乎必如陳師凱之解水克火為烹餁火克金為煆冶金克木為成器為相制以洩其過斵木為耜揉木為耒耒耨之利以生五榖為相助以補其不足共工之職足以兼之六府之修不若是易也乃獨歸功於禹者以禹宅百揆故也亦見財成輔相之道非聖人不能矣六府既修而有以養民之身三事不治則無以養民之心養民之政未備也其時敬敷五教則有契為司徒而正徳之事和矣制器鳩工則有倕作共工而利用之事和矣但見禮明樂備而俯仰有資法制修明民安樂利厚生之事不有専官而亦無不和矣是不第養民之身且有以養民之心善政不既備矣乎然則人主而欲講求乎府事之修和亦正不必拘何者為水火何者為金木與土榖也庶職咸修而無不修矣亦不必専指何者為正徳何者為利用與厚生也萬幾咸和而無不和矣而其要則操之於一人之身洪範五事云貌曰恭恭作肅其休徵則為時雨若言曰從從作乂其休徵則為時𤾉若視曰明明作哲其休徵則為時燠若聴曰聰聰作謀其休徵則為時寒若思曰睿睿作聖其休徵則為時風若貌澤水也言揚火也視散木也聴收金也思通土也夫五者來備各以其敘則百榖用成而民食自裕是六府之修一人修之也詩有曰羣黎百姓徧為爾徳則其身正不令而行徳有不正者乎月令曰命工師效功按度程禁淫巧則不作無益害有益用有不利者乎詩又有曰立我烝民莫匪爾極帝命率育陳常時夏則躬自儉約以教導民而食時用禮緩急有資民生不有極厚者乎是三事之和一人和之也府修事和皆係之一人之身易曰后以財成天地之道輔相天地之宜以左右民其是之謂乎書經無稽之言勿聴弗詢之謀勿庸侍講臣鄂容安蔡沈曰無稽者不考于古弗詢者不咨于衆言之無據謀之自専是皆一人之私心必非天下之公論皆妨政害治之大者也言謂泛言勿聴可矣謀謂計事故又戒其勿用也臣謹按有精一執中之學必有執兩用中之治帝王之道同條共貫質諸而不謬公平廣大建諸而不悖曠然一出於無私而已無稽之言為私言弗詢之謀為私謀勿聴勿庸所以期協于中也夫以禹禀資上聖屈己受言駸駸乎二帝之舍己從人樂取為善矣其於二者宜可無慮然且心法授受諄復告誡者誠以黈纊凝旒偏聴易壅保盈持泰集思宜廣也自昔言之邪正判於心之公私惟其人求多聞事罔獨斷也故古曰在昔昔曰先民而浮游不根之談絶矣周爰諮諏周爰諮詢而嘉猷入告之益閎矣若彼私言與私謀者則豈苐不考于古罔咨于衆専己自是云爾哉或援引附會按之不適于用或伐異黨同執之勿顧其安巵言破碎予智自雄馴至飾六藝以文姦謂人言之弗恤周公之所謂譸張為幻仲虺之所謂自用則小其妨政害治正坐是耳聖王知其然也是故師氏詔媺保氏諫惡設鞀以招之懸鐸以求之矇瞍亦獻其箴龜筮亦效其占凡以嘉言罔伏而詢謀僉同庶幾無稽弗詢不以擾我協中之治也抑洪範之篇次五曰建用皇極則曰無有作好無有作惡次七曰明用稽疑則曰謀及乃心謀及卿士謀及庶人蓋人主先清是非可否之源而後徐收明目達聰之用皇極之即為中也私言私謀之皆勿協于極也其理殆有互相發明者然則以執中之學布用中之治内外相資尤在窮理居敬之豫其功也歟書經禹拜昌言監察御史臣吳煒臣謹按古之所謂昌言者豈徒瑣瑣焉為無足重輕之論無關國計民生之利弊徒呫嗶空言以為具文云爾哉君陳篇曰爾有嘉謀嘉猷蔡沈集傳釋其義曰言切於事謂之謨言合於道謂之猷則凡不切於事而為迂濶難行之言不合於道而為操切茍且之術皆不可謂之昌言而况以隂險不測之心為告訐沽直之弊有害於人心風俗者又其下焉者哉今夫進言者亦行其心之所發而已矣其心為卑鄙而無逺大之識則其言必出於瑣細世俗而不可以為經國之謀其心為拘牽文義泥於古而不達於今則其言必暗於事勢而不可以見之於行其心為蔑古荒經祇圖一時茍安之䇿而忘帝王逺大之規則其言必多無稽之論而不可以信今而傳後其心為險僻徇私而非光明正大之體則其言必有乖於大義而不可以對人者并不可以對己是故其為言者皆其心之聲也夫聴言者亦觀其心之所存而已矣臣細繹古人昌言之義昌之為言大也謨則訏而猶則逺可以為定命可以為辰告所謂明徵定保而不徒為一時之計區區補苴塞漏已也昌之為言明也其義質之幽獨而無慚宣之朝野而無愧可以明目張膽於大廷廣衆之前而不至如徇私隐射以開告宻之門者也而要其進言之本必先正其心始正其心以正朝廷正朝廷以正百官正百官以正萬民皆由於一心基之而其所謂正心之要必自存誠始其心果至誠而無私則其心為忠君愛國之心其言即為忠君愛國之言即有時出於憤激之論而其誠意之所積可以貫之金石而不磨亦可以諒其心之無他此即夫子所謂事君勿欺之論信而後諫之至理故曰昌言也可以拜也否則沽名釣譽以為茍且功名之計甚則冐險藏奸以為報復私仇之隙此其心已不可以自問又何以結主知又何以對天下其與古之所謂昌言者不大相剌謬也哉又何拜之與有書經臯陶曰都慎厥身修思永惇敘九族庶明勵翼邇可逺在兹禹拜昌言曰俞少詹事臣張鵬翀宋蔡沈集傳身修則無言行之失思永則非淺近之謀厚敘九族則親親恩篤而家齊庶明勵翼則羣哲勉輔而國治邇可推之逺蓋身修家齊國治而天下平矣臣謹按唐虞之世君臣交儆故能無怠無荒以成風動時雍之治而臯謨所謂慎修思永者尤為修己治人之要九族之惇睦庶明之勵翼皆自慎修其身致之邇可推而逺即此修己治人長久之道也禹美其言拜之宜矣禹之進於帝曰慎乃在位安汝止惟幾惟康即慎修其身之謂也惟動丕應徯志以昭受上帝天其申命用休則所謂思久長而宜逺邇者亦不外是禹臯之言若合符節總期於能慎而已兢兢業業一日二日萬幾是人主所為慎幾微而防逸欲者實為四海人民所托命萬年基緒所係屬寧得有一時一事之或忽哉臣竊倣昔人十思九徳之意約舉大端條列為十以備聖主觀省之助一曰慎起居古者左史記言右史記事一言一動無弗記所以儆惕人主使有所敬忌而不敢忽也今起居注之職猶左右史之遺然所記者班朝莅官之大端而深宫燕閒非所及知左右􅉏御又未必如古者之必擇正士也起居之不時動止之無節孰敢與知防惟在人主之自為檢制焉爾念此身為天地民物之主當保䕶愛惜以凝基命於宥宻雖在深宫燕閒無時不畏于天命畏于民碞而䙝慢無益之戲必有所不為者矣程子謂親賢士大夫之時多近宦官宫妾之時少斯亦敬慎起居之要㫖也二曰慎玩好書曰玩人䘮徳玩物䘮志蓋有所玩必有所忘所玩者小所忘者大人主一心窺伺者萬端偶有所好不及自防久而溺焉則心為物漬始則明知其非而不能自止浸淫而與之化則并不知其非雖有諫諍亦無自入矣故漆器造而諫者十人玉杯興而賢臣三歎古之明戒也即琴書釣弋足以養性而怡情然以徳性為本自無沈溺之失若失其本而専事其末其去玩物䘮志也幾何矣况人主一有玩好則迎合者必乗之以入玩好者貢獻之媒也貢獻者苞苴之漸也可不慎與三曰慎驕矜易曰崇髙莫大乎富貴人君為四海臣民所仰戴尊莫並焉勢莫隆焉所謂位不期驕禄不期侈者蓋不足以言之矣然驕矜所由大端有二一則享太平之盛自恃富强謂金甌無闕則縱心佚志萌焉一則膺睿哲之資自恃聰明謂舉世莫及則讒諂面䛕進焉二者皆著在前史為世炯鑑然臣竊謂自恃富强者一經縱恣旋踵衰耗懼而修備或可改圖自恃聰明者予智自雄雖經摧折不能改悔往往至于淪替徳日新萬邦惟懐志自滿九族乃離欲求惇敘勵翼之功者可不戒慎乎哉四曰慎喜怒人大喜毗于陽大怒毗于隂隂陽并毗百疾交至謂喜怒之不可過也然喜為順境或能勉持所傷猶少一發而難制者惟怒為甚是以聖賢之學必于怒時置其怒而觀理之是非則在物之可怒己無與焉此治怒之道也况帝王之喜怒有異常情喜則不免僣賞怒則不免濫刑僭賞則多倖濫刑則難堪况盛怒之下不能自制如唐太宗怒殺張藴古後雖悔之亦何所及此喜怒之不可不慎也五曰慎觀聴帝王明目達聰以廣觀聴蓋一人之聰明有盡天下之聞見無窮也兼聴並觀期於集思廣益而眩惑聰明者甚多非窮理盡性獨觀昭曠之原則觀聴必有所蔽而猜疑因之以起詐偽乗之以入故觀聴不可不慎也且觀人之法必自聴言而詳而言非一端有似私而實公者有假公以濟私者有自為謀則過而為國謀則忠者若廓然大公虚中聴受則詐偽自然消沮一存逆億之見則無適非私衆進則疑其黨同獨陳則疑其立異自矜明察翻致欺誣虚詞惑聴則幻蜃成樓宻奏傷人則含沙射影斯則事無定準人挾嫌疑大臣避嫌則舉劾不敢盡公小臣避嫌則庶事動多壅滯臣嘗謂聴言者但當察其理之是否不必究其意之公私無益于國無濟于民雖公何補茍有益於國計民生雖私何害一人之自利有限而天下萬世之利無窮也竊謂聴言如此則集益宏多兼聴並觀無適非聰明之藉奚必臯謨禹拜哉此五者皆修已之要而治人亦在其中所謂慎修思永者思過半矣六曰慎財用國家以理財為先務量入為出政之常經侈無益之費興不急之役縱心志之欲窮耳目之觀皆所以耗財用也臣觀歴代侈費之主陳隋荒淫無足比數漢武帝唐明皇皆英主也一則外窮兵革内事神仙一則娛樂聲色蠱惑心志皆侈費無極工役繁興坐見富强立成耗匱覆轍相循良可痛已且濫用者必濫取搜括羨餘網羅市貨以充私用者有之好奢者必吝予膏澤不下賞賚不行者有之此財用之不可不慎也七曰慎舉錯人主之大權莫重於舉錯舉直錯枉則民服舉枉錯直則民不服聖人之言萬世之凖則也古者爵人於朝與衆共之故用人必采公論草野至愚而賢否較然不可欺問有一二聲實不符者故國人曰賢猶必加察未有衆論共加指摘而可置之上位者也孟子曰國君進賢如不得已蓋稍有不慎必至賢否混淆尊卑倒置使海内失望即早自覺悟旋加罷斥而轉移之際所傷實多此舉錯之不可不慎也八曰慎刑獄獄者天下之大命一成而不可易故君子尤加慎焉當今刑獄之事可謂至詳至慎無復遺議矣然臣猶欲獻其愚慮者每嵗閲秋審冊罪至死者不下數千其情實而勾决者十不一二茍有一綫可生之路無不仰荷天地覆載之仁固望斯人之遷善逺罪漸臻圄空刑措之盛也然而囹圄之中日積日多勢必填滿獄户治獄之吏不無煆煉周内豈能盡雪覆盆臣竊謂數赦既非美政宜令一二公正大臣清强御史親歴其地清理刑獄酌量情罪而入告焉以施法外之仁以布維新之化用以明章國憲扶植人倫未必非教化轉移之一術也至如刧掠殺盗等類昔人所謂不待教而誅者今往往首惡經久逋誅為從輙從寛減又豈足以懲奸宄而儆凶頑乎故好生之徳寧失不經而除暴安良正非姑息之謂也斯則于至慎之中又加慎焉者也九曰慎治忽書曰與治同道罔不興與亂同道罔不亡治忽之義有明徵矣人主孰不欲治安而往往即于危殆者禍生於所忽而患氣積也今天下休養百年仁漸義摩兵革偃息洵可謂治且安矣然臣竊有慮者生齒日繁費用日廣自公卿至于士庶鮮不患貧當久安長治太平無事之時而天下無寛然有餘之象幸而年榖時熟庶幾小康偶或水旱不時即勞補救豈可為萬年經久之計哉書所謂慎修而思永者可惕然深思矣事變之來每積於忽微而乗於不覺饑寒盗賊天下之患恒必由之念綢繆於未雨防禍亂於未萌此治忽之㡬不可不慎者也十曰慎怠逸書曰君子所其無逸古語曰戰戰栗栗日慎一日葢恐勤於初者不免懈於後也近代政治之美莫如唐太宗尚有十漸不終之虞其聴言納諫為後世所希慕然始而賞諫繼猶樂諫終則勉强從諫是知始終如一者難也又云愛民之言不絶于口適已之事不忘于心是則表裏如一者又難也我皇上天縱聖明孜孜求治宵旰憂勤必期追蹤唐虞三代之盛軌漢祖唐宗詎足比方然臣竊觀當今治象未知視貞觀時逺過與否是以區區之忱願益加勉而無怠焉修己之要治人之方雖非固陋所能知或足備觀省慎思之一助伏望聖主念微臣慺慺之愚衷俯賜采擇焉書經在知人在安民侍讀臣李清植傅氏元初曰知人安民千古致治盡此四字臣謹按君之所治者民也所與共治此民者臣也治民之道為養為教甚多端矣而必以安之一言為要領有如厚民之生則因其所利而利之而不以科禁繁多者妨閭閻之作息此所以耕田鑿井而忘帝力也又如正民之徳則率其所性而導之而不以文法峻宻者啓官吏之苛繩此所以不識不知而順帝則也若後世均輸和買諸法以及一切之鈎覈約束其初意本欲以便民也而適以擾民則與安民之意異矣其在詩曰誰能亨魚溉之釜鬵誰将西歸懐之好音説之者曰凡烹物者水火既調則不欲多以匕箸動之而魚為甚為其脆疏而易散也故老子曰治大國如烹小鮮西周之治蓋如此是以詩人懐之厥後如漢之文帝宋之仁宗大抵皆載其清浄民以寧一殆得安民之遺意者歟雖然安民之政必得其人而後行茍奉行不善縱有良法美意而民不被其澤此臯陶所以必先惓惓於知人也夫人不易知知人亦不易然考臯陶之言曰亦行有九徳亦言其人有徳乃言曰載采采蓋謂人必有徳然後可試之於事以騐其才也由此言之則知徳為本而才為末古人所以有寧徳勝才毋才勝徳之論也今夫竹有本性也然後雖燬而不改其節玉有本質也然後雖碎而不易其潔物猶如此而况於人乎是故脊梁不竪者必不足與任重也脚跟不牢者必不足與行逺也然則論人者若不先原其居心察其行已而惟據其辦事以為衡必且以趨承㨗給為佳士以矜囂武斷為幹員以用智揣摩為達識以舞文遷就為通材風氣所驅遂使人人以圓通為活法以軟欵為時宜此人才所由以寖衰風俗所由以日下也臣嘗紬繹臯陶之兩言竊謂安民之道固必以知人者先之而後其政行而知人之道尤必以安民者核之而後其人得何者天地之大徳曰生聖主之大徳曰仁本天之生行君之仁而致之民者則臣也故程子以視民如傷為司牧之要訣王旦以民力既竭為救時之名言陸贄以散小儲成大儲為經國之至計諸葛亮以一夫失所皆亮之罪為鞠躬之藎謀彼數子者皆三代以下之英也而以能存此意卓然為一時之名臣然則衡人者當知所重矣是故有能以固邦本為己憂以培國脉為己責而才猷又足以副之者其上也即使才猷雖短而仁心為質正道為坊者猶其次也其或旅進旅退而以曲謹自将以小謹自效抑又其次也若乃心存朘削利析錙銖而不顧大體不思逺猷必非俊乂之選矣夫唐虞之際其官牧皆聖賢之侣而百僚師師百工惟時是以康衢之謡擊壤之歌熙熙皥皥可謂民安之至矣而臯陶陳謨猶諄諄以此為説者良以人存則政舉朝廷正則天下治為國之道舍此宜無大焉者也書經在知人在安民監察御史臣王興吾疏人君在於知人善惡擇善而信任之在於能安下民為政以安定之也臣謹按臯陶之言乃古今治道之要而在知人在安民又一篇之要也蓋樹后王君公承以大夫師長原所以治民故安民為立政之本而安民之政必待人以行故知人又為安民之本及禹聞言而嘆其事之難美其言之當故臯陶下復言九徳以為求賢之準以為必得如此之人而後可以行安民之政也夫自陶唐以來賢明之君歴代恒有其治功赫濯可傳後世者莫不由於用人之當而人才不同或以徳聞或以才著顧人主所用何如而治功因之亦異臣竊考前事大抵仁主之用人先徳而後才英主之用人先才而後徳先徳而後才如漢文帝之以厚重少文為主而不喜更張喜事之人宋仁宗之裁抑僥倖而朝多善類然其弊或至安静有餘振興不足故賈誼有可為嘆息之言包拯有無肯出身任事之語先才而後徳如武帝之以非常之功必待非常之人而其弊則急功利而後仁義以至四海驛騷民生不安者有之惟聖主之用人則重徳而必佐之以才取才而必本之以徳務使相需以成而不使有所偏重夫是以得人而成三代之盛也然知人則哲惟帝其難上以實求下以名應茍非實有以考騐之而欲其真實無偽也難矣故臯陶不曰用人而直曰知人也臣以為安民之要在於舉賢任能而知人之法則在於精詳考核試觀於書堯之詢事考言舜之敷奏以言明試以功禹之乃言底可績臯之乃言載采采此即上古之考核也湯之徳懋懋官功懋懋賞武之建官惟賢位事惟能書雖不言商湯考核之法而周制司馬論官辨材論定然後官之任官然後爵之位定然後禄之則其考辨之嚴可知也至三代而下雄才大略之主以信賞必罰驅策羣才以成大業者史不絶書然亦莫不考其實得其真而後用之其中如唐之太宗宋之太祖身致太平人材輩出史稱太宗之謂魏徵用人彌須慎擇宋祖之於州郡司牧以下咸躬自引對則其於人亦甚審察矣而明之洪武則垂於寶訓曰任以職試以事而其人之賢否自見是舍核實之法而欲知人其道無由也然大臣之與小臣其地異而其職亦異小臣智効一官能効一職其官理其職修則其能也其官曠其職廢則其不能也此可以職事核之者也大臣則董羣有司以宣布徳意者也有表率之責有舉劾之權則當以察吏為職舉能其官惟爾之能舉非其人惟爾不任故大臣之賢否當自其所舉考之也况乎吏有能而不舉則良吏無由激勸或所舉而非賢則不肖得以倖進是大臣舉劾之當否乃賢才進退之所係而賢才進退又治功隆替之所係也可不重歟是以知人必先考核而考核必先於大臣之舉劾始也書經知人則哲能官人安民則恵黎民懐之編修臣曹秀先孔安國曰哲智也無所不知故能官人恵愛也愛則民歸之臣謹按帝王之用心以天下為命者也立於億兆臣民之上而政教布焉賞罰施焉恩威濟焉必有仁智合一之徳而後其權以肅其澤以逮而其治以彰知人安民所由尚矣大禹之云知人則哲能官人者蓋人固不易知知人亦自不易也人類至繁而人性皆善然而善惡有異習始終有殊趨内外有二致如下文臯陶所云九徳之目其形跡易䝉而真性難掩者皆是也於此而不知則多偏聴獨任之私於此而灼知則廣明目達聰之用此所謂日月出而物無遺照權衡審而物無遺算也何其哲也由是岳牧卿貳任之而稱其職用之而盡其材雖門第有所不拘雖資格有所不限而官得其人矣反是而懲責及之而貶斥隨之而無匪人者即無倖位至若地勢疎逺爵秩卑微或亦不能自達但擇所知之人其薦剡而糾罰者知之而寧有私意於其間哉大禹之云安民則恵黎民懐之者豈不以民罔常懐懐於有仁乎天子作民父母四海之蒼生皆大君之赤子也一人之心受其勞則萬人之身享其逸也夫帝天之命主於民心如下文臯陶所云聰明明畏之㫖可思矣人君奉天以子民一夫不獲時予之辜凡如家人婦子日用飲食以至疾痛疴癢憂喜悲愉之故悉與聖明懐抱息息相關而固結而不可解則所以求盡乎安民之事者不一而足在臣工有不能盡喻之淵衷在百姓有出於望外之恩澤而如傷者彌殷而痌瘝者愈切彼民也尊親同志極之含哺鼓腹戴髙履厚而不能一日去諸懐者幾至欲歌欲泣也恵之時義大矣哉粤若陶唐之后其仁如天其智如神於哲恵乎何難禹以為惟帝其難之者論其心也非論其事也論其事則亦已至矣孟子曰堯舜之知而不徧物急先務也堯舜之仁不徧愛人急親賢也千古帝王之治法洵仁智合一而異世同揆者歟書經安民則恵黎民懐之檢討臣郭肇鐄臣謹按國家久安長治克成磐石之宗者固恃乎天心之眷佑祖徳之靈長而尤恃乎人心之蟠結聖王知其然也六合為家一物興念兢兢焉務使匹夫匹婦無不各得其所而後即安是以恩從祥風翺徳與和氣游光天之下至於海隅蒼生咸喁然而致其尊親之戴此邦基之所以鞏固而洪化之所以郅隆也今夫人情莫不欲安也審矣豐穰聴之於天衍沃憑之於地和甘俟之於時至若召好而去惡圖易而思艱則唯屬之於君是知君人者天下依以託命者也於此而求所以安之或暑雨祁寒之不無怨咨也或金穰木饑之不無偏值也彼氓庶之延頸舉踵者方不勝㢘逺堂髙之慮而聖人已切切計之其大焉者則財成天地之道輔相天地之宜以左右民次之則興井牧慎封圻阜財求利器用凡自發號施令以及分職任官擘畫經營莫不與小民之身家隐然關注求之極其誠施之得其當行之欲其永逺而可遵洎乎闓澤㴻濡人有充然之樂而聖人之求寧求莫者尚殷殷而不去於懐也以此言恵恵莫大矣若是者葢仰體乎上天生民立君之意以副作民父母之心使之免於阽危而登諸袵席非謂其望恩倖澤者可以干譽而市名也然民之身被而生其感者又奚煩召致哉沐浴膏澤咏歌勤苦則百世之仁也化溢四表横被無窮則覆露之徳也萬物熙熙懐而慕思則頌聲之所以作也其在禮記緇衣之篇曰君民者子以愛之則民親之易卦益之九五有孚恵心勿問元吉有孚恵我徳象曰有孚恵心勿問之矣恵我徳大得志也上下感應之機其不然乎其不然乎由此觀之羣黎不難徧徳體仁斯以長人是以聖王之在上也勤恤民隐顧畏民碞登以春臺而荷以帡幪迨至仁洽道豐六合殷昌自别聲被色之倫以及跂行喙息之屬罔不涵濡聖澤而優游太平一時之蹈徳咏仁者方且採入風詩而被之琴管豈非大化之極軌也哉然則禹之所云安民則恵黎民懐之者亦可以識致治之樞紐矣書經寛而栗柔而立愿而恭亂而敬擾而毅直而温簡而㢘剛而塞彊而義彰厥有常吉哉監察御史臣趙青藜臣謹按人受天地之中無不善也無不全也無稍間隙而與生俱生也乃拘於氣禀染於習俗遂不能無毗隂毗陽之異此南方含忍為强北方果敢為强易所謂仁者見仁知者見知百姓日用而不知者也聖人知其然為之建學立師陽以舒之隂以斂之柔克剛克以長養而造就之使矯其偏歸於大中則範圍曲成之道不茍矣蔡沈集傳以臯陶列九徳之目故謂九者皆指其成徳之自然非以彼濟此之謂而要其成徳伊始夫豈無所用力哉設無所用力而任其質之一偏往而不反則寛失之縱柔失之懦愿失之野亂失之過輕擾失之無斷直失於不能容簡失於多所畧剛失於上氣而好争彊失於執己而不化質之美也適以益厥蔽矣其曷克成乃徳故朱子語類謂寛而栗柔而立便是教人變化氣質處葢原始之論與集傳殆互相發乎然是九徳備矣無偏倚矣而或作或輟猶未足以為吉也故君子之為學必期之以深造而國君之進賢必慎之以如不得已學記一年視離經辨志三年視敬業樂羣五年視博習親師七年視論學取友九年知類通達强立而不反深造之謂也不反則有常矣王制命鄉論秀士升之司徒司徒論選士之秀者而升之學大樂正論造士之秀者以告於王而升諸司馬司馬辨論官材論進士之賢者以告於王而定其論論定然後官之任官然後爵之位定然後禄之此遲之久而又久者何大不得已於斯也而人之縁情飾貌得以僥倖而進者亦己寡矣是故九徳知人之目而有常又知人之要也林氏之奇曰如霍光可謂有濟亂才而其在帝左右小心謹徳未嘗有過是其能亂而敬其出入殿門進止有常處郎僕射竊識視之不失尺寸者二十餘年此其亂而敬之有常武帝以是知其可用卒能擁昭立宣不負社稷之寄彼於九徳之一能守有常其成效已如此然則九徳固不必求其備也但求其有常焉可耳唐虞三載考績三考黜陟幽明葢九年以觀其深矣若夫取之俄頃而不次擢之曰吾以御特達士此英主之雄略或然而非古也書經兢兢業業一日二日萬幾編修臣杭世駿臣謹按治道有汚隆王化有逺近皆决於王心之疎宻而已易云幾者動之微樞機之所以發善惡之所以分吉凶之所以兆莫不循是以之乎彰顯焉故云知逺之近知風之自知微之顯可與入徳葢言幾也後世言治者昧於其幾而第言有萬則萬幾二字宜若為有天下者之恒言而不知人君於此不可不明察其微而慎持其隙也葢幾有萬則其彰顯者不止於萬可知矣一日二日而有萬幾則期月旬朔之間不止於萬幾又可知矣一幾之不慎則一事叢其弊一方受其害猝至雜投其忽不及謀者必衆待其不及謀而思補救之何如先其未及發而豫籌之乎我皇上秉神聖之資勵精圖治朝乾夕惕即以之希踪三代盛王豈有不及然臣竊觀今日之治理其美者僅僅如漢之文景唐之貞觀開元宋之淳化嘉祐而止甚且尚有不及焉者何也則以仁心仁聞能設誠而致行之者之難也夫有仁心仁聞而苦於設誠而致行之者之難此其間有幾焉葢辨之不可不早辨也臣聞天之生聖人之材甚吝而人之值聖人之時甚難聖人以天地父母為心愚臣即以堯舜吾君為責伏願皇上於深居淵黙之時隨事審其幾微行政或恐未當於天心用人或恐未慊於衆望讒夫女謁未必有内寵近侍恩澤或恐其踰制瓊宫璇室未必盛巖居川觀廵遊或恐其過時窮邊征戍宜時恤其饑寒閭巷惸嫠宜周知其疾苦有一夫不獲若已納隍之心有萬方有罪罪在朕躬之念夫然後坐明堂而出治風動從欲之休不難再見於今日矣書經天工人其代之檢討臣齊召南孔安國曰人代天理官不可以天官私非其人王肅曰天不自下治之故人代天居之不可不得其人也臣謹按自古帝王代天理物未有不奉若天道以為兢兢業業者也惟天聰明惟聖時憲凡天之事皆君之事特以事非一端君不能獨理也於是立百官以司其職選衆賢以任其官簡之升之命之糾之告戒之董正之使人無曠官官無曠事以共收其功如天之積三十日而成月積三月而成時積四時十有二月而成嵗夫然後可以於天無負粤稽上古建雲龍火鳥之名顓帝立重黎南北之正莫不直以四時之吏五行之佐目其羣臣此帝堯咨羲和以熙庶績帝舜命二十二人以亮天工所為諄諄致意者也後世言天官者自垣階将相左右丞輔以及中外布列皆直以人官上名星辰而史䇿所傳如郎官上應列宿尚書為天北斗宰相取象三台亦皆實有其理而不可誣然則上古之世水官修而龍可以擾火官修而鳳凰可以致極於五行順序萬物遂長人氣和平風雨時節災沴不作休祥凝集皆自然之騐必至之符豈虚語乎哉周官以隂陽歸三公以天地春夏秋冬配六卿洪範以嵗月日分屬之王及卿士師尹君者代天而總百工之臣者也臣者代天而分百工之事者也臣之爵禄雖詔於君而位曰天位職曰天職明位與職皆出於天非帝王之所得私故所用者必皆其足以代之之人所圖者必皆其有以代之之實人非俊乂雖親近不以授官人果賢才雖疎逺必以任職凡其為官擇人以實朝廷以親百姓至公至嚴至重至慎求不拂乎天之聰明而已臯陶告禹曰天工人代而先之以無曠庶官㫖哉言乎夫庶官之曠非官之不備其數也亦非庶官之盡縱欲敗度置其職於不問也惟是人非六徳三徳之選徳非彰厥有常之吉容身持禄小大相師以趨承唯諾為協恭以引嫌推避為和衷官有人而如無人人在職而且廢職此臯陶之所為深戒者也伊尹有言任官惟賢才左右惟其人傅説有言官不及私昵惟其能爵罔及惡徳惟其賢即無曠庶官之説也夫周公言三宅三俊之克宅克俊於有夏則曰籲俊尊上帝於成湯則曰陟丕釐上帝之耿命於文王武王則曰敬事上帝即天工人代之説也夫書經予決九川距四海濬畎澮距川右中允臣任啓運司馬遷曰九川弱水黑水河漢江沇淮渭洛也蔡沈曰九川九州之川也孔頴達曰川既入海然後澮得入川林之奇曰自畎而之遂自遂而之溝自溝而之洫自洫而之澮自澮而之川自川而之海申時行曰先川而後畎澮除天下之害先大而後小也王樵曰畎澮田間水道旱則藉其容水潦則欲其洩水畎澮以川為脉絡川以海為都歸旱而川不入潦而畎澮不出皆田之患而川不距海則有侵畎澮之分犯陵陸之位者矣臣謹按振古以來治水之功莫髙於禹提治水之要亦莫該於禹禹言決九川距海濬畎澮距川莫細於畎澮莫鉅於海畎澮以分而容之海以合而洩之此古今治水之大法貫大小而一之者也後人之治水止治川而已矣夫天下之大川九而荆揚莫大於江冀兖莫大於河荆揚本澤國支流之分散者多故屢朝之治水不治江而専治河今之河道雖與古異然自黄河決而南注而永定河合恒衛諸水猶古之北河也謀治河而不於海謀所以洩則河不治不於畎澮謀所以容則河亦不治今之謀所洩所容者亦有之矣或曰是當濬海口以為洩或又尼之曰吾嘗視海口未嘗不駛行也何待濬或曰是當擇下地鑿一渠以為容或又尼之曰所鑿之地不過方一二十里何能容是數說者徒為道旁之築而河臣又時去時來不能堅持一説以見其效之成臣以為此皆其任未専其見未確之故也而求其見之確又莫若任之専唐虞之治水不勝任則鯀殛焉勝任則禹興焉其任専也禹之治水先以導山身歴其地使源流分合之故皆瞭然心目之間而後導川從之其見確也今考之禹貢冀兖接壤而冀之賦上上兖之賦下下若是懸殊者蓋兖為河之下流海口之洩在此則多虚其地以與水故出賦者少冀為帝都之域畎澮之盡力皆在此故田治而民之出賦者多此所洩者廣而所容者多之明騐也要其治水之法所為曲折而詳備者則莫如濬畎澮距川之一言蓋畎澮之必濬有定理而畎澮之因地無定形後儒泥古者不明地勢畫為溝洫之圖整如碁局曰此古溝洫法也然天下必無千里正方之地是溝洫非特今不可行即古亦不可行矣徇今者曰今之北地土鬆易圮而沙晦易湮必不可為溝洫也審如是則冀州為唐虞夏殷王畿之地禹之盡力於溝洫莫備於此而曰不可溝洫豈古聖之書盡為妄説乎臣竊以為論水之所洩所受皆當量川之長短大小而為之謀川之所受者積數千里則非百里之口不足以洩所受者積數百里亦非數十里之口不足以洩今之海口果足以洩乎平居無事而往過之誠駛流也水潦驟至百川沸騰則不足洩而内潰矣知區區海口之不足以洩則鑿一二十里之渠之不可容亦斷可知矣古人畎澮之制大率略於南而詳於北非略南也南為澤國無地不足以容故無大潰決即今江南之圍田四周之外皆大川田本與水平農民築土為之埂其址廣五六丈其髙可六七尺小水至其埂足以禦而年豐大水至其埂不足以禦而破者或半非常大水駕髙於埂田乃盡沒然猶有沒田無溺民為其埂猶足以支吾不能一日盡破而遷於髙阜以相保也其最髙之地或數里數十里川澤之灌所不及民自以工力鑿地為塘夫鑿地為塘其糧歴年賠納而民甘心為之且費財費力而為之者一畝之塘足以濟五畝之稼亢旱有備而不至全荒則所賠者少而所救者多也今宜略仿此制募江南之精於農事者聴自為之而因以教人其地卑下者使仿圍田法掘地以為溝渠所掘之土即以為四周之埂其地髙旱者使如開塘法凡所開之溝塘皆永捐其賦即其中有魚蒲蓮芡之利亦聴其自入而無所取焉凡溝洫之廣狹連斷埂圍之大小髙庳皆聴民自為而不限以成法其所成之田畀為世業即後有倍入亦但如定賦而無所增加人見溝塘之利則從而效之者必漸多而南方治田之法漸及於北禹所謂濬畎澮距川者古人治川之法亦行於今矣如是則於國帑無大費其可行一也民之生計必日饒其可行二也川水永無潰决之害其可行三也此謀川之大計而亦謀國之大計也然非得實心為民為國不辭謗不避難歴時久而深知地理者不能總其綱此又存乎朝廷之専任不攝官不掣肘俾日歴其地與農夫野老反覆諏咨相度數千萬里從横地勢皆瞭然於心目而後舉而措之百年必世之功可立成也書經禹曰都帝慎乃在位帝曰俞禹曰安汝止惟幾惟康其弼直惟動丕應徯志以昭受上帝天其申命用休帝曰吁臣哉鄰哉鄰哉臣哉禹曰俞給事中臣馬宏琦蔡沈註曰禹既嘆美又特稱帝以告之所以起其聴也慎乃在位者謹其在天子之位也天位惟艱一念不謹或以貽四海之憂一日不謹或以致千百年之患帝深然之而禹又推其所以謹在位之意如下文所云也止者心之所止也人心之靈事事物物莫不各有至善之所而不可遷者人惟私欲之念動揺其中始有昧於理而不得其所止者安之云者順適乎道心之正而不陷於人欲之危動静云為各得其當而無有止而不得其止者惟幾所以審其事之發惟康所以省其事之安至於左右輔弼之臣又皆盡其繩愆糾繆之職内外交修無有不至若是則是惟無作作則天下無不丕應固有先意而徯我者以是昭受於天天豈不重命而用休美乎帝深感禹弼直之語故曰吁臣哉鄰哉鄰哉臣哉反覆嘆詠以見弼直之義如此其重而不可忽禹即俞而然之也臣謹按唐虞之治千古言郅隆者咸首推焉及觀於書而知當日君臣動色相戒如此其肫誠而切直也蓋天理人欲之去留心術於以别誠偽而政事於以分治忽理易亡而難存欲易滋而難遏或因循於積習或萌動於隐微或惑亂於聴聞或牽制於情愛所存所發乖於至善内之不能修身齊家外之即無以治國平天下是止不可以不安也然止之所在非辨之至明不能折衷於至當非行之至健不能確守於不遷又必由勉强以幾純熟積倉猝以至從容至於動静云為各當於理而無有止而不得其所者而後為安止則安止為最難故禹未曰安汝止而先之曰慎乃在位是由慎得安未有安止而不本於慎者註云一念不謹或以貽四海之憂一日不謹或以致千百年之患一念至微而關乎四海一日至暫而關乎千百年其發明不可不慎之意誠為竦切茍非事無分於大小時無分於久暫莫不如臨深淵如履薄冰如朽索之馭六馬曷能事事物物咸順適乎道心之正而不䧟於人欲之危臯陶曰兢兢業業一日二日萬幾正與此意互相發也禹既曰安汝止惟幾惟康而即繼之曰其弼直是有聖君在上端有賴於良臣之光輔也蓋人君臨御六合用人行政機務至繁必為臣者本純懿之修篤公忠之志左右贊襄隨時啟沃以匡其所不逮而人君亦必坦懐以任之虚中以聴之然後可以釐百工而熙庶績葢依古以來未聞上有敬慎之君下無弼直之臣而可以成盛治者孟子曰責難於君謂之恭陳善閉邪謂之敬觀禹之所以陳善而責難於帝者如此帝即深感其言而發臣鄰之論君臣交儆直言無怫是則中天之盛所以敬天勤民之本端在乎此而民之丕應徯志天之申命用休豈倖致哉書經禹曰都帝慎乃在位帝曰俞禹曰安汝止惟幾惟康其弼直惟動丕應徯志以昭受上帝天其申命用休檢討臣陳兆崙蔡沈曰止者心之所止也人心之靈事事物物莫不各有至善之所而不可遷者人惟私欲之念動揺其中始有昧於理而不得其所止者安之云者順適乎道心之正而不陷於人欲之危動静云為各得其當而無有止而不得其止者惟幾所以審其事之發惟康所以省其事之安至於左右輔弼之臣又皆盡其繩愆糾繆之道内外交修無有不至若是是惟無作作則天下無不丕應固有先意而徯我者以是昭受於天豈不重命而用休美乎臣謹按此禹陳保治之道至深切也曰止曰安止可謂極簡約矣而天人之應舉在乎此然則一日二日萬幾必得所為極簡約者而守之然後可以慎始慮終而登上理也蔡氏解安止謂順適乎道心之正而不陷於人欲之危是矣顧此苐學者熟聞之語且帝王之道更宜推而衍之以求其大者泛作道學常談恐未得其領要也葢此安止是𦂳承慎乃在位而言須𦂳貼在位講惟在位而後知為君之難惟知為君之難而後知安止之難何也如平時欲行仁行義見道極確而臨事或不無遲疑平時欲希堯希舜取法極正而臨事或不無遷就此非其初心之所欲而事勢廹之也何謂事勢廹之葢在位則知時地不同古制有不可行於今者而遂謂宜叅用功利以濟之矣在位則知情偽不一古道有不可行於今者而遂謂宜雜用機權以馭之矣如是則時務之見擾擾於中而初心之所持者不固漢唐以下代有英君誼主而治不登於唐虞三代之隆正坐此也豈惟陷於人欲之危為足戒哉夫事物之變態古今所恒有也天下之公理帝王所不能易也三代之治遞有變通亦遞相祖述貴持其大端師其美意未有可出此而入彼者若乃功利之效較仁義為速而其弊至争民施奪機權之用視堯舜為勞而其弊至上下相䝉聖人知為君之難而揺惑之易故曰安汝止曰敬作所此皆憂惕之辭貞固之意也且夫止者人心之不言而同然者也人心之同然即天下之公理而天之所以與我者故曰徯志曰申命得乎所同然而天人胥應之矣明乎此止之非迂濶而必有其騐也明乎此安止之非一切茍且之計而久安長治之原也故臣愚以為保治之道惟此為至深且切也然而既曰安止又曰其弼直者何也輔弼之臣君心所恃以决疑信也直亮之節天下所恃以陳疾苦也能堅人主之所信而因以宣上徳而達下情此禹所以自期也夫天之生聖人非偶然也天生聖人而得良弼非偶然也彼君若臣者亦自知其非偶然也而慎始慮終交相儆勉以成重華協帝之治猗歟盛哉明乎安止之義即舜禹可學而至也書經禹曰都帝慎乃在位帝曰俞禹曰安汝止惟幾惟康監察御史臣張孝挰宋蔡沈曰天位惟艱一念不謹或以貽四海之憂一日不謹或以致千百年之患帝深然之而禹又推其所以謹在位之意曰安汝止也止者心之所止也安之云者順適乎道心之正而不陷於人欲之危也惟幾所以審其事之發惟康所以省其事之安臣謹按此正孜孜保治之事也禹終述孜孜之意而嘆美之而又推原其所以保守天位者而本之於慎也慎也者敬之謂也必敬以直内而後事無不宜必敬以静存而後動無不當然則安汝止者正慎乃在位之事而惟幾惟康者又止之所以能安者也幾者動之微動者幾之著方其静而未動也未有幾也幾既動而事始萌由是漸見於形象而事成焉茍於幾微之初不知所審而欲其事為之著得以無過難矣由是言之惟幾者又惟康之本也人君慎其在位而必欲得其庶事之康非審於事幾發動之初曷由得之哉臣嘗以是反覆於聖學相傳帝王授受之㫖而知言雖不同推求其義則同歸於敬而已何則所謂幾康者謂念必慎其所發事必求其所安非主敬而能如是乎即唐虞之執中必先辨乎人心道心之介而人心道心非敬不能定其衡也伊尹所謂一徳者心一於善而無他念以雜之即朱子所謂不貳以二不參以三者也敬故也夫子存誠之説大要即一徳之義而其功不離乎慎獨者亦敬也啟之嗣位也能敬承繼禹之道殷王中宗嚴恭寅畏其在髙宗恭黙思道成王不敢康夙夜基命宥密凡此皆敬也所以丹書之訓首曰敬勝尚書開卷即以欽之一字為言易於乾之九三則曰日乾夕惕禮經一書特冠之以毋不敬甚矣千古聖學未有不同歸於敬者也然則慎位幾康之説禹直上接二帝傳心之典法而開後世帝王修己治人之要道歟書經禹曰都帝慎乃在位侍講學士臣龔渤蔡沈曰禹既嘆美又特稱帝以告之所以起其聴也慎乃在位者謹其在天子之位也天位惟艱一念不謹或以貽四海之憂一日不謹或以致千百年之患臣謹按天子者受命於天者也受命於天而在位此位乃天位也當其亶聰明錫智勇聖神文武備於一身及其敷政教統臣民治亂安危基於宥密故雖極保佑申命之隆而凡位中所當為所當盡者天已謝其權於天子而不與是天設此位以待人君原非處以至尊聴其優游而玩愒蓋欲責以至重令其惕厲而憂勤在位之不可不慎也明矣所以眷命逾厚則勞瘁靡窮篤祜益深則責望彌切天雖不言而不啻其明言之者位有攸歸政無旁貸也惟慎而不忽敬聰明亦凛明畏謹明旦尤勅時幾一念将萌嚴理欲之介一行未見慎邪正之防不敢出位以求斂之又斂惟期當位以處存之又存故道心為主而人心退聴天理無間而私欲消内重者外自輕源清者流自潔永保天命長荷天休居天位而位尊治天事而事治子天民而民安其理不介而孚矣臣本庸愚就慎位中敬箴十事其敬天曰勿謂天髙陟降在兹峻命不易永言配之欽崇奉若戰兢自持曰明曰旦惟幾惟時君心主敬作聖始基其法古曰堯明峻徳舜執厥中禹湯文武聖敬皆同載稽典籍垂訓無窮匪古是則何所折衷君曰念哉責在朕躬其勤政曰書陳無逸食亦不遑乾行至健莊敬日强兢兢業業猶恐或荒矧敢自暇而為其亡體天之道作極惟皇其用賢曰惟賢輔治欲治求賢闢門籲俊典册昭然三徳六徳日嚴日宣其難其慎無頗無偏克知灼見審擇居先其求言曰天子穆穆髙拱深宫安危利病匪言弗通在昔古帝明達為公惟耳司聴惟聴思聰廣收博採以亮天工其納諫曰言不逆耳不能動聴言而逆耳冀納明廷利行利病列於几屏所以禹拜至今為刑豈伊言者昧厥虚靈其防欲曰不邇不殖大徳懋昭正心誠意私欲消危從安伏損自滿招道在克己持盈戒驕防於未萌永絶根苗其戒滿曰如彼滄海納不見盈如彼天地覆載難名久於其道天下化成豈容滿假使驕泰生緝熙敬止聖學光明其保治曰粤稽帝世喜起明良乃賡載歌交儆無忘元首勅命股肱贊襄思日孜孜保治悠長從欲風動亘古彌光其謹終曰謹終如始乃克有終至誠無息與天同功純亦不已廣運淵衷粹然至善萬理流通持之又久清明在躬書經禹曰安汝止惟幾惟康其弼直惟動丕應徯志以昭受上帝天其申命用休監察御史臣陳髙翔蔡氏沈曰止者心之所止也安之云者順適乎道心之正而不陷乎人欲之危動静云為各得其當而無有止而不得其止者惟幾所以審其事之發惟康所以省其事之安至於左右輔弼之臣又皆盡其繩愆糾繆之職内外交修無有不至若是則是惟無作作則天下無不丕應固有先意而徯我者以是昭受於天豈不重命而用休美乎臣謹按天道流行而賦於物莫不有其一定而不可易者謂之止自古聖賢因物付物事之未來無将迎之私事之既往無繫累之病故曰艮其止止其所也止其所則内不見己外不見人動静如一而性定是安止之説也顧論其體以主静為功而論其用以慎動為要幾者動之微而善惡吉凶之先見者也故必謹之於此而由此而精之以至於應物之處無少差謬則謂之康康者理得而心安蓋事適其宜而物協其則也如是則在我者既無不盡矣而望道未見之心猶恐或失之故遍咨之左右博稽之羣工必使各伸己見而後已夫然故出務揆幾發號施令皆合民心而民無不應且合民心即克享天心而自天申之何疑焉獨是君茍安止矣又何藉乎臣下之弼直而禹必兢兢言之者誠見夫中無定體善無常主非審異無以致其同非執兩無以用其中必合乎人心之同然乃得乎天理之本然此聖如堯舜所以咨岳詢牧望其繩愆糾繆而舍己以從人也三代而後人君非必盡能安止而茍虚心善下從諫如流則其時之政事必有可觀者如漢文帝天資謙讓郎從官上書疏止輦受言唐太宗嘉魏徵之忠讜馬周之鯁亮孜孜延訪常若不及故後之論治者每推漢唐而首二君豈非能受諫之故歟又况大有為之君清明在躬仁心為質推誠以馭下正己以率物又復廣開言路奨許正直面䛕之言雖悦耳而必黜苦口之箴雖逆志而必納又何患舉事之不下協乎輿情而上當乎天心者哉書經安汝止惟幾惟康其弼直惟動丕應徯志以昭受上帝天其申命用休監察御史臣周人驥林氏之奇曰大學曰知止而后有定人能安其所止則意誠心正舉天下之物曾不足以動其心如是則寂然不動感而遂通天下之故矣惟幾惟康其弼直言能安止矣又盡此三者然後有以盡夫慎乃在位之道也陳氏櫟曰安汝所當止静也幾者動之微動者幾之著静而知幾以圖康又得直臣弼之則下應人心上當天心矣臣謹按人君以一身繫天人之重所以下孚民情上通帝謂者存乎心而所以經緯萬端宰制羣動者恃乎理凡理之至當恰好無過不及處是之謂止顧理散見於事而實以心為樞紐必心純乎理當萬感俱寂時此心如鑑之空如衡之平渾然惺然一無偏倚然後事至物來能灼見其理之所在而因物以付油然順應罔不各得其宜如是者謂之曰安然則止之云者即堯舜相傳之中也安之云者亦即所謂危微精一之㫖也安汝止三字固合内外貫動静徹始終而言其於聖功王道已總括無遺矣而下又言惟幾惟康其弼直三層者葢天下事理萬變無窮未事之前固須時時體認而事之初來必審之而後是非可否不致誤於所從故曰惟幾事之既至必省之而後委婉曲折細密周到不留幾微之憾故曰惟康而又恐一人所見或偏所處未當必有左右之臣糾繩匡救於其際政治乃盡善而無弊故曰其弼直凡此皆以申明安汝止三字之義也林氏之説與集傳意義脗合陳氏謂安汝止為静夫聖學動静合一不偏言静且静而知幾以圖康一語於經文界劃亦欠分曉似有不可從者至於丕應昭受之故葢天人上下總此一理至理所在民心順之民心所屬天意因之上有兢兢業業之主下有孜孜贊贊之臣一徳一心清和咸理則四海之時雍風動天命之申錫無疆其理固信而有徵者矣書經安汝止惟幾惟康其弼直編修臣劉慥蔡沈曰止者心之所止也人心之靈事事物物莫不各有至善之所而不可遷人惟私欲之念動揺其中始有昧於理而不得其所止者安之云者順適乎道心之正而不陷於人欲之危動静云為各得其當也惟幾所以審其事之發惟康所以省其事之安至於左右輔弼之臣又皆盡其繩愆糾繆之職内外文修無有不至臣謹按人主君臨天下所恃以為出治之原者心而已矣純乎道心則天理中存舉凡應事接物莫不合於當然之則若雜以人欲則私意紛擾於中以之揆幾度務必有過與不及之差而不得其止者大學言明徳新民皆當止於至善誠以天徳王道本有至當不易之準必精以察其幾一以致其决而又操存涵養使天理渾然無間則清明在躬志氣如神自動静云為以及紀綱百度悉皆從容中道因應自然順適乎天命之正無往而非安其所止也至於一日萬幾必審所發易曰幾者動之微周子謂誠無為幾善惡葢以志慮方萌其端至微其發甚大一念不謹或貽四海之憂一時不謹或致百年之患古帝王早作夜思朝乾夕惕每出一令行一政必兢兢業業先致嚴於隐微然後於事物之來洞其利弊悉其源流審張弛之宜權輕重之勢舉而措之天下罔非善俗宜民之政而庶事皆得其所安矣獨是主治者君輔治者臣一人精勤於上必為之臣者左右贊襄一堂交警竭慮殫精各盡其繩愆糾繆之職克副乎耳目腹心之寄而後上禆君徳下資治道有以成泰交之風奏郅隆之效故又繼之以弼直蓋面從後言盛世之所示以為戒而責難陳善尤人臣之所奉以為職者也由斯觀之治道之得失君與臣交任其責惟人君主敬存誠謹幾慎獨以養夫義理之心而安其所止又於臨事之際周詳審慎出以精明斷以果决則主徳純粹既有以端治化之原而在廷諸臣復能和衷共濟効職宣猷将堂㢘一徳内外交修元首明而股肱良幾務理而庶事康百姓有不丕應徯志上天有不申命用休者哉書經安汝止惟幾惟康其弼直監察御史臣廖必琦程子曰事事物物各有其所得其所則安失其所則悖聖人所以能使天下順治非能為物作則也惟止之各於其所而已又曰安危之本在於人情治亂之幾繫乎事始又曰為宗社生靈長久之計惟是輔養主徳而輔養之道非徒涉書史覽古今而已要使跬步不離正人乃可以涵養薰陶成就聖徳臣謹按蔡沈註云安之云者順適乎道心之正而不陷乎人欲之危動静云為各得其當而無有止而不得其止者葢止即止於至善之謂順理則裕從欲惟危人君心安所止故能為萬事之樞紐然存之於静或不能不失之於動事之方發者幾也惟審其合於止而後發事之将成者康也惟省其合於止而後安如是則審於己以修於内矣至於左右輔弼之臣又皆盡直言以匡正之以夾輔安止之道如是則審於人以修於外矣内外交修而慎位之道已盡将見君心愜適之處即民心同然之願民心恬愉之處即上帝引翼之機人心歸而天命眷保治之道皆基於是要之安止正慎位之功幾康亦止完得安止工夫弼直即於君止未安幾康未審者直以夾輔之則君心之所係綦重矣真徳秀有云惟學可以養此心惟敬可以存此心惟親近君子可以維持此心三者交致其力則聖心湛然如日之明如水之清義理為之主而物欲不能奪矣此語正與禹意互相發在昔舜之戒禹曰人心惟危道心惟微惟精惟一允執厥中而又繼之曰無稽之言勿聴弗詢之謀勿庸兹禹之所以諄諄告帝者即帝之所以戒禹也主臣一徳内外交修有虞之治所以亘千古而獨隆歟而臣於是又有進焉大學云知止而后有定則欲安所止者其道莫先於致知必其早辨於理欲之微乃能適於理而不危於欲安固不揺若性生焉中庸説道不可離而静存動察之功均不可以偏廢戒懼嚴於睹聞之未起慎獨謹於念慮之方萌由是而應事之間詳審精密自無不得其當又孔子之告公曰取人以身人君必能修徳於上臣下乃能盡其責難陳善之誠殫其繩愆糾繆之職常欲君身之彊固君徳之清明故於天下之事有可否則斷以公道而勿牽於一己之私於天下之議有從違則開以誠心而勿參以二三之見啓心沃心皆由於此此至徳之所以日隆而聖治之所以彌固重華風動之休至今存可也書經安汝止惟幾惟康編修臣張九鎰臣謹按帝王奉若天道所以統壹庶類而綱紀百為者其治益隆其道大備然未有不審乎至極之地而能隨所施而當乎可者葢衆善之歸得所止則為天理失所止則為人欲是非邪正之界出入消長之機有操之至密而幾微所宜早辨也大禹告虞帝曰安汝止惟幾惟康是誠得慎位之原矣今夫人君日有萬幾倘放焉以自恣夫亦可惟適之安而非所語於止者葢在外凛淵黙之容而内念稍弛或且流於晏安觸事致精詳之意而一端偶間久且入於惰僻晏安之氣惰僻之萌私欲之所叢集也私有所錮而理愈以疎欲有所乗而道日以逺如是而欲得其所止是猶防川者決之使溢撲火者燎之使然其勢将日侵日熾而不可已夫所謂安止非過為範圍也能適乎中而已非别為矩矱也惟協乎極而已心有所専矢猶射百步者不中乎的不止也意有所必赴如行千里者不至其途不止也其始必擇所止而不遷其終将得所安而甚適大學謂止於至善又曰知止而后有定誠有與經義互相發明者然而古之聖人於安止中又必再三省察者何也事幾之發至微也明者審於至微而慎守之義理之宜至順也智者履於至順而詳度之葢實見我心不可忘兢業之懐而斷不以天下起昏渝之漸由是而㕘之密勿措之綱維百官得其宜萬事得其序固有隨所止而皆安者然要其端始於存誠其功歸於主敬本之身心以清其源通之事物以窮其義聖賢之學即帝王之學也於是穆然於唐虞三代之治要未有不先立其極以為萬世法也書經安汝止惟幾惟康檢討臣陳世烈蔡沈曰止者心之所止也人心之靈事事物物莫不各有至善之所而不可遷人惟私欲之念動揺其中始有昧於理而不得其所止安之云者順適乎道心之正而不陷於人欲之危動静云為各得其當無有止而不得其止者惟幾所以審其事之發惟康所以省其事之安即下文庶事康哉之義臣謹按禹陳保治之道既以慎乃在位言之則其所為乾惕兢業者益無不至而兹推慎位之意復言安汝止惟幾惟康者正欲帝審於理欲之交辨諸天人之際而無失乎此心之所當止也葢人君御世總在一心心如昧於所止将泛然無歸宿之地而私意因之淆惑於中嗜欲因之引誘於外既無以立事物之主宰則事至物來幾未能審又何能安紛紜憧擾鮮有不失其當者矣夫止者心之所止也天下一事一物莫不各有當止之所能止其所則意誠心正縁感無從紛引其間斯足以握萬化之樞紐一如北辰之安其居而為衆星之綱維也然或勉强操持則涉於意見之偏究違乎至當之則要惟此心至虚至靈既廓然而大公亦油然以順應則無時非天理之周流而寂然不動感而遂通舉凡動静云為俱至當恰好臻於純粹至善之地是以順適其所自然渾協其所當然此安汝止之義也雖然安止在心而心見諸事事有其幾貴審於将發之初事圖可安宜省於将成之際惟幾云者正於将發之初倍加審慎務使措施悉得其宜不致有幾微未協而後已惟康云者正於将成之際倍加省察務使應接悉得其當不致有纖毫留憾而後快葢以安止在於平時而幾康在於臨事惟臨事不懈於幾康則平時之安止非同寂守而内修益純矣總之帝王相傳不過一心而傳心之要不過一敬惟敬則有以凛夫道心之微自不陷於人心之危此止之所由安也而惟幾惟康又必惕惕於事幾之際者豈非以此心不可一時不敬乎試觀伊尹言欽厥止文王咏緝熙敬止孔門言知止而后有定此止也即此敬也聖學師承原無殊㫖且敬之至慎之愈至則安汝止惟幾惟康者正慎乃在位之本而禹言保治之道不於斯為更切歟書經安汝止惟幾惟康給事中臣程鍾彦臣謹按人君繼天立極咸熙者在庶績密持者惟一心故養之於夙夜之先而心之寂然不動者不失其静虚之體審之於事物之交而心之感而遂通者適如其動直之用則内外交修顯微無間而古帝王養心之要端不易此矣夫本於天而為衷具於人而有心萬理於以畢備萬事於以受裁湛然中存全體無乎不具大用無所不周天下之大事物之繁何一不待治於人主之一心必也不以紛華而動不以嗜好而馳天理渾然人欲退聴則操持有主而天君常泰此禹所云安汝止之㫖也由是至静而涵至動之機至虚而妙至實之用事至能揆物來能應審於念慮方動之時惟幾而有以善其發省於事為将成之際惟康而有以善其成則處事之道得而安止之功密夫人心道心傳自虞廷而大禹陳謨又以安止為養心之要誠哉上以接虞帝之心傳而下即以開歴聖之心法矣彼仲虺之告湯曰以義制事以禮制心則執持有要而物欲不擾傅説之告髙宗曰惟厥攸居政事惟醇則宅衷有本而措施咸宜若文王之緝熙敬止武王之敬勝義勝總以治心為兢兢而聖經以正心為修身之要者豈無本哉在宋程子之對君曰先聖後聖傳道傳心人心廣大無垠萬善皆備欲傳聖人之道不過擴充此心胡安定之入奏曰聖學以正心為要心者事物之宗正心者揆事宰物之權也朱子具封事曰古先聖王持守此心兢兢業業精一克復如對神明可見君心為治化之原而遏欲存理人臣所本此以為贊襄者乎要之至靈者心易縱者亦心涵養少疎而主宰無權故必主敬存誠以毖其修戒慎恐懼以謹其獨防其外誘密其内存則清明在躬志氣如神皇衷無忒而四方有不從欲以治也哉書經惟幾惟康其弼直惟動丕應徯志以昭受上帝天其申命用休檢討臣吳泰朱子曰惟幾所以審萬事之幾惟康當求箇安稳處弼直以直道輔之應之非惟人應之天亦應之臣謹按人君受天明命為天下臣民主天之眷顧亦孔厚矣惟是天所寄以視聴者民也民所仰為父母者君也而君所恃以上凝承下咸和者心也是故徳惟善政心為之樞為政在人心立之宰天下之治忽天人之應違係焉葢不可不慎也顧心當動發有猝不及檢之防心方静存又寂無用力之處謹而持之其在幾乎精吾心之幾以與萬事之幾相際而審之又審庶乎無毫釐之差矣由是而發焉可以康矣而正不敢也君子以作事謀始一念以為康而事反不得其安一念不敢康而事乃徐得其安禹之告舜曰惟幾惟康斯葢精一執中順適乎道心之正而不從乎人心之危所由以履帝位而不疚者哉嚴之在深宫凛之惟夙夜不獨天下之民無能窺洗心之密即在廷諸臣亦難喻基命之微而禹則又曰其弼直何也葢臣之事君不以趨走承順為恭而以責難陳善為敬説命曰惟暨乃僚罔不同心以匡乃辟孟子曰惟大人為能格君心之非賈誼曰主爾忘身國爾忘家公爾忘私故仲虺美成湯不曰無過而曰改過吉甫頌周宣不曰無闕而曰補闕盛明之朝其君固兢兢業業以自强而其臣尤孜孜贊贊惟恐其君之一念未純一事未當以為大徳累者凡以盡輔弼之義云爾况舜大聖人也豈尚有未審之幾乖於至當以待百爾之糾繩而一堂如是其咨儆者慎之至也為君葢若斯之難也然而能如是人心悦焉人心悦而天意從焉矣積憂勤惕厲之衷以畢注於閭閻故億兆人之悲愉欣戚悉入宵旰圖維萃逺近感孚之誠以潛通於帝謂故㝠漠中之誥誡丁寧悉自王心昭格是惟無動動則丕應徯志矣由是俾彌爾性茀禄爾康純嘏爾常休之至也詩曰保佑命之自天申之其昭受之謂歟知天之寵綏在君則天怒天渝宜敬也知天之付託在民則民事民依宜勤也知天與民之貫通在心則瞬存息養宜密也堯舜禹湯文武厯聖相承未有不以心法為治法者故曰王道本於天徳又曰王道本於慎獨嗣後唐太宗曰人主惟有一心而攻之者甚衆可謂能體人心惟危之訓而又得魏徵王珪諸臣之弼直此貞觀之治所以幾於三代也治天下者而欲嫓隆三代繼美唐虞治心固其本哉書經惟幾惟康監察御史臣李㥳蔡沈集註云惟幾所以審其事之發惟康所以省其事之安臣謹按君人之徳惟在一心心不可以縱且怠也則乗時圖治尚矣顧其間有要焉執其要而圖之則縱者斂怠者勵萬幾之來隨事致詳而至理之在我者自無不各止其所而不可易謹稽益稷篇禹之所以告帝者既曰安汝止復曰惟幾惟康夫止者道體之無為康者至理之燦著而幾則天倪之微見者也前此之未兆則冲漠無端欲致力而無由後此之己形則物感紛乗将補救而莫及而惟此由寂而感由微而著邪正於是乎分是非於是乎判庶務之得失於是而别其途即國家之治忽亦於是而異其向由此而致謹焉澄慮於宸居淵黙之中慎審於萬感兆朕之際無待云為而内之肆應者已烱然其不昧雖未措施而外之猝投者已秩然而有條幾既得矣從容而順適焉危者去而安者存偏者易而全者舉平康正直之理有不在於極深研幾之中乎故人以為幾康者安止之本而臣以為惟幾者尤惟康之源也易曰幾者動之微周子曰幾善惡誠以幾之所關甚重固聖功之本而萬化之所由基乎夫以帝之濬哲文明炳燭幾先事幾之投無難坐照而大禹之入告曰惟幾惟康兢兢乎慎之又慎其謹小辨微之惕厲若較倍於恒人即異日帝之戒臣亦曰勅天之命惟時惟幾克艱厥后克艱厥臣帝治之所由光昭而天命用凝與御覽經史講義卷十
