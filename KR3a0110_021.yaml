  text: 欽定四庫全書御覽經史講義卷十五目録
  hash: sha256:b3565ac59b09b1152e7f5646012bdd2b1f7a3eff92e36df27da96b101beac2e0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_021-1a, image: WYG0722/WYG0722-0167a.png}
body:
  text: 詩經肅肅兔罝椓之丁丁赳赳武夫公侯干城肅肅兔罝施于中逵赳赳武夫公侯好仇肅肅兔罝施于中林赳赳武夫公侯腹心編修臣儲晉觀于以采蘋南澗之濵于以采藻于彼行潦于以盛之維筐及筥于以湘之維錡及釜于以奠之宗室牖下誰其尸之有齊季女編修臣諸錦羔羊之皮素絲五紽退食自公委蛇委蛇給事中臣盧秉純摽有梅其實七兮求我庶士逮其吉兮摽有梅其實三兮求我庶士逮其今兮摽有梅頃筐塈之求我庶士逮其謂之編修臣諸錦彼茁者葭一發五豝于嗟乎騶虞編修臣沈文鎬孑孑干旄在浚之郊素絲紕之良馬四之彼姝者子何以畀之孑孑干旟在浚之都素絲組之良馬五之彼姝者子何以豫之孑孑干旌在浚之城素絲祝之良馬六之彼姝者子何以告之監察御史臣劉永泰投我以木瓜報之以瓊琚匪報也永以為好也投我以木桃報之以瓊瑶匪報也永以為好也投我以木李報之以瓊玖匪報也永以為好也監察御史臣劉永泰坎坎伐檀兮置之河之干兮河水清且漣猗不稼不穡胡取禾三百廛兮不狩不獵胡瞻爾庭有縣貆兮彼君子兮不素餐兮監察御史臣沈懋華七月流火九月授衣一之日觱發二之日栗烈無衣無褐何以卒歲三之日于耜四之日舉趾同我婦子饁彼南畝田畯至喜編修臣鈕汝騏春日載陽有鳴倉庚女執懿筐遵彼微行爰求柔桑春日遲遲采蘩祁祁監察御史臣陳大玠六月食鬱及薁七月亨葵及菽八月剝棗十月穫稻為此春酒以介眉壽七月食瓜八月斷壺九月叔苴采荼新樗食我農夫編修臣汪廷璵九月築場圃十月納禾稼黍稷重穋禾麻菽麥嗟我農夫我稼既同上入執宫功晝爾于茅宵爾索綯亟其乘屋其始播百榖編修臣孫人龍我稼既同檢討臣萬松齡詩序東山周公東征也周公東征三年而歸勞歸士大夫美之故作是詩也一章言其完也二章言其思也三章言其室家之望女也四章樂男女之得及時也君子之於人序其情而閔其勞所以説也説以使民民忘其勞其惟東山乎編修臣諸錦呦呦鹿鳴食野之蘋我有嘉賔鼓瑟吹笙吹笙鼓簧承筐是將人之好我示我周行呦呦鹿鳴食野之蒿我有嘉賔德音孔昭示民不恌君子是則是效我有旨酒嘉賔式燕以敖呦呦鹿鳴食野之芩我有嘉賔鼓瑟鼓琴鼓瑟鼓琴和樂且湛我有旨酒以燕樂嘉賔之心編修臣儲麟趾人之好我示我周行監察御史臣趙青藜修撰臣金甡載馳載驅周爰咨諏編修臣柏謙天保定爾亦孔之固俾爾單厚何福不除俾爾多益以莫不庶民之質矣日用飲食羣黎百姓遍為爾德洗馬臣趙大鯨罄無不宜受天百祿降爾遐福維日不足修撰臣于敏中罄無不宜受天百祿檢討臣張漢吉蠲為饎是用孝享禴祠蒸嘗于公先王君曰卜爾萬夀無疆編修臣諸錦
