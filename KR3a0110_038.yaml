body:
  text: 周易乾元亨利貞檢討臣陳兆崙朱子曰伏羲仰觀俯察見隂陽有奇耦之數故畫一奇以象陽畫一耦以象陰見一陰一陽有各生一陰一陽之象故自下而上再倍而三以成八卦見陽之性健而其成形之大者為天故三奇之卦名之曰乾而擬之於天也三畫已具八卦已成則又三倍其畫以成六畫而於八卦之上各加八卦以成六十四卦也此卦六畫皆奇上下皆乾則陽之純而健之至也故乾之名天之象皆不易焉元亨利貞文王所繫之辭以斷一卦之吉凶所謂彖辭者也元大也亨通也利宜也貞正而固也文王以為乾道大通而至正故於筮得此卦而六爻皆不變者言其占當得大通而必利在正固然後可以保其終也此聖人所以作易教人卜筮而可以開物成務之精意臣謹按乾天道也君道也惟天發育萬物而物無不受其生成惟君統理萬民而生成之功與天地參凡此皆乾道之大通而至正也故朱子謂乾道大通而至正一語渾括天人至眀切矣下乃云筮得此卦其占當得大通而必利在正固此解本文元亨利貞四字正面只貼占者講蓋易為開物成務之書故推而極之萬事萬物言以天道之至神君道之至聖皆必大通而至正而凡在生成之中秉皇降而遵王路者其可不勉乎如此説來方見天人上下一貫之理而諸儒便作四德解預奪文言地步者皆非也文王繫辭自有文王之意孔子文言自有孔子之意俗儒必混而同之以文言四德硬作此處注腳則拘泥不可通而於所以勉占者之旨亦並晦矣然謂二聖人之意或有異同則又不可文王孔子皆從乾道之大通至正處設想文王渾涵其意而後繫此辭孔子分析其辭而直抉其意曰元曰亨曰利曰貞只完得大通至正四字之蘊而意豈異哉所以必分析言之者渾淪處難以言名不得不借其辭而析之使人知所以求端而用力也以元亨利貞分配春夏秋冬者以四時為人所觸目而共曉也以元亨利貞分屬仁義禮智者以四端為人所問心而皆具也無非欲以道之本然率百姓以共由而聖人之情見矣審乎此則一舉念之間而此念之始終即元亨利貞在焉一出言之頃而此言之往復即元亨利貞在焉故又曰君子行此四德者故曰乾元亨利貞言君子於此四德皆本乾德為行將四字攝歸一字正要人不泥作四項看然則孔子文言已該於文王四字之內而文王繫辭已該於伏羲卦名之內不寧惟是乾之六畫已該於一畫一畫者其中實也至健也其兩端平也至正也勿二勿三至純粹也有始有終無始無終至精微也堯舜曰精曰一曰中其即乾之一畫也歟周易九三君子終日乾乾夕惕若厲無咎檢討臣朱璂臣謹按敬者德之聚也德惟一動罔不吉敬該貫動靜聖賢之學徹頭徹尾無非敬也故曰敬者聖學之所以成始而成終者也乾卦九三之爻辭言君子主敬之學也其在郭雍則以三居臣道之尊又當興事造業之任故終日乾乾法乾之健不遑休息此大禹三過其門而不入之時楊萬里亦以勤於德而懼於位則危者安矣何咎之有此皆就九三之位與時而言者也蓋乾者六爻俱陽之卦九三居下卦之上為一卦之成下之上則髙者近危卦之成則斷者必續三剛也九亦剛也以偏剛之才處近危之地又當斷續之際故必有乾惕之象乃能無咎惟是在天之運行未有已時君子之為學以希聖君子之希聖以法天大象曰天行健君子以自強不息自強不息者即乾乾夕惕之謂也曰乾乾者言不自一乾而已也曰夕惕者正乾乾之不自已也君子之戒謹恐懼日如是也夕猶如是務使此心炯然不昧無造次顛沛之或違乃為與天合德乃於九三之旨為克盡不然君子以一身應天下之務非不欲稍自宴逸以偷一息之暇少自便安以求須臾之寧顧相欺於晨夕之內相匿於微渺之端則天下之業將有荒於此者矣况天命之難諶人心之不測既不得不重畏於此而性之所以不偏命之所以不已又有不能自已於此者精神運則德業日新念慮惕則勳猷日起從未有克慎明德而隕穫於變故之來欽崇天道而不能挽夫循環之運者也邵雍曰聖人之所以能立無過之地者以其善事乎心也其所以善事乎心者尤在不敢忽於微而杜其漸在昔成周盛時西旅貢獒武王受之召公以為非所當受而作旅獒一篇有曰玩人喪德玩物喪志又曰細行不矜終纍大德是皆本乾乾之義以陳告也厥後周公作無逸唐之魏徵作十漸十思以進皆此意也孰謂乾惕之心可暫時或弛哉周易大哉乾元萬物資始乃統天檢討臣陳兆崙朱子曰此専以天道眀乾義又析元亨利貞為四德以發眀之而此一節首釋元義也乾元天德之大始故萬物之生皆資之以為始也又為四德之首而貫乎天德之始終故曰統天臣謹按此聖人欲眀王道之本於天道而先著天道之妙所謂至德要道者也文王之繫辭曰元亨利貞意蓋謂占得此爻者當得大通而利於正耳而孔子則析為四德又舉元以屬之乾而曰乾元者何也蓋以乾為天為君天生萬物君治萬民其根柢至約而功用至博何以眀之則借文王所繫之辭以眀之謂之元者天地之生理與天地之生氣相乘以運而渾渾然無始無終者也不可得而見也不可得而見則何以知其能始物蓋見之於萬物矣勾者畢出萌者盡達非物之能自出自達也必有所資以為始者則以為是元功也云爾故曰於時為春於人為仁而衆善之長也夫既曰於時為春矣將異乎亨之為夏利之為秋貞之為冬而又曰統天者何也則仍於萬物見之草雖衰而復茁木既悴而還榮向之零落於風霜者忽燦然花葉之交映焉而此花與葉者非即前春之花與葉也而固不改花而不易葉如謂元之德止於始物而已又孰為護之惜之至於歷千萬春而常如一春也則以為是元功之所統也云爾蓋天道有溫肅之異用而歸於好生王者有仁義之殊施而歸於任德故曰三皇之世如春又曰萬物熙熙如遊春臺此亦統天之義也孔子之作春秋也與其作易傳無以異董子曰春者天之所為也正者王之所為也上承天之所為而下以正其所為正王道之端云爾胡氏春秋傳曰大哉乾元天之用也至哉坤元地之用也元者何仁是也仁者何心是也建立萬法酬酢萬事帥馭萬夫統理萬國皆此心之用也一心定而萬物服矣此以見春秋之旨與易傳合凡欲人君以仁愛為心而行之以不息要之以至久則與天地參也漢書文帝詔曰方春和時草木羣生之物皆有以自樂而吾百姓鰥寡孤獨窮困之人莫之省憂其議所以振貸之夫省疾苦固王者之用心也而急振貸非王道之本務也王道之本在乎眀教化厚風俗睦姻任恤之行倡自士大夫而下逮於愚賤使人人自為養交相養而莫非君之有以養之何者教化行而風俗美也乾之始物非寸量而尺度之也王者體元非家賜而户豫之也故曰大也周易雲行雨施品物流形編修臣羅暹春孔頴達疏此二句釋亨之德也言乾能用天之德使雲氣流行雨澤施布故品類之物流布成形各得亨通無所壅蔽是其亨也臣謹按乾元之德立於萬物之先渾然各足理無所分逮形質判而造物之用著矣然物號有萬各以類從飛與躍既異其情動與植復殊其質生生不已終古如斯造物者若有所區别於其間而乾元究何所容心也蓋兩間無終祕之理理之發生即有不得不分之勢試觀未有品物之始天以一元之德為萬物所資根荄己伏形色未成洪纖髙下無所著於耳目之間及陰陽之氣會於太虛布之為油雲灑之為膏雨導其生機紛呈衆象則天無或屯之膏物有乘時之智躍然競起森然羅列而欣欣向榮之概乃隨所值而皆是矣是物之生也生於不容已而品之分也亦分於不自覺理一而形殊不亦可即乾德之亨而悟乾元之大乎且夫物之生也待澤於天機隱而未宣情鬱而未暢其勃然之勢不能無所藉而呈而乾德之醞釀於無聲無臭者忽而為雲忽而為雨流通散布皆如萬物之欲以為給而要成形之始其理固已備也是以布德行惠者法其意而行之敷愷澤於臣工百寮沐其優渥沛恩膏於庶姓萬國同其沾濡雖賢否秀頑民生異質剛柔強弱風尚異宜而肫誠無己之懷纒綿於方寸間者先有以為羣生托命之原由是而行於朝施於野熙熙然各有以遂其生而民之被其澤者亦如萬彚含生共冀甘霖之化蒼穹布惠均沾潤色之施雖欲名其恩之所自來究莫得而名之甚矣王道一天德也周易各正性命保合太和檢討臣蔣祖培朱子曰物所受為性天所賦為命太和陰陽會合沖和之氣也各正者得於有生之初保合者全於已生之後此言乾道變化無所不利而萬物各得其性命以自全以釋利貞之義也臣謹按性命者凡物所以生之理各正者凡物皆全其所以生之理也太和即性命之理醞釀於沖虛保合者永保此性命之理渾合於無間而以完固其元氣者也要其所以各正而保合者在天地有至理在萬物有顯象在人事有實功蓋天地以一元之氣流行鼓蕩於其間發舒之後繼以凝聚凝聚之後歸於完固四時日月各正其令錯行代眀統會於和其理可以微會而默喻若夫萬物得天地之性順陰陽之和莫不各遂其生咸若其性譬佳禾之由苖而秀自華而實此性命之各正也且草木之核謂之曰仁言其生理充足生意渾涵也更觀其顆粒勻圓皮理堅緻包裹完固若恐元氣滲漏不啻保合之再致意焉不又物象之顯而可見乎至於人心具此生理進德而德必底於成居業而業必求其備如具肅乂哲謀之命即為貌言視聽之性所當各正者也稟忠孝友恭之命即為子臣弟友之性所當各正者也受駿奔謨謀之命即為股肱心膂之性所當各正者也惟各正其性命而後各成其為物朱子所謂到這裏方成如百穀堅實了至各正之後則性命融為太和如耳目聰眀手足間適舉動威儀則一身之太和也兄弟既翕妻子好合則一家之太和也元首眀股肱良庶事康則天下之太和也又非因任已然也更必時時保護事事吻合使精神完固渾全無間自然隨感而應至於生生不已彼風動時雍唐虞之太和也而堯舜猶必兢兢業業欽以維持之關雎麟趾成周之太和也而文王武王敬止敬勝以培養之是以巍巍則天重華協帝皆其保合也純亦不已不泄不忘亦其保合也是人事之當然又如此且各正而後保合則其序不可越既各正而又必保合則其功不可缺太和之中絪縕已含蓄其性命則機緘又旋轉於無窮然則各正也保合也乃天地萬物之自然即為人事之當然苐天地無心而成化萬物有知而無能惟人也得其秀而最靈彼衆人行之而不著習矣而不察雖具性命之理亦與昆蟲草木同遊於太和之宇耳孰知有主乎性命之本一正而無不正操乎太和之源代天地而保合者乎中庸曰致中和天地位焉萬物育焉是惟聖人之責也夫周易保合太和檢討臣韓彥曾朱子云保合太和即是保合此生理也天地氤氳乃天地保合此生物之理及萬物化生之後則萬物各自保合其生理林氏曰生意凝畜而不滲漏化機內蘊而不外見則太和於是保合矣臣謹按正蒙太和篇云氣坱然太虛升降飛揚未嘗止息則知宇宙之大一和氣之所濩而布也品類之盛一和氣之所生而成也在在皆性命之流行即在在皆太和之洋溢何以論乾道之變化獨以性命之各正歸之利而以太和之保合歸之貞哉蓋不専一則不能直遂不翕聚則不能發散天惟靜専而後能動直地惟靜翕而後能動闢嘗推求其故而得貞下起元之説矣以四時言之元屬春而亨屬夏利屬秋而貞屬冬當正冬之令而一線添於短至冬之所以含春也以五行言之元屬木而亨屬火利屬金而貞屬水當水旺之辰而微陽肇於子半水之所以生木也斯時天氣上騰地氣下降閉塞成冬剝極而復天地生物之心或幾乎息而有不息者存故曰復其見天地之心乎蓋天地之心不可見於靜極初動時見之仲冬之月所以律中黃鍾也淮南子曰黃者土德之色鍾者氣所鍾也冬至德氣為土土色黃故曰黃鍾是為氣之始律之元也太史公曰細若氣微若聲聖人因神而存之雖妙必效言黃鍾始於聲氣之元也前漢志曰太極元氣函三為一極中也元始也蓋謂天地之氣行於十二辰而托始於子也邵子之詩曰一陽初動處萬物未生時元酒味方淡太音聲正希正謂此耳先王至日閉關君子齋戒掩身非以順時令而體天地之心乎夫天地來復之心在人則為道心道心甚微故曰復小而辨於物惟精以察之一以守之則道心之微者以著推之語默動靜寤寐呼吸語即流形者機而默即保合者機也動即流形者機而靜即保合者機也寤即流形者機而寐即保合者機也呼即流形者機而吸即保合者機也斂之愈精則推之愈廣由是暢於四支喜怒哀樂發皆中節而太和在一身矣由是發於事業政善民安則天下之心和聖人作樂以宣暢其和心達於天地天地之氣感而太和焉大樂所由與天地同和也而太和遍兩間矣要之天地以生物為心是天地之仁也是天地之太和也聖人以天地生物之心為心是聖人之仁也是聖人之太和也此聖人與天地合其德也夫周易天行健君子以自強不息編修臣孫人龍朱子曰天乾卦之象也凡重卦皆取重義此獨不然者天一而已但言天行則見其一日一周而眀日又一周若重復之象非至健不能也君子法之不以人欲害其天德之剛則自強而不息矣何楷曰健而無息之謂乾中庸言至誠無息者通之於天也自強言不息不言無息學之為法天事耳始於不息終於無息故中庸於無息之下文而推原之曰不息則久自強之法何如曰主敬君子莊敬日強臣謹按先儒謂天運不息非特四時為然雖一日一時頃刻之間其運未嘗息也自強不息只是常存得此心使天理常存而周流不息是乃所以全天德之剛而體天行之健也蓋嘗思之乾象為天此卦上下皆乾是天之行也天行今日一周眀日又一周晦眀寒暑初無停機消長盈虛絶無止境周流不息何其健也君子知吾心之天理亦自有周流而不息者特恐為私欲所勝而不能自強斯天理遂壅遏而不行有時乎息矣是以法天之學必有自強之道克己以復禮而制夫私者必不屈於私間邪以存誠而制夫欲者必不屈於欲務使吾心之天理充周運行無少間斷庶幾純亦不已一如乾健不息而上合於天矣何楷謂自強之法曰主敬良以敬也者聖學之所以成始而成終故由存養省察而極之不顯篤恭君子之莊敬日強實為法天行健之要法蔡清又謂自強不息不外能行四德蓋四德無所不該凡以全其天德之剛而已故必體仁長人而私意不能纍嘉會合禮而邪僻不能干利物和義而物欲不能奪貞固幹事而偽妄不能參夫然後吾心之天理充周運行而始於不息終於無息此君子之所以法天也周易天行健君子以自強不息編修臣陸嘉頴臣謹按兩儀之象自天始六畫之卦自乾始天者乾之形乾者天之用言其形則望之其色蒼然南樞入地中三十六度北樞出地上三十六度狀如倚杵此天之形也言其用則一晝一夜之間天行凡九十餘萬里則天之健用可知自古及今一氣周流循環無端一理充實於穆不已聖人不以因重之文象天而直著之曰天行健眀乎天之象如是則法天之象亦如是爾君子稟剛中之德澄心性之原辨理欲於幾微凛鑒觀於眀旦以之修己則聖功王道不域於小成以之淑世則繼往開來必殫其願力蓋天之所寵錫者惟君子君子之所凝承者惟天天日運於穆清君子日強於宥密此豈贊襄之力所得助其髙深者耶今夫人一呼一吸謂之一息一息之微忽不及察也然積時而日積日而月積月而嵗皆於一息基之古之帝王一日萬幾寸陰是惜日新又新不遑暇食誠懼乎其息也中庸言至誠而推極於維天之命易象言天行而實驗於君子之強君子之不息其即至誠之無息歟嘗試以諸卦觀之震行於始坎行於繼艮行於終皆不若乾之自始迄終者可以見君子之全學加震於乾則為壯加坎於乾則為需加艮於乾則為畜又不若乾之由內達外者可以見君子之純修若夫歸藏之首坤養之雖完而無以勵人事之始連山之首艮任之雖重而無以操天性之堅惟以不息者為生息之機且以不息者俟遊息之樂體乾之君子所由與諸卦異耶是則有彖以定一卦之義復有象以眀一卦之用彖詳而象略非略也聖人寓至詳於至略之中所謂善言天者必有驗於人也至於不息之妙根極於時乘而自強之目則惟實行此元亨利貞之四德以上契乎天行文言又為之申其蘊矣惟君子之至健乃能與天合撰哉周易天行健君子以自強不息編修臣林令旭朱子曰君子法之不以人欲害其天德之剛則自強而不息矣何楷曰健而無息之謂乾中庸言至誠無息者通之於天也自強言不息不言無息學之為法天事耳臣謹按天人之際其理甚微而其象甚著天道者人事之凖則也天無體以乾為之體健者乾之德也乾德一於健故無一息之不周天德一於乾故無一時之或息君子法天之陽剛以為健行之本晝有為宵有作息有養瞬有存純乎理而不間以欲強自我勝何息之有乎夫不息則久久則徵徵則悠逺以至於博厚髙眀天人之撰不其合乎然天則曰行健而君子必言自強者天無心其潛運密移不外於一理於穆之所以不已也故至誠無息天行健也若文王之德之純是也君子則必振作其精神故其強為自強而非可諉於旁貸所謂未能無息而不息者君子之自強也顏子三月不違仁是也然則自強之功若何不外於立誠而已矣誠則無二無二者天之道也是即精一之傳而聖人所恃以基命宥密者也以之自治則自食息起居以至於視聽言動無往非實心所充積天德於以達矣以之治人則自班朝涖官以至於用人行政無往非實理所彌綸天工於以亮矣故曰誠者聖功之本也夫易之為書陰陽互根皆參伍錯綜以成其變惟乾之六爻則全體陽剛而無一毫缺陷之處故為健之至若有一毫缺陷則非乾矣故曰君子有四時朝以聽政晝以訪問夕以修令夜以安身自強不息之謂也董仲舒曰積善在身如長日加益而人不知也積不善在身如火銷膏而人不見也程子曰人情才檢束則日就規矩才放肆則日就曠蕩是知天下之物不長則銷人心之靈非強則息其間不容呼吸學者且然况於人君處宫闈之邃極富貴之崇倘非有以自強其不安於逸欲者少矣是惟緝煕繼續日新又新則天德王道一以貫之昔魏徵告唐太宗曰古人云靡不有初鮮克有終願陛下守此常謙常懼之道日愼一日則宗社永固堯舜所以太平實用此法此數語即自強不息之道唐太宗能受言而不能躬行所以貞觀之治遠遜於唐虞則所謂設誠於內而致行之誠有一刻不容自寬者矣周易天行健君子以自強不息編修臣姚廷祜何楷曰中庸言至誠無息者通之於天也自強言不息者法天之事也始於不息終於無息故中庸於無息之下推原之曰不息則久臣謹按理欲之消長人心之邪正所由分政治之得失所由判也故宣聖於乾卦大象首揭之曰天行健君子以自強不息誠以王者承天命凝天庥則必體天之心以為心而後起者不得而淆於中法天之德以為德而攻取者不得而乘其間夫所謂天德與天心者何曰健而已矣健自無息而已矣夫天人一理也顧理之在天者日月相推而眀生焉寒暑相推而嵗成焉自開闢以來常如一日也而理之在人者智故深而靈眀之體有間焉匪幾貢而皆備之良或缺焉自受中以後不勝其變遷者無他安肆之念日滋而自強之氣中衰也是以法天之君子有生知之質而不敢自恃也聰眀萬倍於衆人而夙夜之精勤視修士為更密有安行之德而不敢稍康也奮庸足以熙帝載而宥密之單心較下學為加嚴務使天之所以子我者一理渾然衆欲退聽一如日月之運行而繼照者長眀矣一如寒暑之推遷而往來者不匱矣始以不息者殫厥功終以無息者幾於化始以法天者程其力終以配天者成其能然則自強之功顧不大哉故世有自強之君則治益求治安益求安凡所以敷政寧民者務為可久可大之業而不敢稍涉於偏安所謂勿逸日逸者此也世有自強之臣則進思盡忠退思補過凡所以宣猷贊化者務為百年必世之謨而不敢偷安於旦夕所謂謨眀弼諧者此也然則自強之道奈何堯之欽允禹之幾康湯曰日新武曰執競凡以云敬而已敬則強強則健健則與天同運而又何息之可言哉此即郅隆之世所以重熙纍洽享萬年有道之長者胥由此也歟周易天行健君子以自強不息編修臣積善臣謹按聖學首重法天而天人之默相契合者非徒在形迹之間也蓋天本至誠故氣化推行而運旋莫滯君子存誠故夙夜黽勉而精進無窮則其基命宥密而日進無疆者實與穹蒼之體有同運並行者焉乾象為天浩乎廣大矣然其運行則有常也晝夜相推寒暑相嬗即一息之間未嘗或停焉何其健也君子觀天道之流行而日新之功因之起矣主敬而怠不形存誠而欲俱泯策勵之精神貫徹於無間久之而天理常存周流不息矣此盡人達天之學也臣伏思之日強者君子之功功必操之於己神眀所注獨秉其嚴恭詣力所存不懈於動靜常若有一息之稍緩而不能一事之稍忽而不可者如是以窮理則聞見博而知益眀如是以行道則德日起而大有功惟在自勵而已故不曰日強而曰自強也無息者至誠之道蓋德無不純故運無或息此不待勉強而自與天為一者也然未至於純必用力以幾於純故由一念以至念念由一時以至時時密其功焉則可大可久矣是純粹之修先於深造基之也故不曰無息而曰不息也夫天之健不可見於其行見之君子之自強不可見於其不息見之天道迭運而不窮君子之學亦與時而俱進夫是以亹亹焉勉勉焉惟奮往以圖功斯德崇而業廣詩曰維天之命於穆不已行健之謂也文王之德之純不息之謂也斯天人合一之學聖人首於乾象著之與周易天行健君子以自強不息檢討臣張日譽臣謹按易象此言見君子為學之密也蓋士希賢賢希聖聖希天君子之德至於合天而學之功始盡要其所以合天總一乾乾不息之誠而已維天之命於穆不已春生夏長秋斂冬藏二氣之布於四序容或不齊而一理渾然無時不貫乎其中周子曰動極而靜靜極復動一動一靜互為其根於以見天德之至健而無一息之或停矣其在生安聖人所性而有德無虛假自無間斷如文王之德之純是也然聖人全體一誠君子欲臻夫誠端由自強不息始而自強之道則必合動靜以致其功意念初萌善惡攸分大學之言獨中庸之言隱微通書之言幾皆謂此也於斯不謹將潛滋暗長而不能以自已夫惟內省不疚健以致其決於心有難慊之處極力克治不使纖細之或留則所存皆天理之正又於其中密之又密戒慎恐懼之功無時稍懈即極諸不睹不聞之際亦若有鑒觀之在前眀旦之足惕者天理之淵涵自漸進於熟矣夫人惟一心而外物之相攻每百端屢試而不窮無論貨利聲色皆堪為纍即意見之偏氣質之私苟不能砥礪涵養而歸於中和未始非離道之漸故學問疏忽之端實天理間隔之隙也君子之自強必使心超於事物之表而不至少有所屈又必使心純乎義理之正而不肯少有所離乃可謂之善法天焉若夫自強之方當以敬為本商頌云聖敬日躋記曰莊敬日強則敬者聖學之所以成始而成終也敬則中實而客感之私難入敬則中虛而偏倚之見悉化先儒於此論之詳矣其言主一無適恐念之或馳也其言整齊嚴肅恐意之或肆也其言常惺惺法欲此心觸處而各照也又言其心收斂不著一事欲此心粹然而永謐也是皆為學之要而君子之所宜守者歟誠由此而日勉焉自勝為強內除朋從之擾無欲則剛外絶非僻之纍有天德便可語王道奏假形無言之化篤恭運不顯之神聲臭俱泯通於帝載則始為法天之君子終為合天之聖人也已周易天行健君子以自強不息監察御史臣黃元鐸臣謹按人心與造化相通而天理之流行必期於無間恆性為隂隲所賦而聖學之終始尤貴乎能純故法天以治躬斯繼天以立極基命宥密不外於就將緝熙厥修乃來皆因夫遜志時敏古之聖人成位乎中而德性渾全無非體天之心以為心者也孔子玩易之大象而繫以辭曰天行健君子以自強不息其斯為善於法天乎蓋天為乾象六畫皆奇上下皆乾陽之純而健之至故不言乾而言健健即乾也天體至圓周圍三百六十五度四分度之一其氣之運行一日一周亘古不息則健莫健於天矣夫天道無為人心有覺秉五常以植性而元亨利貞之理畢萃於厥躬天德本甚剛大也無如有生以後氣稟拘之私欲蔽之聞聖道而悅見紛華而亦悅天人交戰而德之剛大者遂至於柔靡惟善法天之君子精其識以辨危微之介定其力以嚴邪正之防瞬有存息有養晝有得宵有為無敢戲豫無敢馳驅自勝者強此之謂歟蓋體仁足以長人而民為吾胞物為吾與不使惻隱之意或害於貪殘斯依仁而仁不息矣嘉會足以合禮而謙尊而光卑以自牧不使恭敬之良或傷於惰慢斯崇禮而禮不息矣聲色不邇貨利不殖而利物足以和義斯義不可勝用而羞惡之心不息矣清眀在躬氣志如神而貞固足以幹事斯智無所不周而是非之心不息矣夫息由於不強自強即能不息而自強之為功要不過主敬與存誠而已敬為德之聚聖學所以成始成終也堯之欽眀舜之溫恭文之小心翼翼武之執競維烈莫非敬以直內者書曰君子所其無逸禮曰君子莊敬日強與易豈有殊旨歟元亨誠之通利貞誠之復於穆不已天之道也純亦不已聖之修也中庸言至誠無息則自強即至誠矣君子之心又豈異於天心耶臣愚以為天德王道初無二理修己為治人之本聖功為啓化之原學優入於化神世自臻於熙皥古人之治益求治安愈求安者皆本夙夜之勤以致之無疆惟休亦無疆惟恤則法乾以自強不息者即法坤以厚德載物又何難參贊化育輔相裁成而成位乎中以立極於萬世哉周易天行健君子以自強不息監察御史臣包祚永朱子曰天行一日一周眀日又一周非至健不能也君子法之不以人欲害其天德之剛則自強而不息矣臣謹按朱子言不以人欲害其天德之剛者蓋天德人欲不容並立人欲勝則天德潛消矣天德勝則人欲退聽矣所謂天德者何剛健之本體也人欲者何宴安之私情也昔之聖人清眀在躬志氣如神其至誠無息者固己與天合其德矣而萬幾在御兢兢業業日慎一日或宵衣而旰食或夕惕而朝乾敬終如始惟懷永圖此其所以天道運於上人事勤於下而萬年有道之長直以一心基之而有餘矣後之人主逸豫是安燕昵是好惟耽樂之從則是始之以憂勤者而或繼之以縱弛矣終之以怠荒矣將見整飭有為之念日以益懈而委靡不振之氣即日以相乘其弊必至於政治日非幾務叢脞而不可為矣此所謂人欲之私也可不戒哉君子惟奉天以出治其法天之學亦曰事在勉強而已勉強學問則日進於髙眀勉強力行則日進於光大彼其精眀強固之志矢之一日而可以持之終身者不由乎我更由乎誰此自強之義也自強之功久而益熟天行無一息之停斯作聖之功亦無一息之輟傳曰天道不已文王純於天道亦不已純則無二無雜不已則無間斷先後此不息之義也要之自強者奮往之力不息者堅持之效自強之力日積而月纍不息之效即悠久而無疆詩曰聖敬日躋書曰日昃不遑記曰君子莊敬日強又曰惰慢之氣不設於身體是以匪僻之干無自而入此數説者辭雖不同然其實與自強不息之理固有相為渾合互為發眀者此天人之間同條共貫而盡人之理即可以合天矣故聖人於易之乾卦首以示人歟周易天行健君子以自強不息監察御史臣黃登賢臣謹按健者天之性強者人之德本自強之德以符行健之性斯天道無終始人心無絶續而以人合天之學於是乎備子思子言至誠無息又曰不息則久言無息者即不息之積而至於久也又曰發強剛毅足以有執言體天德之全則發見於外者自極其盛而不可掩也要其所以進乎此者則有道焉曰主敬而已矣蓋人之心敬則日嚴不敬則日肆肆則人欲熾而天理熄雖偶而存之不能守也嚴則天理全而人欲遏雖交而引之不為擾也顔子三月不違仁庶幾能自強者然猶未能純乎不息也記曰君子莊敬日強詩曰於緝熙敬止斯則自強之實而不息之眀驗也自古聖人繼天立極以成博厚髙眀悠久之治者道無以易乎此或者謂戒懼慎獨下學之功非上聖之事從容中道之聖人仁之至義之盡不賴勇而裕如者其説是已而其理實有未盡古所謂性之之聖莫堯舜若矣然且兢兢業業一日二日萬幾又曰人心惟危道心惟微惟精惟一允執厥中三代哲王歌於雅頌者亦惟眀其敬之躋德之純焉豈非生安之聖人亦日事於戒懼慎獨而瞬存息養無一時之或間者哉然則君子之所以效法乎天者不外乎一敬而由敬以馴至於誠則所謂純亦不已者而君子之德一天德矣周易見龍在田德施普也終日乾乾反復道也編修臣李清芳程傳見於地上德化及物其施已普也進退動靜必以道也本義反復重復踐行之意臣謹按見龍在田德施既普矣如何又有反復之事蓋天下之理事非一日而成人非一日而信其中間自有轉折譬之天欲曉而反暗也乾到二爻雖已德照天下然到三爻又經危懼所以操心危而慮患深而能勝天下之重任也前之所得平易正直之理猶未周於用必險阻備嘗情偽盡知而理之精微曲折洞悉而用之不窮也此所謂反復道者也其猶人君當即位之初立綱陳紀施政造事各得其宜沛恩膏於宇內敷德澤於海隅而其間值有旱潦不時豐歉不一猶當經營竭蹶而不遑者無非天之仁愛人君欲使之憂勤惕厲以臻於至治之極也善承天者知天之意乾乾反復不敢以怠荒之心處之不敢以茍安之氣居之為善必堅致治必力用人行政必求乎大中之理措置施為必合乎至當之規惟恐一事之稍涉於偏一人之或失其所一方之或曠其澤兢兢業業無一息之少懈而布德施惠湛恩洋溢則天心克享而治平可致矣昔堯有九年之水湯有七年之旱惟堯有欽眀之德湯有日躋之敬警懼不怠毖惕罔斁所以能開中天之景運造百世之丕基而巍巍之治功垂於無窮也聖人繫易於德施既普之後而曰反復道者其旨深哉周易乾文言曰元者善之長也亨者嘉之會也利者義之和也貞者事之幹也君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞監察御史臣劉永泰真德秀疏曰四德之説朱熹盡之然天無心而人有欲天惟其無心也故元而亨亨而利利而貞貞而又元通復循環未嘗間斷於穆之命終古常新人惟其有欲也故惻隱之發而殘忍奪之辭遜之發而貪冒雜之羞惡之發而茍且間之是非之發而昏妄賊之於是乎與天不相似矣學者當知天有此德吾亦有此德屏除私欲保養正性則吾之一身通體皆仁隨觸而應無非惻怛即天之春生意盎然而物物欣悅也吾之動容周旋莫不中禮三千三百燦然眀備即天之夏生意暢達而物物嘉美也吾之所以利物者皆合於義即天之秋生意凝實而萬寶得遂其性也吾之所以貞固有守者足以根本萬事即天之冬生意潛藏而造化所由以出也人之與天豈果二乎哉而况人君有天之德又居天之位則善端萌動者元也善端發達者亨也推而澤物俾各獲所者利也心既溥物還復寂然者貞也雖一日之頃一念之微四者無乎不在然德雖固有非剛健則不能行夫惟自強不息與天同運人欲不得以間之然後終始萬物與天同功矣臣謹按人君秉剛健之德居九五之尊原與天行同體者也而所以行此四德者要本於自強不息之乾如善端萌動者元也必須生意充滿無一物不資之以為生而始為體天之元如善端發達者亨也必須雲行雨施無一物不實被其澤而始為體天之亨推而澤物俾各獲所者利也必使性命各正無一物不遂其欲斯為體天之利心既溥物還寂然者貞也必如太和保合無一物不包其內斯為體天之貞朱子既經詳注於前真氏又復義疏於後誠有見於天人之道原自吻合無間惟此剛健不息者循環無窮初不容有一毫之私欲以雜於其間也不然私欲之念稍有未絶則天德之真無由盡純仁或過於姑息義或傷於擊斷禮或涉於虛文智或流於苛察而欲終始萬物與天相合也難矣信乎天行健天之乾也君子行此四德君子之乾也此大人與天行同體者所以與天地合德乎周易君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞諭德臣覺羅蘇岱孔頴達曰君子體仁足以長人者自此已下眀人法天之行此四德言君子之人體包仁道泛愛施生足以尊長於人也仁則善也謂行仁德法天之元也嘉會足以合禮者言君子能使萬物嘉美集會足以配合於禮謂法天之亨也利物足以和義者言君子利益萬物使物各得其宜足以和合於義法天之利也貞固足以幹事者言君子能堅固貞正令物得成使事皆幹濟此法天之貞也君子行此四德者故曰乾元亨利貞以君子之人當行此四種之德是以文王作易稱元亨利貞之德欲使君子法之但行此四德則與天同功非聖人不可唯云君子者但易之為道廣為埀法若限尚聖人恐不逮餘下故總云君子使諸侯公卿之等悉皆行之但聖人行此四德能盡其極也臣謹按天人之分雖殊而天人之理則一蓋天以四德賦之於人元亨利貞命也仁義禮智性也天理本全而無少欠缺乃人所同具者但衆人拘於氣稟蔽於物欲遂或失之唯君子能體乾之健法天之剛務使理足以勝私氣足以配道是天下之至健也本此健以體仁嘉會而行此仁禮之德本此健以利物貞固而行此義智之德靜焉一健之立其體動焉一健之致其用可見乾即至健之君子而元亨利貞即君子之四德是以朱子曰非君子之至健無以行此故曰乾元亨利貞周易君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事編修臣沈景瀾朱子本義以仁為體則無一物不在所愛之中故足以長人嘉其所會則無不合禮使物各得其所利則義無不和貞固者知正之所在而固守之所謂知而弗去者也故足以為事之幹臣謹按天道至教聖人至德元亨利貞天之教也仁義禮智性之德也繫辭傳曰一陰一陽之謂道繼之者善也成之者性也所謂道陰陽之樞紐天命之本也所謂善天命之流行性之原也所謂性流行之各正善之實也性之原純粹至善曰元曰亨曰利曰貞在天者無一息之絶續善之實各正性命元為仁亨為禮利為義貞為智在人者無一理之虧欠故曰天地之性人為貴然而仁者見之謂之仁智者見之謂之智氣質之偏也百姓日用而不知物欲之纍也聖人者法天之行以合其德是故定之以中正仁義而主靜立人極焉君子者眀善復性學以至於聖人是故仁義禮智根於心且夫心者性之體仁者心之主也是故仁為人心此心在天地則坱然生物之心在人則溫然愛人濟物之心體仁也者體此心也程子曰公者所以體仁朱子曰切脈可以體仁蓋己私所蔽非公不克脈氣所周非切不知聲色嗜好皆己私也甚於風寒暑濕之見侵天地萬物本一氣也不異筋骸血脈之交貫是故為仁必先克己去其病吾體者也病去則元氣充周已克則生理洋溢愛人濟物胥此生理也夫是以能長人若夫天髙地下萬物散殊觀其會通以行典禮是為仁之節文人官有能物曲有利義以和之使無乖戾是為仁之裁制貞者無邪固者可久知而守之以成天下之務以定天下之業是為仁之藏用是故天以元而始人以仁而生聖人以體仁而長人仁義禮智雖分四德統而言之一仁足以貫之矣臣故推之於陰陽之始申之以繼成之説統言四德之全極言仁道之大更廣釋經之義而為四德之贊贊曰皇矣上帝降衷下民五性斯具莫尊惟仁惟仁在天為物資始希天者聖仁則其體其體伊何方寸盎然髮膚萬彚筋骸八埏如日之煦莫溫匪春如醴之泛莫甘匪醇孰是顛連而膜而膈痌瘝乃身自古在昔天地既位高卑以分秩之惟禮有美而文匪文弗美曰觀其會三百三千合之為貴昭蘇品彚亨其發揚德産精微煥乎文章爰制其中克眀克備或則俯之或則斯跂松柏之茂竹箭之敷有心有筠亶其然乎有物藝藝曷生而遂分各其羣聚因其類爾求爾欲利則往來調之劑之義以化裁譬彼和聲八音有律磬管笙鏞克諧以一亦有和羮五味必滋鹽梅之用鼎鼐是宜惟和惟義惟天之利同收於秋物安爾位惟珠在淵載含其光惟智有府神眀是藏如乾之専如坤之翕虛靈有宰萬事以立仰惟元化運物成功不有其貞孰始以終有聖如神繼天秉哲挈彼金繩何微不徹貞又生元若旋有軸智則顯仁其道為復周易君子體仁足以長人編修臣李錦程子曰體法於乾之仁乃為君長之道足以長人也體仁體元也比而效之謂之體朱子曰以仁為體則無一物不在所愛之中故足以長人臣謹按仁者天地生物之心而人所得以生者也蓋天地之心其德有四而元無不統其運用則為春夏秋冬之序而春生之氣無所不通故人之心其德亦有四而仁無不包其發用則為愛恭宜别之情而惻隱之心無所不貫是仁為天地之心而人得夫天地之心以為心則仁為人心故論天地之心者則曰元而論人心之德者則曰仁唐李鼎祚曰天運四時以生成萬物君法五常以教化於人元為善長仁主春生宋朱震曰天地之大德曰生者仁也聖人成位於兩間者仁而已項安世曰聖人之仁即天地之生皆是此意與程子所云體仁體元也之義互相發眀然文言傳不曰體元而曰體仁者元是善長萬物生理皆始於此衆善百行皆統於此是天德之自然也仁為人心誠能體之則衆善之源百行之本莫不在是其在君子所當從事於此者是人事之當然也故不曰體元而曰體仁也夫仁而謂之為體者朱子言以仁為體仁皆從我發出我之體便都是仁故謂之為體仁體仁仁之至也是以中之所存無一念之非仁外之所行無一事之非仁在天地則坱然生物之心在君子則溫然愛人之心此心之體無不在此心之用無不行是無一物不在所愛之中其足以長人也必矣繫辭傳云天地之大德曰生聖人之守位曰仁又云安土敦乎仁故能愛其義如此而程子所謂體仁為君長之道足以長人者以仁為治天下之本而為君之道在體仁也周易君子體仁足以長人檢討臣朱􅀈臣謹按仁為衆善之長故足宰制羣倫為天德之元故足覆冒萬國天下之大人類之繁人主以一身統御其上經之為文緯之為武慶之為賞威之為刑其設施至多術矣而總以體仁該之今夫天以生物為事而已春生之德盎然而不可窮於是夏長之秋肅之冬藏之而生之理以全人主以愛天下為事而已仁愛之心殷然而不可解於是義宜之禮理之智别之而愛之事乃足此仁所以總義禮智也顧仁之為説以愛言者不足見仁體之真韓愈博愛為仁之説是也謝良佐之徒又離乎愛而以知覺言以為四體偏痺為不仁取名於不知覺也然則痛癢皆覺豈得盡為仁者耶朱子嘗謂二程之前學者不知有仁字凡聖賢説仁處不過止作愛字看自二先生以來學者始知理會然亦不免有弊則指以知覺言仁也朱子訓仁曰心之德愛之理言心之德則可知其四德無不包言愛之理則可知其公溥眀通莫非所以究其惻隱之量而仁之説乃為無弊至若體仁之方則程子所謂公而以人體之者是蓋人其質也仁則其生之性公則無私也人無私欲則生意常存而能愛矣人主無私欲則無一事一物非吾生意之所含而能愛斯能長人矣或曰天下之人皆其所長則天下之人皆可一視也臣又以為不然天下之人有正有邪人主之心宜有愛有惡故惟仁人能愛人惡人此舉直錯枉能使枉直所以為知仁之合一也但邪者易投正者難合則人主之心恐有時而或移朱子曰常存此心遇事照管不隨物流去雖不中不逺是又在主敬致知使道心洞然表裏融徹凡人之至於吾前者合乎天理之公則好之入乎人欲之私則惡之合乎天理之公雖有無心之過不可以輕棄入乎人欲之私雖有小忠小信不取也由是而天下翕然不仁者逺人人出於至公物物有其可愛惠政充盈和氣洋溢皆一人體仁之所致也足以長人詎不信歟周易君子體仁足以長人監察御史臣馬丙伊川程子曰體法於乾之仁乃為君長之道足以長人也體仁體元也比而效之之謂體又徐氏幾曰體者以身法之也仁乃天地生物之心君子能體之以身則念念皆仁而有博施濟衆之功故足以長人如克長克君之類是也臣謹按周書泰誓曰惟天地萬物父母惟人萬物之靈亶聰眀作元后元后作民父母是父母斯民之責天與君子共之者也今夫天下之人衆矣天下人之待長於君子也亦甚殷矣東西南朔咸深望澤之心侯甸要荒羣切邀恩之想君子以一人而欲胥天下而長之也不亦難乎然自無極之真二五之精妙合而凝以來立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義則仁非生人之所藉以立命者哉試觀君子父乾母坤而藐焉中處知夫仁也者天德於以統也萬善以為長也民吾胞而物吾與其於仁也殆以一身體之裕如矣蓋其旦眀之下無戲渝無馳驅應酬之際無畔援無歆羡固己全乎仁之本而周乎仁之量焉由是仁與身合而身外無仁身與仁一而仁外無身仁即體而體即仁動念而見天地之心措施而大慈祥之念一人之哀懼愛欲莫不聯物我於懷來百姓之宴樂憂傷莫不縈至人之寤寐浩浩乎天下一家也萬物一體也好生之德洽於民心矣蕩蕩乎如天之無不覆也如地之無不載也生成之量普於海宇矣彼程子以君長之道比之徐氏以克長克君類之誠不誣耳然後知天髙地下萬物散殊彼蒼有生物之心足以包含乎百族君子有法天之用足以合撰於兩儀藝藝之衆得天之元以資始者實藉君子之仁以長養矣此其所以為九五之大人首出之天子而為萬國之所賴以咸寧者哉周易君子行此四德者故曰乾元亨利貞編修臣王錦臣謹按純陽為乾其性至健其象為天聖人繼天立極則乾又為君道元亨利貞文王只為占辭至孔子彖傳乃有四德之説而天人胥貫焉四德之在天者自萬物資始以至雲行雨施品物流行各正性命保合太和皆自其生成萬物言也四德之在人者則元為善之長亨為嘉之會利為義之和貞為事之幹仁義禮智皆根本於元亨利貞惟君子實能以此四德敷而布之於天下而體仁以長人嘉會以合禮利物以和義貞固以幹事此自其統治一世言也然天下無無體之用其措之一世者皆其體之一身者也故又曰君子行此四德者夫然而天德王道合而一之矣夫易有渾言乾者大哉乾乎剛健中正純粹精也有合言四德者乾始能以美利利天下不言所利大矣哉是以元而貫亨利貞也此則以元亨利貞統之以乾蓋乾惟至健故能有元亨利貞之德君子亦惟至健故能行仁義禮智之德自強不息者所以法天行之健也惟君子能自強不息亦惟自強不息乃成為君子而君子一乾矣故朱子語類謂文言以乾字當君子也朱子又謂乾元亨利貞猶言性仁義禮智仁義禮智皆性之德君子行此四德君子之盡性也抑臣謂君子行四德於一身者乾君子體四德以措諸天下長人合禮和義幹事亦總此乾六爻言乾者惟九三曰君子終日乾乾夕惕若然大眀終始六位時乘曰終始則元亨利貞悉貫之矣然則潛見飛躍各以時分而乘六龍以御天者無非行健之意也夫周易君子行此四德者故曰乾元亨利貞檢討臣趙允涵朱子本義云非君子之至健無以行此故曰乾元亨利貞程傳云必行此四德乃合於乾也臣謹按此指自強不息之學以證經文即以見天人合一之理也蓋四時具而後成嵗四德備而後為乾一時不具則嵗功有虧一德不全則乾行有間天道逺人道邇觀人事之周流可以見天工之運用亦顧其行之者而已夫體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事此四德者皆本於天而賦於人則凡為天之所生者莫不有是四德孰不當體而行之然而匪易易也或囿於氣質之偏或蔽於物欲之纍行此則遺乎彼始行或怠於終豈四德之難行果如是哉不健故也健由剛出剛自乾生惟君子全體皆乾故無往非健也其於四德以洗心藏密者行之則彰施凛諸寤寐以真實無妄者行之則繼續毖於幾微仁育義正有循環迭見之功禮卑智崇有條貫互施之妙無事之時存諸中所以立其體有事之際推諸人所以達其用動而作靜而思思所以慮善而動也守其常達其變變猶是不離乎常也非不有聲色嗜好之間吾行非不有辨言邪説之撓吾行而君子一以精眀強固者主之是故由存及發無一事之或違自始至末無一念之不謹非至健能如是乎以健而貫於四德之中即以乾而周乎四時之運也經文所為元亨利貞冠之以乾職是故爾則知賞不僭刑不濫一春溫秋肅之為順人情達物理一長養收藏之象天以於穆不已者行之於施生而君子取以為法君子以自強不息者行之於內外而天地賴以成能所謂財成其道輔相其宜者此物此志也所謂以天自處與化同流者亦此物此志也天人合一之理不於是而並著哉周易君子行此四德者故曰乾元亨利貞監察御史臣趙青藜臣謹按天之於人莫不卑之以固有之性故人之所受於天者其理皆備本無不足而實能盡乎人而全乎天者蓋難其人要惟體之以心驗之以身不辭勉強之勞不希自然之逸而盡性至命之功見焉是非與天為一者未足以與乎此也夫元亨利貞天道之本然也仁義禮智人性之自然也養其自然而因以不拂乎其本然則天德全矣而無如人之不能行此也或近於愚或偏於柔則氣質拘之矣或誘於外或搖其內則物欲蔽之矣賢人由之而不至百姓日用而不知故四德未嘗一日或息於人心而實則未嘗一日能行於天下求其以天合天無虧性始者誰哉惟夫自強不息之君子得於天者既全而成於人者復至稟於性者無缺而間其心者又嚴清眀在躬志氣如神所以立其本感而遂通因物付物所以達其用兼容并包不遺一物所以窮其大極深研幾無幽不燭所以究其微時而體仁嘉會則度量之寬洪足以普覆冒身心之秩序足以廣節宣斯仁禮之德行矣時而利物貞固則油然各得其分者乖戾於以潛消確然不易其守者推行自能無阻斯義智之德行矣是故人之不能行四德者非必其無一時之能行亦非必其無一事之能行也時時行而有一時之不行即此一時之理息矣事事行而有一事之不行即此一事之用虛矣君子則貞之以百年而復持之以瞬息存於暇豫失於造次者無有也凛之於艱巨而復察之於纎悉謹其大端略其小節者無有也潛見惕躍飛亢皆與四德相周旋剛健中正純粹莫非四德之呈露若此者非由其法天行之健以全天德之剛而能如此哉蓋元亨以為始利貞以為終而乾則徹始終而無不在元亨以為通利貞以為復而乾則貫通復而無不周故一言乾而元亨利貞舉之矣元亨利貞之外不能有所益此四德所以合天之撰元亨利貞之原不能無所受此乾行所以總造化之樞非乾無以統四德非君子之體乾無以行四德故曰乾元亨利貞厥有旨哉抑嘗思之乾之所以至健者不外靜専動直而靜専者健之體動直者健之用是靜又主乎動者也後儒謂聖人主靜立人極又曰無欲故靜然則體乾之君子其必制私主靜而後能配天行之健哉周易庸言之信庸行之謹監察御史臣周祖榮朱子曰常言亦信常行亦謹盛德之至也何楷曰道止於中中寓於庸庸者常也平無奇之名言必有物無茍髙也惟其信無擇言矣行必有則無茍難也惟其謹無擇行矣信謹誠也天德也一實焉而已臣謹按乾之九二傳稱龍德宜乎神不可窺化不可測矣何以推其德之所由成僅於庸言庸行致功也蓋乾之德行恆易易者庸之謂也造化惟庸故天行常健聖學至庸故經德不回人倫日用之事衆人視為無奇每忽不及計聖人見微知著常不敢自安是以修德之時於言行得其大概言行之要於信謹持其大端而要於至庸之處審其幾焉即如一言也如心而發謂之實心當理而發謂之實理若喜新而厭故則未言之先其心已妄而言之能無虛偽乎一行也期可久者由於體驗期可大者本於小心若矯情以立異則未行之先其心已肆而行之能免軼越乎此固不信不謹之過且亦不知大中之道即在乎庸也惟盛德之至者知出乎身而加乎民即於一言肇其端發乎邇而見乎逺即於一行基其業不以常理寬吾心而恆以常理糾吾心凡其所言無論輕重必擬之而後言內不欺己外不欺人表裏如一所謂信也凡其所行無論大小必議之而後動既圖其始復慮其終始終如一所謂謹也事為夫婦之所與能功惟夙夜之所獨密逮至無言非信無行非謹天下相驚其異而聖人止見其常聖人自安其常而天下亦不見為異是誠庸德也而即龍德之正中也乾之九二其所以成己而裕成物之量者如此周易間邪存其誠監察御史臣周祖榮朱子曰無斁亦保之意程子曰間邪則誠自存臣謹按誠在天為實理在人為實心聖人於乾卦首揭其旨以開心學之宗直指其功以眀純德之詣固體備於己而不容一息之稍間者也夫心統性情萬善畢具賦畀之始誠本自存逮形生神發而後天道之自然必盡以人事之當然而理乃全備於吾心故秉乾德之大人庸言必信庸行必謹以求盡乎其誠而猶恐有不信不謹者以間之於是乎有間邪之功焉間之云者非制防於一時也蓋至靜之中靈眀內照私意才萌即自覺察則間邪於內而私無自生無私之體於以立至定之際安止不遷物欲甫乘即自決絶則間邪於外而妄不得入無妄之源於以清如是則人欲滌盡此心中無二無雜萬理澄然一言一動皆見天心而誠有不自存者乎顧間邪一語意似直截功極嚴密朱子謂為無斁亦保之意深見夫理欲之交危微以判此心操省不容稍間在聖人純於天道則為無息之功在學者敬勝自持則為常惺之法昔程子有言曰敬勝百邪謝良佐亦曰敬是常惺惺法此以眀下學之修惟主敬乃能間邪中庸言戒懼而繼以慎獨集注謂既常戒懼而於此尤加謹焉所以遏人欲於將萌而不使潛滋暗長於隱微之中固即此意也是以聖人於乾之九二既揭出誠字於坤之六二即説出敬字眀乎理實則誠乾之道也心虛則敬坤之道也主敬而誠自存是下學而上達盡人以合天者也此天地自然之理而實吾心不易之則日用動靜無時無地不當如是其功不亦嚴密之至乎在聖人申眀爻義以信言謹行固已修德於己而猶不自滿假從事間存所以盡成己之詣而推極其旨則天地之精藴理學之淵源王道之全功胥不外此一言焉此間邪存誠為盛德之至也與周易忠信所以進德也修辭立其誠所以居業也給事中臣胡寶瑔臣謹按誠者聖人之本德之所以日新業之所以富有無不主於一誠在天為元亨利貞在人為仁義禮智天道人道惟此真實無妄之理存之為天命之性發之為率性之道而君子之進德修業無不於此兢兢焉易曰忠信所以進德也修辭立其誠所以居業也基既立則日進於崇髙本不搖則胥歸於篤實故朱子本義謂忠信者主於心而無一念之不誠修辭者見於事而無一言之不實蓋人之一心具衆理而應萬事內主忠信則中之所涵既無虛假自無間斷由是而發之為言言者心之聲也心無不實則見於事者皆其所性之理而辭自歸於肫篤誠之所由立也誠立而所以進德者此也所以居業者此也蓋徵於外者忠信之驗修辭乃為德之符根於中者立誠之基忠信又為業之本德以廣業業以崇德心與事悉統於誠而聖學之純亦不已王道之悠久無疆胥在乎此由此觀之天道之健行君子之乾惕其理一也有繼天之責者自有法天之學嚴於屋漏凛於旦眀凡所謂聖敬日躋慎修思永者皆存誠之功也誠則無私誠則不二誠於立身行已而戒懼慎獨存之一心者實理無虧誠於覺世牖民而智周道濟措之天下者萬物皆備無一念之不誠斯無一言之不實忠也信也即誠也進德居業皆一以貫之是以宋儒周敦頤以一言舉其要曰聖誠而已矣周易修辭立其誠所以居業也編修臣朱佩蓮臣謹按誠者天之道聖之本大之為五常百行之原小之即容貌辭氣之凖日新之盛德在是富有之大業亦即在是也昔者聖人贊易於乾之元亨見誠之通利貞見誠之復大哉乾元萬物資始見誠之源乾道變化各正性命見誠之立乃於文言發之其於九二言信謹信謹誠也而又申之曰間邪存其誠於九三言忠信忠信誠也而又申之曰修辭立其誠存誠者涵養之功立誠者省察之事有涵養而無省察則德不全而業亦不備夫君子進德修業欲及時也忠信主於心者無一念之不誠也修辭見於事者無一言之不實也雖有忠信之心然非修辭立誠則無以居之觀朱子本義則思誠者密於所存而不密於所發即前有以為進而退無以為居也可乎哉蓋人之一身視聽言動皆足以徵其立心之誠偽而至於辭則尤為樞機之發榮辱之主而所以動天地者也可大之業於是乎在而可不加之意耶顧或者疑之以為君子當兢兢戒懼之時而沾沾焉修辭是尚將毋以富麗為工務采色誇聲音茍為是炳炳烺烺取悅當世云爾哉而抑知非也聖人之情見乎辭其旨逺其辭文其言曲而中其事肆而隱又曰理財正辭禁民為非曰義君子而有辭亦擇其文者正者而已矣吉人之辭寡躁人之辭多君子而有辭亦務其寡者而已矣夫然後則體要矣輯懌矣安定矣一有辭而無不利賴誠修之也故不知者以為修飾其辭知之者以為修省其辭程子所謂修省言辭正為立己之誠意是也夫不誠之辭非一端矣巧言令色非誠也論篤色莊非誠也寓言而荒唐非誠也盜言而勦襲非誠也凡此皆在修省之內者也君子不得已而有言眀道則實見道紀事則實悉事言之不怍為之不難以之為己則允迪以之治人則允釐舉而措之天下之民謂之事業居之安而守之固謂非所以居業也耶所以然者君子之學本末兼該內外交養茍有一言之不實雖內念不欺而舉之口筆之書者將有茍且塗飾而先失其所守又何暇計其外著之勳業耶乃孔頴達正義徒見一偏以修業之修為修營修辭之修為修理業為功業辭為文教専在於布令陳詞誕告萬方而寓真誠悱惻之意亦何知聖人之所謂修辭立誠廣大悉備無所不包者哉雖然此君子進德修業尚非聖人之崇德廣業也若夫聖人建中和之極文章性道兼綜條貫蘊之為德行發之為事業巍乎煥乎更有莫能名焉者乎周易修辭立其誠編修臣宋邦綏朱子本義曰立其誠見於事者無一言之不實也臣謹按君子之道必其存主於中者有以確然自信而不惑而後可以眀其教於天下此立言之要所以必本於立心也蓋言以足志文以足言則辭之不可以已也然君子之言必循循然本乎義理而不敢為非常可喜之論以欺世而炫俗是故浩乎不知其津涯而非虛也茫乎不知其畔岸而非逺也則惟其至誠者為能自信以信天下而已矣夫古人之辭非茍以塗飾耳目已也禹臯之謨伊尹之訓周公召公之誥凡治天下之大經大法條理燦然埀之萬世而終無以易乎其説者何也則惟其誠也夫子刪定六經以明天道而述王事而春秋一書志存褒貶炳若日星天下之文章莫有大乎此者此誠之至也至於異端曲學如老𣆀莊周列禦寇之徒其言洸洋恣肆而不本於理荀卿揚雄擇焉而不精語焉而不詳識者非之此皆不誠之故也不誠則有口道先王語稱仁義而考其素行多顯然自悖於名教者即其辭郁郁炳炳又烏足與語立誠之道乎體乾之君子則不然本之以不欺先之以慎獨呐呐乎如不出諸其口也懇懇乎無不本諸其心也由是發之為話言書之為簡册眀白坦易確乎如五穀之可以療飢藥石之可以治病其言為愚夫愚婦之所共知而其理為聖賢之所不能外也蓋不以辭為寄情筆墨之資而以為闡眀理奧之要不以辭為馳騁才華之事而以為根極性命之原則所謂德音秩秩者此也所謂嘉言孔彰者此也昔人有言讀令伯陳情表可以見孝子之至讀孔眀出師表可以見忠臣之至忠孝者誠也辭至於誠則言滿天下而可以無過矣古今來作者雖多惟六經為文辭之祖六經者聖賢之心也韓愈曰文者貫道之器周子曰文所以載道也輪轅飾而人弗庸徒飾也况虛車乎又曰文辭藝也道德實也篤其實而藝者書之美則愛愛則傳焉是理本易簡詞尚體要文之所以為文也稟經酌雅凖古宜今立言之所以與立德立功不朽也後之修辭者安可不本諸性情而求諸經術哉御覽經史講義卷一
