body:
  text: 周易大哉乾元萬物資始乃統天檢討臣孫景烈朱子曰此專以天道明乾義又析元亨利貞為四德以發明之而此一節首釋元義也大哉歎辭元大也始也乾元天德之大始故萬物之生皆資之以為始也又為四德之首而貫乎天德之始終故曰統天臣謹按此三句乃孔子總釋乾與元也說卦云乾健也蓋天以形言定體之名健用形者也天之體以健為用聖人作易欲使人法天之用不法天之體故名乾不名天凡天下有形之物必敝皆以其形為纍天雖有形而能永保無虧則所以總統之者豈非至健之乾哉然乾固統天而元實統乾子夏傳云元始也而朱子又云大也言此卦之德有純陽之性而元又為陽德之首陽氣昊大而造物托始故曰大哉乾元所以深歎其廣逺也萬物資始乃釋乾元稱大之義資始以氣言若坤卦彖傳資生則以形言物先受氣而後成形故形曰生氣曰始萬物莫不有始而不能自為之始其所以始者皆資此乾德之元陽有以發其機緘萬物遂含陽氣而兆胚胎不失其宜是萬物之自無而有舉不外此元陽此乾元所以稱大耳盈天之下皆物也物之始不資於有形之天而資於天之乾且資於乾之元是天雖總統物而乾元乃所以總統天也審是而乾元之大愈見矣乾之德曰元亨利貞而元居其首人之德曰仁義禮智而仁居其先故元於人為仁於時為春君子體此而仁以育萬物則萬物既資於乾元而君子復有以培養其元氣由是萬物之氣俱足而災害不生夭札不作凡物之戴乎天者息息與君子之性命相關切血脈相流通仁貫四德而常充春貫四時而常在其斯為體乾元而立極者乎文言曰君子體仁足以長人言無一物不在君子所愛之中故足以尊長乎人也明儒薛瑄曰元始統天仁道統人㫖哉斯言亦可謂善廣孔子之義者矣奉上諭爾所進講不合朱子本義朱子云乾元天德之大始又為四德之首而貫乎天德之始終故曰統天此說最精爾講云天雖總統萬物而乾元乃所以總統天是添出天統物一層且將天與乾看成兩樣了殊不知乾即是天若說天之外另有乾來統天豈天之外又有天乎更即爾講中所引薛瑄元始統天仁道統人二句論之是元統天不是乾統天仁者人也亦非人之外别有所謂仁爾講又云元於時為春春貫四時而常在夫春特為四時之首不得謂夏秋冬三時皆有春以貫之也欽此周易后以財成天地之道輔相天地之宜以左右民監察御史臣侯嗣逹朱子曰裁成者所以輔相也萬物自有此理若非聖人裁成亦不能如此整齊所謂贊天地之化育而與之參也又曰裁成是截作段子底輔相是佐助他底臣謹按此言聖人乘泰之運保泰之方也天地為萬物父母亶聰明作元后后為父母之冡子故當上承天地之德而贊助之后又作民父母故當下撫斯民而奠安之天地之道本乎太極分隂分陽時行物生皆有自然之發育然造化流行不過渾渾爾穆穆爾聖人為之裁為片段而成就之如嵗功則分為春夏秋冬人倫則分為君臣父子兄弟夫婦朋友以至水火木金土之各分其性飛潜動植之各分其羣所謂裁成之也而因有制作以輔相之俾之春耕夏耘秋斂冬藏俾之君義臣共父慈子孝兄愛弟敬夫和妻柔朋友有信以至笵金合土伐木取火治水以致其利用若於上下草木鳥獸以廣其生成所謂輔相之也蓋天地以生物為功而所以成其能者天地不能自為賴聖人代為之裁成者立其大綱即輔相之始事輔相者盡其節目即裁成之終事其實原非兩事道言其體之自然宜言其用之當然其實亦非兩端總之所以左右民耳民之性本善聖人因其所能而扶翼之民之質多愚聖人濟其所不能而開𨗳之上佐天地即下以佐民元后之道備矣而必繫之泰卦者一則百物豐盈乃可施其裁成之用所謂乘泰之運也一則經綸盡制乃可以長治而久安所謂保泰之道也又泰之為卦內陽外隂內君子外小人上下氣通君臣道合聖人之裁成輔相孰有外於此理哉我皇上代天子民時當極治正所謂泰小往大來吉亨之候也大綱小紀無不畢舉深仁厚澤普被羣生保泰之方至矣然易之為道屢遷隂陽相乘泰否迭運循環反覆間不容髮極泰之時否常伏焉故曰無平不陂無往不復又曰城復于隍聖人所以兢兢業業雖四海升平靡有怠忽而深宫獨處乾惕彌深時時恐庶政或有不平萬民尚多失所而所以密其心思善其經緯者是聖人之自為裁成也所以防其逸欲致其清明者是聖人之自為輔相也天道下際故必咨詢善道以訪諸臣地道上行故必朝夕承弼以輔其上是又裁成輔相之所由出君左右民而臣復翼戴乎君以共相左右焉斯天地常交泰不復否矣抑中庸言贊化育參天地而必本於至誠則誠又裁成輔相之本歟臣敢廣其義以為聖天子獻奉上諭易之為道泰否相循此氣運之固然以人事而論不得謂既泰之後方至於否既否之後自至於泰也如人心一念縱逸即否之機已伏焉一念敬畏兢兢業業克自修省即泰之機已兆焉此其倚伏甚微轉移亦甚捷今爾謂正當泰小往大來吉亨之候夫以此時為泰朕則何敢然兢業增修持盈保泰原不必因既泰之後方懷此念凡所以防其怠忽致其欽畏者我君臣固無時而不當存斯意也欽此周易君子以遏惡揚善順天休命監察御史臣張湄程子曰萬物衆多則有善惡之殊君子享大有之盛當代天工治養庶類治衆之道在遏惡揚善而已惡懲善勸所以順天命而安羣生也臣謹按有善無惡者人之性善善惡惡者人之情凡在人之所當然而不可易者即皆天理之所自然而不容己者也蓋天之為道福善而禍淫其有禍福之所不及則寄其權於人主之賞罰以輔乎溫肅之宜於是兼容并包之中亦復類族辨物而天之道乃愈顯大有之象為火在天上是以無物不覆之天而加以無微不照之火則大有者既德參乾坤且明並日月其於善惡之在人者豈復有幾微之或混哉雖然善惡亦最難辨矣善惡本有定而好善惡惡者無定好善惡惡本至公而好其所善惡其所惡則至私以愛憎一人之私為進退衆人之法將任賢弗二而任者未必賢去邪弗疑而去者未必邪如是則善者或在所遏而惡者或在所揚賞不足勸罰不足懲謂之順天可乎是故君子之觀人也不將不迎虛中以應若明鏡然妍者自妍醜者自醜皆因物造形而於已無與焉茍先以其人為妍則隨吾所見無往而非妍矣先以其人為醜則隨吾所見無往而非醜矣蓋天無心成化王中心無為遏惡揚善者一念不與天相似即乖乎彰疸之常一念稍以人相參必拂乎鑒觀之意故孔子曰惟仁者能好人能惡人謂仁者之心純乎天理也古聖人五服五章以命有德亦惟天所豫則豫之而未嘗有一毫之喜五刑五用以討有罪亦惟天所奪則奪之而未嘗有一毫之怒是以揚在一人而天下之善者莫不興遏在一人而天下之惡者莫不懼豈其智力足以勝億兆之衆哉誠服乎其心也服乎心即順乎天順乎天即無不順乎人然則天不可得而知君子亦還問之衆人而已矣抑又聞程子之言曰賞必當功罰必當罪此後世刻核之論也若堯舜之世則不然罪疑惟輕功疑惟重與其殺不辜寧失不經斯又以好生之德上洽天心而非徒以不僣不濫為順天已也其斯為忠厚長者之風享國長久之道與奉上諭君子之善善惡惡皆物來順應一無成見若先有好惡之念存於中則好惡必不得其平爾所論先以其人為妍則隨吾所見無往而非妍先以其人為醜則隨吾所見無往而非醜數語甚是至引程子之言謂賞必當功罰必當罪乃後世刻核之論堯舜之時則罪疑惟輕功疑惟重與其殺不辜寧失不經非徒不僣不濫而已此論錯誤夫堯舜之世所謂賞從重罰從輕者專為功罪之疑而未定者言之也若亦既確然無疑矣則信賞必罰惟其當耳而復故為輕重於其間豈聖人之心哉不辜固不可殺而不經者亦未嘗少縱觀四凶可誅則誅之此可與眚災同肆赦者乎若使忘却疑字但謂堯舜之於人賞浮其功罰不蔽罪則聖人代天理物至公無私之心反為所掩矣不可以不辨也欽此周易日月得天而能久照四時變化而能久成聖人久於其道而天下化成編修臣吳華孫程傳曰此極言常理日月隂陽之精氣耳惟其順天之道往來盈縮故能久照而不已得天順天理也四時隂陽之氣耳往來變化生成萬物亦以得天故常久不已聖人以常久之道行之有常而天下化之以成美俗也朱子本義曰極言恆久之道臣謹按天地聖人同一悠久無疆有恆之道貫徹於億萬斯年矣夫天地之氣化日新然其晝夜之推遷寒暑之往來皆有一定之常度此其所以能日新也聖人之治功極盛然其達之而不悖推之而皆凖皆有不敝之常法此其所以能極盛也恆久故也是以日月者隂陽之精四時者五氣之布日月東西相從而不已五行四時十二月還相為本久照久成皆天之恆道為之聖人以仁育萬物以義正萬民而本之以誠行之以忠要之以不息天下成於變時雍之治皆聖人之恆道為之董子曰天不變道亦不變此之謂也且夫天地聖人所以能恆久者何哉夫天行健周天三百六十五度一晝夜而一周動而不已也惟其動而不已是以其光為日月其運為四時無一息之停聖人無逸作所一日二日萬幾兢兢業業無曠庶官亦動而不已也惟其動而不已是以民已安而猶如傷道已至而若未見無一息之間復卦曰復其見天地之心乎益卦曰益動而巽日進無疆然則至誠無息一言該之矣雖然行之有次序焉夫日月相推而晝夜分明之所以不疲於照四時遞嬗而嵗功備物之所以無為而成王道無旦夕之功亦猶是耳其民日用飲食其道三綱五常其法禮樂刑政其文詩書易春秋如日月之麗乎天而劑之以寬猛摩之以嵗時仁義並施剛柔互濟無偏無黨默運於上不識不知順則於下民日遷善而不知誰之為者亦如百昌萬彚之潛滋暗長於氣化之所推移也所謂以純王之心行純王之政久於其道而天下化成王道之極盛也且夫天之於穆不可見日月四時以得天成變化之功王省惟嵗而卿士師尹庶民咸有贊襄從欲之責至於六合同風九州共貫化成而久道之效乃臻也則聖人亦安有自暇逸之時哉詩曰如日之升如月之恆皇極經世書曰三皇之時如春五帝之時如夏悠久無疆夫固天地聖人同揆爾奉上諭爾所詮解天地聖人恆久之道至誠無息一言該之矣此語是但以天地聖人皆由於動而不已則不然太極之道動靜互根乾曰靜專坤曰靜翕先儒以為不專一則不能直遂不翕聚則不能發散聖人定之以中正仁義而主靜立人極焉可見動未有不本於靜者而非徒動而不已也且天日行三百六十五度天無心也天之靜且不自知而况於動乎聖人亦非有所强勉而行之以忠要之以不息也聖人之靜且不自知而况於動乎天道聖人莫非至誠之自然無息故曰於穆不已純亦不已又曰動而無動靜而無靜蓋誠者動靜之所以一源而顯微無間者也天地聖人之恆久亦何所容心於其間哉皆誠之所為也欽此周易水在火上既濟君子以思患而豫防之諭德臣嵇璜王申子曰既濟雖非有患之時患每生於既濟之後君子思此而豫防之則可以保其初吉而無終亂之憂矣臣謹按一切制治保邦之說古人論之綦詳然臣以為最切者莫如既濟之象辭何則人君當未濟之世憂患方劇雖有侈心無自而生若當既濟之時所見所聞皆太平富庶之象於此而必欲設一無形之憂患以為警惕豈不甚難即或臣進惕厲之說君下憂勤之詔久之亦相習為故事且君臣之間既自以為憂矣勤矣而何者當思其弊何者當防其流究未嘗長慮而謹持之則亦與不憂不勤者等惟君子於此為能深之以思而備之以豫夫思者君子之真精神也豫者君子之大作用也氣數所關萌芽未見而始終倚伏之數君子早已燭照數計而為之補救非徒恃其神明首出也乾惕兢業之志其自一身以及天下未然而作已然之觀始事而為既事之慮者不可勝數矣及其效或見於數千萬里之外功或成於數十百年之後人始歎君子之防之者何其豫而不知人見以為豫者猶其可見者也其消於無形杜於無象者宵衣旰食時已不知幾費精神矣所以唐虞三代其致治之迹可見其致治之心不可見惟孔子於既濟之象辭有以特發之且以天下之大百官萬民之衆其可患者不一而足也而大要莫先於君身一人深宫靜處凡聲色輿馬飲食衣服宫室之奉其顯然可患者明主既去之矣至於喜怒動靜之間一念不謹或貽四海之憂一日不謹或貽數世之害程子所謂患常生於忽微而志亦戒乎漸習者不思則不得也若夫聽言用人張弛經緯之際寬則慢猛則殘自用則小偏聽則蔽大臣慕清净而畏事易至因循小臣好議論而喜事易至煩擾內重則事多扞格而胥吏操廢置之權外重則事多專擅而嶽牧啓威福之漸行保舉而黨援奔競或從此開重久任而怠隋懈弛或從此積欲興利而不免勞民欲除弊而不免驚衆其初見以為無患而其後遂為患之所叢生者比比皆是也救之於己著不若防之於將萌亦在思之而己傳曰思則有備有備無患誠能思一身之患則正本清源而天下之患不生能思天下之患則持盈保泰而一身之患亦不生唐魏徵十思十漸之疏宋司馬光逺謀重微之規皆可與象辭相發明者也奉上諭從來天下之事有形之患易知而無形之患難見若待患已有形而後思而防之則非所謂豫矣論語云為君難為臣不易君道之難其大要惟在防微杜漸不必師旅水旱顯然有可患之事也即如朕日理萬幾平心順應當寬者寬當嚴者嚴不過隨事制宜因物付物原無成見而觀望之徒便已妄為揣摩多方迎合豈知朕心若先設一用寬用嚴之見則辦理政務安能事事得中毫無偏陂乎迎合之見最人心風俗之大患雖未嘗顯然有形而其流弊不可勝言正所當思而豫防早為杜絶者總之可患之處不在已然而在將然其審於幾微而防於未事朝乾夕惕之意亦惟朕心自知之耳欽此書經任賢勿二去邪勿疑監察御史臣吳士功唐孔穎逹曰任用賢人勿有二心逐去回邪勿有疑惑臣謹按人君撫有四海勢不能以獨理於是乎設官分職以代天工者皆於人是賴焉夫有治人然後有治法人之大較曰賢曰邪知其為賢則任之必專而不可惑於讒間知其為邪則去之必力而不可制於依回此惟知人則哲能官人所由百寮師師而成俊乂在官之美也且夫人主操用舍之權以進賢退不肖要未有明知其賢而不任明知其邪而不去之理亦未有任其所任而不惟賢是任去其所去而不惟邪是去之心雖然賢與邪之品量不同而任與去之鑒别非易蓋賢者來自田間勢處疏逖而難於親信本非常之姿而或以資格限其選本大受之器而或以小試枉其材則掣肘生嫌而英豪反坐困於既任之後即邪者巧令孔壬計圖僥幸而善於彌縫或念其平日之小忠小信而曲示優容或憐其一端之末藝寸長而稍為姑息則希榮固寵而諛悅以求合於未去之先是惟清明在躬志氣如神情順萬物之情而無情欲通天下之欲而無欲夫然後智周靡遺賢否邪正瞭然如指諸掌所謂仁者之能好能惡也此任賢勿二去邪勿疑必先以罔逸罔樂之戒云顧任賢與去邪均關用人之大而任賢則尤為急務焉賢臣者人主所與共天位治天職者也所任者賢則羣賢有彚征之吉而羣邪斂迹宵小僉壬無所施其伎倆故曰舜有天下選於衆舉臯陶不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣此任賢而邪自去之明效大驗也抑勿二勿疑其始不外於知人而其終則歸於能斷陸贄曰執狐疑之心者來讒慝之口持不斷之臆者開羣妄之門朱子有言勿字如旗腳轉旗腳一麾三軍聽令如惡惡臭如好好色皆務决去而求必得之誠能如此則任賢乃為能任去邪乃為能去豈復有疑二之見存乎其中哉又聞司馬光曰竊見祖宗之時閒居無事常召侍從近臣與之從容講論萬事委曲詳盡所以然者一則欲使下情上通無所壅蔽二則欲知其人能否才器所任是以黜陟取舍皆得其宜臣愚以為司馬光此言實用人之本也誠使萬幾之暇時時與老成耆舊講論經邦之碩畫或取古今賢奸事蹟參稽而互較之用以考鑒得失啓沃乃心則心正身修義理昭著於以推廣惠迪克艱之謀不難矣儻是非取舍决於一己之私乃欲斷而行之無所疑惑則其為害反有不可勝言者可不戒哉奉上諭朝廷用人進賢退不肖最是第一難事蓋人主勤求治理斷未有知其賢而不用知其不肖而不去者惟是黜陟取舍無一不以用賢去不肖為兢兢而人之賢否邪正君雖神聖勢不能於耳目未周之處坐照靡遺况見聞所及即可知其人之行事亦未遽知其心術若何儻留心察訪又恐迎合揣摩百弊叢出究無以得其人之真此用人之難惟人君自知之並非局外旁觀者所得喻其微也且國家設官分職各有專司熙績釐工需人孔急如百僚庶司一時不得其人遽將備位曠官者悉擯而斥之則人材一時難得而員缺又不可久虛更當何如也即如堯舜之時五臣舉而衆正盈庭四凶誅而羣邪斂迹致治可謂得人矣然當其用之之始歡苖共鯀未嘗不與嶽牧同朝而究無傷於詢嶽闢門之聖治是以人主操豫奪之權以進退人材進君子而有一君子之未進退小人而有一小人之未退亦理勢所不免若因一二人之黜陟遂謂君子難進而易退小人難退而易進殊屬過刻之論欽此書經豫違汝弼汝無面從退有後言編修臣張麟錫陸贄曰非明智不能招直言非聖德不能求過行招直則其智彌大求過則其德彌光司馬光曰周易天地交則為泰君天也臣地也君降心以訪問臣竭誠以獻替則庶政修治邦家乂安臣謹按帝王檢身若不及從義如轉圜置敢諌之鼓植告善之旌立司過之士懸賞以待嘉謨而不匡者有罪凡皆導之使言內以備補察之司而外以通萬物之氣故其時下無依阿唯諾之習上無咈民從欲違道干譽之舉所由主德純而四方歸極也竊嘗觀於唐虞之世詢四嶽命九官咨十有二牧一切播穀敷教典禮明刑諸大政罔不交修並舉功叙而績熙而帝舜猶凛凛於時幾敕命之思慎憲省成之慮當是時豈復有片念怠荒纎微罅漏尚待補救於臣工哉乃讀其命禹之詞則曰豫違汝弼汝無面從退有後言誠以天人理欲之際其界甚微而其幾易忽一念之不謹一事之未防而出此入彼有相乘於不覺者千里之應違由於寸衷之疏密此其所以栗栗危懼而不敢信心以自是也獨是禹當日者丕績懋著昌言屢聞一則曰克艱厥后再則曰慎乃在位惠迪之吉勗以敬天幾康之飭朂以省身府事之治朂以養民其祗承之意篤棐之忱在帝固已深信而不疑而顧戒其面從而後言夫面從而後言豈禹之所以事舜者哉然則舜之為此言者何也曰此非慮其臣之欺而戒之切乃專求乎己之過而省之深也以嚴恭寅畏之衷時切叢過招尤之慮而絶不聞其臣之確指一事以明諍其非則意迫於莫解而慮且及於所必無以為或者其靣從也或者其面從而後言也不然者深信禹之必非面從而因恃己之萬無過舉豈聖人兢兢業業之心哉夫君若舜而其臣猶警以逸樂慢遊之失臣若禹而其君猶誡以面諛背憎之為一若君與臣不甚相知者而不知其惓惓愛主之衷與孜孜求諌之意實不啻精神血脈之交相貫注焉此隆古之世所為以交警而成交泰之休也後世若漢文之詔羣臣曰二三執政猶股肱也其悉思朕過失及見知所不及以啓告朕唐太宗飭詔令有未合務相執奏毋得阿從不盡己意由此觀之茍有願治之主未有不虛懷而樂善者也若夫無稽之言勿聽弗詢之謀勿庸俾誦言之士不得假直說以濟其私此又在乎如神之智秉乾綱而內斷也哉奉上諭舜之戒禹者曰豫違汝弼汝無面從退有後言夫虞廷之上如禹臯稷契夙稱賢佐豈有面從後言之事然此實千古為臣之通弊舜之為此言者蓋必在廷諸臣尚有蹈襲此弊之人所以不憚諄諄訓誡也朝廷所依賴以匡正者惟此左右之諒直則是非可否之間自當侃侃不阿以引其君於當道而或面稱其是而背議其非則人主將何恃以繩愆糾謬此為君者之所以難也要惟為君者洞悉此弊而內斷於心則逢迎之說不能惑有主之聽聞而本身出治自克協於大中至正之歸為臣者時時省察惟恐一念之或蹈於是則自獻可替否以及分猷效職自無在不竭其欵欵之忠以畢致其元首股肱休戚相關之誼如是則君臣一德上下一心明良交慶庶績咸熙於以追唐虞都俞吁咈之盛為不難矣欽此書經帝庸作歌曰敕天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉臯陶拜手稽首揚言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事墮哉帝拜曰俞往欽哉侍講學士臣楊椿蔡沈曰天命無常理亂安危相為倚伏今雖治定功成禮備樂和然頃刻謹畏之不存則怠荒之所自起毫髮幾微之不察則禍患之所自生不可不戒也舜作歌而責難於臣臯陶賡歌而責難於君君臣之相責難者如此有虞之治兹所以為不可及也歟臣謹按有虞氏之世地平天成六府三事允治可謂盛矣宜其恭己無為坐享升平之治而作歌之日猶君臣責難祗畏天命有如此蓋君者天之宗子大臣者宗子之家相也明王奉若天道樹后王君公承以大夫師長不惟逸豫惟以亂民故其位為天位職為天職功為天功叙典秩禮命德討罪無一不本之於天周頌曰敬之敬之天維顯思命不易哉大雅曰敬天之怒無敢戲豫敬天之渝無敢馳驅自昔聖君賢相當太平極盛之㑹尤莫不以天命為兢兢焉在易豐之彖曰豐亨王假之勿憂宜日中朱子謂豐大也以明而動故能成盛大之勢然至於過盛則又有憂道焉聖人以徒憂無益故謹之於未然也周官曰制治於未亂保邦於未危繫辭傳曰君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也夫制治保邦之道存乎慎行事之要本乎心心之敬肆則又在責難之言君有以警惕乎臣臣有以啓沃乎君也前代有為之主始以德義為心惟恐人之不言每曲導之使言繼則聞人之言悅之而已不必其盡從也久則恐人之言言之而不必受受之而亦有難色又其甚者或引之於當道輒自以為己知或格其心之非輒自以為無失夫自以為己知自以為無失是自以為賢矣自以為賢其下因莫不同聲賢之賢之則順而有福矯之則逆而有禍以唐太宗之英明於魏徴尚有不平之語而欲其臣之無隱衮職之無闕豈易得哉今觀帝舜之時惟幾惟康惟動丕應徯志豈尚有時幾之未敕百工惟時撫於五辰庶績其凝豈尚有未興之事未慎之法度三載考績三考黜陟幽明豈尚有未省之功實翕受敷施九德咸事俊乂在官豈尚有叢脞之患惰與墮之憂而舜以之責難於臣臯陶以之責難於君舜於臯陶之責難從而拜之即從而俞之蓋聖人之於臣惟願其弼直不願其面從於進言者惟論其理之是非不計其辭之工拙鑒其心之誠摯不復問其事之有無臯陶平日之告舜曰無教逸欲有邦益曰警戒無虞無怠無荒夫舜豈教逸欲而好怠荒者哉而諸臣言之而不以為忤帝舜受之而不以為非古大臣之愛其君與君之自愛其慎微防患保泰持盈之至意不得不如此也有虞氏之治所以弗可及而君道臣道為千古人倫之至者在是也奉上諭敕天之命惟時惟幾乃二典三謨之關鍵史臣記堯曰欽明文思舜曰溫恭允塞堯舜之敕天命也君道也二十有二人欽哉惟時亮天功二十二人之敕天命也臣道也君臣交敕純乎義理無一毫私欲以間之人心之危者於是乎安道心之微者於是乎著而惟精惟一在是允執厥中亦在是知人安民時雍協中之治俱莫不在是矣舜先言股肱者欲臣之敕天命以承君而君之當敕可知臯陶先言元首者欲君之敕天命以帥臣而臣之當敕益可知舜與臯陶咨警一堂非有未熙之績未釐之工也其時從欲以治四方風動而君臣敕命之心不遑自逸故寓警戒畏懼於歌詠之中史臣繫之二典三謨之末以著唐虞之盛所以致時雍風動之休者無非本乎敕天之敬也若云君臣責難此不足以盡聖君賢相之量當時舜與臯陶並此敕命之心實出於無心而不自見其為敕命又况有責難之意哉欽此書經惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食侍讀學士臣張若靄蔡沈曰福威者上之所以御下玉食者下之所以奉上也曰惟辟者戒其權不可下移曰無有者戒其臣不可上僭也正義曰惟君作福得專賞人也惟君作威得專罰人也惟君玉食得備珍食也為臣無得有作福作威玉食言政當一統權不可分也臣謹按福威者人君御天下之大權玉食者人君享天下之大福也人君奉天命以命有德五服五章而作福惟辟矣奉天討以討有罪五刑五用而作威惟辟矣富有四海而百里之內以共官千里之內以為御而玉食惟辟矣蓋天子以一身居乎兆民之上臨制四海之廣所以整齊不紊者端在奉天之威福以施於天下如網之有綱如絲之有總詩曰勉勉我王綱紀四方言太阿之柄不可倒持也至於天下乂安人民和樂則雖享天下之奉而不以為泰也若夫臣子受君之爵食君之祿行君之令而致之民其不可作福作威玉食也明矣然而所謂無有者非但攬權朋比貪冒無忌憚之彰彰較著者也人臣不能不宣布德澤而有一市恩近名之念則已為作福人臣不能不奉行法令而有一擊斷丈致之私則已為作威人臣不能不受重糈厚祿而隱微寤寐之間有一念之侈然自放則皆玉食之類也必並此而無之惟知有君不知有身任重則思報稱之難位高愈懷盈滿之戒謨猷惟我后之德夙夜矢匪懈之心功名有所不居况於威福溫飽有所不計况於玉食小心謹慎而後為純臣也且夫人君亦曷嘗有威福惟我玉食惟我之意哉禮曰爵人於朝與衆共之刑人於市與衆棄之大禹之菲食周文之日昃以一人勞天下不以天下奉一人也洪範以三者歸之君曰惟辟有之所以明臣下之萬萬不可有也蓋惟人君能好人而臣下孰敢作好人君能惡人而臣下孰敢作惡惟人君大烹以養聖賢而臣子孰敢封靡於爾邦此地道之所以輔君而贊化也夫奉上諭爾所詮解洪範惟辟作福一節頗與朕意相合朕思人君固操豫奪之權以馭天下然賞者天命罰者天討何能自為威福也正惟不敢存作威作福之心而後爵賞刑威無不當天理而洽人情矣至於大官八珍之供亦不過以下奉上之名而大禹菲飲食周文不遑暇食可知聖帝明王宵旰焦勞克勤克儉之心無時釋於寤寐何嘗有惟辟玉食之一念耶且也人君而存一作福作威玉食之念則爵賞可以及佞臣誅戮可以加正士而酒池肉林將極其欲而無所底止矣蓋洪範乃箕子陳於武王之書箕子臣也其言故應如是朕所論者君道也君尚不可以作福作威玉食孰謂人臣而可恣意作福作威玉食乎哉欽此書經君子所其無逸給事中臣吳元安王樵曰無逸者君子敬戒惕厲之心也所其無逸者君子所以為敬戒惕厲之密也置此身於天理之中動靜食息將必有事焉使有時而操有時而放則怠荒有乘其隙之所矣所謂無逸者無時無處而不在於無逸焉則君子誠無可以自逸之所而君子之於無逸也乃恆其所者也是曰所其無逸先知稼穡之艱難乃逸則知小人之依張栻曰周自后稷以農事開國歷世相傳相與咨嗟歎息服習於艱難而咏歌其勞苦此實王業之根本也周公之告成王詩有七月皆言農桑之候書有無逸欲其知稼穡知小人之依帝王所傳心法之要端在於此夫治常生於敬畏而亂常生於驕逸使為國者每念稼穡之艱難而心不存焉者寡矣是心常存則驕矜逸豫何自而生豈非治之所由興歟臣謹按堯舜禹湯文武之君莫不以有位為憂未聞以位為樂也臯陶之告禹曰兢兢業業一日二日萬幾傳說之告高宗曰不惟逸豫惟以亂民此聖帝明王賢君察相所以防微杜漸居安思危無窮之計也蓋天下之勞逸繫於人主之一心人主時自處於勞則天下受其逸人主時自處於逸則天下受其勞若以今日之勞而冀將來之逸則其勞也浮而易倦惟以天下之逸而仍厪一心之勞則其逸也久而彌逺周公知其然也故以所其無逸者建君心之極而即繼以知稼穡之艱難知小人之依誠有見於君與民之相關而聯四海為一家通天下為一體者舉不外乎此故力田孝弟勸良民也賜半賜全振窮乏也珍禽竒獸不育於國知稼穡之維艱也水旱盜賊必以聞知民生之不易也是皆上有怵惕維厲之心下有震動恪恭之意堂廉咨警海宇盈寧民生之逸豈有涯乎且夫王事未有不始於勤劬而荒於逸樂者也蓋心以暫而易持事以久而生怠必幾康是敕無纎細之或弛明旦維嚴無罅隙之有間所謂徹上徹下無內無外而一以敬為主宰是主敬者勝逸之本也人君誠能修己以敬則安人安百姓一以貫之矣而夙夜宥密之心豈以天下已治已安而遂得稍萌其逸豫乎至召公之告成王亦曰王敬作所可見古大臣之所以忠愛其君者惟以執競為惓惓而持盈保泰之思信可為萬世則也夫奉上諭爾所奏發明無逸乃逸之義頗有見地無逸固是常存此心乃逸亦非因逸而即懈如知無逸之為美勉强持之旋復參以因勞得逸之私心是民未逸則無逸民已逸而遂可自逸矣始勤終怠豈所其無逸者乎况君之於民分位雖懸呼吸原自相通所以相通者惟在無逸之一念暑雨祁寒蠶桑溝洫心民之心者事民之事事民之事者勞民之勞往復循環無有斷續至天下日享和平之福而人君常以叢脞為心所謂先天下之憂而憂者憂未能與民同樂也後天下之樂而樂者民樂終未足以解憂也朱子言天地位萬物育則訓以自戒懼而約之自謹獨而精之可見戒懼慎獨中自有位育氣象而位育時依然一戒懼慎獨之君子明乎此則得周公所陳無逸之實際矣欽此書經爾有嘉謀嘉猷則入告爾后於內爾乃順之於外曰斯謀斯猷惟我后之德監察御史臣齊軾葛氏曰成王殆失斯言矣欲其臣善則稱君人臣之細行也然君既有是心至於有過則將使誰執哉禹聞善言則拜湯改過不吝端不為此言矣臣謹按善則歸君過則歸己人臣之義也夫聖明在上明目達聰有嘉謀嘉猷之臣君則用之有嘉謀嘉猷之告君則從之君臣原屬一體謀猷何必己出自後之臣子暗於大義欲以諌諍顯其直欲以君之聽信顯其榮惟欲立名罔思君德每遇事故先避嫌疑不知古之君臣一心一德何嫌何疑君有善則曰賴吾臣之助臣有善則曰奉我后之德皆出於至公之心而歸於大義惟君陳非獻諛之臣故能歸其美於上惟成王非導諛之主故能收其美於下而皆非常情之所能測也觀此一條正見其君臣相與之際相愛至深相責尤切葛氏以為成王之失言臣愚以為所見有偏未盡允協也奉上諭爾所進君陳篇爾有嘉謀嘉猷則入告爾后於內爾乃順之於外一節昔葛氏謂禹聞善言則拜湯改過不吝乃成王欲其臣善則稱君為失言今爾謂善則歸君過則歸己乃人臣大義而以葛氏所見為偏朕觀爾所論亦尚未得其平蓋歸美於上出自臣子愛君之心則可若君以此導其臣則非取諸人以為善之義葛氏所見亦自有理要之為臣者當成君之德而不沽己之名故入則盡所欲言出則不使人知而為君者則當納臣之忠旌臣之直揚其善於衆以昭廓然大公之量斯為上下交而志同義理兩全而無弊耳又嘗見人情品隲當世人物則罕所臧否以避嫌逺怨而尚論古人又往往過於搜求多為苛論殊非平恕之道此亦學者之通病不可不知因所論奏并及之欽此詩經百辟卿士媚于天子不解于位民之攸塈監察御史臣叢洞朱子曰人君能綱紀四方而臣下賴之以安則百辟卿士媚而愛之維欲其不解于位而為民所安息也吕祖謙曰君燕其臣臣媚其君此上下交而為泰之時也泰之時所憂者怠荒而已此詩所以終於不解于位民之攸塈也方嘉之又規之者蓋臯陶賡歌之意也臣謹按聖人奉天出治思與大小臣工共奠不拔之基而使天下永享升平之福非徒欲其奔走承順緣飾文貌而已也必各出其中心之誠曲將其愛戴之忱不自安於怠緩悅從之習而即以仰贊一人兢兢業業克艱厥后之美則治日進於熙明民日躋於康阜所以主臣道合庶績咸理萬年有道之長皆臣工忠愛之心有以襄其成也如假樂之詩稱願嗣主既言其綱紀畢舉燕及羣工而因推言夫百辟卿士之所以仰答其君者且略其鞠躬盡瘁之迹而祗述其責難陳善之意謂其所為媚於天子者曰不懈于位民之攸塈蓋人臣之愛君若祗侈陳功德之隆道揚慈惠之盛此不過揄頌之文感激之情不可以為媚于天子也媚于天子者出于天性之不容已達於至情之不自知其所夙興夜寐篤棐不忘者惟是我后之社稷如何而靈長我后之土宇如何而鞏固我后之國祚如何而千秋萬年綿引於無替計惟天下之民飲和食德共享太平之樂則民不致有暑寒之咨而天子乃以適其泮奐優游之樂亦惟天子之心持盈保泰不開燕昵之隙則一人不忘咨警之懷而民乃以䝉其懷保底定之恩故必天子之精誠常周於窮簷蔀屋之內誠求保赤之真時時與之關切念念與之維繫察其饑寒恤其疾苦補其缺陷均其樂利然後水旱不能災而隂陽不能賊為之民者耕田而食鑿井而飲含哺鼓腹以生以養皆聖天子怵惕維厲不自荒寧之心隱貽之利當世賴之後世傳之以為有道之聖人太平之天子此百辟卿士之所為纒綿篤摯而不釋於懷者也故曰媚也媚於天子者益深獻納於天子者益切成周太和之治固君德之隆亦百辟卿士媚兹之心有以仰贊其盛與奉上諭爾所進經義遵照朱子之說君能綱紀四方而臣下賴之以安則百辟卿士媚而愛之維欲其不解于位而為民所安息也但以愛言媚不足以履臣道之實而補出維欲其三字以不解于位專屬於君亦無以見君臣各盡之義以朕看來媚不得以愛言當作順字看不解于位不專指君亦兼臣說蓋謂君能盡道於綱紀以安其臣臣順天子之休命以盡其職又且慎終如始君與臣各不解于其位此乃后克艱厥后臣克艱厥臣之指與為君難為臣不易之言同是君臣交警之意人君以此能全君道人臣以此能全臣道君臣道合庶績熙明而民乃賴之以安息也朕意此經當作此解說欽此史正其誼不謀其利明其道不計其功檢討臣阮學浩臣謹按功利之中於人心也久矣先儒謂訓詁詞章皆足害道然未若功利之溺人為尤甚也今人發一念舉一事未有不從功利起見者功利之習深而所謂正誼明道之務循名則是核實則非身世之交受其弊也宜哉夫心術之辨不外公私兩端性分之所固有職分之所當為者誼也道也皆公也緣是而志慮紛焉歆羡形焉則憧憧擾擾悉功利之私而已其始起於自私自便之情而趨向既岐末流遂逺甚且踰間蕩檢敗身裂名而無所顧惜莫非一心之馳騖階之厲也試觀士子讀書稽古其講明切究於平日果能屏除聲譽攀援之見否也亦有口不言聲譽而取聲譽者益工外若絶攀援而習攀援也愈熟此其為學公乎私乎逮身列仕籍矣家室之經營遷除之計較猶顯焉者耳乃若有官守者盡其職而即借盡職以梯榮有言責者盡其言而即假盡言以希遇此其立朝公乎私乎且夫天下之弊莫大乎共為一事而隂判兩途既已毫釐千里矣而猶矯托於道德性命之說以顯為名髙以致巧詐之術日滋嗜欲之機日熾久之聲應成孚波靡不返安得復有學問安得復有事功哉今使為士者捐成心去故智羣以謀利計功為恥則學校之氣靜矣學校之氣靜而人材不出教化不興者斷斷無之也又使服官者化其謀利計功之私各殫厥心各恭爾位不黨同不立異則朝廷之氣靜矣朝廷之氣靜而政治不底於清明風俗不歸於醇厚者亦斷斷無之也蓋公私之界祗於立心之誠僞别之凡無所為而為者皆誠有所為而為者皆僞也設誠致行而勿以私僞雜乎其間明體逹用胥不外此而求之矣夫周秦之際功利之錮蔽已深而仲舒乃能首揭正誼明道之指開西京儒術之先而上契孔孟之微言逺有端緒夫豈偶然也哉奉上諭董仲舒謂正其誼不謀其利明其道不計其功不獨指為士與服官者言即人君亦不可不深明此意何也君有君之分分之所在即誼也明王奉若天道即道之當明者也一以功利為念則雖急於圖治祇成歡虞雜霸氣習而不足語於純王之政矣至云有官守者盡其職而即藉盡職以梯榮有言責者盡其言而即假盡言以希遇似此居心臣子中未嘗不有其人但人君不可先以此心相待蓋君惟患臣之尸位素餐與緘默取容耳幸有能盡職盡言者而又預疑其梯榮希遇則逆億為心豈不沮人奮勉報效之志乎朕待臣下從無成心而於此等情狀要自不為所蔽孔子曰不逆詐不億不信抑亦先覺者朱子訓以雖不逆不億而於人之情僞自然先覺必如聖人之言乃為無弊是知挾術任數即屬功利之見亦君道之不可不察者也欽此史唐太宗以選人多詐冒資䕃敕令自首未幾有詐冒事覺者帝欲殺之戴胄奏據法應流帝怒曰卿欲守法而使朕失信乎對曰敕者出於一時之喜怒法者國家所以布大信於天下也陛下忿選人之多詐故欲殺之既而知其不可復斷之以法此乃忍小忿而存大信也帝曰卿能執法朕復何憂給事中臣馬宏琦臣謹按一成不變為法法者上與下共守之無容意為輕重者也而不能不奪於一時之喜怒喜而僭賞則幸澤者多怒而濫罰則扺網者衆書曰惟明克允又曰汝無面從退有後言大抵法有定而敕無定人主如欲以一時之敕易百年之法必有畸輕重而不自知者而其臣復畏威順㫖緘默取容以成其失則詘法以從敕而法遂不信於天下矣唐太宗忿選人之多詐欲殺之以符前敕當是時意在示信罰在必行殺一有罪之人以明天子之果無戲言於理亦未為大失而戴胄據法以爭卒能挽回前㫖而不以沽直為嫌維太宗亦虛懷無我樂其臣之直言守法而不以拂㫖為忤使君臣之間而盡若此即天下亦安得有寃獄哉乃未幾殺瀛州刺史盧祖尚大理丞張藴古史稱祖尚奉使不行猶有辭難之罪若藴古則當官執法可賞而不可殺者幸即為戴胄不幸則為藴古前後相懸迥若霄壤而其時顧寂寂無言者豈真法當其罪而無容言與抑嫌於黨援朋比而不敢言與魏徴曰陛下欲善之志不及於昔時聞過必改少虧於曩日譴罰積多威怒微厲夫太宗以一人之身始則求賢納諌舍己從人俾臣下皆得以盡職繼則威刑自恣戮及無辜而臣下亦無敢據法以爭詎非善始者多克終者寡一時之小忿每足以隳百年之大法歟夫執法者臣職也聽其執法而不以敕奪者君道也敕不勝法斯忍忿存信而上下各有所守法不勝敕則朝更夕改而前後兩無所慿他日太宗有云法令不可數變數變則煩更敕百司詔敕未便者皆執奏其誠有所悔而善於補過者乎若夫古之聖王節喜怒平刑賞謹號令豫違汝弼而一斷以法則又安有既失之悔哉奉上諭朕按戴胄此對與張釋之論犯蹕事相似但釋之云方其時上使人誅之則己未免開人主妄殺之端不若戴胄所言敕者出於一時之喜怒法者國家所以布大信於天下持論甚正非釋之所及若唐太宗之為人殊不可與漢文帝比文帝天性純粹以仁心行仁政乃自然不嗜殺者太宗則假之而已觀其推刃同氣骨肉之間尚多遺憾何論其他即其納言從諌亦不過勉强一時而非出於中心之誠然安能久而不變此魏徴所以有陛下欲善之志不及昔時之論也夫無始無終而自然純一自古惟性安之聖能之一有矯强則有初者必至於鮮終矣此則不可不勉欽此性理明不至則疑生明無疑也謂能疑為明何啻千里修撰臣金德瑛朱子曰此為不能先覺而欲以逆詐億不信為明者發然明與疑正相南北何啻千里之不相及乎臣謹按周子此章蓋承上章無欲靜虛明通之說而反覆以盡其㫖也聖人之心不以一毫私意自蔽不以一毫私欲自纍湛如止水朗如明鏡而於天下之事感而遂通無所處而不當虛之至故明之至焉蓋天下外物之纍明者猶在後而疑心私意之發於內而自生其蔽者最為切近而難知譬如人之目其逺可以見百里其細可以察秋毫雖有外物之障未必能阻其光之全也而惟纎毫之翳生乎其間則或至於尺寸之莫辨心之疑猶目之翳也欲目明者務去其翳欲心明者務去其疑有如事未至而先存圖度之心人未接而先存防範之術是之謂疑疑則虛靈之體蔽而又何以生明哉使或以此而用人既已用之旋復防之或潜寓耳目於旁觀左右之伺察將所用者亦自覺其信任之不篤而觀望牽制無以盡其材矣或以此而聽言未遽究其中之可否利害而形似之間疑其有所為而發必至於避嫌拘忌而不敢吐其誠矣君子不能必人之不欺己而恃己之明有以勝之賢不肖可以交至於前而公言私言可以互入於耳確有所見不妨盡發其根株窮其底裏使不肖懷私之徒曉然於日月之不可欺雷霆之不可犯而斷不存二三之見以優游於胸中為也况夫執狐疑之心者來讒慝之口持不斷之意者開羣枉之門物先腐則蟲生宵小之類且有乘其疑而借以行其罔者豈非蓄疑敗謀其流必至於此哉周子之言曰無欲曰靜虛指其本也曰謂能疑為明何啻千里破其妄也夫人有夜氣明而旦晝則昏者夜氣之時虛而旦晝有百為之擾故也人有旁觀明而當局則誤者旁觀之心公而當局有利害之切身故也人有考古明而處時事則惑者鑒於前者心無愛憎而接於今者容有好惡故也惟廓然大公怡然順應情順天下之情而無情欲通天下之欲而無欲乃稱聖人之明焉然而疑心之起往往展轉於不自知强制焉而不可欲緝熙於光明者其必由於學乎記曰清明在躬易曰君子以虛受人所以屏去本心錮蔽明之本體也書曰學于古訓乃有獲又曰鑒于先王成憲其永無愆記曰致知在格物果其熟悉古今之成敗逺邇之情形人心之真僞亦自可以臨幾而立决明之大用也惟明之量克充則疑之數自減體用備具疑復何自而生此治心之法即御世之權也奉上諭聖人之心不以一毫私意自蔽不以一毫私欲自纍本見於中庸章句朕觀朱子語類中言此二句之義實有內外之分私意自內而生私欲自外而入所謂私欲者非但聲色貨利之利足以陷溺人心即如耳目口體之在己身者不能戒謹恐懼易流入於非禮所當主敬存誠使無一毫之私也周子明不至則疑生義甚深逺與聖人不逆詐不億不信抑亦先覺之㫖相為發明蓋逆詐億不信即疑也先覺即明也誠至生明自然無疑人惟不能先覺故往往以逆億私心待人然亦有居心渾朴不存逆億之見而於是非情僞皆不能先覺者此又何益豈可與自誠明同語乎必如此其義始備欽此御覽經史講義卷首
