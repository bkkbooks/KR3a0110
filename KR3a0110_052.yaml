body:
  text: 詩經肅肅兔罝椓之丁丁赳赳武夫公侯干城肅肅兔罝施于中逵赳赳武夫公侯好仇肅肅兔罝施于中林赳赳武夫公侯腹心編修臣儲晉觀鄭康成曰罝兔之人鄙賤之事猶能恭敬則是賢者衆多也臣謹按周南著文王后妃之化自家而國自近而逺其事不越男女居室和平安樂淑善忠愛之風而王道之盛見焉獨兔罝一詩專美文王得人之效與前後諸詩詞意若有不類者而其為至德咸孚之徵抑尤足以狀其實也蓋大化不擇人而被良材不擇地而生教澤之樂育者長而善類之熏蒸者廣則賢士之挺生寧有定迹哉綿之九章曰豫曰有疏附豫曰有先後豫曰有奔走豫曰有禦侮棫朴二章三章曰濟濟辟王左右奉璋奉璋峩峩髦士攸宜渒彼涇舟蒸徒楫之周王于邁六師及之人材之有益於國也上而明良相合為一德一心之佐其次則效能宣力以將其忠誠愛主之心禮法周旋之地執事苐著其恪恭而其當膂力方剛經營四方之日則踴躍從王智勇胥奮實克有以安社稷而利國家此其大較也文王當日詢於八虞咨於二虢以及散宜生南宮括之倫其為干城好仇腹心者懿親勛舊濟濟盈於王國矣兔罝微賤之事武力之夫乃能處約而敬有勇而忠以克上膺是選焉此以見人才之多伏處潛修者至於不可悉數而其人又大都魁傑瓌異直亮無回邪而緩急足恃賴非猶夫輇才諷説之徒可小知而不可大受者也且今取詩而觀之樛木螽斯以上文王之德化行於家也桃夭芣苡國中風俗之美也江漢汝墳則風俗之美逮於南國也太和至治之象歡欣交通遐邇無間可謂無為而治不言而化者矣然其時靈淑鍾於山川英竒獻於草澤衆材輻輳羣力匡扶處常而資御變之助焉揆文而備奮武之略焉國勢於是乎熾昌人心於是乎翕聚此尤文王所以受維新之命而開卜世卜年之心也蓋詩人之意深矣夫關雎風始小序以為后妃求賢以自助麟趾關雎之應其謂子孫宗族皆化於善也是知文王作人之盛致賢才之衆多上自宮庭而後下及草野即周南中亦可得其概也已詩經于以采蘋南澗之濱于以采藻于彼行潦于以盛之維筐及筥于以湘之維錡及釡于以奠之宗室牖下誰其尸之有齊季女編修臣諸錦詩序大夫妻能循法度也能循法度則可以承先祖共祭祀矣鄭康成箋古者婦人先嫁三月教于公宮教于宗室教成之祭臣謹按序言大夫妻能承祭祀詩稱季女者何也記曰三月而廟見稱來婦也婚禮婦入三月然後祭行女之終婦之始也春秋之義雖為天王后猶曰吾季薑云爾季孫行父如宋致女公羊傳言録伯姬注三月而廟見稱婦擇日而祭於禰成婦之義而後父母使大夫操禮而致之言女者謙不敢自成禮也宗室大宗之廟庶姓别於上而戚單於下氏分而族不殊雖百世猶敬其宗焉尊祖之道也傳曰濟澤之阿行潦之蘋藻置諸宗室季蘭尸之敬也言宗子則有宗子之母姑老則宗婦攝之尸之為言攝主也此季女者抑庶子之為大夫祭必於宗子之家者與序明言大夫妻曰承先祖詩曰誰其尸之先祖者大夫之宗廟則箋云先嫁三月女家教成之祭未然矣詩經羔羊之皮素絲五紽退食自公委蛇委蛇給事中臣盧秉純臣謹按先儒之説以為二南之大夫被文王之化能節儉正直而詩人美之也今詳觀詩詞所謂羔羊素絲者固足以徵儉約之風至委蛇委蛇之云不過形其從容之度耳而目為正直何居蓋險陂傾側之流心存回曲其進而在廷必無光明磊落之概其退也目營心計輾轉於利害之交不勝其局蹐之情急遽之狀夫安得動靜有常從容自適如此故善觀人者察之於進退應接造次之間足以悉其梗概是詩人所謂善於形容也然立躬所重者在正直而正直之本在乎節儉不能節儉則不能無取於人不能無取於人則必將茍且相徇其當官也不能正色率下其臨事也不能直行其意夫惟抑其汰侈之情而約之於禮義之準敝車羸馬衣服垢汙固近於讇巧矯偽之為不可以示軌則而妾不衣帛馬不食粟季孫所以為忠不使內有餘帛外有餘財武侯所自謂無負者不過如此是知節儉為臣道之要務有位所宜加勵在朝廷之制祿也必使足以代耕而自再命三命以上進而愈厚非徒以優之正所以重責之也臣子之事君也必將凛乎後食雖在一命之微不敢不勉非徒以分自安抑臣誼當如是耳記曰大臣法小臣廉非謂大臣之不必廉也大臣祿賜已厚凖古之例已足食百許人不患其不廉也將事事置身於法度之中夫然後能為法於庶僚至使貴寵之臣輿服不敢過度則所以儀型百揆者得其本矣小臣品卑祿薄則持廉為難非節儉之至惡能勉之臣竊見在外諸臣如督撫及方面大員飬亷不為不厚矣而寵賂彰聞猶且不免窮其弊源大抵由不能節儉致然至州縣等員事任繁簡不同要必有飲氷茹蘖之操然後為阜物寧人之本六計之所尚惟廉非其明證歟古語謂公生明亷生威又謂勤補拙儉飬廉廉如是之重也其用度侈靡者何怪其以墨敗哉京官自九卿而下至於百司必潔已乃可以奉公亦清心始可以治事自恩加雙俸而後俯仰各已寬然於此而不砥厲亷隅豈復尚有人心正恐朝廷之恩賜多加一倍而臣子之用度亦增一倍則仍見其拮據耳此豈能有委蛇之度乎夫臣子之廉固恃在上者有以飬之亦貴在己者之有以自飬耳持守之亷既見所出之無幾賜豫之厚自覺所入之常豐則勵臣節愈所以懷宸眷也近日功令綦嚴加以天光燭照不聞狼籍之聲然臣猶願其節儉正直形為委蛇自公之度合為大法小亷之風由成周而上遡唐虞庶可以仰答聖慈以為明良之慶歟詩經摽有梅其實七兮求我庶士逮其吉兮摽有梅其實三兮求我庶士逮其今兮摽有梅頃筐塈之求我庶士逮其謂之編修臣諸錦鄭康成箋云謂勤也女年二十而無嫁端則有勤望之憂毛傳不待禮會而行之者謂明年仲春不待以禮會之也時禮雖不備相奔不禁臣謹按此詩前二章逮其吉兮逮其今兮父母之命也後一章逮其謂之媒妁之言也同一詩也出於女子之口不足存出於女子之父母者不可廢歸妹人之終始也古者霜降近女氷泮殺內故云士如歸妻逮氷未泮梅摽時則氷泮後期矣此女之父母因有勤望之憂詩之意如是而已鄭箋誤引周禮媒氏禮雖不備相奔不禁乃截下若無故而不用令者罰之一句此豫之書而倒讀者也於是儀禮服傳注遂有女子許嫁者逆降旁親之説悖已果如鄭箋所解則刲羊無血承筐無實無攸利之士女亦何所取義而編於正風之內乎朱子亦未申明竊以為聖人垂教必不然矣詩經彼茁者葭一發五豝于嗟乎騶虞編修臣沈文鎬臣謹按此言文王之仁周於庶類以昭王道之成也粵稽成周忠厚開基積功纍仁代有令主文王以徽柔懿恭之德施子惠懷保之恩熏蒸醖釀馴致太和故其時關雎樛木起化宮庭桃夭芣苡協和邦國以至喬木興江漢之思兔罝備干城之選風俗淳美賢才衆多猗與盛哉由是仁民之餘恩及於庶類召南卒章載咏騶虞流連唱嘆美諸侯乎美文王也蓋文王治岐王政修明人心悅豫德洋恩溥固已物靡不得其所南國諸侯被休風而承雅化其政治亦翕然丕變故其於田也順東郊之令與春搜之典驅馳林麓上下郊原覽卉木之向榮胥含生意瞻飛走之咸若盡被化工詩人用是作歌頌美而歸本於仁心之自然此王道之所由觀厥成也嘗考洪範之言庶徵也驗諸草木蕃廡虞書之敬授時也及於鳥獸孳尾周禮體國經野具詳山林川澤虞衡之事誠以物類甚微而風俗之美治化之隆實於是乎見而聖朝不貴異物盛世無藉奇珍但令茂對以時萬物並育即可見太平之有象至治之修和非必芝房寶鼎可薦郊廟神雀黃龍用為紀瑞也且夫草木禽獸一也有時而異盛則菁莪致美鹿鳴載歌衰則苕華見傷牂羊是嘆物非自異視其所值惟聖人與天地之心相似遂與天地之氣相調洪纎高下悉鼓蕩於太和民得之則無夭札物得之則無疵癘熙熙皡皡共若其天非然者歌萇楚呼黃鳥衰世之民欲如盛世之物類而不可得其故豈偶然哉夫善積則餘慶氣和則致祥讀二南諸什知太和之氣洵在成周宇宙間故詩人以麟趾為關雎之應騶虞為鵲巢之應而傳世寖昌赤烏啓瑞白魚兆祥西旅貢􅋙越裳獻雉則又麟趾騶虞之應也顧文王三分有二化行南國其德澤尚未遍於天下而仁風漸被休徵丕應已若此况乎四海一家重熙纍洽溥湛恩於無外涵一世於太和君相不有其功民物各安其命斯其受天眷顧集慶凝庥又當何如哉詩經孑孑干旄在浚之郊素絲紕之良馬四之彼姝者子何以畀之孑孑干旟在浚之都素絲組之良馬五之彼姝者子何以豫之孑孑干旌在浚之城素絲祝之良馬六之彼姝者子何以告之監察御史臣劉永泰孔頴達曰三章上四句言文公臣子建旌乘馬數往見賢者於浚邑是好善下二句言賢樂告以善道臣謹按任人者逸而有功任力者勞而罔效故人臣受命於君而膺兹民社也固貴以夙夜匪懈者盡承流宣化之職尤貴以汲取維殷者博集思廣益之資夫賢者之於人國非迂疏寡當者也其德誼可以熏陶性情焉其學問可以啓迪聰明焉其氣節可以砥礪風俗焉而特其抱負不偶每有落落難合之概茍勢分未忘不能隆禮以奉之忱悃未孚不能積誠以通之彼惟有逺引高蹈金玉爾音已耳孰肯輕至吾前而罄其中藏乎今觀衛之大夫禮著於外誠存於中在郊在都在城枉顧一何勤也四馬五馬六馬威儀一何盛也降浚明之尊而親訪於蓬户勞僕夫之駕而數造乎衡門所咏適館授餐者殆不過是邑之人指其旌旄見其車馬莫不欣欣然有喜色而相告曰此大夫為姝子而來者也彼姝者子感其禮貌之崇信其誠意之篤凡所為知無不言言無不盡而悉抒其素藴者當不知何以畀之豫之告之而後可以答我大夫矣由是賢者以其所得而致之大夫大夫以其所聞而進之於君君乃以其所進而施之於政文王康叔之治不可復見於今日哉要之大夫之好善非惟其臣為然也蓋有秉心塞淵之主斯有虛懷折節之臣故曰一國之事繫一人之本謂之風也嘗考宓子為單父宰有賢者五人皆師之而稟度焉故能身不下堂鳴琴而治魯欲使樂正子為政孟子不以強知多聞為喜而以為好善優於天下由是觀之一邑之長一國之佐猶必求賢以自輔若此况統萬邦而撫兆民其取善又當何如乎詩經投我以木瓜報之以瓊琚匪報也永以為好也投我以木桃報之以瓊瑶匪報也永以為好也投我以木李報之以瓊玖匪報也永以為好也監察御史臣劉永泰黃櫄曰木瓜木桃木李皆微物也而詩人欲以瓊琚瓊瑶瓊玖報之且猶以為未足非物之不足而心之不足也臣謹按詩人所咏寄託遙深故中庸引衣錦之句而以證惡文之著子夏得素絢之解而因悟禮後之旨在讀之者善觀而會通之不必執一以強解也如木瓜三章朱子謂如靜女之類原係疑詞詩序謂美齊桓之作終鮮確據俱無庸置辨只據詩文以為尋常相問遺者近是夫禮尚往來往而不來非禮也來而不往亦非禮也彼世之負義莫償而較量於錙銖者固無論已即使受人微物報人重資而其心若曰如是亦已足矣則報者之情倦而施者之德忘惟其中歉然常若無物可以報之而願致其永矢勿諼之意斯報者之情施者之德兩無窮也三復是篇不但詩人忠厚之思藹然見於言外而文王康叔之教澤入人之深感人之久傳之既逺而猶有遺風焉亦於兹可想見矣夫友朋交際之常尚當薄來而厚往若此况分屬臣子誼切尊親沐殊恩戴至德其所為圖報者又當何如乎詩經坎坎伐檀兮置之河之干兮河水清且漣猗不稼不穡胡取禾三百廛兮不狩不獵胡瞻爾庭有縣貆兮彼君子兮不素餐兮監察御史臣沈懋華序云伐檀刺貪也在位貪鄙無功而受祿君子不得進仕爾朱注美賢者厲志非其功不食故述其事而歎之臣謹按程子云詩小序必是當時人所傳國史明乎得失之迹者是也不得此何緣知此篇是甚意思朱子學宗二程而於詩序獨不然其説即如伐檀三章注與序各自為義據毛鄭則為刺貪而從朱則為奬廉序則責在位之人所云不稼穡之田榖不狩獵之貆鶉皆無功受祿之證朱則未仕之人不得進用以不耕不可得食不獵不可得獸是以甘心窮餓而不悔也二説相反不可以通彼我之懷浸假以刺貪之詩移贈厲志之君子則君子不受又浸假以奬亷之詞投諸在位貪鄙之夫彼寧不恧然自廢與其果何説之從歟豈以此詩次十畝之後碩鼠之前各有言外之意又豈以魏多賢人而其俗貪鄙意雖背馳固不妨兩存其説歟抑豈詩之為道不妨貿易其義互為塤箎歟雖然浸假而明廷之懲奬有類乎是者不幾於倒置歟夫説詩而不適於用則不可以翼經説詩而遊移其辭則不足以信今而傳後何以定之亦折衷於孟子而已公孫丑曰君子不耕而食則詩所云不稼穡不狩獵之説也胡取禾三百廛與在庭之貆特則所謂居是國者君用之而安富尊榮子弟從而孝弟忠信不素餐兮孰大乎是者也士生斯世登車攬轡有澄清天下之志匪僅甘心窮餓而不悔已也輪輻之為用也負重而致逺當其無用則棄置之一旦口御君命播揚皇風環顧在位之人貪鄙無可與語非伐檀之君子不為功曰十畝間間陶潛之歸去來辭也曰碩鼠碩鼠唐仲友詩解以為愛君之至戚雄歎其最有發明竊以為伐檀三章則以道自重唯孟子之為客卿者足以當之世有其人雖與之萬鍾可也詩經七月流火九月授衣一之日觱發二之日栗烈無衣無褐何以卒歲三之日于耜四之日舉趾同我婦子饁彼南畝田畯至喜編修臣鈕汝騏臣謹按農桑者生民之本務衣食者王道之大原唐虞三代之治所以出斯民於飢寒之路而導以親遜之風者未有不惓惓於此者也夫一夫不耕或受之飢一女不織或受之寒必待已飢而謀食已寒而謀衣不已後乎故觱發栗烈冬日之憂也而豳風之所以謀衣者則不始於冬之日而於七月之暑退即計及於九月之授衣焉火耕水耨夏日之事也而豳風之所以謀食者則不始於夏之日而於正月之于耜已計及於二月之舉趾焉此豫道也所為先事而謀之者也不寧惟是授衣於九月而求桑采蘩則前此矣舉趾於二月而乘屋播穀又前此矣推而至於取彼狐貍為公子裘所以佐衣之不逮也鬱薁葵菽瓜壺苴荼所以資食之有餘也若此者豈苐可以驗民風之厚民俗之淳哉意當日后稷公劉之化漸漬於民者久而一時循行阡陌勸課農桑之官必皆兢兢於民生之本務而奉行德意惟恐後時詩所謂田畯至喜是也今觀其詩載纘武功士則有勇而向義也執筐載績女則不惰而守禮也婚姻以時則同歸於公子也服勤不怠則上執夫宫功也因而獻羔祭韭則祭祀以時焉朋酒斯饗則燕饗以節焉為春酒以介夀則可以教孝焉躋公堂而稱觥則可以教忠焉休哉何風之厚而俗之淳與蓋其所以致此者則有本矣夫上作而下應風流而令行率作先則民不敢後化導切則民不敢怠不作無益則預備乎農桑之事者必周不貴異物則致美乎耕織之具者必悉上以是為政本下以是成風俗此則后稷公劉風化之所由而周家王業之所以盛也詩經春日載陽有鳴倉庚女執懿筐遵彼微行爰求柔桑春日遲遲采蘩祁祁監察御史臣陳大玠臣謹按農桑並重王政之大端也豳風為王業所由基而七月一篇於流火授衣三致意焉觀首章先以無衣無褐乃繼以于耜舉趾而次章三章則詳言蠶織之事是謀衣與謀食皆當預為籌畫也月令載季春之月命野虞毋伐桑柘愛蠶食也於鳴鳩拂羽戴勝降桑之候則具曲植籧筐備蠶器也后妃齋戒躬桑勸蠶事也分繭稱絲以共郊廟之服登蠶功也又按蠶為龍精月直大火則浴其種是二月浴種也祭義云大昕之朝奉種浴於川注云大昕季春朔日也是三月又浴蠶也此章於春日而求桑以飬蠶為今年授衣計也三章於八月萑葦既成而預蓄之以為曲簿為明年飬蠶計也此章求稚桑以飬其始生者采白蒿以飬其生而未齊者此蠶事之始也三章於桑之大者條取之桑之小者猗取之蠶盛而大小畢取此蠶事之成也周家以農事開國而周公作詩則衣與食並重而預為之計庶幾王知小民之依而毋敢荒寧殆與無逸同一意乎今天下之民惟杭嘉湖三郡備講蠶務而他或蠶或否咸多缺焉豈下之人憚煩而弗之講求抑上之人所以勸之者未盡其道歟嘗考禹貢桑土既蠶見於兖州厥篚檿絲見於青州至於纎縞織貝纁組纖纊見於徐豫荆揚周禮宅不桑者罰里布民不蠶者不衣帛東漢詔以布帛為租魏晉按户收絹輸綿唐制租庸調所謂調者即今丁糧歲納綾絹絁綿北宋稅斂有絲綿一種伊古以來皆以為常賦豈有民不育蠶而強索之者歟元明仍兼布帛之征而蠶事漸怠者則以元定天下有棉布遍行之故棉布既行民不苦寒因重棉布而輕絲帛矣然種棉宜於平原而樹桑則處處皆宜如牆邊屋角隴畔道旁以及荒山野嶼悉可種植誠使隨地遍插桑秧隨人各營蠶具將家人婦子力務育蠶必獲厚效較之田功不必三時况瘁比之稼穡尤見獲報良多農桑並舉衣食兼豐厚風俗而昭忠愛豳風可載賡矣詩經六月食鬱及薁七月亨葵及菽八月剝棗十月穫稻為此春酒以介睂夀七月食瓜八月斷壺九月叔苴采荼薪樗食我農夫編修臣汪廷璵臣謹按衣食者民之大命而飬生所資食為尤切孟子曰食之以時用之以禮財不可勝用也王政之教民最崇節儉至纎至悉靡不周詳為之品式以限制之為之禁令以防維之使貴賤有等少長有辨豐嗇有度不敢享過分之溫飽以備慮外之飢寒所為滋物産廣蓄積定民志而厚風俗也臣讀豳風七月之詩而益見矣首章言于耜舉趾紀農功之始七章言禾麻菽麥紀農功之成民食之本庶幾足矣至於果蔬亦致其鄭重愛惜之意如六章所云者臣蓋詳味其辭而見其有四善焉曰盡地利也備物種也循分而知禮也有功而能讓也夫五畝之宅必有隙地禾稼未登治場為圃菜蔬之類咸於是産焉則地無遺利矣荼之味苦不若瓜壺之可以供茹樗之不材不若鬱薁之可以落實而農家所植必多其類者蓋物各有所用地各有所宜美惡不遺則物種備矣家庭之內必先敬長鄉黨之中厥重引年一觴一豆曲致其愛飬之歡心則當歲時伏臘田家慰勞之際藹然見孝弟之風焉所謂循分而知禮者斯可覩已自春徂秋三時作苦治田之暇旁及園圃農夫之勞宜有以酬之然而果酒嘉蔬則曰我睂夀之所宜羞也瓜壺苴荼乃曰我壯者之所宜食也勤其事而不言勞竭其力而不言報此誠有功而能讓者歟夫飲食之微關於教化田野之樂釀為太平競侈靡恣醉飽物力所由敝也崇恭儉厚儲蓄生計所由裕也易曰君子以勞民勸相蓋王者以君飬民尤在使民相飬由果蔬之細推而及於榖米之大必有搏節愛飬之心斯有蓄積饒裕之實民食足則民氣舒民氣舒則民心靖周公陳豳風備詳節儉之意如此其重民食之計至深逺矣詩經九月築場圃十月納禾稼黍稷重穋禾麻菽麥嗟我農夫我稼既同上入執宮功晝爾于茅宵爾索綯亟其乘屋其始播百榖編修臣孫人龍朱子曰言納於場者無所不備則我稼同矣可以上入都邑而執治宫室之事矣故晝往取茅夜而絞索亟乘其屋而治之蓋以來歲將復始播百榖而不暇於此故也不待督責而自相警戒不敢休息如此臣謹按先儒謂此章就農之終事以起農之始事言稼之既同若可以少息也而旋念夫邑居之當修屋之方乘若可以稍休也而更念夫樹藝之在即築而納之若其功已畢也而不勝歡欣鼓舞之情亟而乘之若其心彌迫也而不勝告戒丁寧之意雖農事有始終而稼穡艱難互相勸勉則合終始而憂勤罔間焉嘗讀其詞而繹之惟天道運行以不息斯人事當黽勉以有功而小民竭蹶以力農斯大君當勤勞以務本試觀周公相成王既作無逸以為我君告使知民生之所依而不敢暇豫更作豳風以為我君誦使知王業之所起而不敢怠荒若此一章曰我稼既同矣即曰上入執宫功曰于茅索綯以乘屋矣即曰其始播百榖可以見終歲勤動非必有以督責之而自為警戒不遑休息故夫上之人必深念民為邦本食乃民天凡所以致力於農事者如耒耜有秉祈年有祀田畯有勞教以身也巡稼有師興氓有吏治地有司重以官也闢治有慶荒蕪有讓耕穫勤惰有賞罰責以實也聖王治天下惟務本重農之至意孳孳汲汲常勞其心於襏襫耘耔之間而旰食宵衣無時或倦誠知民事之不可緩也若孟子言民事不可緩特引于茅索綯乘屋播榖四語以為證亦謂備極三時之辛苦絶無一日之安間甫完今歲之勤劬早計來年之力作尤覺田家情事實無頃刻之敢休息耳究之七月一篇孰非民事不可緩之旨哉詩經我稼既同檢討臣萬松齡臣謹按國家之大計在於耕百貨之盈虛視乎稼六府並重土榖八政首先食貨讀豳風一詩而知上之所以愛下與下之所以忠上者纎悉肫懇莫不畢至而終歲勤動要必以稼事為兢兢蓋于耜舉趾築場納稼之間王化基焉矣顧周之所以治豳者即本之以治天下於民之未耕也司稼先為之辨種以知土宜遂大夫則簡其稼器以修稼政及其既耕也稼事則縣正趨之耕耨則酇長趨之合耦於鋤則敘於里宰救其時事則掌於遂師是以甸稍縣疆無不任之土平地原隰無不懇之田賓興之典與興氓並重各掌於鄉遂之大夫野處而不昵其秀民之能為士者胥出於農而重士亦所以重農也任土以飭材任商以市事並掌以閭師而器用貨賄不虞其乏則工啇適所以資農而非所以妨農也且甸師無與於農而帥屬以耕王藉所以勸天下之力田內宰無事於農而正歲則詔獻種所以示天下之重榖蓋其時無不勤農之事無不勸農之官三載考績考此績也三年有成成此功也三年耕則有一年之蓄九年耕則有三年之蓄積之二十七年則有九年之蓄謂之三登三登曰泰平雖有水旱而民無菜色然後禮讓風行德澤流浹王化成焉以故成康之世刑措不用然則讀豳風而知周之所以王讀周禮而知周之所以盛則周禮一書雖謂本於豳風而作可也况乎采荼以食農夫則甘之如飴春酒以介睂夀則儲之恐後一家之中食節事時老幼各得其分君惟恐民之寒也而曰無衣無褐民惟欲上之燠也而曰為公子裘公堂之躋即前此穫稻之夫宮功之執更念其乘屋之亟上下之間交相忠愛其纎悉必周肫懇篤摯若此王業之隆其以是哉詩經詩序東山周公東征也周公東征三年而歸勞歸士大夫美之故作是詩也一章言其完也二章言其思也三章言其室家之望女也四章樂男女之得及時也君子之於人序其情而閔其勞所以説也説以使民民忘其勞其唯東山乎編修臣諸錦朱子詩傳與序意同臣謹按小戎秦人之風也其氷車驖馬之盛雖女子亦知勇於敵愾東山周公所作而一篇之中若皆牽於私昵無一及於公事者然則聖人之言非與蓋周公之言至矣凡年之豐耗視黍稌俗之丕變視遊女祭祀之誠敬徴執㸑秉心之塞淵驗牝騋東征之詩細及於桑野之蜎蠋栗薪之苦瓜穹窒之鳴鸛耀羽之倉庚至纎至悉擬諸形容而獨宿而婦歎而孔嘉變賈勇為言情所以教天下之急於從王敵愾者不是過也至破斧之詩出之從征之士大夫則張大其師以聲其罪蓋上之達下以情義不待言也下之赴上以義情不待述也易曰天地交而萬物通上下交而其志同東山破斧之詩與然則王者之師有征無戰何以三年也曰夫武禁暴戢兵保大定功安民和衆豐財者也是謂七德故一年而遷其地益其封民可使庶又一年而各安其宅各田其田民可使富又一年而無故無私惟仁之親而教乃成引師而去之民至死不叛矣九罭所謂是以有衮衣兮無以我公歸兮是也易曰三年有賞於大國在師之臨師出以律亦是此意此則居東三年之義也臣又按季札之觀樂也為之歌豳曰美哉蕩乎樂而不淫其周公之東乎東徂東也居東也徴之於獨宿徵之於聿至又徴之於其新孔嘉其舊如之何樂而不淫正謂此詩詩三百篇除變風之外惟南豳皆可被之管絃用之鄉人用之邦國吳札之言蓋先夫子關雎而得之矣詩經呦呦鹿鳴食野之蘋我有嘉賓鼓瑟吹笙吹笙鼓簧承筐是將人之好我示我周行呦呦鹿鳴食野之蒿我有嘉賓德音孔昭示民不恌君子是則是效我有旨酒嘉賓式燕以敖呦呦鹿鳴食野之芩我有嘉賓鼓瑟鼓琴鼓瑟鼓琴和樂且湛我有旨酒以燕樂嘉賓之心編修臣儲麟趾臣謹按鹿鳴三章本為君燕臣之樂歌而其後推而用之鄉飲太學蓋據鄉飲酒義工入升歌三終及學記宵雅肄三之説而云然而其詩實主於歡欣和説賓禮臣下俾之鼓舞奮發悉獻其情而後已焉首以呦呦之鳴鹿興旅進之嘉賓食香草而呼召其類猶之食君祿而汲引其朋無競進之思無嫉妬之意是以其聲如此之和也琴瑟笙簧雅樂以導之進承筐幣帛盛禮以考其終總以將旨酒樂嘉賓而成我君臣燕飲之禮焉人臣侍君飲禮不得過三爵故賓之初筵卒章曰三爵不識左傳陳敬仲亦云臣卜其晝未卜其夜特君之愛臣綢繆無已不欲以常禮限之自鼓瑟以逮承筐所云式燕以敖者此也所云和樂且湛者亦此也好我而示周行即書君陳所稱爾有嘉謀嘉猷則入告爾后於內爾乃順之於外曰斯謀斯猷惟我后之德蓋自今以往要其終而勉之尤見樂善之靡倦而朱傳以為古者於旅也語則就鄉飲乞言之禮以例之也究而論之人臣之言豈真有加於廟算哉特好之靡已故求之愈切耳其曰周行云者又以見夫君臣之相朂以大道而凡戔戔小言概未足以為獻替之資也德音孔昭蓋言人臣有淳龎安重之德而聲聞昭著下而待治之庶民式為懿行上而同朝之君子佩為典型即此可見殿陛之間風度端凝舉趾足法而無有越禮愆儀者焉抑又以見夫人臣立朝回翔左右正君善俗自有其道而非徒語言文字潤色鴻業遂足以塞百爾靖共之責也末章總結之曰我有旨酒以燕樂嘉賓之心人君能得臣下之心則無論股肱心膂之寄干城民社之司咸有鞠躬盡瘁無敢告勞者矣即此三章反覆尋繹有以見君與臣志同道合相感在意氣之孚立政乂民相求在德禮之化其意和以厚而其音正以廣大序曰雅者正也正樂之歌也三詩列於小雅之首與夫恭敬齋莊以發先王之德者特體裁差異因有大小之分耳夫寧有異旨哉詩經人之好我示我周行監察御史臣趙青藜臣謹按鹿鳴序以為燕羣臣嘉賓之詩夫羣臣也而以為嘉賓其情洽矣進而詠鼓瑟詠吹笙則所以和其聲者至矣更進而詠承筐是將則所以勸之飲食而致其禮意之殷勤者無不用其極矣遂乃質言之曰人之好我示我周行諄諄乎若惟恐其吝此周行而不以遽示者於此見聖人好問之殷取善之切其舍已從人之意何其懇以摯也夫士人自束髮讀書以來責難於君謂之恭陳善閉邪謂之敬斯亦聞之熟矣豈其䇿名委贄而敢忘諸必俟夫吾君之如是其委曲以厚之乃始出其中所素藏以與吾君權施報哉然而聖人必以為不如是而不得者何也蓋君臣之分以嚴為主朝廷之禮以敬為主分極而不以情通之則隔禮勝而不以樂和之則離彼夫希榮茍祿者無論矣即夫稍知大義矢諸夙夜非不懷入告之誠及乎質對大廷而其分嚴其禮敬往往多所畏懼卒懷疑而不敢前史稱唐太宗神采英毅羣臣進見者皆失舉措太宗知之每見人奏事必假以顔色冀聞規諫夫太宗之納諫宜無不昭然共白於臣庶而猶必假奏事者以顔色而羣臣進見至失舉措則凡人臣之對越於君者其難其慎亦概可知矣聖人為之備著其儀於燕琴瑟竽笙以大鳴其豫幣帛勸侑以厭飫其心俾得優遊夷懌而嚴者以舒敬者以和乃坦然直吐其胸臆而有不知知無不言有不言言無不盡也故聖人之如是其委曲以厚之者凡以為中材勸云爾且夫周行大道也以道培國運則當盛明之時進憂危之語以道律皇躬則當晏安之地陳怠荒之防以道格君心則當嗜好之萌嚴性情之正甚且以萬無一有之事設若或一有之慮如禹之於舜而謂無若丹朱周公之於成王而謂無若殷王受臣方惴惴戰懼以為獲罪滋大乃君不惟恕其狂瞽而且直探其心之所存以為人之好我此固純臣志士所日夜切切以祝之吾君未敢必之吾君者而不意吾君之體恤之一至於此也臣雖無心忍不相率而入告乎故不獨師保以為啓沃疑丞以為贊襄庶士御事相與獻可替否補闕拾遺而瞽以典史以書師針􅕓賦矇誦百工諫庶人傳語蓋莫不畢至於其前而效周行之示則賡揚之休可繼泰交之治可成此聖人所以因燕而作是詩復歌之以為燕儀用垂訓於萬世歟詩經人之好我示我周行修撰臣金甡朱子曰記曰私惠不歸德君子不自留焉蓋其所望于羣臣嘉賓者唯在示我以大道則必不以私惠為德而自留矣此其所以和樂而不淫也歟臣謹按禮記緇衣曰私惠不歸德君子不自留焉詩曰人之好我示我周行陳澔曰言人有私惠於我而不合於德義之公君子決不肯自留處也朱子説詩引此以互相發明其用意深逺而推其義足以明鑒戒也蓋上下交接之間自獻亨禮儀以至一話一言之末皆必合於德義之公而後出之者為可加當之者為可受茍文物可觀詞采足尚而揆諸大道未見其有當焉君子既概以為私惠而不可以自留處者也夫朝廷禮尚嚴敬情或未通有燕享歌樂以導其和即止敘君臣相悅之意未始非一時盛事於道義固無歉也然鄉里小民被前聖之遺風而常有深思逺計猶且當燕樂而厪職思况自古明良相遇責難交警拜手揚言必有不止於鋪張嘉會以鳴太平之盛者使當日為嘉賓者唯是懷感激致頌揚於臣子之心誠不容已而不能因事盡規敷陳大道以稱塞主上之意明主特以是為私惠而無當於德義之公皆在所不取者矣然則天保之答其君也亦豈以岡陵之高大日月之升恆泛舉為祝頌云爾哉四章之孝享義取乎敬承宗廟繼序不忘而非徒引為徂賚之詞也五章之遍德義取乎惠飬黎元還淳返朴而非徒美其從欲之治也此亦如卷阿之歆動以福祿之盛而申告以致此之由蓋寓規勸於頌美中而後有合於示我周行之義斯人主樂聞之而以是為可受耳因是推之凡臣所進於君者稍有不合於德義之公而君即有所不取則君所加厚於臣者茍不以德義相望而惟以歡洽為期在明主固所不舉也惟恐開私昵之端也在良臣亦所不安也不願有私恩之被也其或公私之介析理未精皆可即朱子之論而惕然知戒者也鹿鳴當燕享之時鼓瑟承筐既已極歡欣和悅之致矣而終冀望夫好我之人周行之示為此詩者有虛懷延佇集思廣益之心焉聞此歌者有醉酒飽德願獻芻蕘之意焉樽爼雍容几筵肅穆以是為和樂而不淫也記曰以道制欲則樂而不亂以欲忘道則惑而不樂今所望者皆德義之公而無取乎私愛則所樂者固樂得其道而自不越乎禮節之坊矣且夫朝廷之禮主乎敬燕享之禮尚其和和樂而不淫和也而無失乎敬之意又以見和敬之相資而禮樂之情不偏於一也此朱子之説其取義至深且逺也詩經載馳載驅周爰咨諏編修臣柏謙臣謹按周官小行人之職掌使適四方達天下之六節而皇華之詩慎重敕遣以宣德音以達民隱採風俗之淳澆省閭閻之勞逸核吏治之能否察獄訟之屈伸廣天聽而彌遐俾物情之無壅簡書是畏負荷匪輕此固不徒恃智略之逺而必資採訪之周也審矣夫王者建侯以治國民社之任責之有司宜無不盡心於所事而得失相間治忽攸殊何也蔽常生於所近情每狃於所安弊多沿於所積而事尤抑於所制也牧民者惟有專責則意皆樂於報績而憚於任過其能者善彌縫而補救其不肖者多諱疾而忌醫國家水旱盜賊之虞民間仳離失所之嘆其得達於朝廷者不過什之二三耳况乎嶺海之外數千里及萬里之遙小民延領跂足不得見天子而言情者何限則夫輶軒之使不為無補而採訪之誠尤未容疏忽矣夫興一利而一弊旋生除一弊而一弊又伏重以風氣之不齊好尚之殊致古今之異宜自非旁搜博採至詳且悉何以副靡及之懷而盡使者之責哉然則咨諏如何勤於訪則無遁情密為訪則無飾説廣為訪則無偏徇故曰周也後三章曰周爰咨謀周爰咨度周爰咨詢蓋重疊言之以廣咨諏之所未盡則使臣之責信乎未可茍也春秋重出使之才以不能專對為恥自漢以還奉辭絶域乘傳遐方或招諭反側或鎮撫危疑皆以宣布皇靈折衝萬里而如詩所云則念切民瘼專以循行宣撫為汲汲是亦使於四方不辱君命之大者也夫識資聞見而廣材由歷練而成既以經營四方周知情偽則幹濟之雄材經國之大略亦於是乎出又豈徒著績賢勞無忝使職而已哉詩經天保定爾亦孔之固俾爾單厚何福不除俾爾多益以莫不庶民之質矣日用飲食羣黎百姓遍為爾德洗馬臣趙大鯨朱公遷曰無時而不受福則積之也極厚故以單厚言無事而不受福則得之也極多故以多益言神降多福不惟福一身而已必使民德歸厚而為人君之大福也臣謹按古者君臣之際上下交而情文洽君之禮其下者既無不周而臣之歡欣鼓舞以報其上者亦綢繆而不能自已然其歸美頌禱之中往往於斯民三致意焉天保之詩極陳宇內休嘉美盛之觀以抒其忠愛之意而其言君福也必歸本於羣黎百姓則所謂以小民受天永命者其義蓋深切而著明也夫人君為神民之主既受福於天則必為百神之所呵護而其所以福之者要惟見於斯民而已蓋民之熙熙皥皥於天壤間者莫不有本然之性使以巧偽鑿之法令驅之則淳風逺而厚德漓使限於顓蒙而安於固陋則不親不遜而俗亦未良也惟上有多福之君則民受多福之庇所以飬其身者既耕田鑿井自安於出作入息之恆而相忘於化日之舒長而所以淑其心者復優遊於黨庠術序之中相率為遷善逺罪而漸磨於至治之澤則其潛孚默率而使之自若其天者太平之象日昭著於宇宙之中而人不知也人君惟端拱垂裳以治之雖有宵衣旰食之勤而愈以成其纍洽重熙之盛福孰有大焉者哉要之治民之道大要不外乎重農與勸孝使井里無遊惰之夫家庭多豫順之子則自有以召協和之風而消兵刑之氣唐虞三代至治之極莫不由此為人君者誠於此加之意焉則已操乎錫福之原而其受福於天亦必有如天保詩人之所頌者矣詩經罄無不宜受天百祿降爾遐福維日不足修撰臣于敏中朱子集傳曰言天人之際交相與也書所謂昭受上帝天其申命用休語意正如此臣謹按德者福之本天人感應之理捷於影響惟君有專一純厚之德以為受福之基斯天之福君靡有涯量嘗讀詩至天保而歎美夫當日之臣所以頌禱其君者忠愛懇至反覆形容其於修德凝命之端隱然言外一篇之中三致意焉今取其辭而繹之天保云者以君之職位本乎天君之福祿亦出於天稱天以致其尊敬之意即言保以朂其明盛之思若曰天心仁愛人君無所不至欲君仰答天庥以永保此福祿云爾故曰單厚曰多益曰戩榖曰莫不庶莫不興莫不增無非推陳獲福之由以歸本於進德而至於罄無不宜受天百祿其言感召之故益深切而著明惟人君躬至德之厚備律度之和凡所以統御臣民總理萬幾者無不合宜故天命佑之百祿申之不寧惟是而且降爾遐福維日不足夫曰遐福亦既極悠逺之義矣又必繼之以維日不足者何哉蓋人君行健以法天體謙以受益懋昭大德日新又新已治而益進於治已安而益底於安皇皇焉惟恐德之所修或有不足於是天眷有德申錫無疆馴致於諸福畢備熾昌未艾亦若不足以酬君德之萬一夫是之謂維日不足也自其德之積纍根深基固而不可拔則山阜崇高之勢也自其德之淵深茹納容受而不可窮則川流增長之機也自其德之光明悠久往來繼續而不可止息則日月常新之象松柏迭盛之形也詩人之比喻或取諸此於是而宜於神故祖考是享而祭則受福以是而宜於人故羣黎遍德而俗致雍熙則信乎其無不宜矣大有之上九曰自天祐之吉無不利解之者云履信思順滿而不溢故其占如此不足與此詩相發明哉顧説詩者以鹿鳴五章君賜其臣天保一篇臣答其君苐言詩人之善頌善禱後世至取為祝嘏之辭不知其頌不忘規固言婉而意切自非然者何以見盛世君臣矢揚賡遂之美且必列之正雅用之燕享乎善夫明儒季本之言曰雖稱頌而歸於有德則責難之意寓焉與朱子引書昭受之旨相為表裏臣因引伸其義以明德為福之本云詩經罄無不宜受天百祿檢討臣張漢鄭康成箋曰天保下報上也君能下下以成其政臣能歸美以報其上焉朱子曰人君以鹿鳴以下五詩燕其臣臣受賜者歌此詩以答其君臣謹按人臣之於君頌禱為忠愛之至頌不忘規尤為忠愛之至竊觀成周之世君臣交警相與有成嘗喟然嘆興而不能已也彼其時君燕臣以示慈惠耳而以其善望之臣言尤懇至為歌鹿鳴示民不恌冀忠信可以學禮也為歌四牡將毋來諗冀篤親可以興仁也為歌皇華咨諏咨詢冀善道可以廣智也為歌棠棣俾知從兄弟之大義為歌伐木俾知朋友之有信也臣之於君醉酒而且飽德矣臣之頌君徒曰鋪張揚厲獻媚貢諛而即以為忠愛乎以故天保詩人頌禱之詞詳於天授而必繼之曰戩穀曰罄宜欲天於君思啓而行翼之俾成君德以為受祿之地如彼玉瓚黃流斯在如是其不假易也雖然罄無不宜亦良獨難矣嘗考諸詩宜君宜王宜兄宜弟宜民宜人宜其家室宜其家邦是凡人君出於身而加於民發於邇而見於逺必無幾微之不合於道乃曰受祿之不誣是以天祿取數之多極之於百而無少靳也九如之頌擬諸形容又不可以數計矣臣愚以為九如之頌由百祿廣之罄無不宜之義當以九如之針廣之今夫山之為性宣氣産物願君如之德洽好生也大陸曰阜既高且厚願君如之治致隆平也山脊曰岡是為山綱願君如之四方為綱也大阜曰陵峻極於天願君如之履髙益慎也融而為川濟下流謙願君如之與道為體而不息也月哉生明上弦就盈願君如之持滿有道也旭日始旦出地就明願君如之日進無疆也信彼南山億萬斯年願君如之仁夀以其靜也受命於地松柏獨正願君如之樹德莫如滋也彼君人者實有可以受祿之地其於祿也天顧不取諸其懷而豫之乎易曰視履考詳其旋元吉履旋即吉祥也書曰嚮用五福曰攸好德德即福也君人者修五事以立皇極之體勤八政以成三德之功一以貫之乃胥天下而錫之福哉詩經吉蠲為饎是用孝享禴祠蒸嘗于公先王君曰卜爾萬夀無疆編修臣諸錦毛萇傳曰吉善蠲潔也饎酒食也春曰祠夏曰禴秋曰嘗冬曰蒸公事也君先君也卜豫也鄭康成箋曰公先公君曰卜爾嘏主人傳神辭朱子注吉言諏日擇士之善蠲言齊戒滌濯之潔卜猶期也臣謹按詩天保第四章經曰吉蠲為饎是用孝享者吉蠲傳約言之朱注吉言諏日擇士諏日如吉日維戊吉日庚午之類擇士如奉璋峨峨髦士攸宜之類蠲言齊戒滌濯齊戒如有來雍雍至止肅肅是也滌濯如自羊徂牛鼐鼎及鼒是也傳云饎酒食稽之周頌思文之篇貽我來牟帝命率育鄭箋云火流為烏五至以穀俱來云穀以紀后稷之德詩以言此明粒食之報即生民詩所云其香始升上帝居歆后稷肇祀庶無罪悔以迄于今之家法也云禴祠蒸嘗于公先王者凡禮有五祭屬吉禮大宗伯之職以吉禮事邦國之神祗昊天上帝日月星辰司中司命飌師雨師社稷五祀五嶽山林川澤四方百物各有祭典惟以祠春享先王以禴夏享先王以嘗秋享先王以蒸冬享先王經言時祭以該禘祫言先王以該上下神祗傳據周禮先王而言故訓公為事箋據中庸上祀先公追王之文而言故以公為先公也公自后稷以至祖紺祖紺即箋所謂諸盩也云君曰卜爾萬夀無疆者傳云卜豫也朱子曰卜猶期也二義相通禮運祝以孝告嘏以慈告嘏傳神意辭萬夀無疆非臆説也帝錫武王以九齡天命成周之八百德之至者福不能違理之至者數不能違言錫言命即豫也期也之謂也至如大雅既醉之詩所云君子萬年介爾景福嘉樂之詩所云保右命之自天申之則又祭畢而燕而繹九族黃耉公尸之有答者也君上之尊同於帝天無對臣下斥言爾者本天本先王福君而言此嘏之質詞也合天保一詩本末而推言之詩序下報上也而朱子亦云人君以鹿鳴以下五詩燕其臣臣受賜者歌此詩以答其君言天之安定我君使之獲福如此也原臣子之於君父理當宣力效忠即上不下施為臣者亦應竭其耳目股肱之能以尊元首之戴初不可以施報論但此詩頌美成周以忠厚開基如彼而世德作求如此而又於嘉賓使臣兄弟朋友故舊之間將之以和樂忠信則福祿之應即在陟降呼吸之際如拱手操劵皇天相付曰單厚曰多益曰戩穀曰遐福於何徵之徵之如山如阜如岡如陵如川也上有五詩以逮其臣即有山阜岡陵川五如以相報箋言福祿之委積髙大而萬物之收皆增多也猶之敬服用情各以其類休徴五紀各以其時不必定為何福是何詩之應也然天保詩人以為此非臣之敢於誇詞福君也君蓋自以孝德致此福祿爾王者宗廟吉蠲孝享如此致慤則著七世之廟可以觀德萬夫之長可以觀政神至民質福之積政之成也夫偏黨結則機械生機械生則罪罟密求其相與飲食宴樂弗可得已經言日用飲食蓋德一而俗恬政醇而民龎禮達而分定正朝廷以正百官正百官以正萬民康衢所謂日出而作皇矣所謂順帝之則在是禮樂征伐自天子出由是羣黎庶民百官族姓遍為爾德正如下篇采薇以遣征伐出車以策功力枤杜以説師衆魚麗以守法度南陔以敦孝友白華以厲廉恥華黍以豐蓄積由庚以順隂陽南有嘉魚以安賢者崇邱以遂萬物南山有臺以基為國由儀以理萬物蓼蕭以均恩澤湛露以萃萬國彤弓以右諸夏菁菁者峩以隆禮儀此正小雅一十六篇即皆助德之明徵也坤道順而有常有常則可久乾道健而不息愈進則高明南山之夀斯干詩注所云南山深逺君子攸芋攸躋攸寧者也今神祗饗德措正施行君臣交泰繼繼承承貫四時而不改柯易葉如松柏相承然於周為擬如元公之後有伯禽召公之後有召虎尚父之後有呂伋松柏正世臣之喻而注疏所未及發明者也此詩雖居小雅之一篇實為治內之樞紐生民清廟之本皆肇是焉抑天之福君更有出於常人之意計者或以殷憂啓聖或以多難興邦唐虞之所以敷治四方之所以風動者罔不由之此又天保詩人言外之意也御覽經史講義卷十五
