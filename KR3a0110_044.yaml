body:
  text: 周易初九利用為大作元吉無咎編修臣徐瑋朱子本義曰初雖居下然當益下之時受上之益者也不可徒然無所報效故利用為大作必元吉然後得無咎臣謹按聖人此辭所以明臣職之不易盡也人主設官分職爵祿以馭其富貴非徒以寵榮乎臣蓋將責其宣猷效力分一人之憂而任天下之重也人臣委身事主教養而荷其生成非徒以邀利於君亦將期於竭才盡智上之有補於國計下之有裨於民生也初居下臣道也既受上之益使其無所報效則是茍焉食祿而孔子所謂邦有道榖者也烏可哉夫人臣所患者莫大乎退避以為智與茍且以塞責退避以為智則將毋動為大而因循之弊生茍且以塞責則徒綜核細務而逺大之謀失故必有鞠躬盡瘁之節蹇蹇匪躬之心而後可以任艱巨而不辭此利用為大作也然有不任事之患有過於喜事之患或就一已之所見未嘗博咨廣詢執意行之而後不勝其弊者矣或乘一時之鋭氣未嘗慎始慮終率意為之而後不勝其悔者矣才髙而慮疏則不可以集事志大而識暗則不可與圖成變法以救弊而弊乃甚於不變之初動衆以邀功而功卒墮於妄動之後故力圖振作而無補於時一意擔當而卒以為罪彼其心縱無他無如術已不善豈非作事之難而不可不謀其至當哉夫舉事一不當悔已莫及或者乃又不咎其慮之不詳顧鑒於任事之害因之懲羮吹齏因噎廢食則又一切不敢有所舉行相率至於玩愒廢地斯愈過矣所以聖人又鄭重以戒曰必元吉然後無咎也蓋既恐人之畏事又恐人之輕事畏事則誰為任事之人輕事則必有僨事之患聖人為人臣慮至深逺矣大凡純臣不敢不以身任事而亦不敢輕試而漫嘗有所作為必思其初焉思其終焉周詳慎重灼見其當行而吾行之又可以盡善無弊然後以其嘉謀嘉猷入告於我后而以一身任其成此所以一事之舉一政之行當時之家國天下被其庥百世之子孫黎民蒙其福其為益也大矣然聖人猶僅以無咎豫之未嘗有侈辭焉則又以見純臣之心功名有不敢居祇期夙夜無過而人臣之道職業實未易盡庶免負職之愆已耳蓋臣與子一理程子論曾子曰人子之身所能為者皆所當為無過分之事也論周公曰周公之功固大矣然皆臣子之分所當為夫以曾子之事親周公之事君僅得無歉於臣與子之分而已此元吉無咎之義也聖人蓋將以訓萬世之常道也周易九五有孚惠心勿問元吉有孚惠我德檢討臣郭肇鐄臣謹按聖人之治天下也周浹旁皇之政總根乎至誠惻怛之心故給求養欲任夫殊俗異黨靡不惓惓焉曲暢其覆露之仁而一時之含甘吮滋者亦遂霑濡渥恩被服醲化各厪天地生成之感蓋其自上下下無非真意之纒綿所為統輯羣生馴致於仁洽道豐之懿軌也如益之九五以剛健中正而居尊位豈非天下之所依庇者哉顧下之待益於上者唯惠上之裨益於下者唯心非謂心遂足以惠物也思艱圖易召好去惡利用阜財以及化民成俗皆確有加惠斯人之處豈僅僅焉仁心為質而遽云其益無方乎特是心流為惠而德施以溥惠本於心而利濟乃真則有孚尚矣夫君民之分遼濶不可以道路計堂中逺於千里而垓埏無論也然其菀枯欣戚之致實與深宫之呼吸相通而往來交應故其關係為甚巨被之以噢咻之愛以為是且鎮撫之可云小惠未可謂之湛恩也維聖人仰體乎上天立民司牧之意仁不異逺義不辭難昕夕思維務使天下各得其所人情莫不欲安信能扶而不危焉人情莫不欲富信能厚而不困焉人情莫不欲逸信能節其力而不盡焉內自郊圻以及山陬海澨肫然如一體之相關一切頒法樹司各極委曲綢繆以將其易直子諒之愫蓋其勤恤民隱者可謂誠而施德於下者亦已摯矣夫如是上焉雲布而雨施下焉淪肌而浹髓登諸仁讓之域納於福祿之林豐靖之庥形為嘉頌太平之澤播在人謡真覺雲潤星暉未足以為瑞年祥嵗德未足以為奇也以此言吉吉孰有大於此者乎即以此言益益孰有大於此者乎且夫上之勤勤懇懇以嘉與斯民者原求孚於心而未嘗求孚於衆也然滋液滲漉既有以洽乎羣黎百姓之心斯蹈德咏仁頓覺天懷中發而不可已感之者切應之者誠至於六合同風九州共貫論治者以為升平之極則焉抑知皆緣有孚之心足以深入之而後民懷其惠哉蓋上出之為惠者下被之即為德下被之為德者上視之即為益而要必設誠於內以致行之斯措注有本天德王道相為表裏於益之九五一爻可以觀矣周易有孚惠心勿問元吉監察御史臣張湄程子曰人君居得致之位操可致之權茍至誠益於天下天下受其大福其元吉不假言也臣謹按從來人君御宇未有不知以惠民為政者也顧同一政也自古帝王出之則為良法為美意厯久逺而遺愛靡窮而自後世行之則第見其為文具為粉飾為循奉故事不足言政而并不得稱惠者豈其設施制度有不逮於前人哉夫亦别之於其心而已矣書曰大哉王言一哉王心詩云單厥心肆其靖之心者萬事所從出之原而實萬民所共見之地也此心一有未慊民知之我無以對民民即不知之我更無以對已故王者不難杜天下之疑而難於考一心之信亦以百年之治亂止爭此幾希一日之張弛即分乎王霸倘不求諸本原之地雖日從事於惠民無論美言小數但可謂之口惠即散財發粟家賜而人益之詎得謂之惠心乎哉惠心者不務於外而孚以中不結於人而孚於天蓋本其欲立欲達之懷以副乎同胞同與之量視國計一如家事視民瘼皆為巳辜興利除害切求之即吾心間邪存誠之功易俗移風實體之即吾心遷善改過之道如此則可為有孚之至矣孔子所謂行之以忠董子所謂設誠致行其不以是哉夫至誠動物至誠感神德惟一則動罔不吉元吉之應理有固然然而勿問焉勿問也者猶云不言及之也乾始以美利利天下而不言所利人君因民之所利以為惠而可言吉乎茍一言及於吉微特計功謀利之私二於其心不可以臻純王之治且恐諧媚之徒窺竊意旨巧為逢迎其始不過為潤色鴻業黼黻太平而其漸至於指災以為瑞掩敗以為功匿凶以為稔飾危以為安則積偽之失較深於積惡徇名之弊更甚於徇私將使君門萬里化不下究而閭閻疾苦壅於上聞其得蒙仁主之惠者復有幾人哉由此論之君人者欲以實心行實政既自盡其心尤賴臣下共盡其心漢宣帝有言曰庶民所以安其田里而無歎息愁恨之聲者政平訟理也與我共此者其惟良二千石乎是則惠民者君也推君之惠而澤乎民者臣也蓋必上下咸有一德斯朝野可以交孚所謂有君有臣而後政無不舉矣洵乎知人則哲安民則惠惠必由於能哲安民必本乎知人也周易彖曰夬決也剛決柔也健而説決而和監察御史臣李賢經何氏楷曰君子以天下萬物為一體如陽德之無所不及其於小人未嘗仇視而物畜之也惟獨恐其剝陽以為世道纍則不容於不去耳而矜惜之意未嘗不存此和意也臣謹按君子與小人勢不並立何也君子者天地之心國家之幹祖宗之所培養山川之所孕育而朝野之所歸望者也彼小人以其委蛇之才容悅之情險巇忍刻猜嫌疑忌之心妨賢妬能貪權固寵之術其不能與君子共處也逐之必先其位之卑者而漸而及夫有事任者焉又漸而及夫中處者漸而及夫近君者以至衆所歸望之君子皆逐之不遺餘力則其剝陽以為世道纍其禍不可勝言矣惟君子循理順應不涉以私而亦不參以成見不惡而嚴而卒不致受怨而觸禍彼雖出於險巇而我仍歸於和平君子之待小人如是而已若夫五陽一隂則隂消陽長君子衆小人獨矣然一隂未去猶足為君子之憂剛之決柔所不容已也顧其勢雖足以去小人而其心未嘗不存夫矜惜惟汲引善類以充乎其位同心協力不尚威以取勝而小人自無所託足於其間所以然者君子之決小人其心同而其力不盡同也或憤激位卑而勢不相敵或才短力絀而因人以成事或義形於色不協衆力而反蒙其害要無論其位之崇卑力之大小果其心與吾同則皆引而進之集思廣益相為贊理協恭和衷而不仁自逺斯為剛決柔之道也與若夫為兼容之説者以為君子小人不妨並用夫邪正不兩立自古未有小人在位而君子能立於朝者也書曰勿以憸人其惟吉士詩曰無縱詭隨以謹無良小人之不可不去也如此君子所以當隂消陽長之時而戒謹恐懼之念無時而不存也周易彖曰萃聚也順以説剛中而應故聚也檢討臣唐進賢程子曰萃之義聚也上説而下順為上以説道使民而順於人心下説上之政令而順從於上既上下順説又陽剛處中正之位而下有應助如此故能聚也臣謹按君民之分上下懸殊而君順以令民民説以從君則分雖殊而情實親君臣之位尊卑遙隔而君剛中以待下臣虛懷以應上則位雖隔而志潛通於此可以想見聖明之世朝野一體主臣一心太和洋溢氣象順之實何如人主代天子民凡立綱陳紀無非為天地立心為生民立命如休養生息是民之所好也君則順其所好而體恤之無不周飢寒困苦是民之所惡也君則順其所惡而拯救之無不至又如修六禮以節民性齊八政以防民淫有不率則移左移右再不變則移郊移遂亦若大不順乎民而究不害其為順蓋所謂順者協乎天理之當然合乎民心所不言而同然非可曲徇人情違道以干譽也是以朝廷出一令則手舞足蹈而傳誦之不衰行一事則巷祝衢歌而感激之不置惟正之供未嘗不用其財而輸將恐後公旬有役未嘗不勞其力而子來趨事以此思説説可知矣剛中之實何如人主出震乘乾惟剛則全乎天德而克肩夫重任惟中則止於至善而不即於偏倚且剛以立中之體而事至觀理物來揆則又不失於優柔中以制剛之過而能斷大事能決大疑又不致於壯往夫極建於上斯效徵於下蓋君之於臣如天君之令百體如乾坤之統六子而剛中之主尤足發人生成之感而動人則效之思其明作有功也所以應勵精圖治之心其偏黨不形也所以應蕩平正直之化斯固動以天而不自知根於性而不容巳不特為利祿而來者難及其忠愛之誠即切功名之志者亦無與於泰交之盛以此言應應斯誠矣夫順以説則民聚於野盡天地之覆載日月之照臨凡食王之粟踐王之土者莫不尊之為元后親之為父母所謂民為邦本本固邦寧者此也剛中而應則臣聚於朝三公論道以經邦六卿分職以率屬下至疏附後先奔走禦侮之倫亦莫不師師而濟濟所謂天地交而萬物通上下交而其志同者此也究之順自有以致民之説而上初無心於市恩剛中自有以致臣之應而上并不以此責報此純王之治所以異於霸者歡虞之政權術之為也哉周易象曰地中生木升君子以順德積小以髙大給事中臣陸尹耀胡氏炳文曰木之生也一日不長則枯德之進也一息不慎則退必念念謹審事事謹審其德積小髙大當如木之升矣臣謹按卦體坤土居上巽木居下木性上騰得土而達雖尚在地中未遽暢遂而苞蘖既具有漸次增長之勢升象也君子觀此知德修於身猶木附於地其蓄之未醇懋則質弱而難堅其持之不審固則根浮而易拔漸致若勾萌而輕棄成鹵莽雖得猶勿得也故事有取乎積而道則從其慎焉慎之云者非特葆厥已然也有加勉於未然者矣亦非僅希其適然也有實計其必然者矣嘗觀嘉植之遂其生也得泉土之潤沃而起藉雨露之滋息而成當其始苞必烜以日鼓以雷而後機勃發於惡可已洎乎方稚必疏其畦厚其糞而後氣完固而不可撓由是得寸則寸也得尺則尺也至於尋丈之勢具而天人之交致已非一日矣一木之不終枯萎其不容有所摧折掩抑猶如此何况德之在人尤為難率從善如登從惡如崩往往有閲終身之層纍而卒虧於一日之頽隳者茍非格物致知先有以明其指誠意正心預有以立其間統瞬息為存養以大擴其不疚無惡之天合隱微為省察以密持於暗長潛滋之地當無由自微之著由勉幾安奮剛毅以任重道逺本篤實為輝光日新也此積小髙大必權輿於一慎而胡氏所由推而極之念念事事間以為無不宜然者乎特是慎德固作聖之基而千古之言王道者未嘗不本諸聖功易為君子謀雖不専責之王者而六爻之位遇五為君則此象之辭在人主玩之亦自至關切要惟慎之之法微有不同所謂夙夜基命宥密是也誠能専力乎此則矩在一心為至小潔之天下為甚大由是天人交屬人土財用無待計較而罔不畢致其崇髙之象又何異榛楛棫朴之濟濟芃芃與周易彖曰巽乎水而上水井井養而不窮也檢討臣韓彥曾鄭康成曰坎水巽木桔橰也桔橰引瓶下入泉口汲水而出井之象也程子曰木承水而上之乃器汲水而出井之象君子觀井之象法井之德以勞徠其民而勸勉以相助之道也臣謹按井養不窮之義可供鑿飲之用并可助耕食之資蓋三代井田溝洫咸備八尺四尺具有成法所以蓄泄有賴旱潦無虞至井田廢而溝洫湮溝洫湮而穿渠之利起而穿渠之利則有及有不及焉非若溝洫之無不及也後世井田不可行溝洫不可復而旱潦不可以不備竊於井養之義而思補救之方惟井中之水每為川澤之伏流不汲不見其盈日汲不見其損故穿渠之益所以通天時雨澤之窮而鑿井之益又以通河渠灌溉之窮者也惟有以通其窮而井養于是乎不窮矣然則井之為利固盡天下而可行乎非也嘗考史記河渠書及漢書溝洫志皆言鑿井深者四十餘丈往往為井井下相通行水井渠之生自此始夫關中地勢最髙掘地數仭而不及泉者有之若夫冀之河間則地勢漸平青之厯下乃濟水伏流出沒之處竟有掘地尺許而得水者誠得良有司巡行阡陌因地制宜開其端而示其法由是輿情踴躍督課無煩田主或願出其財佃民或願出其力將見一井之水上者可溉田十數畝下者可溉田四五畝豐嵗可望倍收歉嵗亦可望薄收以此類推其益亦無算蓋施之土髙水深之處則難為力施之平衍疏曠之處則易為功此勢所固然者也且夫流之伏者不免有驟發之慮果其多為浚井壅者開之藏者出之則水之伏而為害者轉收之而為利費省而功倍所謂以君養民使民相養者胥于是乎在勞民勸相之道得井養不窮之義著此井之上六所以云井收勿幕有孚元吉也昔黃帝見百物始穿井而黃帝之井田亦畫井字之形但中一區開井外八區為田非井九百畝中為公田也浚井溉田之説豈自後世始哉周易木上有水井君子以勞民勸相侍讀臣林蒲封朱子曰木上有水津潤上行井之象也勞民者以君養民勸相者使民相養皆取井養之義臣謹按此釋井之大象取井養之義以示人君養民之法則也卦體巽下坎上坎為水巽為木鄭氏康成曰坎水也巽木桔橰也桔橰引瓶入井汲水而出為井之象此以桔橰為木器而釋木上有水之説也朱子語類云木上有水井説者以為木是汲器則後面却有瓶瓶自是瓦器不若只説水之津潤上行至木之杪便是井水上行之象又云草木之生津潤皆上行直至樹末便是木上有水之義是又専取水之上行以釋井義與鄭説雖似小異而意實相同也程傳曰木承水而上之乃器汲水而出井之象君子觀井之象法井之德以勞徠其民而勸勉以相助之道李氏心傳曰勸相即相友相助相扶持之意與程子勞徠勸勉之説正相發明以見人君之養民者不窮亦猶井之養民者不窮也夫以四海之大兆民之衆莫不待養於君使必盡人而籌之分財而給之其勢必有所不能古之聖王所以上規天時下盡地利制田里教樹畜使之出入相友守望相助睦姻任恤有無相通以民之手足謀民之室家以民之盈虛濟民之緩急因所利而利之上不費而下易行至於樂利成風化行俗厚而教即寓於養之中矣此勞民勸相王道所為易易也雖然井固所以養人然以一井而養天下則不足以天下之井而養天下則有餘亦猶四海之大兆民之衆不能不藉於分猷宣力之人凡牧民之吏皆有養民之責者也使為吏者觀法於井志在養民不以簿書期會為急不以趨承巧進為能惟務政平訟理與民休息復以暇日周厯田間勸課農桑察其勤惰籌其緩急而勞徠勸勉之不惟其文而惟其實則慈惠之師人被其澤民氣和樂康阜日登於以庶幾循良之績而成煕皥之風者不外於勞民勸相而得之井養之義不誠大哉周易上六井收勿幕有孚元吉侍讀臣彭樹葵朱子本義曰收汲取也幕覆蔽也有孚謂其出有源而不窮也井以上出為功而坎口不掩故其象如此程氏傳曰井以上出為用居井之上井道之成也取而不蔽其利無窮井之施廣矣大矣有孚有常而不變也博施而有常大善之吉也鄭康成曰井以汲人水無空竭猶人君以政教養天下惠澤無窮也臣謹按井之取象以其上水井之為用取其養人故彖傳釋以養而不窮象傳推之勞民勸相而其義則莫著於上六一爻蓋下三爻在井之下未能致上水之功四五兩爻雖已近乎上而猶未離乎中故僅言井之甃泉之冽而未及汲取以致用至上六居井之極水已出井則上水養人之功於是乎可明著其利澤而普惠於無窮故爻辭繫之曰井收勿幕有孚元吉夫收之為言孔氏以為收成之意其義未顯故朱子直訓為汲取蓋至是而三之所為泄五之所為冽者俱得出乎井以致用於天下而可供日用可薦明堂其為利不亦溥哉顧井之卦德取其養而不窮其在彖曰無喪無得蓋言井之受汲多亦不減少亦不盈厯久而不變也曰往來井井蓋言井之廣被無間乎往來不分乎遐邇使人各愜所欲也故程子以為無喪無得則其德也常往來井井則其用也周夫所謂周與常者是即勿幕之象有孚之義也勿幕而後井之汲取不為限量其共井而汲者無彼此其環井而汲者無方所於此想見廓然大公之心與覆載同其氣象焉有孚而後井收之勿幕初無間斷其勿幕於一人者推之千萬人而無不然其勿幕於一時者推之千萬年而無不然於此想見至誠無息之量與日月並其升恆焉如是而有不大善而吉者哉臣竊以此推之政治而思王者以萬物為一體四海為一家凡遐荒之衆血氣之倫必將有以洞燭其幽隱而普被其膏澤是非勿幕之道乎王者法制所及經畫所周以一日二日之兢業而裕千秋百世之樂利是非有孚之道乎則以是而揆之彖傳所云養而不窮象傳所云勞民勸相以及鄭氏所云人君以政教養天下而惠澤無窮者其義無不吻合而條貫矣周易上六井收勿幕有孚元吉監察御史臣倪國璉程子曰井以上出為用居井之上井道之成也收汲取也幕蔽覆也取而不蔽其利無窮井之施廣矣大矣有孚有常而不變也博施而有常大善之吉也臣謹按此言井道之大成德施普而實意周也卦本以巽木入坎水之下而上出其水源深體裕本足以周斯民生養之需而上六適當坎口不掩之處是道成於己而功遍羣生德修於身而澤被天下仁恩逺布治化四達自畿甸以及海隅而無一物不遂其生自老幼以及鰥寡而無一人不獲其所猶井之汲取而不掩覆所謂博施濟衆井養而不窮者惟此足以當之然豈惟為是市恩見德而不本之一心之誠哉夫有純王之心而後有純王之政是以主井道者淵泉之性既純於豫養汪􅐮之澤亦蓄乎心源正心誠意之功素預則足民阜財之術自周故外之聖澤汪洋益以見內之仁心肫至凡其寬山澤之禁薄關市之征公天下之利而無所私正其心之公溥者欲以涵濡乎萬物也凡其盡裁成之道竭補救之方錫天下之福而無弗遍正其心之愷惻者欲以康濟乎兆民也惟上之心篤摯而罔間上之澤自普被而不窮以此心而勞民恆産制而享樂利者及後世以此心而勸相有無通而敦仁厚者遍民間是乃所謂有孚也由是九功敘而五福斂四序正而百榖昌養道之成至此而元吉之占在是矣夫聖人以父母天下為王道王者以萬物得所為極功而總不外於設誠而致行之美意良法相輔而行自然德洋恩溥中外降康仁覆天下而萬世治安此養道之所宜法井也周易巽而耳目聰明中允臣周長發臣謹按聖人之宰物成務也以心思為窮理之基而潛而善入斯與理相浹而無所拂以聞見為揆幾之府而擴而日開斯應幾不滯而無所蒙凡以德之兼乎內外者內之有以立其體外之有以致其用夫固有兼備而不容缺者焉鼎卦彖傳所云巽而耳目聰明臣嘗取而繹其旨矣夫鼎以巽為內卦是則巽順本卦德也而上離為目五隂為耳耳目之官職司聰明是則巽順在內為心思聰明在外為耳目皆卦象也嘗觀鼎而知象與德之全焉蓋鼎為天下之重器人君以之凝承國祚統馭羣生上以紹宗祖之基而奠苞桑於永固下以錫臣民之福而膺圖籙於無疆其為任亦甚重且大矣所恃者君德有以攬其全而彚萬理於心思無微不入運萬幾於耳目無物不周耳亦以人心之靈以思為職耳目之用以聰明為職天下之理無不與心相通又無不與耳目相凖夫固盡人而有內外之德矣况乎大君一心將舉天下而劑量焉大君一身將盡天下而視聽焉倘入之不深而一有所拂察之不審而一有所蒙則天下之大事物之變其足以撼心思而引耳目者詎少哉惟是內體以巽順為宰沉潛之思深入乎天道之表而以之觀理何理之不窮也深入乎人事之中以之觀物何物之不察也外體以聰明為用天縱之資視惟明聽惟聰有以憲天之聰明也明四目達四聰有以盡天下之聰明也舉凡幾微委曲之間羣言衆議之煩為恆情之所不及料者一出諸悅心研慮之精自能曲暢旁通而無之或窒矣一統諸天亶元后之尊自能兼聽並觀而無之或蔽矣且也聰明而本之於巽順則聰明之用始有所主而不致馳逐於見聞巽順而濟之以聰明則巽順之體始有所擴而不致冥守夫虛寂如是則卦德既全卦象亦協主器而有以凝承乎國祚綏猷而有以統馭乎羣生柔進上行得中剛應庶幾永享元亨之吉矣周易艮其背不獲其身行其庭不見其人無咎監察御史臣張孝挰程傳曰人之所以不能安於止者動於欲也欲牽於前而求其止不可得也故艮之道當艮其背所見者在前而背乃背之是所不見也止於所不見則無欲以亂其心而止乃安不獲其身不見其身也謂忘我也無我則止矣不能無我無可止之道行其庭不見其人庭除之間至近也在背則雖至近不見謂不交於物也外物不接內欲不萌如是而止乃得止之道於止為無咎也臣謹按天德王道不外乎修己治人而修己治人之要不外乎理然有時理有所不明而茫然莫得其所止則非他物蔽之即巳與人蔽之而已矣就一巳而論則有人心有道心道心原於性命之正微妙而難見人心生於形氣之私危殆而不安二者雜於方寸之間而不知所以治之則遇紛華而悅見可欲而亂天理之公終無以勝夫人欲之私而一巳之七情六欲紛紜擾攘欲其審所止而止焉難已至於人則有性情嗜好之不齊愛憎向背之不一茍不免乎人之見者存則愛者無由知其惡憎者無由知其善即使愛憎之念不設而畛域未泯則一言之發或疑其徇私一事之行或疑其利已漸至是非雜糅美惡混淆不惟無以收集思廣益之效而適足以眩惑聰明矣夫惟聖人廓然而大公物來而順應不見有物不見有我惟一理而已理之所在則剛健以行之理所不在則果斷以去之凡衆人之情偽一巳之嗜欲俱不得入而撓其所守夫是以萬事萬物處之無不各極其當而能止於至善之極也抑又聞之聖人定之以中正仁義而主靜止者靜之象也先儒論學謂當看喜怒哀樂未發時氣象蓋靜中之所得既深則動而不括自可無私心而當理矣艮其背靜也行其庭不可謂之非動而不見其人則仍歸於靜所謂靜亦定動亦定也規規焉以絶外誘之私則將見滅於東而生於西矣人我兩忘如鑑之空如衡之平澄然無事泛應曲當所謂與其非外而是內不若內外之兩忘也審是則一理之周流得其所止修己治人之要不外是矣周易彖曰艮止也時止則止時行則行動靜不失其時其道光明監察御史臣陸尹耀張子曰艮一陽為主於兩隂之上各得其位而其勢止也易言光明者多艮之象著則明之義也臣謹按此釋卦名止者安止之義也自人心言之止則所處皆安胸無煩擾操天命於一心合萬物為一體其耳目常存於未始有物之初心思常入於未始有物之內時中之體假已具於方寸故能隨時順應有感即通而行止動靜一因乎時初不以有我與乎其間斯物我兩忘而化於道矣尚安有意必固我之私障蔽其光明哉先儒謂時止而止止也時行而行亦止也由是思之止也者斂感於寂也行也者通寂於感也動無紛擾精明之極變化生焉動之時也靜無拘牽寧謐之至天君泰然靜之時也由是泰宇定而天光發特其自然之光明云爾臣愚竊臆此彖辭意義與中庸首章大旨吻合艮止之義一不睹不聞莫見莫顯之戒懼慎獨也與時俱止未發之中也與時偕行中節之和也動而無動動固無為靜而無靜靜非有執中和之極致也光明之所暨訖其位育之全功乎自王道而論功莫要於戒懼慎獨約之又約謹之又謹不違乎天命之本然無拂乎吾性之自然前後始終理之原於固有者斂之愈密亦恢之彌廣內外本末功之盡其當然者效幾其全而詣臻於化斯行止動靜之偕臧而治道亦於是光明也與周易君子以思不出其位編修臣朱佩蓮臣謹按艮卦象辭而曾子稱之蓋平日致力於止至善知慎乃在位行無越思內可聖外可王守約施博最為善道乃於學易時獨深其觀玩者也王弼易注曰各止其所不侵害也孔頴達易疏曰兼山艮者兩山重疊直置一山已能鎮止今兩山重疊止義彌大君子此時思慮所及不出己位也程伊川易傳曰位者所處之分也萬事各有其所得其所則止而安若當行而止當速而久或過或不及皆出位也况踰分非據乎張南軒易説曰位非獨職位大而君臣父子微而一事一物當其時與地所思止而不越皆不出其位也非有主於中其能然乎朱子論語集傳獨取范氏物各止其所而天下之理得一語可謂括羣儒精粹矣獨疑夫易無思也無為也天下何思何慮易不言思而此獨言思思之思之鬼神通之也曾子以魯得之力行工夫居多而此獨取思知止得止勿慮胡獲也易曰以思曾子直曰思而位之當不當不待觀象而已思過半矣蓋此章與中庸素位章有别素者因其本然思者盡其當然人之不能素履往也勿思耳矣藝人田者病代匠斫者傷人已兩失何取乎爾出位之外而未必賢入位之中而反有不暇者也本分當為之事千慮尚恐一失不曰如之何如之何吾末如之何故大而天下天下皆有位也皆當思也位在君父思止於仁慈位在子臣思止於孝敬勿敢有加損焉小而一身一身各有位也各當思也位在視聽思明聰位在色貌思溫恭位在言事思忠敬勿敢有迎距焉曽子由忠恕而悟一貫則易之為君子謀者蓋隨事精察而力行之宜有味其言之與乃若艮之取象則更有説艮與咸皆取象人身咸感而動身之所動由足而動故自拇而腓而股而思而脢而輔頰舌皆自下而上而思為之運若朋從爾思則膠擾妄動之思非所以思矣艮寂而止身之所止由足而止故自趾而腓而限夤與心而身而輔亦自下而上而心為之主若危薰其心則強制不動之心尤非所以思矣膠擾妄動非吉也強制不動亦非吉也咸之吉在六二之能居順不害也艮之吉在上九之能敦以厚終也君子通微之思亦在乎順之厚之而已項氏安世以為思不出位唯上九一爻可以當之則篤厚意尤為深切氣不翕聚則無以發散物未堅實則無以復種而生未有不能成終而能成始者也即靜極復動之道貞下起元之理周子曰艮其背背非見也靜則止止非為也故聖人定之以中正仁義而主靜立人極焉此則思之極致也夫周易六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也檢討臣雙頂臣謹按班聯有人材然後政事有綱紀盛世之髙爵厚祿非體貌之而以為名也非假借之而以為文也退食自公而分量有歉其心以為負國之甚寤寐何以自安是故人材為政事所荷持政事為名誼所繫屬亦求其心之有所安而已漸之取象於鴻也以其進之有漸初六始進於下未得所安而上復無應六二柔順中正進於磐而益安而上有九五之應矣飲食衎衎卜云其吉雖然詎易得此漸磐之衎衎哉天下境之所懸必有物以充塞於其內而物之自適乃隨境以和樂於其中此固非偶然之遭逢而其交相資者乃不可以相易則觀於物情而愈可以勵臣節矣聖主之得賢臣也推誠布公視臣鄰如一體敕幾宣訓孚寮宷於一心由是用其身者必恤其家酬其庸者必重其祿黼黻太平遭逢明盛席豐履厚俯仰無虞安之至也而人臣之不敢以俄頃即安者乃正在此矣才竭力殫其無餘也而自謂無餘之處即已留其有餘謨明弼諧其有意也而偶不經意之時即至流為任意方物出謀國是可存也而隱忍不發此生之碌碌何為省成慎憲和衷可美也而矯強立名偏執之成心何補如是而人臣何以獲安於俄頃乎而不知俄頃之不敢安者即汝止之所以安也從來素絲之委蛇常在旦明之屋漏事聖主者運之隆呼藎臣者任之大聖憲天而臣欽若者一德一心之相與以有成由是拜自獻其身而無所私隨在敬其事而無所失有時伸一巳之獨是而非以立異有時從天下之公是而非以黨同聖人之所謂不素飽者於不敢安而得所安蓋精氣融而形神固斯品節著而境地宜也要必旰食宵衣上有憂勤之主斯靖共夙夜下有贊襄之臣人材蔚起綱紀畢張明良合德於堂廉則四海著清寧之化年豐物阜而飲和食德者永沾樂利於無窮矣周易上九鴻漸于陸其羽可用為儀吉監察御史臣沈懋華王弼注曰進處髙潔不纍於位無物可以屈其心而亂其志峨峨清逺儀可貴也程傳曰安定胡公以陸為逵逵雲路也上九在至髙之位又益上進是出乎位之外於漸之時居巽之極如鴻之離所止而飛於雲空在人則超逸乎常事之外者也進至於是而不失其漸賢達之髙致也朱子本義曰儀羽旄旌纛之飾也出乎人位之外而其羽毛可用以為儀飾蓋雖極髙而不為無用之象臣謹按漸之六爻皆取象於鴻蓋凡鳥之行以序而有漸者唯鴻鴻之進退有禮志氣皎然妻道也亦臣道也乃上九一爻無取乎歸與進之義而以無所應為宜聖人以為此髙世之士則然故就卦位言之以陽剛而居衆爻之上不因人為進退而飄然有遐舉之思不隨世以就功名而逌然有離立之想蓋在家為保姆在國為黎老髙蹈逺引殆超乎人位之外者與然竊思之政治之成在乎上而風俗之善即不當位者亦與有責焉曰漸于逵者象其髙也用其羽者昭其則也當其養德於潛而樹中朝之雅望樂道於野而立明時之標凖以一身之輕而維一代之風節以一人之退而振一世之人心所係詎淺鮮哉聖王之世戴髙而履厚無一人一物之不在宥者至漸之時鴻飛冥冥固哲人之髙致而風厲有位尤達士之芳軌天下詎有聖化之外之人哉抑詎有賢人君子而不以輔聖化者哉身名隱約而鼓吹休明居處髙潔而儀型百代可慕而不可即也可親而不可褻也彼夫鶴鳴之彥或藴風烈而不舒維鵜之流或望精光而不副固不可同年而語矣或者曰鴻不見用徒以羽為人所儀鴻之蹇也又曰羽者鴻之外也外之文不若內之文也不用其內而用其外非鴻之幸也而抑知不然鴻有永貞之節因其羽而知其德翔於千仞而不下下則為王者之瑞焉曰儀者猶鳳凰之來儀也賔於天子優禮之以為國之光華天下仰其風采俗尚日以端人心日以古無形之文大用出焉爵祿不足以動其心而久居賢德以善俗大象之所云此物此志也中孚之翰音登於天不若鴻漸之羽儀而吉蓋君子小人之判也周易豐亨王假之勿憂宜日中侍讀學士臣程景伊朱子曰豐大也以明而動盛大之勢也故其占有亨道焉然王者至此盛極當衰則又有憂道焉聖人以為徒憂無益但能守常不至於過盛則可矣故戒以勿憂宜日中也臣謹按震上離下其卦為豐豐者盛也大也明以制動動以用明則大業可興而極其盛大矣夫當盛大之時天下一統治化四訖此其所以亨也雖然消息盈虛相為倚伏治亂之道如環無端竊嘗覽觀前史每見自古國家奕葉承平疆圉開闢兵刑不作民物繁昌盈廷拜手以頌升平舉世謳歌而享康樂宜若無意外之虞者乃未幾而蘖芽之釁即潛伏於其中何者無平不陂無往不復其所以召亨者即其所以可憂也聖人於此宜危言示悚乃曰勿憂宜日中何哉蓋久安長治不在乎徒存恐懼之心而在乎亟講持盈之道豈曰委心任運哉惟聖人能以無逸之心行有常之政廟堂之上百度修明燦然具舉自圖治之初迄於致治之日一以貫之譬則曦御當空萬形畢照是則所謂宜日中者而所以保有其豐道在是矣其見於唐虞之時則兢兢業業一日二日萬幾罔失法度罔遊於逸罔淫於樂是也其見於成周之時則制治於未亂保邦於未危是也此皆所謂宜日中之道也然考之古注言大而亨者王之所至財多德大非王者之德不能至之又言豐之為言闡宏微細通夫幽滯者也為天下之主而令微隱者不亨憂未已也故至豐亨乃得勿憂用夫豐亨不憂之德宜處天中以遍照者也故曰宜日中果若斯言則類於後世恢張侈大之説於經文本旨失之逺矣自朱子之論出然後聖人憂世立戒之意灼然彰著於簡册而萬世帝王保泰之金鑑不外此焉然則欲求永豐之術亦轉思致豐之道而已矣周易豐亨王假之勿憂宜日中編修臣林蒲封程子曰豐為盛大其義自亨極天下之光大者唯王者能至之假至也豐之時人民之繁庶事物之殷盛治之豈易周宜如日中之盛明廣照無所不及然後無憂也臣謹按聖人作易所以闡天人之理而昭治亂之原其憂患後世之心甚深且逺如乾之終日乾乾夕惕若泰之艱貞無咎大有之艱則無咎既濟之思患而豫防蓋皆居安思危示人以保泰持盈之道也而其辭之深切著明者尤莫如豐卦焉先儒以為豐卦離明在內有見大之智震動於外有圖大之才明動相資勵精圖治何事不立何功不成天位之尊四海之富羣生之衆王道之大豐亨之象其唯王者乎然而聖人之憂自此始矣夫天下之治不生於四方寧謐之日而常基於艱難締造之時亂不始於羣生板蕩之秋而常伏於宴安逸樂之際厯觀前世創造之初經營勤苦以致清平逮至積安日久外無兵戈之擾內無水旱之災海宇乂安民物殷庶問其地利則田疇非不盡闢也問其物産則技巧非不畢陳也問其詔令則堯舜之典謨也問其典章則成周之禮樂也政教賞罰無一事之不全聲明文物無毫釐之不備一若朝廷之上無過之可稱無失之可指無偏之可矯無闕之可修從容清晏文恬武嬉方以為可以久安長治萬世無患也於是乎驕惰之心生驕者玩兵黷武窮泰極侈人心解體馴至亂階秦隋之季是也惰者沉酣宴安慮不及逺善惡混淆迄於不振漢唐之季是也是以當禍亂既成之後竭天下之才智救之而不足而於太平無事之日以人主之一心持之而有餘所以古之聖王凜天命之靡常察盈虛之遞運治安已致愈切憂危卑宫惡服慮侈汰也不遑暇食防逸豫也栗栗危懼戒驕溢也動守憲度虞禍亂也不為嗜欲則娛樂之言無自進不好功利則興作之計無自生信賞必罰誰敢矯誣兼聽並觀誰能壅蔽健行不息如皎日之中天無倚無偏使文明之常晝日中之象此其至乎虞書有曰兢兢業業一日二日萬幾又曰敕天之命惟時惟幾蓋言治亂之介於幾微也夏書曰豫臨兆民凛乎若朽索之馭六馬商頌曰不僭不濫不敢怠遑周書曰心之憂危若蹈虎尾涉于春氷周官曰若昔大猷制治于未亂保邦于未危皆言治安之不可恃而憂虞之不可忘也周之積仁纍善至成王之時為極盛矣而召公作誥猶諄諄以祈天永命為言後世之稱致治者莫如漢文帝唐太宗而賈誼以為積薪厝火至為流涕太息魏徵十漸疏動色相戒惟慮不克厥終蓋履極盛之勢而動之以戒懼處至治之時而保之以祇慎者自唐虞三代而下聖君令辟莫不同然是豈好勞而惡逸哉凡以廣太平之祚保豐盛之基使休光美實日新嵗益熙熙皥皥循之無窮至千萬世永有法則也然臣嘗即卦象而推之程子所云盛明廣照無所不及者蓋即堯之光被四表孟子所謂上下與天地同流以釋日中之説其義大矣而於聖人垂象著戒之意猶有所未盡焉蓋治極則亂盛極則衰氣數循環不可不慎故彖傳曰日中則昃月盈則食天地盈虛與時消息言王者履豐之盛如日之中尤宜制節謹度修人事以挽天時守謙集益建極執中憂天下之憂故能樂天下之樂至於德備諸巳而福集厥躬賴及四方而慶流萬世皆不外於日中之義推而致之臣愚以為保泰持盈之道其深切著明莫如豐卦者此也周易重巽以申命給事中臣倪國璉程子曰重巽者上下皆巽上順道以出命下奉命而順從上下皆順重巽之象也君子體重巽之義以申復其命令申重復也丁寧之謂也臣謹按巽之取象在天為風在朝廷為命令風之吹物無處不入無物不鼓動詔令之感人淪肌浹髓亦如風之動物無不至也蓋以天下之廣萬民之多欲其一一咸喻主志去其不善而咸歸於善非命令無以為功巽有命令之象王者之彞訓本乎皇極垂為典謨渙汗之頒隨風而布其視天下之人猶一家之人則不可不家諭而户曉古者布之始和懸之月吉常不憚反復丁寧使中外臣民咸喻厥旨而曉然於仁育義正之王心故民雖至愚至賤而王者不敢以愚賤忽之凡有所期會約束訓諭誥誡既順乎人心之所同尤察乎人情之至隱既熟習乎耳目之間而不駭其聽聞尤深愜其寤寐之中而咸孚其志氣此所以往復開導至再至三亮天之工即代天之言布天之化即象天之聲和風之所鼓蕩宣暢欎結而無所滯善言之所牖迪感發深隱而無不通夫豈徒事文告哉有不得已於言者則委曲詳盡皆仁心之流露雖諄復而不覺其煩有不敢略於辭者則提撕警覺皆教思之無窮故輯懌而彌形其暢是以敷揚天命敬述祖訓出如綸綍致慎樞機王者本不輕於言而既出之為命又重以申之所以法巽之無乎不入而上情既達下意即罔不孚也考之周禮遒人以徇道路撢人以誦王志蓋風告四方宣通德意自古志之此欽承聖人之言者乃無不如風草之偃也由是道德以一風俗以同所謂令出惟行而聲教無不暨訖者蓋取諸巽有如此周易象曰隨風巽君子以申命行事編修臣張若需程子曰兩風相重隨風也隨相繼之義君子觀重巽相繼以順之象而以申命令行政事上順下而出之下順上而從之上下皆順重巽之義也命令政事順理則合民心而民順從矣臣謹按人君法天出治有怙冒天下之量即有鼓舞天下之權薄海之廣兆人之衆所以一其心思牖其耳目俾相安於禮樂政刑之內而罔有拂戾者固由於沐浴陶淑之甚深實則命令之頒感人為獨切而率民以易從也是故虞廷命官不廢疇咨之義成周布政式垂象魏之文帝王致治固在躬行然亦何嘗薄誥諭為虛文而顧崇清淨無為之化乎夫法教百端令行為上所謂堅如金石信如四時無私如天地者凡以示其事之必可行而先為丁寧告戒之也小民至愚難於慮始國家興大利除大害將舉一世而轉移之使不為之反覆開陳堅明約束將利於千萬世者或不利於目前利於千萬人者或不利於數人必且多方以相撓展轉以相遁使德意終格而不行此巽命之申所以必在未行之先有以袪其蔽而安其隱也然或詔令所布未嘗不愷惻周詳聳人觀聽而無良法善政繼其後則德音之播幾為紙上之空言而無逮下之實事其於民生國計鮮所禆益又明矣君子觀於重巽之義而知申命者所以致其戒於行事之先而喻之以可從行事者所以踐其言於申命之後而示之以必信言行君子之樞機而立綱陳紀之間尤大彰明較著者也且夫巽之為義取象於風風感物而易入命順民而不違其理一也人君無一息不為小民圖安全謀衣食富教兼施經綸大備舉窮簷蔀屋之隱畢籌之宵衣旰食之中然後沛然布之下其令如流水在上既無咈民從欲之舉斯下自昭丕應徯志之實傳曰民之所好好之民之所惡惡之上順下也書曰是訓是行以近天子之光天子作民父母以為天下王下順上也上下交相順而政無不立法無不行天子垂衣端拱精神周四海之遙小民樂事勸功尊親切一人之戴寰宇之內靡然向風而蒸蒸丕變所謂大順大化不見其迹莫知其然者聖德之神不且渾然與天同運也哉周易象曰隨風巽君子以申命行事編修臣徐景熹臣謹按聖王治天下政事務在必行而政事之行貴乎號令之相繼必使百官以及萬民朝寧以及四海莫不知聖王敷治意旨之所在而後庶績以理百務以成也如天之雨㿩寒燠各著其時唯風以兆之亦唯風以散之其象取乎頻相加其性取乎順以入而相繼者無或息則無物而不被其噓植矣國家之行事必先以申命者其亦有隨風之象焉今夫隨者相繼之義也以巽之二體相成協應無已而生機所觸有以萌發乎品彚之朕兆故河圖帝通紀曰風者天地之使是風即天之號令萬物得以育生而知所仰者以其號令之頻施耳而况禮樂刑政發於朝扆堂陛之上以之渙號於天下而罔或有違者獨無逡巡之開示乎是以聖王之設施其敷政之美意必有以深洽於民心布化之良規必有以深切於民隱乃體巽之君子則不遽求之民也明彞訓以示寰區雖反覆而不為勞雖勤宣而罔或懈委曲開導中復深寓乎愛惜憂勤之意既勞來以使之樂從又提撕以令其感悟朝夕勸勉再四丁寧忠厚悱惻之深情不覺纒綿於靡已此所以發號施令吻合民願而凡事之欲行者無不奉命惟謹以視風之養物成功變化成道入微以相喻唯恐其不周奏聲而相宣復恐其或驟者有以異乎無以異乎且巽之施命其有關於文教風化不獨一卦為然如小畜之懿文德則風行天上者也蠱之振民育德則山下有風者也觀之省方設教則風行地上者也姤之施命誥四方則天下有風者也即漸之居德善俗鼎之正位凝命要皆不離乎巽以取象者也古聖人出身加民天下皆知其意之所向而積漸以共明之則順而易入矣故申者申其意而非申以法命者命以安而非命以強申命者所以誥誡於行事之先預酌乎人情之順不啻三令五申至詳至悉而後見之施行民乃即事而深喻其意也已且行事即以踐其所申之命者也茍行事而不申命則民無所信從而大業未易舉或申命而不行事則民亦無所向風而宏猷仍未易集蓋以實效之不可不漸臻耳書曰星有好風傳曰君子之德風風之時義大矣哉要期乎漸以圖之順以成之而號令必有以相繼也聖王建極萬國咸寧庶事之康端在是與周易六四渙其羣元吉中允臣彭啓豐胡瑗曰天下之渙起於衆心乖離人自為羣六四上承九五當濟渙之任而居隂得正下無私應是大臣秉大公之道使天下之黨盡散則天下之心不至於乖散而兼得以萃聚故得盡善元大之吉也臣謹按渙卦自六三以上皆因渙以拯渙者六三隂柔而不中正居無位之地止於其身無悔不能及人六四上承九五為大臣之象居隂得正絶去黨援以柔順輔剛中可以拯天下之渙而無難程傳言天下渙散而能使之羣聚可謂大善之吉朱子謂程傳文義是羣其渙非渙其羣也蘇洵有云羣者聖人所欲渙以混一天下此可補程傳所不及蓋物以類聚之謂羣周而不比之謂渙人心之所以暌由於各挾其私不能混一惟散一已之黨即散天下之各立為黨者合之使天下臣鄰聚為一心聯若股肱以效忠藎於一人所謂散小羣以成大羣也夫朝廷之上是非可以力爭可否期於共濟不但依附功名阿結黨援之念不可稍存即事關國計民生之大而偶涉意見之偏不知通變以宜民即不能實心以為國其本在於廓然大公和衷交贊而已昔歐陽修作朋黨論謂君子有朋小人無朋而引漢唐之事以為鑑蘇軾作續朋黨論謂君子如嘉禾封殖之甚難小人如惡草不種而自生夫小人以勢利相結納終必至於相傾軋即負名教之尊而黨同伐異亦不可為君子故歐蘇之説俱未得其正也且夫渙豈中立調停漫無區别之謂哉其識足以辨賢姦而惟以人事君其權可以進賢退不肖而惟君命為重靖共爾位正直是與王臣之蹇蹇匪躬相臣之休休有容皆於渙其羣端其本矣大君虛已以建極無作惡無作好早以離去偏私為聯屬人心之本用資六四巽順之德成九五剛中之功宜乎渙汗大號而幽滯皆宣也周易天地節而四時成節以制度不傷財不害民監察御史臣陸尹耀孔氏頴達曰天地以氣序為節使寒暑往來各以其序則四時功成也王者以制度為節使用之有道役之有時則不傷財不害民也臣謹按節者限而止之之義也此卦兌下坎上坎水之流無窮兌澤之容有限以有限蓄無窮有過溢之虞故利用節非節省之謂節乃節制之為節也卦體隂陽各分其半均而不偏二五陽爻居中得位限而不過體此義以措施於政事是操節制之權而法天象地因時制宜變化從心權度在握制節謹度約己省躬費出有經用財不濫無無藝之求無橫征之稅斯不致傷財而害民矣彖辭大意如此臣愚竊臆一時有一時之節一事有一事之節與其既溢而思所以節之不如未溢而先有以節之也試觀天地之運隂極陽生陽極隂生刻刻相生時時相節故能寒暑代嬗氣序不忒而嵗功於是乎成焉然天地者不言而化無為而成者也若聖人而為天子者中處天地之內凡天地之順布者固當推行而盡利即氣化之不齊者亦必裁成輔相以合其宜於是法天地之節而制為度數尊卑有等輕重有倫上下有辨文質有宜皆所以為節也即如制用一端國家之嵗入有數以其所入供其所出過豐過儉皆過也是以斟酌損益制為常典祭祀有常品匪頒有常式燕饗有常儀錫豫有常物蓋布帛絲粟即閭閻生計所聚龜貝泉刀實斯民命脈攸關茍無常經多方以耗之將必多方以取之安保其不傷財害民者哉故卦辭既戒以苦節之不可貞矣而此彖復申其義謂當法天地之節而節以制度者蓋欲其隨時隨事而豫為節之庶多寡隆殺各中其節焉而後萬化之原以裕萬姓之命以安也彖辭之言節也可謂深切著明矣周易節以制度不傷財不害民檢討臣熊郢宣邱富國曰聖人體節之義則立為制度量入為出無過取無泛用有損己益人之實而無剝下奉上之事故不傷財則不害民矣臣謹按天生五材民並用之八政之條首惟食貨是財者生民之大命天下不可一日無者也有財用而後民事興君職即於是乎在焉夫民不能自為治治之以君君不能自為養養之以民原以一人利天下非以天下奉一人即其取諸人者還以致之人耳惟酌劑之有經斯國無匱乏之虞下有豐裕之休矣此聖人因天時之有節推其道於理財安民誠為有國者之要務也凡物必有所限始能節而制尚矣物必有所準始能節而度昭矣制則守不易之章程而無或過也度則循一定之規畫而無不及也過為奢奢不可崇也不及為陋陋不可訓也節之以此所以防微杜漸者不亦深且逺哉人情之易縱也處約則斂抑是務恆存歉然不足之懷處樂則志滿氣溢遂有不能自持之意况人君擁四海之富居九重之尊何所求而不得何所欲而不遂乎茍不致審於天人理欲之界以别其途則一念之敬肆即為生靈之休戚所係國家之治亂所基使發而為道心也自檢束於義禮之中謹性情節嗜好嚴恭於朝夕者其必量入為出而經費有常也其必謹小慎微而潔巳厚下也則侈泰之私何自而乘乎否則人心熾矣聲色貨利之投無在非馳情蕩志之具宫室之居必欲其美服飾之奉必求其華器用之供必致其巧耳目之靡麗何窮府庫之金錢有盡所謂積之百年而不足用之一旦而無餘將度支既竭稅斂轉增勢所必至矣祇此節與不節之故始於方寸者甚微及於國計民生者甚巨得則咸足失則交困利害之相因若此能不遏其機於將萌而防其患於未著哉蓋君心為萬化之源君身為百度之表但使宫寢之上一興作而思物力之艱難一服食而知閭閻之疾苦不敢暴有限之財物以從欲不忍朘小民之膏脂以自便惟是省約宅衷初終弗異則乘輿服御之有定制也宴饗錫豫之有常典也土木營繕之不事珍奇玩好之不至於前也嵗入之貢賦無耗蠧以時之蠲賑有儲蓄敦龎朴素之風釀為豐稔蒸為太和遂以養蒼生無窮之厚福培國家無疆之丕緒也孰非此能節之所致哉昔堯之茅茨土階而黎民於變禹卑宫室而績底平成即漢之文景弛供御以便民賤珠玉而重農桑幾致刑措之休者亦節之之效也書曰慎乃儉德惟懷永圖孔子曰節用而愛人亦此意與周易君子以制數度議德行庶子臣周資陳孔穎達曰數度謂尊卑禮命之多少德行謂人才堪任之優劣君子象節以制其禮數等差皆使有度議人之德行任用皆使得宜臣謹按制數度議德行帝王節天下之要道也諸儒皆謂數度之制因其在人德行之議修其在巳獨孔穎達謂德行為議人之德行以任用辨材論官似於議字較切且寓慎重名器愛惜爵祿之意尤合節之本旨况君子乃以聖人在天子之位而議禮制度以節天下者自非徒一身之事故制數度以政事而言謂尊卑禮命之輕重議德行以人才而言謂大小賢能之優絀審其自然權其當然節也者人才政事之大防也數以為度度辨於數如一命再命三命之類是也制之而凡輿服宫室立為科條莫不有多寡之等使賤者不得以踰貴卑者不得以踰尊所以防其僭擬凌逼之漸德以為行行軌於德如書所謂亦行有九德亦言其人有德乃言曰載采采是也議之而凡名器祿秩設為品級莫不有黜陟之典使德之大者居上德之小者處下所以防其玷混濫冒之端上下辨而民志定賢才輔則天下治君子節天下之道所以執要不煩也然而上行下效捷於影響凡王政之推行而盡利鼓舞而盡神者皆其由巳以及人者也故節之道行乎天下而節之本在乎君身數度德行不本君身言則其理終不備五服五章在人之數度式玉式金君身自具數度焉敘賢敘能在人之德行擬言議動君身實倡德行焉帝王首出必先舉制之議之者端其本於身所謂皇建其有極也而後以制之議之者達其用於人所謂會其有極歸其有極也節之所以能通而且清心寡欲之主在上則清明在躬志氣如神以之制數度而制乃盡善以之議德行而議乃咸宜尤節之所以無弊君子之體節者至矣周易彖曰中孚柔在內而剛得中説而巽孚乃化邦也檢討臣萬松齡程子曰二柔在內中虛為誠之象二剛得上下體之中中實為孚之象臣謹按易之為書廣大悉備性命精微之旨具載於中而六十四卦獨不言誠者何也在天成象在地成形在人成性無非此真實之理所彌綸而貫注故元亨為誠之通利貞為誠之復六十四卦之不言誠正無一卦之不言誠也顧其理之尤為親切著明者莫過於無妄中孚無妄者純乎天而不雜乎人者也中孚者盡乎人以復乎天者也夫隂陽之道不過剛柔而吾心之理不過虛實朱子云一念之間中無私主謂之虛萬理俱備謂之實中孚之三四以柔在內是為中虛惟其中虛所以受信也中孚之二五以剛得中是為中實惟其中實所以為信也實理充乎其內而外邪不得以入之則中孚之體於是乎立矣外邪既不能入而虛明之本常惺不昧無思無為而物來順應則中孚之用於是乎行矣惟至虛乃為天下之至柔惟至實乃為天下之至剛雖有作用視聽言動其實無我我意猶無安得有偽是謂中孚孚在中也故老子亦曰真精之中其中有信也而又曰説而巽者何也卦體上巽下兌兌悅巽遜悅則和順而易從巽則漸漬而不迫蓋於穆不已人同得此以為心原無一毫偽妄得以參於其內惟雜以有我之私則間隔矯強之形生矣中孚無我則和悅自生和悅既生則矯偽不作上至誠以順巽於下下有孚以説從其上故不期孚而自孚無往不孚則無往不化雖萬邦之逺如堂陛然蓋萬物之性其天俱不容偽是以聖人在上鳥獸草木咸若何者其天同也物得其天未有不熙然而遊快然而育者雖豚魚亦且感格而於化邦乎何有誠以孚乃億兆人之本心有感之而無不應也然天下有一人未孚即孚有一毫未到至孚乃化邦此即夫子所謂修己以安百姓皆性體之擴充非直事功之效驗也惟堯舜之主始足以語此豈漢唐之雜霸所可幾哉夫合天下之理而歸之於心合天下之心而歸之於孚而毫無意必固我之私反之於天命之初殆無少虧缺此盡人以復乎天始克全其無妄之真體而天人相契之幾微矣故下曰中孚以利貞乃應乎天也然則中孚之道一誠而已矣乾之九三曰君子終日乾乾夕惕若厲無咎而夫子繫之以辭曰忠信所以進德修辭立其誠所以居業忠信也誠也皆孚在中也則所以密致其功者亦唯是朝乾夕惕健行而不息則德益日進而業益日修矣周易君子以思患而豫防之監察御史臣陳仁臣謹按天下之患每生於所易忽而發於所不測故賢聖之君博觀今古窮極事理而是非較然夫天命靡常有治則有亂有安則有危然亂不生於亂而常生於治之時危亦不起於危而常起於安之日惟人主恃其久安而狃於常治不思所以豫防之於是亂生而危至矣自古天下治安而致禍亂者不可勝數姑不具論論其最著者漢元帝遭世承平四夷嚮風然優遊不斷務為姑息知蕭周之賢善善而不能用知恭顯之姦惡惡而不能去賞罰倒置百度廢弛自永光以來受制羣小賊害忠良西漢之衰決於此矣隋煬帝坐承富強之業志驕氣盈慨然慕秦皇漢武之為人窮奢極欲兵連四夷政煩賦重盜賊蜂起而猶巡遊不息惡聞直言天下怨叛遂以滅亡唐明皇既平內亂勵精圖治開元之際幾致太平何其盛也及侈心一動怠於政事殫耳目之玩窮聲色之巧姦臣執權艷妃亂政南詔之敗冥然不知至於寵用聚斂之臣竭天下以自奉致使祿山専以貨寶交結左右蒙養姦慝其後乘輿播遷唐祚不絶如線元順帝當熙洽之餘忽盈成之戒荒於逸樂朝政日紊是時羣雄割據四海鼎沸而帝猶不悟迎西畨僧行運氣之術教宫女作天魔之舞又於內苑造龍船俱五采金裝日於後宫海子內遊戲荒淫如此安得不亡由是觀之治極則亂安極則危憂亂者其國常治恃安者其國常危此理之必然者也向使四君者於其全盛之時皆能逆探其未然之患而豫防之則至今可以不廢惟其履盛滿而不知戒或戒之而必待其著故禍發而不可救古之有天下者非以得位為樂也日出而朝而惕然以思曰毋役耳目與毋殖貨利與毋拒忠讜與日中而聽而凛然以思曰毋邪臣進而正士消與毋弋獵勤而遊幸多與毋宫室崇讒夫昌女謁盛與日入而息而悚然以思曰毋屑越於舞女酣歌與毋耗志於蓬萊方丈與毋刑法太密而詔令太繁與乂進庶人而問之曰毋飢寒切於肌膚而吏莫之省乎則怨我者乎進士而問之曰毋化不下究而積行之君子壅於上聞乎則謗我者乎進諸大夫而問之曰毋尊卑濶絶而上下之情不通乎進諸將而問之曰毋烽舉燧馳多壘於郊而棨戟不寧者乎凡此者非以為茍勞也蓋恐一物之失理故事事而思之一事之失宜故時時而慮之慮之於無事之日而尋其端緒之所自起究其流弊之所必至以曲盡其防間之術使不至於患也易曰安不忘危存不忘亡書曰制治於未亂保邦於未危此物此志也茍為不然驕縱淫佚徒取一時之快而不為異日之圖一旦馴致於覆敗禍亂無可奈何之地雖有聖人亦無能為矣是故君子之為國也欲祈天而永命必思艱以圖易周易六四繻有衣袽終日戒監察御史臣甄之璜程子曰當既濟之時以防患慮變為急繻當作濡謂滲漏也舟有罅漏則塞以衣袽有衣袽以備濡漏又終日戒懼不怠慮患當如是也胡炳文曰乘舟者不可以無繻而忘衣袽亦不可謂衣袽已備遂恝然不知戒水浸至而不知則雖有衣袽不及施矣臣謹按此周公欲占者處既濟之時宜預備而戒懼以為保邦之計也夫時當既濟豐功赫奕至德昭宣兆姓享樂利之休萬國集玉帛之會人莫不謂巳治巳安而可無煩籌度矣乃公繫四爻之辭丁寧示警既曰繻有衣袽又曰終日戒豈故為是鰓鰓過計哉蓋統蒞衆則間端易萌承平久而逸志或起須知有備無患王道之良圖思患預防君子之逺慮故彌後患者當裕之於先事撫大業者貴持之以小心使繻漏已形而始謀禦患之具則倉猝求之其勢必無及矣抑衣袽有備而恃為無恐之資則悠忽將之其失仍不免矣惟時雖無患常恐患之或生而所為圖之務周儲之務早者預備既不忽於尋常變雖有備猶恐備之不密而所為察之務謹防之務嚴者戒懼復不忘於頃刻夫而後攸往有利涉之功臨深無胥溺之害也四值既濟之時而為坎體居近位其象固如是耳公意以為居安思危保至治於萬年者君與臣均有責焉故綢繆未雨既託為鳥音以告其君而繻有衣袽又繫為爻辭以朂其臣君臣交勉警戒無虞周之所以傳世三十綿祚八百者其有賴於此義也夫御覽經史講義卷七
