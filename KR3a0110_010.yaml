  text: 欽定四庫全書御覽經史講義卷四目録
  hash: sha256:9f1a30537bed064f3a2dbf4076c54cab394726ee38477f9d0f58bb55d6d5bbc2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0110_WYG_010-1a, image: WYG0722/WYG0722-0140c.png}
body:
  text: 周易同人于野亨利涉大川利君子貞監察御史臣周祖榮同人于野編修臣徐以烜文明以健中正而應君子正也唯君子為能通天下之志編修臣夏廷芝唯君子為能通天下之志編修臣沈文鎬同人君子以類族辨物侍講臣劉綸其德剛健而文明應乎天而時行是以元亨監察御史臣湯聘監察御史臣周琰監察御史臣劉永泰應乎天而時行監察御史臣倪國璉象曰火在天上大有君子以遏惡揚善順天休命監察御史臣邱玖華九二大車以載有攸往無咎六五厥孚交如威如吉編修臣林枝春六五厥孚交如威如吉檢討臣仲永檀監察御史臣陳髙翔上九自天祐之吉無不利象曰大有上吉自天祐也編修臣李龍官上九自天祐之吉無不利編修臣儲晉觀謙艮下坤上初六謙謙君子用涉大川吉象曰謙謙君子卑以自牧也六二鳴謙貞吉象曰鳴謙貞吉中心得也九三勞謙君子有終吉象曰勞謙君子萬民服也六四無不利撝謙象曰無不利撝謙不違則也六五不富以其鄰利用侵伐無不利象曰利用侵伐征不服也上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也詩監察御史臣李敏第謙亨君子有終編修臣王錦謙亨天道下濟而光明地道卑而上行給事中臣鄒一桂監察御史臣包祚永天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰監察御史臣金溶九三勞謙君子有終吉監察御史臣周祖榮天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服檢討臣邱玖華監察御史臣胡定
