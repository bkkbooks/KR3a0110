body:
  text: 禮記盛德在木編修臣陸嘉穎孔頴達曰天以覆蓋生民為德春則為生天之生育盛德在於木位臣謹按造化之運行循環旋轉惟春則在寅之月嵗之始天道發育之意於焉泄其機緘而五行之序有合於生物之心此月令於天子迎春之事有盛德在木之説也今夫上天之德廣矣大矣天運四時總以生成萬物為功者也生物之始曰元於時則為春生物之通曰亨於時則為夏生物之遂曰利於時則為秋生物之成曰貞於時則為冬四時之推移各自運行而無錯雜而獨春之為德也與冬相交接貞下起元天地交而二氣通於卦為泰自子至寅三陽生而三才之道咸備夫然後夏長秋收冬藏遞為乘除而萬物生息於不窮是蓋天有元亨利貞之四德而元無不統因之有春夏秋冬之四序而春生之氣無不統也其為盛德固有然者若夫仁主春生東方木也易繫辭曰萬物出乎震公羊疏曰陽氣施生愛利之道是則春者養生之首木於是乎暢茂焉嘗以五行論之有以水火木金土言者行之序也有以木火土金水言者生之序也蓋木生於河圖天三之位専屬陽而其行於春也亦為陽陽之發達於木有定質焉月令之言盛德固取其相生以著春令之發生云爾且夫天運四時以生成萬物君子法五常以教化於人上而朝廷百官下而農工商賈大而禮樂兵刑微而法令品式何一非順時者方春之日其位居東取義於木尤為人事所肇始覆蓋生民之德於焉日新矣吕氏春秋曰太蔟之月陽氣始生草木發動令農發土無或失時聖人仰觀俯察敬授人時從此耕穫災畬築場納稼各以其候羣生雍容萬類咸若相與詠歌盛德而為此春酒以介眉夀也夫禮記是月也天子乃以元日祈榖于上帝乃擇元辰天子親載耒耜措之于參保介之御間帥三公九卿諸侯大夫躬耕帝藉監察御史臣馬燝鄭注謂以上辛郊祭天也春秋傳曰夫郊祀后稷以祈農事是故啓蟄而郊郊而後耕上帝太微之帝也元辰蓋郊後吉辰也耒耜之上曲也保介車右也置耒於車右與御者之間明己勸農非農者也帝藉為天神借民力所治之田也臣謹按古聖王之敬天勤民也每以農事為兢兢故一嵗之中有祈有報有耕有藏莫不慎重周詳垂為盛典誠以民之大事在農上帝之粢盛於是乎出而孟春建寅之月土膏初動尤農事之所肇興此祈榖耕藉之禮所以次第舉行必躬親之用仰神庥而奠民命敬之至也臣嘗考春秋魯襄公七年夏四月三卜郊不從傳以既耕而卜郊為非禮乃知啓蟄而郊祀后稷以祈農事即孟春之祈榖于帝也郊而後耕即祈榖之繼以耕藉也鄭氏引此以見天者民之命而食者民之天其典至巨其事相因均無敢忽耳且夫藉田以供粢盛季秋藏帝藉之收于神倉祇敬必飭古者祭祀必待親耕之榖不以他榖為祀榖梁傳曰天子親耕王后親蠶非無良農紅女也以為他人之所盡事其祖禰不若己自親者也而謂可不躬親之為天下遊手惰業棄本逐末者勸哉至於藉之為義應劭云天子耕藉田千畝藉者帝王典籍之常韋昭云藉借也借民力以治之以奉宗廟而勸農胡瓚云藉蹈藉也以躬踐為義非假借之稱諸説不同要之躬耕為古今大典而借民力所治之田以躬親之為天下先上以備粢盛下以興農功皆聖王之盛舉也是惟有敬天之心者乃克盡勤民之事有勤民之念者益以見敬天之誠故祈榖以為民也而必于帝則知致慶盈寧皆本佑助乎天噫嘻之章所以咏昭假也躬耕以承天也而名曰藉則知親厯隴畝無非借資乎民載芟之什所以咏其耘也與凡日必用其吉辰必擇其良不憚勤勞至周且悉茍非農事之厪念者甚深安能盛典之舉行大備如是哉禮記聘名士禮賢者編修臣任端書臣謹按月令一篇或曰成於吕不韋後世儒者多疑之宋陳㿩以為聘名士禮賢者隨時可行不必正月而始舉其事著以為令也臣嘗詳考其旨古者布政必順乎天地之氣而合其理是故刑威施於秋冬慶賞施於春夏此二者固慶賞之大端於方春而奉行之無疑也在易正月為三陽之卦泰卦也自此而同人自此而大壯天氣下降地氣上升君臣交而志通象以著焉是以王者法之而布為憲令則名士之聘與賢者之加禮孰有宜於此時者乎漢王充曰才士者朝廷之鴻寶賢人者國家之雲雨鴻寶登則金玉聚而資富不窮雲雨盛則潤澤多而被物斯廣故聖王在上欲使天下治安社稷長久未有不勤勤於此者也今夫賢士之伏於蓬茅猶珠玉之藏於山澤求珠者必於赤水之中採玉者必於崑山之內彼士之與賢抱道自重不求聞達簞瓢陋巷樂在其中蓬戶桑樞鳴琴在室其蕭條寂莫之况行自甘焉初不計上之聘與禮否也故逸詩有曰綿綿之葛在於曠野良工得之以為絺紵良工不得枯稿於野夫使抱德之人懷竒之彥含章不耀韞彩勿呈托泉石以深藏處山林而終老若是者聖王所甚念也於是春日始和命使者飾安蒲束帛加璧往賁幽巖尺一賜書褒稱素履彰虛己之美節宏側席之髙風聘以當官共斯天位加之崇尚用懋人倫方使朝廷得之以為榮四海聞之而景慕其在書曰野無遺賢又曰俊民用章用此道耳由是觀之古之聖王思聞至論則企晤英人欲求共治則殷翹哲乂故雖朝已師師士皆濟濟而胥靡版築尚惟肖以旁求渭水持竿命後車而共載人君欲為天下計治安社稷謀長久其亦順天地之氣以行慶賞之政而可哉禮記命野虞毋伐桑柘鳴鳩拂其羽戴勝降于桑監察御史臣胡寶瑔臣謹按帝王體國經野物土之宜而布其利所以為小民裕衣食之源者至詳且悉是以既務農功必兼理蠶事治田之法即有樹桑之政書曰桑土既蠶言水土平而可就蠶桑也詩曰爰求柔桑又曰蠶月條桑豳風之言農事詳矣而於蠶桑亦必備述其始末至衛文公營立宫室卜吉允藏亦曰降觀于桑以其地勢宜桑乃可以居民遂命倌人勤桑田之駕蓋昔之聖君賢侯莫不於此加意焉而禮經遂著為令季春之月命野虞毋伐桑柘野虞者主田及山林之官桑為東方神木柘亦桑屬皆蠶之所食當蠶將生之時司其事者先禁民戕伐恐其有妨蠶食而愛之重之也當是時鳴鳩則拂其羽戴勝則降于桑物之應候而至者隨耳目之所遇咸足以䇿其心力之勤其亦布榖催耕之意歟於此可以知天時焉可以審地利焉可以觀物理焉皆所以勸人功也蠶事漸近而天時已至矣地利方興矣望嘉植之向榮聼禽聲之在樹細推物理如告以女紅之伊始焉一時井里之間胥勤勤於本務其淳朴之風太平之象不誠可繪哉夫一女不織或受之寒凡為政者孰不念桑柘之利與稼穡同功然知蠶之人南北各殊養蠶之地古今亦異豈其事之不可盡興哉亦在親民之官善於勸課而已考魏書食貨志初受田者男夫一人給田二十畝種桑五十樹宋史太祖建隆時詔所在長吏諭民有能廣植桑棗者止輸舊租伐桑棗為薪者有罪此即野虞毋伐之遺意所以廣植桑之利也然南史羅研傳又謂研為信安令故事置觀農謁者圍桑度田勞擾百姓研請除其弊惟善為化𨗳則民受其益而行之無實民亦苦其弊果得良有司以勸諭之使民自獲其利而欣然樂從則天時可乘地利可資動植有咸若之休織紝無怠棄之業斯衣食之本裕而永享乎樂利矣禮記命野虞出行田原為天子勞農勸民毋或失時命司徒循行縣鄙命農勉作毋休于都給事中臣鍾衡臣謹按食者民之天農者食之本先王念農事之甚重既以元日祈榖於上帝矣又親載耒耜帥公卿諸侯大夫躬耕帝藉矣又命田舍東郊以教道民矣逮至孟夏之月田功日盛民之趨於田疇者勞苦亦倍至天子於此豈不欲親履畎畝進農夫而告之以時不可失率作之不可以怠訓之以民生在勤勤則不匱然而田園縣鄙之間勢不能以遍及也於是外官則命野虞內官則命司徒野虞習知田事郊外田原之地所宜出行者也司徒職掌地官郊內縣鄙之地所宜循行者也先是下令於民曰凡爾農夫各舉爾趾各服爾耕土不備墾是謂棄地其有禁室有懸耜是謂廢業其有禁而由是勞之以奬其勞勸之以趨其功勉之以作其勤戒其惰凡若此者非好為此勞勞也荀卿有曰逮時而作過時而止老弱之力可使盡起又曰得時之稼豐失時之稼約然則時其可失乎一夫不耕或受之飢故民無職事者出夫家之征然則可使暫休于都乎夫力田之事在下而董民之責在上考之周禮教稼穡則有遂人巡稼穡則有遂師簡稼器修稼政則有遂大夫至合耦於鋤與夫趣其稼事而誅賞之先王為農設官既詳且盡若此乃月令之篇則有野虞司徒以崇奬勸勵之宜其上下相親日周旋於耰鋤襏襫之間民用罔不震動恪恭於農也詩曰曾孫來止以其婦子饁彼南畝田畯至喜上下親愛之意藹然可見又曰嗟嗟保介維莫之春亦又何求如何新畬則命之以盡心勸課意更何如其肫摯也後世非無巡農之官而或視為具文或無以宣上德意欲以興田功而洽民情難矣然則巡行勸課使地無遺利民無遺力日相習於勤勞而幾忘其督率者不在乎實意之流通也哉禮記命農勉作毋休于都監察御史臣胡寶瑔陳澔集説勉其興作於田野之內禁其休息於都邑之間皆恐其失農時也臣謹按道民之路在於務本惟本實既裕則民生日遂而稼穡為寶其自養之道不窮此民為邦本食為民天所以開蕃殖之始廣阜育之源者誠莫大於農政矣夫農天下之本也炎帝興耒耨之教軒轅肇畫井之功唐虞之世播種樹藝蒸民乃粒而萬世永賴焉至於無逸豳風詩書所載其言農事者甚悉三代聖王知興化致治政在養民而養民之道必以服田力穡為先務故當耕作之時勤於勸相使之力諸原而勿休於邑其重農貴粟之意無有加於此者而禮經於孟夏之月遂著為令曰命農勉作勸服勤也曰毋休於都戒遊惰也勸與戒交致農職於是乎益詳故周官之制旅師省耕遂師巡野載師徵惰民縣正定賞罰司其事者日與小民相接於田野之間督率奬勸之方可謂備矣誠講明而力行之以此為教民豈猶有自惜其力者乎漢時每敕有司以農為務且置大司農丞十三人人部一州勸農課桑天下安樂戶口綦盛焉一時循吏如龔遂黃霸召信臣杜詩輩皆以勸課致民殷富唐擇明識通方之臣持節勞徠宋亦有農師勸農使元則分布勸農官巡行郡邑皆古之遺風也蓋天子躬耕帝藉既已率先天下至於遣諭計吏少府水衡各置農官而刺史之行部又復鄉亭有勸載鋤耒於軺軒親藝穫於隴畝下觀而化民自知勤也使良有司能通此意而不視為具文勤宣上德親課其民其於農事豈僅小補而已哉且夫天時有生也地利有養也天時不能無愆伏而地利之髙下肥瘠亦互異故必人功盡而天地之澤可以資其有餘并可以補其不足所謂治田勤謹則畝益三升不勤則損亦如之其增減之在人者不可以天時地利為辭惟貴於人之能盡其力耳經所為勉其興作禁其休息欲民之務本也誠足為後世言農政者之所取法歟禮記仲夏之月律中蕤賔君子齋戒處必掩身毋躁止聲色毋或進薄滋味毋致和節耆欲定心氣百官靜事毋刑以定晏隂之所成侍講學士臣任啓運髙誘曰隂氣萎蕤在下如主人陽氣尊重如賔客隂氣始起於下陽氣強蓋其上故爭爭故必靜以安之鄭康成曰節耆欲定心氣微隂扶精不可散也晏安也隂稱安孔頴達曰君子謂人君以下至士齊戒所以敬𨗳萌隂也處不顯露又不躁動恐干隂也歌樂華麗之事為助隂故止之既止聲色故嬪房不得進御侍夕亦為微隂始動不可動於隂事也凡此清靜止息之事皆以正定身中安隂之所成就方慤曰止聲色欲其視聼之專毋進御女以解緩之時慮搖其精也薄滋味毋致和恐昏憒其志意也耆發於外欲動乎內皆主乎心故節耆欲乃以定心氣靜事毋刑不欲動而有為也徐師曾曰若此者正以天地之氣順則和和則致祥競則逆逆則生咎故謹於內外皆以正定晏隂而至於成不使微隂侵身而生疾侵陽以致災此順時致和之道也臣謹按蕤賔之義是時純乾陽德方盛微隂始生似陽為主而隂為客而先儒皆謂隂主而陽客者蓋隂既生而在內則在內者主而在外者客有必然之勢矣國語曰安靜神人獻酬交酢也蓋隂之性柔而善下能順能悅陽見其柔順可親歡然酬酢似相得之晚而不知由此以前自復而臨而泰然後大壯大之壯也如是其難即至於夬而猶孚號有厲即至純乾而猶終日乾乾夕惕若厲若是乎其難也乃甫一姤而易已言女壯矣隂之壯也如是其易故古語曰從善如登從惡如墜吾心理欲之幾賢姦進退之界國家治亂興衰之故皆隱於至微遷於不覺甚可危也甚可懼也君子以一心之中和位天地育萬物要不外於齋戒兩字盡之齋也者湛然虛明無一物之得攖吾寧也戒也者惕然警懼無一刻之敢或戲渝也月令於仲冬仲夏兩言齊戒仲冬陽之始也所謂於復見天地之心也仲夏隂之始也所謂於姤見柔之遇剛也君子戒慎不睹恐懼不聞何時不齊戒何地不齊戒而於此兩言之者隂陽之始善惡之幾也中庸言莫見乎隱莫顯乎微故君子必慎其獨此之謂也而於仲冬言去聲色禁耆欲於仲夏言止聲色節耆欲似於不必盡去之禁之者非寬之也蓋是時乾德全盛陽德方隆焉日中則昃而此未見其昃也月盈則食而此未見其食也驟而語之以聲色必去耆欲必禁似非人情然而曰止曰節已若怵乎為戒者其詞若寬而意深切矣蓋天地之道有陽不能無隂而此耳目口鼻之欲亦人所不能無也然天命之理藏於心而耳目口鼻之欲乘乎氣合心與氣以為身心者氣之帥氣者身之充而身者天下國家之本也心足以帥氣則足以檢身而理天下國家之本立矣故定吾心乃所以定吾氣也定吾氣乃所以安吾身也今夫心萬物之鑑萬事之衡也鑑空而後物無不照焉微塵集之而鑑已不空矣衡虛而後事無不平焉燥濕移之而衡已不虛矣聲色耆欲滋味皆所以塵吾鑑而移吾衡也偶一即之曰是何傷誠無傷也偶一快意曰是何害誠無害也譬之洪罏而點雪焉豈慮其滅譬之巨木而加一斧焉豈懼其撥然而不可不懼也姤者微隂之始也而易曰女壯矣坤之初六曰履霜堅氷隂始凝也甚危乎其始凝也詩曰相彼雨雪先集維霰甚懼乎其先集也浸假而聲之悅吾耳者沓而來浸假而色之悅吾目者踵而至浸假而滋味之適吾口者紛而集我於此能不留乎能不逐物而化於物乎故曰止之危乎其不復能止也曰節之危乎其不能復節也又况聲之來必有進是聲者色之來必有進是色者滋味之來必有供是滋味者必爭曰是何傷是何害且必曰非如是不足以怡情適性而愛養其身非如是愛養其身安得精神以理家國天下之繁任天下國家之重所謂其言大甘其中大苦者不可不察也蓋隂之性善下若最有禮者莫如之其用以柔若最適吾意者莫如之然始而窺其欲繼而中其欲又繼而逢其欲而耆欲遂無能復節矣又况隂得其志且假陽之勢竊陽之權駸駸乎堅氷之至哉君子之齊戒也於聲色之來怵然若驚曰此伐性之斧斤乎於滋味之至惕然若懼曰此晏安之鴆毒乎常以道心為吾身之主而人心之動於氣者皆退聽焉則隂陽不至於爭而生理常存而命自我立矣至於百官亦戒以靜事而毋刑蓋天下多一事不如少一事易曰吉凶悔吝生乎動詩曰不愆不忘率由舊章書曰率乃祖攸行蓋陽主動隂主靜陽動而妄則隂慝乘之而作故凡國家之多故未有不由於喜事者也其曰毋刑者陽為德隂為刑董子言陽常居大夏而以生育長養為功隂常居大冬而積於空虛不用之處此以見天之任德不任刑也如是則養吾身之太和并養天下於太和而隂之生者不惟不足以害陽而反足以助陽君子之所以致中和而位天地育萬物其道應不外此如此則乾德統天隂雖浸長而隂止足以為陽之助不敢為陽之敵豐之彖曰王假之勿憂宜日中子曰王假之尚大也言王者尚陽之大則陽常為主也勿憂宜日中宜照天下也言王心無欲常如日之中則中天之治且萬世無疆矣禮記君子齊戒處必掩身毋躁止聲色毋或進薄滋味毋致和節耆欲定心氣百官靜事無刑以定晏隂之所成檢討臣程恂鄭康成注微隂扶精不可散也晏安也隂稱安孔頴達疏齊戒所以敬𨗳萌隂也自齊戒至無刑皆是清淨止息之事以正定身中安隂之所成就臣謹按臣聞天有六氣而隂陽為之本春作夏長陽也陽極午中一隂乃生十二辟卦以姤當夏至六日七分董仲舒言陽得隂之助以成功使隂入伏於下而時出佐陽則自夏至六日七分始也以天地之氣驗之春則和煦在外而地中尚溫夏則炎燠在外而地中始寒然必隂生於中然後陽極於外故夏至十五日而溫風至又十日而土潤溽暑傳曰夏無伏隂言隂氣上搏斯陽氣畢達也今夫人身一天地也冬則中實其胍石夏則中虛其􅍺洪中虛者隂生於中之象也隂之性靜而其始生也柔靜則可以扶陽之精而植其根荄柔則不勝夫耆欲之攻而趣歸銷散故使隂時出佐陽而有功必先亷固節嗇以保此萌隂使日即於翕聚充實而後有以合乎陽而為之助是以月令仲夏之月條君子齊戒之事視仲冬不啻加詳焉臣繹鄭注之意微精之生以扶陽精故不可使散也隂稱安猶陽稱壯也又繹孔疏釋經之意居處不顯露又不躁動恐干隂也歌舞華麗之事為助隂靜故止之也女御不進微隂始動不可動於隂事也自齊戒至無刑皆清靜止息之事所以正定身中安隂之所成而已隂之所成謂陽也元臣吳澄亦曰內而掩身外而靜事皆是順時保養以安定初生微隂使漸至完成而無所虧傷是也陳澔主扶陽抑隂之説謂夏至之隂猶微隂微則盛陽未至至於甚傷故但言節耆欲冬至之隂猶盛隂盛則微陽當在於善保故直言禁耆欲其説似鑿又曰夏至舉隂事則是助隂抑陽也故止靜不行以備隂疾是謂隂生雖微總不當助非禮意矣夫月令之意正謂夏至微隂初萌感陽而生者得隂而成聖人於此敬𨗳萌隂使正定於中以輔陽而成功非助隂抑陽也助隂所以助陽也知仲冬之月齊戒掩身諸事皆為安養微陽則仲夏之月齊戒以下略無異文其為敬𨗳萌隂又無疑也所以然者隂陽之精互藏其宅隂陽之氣循環迭至以人身而論血隂而氣陽交滋互養則諧暢而多夀非有畸輕畸重之分也又如六腑屬陽而五藏屬隂隂性易於虧損難於充盈尤以滋養生息為貴豈可以助隂抑陽訾之哉更如姤之彖辭以勿用取女明示抑隂之意而聖人論卦之體則曰天地相遇品物咸章究非助隂而抑陽也月令仲冬仲夏皆曰隂陽爭亦曰隂方盛而陽欲起陽方盛而隂欲起云爾陽極隂生亦即品物咸章之義此與履霜之惕金柅之戒同歸而殊塗當求之法象之自然而得之也夫食味别聲被色聖人之同乎人也順其時中其節聖人之應乎天也然則齊戒以神明其德者聖人事天之全功而月令獨於二至著其文正以隂陽萌動之初當正定以安養之耳臣熟復諸儒義疏竊以鄭孔吳澄之説為得禮意云禮記天子乃與公卿太夫共飭國典論時令以待來嵗之宜編修臣羅暹春臣謹按月令一書王者因天之制也於季冬之月諄諄於國典時令者蓋事必籌於未事之先政必謀於立政之始其因時而制宜者乃其所以體天而出治者也夫日往月來天之健行而不已者原有日新之勢聖人則之生者因之以生成者因之以成有一時則有一時之政雖其政已行而先事圖維又何嘗不兢兢焉以求其後此之宜乎季冬之月嵗將更始其經營於一嵗之中者固已告厥成功而來嵗或有不同者不可不於季冬審之經之所謂國典者即周禮之所謂六典是也治典者冢宰之職教典者司徒之職禮典者宗伯之職政典者司馬之職刑典者司寇之職事典者司空之職其經國之大綱致治之條目無不備具所賴一人垂裳握其樞以運之也而民事不齊其間之或煩而或簡者必調和而飭正之則來嵗之所頒乃推行而各當此人事之不同者也其所謂時令者天體左旋一日一周而過一度日行少遲月行尤遲其間之參差而不一者固嵗嵗皆然由積纍而致之也而季冬之月必有以論之者蓋來嵗之時令各殊則來嵗之寒燠亦異寒燠既異而農功之先後以及政令之緩急又宜詳察而審定焉此又因天時之不同而斟酌以待之者也然則寒暑推遷者天道生物之功自強不息者聖人法天之用當四序既成之日猶與公卿大夫詳求焉思所以待之則天時運於上人事推於下來嵗之所以經邦國理萬民者固已綱舉目張而政無不立治無不成合上下同流而無毫髮未盡之憾矣臣故曰月令一書王者因天之制也禮記聖人參於天地並於鬼神以治政也處其所存禮之序也玩其所樂民之治也故天生時而地生財人其父生而師教之四者君以正用之故君者立於無過之地也監察御史臣周祖榮陳澔曰此承上章言政之事臣謹按鬼神者天地之功用而造化之迹王者父天母地而子萬民鬼神為之憑依焉氣機之默孚根於性命而禮樂富教其顯焉者也上章言政本於天即董子道之大原出於天之意此章言天德與王道本同條而共貫天與地偶其益無方降衷於民厥有恆性聖人允執厥中以為盡性至命之本由是盡人物之性致人物之命於以成位乎中並列而為三焉其敷而為政凡仁義興作制度亦極變化而不可測矣而皆由祖廟山川五祀而推之易曰成變化而行鬼神又曰知變化之道者其知神之所為乎以是觀之聖人擬並鬼神正所以參贊天地此蓋持乎政之原善乎政之用而使之綱紀燦陳以克協宗子之任隂陽之司也天子建中和之極必以禮樂為首務蓋天地鬼神之所存上下設其象幽明鼓其機其彌綸而不可遺者一經禮之三百也其散見而不可象者一曲禮之三千也聖人明以處之則所過者化而别等明恩秩然其不淆矣天地鬼神之所樂交泰協其功合莫契其化其洋溢而顯諸仁者一萬民之遂生也其保合而藏諸用者一萬民之復性也聖人默以玩之則所存者神而綏來動和暢然其畢達矣此富教之任所由起而其要蓋自有本焉彼四時運化天所生也百貨流行地所生也人亦資始於天資生於地而父實生之人亦宜效乎天宜法乎地而師實教之惟君人者承天覆地載之任父乎天下之赤子師乎萬世之屯蒙稍有偏私治道以歉故王道以正為主政者正也誠得其正而用之則吾之心正而天地之心亦正吾之心正而氣順而天地之氣亦順由是以正朝廷正百官正萬民所為裁成輔相以左右民養生送死而教學明倫者皆為鬼神之所默契又何一之不臻其極哉雖然過中者必失正近功速效皆過而失中非純王之上理也是以王道大中而至正中者無過不及之名凡處事之得其正必由於不偏不倚能用其中乃立於無過之地而克建乎皇極耳非苐謹身寡過之謂也中庸之言中其義詳矣至王天下有三重歸於建諸天地而不悖質諸鬼神而無疑乾九五之剛健中正大人之學也孔子稱其與天地合其德與鬼神合其吉凶以是知議禮制度考文即此治政而處所存玩所樂之意也乾九五之中正即此以正用而立於無過之意也合而觀之庶見王道之極則歟禮記動則左史書之言則右史書之侍講臣彭啓豐延平周諝曰天子之於事則無為而其所有為者言動而已臣謹按周官有左右史記其言事蓋今起居之本漢武帝有禁中起居後漢撰明帝起居注自魏至晉則著作掌之唐六典有起居郎二人上掌天子之動作法度以修記事之史屬門下省又有起居舍人二人上掌天子之制誥德音以修紀言之史屬中書省宋沿唐制起居郎與舍人皆不典本省事而典職者自號修起居注凡二人朝會對立於香案前常日則更畨遞直於崇政邇英殿明初起居注為專官隆萬以後乃歸之史官至今因之夫人君動為世道言為世法當其恭己南面中心無為以守至正本無待監史針規而後心存警惕然自盤銘言日新丹書陳敬勝盛則為卷阿之矢音衰則有祈招之進諫伺厥起居編諸簡牘非徒誇記載之詳備而已唐臣杜正倫云臣職當修起居注不敢不盡其愚直若一言乖於道理則千載纍於聖德非直當今損於百姓也由是思之自動作燕間以至班朝蒞官既恐以怠忽偶萌者淆宥密之原又慮有非禮勿籍者為盛德之纍此則古來設監佐史之微意也昔貞觀注記稱為畢備太宗欲觀記録何事褚遂良不與君明臣直於此可鑑自唐宋以來慎重兹選所謂當用第一流者豈徒備員而已哉密邇德音陪侍經幄常願聖心湛然終始如一王猷允塞日盛月新凡有言動之媺懿炳然與星日為昭而足垂千秋之彛訓則載筆之光榮即遭逢之至幸也內返臣心惟以夙夜匪懈者積誠感動因事敷陳庶如古者兼知諫院之職並效拾遺補闕之忠而不徒存撰述之空名矣禮記動則左史書之言則右史書之編修臣程景伊臣謹按禮儀三百皆垂範於躬修而玉藻一篇尤致嚴於言動凡以尊居人上視效攸關位在德元聼瞻所係必纎毫之不忒乃聞望之兼隆然而崇髙實多自便之虞而聖哲亦有無心之過或容儀偶失而一嚬一笑播於四方或風旨微愆而如綍如綸傳之千里鶴鳴聞野既有實以畢彰草偃從風亦其機之甚速惟尊崇之莫抗故瑕纇之常滋與其貽悔於方來不若設防於未事聿稽往牒特置専官分左右而各畀乃司合言動而並書於簡相沿勿替振古如兹載考經文非無深意蓋因人以戒乎已則法宫之抑戒必深制外以養其中而聖性之中和益懋凡屬難施於載筆自將弗蹈於云為誠所以消過於無形而塞違於未兆者也較之風聲既著乃為白簡之爭形迹已成始效彤廷之諫其為事有後先之别而用力有順逆之殊洵黼扆之良規實古今之善制臣敬誦其辭深思其旨竊惟制動之道在於未動戒懼於不覩不聞之頃則敬以直內而動之源清矣慎言之道在於未言齋紱於無聲無臭之中則志能御氣而言之本端矣是其操存涵養之方雖不必盡資於臣職而檢制防間之力實足以大助於宸修其大端可約舉而知而要義必推詳而見昔宋臣范祖禹有言人主一言一動如臨之在上質之在旁則可以常享天下之奉蓋愛君之篤每憂明聖之偶虧而獻日之愚不覺芻蕘之甚陋敬倣盤盂之誡恭陳左右之銘極知抒末照於前編爝光有限袛以矢微忱於小草葵向無窮銘曰穆穆皇躬下土之式端冕垂裳臣民仰極顒顒卬卬四方為則慎乃起居罔有不飭凡動之道貴惟厥時幾微稍縱咎即隨之緬彼哲王兢業自持立之左史記載是司毋曰豫聖動無不吉在昔有言一人三失毋曰豫貴動輒隨心居髙可畏履薄臨深邃宇深沉重扃奧穾聖人居之儼如廊廟杜彼非幾謹兹宴笑大廷赫奕前殿尊嚴聖人履之常抱撝謙正其袺襘尊乃視瞻玉車犬翠華入蹕出警茍非其時弗驅以騁星旗雲罕析羽垂旄茍非其事弗遊以遨允克若時動容中禮如玉如金可法可紀是惟勿書書則盛美敬為此銘敢告左史以上左銘洋洋聖謨綸綍以宣民聼匪遙逺邇爭傳禁其躁妄乃保靜專非禮非法舍曰無然出好興戎罔不惟口易誡昭彰括囊無咎宣聖有訓言無所茍繄古哲王載言在右寧尚其簡勿尚其多惟多則敗雖悔如何寧尚其質勿尚其縟惟縟則支召愆莫贖細旃廣厦宣諭臣僚庶尹咸在屏息而朝慎乃出話德音孔昭鳳詔鸞書播告寰宇萬國承流式歌且舞敬兹渙汗聲教用普寬嚴互迪旨貴得中勿因喜怒而紊厥𠂻前後敷陳義宜畫一勿以煩多而岐所出慎此以往欽哉訓辭十行一札靡不可思傳諸奕祀典誥同垂右史識之葑菲無遺以上右銘禮記知類通達強立而不反謂之大成夫然後足以化民易俗近者説服而逺者懷之編修臣邱柱臣謹按天下有人材而後有治功有學術而後有人材朝廷日求賢以敷治而士每不足副其所求蓋學術疏而其所挾持者無具也是在教之得其道而已古聖王所以教士者周禮王制載之備矣學記復序其節次而要之於大成曰知類通達強立而不反甚哉其言之切也今夫百家九流偏長曲藝皆必習之專攻之久而後可以成其業而况為治者禮樂兵刑田戶賦役之類其事至繁而所關甚巨是豈可以素所不習之人而嘗試之歟聖門如子羔夫子猶患其未學誠慎之也曽鞏嘗言古之人天地事物之變古今治亂之理至於損益廢置先後始終之要無所不知其在堂戶之上而四海之業萬世之䇿皆得乃所謂知類通達者乎雖然天下乂有能言之士一旦身當其任遲疑顧慮而一籌莫展者矣朱子曰有所愛而不肯為者私也有所畏而不敢為者亦私也古之君子其於天下之事知之不惑任之有餘則汲汲乎其時而勇為之蓋強立不反而後得乎知類通達之用也故曰大成也由是升之於朝授之以職遇一事則心知其理出一令則吏服其明我之施於民者有批郤𨗳窽之能民之感於我者有響應景從之樂故曰化民易俗而近説逺懷此事之還至而立有效者也三代以後教士之術漸疏而為學者猶能切於當時之務故兩漢唐宋之世處則為通儒出則為名臣者代不乏人傳之史册逮士習益卑相率而趨於文藝而學術不堪問矣詩書禮樂僅襲其糟粕之空言錢榖簿書羣笑為風塵之俗務及其獲一第授一官也刑名案牘觸目茫然即間有才識之異於衆者亦惟奉行成法茍無大過足矣安望其化民易俗乎哉馬端臨曰所教非所用所用非所教蓋儒術敝而吏治未有能善者自然之理也夫三代以後教士之善者莫如宋胡瑗之經義治事經義齋擇疏通有器局者居之治事齋人各治一事又兼一事二者即知類通達之遺意也然行其法者無取乎名而務求其實誠使始於國學達之鄉校慎擇其師長嚴定其科條按時而稽考之即以是為登進焉將見四海嚮風爭自礪其學術以為世用何患人材之不廣而治功之不登於上理乎禮記大學始教皮辨祭菜示敬道也宵雅肄三官其始也入學鼓篋孫其業也檢討臣李金臺臣謹按王者南面而治天下莫不以教化為大務設庠序以教於郡邑立大學以教於國中誠以師道立則善人多而漸民以仁摩民以義人材成而風俗美也是故學校者賢士之所關王政之本原聖王興大學以養天下之士所為尊崇道藝而鼓勵心志者已端於進學之初學記有曰皮辨祭菜示敬道也祭用菜者歐陽修謂為弟子見師之贄竊意菜即蘋藻之屬義取其潔示學者當明潔其心志云爾至宵雅肄三官其始者舊注謂以居官受任之美誘喻其初志或疑初學之時不當誘以功利之説不知誘喻云者朱子謂聖人教人合下便要他用入學之始便教他為忠臣孝子嘉賔賢臣故以此三詩使之抑揚反覆玩其音趣以興起其勸勉效法之思而又慮夫亢厲之氣不可以從事於學因於入學時鼓以發篋中之篇籍蓋鼓聲歡歡以動衆又能消人髙亢之心使有巽以入之之志説命所稱惟學孫志者也夫先王立學重之於始事而鼓舞之多方凡以納之軌物澤之風雅俾登之於朝而授之以事者罔不各盡其分是以人材成就而公卿大夫列士之選無不得其人焉此學校為政事之本道德之歸而不可以一日廢焉者也善乎吕祖謙之言曰學校之設非為士之貧而養之也又非羣其類而習為文辭也事親事君當以何者為法希賢希聖當自何門而入道德性命之旨當如何而明治亂興衰之故當何由而達考之古以為得失之鑒驗之今以為因革之宜此士之所當用心者也昔漢崇尚儒術而賈董匡劉諸人皆以經學湛深為儒臣之冠餘如文翁之學見於成都延夀之學見於潁川俱能以經術飾吏治者其後伏處之士若王烈受經於仲弓郭泰翹材於太學或以德行化其鄉人或以風節厲其儕俗亦不失為經明行修之彥然則人材之成風俗之美固勸學造士之明效大驗而唐虞教胄成周辟雍之化俱可於此焉進求之矣禮記大學之法禁於未發之謂豫當其可之謂時不陵節而施之謂孫相觀而善之謂摩此四者教之所由興也編修臣宋邦綏孔頴達曰此一節論教得理則教興也臣謹按聖王在上將欲盡天下之士而陶成其德藝以興其行其意至無窮而道蓋有在也取其秀民加之造就立辟雍於國中而下逮黨庠術序無非學者是以一時人才茂興而朝廷獲收其用然而學既設矣至其教之之法又不可不講之詳而制之備必備且詳而後教者有所施學者有所循及其成功彬彬然郁郁然莫不材具而器通易曰先王以教思無窮董仲舒曰設庠序以教於邑設太學以教於國而鐘鼓管絃之聲四達者此物此志也至論其教之之法最為詳且備者莫如學記之文矣其辭有曰禁於未發之謂豫當其可之謂時不陵節而施之謂孫相觀而善之謂摩旨哉説乎蓋人性皆善而氣質不能不偏偏者所發往往戾於道而拂於性故必及其未發而禁之而為之制防易所謂豶豕之牙楊雄所謂鞏童牛之角必皆於其始而制之使有所不敢是以馴焉伏焉久而遂安則習與性成而即聖人蒙以養正間邪存誠之本也凡物莫不有時而學者功有精粗淺深之不齊時不至茍欲語之深而不可也即欲語之精而不知也傳曰聖人不先時不後時管子曰時不至不可強成今夫耕者以春耘者以夏假使冬而耕之春而耘之雖后稷之神明不能以成稼穡故時不可不講而教者於學者尤必以其時也學者之患又每在志欲速成而天下固無速成之學也書曰若升髙必自下若陟遐必自邇記曰不學操縵不能安絃不學博依不能安詩不學雜服不能安禮言進必有序也使失其序則節必乖節乖而學之功紊功紊而欲學之有成難矣在易之巽曰微而善入説命曰惟學遜志務時敏則不陵節而施之謂孫也易曰麗澤兑君子以朋友講習詩曰他山之石可以攻玉其所謂相觀而善者蓋於此有取焉爾管子之論編棧也曰以直木傳曲木則直者無所施矣以曲木傳直木則曲者亦無所施矣夫物兩相規益之謂摩蓋人必相觀而後善不善見焉必相摩而後可去其不善以至于善焉凡此四者教人之法已備是以古者人材皆出于太學而國之收其用者常多誠使推而行之自國子之學以及四方州縣之學宫凡教士者一以是為準將見材全德備而濟濟有成菁莪棫朴之盛遍於天下矣御覽經史講義卷二十二
