body:
  text: 周易乾元用九乃見天則檢討臣何德新臣謹按人主為天心所繫屬在天有陰陽消長盛衰之不齊在人亦有潛見惕躍飛亢之各異是天心即君心而天則乃君則也何以明之乾乃陽德故六爻皆分屬乎陽而以龍為喻亦猶坤之言牝馬也蓋陽爻百九十二皆用九而不用七亦猶坤之用六而不用八也故乾之六爻或論人事或論天時無往非陽亦猶坤之六爻皆分屬乎陰也今即以天時之凖則言之如初九之陽氣潛藏一陽初萌於下愈養則愈厚不敢輕用發泄乃象仲冬之子月九二之天下文明陽氣在田龍德見於地上其勢雖未盛其機不可遏乃象季冬之丑月九三之與時偕行三陽用事有生物不息之功乃建寅之象也九四之乾道乃革萬物當發蒙之際離下位而升上位下乾既終上乾伊始乃二月雷動風行之象也九五之飛龍在天陽居中正照臨廣大萬物當暢茂條達之會乃建辰之象也上六之亢龍有悔陽氣盛滿一陰將萌乃夏至之象也六陽數極一陰潛伏於下盈虛消息與時偕行六龍之變化屈伸未嘗輕露其首惟聖人知天道之消長有一定之節而人事之動靜一以凖諸其則而不過焉如潛見惕躍飛亢之六龍聖人當潛則潛當見則見宜惕則惕宜躍則躍應飛則飛應亢則亢未嘗專執一德猶孔子為聖之時仕止久速無可無不可故云天德不可為首也九為陽數之極聖人法天行健於乾之六爻皆用九非只在上九一爻也天以運行為則周而復始遞嬗因循剛柔得中無太過不及之弊聖人之用九也亦然故不曰乾爻用九而曰乾元用九蓋統六爻而歸之元也乾道變化而春夏秋冬各有其限聖人則之而仁義禮智各有其節陰陽本自合德者乃交易之幾其因動而益顯者乃變易之用聖人體乾則用九法坤則用六此亦陰陽互根健順有常之意與周易乾始能以美利利天下不言所利大矣哉編修臣趙青藜程子易傳曰乾始之道能使庶類生成天下蒙其美利而不言所利者蓋無所不利非可指名也故贊其利之大曰大矣哉朱子本義曰始者元而亨也利天下者利也不言所利者貞也臣謹按乾始者元之統乎天不言所利者貞之保於和也惟有以保於和而統天之元乃生生而不已故易卦首乾而於復尤三致意焉曰復其見天地之心斯心也謂貞元迭運統乎天而不言所利者也孔子曰天何言哉四時行焉百物生焉以其心普入萬物而無心而美利之源精微純粹於是為極矣程傳以非可指名釋不言是川流之盛也本義以不言所利為貞是敦化之妙也要之敦即敦其所流流即流其所敦二子之論無殊旨而穆清之化神於一也宜乎言其生則曰大生言其德則曰大德言其始則曰大始而乾始之能遂為造化之樞紐品彚之根柢故鼓之以雷霆潤之以風雨暄之以日月推之以寒暑混兮闢兮其無窮兮受者無不愜其願而施者猶不勝其豫洋洋乎其物物利之者其無物言之者也肫肫乎其時時利之者其無時言之者也鳶魚飛躍上下察矣糟粕煨燼至教彰矣語對待之用顯藏各成其能論交際之間陰陽互為其宅則謂萬物之始資於元即謂天下之動一於貞焉可也是以法天之君子廓然大公油然順應無纖毫自私自利之念而常存吾胞吾與之懷基之於心體之於身舉而措之天下國家上下同流猶且敕命惟幾慎乃憲於率作朝乾夕惕嚴對越於神明功在天下而不與澤及萬世而不居因其固然行所無事道彌大焉量彌虛焉其不言所利者皆其利物之義積而益深長人之仁出之愈粹者也夫仁包四端而智乃以藏仁元始萬物而貞即以起元故曰察造化之機在乎動握王道之要慎其獨命之不已德之惟純一而已中庸深明此旨所以首章始自戒慎以及天地位萬物育祇完得不睹不聞本然之量而末章復盛述夫民勸民威天下平而推至於帝載之無聲無臭則君子亦立其極於為已而至健以行此四德者不獨在造化矣周易乾始能以美利利天下不言所利大矣哉監察御史臣黃元鐸臣謹按天道流行祗是一元而元統四德又不過是一團生意顧生意不息而包羅萬有渾渾淪淪莫測其端無處可見天之心然既有生意則好生之德包含遍覆其推行也順而達公而普者非即乾始之謂乎易言乾始能以美利利天下非有見於元德之大乎獨是美利自在天下非可有所增益也無所增益而曰惟乾始能之惟乾始能以之一若舉天下萬有不齊之數悉聽命焉而為之主一若凡天下錯綜不一之端胥擔荷焉而無所遺者其以乾始為萬事萬物之根基便自有統貫一世之權挾持在我之具乎然則當其太極無端寂然不動萬物莫露其端倪天心自形其靜正無聲無臭之表無所利而苞符已裕不竭之藏及夫一陽初復朕兆潛萌貞下又起元藏處即為長旋生旋發之機不言利而敷施已妙無窮之用此曷嘗計天下之所利而利之哉四時行百物生天未預設一煦育萬彚之意而近不遺而逺莫禦者全體無半點渣滓天下又曷敢幸邀天之所利以為利哉栽者培傾者覆物未嘗有冀望於天之心而被之澤而潤之膏者推行皆平常實理此乾元為萬物資始而擬之以統天非實有見於元德之所以大哉顧臣愚以為天道然也君之道亦何莫不然蓋君之心天心也天以一元為萬物所托始君即以一仁為宇宙所託命元為善之長仁體事而皆在天下一家中國一人纒綿惻怛動於不容己此仁心為質也而即乾始之謂也由是而有以遂民之生復民之性涵濡薰陶淪肌浹髓樂樂利利被潤澤而大豐美太和洽焉德業隆焉擊壤而歌帝力鼓腹而樂嬉遊以為美美之至矣以為利利孰大焉而君之心亦祗行其所無事而已是非即上天生物之心一團生意流行於不息哉君德之大與天道之大又寧有異哉而要之唐虞事業皆從戒懼慎獨中做出天地位萬物育其實歸於暗然為己卦之九二曰間邪存其誠是工夫全在存誠也天道之元皆實理所布濩君道之仁皆實心所流貫均無非誠也誠至則明通公溥功用直可以參贊化育故曰王道必本於誠意云周易大哉乾乎剛健中正純粹精也監察御史臣周祖榮臣謹按乾者天之性情純乎理者也而氣亦行乎其中氣有陰陽剛柔之殊而理惟一致理之統會惟乾故乾之美有非一端所能盡者狀其性情綜以體要其惟剛健中正乎言其剛則無欲以全其真萬物莫之能屈所謂自勝者強也其立體有如此者言其健則百年如其一息運行無有窮期所謂日新又新也其致用有如此者有所倚不可謂中不涉方隅會歸胥要於極求其過不及之差焉無有也有所偏不可謂正卓然端凝動靜不踰其矩求其偏陂之迹焉無有也剛健中正乾之美盡是乎然而剛健者常患有不剛不健者以相雜一於天不參以人則無復毫髮之可間是則其純也中正者常恐有不中不正者以相蒙一於理不纍以欲無復一善之有遺是則其粹也夫至於純粹焉止矣由其純粹而究極言之則謂之精精非有加于純粹之外也而言純粹者必極於精而後已言剛健中正者必極於純粹以精而後己是乃所謂乾也是故元亨利貞乾之德一皆剛健中正純粹之德六爻發揮乾之用一皆剛健中正純粹之用博觀之潛見惕躍飛亢之間乾之變動一皆剛健中正純粹之變動乾之德不洵乎其大哉抑嘗思之剛健中正此天德之自然固非有假於人為然而人未嘗不可以希天也與天地合其德與日月合其明與四時合其序與鬼神合其吉凶此配天之聖人也體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事此法天之君子也要其歸則一而已矣故性與反無殊途天與人無二理孔子贊乾之義而特示人以自強不息之一言其旨深哉周易時乘六龍以御天也雲行雨施天下平也編修臣李清芳程傳乘六爻之時以當天運則天之功用著矣故見雲行雨施陰陽溥暢天下和平之道也朱子曰言聖人時乘六龍以御天則如天之雲行雨施而天下平也臣謹按時乘六龍以御天言聖人兼有此六龍之德而時措之宜也曰御天者聖人所行合於天理雖聖人之所為莫非天之所為也故曰御天體是道以綱維乎宇宙則禮樂刑政之施有以覆露乎萬物鼓舞乎羣動天下之仰沫承流者莫不各有以遂其生復其性遐邇一體中外禔福四海之內清和咸理亦如天之雲行雨施而甲拆勾萌無不共沐恩膏也然聖人乘龍而平天下獨九五之飛龍應之耳餘爻皆非其地而兼言六龍何也蓋聖人之德居天子之位固是九五飛龍而細分之則如天下事有其時未至其兆未彰固宜且隱而不宣即是初九潛龍有其事漸可行當宣示天下施命以誥四方便是九二見龍有天時人事偶逢艱難當兢兢業業恐懼修省便是九三乾惕有施為之中姑試其可待人情既安事勢既順而後施行便是九四或躍惟夫理得事順朝發殿陛而夕敷於天下方是飛龍在天有其勢已窮其時已過或當止而不為或當改而更張窮則變變則通通則久便是上九亢龍不至於亢要之聖人體乾之全德張弛互用闔闢兼施法天之行代天之工奉明命以周旋述天理而時措動靜云為發號施令莫不因時而動此其所以躋斯世於治平納生民於仁壽無一物而不歸於甄陶煦育之中也歟周易雲行雨施天下平也編修臣何其睿臣謹按此言聖人體天致治之極功也帝王之道與天地凖天地不外乎陰陽陰凝上結則合以成雲陽散下流則注而為雨雨從雲以布化雲慿氣以交合河圖帝通紀曰雲者天地之本雨者天地之施施行不爽其時斯髙下各適其性品物亨嵗時成所為普美利於不言者此也是故雲行一精之所運雨施兩大之所崇行則不息不息則無間施則不匱不匱則無遺無此厚而彼薄無此少而彼多無此饒而彼乏剛柔燥濕之不一有以平其方大小貴賤之不倫有以平其族菀枯培覆之各受有以平其材蓋澤之淺者易竟而深者難窮惠之出於費者有分而出於道者斯合也黃帝以雲紀官髙宗命作霖雨穆然深見責成之意公羊傳稱泰山之雲雨不崇朝而遍乎天下爾雅稱甘雨時降萬民以嘉謂之醴泉是皆以其廣博而周密優渥而霑足也為觀天命之流行即以得王政之所出其裁成輔相奉若不違以養人而理物者惟其時而已是故天下之大俯仰上下無偏與也明堂之上禮樂刑賞無小利也生之長之而物不見其德一化工之渾然無迹也成之收之而已不有其名一大造之淡而若忘也以言其業則廣大以言其術則精微畛域于焉胥化險阻于焉皆平性命于焉各正日用于焉不知信夫陰陽無私澤惟夭惟喬羣然各遂其生帝王無私恩賁若草木兆民允殖其性也夫豈有殊量歟天之行惟健故日新不已萬物歸丕冒之中聖人之行曰敏故明作有功天下沐膏雨之沃一積氣而運於虛無心而成化一積理而徵於實有心而無為天德也王道也一以貫之矣周易雲行雨施天下平也監察御史臣趙青藜臣謹按天之於人本同一理而人往往不能如其在天者天無私而人有欲也惟聖人之心純乎理而不參以私則其措施因應張弛開闔之用遂若以天合天而不知其所以然故人之感通於聖人者亦若其感通於天而人之不能仰望於天者或轉而仰望於聖人蓋有心而無為與無心而成化同一致也夫雲行雨施品物流形天工也聖人效天法天未有敢以天自處者然龍興而雲布雲布而雨作此固理之自然者聖人時乘六龍既有其變化不測之方則夫雲行雨施天固不得獨擅其名矣夫需之為象也言雲不言雨然而雲上於天則雨固將繼之矣解之為卦也言雨不言雲然天地解而雷雨作則雲又已先之矣是故萋萋者雲也祁祁者雨也觸石而出膚寸而合不崇朝而遍天下者唯雲雨之力為然吾觀夫聖人者禮樂未彰沖漠之精神已洽政刑未設隱微之意氣已通函蓋者無垠聯合者無間是即雲行雨施之彌綸氤氲也不疾而速無上下隱顯之殊不介而孚無逺近髙深之阻所過者化所存者神是即雲行雨施之馳驟奮迅也漸仁摩義民生自復其性體信達順異類亦若其天浹於肌膚淪於骨髓是即雲行雨施之貫注流通也出作入息百姓日用不知鑿井耕田帝力何有於我與之者不言恩受之者不知報是即雲行雨施之滋培長養也如是而天下其有不平者乎蓋昊天以生物為心故雲行雨施而百物皆化聖人以愛人為心故行慶施惠而九有皆同此其間有自然之理焉緩之固違其則急之反窒其機惟聖人處於穆清之表而油然沛然無往不順鼓舞遍於萬方德教溢於四海其平也非天下自平也平於聖人之雲行雨施而天下自平也然則聖人之於天下亦因其自然行所無事而已何所勉強於其間哉夫元亨利貞天之德也而文言以屬之君子天人同一體也雲行雨施天之功也而文言以屬之聖人天人同一用也究其要則一乾元足以盡之矣體乾以建極則體自我立體元以布化則用自我行全體大用一以貫之而天德王道無餘蘊矣周易君子學以聚之問以辨之寬以居之仁以行之監察御史臣毛旭旦臣謹按乾卦九二一爻以陽剛之體得時位之中孔子申象傳之義謂其信言謹行間邪存誠善足以蓋世而不矜道足以周遍而化物君子之德既克底於成矣然純粹之詣非可驟幾倘侈言上達而不原其致功之自與得力之由則君子成德之功不彰且於文周立卦之意猶未盡也將何以闡先聖之心傳開後世之學術乎宜文言又歷舉成德之由以竟其説也今夫事物之理雖具於人心而實散見於迹象茍非務學何由會而有之已君子則格物致知而表裏精粗之悉達多聞博識而前言往行之無遺於是未學之先見此理為散著於事物雜陳於簡册者既學之後乃覺顯微巨細之故咸宗統於一心其學以聚之有如此者既聚矣茍非有先知先覺之人與為析疑與為解惑則是非得失之分途將混淆而莫辨君子則好問好察內而父兄之訓迪外而師友之切磋微而瞽史之針規芻蕘之一得莫不訪求而聽受焉於焉判決其疑似究極其指歸分析於毫芒探討於賾隱其問以辨之有如此者既問辨矣非寬以居之則無以藏蓄其所得君子廣其度量擴其心胸以涵泳乎所已知沉潛乎所已得漸濡既久自覺心與理相依而理以心為宅焉孟子所謂深造自得朱子所謂默識心融蓋與寬居之旨有相發明者也既寬居矣可以見之施行矣而君子行之則在乎仁廓然大公不留一私於念慮之際粹然至善允蹈帝載於動止之間舉凡應事接物無非順適乎天理之正而從心不踰萬理渾化於無迹焉所謂安而行之不勉而中盛德之至也要之為學之道必始之以學聚而後聞見廣繼之以問辨而後知識精又繼之以寬居而後涵養熟終之以仁行而後踐履純四者之序相因而不可紊四者之用相濟而不可闕惟修德之君子篤摯以踐其實優遊以俟其成不躐等而趨不半途而廢此所以馴致夫聖神功化之盛而兼總乎天德王道之全也而乾之九二實體此義焉此九二所以為龍德也夫周易直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也少詹事臣張鵬翀程傳直言其正也方言其義也君子主敬以直其內守義以方其外敬立而內直義形而外方義形於外非在外也敬義既立其德盛矣不期大而大矣德不孤也無所用而不周無所施而不利孰為疑乎臣謹按程子言敬以直內義以方外敬義夾持直上達天德自此朱子言最是下得夾持兩字好敬主乎中義防乎外二者夾持要放下霎時也不得只得直上去故便達天德臣竊謂敬義夾持是學者精進之功然至於聖修之極不外乎此朱子謂敬是持守功夫義是講學功夫直是直上直下胸中無纖毫委曲方是割截方正截然不可移易之意但知持敬而不能集義則於應事接物不能無毫釐之差但思集義而不以主敬為之本則心無主宰且不知所以為義矣故二者之功頃刻不可相離亦朱子所謂如車兩輪如鳥兩翼內外夾持以成聖功者也文言於乾之九三坤之六二皆言聖賢之學乾言德業坤言敬義健順之道各就本卦似有不同而其理實相經緯欲進乾之德必本以坤之敬欲修乾之業必制以坤之義非敬則內不直德何由進非義則外不方業何由修君子之乾惕以進修舍敬義亦無所用其力而德之日新業之富有即敬義立而德不孤蓋以卦德爻位而言則義各有當以學問德業而言其理固互相發明非儒先之強合也臣竊謂進德修業統為學之全功而敬義夾持尤為提綱挈要之語嘗反覆諸儒先論學次第及近思録語類諸書得是兩言以為寶符知從事聖賢更無他道始謂用力可至久而益覺其難一由於積習因循不能自振頻復頻悔終不免私意憧擾一由於見理未徹謂小事無妨不知積小積微為害甚巨蓋當身驗其得失而益知敬義夾持為聖學之要領無疑也誠能以敬為主宰則天君泰定義理日見清明而又以集義為之輔擇義既精於持敬益為有力敬以直內涵養未發之中義以方外省察中節之和中和既致則位育之效自臻乾坤合撰以成參贊之能必如是而後為聖修之極所為敬義夾持直上達天德者此也臣嘗誦樂記云姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪僻之氣不設於身體使耳目鼻口心知百體皆由順正以行其義其庶幾敬義夾持而為天德王道原於慎獨之功所自致乎周易直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也編修臣吳履泰朱子曰此以學言之也正謂本體義謂裁制敬則本體之守也程子曰直言其正也方言其義也君子主敬以直其內守義以方其外敬立而內直義形而外方義形於外非在外也敬義既立其德盛矣不期大而大矣德不孤也無所用而不周無所施而不利孰為疑乎臣謹按王應麟以為丹書敬義之訓夫子於坤六二文言發之孟子以集義為本程子以居敬為先朱子謂敬義工夫不可偏廢蓋敬者聖學之所以成始而成終也義則心之制而事之宜也從古聖賢每對舉而互言之者凡以敬之為敬必貫動靜徹初終為一致然後可以言敬故曲禮括之以毋不敬尚書揭之以無逸作所詩稱敬止而先之緝熙朱子釋以繼續其敬光明其敬而此節程傳則謂君子主敬以直其內蓋君子知敬為吾心之主宰一以敬存心內謹於心術念慮以防其奔馳放逸外謹於威儀動靜以禁其侈肆怠惰終日乾乾則此心常存是非善惡不失其本然之正而內罔不直矣至於義之為義要當隨地隨時見得是處決定是恁地不是處決定不恁地無適無莫因應自然盡變盡神化裁各當方其未事初無將迎之擾及其既事更無留滯之心此義既精是非善惡皆中其當然之則而外罔不方矣夫敬立則內直既有以養乎外而外益方義形則外方又有以養乎內而內益直內外交養循環不已由是直純乎直方純乎方直方之德光輝盛大至於窮神知化而不自知所謂從心所欲從容中道自無滯礙於所行而利矣故曰不習無不利也然是敬也義也程子謂為合內外之道敬義夾持直上達天德自此朱子亦謂敬義只是一事大槩敬義二者相須而相成敬則寅畏中存而匪僻無自而入義則裁斷合宜而私欲末由相撓敬以義輔則審慎而不流於畏葸義從敬出則裁制而不失之粗疏內以主敬立體外以精義致用舉凡用人行政度務揆幾胥得其當而孰有所疑乎此夫子敬義合一之微意也周易君子敬以直內義以方外敬義立而德不孤給事中臣倪國璉程子曰君子主敬以直其內守義以方其外敬立而內直義形而外方義形於外非在外也敬義既立其德盛矣不期大而大矣德不孤也臣謹按上文言直方是已成之德此言由聖學功夫之全以養成此德也人之所以主持萬物者此心而宰制萬物者亦此心心之立體本直也而有時不直者以操存之功稍間則方寸或纍於私耳君子知敬為勝私之要是以精神整肅念慮純一致謹於心術志氣之微以防其奔馳放逸而又深察於威儀動靜之著以撿其縱肆怠惰日日維持時時存省此心邪曲之私自無所容留而歸於本然之直矣心之應事本方也而有時不方者以研精之功未至則應物或乖其則耳君子知義為處事之宜是以是非截然可否釐然先事有精義之功隨事隨物審其當然而無一端之昧其理臨事有集義之學因物付物處置各得而無一事之拂其宜大中至正無過不及凡物當然之則既無不曲中而外自形其方矣夫有敬而無義則見之於事或不免於差誤有義而無敬則無本之學亦何以善化裁惟是敬義夾持內外交養其存於中者既無纎毫之私而徹上徹下表裏如一是以敬持萬物之樞也其形乎外者絶無偏邪之失即達權通變各順其常是以義定萬事之凖也敬義既立盛德日新涵養乎未發之中又省察乎中節之和由學問勉強之功而造於聖神功化之極不難矣德豈至於孤哉自昔敬義之訓原本於丹書孔子於坤之六二發之所以立千古聖學之宗也孟子以集義為本程子以居敬為先張栻又謂功夫並進相須而相成此理益昭然矣然乾九二言誠坤六二言敬誠敬者乾坤之别也乾九二言仁坤六二言義仁義者陰陽之辨也要之敬而後能誠非敬無以為誠義即仁之有裁制處離仁亦做義不出誠與敬仁與義一以貫之所貴乎君子之善致其全功也周易君子敬以直內義以方外編修臣張若需程子曰敬以直內義以方外合內外之道也敬義夾持直上達天德自此薛瑄曰敬以直內戒慎恐懼之事義以方外知言集義之事內外夾持用力之要莫切於此臣謹按學問之功必期內外之交修斯本體有所持循而裁制之宜必因之而各得蓋平時不深以涵養則齊莊中正之不存而惰慢得以乘之內先無以為存主之地而晰理未精所以剖别夫是非之介者未能灼然而無疑斷然而不惑則由乎中而應乎外者又何以隨所施而無不當乎是故執持於內者不可以不嚴而制外以養中必貴窮理以求其至當也君子法坤道之直方而合內外以致其功者惟在敬義夾持而不使幾微之或懈故其湛然之中惺惺獨覺而戒慎不覩恐懼不聞所以遏其人心而養其道心者惟恐不至則心體光明洞達無纖毫之委曲內何有不直乎至於事理之陳千端萬緒而學以聚之問以辨之所以别其毫釐察其疑似者無有不盡則理道均齊畫一遂時措而咸宜外何有不方乎乃知居敬存心既有以為窮理之本而又進以集義之功則不徒守其空虛之心而宰制有方臨事自截然而不可易此敬義夾持之道所以不可偏廢也詩曰昊天曰明及爾出王昊天曰旦及爾遊衍又曰不顯亦臨無射亦保主敬之謂也書曰以義制事又曰慮善以動動惟厥時守義之謂也古聖王惟此之務而燕間之必莊時幾之必敕嚴屋漏於帝天而主敬以作所且好問而好察執兩而用中時兢業於萬幾而精義以致用由是內無軼志外無遺理而適協於直方之道也乾之文言言進德修業而坤言敬義者欲進乾之德必本於坤之敬欲修乾之業必制以坤之義洵乎敬義為學問之大要天德與王道一以貫之而靡遺矣周易君子敬以直內義以方外給事中臣周祖榮朱子語類曰敬以直內是持守功夫義以方外是講學功夫直是直上直下胸中無纖毫委曲方是割截方正之意是處此事皆合宜截然不可得而移易之意薛瑄曰敬以直內涵養未發之中義以方外省察中節之和臣謹按敬以直內立其體也是平時存養之功義以方外達其用也是臨時操持之法蓋下學之始養心莫如敬惟主一無適則方寸之地廓然大公而無所蔽渾然至正而無少偏徹上徹下如鑑斯空所謂直內者此也制事莫如義惟精研入神則酬應之餘裁處有條而不紊是非一定而不移左之右之如矩斯潔所謂方外者此也然敬與義雖有分功內與外非有兩事方其致敬覩聞未交而湛然無欲形聲方接而惺然有主吾心之全體不虧而外之方者有所本矣方其集義因時制宜而範圍弗過隨事順應而斟酌咸宜吾心之大用以行而內之直者有所達矣所謂敬義夾持者此也朱子語類及薛氏之説發明最為親切至先儒黃幹有云乾言德業坤言敬義實相為經緯欲進乾之德必本之以坤之敬欲修乾之業必制之以坤之義此以乾九三與坤六二參看立説其義亦精臣竊思聖人説易不外動靜相資之理即一爻之義引伸觸類無所不通如坤之六二不獨可與乾九三參看亦可與乾九二對看蓋乾二主於天道故言本體而必推之學問以天合人也坤二主於地道故言功夫而必約之敬義以地應天也由一爻以推求易理之精聖學之妙有令人研究之無盡者大哉易也斯其至矣周易君子敬以直內義以方外監察御史臣李清芳程傳君子主敬以直其內守義以方其外敬立而內直義形而外方義形於外非在外也本義直內方外程傳備矣臣謹按敬者主一無適之謂義者所行合宜之謂蓋人之一心原其本體湛然虛明如鑑之空如衡之平寂然至靜而萬理咸備其隨感而應也妍媸俯仰因物賦形正大光明流行不滯此上帝所降之衷生民所秉之彞本如是也惟為氣稟所拘物欲所蔽不免有所昏昧錯雜而無以全其所受之正於是君子有自修之功收斂放心不容一物無一毫私欲之蔽而惺惺常存敬之所以立也及其接物處事則準情度理稱物平施權衡得中無少差謬義之所以行也直以心言心一而已喻如物之直而不曲一線而去也方以事言事有多端必四周俱到喻如物之方正四面如一也然敬義雖有內外之分體用之别而其實不相離也蓋非敬則中無主宰事至然後安排則已緩而不及於事矣惟須平日有涵養之功臨事方能洞徹非義則外多錯履而邪動之辱反有以纍乎內之所存矣惟須應事有詳審之功而中之所存益固敬義夾持不容間斷以至於熟則廓然大公物來順應存於內者適得吾心之體發於外者不失吾心之常矣夫乾卦乃聖人之學坤卦乃賢人之學故乾之九三言誠而坤之六二言敬程子曰誠則無不敬矣敬則可以至於誠矣然敬之理貫乎動靜而不偏可以包乎義者也故敬者乃聖學之所以成始而成終而學者之功其必以敬為宗也歟周易君子敬以直內義以方外監察御史臣周禮臣謹按為學之道必合內外以交修內有涵養之功然後心純理得而有以立其體外有省察之功然後謹幾慎動而有以善其用此直內方外所以為天德王道之要而敬義之學不可不務也丹書之訓曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶豈不以人心易縱應物多偏而制心制事不可無學乎蓋人惟一心理欲互乘心有一息之稍怠則私欲羣起而引之投其所甘中其所溺聲色貨利佚遊玩好之屬紛紜憧擾於方寸而不寧即或一念清明思屏私欲以全其德而內無所據以勝之終不能以絶其萌不移時而非幾之貢如故矣至於事之來也是非可否義本一定不容假易而人往往遷就以便其私私心既起則牽制不能決善宜從也或以有妨於佚樂而浮慕不親慝宜去也或以便安之可娛而昵就難除由是依違猶豫制行無凖而動作云為不免於偏陂矣夫方寸之憧擾者內不直也制行之偏陂者外不方也何以直內厥惟敬何以方外厥惟義敬者德之聚堯舜以來相傳之心法也人心之靈出入無時須以義理涵養之心與理相涵則常有精明嚴肅之意而無昏昧放逸之時理念卓然其常伸而不為私欲所屈故曰直也真德秀曰天下之理惟中為至正惟誠為至極然敬所以中不敬則無中也敬而後能誠非敬則無以為誠也氣之決驟軼於奔駟敬則其銜轡也情之橫放甚於潰川敬則其隄防也故周子主靜之言程子主一之訓皆其為人最切者而朱子又丁寧反覆之學者於是知勉焉戒於思慮之未萌謹於事物之既接無少間斷則德全而欲泯矣其所以發明主敬之理不綦詳與若夫方外之功非由襲取蓋有精義之學焉有徙義之功焉精義之學在窮理辨析於公私之介而擇其善則遇事而不淆也徙義之功在克己力去其形氣之私而循夫理則制事無不當也久之義理日熟而遇事知宜是非可否皆有截然不易者而外不已方哉朱子云敬義不可偏廢專務義而不知主敬者固有虛憍急迫之病而所謂義者或非其義然專言主敬而不就日用念慮起處分别其公私義利之所在而決取舍之機焉則恐亦未免於昏憒雜擾而所謂敬者非其敬矣所謂集義正是要看破物欲之私却來認得天理之正事事物物無不如此體察觸手便作兩片則天理日見分明所謂物欲之誘亦不待痛加遏絶而自然破矣程子云敬義夾持直上達天德自此且夫敬義亦豈待外求哉敬即心之警省也義即心之裁制也彼敬而苦其矜持義而傷於矯拂者皆未嘗於心實體驗之耳心體該動靜功夫亦兼動靜動時順義則無行可悔而無事時能靜靜時能敬則心理日洽而動時得力內外交養而德自底於光大矣周易象曰地中有水師君子以容民畜衆監察御史臣李敏第本義水不外於地兵不外於民故能養民則可以得衆矣臣謹按三代之盛寓兵於農故周禮軍旅之法屬之司徒以井邑邱甸均其賦以比閭黨族聨其情以伍兩卒旅任其人而後司馬因搜苗獮狩之時辨其旗鼓之用而教以步伐之節是聖王之世戎事皆起於農功而兵制悉源於井田且夫兵猶水也不有以畜之將有潰溢之虞顧自齊威修內政魯成作邱甲古法寖變嗣後軍旅之政雖代有成規然召募之數日益廣養兵之費日益繁以丁壯而坐食於一隅則啓驕縱之端以冗間而仰給於正賦則有虛糜之慮蓋去古既逺於古人耕戰之務缺焉而未講也夫養兵所以衛民而以民養兵不若使兵之自養為可久井田之舊不可復矣而屯田之法猶可稽焉自漢文帝募民耕塞下武帝屯車師渠黎而屯田之制以興厥後如趙充國馬援王霸之徒皆駐軍耕牧以實邊儲省繁費此足食足兵之良式也誠使當國家承平之日酌古宜今益講究於屯田之法擇曠間可耕之區使遊手坐食之衆受田力穡春夏課其耕耘農隙勤其校閲則人食其力可以節餉給之繁輸粟於官可以廣軍儲之備於以裕國計而飭戎行庶無失聖王寓兵於農之遺意也夫周易九五顯比王用三驅失前禽邑人不誡吉侍講學士臣鶴年臣謹按帝王君臨天下固貴有宰制羣動之才尤貴有包荒四海之量惟其量之廓然有容如天無不覆地無不載不屑屑焉求一時之親附而其究也天下卒莫不歸之此所謂大順大化不見其迹莫知其然之謂神非聖人不能與於斯者也若此者於比之九五見之矣比之九五一陽居尊剛健中正卦之羣陰皆來附己其心事則光明洞達曲盡其生養教誨之意而幾微私曲有所不存其設施則正大發皇明示以蕩平正直之途而一毫籠絡有所不事顯之至也顧其取喻於王用三驅失前禽邑人不誡者何也蓋田獵之事合圍則志在於必得而網羅有所必周三驅則無意於必得而去來任其自便夫志在於必得則不容有失矣無意於必得則不必其無失矣此天子不合圍前禽之所以有時而失也雖然非失前禽不足以見王者之大今夫王者修德行仁聲教四訖至於九州向化六合同風洋洋乎盛矣然而幽遐之地偶有所阻聖王初未嘗有所容心於其間豈德威不足而惟以姑息從事哉三驅之道固然也開一面之網而不忍盡取於物者所為恩及於禽獸沛九有之澤而未嘗強迫於人者所為仁覆於寰區推而至於邑中之人亦皆曉喻上意而不相警備以求必得焉此堯舜之時所以巍巍蕩蕩德配於天而其下不識不知以順帝之則者也如是則王道得而王化成何吉如之大矣哉顯比之道誠御世之隆規升平之極軌也而彖之所謂原筮元永貞無咎其義不出於此矣周易上天下澤履君子以辨上下定民志右庶子臣林蒲封程子曰天在上澤居下上下之正理也君子觀履之象以辨上下之分以定其民志民志定然後可以言治臣謹按天地分而乾坤定上下之象已昭然於兩間矣至於澤則下之中更有下者焉此固為一定之理而不可易者也然上下之在天澤者有形象之自然則上下之在人者有等殺之宜辨故君子觀於履之象而知安上治民之莫善於禮也嘗觀至治之世愚賤亦識尊親草野咸敦敬讓朝廷之制肅而明閭閻之風靜而順雖禮樂政刑百度具舉其要不外於辨上下之分上下之分明而民志一矣朱子有言四海之廣兆民至衆人各有意欲行其私而善為治者乃能總攝而整齊之使之各循其理而莫敢不如吾意之所期者則以先有紀綱以持之於上而後有風俗以一之於下也何謂紀綱辨上下是也何謂風俗定民志是也傅説所謂奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民箕子所謂皇建其有極斂時五福用敷錫厥庶民董仲舒所謂正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方者正謂此也抑臣更有説焉在易上天下澤而為履繼履者地天而為泰繼泰者天地而為否繼否者天火而為同人明乎君子之治莫要於法天至於上下辨民志定而泰交之道成泰極則易於致否故必如同人之乾健離明類族辨物乃能通天下之志以長臻於大同之道也自古極治之時承平日久生聚日繁竒巧畢呈豐亨豫大富貧相耀浮靡相髙睦姻任恤之風漸微而凌競邪僻之習易起如程子所言自庶士至於公卿日志於尊榮農工商賈日志於富侈億兆之心交騖於利天下紛然勢所必致是以等威雖别而冀於僥幸者愈多法令雖明而陷於刑辟者日衆此孔子於既庶既富而必曰教之又曰道之以德齊之以禮有恥且格管仲曰禮義廉恥國之四維然則欲正人心厚風俗振綱肅紀保泰持盈亦不外於辨上下定民志而已矣履之義不誠大哉周易上天下澤履君子以辨上下定民志右中允臣錢維城臣謹按禮之為履者禮主卑下故曰智崇禮卑禮者人所踐履所行不由禮則必乖戾故曰履以和行天尊地卑而澤又卑之卑者君子觀象知上下之分不可不辨故制禮以明之所謂天髙地下萬物散殊而禮制行也夫禮順人情本非強世而别嫌明微主乎辨異隆殺之凖法乎髙卑服物采章一天澤之所寄也故禮達而分定安上全下莫善於禮而為民情之坊也程子曰古之時公卿大夫而下位各稱其德位未稱德則君舉而進之士修其學學至而君求之皆非有預於己也農工商賈勤其事而所享有限故皆有定志後世自庶士至於公卿日志於尊榮農工商賈日志於侈富億兆之心交騖於利天下紛然如之何其可一也斯言盡矣夫怙侈滅義服美於人餘風未殄康王以為深憂蓋奢則必僭僭則干犯名義其害甚巨記曰管仲鏤簋朱紘山節藻梲賢大夫也而難為上也况奢麗相煽輾轉益深此沔水湯湯所為獻規者矣若其餘弊物力耗敝匱乏因之不特錦繡纂組害女紅也記曰黃帝正名百物以明民共財漢書藝文志名家者流蓋出於禮官古者名位不同禮亦異數名法名象雖流傳失真亦禮之遺意故曰名者所以别同異明是非道義之門政教之凖也周易上天下澤履君子以辨上下定民志洗馬臣國柱臣謹按周易一書凡稱乾皆曰天凡稱兌皆曰澤至於履卦而乾上兌下適符乎天澤之定位故其卦名為履履者禮也上下之正理人之所當踐履也孔子觀其象而繫之以辭曰君子以辨上下定民志辨者如詔祿有隆殺奠食有多寡是也定者無踰越也夫民志不定天下不可得治而至無定者實莫如民志蓋民莫不有血氣心知之性飲食嗜好之欲隨時而動逐物而遷未知為上勢必至於僭上未知為下勢必不安於下不有以服其心而靜其氣將有潰敗不可收拾之虞僭亂之萌惟禮可以已之是故君子觀天澤之象制為禮以辨上下之分自君臣朝廷尊卑貴賤之序下及黎庶車服宮室飲食喪祭嫁娶之經事有宜適物有節文凡在朝者位未稱德則進之德不稱位則退之使人人有度德之意而寵榮之見自絶所以定庶僚之志也凡在學者大成小成有德則升之移遂移郊不帥者絀之使人人有務學之實而功名之念自淡所以定庶士之志也至凡農工商賈亦皆經其田廬察其勤惰稽其術業第其餼廪使不得輕本務而遊手逐末握竒贏而享用華侈所以定億兆之志也自朝廷以及百官自百官以及萬民政令使之恩威加之粟布取之力役征之莫不有辨也斯莫不有定也臣竊由是而伏思之禮之森嚴於耳目聞見之地者使民惕於志而知畏天澤所以定位也禮之浹洽於倫常日用之間者使民和於志而知安天澤所以通氣也故繫辭曰履以和行序卦又曰履而泰然後安禮之綱維世教蟠結人心者固非一切法制禁令之所可幾盛王所以宰制羣動經緯萬端馴至於大順大化履帝位而光明者舉由於此而要之履卦象中其藴已包舉靡遺此禮所以為天秩天敘萬世率履之而不泯歟周易上天下澤履君子以辨上下定民志侍讀臣齊召南臣謹按自古帝王為久安長治之計欲使天下道一風同刑罰不用其本則莫大乎禮教矣禮者履也天下所共率履而不越者也履此則安不履此則危其效曉然易見是以古人制禮固亦明知其委曲繁重似不如脫略簡易者之便於人情然必事事而異其等威物物而為之防制者大順大化其積有漸朝廟之敬始於戶庭儀文之嚴始於士庶訓誨之豫始於童孩邦國四海之協和始於比閭族黨冠服以章之品式以範之庠序以教之官師以董之賞罰以勵之務使人人各知愛親敬長相率共履夫正直蕩平之道路重為非而樂為善也在易履之大象曰上天下澤履君子以辨上下定民志旨哉言乎凡民稟五常之性所謂好善惡不善豈有異哉良由習俗漸移名分不講在家先不能事其父兄在國何能服於長上惟其志之泯然無所知覺也是以囂然敢於為非何以定之亦以禮之辨上下者定之而已天髙地下其尊卑懸絶不可以數計也於地中峙而為山蓋其稍髙者焉流而為水則已下矣若夫澤則鍾水之區又其下之下者也名分之上下亦然由君至民尊卑懸絶何以異於上天下澤耶顧上下之勢起於相積而遞相承古人制禮不惟使官與民有别也即士與民先有别就庶民中又使遊惰之民不得與良民齒刑罪之民不得與凡民齒是故惡少不得以凌侮耆老姦猾不得以挾持縉紳富商大賈不得以奴𨽻鄉閭市儈里魁不得以魚肉鄰曲輿臺臧獲不得以序列衣冠則羣黎百姓生而耳濡目染習與性成不期而化其桀驁勉為善良由禮教明而民志定也民志定而後倫紀敦倫紀敦而後廉恥重廉恥重而後風俗成天下之長治久安豈有極乎哉賈誼有言禮者禁於將然之前法者禁於已然之後先王必曰禮云禮云者貴絶惡於未萌而起教於微眇使民日遷善逺罪而不自知也然則安上治民莫善於禮誠致治者之先務歟周易上天下澤履君子以辨上下定民志編修臣竇光鼐臣謹按履卦乾上兌下乾為天兌為澤上下之正理也人之所履當如是故取其象而為履履者禮也安上治民莫善於禮故君子觀履之象而以辨上下定民志也嘗考諸儒之説莫備於程傳傳曰古之時公卿大夫而下位各稱其德終身居之得其分也士修其學學至而君求之非有預於已也農工商賈勤其事而所享有限故皆有定志而天下之心可一後世自庶士至於公卿日志於尊榮農工商賈日志於富侈億兆之心交騖於利天下紛然如之何其可一也旨哉斯言其知治民之本矣何以明其然也天之生人也不能無羣羣而無分不能無爭是故兩貴不相事兩賤不相使人情之常也無他彼其心固以為吾儕焉耳不見其異於吾焉耳荀卿曰勢位齊而欲惡同物不能贍則必爭夫物常不贍於欲而欲常必窮乎物則天下之相率而為厲者且無已時也此程子所以有紛然騖利之患也夫利者不學俱欲之物也天之所生地之所養袛有此數也以欲徇物則人人有不可盈之願即人人有不能安之心天下不可得而治矣君子知其然故觀象於履而為辨上下以示之以貴治賤以尊治卑以賢治不肖君君臣臣勿相凌也父父子子勿相離也兄兄弟弟勿相愈也夫夫婦婦勿相瀆也士士農農工工商商無相易也其爵地有等其職事有方其宫室車輿有度其飲食衣服有章其人徒有數其械用有常其嵗時聚會有節其吉凶哀樂有經使百姓曉然皆知夫上之為上下之為下若天澤之不可相越也而僣侈之志不生矣皆知夫上之使下下之事上若天澤之不可相無也而忠順之志不忘矣夫是之謂志定志定則耳目無所驚而手足有所措其為欲易養其為物易給也雖有悍強之人亦有以相安而不至於亂記曰夫禮禁亂之所由生猶坊止水之所自來也又曰禮之教化也微其止邪也於未形使人日徙善逺罪而不自知也是以先王隆之也其即此志也夫周易上天下澤履君子以辨上下定民志編修臣莊有信臣謹按天髙地下萬物散殊而禮制行焉禮之理原於造化而禮之性實具於人心顧聖人緣人性以制禮旋反而治人之心者何也蓋禮者理也言理則無規矩可循言禮則有秩序可守故聖人制禮所以正天下之履也禮以正履則言禮足矣而畫卦則曰履何也言禮則人之踐禮者屬於虛言履則禮之當行者體於實象曰上天下澤履言人之所履當如是也夫人而履於禮則禮達分定而天下可一矣然自聖人制禮以來尊卑有分貴賤有等非不燦然於天壤而公卿大夫往往不能盡職農工商賈往往不肯安其業者何也志不定也夫志亦何厭之有當其艱苦則志於安全及其安全則又志於富貴若是而利欲之心紛然不靖惟不知有上下之分也君子觀天澤之象而知治民之道矣不於民之履求之而必先於民之志定之夫下堂拜上或一時加恩之名而即此遂為上權下替之漸賜禘錫懸亦一朝饗酬之厚而即此遂開名器假人之端由辨之不早辨也古者明一代之禮以德之大小為拜爵之崇卑伊尹曰三公者通於天道者也九卿者通於地理者也大夫者通於人事者也列士者明於法度者也故一時朝廷之上必位各稱德位未稱德則君舉而進之士修其學學至而君求之民無分外之求君無分外之舉是故人有十等而民不以懸絶為嫌國有六卿而民各以服習為樂君在斯為臣父在斯為子兄在斯為弟君止仁臣止敬父止慈子止孝交止信天不變道亦不變夫民亦馴習於自然而羣奉為天經地義之不可易此無他心之所之既深識乎上下之分則身之所履自共守其上下之常也君子名器不假黜陟必嚴使上下之分燦然著明於天下故民志有定民志定則官守其職民安其業而無干名犯分之履矣此君子所以善用天澤之象也周易上天下澤履君子以辨上下定民志監察御史臣趙青藜臣謹按三代以上治天下以禮故其分肅而其風淳三代以下治天下以法故其令繁而其俗靡斯亦已然之明效矣然而競相趨於法者過信夫禮樂百年後興之説雖賢如文帝且謙讓未遑而三代盛治坐是不復豈不惜哉夫禮聖人制之非聖人之意之也上天下澤著其象矣聖人觀其秩然而知上與下有不易之則察其藹然而知上與下有必屬之情不聨之情即無所以維其則不示之則更無所以範其情於是本仁天下之心出而定天下之志辨之蓋不容以己也辨之於朝則公卿大夫各定其階而車服度數不以恩私而或假焉辨之於野則士農工商各定其業而少習久安弗使見異而或遷焉外以靜其耳目內以攝其心志而一時之託處宇下者官舉其職士修其行農工商賈各食其力知分之不可易也終身由之莫敢踰越而綱紀正等威立朝廷尊矣自非然者無所辨於任使之際而大官顯秩若為盡人可致則僥幸之想愈熾也無所辨於絃誦之地而三徵九聘且謂捷徑可圖則奔競之風難息也無所辨於食力之勤而嬉遊徵逐不憚輕去其鄉則失業之徒踵相接而未有己也上無以厭服乎下下日以傲慢乎上囂然之志將百出而不靖不得已而思以政刑道齊之法立而姦生令下而詐起質朴漸消恩誼寖薄微特無益且加甚焉然後知民志克定非旦夕之近功而安上全下實宏且逺也自古禮文明備莫如周自古享祚永久亦莫如周周之盛也君臣契合堂陛森嚴朝覲享獻罔不畏懷民用和睦無有災害囹圄空虛刑措四十餘年而不用即夫德教衰微政化怠弛而先王所命太史所掌稱道一二猶足以輯強侯而威荒裔非其志之素定曷以致此漢髙帝馬上得天下羣臣爭功至拔劍擊柱及叔孫通定禮儀以正君臣之位竟朝置酒皆俯首抑伏無敢讓譁失禮者髙帝説而歎曰吾乃今日知為天子之貴也夫叔孫通所定不過為綿蕞與諸生野外習之度髙帝所能行者耳非有關雎麟趾之意與夫聖人制作相去逺矣蓋聖人制作固即人心自具之節而禮定民志初不以束縛之拘苦之也故有子曰禮之用和為貴如使去其拜跪登降揖讓周旋賔主介紹之文而曰吾以用吾情其心必有所不安其體必有所不適受其節於禮而心之安體之適可不謂大順歟萬物各得其禮而後和夫是以禮行而樂作也彼叔孫通收其殘闕雜以秦儀尚效補苴於漢代而謂官天地管人情辨自君子者獨迂逺而不足致用乎哉至若禮之卑效地也澤尤地之卑者則禮之極其恭者然矣是又君子居安樂玩辨上下之本所不敢須臾稍忽也夫周易君子以辨上下定民志編修臣周玉章臣謹按六經之道同歸而禮樂之用為急在易書豫卦言樂履卦言禮言樂者主於和言禮者主於辨上天下澤尊卑之位定君子觀其象而辨之而禮由是生焉坊記禮者所以章疑别微以為民坊者也荀子曰禮者養也君子既得其養又好其别貴賤有等長幼有差貧富輕重皆有稱均所謂辨上下也蓋人生有欲則不能無求求而無度量分限則不能不爭秩之以尊卑貴賤之等始帖然各安其分而不敢有侈心故禮以節民性正所以定民志也程子曰古之時公卿大夫位各稱其德農工商賈勤其事而所享有限故皆有定志後世自庶士至於公卿日志於尊榮農工商賈日志於富侈億兆之心交騖於利由上下無定志也此言深切著明矣夫朝廷爵有功而祿有德非可幸邀也庶民之家自食其力無敢奢願也而宫室輿馬衣服器用毫忽不容假借極聲名文物之盛具有别嫌明微之義不然者朱紘鏤簋曲縣繁纓不失之靡即失之僭有位者既不免矣甚而至如賈誼鼂錯所云庶人屋壁得為帝服倡優下賤得為后飾富商大賈乘堅䇿肥履絲曵縞因其富厚交通王侯夫然而風俗凋敝獄訟繁興天下又安可得而治夫子産治鄭尚曰取我衣冠而褚之而况聖人治天下有不明辨等威致使驕淫僭侈紛然莫定其志哉夫天敘有典五典五惇天秩有禮五禮有庸其間恩義並至情文相生要必有其不可混淆者而度數彰焉故曰禮以辨異也先王之定禮也上自朝廷達乎州里閭巷以細及幃房袵席之間莫不事為之制曲為之防雖隆殺損益代異其宜而上下之辨天澤定位則夫教化大行民用和睦萬世之致太平者未有不由夫禮者也周易君子以辨上下定民志編修臣王際華程子曰上下之分明然後民志有定民志定然後可以言治後世庶士以上日志於尊榮農工商賈日志於富侈此由上下無定志也君子觀履之象而分别上下各當其分以定民志也臣謹按天下之大兆民之衆紛然待理於一人自古聖王設為公卿大夫士以及農賈工商尊卑貴賤各有等差人非不知髙位之榮而非其德不敢希也非不知紛華之悅而守其分無敢肆也考周官司徒辨五地之物生以施十二教授之以井地故有常産者有常心聨之以比閭族黨則不敢舍業而雜處於是三物以興其賢能八刑以糾其邪慝四海之內進德修業勤事而不暇詎敢淫心舍力覬覦非分以害休功者乎後代幅員日廣生齒益繁法度非不甚詳而一切民事皆聼民自為以故棄本務末朝遷暮改觀於賈誼陳政事疏貢禹言風俗書民間諸弊自漢已然此由無定分定志而上下之辨不嚴故也夫生民之源莫大於衣食而平天下者不以一人養天下令天下人人自養故既分别四民而什九驅之於農世業相承衣食易給雖無甚富亦不憂貧自定制不立而貧富不均邑有人君之尊里有公侯之富人求其所以尊富之故則或以遊惰或以經營共相欣羡轉為效慕貧不自安者既思他途以求遇即稍可自給者亦懷奢志而改圖其中炫名干進之流以及遊幕吏胥僕從實繁有徒咸聚居都會之間僥幸名利於萬一此皆民之蠧也蓋一人耕之十人聚而食之欲天下無飢不可得也乃遊民億萬不耕不織而咸思豐於衣食以故農民重困嵗遇豐盈猶無蓋藏間遭水旱不免流離雖仁厚之主在上賜賑廣蠲動不惜金粟數十萬而民仍無起色者平日蠧民者之多也誠本履卦之象仿周官九職之法以定民分名器不豫以妄干遊手不聽其妄託自京師達於郡縣繫民於故土之産清民以保甲之法凡平時徙業無故逺遊者有禁則進無非分之望退有本業之樂而民志定矣且夫民氣不可動尤不可驕往往治平既久官司以因循無事為福一二不法之民轉以挾制長官動輒鼓衆生事為大吏者正宜分别首從按法盡懲不得稍存姑息之心則上下之分愈明而民志益定庶乎尊卑有等行習有恆心以分安身以土著士相與言仁誼於間宴工相與議技巧於官府商相與論財利於市井農相與謀稼穡於田壄用以家給人足愈固國家億萬年之基矣御覽經史講義卷二
