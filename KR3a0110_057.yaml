body:
  text: 春秋隱公元年春王正月監察御史臣劉方藹左傳春王周正月公羊傳春者嵗之始也王者孰謂謂天王也曷為先言王而後言正月王正月也何言乎王正月大一統也榖梁傳雖無事必舉正月謹始也胡安國曰按左氏曰王周正月周人以建子為嵗首則冬十有一月是也前乎周者以丑為正其書即位曰惟元祀十有二月則知月不易也後乎周者以亥為正其書始建國曰元年冬十月則知時不易也建子非春亦明矣乃以夏時冠周月何哉聖人語顔回以為邦則曰行夏之時作春秋以經世則曰春王正月此見諸行事之騐也以夏時冠月垂法後世以周正紀事示無其位不敢自專也其㫖微矣臣謹按春王正月胡傳謂以夏時冠周月夫以從周之聖人作春秋經世章首即背時王何以示尊奬何以懲僭竊且周以建子之月為嵗首是以十一月為正月周本冠冬于正月聖人强冠之以春是周原行夏時而聖人反改冬為春不特不從周并非所以行夏時尊王垂法兩者俱失安國之説似未允也商以丑為正是以夏之十二月為嵗首其書即位不言惟元祀正月而曰惟元祀十有二月又曰惟三祀十有二月朔則商改正而不改夏之月數明矣豳風周詩也月令周制也皆與夏正合或疑月令出于秦未足証周但豳風所紀皆從夏時夏月或疑公劉國于豳正當夏代豳風乃周公追述前事宜從夏正但十月蟋蟀之下而言曰為改嵗則十月後之改嵗明屬十一月是豳風紀月悉從夏月而寓改嵗于其中周雖改正而未甞改月改時明矣且周詩言四月維夏六月徂暑以四月維夏推之則正月維春可知又臣工詩言維暮之春亦又何求如何新畬於皇來牟將受厥明葢言暮春則當治其新畬矣今如何哉然麥已將熟可以受上帝之明賜夫麥將熟則建辰之月也是周之暮春即夏正之季春以二詩考之周改正不改月并不改時益明矣蔡沈謂三代雖正朔不同然皆以寅月起數葢朝覲㑹同頒書授時則以正朔行事至于紀月之數則以寅為首也此足以正安國之説伏惟聖人代起皆後天而奉天時者也周若以改時為改正則以冬為春而四時遞舛何以順天何以授時夫為新天下之耳目乃至乖天下之節候恐非王道之所出春者四時之始王者受命之始正者政教之始春秋以正始為重聖人作春秋以道名分而開端即改周時既非所以道名分亦非所以正始天徳之至者恐不出此合三傳繹之竊意以嵗始之春一統之正謂聖人俱繫之周王而謹始于無事之月焉可乎春秋隱公元年冬十有二月祭伯來侍講臣劉藻胡安國曰人臣義無私交祭伯畿内諸侯來朝于魯而直書曰來所以杜朋黨之源為後世臣子事君而有貳心者之明戒也臣謹按左氏謂祭伯朝魯非王命也葢祭伯内臣不奉命而出境外交是以私意相結昧人臣在公之大義矣故書于冊以為後戒由此推之凡身列朝端而逺遞書信營求請托是即祭伯之類不得以未出境自文也顧胡安國不直斥祭伯為朋黨而曰杜朋黨之源源之義深逺矣今夫奸回邪僻朋黨之類著者易見而媕婀依違朋黨之隱中者難知源之不杜流將安底惟在嚴辨於公私之間而已矣故宰輔不以論道經邦為事而以首䑕摸稜養體是即宰輔朋黨之源也卿僚不以率屬倡牧為心而以援引親知樹徳是即卿僚朋黨之源也言官不能以逺猷啟沃而毛舉細故摭拾浮詞將建白或有所授意欲彈劾又懼其反攻是即言官朋黨之源也詞臣不能以文章報國而陶情詩酒寄興聲歌白晝則徴逐于儕軰暮夜則乞哀于公卿是即詞臣朋黨之源也部屬不思以勤慎盡職而随例説堂輪班畫卯揣合堂官之喜怒屈指嵗月之陞遷是即部屬朋黨之源也督撫以察吏安民為職乃或凴愛憎以黜陟任意見以興除是即督撫朋黨之源也守令以清亷子惠為良乃或廢職業而曲意逢迎無實徳而獵取名譽是即守令朋黨之源也所望内外大小臣工屏除舊念杜絶私情精白乃忱公忠無我庶㡬㑹歸于蕩平正直之極耳是以胡安國既曰杜朋黨之源又曰為貳心之戒葢人臣敬事惟在此心有私則雜而不專不專則精神不動精神不動則才氣不出精神才氣不足以自奮而天下事無一可為者是皆貳心之為累非必背主誤國而後謂之貳心也抑又有進者正一身以正朝廷正朝廷以正百官建極倡化必自人君始故堯舜禹湯之治深宫淵穆志氣清明百體從令萬事萬物莫不各由其道而淫朋比徳自潛移黙化于不自知也春秋桓公三年夏齊侯衛侯胥命于蒲編修臣金相臣謹按春秋大義首重尊王王者有道則禮樂征伐朝㑹聘享悉禀命于天子而諸侯不敢自恣周室自平王東遷而後政教不行勢微力弱列國兵爭夫子託始于隱明一王之大法要皆直書其事而善惡自見初何容心哉魯桓三年齊之僖公衛之宣公皆非謹爾侯度者也曰蒲則紀其地曰胥命則紀其事命者何謂約信也胥命者何齊命衛耶衛命齊耶大者宜倡小者宜和大則齊小則衛以齊命衛則歸功于齊以衛命齊則齊僅随從不以强弱為先後故曰胥命也然則正乎曰不正也命者天子之命也天子命之教然後為學周禮大宗伯掌六禮以諸侯相見春朝夏宗秋覲冬遇時㑹衆同非此六禮無得踰境私出此盛王之制也今此之命出于齊衛非出于王朝也非出于王朝不正孰甚焉不正曷為予之曰非予之也近正焉爾春秋之世强欺弱衆暴寡戰爭攻取殆無虚日口血未乾干戈從事二國獨能結言而退不復刑牲㰱血較諸朝盟夕替者不可同日而語矣聖人善善長而惡惡短春秋書此其即齊桓晉文不沒其功之意歟或謂齊衛相命為方伯則經未甞明著其事况胥命之後齊衛未甞有㑹盟征伐之事則非相命以伯也明甚二國為㑹不為盟詛公榖謂為近正荀卿謂春秋善胥命程子胡傳皆宗其説豈不信哉聖人予之而不盡予貶之而不盡貶權衡折諸至當是非判于㡬微褒貶寓于言外凡此筆削非聖人不能修也春秋桓公十有四年夏五監察御史臣張漢臣謹按孔子曰吾猶及史之闕文也甚矣夫史之當慎也夫人即聰明勝古人亦何必與古人爭勝况聰明又不逮古人乃以所見異詞所聞異詞所傳聞異詞者妄出臆見以増之是雖補亡訂誤欲成信史以釋後世之疑而反不足取後世之信使後世不得見古人之真則亦未聞聖人之訓也即如春秋桓公十有四年書曰夏五豈非經之疑有闕文者乎夫以時冠月聖人所以因時而建正也乃夏而僅繼之以五不成其月也以數冠月聖人所以計次而加閏也乃五而不繼以月又併不成乎數也吾夫子以作者之聖自居述者之明亦何難援筆而増益之使人渙然盡釋乎其疑而不致滋人以擬議而夫子于闕文必因之以存疑此何為乎葢天下事有吾見聞所不逮者書闕有間不必今人之是而古人之非古人所不必爭與不能爭者則亦聼其為斷簡而必不可妄増之以亂聖經而欺後世豈非所以致慎乎臣於是推之十三經其間闕疑者正不可勝數也按詩書儀禮間有逸文春秋禮記及孟子荀子所引之詞亦有小異孟子有中外十一篇今存中篇七篇逸外篇四篇王允荀子引其語今不可考矣經有補闕文者禮經闕樂記房庶以亡樂記補之不以列于經詩闕笙詩六章束晳補白華亦不列于詩周禮闕冬官河間獻王以考工記補之或以為冬官不止考工且以干先王之典罪之余夀翁軰採五官中合于冬官者補之或以裂章句乖舊典譏之即朱子補大學致知傳董槐葉夢鼎軰謂還知止物有本末二節次子曰聼訟節即致知傳朱子多此一補也欲以補經反以失經之真矣若夫尚書有古文今文汲冡之分論語有齊論魯論古論語大學有古本石經孝經有古文今文間有同異如此之類不知書亡于秦火之後而有異同乎抑自秦之先而已然乎讀經者俱以存叅不必執臆見為定於春秋闕夏五之意可類推也孔子曰多聞闕疑慎言之道亦即窮經之道哉春秋僖公三年春王正月不雨夏四月不雨六月雨監察御史臣宮煥文左傳春不雨夏六月雨自十月不雨至于五月不曰旱不為災也榖梁傳不雨者勤雨也一時言不雨者閔雨也閔雨者有志乎民者也雨云者喜雨也喜雨者有志乎民者也胡安國曰閔雨與民同其憂喜雨與民同其樂此君國子民之道也觀此義則知春秋有懼天災恤民隱之意臣謹按隂陽和而後雨故易言雨以潤之詩言芃芃黍苖隂雨膏之有志乎民者所以計之必切也觀小畜宻雲之象文王厪念于西郊讀大雅雲漢之詩宣王蒿目于下土可不謂憂民之至歟春秋一書災異備録經於他公書旱者有矣僖三年不書旱而書不雨者有以見僖之心常不忘乎雨也葢僖公懐恤民之心方冬不雨則冀春暨春不雨則冀夏至四月不雨而公心危矣聖人知公心之危故毎時首月而一書以著其懼災之甚憫農之切也若文二年書自十有二月不雨至于秋七月十年十三年再書自正月不雨至于秋七月曰自曰至不一舉時而總書以括之者葢以見文之無心于雨乃榖梁所謂無志乎民者也知文之無志乎民則知僖之有志乎民此書法之所為異也傳稱僖公足用愛民務農重榖是平時固勵精圖治今又遇災而懼百姓見憂宜能感召天和而致澍雨之應此僖三年書六月雨為春秋特筆予公所以録賢君精誠之感也葢冬春夏連書不雨於上六月雨而喜可知已不書則無以見樂民之樂情有如是之欣欣也書六月雨則示旱不竟夏先四月猶書不雨者非是無以見憂民之憂情有如是之汲汲也此所謂同憂王事之始而同樂王事之成者也或謂經于文公書不雨至于秋七月則八月必甞雨顧削而不書何也曰先儒謂不書以見文之無心于雨其説固然竊以書不雨至于七月則旱竟為災而雨無益雨可不書也按周六七月夏建巳建午之月也左氏稱龍見而雩月令稱仲夏命有司為民祈祀山川百源大雩帝春秋凡過時而雩皆謹書于䇿以志旱是知己午月之雨尤為可喜之雨過此以徃則苖㡬于槁雖雨後時矣此春秋書六月雨不書八月雨所以著旱之成不成而二公之勤與慢亦因事以見者也臣甞即事推之洪範之言休徴曰肅時雨若乂時𤾉若説者謂貌澤水也而雨亦屬水故時雨若言揚火也而𤾉亦屬火故時𤾉若然五行雖配五事自伏勝作五行傳班固而下諸史踵為五行志徴應頗多牽㑹朱子云肅有滋潤底意思乂有開明底意思所以説時雨順應時𤾉順應其實人主一徳修則諸徳皆修非謂肅自致雨無與於𤾉乂自致𤾉無與於雨也且如君徳克懋喜怒悉持其平則以和召和而五日一風十日一雨也刑賞胥得其當則以順致順而風不鳴條雨不破塊也時雨時𤾉君心即天心春秋書六月雨葢即僖以示子民之道也春秋僖公三年六月雨監察御史臣趙青藜臣謹按周正之六月夏正之四月也當清和時草木昭蘓麥禾蓬勃其望雨也切矣故雩祭之期必于四月而天適于其期降厥雨可喜孰甚焉此六月雨所由書也然考春秋書法文公二年書自十有二月不雨至于秋七月十年書自正月不雨至于秋七月夫不雨至于秋七月其八月雨可知而不書者何也葢其不雨也未甞憂則其於雨也不必喜淡然漠然若視為天數之固然而一無所闗乎其心聖人亦即以其固然者書之以是知六月雨之雨為誌喜也喜草木之得雨而由昭蘓以致茂盛喜麥禾之得雨而由蓬勃以致與翼喜隂陽之忽和而既雨既處民心樂易惟君亦得以同其樂也故于雨之前輙言不雨以示憂民之至不雨而與民同其憂雨而乃與民同其樂君子以僖公為深得子民之道其號稱魯國令主也固宜何休云僖公飭過求已循省百官放佞臣郭都等理冤獄四百餘人精誠感天不雩而得澍雨其事雖不可考然魯頌閟宫一篇朱子斷其為僖公之詩無疑今讀其辭曰春秋匪懈享祀不忒言公之致敬于郊廟也曰三夀作朋如岡如陵祝公之夀考于無疆也而其卒章曰萬民是若則公誠非無意于民者也叅觀于文公不雨之書而飭過求己固有可信之理焉非然者雨不雨同而書何以不同書之不同者直以其心所不同揭之以垂法萬世而或者謂賢僖公而生此説豈聖人特書之㫖哉亦昧于天人相與之故矣夫天所寄為視聽者民也民所仰為父母者君也君日憂勤于上則民日安全于下和氣薰蒸休祥畢集雨之時若特其一耳洪範列庶徴推本于五事貌不恭歟言不從歟宜可不為湯慮乃七年旱必自責而後雨益以見天之仁愛人君儆戒以玉成之者無所不用其極而大聖人之修省刻勵亦必有精益求精密益求宻于幽獨者不可以尋常測若其恐懼以答天眷葢自古為昭也且夫人事不修而天符或至君子不以為祥若宣公之冬大有年是已宣公履畆而税重困農民誠不得與憂勤之僖公比故其冬大有年亦不得與六月雨同觀孫覺謂有者不宜有汪克寛謂閔魯國之民而幸其僅有年則信乎其不得為祥矣然則有年非祥不雨非災凡皆以憂民不憂民之君心決之㡬判于毫釐應㨗于影響甚矣夫天不假易儆戒可樂而洗心退藏於密者不容以不慎其春秋垂法之義歟春秋左傳僖公五年凡分至啟閉必書雲物為備故也編修臣周煌杜預曰分春秋分也至冬夏至也啟立春立夏閉立秋立冬雲物氣色災變也傳重申周典不言公者日官掌其職素察妖祥逆為之備臣謹按王者敬天勤民莫不有憂勞乾惕之心終始乎其事非徒有備無患而已也葢天垂象矣日月星辰風雨露雷之屬為之佐使時未至而兆先見所以然者何也天心仁愛降于下土若曰是其未可假易也周禮保章氏以五雲之物辨吉㓙水旱降豐荒之祲象鄭𤣥云物色也視日旁雲氣之色降下也知水旱所下之國鄭衆云以二至二分觀雲色但言分至則啟閉可例也此周典之大凡也臣惟天之去人不逺其象亦彰明而較著顧暗者見之於已然之後而明者審之於未然之前左氏於其書雲物也解之曰為備故夫備亦何可不亟講哉天時之偶失其宜人事之或違其節偏災流行何代免此坐待則無功早圖則有濟未雨綢繆備之謂也昔者成湯禱于桑林以六事自責周宣中興詩歌雲漢類皆蒿目時艱焚心民瘼然其時之旱或動至七年或既成太甚二主之勤劬苐如是之補救于事後乎無亦㡬燭于先道立乎豫而匪朝伊夕也王制曰冡宰以三十年之通制國用量入以為出三年耕必有一年之食九年耕必有三年之食以三十年之通雖有㓙旱水溢民無菜色後世之言積貯殆本乎此雖名因時異弊由人興要其為備則聖人不易法耳臣又惟籌積貯以備之者守常之規也審占騐以備之者濟變之術也時候既殊方隅自别其君臣早作夜思必有所精神獨注之處以酌盈而濟虗經始而善後思專則罔遺力并則難格是故日官所掌葢其重歟若夫多瑞以生亂遇災而能興理則有此事亦固然天人相感之際豈其微哉臣故謂非徒有備而無患者此也春秋左傳成公二年衛侯使孫良夫石稷甯相向禽將侵齊與齊師遇新築人仲叔于奚救孫桓子桓子是以免既衛人賞之以邑辭請曲縣繁纓以朝許之仲尼聞之曰惜也不如多與之邑唯噐與名不可以假人君之所司也名以出信信以守噐噐以藏禮禮以行義義以生利利以平民政之大節也若以假人與人政也政亡則國家從之弗可止也已監察御史臣西成臣謹按仲叔于奚有功于衛賞之縣纓孔子謂名噐不可假人不如多與之邑豈非以此名噐者受之天子傳之先君國之所以為國政之所以為政者胥繫乎此以之假人是猶有短垣而自踰之且廢王章弛侯度也哉乃前此僖公二十有五年晉文公平王室之難請隧以自寵襄王弗許與之陽樊温原攢茅之田矣此所謂名噐不以假人而寧多與之邑者乎而臣考宋臣呂祖謙博議謂隧固王章也千里之畿甸亦王章也襄王惜禮文不以與晉自謂能守王章抑不知割地自削則畿甸之王章不全矣惜其一而隳其一烏在其能守王章耶周自平王捐岐豐以封秦既失周之半矣奈何子孫猶不知惜今日割虎牢畀鄭明日割酒泉畀虢王今又捐數邑與晉是棄糧于陳蔡之間揮金于原曾之室也祖謙之論如此則與人以邑不尤甚于與人以名噐哉後此定公十有二年孔子相魯謂定公曰臣無藏甲邑無百雉之城將墮三都夫三家之有此三都也豈非因先世有功得受此邑以傳至今日哉孔子重名噐而輕田邑則相魯柄政首在革三家之歌雍詩舞八佾旅泰山矣而孔子何以不問獨為墮三都之舉是孔子之重與人以邑更重于假人以名噐也且一邑之中有民人焉有社稷焉名噐君之所司也邑獨非君之所司乎假人名噐與人政也與人以邑獨非與人以政乎名噐所假猶禮文耳有功可以與有罪尚可以奪多與之邑所與者實在之形勢也有功邑且再増有罪邑難復奪葢邑多則人衆人衆則力强力强則勢叅而名與噐皆可得而僭故多與人邑無異多與人以名噐况國家之封邑有限而臣民之立功者無窮使有功之人而皆多與之邑衛自康叔受封迄于君角㡬九百年矣焉得有如許之邑以為酬功之用乎竊謂名噐不可假人斯言是也不如多與之邑立言則有病矣意古君子曽有是言而左氏附㑹為孔子之言歟或曰仲叔于奚與晉文公之事不同晉文公外臣也朝受圖而夕設版矣不當與之以邑也仲叔于奚内臣也雖多與之邑猶衛地也然則魯三家獨非魯之内臣乎而費郈成獨非魯之内地歟春秋左傳襄公三年君子謂祁奚於是能舉善矣稱其讐不為諂立其子不為比舉其偏不為黨商書曰無偏無黨王道蕩蕩祁奚之謂矣解狐得舉祁午得位伯華得官建一官而三物成能舉善也夫惟善故能舉其類詩曰惟其有之是以似之祁奚有焉編修臣楊開鼎臣謹按古大臣公忠體國以身事君鞠躬盡瘁遑問其他然以身事君量止一世以人事君量且百世泰交之朝以正引正以賢引賢則得人要矣左氏襄公三年傳晉祁奚請老晉侯問嗣焉稱解狐狐其讐也又問焉曰午也可午其子也其代羊舌職也又以赤赤其偏也此其識之明見之公為嫌為怨不以入心後之舉賢自代者可於是焉為法故哀公五年傳又云晉范氏之臣王生惡張柳朔言諸昭子使為栢人昭子曰夫非而讐乎對曰私讐不及公及范氏出張柳朔謂其子爾從主勉之我將止死王生授我矣我不可以僭之夫柳朔本王生之讐而王生不以私憾廢公致令柳朔以矢志報主者不僭王生是王生之所以服柳朔者至深且切而且足以激發所舉之人之忠又一明證矣臣非摭拾古説有偏重舉讐之意謂于讐能舉則其于賢能舉可知於讐能辨其賢則其于非讐能辨其賢可知所以史遷云蕭何素不與曹參相能及何病孝恵自臨視問誰可代者對曰知臣莫如主孝恵曰曹參何如頓首曰帝得之矣葢以公忠為國報君之心老而勿替所舉而賢臣不任功所舉不賢臣將任咎非只以弛己之擔使朝廷之上用非其人而貽他日之憂也且周禮太宰以八統馭萬民三曰進賢四曰使能七曰逹吏謂雖小吏勤勞亦必使之上逹此即舉其偏之説也葢大臣為國薦賢其班聨之肩随乎我者吾識而誌之以為推挽之用即職列末僚位當下吏而茍其徳之既彰才之既著而可㧞者入之呂相囊中以備朝廷之採擇不敢少有疎略也檀弓謂趙文子所舉于晉國筦庫之士七十有餘家夫管庫賤職舉之于君以為大夫士禮稱其不交利不屬子固矣而其汲引微賤尤可重也又東漢鍾皓為郡功曹辟司徒府臨辭太守問誰可代卿者皓曰明府必欲得人西門亭長陳實可太守遂以為功曹此雖非大臣薦賢自代之事而一功曹之任必薦一確為可代之人比例而觀令皓時在大臣之位必且於陳仲弓輩者推為公孤引為保傅不虚矣至若舉其子而不為私者祁奚固然而宋之曹彬亦謂臣之子皆可為將然璨不如瑋瑋後果繼父為名將呂蒙正老真宗幸其第曰卿諸子誰可用者對曰有姪夷簡宰相才也此皆以至公之心但知其賢不知其子與姪故所舉皆得其人而天下後世亦不謂其私然必嘖嘖于此以為美談援以為例恐古人至公之舉胥為後之私其親屬者藉口故有可偶行于前而不可常行于後者此類是也雖唐李絳用人不避親曰非親非故孰諳其才茍所用非人朝廷自有典刑而究非篤論葢令其親故果賢所謂錐處囊中必且脱頴而出我即不舉必有他人知之而舉之者設不為他人所舉則其賢不肖已判然可定矣明乎此數者而後推賢而進能也不牽于私而識自明不昏于識而見自公酌已準人度才量徳以卿薦卿必其經濟實出已上而後舉以自代非徒矜遜讓之虛文以卿薦士必其噐識實堪造就而後引之同升不必拘勢分之懸絶所以前秦苻堅時呂婆樓當國知王猛之賢以己僅刀環上人而薦猛於堅堅一見如舊交自謂如昭烈之遇孔明任以司𨽻校尉而秦以大治至北魏崔浩論近日將相猶以王猛之治秦為苻堅之管仲豈非呂婆樓知己知人而薦之得其當乎故茍自知其職之難稱而即懸車歸田脱然以去是恝置其君親矣於此而舉非其人是又甚于恝置其君親宋王安石去位薦韓絳呂惠卿以自代時號絳為傳法沙門惠卿為䕶法善神葢賢與賢為類奸與奸為類皆因安石事君根本已差遂挈類呼朋以病國又非薦之不得其人而已也以是知薦賢必己身正而後所引之人正所謂端範之下無欹噐直表之下無曲影事有必至不可得而誣焉然又必以至公之心抱至明之識不以小嫌為憾不以黨同為疑如宋王旦數為宼凖所短而旦獨專稱凖真宗一日謂旦曰卿雖稱其美彼專談卿惡旦曰理固宜然臣在相位乆缺失多凖于陛下前無隱益見其忠此臣之所以重準也後旦求避位眞宗謂天下事付之誰乎旦曰惟明主自擇時張詠馬亮皆尚書帝歴問二人不對乃舉笏曰以臣之愚莫如寇準他人非臣所知也即旦此事以觀真無愧古大臣以人事君之義矣又按宋王曽進退人人莫知之范仲淹曰公盛徳獨少汲引耳曽曰執政而令恩歸于己怨将誰歸也葢先見得受爵公朝拜恩私室為大不可則在己無一毫市恩之念於人自無一毫偏袒之私其人而屈意于我必有所求伸于我者也其人而淡漠于我必無所冀倖于我者也葢人之孤介自持者不能茍安于人其負性定然剛直若其人而言既柔美行復圓通處處皆宜人人盡合今日之鄉愿即異日之諛佞也宋司馬光薦劉安世充館職因謂曰知所以相薦否曰獲從公逰舊矣光曰非也光居閒足下時問訊不絶光位政府足下獨無書此光所以相薦也又王旦為相張師徳兩謁之不見旦曰可惜張師徳吾甞稱其有士行不意兩及吾門則自司馬光王旦觀之其於人之嚴毅于己者則取之於人之周旋于己者則棄之此真可為萬世取人之則葢天下未有能守而不能有為者亦未有失己而能治人者也至若以不稱之才居難副之位而戀戀不舍此固庸鄙不足比數即或矢志君恩而必盡責于一己之身其為量猶隘而淺前明正統時三楊秉政士竒欲盡瘁報國死而後已榮曰先生休如此説吾輩衰殘無以効力當換㡬個後生報聖恩耳此乃忠愛無己之心也摠之登明選公者大君御世之權也薦賢為國者大臣交贊之美也讐如解狐徳怨可忘矣子如祁午親疎勿計矣偏如伯華尊卑無論矣惟善故能舉其類一正人倡之百正人繼之子孫之朝猶享祖宗樹人之福而綿綿延延茀禄無窮此豈非賢以舉賢之留貽也哉春秋襄公九年冬公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭十有二月己亥同盟于戲監察御史臣沈懋華左氏傳曰三駕而楚不能與爭杜預注曰三駕三興師也胡氏曰雖城濮之役不是過矣臣謹按三駕之績千古艷稱而其實非也晉悼之世楚共王當國子囊為政牛首之役晉遇楚師而不敢戰嗣是楚執鄭良霄又秦人敗晉于櫟其所謂三駕者晉未甞勝楚未甞敗鄭人徃來其間烏在其不能與之爭也先是秦乞師于楚伐鄭子囊不可王曰吾既許矣雖不及晉必將出師是不欲戰者楚也已而荘夫人卒王未能定鄭而歸是不欲戰而還者又楚也此楚之情形也諸侯伐鄭門于剸門門于師之梁門于北門魏絳斬行栗表道樹所謂三分四軍與諸侯之銳以逆來者使知武子果能善師而陣善陣而戰則楚之踰箐越阻孤軍深入者即隻輪不反可也計不出此而既以鄭為餌旋以鄭為壑鄭能無痛心而疾首乎哉考其時鄭之畏晉也甚于楚楚一至而已自居疾于虎牢而境上之陳匪止犧牲玉帛也供億之煩抄掠之酷所謂辛苦墊隘人民愁嘆之聲晉一來而鄭不啻二被楚也諸侯之被困也甚于鄭鄭多事之國也至于諸侯無嵗不從無嵗不㑹雖杞小邾不得免焉詩曰匪兕匪虎率彼曠野又曰何草不黄何人不將諸侯一困于從行再困于城戍雖欲同晉以與楚爭亦不可得矣飾三駕之文為七合之舉晉之復覇其誰欺乎滅偪陽以通吳欲以撓楚也而適寇秦以資敵結為世仇為國老謀何以至是葢覇術多欺人而晉悼其尤也左氏之浮夸即晉史之浮夸也讀春秋者所當棄傳以從經焉耳春秋左傳襄公二十五年子太叔問政于子産子産曰政如農功日夜思之思其始而成其終朝夕而行之行無越思如農之有畔其過鮮矣編修臣萬年茂臣謹按子産之相鄭也都鄙有章上下有服田有封洫廬井有伍一年而輿人謗之三年而頌之夫以子産之賢任一國之政所行者又皆周官之法乃當時人心未能遽曉而子産始終不渝卒成其志意其執此可謂堅矣及觀其所以告太叔者然後知其挾持甚深而有具也周官曰凡我有官君子欽乃攸司慎乃出令令出惟行弗惟反葢行之則必慎之慎之則必思之行而不慎何以無反不思而行何以能慎行既不慎而所司之日曠固其勢也夫政必素見成事焉然後其致之也有漸而成之也有形故曰君子以思不出其位又曰設誠于内而致行之惟能思故氣沉氣沉故慮深慮深故周知其事之當否而豫審其成敗之故于是出之以至誠逹之以至勇要之以乆道而是非無所眩于其間夫人之是非不可詰也而事之當否至難知也以疑事而甞試之其為行也必無濟矣行之無濟勢將廢行行既格于不思則其取舍益淆而行常出于所思之外今夫春耕而夏耘髙黍而下稻小民終嵗勤動以事田畆然莫不相其寒暑度其原隰審其肥磽其成算既定于心而多寡贏絀之數皆可得而逆知之故荆揚之人而與謀薊豫之産則踈并營之土而以授雍梁之夫則拙何也彼固未能思于畔外而行之無有巧便焉故也昔者太公治齊周公治魯相謂曰何以治國太公曰尊賢上功周公曰親親上恩夫二公之立國當無不同也乃禮俗有因革報政有難易而子孫數十世之彊弱豫定于一日豈非所謂素見成事焉而為之者歟人之材智非逺于古也叢雜而授之則亦叢雜而受之茍且而責之則亦茍且而報之随行而入逐隊而趨大吏不能决而聽寮屬之指陳寮屬不能决而聽胥役之援比及其委蛇退食而國家之事有了不與焉者矣職安得而不曠也而黠奸之吏因其怠廢則又乗之以㨗給誤之以多方以滋事為練逹以訐人為風采行與心違計不終日葢因循之後變而文巧相激使然何足怪焉故行必有思思必有畔而行其思者必專以乆鑄劒者三年而成乆也宋斤魯削遷其地而弗良專也天下可成之績常後見難成之象常先形不專以乆誰肯與人首事之功結人未成之局耶夫責數事不如其一事也責一日不如其百年也萬全之利無以小害而弗為萬一之弊無以小利而輕舉然而不臻上治者未之有也春秋左傳昭公二十年鄭子産謂子太叔曰唯有徳者能以寛服民其次莫如猛仲尼曰善哉政寛則民慢慢則糾之以猛猛則民殘殘則施之以寛寛以濟猛猛以濟寛政是以和編修臣周玉章臣謹按為政之道不外寛猛兩端書曰敬敷五教在寛曰好生之徳洽于民心兹用不犯于有司曰克寛克仁彰信兆民子産謂有徳者能以寛服民誠哉純王之治也曰其次莫如猛此則雜以霸術要亦因鄭國風俗淫靡公族怙侈非猛不足以為政其心則專以愛人為主後世如諸葛亮之治蜀王猛之治秦皆法此意然而以猛為政可以救一時之弊而不可恃為長駕逺馭之術當其人情縱侈職業懈弛不得不整肅而懲創之使吏皆守法民不犯奸迨天下既知所警畏然後優游樂易為生民養和平之福則始之以猛未甞不終之以寛也子産豈不知刑服之不如徳化而教子太叔以猛者特以救鄭國之弊而非好為火烈之治故孔子既善其言而又發為寛猛相濟之論夫而後習尚申韓者不得藉為口實矣葢寛與猛俱足以致治而偏勝之與互濟則有辨漢文躬行節儉薄賦減刑天下乂安人民殷富庶㡬以徳化民者然而宗尚黄老意主清静未免有過于優容之處孝宣綜覈名實信賞必罰號稱中興乃厭薄儒術專事刑名徳教未有加焉故不得與三代盛王比烈也臣聞一張一弛文武之道弛而不張所謂寛則民慢也張而不弛所謂猛則民殘也必寛以濟猛猛以濟寛而後政得其和天生民而立之君使師保之寛仁慈厚為政之本也紀綱法度佐治之具也平時葢之如天容之如地休養生息廣其衣食之利導以親遜之風俾服疇食徳遠至邇安其有作奸犯科者罰無赦此除稂莠以養嘉禾不得少存姑息而于明罰飭法之中不失慈恵子諒之意是以徳洋恩溥而澤不濫令行禁止而法不苛百姓得其職萬事得其宜隂陽調爕人民夀康所謂不競不絿不剛不柔敷政優優百禄是遒而和之至矣古聖王仁以育萬物義以正萬民有並行不悖者不待民慢而後糾之以猛不待民殘而後施之以寛所以無競絿剛柔之迹而太和之氣翔洽宇内也司馬光曰寛而疾惡嚴而原情政之善者也斯言可謂深識治體者矣春秋左傳昭公二十年政寛則民慢慢則紏之以猛猛則民殘殘則施之以寛寛以濟猛猛以濟寛政是以和編修臣白瀛臣謹按陽舒而隂歛者天之道渾厚而精明者君之徳天無心以成化而雨露與霜雪並行而不悖君有心以無為而爵賞與刑罰相濟而不窮是故仁以育之義以正之道有兼偹而勢無偏廢也今夫論政之説有二經術之士恒主於寛刑名之家恒主於嚴主寛之説者曰包含徧覆乾坤之量含垢納汙山澤之常故徳化者聖王之所尚而刑殺者仁人之所隱也主嚴之説者曰峻防則民寡過弛禁則民多辜火烈而避之者衆水柔而溺之者多故鞭朴不必施於家而法制不可棄於國也臣愚以為二家之説均有遺論焉主於嚴者雖切於用然任法而少恩終不免於刻核之弊主於寛者雖縁於道然迂文而寡效亦不免為腐生之談大抵變而通之存乎時推而行之有其要時也要也所以適於中正之途而無畸輕畸重之弊者也是以聖主在上操轉移天下之權而乗時而施宜寛則寛而天下咸服其大公宜嚴則嚴而朝野皆諒其無私循乎其迹似若相反而原乎其心縂歸一致也試觀父母之於子也惟其愛之也至則欲其行成而名立故始而訓導之至教之不率又必盡其防閑之方施其督責之術葢愛則必勞非勞無以成其愛也孔子相魯子産相鄭當時之民始則謗之繼且歌之葢凡民可與樂成難與圖始故非常之原黎民所懼而聖人處之不啻日用飲食之安迨至法立而民不玩然後天下食聖人之仁而莫能名聖人之徳是一時之嚴正所以養千百世之寛而煦育之恩未甞不藉整飭之法而流也子産之告子太叔曰惟有徳者能以寛服民其次莫如猛臣則謂惟有徳者能善用其猛而終成其寛此所以天心合撰而無為化成也與春秋左傳昭公二十年政寛則民慢慢則紏之以猛猛則民殘殘則施之以寛寛以濟猛猛以濟寛政是以和檢討臣周孔從臣謹按好生者天地之心而陽舒與隂慘互用雨露與雷霆並施不如是則生意或有時而不能遂人君之為政也體天地生成之心引養引恬原欲斯民各遂其生而恩威並行剛柔兼克要不可倚于一徧此子産寛猛之論必徴諸夫子之言以為斷也葢寛者非姑息之謂養欲給求仁慈惻怛而已猛者非酷烈之謂節性坊淫紀綱明肅而已為政者操教養之權具仁育義正之用涵育薰陶自足令天下回心而嚮道何待民慢民殘始思補救哉然而時至事起警其偷而化其暴非因時為權衡鮮有能調劑以得其平者故曰慢則紏之以猛殘則施之以寛也獨是矯枉者必過其正過正則不協於中不中則不能和彼偏於姑息者固水懦而易狎若偏於酷烈將殘民以逞其害更有甚焉者則矯其偏乃所以即於偏也於是繼之曰寛以濟猛猛以濟寛政是以和夫相濟則不流於偏而政得其平平則中中則和中和而天地位萬物育庶不失好生之徳而民之生於以遂矣且夫一張一弛記之所以稱文武也不剛不柔詩之所以頌成湯也書曰寛而有制從容以和惟有制於寛之中斯不失之寛亦不失之猛而導和以從容乃天地之所以保合也然其效必積乆而後著試即子産之治鄭觀之其先有孰殺之譏矣藉非乆於其任安必其後有誰嗣之頌也哉竊以為太和之治其本原在朝廷而承流宣化則在司民牧者之善體徳意勤加撫綏使其精神志氣平時與小民相習而腹心既聨臂指可使干名犯義之風固将不禁而自戢漢黄霸之守潁川力行教化而後誅罰外寛内明得吏民心唐崔郾之治陜也見土瘠民貧則撫以寛仁或經月不笞一人及其治鄂地險民雜剽狡為奸則嚴峻刑罰以懲之誠以土地異宜民生異俗因時逹變以底於治非迂拘俗吏所能勝任而愉快也不然朝廷下一寛大之令則相循為縱弛稍一整肅又從事慘刻而民不堪其命豈所以體好生之心而贊休和之盛治哉然則寛猛相濟洵千古為治之要道而端主極以協吏治協吏治以厚民風固不能舍是而他求也與御覽經史講義卷二十
